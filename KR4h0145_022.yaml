body:
  text: 欽定四庫全書御選唐詩巻十六補編五言律張九齡蘇侍郎紫薇庭各賦一物得芍藥唐書蘇頲由工部侍郎進紫薇侍郎又百官志開元元年改中書省曰紫薇省中書令曰紫薇令韓偓集注玉堂及西掖㕔前皆植紫薇花古今注芍藥一名將離仙禁生紅藥景龍文館記駐蹕芳苑鳴笳仙禁謝朓詩紅藥當堦翻王樞詩紅藥間青薇微芳不自持阮籍詩順風振微芳陸機詩微芳不足宣盧思道詩輕盈不自持幸因清切地劉楨贈徐幹詩誰謂相去逺隔此西掖垣拘限清切地中情無由宣還遇艷陽時鮑照詩艷陽桃李節名見桐君錄陶𢎞景本草序有桐君採藥錄説其花葉形色本草注桐君黄帝時臣也采藥錄二巻今已不傳香聞鄭國詩詩鄭風惟士與女伊其相謔贈之以芍藥傳芍藥香草孤根若可用國語孤其根本宻其枝葉本草别錄芍藥生中岳川谷及丘陵二八月采根曝乾非直愛華滋詩匪直也人古詩中庭有竒樹緑葉發華滋梁簡文帝詩庭樹吐華滋送廣州周判官吳志士變傳黄武五年權以交趾縣逺乃分合浦以北為廣州交趾以南為交州海郡雄蠻落漢書主父偃傳秦皇帝又使天下飛芻挽粟起于黄腄瑯琊負海之郡轉輸北河宋之問桂州三月三日詩永和九年刺海郡陳子昂詩言追六郡雄華陽國志降夷人安種落蠻夷率服津亭壯越臺劉潛連珠津亭掩馥廣州記尉陀立臺以朝漢圎基千步直峭百丈一統志番禺縣西越王山上有臺趙佗所築城隅百雉映詩俟我于城隅周禮城隅之制九雉公羊傳雉者何五版而堵五堵而雉百雉而城水曲萬家開周禮地官保氏五馭注鳴和鸞逐水曲梁簡文帝詩水曲文魚聚史記年表大侯不過萬家庾信碑文户牖萬家陳平之鄉里里樹桄桹出宋之問詩里樹橘猶新南方草木狀桄桹樹似栟櫚皮中有屑如麵出九眞交趾沈佺期詩窮巷倚桄桹謝朓詩離離海樹出時禽翡翠來水經注時禽異羽翔集間闗後漢書西南夷傳哀牢出孔雀翡翠埤雅翠鳥或謂之翡翠雄赤曰翡雌青曰翠郭璞詩翡翠戲蘭苕觀風猶未盡禮記命太師陳詩以觀民風曹植賦觀者終朝情猶未足早晚使車回詩夜如何其箋問早晚之辭周禮夏官馭夫掌馭貳車從車使車傅休奕賦乃憑軾以迴軌宋之問奉和立春日侍宴内出剪綵花應制大業拾遺記煬帝築西苑宮樹秋冬凋落乃剪綵為花葉綴於條金閣籹仙杏舞鶴賦舞飛容于金閣唐太宗詩禁苑春暉麗花蹊倚樹籹神仙傳董奉居廬山為人治病輒愈重者種杏五株輕者一株瓊筵弄綺梅舊唐書文宗二子傳論對食瓊筵梁簡文帝詩日色花上綺陳後主詩金砌落芳梅人間都未識史記留侯世家留侯曰願棄人間事從赤松子遊耳髙士傳宗測少靜退不樂人間遂往廬山止祖舊宅江總詩野花不識采天上忽先開易雷在天上庾信詠舞詩已曽天上學詎是世中生梁元帝詩春花犯雪開劉孝威詠剪綵花詩花發是初開蜨繞香絲住張正見詩蛺蝶繞承華唐太宗述聖賦序舞蝶遊絲帯清飈而散影廣韻住止也蜂憐艷粉迴王僧孺詩緑草閒遊蜂庾肩吾詩蜂歸憐蜜熟蕭慤詩艷粉拂輕紅張正見詩艷粉驚飛蝶今年春色早蕭子顯詩四五今年朝謝朓詩春色滿皇州梁簡文帝詩春色映宫來王勃賦霜前雪裏知春早應為剪刀催爾雅注南方呼剪刀為劑刀庾信詩龍文鏤剪刀徐延夀人日剪綵詩葉催情綴色花寄手成春杜審言登襄陽城一統志襄陽本漢舊縣屬南郡建安中置襄陽郡隋唐皆為襄州治旅客三秋至白怗後漢周陽少孤微嘗修逆旅以供過客而不受報梁元帝纂要秋日三秋王融文四境無虞三秋式稔層城四望開淮南子崑崙山有層城九重王粲賦登茲樓以四望兮聊暇日以消憂楚山横地出一統志襄陽春秋時屬楚韓非子卞和得石於楚山中宋孝武帝詩楚山帶舊苑梁簡文帝詩亘原横地險漢水接天回左傳楚國方城以為城漢水以為池左思蜀都賦流漢湯湯驚浪雷奔望之天回即之雲昏冠蓋非新里襄陽耆舊傳襄陽郡峴山南至宜城百餘里漢宣帝時有卿士刺史二千石數十家冠蓋掩映荆州刺史歎其盛號之曰冠蓋里章華即舊臺左傳楚子成章華之臺願與諸侯落之注臺今在華容城内習池風景異晉書山簡傳簡鎭襄陽諸習氏有佳園池簡每出嬉遊多之池上置酒輒醉名之曰髙陽池又王導傳風景不殊舉目有江山之異歸路滿塵埃陶潛詩行行循歸路史記屈原傳濯淖汙泥之中蟬蜕於濁穢以浮游塵埃之外後漢書光武帝紀旗幟蔽野埃塵連天王維送李判官赴江東聞道皇華使詩皇皇者華王融策秀才文歌皇華而遣使方隨皂蓋臣後漢書輿服志中二千石二千石皆皂蓋朱兩幡封章通左語漢書張安世傳魏相上封事宜宣章盛德以示天下禮記五方之言語不通蜀王本紀是時人民椎髻左語冠冕化文身左傳王使詹桓伯辭于晉曰我有伯父猶衣服之有冠冕乂太伯端委以治周禮仲雍嗣之斷髮文身臝以為飾莊子宋人資章甫而適諸越越人斷髮文身無所用之樹色分揚子江淹詩風光多樹色何遜詩山烟涵樹色江水映霞暉舊唐書地理志淮南道揚子永淳元年析江都縣置潮聲滿富春東方朔七諫聽大壑之波聲左思蜀都賦潮波汨起迴復萬里地理志富春江在富春縣南即浙江之上流謝靈運富春渚詩宵濟漁浦潭旦及富春郭遙知辨璧吏新書梁王召朱公曰梁有疑獄柰何朱公曰臣鄙人也不知審獄然臣家有二白璧其色相如也其徑相如也其澤相如也然其價一者千金一者五百金王曰何也朱公曰側而視之其一者厚倍之是以千金王曰善故獄疑則從去賞疑則從予恩到泣珠人述異記南海中有鮫人水居如魚不廢機織其眼能泣泣則出珠吳都賦淵客慷慨而泣珠孟浩然夏日浮舟過陳大水亭水亭涼氣多劉孝威詩臨池愛水涼拾遺記靈帝遊於西園奏招商之歌以來涼氣阮籍詩開秋兆涼氣蟋蟀鳴牀帷閒櫂晚來過陶潛詩虚舟縱逸櫂劉孝綽詩夫君近燕喜十日逓來過張説詩乘月夜相過澗影見松竹薛道衡詩澗影落長松庾信銘壁繞藤苗窗銜松影江淹詩寧知霜雪後獨見松竹心徐陵書山澤晻靄松竹參差潭香聞芰荷劉緩詩聞香知異春梁簡文帝詩雲斜花影沒日落荷心香楚辭製芰荷以為衣兮又芙蓉始發雜芰荷些漢昭帝歌揮纎手兮折芰荷野童扶醉舞張衡賦齊童唱兮列趙女坐南歌兮起鄭舞鮑照舞鶴賦燕姬色沮巴童心恥詩鼔咽咽醉言舞山鳥助酣歌鹽鐵論曽子倚山而吟山鳥下翔劉勰新論漢順帝聽山鳥之音云勝絲竹之響庾信文故老親賔酣歌相慶宋之問詩野老不知堯舜力酣歌一曲太平人幽賞未云徧謝朓詩江垂得清賞山際果幽尋杜審言詩詔酺歡賞徧烟光奈夕何王勃滕王閣序烟光凝而暮山紫王融詩髙樹升夕烟陳子昂詩月露宵光冷楚詞九歌愁人兮奈何世説桓子野毎聞清歌輒喚奈何韋應物賦得暮雨送李胄楚江微雨裏李白詩天門中㫁楚江開陶潛詩微雨從東來王褒文香隨微雨自灑風塵建業暮鐘時吳志孫權傳十六年徙治秣陵明年城石頭改秣陵為建業左思吳都賦作離宫於建業孫逖詩輦道惟聞建業鐘傳燈錄擾擾囱囱晨雞暮鐘漠漠帆來重張纘秋雨賦油雲興而漠漠陳後主詩霄烟近漠漠李白詩來帆出江中㝠㝠鳥去遲禮記氛霧㝠㝠雷乃發聲江淹騷體林中電兮雨㝠㝠王勃賦葉動猿來花驚鳥去梁簡文帝詩濕鳥羽飛遲海門深不見王昌齡詩殘月生海門玉篇瑤山益峻少海增深庾信詩山川遙不見浦樹逺含滋宋之問詩浦樹浮鬱鬱張説詩浦樹懸秋影梁昭明太子七啓碧樹初蕊緑草含滋相送情無限史記滑稽傳君子相送以言謝惠連詩相送越坰林梁武帝詩連山去無限李白詩引領意無限沾襟比散絲家語反袂拭面涕泣沾襟沈炯賦泣沾襟而雜露張協詩宻雨如散絲皇甫曽送李中丞歸本道上將還專席晉書天文志文昌六星在北斗魁星前天六府也主集計天道一曰上將王維詩終登上將壇禮記三獻之介君專席而酢焉漢官儀御史大夫尚書令司𨽻校尉皆專席號三獨坐雙旌復出秦唐書百官志節度使掌總軍旅辭日賜雙旌雙節行則建節樹六纛顔延年五君詠屢薦不入官一麾乃出守闗河三晉路史記項羽本紀闗中阻山河四塞地肥饒可都以霸孟子晉國天下莫强焉注韓魏趙本晉六卿當此時號三晉庾信崔訦碑威振兩河名凌三晉賔從五原人左傳車馬有所賔從有代左思賦締交翩翩賔從奕奕後漢書郡國志并州五原郡秦置為九原武帝更名長安志長安萬年二縣之外有畢原白鹿原少陵原髙陽原細栁原為五原孤戍雲連海杜甫詩日色隠孤戍李白詩明月出天山蒼茫雲海間張仲素詩交河北望天連海蘇武曽將漢節歸平沙雪度春何遜詩野岸平沙合連山逺霧浮庾信詩平沙臨浦口髙栁對樓前鮑令暉詩經秋復度春酬恩看玉劒舊唐書徐有功傳臣無以上荅至造願以執法酬恩禇亮詩懷德良知久酬恩識命輕説苑襄成君始封之日衣翠衣帶玉劒履縞舄立于遊水之上盧照鄰詩玉劒浮雲騎金鞭明月弓何處有烟塵杜甫詩烟塵犯雪嶺鼓角動江城又烟塵多戰鼔風浪少行舟杜甫重過何氏長安志塔坡在韋曲西何將軍之山林也落日平臺上謝靈運賦望新晴于落日盧照鄰詩落日似懸金漢書梁孝王大治宫室為複道連屬于平臺謝朓詩平臺盛文雅春風啜茗時蕭慤賦二月春風已復流茶經豫章王子尚詣曇濟道人於八公山道人設茶茗子尚味之曰此甘露也石闌斜㸃筆南史江夏王傳鋒年四嵗性方整好學書無紙札乃倚井闌為書畫譜梁廣善畫名載譜錄為時所稱云梁廣丹青㸃筆遲桐葉坐題詩史記晉世家成王與叔虞戲削桐葉為圭以與叔虞曰以此封若范雲詩桐葉何離離太平廣記于祐于御溝中拾一紅葉題詩翡翠鳴衣桁左思賦翡翠列巢以重行説文翡赤羽雀翠青羽雀也古樂府還視桁上無懸衣劉得仁詩藍衫懸竹桁韻㑹桁竹竿也蜻蜓立釣絲廣韻蜻蜓蟪蛄别名詩其釣維何維絲伊緡列子詹何之釣以獨繭為絲自今幽興熟來往亦無期詩自今以始嵗其有梁書王筠傳懽興彌深陶潛詩時復墟曲中披草共來往詩逸豫無期西郊時出碧雞坊漢書郊祀志宣帝即位或言益州有金馬碧雞之神可醮祭而致遣諫議大夫王褒使持節求之注金形似馬碧形似雞益州記成都之坊百有三十第四曰碧雞坊西郊向草堂易宻雲不雨自我西郊駱賔王詩南陸銅渾改西郊玉葉輕北山移文鍾山之英草堂之靈老學菴筆記杜少陵在成都有兩草堂一在萬里橋西一在浣花溪北皆見於詩市橋官栁細後漢書吳漢傳進軍攻廣都燒成都市橋水經注成都有七橋直西門郫江冲里橋西南石牛門曰市橋晉書陶侃傳侃嘗課諸營種栁都䕶夏施盜官栁植之己門侃後見駐車問曰此是武昌西門前栁何因盜來江路野梅香謝朓詩江路西南永歸流東北騖盧照鄰詩序訪戴逵於江路張説詩風吹梅李一園香傍架齊書帙瑯環記張茂先嘗遊於洞宫遇一人共至大石中忽然有門引入一室中陳書滿架華問地名對曰瑯環福地也拾遺記蘇秦張儀剥樹皮編為書帙以陳天下良書看題減藥囊晉書顧愷之傳嘗以一厨畫糊題其前寄桓靈寶桓發厨取畫還之愷之見封題如初但失其畫直云好畫通靈變化而去亦猶人之登仙也列仙傳劉商遊廣陵逢一道士賣藥出小藥囊贈商開嚢視之得九粒藥無人覺來往易閴其無人梁簡文帝詩㑹是無人覺何用早紅糚易往來井井踈懶意何長嵇康書性復疎懶筋駑肉緩北齊書李繪傳膚體疎懶手足遲鈍宋書樂志歡來何晚意何長江淹賦視浮雲而意長水檻遣心説文檻櫳也廣韻檻闌也黄鶴注甫所居草堂有水檻集有詩云茅軒駕巨浪是也去郭軒楹敞史記蘇秦傳使我有洛陽負郭田二頃我豈能佩六國相印乎集異記益州城距郭十五里謝惠連詩落日隠櫩楹升月照簾櫳無村眺望賒廣韻村墅也異苑陸機初入洛次河南之偃師時久隂結問逆旅嫗嫗曰此東數十里無村落禮記仲夏之月可以居髙明可以逺眺望蔡琰詩登髙逺眺望楊炯詩原野烟氛接闗河遊望賒澄江平少岸謝朓詩餘霞散成綺澄江淨如練本草江水多鼉力至猛能攻陷江岸駱賓王詩客似遊江岸人疑上灞陵幽樹晚多花謝靈運詩幽樹雖改觀終始在初生蕭慤詩窗梅落晚花池竹開初筍何遜詩幽蝶弄晚花清池映疎竹細雨魚兒出梁簡文帝詩冷風雜細雨張正見詩細雨濯梅林荀子瓠巴鼓瑟而遊魚出聽陳後主詩絲調聽魚出吹響問蟬聲微風燕子斜吳均詩皎皎日將上獵獵起微風水經注下臨深潭微風鼓浪家語夫子之在此猶燕子巢于幕也魏樂府楊白花歌秋去春還雙燕子願銜楊花入窠裏城中十萬户史記田單列傳田單令城中人食必祭其先祖於庭飛鳥悉翔舞城中下食燕人怪之吳越春秋闔閭春夏治于城中秋冬治于城外魏志文帝紀欲徙十萬户實河南此地兩三家漢書溝洫志河決率常于平原東郡左右其土疏惡聞禹治水時本空此地以為水隈唐太宗詩一朝辭此地四海遂為家宋書律志一郡分為四五一縣割成兩三漢樂府兄弟兩三人中子為侍郎江亭坦腹江亭暖晉書郗鑒求壻於王導使人遍觀諸子弟惟羲之在東牀胆腹食獨若不聞鑒曰此正佳壻也王勃詩江亭明月帶江流長吟野望時楚辭立江介而長吟兮陸機詩長吟泰山側陳琳詩東望看疇野應璩書北有曠野之望水流心不競張華詩俯臨緑水流祖孫登詠水詩請君看皎潔知有淡然心莊子舜之治天下使民心競雲在意俱遲穆天子傳白雲在天岑參詩山髙雲過遲寂寂春將晚何遜詩沙汀暮寂寂禇亮詩莫言春稍晚自有鎮開花宋之問詩芳樹搖春晚欣欣物自私陶潛歸去來辭木欣欣以向榮私晉書潘尼傳自私者不能成其故林歸未得排悶强裁詩謝靈運詩迷鳥懐故林孔紹安詩猶言惜故林鍾嶸詩品使貧賤易安幽居無悶莫尚於詩矣秦州雜詩傳道東柯谷杜詩原注東柯谷在秦州東南五十里有杜甫祠即甫寓居姪佐草堂也趙傁注天水圖經載秦州隴城縣有杜工部故居及其姪佐草堂在東柯谷之南麥積山瑞應寺上深藏數十家楚辭或隠居而深藏司馬遷報任安書深藏巖穴隋書禮儀志百姓則二十五家為一社對門藤蓋瓦説苑行不敏禮不合對門不通矣祖詠詩田家遙對門何遜詩荒藤已上扉資暇錄組藤為蓋古史考夏時昆吾氏作瓦映竹水穿沙謝靈運山居賦岸靡沙而映竹何遜詩映竹見牀空水經注泗水冬春淺澁常排沙通道庾信詩秋水牽沙落瘦地翻宜粟淮南子瘠地之民多有心者勞也周禮草人掌土化之法以物相地宜廣韻粟禾子也陽坡可種瓜杜田注毛文錫茶譜宣州宣城縣有塢如山其東為朝日所燭號曰陽坡史記召平種瓜于長安城東吳志步隲傳隲避難江東以種瓜自給船人近相報史記陳丞相世家平渡河船人見其美丈夫獨行疑其亡將要中當有金玉寶器新序船人固桑進對廣韻報告也但恐失桃花禮記仲春之月桃始華陶潛桃花源記武陵人捕魚為業忽逢桃花林張旭詩桃花盡日隨流水後遊寺憶曽遊處南史宋武帝紀嘗遊竹林寺獨卧講堂前之上有五色龍章魏文帝書每念昔日南皮遊曽不可忘史記孝武帝紀李少君從武安侯飲坐中有年九十餘老人少君乃言與其大父遊射處橋憐再渡時庾信詩河橋爭渡喧江山如有待栁𧦬詩四望江山春王勃文野曠川明風景挾江山之助花栁更無私應璩書吟詠花栁之下隋煬帝詩是月春之季花栁相依依野潤烟光薄宋之問詩野含宿雨潤江淹詩烟光拂夜色梁知微詩孤嶼早烟薄沙暄日色遲説文沙水散石也劉孺詩日照汀沙素何遜詩游揚日色淺詩春日遲遲疏遲遲者日長而暄之意故為舒緩客愁全為減何遜詩客心自有緒對此空復愁劉孺詩若非今宴適詎使客愁輕捨此復何之陶潛歸去來辭胡為遑遑欲何之韓翃送元詵還江東過江秋色在李嶠詩過江千尺浪謝朓詩芸黄共秋色梁元帝詩桂影含秋色詩興與歸心杜甫詩東閣觀梅動詩興又歸心折大刀客路隨楓岸王灣詩客路青山外王維詩郭門隠楓岸賈至詩楓岸紛紛落葉多人家掃橘林王維詩雨中春樹萬人家張九齡詩江南有丹橘經冬猶緑林潮聲當晝起王維詩潮聲滿富春吳都賦潮波汨起迴復萬里唐書封倫傳贊妖禽孽狐當晝則伏山翠近南深蕭子鈞詩山翠餘烟積杜甫詩翠深開斷壁幾日華陽洞南史陶𢎞景傳上表辭禄止于句曲山恒曰此山下是第八洞宫名金陵華陽之天乃中山立館自號華陽陶隠居儲光羲詩華陽洞口片雲飛寒花引獨尋張協詩寒花發黄采杜甫詩源花廢獨尋韓愈木芙蓉本草木芙蓉八九月始開亦名拒霜新開寒露叢劉孝威詩花發自初開李嶠表發秀寒露之辰王融詩細雨亂寒叢唐太宗詩珠穿曉露叢逺比水間紅古詩盈盈一水間王粲詩逍遙波水間𢎞執恭詩凌波獨吐紅隋煬帝詩蓮開水上紅艷色寧相妬曹植七啓艷色過于芙蓉李白詩愛君芙蓉之艷色色可餐兮難再得素書同美相妬萬楚詩紅裙妬殺石榴花嘉名偶自同離騷肇錫余以嘉名潘岳西征賦嘉美名之在茲爾雅疏江東人呼荷華為芙蓉採江官渡晚古詩涉江採芙蓉蘭澤多芳草杜甫詩北轅就涇渭官渡又改轍獨孤及官渡栁歌君不見官渡河兩岸三月楊栁枝李百藥詩寂寞江山晚搴木古祠空楚辭九歌搴芙蓉兮木未盧思道詩古祠臨渭北杜甫詩苔蘚山門古丹青野殿空朱子考異此詩言荷華與木芙蓉生不同處而色皆美名又同故以採江搴木二事相對言其生處而九歌者祭神之辭故曰古祠也願得勤來看杜甫詩一日須來一百回晉江陵曲暫出後園看無令便逐風温子昇詩紅花逐風散丁六娘詩寄語落花風莫吹花落盡同竇韋尋劉尊師不遇本集注愈時任都官貟令外同洛陽令竇牟河南韋執中訪之元和五年也詩以同尋師為韵人各一首秦客何年駐仙源此地深陶潛桃花源記居人自云先世避秦時亂來此絶境不復出焉王維詩春來遍是桃花水不辨仙源何處尋杜甫詩來遊此地不知還還隨躡鳬騎後漢書王喬傳喬為葉令每月朔望詣臺朝帝怪其來數宻令太史伺之有雙鳬從東南飛來舉網張之得雙舄乃所賜尚書官屬履也吳均詩躑躅雙鳬騎來訪馭風襟莊子列子御風而行泠然善也杜甫詩爽合風襟靜院閉青霞入杜甫詩天黒閉春院沈約詩青霞雜桂旗楊炯文青霞起而照天松髙老鶴尋隋書史祥傳松柏之髙蔦蘿斯託沈約松賦鬱彼髙松栖根得地杜甫詩老鶴萬里心猶疑隠形坐神仙傳李仲甫者少學道於王君能步訣隠形年百餘嵗轉少初隠百日後遂長隠曹植贊嗟爾四皓避秦隠形敢起竊桃心漢武帝内傳帝好長生七夕西王母降其宫有頃索桃七枚以四放與帝自食三枚曰此桃三千年一實時東方朔從殿東廂牖中窺母母謂帝曰此窺牖兒嘗三來偷吾此桃張籍送越客見説孤帆去梁簡文帝與劉孝綽書夕鳥歸林懸孤帆而未息陳子昂詩孤帆出霧中髙適詩雲開汶水孤帆逺東南到㑹稽周禮夏官職方氏東南曰揚州其鎭曰㑹稽史記夏本紀禹㑹諸侯江南計功命曰㑹稽㑹稽者㑹計也注禹到大越上苗山大㑹計爵有徳封有功因名苗山曰㑹稽春雲剡溪口易通卦騐立春青陽雲出房如積氷春分正陽雲出張如白鵠張正見詩西北春雲起一統志剡溪在紹興府嵊縣治南一名戴溪即晉王徽之雪夜訪戴處殘月鏡湖西李嶠詩暗花臨户發殘月下簾欹㑹稽記漢順帝永和五年㑹稽太守馬臻創立鏡湖在㑹稽山隂兩縣界輿地志山隂南湖即鏡湖也水鶴沙邊立杜甫詩古廟山松巢水鶴朱慶餘郡齋雙鶴詩立近清池意自髙山鼯竹裏啼爾雅鼯鼠夷注似蝙蝠肉翅飛且乳亦名飛生立如人食火烟謝朓敬亭山詩飢鼯此夜啼劉孝光詩湍鳴竹裏泉謝家曽住處南史謝靈運移籍㑹稽脩管舊業傍山帶江盡幽居之美烟洞入應迷王勃九成宫頌丹溪碧洞吐納虹霓盧照鄰詩尋洞不知名陶潛桃花源記竟迷不得路張説詩尋玩往還迷白居易太湖石舊唐書白居易傳杭州得天竺石一華亭鶴二蘇州得太湖石五俱置于里第池上居易本集詩一雙華亭鶴數片太湖石烟翠三秋色岑參詩峩嵋烟翠新梁元帝纂要秋曰三秋謝朓詩芸黄共秋色波濤萬古痕虞茂詩長瀾疑浴日連島類奔濤杜甫石笋行古來相傳是海眼苔蘚蝕盡波濤痕削成青玉片西岳記太湖之山削成而四方張衡賦何以報之青玉案沈佺期詩四蹄碧玉片截斷碧雲根江淹詩日暮碧雲合北史裴衍傳棲素雲根餌芝清壑劉孝孫詩髙嶂接雲根風氣通岩穴風賦枳句來巢空谷來風其所託者然則風氣殊焉謝朓詩夕霽風氣涼左思詩岩穴無結搆苔文䕶洞門常建詩藥院滋苔紋吳都賦髙闈有閌洞門方軌杜甫詩洞門對靄常隂隂三峰具體小述征記華山有三峰直上數千仞崔顥詩天外三峰削不成孟子冉牛閔子顔淵則具體而微應是華山孫書歸馬於華山之陽周禮夏官職方氏河南曰豫州其山鎮曰華山杜甫詩諸峰羅立似兒孫宴散小宴追涼散庾肩吾詩向夕紛喧屏追涼飛觀中李德林詩夏景多煩蒸山水暫追涼平橋步月迴杜甫詩野橋分子細沙岸繞微茫南史王藻傳夜步月而弄琴晝拱袂而披巻薛道衡詩空庭聊步月閒坐獨臨風笙歌歸院落孔稚圭禇先生碑子晉笙歌馭鳳于天海江淹麗色賦笙歌畹右琴舞池東杜甫詩退朝花底散歸院栁邊迷廣韻院垣院落聚落也燈火下樓臺漢書王莽傳政令煩多前後相承常御燈火至明猶不能勝沈佺期詩燈火灼爍九微映香氣氛氳百和然蕭慤詩春庭聊縱望樓臺自相隠隂鏗詩新宫實壯哉雲裏望樓臺殘暑蟬催盡沈佺期詩小池殘暑退髙樹早涼歸古詩秋蟬鳴樹間江總詩山階步皎月澗户聽涼蟬新秋雁帶來張正見詩髙軒揚麗藻自是賦新秋張九齡詩林鳥飛舊里園果讓新秋江淹别賦值秋雁兮飛日當白鷺兮下時庾信詩寄信秦樓下因書秋雁歸禮記仲秋之月鴻雁來又季秋之月鴻雁來賔將何迎睡興南方草木狀綽菜食之令人思睡呼為暝菜徐陵荅梁長孺書多慚于協律致睡于文侯臨卧舉殘杯唐書王勃傳屬文初不精思先磨墨數升則酣飲引被覆面卧及寤援筆成篇李白詩舉杯邀明月對影成三人顔氏家訓殘杯冷炙之辱戴安道猶遭之況爾曹乎馬戴宿翠微寺談苑驪山絶頂有翠微寺處處松隂滿蕭子顯詩處處動春心杜甫詩杖藜長松隂樵開一徑通南史孫陽傳幾人樵徑何處山阿白帖後漢張仲蔚蓬蒿滿室惟開一行徑杜甫詩金盤小徑通鳥歸雲壑靜謝靈運詩鳥歸息舟楫杜甫詩林暮鳥知歸北山移文誘我松桂欺我雲壑江淹頌烟岫相珍雲壑共寶僧語石樓空杜牧詩僧語淡如雲袁彦伯文仰望石樓眇然若在雲中韋應物至西峰蘭若詩聊登石樓憩積翠含微月顔延之詩積翠亦蔥芊唐太宗賦其地則有積翠凝碧傅休奕詩清風何飄搖微月出西方常建詩松際露微月遙泉韻細風王維詩清夜聞遙泉庾信銘松桂危懸風泉虚韻梁元帝詩風細雨聲遲杜甫詩春臺引細風經行心不厭李鏡逺詩經行林樹下魏武帝樂府山不厭髙水不厭深魏文帝典論自叙日多體健心毎不獻憶在故山中謝靈運詩故山日已逺御選唐詩巻十六補編
