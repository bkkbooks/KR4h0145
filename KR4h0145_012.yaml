人情禮記勇敢强有力者天下無事則用之於禮義天下有事則用之於戰勝謝靈運詩戰勝臞者肥匹馬歸山東南史吾侯景傳匹馬孤行自執羈紲庾肩詩眷然從此去車西馬復東問君今年三十幾陶潛詩問君何能爾能使香名滿人耳李白文僕以弱植早飲香名漢書郊祀志聽其言洋洋滿耳君不見三峯直上五千仭一統志嵩山在登封縣北一十里五嶽之中嶽也其山三尖峯東曰太室西曰少室嵩其總名北山移文干青雲而直上司馬彪詩上凌青雲霓下臨千仞谷見君文章亦如此史記儒林傳文章爾雅訓辭深厚漢書公孫𢎞傳贊劉向王褒以文章顯如君兄弟天下稀蜀志馬良傳馬良兄弟五人並有才名古樂府為君艷歌世所稀雄詞健筆皆若飛孔融薦檷衡表飛辨騁辭徐陵讓表陳琳健筆未盡愚懷潘嶽揚荆州誄翰動若飛紙落如雲將軍金印嚲紫綬漢書蕭何傳何進韓信漢王以為大將軍史記蔡澤傳懷黃金之印結紫綬於腰漢書百官公卿表相國丞相皆秦時官金印紫綬御史鐵冠重繡衣漢書百官公卿表侍御史有繡衣直指出討奸猾治大獄注衣以繡者尊寵之也庾信文既乘驄馬仍被繡衣六典御史大事則鐵冠朱衣以彈之喬生作尉别來久唐書百官志京縣令一人上主簿二人下尉六人世說曹公召司馬建公語之曰孤今日可復作尉否建公曰昔舉大王時適可作尉耳謝靈運詩戚戚新别心悽悽久念攢因君為問平安不禮記今日安不何如魏侯校理復何如漢書劉歆傳陳發祕藏校理舊文陶潛詩校書亦已勤前日人來不得書古詩客從逺方來遺我一書札晉書劉𢎞傳得劉公一紙書賢於十部從事陸渾山水佳可賞沈約詩山中咸可悅賞逐四時移左思詩非必絲與竹山水有清音謝朓詩聊恣山泉賞蓬閣閒時日應往魏徵詩沈沈蓬萊閣日夕鄉思多自料青雲未有期史記伯夷傳砥行立名者非附青雲之士安能施於後世哉謝靈運詩托身青雲上曹植賦蹶青雲而奮羽蘇武别李陵詩相見未有期誰知白髮偏能長南史范縝傳縝年二十九髮白皓然乃作白髮咏論衡白髮復黑齒落更生壚頭青絲白玉瓶梁簡文帝當壚曲當爐設夜酒劉琨詩含笑酒壚前樂府陌上桑青絲為籠係支遁四月八日讃甘露凝玉瓶别時相顧酒如傾沈約詩征鳥時相顧陶潛詩一觴雖獨進杯盡壺自傾搖鞭舉袂忽不見戰國策舉袂成幕阮籍詩登髙眺所思舉袂當朝陽千樹萬樹空蟬鳴曹植詩寒蟬鳴我側潘嶽詩鳴蟬屬寒音梁元帝詩樹密隱鳴蟬古詩秋蟬鳴樹間李頎東川人家於潁陽擢進士第官新鄉尉送從弟遊江淮兼謁鄱陽劉太守史記十二諸侯表楚介江淮一統志饒州春秋時為楚地秦置鄱陽縣屬九江郡隋廢鄱陽改饒州隋大業初復為鄱陽唐初為饒州天寶初改為鄱陽郡本朝初改鄱陽府後改饒州都門柳色朝朝新張載詩藹藹東都門羣公祖二疏江淹詩太平多歡娛飛蓋東都門何遜詩輕烟滲柳色薛道衡詩朝朝散霞彩暮暮澄秋色唐太宗詩未佩蘭猶小無絲柳尚新念爾今為江上人謝朓詩心事俱已矣江上徒離憂吳均詩露下寒葭中風起秋江上穆陵關帶清風逺左傳南至於穆陵史記齊世家注今淮南有故穆陵關是楚之境唐書地理志沂州沂水縣北有穆陵關詩吉甫作誦穆如清風顔延之詩兩闈阻通軌對禁限清風彭蠡湖邊芳草春書東滙澤為彭蠡荆州記宫亭湖即彭蠡澤亦謂之彭蠡湖楚辭王孫遊兮不歸芳草兮萋萋班固西都賦竹林果園芳草甘木泊舟借問西林寺孟浩然詩泊舟潯陽郭始見香爐峯曹植白馬篇借問誰家子幽并遊俠兒崔皓長千行停船暫借問或恐是同鄉法苑珠林釋慧逺上廬嶽造西林寺重閣七間欒櫨重叠光耀鮮華一統志西林寺在九江府廬山與東林寺相對曉聽猿聲在山翠梁元帝詩寒夜猿聲徹遊子淚沾裳徐嶷詩白雲連鳥道青壁遞猿聲庾肩吾詩水光懸蕩壁山翠下添流蕭子鈞詩山翠餘烟積川平晚照收潯陽北望鴻鴈回漢書地理志廬江郡縣潯陽郭璞江賦源二分於崌崍流九派乎潯陽元和郡縣志潯陽本漢舊縣居潯水之陽故曰潯陽一統志九江府春秋為吳楚地晉為武昌鄱陽豫章三郡地梁移江州治湓城即今府治唐天寶初改潯陽本朝為九江府古詩攝衣起前庭仰觀鴻鴈翔陳後主詩况聽南歸鴈切思胡笳音湓水東流客心醉何遜詩湓水縈如帶一統志湓浦在九江府西源出瑞昌縣青湓山一名湓水莊子海不辭東流大之至也吕氏春秋水泉東流日夜不休劉楨詩泛泛東流水詩行邁靡靡中心如醉晉書阮咸傳太原郭奕髙爽有識量少所推先見咸心醉不覺嘆焉須知聖代舉賢良陸雲詩熙光聖代邁勳九區禮記命太尉贊傑俊遂賢良舉長大棗據詩開國建元士玉帛聘賢良不使遺才滯一方曹植七啓舉不遺才進各異方詩所謂伊人在水一方庾肩吾詩佳人逺千里乃在天一方應見鄱陽虎符守史記文帝紀二年九月初與郡守為銅虎符應劭注銅虎符第一至第五國家當發兵遣使至合符符合乃聽受之思歸共指白雲鄉陸雲嵗暮賦哀年嵗之攸往兮伊行人之思歸劉孝威思歸引乘鄣無期限思歸安可論莊子乘彼白雲歸於帝鄉夏宴張兵曹東堂後漢書百官志兵曹主兵事唐書百官志兵曹司兵參軍事掌武官選兵甲器仗門禁管鑰軍防風候傳驛畋獵儀禮大射小射正授弓拂弓皆以俟於東堂重林華屋堪避暑鮑照凌烟樓序重林窮天通原盡日張正見詩復澗藏髙節重林隱徑枝戰國策蘇秦見趙王於華屋之下世說坐則華屋行則肥馬班固扇詩來風堪避暑靜夜致清凉典略劉松與袁紹子弟常於三伏之際晝夜飲酒云避一時之暑故河朔有避暑飲梁簡文帝納凉詩避暑髙梧側輕風時入襟况乃烹鮮㑹嘉客老子治大國若烹小鮮注烹小鮮者攪之則碎傅毅七激酌㫖酒割芳鮮王粲詩髙㑹君子堂詩所謂伊人于焉嘉客又我有嘉客亦不夷懌劉楨詩采之荐宗廟可以羞嘉客何遜詩日暮留嘉客相看愛此時主人三十朝大夫禮記主人者接人以仁以德厚者也長楊賦藉翰林以為主人子墨為客卿西都賦有西都賔問於東都主人世說摯瞻出作內史年二十九王敦曰卿年未三十已為萬石亦太蚤瞻曰比之甘羅已為太老周禮秋官朝大夫掌都家之國治古樂府陌上桑十五府小史十六朝大夫滿座森然見矛㦸後漢書孔融傳融雖家居而賔客日滿其門嘗嘆曰坐上客常滿尊中酒不空吾無憂矣鮑照詩絲竹徒滿座舊唐書禮儀志武德之初碩學通儒森然在列詩王于興師修我矛㦸管子葛天廬之山發而出金蚩尤受而制之以為劒鎧矛㦸漢書吾丘夀王傳注五兵矛㦸弓劒戈晉書裴楷傳楷有知人之鑒嘗目鍾㑹如觀武庫森森但見矛㦸在前漢書輿服志公以下至二千石騎吏四人皆帶劒持棨㦸北窗卧簟蓮心花世說仁祖企腳北窗下彈琵琶故自有天際真人想南史陶潛傳嘗言五六月北窗下卧遇凉風暫至自謂是羲皇上人梁簡文帝答餉卧簟書便可旅食南館髙卧北窗何遜詩北窗倒長簟庾信賦玉花簟上金蓮帳裏爾雅荷芙蕖也其花菡萏其實蓮其心菂菂中薏竹裏鳴蟬西日斜何遜詩竹裏見螢飛庾信詩竹動蟬爭散禮記仲夏之月蟬始鳴梁元帝詩花餘拂戲鳥樹密隱鳴蟬沈君攸詩日暮野風生林蟬候節鳴顔延之曲水詩序情盤景遽歡洽日斜梁元帝詩西山晚日斜羽扇搖風却珠汗陸機羽扇賦昔楚襄王㑹於章臺之上大夫宋玉唐勒侍皆操白鶴之羽以為扇嵇含羽扇賦吳楚之士多執鶴翼以為扇班婕妤詩出入君懷袖動搖微風發傅咸羽扇賦序吳人截鳥翼而搖風勝於方圓二扇何遜扇詩搖風入素手招曲掩丹唇潘嶽賦珠汗揮其如雨傳咸扇賦汗珠隕以外流氣鬱結而內沈傅休奕苦熱詩珠汗洽玉體梁簡文帝初秋詩羽翣晨猶動珠汗晝恆揮玉盆貯水割甘瓜爾雅盎謂之缶疏可以盛水即今之盆也北史齊後主紀胡皇后夢於海上坐玉盆本草甜爪一名甘瓜後漢書郡國志甘州生美瓜張纘瓜賦昔東陵之甘瓜美顯名於中古嵇含瓜賦乃剖甘瓜既淳且馨庾信詩美酒含蘭氣甘瓜開蜜筒魏文帝書浮甘瓜於清泉沈朱李於寒水傅休奕瓜賦披以吳刀承以朱盤中割而破雖分若完北史周趙王招傳招要隋文帝至第以佩刀割爪啖文帝雲峯峩峩白氷雪顧愷之詩夏雲多竒峯江淹賦炎雲峯起芳樹未移庾信詩雲晴即作峯列子伯牙鼓琴志在髙山鍾子期曰善哉峩峩若泰山楚辭斫冰兮積雪注斫斫冰凍紛然如雪也坐對芳尊不知熱晉書阮籍等傳論嵇康竹林之㑹劉畢芳尊之友上官儀詩燕姝對明月荆艷促芳尊駱賔王詩芳尊徒自滿别恨轉難勝徐摛詩此時避炎熱清尊獨未空醉來但挂葛巾眠南史陶潛傳貴賤造之者有酒輒設潛若先醉便語客我醉欲眠卿可去又郡將候潛逢其酒熟取頭上葛巾漉酒畢還復著之北齊書祖鴻勳傳把臂入林挂巾垂枝攜酒登巘舒席平山語林諸葛武侯與宣王在渭濵將戰宣王戎服蒞事使人觀武侯葛巾毛扇指揮三軍宣王聞而嘆曰可謂名士矣莫道明朝有離别吳均詩今夜杯酒别明朝江水邊庾信詩明朝雲水散何處更相尋古詩以膠投漆中誰能别離此李陵詩良時不再至離别在須臾愛敬寺古藤歌梁書武帝紀髙祖生知淳孝及居帝位即於鍾山造大愛敬寺古藤池水盤樹根梁昭明太子遊愛敬寺詩丹藤繞垂幹緑竹映清池何遜詩瀲灔故池水蒼茫落日暉庾信詩定知歡未足橫琴坐樹根左攫右拿龍虎蹲揚雄羽獵賦熊羆之拿攫虎豹之凌遽張衡西京賦熊虎升而拿攫援狖超而髙援王勃夫子廟碑珠衡玉斗徵象緯於天經贙據龍蹲集風雲於地紀橫空直上相凌突虞世南詩橫空一鳥渡孔稚圭北山移文干青雲而直上後漢書段穎傳贊紛紜騰突谷靜山空吳志諸葛恪傳丹陽地勢險阻俗好武習戰其升山赴險抵突叢棘若魚之走淵猿狖之騰木也傅毅舞賦良駿逸足蹌捍凌越注言馬駿逸奔突而走相陵越也丰茸離纚若無骨司馬相如賦羅丰茸之遊樹兮注丰茸衆飾貌嵇康琴賦紛文斐尾慊縿離纚注羽毛貌木華海賦鳬雛離褷鶴子淋澡衛夫人筆陳圖昔秦丞相見周穆王書七日興嘆患其無骨風雷霹靂連黑枝史記天官書天雷電霹厯夜明者陽氣之動也按歷同靂金陵梵剎志霹靂溝在鍾山南麓梁簡文帝詩江南豆蔻生連枝庾信詩細果上連枝人言其下藏妖魑左傳流四凶族投之四裔以禦魑魅拾遺記方丈山池泥百煉成金鏡色青可照魑魅空庭葉落乍開合鮑照詩空庭聚山雀何遜詩空庭秋月華王勃詩小徑偏宜草空庭不厭花詩蘀兮蘀兮疏蘀落也落葉謂之蘀陶潛詩空庭多落葉慨然知已秋庾信小園賦落葉半床狂花滿屋木華海賦開合解圍瀼瀼濕濕十月苦寒常倒垂魏武帝苦寒行北上太行山艱哉何巍巍陸機苦寒行劇哉行役人慊慊恆苦寒庾信詩月懸惟返照落葉常倒垂憶昨花飛滿空殿張正見詩帆上錦花飛張協七命浮蟻星拂飛花萍接梁簡文帝箏賦玩飛花之度窗看春風之入栁蕭子良文金簡盈於寶殿玉軸煥於神宫江總幡贊光分紺殿采有香城密葉吹香飯僧遍陸機詩密葉承翠幄李嶠燭詩浮炷依羅幌吹香匝綺茵陳與義水仙花詩吹香洞庭暖弄影清晝遲維摩經遣化菩薩往衆香國禮彼佛足言願得世尊所食之餘欲於娑婆世界作佛事於是香積如來以衆香鉢盛滿香飯與化菩薩悉飽衆㑹謝靈運集有過瞿溪石室飯僧詩南階雙桐一百尺謝惠連詩簪玉出北房鳴金步南階魏明帝詩雙桐生枯井枝葉自相加枚乘七發龍門之桐髙百尺而無枝相與年年老霜霰劉緩樂府江南少許地年年情不窮淮南子北方之極有凍寒積氷雪雹霜霰陶潛詩常恐霜霰至宋之問經梧州詩南國無霜霰連年見物華王維桃源行陶潛桃花源記晉太元中武陵人捕魚為業緣溪行忘路之逺近忽逢桃花林夾岸數百步中無雜樹芳草鮮美落英繽紛漁人甚異之復前行欲窮其林林盡水源便得一山山有小口髣佛若有光便捨船從口入初極狹才通人復行數十步豁然開朗土地平曠屋宇儼然有良田美地桑竹之屬阡陌交通雞犬相聞其間往來種作男女衣著悉如外人黃髮垂髫並怡然自樂見漁人乃大驚問所從來具答之便要還家設酒殺雞作食村中聞有此人咸來問訊自云先世避秦時亂率妻子邑人來此絶境不復出焉遂與外人間隔問今是何世乃不知有漢無論魏晉此人一一為具言所聞皆歎惋餘人各復延至其家皆出酒食停數日辭去此中人語云不足為外人道也既出得其船便扶向路處處志之及郡下詣太守說如此太守即遣人隨其往尋向所志遂迷不復得路漁舟逐水愛山春顔氏家訓伍員之託漁舟王勃滕王閣序漁舟唱晚響窮彭蠡之濵左思吳都賦結輕舟而競逐迎潮水而振緡前溪歌花落逐水去劉孝綽詩别待春山上相看採蘼蕪兩岸桃花夾去津荆州記兩岸連山略無絶處庾信詩寒沙兩岸白獵火一山紅詩桃之夭夭灼灼其華禮月令仲春之月桃始華沈約詩分手桃林岸魏志公孫淵傳注浮舟百艘沈滯津岸水經注孟門即龍門上口也夾岸崇深傾崖返棹張正見詩栁影緣溝合槐花夾岸飛坐看紅樹不知逺謝朓詩紅樹巖舒青莎水被後漢書蔡雍傳潛舟江壑不知其逺行盡青溪不見人郭璞詩青溪數千仞中有一道士易行其庭不見其人山口潛行始隈隩戰國策張孟談潛行而出說文隩水隈崖也謝靈運詩逶迤傍隈隩迢遞陟徑峴山開曠望旋平陸江總詩橋平疑水落石迥見山開何遜七召延袤水陸曠望東西謝朓詩結構何迢遞曠望極髙深揚雄幽州牧針伊昔唐虞實為平陸盧諶詩平陸引長流岡巒挺茂樹謝朓詩蒼翠望寒山崢嶸瞰平陸遙看一處攢雲樹徐陵太極殿銘函谷遙看美皇居之壯麗謝靈運詩雲中辨江樹劉孝威詩雲樹交為密雨日共成虹近入千家散花竹說苑景公令吏致千家之縣於晏子庾信銘置劒千家梁簡文帝詩花留蛺蝶粉竹翳蜻蜓珠梁元帝詩竹密無分影花疏有異香樵客初傳漢姓名王僧孺書或蹲林卧石藉卉班荆不過田畯野老漁父樵客庾信詩樵客值圍棋李嶠詩荒阡下樵客野猿驚山鳥孟子諱名不諱姓姓所同也名所獨也顔氏家訓童孺皆知姓名南史梁元帝紀元帝著古今同姓名録一卷居人未改秦衣服詩巷無居人又西人之子粲粲衣服禮記衣服有量必循其故宋玉神女賦整衣服斂容顔居人共住武陵源宋史地理志常德府桃源縣乾德中析武陵縣地置宗凛詩所言春不至未有桃花源庾信詩由來千種意併是桃花源張說詩桃花春徑滿誤識武陵源還從物外起田園齊竟陵王子良詩託性本魚鳥棲情閒物外梁元帝答廣信侯書縱賞山中遊心物外漢書汲黯傳黯隱於田園者數年陶潛歸去來辭歸去來兮田園將蕪胡不歸月明松下房櫳靜古子夜歌秋夜凉風起天髙星月明陶潛詩班荆坐松下張說詩雲對石上塔風吹松下路班婕妤賦房櫳虛兮風泠泠傅亮感物賦鑒朗月於房櫳張華詩房櫳自來風日出雲中雞犬喧詩羔裘如膏日出有曜擊壤歌日出而作日入而息莊子日出於東方入於西極楚辭焱逺舉兮雲中王融樂府響梵髙雲中何遜詩去帆若不見試望白雲中神仙傳雞鳴天上犬吠雲中驚聞俗客爭來集庾信謝啓平陵月夜驚聞搗衣孔稚圭北山移文靖回俗士駕為君謝逋客禮記四方來集逺鄉皆至競引還家問都邑庾信春賦百丈山頭日欲斜三晡未醉莫還家禮記仲秋之月可以築城郭建都邑張衡歸田賦遊都邑以永久嵇喜詩都邑可優游何必棲山林平明閭巷掃花開漢書叔孫通傳漢七年長樂宫成諸侯羣臣朝十月儀先平明謁者治禮引以次入殿門謝靈運詩平明登雲峯杳與廬霍絶史記伯夷傳閭巷之人欲砥行立名者非附青雲之士惡能施於後世哉劉希夷詩楊葉未能攀梅花待君掃薄暮漁樵乘水入廣雅日將入曰薄暮范雲詩田家采樵去薄暮方來歸何遜詩爾情深鞏洛豫念返漁樵劉孝威詩神心重丘壑散步懷漁樵管子蛟龍乘水則神立初因避地去人間論語其次辟地後漢書承宫傳承宫經典既明乃歸家教授將諸生避地漢中中說自秦伯虞仲已來天下鮮避地者也史記留侯世家願棄人間事從赤松子遊耳髙士傳宗測少靜退不樂人間遂往廬山止祖舊宅嵇康絶交書寧可久處人間耶更聞成仙遂不還伏知道為衡山王與婦書人慚蕭史相偶成仙樂府水仙操翳洞渭兮流澌濩舟楫逝兮仙不還峽裏誰知有人事荆州記宜都西南峽中有黃牛山江湍紆回途經信宿猶望見之國語人事不起勿為之始晉書王長文傳閉門自守不交人事陶潛詩野外罕人事窮巷寡輪鞅世中遙望空雲山庾信詠舞詩已曽天上學詎是世中生周禮春官男巫掌望祀疏望祀者遙望而祀之諸葛亮梁父吟步出城東門遙望蕩隂里陸機豫章行沈舟清川渚遙望髙山隂嵇康遊山詩遙望山上松隆谷鬱青蔥漢書五行志雲起於山而彌於天蔡琰胡笳十八拍雲山萬重兮歸路遐梁元帝詩雲歸山望濃不疑靈境難聞見梁簡文帝神山寺碑獨有鷲嶽靈境淨土不燒論衡禹王治水益記異物以所聞見作山海經顔延之詩劉伶善閉關懷情滅聞見塵心未盡思鄉縣毗尼藏經色聲香味觸法怨忿汚人之淨心故云六塵謝靈運撰征賦忘陳錦而莫照思反鄉而有歎王僧孺詩我有一心人同鄉不異縣孫萬夀詩數載辭鄉縣宋之問詩萬里還鄉縣又豈意南中岐路多千山萬水分鄉縣出洞無論隔山水南史王𢎞之傳始寧沃州有佳山水𢎞之依巖築室又謝靈運傳出為永嘉太守郡有名山水靈運素所愛好肆意遨遊左思詩非必絲與竹山水有清音辭家終擬長游衍後漢書上成公傳成公宓縣人其初行久而不還後歸語其家云我已得仙因辭家而去鮑照詩我初辭家從軍僑榮志溢氣干雲霄詩昊天曰旦及爾游衍自謂經過舊不迷爾雅郵過也注道路之所經過南史陶潛傳顔延之在潯陽與潛情款後為始安郡經過潛必酣飲致醉謝混詩逍遙閲林肆願言屢經過詩天子是毗俾民不迷魏略劉雄鳴每出行霧中識道不迷班固通幽賦乘髙而遌神兮道遐邇而不迷安知峯壑今來變張華詩安知慕儔侣鮑照詩安知曠士懷張說詩雲峯曉靈變風木夜虛吟曹植詩始出嚴霜結今來白露晞當時只記入山深嵇康絶交書故有處朝廷而不出入山林而不返之論史記貨殖傳山深而獸往之青溪幾曲到雲林梁簡文帝詩幾曲文魚聚林暝鴉鳥飛沈約白雲詩將過丹丘野時至碧林垂吳均詠雲詩飄飄上碧虛藹藹隱青林宋之問詩雲林浩虧蔽春來遍是桃花水武平一詩東郊上苑望春來漢書溝洫志來春桃花水盛必羡溢韓詩章句三月桃花水下時鄭國之俗上已袚除不祥張正見詩櫂析桃花水帆橫竹箭流不辨仙源何處尋雲笈七籖福地第四曰東仙源第五曰西仙源在台州庾信詩更尋終不見無異桃花源寒食城東即事風俗通冬至後百四日五日六日有疾風暴雨為寒食徐陵報尹義尚書鳴蜩抱樹亟見藏冰歸鴈銜蘆多經寒食劉庭芝詩洛陽城東桃李花飛來飛去落誰家張九齡詩即事聊獨歡素懷豈兼適清溪一道穿桃李水經注查浦東行二百餘里甚有良田清溪王褒詩鳥道無蹊徑清溪有波瀾詩何彼穠矣華如桃李史記李廣傳桃李不言下自成蹊曹植詩南國有佳人容華若桃李演漾緑蒲含白芷說文演長流也蕩漾浮游貌廣韻蒲似藺可以為席古詩青蒲緑蒂生我池中名醫别録白芷生河東川谷下澤二月八月采根暴乾楚辭緑蘋齊葉兮白芷生溪上人家凡幾家史記六國表詩書所以復見者多藏人家落花半落東流水鍾嶸詩品丘遲㸃綴映媚如落花依草梁元帝詩石闕題書字金燈飄落花庾信馬射賦落花與芝蓋同飛楊栁共春旗一色孟子决諸東方則東流詩沔彼流水朝宗于海北史蕭大圜傳面修原而帶流水倚郊甸而枕平臯蹴踘屢過飛鳥上漢書枚臯傳臨山澤弋獵射御狗馬蹴鞠刻鏤上有所感輒使賦之傅休奕彈棋賦序漢武好蹴鞠劉向以為勞人體竭人力乃因其體而作彈棋以解之今觀其道蹴鞠道也按踘古作鞠詩有鳥髙飛亦傅于天漢書朝錯傳德上及飛鳥下至水蟲草木諸産皆被其澤鞦韆競出垂楊裏古今藝術圖北方山戎寒食日用鞦韆為戲以習輕趫三輔黃圖長楊宫中有垂楊數畝因為宫名庾信詩落花灑行路垂楊拂砌塵少年分日作遨遊北史裴果傳果從軍征討常乘黃驄馬衣青袍先登陷陳時人號為黃驄少年庾信詩家住金陵縣前嫁得長安少年南史梁武帝紀始安王遙光尚書令徐孝嗣右僕射江祏右將軍蕭坦之侍中江祀衛尉劉暄更直內省分日帖敕詩微我無酒以敖以遊按遨古作敖莊子巧者勞而智者憂無能者無所求飽食而遨遊南史何㸃傳㸃好狎人物遨遊人間不用清明兼上已漢書律厯志大梁初胃七度穀雨今日清明中昴八度清明今曰穀雨於夏為三月商為四月周為五月淮南子距日冬至四十五日條風至條風至四十五日明庶風至明庶風至四十五日清明風至後漢書禮儀志上已官民皆潔於東流水洗濯祓除韓詩章句三月桃花水之時鄭國之俗三月上已之溱洧兩水之上秉蘭草袚除不祥顔延之曲水詩序獻洛陽之禮具上已之儀崔皓七夕詞風俗記織女七夕當渡河使鵲為橋續齊諧記桂陽城武丁有仙道謂其弟曰七月七日織女當渡河諸仙悉還宫弟問曰織女何事渡河曰織女暫詣牽牛世人至今云織女嫁牽牛也玉燭寶典洛陽人家七夕乞巧使蜘蛛結萬字嵗時紀異七夕俗以蠟作嬰兒形浮水中以為戲為婦人宜子之祥庾肩吾詩九江逢七夕初弦值早秋長安城中月如練漢書髙帝紀張良勸上西都長安班固西都賦漢之西都實在雍州名曰長安三輔黃圖長安故城漢之舊都髙帝七年方修長安宫城自櫟陽徙居此城本秦離宫也初置長安城本狹小至惠帝更築之梁元帝詩昆明夜月光如練沈約詩望秋月秋月光如練家家此夜持針線曹植與楊德祖書人人自謂握靈蛇之珠家家自謂抱荆山之玉荆楚嵗時記七月七日人家婦女結綵樓穿七孔針或以金銀鍮石為針陳瓜果於庭中以乞巧劉孝威七夕穿針詩故穿雙眼針持縫合歡扇西京雜記漢彩女嘗以七月七日穿針於開襟樓六帖七夕宫人以九孔針穿五色線仙裙玉佩空自知飛燕外傳成帝於太液池起瀛洲榭飛燕衣雲英紫裙歌舞歸風送逺之曲歌酣風大起揚袖曰仙乎仙乎去故而就新寧忘懷乎他日宫姝或擘裙為䋫號曰留仙裙詩瓊瑰玉佩曹植洛神賦願誠素之先達兮解玉珮以要之天上人間不相見髙昂詩天上人間無可比墨莊冗録郭翰乘月卧庭中有人冉冉而下乃一少女曰吾天之織女也後夕復來翰戲曰牛郎何在那敢獨行曰隂陽變化關渠何事將至七夕遂不復來數夜方至翰問曰相見樂乎笑曰天上那比人間正以感遇當爾非有他故梁元帝詩花朝月夜動春心誰忍相思不相見長信深隂夜轉幽漢書外戚傳班倢妤求共養太后長信宫上許焉班婕妤賦託長信之末流應璩詩室廣致凝隂臺髙來積陽王融詩烟灌共深隂風篁兩蕭瑟世說張威伯嵗寒之茂松幽夜之未光王融詩幽夜有四知玉階金閣數螢流漢書外戚傳切皆銅沓冒黃金塗白玉階班固西都賦玉階彤庭江淹詩竊愁凉風至吹我玉階樹鮑照舞鶴賦唳清響於丹墀舞飛容於金閣禮記季夏之月腐草為螢沈約賦流螢暗明燭謝朓玉階怨夕殿下珠簾流螢飛復息劉孝威詩數螢流暗草庾信詩露滴連珠下螢飄碎火流班姬此夕愁無限漢書外戚傳太后曰古有樊姬今有班倢妤周𢎞正詩將申湘女悲宜並班姬怨徐悱妻劉氏班姬怨日落應門閉愁思百端生費昶長門怨向夕千愁起河漢三更看斗牛博物志舊說天河與海通近世有居海渚者年年八月有浮槎去來乃乘槎至一處有城郭狀遙望宫中有織婦見一丈夫牽牛渚次飲之牽牛人驚問曰何由至此此人為說來意問此是何處答曰君訪嚴君平則知之因還問君平曰某年某月有客星犯牽牛宿計其年月正是此人到天河時也詩維天有漢監亦有光古詩迢迢牽牛星皎皎河漢女班固西都賦左牽牛而右織女似雲漢之無涯晉子夜變歌三更出門去始知子夜變古詩南箕北有斗牽牛不負軛庾信賦路已分於湘漢星猶看乎牛斗荆楚嵗時記天河之東有織女天帝之子也年年機杼勞役織成雲錦天衣天帝憐其獨處許嫁河西牽牛郎嫁後遂廢織絍天帝怒責令歸河東但使其一年一度相㑹孟浩然夜歸鹿門歌一統志鹿門山在襄陽府城東南三十里襄陽記鹿門山舊名蘇嶺山建武中襄陽侯習郁立神祠於山刻二石鹿夾神道口俗因謂之鹿門廟遂以廟名山也唐書文藝傳孟浩然襄州襄陽人隱鹿門山年四十乃遊京師山寺鳴鍾晝已昏庾信詩戍樓鳴夕鼓山寺響晨鐘西京賦升觴舉燧既釂鳴鐘謝朓詩鳴鐘霽幽抱漁梁渡頭爭渡喧水經注沔水中有魚梁洲龎德公所居梁簡文帝詩採蓮渡頭擬黃河庾信春賦開上林而競入擁河橋而爭渡又詩河梁爭渡喧人隨沙岸向江村謝靈運詩野曠沙岸淨天髙秋月明王僧孺詩楓林曖似畫沙岸淨如掃謝朓詩曖曖江村見離離海樹出虞騫詩長林帶朝夕孤嶺枕江村余亦乘舟歸鹿門詩二子乘舟鹿門月照開烟樹詩月出照兮淮南子月照天下謝朓詩逺樹曖芊芊生烟紛漠漠忽到龎公栖隱處襄陽記龎公者南郡襄陽人也居峴山之南未嘗入城府荆州刺史劉表數延請不能屈遂攜其妻子登鹿門山因采藥不返襄陽耆舊傳龎德公隱鹿門山孔明每至其家獨拜床下德公初不令止北史徐則傳棲隱靈嶽五十餘年巖扉松徑長寂寥劉孝先詩洞户臨松徑老子寂兮寥兮獨立而不改江淹詩山中信寂寥惟有幽人自來去易幽人貞吉太公六韜武王問太公曰何以知敵壘之虛實自來自去丁仙芝曲阿人登開元進士為餘杭尉餘杭醉歌贈吳山人後漢書郡國志吳郡縣餘杭一統志餘杭縣在杭州府城西北七十里本秦舊縣屬㑹稽郡漢因之東漢屬吳郡三國吳屬吳興郡隋屬杭州唐宋元仍舊本朝因之曉幕紅襟燕清溪神女歌歌繁霜侵曉幕何意空相守坐待繁霜落𤣥中記胡燕斑胸聲小越燕紅襟聲大左傳吳季子札聘於上國宿於戚聞孫林父擊鐘曰夫子之在此猶燕之巢於幕也春城白項烏左傳城上有烏齊師其遁漢童謠城上烏尾畢逋小爾雅白項而羣飛者謂之燕烏世說支道林入東見王子猷兄弟曰見一羣白頸烏但聞喚啞啞聲只來梁上語徐彥伯詩暗梁聞語燕唐太宗詩舞接花梁燕李嶠歌詩梁上繞飛塵不向府中趨古詩盈盈公府步冉冉府中趨庾信鳥夜啼御史府中何處宿洛陽城頭那得棲城頭坎坎鼓聲曙蕭子顯詩洛陽城頭雞欲曙詩坎坎鼓我庾肩吾詩隴水哀笳曲漁陽摻鼓聲江總廬陵王德政碑去謠曙鼓來留暮歌滿庭新種櫻桃樹梁元帝賦台司烜而照夜觀執圭之滿庭禮記羞以含桃注含桃今櫻桃上林賦櫻桃蒲陶羅乎後宫傅咸黏蟬賦序櫻桃為樹則多隂為果則先熟故種之於㕔事之前桃花昨夜撩亂開謝偃詩撩亂垂絲昏栁陌參差濃葉暗桑津當軒發色映樓臺白帝子歌璇宫夜靜當軒織王績詩日照當軒影風吹滿路香班固西都賦蘭茝發色曄曄猗猗史記天官書海旁蜃氣象樓臺徐陵詩樓臺非一勢臨玩自多竒十千兊得餘杭酒曹植名都篇歸來宴平樂美酒斗十千梁簡文帝書黑水初旋未申十千之飲神仙傳王方平降蔡經家酒盡遣左右以千錢與餘杭姥乞酤酒須臾信還得酒五斗許庾信詩美酒餘杭醉二月春城長命杯庾信詩正旦辟惡酒新年長命杯酒後留君待明月北史崔瞻傳瞻性方重好讀書酒後清言聞者傾耳拾遺記吳椒華之房貫細珠為簾幌朝下以蔽景夕卷以待月還將明月送君回莊子送君者皆自崖而反君自此逺矣江淹詩送君如昨日庭前露已團御選唐詩卷八
