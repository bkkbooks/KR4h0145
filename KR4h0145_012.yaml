body:
  text: 欽定四庫全書御選唐詩卷八七言古杜甫短歌行贈王郎司直古今樂録王僧䖍技録平調七曲一曰長歌行二曰短歌行舊注王司直時為蜀中御史甫贈友詩官有王司直即其人唐書百官志司直掌糾劾官僚王郎酒酣拔劍斫地歌莫哀世說天壤之內乃有王郎又此是王郎歌史記荆軻嗜酒日興狗屠及髙漸離飲於燕市酒酣以往髙漸離擊筑荆軻和而歌於市左思詩荆軻飲燕市酒酣氣亦震哀歌和漸離獨若旁無人後漢齊武王傳張卭拔劍擊地我能拔爾抑塞磊落之竒才漢髙帝求賢詔我能尊顯之南史謝方明傳必被抑塞文心雕龍磊落以使才史記公孫鞅年少有竒才又周昌曰君之史趙堯年雖少然竒才也蜀志諸葛亮傳司馬宣王案行其營壘處所曰天下竒才也豫章翻風白日動陸賈新語楩楠豫章天下之名木本草豫章乃二木名一類二種顔師古曰豫即枕木章即樟木南史宋髙祖紀精貫白日鯨魚跋浪滄溟開古今注鯨魚雌曰鯢皆長千里眼為明月珠木華海賦橫海之鯨庾信燈賦動鱗甲於鯨魚梁昭明太子集序滄溟之深不能比其大且脫劒珮休徘徊文中子衣裳襜如劒珮鏘如袁淑效白馬篇彯纓去函谷投珮出甘泉馬融廣成頌徘徊安步西得諸侯棹錦水漢書王嘉傳今之郡守重於古諸侯釋名在旁撥水曰棹司馬相如投卓文君書錦水有鴛漢宫有木一統志二江一名汶江一名流江經成都府城南七里蜀人以此水濯錦鮮明故名錦江蜀錦譜蜀以錦擅名天下故城名以錦官江名以濯錦欲向何門趿珠履漢書鄒陽書臣飾愚陋則何王之門不可曳長裾乎史記春申君傳趙使欲夸楚為玳瑁簪刀劒室以珠玉飾之請命春申君客春申君客三千人其上客皆躡珠履以見趙使趙使大慚說文趿進足有所擷取桑轄切仲宣樓頭春色深荆州記當陽城樓王仲宣登之而作賦方輿勝覽仲宣樓在荆州梁髙季興建魏志王粲字仲宣山陽人獻帝西遷乃之荆州依劉表謝朓詩春色滿皇州青眼髙歌望吾子晉書阮籍傳籍能為青白眼見禮俗之士以白眼對之嵇康挾琴造焉乃見青眼陶潛讀史述采薇髙歌慨想黃虞禮記望吾子之教之也注吾子相親之詞眼中之人吾老矣陸雲詩髣佛眼中人國語中行宣子謂趙文子曰惜也吾老矣𤣥都壇歌寄元逸人十洲記𤣥洲在北海去岸三十六萬里上有太𤣥都仙伯真公所治本集注𤣥都壇漢武帝所築在長安南山子午谷中故人昔隱東䝉峯漢書霍去病傳衛青寵日衰而去病日益貴青故人門下多去事去病古詩相去萬餘里故人心尚爾陶潛詩脫有經過便念來存故人論語疏顓臾主祭䝉山在東故曰東䝉一統志䝉山在費縣西北七十里以其居魯之東一名東山已佩含景蒼精龍公孫端劒銘從革庚新含景吐商抱朴子道術諸經可以却惡防身者如含景藏形亦各有效也春秋繁露劒之在左蒼龍象也史記索隱東方蒼帝其精為龍故人今居子午谷漢書子午道從杜陵直絶南山徑漢中注子北方也午南方也言通南北道相當今京城直南山有谷通梁漢道者名子午谷一統志子午谷在西安府城南一百里獨在隂崖結茅屋潘嶽西征賦眺華頂之隂崖鮑照詩隂崖積夏雪又結茅野中宿韓非子旄象豹胎必不食於茅屋之下晉書羅含傳含轉州别駕以廨舍喧擾於城西小洲上立茅屋伐木為材織葦為席而居屋前太古𤣥都壇漢書朱邑傳明主遊心太古廣延茂士晉魏春秋蘇門山有隱者阮籍從之與談太古無為之道玉京經𤣥都玉京山有七寶城太上無極大道虛皇君之所治也髙仙之𤣥都焉青石漠漠常風寒山海經嬴母之山其下多青石述異記利州葭萌縣玉女房是大石穴前有竹數莖下有青石壇每因風自掃謝朓詩生烟紛漠漠梁簡文帝詩淇水漠漠苔浮張華詩巢居知風寒齊書謝超宗傳超宗詣東府門自通其時風寒慘厲太祖謂四座曰此客至今人不衣自暖子規夜啼山竹裂爾雅疏蜀王望帝化為子規禽經江介曰子規蜀右曰杜宇注甌越間曰怨鳥夜啼達旦血漬草木家語南山有竹弗揉自直庾信角調曲識韻者探窮山之竹王母晝下雲旗翻漢武內傳七月七日有一青鳥集殿前東方朔曰此西王母欲來也有頃果至列仙傳穆王與王母㑹於瑤池雲旗霓裳擁簇自天而下屈原九歌入不言兮出不辭乘回風兮載雲旗謝靈運詩雲旗興暮節劉孝孫詩耀日采旗翻知君此計誠長往史記范睢傳誰為此計者乎潘嶽西征賦悟山潜之逸士卓長往而不返孔稚圭北山移文或嘆幽人長往芝草琅玕日應長十洲記方丈洲仙家數十萬耕田種芝草課頃計畝如種稻狀後漢書明帝紀永平十七年芝草生殿前書厥貢惟球琳琅玕張衡詩美人贈我青琅玕漢武內傳太上之藥有廣庭芝草碧海琅玕鐵鎖髙垂不可攀道藏經晉時有戍卒屯於子午谷入谷之西澗水窮處忽見鐵鎖下垂約百有餘丈戍卒欲挽引而上有虎蹲踞焉王勃詩江漢深無底梁岷不可攀致身福地何蕭爽福地記終南山東接驪山太華西連太白至於隴山周回百里名曰福地王勃序人髙調逺地爽氣清醉歌行贈公安顔英華有十字少府請顧公題壁古今樂録王僧䖍宴樂技録平調有七曲一曰長歌行二曰短歌行荆州記吳大帝推劉備為左將軍荆州牧鎮油口居此時人號為左公故名其城為公安一統志公安縣在荆州府城東南七十里本漢武陵郡之孱陵縣地漢末以劉備為左公居此號公安晉置公安縣黃鶴注顧公即顧八分文學名況神仙中人不易得世說王右軍見杜𢎞治歎曰膚如凝脂目如㸃漆此神仙中人又孟昶在京口嘗見王恭乘髙輿披鶴氅裘於時微雪昶於籬間窺之嘆曰此真神仙中人史記淮隂侯傳蕭何曰諸將易得耳至如信者國士無雙顔氏之子才孤標易顔氏之子其庶幾乎梁元帝碑文獨振孤標倫類之所逺絶天馬長鳴待駕馭史記大宛傳大宛多善馬其先天馬子也漢郊祀歌太乙況天馬下霑赤汗沫流頳梁元帝詩正月土膏初欲發天馬照耀動農祥劉琨贈盧湛詩序騄驥倚輈於吳坂長鳴於伯樂知與不知也吳志張昭傳夫人君者謂能駕馭英雄驅使羣賢北史周太祖紀帝知人善任能駕馭英豪一見之者咸思用命秋鷹整翮當雲霄淮南子秋風下霜鷹雕搏摯華核表揚虎視之威厲秋鷹之爪蘇頲詩海外秋鷹擊霜前旅雁歸史記留侯世家鴻鵠髙飛一舉千里羽翮已就橫絶四海支遁詩孰是騰九霄不奮沖天翮晉書熊逺傳攀龍附鳳翺翔雲霄陸機詩美人何其曠灼灼在雲霄阮籍詩寄顔雲霄間君不見東吳顧文學尹洙注顧況吳人漢書仲長統傳秦時以文學徵待詔博士君不見西漢杜陵老班固西都賦漢之西都在於雍州實曰長安漢書宣帝紀元康元年更名杜縣為杜陵水經注長安南出東頭第一門本名覆盎門其南有杜城應劭曰故杜陵之下聚落也甫奉先詠懷詩杜陵有布衣老大意轉拙詩家筆勢君不嫌漢書藝文志凡詩六家四百一十六卷歌詩二十八家三百四十四篇詩賦百有六家千三百一十八篇王羲之筆勢論略告汝子敬吾觀汝書性過人仍未間規矩今述筆勢論十篇開汝之性詞翰升堂為君掃南史王儉傳虞正為中書舍人甚嫻詞翰陳子昂詩交遊紛若鳳詞翰宛如麟漢書藝文志如孔氏之門用賦也則賈誼登堂相如入室矣是日霜風凍七澤後漢書盧植傳論風霜以别草木之性張衡同聲歌願為羅衾幬在上衛風霜司馬相如子虛賦臣聞楚有七澤嘗觀其一未見其餘也臣之所見蓋特其小小者耳名曰雲夢按禹貢疏左傳昭三年楚子與鄭伯田於江南之夢定四年楚昭王寢於雲中漢陽圖經雲在江之北夢在江之南雲夢居七澤之二餘未詳烏蠻落照銜赤壁唐書南蠻傳邛部六姓一姓白蠻五姓烏蠻廣雅日西落反照於東謂之反景水經注江水左徑百人山南右徑赤壁山北昔周瑜與黃蓋詐魏武大軍處也元和郡縣志赤壁山在武昌縣西一百二十里北臨大江其北岸即烏林與赤壁相對一統志在武昌府東南九十里圖經云在嘉魚縣西七十里其地今屬嘉魚酒酣耳熱忘頭白史記髙祖紀過沛留置酒沛宫酒酣髙祖擊筑自為歌詩揚惲報孫㑹宗書酒後耳熱仰天撫缶而歌烏烏魏文帝與吳質書酒酣耳熱仰而賦詩忽然不自知其樂也又行年已長大已成老翁但未頭白耳古樂府半白半黑頭上髮感君意氣無所惜史記晏子傅意氣揚揚甚自得也卓文君白頭吟男兒重意氣何用錢刀為一為歌行歌主客史記滑稽傳主人留髠而送客皇甫謐三都賦序作者又因主客之辭正之以魏都折之以王道戲題王宰畫山水圖歌張彥逺名畫記王宰蜀中人多畫蜀山玲瓏嵌空巉嵯巧峭益州畫名畫記王宰大厯中家於蜀川能山水意出象外十日畫一水周禮硩蔟氏以方書十日之號注方版也十日謂從甲至癸又考工記設色之工五注摹倣物體曰畫釋名畫挂也以五色挂物上也子華子琅琊之東渤海稽天非一水之鍾也古詩盈盈一水間五日畫一石詩五日為期禮記今夫山一卷石之多子華子太山之髙非一石之積也能事不受相促迫易天下之能事畢矣春秋疏促迫不暇之意參同契彼促我迫王宰始肯留真蹟唐朝名畫録王宰家於西蜀貞元中畫山水樹石出於象外曽於㕔事見一圖障臨江雙樹一松一柏古藤縈繞上盤於空下著於水千枝萬葉交植屈曲又於興善寺見畫四時屏風若移造化風候雲物八節四時於一座之內陶𢎞景與武帝啓世論咸云江東無復鍾跡今諭㫖云真跡雖少可得而推是猶有存者壯哉崑崙方壺圖文中子子登雲中之城望龍門之關曰壯哉山河之固書織皮崑崙疏王肅云崑崙在臨羌西鄭以崑崙為山水經崑崙墟在西北河水出其東北陬列子渤海之東有大壑焉其中有山三日方壺拾遺記三壺海中三山也一曰方壺則方丈也二曰蓬壺則蓬萊也三曰瀛壺則瀛洲也形如壺器上廣中狹下方十洲記方丈洲在東海中心西南東北岸正等方丈方面各五千里上専是羣龍所聚挂君髙堂之素壁左思蜀都賦置酒髙堂漢官典職省中皆粉壁紫素界之畫古烈士王延夀魯靈光殿賦素壁皓曜以月照洛陽伽藍記對户交窗朱柱素壁甚為佳麗巴陵洞庭日本東山海經洞庭地穴在長沙巴陵郭璞江賦爰有包山洞庭巴陵地道潛逵傍通幽岫窈窕一統志洞庭在嶽州府城西南每嵗六七月問岷峩雪消水暴漲自荆江逆入洞庭清流為之改色唐書日本傳日本在海中自言國近日所出故以為名又日本國東西南北皆際於海赤岸水與銀河通枚乘七發凌赤岸篲扶桑郭璞江賦鼓洪濤於赤岸南兖州記瓜步山東五里有赤岸山南臨江中孝經援神契河者水之伯上應天漢楊泉物理論水之精氣上浮宛轉隨流水名曰天河博物志舊說天河與海通近有居海上者年年八月有浮槎來此人乘槎去至一處見一女方織一丈夫牽牛渚次問為何處曰可詣蜀問嚴君平此人還問君平曰某年某月有客星犯牽牛即天河也白帖天河謂之銀漢亦曰銀河中有雲氣隨飛龍易雲從龍又飛龍在天莊子絶雲氣負青天王褒聖主得賢臣頌龍興而致雲氣南康記湘源下流百里有峽兩岸皆髙山峽岸下數十里有蛟龍窟時時有霧氣起舟人漁子入浦溆木華海賦於是舟人漁子徂南極東郭璞江賦於是蘆人漁子擯落江山薛道衡詩連旌映浦漵疊鼓拂河洲山木盡亞洪濤風左傳山有木工則度之番禺記潮水陵山觸岸湧起成濤說文亞次也張衡西京賦起洪濤而揚波木華海賦洪濤瀾汗萬里無際尤工逺勢古莫比宣和畫譜隋展子䖍善畫臺閣寫江山逺近之勢尤工又顧愷之天才傑出獨步無偶妙造精微雖荀衛曹張未足以方駕也世說顧長康畫有蒼生來所無咫尺應須論萬里南史齊竟陵王子昭胄傳賁字文奐能書善畫於扇上圖山水咫尺之內便覺萬里為遙焉得并州快剪刀周禮職方氏正北曰并州釋名并州其州或并或設因以為名也爾雅注南方人呼剪刀為劑刀釋名剪刀剪進也所剪稍進前也剪取吳松半江水水經南江東則松江出焉一統志吳江在吳江縣東源出太湖一名松江又名松陵江亦曰笠澤經崑山入海謝安舟楫風還起晉書謝安傳安嘗與孫綽等泛海風起浪湧諸人並懼安吟嘯自若舟人猶去不止風轉急安徐曰如此將何歸耶舟人承言即回衆咸服其雅量書若濟巨川用汝作舟楫楚辭衝風起兮橫波梁苑池臺雪欲飛漢書梁孝王傳孝王築東苑方三百餘里廣睢陽城七十里大治宫室為復道自宫連屬於平臺三十餘里如淳注平臺在大梁東北離宫所在也師古注今其城東二十里所有故臺基其處寬博土俗云平臺也一統志梁園在開封府東南一名梁苑梁孝王遊賞之所張衡西京賦度曲未終雲起雪飛謝惠連雪賦嵗將暮時既昏寒風積愁雲繁梁王不悅遊於兔園俄而微霰零密雪下杳杳東山攜漢妓魏志管輅傳注若俯眩深溪杳杳兮精絶晉書謝安傳寓居㑹稽與王羲之及許詢桑門支遁游處出則漁弋山水入則言詠屬文及登台輔雖受朝寄然東山之志始末不渝謝靈運詩偶與張邴合久欲還東山注東山謂㑹稽始寧也一統志東山在紹興府上虞縣西南四十五里晉謝安髙卧東山即此晉書謝安傳雖放情丘壑然每遊賞必以妓女從泠泠修竹待王歸宋玉風賦清清泠泠東方朔七諫便娟之修竹兮寄生乎江潭上葳㽔而防露兮下泠泠而來風枚乘兔園賦修竹檀欒池始作睢陽之苑九域志睢陽池水庾信文修竹夾有梁孝王東苑中有修竹園西京雜記梁孝王苑中竒果佳樹瑰禽異獸靡不畢備世人言梁孝王竹園也楚辭王孫遊兮不歸春草生兮萋萋髙都護驄馬行唐書髙仙芝髙麗人善騎射開元未夫䝉靈察表為安西副都護漢書鄭吉傳吉威震西域遂并護車師以西北道故號都護都護之置自吉始焉注並護南北二道故謂之都說文驄馬青白雜色安西都護胡青驄舊唐書貞觀十七年置安西都護府於西州顯慶三年移治龜兹國城于闐以西波斯以東十六都護府隸焉後漢書桓典傳常乘驄馬京師畏憚為之語曰行行且止避驄馬御史隋書吐谷渾有青海中有小山至冬冰合嘗得波斯馬放入海因生驄馬日行千里故時稱青驄海馬古詩躑躅青驄馬聲價歘然來向東赭白馬賦聲價隆振又歘聳擢以鴻驚注歘忽也法華經歘然火起漢天馬歌天馬徠歷無草徑千里循東道此馬臨陳久無敵史記項王謂亭長曰吾騎此馬五嵗所向無敵戴皓詩刀環臨陳鳴與人一心成大功國語勠力一心大戴禮均馬力齊馬心應德璉慜驥賦展心力於知已兮史記亷頗曰我為趙將有攻城野戰之大功功成惠養隨所致老子功成而不居又功成名遂赭白馬賦願終惠養蔭本枝兮飄飄逺自流沙至曹植詩飄飄隨長風書西被於流沙禮記西不盡流沙元和郡縣志居延澤在張掖縣東北一千六百里即古流沙天馬歌天馬徠從西極涉流沙雄姿未受伏櫪恩赭白馬賦弭雄姿以奉引漢書李尋傳馬不伏櫪不可以趨道注伏櫪謂伏槽櫪而秣之魏武帝樂府老驥伏櫪志在千里梁元帝謝賜馬啓相彼騏驥猶深戀主矧伊伏櫪彌結懷恩說苑受恩者當必報梁邵陵王謝賚馬啓戀德銘心矚恩雨淚猛氣猶思戰場利宋玉笛賦悲猛氣兮飄疾西征賦何猛氣之咆哮戰國策魏之地勢固戰場也腕促蹄髙如踣鐵相馬經馬腕欲促促則健蹄欲髙髙耐險峻齊民要術馬腕欲促而大其間才容靽蹄欲得厚二三寸硬如石南都賦馬腕餘足神異經西南大宛有良馬蹄如汗腕可握日行千里至日中而汗血說文踣頓也逸雅踣頓踣而前也交河幾蹴層冰裂漢書西域傳車師前國王治交河城元和郡縣志貞觀四年於漢車師前王地置交河縣取界內交河為名交河源出縣北天山分流城下一統志今為西畨火州地王洙注唐安西去交河七十里顧野王詩交河冰未堅許氏說文蹴攝也楚辭層冰峩峩東方朔神異經北方有層冰萬里厚百丈古兩頭纎纎詩腷腷膊膊春冰裂五花散作雲滿身名畫録開元內廏有飛黃照夜浮雲五花之乘丹元子步天歌五個吐花王良星注王良五星其四星曰天駟旁一星曰王良亦曰天馬王僧孺詩散漫輕烟轉霏微商雲散萬里方看汗流血天馬歌經萬里兮歸有德又太乙貺天馬下霑赤汗沫流赭漢書武帝紀太初四年春二師將軍李廣利獲汗血馬來作西極天馬之歌注應劭曰大宛舊有天馬種踏石汗血汗從前肩膊小孔中出如血號一日千里東觀漢記聞武帝歌天馬霑赤汗今親見其然血從肩膊上小孔中出梁簡文帝繫馬詩青驪流赭汗緑地懸花蹄梁元帝詩汗赭疑霑勒衣香不逐風長安壯兒不敢騎漢書地理志京兆尹縣長安髙帝五年置三輔黃圖三輔共治長安城中又長安有九市八街九陌閭里一百六十西都賦漢之西都實在雍州名曰長安樂府折楊栁歌健兒須快馬快馬須健兒洛陽伽藍記快馬健兒不如老嫗吹箎史記樊噲傳壯士賜之巵酒淮南子畏馬之辟也不敢騎走過掣電傾城知梁簡文帝賦夜曠塵昏星流電掣曹毗馬射賦奔電無以追其蹤謝莊舞馬賦藴浮雲之鋭影戢追電之逸足顔延之天馬狀遇山為風值雲成電庾信謝賚馬啓流電爭光浮雲連影孫楚詩傾城逺追送注傾猶盡也青絲絡頭為君老古樂府青絲纒馬尾黃金絡馬頭梁元帝紫騮馬詩長安美少年金絡飾連錢宛轉青絲鞚照耀珊瑚鞭楊師道詩苔流染絲絡何由却出橫門道漢書西域傳百官送至橫門外三輔黃圖長安城北西頭第一門曰橫門其外有橋曰橫橋水經注北出西頭第一門本名橫門如淳曰音光故曰光門程大昌雍録自橫門渡渭而西即是趨西域之路飲中八仙歌唐書李白傳帝欲官白妃輒沮止白自知不為親近所容益驁放不自修與賀知章李適之汝陽王璡崔宗之蘇晉張旭焦遂為酒中八仙人李陽冰草堂集序公浪迹縱酒與賀知章崔宗之等為八仙之遊知章騎馬似乘船舊唐書知章性放曠善談笑晚年尤縱誕無復規檢自號四明狂客又稱祕書外監遨遊里巷醉後屬辭動成卷軸晉書山簡傳兒童歌曰山公出何許往至髙陽池日夕倒載歸酩酊無所知時時能騎馬倒著白接䍦史記夏本紀禹水行乘船越絶書夫越水行而山處以船為車以楫為馬蔡夢弼集注浙人不喜騎馬而喜乘船杜蓋嘲之眼花落井水底眠張華詩三雅朱何遲耳熱眼中花梁簡文帝箏賦耳熱眼花之娛千金萬年之夀吳均雜句夢中難言見終成亂眼花鮑令暉詩莫作瓶落井一去無消息抱朴子余從祖仙公每大醉輒入深淵之底一日許乃出王氏神仙傳王元芝夜兄一道士因隨之行在西江水底月光中不見泥沙水隨自開庾信詩遙望芙蓉影只言水底然汝陽三斗始朝天唐書三宗諸子列傳讓皇帝憲子十九人其聞者璡璡眉宇秀整性謹潔善射帝愛之封汝陽王唐史拾遺汝陽王嘗於明皇前醉不能下殿上遣人掖出之璡謝罪曰臣以三斗壯膽不覺至此石崇金谷集序遂各賦詩以叙中懷不能者罰酒三斗道逢麴車口流涎說文麴酒母也魏文帝與吳質書蒲萄釀以為酒甘於麴蘖道之固以流㵪咽嗌按㵪同涎恨不移封向酒泉三秦記酒泉郡城下有金泉泉味如酒故名酒泉拾遺記羌人姚馥嗜酒羣􅒰呼為渴羌武帝擢為朝歌宰遷酒泉太守左相日興費萬錢唐書宗室宰相傳李適之恆山愍王孫也喜賔客飲酒至斗餘不亂天寶元年代牛仙客為左相嘗與李林甫爭權不協乃上宰政求散職以太子少保罷晉書何曽傳曽字穎考奢豪日食萬錢猶曰無下箸處飲如長鯨吸百川左思吳都賦長鯨吞航修鯢吐浪莊子秋水時至百川灌河木華海賦魚則橫海之鯨突兀孤遊吸波則洪漣踧蹜吹潦則百川倒流銜杯樂聖稱避賢劉伶酒德頌捧罌承槽銜杯潄醪本事詩李適之罷免意憤日飲醇酎且為詩曰避賢初罷相樂聖且銜杯為問門前客今朝幾個來宗之瀟灑美少年舊唐書崔宗之日用之子襲封齊國公孔稚圭北山移文瀟灑出塵之想何遜樂府城東美少年重月輕萬億乂詩長安美少年羽騎暮連翩舉觴白眼望青天列子景公舉觴自罰晉書阮籍傳籍任情不羈能為青白眼見禮俗之士以白眼對之列子至人者上窺青天皎如玉樹臨風前世說魏明帝使后弟毛曽與夏侯泰初並坐時人謂蒹葭倚玉樹又謝太傅問諸子侄子弟亦何預人事而正欲使其佳車騎答曰譬如芝蘭玉樹欲使其生於階庭耳庾肩吾詩風前細塵起唐太宗度洛水詩霞處流縈錦風前漾卷羅蘇晉長齊繡佛前舊唐書蘇晉珦之子數嵗知為文舉進士歷官户吏二部侍郎終太子左庶子南史劉虬精信釋氏衣粗布禮佛長齊又徐孝克蔬食長齊持菩薩戒杜修可注蘇晉學浮屠術嘗得胡僧惠澄繡彌勒佛一本寶之曰是佛好飲米汁願事之他佛不愛也醉中往往愛逃禪孟子逃墨必歸於楊逃楊必歸於儒魏書釋老志沙門惠始坐禪於白渠廣韻禪靜也李白一斗詩百篇唐書李白傳明皇召見金鑾殿論當世事奏頌一篇帝賜食親為調羮有詔供奉翰林白猶與飲徒醉於市帝坐沈香亭子意有所感欲得白為樂章召入而白已醉左右以水頮面稍解授筆成文婉麗精切無留思史記淳于髠傳臣飲一斗亦醉一石亦醉晉書陸納傳出守吳興之姑熟辭桓溫曰方守逺郡欲與公一醉以展下情溫欣然納之及受禮惟酒一斗鹿肉一柈坐客愕然燉煌張氏傳扶風孟他以蒲萄酒一斗遺張讓即拜凉州刺史孔安國尚書序典謨訓誥誓命之文凡百篇長安市上酒家眠三輔黃圖長安市有九六市在道西三市在道東凡四里為一市漢書欒布傳布窮困為酒家保王績詩日逐劉伶去宵隨畢卓眠天子呼來不上船禮記君天下曰天子范傳正李白碑明皇泛白蓮池公不在宴召公作序時公已被酒翰苑中命髙將軍扶以登舟自稱臣是酒中仙李陽冰草堂集敘朝列賦謫仙人歌凡數百首張旭三杯草聖傳唐書張旭傳旭蘇州吳人嗜酒每大醉呼叫狂走乃下筆或以頭濡墨而書既醒自視以為伸不可復得也世呼張顛王愔文章志張伯英臨池學書池水盡黑家之衣帛必書而後練草書為世所寶韋仲將謂之草聖脫帽露頂王公前古樂府少年見羅敷脫帽著悄頭陸倕劒閣銘穿胸露頂之豪箕坐椎髻之長范曄西域傳論莫不露頂肘行東向而朝天子左傳可薦於鬼神可羞於王公史記莊周傳王公大人不能器之揮毫落紙如雲烟髙允徵士頌揮毫頌德江總詩飛文綺縠采落紙波濤流潘嶽楊荆州誄翰動若飛紙落如雲謝靈運詩遂登羣峯首邈若升雲烟髙彪詩抗志凌雲烟焦遂五斗方卓然唐史拾遺焦遂口吃對客不出一言醉後酬酢如注射時目為酒吃語林劉伶飲酒一石至醒復飲五斗其妻諫曰非養生之道宜斷之伶曰善當祝鬼神自誓耳卿可致酒五斗吾當斷之妻如其言伶祝曰天生劉伶以酒為名一飲一石五斗解酲婦人之言慎莫可聽於是乃飲酒御肉塊然復醉江淹詩思乘扶搖翰卓然陵風矯髙談雄辨驚四筵陸機詩髙談一何綺劉峻廣絶交論縱碧雞之雄辨謝瞻詩四筵霑芳醴驄馬行甫自注太常梁卿敕賜馬也李鄧公愛而有之命甫製詩說文驄馬青白雜色也後漢書桓典傳典拜侍御史執政無所回避常乘驄馬京師畏憚為之語曰行行且止避驄馬御史鮑照結客少年場行驄馬金絡頭錦帶佩吳鈎隋書西域傳吐谷渾有青海常得波斯草馬放入海因生驄駒能日行千里故時稱青海驄鄧公馬癖人共知唐書宗室世糸表紀王慎後鄧國公汝州刺史行休晉書王濟傳濟善解馬性故杜預謂濟有馬癖初得花驄大宛種名畫記明皇好馬命韓幹悉圖其駿有玉花驄照夜白等漢書西域傳大宛國多善馬馬汗血其先天馬子也張正見詩將軍入大宛善馬出從戎薛曜舞馬篇星精龍種競騰驤夙昔傳聞思一見古樂府逺道不可思夙昔夢見之曹植白馬篇宿昔秉良弓公羊傳所見異詞所聞異詞所傳聞異詞後漢書馬援傳臣嘗師事子阿受相馬骨法考之行事輒有效驗臣愚以為傳聞不如親見視影不如察形漢書趙充國傳百聞不如一見牽來左右神皆竦禮記效馬效羊者右牽之庾信昭君辭冰河牽馬渡雪路抱鞍行後漢書胸奴傳昭君豐容靚飾光照漢宫顧影徘徊竦動左右潘嶽射雉賦暾出苗以入場愈情駭而神竦雄姿逸態何崷崒傅休奕鷹賦雄姿邈世逸氣橫生顔延之赭白馬賦弭雄姿以奉引張協七命天驥之駿逸態超越班固西都賦巖峻崷崒金石崢嶸顧影驕嘶自矜寵魏志何晏傳晏性自喜動靜粉白不去手行步顧影列子子列子學於壺丘子林壺丘子林曰子知持後則可以言持身矣曰願聞持後曰顧若影則知之詩四牡有驕梁簡文帝繫馬詩蹀足絆中憤搖頭櫪上嘶史記項羽紀贊自矜功伐左傳無怙富無恃寵隅目青熒夾鏡懸張衡西京賦猛􅐧髬髵隅目髙眶注隅目角眼視也班固西都賦琳珉青熒顔延之赭白馬賦雙瞳夾鏡兩􅀈協月傅休奕乘輿馬賦目若曜星符采橫發髙顛懸日雙壁象月相馬經眼睛欲如懸鈴紫焰光肉騣碨礧連錢動唐書五行志開元二十九年滑州刺史李雍獻馬肉騣麟臆嘶不類馬何遜守風詩碨礧衝波白爾雅青驪驎曰驒注色有深淺班駁如魚鱗今連錢驄也北齊書陽休之傳有觸籓之羝羊乘連錢之驄馬曹毗馬射賦體與機㑹動若驚風謝朓郊祀曲鏘鏘玉鑾動朝來少試華軒下晉書王徽之傳西山朝來致有爽氣潛夫論馬不試則良駑疑杜摯詩騏驥馬不試婆娑槽櫪間王微詩思婦臨髙堂長想憑華軒未覺千金滿髙價韓非子馬似鹿而題之千金然而有百金之馬而無一金之鹿者馬為人用而鹿不為人用也漢書西域傳上遣使者持千金及金馬以請宛善馬庾信詩試策千金馬來登五丈原曹植磐石篇方舟尋髙價珍寶麗以通赤汗微生白雪毛漢書武帝紀太初四年春李廣利獲汗血馬來又禮樂志太乙況天馬下沾赤汗沫流赭詩有馬白顛疏顛額有白毛也孟子白馬之白也猶白雪之白銀鞍却覆香羅帕江淹别賦龍馬銀鞍朱軒繡軸周𢎞正詩銀鞍耀紫韁唐書地理志寧州彭原郡土貢五色覆鞍氊說文帛三幅曰帕支遁詩黃裳羅帕質卿家舊賜公能取北史袁聿修傳聿修為尚書郎未曽受升斗之遺邢邵戲呼為清郎大寧初聿修以太常少卿出使邵送白紬聿修不受邵報書云弟昔為清郎今日復作清卿矣後漢書賈復傳復馬羸光武解左驂以賜之穀梁傳取之中廏而置之外廏天廏真龍此其亞晉書天文志東壁北十星曰天廏主馬之官若今驛亭也周禮注凡馬八尺以上為龍南史曹景宗傳我在鄉里騎快馬如龍北史源師傳師攝祠部後屬孟夏以龍見請雩髙阿那肱謂為真龍出現大驚喜師云此是龍星初見禮當雩祭非謂真龍别有所降魏志䓒彧傅論荀彧賈詡庶乎算無遺策經達權變其良平之亞歟南史王藉傳藉甚工草書筆勢遒放孔琳之流亞也晝洗須騰涇渭深張說隴右監牧頌朝刷閬風夕洗天泉禮記季春之月乃合纍牛騰馬遊牝於牧顔延之赭白馬賦料武藝品驍騰庾肩吾詩渥水出騰駒詩涇以渭濁湜湜其沚史記范睢傳北有甘泉谷口南帶涇渭一統志渭河出臨洮府渭源縣鳥鼠山西北谷東流經盩厔興平咸陽渭南至華隂界入黃河涇河發源平凉府界岍頭山經邠州醴泉涇陽至髙陵縣入渭朝趨可刷幽并夜漢書李尋傳馬不伏櫪不可以趨道顔延之赭白馬賦旦刷幽燕晝秣荆越左思魏都賦洗兵海島刷馬江洲漢書地理志周改禹徐梁二州合之於雍青分冀州之地以為幽并地理通釋冀州之域大於九州於是分為幽并梁元帝詩方逐幽并去西北共連翩吾聞良驥老始成吳質答東阿王箋猶絆良驥之足而責以千里之任孫楚鷹賦策良驥服羔裘魏武帝詩老驥伏櫪志在千里老子大器晚成此馬數年人更驚後漢書卓茂傳茂為丞相史常出道中有人認茂馬者茂問失馬幾日對曰月餘矣茂曰然此馬畜已數年遂解馬與之曰即非所失幸至丞相府還我後馬主自得馬慚愧詣茂史記滑稽傳此鳥不蜚則已一蜚沖天不鳴則已一鳴驚人豈有四蹄疾於鳥莊子馬蹄可以踐霜雪曹植詩俯身散馬蹄埤雅隼鷂屬也一名雀鷹蓋迅疾之鳥不與八駿俱先鳴穆天子傳天子之馬八駿赤驥盜驪白義踰輪山子渠黃驊騮騄駬左傳平隂之役先二子鳴尸子戰如鬬雞勝者先鳴時俗造次那得致曹植詩時俗薄朱顔誰為發皓齒後漢書吳漢傳漢謹厚少文造次不能以辭自達又董仲舒傳陛下居得致之位操可致之勢又有能致之資魏文帝與孫權書前使於禁郭及夫所遺纎驪馬本欲使禁自致之念將軍倘欲速得今故以付徐奉往雲霧晦冥方降精列子虹霓也雲霧也風雨也四時也此積氣之成乎天者也史記龜策傳正畫無見風雨晦冥雲蓋其上五色清黃晉書天文志五星盈縮失位其精降於地為人典略神馬河之精郭璞馬讃馬出明精祖自天駟白帖馬房星之精故房星為天駟春秋說題辭地精為馬十二月而生張說隴右羣牧使頌水瑞感而河龍出星精應而天駟下近聞下詔喧都邑班固東都賦乃申舊章下明詔唐書兵志開元九年詔天下之有馬者州縣皆先以郵遞軍旅之役定户復緣以升之禮記仲秋之月可以築城郭建都邑班固西都賦都都相望邑邑相屬肯使騏驎地上行戰國策世無騏驎騄駬王之駟已備矣爾雅翼麒麟善走故良馬亦名為騏驎後漢書馬援傳行天莫如龍行地莫如馬拾遺記穆王馭八龍之駿按轡徐行以匝天池之域渼陂行長安志渼陂在鄠縣西十道志陂魚甚美因名之千家注以水味美故配水以為名風俗通陂者繁也言因下鍾水以繁利萬物也岑參兄弟皆好竒唐詩紀事至德中杜甫等薦參識度清逺議論雅正髙柄品彚注子美詩岑參多新詩又云髙岑殊緩步參與子美非薄交也繁欽與魏文帝箋兼愛好竒攜我逺來遊渼陂詩惠而好我攜手同行南齊書髙測傳尋山採藥逺來至此陸機詩友朋自逺來天地黤慘忽異色江淹郊外望秋詩汀臯日慘色舊注黤慘不明貌波濤萬頃堆琉璃吳越春秋因揚波成濤江總詩丹水波濤泛隋書徐則傳千尋萬頃莫測其涯廣雅琉璃珊瑚皆為珠梁簡文帝詩雲開瑪瑙葉水淨琉璃波琉璃汗漫泛舟入淮南子徙倚於汗漫之宇詩泛彼柏舟左傳秦輸粟於晉自雍及絳相繼命之曰泛舟之役集韻泛通作泛事殊興極憂思集王羲之蘭亭敘雖世殊事異所以興懷其致一也張協七命歡極樂殫回節而旋王粲詩憂思壯難任鼉作鯨吞不復知說文鼉水蟲似蜥蜴而長大廣博物志鯨魚海魚也大者長千里吳都賦長鯨吞航惡風白浪何嗟及西京雜記昔人有遊束海者既而風惡何遜詩浪白風初起詩何嗟及矣主人錦帆相為開曹植詩主人寂無為隂鏗詩洞庭春溜滿平湖錦帆張舟子喜甚無氛埃詩招招舟子楚詞氛埃辟而清凉注氛昏濁之氣鳬鷖散亂櫂謳發詩鳬鷖在涇注毛萇曰鳬水鳥也鷖鳬屬陸璣毛詩草木蟲魚疏鳬大小如鴨青色卑腳短喙鳥之謹願者也蒼頡解詁鷖鷗也列子始驚駭散亂矣方言楫謂之櫂說文謳齊謳也吳都賦櫂謳唱簫籟鳴絲管啁啾空翠來前漢志絲曰絃竹曰管鮑照詩絲管感暮情禮記小者至於燕雀猶有啁噍之頃焉注噍與啾同陳後主詩歇霧含空翠沈竿續蔓深莫測列子投綸沈鈎謝朓詩乘此終蕭散垂竿深澗底王粲海賦其深不測舊注沈竿續蔓戲測水之淺深也菱葉荷花淨如拭古樂府採蓮曲泛舟採菱葉詩隰有荷華毛詩草木蟲魚疏荷芙蕖江東呼為荷雜記雍人拭羊注拭淨也宛在中流渤澥清詩宛在水中央漢武帝曲橫中流兮揚素波丘遲詩櫂歌發中流子虛賦浮渤澥注渤澥海之别支也下歸無極終南黑荀子渤海東有大壑其下無底曰歸墟謝朓詩漢廣流無極詩終南何有書終南惇物至於鳥鼠一統志終南山在西安府城南五十里一名南山半陂以南純浸山雍録渼陂源出終南山動影裊窕沖融間江總詩動搖山水影謝靈運山居賦濬潭澗而窈窕除菰洲之紆餘木華海賦沖融滉漾船舷暝戛雲際寺郭璞江賦詠採菱以扣舷廣韻舷船邊也長安志雲際山大定寺在鄠縣東南十六里隋仁夀元年置居賢捧日寺正韻戛轢也謝靈運詩暝還巖際宿舊注謂船舷經過之聲水面月出藍田關詩月出皎兮唐書地理志京兆府有藍田關一統志藍田關在西安府藍田縣東南九十八里本秦嶢關雍録嶢關在渼陂東南此時驪龍亦吐珠莊子夫千金之珠必在九重之淵驪龍頷下能得珠者必遭其睡七啓綴以驪龍之珠尚書考靈曜藏龍吐珠馮夷擊鼓羣龍趍江賦冰夷倚浪以傲睨注冰夷水仙人也郭璞云冰夷馮夷也莊子馮夷得之以返大川淮南子馮夷服八石而得水仙洛神賦馮夷擊鼓女媧清歌十洲記方丈在大海中央上専是羣龍所聚西京賦萬騎龍趍湘妃漢女出歌舞史記秦始皇紀上問博士曰湘君何神博士對曰聞之堯女舜之妻列女傳二妃在湘江之間俗謂之湘君列仙傳鄭交甫遊漢江見二女解珮與之洛神賦從南湘之二妃攜漢濵之遊女後漢劉盆子傳共擊鼓歌舞金支翠旗光有無漢書禮樂志房中歌金支翠華庶旄翠旗注樂上衆飾有流翅羽葆以黃為支其首敷散若草木之秀華也夏侯湛褉賦擢翠旗揚繁纓子虛賦覽於有無咫尺但愁雷雨至左傳天威不違顔咫尺易天地解而雷雨作蒼茫不曉神靈意沈約詩出漲海之蒼茫九歌東風飄兮神靈雨少壯幾時奈老何向來哀樂何其多漢武帝秋風辭歡樂極兮哀情多少壯幾時奈老何世說謝太傅語王右軍曰中年傷於哀樂與親友别輒作數日惡奉先劉少府新畫山水障歌長安志蒲城縣開元四年建睿宗橋陵改為奉先縣一統志蒲城縣在華州城北一百二十里唐改奉先縣堂上不合生楓樹禮記堂上接武白虎通歌者在堂上舞者在堂下山海經黃帝殺蚩尤棄其械化為楓樹阮籍詩湛湛長江水上有楓樹林怪底江山起烟霧匡謬正俗俗謂何物為底郭璞江賦蘆人漁子擯落江山謝靈運詩江山共開曠庾肩吾詩望望江山阻北史蕭大圜傳近瞻烟霧逺眺風雲庾肩吾詩離宫起烟霧聞君更掃赤縣圖白帖王子猷過戴安道飲安道求子猷書子猷攘臂大言曰我雖辭翰不及古人與君一掃素壁史記騶衍傳中國名赤縣神州江淹詩赤縣多仙靈長安志奉先縣隸京兆府開元十七年升為赤縣乘興遣畫滄洲趣世說乘興而來興盡而返南史張充傳飛竿釣渚濯足滄洲袁粲詩訪跡雖中宇循寄乃滄洲謝朓詩既歡懷祿情復協滄洲趣畫師亦無數南史梁武帝紀百濟國求醫工畫師詔許之唐書閻立本傳太宗泛舟春苑池見異鳥容與波上召立本侔狀閣外傳呼畫師閻立本立本羞悵流汗薛道衡昭君辭不䝉女史進更失畫師情詩萬億及秭疏言其多無數也好手不可遇抱朴子刻削者比肩而班狄擅絶手之稱梁簡文帝書張士簡之賦周升逸之辨亦誠佳手難可復遇對此融心神魏書釋老志其為教也蠲去邪思澡雪心神左思詩前有寒泉井聊可瑩心神知君重毫素陸機文賦紛葳蕤以馺遝唯毫素之所擬注毫筆也縑曰素顔延之詩深心託毫素豈但祁嶽與鄭䖍畫録空有其名不見踪跡二十五人祁嶽在李國恆之下唐書鄭䖍傳善圖山水好書嘗自寫其詩并畫以獻帝大署其尾曰鄭䖍三絶筆迹逺過楊契丹陸機謝表事蹤筆跡皆可推校南史王僧䖍傳辭製既雅筆迹又麗名畫記隋楊契丹官至上儀同六法備該殊豐骨氣山東體製允屬斯人得非𤣥圃裂穆天子傳乃銘迹於𤣥圃之上以詔後世離騷朝發軔於蒼梧夕余至於𤣥圃水經注崑崙之山三級二曰𤣥圃一名閬風嵇康遊仙詩飄飄戲𤣥圃黃老相過從國史補烟玉笛其聲清壯山石可裂無乃瀟湘翻圖經湘水自海陽發源至零陵北而營水㑹之二水合流謂之瀟湘瀟湘水清深之名也悄然坐我天姥下謝靈運詩暝投剡中宿明登天姥岑元和郡縣志天姥山石壁上有刋字科斗形髙不可識春月樵者聞簫鼓笳吹之聲聒耳元嘉中遣名畫寫狀於團扇即此山也寰宇記天姥山在剡縣東南八十里名山志曰山上有楓千餘丈蕭蕭然吳録云登者聞天姥歌謠之響一統志天姥峯在天台縣西北與天台山相對耳邊已似聞清猿宜都山川記峽中鳴猿至清諸山谷傳響泠泠不絶鮑照詩叫嘯夜猿清反思前夜風雨急乃是蒲城鬼神入詩風雨如晦雞鳴不已劉峻廣絶交論風雨急而不輟其音沈佺期巫山髙暗谷疑風雨隂崖若鬼神陸倕新漏刻銘倐往忽來鬼出神入元氣淋漓障猶濕漢書律歷志太極中央元氣故為黃鍾白虎通地者元氣所生萬物之祖廣韻淋漓秋雨集韻或作漓江淹麗色賦氣已濕兮曉未半真宰上訴天應泣老子有真宰足以制萬物王筠詩還迷依善道反心由真宰陸機表鉗口泣結舌不敢上訴所天唐書五行志無雲而雨是謂天野亭春還雜花逺晉書陶潛傳當往廬山刺史王𢎞齎酒於半道邀之潛既遇酒便引酌野亭欣然忘進夏侯湛春可樂賦掇雜花以為羞集葳㽔以飾裳丘遲與陳伯之書暮春三月江南草長雜花生樹羣鶯亂飛漁翁暝踏孤舟立傅休奕詩渭濵漁釣翁陶潛詩渺渺孤舟逝綿綿歸思紆馬周詩春水送孤舟滄浪水深青溟闊書嶓冢導漾東流為漢又東為滄浪之水陸機詩發藻玉臺下垂影滄浪泉阮籍東臯賦測虛舟以遑思兮聊逍遙乎青溟庾闡衡山詩未體江湖悠安識南溟闊敧崖側島秋毫末後漢書丁鴻傳壞崖破巖之水源自涓涓水經注夾岸崇深傾崖返捍揚雄解嘲江湖之涯渤澥之島趙冬曦詩孤島輕霧裏淮南子秋毫之末淪於不測莊子號物之數為萬而人處一焉不似毫未之在馬體乎不見湘妃鼓瑟時曹植洛神賦從南湘之二妃兮挾漢濵之遊女湘中記舜二妃為湘水神故曰湘妃詩並坐鼓瑟爾雅徒鼓瑟謂之步屈原逺遊使湘靈鼓瑟兮令海若舞馮夷至今斑竹臨江活博物志堯之二女舜之二妃以涕揮竹竹盡斑唐書地理志嶺南雷州土貢斑竹張載詩臨江釣春魚劉侯天機精莊子其嗜欲深者其天機淺傅休奕詩聰鑒盡下情明明綜天機愛畫入骨髓世說戴安道就范宣學視范所為范讀書亦讀書范抄書亦抄書惟獨好畫范以為無用不宜勞心於此戴乃畫南都賦圖范看畢咨嗟甚以為有益始重畫續晉陽秋桓靈寶好蓄法書名畫史記鄒陽傳德淪於骨髓文中子神聽者學在骨髓今有兩兒郎徐陵烏栖曲風流荀令好兒郎偏能傅粉復含香揮灑亦莫比張衡歸田賦揮翰墨以奮藻廣博物志浮提國獻神通善書人出肘間墨汁灑地及石皆成篆隸科斗之字大兒聰明到後漢書禰衡惟善孔融楊修常稱曰大兒孔文舉小兒楊德祖蜀志諸葛瞻傳亮與兄瑾書曰瞻今已八嵗聰慧可愛莊子目徹為明耳徹為聰大戴禮髙辛生而神靈聰以知逺明以察微能添老樹巔崖裏雲笈七籖一切衆生意雖求生不持戒行假使長夀猶如老樹有何殊别張說詩零落答故人將隨江樹老李顒雷賦起偉霆於霄際摧徑木於巖巔爾雅崖內為隩外為隈抱朴子非泣血之民不能識夜光於重崖之裏小兒心孔開孔融别傳四嵗與兄食梨輒引小者人問其故曰小兒法當取小者漢書王溫舒傳居廷尉惛惛不辨為中尉則心開貌得山僧及童子名畫記韓幹善寫貌人物尤善鞍馬庾信詩野老時相訪山僧或見尋詩童子佩觿庾信詩青衣上少室童子向蓬萊若耶溪雲門寺越絶書若耶之溪涸而出銅水經注若耶溪水上承嶕峴麻溪溪之下孤潭周數畝麻潭下注若耶溪水至清照衆山倒影窺之如畫一統志若耶溪在㑹稽府城南二十五里與鏡湖合水經注山隂縣南有玉笥竹林雲門天柱精舍並疏山創基架林裁宇割潤延流盡泉石之好南史何子季以㑹稽多靈異往遊焉居若耶山雲門寺一統志雲門寺在雲門山晉王獻之居此堂有五色祥雲詔建雲門寺我獨何為在泥滓謝靈運燕歌行余獨何為志無成北史魏長賢傳士之立身其路不一皆奮身於泥滓自致青雲青鞋布襪從此始列仙傳胡母班為太山府君齎書河伯河伯貽青絲履甚精巧晉令士卒百工履色無過緑青白奴婢履色無過純青說文襪足衣也東觀漢記和帝召諸儒魯平與賈逵黃香等相難平善對事罷朝特頒賜履襪髙適賦得還山吟送沈四山人還山吟管子夫鳥之飛也必還山集谷不還山則困晉書阮籍傳阮裕字思曠徵侍中不就還剡山有肥遁之志鮑照詩還山路已逺天髙日暮寒山深楚辭泬寥兮天髙而氣清陶潛詩清氣澄餘滓杳然天界髙左傳日云暮矣南史栁元景傳少時貧苦嘗下都至大雷日暮寒甚頗有羈旅之苦沈約詩佇立日已暮戚戚苦人腸江淹詩日暮山河清謝靈運詩桂樹凌寒山庾信詩寒山無物香又澗險無平石山深足細泉送君還山識君心晉書郭荷傳張祚遺以安車蒲輪送還張掖東山江淹賦送君南浦人生老大須恣意史記魏豹傳人生一世間如白駒過隙耳樂府少壯不努力老大徒傷悲揚雄解嘲矯翼勵翮恣意所存仲長統詩六合之內恣心所欲人事可遺何為局促看君解作一生事晉書畢卓傳右手持酒杯左手持蟹螯拍浮酒船中便足了一生矣陶潛詩所以貴我身豈不在一生南史張緒傳一生不解作諾又趙倫之傳於人間世事多所不解山間偃仰無不至楚辭采三秀兮山間王羲之詩時來誰不懷寄散山林間詩或棲遲偃仰道德指歸論傾側偃仰務合當世後漢書仲長統傳優遊偃仰可以自娛石泉淙淙若風雨楚辭飲石泉兮䕃松柏宋玉風賦泉涌湍於石間孫綽遊天台山賦石泉湧溜於隂渠說文淙淙水聲易潤之以風雨宋玉髙唐賦序湫兮如風淒兮如雨沈佺期詩暗谷疑風雨幽崖若鬼神桂花松子常滿地楚辭桂樹列兮紛敷吐紫華兮布葉嵇康詩微風動桂花梁昭明太子啓桂吐花於小山之上劉向列仙傳偓佺好食松實能飛行速如走馬以松子遺堯堯不能服初學記老松子色黃白味似粟可食嵩髙山記嵩嶽有大松採食其實得長生梁元帝與劉智藏書松子為餐蒲根是服何遜七召春花滿野地無行者賣藥囊中應有錢後漢書韓康傳常採藥名山賣於長安市口不二價又張霸傳霸中子楷家貧賣藥給食江淹詩韓公淪賣藥梅生隱市門神仙傳壺公入市賣藥口不二價其錢日收數萬便施與貧乏惟留三五十後漢書趙壺傳文籍雖滿腹不如一囊錢還山服藥又長年論衡凡人禀性身本自輕氣本自長中於風濕百病傷之故身重氣劣服食良藥身氣復故非本氣少身重得藥而乃氣長身更輕也魏志王粲傳注嵇康性好服食常採御上藥嵇康詩採藥鍾山隅服食改姿容黃帝中經養性者五常俱全百行周備雖絶藥餌足以遐年樂府主人服此藥身體日康疆魏武帝樂府思得神藥萬嵗為期沈約詩若䝉西山藥頽齡尚能度郭璞詩採藥遊名山將以救年頽抱朴子師言欲求長生當勤服大藥管子導血氣以求長年雲笈七籖赤蔣子輿不食百穀啖百花而長年白雲勸盡杯中物陶𢎞景詩山中何所有嶺上多白雲蕭子良與劉虬書素志與白雲同悠南史劉穆之傳今能見勸一杯酒不世說張翰曰使我有身後名何如一杯酒陶潛詩且進杯中物明月相隨何處眠謝莊月賦隔千里兮共明月朱超詩惟餘故樓月逺近必隨人徐陵文門前擾擾我且安眠樂府郎眠何處床眠時憶問醒時事沈約六憶詩憶眠時人眠彊未眠又夜聞長歎息知君心有憶夢魂可以相周旋韓非子六國時張敏與髙惠為友每相思不能得見敏於夢中往尋但至半途即迷不知路沈約詩夢中不識路何以慰相思莊子其夢也魂交其覺也形開何遜夜夢故人詩客心驚夜魂言與故人同南史張充傳通夢交魂推襟送抱江淹别賦知離夢之躑躅憶别魂之飛揚左傳左執鞭弭右屬櫜鞬以與君周旋世說我與我周旋久寧作我寄宿田家楊惲報孫㑹宗書田家作苦嵗時伏臘烹羊炮羔斗酒自勞應璩詩田家無所有酌醴焚枯魚何遜詩無為淹戚里見就還田家田家老翁住東陂魏文帝與吳質書行年已長大已成老翁張說詩誰念三千里江潭一老翁張衡南都賦於其陂澤則有鉗盧玉池赭陽東陂漢宫殿簿長安有東陂池西陂池說道平生隱在兹後漢書馬援傳援見公孫述以為當握手歡如平生嵇康絶交書時與親舊叙闊陳說平生莊子古之所謂隱士者非伏其身而不見也張華詩隱士託山林王康琚詩小隱隱陵藪大隱隱朝市阮瑀為曹公與孫權書良時在兹勗之而已王儉竟陵王山居贊濠梁在兹何事遐想蘇頲詩眷戀殊在兹鬢白未曽記日月後漢書岑彭傳每一發兵頭鬢為白晉書王獻之傳魏時凌雲殿榜未題而匠者誤釘之不可下乃使韋仲將懸橙書之比訖鬚鬢盡白世說顧愷之與簡文同年而髮早白帝問其故答曰松柏之姿經霜愈茂蒲柳之質望秋先零詩日居月諸左傳絳縣人曰臣小人也不知紀年臣生之嵗正月甲子朔四百有四十五甲子矣山青每到識春時何遜詩天暮逺山青潮去遙沙出陳子昂詩惟見逺山青盧照鄰喬君集序桂白山青宜王孫之攀折漢文帝詔方春時和草木萌生之物皆有以自樂陳子昂詩碧華映朱實攀折及春時門前種柳深成巷古西洲曲樹下即門前晉書陶潛傳潛少懷髙尚穎脫不羈嘗著五柳先生傳曰先生不知何許人不詳姓氏宅邊有五柳因以為號焉陶潛詩狗吠深巷中野谷流泉添入池說文泉出通川為谷詩相其隂陽觀其流泉班固西都賦原泉灌注陂池交屬魏收詩瀉溜髙齊嚮添池曲岸平牛壯日耕十畝地山海經稷之孫叔均始作牛耕詩十畝之間兮桑者閒閒兮人間常掃一茅茨陶潛傳刺史王𢎞造潛稱疾不見既而語人云我性不狎世因疾守閒豈敢以王公紆軫為榮耶謝靈運與廬陵王箋阮萬齡辭事就閒纂成先業南史馬樞傳鄱陽王為南徐州刺史欽其髙尚令使邀之築别室以處樞惡其崇麗乃於竹林間自營茅茨而居又何敬容傳築茅茨於鍾阜聊優游以卒嵗客來滿酌清尊酒易有不速之客三人來敬之終吉後漢書孔融傳舉北海相拜大中大夫性喜誘益後進賔客日盈其門嘗嘆曰坐上客常滿尊中酒不空吾無憂矣劉苞詩清尊久不荐淹留遂待君唐太宗詩清尊浮緑蟻雅曲韵朱弦王勃詩清尊湛不空暫喜平生接感興頻吟才子詩蔡雍琴賦曲引興兮繁弦撫文心雕龍摛風裁興藻詞譎喻楚辭立江介而長吟兮王僧達詩翰墨久謠吟晉書袁宏傳宏有逸才曽為咏史詩是其風情所寄謝尚鎮牛渚秋夜乘月微服泛江㑹宏在舫中諷詠聲既清新辭又藻拔遂駐聽久之遣問馬答云是袁臨汝郎誦詩即其詠史之作也巖際穴中藏鼹鼠何遜詩薄雲巖際宿孤月波中上史記趙奢傳秦伐韓軍於閼與趙奢曰道逺險狹猶兩鼠鬬於穴中將勇者勝莊子鼹鼠飲河不過滿腹鄧德明南康記鼹鼠一名隱鼠形如鼠而無尾黑色長鼻潭邊竹裏隱鸕鷀謝朓詩塘邊草雜紅何遜詩竹裏見螢飛爾雅鷀鷧注即鸕鷀也觜頭曲如鈎食魚村墟日落行人少庾信詩寒園星散居搖落小村墟鮑照詩日落嶺雲歸謝惠連詩落日隱櫩檻謝朓詩徘徊東陌上月出行人稀醉後無心怯路岐陶潛歸去來辭雲無心而出岫淮南子楊朱見岐路而泣之謂其可以南可以北也曹攄詩臨樂何所嘆素絲與路岐今夜只應還寄宿吳均詩今夜杯酒别明朝江水邊戰國策蘇子謂李兊曰今日臣之來也暮後郭門籍席無所得寄宿人田中明朝拂曙與君辭庾信詩明朝雲雨散何處更相尋又蓮帳寒檠窗拂曙岑參漁父莊子孔子絃歌鼓琴奏未半有漁父者下船而來楚辭漁父屈原既放遊於江潭行吟澤畔顔色憔悴形容枯槁漁父見而問之史記范睢傳吕尚之遇文王也身為漁父而釣於渭濵耳扁舟滄浪叟史記貨殖傳范蠡乘扁舟浮於江湖庾信賦吹落葉之扁舟飄長風於上流書嶓冢導漾東流為漢又東為滄浪之水寧戚飯牛歌滄浪之水白石粲陸機塘上行發藻玉臺下垂影滄浪泉心與滄浪清孟子滄浪之水清兮可以濯我纓劉協新論神恬心清則形無纍矣不自道鄉里論語夫子自道也周禮地官黨正一命齒於鄉里後漢書馬援傳使鄉里稱善人足矣晉書華談傳同郡劉項見之嘆曰不悟鄉里乃有如此才也無人知姓名吳越春秋子胥解百金之劒以贈漁父不受問其姓名不答南史漁父者不知姓名亦不知何許人朝從灘上飯左傳余姑剪滅此而後朝食史記韓信傳信從下鄉南昌亭長食亭長妻苦之乃晨炊蓐食食時信往不具食暮向蘆中宿吳越春秋伍員奔吳至江漁父渡之有飢色曰為子取餉子胥乃潛身深葦之中有頃父來歌而呼之曰蘆中人蘆中人豈非窮士乎郭璞江賦蘆人漁子擯落江山宋玉對楚王問暮宿於孟諸水經注朝發南鄭暮宿黑水劉琨詩朝發廣暮門暮宿丹水山歌竟還復歌陶潛詩歌竟長嘆息持此感人多隂鏗觀釣詩歌聲時斷續手持一竿竹晉書畢卓傳右手持酒杯左手持蟹螯詩籊籊竹竿以釣于淇魏文帝詩釣竿何珊珊漁父答孫緬歌竹竿籊籊河水浟浟竿頭釣絲長尺餘顔之推詩螳螂翳下偏難見翡翠竿頭絶易驚詩其釣維何維絲伊緡寧戚飯牛歌中有鯉魚長尺半沈約細言詩開館尺捶餘築榭微塵裏李嶠詩懸泉百尺餘鼓枻乘流無定居楚辭漁父莞爾而笑鼓枻而去注叩船舷也劉峻詩鼓枻浮大川賈誼鵩鳥賦乘流則逝兮得坻則止枚乘七發舊乘流而下降兮或不知其所止何遜詩單艫時向浦獨楫下乘流詩豈敢定居一月三捷魏書賀訥傳分土定居不聽遷徙世人那得識深意陸機賦世閲人而成世晉書王悅傳導嘗與悅奕棊爭道導笑曰相與有瓜葛那得爾謝靈運山居賦廢張左之艷辭尋臺皓之深意此翁取適非取魚漢書髙鳳傳潛心篤行屢辟不應以漁釣自適爾雅注取魚搖動之視其鮮餒魏志帝東征吳留譙宫時表留宿衛欲遏水取魚南史王𢎞之性好釣魚嘗垂綸於上虞江或問得魚賣否𢎞之曰釣亦不得得亦不賣又孫緬為尋陽太守見一漁父垂綸長嘯緬問有魚賣乎漁父笑曰其釣非釣寧賣魚者耶西亭子送李司馬唐書百官志上州刺史一人從三品司馬一人從五品下髙髙亭子郡城西詩無曰髙髙在上陟降厥士日監在兹曹植詩髙髙上無極天路安可窮直上千尺與雲齊孔稚圭北山移文度白雪以方潔干青雲而直上洛陽伽藍記宗正寺有剎髙十丈合去地一千尺古詩西北有髙樓上與浮雲齊謝朓詩兹山亘百里合沓與雲齊梁元帝春别詩日暮徙倚渭橋西正見流月與雲齊磐崖緣壁試攀躋磐崖按品彚作盤崖說文崖山邊也緣循也遊名山志石簣山緣崖而上髙百許丈摯虞思道賦攀招搖而上躋兮忽蹈廊而凌虛羣山向下飛鳥低木華海賦羣山既略百川潛泄鮑照舞鶴賦冰塞長河雪滿羣山易飛鳥遺之音不宜上宜下陶潛詩山氣日夕佳飛鳥相與還使君五馬天半嘶後漢書冦恂傳更始立使使者徇郡國恂曰使君建節銜命以臨四方古樂府使君從南來五馬立踟蹰詩素絲紕之良馬五之潘子真詩話天子六馬左右驂三公九卿駟馬左驂漢制九卿二千石亦右驂太守駟馬而已其有加秩中二千石乃右驂故以五馬為太守美稱遁齊閒覽云漢時朝臣出使為太守增一馬故曰五馬新序魏王將起中天臺許綰曰臣聞天與地相去萬五千里今王因而半之當起七千五百里之臺南史劉訏傳族祖孝標與書稱之曰超超越俗如天半朱霞王僧孺詩髙枝起天半說文嘶馬鳴也吳均詩日昏笳亂動天曙馬爭嘶絲繩玉壺為君提辛延年詩就我求清酒絲繩提玉壺沈君攸詩絲繩玉壺傳綺席劉伶酒德頌動則撡巵執觚行則挈榼提壺陶潛遊斜川詩提壺接賔侣引滿更勸酬坐來一望無端倪陳後主詩春江聊一望莊子反覆終始不知端倪謝靈運詩溟漲無端倪注端倪猶言涯際也紅花緑柳鶯亂啼司馬相如上林賦揚翠葉扤紫莖發紅華垂朱榮案古花字皆作華古桃葉歌桃葉映紅花江淹石榴頌縹葉翠萼紅花絳采謝靈運詩原隰荑緑柳虛囿散紅桃梁簡文帝詩鶯啼春欲駛無為空掩扉千家萬井連回溪說苑晏子方食君之使者至分食而食之使者反言之景公曰夫子之家若是其貧也令吏致千家之縣於晏子周禮方百里為一同積萬井其中漢書刑法志一同百里提封萬井枚乘七發依絶樞兮臨回溪謝靈運石門詩疏峯抗髙館對嶺臨回溪酒行未醉聞暮雞漢書髙五王傳朱虛侯章入侍燕飲髙后令為酒吏章自請曰臣將種也請以軍法行酒世說陳太丘詣荀朗陵荀使慈明行酒詩其未醉止威儀反反庾信春賦百丈山頭日欲斜三晡未醉莫還家詩曷至哉雞棲於塒日之夕矣牛羊下來列仙傳祝雞翁養雞千餘頭皆有名字暮宿樹上晝放散之㸃筆撡紙為君題江淹擬謝惠連詩㸃翰詠新賞開􅐆瑩所疑南史梁元帝紀雖戎略殷凑機務繁多軍書羽檄文章詔誥㸃毫便就殆不虛手潘嶽秋興賦序染翰撡紙慨然而