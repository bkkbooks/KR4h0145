body:
  text: 欽定四庫全書御選唐詩卷三十二七言絶句皇甫冉韋使君宅海榴詠本草海石榴高一二尺即結實淮陽卧理有清風輿地廣記淮陽縣在漢陵縣泗陽之間有淮陽城梁置淮陽郡史記汲黯傳拜為淮陽太守黯伏謝不受印上曰君薄淮陽耶吾今召君矣顧淮陽吏民不相得吾徒得君之重卧而治之阮籍詩萬載垂清風臘月榴花帶雪紅唐書歷志永昌元年十一月改元載初用周正以十二月為臘月建寅月為一月本草南中有四季榴四時開花秋月結實實方綻隨復開花孟浩然詩帶雪梅初暖梁元帝詠石榴詩花紅似舊栽閉閣寂寥常對此後漢書吳祐傳祐為太守民有爭訴者輒閉閣自責宋玉九辨寂寥兮收潦而水清庾信詩寂寥尋靜室李白詩對此可以酣高樓江湖心在數枝中南史隱逸傳徇江湖而永歸王融書迹塵圭組心逸江湖王維詩婆娑數枝樹秦系字公緒㑹稽人建中初客泉州結廬九日山上穴石為研注老子彌年不出自號為東海釣客山中贈耿湋拾遺數片荷衣不蔽身岑參詩對酒雲數片屈原九歌荷衣兮蕙帶江總詩荷衣步林泉束晳賦無衣褐以蔽身青山白鳥豈知貧高士傳韓順贊寧極青山謝朓詩還望青山郭詩白鳥翯翯西京雜記白鳥朱冠鼓翼池干吳象之詩家無四壁不知貧如今非是秦時世更隱桃花亦笑人杜甫詩飄泊到如今陶溍桃花源記晉太康中武陵人捕魚為業緣溪行忽逢桃花林林盡得一山從小口入行數十步土地平曠居人自云先世避秦時亂來此絶境不復出焉李白詩武陵桃花笑殺人戎昱寄許鍊師掃石焚香禮碧空李白詩掃石待歸月庾信賦復道焚香梁簡文帝詩朝光蕩碧空露華遍濕蕊珠宫劉孝威采蓮曲露華時濕釧西升經上清白闕丹城蕊珠宫如何說得天壇上萬里無雲月正中江總詩華嶽接天壇郭璞賦呼吸萬里吐納靈潮陶潛詩日暮天無雲王褒詠月詩中天影更遲衛象大歷間江南詩人官侍御古意鵲血雕弓濕未乾梁簡文帝艷歌篇控弦因鵲血詩敦弓既堅傳敦弓畫弓也敦與雕同劉溍詩木落雕弓燥左傳子孔子蟜曰與大國盟口血未乾而背之可乎鸊鵜新淬劍光寒本草鸊鵜小鳥也大如鳩鴨其膏塗刀劍不鏽劉長卿文吳鈎新淬隋煬帝樂府寶劍七星光遼東老將鬢成雪漢書地理志遼東郡秦置屬幽州隋煬帝詩秉旄仗節定遼東史記吳王濞傳王問計諸老將漢書趙充國傳充國年七十餘上老之使丙吉問誰可將者對曰無踰老臣者何遜詩雪鬢别關中猶向旄頭夜夜看史記天官書昴曰旄頭謝朓詩夜夜空佇立杜審言詩愁人獨夜看戴叔倫宿灌陽灘唐書地理志永州零陵郡縣灌陽蕭銑析湘源置武德七年省上元二年復置十月江邊蘆葉飛詩十月之交儲光羲詩路盡大江邊李白詩渺渺望湖水青青蘆葉齊灌陽灘冷上舟遲元和郡縣志永州灌陽縣灌水在縣西南一百二里曹植賦御輕舟而上溯杜甫詩幸有舟楫遲今朝未遇高風便詩以永今朝易弗遇過之阮卓詩高風應爽節荀仲舉樂府况復歸風便還與沙鷗宿水湄孟浩然詩離家復水宿相伴賴沙鷗謝靈運詩雖未登雲峯且以歡水宿詩所謂伊人在水之湄王粲詩相伴緑水湄送呂少府共醉流芳獨歸去崔曙詩陶然共醉菊花杯齊書樂志信星含曜秬草流芳晉書陶潛傳義興三年解印去縣乃賦歸去來辭故園高士日相親王冷然詩何時返故園史記魯仲連傳新垣衍曰吾聞魯仲連先生齊國之高士也􅏻迪詩來過竹里館日與道相親深山古路無楊栁王維詩深山何處鐘劉長􅫶詩古路無行客寒林獨見君詩昔我往矣楊栁依依三輔黃圖灞橋在長安東跨水作橋漢人送客至此橋折栁作别折取桐花寄逺人陸凱詩折梅逢驛使寄與隴頭人邢邵詩折花步淇水梁簡文帝詩取花爭問色禮記季春之月桐始華庾信賦序羔獻冰開桐華萍合書不寶逺物則逺人格李益早度破訥沙唐書地理志渡烏那水四十八里度庫結沙一曰普納沙破訥沙頭鴈正飛庾信賦沙頭渡水人謝朓賦星回窮紀沙雁相飛鸊鵜泉上戰初歸唐書地理志豐州西受降城北三百里有鸊鵜泉又中受降城正北如東八十里有呼延谷又五百里至鸊鵜泉人回紇傳貞觀中詔磧南鸊鵜泉之陽置過郵六十八所平明日出東南地漢書叔孫通傳先平明謁者治禮江淹雜體平明登雲峯杳與廬霍絶詩日出有曜古樂府日出東南隅滿磧寒光生鐵衣郡國志伊州鐵勒國多沙磧劉長卿詩初開窗閣寒光滿沈約白銅鞮歌蝶鞚飛塵起左右自生光木蘭歌寒光照鐵衣臨滹沱見蕃使列名漠南春色到滹沱後漢書烏桓傳漠南地空謝朓詩春色滿皇州河渠志滹沱河源於西山由真定深州乾寧與御河合流邊栁青青塞馬多王融詩北塞栁分枝王維詩客舍青青栁色新庾信詩塞馬暗嘶羣漢書西域傳天子以天馬多又外國使來益衆蒲陶目宿離宫館旁極望焉萬里江山今不閉後漢書班超傳此萬里侯相也梁昭明太子詩望望江山阻王融詩江山千里長禮記故外户而不閉漢家頻許郅支和史記太史公自序天子始建漢家之封漢書呼韓邪單于兄左賢王呼屠吾斯自立為郅支骨都侯單于在東邊又陳湯傳宣帝時呼韓邪單于與郅支單于俱遣子入侍史記律書願且堅邊設候結和通使夜上受降城聞笛唐書地理志豐州九原郡有東受降城中受降城西受降城景雲三年朔方軍總管張仁願築一統志東受降城在廢東勝州東北八里中受降城在大同府城西北五百里西受降城在古豐州西北八十里回樂峯前沙似雪舊唐書地理志靈州大都督府冇回樂縣拾遺記蓬山有浮筠之簳下有砂礰細如粉暴風至竹條翻起拂細砂如雪受降城外月如霜范雲詩撫戈金城外梁簡文帝望月詩形同七子鏡影類九秋霜不知何處吹蘆管庾信詩不知高幾里陶潛詩今復在何處岑參蘆管歌夜半高堂客未回秪將蘆管送君杯一夜征人盡望鄉高適詩借問落梅凡幾曲從風一夜滿關山陶潛詩勗哉征人在始思終梁武帝樂府陌頭征人去閨中女下機庾信詩回頭望鄉淚落從軍北征天山雪後海風寒漢書武帝紀天漢二年二師將軍三萬騎出酒泉與右賢王戰于天山注在西域蒲類國去長安八千餘里即祁連山也西域傳天山冬夏有雪鮑照詩瑟瑟凉海風蔡雍詩海水知天寒橫笛偏吹行路難沈約折楊栁歌下馬吹橫笛張正見詩還同橫笛吹蔡琰詩行路亦嗚咽晉書袁山松傳因舊歌有行路難乃文其辭每醉縱歌之磧裏征人三十萬說文沙漢曰磧岑參詩黃沙磧裏客行迷江總詩征人去逺芳音滅史記高祖紀與項羽决勝垓下淮隂侯將三十萬之衆自當之一時回首月中看司馬相如文回首面內蘇頲詩無異月中看劉禹錫隄上行酒旗相望大堤頭曹植賦仰酒旗之景曜李賀詩試問酒旗歌板地庾信文何處相望山邊一樓劉誕詩朝發襄陽城暮至大堤宿堤下連檣堤上樓李白詩佳期大堤下郭璞賦舳艫相屬萬里連檣何遜詩夕霞隱連檣梁簡文帝詩誰知堤上人孟浩然詩應聞池上樓日暮行人爭渡急南史栁元景傳嘗下都至大雷日暮寒甚沈約詩佇立日巳暮梁元帝詩欲覔行人寄消息庾信賦擁河橋而爭渡槳聲幽軋滿中流古樂府艇子打兩槳曹植孟冬篇乘輿啓行鸞鳴幽軋史記周本紀武王渡河中流白魚躍入王舟中二江南江北望烟波古江南詞江南可採蓮宋之問詩鄉連江北樹江總詩日向烟波長入夜行人相應歌埤雅鸞入夜而歌庾信詩行人忽枉道易同聲相應韓詩外傳音樂相和物類相感同聲相應之義也淮南子叩盆拊瓴相和而歌桃葉傳情竹枝怨方輿勝覽桃葉渡在秦淮口古今樂録桃葉歌王子敬所作也桃葉子敬妾名緣于篤愛所以歌之獻之歌桃葉復桃葉渡江不用楫但渡無所苦我自迎接汝嵇康文接物傳情區别有屬禹錫本集竹枝序竹枝巴歈也巴兒聨歌吹短笛擊鼓以赴節歌者揚袂睢舞其音協黃鍾羽末如吳聲含思宛轉有淇濮之艷焉水流無限月明多張華詩仰䕃高林茂俯臨渌水流梁武帝詩連山去無限長洲望不極子夜歌天高星月明韓愈詩一年明月今宵多楊栁枝詞城外春風吹酒旗庾肩吾詩影出朱城外梁簡文帝詩春風本自奇楊栁最相宜庾信詩春風滿路香陽休之詩微穆東風吹孔融文天垂酒旗之曜行人揮袂日西時何遜詩寂寂行人疏曹植七啓揮袂則九野生風阮籍詩揮袂撫長劍仰觀浮雲征李山甫詩石磴坐來春日西長安陌上無窮樹漢書地理志京兆尹縣長安三輔黃圖長安有九市八街九陌徐陵文陌上成隂淮南子逰於無窮之地李義府詩上林無限樹唯有垂楊管别離三輔黃圖長楊宫中有垂楊數畝李白賦醉愁心于垂楊隨柔條以糾結楚辭悲莫悲兮生别離蔡凝詩似有别離情宿都亭有懷禹錫自注元和甲午嵗詔書盡徴江湘逐客余自武陵赴京宿於都亭有懷續來諸君子雷雨湘江起卧龍易雷雨作而百果草木皆甲坼晉書陶侃傳少時漁得織梭以挂于壁有頃雷雨自化為龍而去水經注湘水出零陵陽海山三國志徐庶謂先主曰諸葛孔明卧龍也武陵樵客躡仙蹤王維桃源行樵客初傳漢姓名蔡雍文所立卓爾度躡雲蹤張九齡詩還慙大隱迹空想列仙蹤十年楚水楓林下舊唐書禹錫居朗州十年惟以文章吟咏陶冶情性山海經數歷之山楚水出焉阮籍詩上有楓樹林今夜初聞長樂鐘庾信詩今夜長門月應如晝日明杜甫詩初來葉上聞三輔黃圖長樂宫本秦興樂宫也高皇帝始居櫟陽七年長樂宫成徙居之與歌者何戡盧氏雜說何戡樂工也二十餘年别帝京漢書霍光傳出入禁闥二十餘年梁鴻五噫歇顧瞻帝京弓重聞天樂不勝情張衡賦昔者大帝悅秦繆公而覲之饗以鈞天廣樂何妥詩天樂非鐘鼓漢書王嘉傳小人不勝情舊人唯有何戡在書古我先生亦惟圖任舊人共政更與殷勤唱渭城曹植詩何必同衾禱然後展殷勤司馬遷書未嘗銜杯酒接殷勤之餘歡王維詩渭城朝雨浥輕塵客舍青青栁色新勸君更進一杯酒西出陽關無故人烏衣巷一統志烏衣巷在應天府南晉王導謝安居此巷其子弟皆烏衣因名巷口有朱雀橋朱雀橋邊野草花六朝事迹晉咸康二年作朱雀門新立朱雀浮航在縣城東南四里對朱雀門南渡淮水亦名朱雀橋李雍詩織女橋邊烏鵲起古起白露霑野草史記李斯傳秋霜降者草花落烏衣巷口日將斜虞世南詩日斜青瑣第舊時王謝堂前燕南史陳顯達傳麈尾蠅拂是王謝家物樂府翩翩堂前燕冬藏夏來見飛入尋常百姓家賈誼文彼尋常之汙瀆潘尼賦勳績著乎百姓張籍玉山館長溪新雨色如泥任昉詩長溪水東舍江總詩新雨百花朝野水隂雲盡向西管子食野草飲野水李頎詩隂雲帶殘日又灞水向西看楚客天南行漸逺戰國䇿秦王謂甘茂曰楚客來使者多健與寡人爭辭高適詩南天瘴癘和王維詩望望行漸逺山山樹裏鷓鴣啼庾信銘樹裏閒歌枝中見舞廣志鷓鴣似雌雉飛但徂南不北也禽經鷓鴣飛必南翥别客青山歷歷水悠悠虞世南詩青山淡晚烟古詩衆星何歷歷左思賦直衝濤而上瀨常沛沛以悠悠江淹詩悠悠清川水今日相逢明月秋莊子今日晏閒敢問至道王績詩相逢秋月滿江淹詩冏冏秋月明繫馬城邊楊栁樹庾信賦小山則叢桂留人扶風則長松繫馬王維詩小苑城邊獵騎回劉庭芝詩可憐揚栁傷心樹為君沽酒暫淹留劉希夷詩為君留青青賀知章詩莫漫愁沽酒謝靈運賦停余舟而淹留秋山秋山無雲復無風杜甫詩吹笛秋山風月清江洪詩逺山清無雲陶潛詩日暮天無雲庾信詩無風樹即正溪頭看月出深松王績詩更坐北溪頭詩月出皎兮王維詩色靜深松裏草堂不閉石牀靜北山移文草堂之靈