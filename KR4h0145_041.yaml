路倒枯松蘿深境靜日欲落儲先羲詩澗淨緑蘿深孟郊詩冷然諸境靜王維詩清歌邀落日石上未眠聞曉鐘杜甫詩請看石上藤蘿月孔德紹詩臨風聽曉鐘杜牧江楚鄉寒食橘花時宋之問詩晚泊投楚鄉徐陵書歸雁銜蘆多經寒食齊民要術異物志曰橘樹白花而赤實梁簡文帝詩城風泛橘花野渡臨風駐綵旗李嘉祐詩緑楊垂野渡江淹詩臨風默含情東觀漢紀段熲為并州刺史曲蓋綵旗草色連雲人去住江淹詩草色斂窮水木葉變吳川潘嶽賦序高閣連雲杜甫詩去住彼此無消息水紋如縠燕參差韓愈詩水紋浮枕簟錢起詩縠紋江水縣前流詩燕燕于飛差池其羽陸倕賦弄差池之春燕沈約詩趙帶飛參差許渾守風淮隂遙見江隂夜漁客鮑照詩延頸望江隂水經注宓子賤治單父孔子使巫馬期觀焉見夜漁者問曰子得魚輒放何也謝朓詩良宰勗夜漁因思江口釣魚時張說詩舊館分江口莊子旦旦而釣期年不得魚列仙傳陵陽子明者釣鄉人也好釣魚于延溪一潭明月萬株栁岑參詩光搖一潭碎古詩明月皎夜光舊唐書裴度傳于午橋創别墅花木萬株自去自來人不知杜甫詩自去自來梁上燕崔皓詩若問傍人那得知李羣玉寄友野水晴山雪後時管子食野草飲野水庾信詩山晴雲倒回梁簡文帝詩雪後桂枝殘獨行村落更相思詩獨行睘睘史記聶政傳獨行仗劍至韓又所居成聚注聚謂村落也古詩著以長相思緣以結不解無因一向溪頭醉古詩還思故鄉里欲歸道無因王績詩歸來南陌上更坐北溪頭處處寒香映酒旗戴叔倫詩老圃寒香别冇秋張載賦擬酒旗于𤣥象白居易詩紅板江橋青酒旗唐彥謙賀李昌時禁苑新命振鷺翔鸞集禁闈詩振振鷺鷺于飛後漢書蔡雍傳鴻漸盈階振鷺充庭孫綽賦覿翔鸞之裔裔范泰詩神鸞棲高梧爰翔雲漢際後漢書周舉傳在禁闈有密靜之風應璩書入侍華幄出典禁闈玉堂珠樹瑩風儀史記武帝紀奉液池南有玉堂夢溪筆談唐翰林院在禁中乃人主燕居之所玉堂承明金鑾殿皆在其中山海經三珠樹在厭火北赤水上其樹如柏葉皆為珠唐書王勃傳初勔劇勃皆著才名故杜易簡稱三珠樹王儉文風儀與秋月齊明音徽與春雲等潤不知新到靈和殿張緒何如栁一枝南史張緒傳劉悛之為益州刺史獻蜀栁數株狀若絲縷武帝植於太昌靈和殿前常玩賞咨嗟曰此栁風流可愛似張緒當年時張蠙龜山寺晚望四面湖光絶路岐江總詩海樹一邊出雲山四面通淮南子楊朱見路岐而泣為其可以南可以北梁簡文帝詩行行異沂海依依别路岐鸊鵜飛處暮鐘時方言野鳬其小而好沒水中者南楚謂之鸊鵜杜甫詩騎馬行春徑衣冠起暮鐘漁舟不用懸帆席顔氏家訓伍貟之托漁舟季布之入廣栁謝靈運詩揚帆採石華挂席拾海月歸去乘風插栁枝陶潛歸去來辭歸去來兮田園將蕪胡不歸南史宗慤傳願乘長風破萬里浪古樂府上馬不執鞭反拗楊栁枝徐寅字昭夢甫田人登乾寧進士第授祕書省正字歸隱延夀溪著有探龍釣磯二集初夏戲題長養薰風拂曉吹太公金匱六月天務覆施地務長養詩飄風自南箋回風從長養之方入之吕氏春秋風有八等炎風滔風熏風巨風凄風飂風厲風寒風武后詩莫待曉風吹漸開荷芰落薔薇陸厥詩荷芰始參差白居易詩岸落薔薇水浸莎青蟲也學莊周夢化作南園蛺蝶飛爾雅翼蝶物之善化者今菜中青蟲當春時行緣屋壁或草木上以絲自固一夕視之有圭角六七日其背罅裂蛻為蝶出矣莊子昔者莊周夢為蝴蝶栩栩然蝴蝶也俄而覺則蘧蘧然周也不知周之夢為蝴蝶與蝴蝶之夢為周與張協詩蝴蝶飛南園李賀南園春水初生乳燕飛陶潛詩春水滿四澤鮑照詩乳燕逐草蟲詩燕燕于飛差池其羽黃蜂小尾撲花歸鮑照詩巢蜂拾花萼爾雅翼蜂一日兩出其出採花取花鬚上粉置兩髀或採無所得經宿花中不敢歸窗含逺色通書幌庾肩吾詩窗含度水風薛道衡詩高天澄逺色梁簡文帝書特設書幌乍置筆牀梁元帝賦乃息書幌之勞以命北園之駕魚擁香鈎近石磯吕氏春秋善釣者出魚乎千仞之下餌香也拾遺記以香金為鈎錢起詩奔流翻石磯吉師老爵里無考鴛鴦江島濛濛烟靄微岑參詩誰念在江島何遜詩濛濛夕烟起顔延之文晨烟暮靄宋之問詩江空潭靄微緑蕪深處刷毛衣王維詩平蕪緑兮千里宋之間詩白鷴愁暮刷毛衣渡頭驚起一雙去梁簡文帝鳥栖曲採蓮渡頭擬黃河祖珽詩白鷴乍驚起杜牧詩驚起鴛鴦豈無恨一雙飛去却回頭飛上文君舊錦機史記司馬相如傳臨卭卓王孫有女文君好音相如以琴心挑之夜奔相如溫庭筠詩文君織得春機紅梁元帝鴛鴦賦文連新錦之機唐彥謙野竹蝶戀晚花終不去司空曙詩戀花同野蝶何遜詩幽蝶弄晚花李白詩白鷗閒不去鷗逢春水固難飛孟浩然詩離家復水宿相伴賴沙鷗杜甫詩舍南舍北皆春水但見羣鷗日日來劉長卿詩月明見潮上江靜覺鷗飛野人心地都無著王李友詩野人宿在人家少李頎詩頓令心地欲皈依劉長卿詩羣動心有營孤雲意無著伴蝶隨鷗亦不歸孟浩然詩且隨波上鷗詩式微式微胡不歸韋莊稻田緑波春浪滿平陂曹植賦遂乃背通谷對緑波藉文茵翳春華劉禹錫詩無奈晚來時清淮春浪軟鄭畋詩花實接平陂極目連雲䆉稏肥王粲賦平原逺而極目兮蔽荆山之高岑庾肩吾詩棧閣自連雲杜牧詩䆉稏百頃田西風吹半橫更被鷺鷀千㸃雪杜甫詩一行白鷺上青天岑參詩閒卧對鸕鷀李白五雲歌瑶臺雪花數千㸃破烟來入畫屏飛虞世南詩飛來雙白鶴奮翼逺凌烟江淹賦曲帳畫屏素女綵扇無名氏粉箋題詩三月江南花滿枝蕭慤詩三月春風已復流丘遲書暮春三月江南草長雜花生樹羣鶯亂飛爾雅江南曰揚州劉孝威詩猶見動花枝沈約詩流鶯復滿枝風輕簾幕燕爭飛梁簡文帝詩今與夕風輕劉孝威詩徒想御風輕釋名簾廉也自鄣蔽為亷恥也又幕幕絡也隋煬帝詩窺簷燕爭入梁簡文帝詩新燕向窗飛遊人休惜夜秉燭沈約樂府旅遊媚年春年春媚遊人魏文帝書年益過往何可攀援古人秉燭夜逰良有以也古詩何不秉燭逰楊栁陰濃春欲歸古樂府暫出白門前楊栁可藏烏梁簡文帝詩葉濃知栁密庾信賦宜春苑中春已歸杜甫解悶草閣柴扉星散居說苑繩樞草舍聊庇風雨范雲詩冇客欵柴扉劉琨書翕爾雲合忽復星散浪翻江黑雨飛初駱賓王詩驚風湍浪翻謝朓詩朔風吹飛雨蕭條江上來山禽引子哺紅果張正見詩夏户響山禽易林鳥鳴呼子哺以酒脯李嶠詩樹紅山果熟溪友得錢留白魚東觀漢紀趙勤從人貸錢或曰汝起拜即與勤曰拜汝得錢非義終不拜水經注聖水有白魚出穴數日而返人有採捕食之者美珍奇味裴夷直晚凉簷前蔽日多高樹江淹詩簷前還燕拂後漢書丁鴻傳干霄蔽日之木陸雲詩雞鳴高樹巔竹下添池有小渠晉書王徽之傳吳中一士大夫家有好竹徽之欲觀之競造竹下諷咏良久魏收詩添池曲岸平王勃詩平隄夾小渠山客野僧歸去後王維詩鳥啼山客猶眠張籍詩居貧多見野僧招陶潛詩歸去來山中晚凉移案獨臨書駱賓王詩全螢照晚凉張籍詩閒對臨書案薛能折楊栁窗外齊垂旭日初張正見詩三陽弱栁垂詩旭日始旦許景先折栁篇春樓初日照南隅柔條垂緑掃金鋪樓邊輕暖好風徐梁元帝詩楊栁非花樹依樓自覺春左思詩輕粧喜樓邊魏文帝栁賦景風扇而增暖陶潛詩好風與之俱游人莫道栽無益沈約玩庭栁詩逰人未應去為此還故鄉書不作無益害有益功乃成桃李清隂却不如詩華如桃李楊汝士詩桃李清陰在鯉庭楊憑詩江岸梅花雪不如獨孤及垂花塢醉後戲題并序莊周臺南十許步有丘一成明一統志莊周臺在開元寺後亦名逍遙臺唐刺史梁延嗣所築仍置祠刻像于其上廣雅小陵曰丘爾雅丘一成為敦丘左傳有田一成注方十里曰成上有樛藤垂花名勝志逍遙臺南冇樛藤二株東西相向垂花甚盛刺史獨孤及甚愛之命曰垂花塢而蔓草荒之且隔大溝路不可陟道士張太和伐薪為堰封土以壅澮正韻堰壅水也釋名水注溝曰澮余亦命雉氏治蕪穢而剗宿莽周禮秋官司冦剃氏掌殺草遂闢為登賦之位位廣二席席間足以函尊酒二簋漢書藝文志登高能賦可以為大夫易尊酒簋二用缶納約自牖又二簋可用享三月戊子及羣英由堰而升焉諸花倒垂下拂杯案紫葩縭縰如叉如旒衆君子瞻弄之不足故秉燭進酒李白宴桃李園序古人秉燭夜逰良有以也以繼落日欲稱醉而不能也因命其地曰垂花塢堰曰緣花堰亦飾之以詩云紫蔓青條拂酒壺杜審言詩牽風紫蔓長張翰詩青條若總翠詩清酒百壺庾信詩開君一壺酒細酌對春風落花時與竹風俱庾信賦落花與芝蓋同飛隋煬帝詩颯灑林花落劉孝先詩竹風聲若雨陶潛詩好風與之俱歸時自負花前醉盧思道採蓮曲菱歌惜不唱須待暝歸時後漢書梁竦傳自負其才薛道衡詩思發在花前笑向鯈魚問樂無山海經芘湖之水中多鯈魚食之可以忘憂莊子莊子與惠子逰于濠梁之上莊子曰鯈魚出遊從容是魚樂也惠子曰子非魚安知魚之樂莊子曰子非我安知我不知魚之樂顧况宫詞禁栁烟中聞曉烏南史張緒傳劉悛之為益州獻蜀栁數株武帝以植于靈和殿前李白詩緑栁結烟垂裊風吳均詩千門萬戶不知曙唯聞啞啞城上烏康孟咏日詩金烏升曉氣風吹玉漏盡銅壺梁昭明太子詩靡靡祥風吹宗楚客詩玉漏與年長崔液詩玉漏銀壺且莫催獨斷夜漏盡鼓鳴則起晝漏盡鐘鳴則息內官先向蓬萊殿國語內官不過九御魏志后妃傳序漢志內宮十有四等雍録大明宫含元殿北為宣政宣政之北為紫宸其北為蓬萊殿金合開香瀉御爐吳均詩博山爐中百和香李庾賦傳全爐之御烟韓愈蒲萄新莖未遍半猶枯潘嶽賦初莖蔚其曜新抱朴子一條之枯無損繁林之蓊藹高架支離倒復扶齊民要術蒲萄蔓延性緣不能自舉作架以承之葉密隂厚可以避熱左思賦朱桷森布而支離曹坰文枝葉相扶若欲滿盤堆馬乳北齊書李元忠傳元忠貢世宗蒲萄一盤世宗報以百縑蜀本圖經本草蒲萄子紫白二色又有似馬乳者莫辭添竹引龍鬚南史徐伯珍傳九巖山後漢龍丘萇隱處也山多龍鬚柳柏望之五采伯珍移居之張祜櫻桃石榴未拆梅猶小曹植詩石榴植前庭緑葉搖縹青夏侯湛賦覽華圃之嘉樹兮羡石榴之奇生王維詩夕雨紅榴拆愛此山花四五株韋應物詩清晨止亭下獨愛此幽篁徐陵詩山花臨舞席庾信詩山花焰火然齊書祥瑞志永明八年巴陵郡樹連理四株江總賦垂楊五株斜日庭前風裊裊梁簡文帝詩斜日晚駸駸范雲詩乃鑒長林曲有浚廣庭前徐伯陽詩圓籠裊裊挂青絲碧油千片漏紅珠元稹詩窗紙碧油糊白居易詩千片赤英霞爛爛又櫻桃子綴小紅珠李商隱雞稻粱猶足活諸雛詩黍稷稻粱杜甫詩君看隨楊雁各有稻粱謀方言爵子及雞雛皆謂之􅙿妬敵專場好自娛劉孝威鬬雞篇丹雞翠翼張妒敵得專場應瑒鬬雞詩專場驅衆敵剛捷逸等羣潘嶽賦且逰釣以自娛可要五更驚曉夢漢宮儀夜漏起中黃門持五更甲夜畢傳乙乙夜畢傳丙丙夜畢傳丁丁夜畢傳戊戊夜畢是為五更梁簡文帝文法雷驚夢慧日暉朝不辭風雪為陽烏古詩前日風雪中故人從此去春秋元命苞日中有三足烏者陽精也春秋說題辭雞為積陽南方之象火陽精日炎上故陽出雞鳴以類感也注離為日積陽之象也日將出預喜於類見而鳴也梁簡文帝詩回扇避陽烏庾肩吾詩陽烏一展翅千里定非虛薛濤字洪度長安良家女隨父宦流落蜀中遂入樂籍辨慧工詩冇林下風致韋臯鎮蜀召令侍酒賦詩稱為女校書出入幕府暮年屏居浣花溪著女冠服好製松花小箋時號薛濤箋酬雍才貽巴峽圖一統志四川重慶府巴縣周巴子國秦置巴郡輿地志巴陵楚地有三峽水經注漁者歌曰巴東三峽巫峽長千疊雲峯萬頃湖杜甫詩雲山千萬疊鮑照詩霽旦見雲峯岑參詩澄湖萬頃深見底水經注江之左岸溪水伏流內通南浦故縣陂湖其地平曠有湖澤中有菱芡鯽雁不異外江凡此等物皆入峽所無白波分去繞荆吳莊子白波若山水經注白波奮流自成潭渚漢書諸侯王表東帶江湖薄㑹稽為荆吳感君識我枕流意張籍詩感君綢繆意世說孫子荆語王武子當枕石潄流誤曰潄石枕流王曰流可枕石可潄乎孫曰所以枕流欲洗其耳所以潄石欲礪其齒重示瞿塘峽口圖水經注峽中有瞿塘黃龍二峽夏水回復沿泝所忌寰宇記瞿塘在䕫州東一里連崖千丈奔流電激舟人為之恐懼楊巨源灞岸栁水經注灞水左合滻水歷白鹿原東即灞川之西故芷陽矣三輔黃圖灞水出藍田谷西北入渭又霸橋在長安東漢人送客至此橋折栁贈别楊栁含烟灞岸春詩楊栁依依梁武帝詩君如東扶景妾似西栁烟梁元帝賦登樓一望惟見逺樹含烟年年攀折為行人江總詩無奈年年别古詩攀條折其榮樂府都護三年不歸折盡江邊楊栁江淹詩行人咸息駕何遜詩寂寂行人疏好風儻借低枝便陶潛詩微雨從東來好風與之俱北山移文乍低枝而掃迹莫遣青絲掃路塵王褒詩岸栁被青絲潘嶽賦甸師清畿野廬掃路唐太宗詩舞接花間燕歌迎鳥路塵城東早春詩家清景在新春杜甫詩吾人詩家秀博采世上名李白詩清景南樓夜風流在武昌王褒詩細栁發新春緑栁才黃半未勻孫綽詩縹片映流緑栁䕃坂謝靈運詩原隰荑緑栁墟囿散紅桃張說詩拂黃先變栁若待上林花似錦漢書東方朔傳上使吾丘夀王舉籍阿城以南盩厔以東宜春以西欲除以為上林苑屬之南山李爽詩春至花如錦出門俱是看花人易出門交有功江逌詩出門誰氏子何遜詩對影獨含笑看花時轉側鮑溶漢宫詞月映東窗似玉輪謝靈運詩亭亭曉月映陶潛詩有酒有酒閒飲東窗駱賓王詩玉輪涵地開劍匣連星起未央前殿絶聲塵雍録翼奉曰孝文時未央宫無高門麒麟之殿獨有前殿曲臺漸臺溫室承明耳梁簡文帝詩喧塵是時息曹植七啓飛聲激塵宫槐花落西風起爾雅守宫槐葉晝聶宵炕庾肩吾詩井梧生未合宫槐卷復稀宋子侯詩纎手折其枝花落何飄揚梁元帝纂要西風曰泰風鸚鵡驚寒夜喚人禮記鸚鵡能言不離飛鳥王勃序雁陳驚寒施肩吾字希聖洪州人元和十年登第隱洪州之西山為詩奇麗春日餐霞閣灑水初晴物候新陸機演連珠臣聞因雲灑潤則芬澤易流潘嶽賦微雨新晴六合清朗楊炯序平看日月唐都之物候可知餐霞閣上最宜春列仙傳贊子輿拔俗餐霞飲露顔延之詩中散不偶世本自餐霞人荆楚嵗時記立春日剪綵為燕戴之貼宜春字傅咸賦著宜春之嘉祉山花四面風吹入徐陵詩山花臨舞席水影照歌牀謝朓詩四面動清風詩籜兮籜兮風其吹女庾信詩落花何假拂風吹㑹併來為我鋪牀作錦茵朱超詩藁濕鋪牀冷開元天寶遺事學士許慎宴花圃未嘗具幄設坐使童僕聚落花鋪坐下曰吾自有花茵杜甫詩後來鞍馬何逡巡當軒下馬入錦茵雍陶春詠風惱花枝不耐頻梁簡文帝詩風散花兮傳馨香劉孝威詩隔牆花半隱猶見動花枝謝朓詩花枝聚如雪等閒飛落易愁人張謂詩心中萬事如等閒李孝貞詩羞見落花飛梁簡文帝賦裁紅㸃翠愁人心殷勤最是章臺栁徐陵詩此日乍殷勤漢書張敞走馬章臺街事文類聚張敞走馬街有栁唐時謂之章臺栁一樹千條管帶春賀知章詠栁詩碧玉裝成一樹高萬條垂下緑絲縧沈佺期詩楊栁千條花欲綻李羣玉書院二小松一雙幽色出凡塵杜甫詠松詩幽色幸秀拔孔稚圭北山移文耿介絶俗之標蕭灑出塵之想數粒秋烟二尺鱗李賀五粒小松歌蛇子蛇孫鱗蜿蜒新香幾粒洪崖飯盧照鄰詩長薄秋烟起從此靜窗聞細韻韓翃詩綺窗夜閉玉堂靜陸機演連珠赴曲之音洪細入韻琴聲長伴讀書人劉孝綽詩好聽雅琴聲庾信詩琴聲遍屋裡白居易詩共琴為老伴劉禹錫詩却為精舍讀書人胡釘鉸雲溪友議鄭曲有胡生者家貧落魄為釘鉸之業但遇甘果茶醖輒祭列禦冦以求聰悟歷稔忽夢一人劃開其腹將書一副置之覺而吟詠綺美不由師授小兒垂釣蓬頭稚子學垂綸庾信賦蓬頭王霸之子陶潛歸去來辭稚子候門庾信詩垂綸在渭川倒坐莓苔草映身杜甫詩隨意坐莓苔孫綽賦踐莓苔之滑石路人借問遙招手蘇武詩誰為行路人占雜歌謡辭借問行人歸不歸詩招招舟子箋以手曰招王季友詩再三招手起來遲恐畏魚驚不應人虞世南詩恐畏無人識何遜詩水淺見魚驚漢書齊武王縯傳伯升笑而不應韓愈詩問我我不應孫魴字伯魚南昌人從鄭谷為詩頗得鄭體事吳為宗正郎與沈彬李建勳友善楊栁枝詞靈和風暖太昌春南史張緒傳劉悛為益州獻蜀栁數株枝條甚長狀若絲縷武帝以植于太昌靈和殿前曰此楊栁風流可愛似張緒當年時鮑照詩風暖凌開舞線搖絲向昔人范雲詩春風栁線長王褒詩岸栁被青絲王羲之蘭亭序每覽昔人興感之由何似曉來江雨後世說白雪紛紛何所似宋之問詩江雨入庭飛王維詩空山新雨後一行如畫隔遙津錢起詩憐君綴一行李白詩江城如畫裏郎士元贈強山人或棹輕舟或杖藜陶潛歸去來辭或命巾車或棹孤舟戰國䇿乘夏水浮輕舟史記留侯世家注黃石公鬚眉皆白杖丹藜履赤舄尋常適意釣前溪晉書文士張翰傳人生貴適意爾傅休奕賦和神適意李白詩閒垂一溪釣房篆詩前溪流碧水後渚映青天草堂竹徑在何處北山移文鍾山之英草堂之靈梁昭明太子啓追