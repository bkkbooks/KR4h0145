茫嵗欲晚梁簡文帝招真館碑旭日晨臨同迎若華之色夕陽斜影俱成拂鏡之暉鶴巢松樹遍神境記滎陽郡南有石室室後有孤松千丈常有雙鶴晨必接翮夕輙偶影說文鶴似鵠長喙陸機詩䟽黄鶴古人嘗言之又多言鵠鵠即是鶴音之轉庾信詩短松猶百尺少鶴已千年又鵠巢堪煉石蜂房得煮金徐陵雙林寺碑百紀遊龜皆登蓮葉千齡夀鶴或舞松枝庾信詩栢谷移松樹人訪蓽門稀陳子昻詩聞鶯忽相訪題鳯久徘徊杜預論水利䟽徃者東南草創人稀故得水田之利十洲記巨海中有十洲乃人跡所稀絶處左傳蓽門閨竇之人注蓽門柴門閨竇小户上鋭下方狀如圭也緑竹含新粉張協詩浮陽暎翠林迴颷扇緑竹謝朓杜若賦䕃緑竹以淹留藉幽蘭而容與徐陵詩嫩竹猶含粉初荷未聚塵紅連落故衣謝朓詩細蓮搖弱荇丹藤繞新竹梁簡文帝詠蛺蝶詩翠鬛藏髙栁紅蓮拂水衣庾信詩槐庭垂緑穂蓮浦落紅衣又蓮衣落夏蕖渡頭烟火起梁簡文帝烏栖曲採蓮渡頭擬黄河張九齡詩萬井縁津渚千艘咽渡頭列子庖厨之下不絶烟火史記律書天下殷富粟至十餘錢鳴雞吠犬烟火萬家江淹詩歸人望烟火范雲詩江干逺樹浮天末孤烟起王褒詩漠漠樹烟起處處採菱歸梁元帝詩處處春芳動日日春禽變蔡凝賦得處處春雲生詩春色遍空明春雲處處生廣韻蓤芰也通作菱西京雜記太液池中有採蔆舟劉勰新論伏臘合歡必歌採蔆七命榜人奏採蔆之歌謝靈運詩採蔆調易急江南歌不緩孟浩然尋白鶴巖張子容隱居才子傳張子容襄陽人與孟浩然同隱鹿門山開元二年擢進士第為樂城令白鶴青巖畔沈約赤松澗詩何時當來還延佇青巖裏楊師道青巖類姑射碧澗似汾陽幽人有隱居陸機幽人賦世有幽人漁釣乎𤣥渚陶潛詩鳯隱於林幽人在丘論語隱居放言梁書陶𢎞景傳止於句容之句曲山中山立館自號華陽隱居堦庭空水石晉書羅含傳含致仕還堦庭忽蘭菊叢生曹植詩閑房何寂寞緑草被堦庭庾信賦堦庭空谷門巷蒲輪水經注靈石臨江壁立霞駁有若繪焉水石驚湍傳響不絶宋書隐逸傳論巖壑閑逺水石清華林壑罷樵漁謝靈運詩林壑歛暝色雲霞收夕霏沈約賦挹林壑之清曠劉孝勝詩林壑秋籟急傅亮賦嗣良頌於多稔兆嘉夢於樵漁孔魚詩蘭澤伴樵漁嵗月青松老古詩思君令人老嵗月忽已晚梁簡文帝詩酒闌時節久桃生歲月稀郭璞賦青松冠谷赤羅繡嶺江淹詩青松挺秀萼風霜苦竹疎枚乘賦弱絲青管與風霜而共凋支遁詩玉質凌風霜凄凄厲清趣齊民要術竹之醜者有四曰青苦白苦紫苦黄苦竹譜苦竹有白有紫而味苦覩兹懐舊業晉書桓温傳自永嘉之亂播遷江表者請一切北徙以實河南資其舊業反其宅宇謝靈運詩舊業臨海外蕪穢寄頺齡携䇿返吾廬陶潛詩良辰入竒懐挈䇿還西廬又詩衆鳥欣有託吾亦愛吾廬劉孝綽詩時時釋簿領鳴騶入吾廬宋之問夀陽王花燭圗案夀陽王無考劉孝綽贈美人詩欲寄同花燭為照遙相思庾信詩洞房花燭明燕餘雙舞輕仙媛乗龍日詩展如之人兮邦之媛也崔駰㛰禮結言爰定天綱夫婦作始乃降英媛有淑其儀說文媛美女也初學記黄尚為司徒與李元禮俱娶太尉桓焉女時人為桓叔元兩女俱乗龍言得壻如龍也天孫捧鴈來博物志泰山一曰天孫言為天帝孫也詩雝雝鳴鴈旭日始旦箋鴈者隨陽而處似婦人從夫故昏禮用焉䟽鴈生執之以行禮故言鴈聲六禮惟納徵用幣餘皆用鴈也可憐桃李徑陶潛讀山海經詩翩翩三青鳥毛色竒可憐世說孫綽種一株松恒自手壅治之髙世逺語孫曰松樹子非不楚楚可憐但無棟梁用耳孫曰楓栁雖合抱亦何所施詩何彼穠矣華如桃李箋華如桃李者興王姫與齊侯之子顔色俱盛史記李廣傳贊桃李不言下自成蹊注桃李不能言但以華實感物故人不期而徃其下自成蹊徑梁昭明太子啟走野馬於桃源飛少女於李徑許敬宗詩忽若瓊林曙俄同李徑春更繞鳯凰臺史記司馬相如傳以琴心挑之注其詩曰鳯兮鳯兮歸故鄉遊遨四海求其凰又曰鳯兮鳯兮從鳯棲得託子尾永為妃仙傳拾遺蕭史善吹簫能致孔雀白鶴穆公以弄玉妻之遂教弄玉作鳯鳴鳯凰來止其屋公為作鳯臺十數年一旦弄玉乗鳯蕭史乗龍昇天而去燭照香車入戰國䇿廿茂曰江上之處女有家貧而無燭者處女相與語欲去之無燭者謂處女曰妾以無燭故常先至埽室布席何愛於餘明之照四壁者處女以為然而㽞之庾信謝滕王序集啟甘泉宫裏玉樹一叢𤣥武闕前明珠六寸不得譬此光芒方斯燭照詩曷不肅雝王姫之車陳後主詩龍媒玉珂馬鳯軫繡香車盧思道詩時搖五明扇聊駐七香車花臨寶扇開何仲誼七夕詩凌風寶扇遙臨月暎水仙車逺渡河梁簡文帝詠舞詩扇開衫影亂中度履行疎莫令銀箭曉鮑照觀漏賦觀騰波之吞冩視驚箭之登没陸倕新漏刻銘銅史司刻金徒抱箭周禮挈壺氏䟽漏箭晝夜共百刻冬夏之間有長短焉太史立成法有四十八箭為盡合歡杯禮記酒食者所以合歡也劉勰新論伏臘合歡必歌采菱梁武帝秋歌繡帶合歡結錦衣連理文陳後主臨髙䑓詩臨忩已響吹極眺且傾杯劉長卿送張判官還京覲省春蘭方可采韓詩三月上已桃花水下時浴於溱洧水執蘭修禊祓除不祥說文蘭香草也梁元帝詩春蘭本無艷春澤最葳蕤束哲詩循彼南陔言采其蘭注循陔以采香草者將以供養其父母喻人求珍異以歸此去葉初齊楚辭緑葉兮紫莖正義其莖葉似藥草澤蘭廣而長節節中赤髙四五尺梁簡文帝春詩紫蘭葉初滿朱子楚辭辨證按本草言蘭似澤蘭則今處處有之蕙則自為零陵香其與人家所種皆不相似大抵古之所謂香必其花草皆香而燥濕不變故可刈而為佩若今之所謂蘭蕙則其花雖香而葉乃無氣其香雖美而質弱易萋皆非可刈而佩也函谷鶯聲裏元和郡縣志按秦函谷闗在漢宏農縣即今靈寳縣西南十一里故闗是也漢武帝元鼎三年楊僕為樓船將軍本冝陽人耻居闗外上疏請以家僮七百人徙闗於新安武帝從之即今新安縣東一里函谷故闗是也至後漢獻帝初平二年西幸長安出函谷闗自此已前其闗並在新安其後二十年至建安十六年曹公破馬超於潼闗則是中間徙於今所厯二處而至河潼又西征記曰函谷闗城路在谷中深險如函故以為名東自崤山西至潼津通名函谷蕭慤賦二月鶯聲纔欲斷三月春風已復流孫萬壽詩函谷早鶯鳴秦山馬首西一統志秦山在河南府西南二十五里俗云秦頭魏尾因名左傳荀偃令曰鷄鳴而駕塞井夷竈惟子馬首是瞻欒黶曰晋國之命未有是也余馬首欲東趙景真書日薄西山則馬首靡託王褒詩馬首倦西征庭幃新栢署說文幃單帳也楊烱幽蘭賦美庭幃之孝子循南陔而采之漢書朱博為御史大夫府中列栢門館舊桃蹊沈約詩門館有盈虚史記李廣傳桃李不言下自成蹊廣韻蹊徑路虞綽詩桃蹊日影亂盧思道詩落錦覆桃蹊春色長安道謝朓詩宛落佳遨遊春色滿皇州庾信詩春色方盈野枝枝綻翠英梁元帝賦洛陽小苑之西長安大道之東陳暄長安道詩長安開繡陌三條向綺門相隨入禁圍班固答賔戲入時君之門闈蔡邕獨斷東南稱門西北稱闈應璩書入侍華幄出典禁闈岑參夜過盤石隔河望永樂寄閨中效齊梁體唐書地理志永樂縣屬河中府武徳元年置一統志蒲州在平陽城西南四百五十里古為蒲坂地開元中改為河中府滄浪詩話齊人盛為文章呉興沈約琅邪王融以氣類相推轂汝南周顒善識聲韻互叶宫商時呼永明體梁簡文帝為文輕靡時徐摛以家令帶領直文心既别春坊盡學之宫體之號自斯為始合兩言而言之曰齊梁體通魏周而言之曰南北朝體與齊梁體一也盈盈一水隔庾信詩含笑盈盈自㸔古詩盈盈一水間脉脉不得語潘岳賦眷故鄉之遼隔李白詩渺然一水隔寂寂二更初南史王融傳融為中書郎嘗撫案歎曰為爾寂寂鄧禹笑人左思詩寂寂楊子宅伏知道詩二更愁未央髙城寒夜長樂府古辭寂寂人定初波上思羅襪李白詩空餘後湖月波上對江州曹植洛神賦體迅飛鳬飄忽若神陵波㣲步羅襪生塵南都賦羅襪躡蹀而容與張說詩仙浦生羅襪魚邊憶素書寗戚歌滄浪之水白石粲中有鯉魚長尺半古詩客從逺方來遺我雙鯉魚呼兒烹鯉魚中有尺素書注生帛也江淹賦承逺書於江澨月如眉已畫駱賔王詩峨眉山上月如眉梁武帝遊女曲容色玉耀眉如月劉孝威納凉詩月纎張敞畫海録碎事唐畫工畫十眉圗六曰月稜眉又名却月雲似鬢新梳陳後主詩山雲逺相似張正見詩王孫春好遊雲鬢不勝愁王勃春思賦蟬鬢梳時鬟欲斜春物知人意沈約賦眷春物而懐之聞好音於庭樹何遜詩旅客長憔悴春物自芳菲後漢書竇融傳詔曰將軍數執謙退何不曉人意李白詩緑水解人意桃花笑索居禮記仲春之月桃始華王維輞川别業詩水上桃花紅欲然沈攸之詩持底喚歡來花笑鶯歌詠禮記子夏曰吾離羣而索居亦已久矣謝靈運詩索居易永久離羣難處心沈佺期和洛州康士曹庭芝望月有懐一作康庭芝詩又作宋之問詩舊唐書地理志河南府隋河南郡武徳四年討平王世充置洛州總管府開元元年改洛州為河南府一統志東魏改司州為洛州尋改豫州唐初復為洛州髙宗以此為東都唐六典京兆河南太原牧及都督刺史各有士曹司士參軍掌津梁舟車舍宅百工衆藝之事啟塞必從其時役使不奪其力國秀集庭芝河隂令天使下西樓尸子使星司夜月司時猶使鷄司晨也鮑照翫月詩始見西南樓纎纎如玉鈎庾肩吾詩天禽下北闕織女入西樓光含萬里秋潘岳秋興賦月朧朧而含光劉孝威詩月麗嫦娥影星含織女光梁簡文帝詩玉署清餘熱金城含暮秋臺前疑挂鏡世說温嬌從姑有一女甚有姿慧姑屬公覓壻公宻有自婚意却後少日報姑云已覓得壻身名宦盡不减嶠因下玉鏡臺一枚姑大喜玉鏡臺是公為劉越石長史北征劉聰所得謝朓鏡䑓詩垂龍挂明月庾信鏡賦能横却月巧挂迴風梁武帝歌珊瑚挂鏡爛生光古詩破鏡飛上天樂府解題破鏡者月半缺也簾外似懸鈎虞騫視月詩清夜未云疲珠簾聊可發劉孝綽望月詩髣髴鑒忩簾張正見詩分簾疑碎壁隔幔似懸鈎梁武帝詩落月似懸鈎簡文帝烏棲曲浮雲似帳月如鈎張尹將眉學漢書張敞傳敞為婦畫眉長安中傳張京兆眉憮注憮音嫵鮑照翫月詩娟娟似娥眉虞騫詩冷冷玉潭水暎見娥眉月庾信賦京兆新眉遂惰約班姫取扇儔漢書外戚傳成帝遊於後庭常欲與班媫妤同輦載媫妤辭太后聞之喜曰古有樊姫今有班婕妤班媫妤詩新裂齊紈素鮮潔如霜雪裁為合歡扇團團似明月江淹詠班媫妤詩紈扇如圓月佳期應借問謝莊月賦佳期可以還㣲霜霑人衣謝朓詩宿昔夢佳期張協詩借問此何時江總詩借問蔵書處為報在刀頭古詩何當大刀頭樂府解題大刀頭者刀頭有環也何當大刀頭者何日當還也杜甫春夜喜雨好雨知時節詩零雨既零注喜雨也禮記季春之月時雨將降下水上騰史記甘露降時雨至司馬相如封禪文甘露時雨厥壤可遊曹植詩白日曜青春時雨静飛塵禮記饗帝於郊而風雨節寒署時史記歴書明時正度則隂陽調風雨節魏文帝令風雨應節禎祥觸類而見王褒詩時節無春冬當春乃發生抱朴子藏華於當春爾雅春為青陽一曰發生楚辭春氣奮發萬物遽只莊子春氣發而百草生潛夫論春夢發生夏夢髙明秋冬夢熟藏此謂應時之夢也隨風潜入夜列子心凝神釋隨風東西庾信啟行雲逐雨迴雪隨風張正見梅林輕雨詩詎得零陵燕隨風時共舞鹽鐵論周公太平之時旬而一雨雨必以夜傅咸喜雨賦方中降雨亘夜迄今生我百穀粒我烝民埤雅鸞入夜而歌鳯入朝而舞潤物細無聲易雨以潤之吳志减均曰繼之以雲雨因以潤物晉書凉武昭王傳信乾坤之相成庻物希風而潤雨劉孝威晚雨詩交枝含晚潤隂鏗詩緑野含膏澤青山帶濯枝拾遺記行者歌曰清風細雨雜香來梁簡文帝詩冷風雜細雨張正見詩細雨濯梅林禮記聴於無聲駱賔王冐雨尋菊序滴瀝空庭竹響共雨聲相亂野徑雲俱黒沈約詩野徑既盤紆楊師道詩野徑香恒滿山階笋屡侵鮑照賦雲徑兮海衝上潮兮送風史記天官書雲氣有獸居上者勝自華以南氣下黒上赤黄子發相雨書常戊申日候日欲入時上有冠雲黒者大雨青者小雨江船火獨明宋書武帝紀公單船過江逕至京口梁元帝望江中月影詩裂紈依岸草斜桂逐行船何遜詩澄江照逺火夕霞隱連檣隂鏗詩溜船惟識火驚鳬但聴聲禮記三公一命巻䟽火取其明庾信詩暗巖朝石濕空山夜火明曉㸔紅濕處古樂府神仙篇紫府事朝㸔劉逖對雨詩濕槐仍足緑沾桃更上紅梁簡文帝詩風髙暗緑凋殘栁雨駛芳紅濕晚芙虞世南逢雨詩隴麥霑逾翠山花濕更燃花重錦官城梁簡文帝賦得入堦雨詩漬花枝覺重濕鳥羽飛遲華陽國志成都西城故錦官也錦江織錦濯其中則鮮明濯他江則不好故名曰錦里也益州記錦城在益州南笮橋東流江南岸昔蜀時故錦官地其處號錦里城元和郡國志錦城在成都縣南十里故錦官城也一統志錦官城在萬里橋南因其有錦官故名猶合浦之珠官也梁元帝謝賫錦啟江波可濯豈藉成都之水盧照隣詩錦里淹中館岷山稷下亭孟浩然和張丞相春朝對雪迎氣當春至後漢書明帝紀建初五年冬始行迎氣樂注馬防上言臣愚以為可因嵗首發太蔟之律奏雅吹之音以逆和氣蔡邕答齋議詔召尚書問立春當齋迎氣東郊王僧孺詩旅心已多恨春至尚離羣承恩喜雪來晉書劉𢎞傳贊季和承恩建旟南服王䑓卿詩承恩奉教義方當宏受持徐陵雪詩三農喜盈尺六出舞崇花野呉均詩雷逐春風來飛集巫山潤從河漢下古詩河漢清且淺相去復㡬許晉書天文志天漢起東方經箕尾之問謂之天河亦謂之漢津書水曰潤下沈約雪贊火競乃上炎隂矯亦下潤花逼艶陽開庾肩吾花雪詩飛花灑庭樹庾信詩雪花開六出鮑照詠雪詩兹晨雖為美當避艶陽年不覩豐年瑞詩傳豐年之冬必有積雪謝惠連雪賦盈尺則呈瑞於豐年安知爕理材書燮理隂陽庾信義谷銘序燮理餘暇披閔山經撒鹽如可擬世説謝太傅寒雪日内集俄而雪驟下公曰白雪紛紛何所似兄子胡曰撒鹽空中差可擬兄女道韞曰未若栁絮因風起願糝和羹梅釋名糝黏也相黏􅭓也書若作和羹爾惟鹽梅王融䇿秀才文鹽梅之和實有賴焉盧照隣春晚山莊率題謝朓詩胡寧昧千里解珮拂山莊梁昭明太子詩棲烏猶未翔命駕出山莊李百藥詩懐音自蘭室徐步返山莊顧步三春晚隋書音樂志顧步階墀阮徳如詩顧步懷想像陸機詩俯仰紛阿那顧步咸可懽梁元帝採蓮賦纎腰束素遷延顧步班固終南山賦三春之季孟夏之初陳後主詩綺殿三春晚玉燭四時平盧思道詩惟畏三春晚勿言千載憂唐太宗詩北闕三春晚南榮九夏初田園四望通漢書汲黯傳隱於田園者數年义灌夫傳陂池田園陶潛歸去來辭田園將蕪胡不歸楚辭登崑山兮四望王粲賦登兹樓以四望兮晉書王徽之傳嘗居山隂夜雪初霽月色清朗四望皓然江總詩山雲四望通隂鏗詩王城野望通遊絲横惹樹梁武帝詩晻曖矚遊絲沈約詩遊絲暎空轉又遊絲曖如網蕭大圜竹花賦暄條絮滿煖路絲横唐太宗初夏詩哢鶯猶響殿横絲正網天古辭至今衣䄂惹天香増韻惹引着也陳後主樂府長相思怨成悲蝶縈草樹連絲戱蝶亂依叢蕭大圜賦戯蝶飛而帶英徐悱妻劉氏詩戯蝶花間騖元萬頃詩花輕蝶亂仙人杏謝朓詩花叢亂數蝶風簾入雙燕王筠詩叢蘭已飛蝶楊栁半藏鴉潘岳詩託身依叢麻竹懶偏宜水穆天子傳天子西征至於𤣥池乃奏廣樂三日是曰樂池乃樹之竹沈佺期詩花蝶飛殊惰梁元帝詩拂簷應有意偏冝桃李人淮南子竹以水生江淹詩緑竹夾清水庾肩吾詩水暎寄生竹花狂不待風齊民要術種棗候大蠶入簇以杖擊枝振落其狂花庾信賦落葉半床狂花滿屋孫萬壽詩布葉共承露聞花共待風沈約詩短榦未搖風徐孝先詩香來詎經火花散不隨風惟餘詩酒意朱超詩惟餘故樓月逺近必隨人岑之敬詩惟有將軍酒川上可除寒南史袁粲傳粲獨步園林詩酒自適歴代吟譜梁祐嘗與朝廷名賢汎舟洛水以詩酒自娯易書不盡言言不盡意當了一生中晉書畢卓傳卓嘗謂人曰右手持酒杯左手持蟹螯拍浮酒船中便足了一生矣二田家無四隣應璩詩田家無所有酌醴焚枯魚又照隣詩田家自有樂周禮遂人掌邦之野以土地之圖經田野造縣鄙形體之法五家為隣五隣為里庾信詩昨夜鳥聲春驚鳴動四隣朱超詩孤舟無四隣獨坐一園春阮籍詩獨坐空堂上開元天寳遺事都人士女毎正月半後各乗車跨馬供帳於園圃為探春之宴庾信詩人衣香一園梁簡文帝詩欲道春園趣復憶春時人梁元帝詩無令春色晚鶯啼非選樹梁簡文帝詩鶯啼春欲駛無為空掩扉隂鏗詩鶯啼歌扇後花落舞衫前吳都賦鳥不擇木廣韻選擇也唐太宗詩緑樹巧鶯啼魚戯不驚綸漢相和歌魚戯蓮葉間謝朓詩魚戯新荷動晉書張駿傳姑减謠曰鴻從南來雀不驚說苑吕望釣於渭渚魚無食者農人謂曰子將復釣必細其綸徐徐而投之無令魚駭列子詹何以獨繭絲為綸山水彈琴盡左思詩山水有清音韓詩外傳伯牙鼓琴鍾子期聽之志在髙山子期曰巍巍如㤗山志在流水子期曰洋洋乎若江湖琴賦浩兮湯湯鬱兮峩峩晉書嵇康傳今但欲守陋巷教養子孫時時與親舊叙離濶濁酒一杯彈琴一曲志意畢矣馬融長笛賦曲終闋盡餘弦更興羯鼓録蜀客李琬夜聞羯鼓聲月下步尋鼔工曰曲下意盡乎工曰盡琬曰意盡即曲盡矣工曰柰聲不盡何琬曰以他曲解之可盡其意也風花酌酒頻晉白苧歌陽春白日風花香梁簡文帝詩風散花兮傳馨香虞世南詩驚鳥排林度風花隔水來晉書王徽之傳嘗居山隂夜雪初霽月色清朗四望皓然獨酌酒詠左思招隱詩鮑照詩酌酒以自寛列子尹生從列子居因間請蘄其術十反而不告尹生退數月又徃從之列子曰汝何去來之頻年華已可樂庾信詩年華改嵗隂遊客喜登臨陳叔逹詩金鋪照春色玉律動年華王羲之蘭亭序所以遊目騁懐足以極視聴之娯信可樂也夏侯湛賦春可樂兮樂東作之良時楊惲執孫㑹宋書人生行樂耳髙興復留人殷仲文詩獨有清秋日能使髙興盡庾信賦小山則叢桂留人扶風則長松繫馬陳後主詩留人不留人不留人也去王維山居秋暝舊唐書王維傳晚得宋之問藍田别墅在輞口輞水周於堂下竹洲花嶼彈琴賦詩嘯詠終日空山新雨後沈佺期詩山空聞鬬象江静見游犀張說詩空山寂厯道心生宋玉髙唐賦遇天雨之新霽兮史記龜䇿傳新雨已天清静無風潘岳閒居賦㣲雨新晴六合清朗天氣晚來秋楚辭泬寥兮天髙而氣清魏文帝燕歌行秋風蕭瑟天氣凉庾肩吾詩春寒及晚秋李適詩鳯輦乗朝霽鸚林對晚秋楚辭悲哉秋之為氣也明月松間照左思詩明月出雲崖皎皎流素光沈約髙松賦流蓬不息明月孤懸謝朓髙松賦懐風音而送聲當月露而流影宋之問下山歌松間明月長如此君再遊兮復何時清泉石上流詩泉流既清曹植洛神賦或戯清流或翔神渚王羲之蘭亭叙又有清流激湍映帶左右南史蕭思話傳嘗從文帝登鐘山中道有盤石清泉上使於石上彈琴因賜以銀酒鍾謂曰相賞有泉石間意竹喧歸浣女王維輞川集序余别業在輞川山谷其游止有斤竹嶺竹里館伏知道詩林喧山鳥動庾信詩浦喧征棹發盧思道詩菱歌不惜唱須待暝歸時述異記夜郎縣其先有女子浣紗忽三節竹流入竹間白帖梁州女郎山張魯女浣衣於石上其浣衣石猶在蓮動下漁舟謝靈運詩魚戲荷花動沈約郊居賦動紅荷於輕浪覆碧葉於澄湖楚辭將運舟而下浮兮顔氏家訓伍員之託漁舟季布之入廣栁王勃滕王閣序漁舟唱晚響窮彭蠡之濱隨意春芳歇梁簡文帝詠栁詩栁枝無極軟春風隨意來庾信蕩子賦遊塵滿床不用拂細草横階隨意生陸機詩遊客芳春林春芳傷客心唐太宗詩憑軾玩春芳楚辭蘋蘅槁而節離兮芳已歇而不比謝朓詩無論君不歸君歸芳菲歇王孫自可留劉安招隐士王孫遊兮不歸春草生兮萋萋又王孫兮歸來山中兮不可以久留孟浩然晚春二月湖水清書嵗二月東巡守至於岱宗江總詩二月春暉暉水經注湖水廣圓五百餘里日月若出没於其中古詩水清石自見湘中記湘水至清雖深五六丈見底了了然家家春鳥鳴楊雄解嘲家家自以為稷契洛陽伽藍記夀丘里民間號為王子坊髙臺芳榭家家而築古樂府春鳥翻南飛栁䛒陽春歌春鳥一轉有千聲詩鳥鳴嚶嚶洛陽伽藍記景林寺有園多饒竒果春鳥秋蟬鳴聲相續林花掃更落吳均詩林花合復分顧野王虎丘山序林花翻麗乍飄颺於蘭臯梁昭明太子詩落葉紛可掃劉希夷代秦女贈行人詩梅花待君掃呉均詩花落更霏霏梁元帝詩池紅早花落劉令嫺詩落花掃更合徑草踏還生南史孔淳之傳茅室蓬户庭草蕪徑盧照隣詩徑草疏王篲荆楚嵗時記三月三日四民踏百草千金月令三月三日上踏青履謝靈運詩池塘生春草酒伴來相命沈約論酒之為用非可獨酌宜須用侣然後成歡公羊傳胥命者相命也曹植詩命儔嘯匹侣列坐竟長筵陸機詩閑夜命歡友置酒迎風館開樽共解酲金華山栖志田家野老提壺共至班荆林下陳尊置酌漢書禮樂志㤗尊柘漿析朝酲注應劭曰取甘柘汁以為飲也酲病酒也析解也言柘漿可以解朝酲也晉書劉伶傳天生劉伶以酒為名一飲一斛五斗解酲梁元帝劉生詩菊花連夜飲竹葉解朝酲當杯已入手晉書畢卓傳卓曰右手持酒杯左手持蟹螯拍浮酒船中便足了一生矣歌妓莫停聲鮑照樂府歌伎舞女今誰在吳均樂府歌姫舞女逹天曙梁簡文帝詩從妓新歌終晉書謝安傳安雖放情丘壑然毎遊賞必以妓女從南史張欣㤗傳聲妓雜藝頗多開解沈君攸夜出妓詩舉肩起歌聲寒食宴張明府宅周禮司烜氏仲春以木鐸脩火禁於國中注為季春將出火也荆楚嵗時記去冬節一百五日即有疾風甚雨謂之寒食鄴中記寒食三日作醴酪煮粳米及麥為酪擣杏仁煮作粥瑞雪初盈尺徐陵雪詩豈若天庭瑞輕雪帶風斜三農喜盈尺六出儛崇花張正見觀春雪詩瑞雪近浮空盧照隣歌日觀千門隨鳯輦天門瑞雪照龍衣謝惠連雪賦盈尺則呈瑞於豐年又雪贊權陋瑤臺蹔踐盈尺寒宵始半更詩三之日于耜注豳土晚寒䟽豳土寒多雖春猶寒也徐陵詩薄夜迎新節當壚却晚寒王筠宵情詩月出霄將半星流曉未央列筵邀酒伴曹植詩命儔嘯匹侣列坐竟長筵張協賦羅樽列爵周以長筵宋書樂志髙門啟雙闕長筵列嘉賔謝靈運詩張組眺倒影列筵矚歸潮謝朓樂府玉杯邀上客沈約七賢論酒之為用非可獨酌宜須用侣然後成懽史記酈生曰吾髙陽酒徒也木蘭詩出門㸔火伴劉邈詩逐伴西城路刻燭限詩成南史王㤗傳㤗每預朝宴刻燭賦詩文不加㸃又王僧孺傳竟陵王子良嘗夜集學士刻燭為詩四韻者則刻一寸蕭文琰曰頓燒一寸燭而成四韻詩何難之有乃與丘令楷江洪共打銅鉢立韻響㓕詩成皆可觀庾肩吾詩燒香知夜漏刻燭騐更籌隋書周羅㬋傳羅㬋為左衞率參宴席陳後主曰周左率武將詩毎前成文士何後也香炭金爐暖梁簡文帝擬夜夜曲蘭膏晝更益薰爐㓕復香徐陵詩竒香分細霧石灰𢷬輕紈子夜歌炭爐却夜寒重抱坐疊褥鄴中記石季龍冬月為複帳四角安純金銀鏤鑿香爐陶𢎞景銘蘭缸列燭金爐颺薰張正見詩名香散綺席石硯彫金爐駱賔王詩促席鸞觴滿當爐獸炭然嬌弦玉指清梁武帝子夜歌朱唇發艷歌玉指弄嬌絃史記小絃亷折以清者商也蔡邕琴賦問闗丸絃出入律吕屈伸低昻十指如雨陸雲榮啟期贊鳴絃清楚撫節髙徽郭璞詩静嘯撫清絃孔徳紹詩鈞天金石響洞庭絃管清厭厭不覺醉詩厭厭夜飲不醉無歸陶潛詩厭厭竟良月吳志周瑜傳與周公瑾交若飲醇醪不覺自醉謝靈運詩酣飲不知醉謝靈運詩山中不知醉歸路曉雲生陶潛詩行行循歸路謝靈運詩始得傍歸路范雲詩桂山清曉雲梁簡文帝詩祈年雲霧生薛道衡詩石濕曉雲生沈佺期九日臨渭亭侍宴應制得長字荆楚嵗時記九月九日四民並藉野飲宴全唐詩話景龍三年九月九日幸臨渭亭與羣臣作詩御氣幸金方莊子乘天地之正而御六氣之辨王融三月三日曲水詩序臣聞出豫為象鈞天之樂張馬時乗既位御氣之駕翔焉漢書五行志兊在西方為秋為金王褒上祥瑞表豈止唐帝沈壁氣合金方姫后望河形如車盖馮髙薦羽觴沈約應詔詩馮髙講武功中天起遐眷齊書武帝紀永明五年九月九日出商颷館登髙宴羣臣齊民月令重陽日必以餻酒登髙眺逈以暢秋志蕭子良九日侍宴詩輕觴特薦落英可餐楚辭瑶漿蜜勺實羽觴些西京賦促中堂之陿坐羽觴行而無算何遜九日侍宴詩羽觴歡湛露演繁露諸家釋羽觴不同惟李善引漢書音羲曰作生爵形者是也孟康亦曰羽觴作生爵形有頭尾羽翼魏文頒菊蕊魏文帝與鍾繇九日送菊書是月律中無射言羣木百草無有射地而生惟芳菊紛然獨榮非夫含乾坤之純和體芬芳之淑氣孰能如此輔體延年莫斯之貴謹奉一束以助彭祖之術唐太宗詩花生圓菊蕊漢武賜萸囊初學記漢武帝宫人賈佩蘭九月九日佩茱茰食蓬餌飲菊花酒云令人長夀續齊諧記汝南桓景隨費長房遊學長房謂之曰九月九日汝家當有災厄急宜去令家人各作絳囊盛茱萸以繫臂登髙飲菊酒此禍可消今世人每至九日登山飲菊酒婦人帶茱萸囊是也去鶴留笙吹列仙傳王子喬好吹笙作鳯鳴後於緱氏山頭乘白鶴而去王勃序徘徊去鶴將别盖而同飛沈約詩簫歌美嬴女笙吹悦姫童歸鴻識舞行禮記季秋之月鴻雁來賔謝瞻九日詩遵渚有來鴻謝朓詩㓕燭聴歸鴻沈約詩送歸鴻於碣石又凄鏘笙管遒參差舞行亂梁簡文帝詩參差覩雁行年年重九慶日月奉天長陶潛詩年年見霜雪誰謂不知時又九日閑居詩序余閑居愛重九之名秋菊盈園而持醪靡由王筠詩重九惟嘉節抱一應元貞張華歌節慶伐序萬國同休魏文帝與鍾繇書嵗徃月來忽逢九月九日九為陽數而日月並應俗嘉其名以為宜於長久故以享宴髙㑹老子天長地久天地所以能長且久者以其不自生故能長生隋書音樂志國圗日鏡家歴天長春夜宿直案唐詩紀作和中書侍郎楊再思春夜宿直陶潛詩遙遙春夜長齊書周顒傳宋明帝頗好𤣥理以顒有辭義引入殿内親近宿且西禁青春滿魏書趙修傳纂業之初仍引西禁按雍録唐太極宫圖中書省在西徧安仁門内獨斷省中本為禁中門閣有禁非侍御之臣不得復入孝元皇后父名禁避之故曰省中楚辭青春受謝白日昭只何晏景福殿賦結實商秋敷華青春成何遜七召翫竒花之春滿摘甘實於夏南端皓月㣲張衡東京賦啟南端之特闈立應門之將將薛綜注端門南方正門何晏景福殿賦開南端之豁達張筍虡之輪豳左思魏都賦巖巖北闕南端攸遵謝莊月賦情紆軫其何託愬皓月而長歌顔延之詩流雲靄青闕皓月鑒丹宫何承天芳樹篇皓月盈素手凉風拂中閨沈約安陸昭王碑澤無不漸螻蟻之穴靡遺明無不察容光之㣲必照千廬宵駕合傅咸桑樹賦序世祖昔為中壘將軍於直廬種桑樹一株張衡西京賦徼道外周千廬内附注傳宫外向為廬舍晝則廵行非常夜則驚備不虞史記平原君傳虞卿欲以信陵君之存邯鄲為平原君請封公孫龍聞之夜駕見平原君陸機樂府肅肅宵駕動翩翩翠盖羅梁簡文帝京洛詩此時車馬合兹晨冠盖通五夜曉鐘稀漢官儀晝漏盡夜漏起省中黄門持五夜五夜者甲夜乙夜丙夜丁夜戊夜陸倕新漏刻銘六日無辨五夜不分孔徳紹詩暎流㸔夜月臨風聴曉鐘徐陵玊䑓新詠序厭長樂之疎鐘勞中宫之緩箭星斗横綸閣禮斗威儀審候五色注北斗七星有五色宫商角徴羽各應其星晉書元帝紀論星斗呈祥金陵表慶蕭慤詩鈎陳應警徼河漢曉參横晉書天文志天津九星横河中晉書王湛等傳論或寄重文昌允釐於衮職或任華綸閣宻勿於王言天河度𤨏闈詩倬彼雲漢昭囘于天箋謂天河也博物志天河與海通物理論水之精氣上浮宛轉隨流名之曰天河范雲與王中書詩攝官青𤨏闥遙望鳯凰池爾雅宫中門謂之闈烟花章奏裏鮑照䟽枯楊寒炭遂起烟花洛陽伽藍記姜質賦曰烟花霧草或傾或倒漢書魏相傳相明易經好觀漢故事及便宜章奏注觀前人所奏便宜之章後漢書明帝紀公車以反支日不受章奏帝曰民廢農桑來詣闕而復拘以禁忌豈為政之意乎命蠲其制又班彪傳竇融徴還京師光武問曰所上章奏誰與參之融對曰皆從事班彪所為紛向夕郎飛唐書沈佺期傳拜起居郎兼脩文館直學士漢舊儀黄門郎屬黄門令日暮入對青𤨏闈拜名夕郎梁元帝牛渚磯碑花飛拂䄂荷香入衣張正見耤田詩草發青壇外花飛蒼玉邊孟浩然寒食閨夕綺忩閉謝惠連詩夕坐苦多慮行歌踐閨中鄧鏗月夜閨中詩閨中日已暮樓上月初華徐彦伯擬古詩曉忩吟日坐閨夕秉燭遊夏侯惠景福殿賦仰觀綺忩周覽菱荷左思蜀都賦列綺忩而瞰江古詩十九首交疏結綺忩阿閣三重階梁元帝詩䗶燭擬花影重臺閉綺忩佳人罷縫衣淮南子佳人不同體美人不同面而皆悦於目李延年歌北方有佳人長門賦夫何一佳人兮步逍遙以自虞洛神賦嗟佳人之信脩兮羗習禮而明詩隋無名氏囬紇曲隂山瀚海使難通幽閨少婦罷裁縫虞世南詩還恐裁縫罷無信逹交河樂府古辭不惜故縫衣荀㫤詩中婦縫羅衣梁簡文帝詩何時玉忩裏夜夜更縫衣理琴開寳匣續齊諧記王彦伯喜鼓琴一日維舟中渚秉燭理琴嵇康琴賦理重華之遺摻既逺慕而長想盧思道從駕詩大川開寶匣福地下金䋲北堂書鈔魏武上雜物疏云御物有銀鏤漆匣四枚就枕卧羅幃張華詩拊枕獨嘯嘆梁簡文帝詩北忩聊就枕沈約詩就枕更須牽又愁人掩軒卧風賦躋於羅幃經於洞房范雲詩自君之出矣羅帳咽秋風夜久燈花落鮑照詩夜久膏既竭啟明旦未央隋煬帝詩更移斗柄轉夜久天河横西京雜記陸賈曰目瞤則得酒食燈火花則得錢財梁元帝賦燈花開而夜燃王筠詩藺燈空結花江總賦百枝燈花復羞燃又詩鯨燈落花殊未盡薰籠香氣㣲東宫舊事有漆畫薰籠二大被薰籠三衣薰籠三劉瑗詩繡被共籠薰陳子良詩拂塵開肩匣巻帳却薰籠梁簡文帝詩薰爐㓕復香陳後主樂府迎風香氣來庾信對燭花賦夜風吹香氣隨黄庭内景經三田之中精氣㣲錦衾重自煖詩錦衾爛兮古詩十九首錦衾遺落浦同袍與我違鮑照詩七綵芙蓉之羽帳九華蒲萄之錦衾張華詩重衾無煖氣陸機詩朝遊忘輕羽夕息憶重衾南史謝超宗傳超宗詣東府門自通其日風冷帝曰此客至使人不衣自煖沈約詩錦衾無獨煖遮莫曉霜飛搜神記燕惠王墓上有狐化為少年書生持刺謁張華談論三日不屈華疑必妖也呼獵犬試之笑曰我之才智天地産之遮莫千試萬慮其能為患乎謝靈運詩曉霜楓葉丹禽經霜蜚則霜露翥則露七命風厲霜飛杜甫數陪李梓州泛江有女樂在諸舫戱為艷曲又甫送梓州李使君之任詩近㸔除刺史還喜得吾賢元和志梓州秦為蜀郡漢分置廣漢郡今州即廣漢郡郪廣漢二縣地宋於此置新城郡梁於郡置新州隋改梓州因梓潼水為名又涪江水經郪縣東去縣四里唐書地理志梓州梓潼郡天寶元年更名通典州城左帶涪水右挾中江太平寰宇記中江水在縣西南三里源從𤣥武縣東界流入當縣西南八十里入涪江方輿紀要涪江在州城北自綿州羅江縣流經州城西北又東南流經州城東厯射洪縣及遂寧縣至重慶府合州而合於嘉陵江又郪江在州城西南源自中江縣銅官山流至廢飛烏縣㑹衆流繞牛頭山下又東南經射洪縣至遂寧縣界而合於涪江其合處謂之郪口後漢書馬融傳嘗坐髙堂施綘紗帳前授生徒後列女樂南史羊侃傳嘗有詔命侃延陽斐同宴賔客三百餘人食器皆金玉雜寳奏三部女樂纂要古艷曲有北里靡靡陽阿之曲上客迴空騎史記晏嬰傳越石父賢晏子於是延入為上客漢書樓䕶傳䕶與谷永俱為王侯上客庾肩吾詩蘭堂上客至綺席清弦撫阮卓長安道詩羣公騶御廻王勃詩歸舟歸騎儼成行佳人滿近船淮南子佳人不同體而皆悦於目曹植洛神賦嗟佳人之信脩兮羗習禮而明詩阮籍詠懐詩西方有佳人皎若白日光張九齡詩薄暮津亭下餘花滿客船江清歌扇底孟浩然詩江清月近人李白詩晚登髙樓上木落雙江清庾信春賦月入歌扇花承節鼔劉孝威詩池月憐歌扇張正見詩歌扇掩團紗盧照隣詩鸞沉仙鏡底野曠舞衣前謝靈運詩野曠沙岸净天髙秋月明江淹詩時寒原野曠庾信詩飛燕舞衣長盧照隣詩風花落舞衣隂鏗詩花落舞衫前玉袖凌風並古樂府西洲曲䦨干十二曲垂手明如玉鮑照白紵歌朱唇動素袖舉梁簡文帝詩風吹玉袖香洞㝠記漢宫人麗娟體弱常恐隨風輕舉唱迴風曲庭葉翻落如秋陶潛詩亭亭凌風桂八幹共成林又甫詩隔巢黄鳥並金壺隱浪偏拾遺記浮圖之國獻善書二人出肘間金壺四寸吳均詩文酒滿金壺郭璞江賦冰夷倚浪以傲睨又甫詩順浪翻堪倚宇文融詩俱承雨露偏競將明媚色焦仲卿妻詩好事相扶將又甫詩楚客惟聼棹相將劇談録曲江池花卉環周烟水明媚鮑照芙蓉賦爍彤輝之明媚陶潛閑情賦表傾城之艷色梁簡文帝詩繁華炫姝色偷眼艷陽天杜陽雜編李可及善轉喉舌弄媚眼梁武帝四時歌賣眼拂長䄂又甫詩偷眼蜻蜓避伯勞鮑照詩當避艷陽年注艷陽春也張九齡詩幸因清切地還遇艷陽時張說詩鴻飛白露天盧照隣十五夜觀燈藝文類聚漢家以望日祀太乙從昬時到明今人正月望日夜遊觀燈是其遺跡錦里開芳宴梁簡文帝對燭賦茱萸幔裏鋪錦筵庾信馬射賦綵則錦市俱移錢則銅山合從按照隣東嘗入蜀此錦里泛指豪貴里第非蜀之錦里也謝朓詩嘉樂舊矣芳宴在斯蘭缸艷早年王融詩俱願置尊酒蘭缸當夜明舊唐書音樂志每初年望夜御勤政樓觀燈作樂庾信春賦新年鳥聲千種轉縟彩遙分地任昉王文憲集序公自㓜及長作述不倦固已理窮言行事該軍國豈直雕章縟彩而已哉晉書夏侯湛賛堪稱弄翰縟彩彫煥禮記分地建國置都立邑陶𢎞景水仙賦中天起浪分地㵼波繁光逺綴天史記封禪書天子始郊拜太乙列火滿壇有司云祠上有光焉及晝黄氣上屬天傅休奕詩枝燈若火樹庭燎繼天光梁元帝詠霧詩五里浮長隰三晨晦逺天張正見詩髙栁横遙塞長榆接逺天接漢疑星落唐太宗帝京篇連甍遙接漢庾信賦辨常星之夜落又燈賦蛾飄則碎花亂飛風起則流星細落依樓似月懸梁元帝詩楊栁非花樹依樓自覺春晉書陸機傳論髙詞逈暎似朗月之懸光沈約髙松賦流蓬不息明月孤懸盧思道詩初月正如鈎懸光入綺樓别有千金笑車􅛴詩别有傾人處佳麗夜相逢陳子良詩何必桃將李别有代春暉鮑照詩千金顧笑買芳年庾信詩無復千金笑徒勞五日歸來暎九枝前郭璞贊光彩流暎氣如紅霞庾肩吾詩團沙暎似月蟬翼望如空梁簡文帝阻歸賦躡九枝而耀景總六翮以摶風元帝詩邯鄲九枝朝始成金巵玉盌共君傾王筠燈檠詩百花曜九枝鳴鶴暎冰池劉長卿幽琴禮記舜作五弦之琴以歌南風之詩而天下治新論神農氏削桐為琴繩絲為弦以通神明之徳合天人之和焉廣雅神農氏琴長三尺六寸六分上有五弦曰宫商角徴羽文王増二弦曰少宫少商風俗通琴者樂之統與八音並行君之所常御也和樂作者其曲曰暢言其道暢美也憂愁作者其曲曰􅋵言不失其操也月色滿軒白江淹别賦月上軒而飛光楊希道詩南軒月初進李白詩蹔就東山賖月色酣歌一夜送泉明王褒關山月天寒光轉白李白詩黄鶴樓前月華白琴聲宜夜闌禮記君子聴琴瑟之聲則思志義之臣搜神記呉人有燒桐以㸑者蔡邕聞其爆聲曰此良桐也請削以為琴因名焦尾琴有殊聲焉嵇康琴賦英聲發越蔡琰胡笳十八拍更深夜闌兮夢汝來斯王昌齡詩髙殿秋砧響夜闌杜甫詩夜闌接軟語飀飀青絲上博雅飀飀風也嵇康琴賦弦以園客之絲岑參詩嬌歌急管雜青絲静聴松風寒劉伶酒徳頌静聴不聞雷霆之聲鮑照書静聴無聞極視不見風俗通河間雜歌二十一内有風入松南史陶𢎞景傳宏景愛松風庭院皆植松每聞其響欣然為樂蕭詮詩深澗響松風薛道衡詩松風逺更清劉希夷夏彈琴詩彈為風入松崖谷颯已秋古調雖自愛隋書音樂志近代書紀所載縵樂鼔琴吹笛之法多云三調三調之聲其來久矣請存三調而已杜審言詩忽聞歌古調歸思欲沾巾老子聖人自知不自見自愛不自負今人多不彈杜甫詩不薄今人愛古人鮑照詩取琴試一彈沈烱詩為我彈清琴向君投此曲古詩誰能為此曲嵇康琴賦理正聲奏妙曲庾信詩方調琴上曲所貴知音難韓詩外傳孔子鼔琴曽子曰殆有貪狼之志邪僻之行子貢以告子曰參其習知音矣向者有䑕出遊狸見於屋循梁㣲行造焉而避厭目曲脊求而不得丘以琴滛其聲參以丘為貪狼邪僻不亦宜乎列子伯牙鼓琴志在髙山鍾子期曰峩峩然若泰山志在流水曰洋洋然若江河子期死伯牙絶絃以無知音者古詩不惜歌者苦但傷知音希王褒洞簫賦知音者樂而悲之不知音者恠而偉之王維從岐王夜燕衞家山池唐書宗室傳恵文太子範封王岐好學工書愛儒士無貴賤而盡禮與閻朝隱等善常飲酒賦詩相娯樂詩厭厭夜飲不醉無歸謝莊月賦君王乃厭晨歡樂宵燕齊書劉悛傳車駕數幸悛宅宅盛修山池世祖宴樂至夜乃去座客香貂滿後漢書孔融傳融拜大中大夫賔客日盈其門常歎曰座上客恒滿蓴中酒不空吾無憂矣江總詩香貂拜黻衮宫娃綺幔張王勃採蓮賦呉娃越艷齊書帝紀後宫更起仙華諸殿錦幔珠簾窮極綺麗七啟華燭爛幄幙張澗花輕粉色梁武帝詩花色遇桃杏陳後主詩水中花色沈李嶠詩花庭開粉席梁元帝和林下詠姬詩輕花亂粉色駱賔王詩秋帳燈光翠倡樓粉色紅山月少燈光謝朓詩山中上芳月故人清樽賞别賦月上軒而飛光曹植樂府華燈步障舒光劉楨詩明燈熺炎光沈約詩燈光半隱床庾肩吾詩夜月奪燈光積翠紗忩暗沈約詩連峯竟無已積翠逺㣲㣲蕭子均詩山翠餘烟積蘇頗詩山光積翠遙疑逼劉孝威詩紗忩相向開庾信賦紗忩獨掩羅帳常垂劉孝綽詩日下房櫳暗飛泉繡户凉陸機詩飛泉潄鳴玉郭璞詩嚼蕊挹飛泉南史何子季遷秦望山山有飛泉迺起學舍即林成援因巖為堵唐太宗詩幽澗冬暄飛泉夏冷鮑照賦瞰東西之繡户梁武帝樂府幕幕繡户絲沈約詩鳴珠簾於繡户王勃賦繡户雕忩南向開還將歌舞出詩式歌且舞左傳文王之功天下誦而歌舞之沈佺期詩併將歌舞報恩暉又正逢鸞與鶴歌舞出天來歸路莫愁長陶潜詩行行循歸路沈佺期詩歸路烟霞晚宋之問詩歸路滿笙歌謝朓詩行矣倦路長無由税歸鞅和尹諫議史館山池全唐詩註開元二十年道士尹愔為諫議大夫知史館事故詩有莫上空虚之句唐書百官志門下省左諫議大夫四人正四品下掌諫諭得失侍從賛相中書省石諫議大夫四人掌如門下省史館脩撰四人掌脩國史貞觀三年置史館於門下省南齊書到撝傳撝資籍豪富宅宇山池皆窮上品雲館接天居左思呉都賦寒暑隔閡於邃宇虹蜺迴帶於雲館郭璞蓬萊山賛蓬萊之山玉碧構林金臺雲館皜哉獸禽謝朓逰後園賦敞風闥之藹藹聳雲館之迢迢蔡邕述行賦皇家赫赫而天居顔延之白鸚鵡賦既逹美於天居亦麗景於雲阿鮑照舞鶴賦仰天居之崇絶更惆悵以驚思徐陵太極殿銘天居爽塏大寢􅐜嚴霓裳侍玉除楚辭青雲衣兮白霓裳舉長矢兮射天狼曹植樂府披我丹霞衣襲我素霓裳又詩凝霜依玉除清風飄飛閣鮑照白苧歌垂璫散佩盈玉除喬備詩墜露清金殿流螢㸃玉除春池百子外梁元帝春賦苔染池而盡緑桃含山而併紅王筠詩春生雁鶖池陳後主詩春池已𣺌漫髙枝已嵸森西京雜記漢宫七夕臨百子池以五色縷相覊謂之相連愛芳樹萬年餘阮籍詩芳樹垂緑葉清雲自逶迤陸機詩嘉穀垂重穎芳黄樹發華顛西京雜記上林苑有萬年長生樹白銀樹銀樹扶老木守宫槐謝朓詩風動萬年枝日華承露掌沈約詩髙棃有繁實何減萬年枝洞有仙人籙徐陵天台徐法師碑金繩玉版受謁帝之符龍駕霓裳處仙宫之籙瀨鄉記老子母碑云老子把持仙籙玉簡金字編以白銀紀善綴惡陳子昻詩鳯藴仙人籙鸞歌素女琴隋書經籍志道經受道之法初受五千文籙次受三洞籙次受洞𤣥籙次受上清籙籙皆素書記諸天曹官屬佐吏之名山藏太史書史記司馬遷自序厥協六經異傳整齊百家雜語蔵之名山副在京師俟後世聖人君子又老子傳注老子為柱下史即藏書之柱下因以為官名漢書司馬遷傳遷為太史令紬史記石室金匱之書君恩深漢帝詩天子萬年疏臣䝉君恩無以報答故願君長夀而已庾信謝賚絲布啟陳留下粟有愧深恩櫟陽兩金翻慙曲施又步虚詞漢帝㸔桃核齊侯問棗花楊炯詩漢帝求仙日相如作賦才且莫上空虚法苑珠林頂生王欲升忉利即與羣臣踏虚登山江淹詩苕苕寄意勝不覺凌虚上楞嚴經彼太虚空日照則明雲屯則暗風搖則動霄澄則清氣凝則濁土積成霾水澄成暎楊雄羽獵賦騰空虚距連巻東方朔别傳朔謂同舍郎曰天下人無能知朔知朔者惟太王公耳朔卒後武帝召太王公問之曰諸星俱在否曰諸星具在獨不見嵗星十八年今復見耳帝嘆曰東方朔在朕傍十八年而不知是嵗星哉李白昌禪師山池客來花雨際易有不速之客三人來五燈㑹元湏菩提尊者在巖中宴坐諸天雨花讃嘆庾信詩花雨積為臺秋水落金池荘子秋水時至百川灌河庾信詩秋水帶沙落陳後主詩沙長見水落梁元帝棲霞寺碑金池無底已通寶塹之側宋之問詩寶鐸搖初霽金池暎晚沙片石寒青錦朝野僉載温子昇作韓陵山寺碑庾信讀而冩之曰惟有寒陵一片石堪共語庾信詩河邊一片石南岳記仙人壇青石而有白石文拾遺詩員嶠之山東有雲石駁落如錦隂鏗石詩苔駁錦文疏又石紋如碎錦庾信詩錦石寒砧面疎楊挂緑絲説文楊蒲栁也蕭慤詩楊栁月中疎王欽栁賦交緑葉而重葩轉紛錯以扶疎王褒濬池詩垂楊夾浦緑水經注弱栁蔭街絲楊被蒲庾信詩衰栁挂殘絲唐太宗臨池栁詩岸曲絲隂聚波移帶影疎髙僧拂玉麈廬山記惠逺集一時名士髙僧於般若臺世説王衍毎執玉柄塵尾與手同色南史張譏傳陳後主造玉柄麈尾曰當今雖復名士如林堪捉此者惟張譏耳王𨗳麈尾銘拂穢清署虚心以俟童子獻霜梨詩童子佩觹永嘉記靑田村有梨一株名曰官梨以供獻齊民要術藏梨法初霜後即收於屋下掘作深坑收梨置中便得經夏惜去愛佳境謝靈運詩欲去情不忍庾信詩郊間光景佳世説漸入佳境烟蘿欲暝時詩蔦與女蘿疏蘿莬絲蔓連草上生黄赤如金洛陽伽藍記髙林臣樹足使日月蔽虧懸葛垂蘿能令風烟出入鮑照詩丹蘿籠紫烟盧思道採蓮曲菱歌惜不唱欲待暝時歸御選唐詩巻十二
