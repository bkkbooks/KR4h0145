body:
  text: 欽定四庫全書御選唐詩巻十二五言律杜甫春宿左省雍錄宣政殿下有東西兩省别有中書門下外省又有承天門外兩省官亦分左右各為廨舍唐書文藝傳肅宗立杜甫奔行在上謁拜左拾遺舊唐書職官志門下左拾遺二員掌供奉諷諫案左省乃門下省也花隱掖垣暮文昌雜録唐殿廷多種花栁漢書吕后紀注掖門在兩旁若人之臂掖劉楨詩誰謂相去逺隔此西掖垣唐書權徳輿傳左右掖垣承天子誥命奉行詳覆各有攸司啾啾棲鳥過離騷揚雲霓之晻靄兮鳴玉鸞之啾啾何遜詩杳杳星出雲啾啾雀隱樹王粲詩上有特棲鳥懐春向我鳴何遜詩日夕棲鳥喧星臨萬户動庾肩吾詩月起呉山北星臨天漢中史記孝武紀作建章宫度為千門萬户張衡西都賦張千門而立萬户順隂陽以開闔月傍九霄多禮斗威儀政太平則月圓而多輝庾闈詩翔虬凌九霄張淵觀象賦陟秀峯以遐眺望靈象於九霄不寢聴金鑰晉書傅休奕傳每有奏劾或值日莫捧白簡整簪帶竦踊不寐坐而待旦又禮志明發不寢坐而待旦禮記脩鍵閉慎管籥註管䈁鎖匙也案鑰古作籥黄庭内景傳玉􅙞金鑰常完堅因風想玉珂李陵答蘇武書時因北風復恵徳音楊方詩因風吐徽音舊唐書輿服志馬珂一品以下九子四品七子五品五子張華詩文軒樹羽盖乗馬鳴玉珂梁簡文帝詩晨風白金絡桃花紫玉珂明朝有封事呉均詩今夜杯酒别明朝江水邊漢書霍光傳上令吏民得奏封事不闗尚書文心雕龍或上書或奏状慮有宣泄則嚢封以進謂曰封事唐書百官志門下省左補闕六人左拾遺六人大事延議小則上封事數問夜如何詩夜如何其夜未央庭燎之光箋宣王以諸侯將朝夜起曰夜如何其問早晚之辭初月光細弦欲上左傳註月體無光待日照而光生半則為弦全則成望釋名弦半月之名也其形一旁曲一旁直若張弓施弦也鮑照詩客行鈎始懸此夜月將弦詩如月之恒箋月上弦而就盈䟽八日九日月體正半昬而中似弓之張而弦直謂上弦也影斜輪未安江淹秋夕納凉詩蕭條晚秋景旻雲承景斜劉孝威詩月輪殊未圓江總詩新月半輪空李隅賦波水蕩而月輪斜梁簡文帝月詩飛輪了無轍明鏡不安臺㣲升古塞外劉孝綽詩秋月始纎纎微光垂步檐謝莊月賦升清質之悠悠宋孝武帝詩弦月升初光陳後主詩愁眉塞月生隋煬帝詩秋昬塞外雲霧暗闗山月已隱莫雲端夏侯湛賦月翳翳以隱雲時籠籠以投光蕭綜詩西樹隱落月江淹詩日暮碧雲合古善哉行叅駕六龍游戯雲端劉禕之詩凝睇白雲端河漢不改色蕭子範秋月詩河漢東西隱清光此夜出四民月令天漢有奕奕白氣如河波光輝五色梁簡文帝詩巻幔通河色開忩引月輝張正見詩月影帶河流樂府凌霜不改色闗山空自寒王褒詩闗山夜月明陵瓊詩邊城與明月俱在闗山頭王褒關山月天寒光轉白庭前有白露禮記孟秋之月白露降宋孝武帝詩白露已盈庭謝惠連詩白露滋團菊暗滿菊花圑禮記季秋之月鞠有黃華陶潛詩秋菊有佳色裛露掇其英謝惠連詩團團滿葉露天河詩維天有漢䟽漢水之精也氣發而著精華浮上宛轉隨流名曰天河一曰雲漢晉書天文志天漢起東方經箕尾之間謂之天河亦謂之漢津分為二道博物志舊説天河與海通近世有居海渚者見年年八月有浮槎去來不失期乃乗而去至一處有城郭屋舍遙望室中多織婦見一丈夫牽牛渚次飲之驚曰何由至此其人具説來意拜問此是何處答曰還訪嚴君平則知之因還問君平曰某年月日有客星犯牽牛宿計其年月正其人到天河時也庾肩吾舟中七夕詩天河來暎水織女欲攀舟常時任顯晦晉書隐逸傳論君子之行殊途顯晦之謂也秋至最分明江淹詩秋至白雲起周𢎞正詩斜光入丹扇的的最分明宋之問明河篇八月凉風天氣晶萬里無雲河漢明縱被微雲掩世說司馬太傅齋中夜坐於時天月明净都無纎翳太傅嘆以為佳謝景重曰意謂乃不如微雲㸃綴太傅因戱曰卿居心不净乃復强欲滓穢太清耶徐陵關山月月出栁城東微雲掩復通孔徳紹詩雲葉掩山樓終能永夜清謝靈運賦發潛夢於永夜鮑照蒿里行馳波催永夜古詩河漢清且淺含星動雙闕沈約高松賦含星漏月之竒王勃頌貝齒含星流毫耀月史記天官書漢者金之散氣其本曰水漢星多多水少則旱注漢河漢也水生於金多少謂漢中星釋名闕闕也在門兩旁中央闕然為道也古詩雙闕百餘尺徐陵樂府輦道乗雙闕伴月落邊城杜審言都尉山亭詩勝跡都無限只應伴月歸宋之問明河篇昬見南樓清且淺曉落西山縱復横楊雄長楊賦海内澹然永無邊城之災梁簡文帝詩邊城秋易知牛女年年度史記天官書牽牛為犧牲又織女天女孫也注織女三星在河北天紀東天女也續齊諧記桂陽成武丁有仙道謂其弟曰七月七日織女當渡河弟問曰織女何事渡河答曰織女蹔詣牽牛蘇彦七日詩織女思北沚牽牛嘆南陽庾信七夕賦觀牛星之曜景視織女之䦨干杜審言七夕詩年年今夜盡機杼别情多荆楚嵗時紀天河之東有織女天帝之子也年年機抒勞役織成雲錦天衣天帝憐其獨處許嫁河西牽牛郎嫁後遂廢織絍天帝怒責令歸河東但使其一年一度相㑹何曾風浪生南史宗慤傳願乗長風破萬里浪庾信楊栁歌倐忽河中風浪生夜宴左氏庄風林纎月落朱異田飲引屬風林之蕭瑟值寒夜之蒼茫謝朓詩疎蕪散風林古樂府兩頭纎纎月初生張綽詩雲表挂纎月梁昭明太子詩月落林餘影衣露浄一作静琴張說苑孺子撡彈於後園露霑其衣曹植秋思賦髙雲静兮露凝衣蕭慤春日曲水詩藻露浥行衣韓詩外傳治國者譬若張琴然賈誼陳政事䟽琴毖不調必解而更張之江淹賦濁醪夕引素琴晨張暗水流花徑李百藥詩暗水急還流庾肩吾詩向嶺分花徑隨階轉藥攔張正見梅花落詩落逺春風急飛多花徑深春星帶草堂梁簡文帝神山寺碑澄明離日照影春星又草堂傳汝南周顒昔經在蜀以蜀草堂寺林壑可懐乃於鍾嶺雷次宗學館立寺因名草堂亦號山茨孔稚圭北山移文鍾山之英草堂之靈檢書燒燭短江淹賦共檢兮雒書南史王僧孺傳頓燒一寸燭而成四韻詩何難之有謝朓詩離堂華燭盡㸔劍引杯長呉越春秋秦客薛燭善相劍越王取純鈎湛盧示之桓譚新論君大素曉習萬劍之名凡器遙視而知不湏手持熟察沈烱十二屬詩猴粟羞芳果雞跖引清盃沈佺期詩榴花引御盃詩罷聞吳詠李嶠鳬詩李陵賦詩罷王喬曳舄來左思呉都賦荆艶楚舞呉覦越吟鮑照芙蓉賦起榜妾之呉歌駱賔王詩鄉思繞呉歈扁舟意不忘呉越春秋范蠡乗扁舟出三江入五湖人莫知其所適庾信賦吹落葉之扁舟飄長風於上游史記髙祖紀髙祖曰豐吾所生長極不忘爾唐書杜甫傳甫少貧不自振客呉楚齊趙間黄鶴曰公未得鄉貢之前遊呉越下第之後遊齊趙此詩云詩罷聞呉詠扁舟意不忘謂因呉音而思其地也禹廟方輿勝覽禹祠在忠州臨江縣南過岷江二里禹廟空山裏盧思道詩空山照秋月陶𢎞景詩空山霜滿髙烟平秋風落日糾江淹詩思起秋風年謝靈運詩落日次朱方梁元帝詩西山晚日斜蕭詮詩青山照落暉荒庭垂橘柚張協詩荒庭寂以閑禹貢淮海惟揚州厥包橘柚錫貢孔安國曰小曰橘大曰柚淮南子橘柚有鄉古詩橘柚垂佳實古屋畫龍蛇左傳深山大澤實生龍蛇宋玉招魂仰觀刻桷畫龍蛇些孫莘老云荒庭垂橘柚古屋畫龍蛇盖橘柚錫貢驅龍蛇皆禹之事公因見此有感也雲氣生虚壁莊子乗雲氣御飛龍呉均與顧章書幽岫含雲深溪蓄翠陸倕詩綱户圖雲氣庾信登歌封中雲氣江聲走白沙山謙之南徐州記京江禹貢南江也春秋朔望輙有大濤聲勢駭然極為竒觀湘中記白沙若霜雪子虗賦内隱巨石白沙梁武帝詩白沙青漣漪庾信詩白沙如濕粉蚤知乗四載庾信詩蚤知覔不見又玉山乘四載書禹曰予乗四載隨山刋木注四載水乗舟陸乗車泥乗輴山乗樏也疏鑿控三巴郭璞江賦巴東之峽夏后疏鑿三巴記閬白水東南流三折如巴字華陽國志改永寧為巴郡以固陵為巴東安漢為巴西是為三巴一統志忠州春秋戰國為巴地登兖州城樓禹貢濟河惟兖州爾雅濟河間曰兖州劉熈釋名兖州取兖水以為名也輿地廣記隋大業二年改兖州為魯郡唐武徳中克徐圓朗復曰兖州唐書地理志兖州魯郡屬河南道一統志滋陽縣隋置瑕丘縣為魯郡治唐為兖州治東郡趨庭日漢書地理志東郡秦置屬兖州又元帝記闗東郡國十一按諸家注杜詩首引漢書地理志考秦漢之東郡在今東昌府境内唐之東郡在今滑縣皆與滋陽無涉而今之滋陽漢為瑕丘屬山陽郡唐為魯郡治皆與東郡無涉則其為泛指東方郡國無疑論語嘗獨立鯉趨而過庭孫萬壽詩趨庭尊教義蔡夢弼注公父閑嘗為兖州司馬公時省侍故有趨庭句按舊唐書父閑終奉天令王洙序亦云而新唐書無之若其為兖州司馬不知何據而諸家注及世系皆載之今依諸家載入南樓縱目初世說庾亮在武昌秋夜氣佳景清佐吏登南樓理詠音調始遒俄而庾公率左右十許人來諸賢欲起避之公徐曰老子於此興復不淺江淹詩苕亭南樓期梁簡文帝詩試起登南樓隋煬帝望江南詞閒縱目魚躍小蓮東張鏡觀象賦爾乃縱目逺覽傍通四維浮雲連海岱古樂府浮雲多暮色顔之推鳴蟬篇馬色浮雲起江淹去故鄉賦愛桂枝而不見悵浮雲而離居陸機賦粲烟接以雲連書海岱惟青州注青州之域東北至海西南距岱岱秦山也又海岱及淮惟徐州史記貨殖傳海岱之間歛袂而徃朝焉平野入青徐鮑照詩平野起秋雲梁簡文帝詩平野度春翬木華海賦東演析木西薄青徐唐書青州北海郡徐州彭城郡俱屬河南道孤嶂秦碑在呉均與施從事書孤峯入漢緑嶂百重唐太宗小山賦寸中孤嶂連還㫁史記始皇紀二十八年東行郡縣上鄒嶧山立石與魯諸儒生議刻石頌秦徳水經注嶧山北有絶巖秦始皇觀禮於魯登於嶧山之上命李斯以大篆勒銘山嶺名曰書門荒城魯殿餘謝眺詩荒城逈易隂庾信詩古碑文字盡荒城年代迷後漢書王延夀字文考有雋才遊魯作靈光殿賦後蔡邕亦造此賦未成及見延夀所為遂輟而止注殿在兖州曲阜縣城中靈光殿賦序魯靈光殿者盖景帝程姫之子恭王餘之所立也初恭王始都下國好治宮室遂因魯僖基兆而營焉遭漢中㣲自西京未央建章之殿皆見隳壞而靈光巋然獨存徐摛詩列楹登魯殿徐陵玉䑓新詠序西蜀豪家託情窮於魯殿從來多古意史記龜䇿傳所從來久矣隋李密詩沾襟何所為悵然懐古意臨眺獨躊躇沈約詩即事既多美臨眺殊復竒莊子聖人躊躇以興事韓詩搔首躊躇薛君章句躊躇躑躅也玉篇猶豫也思舊賦惟古昔以懐今兮心徘徊以躊躇習鑿齒文撫乗躊躇常建破山寺後禪院一統志興福寺在虞山北嶺下齊彬州刺史倪徳光捨宅為寺唐常建詩曲徑通幽處禪房花木深清晨入古寺曹植詩清晨發皇邑法苑珠林五臺方三百里中佛光山仙華山王子塔古寺六所初日照髙林宋玉神女賦耀乎若白日初出照屋梁江總詩初日照紅粧又秦樓初日度陽臺沈約七賢論相與莫逆把臂髙林張華詩仰䕃髙林茂鮑照詩長霧匝髙林曲徑通幽處梁元帝詩入林迷曲徑漢書谷永傳北宫苑囿街巷之中臣妾之家幽閒之處禪房花木深水經注陽水東逕故七級寺禪房前洛陽伽藍記景果寺中有禪房一所内置祗洹精舍葛洪詩花木長榮鮑照詩花木亂平原庾信詩絶愛猿聲近誰憐花徑深山光悅鳥性謝朓詩山光餘晚照上官儀詩花蝶來未已山光曖將夕劉孝標山居志夫鳥居山上橧巢木末