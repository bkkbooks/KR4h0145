驪山在南唐書地理志京兆府昭應縣本新豐有宫在驪山下貞觀十八年置咸亨二年始名溫泉宫天寶元年更驪山曰㑹昌山六載更溫泉曰華清宫治湯井為池環山列宫室又築羅城置百司萬國來朝渭水東左傳禹㑹諸侯於塗山執玉帛而朝者萬國張正見詩軌文通萬國左傳滕侯薛侯來朝爭長水經注渭水南出苻石徑新豐縣故城北東與魚池水㑹水出驪山東也此日小臣徒獻賦周禮小臣掌王之小命詔王之小法儀吕氏春秋湯師小臣顔延之赭白馬賦序末臣庸蔽敢同獻賦鮑照詩慚無獻賦才謝朓詩登賢博望獻賦清漳漢家誰復重揚雄史記自序天子始建漢家之封而太史公留滯周南不得與從事漢書揚雄傳雄字子雲成都人少而好學孝成帝時有薦雄文似相如者召雄待詔承明之庭正月從上甘泉遂奏甘泉賦天子異馬岑參西掖省即事漢官儀左右曹受尚書事前世文士以中書在右因謂中書為右曹又稱西掖西掖重雲開曙暉束晳詩黮黮重雲輯輯和風王僧辨表九縣雲開六合清朗魏文帝詩扶桑生朝暉髙閭至德頌重光麗天晨暉疊旦北山疏雨㸃朝衣詩南山有臺北山有萊謝朓詩去剪北山萊陶潛詩微雨從東來好風與之俱北齊享廟樂詞禮申官次命改朝衣張說詩和風偏應律細雨不霑衣千門栁色連青瑣三輔黃圖帝作建章宫度為千門萬户何遜詩輕烟滲栁色漢官儀給事黃門之職日暮入對青瑣門拜名曰夕郎左思賦雕欒鏤楶青瑣丹墀三殿花香入紫微兩京新記大明宫有麟德殿在仙居殿西北此殿三面故以三殿為名庾信賦屋裏衣香不如花晉書天文志紫微大帝之座天子之常居也平明端笏陪鴛列漢書叔孫通傳長樂宫成諸侯羣臣朝先平明謁者治禮引以次入殿門江淹詩斂袵依光采端笏奉仁明張九齡詩豈非鴛鴻列愓如泉壑臨薄暮垂鞭信馬歸廣雅日將落曰薄暮謝朓詩歸來薄暮聊以永年木蘭歌南市買馬鞭庾信詩馬鞭聊寫賦竹葉暫傾杯宦拙自悲頭盡白潘嶽閒居賦序嶽嘗讀汲黯傳至司馬安四至九卿良史書之以巧宦之目僕少竊鄉曲之譽八徙官而一進階再免一除名一不拜職遷者三而已矣雖通塞有遇抑亦拙者之效也漢書蘇武傳始以強仕出及還鬢髮盡白不如巖下掩荆扉漢書王貢兩龔傳序谷口鄭子真不詘其志耕於巖石之下名振京師庾肩吾啓紫花標色出自鄭巖之下陶潛詩白日掩荆扉虛室絶塵想王褒詩竹館掩荆扉池光晦晚暉奉和杜相公發益昌舊唐書杜鴻漸傳永泰二年二月命鴻漸以宰相兼充山劍副元帥劍南西川節度使按水經注巨馬水東徑益昌縣故城南比益昌即涿郡之水清縣鴻漸由京師出鎮劍南與此無涉唐書地理志利州益昌郡屬山南道時鴻漸入蜀或取道於利州故云相國臨戎别帝京梁元帝令周曰天官秦稱相國唐太宗詩臨戎八陳張漢武故事帝行幸河東祠后土顧視帝京欣然中流與羣臣飲燕歡甚擁麾持節逺橫行溫子升文盛簡親賢擁麾作鎮盧諶詩秦王御殿坐趙使擁節前史記季布傳樊噲曰臣願得十萬衆橫行胸奴中朝登劍閣雲隨馬左思蜀都賦緣以劍閣阻以石門注劍閣谷名自蜀通漢中道張載劍閣銘惟蜀之門作固作鎮是曰劍閣壁立千仞梁簡文帝詩登山想劍閣逗浦憶辰陽庾信詩雲低馬上人夜渡巴江雨洗兵華陽國志督護李嚴更城江州大城欲穿城後山自汶江通水入巴江丞相諸葛亮不許六韜祖行之日雨輜重車至軫是洗濯甲兵也魏武帝兵要大將將行雨濡衣冠是謂洗兵左思魏都賦洗兵海島刷馬江洲山花萬朵迎征蓋徐陵詩山花臨舞席水影照歌床虞世南詩山花濕更燃魏文帝詩卑枝拂羽蓋川栁千條拂去旌沈佺期詩楊栁千條花欲綻梁簡文帝詩栁條恆著地李皓賦靡霜風以抗斾拂招搖之華旌暫到蜀城應計日華陽國志秦惠王二十七年張儀城成都周回十二里髙七丈郫城周回七里髙六丈舊唐書地理志成都府隋蜀郡武德元年改為益州天寶元年改益州為蜀郡至德二載改蜀郡為府長史為尹又分為劍南東西川各置節度使廣德元年復併為一節度自崔寧鎮蜀後分為西川自後不改一統志成都府禹貢梁州之域古為蜀國後漢書郭伋傳伋行部到西河有兒童數百各騎竹馬道次拜迎及事訖諸兒復送至郭外問使君何日當還伋謂别駕從事計日當告之須知明主待持衡韓非子以餘補不足以長續短之謂明主詩實惟阿衡注衡平也伊尹湯所依倚而取平也晉書吳隱之傳隱之有孝行韓康伯母謂康伯曰汝後若居銓衡之職當用此人和祠部王員外雪後早朝即事唐六典祠部員外郎一人從六品上祠部郎中員外掌祠祀享祭天文漏刻卜筮醫藥道佛之事長安雪後似春歸張衡賦漢之西都實在雍州名曰長安傳休奕詩所思兮何在乃在西長安梁簡文帝詩春歸思復生庾信賦宜春苑中春己歸披香殿裏作春衣積素凝華連曙暉謝莊雪賦積素未虧白日朝鮮鮑照白紵舞歌詞凝華結藻久延立魏文帝詩扶桑生朝暉色借玉珂迷曉騎張華詩文軒樹羽蓋乘馬鳴玉珂梁簡文帝詩晨風白金絡桃花紫玉珂又驤騎晨野摐金曉陸李嶠賀雪表海騎相趍下朝仙闕光添銀燭晃朝衣鮑照賦潤蓬山之瓊膏輝葱河之銀燭史記司馬相如傳於是歷吉日以齊戒襲朝衣乘法駕北齊享廟樂歌申禮官次命改朝衣西山落月臨天仗三輔黃圖武帝建元三年開上林苑旁南山而西至長楊五柞北繞黃山宗楚客詩水光搖落月樹色帶晴烟鮑照玩月詩夜移衡漢落徘徊帷幌中唐六典凡左右衛分為五仗一曰親仗二曰供奉仗三曰勳仗四曰翊仗五曰散手仗北闕晴雲捧禁闈史記髙祖紀蕭丞相營作未央宫立東闕北闕張衡賦北闕甲第當道直啓梁簡文帝詩雲開天半晴後漢書周舉傳建和三年詔曰周舉出入京輦有欽哉之績在禁闈有密靜之風應璩書入侍殿屋出典禁闈聞道仙郎歌白雪金根經青宫之內北殿上有仙格格上有學仙簿金簡玉札有十萬篇領仙玉郎之典也宋玉對楚王問其為陽春白雪國中屬而和者數人陳琳箋聽白雪之音觀渌水之節由來此曲和人稀劉琨歌我欲竟此曲此曲悲且長宋玉對楚王問是其曲彌髙其和彌寡漢書黃瓊傳陽春之曲和者必寡盛名之下其實難副古詩不惜歌者苦但傷知音稀張謂字正言河南人登天寶二年進士第大厯中為禮部侍郎春園家宴南園春色正相宜張協詩借問此何時蝴蝶飛南園庾信詩賴有南園菊殘花足解愁謝朓詩春色滿皇州沈約詩春色犯寒來梁簡文帝詩春風本自竒楊桞最相宜隋煬帝詩烟雨更相宜大婦同行小婦隨劉鑠樂府大婦裁霧縠中婦牒氷練小婦端清景含歌登玉殿梁簡文帝樂府大婦舒綺絪中婦拂羅巾小婦最容冶映鏡學嬌顰詩惠而好我携手同行世說潘安仁夏侯湛竝有美容喜同行時人謂之連璧竹裏登樓人不見永嘉郡記張豸隱居頤志家有苦竹數十頃在竹中為屋常居其中王右軍聞而造之豸逃避竹中不與相見一郡號為竹中髙士劉孝綽詩竹裏見攢枝王粲登樓賦登兹樓以四望兮聊假日以銷憂晉書劉琨傳在晉陽乘月登樓清嘯花間覔路鳥先知徐悱妻劉氏詩戲蝶花間騖晉書武帝紀將適越者指沙漠以遵途欲登山者涉舟航而覔路吕安文涉澤求蹊披榛覔路櫻桃解結垂簷子禮記羞以含桃先薦寢廟注含桃櫻桃也嵗時記四月一日內園進櫻桃膳夫録大而殷者曰吳櫻桃黃而白者曰櫻桃小而赤者曰水櫻桃庾肩吾謝齎朱櫻啓結實西園非復粘蟬之樹蕭子雲詩庭栁復垂簷梁宣帝櫻桃賦等橘柚于簷户楊栁能低入户枝詩昔我往矣楊栁依依庾信賦楊栁共青旗一色梁元帝詩緑栁逐風低隂鏗詩鶯隨入户樹山簡醉來歌一曲晉書山簡傳字季倫鎮襄陽惟酒是耽諸習氏有佳園池簡每出遊嬉多之池上置酒輒醉庾信詩山簡接䍦倒嵇康與山巨源書今但欲守陋巷時一與親舊叙離濶陳說平生濁酒一杯彈琴一曲志意畢矣薛正曜詩酒筵浮湛露歌曲唱流風參差笑殺郢中兒詩參差荇菜梁武帝樂府參差列鳯管宋玉對楚王問客有歌于郢中者其始曰下里巴人國中屬而和者數千人其為陽春白雪屬而和者數人御選唐詩卷十九
