强欲前梁簡文帝詩日色花上綺風光水中亂劉孝綽詩麗景花上鮮油雲葉裏潤隋書天文志天苑十六星在昴畢南天子之苑囿張衡賦天苑圓開兮畜異禽庾信賦廻六龍于天苑却坐雲邊看帝京鮑照詩林際無窮極雲邊不可尋梁簡文帝詩栖神紫臺上縱意白雲邊漢武故事帝行幸河東祠后土顧視帝京欣然中流與羣臣飲燕帝歡甚乃自作秋風辭戴暠詩欲知佳麗地為君陳帝京百草香心初罥蝶史記歴書孟春冰泮發蟄百草奮興莊子春風發而百草生古詩四顧何茫茫東風揺百草白虎通鬯者以百草之香鬱金合而釀之梁簡文帝詩風散同心草廣韻罥綰也說文罥網也裴子野雪詩拂草如連蝶千林嫩葉始蔵鶯唐太宗詩日晃百花色風動千林翠江淹詩香枝兮嫩葉翡累兮翠疊王筠詩叢蘭己飛蝶楊栁半蔵鴉謝莊詩天桃晨莫發春鶯旦夕喧幸同葵藿傾陽早杜公瞻詩況復兩心同曹植表葵藿之傾葉太陽雖不囬光然終向之者誠也鮑照園葵賦承朝陽之麗景願比盤根應候榮後漢書虞詡傳詡為朝歌長笑曰不遇盤根錯節何以别利器乎魏書蕭琛傳琛遷河南尹上表曰河南郡是陛下天山之堅木盤根錯節亂植其中非貞剛精鋭無以治之陸雲賦序應候守節則其信也陶潛歸去來辭木欣欣以向榮宗楚客奉和幸安樂公主山莊應制唐書安樂公主營第及安樂佛廬皆憲寫宫省而工緻過之玉樓銀牓枕嚴城十洲記崑崙山一角有積金為天墉城面方千里城上安金臺五所玉樓十二所神異經東方有宫青石為墻髙三仭左右闕髙百尺畫以五色門有銀牓沈炯林屋館碑崑山平圃銀牓相輝沈約文北風未起馬首便以南向塞草未衰嚴城于焉早閉翠葢紅旗列禁營淮南子遊于江潯海裔馳要褭建翠葢揚雄賦流星旄以電爥兮咸翠葢而鸞旗潘岳賦其西則有元戎禁營注禁營謂五營也又詩惟系惟處列營基跱日映層巖圖畫色梁簡文帝𤣥圃園講頌日映金雲風搖銀草水經注自太行以西王屋以東層巖髙峻梁書宗史傳齊司徒竞陵王集學士于西邸竝見圖畫史亦預焉庾信碑玉門亭障無勞圖畫王延夀賦圖畫天地品類羣生風搖雜樹管絃聲西京雜記上林苑搖風樹十株鳴風樹十株淮南子使葉落者風摇之張華詩微風搖􅉅若陶潛詩忽逢桃花林夾岸數百步中無雜樹謝朓詩芊眠起雜樹漢書禮樂志鐘石管絃張衡賦徳盛形於管絃水邊重閣含飛動范雲詩盈盈一水邊張衡賦複陸重閣轉石成雷梁簡文帝序密宇浮清重閣相藻雲裏孤峯類削成謝朓詩望山白雲裏望水平原外梁簡文帝詩去帆入雲裏吴均書森壁爭霞孤峯限日西岳記太華之山削成而四方曹植賦肩若削成幸覩八龍遊閬苑張璠漢紀荀淑有八子居西豪里時人號曰八龍庾肩吾詩閬苑秋光暮無勞萬里訪蓬瀛後漢書竇融傳河西咸驚以為天子明見萬里之外陸雲詩永路隔萬里曹植詩將騁萬里塗列子渤海之中有大壑其中有山一曰岱輿二曰員嶠三曰方壺四曰瀛洲五曰蓬萊拾遺記昆臺之山有垂白之叟宛若少童貌若氷雪膚實腸輕厯蓬瀛而超碧海劉孝綽詩無因追羽翮及爾宴蓬瀛趙彦昭人日侍燕大明宫應制北史魏收傳東魏帝宴百僚問何故名人日對曰正月一日為雞二日為狗三日為猪四日為羊五日為牛六日為馬七日為人雍録唐有三大内太極宫在西名西内大明宫在東名東内别有興慶宫號南内三内迭受朝而大明最數寶契無為屬聖人周禮司㑹掌左契白帖聖人執左契注左契心也左者不用之地以喻無為揚雄劇秦美新天剖神符地合靈契禮記王中心無為也以守至正莊子無為而萬物化江淹詩至人貴無為易聖人作而萬物覩又聖人之大寶曰位琱輿出幸玩芳辰張衡賦轙琱輿而樹葩兮擾應龍以服輅北史崔光傳輔神養和簡息遊幸梁元帝纂要春曰青陽辰曰良辰曰嘉辰曰芳辰李嶠詩早聞年欲至剪綵學芳辰平樓半入南山霧爾雅俠而修曲曰樓詩秩秩斯干幽幽南山陶潛詩採菊東籬下悠然見南山謝朓詩雖無𤣥豹姿終隠南山霧陳後主詩樹冷月恒少山霧日偏沉飛閣旁臨東野春王屮頭陀寺碑飛閣逶迤下臨無地陸機詩飛閣纓虹帶曽臺冒雲冠梁書沈約傳開閣室以逺臨闢髙軒而旁觀左傳季平子行東野禮記立春之日親率公卿諸侯大夫以迎春于東郊夾路穠花千樹發孫綽賦雙闕雲竦以夾路瓊臺中天而懸居張協詩楸梓夾路蓊蔚成林庾信詩􅚫拂緑堤栁甍飄夾路花詩何彼穠矣沈約賦李衡則橘林千樹石崇則雜果萬株垂軒弱栁萬條新嵇含詩臨軒樹萱草本草注栁枝弱而垂流故謂之栁張正見詩三陽弱栁垂張仲甫詩水萍千葉散風栁萬條斜處處風光今日好湘東王詩春情處處多徐陵詩風光今旦動雪色故年殘王儉詩風光承露照霧色㸃蘭暉荀子欲觀千載則審今日年年願奉屬車塵釋寶月行路難年年望望情不歇漢書賈捐之傳鸞旗在前屬車在後後漢書輿服志大駕屬車八十一乘法駕半之屬車尚書御史所載最後一車懸豹尾豹尾以前比省中晉書輿服志屬車一曰副車一曰貳車一曰佐車李嶠詩珠履陪仙駕金聲振屬車張説隆慶池侍宴應制舊唐書中宗紀景龍四年幸隆慶池結綵為樓宴侍臣泛舟戲樂㑹要開元十八年十二月十九日有龍見于興慶池靈池月滿直城隈廣雅沼池也班固賦神池靈沼往往而在史記日者傳日中必移月滿必缺古詩三五明月滿四五蟾兔缺劉勰新論駛雪多積荒城之隈急風好起沙河之上黼帳天臨御路開司馬相如賦芳香芬烈黼帳髙張又黼帳低垂王勅南郊頌山明野徹日降天臨晉中興書太和中鄴下童謡曰青青御路楊白馬紫遊韁東沼初陽疑吐出漢書司馬相如傳日出東沼入乎西陂謝莊賦擅扶光于東沼嗣若英于西𡨕唐太宗詩條風開律動初陽詩日出有