body:
  text: 欽定四庫全書御選唐詩卷十九七言律沈佺期從幸香山寺一統志香山寺在河南府城西南龍門南山奕奕通丹禁謝朓詩況復南山曲何異幽棲時詩奕奕梁山隋書百官志武騎之職皆以分司丹禁侍衛左右北闕峩峩連翠雲史記高祖紀蕭丞相營作未央宫立東闕北闕陳子良詩車從北闕來司馬相如上林賦九嵕嶻嶭南山峩峩左思蜀都賦鬱葐蒀以翠微崛巍巍以峩峩陸機百年歌軒冕婀那翠雲中陸雲詩翠雲崇藹嶺上樓臺千地起陶𢎞景詩嶺上多白雲史記天官書海旁蜃氣象樓臺王融序離房乍設層樓間起宋之問詩塔湧香花地城中鐘鼓四天聞庾信詩尚聞香閣梵猶聽隔林鐘梁昭明太子詩法鼓亂嚴更梁簡文帝唱導文澤及三界明照四天王褒碑四天之下聞諸象教旃檀曉閣金輿度梁簡文帝六根懴文振裳屣步跨旃檀之迥林唐書西域傳天竺國以貝齒為貨有金剛旃檀鬱金與大秦扶南交址相貿易酉陽雜俎一木五香根曰旃擅維摩經有國名衆香其國一切皆以香作樓閣張正見詩帳殿幸金輿庾肩吾詩入徑轉金輿鸚鵡晴林采眊分法苑珠林爾時世尊將諸比丘詣鸚鵡林各敷座于樹下坐劉孝儀詩山風亂采眊陳子良詩迎風采眊轉願以醍醐參聖酒廣韻醍醐酥之精液也涅槃經譬如長者多有諸牛付放牧人令逐水草但為醍醐不求乳酪又醍醐者名為世間第一上味魏志徐邈傳時科禁酒邈私飲至于沈醉校事趙達問以曹事邈曰中聖人達白之太祖甚怒鮮于輔進曰平日醉客謂酒清者為聖人濁者為賢人邈性修慎偶醉言耳庾信詩美酒還參聖還將祗苑當秋汾梁昭明太子詩舒金起祗苑白帖須達多長者白佛言弟子欲營精舍請佛住惟有祗陀太子園廣八十頃林木鬱茂可居白太子太子戲曰滿以金布便當相與須達多出金布八十頃精舍皆成凡千三百區漢武帝秋風辭泛樓船兮濟河汾漢武故事帝行幸河東祠后土顧視帝京欣然中流與羣臣飲宴帝歡甚乃自作秋風辭梁昭明太子詩唐遊薄汾水李頎宿瑩公禪房聞梵異苑陳思王植嘗登魚山忽聞嵒岫裏有誦經聲清遒深亮逺谷流響不覺斂襟祗敬便效而則之今梵唱皆植依擬所造花宫仙梵逺微微梁簡文帝相宫寺碑天宫陀樹之花庾信詩仙梵入伊笙沈約詩積翠逺微微月隱高城鐘漏稀梁元帝詩却月隱高城周𢎞正詩北堂月稍隱宋玉風賦乘凌高城張正見詩洛城鐘漏息溫子升文鐘漏相催日夜不息夜動霜林驚落葉潘嶽賦天凝露以降霜兮木葉落而隕枝漢武帝落葉哀蟬曲落葉依于重扄陶潛詩空庭多落葉慨然知已秋曉聞天籟發清機莊子地籟則衆竅是已人籟則比竹是已敢問天籟子綦曰夫吹萬不同而使其自已也曹攄詩清機發妙理蕭條已入寒空靜楚辭山蕭條而無獸王粲初征賦野蕭條而騁望唐高宗詩寒空碧霧輕颯沓還隨秋雨飛鮑照舞鶴賦颯沓驚顧遷延遲暮梁簡文帝詩雲霞紛颯沓庾肩吾詩秋雨䝉重嶂謝朓樂歌凍雨飛祥雲靡劉孝威望雨詩飛雨入階廊隂鏗詩四溟飛旦雨始覺浮生無住著梁武帝㑹三教詩苦集始覺知因果乃方明袁宏漢紀西域天竺國有佛焉佛者漢言覺也將以覺悟羣生也莊子其生若浮周𢎞讓文浥酒念浮生王褒碑六珠芬盡法身常住鳩摩羅什詩既得出長羅住此無所住頓令心地欲皈依瓔珞四不得經菩薩心等如地梁簡文帝大愛敬寺剎下銘靈祗叶贊有識歸依指月録波旬下天宫至尊者所禮足哀懴曰誓向佛道尊者曰汝可自唱皈依三寶波旬合掌三唱而三尸悉除劉長卿送惠法師遊天台因懷智大師故居一統志天台山在天台縣西一百一十里道書是山上應台星超然秀出有八重視之如一帆高一萬八千丈周回八百里上有瓊樓玉闕天堂碧林醴泉仙物畢具翠屏瀑水知何在孫綽遊天台山賦踐莓苔之滑石摶壁立之翠屏宋之問詩虹橋轉翠屏一統志瀑布山在天台縣西四十里有瀑布水陸羽云天下第十七水梁簡文帝招真館碑瀑水懸流雜天河而俱灑劉斌詩瀑水近天河盧照鄰詩瀑水含秋氣鳥道猿啼過幾重隂鏗詩瞻雲望鳥道庾信銘鳥道乍窮羊腸或斷王維詩鳥道一千里猿聲十二時徐安貞詩巴東下歸棹莫待夜猿啼張子容詩有時聞虎嘯無處不猿啼杜甫詩烟霞障幾重落日獨搖金䇿去謝靈運賦望新晴于落日梁簡文帝詩白日西落楊栁垂禮記序泛駕之馬設銜䇿以驅之魏書襲衍傅衍欲辭朝命請隱嵩山表曰荷衣葛屨裁營已整搖䇿納屣便陟山途深山誰向石橋逄史記貨殖傳淵深而魚生之山深而獸往之陳子昻詩山深興轉幽常建詩夕映翠山深啓䝉記注天台山楢溪水險前有石橋徑不盈尺長數十丈下臨絶澗謝靈運山居賦凌石橋之莓苔越楢溪之紆縈張正見詩霧解石橋通宋之問詩待入天台路看余度石橋定攀巖下叢生桂李白詩有善留攀桂梁元帝賦噴飛泉于天末鼓雷霆于巖下楚辭桂樹叢生兮山之幽庾信賦小山則叢桂留人欲買雲中若箇峯世說支道林欲就深公買印山深公曰未聞巢由買山而隱何遜詩去帆若不見試望白雲中演繁露若干者設數之言也干猶箇也若箇猶言幾何枚也王維詩不知香積寺數里入雲峯憶想東林禪誦處高僧傳沙門慧永居在西林與慧逺同門舊好遂要同上永謂刺史桓伊曰逺公方當𢎞道今徒屬已廣而來者方多貧道所棲褊狹不足相處如何桓乃為逺復于山東更立房殿即東林是也王屮頭陀寺碑崇基表剎立禪誦之堂王維詩山中多法侣禪誦自為羣寂寥惟聽舊時鐘庾信步虛詞凝真天地表絶想寂寥前宋之問詩龍宫鎖寂寥孔德紹詩臨風聽曉鐘江總賦聽風鐘之易近傳燈録宋清襌師有僧問佛法大意曰擾擾囱囱晨雞暮鐘郎士元酬錢起秋夜宿靈臺寺見寄本集作題精舍寺石林精舍虎溪東左思吳都賦雖有石林之岝崿請攘臂而靡之江淹相思木頌竦枝碧澗卧根石林高僧傳漢明帝于城門外立精舍以處摩騰焉王維詩肯過精舍竹林前廬山記惠逺法師送客過虎溪虎輒鳴號李白詩笑别廬山逺何須過虎溪夜扣襌扉謁逺公梁簡文帝詩山齊開夜扉梁元帝賦聞懸魚之扣扉晉書單道開傳初止鄴城後徙臨漳昭德寺房內造重閣于上編菅為襌室孟浩然詩嘗讀逺公傳逺懷塵外蹤廬山記逺法師居廬阜三十餘年影不出山跡不入俗月在上方諸品靜沈約詩月華臨靜夜夜靜滅氛埃解琬詩金輿幸上方王褒突厥寺碑提羣品於萬福濟蒼生于六道心持半偈萬緣空徐陵傳大士碑割身奉思聞半偈于涅槃報恩經爾時轉輪大王于身灌滿香油取上妙細㲲纒以為炷時婆羅門大師即使為王而說半偈傳燈録達磨謂二祖汝但外息諸緣可以入道二祖從此皆息萬緣心如枯木孔稚圭北山移文談空空于釋部蒼苔古道行應遍淮南子窮谷之汚生以蒼苔杜甫詩携手卧蒼苔王粲賦遵古道以游豫兮昭勸助乎農圃落木寒泉聽不窮謝靈運詩木落知風發鮑照詩木落江渡寒易井冽寒泉食詩爰有寒泉左思詩前有寒泉井聊可瑩心神惟有雙峯最高頂舊唐書達摩傳慧可慧可傳粲粲傳道信道信傳𢎞忍𢎞忍與道信並住蘄州雙峯山東山寺故謂其法為東山法門杜甫詩身許雙峯寺門求七祖禪李頎詩悠悠孤峯頂日見三花春此心期與故人同易同心之言其臭如蘭後漢書嚴光傳帝共偃卧以足加帝腹上明日太史奏客星犯御座帝笑曰朕故人嚴子陵共卧耳梁簡文帝詩故人雖故昔經新新人雖新亦應故王維過乘如禪師蕭居士嵩丘蘭若唐書天文志鶉火大火夀星豕韋為中州其神主於嵩丘鎮星位焉洛陽記嵩丘在洛陽東南五十里潘嶽賦前瞻太室傍眺嵩丘釋氏要覽梵言阿蘭若唐言無諍一云間靜處廣韻若人者切無著天親弟與兄通塞志天竺國無著出世闡教其弟天親所造乘論五百部後因無著開悟復造大乘論五百部世稱千部論師西域記無著是初地菩薩天親之兄佛滅十年從沙彌塞部出家管子善氣迎人親如弟兄陸機詩親戚弟與兄嵩丘蘭若一峯晴一統志嵩山三十六峯陳後主詩一峯遙落日食隨鳴磬巢烏下沈炯遊明慶寺詩馴烏逐飯磬楊師道詩巢烏刷羽儀行踏空林落葉聲寶積經于四十二億嵗在空林中常行梵行謝靈運詩清霄揚浮烟空林響法鼓詩蘀兮疏落葉謂之蘀陶潛詩空庭多落葉庾信賦落葉半床狂花滿屋迸水定侵香案濕劉孝綽詩晨征凌迸水卓錫泉記梁景泰禪師居惠州寶積寺無水師卓錫於地泉湧數尺梁簡文帝案銘刻香鏤彩宋之問遊廣界寺詩香臺隱翠霞雨花應共石牀平阿含經天雨名華翩翩而降五燈㑹元須菩提尊者在巖中晏坐諸天雨花讃歎水經注夷水東徑石室村人駱都到此室邊採蜜見一仙人坐石牀上劉刪詩石牀新溜乳金竈欲成丹深洞長松何所有仙經嵩高山東南大巖下石孔方圓一丈西方北入五六里有太室髙三十餘丈周圓三百步自然明燭穆天子傳天子升長松之隥劉琨詩繫馬長松下嵩山記嵩山最是栖神之靈藪長松緑柏生於嶺澗左右古樂府天上何所有厯厯種白榆儼然天竺古先生淮南子儼然𤣥默而吉祥受福魏書釋老志漢武開西域遣張騫使大夏還傳其旁有身毒國一名天竺始聞有浮屠之教後孝明帝遣郎中蔡愔等使於天竺寫浮屠遺範東還洛陽水經注釋法顯言渡河便到烏萇國即是北天竺佛所到國也唐書西域傳天竺國分東西南北中五沈佺期詩大士生天竺分身化日南西升經老君西升開道竺乾號古皇先生杜甫玉臺觀原注滕王造方輿勝覽玉臺觀在閬州北七里唐滕王嘗遊有亭一統志玉臺在保寧府城北七里唐滕王元嬰嘗遊息於此中天積翠玉臺遙列子周穆王築臺號曰中天之臺其高千仭孫綽賦瓊臺中天而懸居沈約詩連峯竟無已積翠逺微微蕭子鈞詩山翠餘烟積蘇頲詩山光積翠遙疑逼漢書郊祀歌遊閶闔觀玉臺應邵注玉臺上帝之所居陳子昻詩白玉仙臺古丹丘别望遙上帝高居絳莭朝易聖人亨以享上帝書肆類于上帝周禮春官以禋祀祀昊天上帝張衡西京賦直墆霓以高居庾信詩傳呼擁絳莭交㦸映彤闈駱賔王詩絳莭朱旗分白羽謝朓詩秉玉朝羣帝遂有馮夷來擊鼓莊子馮夷得之以遊大川楚辭逺遊使湘靈鼓瑟兮令海若舞馮夷注馮夷水仙人淮南子馮夷服八石而水仙曹植賦馮夷擊鼓女媧清歌詩坎其擊鼓宛丘之下始知嬴女善吹簫宋之問序嬴女樓下吹鳯降於神仙列仙傳蕭史者秦穆公時人善吹簫能致孔雀白鶴穆公女弄玉妻焉一旦隨鳯飛去庾信賦吹簫弄玉之臺徐陵序得吹簫於秦女江光隱見黿鼉窟何遜詩天曙江光爽晉書天文志二十八宿半見半隱竹書紀年周穆王東至九江駕黿鼉以為梁木華海賦或屑沒於黿鼉之穴石勢參差烏鵲橋水經注山峯上立石數百丈亭亭桀竪競勢爭高司馬相如上林賦崟岑參差日月蔽虧武三思石淙山詩參差石影帶芙蓉白帖烏鵲填河成橋而渡織女沈佺期詩烏鵲橋頭敞御筵更有紅顔生羽翰神仙傳韓衆語劉根曰藥之上者有九轉還丹太乙金液其次有雲母雄黃之屬次乃草木諸藥能治百病補虛駐顔何遜詩無因生羽翰千里暫排空便應黃髮老漁樵詩黃髮台背爾雅黃髮鮐背耉老夀也何劭詩私願偕黃髮逍遙綜琴書陸機詩願爾偕老携手黃髮何遜詩豫念返漁樵劉孝威詩神心重丘壑散步懷漁樵王維送方尊師歸嵩山爾雅山大而高曰嵩注今中嶽嵩高山張說詩家居洛陽下舉目見嵩山一統志嵩山在河南府登封縣北一十里仙官欲往九龍潭真靈位業圖玉清境元始天尊為主自九宫以上上清以下高真仙官皆得朝宴焉張衡詩欲往從之湘水深一統志龍潭在河南登封縣東二十五里嵩頂之東九潭相接其深莫測旄莭朱幡倚石龕漢武內傳武帝夜夢與李少君俱上嵩髙山上半道有繡衣使者乘龍持莭從雲中下列仙傳崔文子贊朱幡電麾劉孝綽詩月殿耀朱幡梁簡文帝疏明鏡石龕獨徘徊於留影山壓天中半天上初學記中央之嶽獨加髙字者何中央居四方之中而髙故曰嵩髙山姚崇詩均霜揆日處天中易雷在天上大壯古樂府天上何所有厯厯種白榆洞穿江底出江南搜神記嵩髙山北有大穴莫測其深晉初有一人誤墮穴中尋穴而行計可十許日忽曠然見明又冇草屋中二人對坐圍棊局下有一杯白飲墜者告以飢渴棊者曰可飲此墜者飲之氣力十倍棊者曰從此西行有天井但投身入井自當出若餓取井中物食之墜者如言可半年許乃出於蜀中歸洛下問張華曰此仙館也所飲者玉漿所食者龍穴石髓爾雅江南曰揚州初學記江南道者禹貢揚州之域又得荆州之南界北距江東際海南至嶺盡其地也瀑布杉松常帶雨水經注石城山頂泉流瀑布懸瀉孫綽賦瀑布飛流以界道庾信詩長虹雙瀑布圓闕兩芙蓉江淹賦處石則松栝交隂泉雨長注夕陽彩翠忽成嵐爾雅山西曰夕陽埤雅雨氣成虹朝陽射之則在西夕陽射之則在東謝靈運詩夕曛嵐氣隂廣韻嵐山氣隂借問迎來雙白鶴已曽衡嶽送蘇耽郭璞詩借問蜉蝣􅒰寧知龜鶴年虞世南樂府飛來雙白鶴奮翼凌逺烟荆州記衡山有三峯極秀一名紫蓋澄天明景輒有一雙白鶴回翔其上清響亮徹爾雅江南衡注衡南嶽一統志衡山在衡州府衡山縣西三十里五嶽之一也神仙傳蘇仙公白母某受命當仙即便拜辭封一匱曰有所闕乏可以扣匱言之所須當至慎勿開也三年後母心疑因開之見雙白鶴飛去自後扣之無復有應洞仙傳蘇耽者桂陽人也母食欲得魚羮耽出湖州市買去家一千四百里俄頃便還李白送賀監歸四明應制唐書賀知章傳知章越州永興人肅宗為太子遷賔客授祕書監自號四明狂客天寶初請為道士還鄉里詔許之以宅為千秋觀而居賜鏡湖剡川一曲既行帝賜詩皇太子百官餞送又地理志明州餘姚郡以境有四明山為名一統志四明山在寧波府城西南一百五十里周回八百里跨紹興台州之境二百八十峯其巔五峯絶髙形如芙蓉道書謂是山為丹山赤水之天久辭榮祿遂初衣易不可榮以祿蔡雍釋誨才美者荷榮祿而蒙賜晉書孫綽傳少有高尚之志居㑹稽遊放山水十餘年作遂初賦以致其意楚辭進不入以離尤兮退將修吾初服曽向長生說息機老子深根固柢長生久視之道莊子廣成子曰無勞汝形無搖汝精乃可以長生又漢隂丈人曰有機械者必有機事有機事者必有機心吾非不知羞而不為也陳子昻詩誰憐北陵井未息漢隂機真訣自從茅氏得梁武帝詩具聞上仙訣留丹未肯餌洞仙傳茅濛字初成咸陽南關人即東卿司命君盈之髙祖也師北郭鬼谷先生受長生之術集仙傳大茅君盈南至句曲之山南嶽真人赤君西城王君及諸青童並從王母降於盈室天皇大帝命五帝君賜以紫玉之板黃金刻書九錫之文拜盈為東嶽上卿司命真君太元真人王母命上元夫人授盈之二弟茅固茅𠂻太霄隱書丹景道精等四部寶經恩波應許洞庭歸丘遲詩肅穆恩波被宋之問詩騫飛竟不去當是戀恩波楚辭九歌邅吾道兮洞庭注太湖也吳中太湖一名洞庭而巴陵之洞庭亦謂之太湖郭璞江賦包山洞庭巴陵地道潜逵旁通幽岫窈窕注洞庭地穴在長沙巴陵吳縣南太湖中有包山山下有洞庭穴道潜行水底云無所不通號為地脈瑶臺含霧星辰滿離騷望瑶臺之偃蹇兮梁武帝詩瑶臺含碧霧一統志四明山有石窗四穴通日月星辰之光故曰四明仙嶠浮空島嶼微爾雅山鋭而髙曰嶠張說遊洞庭湖詩平湖曉望分仙嶠氣氤氲張正見詩瑞雲近浮空左思吳都賦島嶼綿邈洲渚馮隆注島海中山也嶼海中洲上有山石一統志月湖在寧波府治西南又名西湖中有月島松島花嶼烟嶼竹嶼為四明遊觀勝概借問欲栖珠樹鶴陶潛詩借問遊方士焉測塵囂外山海經三珠樹在厭火北生赤水上其為樹如柏葉皆為珠淮南子崑崙中有增城九重珠樹玉樹何年却向帝城飛漢書陳咸傳得入帝城朱超城上烏詩朝飛集帝城曹唐劉晨阮肇遊天台幽明録漢永平五年剡縣劉晨阮肇共入天台山度山出一大溪溪邊有二女子姿質妙絶遂留半年懷土求歸既出親舊零落無復相識真誥台州山上應台星故曰天台一統志天台山在台州府天台縣西一百一十里樹入天台石路新洛陽伽藍記﨑嶇石路似壅而通江淹賦暖朱草於石路王勃詩巖朝古樹新雲和草靜逈無塵鮑照河清頌雲表幽和物章明慶杜甫詩所居秋草靜正閉小蓬門岑參詩蒼旻霽凉雨石路無飛塵煙霞不省生前事北史隱逸傳餐松餌术棲息烟霞孔稚圭碑泉石依情煙霞入抱李紳詩空觀元度生前事不道靈山别後期水木空疑夢後身水經注池上有客亭左右楸桐負日俯仰目對魚鳥水木明瑟謝混詩水木湛清華關尹子知此身如夢中身隨情所見可以飛神元稹詩紫綬朱衣夢裏身往往雞鳴巖下月王維桃源行雞鳴始覺有人家張正見詩巖間度月華時時犬吠洞中春杜甫詩仙家犬吠白雲間盧綸詩犬吠松間月人行洞裏春栁公綽詩桃源千里逺花洞四時春不知此地歸何處孟浩然詩不知王逸少何處㑹羣賢劉繪詩江山信多美此地最為神張旭詩桃花盡日隨流水洞在清溪何處邊須就桃源問主人陶潛桃花源記晉太元中武陵人捕魚為業緣溪行忘路之逺近忽逄桃花林林盡水源便得一山有小口從口入行數十步豁然開朗其中男女怡然自樂見漁人大驚便邀還家自云先世避秦亂來絶境問今何世乃不知有漢無論魏晉停數日辭去詣太守說即遣人隨往遂迷不復得路王維詩看竹何須問主人劉阮洞中遇仙子天和樹色靄蒼蒼何遜詩水底見行雲天邊看逺樹韋應物詩寒樹依微逺天外莊子天之蒼蒼其正色耶陶潛詩蒼蒼谷中樹冬夏常如兹霞重嵐深路渺茫何遜詩重霞映日餘廣韻嵐山氣也白居易詩熙熙風土暖靄靄雲嵐積徐安貞詩惟愁仙路違杜甫詩追蹤恨渺茫雲竇滿山無鳥雀謝朓詩杳杳雲竇深淵淵石溜淺鮑照詩松磴上迷密雲竇下縱橫又滿山又填谷謝靈運詩空庭來鳥雀洛陽伽藍記修梵寺有金剛鳩鴿不入鳥雀不棲達摩云得其真相也水聲沿澗有笙簧陶潛别傳淵明嘗聞田水聲倚杖聽之劉琨詩泠泠澗水流庾信詩水流平澗下杜甫詩絶壁過雲開錦繡疏松隔水奏笙簧碧沙洞裏乾坤别郭璞賦碧沙瀢湤以往來謝靈運詩遨遊碧沙渚閒行丹山峯劉長卿詩桃花洞裏居人滿桂樹山中住日長摯虞賦跨列缺兮窺乾坤鍾離權詩乾坤許大無名姓又别是蓬萊第一峯紅樹枝前日月長謝朓詩紅樹巖舒青莎水被王維詩坐看紅樹不知逺行盡青溪不見人楚辭吾與天地兮比夀與日月兮齊光杜甫詩欲寄江湖客提携日月長願得花間有人出賀循詩香風飄舞花間度鮑照詩中有一人字金蘭何遜詩﨑嶇枉道過邂逅幽人出免令仙犬吠劉郎述異記濟陽山麻姑登仙處俗說山上千年金雞鳴玉犬吠白居易詩願將花贈天台女留取劉郎到夜歸王維酌酒與裴迪酌酒與君君自寬鮑照詩酌酒以自寬列子孔子見榮啓期鼓琴而歌曰善乎能自寬者也人情翻覆似波瀾史記日者傳究遍人情北山移文終始參差蒼黃翻覆劉峻廣絶交論循環翻覆迅若波瀾陸機君子行休咎相乘躡翻覆似波瀾白首相知猶按劍史記石建老白首萬石君尚無恙李陵書人之相知貴相知心鄒陽書明月之珠夜光之璧以暗投人於道路人無不按劍相眄者何則無因而至前也朱門先達笑彈冠晉書麴允傳南開朱門北望春樓文選注朱門貴門也韓非子先達者相收南史禇玠傳玠早有令譽先達多以才器許之漢書王吉傳吉與貢禹為友世稱王陽在位貢公彈冠言其取舍同也師古注彈冠者且入仕也庾信詩貢禹遂彈冠草色全經細雨濕孔稚圭詩草雜今古色江淹賦春草碧色梁簡文帝詩冷風雜細雨王筠詩丹霞映白日細雨帶輕紅何遜詩露濕寒塘草花枝欲動春風寒劉孝威詩隔墻花半隱猶見動花枝古樂府春風宛轉入曲房兼送小苑百花香謝朓詩四面動春風朝夜起寒色世事浮雲何足問南史王延之傳延之居簡素清靜寡欲見親舊未嘗及世事孫綽賦世事都捐論語於我如浮雲不如高卧且加餐晉書謝安傳髙卧東山又陶潛傳嘗言夏月虛閒髙卧北窗之下清風颯至自謂羲皇上人古詩努力加餐飯又上有加餐食劉兼宣賜錦袍設上郡客韻㑹唐制諸郡宴犒將吏謂之旬設今㕔事謂之設㕔公㕑曰設㕑十月芙蓉花滿枝本草芙蓉一名拒霜艷如荷花八九月始開故名拒霜楚辭搴芙蓉兮木末鮑泉詩新花滿新樹天庭驛騎賜寒衣法言唐虞三代皆有顯德著在天庭王勃賦忽有驛騎出幽并傳道春衣萬里程李白詩白露催寒衣杜甫詩寒衣處處催刀尺將同玉蝶侵肌冷溫子升詩素蝶向林飛應璩詩剪爪宜侵肌也遣金鵬遍體飛說文朋及鵬皆古文鳯字王建詩羅衫葉葉繡重重金鳯銀鵝各一叢陸劌鄴中記錦冇小登髙大登髙斑文錦鳯皇朱雀錦庾信謝齎皂羅袍啓鳯不去而恆飛夜卧始知多忝竊曹植賦中霄卧而歎息起飾帶而撫琴晉書羊祜傳加車騎將軍開府如二司之儀祜上表固謝曰臣忝竊雖久未若今日兼文武之極寵等宰輔之髙位也晝行方覺轉光輝張謂詩夜坐不厭湖上月晝行不厭湖上山陳書陳寶應傳起家臨郡兼晝繡之榮禮記玉藻輝如疏登所乘之車有光輝色而往適君朝深冬若得朝丹闕梁簡文帝詩冬深栁條落楊素詩閶闔既趨朝承明還宴語唐太宗詩爽氣浮丹闕秋光淡紫宫太華峯前衣錦歸書西傾朱圉鳥鼠至于太華西都賦表以太華終南之山張正見詩峯斷玉山前詩衣錦褧衣史記項羽紀富貴不歸故鄉如衣錦夜行誰知之者耿湋賀李觀察禱河神降雨周禮司諫巡問而觀察之唐書百官志莭度使掌總軍旅觀察使亦如之質明齊祭北風微禮記質明而始行事晏朝而退周禮夏官質明弊旗注質正也庾信周祀方澤歌質明孝敬求隂順陽禮記及時將祭君子乃齊鮑照詩二年從車駕齊祭甘泉宫詩北風其凉杜甫詩宫殿風微燕雀髙騶御千羣擁廟扉禮記命僕及七騶咸駕注七騶謂趨馬主為諸官駕說者也疏天子馬有六種種别有騶則六騶也又有總主之人并六騶為七何遜詩胥徒紛絡繹騶御或西京南史梁元帝紀結隊千羣持㦸百萬儀禮士冠禮筮于廟門禮記既入廟門麗于碑玉帛才敷雲淡淡周禮肆師立大祀用玉帛牲牷立次祀用牲幣左傳犧牲玉帛弗敢加也必以信韋應物詩雲淡水容夕雨微荷氣凉笙鏞未徹雨霏霏書笙鏞以間庾肩吾詩咸英起雲鳯率舞間笙鏞廣韻鏞大鐘也何妥修正古樂詩寥亮鳬鐘徹飄揚翟羽輕杜甫詩寒雨下霏霏道邊五稼添膏長蘇頲詩和光繞道邊劉熙釋名田填也五稼填滿其中也劉長卿詩五稼滿秋田賈山至言元年膏雨降五榖登陶潛詩相見無雜言但道桑麻長河上雙旌帶濕歸唐書百官志觀察使辭日賜雙旌雙節行則建莭樹六纛王勃詩雨去花光濕若出敬亭山下作唐書宣州宣城縣有敬亭山在宣州北十二里李白詩相看兩不厭只有敬亭山何人敢和謝𤣥暉詩彼何人斯宋玉對楚王問是其曲彌髙其和彌寡謝朓賽敬亭山廟喜雨詩秉玉朝羣帝樽桂迎東皇排雲接虬蓋蔽日下霓裳登山騁歸望原雨晦茫茫齊書謝朓字𤣥暉隆昌中為宣城太守白居易寄韜光禪師名勝志靈隱山在杭州府城西十二里山畔有韜光菴以韜光禪師而名師蜀人唐代宗時白居易刺郡聞師住是山結與為友嘗以詩招之入城不赴答詩云不解栽松陪玉勒唯能引水種金蓮一山門作兩山門劉眘虛詩山門二緇叟振錫聞幽聲杜甫詩苔蘚山門古兩寺元來一寺分權德輿詩石路流泉兩寺分東澗水流西澗水九嘆水波逺以冥冥兮眇不覩其東西王褒詩泠泠澗水流一統志下天竺寺有合澗跳沫諸泉名勝志合澗橋在飛來峯路口北澗自靈隱而下南澗自天竺而下合流於此號曰錢源南峯雲起北峯雲淮南子山致其髙而雲起焉宋孝武帝詩霏雲起兮泛濫一統志南髙峯在杭州府城西十二里名勝志南髙峯由煙霞洞循磴而上凡髙一千六百丈徑路盤旋松篁葱蒨非芒鞋竹杖不能攀陟一統志北髙峯在府城西北二十三里名勝志北髙峯乃靈隱最髙一峯石磴數百級曲折三十六灣唐天寶中建浮屠七層于頂羣山屏列湖水鏡浮雲光倒垂萬象在下望浙江如匹練之新濯前臺花發後臺見孫逖詩香臺花下出講座竹間逄劉孝威詩葉舒非漸大花發是初開上界鐘清下界聞李嶠碑誦經則上界遙聞彈指則下方俱動張九齡詩上界投佛影中天揚梵音七啓音朗號鐘韻清繞梁劉孝威啓氣馥上天薰流下界洛陽伽藍記段暉宅內地下常聞鐘聲遙想吾師行道處孫綽賦何肯遙想而存之莊子吾師乎吾師乎嵇康絶交書老子莊子吾之師也祖詠詩苔生行道席雲濕坐襌衣天香桂子落紛紛庾信詩天香下桂殿仙梵入伊笙唐書五行志垂拱四年三月雨桂子于台州旬餘乃止南部新書杭州靈隱山多桂寺僧曰月中桂也至今中秋夜往往子落寺僧亦曽拾得古樂府葉落紛紛李頎送魏萬之京朝聞遊子唱離歌史記髙祖紀遊子悲故鄉曹植詩遊子久不歸不識陌與阡漢書王式傳歌驪駒注逸詩篇名也見大戴禮其辭云驪駒在路僕夫整駕謝朓詩離歌上春日芳思徒以空駱賔王啓薛邑聞歌揖馮暖于彈鋏昨夜微霜初度河梁昭明太子詩隂池宿早雁寒風催夜霜漢書五行志秋分而微霜降阮籍詩朔風厲嚴寒隂氣下微霜易林乘筏度河雖深不殆庾信詩白馬向清波乘氷始度河鴻雁不堪愁裏聽詩鴻雁于飛禮記孟秋之月鴻雁來謝朓詩停琴佇凉月滅燭聽歸鴻雲山況是客中過梁簡文帝賦歎雲霞之窅漫對江山之遙阻關城曙色催寒近漢書枚乘傳深壁髙壘副以關城蕭慤詩野禽喧曙色山樹動秋聲孫逖賦禁鐘啓明納晴雲之曙色梁簡文帝詩隴暮風煙急關寒霜自濃御苑砧聲向晚多李適詩金輿翠輦迎嘉節御苑仙宫待獻春梁簡文帝詩欲知妾不寐城外搗砧聲詩摽有梅箋此夏鄉晚梅之墮落差多案向古作鄉張九齡詩連空青嶂合向晚白雲生莫是長安行樂處漢書地理志京兆尹縣長安髙帝五年置三輔黃圖長安有九市八街九陌閭里一百六十明一統志秦因古地名長安隋遷都始徙縣治于此唐因之楊惲書人生行樂耳謝朓詩戚戚苦無悰携手共行樂空令嵗月易蹉跎江淹詩空令日月逝陸機詩嵗月一何易晉書周處傳欲自修而年已蹉跎恐將無及唐汝詢解弗以長安為行樂之處使嵗月蹉跎而無成言當及時努力也李洞字才江京兆人諸王孫也慕賈島為詩鑄其像事之詩三卷漁父兒孫間弄雪霜髯王績賦接朋友子杯案弄兒孫于襁褓元結詩老翁八十猶能行將領兒孫同拾稼劉軻碑大師自孩抱不為兒弄白居易詩冷落若為留客住氷池霜竹雪髯翁許渾詩峩峩商嶺采芝人雪頂霜髯虎豹茵浪颭南山影入簷說文颭風吹浪動也詩秩秩斯干悠悠南山岑參詩藥碗搖山影魚竿帶水痕姚合詩竹色晴連雨山尤逺入簷間卧篷舟龜作枕徐陵碑嚴子之髙間卧加于光武李白淡然吟髙秋間卧瞻太清溫庭筠詩三秋梅雨愁楓葉一夜篷舟宿葦花史記龜策傳南方老人以龜搘牀足二十一年移牀龜尚生能行氣導引若此說文枕卧所薦首者病來茅舍網為簾薛逄詩醉後獨知殷甲子病來猶作晉春秋蜀志秦宓傳廣漢太守夏侯纂請宓為師友宓稱疾卧在茅舍後漢書蔡倫傳用樹膚麻頭及敝布魚網為紙釋名簾亷也自障為亷耻也值春遊子憐蓴滑史記髙祖紀遊子悲故鄉古詩遊子不顧返煮曹植詩遊子久不歸不識陌與阡杜甫詩羮秋蓴滑又强飯蓴添滑端居茗續煎通蜀行人說鱠甜杜甫詩地利西通蜀天文北向秦梁元帝詩無令春色晚獨望行人歸禮記膳芥醬魚膾按鱠古作膾晉書張翰傳齊王辟為大司馬東曹掾因秋風起思菰菜蓴羮鱸魚鱠遂命駕歸說文甜美也舌知甘者數尺寒絲一竿竹南史江淹傳夢張景暘曰常以一匹錦相寄今可見還淹探懷中得數尺與之詩其釣維何維絲伊緡杜甫詩翡翠鳴衣桁蜻蜓立釣絲詩籊籊竹竿以釣于淇杜甫詩白水魚竿客清秋鶴髮翁豈知浮世有猜嫌阮籍大人先生傳逍遙浮世與道俱成魏志賈詡傳懼見猜嫌闔門自守退無私交晉書齊王攸子蕤傳逮乎戰國秦漢明恕之道寢猜嫌之情用劉長卿詩猜嫌傷薏苡愁寞向江蘺秦韜玉字仲明京兆人中和二年准敕及第為田令孜神䇿判官有投知小録三卷釣翁一竿青竹老江隈岑參詩祗緣五斗米孤負一漁竿杜甫詩得石翻蒼竹棲枝把翠梧沈約郊居賦以斯終老于焉消日謝朓詩睿心重離析岐路清江隈荷葉衣裳可自裁梁簡文帝詩欲知度船處當看荷葉開屈原離騷製芰荷以為衣兮集芙蓉以為裳陶潛詩俎豆猶古法衣裳無新製漢焦仲卿妻詩十三能織綺十四學裁衣潭定靜懸絲影直莊子客刺船而去沿緣葦間顔淵還車子路授綏孔子不顧待水波定不聞拿音而後敢乘古樂府桑蠶不作繭晝夜長懸絲梁元帝詩細雨織懸絲後漢書劉般傳曲其形而欲影直不可得也王勃文形端則影直風髙斜颭浪紋開孫綽詩蕭瑟仲秋日飈唳風雲髙栁宗元詩驚風亂颭芙蓉水細雨斜侵薜荔墻駱賔王序風起青蘋動波紋于異態李約詩池塘春暖水紋開朝携輕櫂穿雲去梁昭明太子七契望洛水兮有好仇縱輕棹兮泛龍舟栁宗元晉問林立峯崒穿雲蔽日杜牧詩明月輕橈去唯應釣赤鱗暮背寒塘載月回梁簡文帝詩左縈重陸右背高岑謝朓詩露濕寒塘水月映清淮流李商隱詩幽徑定携僧共入寒塘好與月相依李白詩船上齊橈樂湖心泛月歸世上無窮嶮巇事陶潛詩雖非世上寶爰得王母心徐陵書世上白衣可訾何限淮南子執要道之柄而遊無窮之地楊巨源詩世上無窮事生涯莫廢詩楚辭何周道之平易兮然蕪穢而嶮巇禰衡賦奚遭時之嶮巇劉峻廣絶交論世路嶮巇一至于此算應難入釣船來宋玉九辨圜鑿而方枘兮吾固知其鉏鋙而難入庾信詩密菱障浴鳥髙荷沒釣船岑參詩桑葉隱村户蘆花映釣船李嶠奉和初春幸太平公主南莊應制唐書公主傳太平公主則天皇后所生也后愛之傾諸女神龍時開府置官屬睿宗即位主權震天下作觀池樂遊原以為盛集主家山第接雲開史記東方朔傳董偃母以賣珠為事偃隨母出入主家徐陵詩主家能教舞唐書竇懷貞傳日視事退輒詣主第庾肩吾詩入漢飛延閣臨雲出建章史記騶奭傳頗采騶衍之術以紀文齊王嘉之為開第康莊之衢髙門大屋尊寵之天子春遊動地來書天子作民父母以為天下王詩百辟卿士媚于天子春秋繁露天佑而子之稱天子史記叔孫通傳孝惠帝曽春出遊離宫張衡賦既春遊以發生啓諸蟄于潜户崔駰頌昔既春遊今乃秋稼司馬相如賦車騎雷起殷天動地漢書陳湯傳吏士喜大呼乘之鉦鼓聲動地馮衍與婦弟書懸幡竟天擊鼓動地羽騎參差花外轉張衡賦輕車飈厲羽騎電騖崔駰頌三軍霆激羽騎火烈謝靈運賦羽騎盈塗飛旍蔽日詩參差荇菜左右流之司馬相如賦岑崟參差日月蔽虧嵇康詩雲網塞四區髙羅正參差霓旌搖曵日邊回司馬相如賦拖霓旌靡雲旗注析羽毛染以五采綴以縷為旌有似虹霓之氣鮑照詩飂戾長風振搖曳髙帆舉晉書明帝紀幼而聰哲為元帝所寵異屬長安使來因問帝日與長安孰逺對曰長安近不聞人從日邊來居然可知也謝朓詩地迥翻旗回還將石溜調琴曲王融詩潺湲石溜寫祖孫登詩風潭如拂鏡山溜似調琴高僧傳安西境內有前踐山山下有伽藍其水滴溜成音可愛彼人采綴其聲以成曲調樂府詩集古琴曲有五曲九引十二操庾信詩琴曲隨流水簫聲逐鳯皇唐書禮樂志髙宗以琴曲寢絶令有司修習更取峯霞入酒杯謝朓賦山霞起而削成世說畢茂世云一手持蟹螯一手持酒杯拍浮酒池中便足了一生庾信詩春衫拭酒杯鸞輅已辭烏鵲渚禮記孟夏之月乘鑾路駕蒼龍注鑾路有虞氏之車也有鑾和之節按鑾輅古作鑾路漢書禮樂志鑾路龍鱗罔不肸飾荆楚嵗時記漢武帝令張騫使大夏尋河源乘槎經月而至一處見城郭如州府室內有一女織又見一丈夫牽牛飲河織女取搘機石與騫而還淮南子烏鵲填河成橋而渡織女簫聲猶繞鳯皇臺列仙傳蕭史秦穆公時人善吹簫公以女弄玉妻之乃教弄玉吹簫作鳯鳴有鳯皇來止其屋夫妻同乘鳯皇飛去秦人作鳯女祠于雍宫世有簫聲明一統志鳯女臺在寶雞縣東南六十里沈佺期興慶池侍宴應制唐汝詢注興慶池即龍池長安志龍池本平地垂拱初因雨水流潦成小池至景龍中彌亘數頃深至數丈常有雲氣唐會要明皇在藩邸居興慶里宅有龍池湧出至開元中為興慶宫碧水澄潭映逺空梁昭明太子詩桂楫蘭橈浮碧水江花玉面兩相似房篆詩前溪流碧水後渚映青天虞騫詩澄潭寫度鳥庾信詩可憐數行雁㸃㸃逺空排紫雲香駕馭微風博物志漢武帝好仙道七月七日王母乘紫雲車而至南史宋文帝紀江陵城上有紫雲望氣者以為帝王之符江總詩雲車已駕應相待羽衣未去幸須同莊子列子御風而行泠然善也按馭古作御古樂府微風吹閨闥吳均詩皎皎日將上獵獵起微風漢家城闕疑天上史記自序天子始建漢家之封漢書谷永傳保佑漢家詩佻兮達兮在城闕兮曹植詩嘉賔填城闕豐膳出中㕑陸機詩名都一何綺城闕鬱盤桓易雷在天上大壯庾信詩已曽天上學詎是世巾生秦地山川似鏡中史記晉世家倍秦地注秦地于天官東井輿鬼之分野晉書地理志平王以岐豐之地賜秦則為秦地袁淑詩秦地天下樞易地險山川丘陵也詩山川悠逺惟其勞矣禮記命有司為民祈祀山川百源晉書王羲之傳行山隂道上如鏡中遊向浦回舟萍已緑何遜詩單艫時向浦陶潛詩目送回舟逺情隨萬化遺禮記季春之月萍始生本草浮萍或云楊花所生一葉經宿即生數葉梁武帝詩金波揚素沫銀浪翻緑萍分林蔽殿槿初紅庾肩吾詩峰樓霞早發林殿日光􅀈南方草木狀朱槿樹高止四五尺三月開花其花深紅色大如蜀葵朝開暮落古來徒羡橫汾賞漢武故事帝行幸河東祠后土顧視帝京中流與羣臣飲宴歡甚乃自作秋風辭曰泛樓船兮濟汾河橫中流兮揚素波簫鼓鳴兮發櫂歌江淹頌烟岫相珍雲壑共賞今日宸遊聖藻雄荀子欲觀千載則審今日古詩今日良宴㑹歡樂難具陳顔延之詩虞風載帝狩夏諺頌王遊袁奭從駕詩天遊響仙蹕春望動神𠂻虞世南詩緣情摛聖藻庾肩吾詩愧乏天庭藻徒參文雅雄奉和春日幸望春宫應制芳郊緑野散春晴周禮王國之外五十里為近郊百里為逺郊費昶詩芳郊拾翠人回袂捲芳春爾雅牧外謂之野大野曰平謝靈運詩春晚緑野秀爾雅春晴日出而風曰光風復道離宫烟霧生史記秦始皇紀始皇令咸陽之旁二百里內宫觀復道甬道相連漢書枚乘傳修治上林雜以離宫庾肩吾詩合殿生光彩離宫起烟霧楊炯文青霞起而照天白霧生而匝地楊栁千條花欲綻詩昔我往矣楊栁依依庾信賦落