德貞詩祥烟聚危岫態水溢飛泉鮑照樂府君不見春鳥初至時百草含青皆作花梁元帝賦雲與山而相似水含天而難别劉瑱詩寒水清若空王胄詩蟬噪聞疑斷池清映若空直視天河垂象外古詩出郭門直視鮑照賦直視千里外唯見起黃埃詩倬彼雲漢箋雲漢謂天河也鮑照詩提瑟當户立長歎望天河王眘詩天河橫欲曉易天垂象示吉凶聖人則之傅亮文上天垂象四靈效徵俯窺京室畫圖中禮記其餘鳥獸之卵胎皆可俯而窺也詩思媚周姜京室之婦張衡賦京室清密罔有不韙謝朓詩引領見京室宫雉正相望漢書蘇武傳上思股肱之美乃圖畫其人于麒麟閣庾信文玉門亭障無勞圖畫皇歡未使恩波極班固賦皇歡洽羣臣醉謝朓詩疲驂良易返恩波不可越丘遲詩肅穆恩波被日暮樓船更起風庾肩吾詩日暮鈎陳轉風清笳吹揚魏收詩睿賞芳月色宴言忘日暮史記平凖書大修昆明池治樓船髙十餘丈旗幟加其上甚壯漢武帝秋風辭泛樓船兮濟汾河虞世南詩水府泛樓船陶潛詩凉風起將夕夜景湛虛明楊素詩還望白雲天日暮秋風起奉和春日幸太平公主南莊應制主第山門起灞川崔浩衍義公主下嫁别立第舍梁簡文帝詩教歌公主第潘嶽賦金狄遷于灞川水經注灞水左合滻水歷白鹿原東即灞川之西故芷陽矣宸遊風景入初年宋之問詩香剎中天起宸遊滿路輝晉書王導傳風景不殊舉目有河山之異陶潛詩天髙風景徹盧思道詩山泉愛風景梁元帝纂要正月孟春亦曰首嵗初嵗鳯皇樓下交天仗王僧孺詩嬴女鳯皇樓徐陵詩宫中本造鴛鴦殿為誰新起鳯皇樓陸瑜詩忽逄鳯樓下非待鸞絃招唐書儀衛志凡朝㑹之仗三衛畨上分為五仗號衙內五衛一曰供奉仗以左右衛為之二曰親仗以親衛為之三曰勳仗以勳衛為之四曰翊仗以翊衛為之五曰散手仗以親勳翊衛為之皆帶刀捉仗列坐于東西廊下沈佺期詩九日隨天仗三秋幸禁林烏鵲橋頭敞御筵淮南子烏鵲填河成橋而渡織女風俗記織女七夕當渡河使鵲為橋宋之問詩烏鵲橋邊一雁飛江淹詩兩槳橋頭渡徐彥伯詩千鍾聖酒御筵披王景和登慈恩寺浮圖詩綴葉披天藻開花近御筵往往花開逄綵石班固賦神池靈沼往往而在梁元帝詩晨禽爭學囀朝花亂欲開庾信詩檻前聞鳥囀園裏對花開山海經騩山凄水出焉西流至于海其中多采石穆天子傳天子升于采石之山于是取采石焉使鑄以成器于黑水之上時時竹裏見紅泉梁簡文帝林秀山銘竹裏看博花間聽琴劉孝綽詩樹中望流水竹裏見攢枝何遜詩簾中看月影竹裏見螢飛謝靈運山居賦託丹砂于紅泉又詩石磴瀉紅泉梁簡文帝書紅泉含影青蓮吐芳今朝扈蹕平陽館漢書梁孝王傳出稱警入言蹕漢儀注皇帝出殿則傳蹕止人清道也上官儀詩扈蹕頌王遊漢書外戚傳孝景皇后武帝母也皇后長女為平陽公主武帝祓灞上還過平陽主賜金千斤宋之問序歌舞入平陽之館不羡乘槎雲漢邊博物志天河與海通近世有人居海上者年年八月有浮槎去來不失期人有竒志立飛閣于槎上多齎糧乘槎而去至一處有城郭狀屋舍甚嚴宫中多織婦見一丈夫牽牛渚次飲之此人問何處答曰君至蜀問嚴君平則知之因還至蜀問君平曰某年月日有客星犯牽牛宿計年月正是此人到天河時也詩倬彼雲漢為章于天謝惠連詩雲漢有靈匹張九齡奉和聖製早發三鄉山行羽衛森森西向秦江淹詩羽衛靄流景綵吹震沉淵徐陵書文物俱華羽衛相鬱晉書裴楷傳嘗目鍾㑹如觀武庫森森但見矛㦸在前許善心詩森森羅陛衛吕氏春秋張儀魏之餘子也西遊于秦桓談新論關東俚語人聞長安樂則西向而笑山川歷歷在清晨詩山川悠逺維其勞矣顔延之詩周御窮轍迹夏載歷山川古詩天上何所冇歷歷種白榆曹植詩清晨發皇邑秦嘉詩清晨當引邁束帶待雞鳴晴雲稍卷寒巖樹蕭子雲詩泬㵳晚霖霽重疊晴雲新庾信詩雲晴即作峯駱賔王詩野靜連雲卷傳燈録寒山者始豐縣有寒明二巖以居寒巖中得名何遜詩巖樹落髙花陳後主樂府澗曲多巖樹宿雨能消御路塵江總詩宿雨潤條枚晉童謡青青御路楊白馬紫遊韁曹植詩君為清路塵妾若濁水泥唐太宗詩舞接花梁燕歌迎鳥路塵聖德由來合天道史記五帝紀髙陽生有聖德是為帝顓頊劉峻文星虹樞電昭聖德之符晉書樂志聖德應運期天地不能違易夫大人者與天地合其德書明王奉若天道舊唐書九齡傳定天位明天道則聖朝典則可謂無遺矣靈符即此應時巡班彪王命論漢承堯德有靈命之符曹植詩巡稼觀紫微與帝合靈符舊唐書明皇紀田同秀言𤣥元皇帝降見于丹鳯門之通衢告賜靈符在尹喜之故宅上遣使就函谷故關尹喜臺西發得之遺賢一一皆羈致書野無遺賢揚雄連珠祿不遺賢曹植表終軍以妙年使越欲得長纓占其王羈致北闕舊唐書明皇紀開元十三年令朝集使各舉所部孝悌文武集于泰山之下猶欲髙深訪隱淪魏武帝短歌行山不厭髙水不厭深世說桓靈寶問劉太常曰我何如謝太傳劉答曰公髙太傳深新論天下神人五二曰隱淪顔延之詩尋山洽隱淪梁簡文帝詩隱淪遊少海舊唐書明皇紀制草澤有博學文辭之士各委本司本州聞薦賈曽河南洛陽人以孝聞景雲中為吏部員外明皇在東宫盛選宫僚以曽為太子舍人直言極諫特授中書舍人以父名忠固辭拜諫議大夫開元中復拜中書議者以為曹司嫌名乃就職與蘇晉同掌制誥時號蘇賈奉和春日出苑矚目應令銅龍曉闢問安回漢書成帝紀上嘗急召太子出龍樓門注門樓上有銅龍若蜚亷白鶴之為名也梁簡文帝表出入銅龍瞻仰故實陸厥詩屬叨金馬署又㸃銅龍門書闢四門沈約詩閶闔既洞啓龍樓亦髙闢禮記文王之為世子朝于王季日三雞初鳴而衣服至于寢門外問內豎之御者曰今日安否何如內豎曰安文王乃喜梁簡文帝詩問安寢門視膳天幄金輅春遊博望開唐書車服志皇太子之車三金路者從祀朝賀納妃之所乘也劉孝威詩園綺隨金輅浮丘侍玉笙史記秦始皇紀皇帝春遊覽省逺方逮于海隅張衡賦既春遊以發生陸機詩春遊良可嘆漢書武五子傳元狩元年上為太子立博望苑使通賔客注取其廣博觀望也謝朓詩登賢博望獻賦清漳沈約文博望之苑再暉龍樓之門已峻渭水一作北晴光搖草樹三輔黃圖渭水出隴西首陽縣鳥鼠同穴山東北至華隂入河盧思道詩五祠臨渭北唐太宗詩晴光脆栁枝杜審言詩晴光轉緑蘋王融曲水序同律克和草樹自樂梁武帝詩草樹非一香庾信賦紛披草樹終南佳氣入樓臺詩終南何有有條有枚傳終南周之名山也沈約詩終南表秦觀陸倕詩終南臨漢闕庾肩吾詩路逺大風積山長佳氣濃袁朗詩帝城何鬱鬱佳氣自葱葱史記天官書海旁蜃氣象樓臺徐陵詩樓臺非一勢臨玩自多竒招賢已從商山老司馬遷書招賢進能顯巖穴之士王褒四子講德論招賢而處友者衆士之常路也漢書張良傳顧上有所不能致者四人四人年老矣注四人謂園公綺里季夏黃公甪里先生所謂商山四皓也吳均詩才勝商山四文髙竹林七託乘還徵鄴下才楚辭質菲薄而無因兮焉託乘而上浮魏文帝書文學託乘于後車左思魏都賦注曹操都鄴相州是也盧思道詩鄴下盛風流河曲有名流應徐託後乘車馬踐芳洲魏志王粲傳始文帝為五官將及平原侯皆好文學粲與北海徐幹廣陵陳琳陳留阮瑀汝南應瑒東平劉楨並見友善臣在東周獨留滯史記周本紀惠公封其少子于鞏以奉王號東周惠公杜預春秋序周平王東周之始王也史記自序留滯周南不得與封襌之事顔延之詩周南悲昔老留滯感遺氓欣逄睿藻日邊來王褒詩徒知仰睿藻抽辭殊未申虞茂詩睿藻冠風騷晉書明帝紀幼而聰哲為元帝所寵異屬長安使來因問帝汝謂日與長安孰逺對曰長安近不聞人從日邊來李雍字泰和廣陵江都人蘭臺郎善之子李嶠張廷圭薦其詞髙行直拜左拾遺宋璟劾二張雍於天后前抗言助之開元初歷殿中侍御史執政忌其才頻被貶斥後為北海太守李林甫傳以罪杖殺之雍早擅才名尤長碑頌雖貶謫在外中朝衣冠及天下寺觀多齎金帛往求其文饋遺至巨萬自古鬻文獲財未有其比奉和春初幸太平公主南莊應制傳聞銀漢支機石公羊傳所見異辭所聞異辭所傳聞異辭徐陵詩傳聞奉詔戍臯蘭廣志天河曰銀漢鮑照詩夜來坐幾時銀漢傾露落集林昔有人尋河源見婦人浣紗問之曰此天河也乃與一石歸問嚴君平君平曰織女支機之石盧詢詩支機一片石緩轉獨輪車庾信詩流槎一去上天池織女支機當見遺復見金輿出紫微庾肩吾詩入徑轉金輿開橋通畫鷁張正見詩金輿映緑川三秦記未央宫一名紫微宫謝朓樂府雲枝紫微內分組承明阿晉書天文志紫微太帝之座天子之常居也織女橋邊烏鵲起史記天官書織女天女孫也劉孝威詩星含織女光淮南子烏鵲填河成橋而渡織女仙人樓上鳯皇飛史記武帝紀仙人好樓居又方士有言黃帝時為五城十二樓以候神人于執期左傳鳯皇于飛和鳴鏘鏘列仙傳蕭史教弄玉吹簫作鳯皇聲鳯皇來止其屋一旦皆隨鳯飛去流風入座飄歌扇司馬相如賦流風慘冽陳後主詩流風吹八音薛曜詩歌曲唱流風王勃序脫野客之荷衣入幽人之桂座隂鏗詩鶯啼歌扇後花落舞衫前陳子良詩明月臨歌扇行雲接舞衣薛道衡賦澄粧影于歌扇散衣香于舞風瀑水當階濺舞衣梁簡文帝招真館碑瀑水懸流雜天河而共灑劉斌詩石梁髙鳥路瀑水近天河禮記解屨不敢當階梁簡文帝雍州曲緑水濺長袖隋煬帝詩清音出歌扇浮香飄舞衣杜公瞻詩香散舞衣風今日還同犯牛斗乘槎共泛海潮歸博物志天河與海通年年八月有浮槎去來人有乘槎去至一處有城郭屋舍遙望宫中多織婦見一丈夫牽牛渚次飲之問是何處答曰君至蜀郡問嚴君平則知之還至蜀問君平曰某年月日有客星犯牽牛宿計正是此人到天河時也蕭琛詩徒知仰閶闔乘槎未有由劉孝威詩穿池控海潮沈佺期和上巳連寒食有懷京洛詩溱洧注鄭國之俗三月上巳之辰采蘭水上以祓除不祥漢官儀上巳官及百姓禊於東流上風俗通禊潔也已祉也邪疾已去祈介祉也嵗時記去冬至後一百五日為寒食一統志洛陽本成周地唐為東都天寶初改曰東京唐書地理志前直伊闕後據邙山左瀍右澗洛水貫其中天津御栁碧遙遙元和郡縣志天津橋在河南縣北一統志洛陽有天津橋在府城西南洛水上許敬宗詩如何御京洛流霰下天津王胄詩御栁長條翠左傳鸜鵒之巢逺哉遙遙陶潛歸去來辭舟遙遙而輕揚江淹賦晝遙遙而不暮軒騎相從半下朝潘尼三日洛水詩朱軒䕃蘭臯江淹詩軒騎久已絶親愛不留遲辛德元詩任俠重芳辰相從競逐春鮑照詩日暮罷朝歸鞭馬塞衢路行樂光輝寒食借楊惲書人生行樂耳謝朓詩戚戚苦無悰携手共行樂管輅别傳朝旦為輝日中為光廣韻輝通作輝古詩陽春布德澤萬物生光輝太平歌舞晚春饒漢書食貨志三考黜除餘三年食曰登再登曰平三登曰太平後漢書謝夷吾傳臣聞堯登社稷政術太平詩式歌且舞左傳文王之功天下誦而歌舞之張衡賦暮春之禊元已之辰祓於陽濵謝惠連詩春晚緑野秀梁元帝纂要三月曰晚春紅粧樓下東回輦木蘭詩當户理紅粧謝朓詩徒使春常賖坐惜紅粧變劉孝綽詩詎匹龍樓下素蕊映朱扉王僧孺詩回輿避暑宫下輦迎風館隋煬帝詩龍庭翠輦回青草洲邊南渡橋古詩青青河畔草三輔黃圖咸陽宫引渭水灌都以象天漢橫橋南渡以法牽牛庾信春賦開上林而競入擁河橋而