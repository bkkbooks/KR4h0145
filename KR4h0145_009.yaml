曲謂之北杜雍録杜曲在啓夏門外向西即少陵原遊絲正髙下梁武帝詩暗曖屬遊絲沈約詩遊絲映空轉庾信春賦一叢香草足礙人數尺遊絲即橫路啼鳥還斷續庾信詩野戍孤煙起春山百鳥啼范雲詩平沙斷還續虞世南琵琶賦抑揚嘈噆聨綿斷續有酒今不同詩有酒湑我無酒酤我左傳有酒如淮有肉如坻陶潛詩過門更相呼有酒斟酌之孔德紹詩撫絃無人聽對酒時獨斟思君瑩如玉古詩思君令人老嵗月忽已晚詩言念君子溫其如玉法言或問屈原智乎曰如玉如瑩爰變丹青如其智如其智遊龍門香山泉易乾鑿度禹鑿龍門闢伊闕傅毅賦因龍門以暢化開伊闕以達聰水經注伊水又北入伊闕昔大禹疏以通水兩山相對望之若闕伊水歷其間北流故謂之伊闕東巖西嶺並鐫石開軒髙甍架峯西側靈巖下泉流東注入于伊水闕左壁有石銘云黃初四年六月二十四日辛巳大出水舉髙四丈五尺齊此蓋記水之漲滅也元和志伊闕山在伊闕縣北四十五里兩山相對望之若闕伊水流其間故名又煬帝嘗登邙山觀伊闕曰此非龍門耶太平寰宇記伊闕口俗名龍門一統志河南府城南二十五里兩門對峙東曰香山西曰龍門石壁峭立伊水中出山水本自佳班固終南山賦流澤遂而成水停積結而為山晉書王羲之傳會稽多佳山水南史王𢎞之傳始寧沃川有佳山水遊人已忘慮沈約詩旅遊媚年春年春媚遊人梁昭明太子七契居山林而不返終無慮而無營唐太宗望終南山詩對此恬千慮無勞訪九仙碧泉更幽絶蕭瑱詩澗水初流碧謝靈運書山澗幽阻音塵闊絶又幽栖窮巖外緣兩絶賞愛未能去陳子昂詩賞愛在須臾曹植賦攬騑轡以抗策悵盤桓而不能去潺湲寫幽磴謝靈運山居賦氿泉旁出潺湲於東簷謝朓詩潺湲石溜寫謝靈運詩銅陵映碧澗石磴寫紅泉玉篇磴巖磴也繚繞帶嘉樹謝靈運山居賦復有水徑繚繞回員瀰瀰平湖泓泓澄淵王羲之蘭亭詩序又有清流激湍映帶左右左傳晉侯使韓宣子來聘既享宴於季氏有嘉樹焉宣子譽之陸機詩嘉樹生朝陽阮籍詩嘉樹下成蹊激轉忽殊流木華海賦狀如天輪膠戾而激轉南康記其水常自激涌奔轉如輪晉廬山道人石門詩序清泉分流而合注歸泓又同注爾雅泉所出同所歸異曰肥異出同流曰瀵郭璞水贊殊出同歸玉篇泓水深也水經注洛谷二源同注一壑羽觴自成玩漢書注羽觴作生爵形張衡西京賦促中堂之狹坐羽觴行而無算晉書束晳傳周公成洛邑因流水以泛酒故逸詩云羽觴隨波謝萬賦奏羽觴而交獻齊萬融三日緑潭篇公子王孫恣遊玩沙陽水曲情無厭永日亦延趣詩且以喜樂且以永日水經注提琴命友嬉娛永日陶潛歸去來辭園日涉以成趣江淹詩晨遊任所萃悠悠藴真趣靈草有時香王褒四瀆祠碑銘桃花春水靈草孤洲班固典引嘉穀靈草竒獸神禽江淹雜詩栽異木而同秀種雜草而一香張衡西京賦神木靈草木實離離注靈草芝英也仙源不知處陶潛桃花源記漁人既出便於向路處處志之及往迷不復得水經注溯流窮覽欲知可至之處屆此而返竟不達其源宋之問詩未窺仙源極還當候圓月陶潛詩迢迢新秋夕亭亭月將圓隋書天文志月者隂之精也其形圓其質清日光照之則見其明日光所不照則謂之魄故月望之日日月相望人居其間盡覩其明故形圓也攜手重遊寓詩惠而好我攜手同行沈約詩夾道覔陽春相將共攜手任昉啓困無居止浮寓親遊王勃文我之飄寓邈矣來遊山川俯仰道義淹留藍嶺精舍前漢書地理志藍田山出美玉三秦記玉之美者曰球其次曰藍以出美玉故名一統志在藍田縣東南三十里又名玉山後漢書黨錮傳劉淑明五經隱居立精舍講授諸生常數百人魏志太祖紀注於譙東五十里築精舍欲秋夏讀書冬春射獵石壁精舍髙諸葛亮黃陵廟記江左大山壁立林麓峯巒如畫熟視於大江重復石壁間有神像隱見焉江淹詩極眺清波深緬影石壁素庾信佛龕銘橫鐫石壁暗鑿山梁排雲聊直上郭璞遊仙詩神仙排雲出但見金銀臺謝朓詩鍊質乃排雲濯景終不測孔稚圭北山移文度白雪以方潔干青雲而直上佳遊愜始願陶潛詩佳遊未斁逝將離分吳志周魴傳仕東典郡始願已獲銘心立報永矢無二鮑照詩始願力不及忘險得前賞管子緣髙出險猱猿之所長而人之所短也江淹詩懷賞入舊襟王融詩結賞自員嶠移宴乃方壺崖傾景方晦丘遲詩藤垂島易陟崖傾嶼難傍何中詩景晦良遇稀心異真賞寡谷轉川如掌郭璞江賦盤渦谷轉凌濤山頽釋名水決出所為澤曰掌水停處如手掌中也梁簡文帝詩平衢望如掌沈佺期詩秦地平如掌緑林含蕭條張九齡詩江南有丹橘經冬猶緑林楚辭山蕭條而無獸兮野寂寞其無人淮南子蕭條者形之君寂寞者音之主也飛閣起𢎞敞三輔黃圖建章宫在未央宫西長安城外帝於未央宫營造日廣以城中為小乃於宫西跨城池作飛閣通建章宫構輦道以上下班固西都賦輦路經營修凃飛閣張衡西京賦漸臺立於中央赫昈昈以𢎞敞謝朓侍宴詩髙殿𢎞敞禁林稠密道人上方至智度論得道者曰道人維摩經汝住上方界分度四十二恆河沙佛土深夜還獨往淮南子山谷之人輕天下細萬物而獨往梁武帝淨業賦序舛獨往之行乘任縱之心日落羣山隂謝靈運詩日落當棲泊鮑照詩日落嶺雲歸延頸望江隂木華海賦羣山既略百川潛泄鮑照舞鶴賦冰塞長河雪滿羣山天秋百泉響詩逝彼百泉瞻彼溥原淮南子冬日之候隂降百泉水經注百脈水出上穀縣故城西水源方百步百泉俱出故謂之百脈水又沅水東為明月池上則風籟空傳下則泉響不斷所嗟纍已成安得長偃仰詩或栖遲偃仰韓詩外傳其言有類其行有禮其舉事無悔其持檢應變曲當與時遷􅑫與世偃仰柳宗元字子厚河東人登進士第應舉宏辭貞元十九年為監察御史裏行王叔文韋執誼用事尤竒待宗元擢尚書禮部員外郎會叔文敗貶永州司馬宗元少精警絶倫為文雄深雅健踔厲風發流輩推仰既罹竄逐涉履蠻瘴居間益自刻苦其堙厄感鬱一寓諸文讀者為之悲惻移柳州刺史江嶺間為進士者走數千里從遊一經指授文辭皆有法世號栁栁州秋曉行南谷經荒村杪秋霜露重楚辭靚杪秋之遙夜兮王逸注杪末也梁元帝纂要九月曰暮秋亦曰末秋亦曰杪秋謝靈運詩杪秋尋逺山梁簡文帝詩玉署清餘熱金城含杪秋魏文帝詩溪谷多風霜露沾衣陶潛詩山中饒霜露風氣亦先寒薛道衡宴喜賦霜重庭蘭秋深氣寒鮑照謝莊聨句風輕桃欲開露重蘭未勝晨起行幽谷蘇武詩寒冬十二月晨起踐嚴霜周禮秋官司寤氏禦晨行者禁宵行者夜遊者詩出自幽谷遷于喬木淮南子蘭生幽谷不以莫服而不芳南都賦幽谷嶜岑夏含霜雪黃葉覆溪橋易林桑芳將落隕其黃葉梁簡文帝與蕭臨川書江楓晚落林葉初黃丘遲詩簷際落黃葉階前網緑苔謝靈運山居賦凌石橋之莓苔越楢溪之紆縈荒村唯古木玉篇村聚坊也朱超道詩古村空列樹荒戍久無棲江總卞山楚廟詩間階剃宿薺古木斷緣蘿寒花疏寂厯張協雜詩寒花發黃采秋草含緑滋陶潛詩寒花徒自榮張正見詩霜雁排空斷寒花映日鮮古隴西行酒上正花疏梁元帝詩竹密無分影花疏有異香江淹燈賦寂歷冬暮庾信卭竹杖賦㛹娟髙節寂歷無心張説詩空山寂歷道心生幽泉微斷續初學記魏在洛有流杯池幽泉池蜀都賦火井沈熒於幽泉孫楚井賦幽泉騰湧津澤旁潤沈約詩冬泉斷方續虞世南琵琶賦抑揚嘈囋聨綿斷續機心久己忘莊子漢隂丈人曰有機械者必有機事有機事者必有機心盧照鄰詩耕田虞訟息鑿井漢機忘何事驚麋鹿易林且如驚鹿不能定足禮記麋鹿為菹左傳鄭之有原囿猶秦之有具囿也吾子取其麋鹿以間敝邑若何史記司馬相如傳囿騶虞之珍羣徼麋鹿之怪獸揚雄羽獵賦麋鹿芻蕘與百姓共之早梅早梅發髙樹梁簡文帝梅花賦梅花特早偏能識春唐太宗栁詩縈雪臨春岸參差間早梅吳越春秋秋蟬登髙樹飲清露陸雲詩雞鳴髙樹巔迥映楚天碧隂鏗詩帶天澄迥碧杜甫詩楚天不斷四時雨朔風飄寒香曹植朔風詩仰彼朔風用懷魏都謝朓詩朔風吹飛雨蕭條江上來案蔣之翹輯注本作朔吹云羌笛也陳後主梅花落詩迎風香氣來繁霜滋曉白詩正月繁霜張華詩繁霜降當夕悲風中夜興江總詩梅花色白雪中明欲為萬里贈江淹詩延佇整綾綺萬里贈所思荆州記陸凱與范曄善自江南寄梅花一枝詣長安與曄贈詩曰折梅逢驛使寄與隴頭人江南無所有聊贈一枝春杳杳山水隔廣韻杳深也寬也逺也何遜詩蒼蒼極浦潮杳杳長洲夕謝靈運賦别有山水路邈緬歸蔡雍表巴土長逺山川修隔寒英坐銷落左思蜀都賦敷蕊葳㽔落英飄颻曹植詩初秋涼風發庭樹微銷落何用慰逺客古詩客從逺方來遺我一端綺吳邁逺楚朝曲幽芳逺客悲如何戲題階前芍藥詩注勺藥香草也三月開花芳色可愛古今注芍藥一名將離將别贈之亦猶相招以當歸本草芍藥生山谷及中嶽仇池記揚州芍藥為天下冠梁書王筠年十六為芍藥賦謝朓詩紅藥當階翻徐陵玉臺新詠序清文滿篋非惟芍藥之華凡卉與時謝詩秋日莫萋百卉具腓廣韻卉百草總名凡常也易與時偕行淮南子日夜無傷而與時為春南史袁湛傳論天長地久四時代謝何劭詩四時更代謝懸象迭卷舒妍華麗兹晨崔氏靧面辭取白雪取紅花與兒洗面作妍華詩夜如何其夜嚮晨敧紅醉濃露謝靈運詩恆覺白日敧謝朓詩發萼初攢紫餘采尚霏紅杜甫詩傍砌看紅藥芍藥譜深紅者名宫錦紅又三十一種有醉嬌紅詩零露濃濃陸雲賦滋豐草之湛露李白清平調一枝紅艷露凝香窈窕留餘春夏侯湛石榴賦纎條參差以窈窕兮洪柯流離以相拂梁簡文帝晚春賦待餘春於北閣藉髙宴于南陂宋迪龍池春草詩幽姿偏占暮芳意欲留春李白惜餘春賦惜餘春之將闌清異録唐人謂芍藥為婪尾春者以婪尾酒乃最後之杯芍藥得春亦猶是也孤賞白日暮徐勉誠子書中年聊于東田開營小園非存播萟以要利政欲穿池種樹少寄情賞顔氏家訓自吟自賞不覺更有旁人張九齡詩春賞時將換王筠詩丹霞映白日李白文手弄白日頂摩青穹陶潛詩日暮天無雲沈約詩佇立日己暮暄風動搖頻梁元帝纂要春風曰暄風易林動搖不安為風所吹列子汝何去來之頻宋之問詩蕩舟為樂非吾事自嘆空閨夢寐頻夜窗藹芳氣隂鏗詩花月分窗進孟浩然詩松月夜窗虛晉書樂志蘭風發芳氣蓋世同其氛沈約詩願涉百花氣宛轉金爐前幽卧知相親陳子昂詩謝病南山下幽卧不知春孝經故上下能相親也惜餘春賦若有人兮情相親願致溱洧贈南史張暢傳李孝伯傳魏主有詔借博具暢曰博具當為申致詩溱與洧方渙渙兮士與女方秉簡兮又贈之以芍藥水經澮水出鄭縣西北平地洧水出河南密縣西南馬嶺山注澮即鄭詩溱字一統志溱水源出密縣一名澮水東北至新鄭縣洧水亦出密縣東至新鄭縣會溱水為雙泊河至西華縣入黃河唐書宰相世系表溱洧之間謂之新鄭其地河南新鄭是也陳後主詩既出遊伊洛可以祓溱洧悠悠南國人詩瞻彼日月悠悠我思爾雅悠悠洋洋思也李陵與蘇武詩臨河濯長纓念子悵悠悠詩滔滔江漢南國之紀曹植詩南國有佳人庾信詩南國美人去崔皓汴州人開元十一年登進士第有俊才纍官司勳員外郎詩一卷入若耶溪一統志若耶溪在紹興府南二十五里與鏡湖合寰宇記若耶溪在會稽縣東二十八里越絶書若耶之溪涸而出銅戰國策涸若耶溪以出銅水經注溪水上承譙峴麻溪下注太湖溪之下孤潭周數畝麻潭下注若耶溪水至清照衆山倒影窺之如畫輕舟去何疾戰國策乘夏水浮輕舟韓非子治國之有法術賞罰猶陸行之有犀車良馬也水行之有輕舟便楫也陸機感丘賦泛輕舟於西川背京室而電飛隂鏗詩釣侣枻輕舟已到雲林境雲笈七籖雲林宫右英夫人治滄浪山起坐魚鳥間阮籍詠懷詩起坐彈鳴琴後漢書逸民傳論豈必親魚鳥樂林草哉南史張充傳長羣魚鳥又劉虬傳託暮情於魚鳥北史王晞傳晞詩日落應歸去魚鳥見留連動搖山水影荀子水動而影搖人不以定美惡江總三五明月滿詩雲前來往色水上動搖明南史王𢎞之傳始寧沃川有佳山水𢎞之依岩築室謝靈運顔延之並相欽重又謝靈運傳永嘉素有名山水又宗少文傳好山水愛逺遊巖中響自答沈約碑文接響傳聲又詩既歡東嶺唱復佇西巖答溪裏言彌靜丁仙芝詩山空響不散溪靜曲宜長事事令人幽陶潛詩聖賢留餘迹事事在中都又晨夕看山川事事悉如昔易履道坦坦幽人貞吉停橈向餘景楚詞注橈船小楫也陳子昂詩日落滄江晚停橈問土風潘嶽秋興賦聽離鴻之晨吟望流火之餘景謝朓詩幸賴夕陽下餘景及西枝崔曙宋州人開元二十六年登進士第以試明堂火珠賦得名詩集一卷山下晚晴寥寥逺天靜左思詩寥寥空宇內謝靈運詩海岸常寥寥空館盈清思謝朓詩巉嵒帶逺天張正見詩髙柳橫遙塞長榆接逺天溪路何空濛謝朓觀朝雨詩空濛如薄霧散漫似輕埃斜光照疏雨王僧孺詩斜光隱西壁暮雀上南枝謝偃詩上客莫畏斜光晚自有西園明月輪上官儀詩晚雲含朔氣斜照蕩秋光秋氣生白虹宋玉九辨悲哉秋之為氣也春秋繁露春氣愛秋氣嚴張載詩逸響回秋氣禮記氣如白虹天也尚書考靈耀注日旁氣白者為虹劉孝威春林晚雨詩雨日共成虹雲盡山色暝劉孝威詩白雲夏峯盡青槐秋葉疏梁昭明太子啓青山暝而江湖逺盧照鄰詩山暝行人斷蕭條西北風謝朓詩朔風吹飛雨蕭條江上來史記律書不周風居西北淮南子西北曰麗風注乾氣所生江淹詩西北秋風至故林歸宿處王粲詩飛鳥翔故林陸機詩孤獸思故藪離鳥悲舊林荀子終日言成文典及循察之則倜然無所歸宿不可以經國定分是慎到田駢也一葉下梧桐淮南子一葉落而天下知秋盧思道勞生論一葉從風無損鄧林之攢植九歌洞庭波兮木葉下栁惲詩亭臯木葉下詩梧桐生兮于彼朝陽潁陽東溪懷古唐書地理志潁陽本武林縣析河南伊闕嵩陽置開元十九年更名西北有大谷故關元和志潁陽縣西北至河南府九十里古綸氏縣本夏之綸國少康邑也一統志潁陽故城在登封縣西南八十里漢置屬潁川郡又潁水在登封縣西四十里源出陽乾山自項城縣界流入太和潁上等縣經陳州西華境水經潁水出潁川陽城縣西北少室山又東南過陽翟縣北又東南過潁陽縣西又東南過潁隂縣西南又東南至慎縣入于淮一統志堯召許由為九州長由不欲聞洗耳潁水之濵巢父牽牛上流飲之今登封縣有箕山上有許由冢又巢父冢亦在縣東南後漢書逸民傳堯稱則天而不屈潁陽之髙武盡美矣而終全孤竹之節徐陵答周處士書潁陽巢父不曽令荐許由商洛園公未聞求徵綺里郭璞遊仙詩翹足企潁陽臨河思洗耳靈溪氛霧歇郭璞遊仙詩靈溪可潛盤安事登雲梯孫綽遊天台賦過靈溪而一濯疏煩想於心胸支遁詩靈溪無驚浪庾信過老子廟詩三門臨苦縣九井對靈溪禮記仲冬行夏令則氛霧冥冥庾信皇夏歌函谷風塵散河陽氛霧稀皎鏡清心顔謝朓詩方池含積水明月流皎鏡沈約詩洞徹隨深淺皎鏡無春冬任昉為范尚書讓封侯表奉命震驚心顔無措空色不映水庾信詩泬寥空色逺謝靈運山居賦花映水而增光氣結風而回敷何遜七召綺霞映水秋聲多在山蕭慤詩野禽喧曙色山樹動秋聲周𢎞讓詩雲天改夏色木葉動秋聲世人久疏曠晉書向秀傳嵇意逺而疏吕心曠而放謂稽康吕安也庾信詩野情風月曠山心人事疏萬物皆自間易大哉乾元萬物資始莊子官天地府萬物阮籍論自小視之則萬物莫不小由大觀之則萬物莫不大戴逵間遊贊物莫不以適為得以足為至彼間遊者奚往而不適奚待而不足陶𢎞景文任性靈而直往保無用以得間白鷗寒更浴説文鷗水梟也禽經鷗信鳥也信不知用鮑照詩翻浪揚白鷗又翻波起白鷗何遜詩可憐雙白鷗朝夕水上遊江總詩浴鳥沈還戲飄風度不歸韓詩外傳冬不數浴非愛水也孤雲晴未還陶潛貧士詩萬物各有託孤雲獨無依傅奕七激仰歸雲溯遊風江淹詩雨絶無還雲昔時讓王者莊子讓王篇堯以天下讓許由許由不受庾信賦輸我神器居作讓王吕氏春秋昔堯朝許由于沛澤之中請屬天下于夫子許由遂至潁川之陽此地閉玄關易先王以至日閉關商旅不行后不省方後漢書章帝紀元和二年冬日南至初閉關文中子劉伶古之閉關人中説或問陶元亮子曰放人也歸去來有避地之心焉五柳先生傳則幾於閉關矣王屮頭陀寺碑玄關幽鍵感而遂通般若經玄關難啓無以躡髙步廣韻躡登也左思詩髙步追許由晉書郗詵傳詵等韞價州里褒然應詔對揚天問髙步雲衢梁元帝陶𢎞景碑昔太和中有許逺遊者乃雲霄之勝賔太虛之選客先生規同矩合實踵髙步凄涼岑壑間張正見詩凄涼銅雀晚爾雅山小而髙曰岑廣韻壑溝也谷也宋之問詩岑壑景色佳慰我逺遊心丘為蘇州嘉興人事繼母孝常有靈芝生堂下纍官太子右庶子致仕給俸祿之半以終身與劉長卿王維為友題農父廬舍東風何處至爾雅東風曰谷風古詩四顧何茫茫東風搖百草已緑湖上山李白詩春草如有情山中尚含緑湖上春已早唐明皇詩去年餘閏今春早曙色和風著花草田家日不間魏志夏侯尚傳清河王經始為郡守經母謂之曰汝田家子仕至二千石可以止矣應璩詩田家無所有酌酒焚枯魚左傳悉索敝賦以來會時事逢執事之不間而未得見楚辭交不忠兮怨長期不信兮告豫以不間又思公子兮悵忘歸君思我兮不得間溝塍流水處班固西都賦溝塍刻鏤原隰龍鱗注周禮十夫有溝説文塍稻田之畦也庾信詩春洲鸚鵡色流水桃花香耒耜平蕪間易斫木為耜揉木為耒耒耜之利以教天下蓋取諸益禮記季冬之月命農計耦耕事修耒耜具田器梁武帝籍田詩公卿秉耒耜庶氓荷鉏耰江淹詩青滿平地蕪薄暮飯牛後廣雅日將落曰薄暮陸機詩薄暮不遑暝謝朓思歸賦歸來薄暮聊以永年莊子百里奚爵祿不入於心故飯牛而牛肥淮南子寧戚欲干齊桓公困窮無以自達將任車以商于齊宿於郭門外桓公郊迎客寧戚飯牛車下扣牛角而疾商歌桓公命後車載之歸來還閉關齊國策馮歡使人屬孟嘗君寄食門下居有頃倚柱彈其劒歌曰長鋏歸來乎食無魚陶潛歸去來辭歸去來兮田園將蕪胡不歸老子善閉者無關鍵而不可開顔延之詩劉伶善閉關懷情滅聞見泛若耶溪水經注若耶溪水上承嶕峴麻溪溪之下孤潭周數畝麻潭下注若耶溪水至清照衆山倒影窺之如畫寰宇記若耶溪在會稽縣東二十八里會稽縣志即西子採蓮歐冶鑄劒之所溪旁有葛仙翁釣磯西子浣紗石越絶書若耶之溪涸而出銅吳越春秋若耶之溪深而莫測結廬若耶裏王績傳仲長子光隱者也結廬北渚凡三十年陶潛詩結廬在人境而無車馬喧左右若耶水詩淇水在右泉源在左蘭亭敘又有清流激湍映帶左右無日不釣魚莊子若遊魚者釣􅌳以投之又就藪澤處間曠釣魚間處無為而已矣楚辭避世隱身釣魚江濵南史王𢎞之性好釣魚常垂綸於上虞江或問得魚賣否𢎞之曰釣亦不得得亦不賣有時向城市後漢書廖扶傳扶絶志世外未曽入城市謝靈運詩范蠡出江湖梅福入城市溪中水流急戰國策飲茹溪之流食湘波之魚謝朓詩山積陵陽阻溪流春穀泉漢書溝洫志急流曰湍薛道衡入郴江詩仗節遵嚴會揚舲泝急流陳後主詩山髙雲氣積水急溜杯輕渡口水流寬孔德紹詩有霧疑川廣無風見水寬每得樵風便會稽縣志樵風涇在縣東南二十五里漢鄭𢎞少時採薪得一遺箭頃之有神人覔箭問𢎞何所欲答曰常患若耶溪載薪為難願朝南風暮北風後果然遂號樵風涇水經鄭𢎞出入溪津嘗感神風送之憑舟自運無杖楫之勞村人貪藉風勢常依隨之往來殊不難左傳行李之往來共其乏困徐彥伯汾水新船賦若往若來無顛無躓一川草長緑徐安貞詩雲日明千里旌旗照一川梁昭明太子七契碧樹初蕊緑草含滋吳均採蓮詩錦帶雜花鈿羅衣垂緑川張正見從籍田詩金輿映緑川四時那得辨易與四時合其序書以閏月定四時成嵗禮記如竹箭之有筠也如松柏之有心也故貫四時而不改柯易葉楚辭皇天平分四時兮裋褐衣妻兒戰國策今有人於此舍其錦繡鄰有裋褐而欲竊之漢書貢禹傳粳豆不贍裋褐不完注裋者謂僮豎所著布長襦也鹽鐵論被紈躡韋搏粱嚙肥者不知裋褐之寒粳􅹞之苦也餘糧及雞犬戰國策盻子謂齊王曰不如易餘糧於宋吳志陸抗傳注吳晉之間餘糧棲􅒪而不犯陶潛詩仰想東户時餘糧宿中田老子至治之世鄰國相望雞犬之聲相聞陶潛桃花源記阡陌交通雞犬相聞日暮鳥雀稀王粲詩日暮遊西園左傳如鷹鸇之逐鳥雀也參同契狸犬守鼠鳥雀畏鸇謝靈運齋中讀書詩虛館絶諍訟空庭來鳥雀稚子呼牛歸陶潛歸去來辭僮僕歡迎稚子候門詩日之夕矣牛羊下來住處無鄰里翻譯名義他那此云處真諦云住處周禮地官遂人五家為鄰五鄰為里柴門獨掩扉後漢書楊震傳柴門絶賔客十六國春秋前涼録汜勝家財五十萬悉散之於宗族柴門灌園以琴書自娛陶潛文翳翳柴門事我宵晨南史袁粲傳席門常掩三徑裁通陶𢎞景尋山志荆門晝掩蓬户夜開范雲贈張徐州謖詩還聞稚子説有客款柴扉尋西山隱者不遇絶頂一茆茨沈約詩傾壁忽斜豎絶頂復孤圓王褒詩山窗臨絶頂簷溜俯危松墨子茅茨不剪晉書范宣傳家于豫章太守殷羡見宣茆茨不完欲為改宅宣固辭之直上三十里孔稚圭北山移文干青雲而直上詩我服既成于三十里叩關無僮僕易旅即次懷其資得童僕貞案童與僮同陶潛歸去來辭僮僕歡迎稚子候門窺室唯案几若非巾柴車周禮春官巾車注巾猶衣也左傳諸侯賔至車馬有所巾車脂轄孔子息陬操巾車命駕將適唐都陶潛歸去來辭或命巾車或棹孤舟江淹擬陶潛詩日暮巾柴車髙士傳何點嘗躡草屩乘柴車應是釣秋水莊子釣於濮水之上又秋水時至百川灌河潘嶽秋興賦澡秋水之涓涓兮玩遊鯈之潎潎蹉跎不相見王褒九懷驥垂兩耳兮中坂蹉跎阮籍詩願為三春遊朝陽忽蹉跎古樂府他鄉各異縣展轉不相見吳均詩踟蹰暫舉酒倏忽不相見僶俯空仰止潘嶽詩僶俯恭朝命顔延之秋胡詩孰知寒暑積僶俯見榮枯詩髙山仰止草色新雨中王僧孺文霜銷草色風搖樹影江總詩新雨百花朝松聲晚窗裏宋玉髙唐賦不見其底虛聞松聲及兹契幽絶自足蕩心耳左傳於是有煩手淫聲坎堙心耳乃忘和平鮑照詩追憶棲宿時聲容滿心耳雖無賔主意禮記一獻之禮賔主百拜終日飲酒而不得醉焉世説許汜與劉備並在劉荆州坐共論人物許曰昔過下邳見元龍無客主之意不相與語自上大牀卧使客卧下牀頗得清淨理淮南子清淨恬愈人之性也謝靈運王子晉讃王子愛清淨區中實囂喧冀見浮丘公與爾共繽翻興盡方下山晉書王徽之傳常居山隂夜雪初霽忽憶戴逵在剡夜乘小船詣之造門不前而反人問其故曰本乘興而來興盡而反何必見安道耶南史隱逸傳南嶽鄧先生名郁少而不仕隱居衡山極峻之嶺小板屋兩間足不下山何必待之子詩我覯之子我心寫兮獨孤及字至之洛陽人天寶末以有道舉髙第補華隂尉代宗召為左拾遺俄改太常博士遷禮部員外郎厯濠舒二州刺史以治課加檢校司封郎中賜金紫徙常州卒諡曰憲同徐侍郎五雲溪新亭重陽集作詩話徐侍郎安貞初名楚璧龍丘人開元中為中書舍人集賢院學士終中書侍郎一統志五雲溪在浙江金華府義烏縣西北二十五里源出五雲山入大溪魏文帝書九為陽數日月並應名曰重陽唐書貞元四年詔以九月九日令百寮宴賞為樂萬峯蒼翠色謝靈運山居賦南山則羣峯參差出其間孫統蘭亭集詩時禽吟長澗萬籟吹連峯皇甫冉詩長憶雲門寺門前千萬峯謝朓詩蒼翠望寒山崢嶸瞰平陸蕭子鈞詩山翠餘煙積駱賔王山行詩百重含翠色一路落飛泉雙溪清淺流一統志雙溪在金華府城南其源一出東陽縣一出處州府縉雲縣與東陽義烏二溪合流山居賦四山周回雙流逶迤古詩河漢清且淺相去復幾許李白詩乃知蓬萊水復作清淺流已符東山趣後漢書馬援傳援曰今見陛下恢廓大度同符髙祖晉書謝安傳與王羲之及許詢桑門支遁遊處出則漁弋山水入則言詠屬文雖受朝寄然東山之志始末不渝六朝事迹上元縣有兩東山一在崇禮鄉今土山是也謝安石寓居會稽棲遲東山後以土山擬之今去縣二十里一在鍾山鄉蔣廟東北宋劉勔隱居鍾嶺名為東山今去縣十五里謝靈運歸舊園作偶與張邴合久欲還東山世説謝太傅語王右軍曰中年傷於哀樂與親友别輒作數日惡王曰年在桑榆自然至此正賴絲竹陶寫恆恐兒輩覺損欣樂之趣謝朓敬亭山詩每欲追竒趣即此凌丹梯況值江南秋陸機詩適值時來運與子遊承華爾雅江南曰揚州史記三王世家大江之南五湖之間謝朓詩江南佳麗地孫逖詩懸燈千嶂夕卷幔五湖秋白露天地肅王勃秋日宴集序金風生而景物清白露下而光隂晚禮記天地始肅不可以嬴盧思道孤鴻賦天髙氣肅搖落在時黃花門館幽禮記季秋之月菊有黃華沈約詩門館有虛盈楊炯庭菊賦嵗如何其嵗已秋叢菊芳兮庭之幽杜甫詩琴瑟几杖柴門幽山公惜美景晉書山濤甄拔人物各為題目時稱山公啓事又濤子簡鎮襄陽亦稱山公李白峴山懷古詩醉酒懷山公謝靈運擬鄴中集詩序天下良辰美景賞心樂事四者難并今昆弟友朋二三諸彥共盡之矣陳書孫瑒傳每良辰美景賔僚並集泛長江而置酒亦一時之勝賞焉陸倕寄贈京邑僚友詩娛談終美景敷文永清夜肯為芳樽留詩噬肯適我晉書阮籍等傳論嵇阮竹林之會劉畢芳樽之友駱賔王詩芳樽徒自滿杜甫尋崔戢李封詩每欲得酒傾二宅可淹留五馬照池塘古辭陌上桑使君從南來五馬立踟蹰李頎詩逢君立五馬應醉習家塘南南謝惠連傳嘗於永嘉西塘夢見惠連便得池塘生春草之句人以為工繁絃催獻酬蔡雍琴賦韻宫商兮動角羽曲引興兮繁絃撫陸機文賦炳若縟繡悽若繁絃詩獻酬交錯儀禮特牲饋食注獻之禮成于酬陶潛詩提壺接賔禮引滿更獻酬臨風孟嘉帽謝莊賦臨風歎兮將焉歇晉書孟嘉傳為桓溫參軍九月九日溫宴龍山參佐畢集時佐吏並著戎服有風至吹嘉帽墮落嘉不之覺溫命孫盛作文嘲之李白詩醉看風落帽舞愛月留人乘興李膺舟晉書王徽之傳乘興而來後漢書李膺傳字元禮潁川襄城人性簡亢無所交接士有被其容接者名為登龍門又郭太傅太字林宗歸鄉里衣冠諸儒送至河上唯與李膺同舟而濟衆賔望之以為神仙焉杜甫詩何知愧李膺騁望傲千古楚辭登白蘋兮騁望謝惠連詩佳期緬無像騁望誰云愜宋之問詩聖德超千古蘇頲夷齊四皓論激清一時流譽千古當歌遺四愁魏武帝短歌行對酒當歌李白詩邀入青綺門當歌共銜杯張衡四愁詩序衡不樂久處機密陽嘉中出為河間相鬱鬱不得志為四愁詩庾信賦栩楊亭有離别之賦臨江王有愁思之歌崔洞詩平子四愁今莫比豈令永和人王羲之蘭亭序永和九年嵗在癸丑暮春之初會于會稽山隂之蘭亭修褉事也羣賢畢至少長咸集法書要録晉穆帝永和中王右軍與親友四十二人修褉于蘭亭製序顔真卿詩少長還同宴永和獨擅山隂遊戰國策中山之地方五百里趙獨擅之漢書地理志會稽郡縣山隂會稽山在南上有禹冡禹井南史張稷傳稷為剡令略不視事多為小山遊長孫佐輔朔方人德宗時弟公輔為吉州刺史佐輔往依焉山居謝靈運山居賦序棟宇居山曰山居看書愛幽寂酉陽雜俎虞鄉有山觀甚幽寂結宇青冥間晉書江􅓉傳屏居臨海棄絶人事翦茆結宇耽玩載籍宋書宗炳傳結宇衡山欲懷尚平之志謝朓治宅詩結宇夕隂街荒幽橫九曲楚辭據青冥而攄虹兮遂倏忽而捫天梁簡文帝表延首青冥傾心紫府飛泉引風聽楚詞吸飛泉之微液兮陸機詩飛泉漱鳴玉謝靈運詩憩石挹飛泉唐太宗詩幽澗冬暄飛泉夏冷古桂和雲攀楚詞攀桂樹以淹留魏徵賞舊左右議天門已開故攀桂之歡未絶李德林入山詩天河臨飲易月桂近將攀地深草木稠易百穀草木麗乎土禮記天地和同草木萌動陶潛詩孟夏草木長繞屋樹扶疏梁昭明太子講席詩藥樹永繁稠境靜魚鳥間南史張充傳長羣魚鳥畢景松阿又劉虬傳暢餘隂于山澤託暮情于魚鳥隂氣晚出谷棗據詩玄林結隂氣不風自寒涼謝莊詩夕天霽晚氣輕霞澄暮隂詩出自幽谷遷于喬木梁昭明太子啓啼鶯出谷爭傳求友之音朝光先照山鮑照詩碧樓含夜月紫殿爭朝光梁簡文帝詩朝光照皎皎夕漏轉駸駸有時獨杖藜史記留侯世家注黃石公鬚眉皆白杖丹藜履赤舄入夜猶啓關埤雅鸞入夜而歌鳳入朝而舞戰國策甘茂約秦魏攻楚楚之相秦者屈丐為楚和于秦秦啓關而聽楚使星昏飛鳥過鮑照舞鶴賦氛昏夜歇景物澄廓星翻漢迥曉月將落易飛鳥遺之音阮籍詩飛鳥鳴相過火出樵童還范雲詩田家樵採去薄暮方來歸神體自和志晉書賀循傳逍遙養和怡神自足春秋繁露志和而音雅則君子與之知樂不是離人寰鮑照舞鶴賦去帝鄉之岑寂歸人寰之喧卑吳筠字貞節華州華隂人少通經善屬文舉進士不第入嵩山為道士明皇聞其名遣使徴至待詔翰林天寶中堅求還山尋入會稽剡中大厯五年卒集十卷遊廬山五老峯元和郡縣志廬山在尋陽縣東三十二里本名嶂山昔匡俗字子孝隱淪於此漢武帝拜為大明公俗號廬君故山取號一統志在南康府西北二十里其山疊嶂九層崇巖萬仞實南方巨鎮也道書為第八洞天又五老峯在廬山如五老相連故名彭蠡隱深翠書彭蠡既瀦史記封禪書上巡南郡浮江自尋陽出樅陽過彭蠡禮其名山川左思吳都賦泛舟航於彭蠡渾萬艘而既同一統志彭蠡湖在南康府東南一名宫亭一名鄱陽謝靈運詩連嶂疊巘崿肯翠杳深沈滄波照芙蓉文心雕龍閲喬嶽以形培塿酌滄波以喻畎澮柳惲詩太液滄波起長楊髙樹秋名山記芙蓉渚有聳石頭如初生芙蓉色青白初學記衡山有三峯一峯名芙蓉日初金光滿漢書禮樂志沛施澤汾之阿揚金光橫泰河鮑照登大雷岸與妹書從嶺而上盡作金光半山以下純為黛色景落黛色濃何遜聨句臨橘看黛色映渚媚鉛暉雲外聽猿鳥王融巫山髙曲煙雲乍舒卷猿鳥時斷續陳子昂入峭峽詩􅍪鼯寒思晚猿鳥暮聲秋煙中見杉松爾雅煔似松生江南疏煔俗作杉自然符幽情班固西都賦願賔攄懷舊之蓄念發思古之幽情嵇康琴賦誠可以感蕩心志而發泄幽情矣瀟灑愜所從南史太原孫緬為尋陽太守落日逍遙渚際見一輕舟凌波隱顯俄而漁父至神韻瀟灑垂綸長嘯宗炳登半石山詩清晨陟阻崖志氣度瀟灑整策務探討傅毅舞賦擾攘就駕僕夫正策陸機詩振策陟崇丘沈佺期詩隂壑已永閉雲竇絶探討嬉遊任從容史記留侯世家所與從容言天下事甚衆莊子鯈魚出水從容魚之樂也張華詩從容養餘日取樂于桑榆玉膏正滴瀝水經注廬山上有三石梁長數十丈廣不及尺吳猛將弟子登山過此梁見數人為猛設玉膏山海經峚山其上多丹木其中多白玉是有玉膏博物志名山大川孔穴相內和氣所出則生石髓玉膏食之不死左思吳都賦芝房菌蠢生其隈玉膏滵溢流其隅水經注乳穴凝膏下垂微津細液滴瀝不斷沈約詩玉洞膏滴瀝庾信山齋詩滴瀝泉澆路瑤草多丰茸東方朔與友人書方期拾瑤草吞日月光華共輕舉耳江淹登香爐峯詩瑤草正翕赩注瑤草玉芝也司馬相如賦羅丰茸之遊樹兮離樓梧而相撑仙人棲層崖史記封禪書仙人好樓居釋名老而不死曰仙仙遷也遷入山也故制字從人傍山也古詩仙人騎白鹿髮短耳何長水經注滱水歷南山秀鄣分霄層崖刺天積石之峻壁立直上謝靈運山居賦羅層崖于户裏列鏡瀾於窗前道合乃一逢曹植陳審舉表昔伊尹之為媵臣至賤也吕尚之為屠釣至陋也及見舉于湯武周文道合志同玄謨通神魏收詩一逢堯舜日揮手欲輕舉劉琨扶風歌揮手長相謝謝靈運詩揮手告鄉曲三載期歸旋嵇康詩巖穴多隱逸輕舉求吾師孫綽遊天台山賦非夫遺世玩道絶粒茹芝者焉能輕舉而宅之陸機詩輕舉凌紫霞為余叩瓊鐘雲笈七籖嘯歌徹玄都鳴玉叩瓊鐘空香清人心庾信步虛詞靈駕千尋上空香萬里聞晉書荀勗傳省事不如清心劉協新論恬和養神則自安于內清虛棲心則不誘于外神恬心清則形無纍矣正氣信有宗屈原逺遊惟因省以端操兮求正氣之所由老子言有宗事有君傅亮感物賦頌三百於無邪貫五千于有宗永用謝物纍莊子故知樂天者無天怨無人非無物纍無鬼責沈約東武吟霄轡一永矣俗纍從此休我將乘鸞龍集仙録羣仙畢集位髙者乘鸞次乘麟次乘龍神仙傳弄玉乘鳳蕭史乘龍吳質答太子箋摛藻下筆鸞龍之文備矣登廬山東峯觀九江合彭蠡湖廬山志廬山或高或下各自雄長漢陽峯最髙五老次之登漢陽四望則知此山拔地無倚又山東南北據江湖之勝南望鄱陽北望九江東則五老峯獅子峯九疊屏望湖中石鐘大小孤山列列如在目前一統志廬山在江西九江府城南二十五里古南嶂山也山之南為南康山之隂為九江書荆州九江孔殷傳江於此州界分為九道甚得地勢之中正義鄭康成謂九江各自别源下流合於大江漢書地理志江自廬江潯陽分為九也尋陽記九江曰鳥白江蚌江烏江嘉靡江畎江源江廩江提江菌江太康地記九江劉歆以為湖漢九水入彭蠡澤也一統志尋陽江在九江府城北源自岷山至此下流四十里合彭蠡湖水東流入海書彭蠡既瀦傳彭蠡澤名史記封禪書上巡南郡登禮灊之天柱山浮江自尋陽出樅陽過彭蠡禮其名山川一統志宫亭湖在九江府城東南九十里一名彭蠡湖元和志江州禹貢揚荆二州之境揚州云彭蠡既瀦今州南五十二里彭蠡湖是也荆州云九江孔殷今州西北二十五里九江是也然彭蠡以東為揚州界九江以西屬荆州界百川灌彭蠡班彪賦顧百川之分流煥爛熳以成章莊子秋水時至百川灌河秋水方浩浩潘嶽秋興賦澡秋水之涓涓兮玩遊鯈之潎潎夏侯湛江上泛歌江水兮浩浩長流兮萬里九派混東流郭璞江賦源二分於崌崍流九派乎潯陽注水别流為派又表神委於江都混流宗而東會薛道衡文引雙流而分九派長四瀆而納百川朝宗合天沼書江漢朝宗於海詩沔彼流水朝宗於海庾闡涉江賦總百川之殊勢集朝宗乎滄浪木華海賦翔天沼戲窮溟寫心陟雲峯向秀思舊賦停駕言其將邁兮遂援翰而寫心張華詩是用感嘉貺寫心出中誠顔延之車駕至京口侍遊蒜山詩陟峯騰輦路江淹詩平明登雲峯杳與廬霍絶縱目還縹眇木華海賦羣仙縹眇餐玉清涯注縹眇逺視之貌魯靈光殿賦曰忽瞟眇以響像宛轉衆浦分風土記大水小口别通為浦楊泉物理論水之精氣上浮宛轉劉楨魯都賦巨海分焉傾瀉百川差池羣山繞江淹賦山差池而鏡壑水清明而抱天木華海賦羣山既略百川潛泄梁宣帝遊七山寺賦望途山而斜繞經南湖而回波江妃弄明霞江賦冰夷倚浪以傲睨江妃含嚬而􅗻眇撫凌波而鳬躍吸翠霞而夭矯倣佛呈窈窕楚辭存倣佛而不見兮心踊躍其若湯司馬相如賦眇眇忽忽若神仙之仿佛詩窈窕淑女君子好逑辛延年詩兩鬟何窈窕一世良所無而我臨長風謝莊賦臨風歎兮將焉歇晉書宗慤傳叔父問所志慤曰願乘長風破萬里浪飄然欲騰矯曹毗贊飄然跨騰鱗江淹詩思乘扶搖翰卓然凌風矯孫綽遊天台山賦哂夏蟲之疑冰整輕翼而思矯昔懷滄洲興張協詩疇昔懷微志帷幕竊所經南史袁粲傳粲負才尚氣愛好虛遊嘗作五言詩訪迹雖中宇循寄乃滄洲蓋其志也謝朓詩既歡懷祿情復協滄洲趣斯志果已紹廣韻紹繼也焉得忘機人莊子漢隂丈人曰吾聞之我師有機械者必有機事有機事者必有機心我非不知羞而不為也陳子昂詩多謝忘機人塵憂未能整相從合魚鳥左傳鄭伯曰其能降以相從也後漢書逸民傳論豈必親魚鳥樂林草哉亦云介性所至而已嵇康絶交書遊山澤觀魚鳥心甚樂之南史張充傳長羣魚鳥畢景松阿又劉虬傳暢餘隂於山澤託暮情於魚鳥御選唐詩卷六
