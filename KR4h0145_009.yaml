body:
  text: 欽定四庫全書御選唐詩卷六五言古髙適字達夫渤海蓚人舉有道科釋褐封丘尉哥舒翰表為左驍衛兵曹掌書記左拾遺轉監察御史赴行在擢諫議大夫節度淮南李輔國譖之左授太子少詹事出為蜀彭二州刺史進成都尹劍南西川節度使召為刑部侍郎轉散騎常侍封渤海縣侯永泰二年贈禮部尚書諡曰忠適年過五十始學為詩以氣質自髙每吟一篇為好事者傳誦同薛司直諸公秋霽曲江俯見南山作唐書百官志大理寺司直六人從六品雍録唐曲江本秦隑州至漢為樂遊苑亦名樂遊原隋鑿之為芙蓉池且為芙蓉園長安中於原上置亭遊賞正月晦日三月三日九月九日京城士女咸即此袚褉帟幕車馬填塞詞人樂飲賦詩一統志曲江池在西安府城東南一十里漢武帝所鑿其水曲折似嘉陵江因名雍録終南山橫亘關中南面西起秦隴東徹藍田凡雍岐郿鄠長安萬年相去亘八百里而連綿峙據其南者皆此一山也一統志終南山在西安府城南五十里一名南山禹貢所稱終南即此司馬相如賦臨曲江之隑州望南山之參差南山鬱初霽潘尼詩南山鬱岑崟湛方生詩乘初霽晴之新景何遜詩振衣喜初霽褰裳對晚曲江湛不流曲江記曲江湛然中停宋玉文湛湛江水兮上有楓江淹賦水湛湛而空碧若臨瑤池間穆天子傳觴西王母於瑤池之上神仙傳崑崙閬風苑左瑤池右翠水劉峻詩髣佛玉山隈想像瑤池側想望崑崙丘山海經赤水之後黑水之前有大山名曰崑崙之丘爾雅三成為崑崙丘注崑崙山三重故以名之莊子黃帝登乎崑崙之丘水經崑崙墟在西北去嵩髙山五萬里河水出其東北陬楚辭願至崑崙之懸圃司馬相如大人賦西望崑崙之軋沕荒忽兮回首見黛色徐悱詩回首見長安鮑照書從嶺而上氣盡金光半山以下純為黛色何遜聨句臨橋看黛色渺然波上秋馮衍賦渺然覽於八荒楚辭嫋嫋兮秋風洞庭波兮木葉下深沈俯崢嶸夏侯湛江上泛舟歌凌波兮願濟舟楫不具兮江水深沈楚辭下崢嶸而無地宋玉髙唐賦俯視崢嶸窐寥窈冥庾信終南山銘崢嶸下鎮清淺延阻修古詩河漢清且淺謝靈運詩菰蒲冒清淺梁元帝文翻流清淺詩道阻且修張載詩欲往從之道阻修連潭萬木影謝朓賦蔭涼潭而影清插岸千巖幽晉書顧愷之傳千巖競秀鮑照詩千巖盛積阻杳靄信難測張衡南都賦杳靄蓊鬱於谷底魏文帝賦漫浩汗而難測水經注積水成潭淵深難測劉峻詩滇㴐非可辨鴻溶信難測淵淪無暗投管子水出而不流為淵爾雅小波為淪鄒陽書明月之珠夜光之璧以暗投人於道衆莫不按劍相盻何則無因而至前也郭璞詩明月難暗投片雲對漁父潘尼釣賦抗余志於浮雲髙士傳漁父者楚人也匿名隱釣於江濵南史孫緬為潯陽太守見一漁父垂綸長嘯問有魚賣乎漁父笑曰其釣非釣寧賣魚者耶獨鳥隨虛舟何遜詩遊魚上急水獨鳥赴行槎易乘木舟虛疏此釋涉川所以得利以忠信而濟難若乘虛舟以涉川也晉書謝安傳贊太保沈浮曠若虛舟陶潛詩虛舟縱逸棹回復遂無窮謝靈運詩溟漲無端倪虛舟有超越我心寄青霞王凝之詩冥心真寄梁武帝詩翠壁絳霄際丹樓青霞上雲笈七籖上憩青霞九曲之房世事慚白鷗晉書阮籍傳遺落世事孫綽遊天台山賦世事都捐陶潛詩棲棲世事中嵗月共相疏髙士傳臺佟不屏營世事以勞其精列子海上人有好鷗者每旦從鷗鳥遊鷗至者數百其父曰取來吾玩之明日鷗鳥舞而不下也鮑照詩翻浪揚白鷗得意在乘興晉書嵇康傳康嘗採藥行山澤會其得意忽焉忘反又王徽之傳徽之居山隂忽憶戴逵在剡乘船詣之造門而返人問其故曰乘興而來興盡而返何必見安道耶忘懷非外求江淹詩物我俱忘懷可以狎鷗鳥韓詩外傳義暢乎中而無外求謝靈運詩得性非外求良辰自多暇九歌吉日兮辰良穆將愈兮上皇謝靈運鄴中詩序天下良辰美景賞心樂事四者難并陸景初詩九秋光順豫重節霽良辰荀子其為人也多暇日者其出人不逺矣欣與數子遊劉琨詩中夜撫枕歎想與數子遊岑參南陽人少孤貧篤學登天寶三載進士第由率府參軍纍官右補闕代宗總戎陜服委以書奏之任出刺嘉州杜鴻漸鎮西川表為從事流寓不還遂終於蜀參詩辭意清切迥拔孤秀多出佳境每一篇出人競傳寫比之吳均何遜先主武侯廟寰宇記先主廟在成都府西八里惠陵東七十步武侯祠在先主廟西成都記先主廟西院即武侯廟廟前有雙柏古峭可愛人云諸葛手植杜甫古柏行憶昨路繞錦亭東先主武侯同閟宫陸遊跋古柏圖余在成都屢至昭烈惠陵此柏在陵旁廟中武侯室之南所云先主武侯同閟宫者與此略無小異先主與武侯鍾會檄蜀文益州先主以命世英才興兵新野蜀志諸葛亮傳詔策曰今贈君丞相武鄉侯印綬諡君為忠武侯相逢雲雷際樂府越謠歌君乘車我戴笠他日相逢下車揖君擔簦我跨馬他日相逢為君下樂府解題古辭相逢行文意與雞鳴曲同易象曰雲雷屯君子以經綸庾信銘舒卷風雲之際無妨貴仕感通君臣分易寂然不動感而遂通天下之故顔峻詩敬恭明禮孝道感通陳書章昭達傳昭達與世祖遊因結君臣之分義激魚水契荀子遇君則修臣下之義出師表三顧臣於草廬之中咨臣以天下之事由是感激蜀志諸葛亮傳先主曰孤之有孔明猶魚之有水也遺廟空蕭然陶潛文環堵蕭然不蔽風日英靈貫千嵗北齊書文苑傳序帝天縱多能斯固感英靈以特達非勞心所能致隋書李德林傳齊天統中於賔館受國書陳使江總目送之曰此河朔之英靈也又文學傳序江漢英靈燕趙竒俊並該天網之中俱為大國之寶南池夜宿思王屋青蘿舊齋禹貢底柱折城至於王屋元和郡縣志王屋山周回一百三十里髙三十里一統志河南懷慶府王屋山在濟源縣西八十里山狀如屋池上卧煩暑謝朓詩已有池上酌復此風中琴程曉嘲熱客詩閉門避暑卧出入不相過穆員新安谷記夏之日清風入林徘徊不散若為繁暑與之竟夕不櫛復不巾廣韻櫛梳也禮記髮晞用象櫛舊唐書虞世南傳篤志勤學或纍旬不盥櫛由是聲名藉甚釋名巾謹也二十成人士冠庶人巾當自謹修四教也有時清風來詩吉甫作誦穆如清風南史謝風瀹傳謝譓曰入我室者惟有清自謂羲皇人晉書隱逸傳陶潛嘗言夏月虛間髙卧北窗之下清風颯至自謂羲皇上人天晴雲歸盡梁簡文帝詩凍解池開緑雲穿天半晴庾信奉和山池詩日落含山氣雲歸帶雨餘雨洗月色新張説詩雨洗亭臯千畝緑風吹桃李一園香公事常不間史記仲尼弟子傳子羽行不由徑非公事不見卿大夫南史徐勉傳勉嘗與門人夜集客有求詹事五品官勉正色答云今夕止可談風月不宜及公事道書日生塵江淹自序山中無事日與道書為偶劉琨答盧諶詩澄醪覆觴絲竹生塵早年家王屋晉書陸機陸雲傳論挺圭璋於秀實馳英華於早年五别青蘿春江淹江上之山賦挂青蘿兮萬仞豎丹石兮百重安得還舊山謝靈運過始寧墅詩剖竹守滄海枉帆過舊山東溪垂釣綸詩之子于釣言綸之繩説苑吕望年七十釣於渭渚三日三夜魚無食者農人謂望曰子將復釣必細其綸芳其餌徐徐而投之無令魚駭隂鏗詩林寒正下葉釣晚欲收綸登嘉州凌雲寺作杜確岑嘉州詩集序參自庫部正郎出為嘉州杜鴻漸表職方郎中兼侍御史列於幕府無幾使罷寓居於蜀元和志嘉州即漢犍為郡之南安縣地境接漢嘉舊縣因名焉邵博記天下山水之勝在蜀蜀之勝曰嘉州州之勝在凌雲寺方輿勝覽凌雲寺在府之南山唐開元中僧海通於瀆江沫水濛水之會悍流怒浪之濵鑿山為彌勒大像髙踰三百三十尺建閣以覆之積十九年而工始備寺出飛鳥外王勃舍利塔碑不殊仙造還如湧出又參詩淹留野寺出向背孤山明易飛鳥遺之音魏志武帝紀注太祖才力絶人手射飛鳥謝朓詩落日飛鳥逺孔稚圭北山移文亭亭物表皎皎霞外魏收後園宴樂詩束馬輕燕外青峯戴朱樓方輿紀要九頂山在州治東一里隔江山有九峯曰鳳集曰棲鸞曰靈寶曰就日曰丹霞曰祝融曰擁翠曰望雲曰兊説山下凌雲寺海通既為彌勒大像建七層閣覆之水經注重峯疊秀青翠相臨謝朓侍宴華光殿詩青磴崛起丹樓間出又逶迤帶緑水迢遞起朱樓摶壁躋半空喜得登上頭唐新語嘉卭路髙山凌雲深谷無景斗絶叵險不通人蹤經之者必摶壁傍崖脅息而度張説詩寒山上半空臨眺盡寰中盧思道詩會待東方騎遙居最上頭始知宇宙闊文子四方上下曰宇説文宙舟輿所極覆也劉孝威詩興逸煙霄上人間宇宙中水經注南鄉峽其間平地可二十許里江山迥闊陶潛詩昭昭天宇闊皛皛川上平下看三江流杜甫集自注嘉州據蜀江外左思蜀都賦帶二水之江流方輿紀要大江在州城東俗名通江自眉州流入界又南經烏尤山下為三江會流處勝覽嘉定府梁為青州取青衣水為名謝朓詩大江流日夜客心悲未央又結軫青郊路回瞰蒼江流天晴見峨眉梁簡文帝詩凍解池開緑雲穿天半晴蜀都賦抗峨眉之重阻唐書地理志嘉州羅目縣有峨眉山十道山川考在嘉州峨眉縣西七里兩山相對望之如峨眉方輿勝覽嘉定府西魏改眉州取峨眉山為名西竺千嵗和尚與僧書三峨髙出五嶽秀甲九州如向波上浮顧愷之觀濤賦水無涯而合岸山孤映而若浮迥曠野景豁圖畫見聞志山川髙曠謝靈運詩野曠沙岸靜天髙秋日明庾肩吾詩野曠秋先動林髙葉早殘王藴之蘭亭詩散豁情志暢塵纓忽巳捐庾闡衡山詩寂坐意虛恬運目情四豁隂森棕柟稠陸機詩望舒離金虎屏翳吐重隂潘嶽懷舊賦柏森森以攢植張衡西京賦木則樅栝棕柟梓棫楩楓長孫輔佐詩地深草木稠願割區中緣永從塵外遊宋書謝靈運傳幽棲窮巖外緣兩絶又詩想像崑山姿緬邈區中緣薛稷詩睿覽出區中晉書謝安傳論文靖始居塵外髙謝人間何承天詩逍遙風塵外殷仲文詩哲匠感蕭晨肅此塵外軫回風吹虎穴爾雅回風曰飄易風從虎庾信銘探虎穴而揮戈上魚門而懸胄片雨當龍湫庾信詩澗底百重花山根一片雨李庾西都賦其逺也深有蛟潭派作龍湫劇談録華隂縣南十餘里有龍移湫自逺而至碧波回塘湛若疏鑿僧房雲濛濛謝靈運山居賦臨浚流列僧房佛國記于闐人民殷盛盡皆奉法作四方僧房供給客僧詩零雨其濛謝朓朝雨詩空濛如薄霧王勃惠普寺碑時暄福地低落照於晴暉候肅禪房泛初華於霽景夏月寒颼颼詩四月維夏陶潛詩孟夏草木長繞屋樹扶疏南史羊欣傳嘗夏月著新練裙水經注氣蕭蕭以瑟瑟風颼颼而飀飀回合俯近郭鮑照詩回互非一形參差昔相似謝靈運詩洲島驟回合圻岸屢催奔謝朓詩還望青山郭沈亞之復戒業寺記緇衣以為居近郭若遊賔乃謀遷之西岡寥落見逺舟世説袁彥伯為謝安南司馬都下諸人送至瀨鄉將别既自悽惘歎曰江山遼落居然有萬里之勢謝朓詩天際識歸舟謝惠連詩淒淒乘蘭秋言餞千里舟勝槩無端倪邵博記凌雲寺之南山又其勝也吕溫地志圖序聚米擬其端倪畫地陳乎梗概莊子反覆終始不知端倪天宫可淹留南康記雩都縣有君山大風雨後聞絃歌其山謂之仙宫梁簡文帝遊光宅寺詩慈波流淨宫王融詩真心延淨境邃業嗣天宫諸葛亮書雖有淹留何損於美趣何患於不濟沈約詩遇可淹留處便欲息微躬一官詎足道欲去令人愁謝朓詩十載猶先職一官乃任真崔洞詩仙客辭蘿月東來就一官史記李將軍傳文帝曰子當髙帝時萬户侯豈足道哉庾信文枚乘之望梁苑不憚棄官樂毅之求燕路無辭萬里沈約詩髙臺不可望望逺令人愁緱山西峯草堂作列仙傳王子喬好吹簫作鳳鳴遊嵩洛間道士浮丘公接上嵩髙山三十餘年往來緱氏山緱氏山近在嵩山之西也結廬對中嶽陶潛詩結廬在人境詩嵩髙維嶽名山志嵩髙山者五嶽之中嶽也青翠常在門水經注重峯疊岫青翠相臨謝靈運詩連嶂疊巘崿青翠杳深沈遂耽水木興水經注水木明瑟謝朓杜若賦憑瑤圃而宣遊臨水木而延佇謝混詩水木湛清華盡作漁樵言何遜詩爾情深鞏洛子念返漁樵劉孝威應令詩神心重丘壑散步懷漁樵頃來闕章句文心雕龍宅情曰章位言曰句春秋序疏章句煩多則事情易顯漢書揚雄傳雄少而好學不為章句訓詁通而已顔延之詩觀書鄙章句但欲間心魂江淹詩何用苦心魂日色隱空谷江淹詩嵐氣隂不極日色半虧天何遜詩風光蕊上輕日色花中亂邢邵詩天髙日色淺林徑鳥聲哀詩皎皎白駒在彼空谷梁武帝淨業賦若空谷之應聲似遊形之有影蟬聲喧暮村毛詩草木蟲魚疏鳴蜩蟬也宋衛謂之蜩陳鄭云蜋海岱之間謂之蟬禮記鹿角解蟬始鳴曩聞道士語黃庭經仙人道士非可神積精理氣以長生世説有北來道士好才理與林公相遇於瓦官寺講小品於時竺法深孫興公悉共聽此道人語郭璞遊仙詩青溪千餘仞中有一道士偶見清淨源禮記東風解凍疏物生清淨明潔史記曹參世家參為齊相有蓋公好黃老術曰大道貴清淨而人自正淮南子清淨恬愈人之性也隱几閲吹葉莊子南郭子綦隱几而卧束晳讀書賦垂帷帳以隱几被紈素而讀書王褒詩秋風吹木葉乘秋眺歸根唐中宗九日詩九日正乘秋三杯興巳周易利用安身注歸根則寧天下之理得也老子夫物藝藝各復歸其根獨遊念求仲夏侯湛莊周贊邁邁莊周騰世獨遊決輔録蔣詡舍中三徑惟羊仲求仲從之遊二仲皆銼廉逃名之士南史陶潛傳鄰靡二仲室無萊婦開徑招王孫南史謝靈運傳嘗自始寧南山伐木開徑直至臨海山居賦翦榛開徑尋石覔崖王勃詩亂竹開三徑飛花滿四鄰劉安招隱士王留孫兮歸來山中不可以久片雨下南澗庾信詩澗底百重花山間一片雨詩于以采蘋南澗之濵陸機招隱詩朝采南澗藻夕息西山足孤峯出東原梁書徐勉誡子嵩書孤峯叢薄不無糾紛之異北史盧思道傳遷武陽太守為孤鴻賦以寄其情序曰分符坐嘯作守東原尚書大傳東原底平棲遲慮益淡詩衡門之下可以棲遲脫略道彌敦晉書謝尚傳開率穎秀辨悟絶倫脫略細行不為流俗之事恨賦脫略公卿跌宕丈史何遜詩顧余晚脫略吕忱字林敦有十二音元韻音惇敦大也陳子昂詩吾聞西方化清淨道彌敦野靄晴拂枕王勃普惠寺碑韶光照野爽靄晴遙客帆遙入軒孫綽望海賦商客齊暢潮流往還各資順勢雙帆同懸姚崇詩唯看孤帆影常似客心懸尚平今何在後漢書向長字子平河內朝歌人也隱居不仕王莽聘之固辭乃止嘗讀易至損益卦喟然歎曰吾巳知富不如貧貴不如賤但未知死何如生耳建武中敕斷家事與北海禽慶俱遊五嶽名山注髙士傳向字作尚此意誰與論佇立雲去盡吳均詩佇立日將暮相思忽無緒蒼蒼月開園隋書天文志天了無質仰而瞻之髙逺無極故蒼蒼然也庾信詩決渠移水碓開園掃竹林自潘陵尖還少室居止秋夕憑眺一統志嵩山三尖峯東曰太室西曰少室嵩其總名謂之室者以其下各有石室草堂近少室唐書盧鴻傳廬嵩山開元初徵至東都固請還山賜隱居服官營草堂鴻草堂詩山為宅兮草為堂參本集呈諸故人詩他日能相訪嵩陽舊草堂夜靜聞風松南史陶𢎞景傳𢎞景特愛松風庭院皆植松月出潘陵尖詩月出皎兮照見十六峯一統志嵩山三十六峯九月山葉赤古今注赤楊霜降則葉赤溪雲淡秋容古碧玉歌芙蓉凌霜榮故向秋容好火點伊陽村唐書地理志河南府伊陽縣先天元年析陸渾置有太和山有銀銅錫伊水有金沈炯詩火炬前村發林煙樹下昏煙深嵩角鐘水經注岫壑沖深含煙罩霧梁元帝飛流寺碑雲聚峯髙風清鐘徹尚子不可見髙士傳尚長字子平安貧樂道為子嫁娶畢敇斷家事勿復相關肆意遊五嶽名山遂不知所在謝靈運詩畢娶類尚子薄遊似邴生蔣生難再逢三輔決録蔣詡隱於杜陵舍中三徑唯羊仲求仲從之遊謝靈運詩惟開蔣生徑永懷求羊蹤勝愜只自知廣韻愜快也又心服也謝靈運詩意愜理無違晉書王濛傳劉惔稱濛性甚通而自然有節濛曰劉君知我勝我自知佳趣為誰濃張九齡題畫詩對玩有佳趣使我心渺綿昨詣山僧期庾信詩野老時相訪山僧或見尋上到天壇東一統志天壇山在永寧縣西四十五里一名壇屋山向下望雷雨易天地解而雷雨作左思魏都賦雷雨窈冥而未半皎日籠光於綺橑雲間見回龍後漢書逸民傳矯慎隱遁山谷汝南吳蒼遺書曰足下審能騎龍弄鳳翔嬉雲間者亦非狐兔燕雀所敢謀也久與人羣疏庾信詩野情風月曠山心人事疏轉愛丘壑中世説顧長康畫謝幼輿在巖石裏人問其所以曰此子自謂一丘一壑過於庾亮故宜置丘壑中心淡水木會興幽魚鳥通水經注大明寺池上有客亭左右楸桐負日俯仰目對魚鳥水木明瑟謝混遊西池詩景仄鳴禽集水木湛清華南史劉虬傳暢餘隂於山澤托暮情於魚鳥希微了自適南史隱逸傳敘道義內足希微兩忘藏景窮巖蔽名愚谷出處乃不同易君子之道或出或處況本無宦情晉書王衍傳衆共推為元帥衍辭曰吾少無宦情隨牒推移遂至於此今日之事安可以非才處之誓將依道風任昉代范尚書讓封表乃祖玄平道風秀世秋夕聽羅山人彈三峽流泉琴集三峽流泉晉阮咸所作也水經注丹山西即巫山其間首尾一百六十里謂之巫峽蓋因山以為名也自三峽七百里中兩岸連山略無闕處重巖疊嶂隱夭蔽日自非停午夜分不見曦月至於夏水襄陵沿泝阻絶王命急宣有時朝發白帝暮到江陵其間千二百里雖乘奔御風不以疾也春冬之時則素湍緑潭回清倒影絶巘多生柳柳懸泉瀑布飛漱其間清榮峻茂良多趣味一統志巫峽在夔州府巫山縣東三十里即巫山也與西陵峽歸峽並稱三峽皤皤峨山老史記秦紀繆公曰古之人謀黃髮皤皤則無所過班固辟雍詩皤皤國老乃父乃兄愛日齋叢抄蜀中稱尊老者為皤唐書地理志嘉州羅目縣有峨眉山一統志峨眉山在眉州城南二百里來自岷山連岡疊嶂延袤三百餘里至此突起三峯其二峯對峙宛若峨眉抱琴鬚蒼然稽康絶交書抱琴行吟弋釣草野北齊書盧詢祖傳大人蒼蒼在鬢差以自安衫袖拂玉徽釋名衫芟也衫末無袖端也又袖由也手所由出亦言受也以受手也庾信春賦鏤薄穿衫袖稽康琴賦徽以鍾山之玉尚書故實蜀中雷氏斫琴常自品第上者以玉徽次者以寶徽又次者以金螺咩徽為彈三峽泉左思蜀都賦經三峽之崢嶸水經注三峽禹鑿通江此曲彈未半莊子孔子絃歌鼓琴奏曲未半有漁父者下船而來左手據膝右手持頥以聽曲終陶潛間情賦曲調將半景落西軒悲商叩林白雲依山髙堂如空山古辭長安有狹邪行挾瑟上髙堂南史宗少文傳凡所遊履悉圖之於室撫琴動操欲令衆山皆響石林何颼飀楚辭焉有石林何獸能言謝靈運詩流沫不足險石林豈為艱左思吳都賦與風颻揚䬀瀏颼飀水經注氣蕭蕭以瑟瑟風颼颼而飀飀忽在窗户間郭璞詩雲生梁棟間風出窗户裏繞指弄嗚咽劉琨詩何意百鍊鋼化為繞指柔梁武帝詩玉指弄嬌絃蔡雍琴賦間關九絃出入律吕屈伸低昂十指如雨王泰巫山髙詩谷深流響咽峽近猿聲悲青絲激潺湲嵇康琴賦絃以園客之絲又激清響以赴會王粲詩流波激清響楚辭觀流水兮潺湲謝靈運詩石淺水潺湲演漾怨楚雲阮籍詩泛泛乘輕舟演漾靡所望王筠琴曲含怨復含嬌晉書天文志楚雲如日宋玉髙唐賦昔者楚襄王與宋玉遊於雲夢之臺望髙唐之觀其上獨有雲氣虛徐韻秋煙詩其虛其邪箋邪讀徐阮瑀箏賦不疾不徐遲速合度鮑照賦秋水兮駕波涼煙兮冒江盧照鄰詩長薄秋煙起疑兼陽臺雨宋玉髙唐賦妾在巫山之陽髙丘之阻旦為朝雲暮為行雨朝朝暮暮陽臺之下似雜巫山猿水經注三峽每晴初霜旦林寒澗肅有髙猿長嘯屬引淒異空岫傳響故漁者歌曰巴東三峽巫峽長猿鳴三聲淚沾裳梁簡文帝詩巫山七百里巴水三回曲又猿啼斷還續幽引鬼神聽白虎通書曰戛擊鳴球搏拊琴瑟以詠祖考來格者鬼神清虛貴淨賤鏗鏘也詩神之聽之終和且平淨令耳目便宋玉風賦發明耳目寧體便人司馬相如上林賦所以娛耳目樂心意楚客腸終斷劉允濟詠琴詩巴人緩疏節楚客弄繁絃古樂府隴頭流水鳴聲幽咽遙望秦川肝腸斷絶湘妃淚斑斑湘中記舜二妃為湘水神故曰湘妃琴操有湘妃怨博物志舜之二妃以涕揮竹竹盡斑劉孝威詩恥染湘妃淚羞入上宫琴江總琴曲湘妃拭淚灑貞筠誰裁青桐枝詩椅桐梓漆爰伐琴瑟史記龍門有桐樹髙百尺無枝堪為琴桓談新論神農氏削桐為琴繩絲為絃以通神明之德合天人之和謝惠連琴贊嶧陽孤桐裁為鳴琴體兼九絲聲備五音爾雅翼青桐似梧桐而無子又桐有花而不實堪作琴瑟者縆以朱絲絃淮南子小絃絙大絃緩注絙急也楚詞注急張絃也尚書大傳大琴朱絃禮記朱絃疏越一唱而三嘆鮑照白頭吟直如朱絲繩注朱絲朱絃也能含古人曲琴操古琴曲有詩歌五曲又有十二操又有九引又有河間雜歌二十一章稽康琴賦含顯媚以送終注含顯媚之聲以送曲終也遞與今人傳劉孝綽琴詩幽蘭暫罷曲積雪更傳聲知音難再逢禮記知聲而不知音者禽獸足也知音而不知樂者衆庶是也惟君子為能知樂是故審聲以知音審音以知樂審樂以知政而治道備矣列子伯牙鼓琴志在髙山鍾子期曰峩峩然若泰山志在流水曰洋洋若江河子期死伯牙絶絃以無知音者韓詩外傳野鄙之人五音不知安能調琴江總彈琴詩罕有知音者空勞流水聲惜君方老年楚辭老冉冉其將至陸機詩冉冉逝將老咄咄奈老何何遜詩少壯輕年月遲暮惜光輝曲終月已落張衡西京賦度曲未終雲起雪飛成公綏嘯賦曲既終而響絶鮑照舞鶴賦星翻漢回曉月將落惆悵東齋眠馮衍賦情惆悵以增傷韻會燕居之室曰齋南史王慈僧虔子也謝超宗嘗候僧虔仍往東齋候慈送顔平原并序沂舊唐書顔真卿傳字清臣琅琊臨人開元中舉進士登甲科四命為監察御史遷殿中侍御史東都畿採訪判官轉侍御史武部員外出為平原太守一統志德州在濟南府西北二百八十里漢置平原郡治平原縣隋置德州復為平原郡唐置德州尋改平原郡十二年春有詔補尚書十數公為郡守上親賦詩觴羣臣宴於蓬萊前殿雍録紫宸殿北為蓬萊殿殿北有池亦名蓬萊池仍贈以繒帛寵餞加等參美顔公是行為寵别章天子念黎庶白虎通天子者爵稱也爵所以稱天子者何王者父天母地為天之子也後漢書崔駰傳聖德滂以橫被兮黎庶愷以歌舞晉書袁宏傳謝安為揚州刺史宏自吏部郎出為東陽郡祖道於冶亭安臨别取一扇授之曰聊以贈行宏應聲曰敬當奉揚仁風惠彼黎庶詔書撫諸侯蔡雍獨斷漢制天子之書一曰策書二曰制書三曰詔書四曰戒敕又詔書者詔誥也易先王以建萬國親諸侯王隱晉書何曽上言郡守之權雖輕猶御千里比之於古列國之君也仙郎授剖符白帖諸曹郎一名星郎又曰仙郎臺郎沈佺期詩並命登仙閣分宵直禮闈漢書髙帝紀與功臣剖符作誓丹書鐵券金匱石室藏之宗廟東觀漢記二千石皆以選出京師剖符典千里王褒聖主得賢臣頌剖符錫壤而光祖考華省輟分憂潘嶽秋興賦宵耿介而不寐兮獨展轉於華省漢書循吏傳序孝宣嘗稱曰百姓所以安其田里而無歎息愁恨之心者政平訟理也與我共此者其惟良三千石乎晉書宣帝紀黃初五年加給事中録尚書事天子曰此非以為榮乃分憂耳置酒會前殿漢書髙帝紀漢王拜彭越為魏相令定梁地漢王遂入彭城置酒髙會司馬相如賦置酒乎皓天之臺張樂乎膠葛之宇漢書樂志凡鼓八員朝賀置酒陳前殿房中又揚雄傳前殿崔巍兮和氏玲瓏賜錢若山丘後漢書王景傳從駕東巡狩至無鹽帝美其功績拜河隄謁者賜車馬縑錢又儒林傳楊仁上便宜十二事皆當世急務帝嘉之賜以縑錢列子紀昌以氂懸虱在牖南面而望之三年之後如輪覩物如山丘也張衡賦龍吟方澤虎嘯山丘孫楚賦縈深谷繞山丘天章降三光詩倬彼雲漢為章于天禮記三賔象三光又經之以天地紀之以日月參之以三光政教之本也聖澤該九州曹植求自試表沐浴聖澤李燈詩已知聖澤深無限更喜年光入睿才書九州攸同周禮大司徒以天下土地之圖周知九州之地域廣輪之數吾兄鎮河朔書惟戊午王次于河朔傳止于河之北舊唐書真卿傳清河李萼謂真卿曰河朔諸郡恃公為長城拜命宣王猷書説拜稽首敢對揚天子之休命文心雕龍周鑒二代文理彌盛再拜稽首對揚休命詩王猷允塞晉書桓豁傳三台麗天辰極以之增耀論道作弼王猷以之時雍張協七命王猷四塞函夏寧謐駟馬辭國門漢書于定國傳始定國父于公其門閭壞父老方共治之于公謂曰少髙大閭門令容駟馬髙蓋車我治獄多隂德子孫必有興者又韓延夀傳延夀在東郡時試騎士駕駟馬建幢棨植羽葆周禮司門掌授管鍵以啓閉國門史記晉世家介子推從者懸書國門一星東北流晉書天文志流星天使也星大者使大星小者使小夏雲照銀印顧凱之詩夏雲多竒峯漢書百官公卿表太守品第五秩二千石銀章青綬暑雨隨行輈書夏暑雨小民惟曰怨咨鮑照芙蓉賦當融風之暄蕩承暑雨之平渥説文輈轅也謝承後漢書百里嵩為徐州刺史境內遭旱嵩行部傳車所經甘雨輒至赤筆仍在篋杜氏通典尚書郎月賜赤管大筆一雙隃糜墨一丸説文篋緘藏也爐香惹衣裘通典尚書郎入直給女侍史二人執香爐香囊燒薰護衣服梁簡文帝詩薰爐滅復香李嶠謝表青牛帳裏未輟爐香周禮宫伯以時頒其衣裘韓非子官爵尊貴衣裘壯麗此地鄰東溟顔延之詩日觀臨東溟孤城弔滄洲庾信文月暈孤城塵驚虛援袁粲詩訪迹雖中宇循寄乃滄洲謝朓詩既欣懷祿情復愜滄洲趣海風掣金戟國語海鳥曰爰居止於魯東門之外三日展禽曰海其有災乎夫廣川之鳥恆知而避其災也是嵗海多大風釋名戟格也旁有枝格也後漢書輿服志公以下至二千石騎吏四人皆帶劍持棨戟為前列導吏呼鳴騶説苑趙簡子從晉陽之邯鄲中路而止引車吏進問君何為止南史到溉傳溉性不好交遊惟與朱異劉之遴張綰同志友密每嵗時恆嗚騶枉道以相存魏書爾朱仲逺傳仲逺加大將軍又兼尚書令請準朝式在軍鳴騶帝笑而許之孔稚圭北山移文鳴騶入谷鶴書赴隴郊原北連燕蕭子範詩郊原共超逺林野雜依菲祖詠詩歡娛始披拂愜意在郊原史記召公世家武王封召公於北燕注今幽州薊縣故城是也剽劫風未休漢書尹賞傳長安中姦猾浸多城中薄暮塵起剽劫抱鼓不絶魚鹽隘里巷左傳魚鹽蜃蛤弗加於海漢書五行志建平四年夏京師郡國民聚會里巷張博具鼓舞祠西王母後漢書劉愷傳側身里巷處約思純進退有度百僚景式桑柘盈田疇禮記命野虞毋伐桑柘潘嶽詩春草鬱青青桑柘何奕奕禮記孟夏之月燒剃行水利以殺草可以糞田疇可以美土疆左傳子産從政一年輿人誦之曰取我田疇而伍之及三年又誦之曰我有田疇子産殖之為郡豈淹旬漢書杜周傳兩子夾河為郡守家資纍巨萬庾信序昔二馮同德繼踵當官兩杜齊名夾河為郡魏明帝詩遊弗淹旬遂屆揚土政成應未秋周禮小司徒之職嵗終則考其屬官之治成漢書循吏傳序宣帝時二千石有治理效輒以璽書勉勵增秩賜金或爵至關內侯易俗去猛虎禮記移風易俗莫善於樂南史梁武帝紀鎔鈞所被變風以雅易俗陶人載和邦國華嶠後漢書宋均為九江守時多暴虎設檻捕之均退貪殘進忠良去檻穽虎遂東渡江去謝承後漢書劉昆遷𢎞農太守先是崤黽驛道多虎昆為政三年化大行虎皆負子渡河而去化人似馴鷗列子海上人好鷗者每旦至海上鷗至者百數其父曰取來我玩之明日至海上鷗遂舞而不下隋文帝詩馴鷗舊可狎蒼生已望君書帝光天之下至於海隅蒼生共惟帝臣左傳國人望君如望慈父母焉黃霸寧久留漢書循吏傳黃霸字次公昭帝時俗尚嚴酷霸獨寬和為穎川太守得民心户口嵗增治為天下第一劉安招隱士王孫兮歸來山中不可以久留劉長卿字文房河間人開元二十一年進士至德中為監察御史知淮南鄂嶽轉運留後貶潘州南邑尉除睦州司馬終隨州刺史以詩馳聲上元寶應間權德輿常謂為五言長城皇甫湜亦云詩未有劉長卿一句巳呼宋玉為老兵其見重如此龍門雜咏一統志在河南府城西南三十里俗名龍門山左傳晉趙鞅納王使女寬守闕塞即此一名伊闕亦名闕口大禹疏龍門伊水出其間漢服虔謂南山伊闕是也傅毅賦因龍門以暢化開伊闕以達聰水經注伊水又北入伊闕昔大禹疏以通水兩山相對望之若闕伊水歷其間北流故謂之伊闕春秋之闕塞焉陸機云洛有四闕斯其一焉東巖西嶺並鐫石開軒髙甍架峯西側靈巖下泉流東注於伊水元和郡縣志伊闕山在河南府伊闕縣北四十五里秋山日搖落徐陵詩猿啼知谷晚蟬咽覺山秋宋玉九辨蕭瑟兮草木搖落而變衰魏文帝燕歌行秋風蕭瑟天氣涼草木搖落露為霜劉孝綽侍宴詩禁林寒氣晚方秋未搖落秋水急波瀾莊子秋水時至百川灌河晉書阮籍傳贊秋水揚波春雲斂映秋興賦澡秋水之涓涓兮玩遊倏之潎潎謝靈運詩傾耳聆波瀾舉目眺嶇􅋂獨有魚龍氣漢書西域傳贊作曼衍魚龍角抵之戲以觀視之水經注汧水出五色魚俗以為靈莫敢采捕因謂為魚龍水長令煙雨寒張協雜詩騰雲似涵煙密雨如散絲沈約見庭雨應詔詩非煙復非雲如絲復如霧謝朓詩切切隂風暮桑柘起寒煙阮籍賦寒雨淪而下降誰窮造化力後漢書張衡傳論數術窮天地制作侔造化莊子以天地為大爐以造化為大冶拾遺記帝堯在位獲金璧之瑞文字炳列記天地造化之始王羲之蘭亭詩大矣造化工萬殊莫不均空向兩巖看右闕口山葉旁巖赤謝靈運詩隨山疏濬潭傍巖藝枌梓任昉竟陵王碑文依林構宇傍巖拓梁古今注赤楊霜降則葉赤張正見詩秋葉奪粧紅千峯秋色多謝朓望三湖詩葳㽔向春秀藝黃共秋色梁元帝詩桂影含秋色桃花染春源夜泉發清響水經注上則風籟傳空下則泉響不斷庾信詩懸崖泉溜響深谷鳥聲春王粲詩流波激清響謝萬蘭亭詩谷流清響寒渚生微波鮑照野鵝賦立菰蒲之寒渚托隻影而為雙謝朓詩寒渚夜蒼蒼曹植節遊賦凱風發而時鳥歡微波動而水蟲鳴謝靈運山居賦毖溫泉於春流馳寒波而秋徂又柟溪賦淡瀲結寒波檀欒秀霜質稍見沙上月李陵詩明月照户樞想見餘光輝庾信舟中望月詩岸白不關沙歸人爭渡河右水東渡上薛道衡詩人歸落鴈後思發在花前庾信春賦開林而競入擁河橋而爭渡家語卜商反衛見讀史志者云晉師伐秦三豕渡河子夏曰非也巳亥耳易林乘篾渡河庾信詩白馬向清波乘冰始渡河寂寞對伊水後漢書馮衍傳陂山谷而間處兮守寂寞而存神莊子夫虛靜恬淡寂寞無為者天地之平而道德之至新語寂寞而無鄰寥廓而獨寐後漢書郡國志盧氏有熊耳山伊水清水出山海經虢山伊水出焉西流注于河沈約詩清晨戲伊水薄暮宿蘭池徐陵詩風吹臨伊水時駕出河梁經行長未還法華經佛子住此地則是佛受用常在于其中經行及坐卧徐陵長干寺碑遊岩倚樹晏坐經行楊炯盂蘭盆賦山中禪定樹下經行東流自朝暮書嶓冢導漾東流為漢後漢書禮儀志上已官民皆潔於東流水上新語四瀆東流百川莫不從管子日有朝暮夜有晨昏隂鏗詩陽臺可憶處唯有暮將朝千載空雲山漢書王褒傳上下俱欲歡然交欣千載一會論説無疑何妥詩小臣屬千載時幸預簪纓禮記天降時雨山川出雲蔡琰胡笳十八拍雲山萬重兮歸路遐唯見白鷗鳥鮑照詩騰沙鬱黃霧翻浪揚白鷗魏志髙柔傳注貞夫一則天地可動機心萌則鷗鳥不一列子海上人好鷗鳥每旦之海上從鷗鳥遊鷗鳥之至者百數江淹詩物我俱忘懷可以狎鷗鳥無心洲渚間右福公塔歸劉協新論魚不畏網而畏鵜網無心而鳥有情也陶潛去來辭雲無心以出岫鳥倦飛而知還謝靈運詩辛勤風波事款曲洲渚言沈約菰詩結根布洲渚垂葉滿臯澤松路向精舍張説詩雲對石上塔風吹松下路釋迦譜息心所栖曰精舍精練行者之所居晉武帝初奉佛法立精舍於內殿引沙門居之花龕歸老僧沈佺期詩香界縈北渚花龕隱南巒間雲隨錫杖南史張欣泰傳欣泰下直輒著鹿皮冠衲衣錫杖武帝曰將家兒何故作此舉止髙僧傳沙門曇持一錫杖曰此是般若眼奉之可得道沈炯詩楊枝生栱樹錫杖呪飛泉落日低金繩謝靈運賦望新晴於落日鮑照詩日落嶺雲歸梁簡文帝詩雲斜花影沒日落荷心香又採蓮曲香風起白日低採蓮曲使君迷法華經黃金為繩以界八道法苑珠林大川開寶匣福地下金繩入夜翠微裏爾雅山未及上曰翠微疏謂未及頂上在旁陂陀之處名翠微一説山氣青縹色故曰翠微也蜀都賦鬱葐蒀以翠微崫巍巍以峩峩千峯明一鐙右逺公龕詩曹植詩不醉無歸來明燈以繼夕劉楨衆賔會廣坐明燈喜炎光隱隱見危閣易林雷君出裝隱隱西行霖雨不止流為河江鮑照詩隱隱日沒岫瑟瑟風發谷隔河映青林江總詩定言神女隔河來射雉賦陟青林以遊覽兮樂羽族之羣飛吳均詩飄飄上碧虛藹藹隱青林水田秋鴈下晉書食貨志東南以水田為業隋書髙熲雁傳江南土熱水田早熟晉書樂志雍雍雙遊戲田畔陳後主詩樓髙看雁下葉散覺山涼山寺夜鐘深庾信詩戍樓鳴夕鼓山寺響晨鐘史記貨殖傳山深而獸往之寂寞羣動息楚辭山蕭條而無獸兮野寂寞而無人曹植詩間房何寂寞緑草被階庭陶潛詩日入羣動息歸鳥趣林鳴風泉清道心右石樓傳水經注風泉響於青林之下王融渌水曲風泉動華燭頭陀寺碑文崖谷共清風泉相渙劉協新論神恬心清則形無纍矣王僧達詩圭璋既文府精理亦道心誰識往來意易往來井井詩莫往莫來悠悠我思列子獨往獨來孤雲長自間陶潛詩萬族各有托孤雲獨無依風寒未渡水齊書謝超宗傳超宗詣東府門其日風寒太祖曰此客至令人不衣自暖矣墨子聖王為宫室髙足以辟潤濕邊足以圉風寒張華詩巢居知風寒穴處識隂雨日暮更看山左傳日云暮矣王粲詩日暮遊西園沈約詩佇立日巳暮木落衆峯出周禮疏鴈隨陽南北木落南翔冰泮北徂謝靈運詩木落知風發鮑照詩木落江渡寒江總詩木落幾枝黃王績詩時時斷嶂遮往往孤峯出龍宫蒼翠間右下山仙戴逵貽城慧命禪師書負笈千里歷龍宫而陸包括謝朓詩蒼翠望寒山崢嶸瞰平日暮下山來古樂府上山採蘼蕪下山逢故夫千山暮鐘發江淹詩悵然山中暮沈佺期詩湛湛山川暮蕭蕭涼氣稀不知波上棹盧綸詩月華如在白波中江淹水上神女賦唱桂棹凌衝波張協七命縱棹隨風弭節乘波還弄山中月謝靈運賦滅華燭兮弄曉月又詩暝還雲際宿弄此石上月吳均詩挂月青山下伊水連白雲陸機賦粲煙接以雲連漢書郊祀志天子禪泰山下址東北肅然山封禪祠其夜若有