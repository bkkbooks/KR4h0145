生木十株故木冬夏不凋者皆可以萬年名之宋之問夏日仙萼亭應制髙嶺逼星河梁簡文帝詩峻嶺半藏天唐太宗聖教序桂生髙嶺雲露方得泫其花河圖括地象川德布精上為星河謝朓詩眷星河兮不可留乘輿此日過孟子今乘輿已駕矣司馬相如子虛賦乘輿弭節徘徊翺翔蔡雍獨斷車馬衣服器械百物曰乘輿張衡西京賦擊鐘鼎食連騎相過野含時雨潤隂鏗詩緑野含膏潤曹植表草木荷恩含氣受潤書曰肅時雨若禮記季春之月時雨將降下水上騰後漢書魯恭傳祥風時雨覆被逺方易雨以潤之書傅君行敬則時雨潤之後漢書郎覬傳萬物須雷而解資雨而潤山雜夏雲多淮南子山雲草莽江總詩海樹一邊出山雲四面通沈約詩夏雲清朝景顧愷之詩夏雲多竒峰睿藻光巖穴王褒詩徒知仰睿藻抽辭殊未申虞茂詩睿藻冠風騷易自上下下其道大光班固東都賦揚光飛文戰國䇿顯巖穴之士曹植七啓豫耽巖穴未暇此居左思招隱詩巖穴無結構宸襟洽薜蘿何遜九日侍宴詩宸襟動時豫嵗序屬涼氛淮南子堯治天下政教平德潤洽後漢書班固傳皇歡洽羣臣醉楚辭九歌若有人兮山之阿被薜荔兮帶女蘿南史宗測傳量腹而進松术度形而衣薜蘿悠然小天下陶潛詩採菊東籬下悠然見南山世説謝太傅悠然逺想有髙世之志孟子登太山而小天下歸路滿笙歌陶潛詩行行尋歸路庾信步虛詞停鸞宴瑤水歸路上鴻天鮑照詩笙歌待明發江奄賦笙歌畹右琴舞池東麟趾殿侍宴應制按玉海唐時殿名凡一百有四十麟趾殿其一也北闕層城竣史記髙帝紀八年蕭何治未央宫立東闕北闕注未央殿雖南嚮而上書奏事謁見皆詣北闕張衡西京賦北闕甲第當道直啓唐太宗詩北闕三光晚南榮九夏初淮南子崑崙山有層城九重庾信謝滕王集序啓青鳥遙蜚似送層城之壁西宫復道懸淮南子孟秋之月天子西宮御女注金王西故處西宫也漢書五行志西宫小寢夫人之居雍録開元二十年築夾城通芙蓉園自大明宫夾東羅城復道由通化安興門經春明門延喜門可以達曲江芙蓉園而外人不知也又驪山觀風殿有復道可通大明宫乘輿歷萬户三輔黃圗帝作建章宫度為千門萬户班固西都賦張千門而立萬户順隂陽以開闔孟子今乘輿已駕矣獨斷天子至尊不敢泄瀆言之故托之於乘輿天子以天下為家不以京師宫室為常當乘車輿以行天下曹植詩玉馬充乘輿芝蓋樹九重置酒望三川司馬相如上林賦置酒于皓天之臺張樂乎膠葛之宇曹植樂府閶門置酒和樂欣欣國語西周三川皆震注涇渭洛也顔延之詩前登陽城路旦夕望三川花栁含丹日沈約詩無事逐梅花空教信楊栁庾信馬射賦落花與紫蓋同飛楊栁共青旗一色隋焬帝詩是月春之季花栁相依依梁簡文帝宣武王廟碑反雨飛風伏檻含日山河入綺筵史記項羽紀關中阻山河四塞地肥饒可都以霸漢書功臣表迹漢功臣亦皆剖符世爵受山河之誓鮑照詩簮金籍綺升曲筵張正見詩鳴玉升文砌稱觴溢綺筵欲知陪賞處庾肩吾詩陪歌承睿賞接醴侍恩筵空外有飛煙唐太宗幸武功詩祥煙散碧空梁元帝詩傍通似佳氣却望似飛煙張融海賦鬱若飛煙奔雲以根柯江總香贊營空雜霧散逈飛煙李適奉和九日幸臨渭亭登髙應制舊紀景龍三年九月壬戌幸九曲亭宴侍臣學士十四年三月甲寅幸臨渭亭修稧飲景龍文館記景龍三年九月九日中宗幸臨渭亭登髙賦詩學士皆屬和禁苑秋光入漢書食貨志省禁苑以豫貧民雍勝略唐禁苑在今省城北東西二十七里南北三十二里苑中有凝碧池張正見詩禁苑回雕輦離宫見翠旃顔延之詩風觀要春景月榭迎秋光宸遊霽色髙張正見詩上苑奢行樂滄池聊薄遊南史景色開霽爾雅雨止為霽謝瞻詩夕霽風景涼萸房頒綵笥荆楚記九月九日佩茱萸飲菊花酒風土記茱萸九月九日熟色赤可採孫楚茱茰賦攀紫房於仙柯書惟衣裳在笥菊蘂薦香醪孫楚菊花賦飛金英以浮甘酒盧諶菊花賦黃蘂星羅酒經醪汁滓酒也世本儀狄始作酒醪變五味陸機七徴秋醪春醴袁山松酒賦素醪玉潤魏都賦濁醪如河後騎縈堤栁晉書元帝紀後有騎來可以此相示也王粲英雄記抄郭汜吕布共對戰布以矛中汜汜後騎遂前救荆州記緣城堤邊悉植細栁絲條散風清蔭交陌江總詩蟬噪金堤栁前旌拂御桃庾信賦行漏抱刻前旌載鳶本草李時珍注桃有綿桃油桃御桃方桃匾桃偏核桃皆以形名者也王枚俱得從漢書王褒字子淵宣帝時修武帝故事講論六藝羣書博盡竒異之好褒與張子僑等並待詔數從放獵又武帝擢嚴助為中大夫後得朱買臣吾丘夀王司馬相如主父偃徐樂嚴安東方朔枚臯膠倉終軍嚴蔥竒等並在左右疏淺愧飛毫王融疏識用昏霾經術疏淺月賦抽毫進牘以命仲宣奉和遊禁苑幸臨渭亭遇雪應制雍録唐大內有三苑西內苑東內苑禁苑也東西兩內苑北門之外始為禁苑之南門禁苑也者隋大興苑也其西則漢之長安四城皆在并包之內舊唐書景龍四年三月丙寅幸臨渭亭修稧飲長樂喜春歸史記髙帝七年長樂宫成漢書髙祖修長樂宫三輔黃圖長樂宫本秦興樂宫也在雍州櫟陽縣漢髙帝始居櫟陽七年長樂宫成徙居長安西都賦北彌明光而亘長樂披香愛雪霏三輔黃圗武帝時後宫八區有昭陽披香等殿唐書蘇世長傳貞觀六年世長侍宴披香殿雍録唐慶善宫有披香殿沈約昭君辭朝發披香殿夕濟汾河隂庾信春賦宜春苑中春已歸披香殿裹作春衣詩雨雪霏霏張華詩初若飄飄後遂霏霏張華詩昔往冒隆暑今來白雪霏花從銀閣度庾信詩雪花深數丈氷床厚尺餘陳叔逹詩雪花聯玉樹氷彩散瑤池陸糸樂府月來疑舞扇花度憶歌塵梁簡文帝賦玩飛花之度忩看春風之入栁江淹賦青苔積兮銀閣澀網羅生兮玉梯虛絮繞玉忩飛世説謝太傅寒雪日內集曰白雪紛紛何所似兄子胡曰撤鹽空中差可擬兄女曰未若栁絮因風起梁元帝詩栁絮飄春雪荷珠漾水銀江總詩散漫繞忩雲庾信楊栁歌獨憶飛夜絮鵝毛下非復青絲馬尾垂梁簡文帝詩何時玉窗裏夜更縫衣西京賦度曲未終雲起雪飛寫曜銜天藻詩日出有曜雪賦大陽曜不固其節江淹為建平王拜刺史章圭册停徽車旗寫曜唐太宗詠雪詩潔野凝晨曜裝遲帶夕暉宋書臨川王道規傳皇階藻曜風猷日升徐彥伯詩藻曜凝芳潔陳子昻進和觀競渡詩表帝歌爰作天藻遐彰謝莊雪詩疊雪翻瓊藻呈祥拂御衣雪賦盈尺則呈瑞于豐年晉書元帝紀星斗呈祥謝莊舞馬賦月晷呈祥庾信樂章明星初肇慶大電久呈祥梁元帝詩臨池影入浪從風香拂衣史記李斯傳御府之衣臣得賜之魏志華歆為司徒素清貧祿賜以振施親戚故人家無擔石之儲帝詔特賜御衣上林紛可望三輔故事上林苑連綿四百餘里梁元帝詩日暮連翻翼俱向上林棲南史謝朓傳青江可望候歸艎於春渚庾信詩朝雲雖可望夜帳定難依晉書王徽之傳嘗居山隂夜雪初霽月色清朗四望浩然無處不光輝詩造舟為梁不顯其光傳造舟然後可以顯其光輝禮記玉藻輝如疏登所乘之車有光輝色而往適君朝漢郊祀歌配上帝兮揚光輝管輅别傳朝旦為光日中為光魏文帝詩光輝有五色李嶠奉和春日遊苑喜雨應詔全唐詩話中宗謂侍臣曰今天下無事朝野多歡欲與卿等詞人時賦詩宴樂可識朕意不須惜醉學士李嶠等跪奏曰臣等多幸同遇昌期謬以不才䇿名文館思勵駑朽庶禆河嶽既陪天歡不敢不醉此後每遊别殿幸離宫駐蹕芳苑鳴笳仙禁無不畢從榖梁傳僖公三年雨云者喜雨也喜雨者有志乎民者也園樓春正歸劉孝綽春宵詩月帶園樓影風飄花樹香王績詩酒勸後園春梁簡文帝春日詩年還樂應滿春歸思復生費昶詩春隨楊栁歸庾信春賦宜春苑中春已歸王胄詩草緑識春歸入苑弄芳菲班固西都賦西郊則有上囿禁苑林麓藪澤張衡西京賦上林禁苑跨谷彌阜庾肩吾詩新藂入望苑鍾會菊賦俯弄芳榮楚辭芳菲菲其彌章何遜詩春物自芳菲庾信詩今朝好風日園苑足芳菲密雨迎仙步董仲舒雨雹對風少則會遲故雨細而密張協詩騰雲似湧煙密雨如散絲張正見詩遙天收密雨楚辭波滔滔兮來迎魏武帝步出夏門行雲行雨步超越九江之臯何邵詩心虛體自輕飄颻若仙步低雲拂御衣謝朓登山曲雲行芳樹低庾信初晴詩隂雲斂向低徐賢妃詩低雲愁廣隰庾信詩山深雲濕衣梁元帝詩從風香拂衣後漢書楊賜傳拜太常詔賜御府衣一襲乂丁鴻傳詔徵鴻至即詔見説文侯之命篇賜御衣及綬危花霑易落潘嶽西征賦危冬葉之待霜何子朗詩銅陛落花沾梁元帝詩落花灑行路前溪歌花落遂水去度鳥濕難飛虞騫詩澄潭寫度鳥空嶺應鳴猿李爽芳樹詩氣軟來風易枝繁度鳥遲謝偃詩歌聲度鳥來梁簡文帝入階雨詩漬花枝覺重濕鳥羽飛遲史記老子傳孔子曰鳥吾知其能飛丘遲詩巢空初鳥飛膏澤登千庾春秋序若江湖之浸膏澤之潤汜勝之農書夏至後晝夜分天地氣和以此時耕田一而當五名曰膏澤皆得時功曹植詩膏澤多逢年左傳各自其四以登於釡昭公二十六年齊景公將納公申豐汝賈許子猶之人髙齮粟五千庾賈逵注十六斗為庾虞羲詩位登萬庾積歡情遍九圍應㻛詩且為極歡情摯虞賦盤衎宴安歡情未極鮑照詩目逺幽情周醴洽深恩遍詩帝命式於九圍疏九州為九圍者蓋以天下九處規圍然故謂之九圍也晉大豫舞歌光撫九圍趙彥昭字奐然甘州張掖人少豪邁風骨秀爽及進士第調南部尉中宗景龍中纍遷中書侍郎同中書門下平章事睿宗立遷中書侍郎封耿國公尋貶江州别駕卒詩一卷奉和人日清暉閣宴羣臣遇雪應制荆楚嵗時記正月七日為人日以七種菜為羹剪綵為人登髙賦詩北史魏收傳魏帝宴百寮問何故名人日皆莫能知收對曰晉議郎董勛答問禮俗云正月一日為雞二日為狗三日為豬四日為羊五日為牛六日為馬七日為人時邢邵亦在側甚恧焉案雍録閣本大明宫圖清暉閣在太液池上東北邊出震乘東陸易帝出乎震又萬物出乎震震東方也疏帝天帝也帝若出萬物則在乎震震是東方之卦斗柄指東為春春時萬物出生也王儉經義問答乾健震動天以運動為德故言帝出震梁簡文帝寶馬頌出震乘離之君紀鳯司鳩之后後漢書律厯志日行北陸謂之冬東陸謂之春南陸謂之夏西陸謂之秋憑髙御北辰大戴禮吾嘗跂而望之不如升髙而博見也爾雅北極謂之北辰論語為政以德譬如北辰朱子語類北辰是那中間無星處這些子不動是天之樞紐北辰無星緣是人要取此為極不可無箇記認故就其傍取一小星謂之極星這是天之樞紐或問北斗非北辰也辰蓋天象之名耳張衡西京賦纍層搆而遂隮望北辰而髙興祥雲應早嵗洞冥記東海大明之墟有釡山出瑞雲應王者之符節庾信宇文公碑祥雲入境行兩隨軒梁元帝纂要正月孟春亦曰首嵗初嵗開嵗發嵗獻嵗肇嵗案宗懍有早春詩瑞雪候初旬謝惠連雪賦盈尺則呈瑞於豐年宋書符瑞忠正月元日花雪降殿庭右衛將軍謝莊下殿雪集衣上上以為瑞於是公卿作花雪詩張正見春雪詩同雲遙應嶺瑞雪近浮空廣韻十日曰旬潘尼詩孟月涉初旬吉日惟上酉宫樹千花發唐書百官志九成宫監掌檢校官樹供進鍊餌之事江淹江上之山賦草自然而千花樹無情而百色庾肩吾芝草詩黃金九花發紫蓋六英通階蓂七葉新帝王世紀堯為天子蓂莢生于庭為帝成厯始一日生一莢至月半生十五莢十六日落一莢至晦日而盡小月而一莢厭不落謝朓三日侍宴詩屈草戒謏階蓂紀日杜審言詩上林