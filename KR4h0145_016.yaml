溫泉監掌湯池宫禁之事漢宫典職德陽殿周旋容萬人激洛水於殿下庾信詩荷香薰水殿閣影入蓮池翠木暖煙宫梁簡文帝詩竹木俱蔥翠花蝶兩飛翔盛宏之荆州記新惠縣有溫泉冬月未至數里遙望自氣浮蒸如煙庾肩吾詩合殿生光采離宫起煙霧唐書天寶六載改驪山溫泉宫為華清宫治湯為池環列宫殿起病逾仙藥博物志凡諸溫泉咸能療疾宜都山川記銀山縣有溫泉百病久疾入此水都愈庾信溫泉碑醴泉消疾聞乎建武之朝又詩枚乘還起疾曹植飛龍篇授我仙藥神皇所造庾信詩從今覔仙藥不假向瑤臺無私合聖功禮記天無私覆地無私載日月無私照奉此三者以勞天下謂之三無私易蒙以養正聖功也晉樂歌肅肅清廟巍巍聖功始知堯舜德心與萬人同論衡堯舜之德至優至大天下太平不戮一人書子有亂臣十人同心同德孟子堯舜與人同耳庾信詩有慶兆民同侍宴滻水賦得濃字水經滻水出京兆藍田谷北入於灞一統志滻水在西安府城東一十五里源出藍田縣合金谷水北流入霸水案虞世南有應詔賦韻得前字詩千行發御栁盧照鄰明月引澄清規于萬里照離思於千行崔日用詩剪綺裁紅妙春色宫梅殿栁識天情一葉下仙笻李嶠詩俠客條為劍仙人葉作舟史記大宛傳張騫來言居大夏時見蜀布卭竹杖注卭縣之竹按笻古作卭神異經南方荒中有笻竹其長百丈圍二丈五六尺厚八九寸以為船戴凱之竹譜員丘帝俊竹一節為船注俊即舜字假借也青浦宸遊至江淹詩翠山方靄靄青浦正沉沉駱賔王詩平江渺渺分青浦長路悠悠問白雲袁奭從駕遊山詩天遊響仙蹕春望動宸𠂻宋之問和幸薦福寺詩香剎中天起宸遊滿路輝朱城紫氣濃鮑照詩朱城九間門九閨盧照鄰詩隱隱朱城臨玉道關令內傳關令登樓四望見東極有紫氣西邁喜曰九十日之外法應有聖人經過京邑至期果見老子司馬德􅋵與劉恭嗣書黃旗紫氣恆見東南李乂詩捧篋萸香滿稱觴菊氣濃雲霞交暮色文心雕龍雲霞雕色有踰畫工之妙江淹詩時菊矅巖阿雲霞冠秋嶺庾信趙國公集序譬以雲霞赤城之巖千丈古樂府浮雲多暮色似從崦嵫來鮑照幽蘭詩傾暉引暮色孤影留恩顔沈約咏雪詩思鳥聚寒盧蒼雲軫暮色草樹喜春容梁武帝歌草樹非一香花葉百種色庾信賦草樹混淆枝格相交宋子夜歌郎懷幽閔性儂亦恃春容徐彥伯詩繁珂接曙響華劍比春容藹藹天旗轉何晏景福殿賦結實商秋敷華清春藹藹萋萋馥馥芬芬陸雲詩旍旐泱泱軺軒藹藹史記天官書參為白虎其西有句曲九星三處羅一曰天旗注參旗九星在參西天旗也清笳入九重梁簡文帝詩胡香翼還幰清笳送後塵屈原天問圜則九重孰營度之宋玉九辨豈不鬱陶而思君兮君之門以九重注天子有九門謂關門逺郊門近郊門城門臯門庫門雉門應門路門也蘇頲奉和七夕宴兩儀殿嵗時記七月七日為牽牛織女聚會之夜注夏小正云是月織女東向蓋言星也傅休奕文七月七日牽牛織女會天河雍録太極之北有兩儀殿即常日視朝之所也景龍文館記景龍二年七月七日中宗皇帝御兩儀殿會宴羣臣杜審言等各應制賦詩靈媛乘秋發顔延之織女贈牽牛詩慙無二媛靈託身侍天闕唐中宗詩九日正乘秋劉鑠七夕詩組幕縈漢陳龍駕凌霄發仙裝警夜催廣韻裝裝束王勃七夕賦儼歸裝而容曳王筠代牽牛答織女詩纎阿警龍轡沈約詩晨裝豈輒警按唐人成昏之夕有催裝月光窺欲渡宋孝武帝七夕詩弦月升初光謝靈運七夕詠牛女詩月弦光照户續齊諧記桂陽成武丁有仙道謂其弟曰七月七日織女當渡河詣牽牛世人至今云織女嫁牽牛也劉孝儀織女詩欲待黃昏候含嬌渡淺河王眘七夕詩却鏡看斜月移車渡淺河河色辨應來四民月令七月七日曝經書設酒脯時果散香粉於筵上祈請于河鼓織女守夜者咸懷私願或云見天漢中有奕奕正白氣如地河之波光暉五色以為徴應見者便拜乞願三年乃得王鑒七夕織女詩隱隱驅千乘闐闐越星河庾肩吾詩天河來映水織女欲攀舟機石天文寫集林有人尋河源見婦人浣紗問之曰此天河也乃與一石而歸問嚴君平君平曰此織女支機石也傅休奕客難振筆若天文運思若回雲虞世南應令詩天文徒可仰何以厠琳球針樓御賞開西京雜記漢綵女嘗以七月七日穿針於開襟樓輿地記齊武帝起層城觀七月七日宫人多登之穿針世謂之穿針樓庾肩吾七夕詩玉匣卷懸衣針樓開夜扉又奉和泛舟漢水詩陪歌承睿賞接禮侍恩筵竊觀棲鳥至王粲詩上有特棲鳥疑向鵲橋回淮南子烏鵲填河成橋渡織女風俗通織女七夕當渡河使鵲為橋庾肩吾詩倩語雕陵鵲填河未可飛春日芙蓉園侍宴應制兩京記芙蓉園本隋氏離宮周回十七里秦為冝春苑漢為樂遊苑雍録園本古曲江文帝改其名以其水盛而芙蓉富也韻會芙蓉荷華説文芙之言敷也蓉之言動容也册府元龜唐開元二十四年六月廣花萼樓築夾城芙蓉園杜甫樂遊園歌青春波浪芙蓉園白日雷霆夾城仗御道虹旗出後漢書帝乃臨御道之館虞茂詩金溝低御道楚辭搴虹旗于玉門江總詩虹旗照髙嶼宋之問詩谷暗千旗出芳園翠輦遊唐太宗帝京萹飛蓋去芳園王勃上已祓禊序王孫春草處處爭鮮仲尉芳園家家並翠潘尼芙蓉賦或擢莖以髙立似雕輦之翠蓋崔湜詩年光陌上發香輦禁中遊繞花開水殿六帖宋武帝登八公山劉安舊臺曰城郭猶匹帛之繞叢花也劇談録曲江池南即紫雲樓西即杏園花卉環周煙水明媚庾信枯樹賦開花建始之殿栁惲詩天淵臨水殿徐陵詩荷開水殿涼架竹起山樓南史玄圃園中起樓觀旁列修竹永嘉郡記樂城張薦有竹數頃在竹中為屋伏滔長笛賦柯亭之觀以竹為椽西都賦神明鬱其特起注孝武立神明臺洞天