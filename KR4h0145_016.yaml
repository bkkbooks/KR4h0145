子馬蹄可以踐霜雪曹植詩俯身散馬蹄吳圴詩風急雁毛斷氷堅馬蹄落劉義恭白馬賦竦身輕足忽過新豐市漢書地理志京兆尹縣新豐元和郡縣志新豐故城在長安縣東十八里漢七年髙祖以太上皇思東歸於此置縣徙豐人以實之并移枌榆舊社街衢棟宇一如舊制雖雞犬混放亦識其家焉一統志新豐城在西安府臨潼縣東還歸細栁營漢書周亞夫傳以河內守亞夫為將軍軍細栁三輔黃圖細栁營在渭水北括地志細栁倉在雍州咸陽縣西南周亞夫嘗令軍營皆樹栁謂之栁營元和郡縣志細栁營在萬年縣東北三十里相傳周亞夫屯軍處一統志細栁原在昆明池南回看射雕處史記李廣傳中貴人將騎數十見三人與戰還射傷中貴人廣曰是必射雕者也北齊書斛律光傳嘗從文襄校獵雲表見一大鳥射之正中其頭形如車輪旋轉而下乃雕也邢子髙嘆曰此射雕手也時號為射雕都督吳均詩射雕靈丘下驅馬鴈門北千里暮雲平史記天官書凡望雲氣平望在桑榆上餘二千里古樂府浮雲多暮色江淹詩日暮碧雲合虞羲詩長城地勢險萬里與雲平鮑照大雷岸與妹書寒蓬夕捲古樹雲平江淹詩山氣亘百里山色與雲平過香積寺雍録香積寺在子午谷正北郭子儀收長安陳於寺北一統志陜西西安府子午谷在府城南一百里不知香積寺左傳教其不知而恤其不足史記陳丞相世家孝文帝益明習國家事朝而問右丞相勃曰天下一嵗決獄幾何勃謝曰不知問一嵗錢榖出入幾何勃又謝不知維摩經維摩居士遣八菩薩往衆香國禮佛言願得世尊所食之餘于是香積如來以衆香鉢盛飯與之數里入雲峰左傳今銅鞮之宫數里而諸侯館於𨽻人謝靈運詩滅迹入雲峰江淹詩平明登雲峰杳與廬霍絶江總詩聊承丹桂馥逺視白雲峰古木無人徑江總詩古木斷懸蘿駱賔王詩層陰籠古木易窺其户閴其無人孫綽天台山賦卒踐無人之境沈約詩都令人徑絶水經注當獵之時時天鴻雪下無人徑劉希夷詩行路新知少荒田古徑多深山何處鐘髙士傳善卷去入深山莫知其處陳子昻詩野戍荒煙斷深山古木平崔皓詩日暮鄉關何處是梁簡文帝湘宫寺碑銘珠生月魄鐘應秋霜泉聲咽危石陸機詩山溜何泠泠飛泉潄鳴玉孔稚圭北山移文風雲悽其帶憤石泉咽而下愴列子登髙山履危石臨百仭之淵何尚之賦却倚危石江總詩古查橫近澗危石聳前洲日色冷青松江淹詩嵐氣隂不極日色半虧天何遜詩風光蘂上輕日色花中亂邢邵詩天髙日色淺潘尼詩青松蔭修嶺許詢詩青松凝素髓劉峻論援青松以誓心薄暮空潭曲廣雅日將落曰薄暮陸機詩終朝理文案薄暮不遑瞑范雲詩田家樵采去日暮方來歸梁簡文帝詩水曲文魚聚林暝鴉鳥飛又曛煙生澗曲暗色起林隈安禪制毒龍張纘南征賦尋太傅之故宅令築室以安禪江總詩金河知證果石室乃安禪大灌頂神咒經莫令小毒龍害于人民法苑珠林西方有不可依山甚寒冬夏積雪山中有池毒龍居之昔五百商人止宿池側龍怒泛殺商人槃陀王聞之向烏場國學婆羅門咒四年之中善得其術就池咒龍龍化為人悔過向王王乃捨之唐汝詢注安禪于此以制其心毒龍即所謂驚猿害馬非山中實有是物歸輞川作唐書王維傳維别墅在輞川地竒勝有華子岡歆湖竹里館栁浪茱萸沜辛夷塢與裴迪遊其中賦詩相酬為樂一統志輞川在西安府藍田縣西南唐王維置别業於此谷口疏鐘動孔稚圭文截來轅於谷口岑之敬折楊栁樂府谷口晴橫枝庾信詩渭濵觀坐釣谷口看秋穫徐孝先詩晨朝宣寶偈寒夜斂疏鐘釋慧淨詩塵飛揚雅梵風度引疏鐘庾信詩落星初伏火秋霜正動鐘漁樵稍欲稀何遜詩爾情深鞏洛豫念返漁樵劉孝威詩散步懷漁樵諸葛穎詩靈濤稍欲近仙巖行可識陸機賦親落落而日稀説文稀疏也五燈會元土曠人稀相逢者少悠然逺山暮陶潛詩采菊東籬下悠然見南山謝靈運詩杪秋尋逺山山逺行不近梁宣帝賦逺山崔巍而間出江洪詩逺山清無雲江淹詩悵然山中暮沈佺期詩湛湛山川暮獨向白雲歸漢書王嘉傳慎已之所獨向夏后鑄鼎謠逢逢白雲一南一北擬古詩白雲宿簾端漢武帝秋風辭秋風起兮白雲飛鮑照詩日落嶺雲歸梁元帝詩日照池光淺雲歸山望濃宋之問詩不見白雲歸菱蔓弱難定説文菱菱也王安貧武陵記三角四角者為芰兩角者為菱本草綱目芰菱有湖濼處則有之三月生蔓延引葉浮水上江淹詩水苔方下蔓沈約詩輕絲動弱芰陳子昻詩綰霧青絲弱牽風紫蔓長夏侯湛萍賦渟不安處行無定軌楊花輕易飛古樂府楊白花歌楊花飄蕩落南家枚乘栁賦吁嗟細栁流亂輕絲梁元帝緑栁詩長條垂拂地輕花上逐風庾信賦二月楊花滿路飛侯夫人詩不及楊花意春來到處飛崔瓊詩楊花漫漫攪天飛東臯春草色吳均詩願君嗣蘭杜時采東臯薇庾信詩蕭條依白社寂寞似東臯爾雅葞春草江淹賦春草碧色春水緑波謝靈運詩池塘生春草江淹詩草色斂窮水惆悵掩柴扉九辨廓落兮羈旅而無友生惆悵兮而私自憐張衡詩路逺莫致倚惆悵魏武帝樂府夜夜安得寐惆悵以自憐陶潛詩白日掩荆扉虛室絶塵想范雲詩還聞稚子説有客欵柴扉沈約詩去去掩柴扉岑參送張子尉南海史記南越尉他傳南海尉任囂召龍川令趙他行南海尉事徐廣注爾時未言都尉也晉書地理志任囂趙他定南越以為南海等三郡非三十六郡之限乃置尉以典之所謂東南一尉也唐書百官志京縣令一人正五品上主簿二人從八品下尉六人從八品又地理志廣州南海縣屬嶺南道一統志廣州府南海縣附郭本秦南海郡番禺縣地隋文帝分置南海縣為番州治南至海岸三百四十里不擇南州尉説苑子路曰家貧親老者不擇祿而仕左傳急何能擇楚辭嘉南州之炎德兮麗桂樹之冬榮晉書顧榮傳榮既南州望士躬處右職朝野甚推敬之張説詩物土南州異關河北信賖髙堂有老親李百藥笙賦預髙堂之歡宴李白送張秀才詩抱劍辭髙堂鹽鐡論審老親之腹非唐園唯菜是盛又參詩更作東征賦知君有老親樓臺重蜃氣水經注崑崙宫城上安金臺五所玉樓十二楊巨源送僧歸安南詩蜃閣化城重本草車螯是大蛤一名蜃能吐氣為樓臺海中春夏間依約島溆常有此氣雜兵書蜃形似蛇而大腰以下鱗盡逆又有耳有角背鬛作紅色噓氣成樓臺望之隱然如在煙霧將雨即見劉孝威樂府蜃氣逺生樓邑里雜鮫人北史周武帝紀詔軍人之間年多耆夀可頒授老職榮沾邑里謝朓詩邑里向疏蕪寒流自清泚一統志廣州番禺大府秦漢以來號為都會俗雜五方博物志南海外有鮫人水居如魚不廢機織其眼能泣泣則出珠木華海賦其垠則有天琛水怪鮫人之室海暗三山雨何遜詩行雨暗江流又江暗雨欲來漢書郊祀志自威宣燕昭使人入海求蓬萊方丈瀛洲三神山謝靈運詩越海陵三山注東方朔集三山在海中衆仙所居一云番山禺山堯山為三山又羅浮山三山之總名杜甫詩雷聲忽送千峯雨花明五嶺春陳子良詩峯逈雜花明李白詩一溪初入千花明白帖大廋嶺上梅南枝落北枝開漢書張耳傳南有五嶺之戍師古注嶺者西自衡山之南東窮於海一山之限耳而别摽名則有五焉裴氏廣州記大庾始安臨賀桂陽揭陽是為五嶺史通廣州地總百越山連五嶺嵗華紀麗斗轉東而天下皆春鴈向北而嶺邊先暖此鄉多寶玉晉書吳隱之傳廣州包山帶海珍異所出一篋之寶可資數世隱之為刺史清操愈厲宋書沈演之傳上欲伐林邑朝臣不同惟廣州刺史陸徽與演之贊成上意及平賜羣臣黃金生口銅器等物演之所得偏多戰國䇿窮鄉多異唐書禮志楚州刺史崔侁表獻寶玉慎勿厭清貧宣室記雲光寺畫初有少年七人至寺閉室畫之曰七日慎勿啓門續漢書王苑字孫仲安貧茅屋蓬户藜藿不厭南史周顒清貧寡欲魏志華歆傳歆素清貧祿賜以賑施親戚登總持閣北齊書武成帝紀清河二年詔以城南雙堂閏位之苑建造大總持寺李嶠集有九日幸總持寺登浮圗應制詩髙閣逼諸天張衡賦命王良掌策駟兮踰髙閣之鏘鏘後漢書樊宏傳所起廬舍皆有重堂髙閣陂渠灌注謝朓詩髙閣常畫掩法華經諸天及人皆當驚疑長阿含經先於佛所淨修梵行生忉利天使彼諸天益增五福李嶠大雲寺碑諸天翼戴上升於兜率之宫登臨近日邊張纘謝賚園啓歸瞰户牖不異登臨張正見詩甘棠聽訟罷福宇試登臨晉書明帝紀幼而聰哲為元帝所寵異數嵗嘗坐置膝前屬長安使來因問帝汝謂日與長安孰近對曰長安近不聞人從日邊來居可知也宋之問慈恩浮圖詩鳯剎侵雲半虹旌倚日邊晴開萬井樹梁簡文帝詩雲開天半晴漢書刑法志一同百里提封萬井陳子昻表三軍叶慶萬井相歡周禮野廬氏掌逹國道路於四畿比國郊及野之道路宿昔井樹愁看五陵煙漢書原涉傳郡國諸豪及長安五陵為氣節者皆慕歸之注五陵謂長陵安陵陽陵茂陵昭陵也班固西都賦南望杜霸北眺五陵吳均詩子憐三湘薛吾憶五陵薇檻外低秦嶺王勃滕王閣詩檻外長江空自流蕭慤詩巖低石倒險西都賦于是晞秦嶺睋北阜挾澧灞據龍首注秦嶺南山也忩中小渭川庾肩吾詩樓上徘徊月忩中愁思人何遜詩忩中度落葉簾外隔飛螢水經注陸杭城即山為墉俯臨大江如縈帶焉視舟如鳬鴈矣漢書貨殖傳齊魯千畝桑麻渭川千畝竹曹植詩太公未遇文漁釣終渭川蚤知清淨理史記曹相國世家載其清淨民以寧一謝靈運王子晉讃王子愛清淨區中實囂喧常願奉金仙阮德如詩常願永遊集拊翼同回翔隋書經籍志後漢明帝夢金人飛行殿庭以問於朝傅毅以佛對帝遣使往天竺得佛經及釋迦像梁簡文帝佛像銘灼灼金容巍巍滿月宋之問詩六龍回玉輦雙樹謁金仙御選唐詩卷十一
