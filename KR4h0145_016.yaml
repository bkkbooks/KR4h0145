化門者禁苑南面西頭第一門在芳林景曜門之西也北史牛𢎞傳據燕禮諸侯宴則賔及卿士大夫脫屨升堂是知天子宴則三公九卿並升堂左傳臣侍君燕過三爵非禮也案謝莊有侍宴蒜山詩又有詠牛女應制詩年光陌上發唐太宗詩韶光開令序淑氣動芳年後漢書崔琦傳琦耕於陌上懷書一卷息輒偃而詠之何遜詩陌上馳驅人行歌自侈靡徐陵侯安都德政碑陌上成隂桑中可詠香輦禁中遊晉太康起居注齊王歸藩詔賜香衣輦一乘漢書昭帝紀帝姊鄂邑公主共養省中注伏儼曰蔡雍云本為禁中門閣有禁非侍御之臣不得妄入行道豹尾中亦為禁中孝元皇后父名禁避之故曰省中草緑鴛鴦殿栁惲詩深庭秋草緑飛燕外傳帝居鴛鴦殿便房省宫簿樊嬺上簿王筠詩日照鴛鴦殿萍生雁鶩池徐陵詩宫中本造鴛鴦殿為誰新起合歡樓花紅翡翠樓梁簡文帝詩翠網隨煙碧丹花映日紅庾信行雨山銘草緑衫同花紅面似李尤平樂觀賦大厦纍而鱗次成岧嶤之翠樓江淹楚辭日華粲于芳閣月波披於翠樓天杯承露酌漢書武帝紀作柏梁銅柱承露仙人掌之屬梁元帝攝山棲霞寺碑通氣承露含香映日庾信詩定取流霞氣時添承露杯仙管雜風流梁昭明太子啓花明麗月光浮竇氏之機鳥弄芳園韻響王喬之管陳後主詩餘暉照斜日流風暢八音今日陪歡豫荀子欲觀千載則審今日曹植詩今日同堂出門異鄉晉太康起居注太康元年詔曰江表初平天下同其歡豫王公卿士各奉禮稱慶其於東堂小會設樂使加於常摯虞觀魚賦既歡豫而不倦願窮晝而兼夜皇恩不可酬吳質詩念蒙聖主恩榮爵與衆殊岑文本詩天文光七政皇恩被九區禇亮詩懷德良知久酬恩識命輕和晉陵陸丞早春遊望一統志江南常州府晉為晉陵郡晉陵縣唐書百官志上州置丞一人京縣丞二人上中下縣丞各一人獨有宦遊人玉篇宦仕也漢書司馬相如傳長卿久宦遊不遂而來過我偏驚物候新江總詩臘月正月早驚春魏帝律厯志推七十二候因冬至虎始交後五日一候梁簡文帝賦歎物候之推移陽縉詩青門小苑物華新雲霞出海曙淮南子四海之雲注立春後四海出雲潘嶽海賦隂霖則興雲降雨陽霽則吐霧耀日木華海賦霞錦散文於沙汭之際庾闡海賦映曉雲而色曙梅栁渡江春梁簡文帝梅花賦梅花獨早偏能識春又筝賦看春風之入栁吳均詩春從何處來拂水復驚梅王褒詩細栁發新春陸凱詩江南何所有聊贈一枝春淑氣催黃鳥湛方生懷春賦雖四時之平分何陽節之清淑日婉孌以舒和氣有仁而無肅陸機樂府蕙草饒淑氣時鳥多好音梁元帝纂要春節曰淑節鳥曰候鳥詩黃鳥于飛禽經倉庚一名鸝黃黃鳥也亦曰楚雀亦曰商庚王儉詩黃鳥弄春飛晴光轉緑蘋唐太宗詩晴光脆栁枝禮記季春之月萍始生爾雅萍蓱其大者蘋爾雅翼蘋葉正四方中折如十字根生水底葉敷水上不若小浮萍之無根而漂浮也傳亮賦樂緑蘋之在流江淹詩江南二月春東風轉緑蘋忽聞歌古調世説桓子野每聞清歌輒喚奈何晉書嵇康傳康嘗遊洛西暮宿華陽亭引琴而彈夜分有客詣之稱是古人與康共談音律因索琴彈之而為廣陵散聲調絶倫歸思欲霑巾陶潛詩綿綿歸思紆説文巾佩巾也張衡四愁詩側身北望涕沾巾李嶠長寧公主東莊侍宴唐書諸公主傳長寧公主韋庶人所生下嫁楊慎交造第東都又取西京髙士亷第左金吾衛故營合為宅築山浚池帝及后數臨幸置酒賦詩别業臨青甸石崇思歸引序肥遁於河陽别業宋書謝靈運傳移籍會稽修營别業傍山帶江盡幽居之美謝朓詩結軫青郊路顔延之詩徘徊眷郊甸鳴鑾降紫霄左傳錫鸞和鈴昭其聲也四者皆鈴之類動則有聲史記司馬相如傳建翠旗鳴玉鸞班固西都賦大輅鳴鸞注凡馭輅儀以鑾和為節鄭玄曰鑾在衡和在軾皆以金鈴也阮籍詩佩玉鳴鑾庾肩吾為武陵王拜儀同章宅慶紫霄聯休皇極南史朱升傳升紫霄之丹地長筵鵷鷺集張協洛禊賦羅尊列爵周以長筵潘嶽間居賦席長筵列孫子梁簡文帝南郊頌序運謐時平鵷鷺咸修其文德隋書音樂志懷黃綰白鵷鷺成行禽經注鷺小不踰大飛有次序百官之象也薛道衡詩萬方皆集會仙管鳯皇調梁簡文帝臨安公主集序鳯梧遐逺清管遼亮庾信詩細管調歌曲又周祀五帝歌管猶調於隂竹聲未入於春絃書簫韶九成鳯皇來儀漢書律厯志黃帝制十二筒以聽鳯之鳴其雄鳴六雌鳴亦六比黃鍾之宫而皆可以生之是為律本列仙傳蕭史教弄玉吹簫作鳯皇聲鳯皇來止其屋又王子喬好吹笙作鳯鳴庾信周宗廟歌律定鳯皇馴樹接南山近梁武帝賦樹接清隂詩終南何有有條有梅又如乙南山之夀五經要義終南山長安南山也一名太胡師耽終南山詩結廬終南山西北望帝京煙含北渚遙梁元帝賦登樓一望逺樹含煙江淹詩沅湘含翠煙楚辭帝子降兮北渚陸機詩北渚盈軿軒承恩咸己醉晉書劉宏傳贊和季承恩建旟南服按宏字和季傅休奕詩坐咸醉兮沾歡詩厭厭夜飲不醉無歸後漢書班固傳皇歡浹羣臣醉戀賞未還鑣張衡周天大象賦蓋屋喧轟而宴賞梁簡文帝詩芳年留帝賞庾肩吾奉和泛舟漢水詩陪歌承睿賞接禮侍恩筵詩猶車鸞鑣注鑣馬銜也江總文玉鸞回鑣金門洞啓奉和幸白鹿觀應制宋敏求長安志白鹿觀在臨潼縣西南一十五里驪山中本驪山觀唐髙祖武德六年幸溫泉傍觀川原見白鹿遂改觀名駐蹕三天路漢官儀皇帝輦動稱警出殿則傳蹕止人清道左思吳都賦弭節頓轡齊鑣駐蹕北史周宣帝紀一昨駐蹕金墉偹嘗遊覽百王制度基趾尚存唐太宗詩駐蹕撫田畯回輿訪牧童武帝內傳帝見王母巾笈中有一卷書問此書是仙靈方耶王母曰此五嶽真形圖也乃三天太上所出宋書律志序三天之説紛然莫辨張衡西京賦美往昔之松喬要羡門乎天路回旃萬仭溪説文旃旗曲柄也張衡七辨建采虹之長旃系雌霓而為旗張正見詩禁院回雕輦離宫建翠旗江淹江上之山賦挂青蘿兮萬仭竪丹石兮百重沈約郊居賦千丈萬仭三襲九成爾雅水注川曰溪郭璞詩青溪千餘仭真庭羣帝享王褒靈壇銘明庭朝禮仙管羽衣齊書樂志神之車歸清都璇庭寂玉殿虛謝朓敬亭山廟喜雨詩秉玉朝羣帝樽圭迎東皇沈約桐柏山金庭觀碑下棲洞室上賔羣帝廣韻享獻也臨也歆也洞府百靈棲陶宏景葛公碑此嶺乃非洞府而跨據中川隋焬帝詩洞府凝玄液靈山體自然梁武帝啓嘉彼百靈欣斯十義庾信周宗廟樂歌百靈咸仰德千年一聖人隋書音樂志九關洞開百靈環列玉酒仙壚釀十洲記瀛洲在東海中出泉如酒味甘名之為玉醴泉飲之數升輒醉能令人長生古樂府金丹欲成猶百煉玉酒新熟幾千年江總瑪瑙碗賦寶出崑崙之仙阜觴即瀛洲之玉酒劉琨詩虹梁照曉日渌水泛香蓮何如十五少含笑酒壚前庾信詩自可尋丹竈何須憶酒壚漢書薛廣德傳注醖籍言如醖釀也金方暗壁題漢書郊祀志大夫劉更生獻淮南枕中洪寶苑祕方沈約赤松澗詩願受金液方片言生羽翼南史劉杳傳沈約郊居宅時新構齋閣杳為贊二首并以所撰文章呈約約即命工書人題其贊於壁佇看青鳥入史記司馬相如傳亦幸有三足烏為之使注三足烏青鳥也主為西王母取食漢武故事七月七日忽有青鳥飛集殿前東方朔曰此西王母欲來也有頃王母至三青鳥夾侍王母旁陶潛詩翩翩三青鳥毛色竒可憐還陟紫雲梯夏侯湛山路吟陟山路兮遐征孫綽天台山賦陟峭崿之峥嶸謝靈運登石門最髙頂詩惜無同懷客共登青雲梯盧照鄰詩川光搖水箭山氣上雲梯奉和九日幸臨渭亭登髙應制得歡字舊紀景龍三年九月壬戌幸九曲亭宴侍臣學士十四年三月甲寅幸臨渭亭修禊飲景龍文館記景龍三年九月九日中宗幸臨渭亭登髙賦詩學士皆屬和令節三秋晚王褒九日詩律改三秋節謝瞻詩聖心眷佳節詩一日不見如三秋兮曹植朔風詩别無俯仰脫若三秋吳大江搗衣詩沙塞秋應晚重陽九日歡魏文帝與鍾繇書嵗往月來忽復九月九日九為陽數而日月並應故曰重陽康孟詠日詩相歡承愛景莫惜寸隂移仙杯還泛菊西京雜記漢武帝宫人賈佩蘭九月九日佩茱萸食蓬餌飲菊花酒云令人長夀相傳自古莫知其由續齊諧記汝南桓景隨費長房遊學長房謂之曰九月九日汝家當有災厄急宜去令家人各作絳囊盛茱萸以繫臂登髙飲菊花酒此禍可消梁簡文帝長沙宣武王碑銘春藤絡户寒菊臨池齊民月令重陽日必以糕酒登髙眺逈以暢壯志採茱萸甘菊以泛酒寶饌且調蘭應劭百官表注大官掌王饔六珍之饌梁簡文帝九日侍宴詩蘭羞薦爼邊讓章華臺賦蘭肴山積御氣雲霄近成公綏嘯賦近取諸身役心御氣王融三月三日曲水詩出豫為象鈞天之樂張焉時乘既位御氣之佳翔焉晉書熊逺傳攀龍附鳯翺翔雲霄阮籍詠懷詩寄顔雲霄間揮袖凌虛翔乘髙宇宙寬豫章記龍沙郡北帶江沙舊俗為九月九日登髙處庾闡詩升髙縱逺眸淮南子往古來今謂之宙四方上下謂之宇劉孝威詩興逸煙霄上人間宇宙中陶潛詩宇宙一何愁今朝萬夀引詩躋彼公堂稱彼兕觥萬夀無疆又樂只君子萬夀無期又天子萬夀晉書樂志武帝泰始五年使傅玄荀朂張華作上夀歌詩玄詩三朝獻酒萬夀是膺朂詩我皇夀而隆我皇茂而嵩華詩后皇延祚安樂撫萬方宜向曲中彈陳叔逹詩為將金谷引添令曲未終江總雜曲曲中惟聞張女調沈約詩曲中有深意丹誠君詎知甘露殿侍宴應制北史附庸傳燕暮容熙起雲山於苑內又起逍遙宫甘露殿六典兩儀殿之北曰甘露門其內曰甘露殿景龍文館紀中宗令諸學士入甘露殿其北壁列書架架前有銀硯碧鏤牙管銀函盛紙月宇臨丹地拾遺記翟乾祐于江岸玩月或問此中何有翟笑曰可隨我觀之俄見月規半天瓊樓玉宇爛然江總詩月宇照方疏漢書梅福傳以丹掩泥塗殿上下梁簡文帝賦升紫霄之丹地排玉殿之金扉張正見艷歌行執戟趨丹地豐貂入建章雲忩網碧紗朱異詩池入東陂水忩引北巖雲江總詩蒙蘢出簷柱散漫繞忩雲南史宋孝武更造諸殿雕欒綺節珠忩網户劉孝威詩紗忩相向開庾信賦紗忩獨掩羅帳長垂無名氏詩深掩粧忩卧碧紗御筵陳桂醑劉端詩睿賞叶春芳開筵臨畫堂沈約郊居賦堂流桂醑謝朓七夕賦月殿清兮桂醑酬天酒酌榴花神異經西北海外有人長二千里日飲天酒五斗不食五穀魚肉神仙傳王方平至蔡經家謂經家人曰吾欲賜汝輩美酒此酒乃出天厨其味醇醲非俗人所宜飲瑞應圖甘露一名膏露一名天酒梁簡文帝謝啓甘露入盤足稱天酒扶桑傳頓遜國有樹似安石榴取其花汁貯盆中數日成好酒極美梁簡文帝詩玉案西王桃蠡杯石榴酒又詠石榴詩西域移根至南方釀酒來王褒詩塗歌楊栁曲巷飲榴花樽水向浮橋直天台山記二水夾峰而來合流從橋直下聲如殷雷爾雅天子造舟疏言造船比船于水加版于上即今之浮橋後漢書吳漢傳進逼成都阻江北為營作浮橋庾肩吾詩浮橋還㵼渭抗殿本疏龍城連禁苑斜梁簡文帝詩曰正山無影城斜漢屢回西都賦西郊則有上囿禁苑林麓藪澤顔延之詩夕帳亭皋晨儀禁苑程大昌雍録唐大內有三苑西內苑東內苑禁苑也東西兩內苑北門之外長安始為禁苑之南門禁苑也者隋大興苑也其西則漢之四城皆在包并之內承恩恣歡賞晉書劉宏傳贊和季承恩建旟南服威靜荆塞化揚江澳王臺卿詩承恩奉教義方與宏受持謝朓酬德賦苦清顔之倐忽吝歡賞之多違唐太宗詩建章歡賞夕二八盡妖妍歸路滿煙霞陶潛詩行行循歸路計日望舊居江淹詩