body:
  text: 欽定四庫全書御選唐詩卷十一五言律虞世南字伯施餘姚人沈靜寡欲精思讀書至纍旬不盥櫛文章婉縟見稱于僕射徐陵在隋官祕書郎入唐為秦府記室參軍遷太子中舍人歷宏文館學士祕書監太宗稱其德行忠直博學文辭書翰為五絶發營逢雨應詔豫遊欣勝地夏諺一遊一豫為諸侯度晉書孫統傳論窮觀勝地會其心焉皇澤乃先天張衡應旨皇澤宣洽海外混同陸機謝表皇澤廣被惠濟無逺傳咸詩悠悠建平皇澤未流朝選於衆惟子之授易先天而天弗違後天而奉天時陸機文威先天而蓋世油雲隂御道孟子天油然作雲司馬相如封禪文自我天覆雲之油油漢書音義油油雲行貌西京雜記雨雲曰油雲劉孺侍宴詩芝殿延藻景畫室寫油雲郭璞詩羽蓋停雲隂陸機苦寒行隂雲興巖側庾肩吾喜雨詩濕風含酒氣隂雲助麥寒後漢書虞延傳帝乃臨御道之館膏雨潤公田詩芃芃黍苗隂雨膏之左傳季武子曰小國之仰大國如百穀之仰膏雨焉賈山至言元年膏雨降五穀登王融策秀才文歌皇華而遣使賦膏雨而懷賔易雨以潤之晉書梁武昭王傳信乾坤之相成庶物希風而潤雨詩雨我公田遂及我私漢書元帝紀以三輔太常郡國公田及苑可省者振業貧民曹植詩經彼公田樂我稷黍隴麥霑逾翠禽經澤雉啼而麥齊注澤雉為商庚春季之月始鳴麥平隴也王僧逹詩麥隴多秀色楊園流好音庾信詩藜床負日卧麥隴帶經鋤張正見詩清風吹麥隴細雨濯梅林詩既霑既足漢時謠小麥青青大麥枯劉協新論春蕊雖茂假朝露而抽翠山花濕更燃徐陵山齋詩山花臨席舞水影照歌牀庾信初晴詩濕花飛未逺隂雲斂尚低梁元帝詩林間花欲燃張正見賦苔畫波文花然栁色吳尚之詠鄰女詩貌同朝日麗裝近午花然稼穡良所重書君子所其無逸先知稼穡之艱難乃逸詩稼穡維寶代食維好何晏景福殿賦覩農人之耘耔亮稼穡之艱難漢書董仲舒説上曰春秋他穀不書至于麥禾不成則書之以此見聖人于五穀最重麥與禾也方復悅豐年詩豐年多黍多稌漢書郊祀志詔曰朕親飭躬齋戒親奉祀為百姓蒙嘉氣獲豐年焉鹽鐵論永其世而豐其年侍宴歸鴈堂釋氏要覽毗舍離為佛作堂形如鴈字故名鴈堂歌堂臨緑水鮑照蕪城賦藻扄黼帳歌堂舞閣之基沈約詩裾開臨舞席袖拂繞歌堂南史庾杲之傳庾景行泛緑水依芙蓉何其麗也張華詩俯臨緑水流舞館接金塘謝靈運詩舞館識餘基歌梁想遺囀劉楨詩芙蓉散其華菡蓞溢金塘鮑照詩彪炳此金塘藻耀君玉池竹開霜後翠左思吳都賦竹則苞笋抽節往往縈結緑葉翠莖冒霜停雪王儉靈丘竹賦翠葉與飛雪爭榮唐太宗竹詩翠葉負寒霜梅動雪前香隂鏗詩春近寒雖轉梅舒雪尚飄陳後主梅花落詩映日花光動迎風香氣來蘇子卿詩祇言花是雪不信有香來鳬歸初命侣張衡西京賦奮隼歸鳬沸卉砰訇江總詩歸鳬沸卉同亂下方塘中鮑照鳴雁行齊行命侣入雲漢鴈起欲分行沈約雁詩懸飛竟不下亂起未成行王褒雁詩霜多聲轉急風疏行屢稀刷羽同棲集沈約雁詩刷羽同搖漾一舉還故鄉王胄雁詩何如侣泛泛刷羽戲方塘庾肩吾雁詩依簷本相賀近幕願同棲謝朓詩椅梧何必零歸來共棲集懷恩愧稻粱後漢書卓茂傳人納其訓吏懷其恩鮑照鵝賦空穢君之園池徒慙君之稻粱庾信詩未知稻粱鴈何時能報恩陳叔達字子聰陳宣帝第十六子也善容止有才學在陳封義陽王十餘嵗侍宴賦詩十韻援筆便就入隋為絳郡通守歸唐授丞相府主簿與溫大雅同掌機密進黃門侍郎兼納言封江國公貞觀中拜禮部尚書集十五卷早春桂林殿應詔傅休奕詩嘉慶形三朝美德揚初春王褒詩細栁發新春案桂林殿無考後漢書杜林傳時諸王傅數被引命或多交遊不得應詔惟林守慎有召必至案陳思王曺植有應詔詩金鋪照春色司馬相如長門賦擠玉户以撼金鋪兮聲嘈吰而似鐘音崔駰七依反宇垂阿洞門金鋪丹柱雕楹飛閣層樓魏文帝樂府排金鋪坐玉堂風塵不起天氣清涼謝朓詩宛洛佳遨遊春色滿皇州梁簡文帝詩春色映宫來先發院邊梅沈約詩山光浮水至春色犯寒來玉律動年華後漢書律厯志殿中候用玉律十二唯二至乃候靈臺用竹律拾遺記師延在軒轅之世為司樂之官及殷時總修三王五帝之樂拊一絃琴則地祇皆升吹玉律則天神皆降南史徐陵傳時有冒進求官者乃為書宣之曰今衣冠禮樂日富年華何可猶作舊意庾信卭竹杖賦年華未暮朱樓雲似蓋後漢書馮衍傳伏朱樓而四望兮采三秀之華英謝朓詩逶迤帶緑水迢遞起朱樓司馬相如大人賦屯余車其萬乘兮綷雲蓋而樹華旗郭璞詩雲蓋隨風回丹桂雪如花南方草木狀交趾置桂園桂有三種葉如柏葉皮赤者為丹桂葉似柿葉者為菌桂葉似枇杷者為牡桂左思吳都賦洪桃屈盤丹桂灌叢瓊枝抗莖而敷蘂珊瑚幽茂而玲瓏庾信詩雪花深數丈氷床厚尺餘水岸銜階轉梁元帝登堤望水詩髙岸翻成浦曲港反通舟風條出栁斜范雲詩風條振風嚮霜葉斷霜枝北史栁昻傳楊素嘗於朝堂見昻子調獨立曰栁條通體弱獨搖不須風輕輿臨太液左思吳都賦輕輿安轡以經隧樓船舉帆而過肆張華賦輶軒停蓋輕輿託隂漢書郊祀志北治大池漸臺髙二十餘丈名曰泰液案太古作泰張衡東都賦太液昆明鳥獸之囿傳休奕栁賦太液渥流朝露未晞湛露酌流霞詩序湛露天子燕諸侯也詩湛湛露斯在彼豐草湛湛露茂盛貌楚辭吸湛露之浮源兮潄凝霜之氛氛江淹詩願垂湛露恩信我皎日期揚雄甘泉賦吸清雲之流霞兮飲若木之露英江總納袍賦解女蘿之山帶佩流霞之羽服李百藥字重規定州安平人七嵗能屬文隋時襲父德林爵為太子通事舍人兼學士唐太宗重其名拜中書舍人授太子右庶子百藥藻思沉鬱尤長五言雖樵童牧子亦皆吟諷奉和正日臨朝應制書月正元日四民月令正月之朔是謂正日唐書禮樂志皇帝元正受羣臣朝賀漢書成帝紀贊臨朝淵默端嚴若神化厯昭唐典漢書律厯志三統者天施地化人事之紀也晉書律厯志治律之道必審日月之行然後可以上考天時下察地化王僧孺謝厯表九瀛仰化萬宇依朔庾肩吾書品序玉厯頒正而化俗書堯典乃命羲和欽若昊天厯象日月星辰敬授人時楊雄羽獵賦修唐典匡雅頌孫綽天台山賦應配天于唐典齊峻極於周詩承天順夏正易至哉坤元萬物資生乃順承天書欽若昊天注若順也史記厯書夏正以正月殷正以十二月周正以十一月蓋三王之正若循環窮則反本白虎通正朔有三何本天有三統謂三微之月也王者當奉順而成者故受命各統一正也三微者何陽氣始施萬物動微而未著也夏以十三月為正律中太簇言萬物始簇而生張衡東京賦夏正三朝庭燎晰晰注夏家建寅之正百靈警朝禁抱朴子黃帝生而能言役使百靈隋書髙帝紀祀上帝而理兆人和百靈而利萬物又音樂志九關洞開百靈環列張衡西京賦徼道外周千廬內附尉衛八屯警夜巡晝注警備不虞獨斷天子所居曰禁中又禁中者門户有禁非侍御者不得入三辰揚斾旌左傳三辰旗旗昭其明也注三辰日月星也畫於旌旗以象日月之明詩蕭蕭馬鳴悠悠斾旌釋名雜帛為斾以雜色綴其邊為翅尾也又析雨為旌旌精也有精光也充庭富禮樂東京賦龍輅充庭雲旗拂霓晉書樂志正旦大會行禮歌嘉會置酒嘉賔充庭隋書禮儀志文物充庭有司執簡紀年號日朔易富有之為大業禮記其功大者其樂偹其治辨者其禮具謝朓詩民和禮樂富許善心奉和受朝詩禮殫五瑞輯樂闋九功成唐書禮樂志元正朝賀尚舍設御幄於太極殿羣臣客使等次東西朝堂展懸置案陳車輿歌者琴瑟升座笙管立階間髙宴齒簮纓南史沈炯傳指柏梁而髙宴庾信文平樂髙宴金華説經唐書禮樂志元旦賜酒皆起再拜立受觶就席坐酒行十二巡降階再拜復位陸機謝平原內史表冕冠乘軒仰齒貴遊何妥詩小臣屬千載時幸預簮纓陳後主詩簮纓今盛此俊乂本多名獻夀符萬嵗傅休奕詩臨軒進爵獻夀翩翩唐書禮樂志光祿卿酌酒一爵授上公上公授殿中監進爵御前上公退北面跪稱具官某言元正首祈謹上千秋萬嵗續漢書正朝受賀二千石以上稱萬嵗宋書樂志陛下長歡樂永世與天符移風韻九成孝經移風易俗莫善於樂禮記樂行而倫清耳目聰明血氣和平移風易俗天下皆寧庾信詩安歌韻八風書簫韶九成鳯皇來儀曹植請赴元正表耳存九成目想率舞王沉正會賦備六代之象舞兮釐簫韶於九成楊師道師道字景猷華隂人隋宗室也精警有才思入唐尚桂陽公主封安德郡公貞觀中拜侍中參預朝政遷中書令罷為吏部尚書師道善草𨽻工詩每與有名士燕集歌詠自適帝每見其詩必吟諷嗟賞後賜宴帝曰聞公每酣賞捉筆賦詩如宿搆者試為朕為之師道再拜少選輒成無所竄定一座嗟伏初秋夜坐應詔玉琯涼初應晉書律厯志黃帝作律以玉為管長尺六孔為十二月音至舜時西王母獻昭華之琯以玉為之及漢章帝時零陵文學奚景于冷道舜祠下得白玉琯則古者又以玉為管矣以玉者取其體含亷潤也韻會管或作琯梁簡文帝序氣冷金扉霜浮玉管虞茂詩玉琯正吟風劉鑠詩昊天清且髙秋氣發初涼謝朓七夕賦朱光既夕涼雲始浮潘嶽詩清商應秋至金壺夜漸闌周禮挈壺氏下士六人注壺盛水器也世主挈壺水以為漏陸機刻漏賦挈金壺以南羅藏幽水而北戢梁簡文帝詩洞門扉未掩金壺漏已催蔡琰胡笳十八拍更深夜闌兮夢汝來斯滄池流稍潔張衡西京賦顧臨太液滄池港沆沈約九日侍宴詩上林葉下滄池水寒長安記建章宫有太液池注太液池色滄故曰滄池孫綽庾司空碑挹清瀨之潔流法苑珠林或如止水乍有潔流仙掌露方漙史記漢武帝紀作柏梁銅柱承露仙人掌之屬三輔故事建章宫承露盤以銅為之上有仙人掌班固西都賦抗仙掌以承露張衡西京賦立修莖之仙掌承雲表之清露詩零露漙兮徐陵與王僧智書青葽已介白露方漙江淹詩簷前露已漙鴈聲風處斷薛道衡詩霜天斷鴈聲胡師耽詩飛鴈遺寒聲阮卓風詩吹雲旅鴈斷祖孫登紫騮馬嘶從風處斷樹影月中寒梁元帝關山月月中有桂樹流影自徘徊謝朓髙松賦當月露而流影梁昭明太子詩月落林餘影庾信詩樹寒條更直爽氣長空淨晉書王徽之傳西山朝來致有爽氣唐太宗詩夕霧結長空虞世南詩髙天淨秋色髙吟覺思寬古樂府佇立吐髙吟嵇康琴賦慕老童於騩隅欽泰容之髙吟郭璞登百尺樓賦情渺然以思逺鮑照詩願君裁悲且減思聽我抵節行路吟上官儀詠雪應詔禁園凝朔氣班固西都賦西郊則有上苑禁苑林麓藪澤顔延之曲水詩序南除輦道北清禁苑庾信華林園馬射賦皇帝翊四校於仙園回六龍于天苑唐太宗詩飛蓋去西園蘭橈遊翠渚庾肩吾雪詩凝瑛結井泉唐太宗望雪詩素雪曉凝華蕭子範詩連翩辭朔氣木蘭詩朔氣傳金柝瑞雪掩晨曦庾肩吾詩瑞雪墜堯年徐陵雪詩豈若天庭瑞輕雪帶風斜張正見詩同雲遙映嶺瑞雪近浮空謝惠連雪賦掩日韜霞梁昭明太子香爐賦匿丹曦于西嶺花明棲鳯閣陳子梁詩峰逈雜花明唐太宗詩花明菊照叢尚書中候堯即位七十載鳯皇止庭巢阿閣謝靈運詩朝遊登鳯閣鮑照凌雲樓序鳯閣起於漢京珠散影娥池張載安石榴賦剖之則珠散含之則氷釋三輔黃圖影娥池武帝鑿以玩月其旁起望鵠臺以眺月影入池中使宫人乘舟弄月影亦名眺蟾臺梁簡文帝雪詩入池雪不積飄素迎歌上王融阻雪聨句飄素瑩簷溜沈約秦筝曲迎歌度舞遏歸風翻光向舞移