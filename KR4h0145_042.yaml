body:
  text: 欽定四庫全書御選唐詩卷三十二補編賀知章咏栁碧玉籹成一樹高古樂府碧玉小家女芍藥譜寶籹成髻子也漢書龔遂傳令民日種一樹榆陳子昂詩明月隱高樹萬條垂下緑絲絛謝朓詩爛漫已萬條庾信詩别有長條踠地垂許景先折栁篇柔條垂緑掃金鋪李白詩疏楊挂緑絲廣韻絛編絲繩也不知細葉誰裁出張正見栁詩葉細臨湍合上官昭容詩密葉因裁吐二月春風似剪刀蕭慤賦二月春風已復流宋之問詩今年春色早應為剪刀催王昌齡别辛漸别館蕭條風雨寒晉書戴逵傳吳國內史王珣别館在武丘山鮑照賦臨驚風之蕭條詩風雨凄凄墨子聖王為宫室高足以辟潤濕邊足以圉風寒扁舟月色渡江看史記貨殖傳范蠡乘扁舟浮於江湖魏收詩睿賞芳月色王獻之桃葉辭渡江不用楫酒酣不識關西道史記漢高祖紀酒酣高祖擊筑自為歌詩魏文帝書酒酣耳熱江總詩野花不識采後漢書楊震傳關西孔子楊伯起却望春江雲尚殘梁元帝詩却望若飛烟李嶠詩霞滿蜀江春禇淵碑文音徽與春雲等潤駱賓王詩霞殘疑製錦雲度似飄纓韋應物寒食寄京師諸弟荆楚嵗時記去冬節一百五日即冇疾風甚雨謂之寒食雨中禁火空齊冷梁簡文帝詩帝京風雨中周禮司烜氏仲春以木鐸修火禁於國中為季春將出火也徐陵詩竹密山齊冷江上流鶯獨坐聽謝朓詩江上徒離憂沈約八詠舞春雪雜流鶯王維詩獨坐幽篁裏李白詩還過茝若聽新鶯把酒看花想諸弟杜甫詩把酒從衣濕宋之問詩源水看花入杜甫詩海內風塵諸弟隔茂陵寒食草青青漢書武帝紀建元二年初置茂陵邑又地理志右扶風縣茂陵徐陵書歸鴈銜蘆多經寒食古詩青青河畔草岑參赴北庭度隴思家西向輪臺萬里餘唐書地理志北庭大都護府有輪臺縣大歷六年置郭璞江賦呼吸萬里吐納靈潮古詩相去萬餘里各在天一涯也知鄉信日應疏沈約白銅鞮歌若欲寄音信漢水向東流梁元帝春别應令别後書信不相關隴西鸚鵡能言語庾肩吾詩借問隴西行何當驅馬征禮記鸚鵡能言不離飛鳥禽經鸚鵡摩背而瘖注鸚鵡出隴西能言人以手撫拭其背則瘖矣為報家人數寄書詩宜其家人庾信賦玉關寄書糚臺留釧劉方平夜月更深月色半人家杜甫詩流汗卧江亭更深氣如縷又中天月色好誰看李白詩五峯轉月色王維詩桃花源裡人家北斗䦨干南斗斜詩惟北有斗不可以挹酒漿星經北斗星謂之七政樂府古辭攬衣瞻夜北斗闌干注䦨干猶縱橫也張衡周天大象賦泊南斗而牽牛楊炯詩敞朗東方徹闌干北斗斜杜甫詩斗斜人更望今夜偏知春氣暖庾信詩今夜長安月應如晝日明春秋繁露春氣愛秋氣嚴阮籍詩春氣感我心宋之問詩春暖陰梅花蟲聲新透緑窗紗文心雕龍一葉且或迎意蟲聲有足引心人物志采蟲聲之善音李嶠詩雲窗網碧紗顧况安仁港口望仙人城名勝志饒州府安仁縣興業水一名安仁港發源貴溪縣漏石村又仙人城在安仁縣東南二百里峭壁危石亭亭千仞樓臺采翠逺分明隂鏗詩雲裏望樓臺孟浩然詩停午收采翠夕陽照分明杜甫詩秋至最分明聞說仙家在此城十洲記生洲有仙家數萬王勃詩鶴岑有奇徑麟洲富仙家欲上仙城無路上李白詩相隨迢迢訪仙城三十六曲相回縈屈原九章願陳志而無路水邊花裏有人聲范雲詩盈盈一水邊王融詩花裏寄春情莊子木聲與人聲犂然有當於人之心戎昱早梅一樹寒梅白玉條蘇武詩中庭一樹梅寒葉未曽開崔中芳詩霞觀文犀簟香林碧玉條迥臨村路傍溪橋暢當鸛鵲樓詩迥臨飛鳥上高謝世間人隂鏗詩村路入江窮岑參詩瓜田傍緑溪應緣近水花先發管子高毋近岸而水用足下毋近水而溝防省庾肩吾詩石鏡菱花發劉孝威詩葉舒非漸大花發是初開疑是經春雪未消杜審言大酺詩梅花落處疑殘雪栁葉開時任好風詩雨雪飄飄見晛曰消旅次寄湖南張郎中寒江近户漫流聲杜甫詩寒江動夜扉詩蟋蟀疏此言在堂謂在室戶之外與戶相近是九月可知竹影臨窗亂月明庾信山銘壁繞藤苗窗銜竹影又詩還是臨窗月子夜歌天高星月明歸夢不知湖水濶謝朓詩歸夢相思夕岑參詩歸夢秋能作賈至詩莫道巴陵湖水濶長沙南畔更蕭條夜來還到洛陽城陳後主詩金鞍排夜來庾信詩諸花舊滿洛陽城盧綸曲江春望泉聲遍野入芳洲湘中記縣泉滴瀝巖間聲泠泠如絃音宋之問詩泉聲聒翠微張正見詩分渠通沃野楚辭采芳洲兮杜若庾肩吾詩列坐對芳洲擁沫吹花上碧流沈君攸詩山流細沫擁浮花薛道衡詩濺沫擁沙洲蕭慤詩吹花春滿路喬知之詩下有碧流水落日行人漸無路鮑照詩落日川渚寒蘇武詩誰為行路人屈原九章願陳志而無路庾信碑銘白馬無路烏江不通巢蜂乳燕滿高樓鮑照樂府乳燕逐草蟲巢蜂拾花萼禮記月令注燕以施生時來巢人堂宇而孚乳娶嫁之象也張協賦高樓特起竦峙苕嶤楊凝送客入蜀劍閣迢迢夢想間張載劍閣銘惟蜀之門作固作鎮是曰劍閣壁立千仞一統志劍閣在四川保寧府劍州北三十里蕭統詩行客行路遙故鄉日迢迢蕭子雲詩夢想日依依行人歸路繞梁山隂鏗詩行人引去節陶潛詩行行循歸路張載劍閣銘巖巖梁山積石峩峩一統志大劍山一名梁山在劍州北二十里明朝騎馬搖鞭去徐陵詩明朝闕門外韋應物詩此時騎馬出廣韻鞭馬䇿秋雨槐花子午關宋之問詩况復秋雨霽張正見詩槐花夾岸飛三秦記長安正南山名秦嶺谷名子午郡縣志子午關在京兆府長安縣南百里李涉潤州聽暮角唐書地理志潤州丹陽郡武德三年置取潤浦為州名江城吹角水茫茫李白詩江城如畫裏杜甫詩鼓角緣邊郡又永夜角聲悲自語又春動水茫茫曲引邊聲怨思長晉書劉波傳援笳而吹之為出塞入寒之曲白居易詩唳鶴曲終長引聲李陵書邊聲四起張繼詩那知橫吹笛江外作邊聲劉滄詩子建東歸恨思長驚起暮天沙上鴈庾肩吾詩驚鴈避虛弓李紳詩竹影侵雲拂暮天謝朓賦星回窮紀沙雁相飛海門斜去兩三行舊唐書韓滉傳造樓船戰艦三十餘艘以舟師五千人由海門揚威武至申浦而還鎮江府志勝焦山東北有二島對峙謂之海門庾信詩可憐數行雁㸃㸃逺空排王績詩偃蹇二三行李商隱代祕書贈𢎞文館諸校書唐書百官志武德四年置修文館于門下省九年改曰𢎞文館又選舉志唐太宗置𢎞文館增學舍至千二百區清切曹司近玉除夢溪筆談舊翰林學士地勢清切皆不兼他務唐書鄭䖍傳不知廣文曹司何在白居易詩空留風月在曹司鮑照白苧歌垂璫散佩盈玉除比來秋興復何如潘嶽秋興賦序于時秋也故以秋興命篇杜甫詩集有秋興八首禮記今日安否何如崇文館裏丹霜後按崇文本作𢎞文謝靈運詩曉霜楓葉丹無限紅梨憶校書漢武帝詩連山去無限杜甫詩紅梨迥得霜又山梨結小紅漢書劉向傳詔向領校中五經祕書唐書魏徴奏引諸儒校集祕書國家圖籍粲然完整御選唐詩卷三十二補編
