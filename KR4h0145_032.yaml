body:
  text: 欽定四庫全書御選唐詩巻二十五五言排律虞世南奉和幽山雨後應令肅城隣上苑沈約文塞草未衰嚴城于焉早閉江總詩肅城通甲觀承華啟畫堂漢舊儀上林苑中廣長三百里苑中養百獸天子春秋獵射苑中離宫七十所容千乘萬騎庾信樂府浮橋有月支抱馬上苑有烏孫學琴黄山邇桂宫張衡西京賦掩長楊而聨五柞繞黄山而款牛首漢書地理志右扶風縣槐里有黄山宫明一統志陜西西安府興平縣在府城西一百里漢初置槐里縣唐曰金城縣名勝志黄山宫在興平縣西南三十里或謂即北芒之西坂班固西都賦自未央而連桂宫三輔黄圖桂宫武帝太初四年起在未央宫北雨歇連峯翠柳訾詩欲知暮雨歇當觀飛斾輕庾信詩雨歇殘虹㫁雲歸一雁征孫統蘭亭詩時禽吟長澗萬籟吹連峯蕭子鈞詩山翠餘烟積川平晚照收烟開竟野通梁簡文帝詩景落商飇靖烟開四郊謐揚雄羽獵賦荷垂天之畢張竟野之罘排虛翔戲鳥淮南子鳥排虛而飛獸蹠實而走握竒經飛龍翔鳥上下其勢陳思王曹植七啟落翳雲之翔鳥阮籍詩孤鴻號外野翔鳥鳴北林王融詩花餘拂戲鳥樹密隠鳴蟬梁簡文帝詩魚游向暗集戲鳥退查流跨水落長虹三輔黄圖霸橋在長安東跨水作橋梁元帝賦臨閶門之跨水聳重闕而開都湯縉詩長虹貫白日易水急寒風張纉賦耿長虹于青霄孟子若大旱之望雲霓集注雲合則雨虹見則止日下林全暗鮑照詩日落嶺雲歸延頸望江隂雲收嶺半空張正見詩睢苑凉風起章臺雲氣收朱超遒詩月夜三江靜雲霧四邊收虞騫詩空嶺應鳴猿山泉鳴石澗易山下出泉䝉君子以果行育徳謝朓詩山泉諧所好盧思道詩山泉好風日城市壓囂塵梁簡文帝詩葉疎行逕出泉溜逺山鳴江總詩石澗水流凈山窻葉去寒地籟響巖風莊子女聞人籟而未聞地籟而未聞天籟地籟則衆竅是己人籟則比竹是已易山下有風蠱陸機詩願托歸風響寄言遺所欽江淹别賦風蕭蕭而異響雲漫漫而竒色許敬宗字延族杭州新城人隋時官直謁者臺奏通事舍人事入唐為著作郎兼修國史累遷太子右庶子髙宗即位擢禮部尚書歴侍中中書今右相奉和秋暮言志應制秋深桂初發王由禮詩秋深響自清尸子春華秋英曰桂沈約詩秋風生桂枝又暮芝始緑年桂初丹劉孝威詩花發是初開寒窻菊餘菲卞伯玉菊賦佇寒丘以彌望覿中霜之軟菊成公綏菊頌自昔先民詠兹秋菊緑葉黄花菲菲彧彧波擁羣鳬至陳後主賦洲横擁浪波孫楚賦遊鳬濯翅於素波左思蜀都賦晨鳬旦至候雁銜蘆秋飄朔鴈歸庾信詩夜靜秋風飄謝靈運賦悼朔雁之赴越江總詩驚風起朔雁王襃詩豈若雲中雁秋時塞外歸劉孝綽詠雁詩衡陽旅雁歸月莢生還落白虎通日厯得其分即蓂莢生於階間蓂莢者樹名也月一日一莢生十五日畢至十六日一莢去故夾階而生以明日月也雲枝似復非梁簡文帝詩枝雲間石峯虞茂詩葢嶺逼雲枝南史顧歡傳士季似而非凝宸閱栖畝呉志陸抗傳注呉晉之間餘糧栖畝而不犯觀文佇少微易觀乎天文以察時變觀乎人文以化成天下天官星占斗魁第一星曰少微一名處士星晉書天文志少微四星在太微西士大夫之位也聖敬韜前哲詩聖敬日躋陸機啟聖敬敷聞輝光日新國語單子朝夕不忘成王之徳可謂不忝前哲矣張衡應間前哲首務務于下學上達先天諒不違易先天而天弗違王儉文深達先天之運匡賛奉時之業虞世南詩豫遊欣勝地皇澤乃先天詩帝命不違至于湯齊奉和元日應制天正開初節春秋春無冰注頓置兩閏以應天正書月正元日傳月正正月也元日上日也梁元帝纂要正月孟春亦曰開春魏文帝詩良辰啟初節髙㑹搆歡娯沈約長歌行結思纒嵗宴曽是掩初節日觀上重輪宋書符瑞志大明四年四月壬子木連理生華林園日觀臺北南史沈炯傳射之罘于海浦禮日觀而稱功梁簡文帝詠朝日詩煜煜上層峯庾信詩烟雲同五色日月並重輪陳後主樂府重輪上瑞暉百靈滋景祚隋書髙帝紀和百靈而利萬物庾信歌百靈咸仰徳千年一聖人隋書薛道衡傳聖人作萬物覩神靈滋百寳用晉書樂志流景祚顯萬世隋書音樂志明神幽賛景祚攸長舊唐書音樂志景祚斯融萬玉慶惟新左傳禹㑹諸侯塗山執玉帛者萬國穆天子傳至于羣玉之山天子於是載玉萬隻書爾惟徳罔小萬邦惟慶又舊染汚俗咸與惟新詩其命惟新庾信表覩惟新之慶待旦敷𤣥造書先王昧爽丕顯坐以待旦孟子幸而得之坐以待旦書文命敷于四海李邕文天也地也攝生之謂𤣥造韜旒御紫宸世本黄帝作冕旒易君子以莅衆疏冕旒垂目黈纊塞耳唐㑹要龍朔三年四月始御紫宸殿聴政百僚奉賀雍録含元之北為宣政宣政之北為紫宸孫逖詩龍輿下紫宸武帳臨光宅漢書汲黯傳上嘗坐武帳黯前奏事上不冠望見黯避帷中使人可其奏晉書天文志北落西南一星曰天綱主武帳王勃九成宫頌帳殿相臨氊牆問飾書序昔在帝堯欽明文思光宅天下七命繼明代照配天光宅呉都賦一六合而光宅文衞象鉤陳陳後主詩前後訓導屏左右文衞匝沈炯文文衞如在晉書地理志星象麗天又天文志北極五星鉤陳六星皆在紫禁宫中庾信賦閶闔開而鉤陳轉廣庭揚九奏隋書音樂志華鐘震廣庭東京賦并夾既設儲乎廣庭注并夾鉗矢者易揚於王庭初學記凡樂作謂之奏九奏乃終謂之九成成公綏賦簫韶九奏物有容制大帛麗三辰禮記大帛不綏左傳衞文公大布之衣大帛之冠易日月麗乎天百穀草木麗乎土左傳三辰旂旗昭其明也漢書律歴志太極運三辰五星於上後漢書律歴志承聖帝之命三辰以授民事發生同化育爾雅春為青陽一曰發生莊子春氣發而百草生潛夫論春夢發生夏夢髙明傅休奕詩普天同樂育禮記可以賛天地之化育淮南子天化育而無形象成公綏樂歌奄有八荒化育蒸黎播物體陶鈞賈誼賦大鈞播物坱圠無垠漢書鄒陽傳聖王制世御俗獨化于陶鈞之上注陶家名轉者為鈞葢取周回調鈞耳言聖王制馭天下亦猶陶人轉鈞霜空澄曉氣陸機咸時賦結濃霜於寒空水經注香桂成林氣清烟澄陶潛詩氣和天維澄班坐依逺流李百藥詩溜闊霞光近川長曉氣髙宋之問序滄洲曉氣化為宫闕之形霞景瑩芳春李百藥登古城詩霞景煥餘照露氣澄晚清説文瑩玉色一曰石之次玉者梁元帝纂要春曰芳春青春陽春九春鮑照詩開芳及稚節含綵吝驚春徳輝覃率土禮記徳輝動於内而民莫不承聴賈誼文鳳凰翔于千仞兮覽徳輝而下之謝莊歌恩覃四冥被九有詩率土之濵莫非王臣班固表上以光七曜之明下以應率土之望相賀奉還淳詩四方來賀北齊書盧文偉傳詢祖初襲爵封大夏男朝士謂之曰大夏初成應聲答曰且得燕雀相賀唐書禮樂志調露二年幸洛陽城南樓宴羣臣太常奏六合還淳之舞李嶠奉和皇帝丘禮撫事述懐應制獨㫁上古天子庖犧氏神農氏稱皇堯舜稱帝漢書郊祀志秦并天下稱皇帝周禮春官大司樂冬日至于地上之圜丘奏之若樂六變則天神皆降可得而禮矣注冬至陽生之始圜丘象天之形故以祀天神而奏其樂唐書禮樂志冬至祀圜丘禮記郊社之禮所以事上帝也配極輝光逺禮記萬物本乎天人本乎祖此所以配上帝也謝荘表惟皇配極惟帝祀天易剛健篤實輝光日新其徳揚雄甘泉賦輝光眩耀降厥福兮漢書髙祖本紀規模𢎞逺承天顧託隆易至哉坤元萬物資生乃順承天漢書成帝紀帝王之事莫大于承天之序承天之序莫重乎郊祀故聖王盡心極慮以建其制祭天于南郊就陽之義也庾信賦奉立身之遺訓受承書之顧託陸雲文篤眷彌隆負圖濟多難漢書霍光傳使黄門畫者畫周公負成王朝諸侯以賜光南齊書竟陵王子良傳寄重先顧任均負圖書必有忍其乃有濟創業起居注𢎞濟乎多難沈約鼓吹曲登我聖明去多難長夜杳㝠忽云旦脱屐歸成功魏志崔林傳曰刺史視去此州如脱屐陸雲文脱屐岐周克讓之風斯舉易與人同者物必歸焉故受之以大有禮記升中於天告成功也詩疏頌者太平徳洽之歌述成功以告神聖道昭永錫禮記大哉聖人之道漢書武五子傳孝武皇帝躬聖道孝宗廟慈愛骨肉和集兆民徳配天地明並日月書王懋昭大徳詩永錫爾極時萬時億顔延之詩惟主創物永錫洪算邕言讓在躬書其惟不言言乃雍廣韻雍邕同和也書允恭克讓禮記清明在躬志氣如神三國名臣賛日月在躬隠之彌曜還推萬方重晉書楊方傳乃是一國所推書王歸自克夏至于亳誕告萬方宋書樂志時齊七政朝此萬方魏志武帝紀注橋公覩太祖異之由是聲名益重咸仰四門聰書四海之内咸仰朕徳又賔于四門四門穆穆又闢四門明四目達四聰國語聴徳以為聰恭已忘自逸論語恭己正南面而巳矣漢書匡衡傳廣心浩大者戒于相忘梁書伏挺傳物我兼忘詩天命不徹我不敢傚我友自逸諸葛亮文夙興夜寐不敢自逸因人體至公孝經聖人因嚴以教敬因親以教愛論語因民之所利而利之袁宏三國名臣賛序君臣相體若合符契仲長統昌言人主臨之以至公垂旒滄海晏禮記祭之日王被衮以象天戴冕璪十有二旒則天數也後漢書輿服志冕冠垂旒前後邃延白虎通垂旒者示不視邪十洲記滄海島在北海中水皆蒼色仙人謂之滄海也楊炯文海晏河移直筆書祥之巻解網法星空通鑑乙丑上祀南郊赦天下并十惡咸赦除之流人並放還史記殷本紀湯出見野張網者四面祝曰自天下四方皆入吾網湯曰嘻盡之矣乃去其三面祝曰欲左左欲右右不用命乃入吾網南史袁昂傳因約法之𢎞承解網之宥沈約鼓吹曲至仁解網窮鳥入懐隋書刑法志聖皇仰視法星旁觀習坎王符辨命論宋公一言法星三徙雲散天五色王僧孺詩霏微商雲散史記三皇紀女媧錬五色石以補天又龜策傳天出五色以辨黒白春還日再中宗楚客詩九重中禁啟七日早春還説文日實也太陽精不虧漢書郊祀志文帝即位趙人新垣平言臣候日再中居傾之日却復中於是始更十七年為元年令天下大酺稱觴合纓弁詩稱彼兕觥冊府元龜貞觀二十二年正月奏十部樂㑹四夷君長於天成殿王公稱觴上夀沈佺期詩敬奉乗輿來此地稱觴上夀樂鈞天史記淮隂侯傳蒯通曰天下之士雲合霧集隋書韋世康傳世康與子弟書曰吾生因緒餘夙霑纓弁唐享先農樂章肅肅享祀顒顒纓弁率舞應絲桐書百獸率舞唐五郊樂章安歌率舞逓將迎易同聲相應桓譚新論神農氏始削桐為琴繡絲為絃以通神明之徳謝莊賦絲桐練響注琴絃也樂府古辭耳節朱絲桐凱樂深居鎬詩王在在鎬豈樂飲酒南都賦接歡宴於日夜終愷樂之令儀陸機演連珠萬邦凱樂非悦鐘鼓之娯韋嗣立詩願陪歡樂事常與嵗時深詩宅是鎬京箋武王卜居是鎬京之地張正見詩聖皇方在鎬傳歌盛飲豐史記髙祖置酒沛宫酒酣自為歌詩梁元帝詩傳歌共繞梁詩厭厭夜飲不醉無歸漢書叙傳皇皇炎漢兆自沛豐三輔舊事太上皇不樂關中思慕鄉里髙祖徙沛屠兒沽酒煮餅商人立為新豐唐太宗詩列筵歡故老髙宴聚新豐小臣濫簮筆無以頌唐風中宗本紀三年八月乙酉李嶠同中書門下三品卞斌觀太常新樂詩小臣濫清耳長奉南風絃漢書昌邑王傳佩玉環簪筆持牘趨謁注簪筆插筆於首也晉書輿服志笏者有事則書之故嘗簪筆南史劉杳傳周捨問杳尚書著紫荷嚢相傳云挈囊竟何所出杳曰張安世持槖簪筆韋昭張晏注並曰槖嚢也簪筆以待顧問論衡古之帝王建鴻徳者須鴻筆之臣襃頌紀載鴻徳乃彰鮑照詩唐風久不渝宗楚客奉和幸上陽宫侍宴應制地理志上陽宫在東都禁苑之東東接皇城之西南隅上元中置髙宗之季常居以聴政虢州湖城有故隋上陽宫正觀初置咸亨元年廢韋𢎞機傳髙宗登洛北絶岸延眺良久歎其美詔即其地營宫所謂上陽者㑹要儀鳯四年車駕入洛乃移御于上陽宫紫庭金鳳闕後漢書皇甫規傳規對賢良方正策臣生長邊逺希涉紫庭梁武帝遊女曲戲金闕遊紫庭漢書東方朔傳左鳳闕右神明號稱千門萬户注鳳闕闕名神明臺名也水經注關中記曰建章宫圓闕臨北道有金鳳在闕上故號鳯闕也丹禁玉雞川隋書百官志武騎之職皆以分司丹禁侍衞左右宋書符瑞志漢髙帝母名含始是為昭靈后遊于洛池有玉雞銜赤珠刻曰玉英吞此者王水經注洛水東流㑹于伊含始受玉雞之瑞于此似立蓬瀛上列子渤海之東有五山焉一曰岱輿二曰員嶠三曰方壺四曰瀛洲五曰蓬萊其上臺觀皆金玉禽獸皆純縞珠玕之樹皆叢生華實皆有滋味食之皆不老不死所居之人皆仙聖之種一日一夕飛相往來者不可數焉拾遺記昆臺之山有垂白之叟宛若少童貌若冰雪膚實腸輕歴蓬瀛而超碧海劉孝綽詩無因追羽翮及爾宴蓬瀛疑遊崑閬前穆天子傳吉日辛丑天子登于崑崙之丘以觀黄帝之宫水經崑崙墟在西兆去嵩髙五萬里地之中也其髙萬一千里河水出其東北陬葛仙公傳崑崙一曰𤣥圃一曰積石琮房一曰閬風臺一曰華葢一曰天柱皆仙人所居也鮑照舞鶴賦指蓬壺而翻翰望崑閬而揚音何遜七召疑崑閬之鬱岪鳥將歌合轉庾信春賦新年鳥聲千種囀劉希夷詩春至鳥還歌花共錦爭鮮洛陽伽蓝記春風扇揚花樹如錦子夜四時歌初花錦繡色王勃上已祓禊序王孫春草處處爭鮮湛露飛堯酒詩湛湛露斯匪陽不晞江淹詩願垂湛露恵何遜侍宴詩羽觴歡湛露孔叢子昔有遺諺堯舜千鍾孔子百榼魏文帝詔葢聞千鍾百觚堯舜之飲也薫風入舜絃史記五帝紀南風之薰兮可以解吾民之愠兮禮記昔者舜作五絃之琴以歌南風水光搖落日荀子水動而影搖江淹詩階前水光裂梁簡文帝詩風光水中亂祖孫登詩長川照落日劉孝綽詩川平落日迴樹色帶晴烟江淹詩風光多樹色何遜詩山烟含樹色梁簡文帝詩古樹無枝葉荒郊多野烟向夕迴琱輦陶潛詩向夕長風起寒雲沒西山後漢書邊譲傳夕迴輦于門館晉書佛圖澄傳衣以綾錦乗以雕輦東京賦是時稱警蹕己下雕輦於東廂佳氣滿巖泉後漢書光武帝紀望氣者蘇伯阿至南陽遙望見舂陵郭唶曰氣佳哉鬱鬱蔥蔥然蕭鈞詩巖泉咽不流周明帝詩嶺松千仞直巖泉百丈飛王勃泥溪弭櫂凌奔壑謝靈運詩弭櫂薄枉渚指景待樂闋丘遲詩弭櫂裁假寐擊汰己爭先江淹賦凌大壑越滄洲低鞭躡峻岐左思蜀都賦羲和假道于峻岐陽烏迴翼乎髙標江濤出岸險謝靈運詩沫江免風濤涉清弄漪漣顔延之詩春江壯風濤沈約詩岸險每増減湍平互淺深峯磴入雲危沈約詩峯磴互相距巖岫杳無窮江總詩山斜翠磴危陶𢎞景書髙峯入雲溜急船文亂蕭慤詩泉髙下溜急王筠詩凌波寫鷁彩汎舟渙蛟文巖斜騎影移梁元帝迴文詩曲徑繞峯斜又看騎馬詩輕塵逐影移水烟籠翠渚梁簡文帝詩水烟浮岸起江總詩輶軒通翠渚旌節騖三秦山照落丹崖謝靈運詩日落山照曜晉書宋纎傳丹崖千仞石壁萬尋風生蘋浦葉宋王風賦夫風生于地起於青蘋之末王筠詩風生起斜浪王儉賦緑蘋齊葉梁昭明太子啟蘋葉漂風露泫竹潭枝謝靈運時花上露猶泫呉均賦露泫葉而原淨東方朔七諫便姢之修竹寄生於江潭泛水雖云美南史衡山侯恭傳登山泛水肆意酣歌任昉詩長泛滄浪水平明至曛黒勞歌誰復知韓詩外傳飢者歌食勞者歌事謝混詩感彼蟋蟀倡信此勞者歌宋之問靈隠寺元和郡縣志靈隠寺在錢塘縣西十二里本名西山又名仙居山一統志靈隠寺在杭州府武林山晉咸初建本事詩宋考功以事貶後放還至江南遊靈隠寺夜月極明長廊吟行曰鷲嶺鬱岧嶤龍宫鎻寂寥第二聨搜思終不如意有老僧㸃長明燈坐大禪牀問曰少年夜久不寐而吟諷甚苦何耶之問答曰弟子業詩適偶欲題此寺而興思不屬僧曰試吟上聨即吟與之再三吟諷因曰何不云樓觀滄海日門聴浙江潮之問愕然訝其遒麗終篇僧所贈句乃為一篇之警策遲明訪之則不復見矣寺僧有知者曰此駱賔王也詩藪靈隠寺詩舊傳賔王續成巵言謂詳其格調自當屬宋最為得之鷲嶺鬱岧嶤法華經耆闍窟山山形如鷲佛嘗居此杭州圖經晉西域僧恵理登杭州飛來峯歎曰此是天竺國靈鷲山之小嶺不知何年飛來梁簡文帝詩層岑偃蹇聳觀苕嶤龍宫鎖寂寥法華經文殊師利坐千葉蓮花従大海娑竭羅龍宫自然湧出智度論佛問阿難吾在龍宫説法龍子得道庾信詩凝真天地表絶想寂寥前樓觀滄海日尸子泰山上三峯東曰日觀雞鳴時見日出十洲記滄海島地方三千里在兆海中去岸二十一萬里水皆蒼色仙人謂之滄海也王粲遊海賦覽滄海之體勢吐星出日木華海賦蕩雲浴日門聴浙江潮水經漸江水注山海經謂之浙江也地理志云水出丹陽黟縣方輿勝覽錢塘每晝夜潮再上八月十八日最大桂子月中落梁元帝詩月中含桂樹本草圖經江東諸處多于衢路間拾得桂子古老相傳是月中下也禪林備覽天竺山八月十五夜常有桂子落天香雲外飄水經注爾時諸神天人側塞空中散天香花庾信詩天香下桂殿王筠詩香氣飄當軒清捫蘿登塔逺范雲詩捫蘿正憶我水經注秦望山披蘿捫葛然後能升魏書崔光傳内經寳塔髙華堪室千萬唯盛言香花禮拜豈有登上之義一統志西湖南髙峯上有古塔下有石室北髙峯亦有塔髙七層刳木取泉遙易刳木為舟一統志冷泉在武林靈隠寺前霜薄花更發沈佺期詩霜薄沾上露何遜梅花詩銜霜當路發冰輕葉未凋梁沈君攸詠冰詩日華照冰彩爍灼自相明隂潭欲半解陽岸己全輕傅休奕詩雖離霜而未凋夙齡尚遐異沈約詩夙齡愛逺壑南史劉㪣傳登危履隂必盡幽遐謝靈運詩清旦索幽異披對滌煩囂王羲之帖披對邈未可期中論非若求盈司利之競逐煩囂也待入天台路幽明録漢永平五年剡縣劉晨阮肇共入天台山有二女子留半年後歸一統志天台山在浙江台州府天台縣西一百一十里路由楢溪前有石橋看余度石橋啟䝉記注天台山石橋路徑不盈尺長數十步步至滑下臨絶澗謝靈運賦凌石橋之苔莓越楢溪之紆縈陳子昂白帝城懐古元和郡縣志公孫述至魚復有白龍出井中因號魚復為白帝城太平寰宇記公孫述據蜀自以承漢土徳故號白帝一統志白帝城在夔州府治東日落滄江晚謝靈運詩日落山照耀鮑照詩日落嶺雲歸梁簡文帝詩宻房寒日晚落照度牕邊范雲詩滄江路窮此謝朓詩路瞰蒼江流停橈問土風方言楫謂之橈劉孝威詩荒徑横臨浦空舟斜插橈劉孝綽詩斂橈隨水脈急槳度江湍左傳樂操土風不忘舊也漢書地理志凡民函五常之性而其剛柔緩急音聲不同繫水土之風氣故謂之風城臨巴子國庾信賦豈獨城臨細柳之上塞落桃林之下華陽國志巴子時雖都江州或治墊江或治平都括地志巴子城在合州石饒縣南五里故墊江縣也一統志夔州府春秋時屬巴國臺没漢王宫水經注水又東逕南鄉峽東逕永安宫南一統志永安宫在夔州府卧龍山下蜀先主征呉為陸遜所敗還至白帝改魚復為永安宫荒服仍周甸書五百里荒服疏服名荒者政教荒忽因其故俗而治之華陽國志巴國逺世則黄炎之支封在周則宗姬之戚親故于春秋班侔秦楚示甸衞也深山尚禹功左傳深山大澤實生龍蛇庾信詩山深足細泉左傳美哉禹功明徳逺矣孫逖詩山河念禹功巖懸青壁㫁范雲詩巖懸獸無迹庾信詩巖懸澗豎流左思呉都賦素華斐丹秀芳臨青壁系紫房嵇康琴賦青壁萬尋梁簡文帝賦依青壁而懐芳謝朓詩崖㫁識雲重張正見詩峯㫁玉山前地險碧流通易地險丘陵山川也張載劍閣銘窮地之險極路之峻梁簡文帝詩亘原横地險房篆詩前溪流碧水後渚映青天江淹賦園桃紅㸃流水碧色蕭琛詩烟波千里通古木生雲際江總詩古木㫁懸蘿鮑照詩寒蓬夕巻古樹雲平楚辭君誰須兮雲之際孫綽太平山銘懸棟翠微飛雨雲際陶𢎞景表席月澗門横琴雲際孤帆出霧中梁簡文帝書夕鳥歸林懸孤帆而未息隂鏗詩天際晚帆孤梁簡文帝詠藤詩標春抽曉翠出霧挂懸花劉刪詩匡山若霧中川途去無限謝靈運詩豈伊川途念梁武帝詩連山去無限長洲望不極客思坐何窮謝朓詩客思渺難裁蕭慤詩客思轉縦横淮南子執要道之柄而遊于無窮之地沈佺期昆明池侍宴應制武帝伐昆明穿池習五兵漢書武帝紀發謫吏穿毘明池注西南夷有越嶲昆明國有滇池方三百里漢使求身毒國而為昆明所閉今欲伐之故作昆明池象之以習水戰在長安西南周回四十里梁簡文帝詩教戰昆明池周禮大田之禮注古者因田習兵閱其車徒之數又夏官司兵掌五兵五盾各辨其物與其等以待軍事注五兵者戈殳㦸酋矛夷矛水同河漢在河圖括地象河精上為天漢古詩河漢清且淺相去復㡬許晉書天文志天漢起東方經箕尾之問謂之天河亦謂之漢津館有豫章名漢宫殿名長安有豫章觀三輔黄圖豫章觀武帝造在昆明池中張衡西京賦豫章珍館掲焉中峙注皆豫章未為臺館也班固西都賦集乎豫章之宇臨乎昆明之池我后光天徳書撫我則后漢書食貨志養成羣生奉順天徳顔延之詩皇聖昭天徳陳後主詩日月光天徳垂衣文教成易黄帝堯舜垂衣裳而天下治梁元帝詩垂衣彰太平唐太宗詩垂衣馭八荒書三百里揆文教牛𢎞開獻書表大𢎞文教納俗升平易觀乎人文以化成天下黷兵非帝念後漢書劉虞傳公孫瓉累為袁紹所敗而猶攻之不已虞患其黷武且慮得志不可復制固不許行國語先王耀徳不觀兵書禹曰於帝念哉後漢書王常傳賛王常知命功惟帝念勞物豈皇情易説以先民民忘其勞顔延之赭白馬賦信聖祖之蕃錫留皇情而驟進梁簡文帝詩皇情愛厯覽春仗過鯨沼唐書儀衞志凡朝㑹之仗三衞畨上分為五仗三輔黄圖昆明池刻石為鯨魚長三丈每至雷雨常鳴吼鬛尾皆動張衡西京賦昆明靈沼黒水𤣥阯雲旗出鳳城司馬相如上林賦拖蜺旌靡雲旗魏文帝賦揚雲旗之繽紛張衡東京賦雲旗拂霓注旗謂熊虎為旗為髙至雲故曰雲旗也幽明録鄴城鳳陽門五層樓安金鳳凰二頭於其上盧照隣詩春滿鳳凰城靈魚銜寳躍三秦記昆明池通白鹿原原人釣魚綸絶而去夢於武帝求去其鈎三日戲於池上見大魚銜索帝曰豈不榖昨所夢耶乃取鈎放之三日帝復遊池池濵得明珠一雙帝曰豈昔魚之報耶詩王在靈沼於牣魚躍張衡東京賦渚戲躍魚仙女廢機迎漢宫闕疏昆明池有二石人象牽牛織女荆楚嵗時記天河之東有織女年年機杼勞役天帝憐其獨處許嫁河西牽牛郎嫁後遂廢織絍天帝怒責令歸河東但使其一年一度相㑹梁武帝歌閨中女下機陳後主詩霓袖此宵迎柳拂旌門暗梁簡文帝詩垂柳拂行輪又岸柳拂舟垂周禮天官掌舍為帷宫設旌門注謂王行晝止張帷為宫則樹旌以表門疏樹立旌旗以表門庾肩吾詩旌門臨苑樹蘭依帳殿生江淹詩秋夜紫蘭生廬照隣詩蘭葉繞階生沈約詩悵殿臨春籞庾信馬射賦止立行宫裁舒帳殿還如流水曲周禮五馭注五馭鳴和鸞逐水曲過君表舞交衢逐禽左疏逐水曲者御車隨水勢之屈曲而不墜水也梁簡文帝詩水曲文魚聚温子昇詩莫知流水曲誰辨遊魚心日晚棹歌清楊師道詩登臨日將晚三輔黄圖昆明池中有龍首船常令宫女泛舟池中張鳳葢建華旗作棹歌雜以鼓吹帝御豫章館臨觀焉漢武帝秋風辭簫鼓鳴兮發棹歌漢昭帝淋池歌凉風凄凄揚棹歌宋之問奉和晦日幸昆明池應制漢書西南夷傳昆明國有池方二百里武帝欲伐昆明作池象之以習水戰唐詩紀事中宗正月晦日幸昆明池賦詩羣臣應制百餘篇帳殿前結綵樓命上官昭容選一首為新翻御製曲従臣悉集其下須臾紙落如飛唯沈宋二詩不下又移時一紙飛墜乃沈詩也及聞其評曰二詩工力悉敵沈詩落句云微臣雕朽質羞覩豫章材葢詞氣已竭宋詩云不愁明月盡自有夜珠來猶陡健鶱舉沈乃伏不敢復爭春豫靈池㑹孟子一遊一豫為諸侯度薛元超諫蕃官仗内射生疏時惟令月景淑風和宸遊有豫張衡西京賦昆明靈沼又旋憩乎昆明之池陸機詩樂㑹良自古滄波帳殿開王儉文鼓棹則滄波振蕩柳惲詩太液滄波起沈約詩帳殿臨春籞庾肩吾詩别筵開帳殿舟凌石鯨度南史隠逸傳孫緬為潯陽太守落日逍遙渚際見一輕舟凌波隠顯俄而漁父至西京雜記昆明池刻玉石為魚每至雷雨魚常鳴吼江總昆明池詩鷺飲石鯨渡槎拂斗牛迴博物志天河與海相通有人居海渚乘槎而去至一處望見宫中多織女一丈夫牽牛渚次飲之問是何處答曰君還至蜀問嚴君平則知之庾信賦路己分於湘漢星猶看於斗牛漢宫闕疏昆明池有二石人象牽牛織女庾信詩遙逐桂舟迴節晦蓂全落帝王世紀帝時為天子蓂莢生於庭帝成厯始一日生一莢至月半生十五莢十六日落一莢至月晦而盡抱朴子唐堯觀蓂莢以知月春遲柳暗催詩春日遲遲謝莊宋明堂詩柔風舞暄光遲庾信詩官渡柳應春象溟看浴景莊子窮髪之北有溟海者天池也鮑照詩穿池類溟渤孫綽逰天台山賦或倒景於重溟左思詩昊天舒白日靈景耀神州駱賔王啟騰瀾浴景濬靈派以含珠燒刼辨沈灰北齊書樊遜傳昆明池黒以為燒刼之灰髙僧傳昔漢武穿昆明池底得黒灰問東方朔朔曰可問西域梵人後竺法蘭至衆人追問之蘭云世界終盡刼火洞燒此灰是也庾信詩無勞問待詔自識昆明灰鎬飲周文樂詩王在在鎬豈樂飲酒沈約詩宴鎬鏘玉鸞遊汾舉仙軑汾歌漢武才漢武帝秋風辭汎樓船兮濟汾河横中流兮揚素波簫鼔鳴兮發棹歌不愁明月盡古詩明月皎夜光阮籍詩薄帷鑒明月初學記晦月盡之名也自有夜珠來鄒陽書明月之珠夜光之璧拾遺記禹鑿龍門至一空巖深數十里幽暗不可復行禹負火而進有獸狀如豕銜夜光之珠其光如燭張説奉和聖製過王濬墓應制晉書王濬傳王濬字士治𢎞農湖人也武帝謀伐呉拜龍驤將軍監梁益諸軍事太康元年正月發成都攻丹陽尅之二月詔進為平東將軍假節都督益梁諸軍事濬自蜀發兵不血刃攻無堅城順流鼓棹徑造三山壬寅封襄邑縣侯濬入于石頭孫皓面縳銜璧濬躬解其縳收圖籍封府庫軍無私焉後又轉撫軍大將軍開府儀同三司諡曰武牛斗三分國漢書天文志斗江湖牽牛婺女揚州晉書天文志自南斗十二度至須女七度為星紀於辰在丑呉越之分野屬揚州王勃序物華天寳龍光射牛斗之墟諸葛亮出師表今天下三分晉書陳夀傳撰魏蜀呉三國志凡六十五篇時人稱其善叙事有良史之才龍驤一統年晉書五行志孫皓天紀中童謠曰不畏岸上獸但畏水中龍武帝聞之加王濬龍驤將軍公羊傳何言乎王正月大一統也史記秦始皇紀海内為郡縣法令由一統自上古以來未嘗有智髙寧受制易知崇禮卑元經周處賢將也受制于梁王彤進止不得専智勇不得用本傳初詔書使濬下建平受杜預節度至秣陵受王渾節度預至江陵謂諸將帥曰若濬得下建平則順流長驅威名已著不宜令受制于我若不能尅則無緣得施節度濬至西陵預與之書曰足下既摧其西藩便當徑取秣陵討累世之逋宼釋呉人于塗炭自江入淮逾于泗汴沂河而上振旅還都亦曠世一事也濬大悦王渾久破皓軍頓兵不敢進而濬乗勝納降渾恥而且忿乃表濬違詔不受節度誣罪狀之有司遂按濬檻車徴帝弗許風急肯迴船梁簡文帝詩風急旍旗㫁本傳濬將至秣陵王渾遣信要令蹔過論事濬舉帆直指報曰風利不得泊也又濬表宿設部分行有次第無緑得於長流之中迴船過渾令首尾㫁絶梁簡文帝詩人歸浦口暗那得久迴船有策擒呉嚭司馬遷書有竒策才力之譽本傳時朝議咸諫伐呉濬乃上疏曰臣觀時運宜速征伐今若不伐更立賢主則强敵也臣作船七年日夜朽敗义臣年七十三者一乖則難圖也帝深納焉左傳伯氏之族出伯州犂之孫嚭為呉太宰以謀楚無言讓范宣本傳濬自以功大而為渾父子及豪强所抑每進見陳其征伐之勞及見枉之狀益州䕶軍范通謂濬曰卿功則美矣然恨所以居美者未盡善也卿旋斾之日角巾私第口不言平呉之事若有問者輒曰聖主之徳羣帥之力老夫何力之有焉藺生所以屈亷頗王渾能無愧乎濬曰吾始懼鄧艾之事不得無言亦不能遣諸胸中是吾褊也左傳晉侯蒐於綿上以治兵使士匄將中軍辭曰伯游長請従伯游荀偃將中軍士匄佐之晉國之民是以大和諸侯皆睦范宣子讓其下皆讓晉國以平數世賴之援孤因勢屈本傳臣孤根獨立朝無黨援而結恨彊宗取怨豪族此臣之所大怖也又博士秦秀太子洗馬孟康前温令李宻等並表訟濬之屈晉書孫綽傳勢屈則遵養以待㑹功重為讒偏本傳時人咸以濬功重報輕帝乃遷濬鎮軍大將軍加散騎常侍領後軍將軍又渾又騰周浚書云濬軍得呉寳物濬復表曰昔樂毅伐齊下城七十而卒被讒間况臣疎頑能免讒慝之口今渾遣人在洛中専共交搆讒搆沸騰敢不悚慄漢書鄒陽傳偏聴生姦舊迹灰塵散後漢書隗囂傳王元説囂曰按秦舊迹表裏山河應瑒賦開九土之舊迹暨聲教于海隅干寳晉紀論若夫日昃不暇食夙夜匪懈者共嗤㸃以為灰塵而相詬病矣陶潛詩飄如陌上塵分散逐風轉梁簡文帝詩塵散鯉魚風枯墳故老傳庾信文丘墳敦崇追旌盛徳漢書叙傳賔禮故老陶潛詩促席迎故老揮觴道平素本傳葬栢谷山大營塋域葬垣周四十五里而别開一門松栢茂盛百代逢明主晉書樂志超百代揚休烈流景祚顯萬世又阮种傳徳逮羣生澤被區宇故能光隆于當時垂裕于百代王融詩言願聖明主永永萬斯年何辭死道邊詩采采芣苢疏今車前草大葉長穂好生道邊晉書王戎傳樹在道邊而多子必苦李也奉和聖製暇日與兄弟同遊興慶宫作應制唐書讓皇憲傳先天後盡以隆慶舊邸為興慶宫而賜憲及薛王第于勝業坊申岐二王居安興坊環列宫側帝于敦睦葢天性然唐㑹要明王在藩邸居興慶里宅有龍池湧出日以浸廣至開元中為興慶宫漢武横汾日漢書武帝紀孝武皇帝景帝中子也漢武故事帝行幸河東祠后土顧視帝京中流與羣臣飲讌歡甚乃自作秋風辭曰泛樓船兮濟汾河横中流兮揚素波簫鼓鳴兮發棹歌周王宴鎬年書惟周王撫萬邦巡侯甸詩周王夀考遐不作人又王在在鎬豈樂飲酒明一統志陜西西安府鎬京城在咸陽縣西南何如造區夏書用肇造我區夏張衡應間奄受區夏遂定帝位晉四廂樂歌𢎞濟區夏允集大命復此睦親賢禮記君子賢其賢而親其親注聖人有親賢之徳疏賢其賢人而親其族親也南史宋諸王傳論帝王之興雖係厯數至經啟多難莫不兼藉親賢巢鳳新成閣庾信賦將雛集鳯比翼巢鵷中候握河紀伯禹曰帝軒提象鳯巢阿閣竹書紀年黄帝二十年帝坐于𤣥扈洛水之上有鳳皇集或止帝之東園或巢于阿閣或鳴於庭飛龍舊躍泉易乾九五飛龍在天利見大人莊子藐姑射之山有神人焉乗雲氣御飛龍而遊乎四海之外易九四或躍在淵无咎案唐避髙祖諱故改淵為泉沈佺期詩龍池躍龍龍已飛江淹詩陽岫照鸞彩隂溪噴龍泉棣華歌尚在詩常棣之華鄂不韡韡凡今之人莫如足弟疏闗西有棣樹子如櫻桃可食言鄂足得花之光明是弟得兄榮也晉書張載協傳賛載協飛芳棣華猶映桐葉戲仍傳史記晉世家成王與叔虞戲剪桐葉為圭以與叔虞曰以此封若史佚請擇日成王曰吾與之戲耳史佚曰天子無戲言遂封叔虞于唐李嶠詩復看題柳葉彌喜䕃桐圭禁籞氛埃隔沈約詩年芳被禁籞烟花繞層曲廣韻籞禁苑也池水中編籬養魚張衡西京賦清氛埃于中宸集重陽之清瀓馬融廣成頌清氛埃掃野塲庾信曲君臣一體可以靜氛埃平臺景物連漢書梁孝王傳築東苑方三百餘里大治宫室為複道自宫連屬于平臺三十餘里謝朓詩平臺盛文雅西園富羣英陸雲詩景物台暉棟隆玉堂鮑照舞鶴賦雰昬夜歇景物澄廓聖慈良有裕後漢書种岱傳李燮上書曰岱雖未建忠效用而為聖恩所拔宜有異賞詩此令兄弟綽綽有裕左思魏都賦復之以無斁申之以有裕王道固無偏書無偏無黨王道蕩蕩無黨無偏王道平平禮記禮樂刑政四達而不悖則王道備矣後漢書班固傳逺近無偏幽隠畢達問俗兆人阜禮記入國而問俗書阜成兆民又一人有慶兆民賴之左傳天子曰兆民諸侯曰萬民家語南風之薫兮可以解吾民之愠兮南風之時兮可以阜吾民之財兮案兆人即兆民唐避太宗諱改觀風五教宣禮記命太師陳詩以觀民風命市納賈以觀民之所好惡書敬敷五教在寛疏父義母慈兄友弟恭子孝左傳務其三時修其五教管子三官不謬五教不亂獻圖開益地隋書天文志賛滎河獻籙温洛呈圖墉城集仙録王母遣使授舜白玉環又授益地圖駱賔王露布天帝前星廣賜秦公之冊坤元益地遙聞王母之圖上官儀表截海班朔益地延圖張樂奏鈞天莊子黄帝張咸池之樂于洞庭之野天機不張而五官皆備盧思道序張樂洞野㑹計苗庭史記趙世家趙簡子疾寤曰我之帝所甚樂與百神遊于鈞天廣樂九奏萬舞不類三代之樂其聲動人心孔融薦禰衡表鈞天廣樂必有竒麗之觀帝室王居必蓄非常之寳侍酒衢尊滿史記淳于髠傳親有嚴客髠帣韝鞠􅎽侍酒于前時賜餘瀝奉觴上夀又魏其武安侯傳田蚡為諸郎未貴往來侍酒魏其跪起如子姪淮南子聖人之道猶中衢而設尊耶過者斟酌各得其宜蘇頲冊文酌中衢之尊不竭也詢芻諫鼓懸詩先民有言詢于芻蕘漢書賈誼傳誹謗之木敢諫之鼓注欲顯諫者則擊鼓淮南子堯置敢諫之鼓梁簡文帝大法頌序諫鼓髙懸芻言不棄永言形友愛詩永言孝思孝思維則又惟此王季因心則友呉志孫賁傳弟輔嬰孩賁自贍育友愛甚篤晉書周顗傳顗性寛裕而友愛過人萬國共周旋易首出庶物萬國咸寧書庶政惟和萬國咸寧左傳禹㑹諸侯于塗山執玉帛者萬國禮記進退周旋慎齊左傳先大夫臧文仲教行父事君之禮行父奉以周旋弗敢失墜國語文章比象周旋序順奉和聖製度蒲關應制唐書地理志河中府河西縣有蒲津關一名蒲坂一統志大慶關在山西蒲州西門外黄河西岸古名蒲津闗蒲坂横臨晉漢書地理志河東郡縣蒲反注秦始皇東巡見長坂故加反云括地志蒲坂城在蒲州河東縣南二里即堯舜所居也史記淮隂侯傳魏王盛兵蒲坂塞臨晉注臨晉縣名在河東之東岸對舊闕庾信賦渡臨晉而横船華芝曉望秦揚雄甘泉賦登鳳凰而翳華芝注華芝葢也庾信文隴頭流水延望秦闗闗城雄地險漢書枚乘傳深壁髙壘副以闗城不如江淮之險易地險山川丘陵也梁武帝詩南城連地險周𢎞正詩武闗設地險橋路扼天津蕭子良啟陂湖宜壅橋路須通晉書天文志天津九星横河中一曰天漢一曰天江主四瀆津梁所以渡神通四方也一星不備闗津道不通樓暎行宫日丘遲詩彩殿迴風丹樓映日陳後主樂府映日花光動左思呉都賦梁岷有陟方之館行宫之基注天子行所立者曰行宫隄含鞏樹春梁元帝詩梅含今春樹庾肩吾詩雲邊開鞏樹霧裏識嶤峯徐彦伯詩花移玉樹春黄雲隨寳鼎春秋孔演圖黄帝之將興黄雲升于堂帝王世紀堯母慶都生而神異常有黄雲覆其上史記五帝紀黄帝獲寳鼎迎日推策班固寳鼎詩寳鼎見兮色紛緼蕭慤詩瑞雲生寳鼎紫氣逐真人闗令内傳闗令登樓四望見東極有紫氣西邁喜曰應有聖人經過京邑至期乃齋戒其日果見老子莊子闗尹老耼乎古之博大真人哉東詠唐虞跡史記五帝紀帝堯為陶唐帝舜為有虞注堯為唐侯國于中山唐縣是也舜嬪于虞因以為氏今河東太陽西山上虞城是也漢書馳騖于唐虞折衷于三代西觀周漢塵晉書慕容暐載記垂美將來侔宗周漢李嶠詩四海帝王家兩都周漢室山河非國寳史記呉起傳魏武侯曰山河之固魏國寳也起對曰在徳不在險文中子登雲中之城望龍門之闗曰壯哉山河之固左傳五父曰親仁善鄰國之寳也明主愛忠臣荀子明主好同漢書劉向傳忠臣雖在畎畝猶不忘君惓惓之義也後漢書王常傳帝指常謂羣臣曰此家率下江諸將輔翼漢室心如金石真忠臣也奉和聖製爰因巡省途次舊居應制蔥鬱興王郡後漢書光武帝紀望氣者蘇伯阿使至南陽遙望見舂陵郭唶曰氣佳哉鬱鬱蔥蔥然江淹空青賦蔥鬱臺殿隋書李徳林傳皇帝載誕之初神光滿室具興王之表韞大聖之能謝瞻詩伊人感代工聿來扶興王釋名郡羣也人所羣聚也殷憂啟聖圖晉書束晳傳榮利不擾其覺殷憂不干其寐劉琨表或殷憂以啟聖明蘇頲詩七日祥圖啟任昉書聖圖睿範歌思是歸周成㑹西土史記周本紀成王自奄歸在宗周作多方既絀殷命襲淮彛歸在豐作周官左傳康有酆宫之朝穆有塗山之㑹書四方民乃大和㑹又西土有衆咸聴朕言傳武王在西故稱西土漢書叙傳西土宅心漢武幸南都後漢書光武帝紀建武十七年十月甲申幸章陵修園廟祠舊宅觀田廬置酒作樂賞賜李嶠扈従還洛詩觀風昔來幸張衡南都賦於顯樂都既麗且康陪京之南居漢之陽摯虞文章志張衡為南都賦南陽郡治宛在京之南故曰南都嵗卜鑾輿邁左傳先王每嵗卜征廣韻龜曰卜蓍曰筮宋書袁淑傳兹當鳴鑾中岳阮籍詩良馬騁龍輿西都賦乗鑾輿備法駕詩周王于邁六師及之農祠鳸政敷漢書郊祀志有烈山氏王天下其子曰柱能殖百穀為稷祠禮記饗農及郵表畷注農古之田畯有功於民者左傳九扈為農正按扈爾雅作鳸晉書職官志少昊配九扈之名以為農正詩敷政優優謝靈運㑹吟行請従文命敷武威稜外域國語衆順而有武威故曰利建侯漢書李廣傳威稜憺乎鄰國注憺猶動也梁武帝檄旍麾所指威稜無外後漢書西域傳論漢世張騫懐致逺之畧班超奮封侯之志終能立功西遐羈服外域江總濟黄河詩蔥山淪外域鹽澤隠遐方文教靡中區書三百里揆文教何承天書反初結繩中繫文教牛𢎞開獻書表大𢎞文教納俗升平廣韻靡偃也三都賦序魏跨中區之衍警蹕干戈捧漢書淮南王傳出入警蹕又文三王傳皇帝輦動左右侍帷幄者稱警出殿則傳蹕止人清道也書稱爾干比爾戈詩干戈戚揚廣韻捧兩手承也朝宗萬玉趨書江漢朝宗于海詩沔彼流水朝宗于海左傳禹㑹諸侯于塗山執玉帛者萬國穆天子傳至于羣玉之山天子於是載玉萬隻宋之問詩軒軒衞仗趨舊藩人事革詩价人維藩大師維垣晉書慕容垂載紀寵踰宗舊任齊懿藩國語人事不起勿為之始史記太史公自序夫春秋上明三王之道下辨人事之紀易天地革而四時成新化國容殊伏滔正淮論御新化之俗晉書樂志鐃歌軍國異容文武殊禮記國容不入軍壁有真龍畫江淹雲山讃序壁上有雜畫皆作山水好勢北史源師攝祠部白髙阿那肱以龍見當雩阿那肱謂為真龍出見大驚喜名畫記張僧繇金陵安樂寺畫四龍庭餘鳴鳳梧易不出户庭廣韻庭門庭詩鳳皇鳴矣于彼髙岡梧桐生矣于彼朝陽韓詩外傳黄帝致齋于宫鳳乃蔽日而至止帝東園集帝梧梁簡文帝頌液池下鶴髙梧集鳳叢觴祝堯夀説文叢聚也漢書叔孫通傳長樂宫成諸侯羣臣朝置法酒以尊卑次起上夀觴九行沈佺期詩稱觴獻夀樂鈞天莊子堯觀於華華封人曰願祝聖人使聖人夀合鼎獻湯㕑孟子伊尹以割烹要湯漢書東方朔傳伊尹䝉恥辱負鼎俎和五味以干湯詩是烝是享箋既有牲物而進獻之宋之問詩芝草入堯㕑陽樂寒初變周禮大宗伯以地産作陽徳以和樂防之又大司樂六律六同注六律合陽聲者也六同合隂聲者也漢書五行志寒暑之變天下皆同鶡冠子寒温之變非一精之所化春恩蟄更蘇楊炯詩霑恩更似春舊唐書王承宗傳順陽和而布澤因雷雨以覃恩禮記蟄蟲始振徐陵與王僧辨書同冰魚之不絶似蟄蟲之猶蘇三耆班命服説文耆老也又長也强也至也言至老境也漢書髙祖紀舉民年五十以上有脩行能帥衆為善置以為三老鄉一人擇鄉三老一人為縣三老與縣令丞尉以事相教復勿徭戍以十月賜酒肉左傳齊人餼諸侯使魯次之魯以周班後鄭詩服其命服朱芾斯皇晉書職官志王公已下茅社符璽車旗命服一如泰初故事揚雄文降兹珪璧命服有常五稔復田輸左傳不可以五稔廣韻稔年也亦嵗熟漢書髙帝紀蜀漢民給軍事勞苦復勿租税二嵗注復者除其賦役也後漢書永建元年詔以疫癘水潦令人半輸今年田租君賦大風起左傳公入而賦史記髙帝紀髙祖過沛置酒沛宫悉召故人父老子弟縦酒酒酣髙祖擊筑自為歌曰大風起兮雲飛揚威加海内兮歸故鄉安得猛士兮守四方楚辭衝風起兮横波唐太宗詩菊散金風起人歌湛露濡廣韻人聲曰歌歌者柯也以聲吟咏上下如草木之有柯葉詩湛湛露斯匪陽不晞沈約樂未央億舜日萬堯年詠湛露歌採蓮禮記雨露既濡岑羲詩願獻延齡酒長氶湛露歡従臣觀玉葉後漢書和帝車駕還宫賜従臣及留者公卿以下錢布各有差西都賦第従臣之嘉頌唐書禮儀志明堂之制上以清陽玉葉覆之穀山筆麈玉葉亦瓦之類崔豹古今注黄帝與蚩尤戰常有五色雲氣金枝玉葉止於帝上有花葩之象因而作華蓋方願紀靈符史記自序譜紀不明有司靡踵後漢書班彪傳漢徳承堯有靈命之符晉書郭璞傳王者之作必有靈符塞天人之心與神物合契曹植詩與帝合靈符三月二十日詔宴樂遊園賦得風字漢書宣帝紀神爵三年起樂遊園注在杜陵西北雍録樂遊原隋鑿之為芙蓉池且為園唐長安中太平公主於原上置亭遊賞都人每三月上已就此祓禊樂遊形勝地崔尚詩樂遊宜締賞舞詠惜將䦨南史劉善明傳髙帝召謂曰近畿國之形勝非親賢不居西京雜記其地四望寛敞梁宣帝文實散賞之佳地表裏望郊宫左傳表裏山河必無害也鮑照結客少年場行昇平臨四闗表裏望皇州漢舊儀郊泰畤皇帝平旦出竹宫朝東向揖日夕西向揖月賈餗圜丘賦降惟宫之綝縭北闕連天頂漢書王嘉傳奏封事曰董賢治大第門向北闕張衡西京賦北闕甲第當道直啟後漢書光武帝紀旗幟蔽野埃塵連天淮南子九天之頂曰九頂言極髙也南山對掌中詩如南山之夀又幽幽南山詩緝周都豐鎬面對終南故天保祝君斯干考室長安志大明宫北據髙原南望爽塏觀終南如指掌淮南子至人玩天地於掌握之中皇恩貸芳月岑文本詩天文光七政皇恩被九區沈佺期詩質幸恩先貸謝朓詩山中上芳月故人清尊賞魏收詩睿賞芳月色宴言忘日暮旬宴美成功初學記漢律吏五日得一休沐言休息以洗沐也鮑照詩休澣自公日宴慰及私辰丹鉛録俗以上澣中澣下澣為三澣蓋本唐制十日一休沐也詩序天保下報上也君能下下以成其政臣能歸美以報其上焉書成允成功魚戲芙蓉水漢相和歌魚戲蓮葉間謝朓詩魚戲新荷動雍録樂遊園本古曲江隋文帝惡其名曲改為芙蓉池為其水盛而芙蓉富也梁簡文帝詩日暮芙蓉水鶯啼楊柳風梁簡文帝詩鶯啼春欲駛隂鏗詩鶯啼歌扇後花落舞衫前古樂府暫出白門前楊柳可蔵烏鮑照詩帳含桃李風春花看欲暮張九齡詩春花頻覺早何遜詩看花時轉側梁武帝東飛伯勞歌三春已暮花従風古樂府天寒嵗欲暮天澤戀無窮梁簡文帝表天澤無涯名器總集張九齡詩天澤倍知崇舊唐書樂章瞻荷靈澤悚戀兼盈沈佺期詩身世兩無窮長袖招斜日史記韓子稱長袖善舞張衡賦振朱屣于盤樽奮長神之颯纚曹植七啟長袖隨風王逸楚辭章句以手曰招梁簡文帝詩斜日晚駸駸虞世南詩緑野明斜日青山澹晚烟留光待曲終春宴録貴家遊賞曲江翦百花裝成獅子互相遺送曰春光且莫去留與醉人看庾肩吾詩桂殿月偏來留光引上才九辨願徼幸而有待兮馬融長笛賦曲終闋盡蘇頲奉和晦日幸昆明池初學記按漢書及西京雜記昆明池漢武帝元狩三年所穿也初漢欲求身毒國為昆明夷所閉昆明有滇池方二百里曰滇河漢將伐昆明以通身毒使謫卒伐棘上林象滇河作昆明池以習水戰池周圍四十餘里炎厯事邊陲漢書漢承堯運徳祚已盛㫁蛇著符旗幟尚赤協于火徳自然之應得天統矣魏書陳思王植傳植封雍丘王朝京師獻詩曰受禪炎漢臨君萬邦王襃銘寳厯攸歸薛道衡詩上聖家寰宇威畧振邊陲昆明始鑿池漢書武帝紀減隴西北地上郡戍辛半發謫吏穿昆明池沈約詩荒渠集野鴈安用昆明池韓非子失水而鑿池陸倕賦對櫺軒而鑿池豫遊光後聖李徳林詩大夏堯遺俗汾河漢豫遊王粲正考父賛銘書金鼎祚及後聖征戰罷前規孟子征之為言正也各欲正已也焉用戰晉書載記慕容垂自稱燕王苻丕遣人謂之曰君宜述脩前規終忠貞之節褚淵碑文自兹厥後無替前規霽色清珍宇南史宋文帝紀三月乙未建牙于軍門立牙之後景色開霽曹植賦去君子之清宇年華入錦陂南史徐陵傳衣冠禮樂日富年華謝朓詩年華稍菴薆漢宫殿疏鴈鶩陂蓋地六頃承昆明池下流御杯蘭薦葉酉陽雜俎魏使李同軌陸操聘梁梁主宣㫖慰勞中庭設鐘懸及百戲殿上流杯池中其行酒具進梁主者題曰御杯詩芄蘭之葉梁簡文帝詩紫蘭葉初滿黄鸝弄不稀仙仗柳交枝唐書百官志庫部郎中員外郎各一人掌戎器鹵簿儀仗陸倕賦拂細栁之長枝江總詩交枝落幔隂二石分河瀉初學記昆明池上作二石人東西相對以象牽牛織女謝靈運詩石横水分流陶𢎞景賦中天起浪分地瀉波雙珠代月移潘岳闗中記漢武習水戰作昆明池人釣魚綸絶而去夢于帝求去其鈎明日帝戲于池見魚銜索帝取其鈎放之間三日後遊池濵得珠一雙帝曰豈非昔魚之報耶新論雖有奪目之鑑代月之光歸于無用也埤雅蘆灰缺而月暈移微臣比翔泳梁簡文帝詩微臣今拜手願帝永無窮褚淵詩微臣夙多幸顔延之詩恵浸萌生信及翔泳恩廣自無涯書若涉大水其無津涯上林賦視之無端察之無涯鮑照詩天野浩無涯奉和幸韋嗣立山莊侍宴應制唐書韋嗣立傳嗣立與韋后屬疎特詔附籍營别第驪山鸚鵡谷帝臨幸従臣賦詩摐金寒野霽梁簡文帝詩驤騎農野摐金曉陸沈約詩摐金浮水若鮑照詩曀曀寒野霧朱异田飲引屬風林之蕭瑟值寒野之蒼茫步玉曉山幽潘岳賦步玉趾以升降郭璞南郊賦我后將受命靈壇乃改步而嗚玉王勃詩猿吟山漏曉詩幽幽南山漢淮南王安招隠詩桂樹叢生兮山之幽帝幄期松子顔延之曲水序帝暉臨幄百司定列王勃善寂寺碑金牓洞開道璸暉于帝幄史記留侯世家願棄人間事従赤松子游耳列仙傳赤松子神農時雨師臣廬訪葛侯蜀志諸葛亮傳建興元年封亮武鄉侯開府治事又出師表先帝不以臣卑鄙猥自枉屈三顧臣于草廬之中諮臣以當世之事百工徵往夢書允釐百工帝王世紀黄帝夢大風吹天下之塵垢皆去又夢人執千鈞之弩驅羊萬羣帝寤而歎曰天下豈有姓風名后姓力名牧者哉于是依二占求之得風后為相得力牧為將因著占夢經十二巻七聖扈來游莊子黄帝將見大隗于具茨之山方明為御昌㝢驂乘張若謵朋前馬昆閽滑稽後車至于襄城之野七聖皆迷詩豈弟君子來游來歌温子昇寒山碑鳴玉鑾以來游斗柄乗時轉國語辰在斗柄注辰日月之㑹斗柄斗前也隋煬帝詩更移斗杓轉台階捧日留後漢書郎顗傳三公上應台階魏志程昱傳注昱少時常夢上泰山兩手捧日駱賔王文歌雲輔漢捧日匡堯樹重巖籟合鮑照序重樹窮天通原盡日謝朓詩重樹日芬蒀何遜詩巖樹落髙花駱賔王詩靈巖聞曉籟泉迸水光浮鮑照詩水光溢兮松霧動庾信詩水光連岸動風花合樹吹石徑喧朝履水經注石徑崎嶇人迹裁交鮑照詩雁行縁石徑唐書輿服志赤舄朱履入朝釋奠之服璜溪擁釣舟竹書紀年注文王至磻溪之水吕尚釣于涯王下趨拜曰望公七年乃今見光景于斯尚立變姓名答曰望釣得玉璜其文曰姬受命昌來提撰爾洛鈐報在齊劉孝綽詩釣舟畫彩鷁恩加犯星夜㑹稽典錄嚴遵與世祖俱受業長安建武五年徵詣洛陽設樂陽明殿宴㑹夜留宿遂以足荷上其夜客星犯天子宿太史以聞上曰此無異朕夜與故人嚴子陵同卧耳歡擬濟河秋漢武故事帝行幸河東祠后土顧視帝京欣然中流與羣臣飲讌帝歡甚乃自為秋風辭曰泛樓船兮濟汾河横中流兮揚素波不學堯年隠空令傲許由沈約詩舜日堯年歡無極史記伯夷傳堯讓天下于許由許由不受恥之逃隠席豫字建侯襲陽人進士及第開元中累官考功員外郎典舉得士三遷中書舍人掌制誥有能名天寳初改尚書左丞檢校禮部尚書明皇登朝元閣賦詩羣臣屬和帝以豫詩最工詔曰詩人之首出作者之冠冕也奉和聖製答張説扈従出雀鼠谷唐詩紀事帝登封泰山南出雀鼠谷張説獻詩帝答之仍命羣臣應制水經汾水又南過寇爵津注汾津名也在介休縣之西南俗謂之鼠雀谷一統志䑕雀谷在汾州介休縣西南二十里唐明皇開元中北巡并州嘗經此鳴鑾初幸代史記司馬相如傳鳴和鑾揚樂頌班固西都賦大輅鳴鑾容與徘徊獨㫁天子所至曰幸元和志代州本并州之域秦置三十六郡代其一焉漢因之周宣帝移肆州於今理隋開皇五年改肆州為代州旋蓋欲横汾陸機詩坐觀旋葢迴王勃賦整旋葢而遷延漢武帝秋風辭泛樓船兮濟汾河横中流兮揚素波水經汾水在太原府汾陽縣北管涔山一統志汾河在汾州城東二十五里流經介休平遙二縣山盡千旗出宇文昶詩烟生山欲盡釋洪偃詩山盡鳥聲稀獨㫁天子出前驅有鸞旗者編羽毛列繫橦傍宋之問詩谷暗千旗出郊平五校分謝朓賦當春郊而徑平漢書衞青傳注校者營壘之稱故謂軍之一部為一校後漢書五營注五營五校也謂長水步兵射聲胡騎車騎等五校尉也漢官儀大駕鹵簿五營校尉在前前林己暄景張載詩蕭瑟掃前林劉孝威詩霧罷前林見謝靈運詩淑徳春景暄虞世南文景暖風暄後壑尚寒氛江淹文面山背壑宋之問賦陽崖奪景隂壑生風庾信詩宜年動春律御宿斂寒氛風送簫韶曲鮑照詩雁還風送秋書簫韶九成鳳凰來儀白虎通舜樂曰簫韶花鋪黼黻文書宗彛藻火粉米黼黻絺繡左傳火龍黼黻昭其文也爾雅黼黻注黼文如斧黻文如兩已相肯李嶠詩新花綺繡文鹽梅推上宰書若作和羮爾惟鹽梅王融文鹽梅之和屬有賴焉棗據詩天子命上宰作蕃於漢陽盧師道文風力上宰内敷文教禮樂統中軍漢書禮樂志禮節民心樂和民聲左傳晉作三軍謀元帥趙衰曰郤穀説禮樂而敦詩書君其試之乃使郤榖將中軍庾信文中軍無帥僉曰攸歸獻賦紆天札漢書叙傳淵哉若人實好斯文初擬相如獻賦黄門東觀漢紀班固讀書禁中每行巡輒獻賦頌急就篇簡札注札者木牒亦所以書之也飄颻飛白雲史記司馬相如傳相如奏大人之賦天子大悦飄飄有凌雲之氣似遊天地之間意庾肩吾詩無因學山藻雲氣徒飄颻漢武帝秋風辭秋風起兮白雲飛張九齡恩賜樂遊園宴應制西京記樂遊園漢宣帝所立唐長安中太平公主於原上置亭遊賞其地四望寛敞毎三月上巳九月重陽士女就此祓禊登髙幄幕雲布車馬填塞虹彩映日馨香滿路朝士詞人賦詩翌日傳於京師長安志樂游苑在京兆萬年縣南八里亦曰樂游原寳筵延厚命謝朓詩既通金閨籍復酌瓊筵醴庾信詩接禮侍恩筵詩飲御諸友疏吉甫來歸王飲之酒又進其同志之友以盡其懽又加以珍美之饌燕賜厚矣魏志管寧傳光寵並臻優命屢至供帳叙羣公漢書疏廣傳公卿大夫故人邑子祖道供帳東都門外張協詩供帳臨長衢阮卓長安道詩藹藹東都晚羣公騶御回形勝宜春接南史劉善明傳淮南近畿國之形勝漢書元帝紀水衡禁囿宜春下苑注宜春下苑即曲江池是也三輔黄圖宜春宫本秦離宫在長安城東南又有宜春下苑在京城東南隅庾信春賦宜春苑中春已歸威儀建禮同詩抑抑威儀惟徳之隅司馬彪續漢書記施行威儀以為禮儀志漢典職尚書郎主作文書起草晝夜更直建禮門梁武帝詔升榮建禮舉重縉紳呉均詩握蘭登建禮晞陽人似露詩湛湛露斯匪陽不晞嵇康詩抗首漱朝露晞陽振羽儀楊炯文仰太陽而晞湛露方預四朝解愠物従風家語舜作五絃琴歌曰南風之薰兮可以解我民之愠兮韋元旦詩欣承解愠詞劉晝文人之従君如草之従風朝慶千齡始曹植表伏見舊儀國家冬至獻履貢襪所以迎福履長先臣或為之頌臣既玩其嘉藻願述朝慶晉書禮志創千齡之英範魏徵樂章穆穆我后道應千齡沈約銘萬春方華千齡始旦年華二月中陳叔達詩金鋪照春色玉律動年華庾信詩年華改嵗隂詩二月初吉載離寒暑江總詩二月梅爭柳庾信春賦二月楊花路上飛輝光遍草木漢書李尋傳夫日衆陽之長輝光所燭萬里同晷古長歌行陽春布徳澤萬物生光輝隂鏗詩鷲嶺春光遍易百穀草木麗乎土陶潛詩孟夏草木長繞屋樹扶疎和氣發絲桐管子五和時節君服黄色味甘味聴宫聲治和氣用五數易林朱草紫芝生長和氣禮記生氣方盛陽氣發泄新論神農氏繼庖犧而王天下削桐為琴䋲絲為絃以通神明之徳合天人之和焉嵗嵗無為化謝靈運樂府嵗嵗層冰合禮記中心無為也以守至正老子我無為而民自化紀瞻對策羲皇簡朴無為而化寧知樂九功書九功維叙注六府三事也周禮春官天府掌九貢九賦九功之貳注九功謂九職也韋抗安石従父兄子弱冠舉明經累官吏部郎中以清謹著稱遷御史中丞開元中自左庶子出為益州長史入拜黄門侍郎終刑部尚書奉和聖製送張説上集賢學士賜宴得西字唐書張説傳字道濟又百官志集賢殿書院學士直學士侍讀學士掌刋緝經集凡圖書遺逸賢才隠滯則承㫖以求之廣庭臨璧沼隋書音樂志華鍾震廣庭左思呉都賦憲紫宫以營室廓廣庭之漫漫唐書歸崇敬傳古天子學曰辟雍在禮為澤宫故前世或曰璧池或曰璧沼多士侍金閨詩思皇多士生此王國晉書樂志多士盈朝莫匪俊徳潘岳文入侍帝闥出光厥家謝朓詩既通金閨籍復酌瓊筵醴江淹别賦金閨之諸彦注金閨金馬門也英宰文儒叶王勃上劉右相書英宰與千齡合運晉書儒林傳序逮於孝武崇尚文儒南史宋文帝紀帝聰明仁厚雅重文儒明君日月齊何承天詩願我聖明君遐期保萬春周捨鞞舞歌明君班五瑞易與日月合其明禮記天子者與天地參徳配天地兼利萬物與日月並明照四海而不遺微小楚辭與日月兮齊光集賢光首拜改殿發新題唐書張説傳説倡封禪議帝召説與禮官學士置酒集仙殿曰朕今與賢者樂於此當遂為集賢殿乃下制改麗正書院為集賢殿書院而授説院學士知院事沈約齊丞相文憲王碑徳惟民望位冠朝首庾信銘譬韓信之登壇榮髙獨拜隋書元善傳善遷國子祭酒講春秋初發題諸儒畢集何妥引古今滯義以難善早夏初移律魏文帝賦伊暮春之既替即首夏之初期隋煬帝歌風亭芳樹迎早夏劉憲詩摘荷纔早夏禮記孟夏律中中吕餘花尚拂溪謝朓詩鳥散餘花落邢邵詩餘花尚滿枝庾信望春詩落花何暇拂水經注長楊溪側生異花路人欲摘者皆當先請不得扳取壺觴接雲上晉書陶潛傳引壺觴以自酌唐書張説傳帝宴集賢院故事官重者先飲説曰吾聞儒以道相髙不以官閥為先後於是引觴同飲易雲上於天需君子以飲食宴樂經術引闗西漢書東平思王傳尊修經術親近仁人後漢書楊震傳震少好學明經博覽無不窮究諸儒為之語曰闗西孔子楊伯起聖徳鴻名逺史記五帝紀髙陽有聖徳是謂帝顓頊晉書樂志聖徳廣運期天地不能違曹植文王賛於赫聖徳實惟文王史記司馬相如傳前聖之所以永保鴻名而常為稱首者用此將陪玉檢泥漢書武帝紀注王者功成治定告成功於天刻石紀號有金策石函金泥玉檢之封續漢書光武封禪乃求元封故事有司奏用玉牒玉檢水銀和金為泥盧僎相州人吏部員外郎上幸皇太子新院應制佳氣曉蔥蔥後漢書光武紀望氣者蘇伯阿至南陽遙望見舂陵郭曰氣佳哉鬱鬱蔥蔥然袁奭詩平原與上洛佳氣逺蔥蔥乾行入震宫易天行健君子以自强不息又説卦傳乾為君震為長子庾信詩木徳舞震宫前星迎北極漢書五行志前星太子劉孝威和太子詩前星涵瑞彩爾雅北極謂之北辰晉書天文志北極北辰最尊者也其紐星天之樞也庾信詩五城鄰北極少海被南風山海經無臯之山南望幼海郭璞注即少海也淮南子東方大渚曰少海梁簡文帝詩隠淪遊少海神仙入太華帝舜歌南風之薰兮可以解吾民之愠兮視饍銅樓下左傳太子奉祀社稷之粢盛以朝夕視君饍者也漢儀皇太子五日一至臺因坐東廂省視饍食漢書成帝紀帝為太子初居桂宫上嘗急召太子出龍樓門注門樓上有銅龍王勃九成宫頌序鶴禁朝趨離象峻銅樓之景吹笙玉座中列仙傳王子喬好吹笙作鳳皇鳴遊伊洛之間劉孝威和太子詩浮丘侍玉笙又停鸞對寳座辨論悦人天訓深家以正宋書禮志訓深劭農政髙刑措易父父子子兄兄弟弟夫夫婦婦而家道正正家而天下定矣義舉俗為公左思魏都賦籍田以禮動大閱以義舉禮記大道之行也天下為公父子成釗合史記周本紀成王太子釗是為康王君臣禹啟同史記夏本紀禹子啟賢天下屬意焉仰天歌聖道史記滑稽傳淳于髠仰天大笑孫楚詩仰天唯龍御地以驥禮記大哉聖人之道猶愧乏雕蟲揚子或問吾子好賦曰然童子雕蟲篆刻俄而曰壯夫不為也孫逖奉和李右相中書壁畫山水舊唐書職官志天寳元年侍中改為左相中書令改為右相明皇紀天寳元年八月壬辰吏部尚書兼右相李林甫加尚書左僕射廟堂多暇日後漢書班固傳固奏記東平王蒼曰將軍養志和神優游廟堂王粲賦聊暇日以銷憂山水契中情王濟詩仁以山悦水為知歡謝靈運詩山水含清暉謝朓詩望山白雲裏望水平原外楚辭孰云察余之中情欲寫髙深趣陳書顧野王傳野王好丹青善圖寫魏武帝樂府山不厭髙水不厭深何遜詩暫有江山趣還因繪藻成漢書劉勰傳案轡文雅之場而環絡藻繪之府梁元帝銘義若聨環文同藻繪淮南子無色而五色成新語無膏澤而光潤生不刻畫而文章成九江臨户牗書九江孔殷賈誼書禹鑿江而導之九路潯陽記九江一曰烏白江二曰蜯江三曰烏江四曰嘉靡五曰畎江六曰源江七曰廩江八曰提江九曰菌江洛陽伽藍記風生户牗阮籍詩蟋蟀在户牗三峽遶檐楹峽程記三峽者即明月峽仙山峽廣澤峽也其有瞿唐灔澦燕子屏風之類皆不預三峽之数荆州記漁者歌曰巴東三峽巫峽長一統志巫峽在巫山縣東三十里與西陵峽歸峽並稱三峽儀禮豫則鉤楹内堂則由楹外注鉤楹繞楹而東也豫讀如榭凡屋無室曰榭梁元帝詩佳氣滿檐楹廣韻楹柱也花柳窮年發王容詩入花花不見穿柳柳隂碎庾信賦落花與芝葢同飛楊柳共春旗一色莊子和之以天倪因之以曼衍所以窮年也劉孝威詩花發是初開王襃詩細柳發新春烟雲逐意生西都賦紅塵四合烟雲相連徐陵詩烟雲表色日月呈瑞庾信賦細草横階隨意生顔延之詩山烟冐壠生裴讓之詩絶野寒雲生能令萬里近郭璞江賦呼吸萬里吐納靈潮江淹賦暫遊萬里少别千年謝朓詩徒念闗山近終知返路長不覺四時行楞嚴經變化宻移我誠不覺寒暑遷流漸至於此易與四時合其序書以閏月定四時成嵗論語四時行焉氣染荀香馥楞嚴經如染香人身有香氣晉書荀勗字公曽潁川潁隂人司空爽曽孫也太康中守尚書令襄陽記荀令君至人家坐幙三日香氣不歇陶潛詩秋蘭氣當馥徐陵書尋香馥以生心光含樂鏡清晉書皇甫謐傳泰液含光元氣混蒸秋興賦月朣朦以含光兮露凄清以凝冷世説衞伯玉見樂廣與中朝名士談議竒之曰此人人之水鏡也見之若披雲霧暏青天虞預晉書樂廣字彦輔南陽人代王戎為尚書令韓非子鏡執清而無事美惡従而比焉詠歌齊出處晉書樂志序夫性靈之表不知所以發於咏歌又文苑傳情之所適發乎詠歌易君子之道或出或處蔡邕表䕶羌校尉皇甫規出處抱義皎然不汚圖畫表沖盈梁元帝詩繞砌縈流水邊梁圖畫雲庾信表玉門亭障無勞圖畫陸機演連珠山盈川沖后土所以播氣自保千年遇北史髙允傳終辭寵命以之自保拾遺記黄河千年一清至聖之君以為大瑞庾信詩洽斯百禮福以千年袁宏三國名臣序賛千載一遇賢智之嘉㑹何論八載榮自注李公詩云八載忝司存戰國策富貴顯榮成理萬物杜甫奉和嚴中丞西城晚眺十韻唐書嚴武傳至徳初赴肅宗行在上皇合劍南為一道擢武劍南節度使還拜京兆尹復節度劍南最厚杜甫汲黯匡君切史記汲黯傳拜中大夫以數切諫不得久留内遷為東海太守孟子一正君而國定矣亷頗出將頻史記亷頗傳㢘頗者趙之良將也伐齊取晉陽拜為上卿以勇氣聞于諸侯詩我出我車疏云我車者以出車本為將帥出車纔訖王即命已為將則將帥之車為我所乗直詞才不世謝靈運賦據忠辭于呉朝執義説于梁庭漢書杜周傳朱博忠信勇猛材畧不世出顔氏家訓古人云千載一聖五百年一賢倘遭不世明達君子安可不攀附景仰之乎雄畧動如神後漢書荀彧傳彧聞曹操有雄畧而度袁紹不能定大業乃去紹従操晉書宣帝紀論雄畧内㫁英猷外决禮記清明在躬志氣如神班固答賔戲炎之如日威之如神政簡移風速史記齊世家至國修政因其俗簡其禮禮記移風易俗天下皆寧賈誼陳政事疏夫移風易俗使天下回心而嚮道類非俗吏之所能為也漢書韓延夀傳賛延夀厲善所居移風詩清立意新詩吉甫作頌穆如清風史記刺客傳賛自曹沫至荆軻五人此其義或成或不成然其立意較然不欺其志南史徐陵傳其文頗變舊體多有新意層城臨暇景淮南子崑崙山有層城九重應瑒馳射賦朱騎風馳雕落層城梁元帝序求瘼餘晨頗多暇景唐太宗詠續漢志詩粤予承暇景談叢引衆祕絶域望餘春漢書武帝紀詔州郡察吏民有茂才異等可為將相使絶域者晉書文帝紀九服之外絶域之氓浮海來享鼓舞王徳梁簡文帝晚春賦待餘春於北閣藉髙讌于南陂旂尾蛟龍㑹爾雅繼旐曰斾注帛續旐末為燕尾者後漢書輿服志宫殿門吏僕射負赤幡青翅燕尾詩周公之孫莊公之子龍旂承祀周禮春官司常交龍為旂禮記黿鼉蛟龍書日月星辰山龍華蟲作㑹抱朴子羣色㑹而衮藻麗樓頭燕雀馴大戴禮魚鳥皆生于隂而屬于陽故冬燕雀入于海化而為蚧史記日者傳騏驥不能與罷驢為駟鳳凰不能與燕雀為羣蘇頲詩閒花傍户落喧鳥逼檐馴地平江動蜀書地平天成六府三事允治越絶書聖人上知天下知地中知人此之謂天平地平書岷山導江東别為沱左思蜀都賦邑居隠賑夾江傍山天闊樹浮秦孟子天之髙也蘇頲詩豐樹連黄葉圅闗入紫雲帝念深分閫書禹曰於帝念哉後漢書李王鄧來傳賛王常知命功惟帝念漢書馮唐傳古者命將跪而推轂曰閫以外將軍制之劉憲送張亶詩分閫恩何極臨岐動睿篇軍須逺算緡唐書鄭珣瑜傳軍須期㑹為急案軍須師旅之費也漢書武帝紀四年有司言闗東貧民徙隴西北地西河上郡㑹稽縣官衣食振業用度不足初算緡錢注師古曰有儲積錢者計其緡貫而税之花羅封蛱蝶唐書百官志織染署掌供織絍色染錦羅紗穀綾紬絁絹布又地理志成都府蜀郡土貢錦單絲羅瑞錦送麒麟舊唐書外戚傳則天出大内瑞錦造佛像王洙注蛱蝶麒麟羅錦上絲繡也師古注算緡衰世之法今蜀貢花羅瑞錦以應軍須與算緡者逺矣辭第輸髙義史記霍去病傳天子為治第令驃騎視之對曰匈奴未滅無以家為也初學記出不由里門面大道者名曰第史記田敬仲世家救趙髙義也却秦兵顯名也又藺相如傳舍人曰臣所以去親戚而事君者徒慕君之髙義也觀圖憶古人裴秀九州地域圖序文皇帝命有司撰呉蜀地圖蜀土既定六軍所經地域逺近山川險易征路迂直校驗圖記罔有或差詩我思古人寔獲我心禮記儒有今人與居古人與稽征南多興緒晉書杜預傳羊祜舉預自代因以本官假節行平東將軍領征南軍司王勃詩中川興緒遙蔡夢弼注興緒者興况意緒也事業闇相親易美在其中而暢于四支發于事業管子道徳出于君制令傳于相事業程于官蔡夢弼注杜預開府荆州領征南將軍公嘗譜預為祖而公與嚴武有世舊故以預之事業言與武相近也闇相親者深欲倚以成功業也奉觀嚴鄭公㕔事岷山沲江畫圖十韻得忘字全唐詩注嚴武字季鷹華州人歴劒南節度使累遷吏部尚書封鄭國公書岷山導江東别為沱唐書地理志茂州汶山縣有岷山寰宇記沲水在成都府新繁縣沲水流中座爾雅水自江出為沱注沱水自蜀郡都水縣揃山與江别而更流張華詩仰䕃髙林茂俯臨緑水流張衡西京賦促中堂之陿座陳子昂文翠渚洪瀾交流合座岷山到此堂郭璞岷山賛岷山之精上絡東井張載詩西瞻岷山嶺嵯峩似荆巫楚辭白蜺嬰茀胡為此堂白波吹粉壁莊子白波若山海水震蕩顧野王舞影賦圖長袖于粉壁劉孝綽詩浮光亂粉壁青嶂插雕梁沈約詩崚嶒起青嶂唐太宗詩碧嶂插遙天任昉詩翠葉映雕梁江總詩芙蓉作帳照雕梁直訝杉松冷爾雅杉曰柀煔疏柀一名煔俗作杉似松生江南詩南有喬松江淹杉頌桐梓舊麗松栝稱竒兼疑菱荇香劉歆甘泉賦芙蓉菡萏菱荇蘋蘩武陵記兩角曰菱爾雅疏荇菜一名接余儲光羲詩遲遲菱荇上劉孝威詩風荇散餘香雪雲虛㸃綴西京雜記雪雲曰同雲晉書謝朗傳朗子重為㑹稽王道子驃騎長史嘗因侍坐於時夜月明凈道子歎以為佳重率爾曰意謂不如微雲㸃綴張九齡詩枝従㸃綴新沙草得微茫楊炯詩緑草覆江沙陳子昂詩髙丘正微茫張九齡詩渺蔓野中草微茫空裏烟嶺鴈隨毫末江逌詩鳴雁薄雲嶺老子合抱之木生于亳末川霓飲練光宋之問詩丹壑飲青蜺駱賔王啟登小魯之巖辨練光於曳馬又詩練光搖亂馬霏紅洲蘂亂謝朓詩散蕚初攅紫餘采尚霏紅梁簡文帝賦競紅蕋之晨舒元萬頃詩花輕藥亂仙人杏拂黛石蘿長周南詩拂黛雙蛾飛江淹詩水苔方下蔓石蘿日上尋王勃賦長蘿巨樹梢翳雲日暗谷非闗雨江總詩暗谷留征鳥空林徹夜鐘張循之巫山髙暗谷疑風雨幽岩若鬼神丹楓不為霜漢宫雜記漢宫殿中植楓故曰楓宸至霜後葉丹可愛騷人多稱之謝靈運詩晚霜楓華丹秋成𤣥圃外莊子得秋而萬寳成十洲記崑崙山三角其正西名曰𤣥圃堂張協遊仙詩崢嶸𤣥圃深景物洞庭傍王臺卿詩景物共依遲鮑照舞鶴賦雰昬夜歇景物澄廓楚辭邅吾道兮洞庭劉孝綽詩洞庭春水緑繪事功殊絶論語繪事後素蘇頲繡阿彌陀像賛序爰縷陳于法象仍繡揚于繪事諸葛亮出師表曹操智計殊絶於人幽襟興激昂唐明皇詩方外散幽襟揚雄解嘲激昂萬乗之主従來謝太傅丘壑道難忘晉書謝安傳安雖放情丘壑然每遊賞必以伎女従雖受朝寄然東山之志始末不渝周若水詩弱齡愛丘壑李嶠詩求炙遂難忘祖詠清明宴司勲劉郎中别業周禮夏官司勲掌六卿賞地之法以等其功唐書百官志吏部司勲郎中一人員外郎二人掌官吏勲級田家復近臣魏志夏侯尚傳王經始為郡守母曰汝田家子今仕至二千石可以止矣應璩詩田家無所有酌醴焚枯魚書綴衣虎賁疏綴衣是掌衣服者虎賁是以武力事王者皆左右近臣宜得其人禮記近臣守和宰正百官行樂不違親謝朓詩攜手共行樂庾信詩栖心浴日館行樂止雲墟後漢書郭泰傳或問汝南范滂曰郭林宗何如人滂曰隠不違親貞不絶俗霽日園林好王融渌水曲日霽沙溆明風泉動華燭駱賔王詩日霽崤陵雨顔延之文桂椒信芳而非園林之實陶潛詩靜念園林好清明烟火新淮南子明庶風至四十五日清明風至白帖春分後十五日斗指乙為清明唐㑹要清明取榆柳之火以賜近臣順陽氣李嶠詩槐烟乘曉散榆火應春開江淹詩歸人望烟火北史王邵傳新火舊火理應有異以文長㑹友論語曽子曰君子以文㑹友宗欽詩以文㑹友友由知己梁昭明太子啟昔時文㑹長思風月之交晉書嵇阮劉畢傳論嵇阮竹林之㑹劉畢芳樽之友惟徳自成隣論語徳不孤必有鄰懐舊賦歡攜手以偕老庶報徳之有鄰劉孝綽詩但願崇明徳毋謂徳無鄰池照牕隂晚江淹詩華月照芳池鮑照詩朗月出東山照我綺窻前梁簡文帝詩落照度空窻又窗隂隨影度水色帶風移邢邵詩日斜賔館晚杯香藥味春庾信詩杯香酒絶濃漢書藝文志經方者本草木之寒溫量疾病之淺深假藥味之滋因氣感之宜簷前花覆地唐太宗詩元燕舞簷前江總詩春風送燕入簷窺暗開脂粉弄花枝丘遲詩共取落簷花范雲詩徙根楚州上來覆廣庭隅宋之問詩塔影香花地竹外鳥窺人謝朓新治北牕詩池北樹如浮竹外山猶影喬知之詩竹外仙亭出花間輦路分呉均詩竹中窺落日鶡冠子籠中之鳥空窺不出何必桃源裏陶潛桃花源記武陵人捕魚為業忽逢桃花林夾岸林盡水源便得一山山有小口便捨舟従口入土地平曠屋舍儼然男女衣著悉如外人自云先世避秦時亂率妻子邑人來此絶境不復出焉深居作隠淪呉越春秋孫子者名武呉人也避隠深居桓子新論天下神人五二曰隠淪參同契服煉九鼎化跡隠淪滕珦東陽人歴茂王傅太和初以右庶子致仕四品給劵還鄉自珦始釋奠日國學觀禮聞雅頌禮記釋奠于學唐書髙祖紀武徳七年二月丁巳釋奠于國學潘尼釋奠頌序天子乃命内外羣臣百辟卿士蕃王三事至於學徒國子咸來觀禮詩大序詩有六義一曰風二曰賦三曰比四曰興五曰雅六曰頌史記樂書聖王使人耳聞雅頌之音目視威儀之禮太學時觀禮禮記食三老五更於太學所以教諸侯之弟也大戴禮帝入太學承師問道後漢書儒林傳中元二年初建三雍明帝親行其禮祖割辟雍之上尊養三老五更饗射禮畢帝正坐自講諸儒執經問難於前冠帶縉紳之人圜橋門而觀聴者蓋億萬計注圜繞也蘇頲詩張樂擁槁觀東方曉色分易萬物出乎震震東方也詩東方明矣朝既昌矣李白詩白帝更聲盡陽臺曉色分威儀何棣棣詩敬慎威儀維民之則又威儀棣棣不可選也傳棣棣富而閑習也唐中宗五郊樂章文物棣棣聲明濟濟環佩又紛紛禮記行步則有環佩之聲杜審言詩袨服鏘環佩史記天官書若烟非烟若雲非雲郁郁紛紛古樂従空盡禮記魏文侯曰吾端冕而聴古樂魏志杜夔傳太祖以夔參太樂事夔聰思過人絲竹八音靡所不能于是逺考諸經近采故事教習講肄備作樂器紹復先代古樂皆自夔始也馬融長笛賦曲終闋盡李白詩曲盡星河稀清歌㡬處聞張衡賦並詠詩而清歌陶潛詩清歌散新聲上官儀詩清歌臨太液李白詩尋花㡬處行喬知之詩天樂鳳簫聞六和成逺吹漢書郊祀志凡六樂奏六歌而天墜神祇之物皆至白虎通笙有七政之節有六合之和梁需雅樂歌五味九變兼六和書簫韶九成疏成終也盧思道詩浮清帶逺吹九奏動行雲周禮春官九奏乃終謂之九成初學記凡樂作謂之奏史記趙世家簡子寤語大夫曰我之帝所甚樂與百神遊於鈞天廣樂九奏萬舞不類三代之樂揚雄文雲動風掩何遜詩水底見行雲聖上尊儒樂後漢書第五倫傳毎讀詔書常歎息曰此聖主也一見决矣王襃聖主得賢臣頌遇明君遭聖主後漢書謝該傳楚人止孫卿之去國漢朝追匡衡于平原尊儒貴學惜失賢也晉書儒林傳序尊儒勸學亟降于綸言漢書武帝紀令禮官勸樂以為天下先春秋奠茂勲詩春秋匪懈享祀不忒孝經春秋祭祀以時思之唐書禮樂志進奠于神座前晉書元帝紀茂勲格于皇天清輝光於四海梁武帝詔匪直茂勲義兼懐樹幸因陪齒列李嶠詩明禋萬國陪鮑照詩陳鐘陪夕讌禮記燕毛所以序齒也又雖有貴者以齒疏言宗族在内朝雖貴猶與賤者計年以為齒列者欲明父子昭穆之本恩故也潘尼釋奠頌序今厠未列親覩盛美聊以頌斯文崔駰序工歌其詩賢陳其頌書之庸器列在明堂衞恒四體書勢鳥遺跡皇頡循聖作則制斯文陸機文賦慨投篇而援筆聊宣之於斯文白行簡字知退居易之弟貞元未第進士累官度支郎中有兄風嘗従居易謫所天性友愛當時無比集二十巻咏夫子鼓琴得其人韓詩外傳孔子學琴于師襄子曰丘得其意未得其人有間曰丘巳得其人矣未得其類也有間邈然長望曰洋洋乎翼翼乎其唯文王之間乎宣父窮𤣥奥唐書禮樂志貞觀十一年詔尊孔子為宣父作廟于兖州給户二十以奉之嘯賦研道徳之𤣥奥蔡邕李子材碑鈎深極奥窮覽妙㫖師襄受素琴洞簫賦師襄嚴春不敢竄其巧兮晉書陶潛傳性不解音而蓄素琴一張王績賦鳳翮龍唇之素琴稍殊流水引韓詩外傳伯牙鼔琴鍾子期聴之方鼓琴志在髙山鍾子期曰善哉鼓琴巍巍乎如太山志在流水鍾子期曰善哉鼓琴洋洋乎若江河全辨聖人心嵇康琴賦體清心逺邈難極兮揚子聖人之道羣心之用也又琴瑟不鏗吾則無以見聖人矣慕徳聲餘感易林白雉羣雊慕徳貢朝徐陵文白環玉玦慕徳而臻禮記正聲感人而順氣應之易同聲相應同氣相求疏聲氣相感也懐仁意自深書民罔常懐懐于有仁後漢書嚴光傳懐仁輔義天下悦梁書鍾嶸傳若専用比興則患在意深深則辭躓泠泠傳妙手蘇武詩請為遊子吟泠泠一何悲湘中記衡山有懸泉滴瀝巖間泠泠如絃樂府解題伯牙天下妙手鮑照賦單蓲陽之妙手摵摵振空林張九齡詩嵗陽亦頽止林意日蕭摵謝靈運詩清霄颺浮烟空林響法鼓促調清風至張協七命器舉樂奏促調髙張陸機樂府絃促催人春風秋月古詩穆穆清風至吹我羅衣裾張九齡詩清風閶闔至操絃白日沈舊唐書衞次公傳次公由是終身未嘗操絃江淹賦紫霞沒白日沈隂鏗詩昬昬隴日沈潘徽詩日沈山氣合曲終情不盡樂府解題曲終成連操舟而至劉楨賦縦修袖以終曲江總起坐彈鳴琴詩曲奏楚妃情今古仰知音闗尹子其來無今其往無古禮記不知聲者不可與言音不知音者不可與言樂劉希夷詩清泠有真曲樵采無知音春従何處來呉均詩春従何處來拂水復驚梅欲識春生處梁簡文帝梅花賦梅花特早偏能識春春秋繁露少陽因木而起助春之生也薛道衡詩故年隨夜盡初春逐曉生先従木徳來禮記先立春三日太史謁之天子曰某日立春盛徳在木隋青帝歌震宫初動木徳惟仁入門潛報柳古詩入門時左顧杜甫詩漏泄春光有栁條度嶺暗驚梅宋之問詩度嶺方辭國嵗華紀麗鴈向北而嶺邊先暖何遜詩兔園標物序驚時最是梅白帖大庾嶺上梅南枝落北枝開透雪寒光散庾肩吾詩寒光晦八極劉長卿詩初開窻閣寒光滿消冰水鏡開張正見詩雪盡青山路冰消緑水池唐太宗詩冰消出鏡水梅散入風香邢邵甘露頌川停岳路雲臨水鏡曉迎郊騎發禮記立春之日天子親率公卿大夫以迎春于東郊夜逐斗杓迴史記天官書斗杓所指以建時孝經緯大寒後十五日斗指東北維為立春孟浩然詩昬見斗柄迴方知星嵗改淑氣空中變沈約詩淑氣婉晨登天行聳雲斾唐太宗詩淑氣動芳年列子夫天地空中之一細物新聲雨後催庾信詩昨夜鳥聲春驚啼動四鄰唐太宗首春詩寒隨窮律變春逐鳥聲開偏宜資律吕應是候陽臺爾雅律為之分疏伶倫取竹嶰谷以為黄鍾之宫制十二筩以聴鳳鳴其雄鳴為六律雌鳴為六吕禮記孟春之月律中太蔟物理論立春日取𢎞農宜陽金門山竹為管河内葭草為灰以候陽氣嵗華紀麗魯雲爰紀于候臺葉元良爵里無考御製段太尉碑唐書段秀實傳徳宗朝加檢校禮部尚書宰相楊炎欲城原州秀實不可以為沮已使迎朱泚泚召計事語及禪位秀實勃然奪笏擊泚中顙流血衊面匍匐走秀實大呼曰我不同反何不殺我遂遇害帝在奉天恨用不極才垂涕悔恨貞元元年詔贈太尉諡曰忠烈又詔致祭旌其門親銘其碑多難全髙節詩未堪家多難南史陳髙祖紀重舉義兵實戡多難漢書昭帝紀蘇武奉使全節楊炯詩懦夫仰髙節時清軫聖君唐太宗詩威加四海清李白詩再覩天地清令狐峘詩澹泊調元氣中和美聖君園塋標石篆顔延之詩崇樹加園塋廣韻塋墓域張仲素碑纂篆金石琢磨堅貞雨露降天文淮南子甘雨膏露以時降武元衡詩堯年雨露多虞世南詩天文徒可仰義激忠貞沒岑參詩感通君臣分義激魚水契書世篤忠貞左傳臣敢不竭其股肱之力加之以忠貞詞傷蘭蕙焚後漢書趙壹傳蘭蕙化為芻卞敬宗文蘭焚原火南史劉峻傳馮敬通雖芝殘蕙焚而為名賢所慕郁烈芬芳久而彌篤國人皆墮淚孟子國人皆曰賢晉書羊祜傳祜卒襄陽百姓建碑立廟於峴山嵗時饗祭望其碑者莫不流涕因名墮淚碑王府己銘勲周禮夏官有功者書于王之太常司勲詔之魏志公孫淵傳功隆事大勲蔵王府國語魏顆退秦軍于輔氏其勲銘于景鐘揭出臨新陌廣韻揭髙舉也杜牧文標揭峙倚謝朓賦臨舊途之永陌長留對古墳杜甫詩詩巻長留天地間張謂文表古初之墳足以敦素行盧綸詩一樹繁花對古墳睿情幽感處張正見詩流襟動睿情源乾曜詩崇恩幽發睿情李嶠詩睿感通三極天誠貫大應使九泉聞盧思道詩深泉閉九重論語使之聞之舒元輿婺州東陽人元和中登進士第調鄠尉裴度表掌興元書記拜監察御史遷刑部員外郎改著作郎分司東都再遷左司郎中權知御史中丞不三月即真兼刑部侍郎月中以本官同中書門下平章事履春冰投跡清冰上孫綽庾司空碑髙揖帷幙投跡藩屏顔延之詩投跡階王庭謝朓鏡臺詩對鳳懸清冰垂龍挂明月鮑照詩清如玉壺冰杜甫入奏行炯如一段清冰出萬壑置在迎風露寒之玉壺晉書索紞傳孝亷令狐策夢立冰上與冰下人語紞占曰冰上為陽冰下為隂士如歸妻迨冰未泮婚姻事也君當為人作媒冰泮而成凝光動早春張協安石榴賦柔膚冰潔凝光玉瑩唐太宗小池賦碧沼凝光楚辭獻嵗發春兮汨吾南征傅休奕詩美徳揚初春兢兢愁陷履詩戰戰兢兢如臨深淵如履薄冰蜀志吕覬傳譬如野火在原蹈履淵冰火滅冰泮將何所依附步步怯移身梁元帝烏棲曲蘭房椒閣夜方開那知步步香風逐張説詩鳴笳步步引南薰陳後主樂府轉身移佩響牽袖起衣香徐陵諫深法師書形去心留身移意往鳥照微生水詩誕寘之寒冰鳥覆翼之庾信詩照水燃犀角沈約賦天淵池鳥集水漣漪狐聴或過人述征記狐欲渡河冰先聴無水聲而後過水經注孟津河冰始合車馬不敢過要須狐行云此物善聴冰下無水乃過人見狐行方渡細遷形外影張説賦感四時之黙運知萬化之潛遷莊子今我與子遊於形骸之内而責我於形骸之外不亦病乎博物志削冰令圓舉以向日以艾承其影則有火出陸雲詩我非形影有處有遊輕躡鏡中輪吕安與嵇康書思躡雲梯横奮八極髙適詩飛步躡雲衢晉書王羲之傳毎行山隂道上如鏡中遊駱賔王詩月滿鏡輪圓咫尺憂偏逺左傳天威不違顔咫尺注八寸曰咫徐幹答劉揁詩雖路在咫尺難涉如九闗後漢書逸民傳論鴻飛冩冥弋者何慕焉言違患之逺也危疑懼已頻書慄慄危懼潘岳賦懼身危而施重兮若履冰而臨谷説文頻數也廣韻連也願堅容足分禮記季冬之月水澤腹堅後漢書王霸傳光武南馳及虖沱河無船不可濟令霸往視霸還詭曰冰堅可渡比至河冰亦合列子㤗豆立木為塗僅可容足履之而行無跌失也莫使獨驚神江淹别賦使人意奪神駭心折骨驚杜甫别鄭鍊師詩把君詩過日念此别驚神鄭蕡爵里無考春臺晴望追賞層臺迥劉孝綽詩言追河曲遊江淹詩懐賞入舊襟老子九層之臺起於累土孫楚賦層臺隠天孔徳紹詩層臺聳迥靈鷲王襃詩建章樓閣登臨四望頻晉書陶潛傳登東臯以舒嘯臨清流而賦詩南史王裕之傳所居亭山林澗環周備極登臨之美楊師道詩登臨日將晚晉書王徽之傳月色清朗四望皓然杜審言詩層城四望開熙熈山雨霽老子衆人熙熙如登春臺東觀漢記山出雲為雨張正見詩山雨濕苔碑爾稚雨止為霽宋之問詩山雨初含霽宋玉髙唐賦風止雨霽雲無處所江總詩霢霂時雨霽濯濯栁條新晉書王恭傳恭美姿儀人多愛悦或目之曰濯濯如春月栁喬知之詩可憐濯濯春楊柳梁簡文帝詩柳條恒著地荆州記緣城堤邊悉植細柳緑條散風清隂交陌唐太宗詩無絲柳尚新草長秦城夕古詩草長條風舒南史陳伯之傳暮春三月江南草長史記秦始皇紀三十四年適治獄吏不直者築長城庾信詩隴水向秦城杜甫詩秦城近斗杓盧思道詩鳥散空城夕花明漢苑春駱賔王詩花明鹿苑春王維詩栁暗百花明李白詩一溪初入千花明初學記漢有上林樂遊博望黄山鴻徳畢圭靈崑廣成諸苑蕭至忠詩朱旗巡漢苑張説詩漢苑佳遊地晴林翻去鳥白居易詩林晴有殘蟬王維詩白鳥向山翻謝朓賦孤蟬已散去鳥成行張九齡詩去鳥投前邨李白詩長空去鳥沒紫陌度遊人梁簡文帝詩紫陌垂青柳劉孝綽詩紆餘出紫陌梁元帝詩况此客遊人中宵空佇立甘澤謠許雲封嘗謂韋應物曰落梅流韻感金谷之遊人旅客風塵厭李白春夜宴桃李園序天地者萬物之逆旅光隂者百代之過客班固答賔戲彼皆躡風塵之㑹世説王戎云太尉神姿髙澈如瑤林瓊樹自是風塵外物論衡遊於都邑者心厭山家夢寐親張謂詩邑宰陶元亮山家鄭子真杜甫詩山家蒸栗暖謝靈運詩夢寐佇歸舟杜甫詩相對如夢寐遷鶯思出谷詩出自幽谷遷于喬木梁昭明太子啟啼鶯出谷爭傳求友之聲陽慎詩軒樹已遷鶯丁位詩従此接遷鶯鶱翥待芳辰張衡西京賦鳳鶱翥於甍標咸遡風而欲翔張説文超騰白地鶱翥青雲梁元帝纂要春曰青春辰曰芳辰李嶠詩剪綵學芳辰獨孤良弼貞元間進士官左司郎中上已接清明遊宴韓詩章句鄭俗上已秉蘭祓除嵗時記上已賜宴曲江都