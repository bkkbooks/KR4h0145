度盡松風聲髙適鶻賦望鳳沼而輕舉紛羽族以驚猜獨孤及詩公遊鳳凰沼獻可在筆端安知幽澗側郭璞江賦幽澗積阻礐硞䃕確孔稚圭薦杜京産表茸宇窮巖采芝幽澗劉孝綽詩喬柯變夏葉幽澗潔凉泉獨與散樗叢詩采荼薪樗食我農夫莊子我有大樹人謂之樗其大本擁腫而不中繩墨其小枝巷曲而不中規矩虞世南詩多幸霑行葦無庸類散樗趙蕃登元和進士第薦冰舊唐書禮儀志唐禮四時各以孟月享太廟若品物時新堪進御者太常卿奉薦于太廟不出神主薦冰亦如之仲月開凌室禮記仲春之月天子乃鮮羔開冰先薦寝廟詩三之日納于凌隂傳凌隂冰室也白帖冰室春開沈約謝勅賜冰啟凌室曠官歴兹永久齋心感聖情王昌齡詩齋心問易太陽宫八卦真形一氣中孔徳紹詩和雲留睿賞薰風悦聖情張説詩凝規寫聖情寒姿分玉座李白詩秋宵晦寒姿江淹詩玉座猶寂寞皓彩發丹楹沈君攸詠冰詩日華照賦冰彩灼爍自相明王粲色光潤而彩發兮似孔翠之揚精左思呉都賦雕欒鏤楶青鎖丹楹任昉詩緑條發丹楹積素因風壯謝恵連雪賦積素未虧向日朝鮮又詩積素惑原疇注禮記仲冬之月冰始壯左傳夫冰以風壯而以風出因寒風而堅壯順春風而散用富嘉謨明冰篇憶昨沙朔寒風漲崑崙長河冰始壯虚空向日明駱賔王詩潭虛夕照空博物志削冰令圓舉以向日以艾承其影則有火出張正見詩向日玉釵明王融詩永與朝日明遙涵窗户冷郭璞詩風出窻户裏何遜詩窻户映朝光李白詩寒月搖輕波忽在窓户間近暎冕旒清禮記天子之冕朱緑藻十有二旒世本黄帝作冕旒沈佺期詩朝光映冕旒在掌光逾徹曹植詩利劍不在掌結友何須多顧愷之冰賦清流離之光徹當軒質自輕王績詩日照當軒影顧愷之冰賦激厲風而貞質沈君攸詠冰詩陽岸己全輕良辰方可致由此表精誠左思詩逍遙撰良辰梁元帝纂要春曰青陽辰曰良辰隋圜丘歌肅祭典協良辰宋書禮志丘景曰郊望山凟以質表誠後漢書章帝紀詔曰羣工庶尹各推精誠専急人事班彪王命論精誠通于神明李白詩蒼昊感精誠髙弁貞元十二年進士第省試春臺晴望層臺聊一望老子九層之臺起於累土齊竟陵王蕭子良詩月殿風轉層臺起寒韋應物詩晴明一登望瀟灑此幽襟髙適詩倚檝時一望遍賞帝城春水經注勝賞神鄉秀情超拔王維詩雲裏帝城雙鳳闕趙彦昭詩憑髙隴首帝城春李子卿春雪詩影落鳳城春風暖聞啼鳥鮑照賦風暖凌開土昌泉動岑參詩風暖日暾暾黄鸝飛近邨樂府前溪歌但聞林鳥啼孟浩然詩處處聞啼鳥冰開見躍鱗禮記仲春之月天子乃鮮羔開冰先薦寝廟庾信賦序羔獻冰開桐華萍合西征賦華魴躍鱗素鱮揚鬐晴山烟外翠庾信詩山晴雲倒回虞世南賦望南山之遙翠唐太宗詩烟峯髙下翠日浪淺深明香蕋日邊新離騷貫薜茘之落蕋梁簡文帝詩日照蒲心暖風吹梅蘂香晉書明帝紀不聞人従日邊來徐陵報尹義尚書晉君之説長安逺於日邊王筠詩綃紈既妍媚脂粉亦香新唐髙宗詩蝶舞袖香新巳變青門柳盧照鄰詩條變識春歸三輔黄圖長安城東出南頭第一門曰霸城門民見門色青名曰青城門或曰青門阮籍詩昔聞東陵𤓰近在青門外李白詩今朝東門柳夾道拂青絲初銷紫陌塵舊唐書張廷珪傳波清四海塵銷九域杜甫詩垂鞭軃鞚凌紫陌賈至詩銀燭朝天紫陌長耿湋詩霜覆九衢塵金湯千里國漢書蒯通傳邊城之地必將固守皆為金城湯池不可攻也王融文金湯非粟而不守漢書張良傳良曰夫闗中阻三面而固守獨以一面東制諸侯此所謂金城湯池千里之國也車騎萬方人禮記前有車騎則載飛鳶史記司馬相如傳相如之臨卭従車騎雍容閑雅甚都晉書天文志天駟星動為策馬則車騎滿野書誕告萬方東都賦聖上覩萬方之歡娯傅休奕日昇歌旭日照萬方此處雲霄近晉書熊鉥傳攀龍附鳳翺翔雲霄南史何敬容傳雲霄之翼豈顧樊籠之糧李白詩望極九霄近憑髙願致身杜甫詩憑髙禁籞長論語事君能致其身杜甫詩文章實致身沈佺期李員外秦援宅觀妓漢書揚雄傳郫有田一㕓有宅一區廣韻宅居也説文託也人所投託也梁簡文帝賦爾乃促筵命妓銜觴置酒王勃文林亭曠望季倫調妓乏園盈盈粉署郎崔顥詩盈盈入畫堂漢官儀省中皆以胡粉塗壁謂之粉署白帖諸曹郎署曰仙署又曰粉署後漢書和帝紀引三署郎召見禁中五日宴春光詩五日為期唐明皇帝送賀知章詩序正月五日將歸㑹稽遂餞東路晉書王羲之傳欲與親知時共歡宴沈約詩春光發隴首李百藥賦縦勝氣之逍遙眷春光而怡逸選客虛前館梁元帝文雲霄之勝賔太虛之選客晉書華譚傳虛髙館以俟賢西京雜記平津侯為宰相開東閣營客館以招天下之士其一曰欽賢館以待大賢次曰翹材館以待大才次曰接士館以待國士徵聲徧後堂盧照鄰詩徵聲匝妓筵舊唐書音樂志九韶遍百福傳漢書張禹傳禹弟子戴崇愷弟多智常責師宜置酒設樂與弟子相娯禹將崇入後堂飲食婦女優人管絃絲竹極樂玉釵翠羽飾洞冥記元鼎元年起招仙閣有神女留一玉釵司馬相如賦玉釵挂臣冠漢書西域傳賛明珠文甲通犀翠羽之珍曹植七啟戴金搖之熠燿揚翠羽之雙翹異物志翡赤而翠青其羽可以為飾羅袖鬱金香司馬相如賦羅袖拂臣衣曹植賦擢素手于羅袖接紅葩于中流沈約秦箏曲羅袖飄纚拂雕桐周禮春官鬱人注鬱鬱金香草宜以和鬯梁武帝樂府盧家蘭室桂為梁中有鬱金蘇合香盧照鄰詩雙燕雙飛繞畫梁羅帷翠被鬱金香拂黛隨時廣江總詩拂紅㸃黛何相似易隨大亨貞无咎而天下隨時因話録崔夫人治家嚴肅貴賤皆不許時世粧詩子之清揚疏非直服飾之盛又目視清明而眉上平廣挑鬟出意長庾肩吾詩縈鬟起照鏡誰忍插花鈿辛延年詩兩鬟何窈窕一世良所無梁簡文帝詩約黄出意巧宋書樂志歡來何晚意何長陳後主採桑詩長鬟礙聚枝囀歌遙合態繁欽箋都尉薛訪車子年始十四能囀喉引聲與笳同音江淹詩展歌殊未宣庾肩吾詩持迴掩曲態梁簡文帝文有慙技癢更同故態度舞暗成行梁元帝詩度舞飛長袖沈約秦箏曲迎歌度舞遏歸風宋書樂志鴛鴦七十二羅列自成行王勃詩疎蝶舞成行李百藥賦耀千金之重價婉二八而成行巧落梅庭裏斜光暎曉粧江總詩滿酌金巵催玉柱落梅樹下宜歌舞王僧孺詩斜光隠西壁暮雀上南枝謝偃詩上客莫厭斜光晚南史朝日初照光暎後庭金陵志夀陽公主人日卧於含章殿簷下梅花落額上成五出之華拂之不去宫人效之稱梅花粧何遜詩雀釵横曉髩蛾眉艷宿粧七言排律魚𤣥機唐詩紀事𤣥機咸通中西京咸宜觀女道士也字幼微善屬文春情寄子安山路敧斜石磴危駱賔王詩山路猶南屬牡甫詩疏鑿就敧斜水經注石磴縈委若羊腸焉張正見詩根空帶石危江總詩山斜翠磴危不愁行路苦相思宋之問詩不愁明月盡髙適詩莫愁前路無知已張謂詩終是悠悠行路心華山畿樂府别後長相思張若虛詩何處相思明月樓冰消逺澗憐清韻張正見詩雪盡青山路冰消緑水池庾信文谷靜山空冰消霧散呉均詩逺澗百頃曲沈炯書逺澗深崖曹植賦聆雅琴之清韻雪逺寒峯想玉姿儲光羲詩峯逺行未極祖詠詩萬里寒光生積雪鮑照詩雜樹茂寒峯王無競詩一吹一落淚至今惜玉姿莫聴凡歌春病酒駱賔王詩聴歌梁上動謝朓詩不對芳春酒杜甫詩比年病酒閒涓滴休招閑客夜貪棋漢書淮南王安都夀春招賔客著書李白詩招客得英才南史陳慶之傳慶之㓜隨従梁武帝帝性好碁每従夜至旦不輟如松匪石盟長在詩如松茂矣又我心匪石不可轉也喬知之詩由來共結䄜㡬人同匪石李白詩功名富貴若長在比翼連襟㑹肯遲梁宣帝賦鳥比翼而羣飛阮籍詩願為雙飛鳥比翼共翺翔顔氏家訓古者斜領下連于襟故謂領為襟駱賔王序款爾連襟共挹青田之酒陸機詩别日何早㑹何遲雖恨獨行冬盡日詩獨行踽踽漢書朱買臣傳獨行歌道中吕氏春秋季冬日窮于次月窮于紀終期相見月圓時杜甫詩終期漢武巡詩無㡬相見蘇武詩相見未有期陶潛詩亭亭月將圓别君何物堪持贈王延詩忍與君為别潘尼詩贈物雖陋薄識意在忘言陳子昂詩懐君萬里别持贈結交親陶𢎞景詩不堪持贈君喬知之詩今日持為贈相識莫相違淚落晴光一首詩李頎詩憶君淚落東流水杜審言詩淚落故情留李白詩逺近含晴光杜審言詩晴光轉緑蘋王粲詩何以贈行言授斯詩御選唐詩巻二十五
