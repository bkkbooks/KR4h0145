body:
  text: 欽定四庫全書御選唐詩巻二十五補編張九齡奉和聖製南出雀鼠谷答張説唐詩紀事帝封泰山南出雀鼠谷張説獻詩帝答之仍命羣臣應制設險諸侯地易王公設險以守其國漢書王嘉傳今之郡守重於古諸侯承平聖主巡漢書食貨志今累世承平豪富吏民貲數鉅萬後漢書第五倫傳每讀詔書常歎息曰此聖主也何晏景福殿頌彰聖主之威神東君朝二月書嵗二月東巡守至于岱宗柴望秩于山川肆覲東后南斾擁三辰魏書廣陵王羽傳髙祖謂羽曰往秋南斾之後虧我皇憲唐太宗詩歸斾擁通莊左傳三辰旂旗昭其明也寒出重闗盡魏徵詩驅馬出闗門徐賢妃函谷應詔詩落日慘重闗年隨行漏新庾肩吾詩秋暉逐行漏樂章福緒逐年新瑞雲叢捧日洞冥記東海大明之墟有釡山出瑞雲應王者之符節魏志程昱傳注昱少時常夢上泰山兩手捧日廬照鄰文歌雲佐漢捧日匡堯芳樹曲迎春梁元帝纂要春木曰芳樹漢書立春之日皆青幡幘迎春於東郊外徐彦伯詩花移玉樹春舞咏先馳道顔延之序鐘石畢陳舞咏之情不一宋明帝歌惟宋垂光烈世美流舞咏史記秦始皇紀二十七年賜爵一級治馳道注馳道天子道也恩華及従臣南史虞玩之傳齊髙帝賜以新屐玩之曰今日之賜恩華俱重宋之問詩雲濕従臣衣汾川花鳥意左傳臺駘能業其官宣汾洮障大澤以處太原帝用嘉之封諸汾川唐太宗詩花鳥自參差併奉屬車塵漢文帝詔鸞旂在前屬車在後顔延之文途歌邑頌以望屬車之塵者久矣李嶠奉和拜洛應制拜洛一作受圖温洛七萃鑾輿動穆天子傳王勒七萃士七萃士曰髙奔戎魏書肅宗紀奮七萃於西戎西都賦乗鑾輿備法駕千年瑞檢開拾遺記丹丘千年一燒黄河千年一清至聖之君以為大瑞後漢書祭祀志上許梁松等奏乃求封禪故事有玉檢又用石檢十枚文如龜負出爾雅五曰文龜注河圖曰靈龜負書丹甲青文春秋序疏河圖洛書龜龍銜負而出圖似鳳銜來易河出圖詩序文王受命疏鳳凰銜丹書于文王之都庾信詩赤鳳來銜璽春鳥入獻書殷薦三神享易殷薦之上帝以配祖考漢書郊祀志甘泉汾隂及雍五畤始立皆有神祇感應武宣之世奉此三神禮敬勅備孟子使之主祭而百神享之明禋萬國陪書伻來毖殷乃命寧子以秬鬯二卣曰明禋左傳禹㑹諸侯於塗山執玉帛而朝者萬國沈佺期詩分禁喜趨陪周旗黄鳥集周禮大司馬軍吏載旗詩黄鳥于飛梁簡文帝詩分花出黄鳥漢幄紫雲回漢書禮樂志星留俞塞隕光照紫幄珠熉黄注師古曰紫幄饗神之幄也帳上四下而覆曰幄言光照紫幄故其珠色熉然而黄也南史宋文帝紀景平二年江陵城上有紫雲日暮鈎陳轉魏収詩宴言忘日暮晉書天文志北極五星鈎陳六星皆在紫宫中庾信賦閶闔開而鈎陳轉清歌上帝臺晉書樂志魏晉之世有陳左善清歌初學記山海經有帝堯臺帝舜臺奉和幸韋嗣立山莊侍宴應制唐書韋嗣立傳營别第驪山鸚鵡谷帝臨幸命従官賦詩制序冠篇賜况優備因封嗣立逍遙公名所居曰清虛原幽棲谷南洛師臣契韓王元嘉詩好士傾南洛多才盛北場一統志洛水出陜西洛南縣冢嶺山後漢書陳元傳師臣者帝賔臣者霸注言以臣為師也東巖王佐居盧照隣文西溪汲水東巖負薪後漢書王允傳郭林宗常見允而竒之曰王生一日千里王佐才也幽情遺紱冕王羲之蘭亭序一觴一詠亦足以暢叙幽情後漢書鄭康成傳吾雖無紱冕之緒頗有讓爵之髙宸眷屬樵漁北史劉炫傳以此庸虛屢動宸眷孔魚詩蘭澤侣樵漁制下峒山蹕史記秦始皇紀注羣臣有所奏請尚書令奏之下所司曰制一統志崆峒山在平凉府城西三十里漢書文三王傳注皇帝輦動左右侍帷幄者稱警出殿則傳蹕止人清道也恩回灞水輿一統志灞水在西安府城東二十里本名滋水秦穆公更名以彰霸功源出秦嶺合藍谷諸水入滻水北注于渭庾信詩望逺蹔回輿松門駐旌蓋庾信紇于𢎞碑銘松門石起碑字金生齊書宋宗室遙昌傳旌蓋飄颻逺涉淮泗薜幄引簪裾楚辭被薜茘兮帶女蘿陸機詩宻葉承翠幄庾信詩錦水照簪裾石磴平黄陸謝靈運詩石磴瀉紅泉書黒水西河惟雍州厥土惟黄壤爾雅髙平曰陸烟樓半紫虛梁昭明太子詩烟生樓半蔵江總咏雙闕詩圖龍入紫虛雲霞仙路近江淹詩雲霞冠秋嶺水經注昔費長房為市吏見王壺公懸壺郡市長房従之因而自逺同入此壺隠淪仙路琴酒俗情疎鮑照詩蔵名琴酒間陶潛詩園林無俗情喬木千齡外詩遷于喬木江淹詩喬木嘯山曲沈約瑞石像銘渺千齡而再現懸泉百丈餘湘中記衡山有懸泉滴瀝巖前庾信温湯碑華隂百丈之泉豈獨髙于蓮井崖深經鍊藥水經注澗曲崖深鮑照詩深崖伏化跡江淹詩鍊藥矚虛幌穴古舊蔵書郡國志小酉山在辰州府山下有石穴中有書千巻史記老子傳注蔵室史乃周蔵書室之史也樹宿搏風鳥庾信詩樹宿含櫻鳥莊子摶扶搖而上者九萬里説苑魚游水鳥乗風池潛縦壑魚詩魚潛在淵曹植詩遊魚潛緑水王襃頌沛乎如巨魚之縦大壑寧知天子貴史記叔孫通傳髙帝曰吾乃今日知為皇帝之貴也沈炯詩欲知天子貴千門應紫微尚憶武侯廬蜀志諸葛亮傳贈丞相武鄉侯印綬諡為忠武侯諸葛亮出師表三顧臣于草廬之中沈佺期酬蘇員外味道夏晚寓直省中見贈並命登仙閣顔延之曲水詩序並命在位展詩發志宋孝武帝詩逢皋列神苑遭壇樹仙閣劉允濟明堂賦望仙閣之秀出瞻月觀之宏峙分曹直禮闈漢書食貨志分遣御史廷尉正監分曹注分輩而出使也楚辭分曹並進遒相迫些任昉王文憲集序出入禮闈朝夕舊館大官供宿膳漢書百官公卿表少府屬官有太醫大官湯官導官注大官主膳食侍史䕶朝衣通典省中之官左右従者曰侍御史記司馬相如傳于是歴吉日以齋戒襲朝衣乗法駕巻幔天河入通典蜀將諸葛亮屯於陽平巻幔開四門掃地却飲酒詩倬彼雲漢箋雲漢謂天河也開窻月露微樂府鳥夜啼曲籠牕窻不開蕩户户不動謝瞻詩開軒滅華燭月露皓已盈小池殘暑退左傳譬如火焉火中寒暑乃退注心以季夏昏中而暑退季冬旦中而寒退髙樹早凉歸呉越春秋秋蟬登髙樹飲清露楊炯詩階樹含斜日池風泛早凉冠劒無時釋史記貨殖傳游閒公子飾冠劍連車騎亦為富貴容也江淹詩昔我學冠劍逢君在山川軒車待漏飛古詩軒車來何遲沈約文奉待漏之書銜如絲之㫖明朝題漢柱三輔决錄田鳳為尚書郎容儀端正每入奏事靈帝目送之題柱曰堂堂乎張京兆田郎庾信碑文勇讋燕城名題漢柱三署有光輝初學記秦初置郎中令其屬官有三署應璩詩三署來相尋漢郊祀歌配上帝兮揚光輝王維奉和聖製重陽節魏文帝與鍾繇書嵗往月來忽逄九月九日九為陽數而日月並應俗嘉其名以為宜於長久故以享宴髙㑹四海方無事書聲教訖于四海詩四海來格禮記天子無事與諸侯相見曰朝老子我無事而民自富史記平準書漢興七十餘年國家無事三秋大有年王融䇿秀才文幸四境無虞三秋式稔公羊傳彼其曰大有年者何大豐年也有年何以書以喜書也穀梁傳五糓皆熟為大有年百生無此日漢書董仲舒傳羣生和而萬民殖沈約歌堯年舜日歡無極萬夀願齊天詩萬夀無疆宋書樂志英勲冠帝則萬夀永齊天芍藥和金鼎詩贈之以芍藥司馬相如子虛賦勺藥之和具而後御之注以芍藥調食也張九齡詩徒慚和鼎地鮑照樂府金鼎玉匕合神丹茱萸插玳筵西京雜記九月九日佩茱萸食蓬餌飲菊花酒令人長夀唐太宗詩芬芳玳瑁筵玉堂開右个史記孝武紀泰液池南有玉堂古樂府黄金為君門白玉為君堂禮記季秋之月天子居總章右个注總章右个西堂北偏天樂動宫懸張衡西京賦昔者大帝悦秦穆公而覲之饗以鈞天廣樂周禮春官小胥正樂懸之位王宫縣諸侯軒縣卿大夫判縣士特縣辨其聲注宫縣四面皆縣如宫有牆也六典宫縣之舞八佾軒縣之舞六佾御柳疎秋景王勃詩爭知北闕柳隂稀唐太宗秋日詩衣碎荷疎影城鴉拂曙烟呉均詩千門萬户不知曙惟聞啞啞城上烏任奉古昆明池詩池灰斂曙烟無窮菊花節司馬相如喻巴蜀檄名聲施於無窮續齊諧記九月九日宜令家人各作絳囊盛茱萸以繫臂登髙飲菊酒王績詩秋杯浸菊花長奉栢梁篇梁簡文帝序叨藉殊寵陪奉未塵古文苑漢武帝作柏梁臺詔羣臣二千石有能為七言詩乃得上坐蘇頲詩銜恩獻夀栢梁臺奉和聖製幸玉真公主山莊因題石壁十韻之作應制唐書玉真公主字持盈始封崇昌縣主俄進號上清𤣥都大洞三景師天寳三載上言願去公主號罷邑司歸之王府帝不許又言妾於天下不為賤何必名繫主號資湯沐然後為貴請入數百家之産延十年之命帝知主意乃許之碧落風烟外度人經昔於始青天中碧落空歌注東方第一天有碧霞徧滿是云碧落楊炯詩風烟鳥路長瑤臺道路賒陸機賦陟瑤臺以投轡歩玉除而容與庾闡遊仙詩瑤臺藻構霞綺爾雅一達謂之道路古詩道路阻且長鄭愔詩天台闕路賒如何連帝苑别自有仙家李嶠詩城連禁苑斜十洲記瀛洲上多仙家唐中宗詩玉臺金闕九仙家此地回鑾駕梁簡文帝詩此地獨邅迴唐太宗詩回鸞游福地庾肩吾詩鸞駕總朝遊縁溪轉翠華陶潛桃花源記武陵人縁溪行忘路之逺近司馬相如賦建翠華之旂注翠華以翠羽為葆也柳惲詩翠華承漢逺雕輦逐風遊洞中開日月易懸象著明莫大乎日月楊炯詩仙都日月開牕裏發雲霞呉均詩雲従窓裏出謝靈運詩雲霞收夕霏庭養沖天鶴漢書郊祀志宣帝時有白鶴集後庭史記滑稽傳此鳥不蜚則已一蜚沖天孫綽詩王喬控鶴以沖天溪流上漢槎謝朓詩溪流春穀泉江淹别賦駕鶴上漢驂鸞騰天博物志天河與海通近世有人居海渚者年年八月有浮槎去來不失期人有竒志立飛閣于槎上乗槎而去徐陵文若漢水之僊槎種田生白玉搜神記雍伯作義漿於陂頭有一人就飲以石子一斗與之使至髙平好地種之玉當生其中因種其石數處果得五雙白璧其地名曰玉田泥竈化丹砂史記封禪書李少府言於上曰祠竈則致物致物而丹砂可化為黄金黄金成以為飲食器則益夀谷靜泉逾響劉斌詩谷靜易流聲呉均書泉水激石泠泠作響庾信詩巖懸泉溜響山深日易斜謝莊詩山深白石虧梁元帝詩西山晚日斜御羮和石髓詩亦有和羮晉書嵇康傳康隨王烈入山烈嘗得石髓如飴即自服半餘半與康皆凝而為石香飯進胡麻庾信詩石軟如香飯抱朴子苣勝一名胡麻服之不老大道今無外莊子大道能包之而不能辨之又至大無外謂之大也長生詎有涯老子深根固柢長生久視之道莊子吾生也有涯而知也無涯還瞻九霄上來往五雲車沈約詩鋭意三山上託慕九霄中郭璞馮夷賛乗龍隠淪往來海若史記封禪書文成言上欲與神通宫室被服非象神人不至乃作畫雲氣車注畫青車以甲乙畫赤車以丙丁畫𤣥車以壬癸畫白車以庚辛畫黄車以戊己庾信詩北燭五雲車春日直門下省早朝時為右補闕晉書給事黄門侍郎俱管門下衆務故謂之門下省長安志唐門下省在左右延明門東南又門下省在日華門東南六典門下省有給事中四人右補闕右拾遺各一人騎省直明光潘岳賦叙寓直於散騎之省漢書武帝紀太初四年秋起明光宫西京賦自未央而連桂宫北彌明光而亘長樂蘇味道詩明光共待漏雞鳴謁建章詩雞既鳴矣朝既盈矣江淹詩雞鳴夜已晞漢書武帝紀太初元年二月起建章宫謝朓詩玉繩低建章遙聞侍中珮後漢書解經不窮戴侍中宋書禮志侍中左右常侍皆珮水蒼玉中華古今注玉珮之法漢末不傳魏侍中王粲識古珮之法更制焉暗識令君香襄陽記荀令君至人家坐幕三日香氣不歇楊訓詩香逐令君衣玉漏隨銅史周禮挈壺氏掌刻漏陸倕新漏刻銘銅史司刻金徒抱箭天書拜夕郎庾信桐葉封虞賛帝刻銅葉天書掌文漢官儀黄門郎日暮入對青瑣門拜名曰夕郎宋之問詩髙才拜夕郎旌旗暎閶闔韋元旦詩夾岸旌旗疏輦道三輔黄圖注閶闔天門也宫門名閶闔者以象天門也王延夀魯靈光殿賦髙門擬於閶闔歌吹滿昭陽孫楚為石苞與孫皓書游龍曜路歌吹盈耳西都賦昭陽特盛隆於孝成官舍梅初紫史記周昌見諸賔客隨之者千餘乗邯鄲官舍皆滿西京雜記初修上林苑羣臣各獻名果異樹有紫梅紫蒂梅紫華梅宫門柳欲黄漢書建章宫千門萬户爾雅宫中之門謂之闈岑參詩江暖栁條黄願將遲日意張説詩願將楨榦捧明君詩春日遲遲采蘩祁祁注遲遲日長而暄也同與聖恩長後漢書明帝紀聖恩遺戒顧重天下以元元為首又种岱傳岱雖未建忠效用而為聖恩所拔李白春日歸山寄孟浩然朱紱遺塵境易朱紱方來鮑照詩開壤襲朱紱左右佩金章梁武帝淨業賦外清眼境内淨心塵青山謁梵筵謝朓詩不對芳春酒還望青山郭入蜀記姑熟溪東南數峯如黛葢青山也沈約棲禪精舍銘往辭妙幄今承梵筵陳子昂詩山水向精舍琴歌列梵筵金繩開覺路法華經黄金為繩以界八道法苑珠林大川開寳匣福地下金繩王勃福㑹碑攀十地而遐征同趨覺路孫逖詩覺路山童引寳筏渡迷川金剛經如來常説汝等比丘知我説法如筏喻者法當應捨江總棲霞寺碑三乗謂筏六度為舟陶潛桃花源記遂迷不復得路後遂無問津者嶺樹攅飛栱梁簡文帝詩星芒侵嶺樹月暈隠城樓蘇頲西明寺碑攅栱岌嶪騫甍宛轉爾雅杙大者謂之栱符載五福樓記百栱之上忽生飛樓巖花覆谷泉王勃詩桂宻巖花白梨疎林葉紅宋孝武帝賦山懐風兮谷吐泉墖形標海月孫綽碑標形者得之廊廟悟㫖者期諸濠川韋元旦詩惟應西海月來就掌珠圓樓勢出江烟梁簡文帝詩聳樓排樹出却堞帶江清劉孝綽詩濛漠江烟上蒼茫沙嶼無沈佺期詩雲雁下江烟香氣三天下列子終兆之國山名壺頂頂有口名滋穴有水湧出名曰神瀵其民沐浴神瀵膚毛脂澤香氣經旬乃歇法苑珠林須彌海中衆花徧滿香氣甚盛雲笈七籖三清境亦名三天清微天禹餘天大赤天是也鐘聲萬壑連禮記鐘聲鏗鏗以立號晉書顧愷之傳人問以㑹稽山川之狀云千巖競秀萬壑爭流鮑照詩萬壑勢迴縈荷秋珠已滿鮑照白紵曲客秋九月荷葉黄陳後主詩光滿應珠圓松宻葢初圓抱朴子大陵偃葢之松水經注林木緻宻何遜詩髙樹䕃樓宻魏書禮志乾象輦羽葆圓蓋鳥聚疑聞法梁邵陵王啟香鳥銜花馴遊於雲囿瑞雀飛環翔舞於風前梁武帝詩聞見皆靈洞漢書注作金人以為人天之主而祭之即今佛是其遺法也梁元帝詩法王惟一法龍㕘若䕶禪神僧傳淨長溪僧入山結茅為室有龍夭矯而至呼召而馴擾焉宋之問詩入禪従鴿繞説法有龍聴五燈㑹元嶽禪對元圭禪師曰佛亦使神䕶法愧非流水韻叨入伯牙弦吕氏春秋伯牙鼓琴鍾子期聴之志在髙山子期曰善哉巍巍乎若泰山須臾志在流水子期曰湯湯乎若流水駱賔王詩流水伯牙弦送友人尋越中山水越語句踐之地南至於句無北至於禦兒東至於鄞西至于姑蔑廣運百里聞道稽山去漢書地理志㑹稽郡縣山隂㑹稽山在南上有禹冢禹井十道山川攷㑹稽山在紹興府㑹稽縣東北二十里禹於此㑹諸侯之計因名偏宜謝客才詩品初錢塘杜明師夜夢東南有人來入其館是夕即靈運生于㑹稽其家以子孫難得送靈運於杜治養之十五方還都故名客兒梁簡文帝與湘東王論文書謝客吐言天拔出於自然千巖泉灑落鮑照登廬山詩千巖盛阻積萬壑勢迴縈王勃山亭興序風塵灑落直上天池九萬里萬壑樹縈迴江淹詩萬壑共馳騖百谷爭往來唐明皇喜雪詩賦象恒衣物縈迴屢逐風東海横秦望左傳泱泱乎表東海者其太公乎水經注秦望山在州城正南為衆峯之傑陟境便見秦始皇登之以望南海明一統志浙江紹興府秦望山在府城東南四十里西陵繞越臺蘇小小歌何處結同心西陵松柏下楊齊賢注西陵與浙江亭相對乃錢塘㑹稽津渡處蕭士贇注越臺即越王臺明一統志越王臺句踐登眺之所在㑹稽稷山湖清霜鏡曉謝靈運湖中詩山水含清暉王儉靈丘竹賦霜皎鏡于原隰崔琮詩五夜鏡初曉濤白雪山來後漢書班超傳注西域有白山通嵗有雪亦名雪山魏書西域傳鉢和國有大雪山望若銀岸八月枚乗筆詩八月雈葦枚乗七發將以八月之望與諸侯逺方交遊兄弟並得觀濤乎廣陵之曲江漢書枚乗傳乗字叔淮隂人也従孝王游梁客皆善屬辭賦乗尤髙三呉張翰杯圖經漢髙祖得天下分㑹稽為呉郡與呉興丹陽為三呉晉書張翰傳翰字季鷹呉人也世説張季鷹任心自適不求當世或謂曰卿乃可縦適一時獨不為身後名耶答曰使我有身後名不如即時一杯酒此中多逸興陶潛詩此中有真意欲辨已忘言王勃滕王閣序遙吟甫暢逸興遄飛早晚向天台詩夜如何其箋此宣王以諸侯將朝夜起曰夜如何其問早晚之辭名山畧記天台山在剡縣即是衆聖所降葛仙公山也孫綽遊天台山賦序涉海則有方丈蓬萊登陸則有四明天台耿湋元日早朝書月正元日玉燭寳典正月為端月其一日為元日九陌朝臣滿三輔舊事長安有九市八街九陌獨㫁公卿侍中尚書衣帛而朝曰朝臣諸營校尉將大夫以下亦曰朝臣沈佺期詩雞鳴朝謁滿三朝候鼓賒三禮義宗天子諸侯皆有三朝一曰外朝二曰中朝三曰内朝唐書儀衞志天子將出前二日太樂令設宫縣之樂于庭晝漏上五刻前駕發前發七刻擊一鼔為一嚴前五刻擊二鼔為再嚴前二刻擊三鼔為三嚴逺珂時接韻張華詩乗馬鳴玉珂徐彦伯詩繁珂接曙響攅炬偶成花國史補中元冬至立仗大官皆列燭至于五六百炬謂之火城虞世南早朝詩玉花停夜燭唐太宗燭詩花開不待春紫貝為髙闕楚辭紫貝闕而白玉堂王逸注紫貝水蟲也陸倕石闕銘序海岳黄金河廷紫貝注言河伯所居以紫貝作闕也袁淑詩結車髙闕下極望見雲中黄龍建大牙唐書儀衞志左右威衞黒旗仗立於階下第一黄龍負圖旗隊南史孝武帝紀帝建牙於軍門演繁露牙即牙旗也參差萬㦸合梁武帝詩色雜亂參差唐書儀衞志元日大朝黄麾仗左右廂各十二行第一行長㦸第四行小㦸第五行短㦸左右八貂斜唐書百官志散騎常侍分左右隸門下中書省皆金蟬珥貂左散騎與侍中為左貂右散騎與中書令為右貂謂之八貂羽扇紛朱檻古今注殷髙宗有雉雊之祥服章多用翟羽故有雉尾扇西京雜記漢制天子夏設羽扇冬設繒扇杜甫詩滂沱朱檻濕金爐隔翠華魏武上雜物疏御物三十種有純金香爐一枚唐書儀衞志朝日殿上設黼扆躡席熏爐香案沈約詩方侍翠華舉逺適瑤池宴微風傳曙漏潘岳賦微風生於輕幰通典後漢嵗首正月為大朝受賀其儀夜漏未盡七刻鐘鳴受朝賀韋元旦詩挈壺分早漏王岳靈詩直疑殘漏曙曉日上春霞楊師道詩露中分曉日花裡弄春禽張融賦帳春霞于秀瀨環珮聲重疊禮記行步則有環珮之聲江總詩環珮響相従陸倕石闕銘旁暎重叠蠻夷服等差李嶠受圖温洛詩序蠻夷酋長各依方序立王建元日早朝詩六蕃陪位次衣服各異形樂和天易感禮記樂者天地之和也又八變而天神降吕氏春秋君子正徳以出樂和樂以成順樂和而民向風矣山固夀無涯詩如山如阜王融樂府長為南山固永與朝日明梁昇卿詩山靈夀域長劉楨賦揚洪恩于無涯渥澤千年聖韓子曠日彌久周澤既渥王僧孺啟一遇休明多逢渥澤梁昇卿詩千年遇聖王盧照隣詩千年聖主應昌期車書四海家沈約樂歌車書同萬宇庾信賦混一車書書文命敷於四海漢書髙祖紀天子以四海為家盛明多在位班婕妤賦䝉聖皇之渥恵兮當日月之盛明謝靈運詩盛明盪氛昬詩式序在位漢書王吉傳王陽在位貢禹彈冠誰得守蓬麻周捨還田舍詩蓬麻嵗時宻崔融表一遊蘭芷竚變蓬麻御選唐詩巻二十五補編
