寶以厭天子氣故名金陵謝朓詩雲中辨江樹宋之問詩江樹逺含情岑參封大夫破播仙凱歌岑參送封大夫出師西征序天寶中胸奴回紇冦邊踰花門略金山煙塵相連侵軼海濱天子於是授鉞常清出師征之及破播仙奏捷獻凱參乃作凱歌云漢將承恩西破戎鮑照詩擁旄為漢將晉書劉𢎞傳贊和季承恩建旟南服王臺卿詩承恩奉教義方當𢎞受持書西戎即敘張九齡詩欣君震逺戎捷書先奏未央宫王勃文望神都而獻捷漢書高帝紀蕭何治未央宫注未央殿雖南向而丄書奏事謁見之徒皆詣北闕天子預開麟閣待後漢書爰延傳天子尊無為上故天以為子漢書蘇武傳甘露三年單于始入朝上思股肱之美乃圖其人於麒麟閣法其形貌署其官爵姓名凡十一人庾信長孫儉碑既畫雲臺乃題麟閣祗今誰數二師功後漢書禰衡傳餘子碌碌莫足數也漢書李廣利傳太初元年以廣利為二師將軍發屬國六千騎及郡國惡少年數萬人以往期至二師城取善馬故號二師將軍二官軍西出過樓蘭禮記班朝治軍涖官行政左傳成軍以出漢書西域傳鄯善國本名樓蘭去陽關千六百里俆悱詩占兵出細栁轉戰向樓蘭營幕傍臨月窟寒庾信啓張幕全韓連營上地王褒從軍行將幕恆臨斗張九齡詩自然來月窟何用刺樓蘭蒲海曉霜凝馬尾漢書西域傳蒲昌海一名鹽澤其水亭居冬夏不增減沈炯詩連鑣渡蒲海虞世南詩蒲海廣難依謝靈運詩曉霜楓葉丹阮籍詩凝霜被野草後漢書公孫述傳述潛遣奇兵出吳漢軍後襲擊破漢漢墮水緣馬尾得出蔥山夜雪撲旌竿漢書西域傳西則限以蔥嶺注蔥嶺其山高大上悉生蔥故以名焉沈佺期詩蔥山鐵勒隈張正見詩含冰踏馬足雜雨凍旗竿崔湜詩霜氣下旌竿三鳴笳疊鼓擁回軍魏文帝與吳質書從者鳴笳以啓路吳邁逺詩鳴笳墮飛禽謝朓鼓吹曲凝笳翼高蓋疊鼓送華輈韓休詩疊鼓搖邊吹顔延之詩今來後歸軍破國平蕃昔未聞史記準隂侯傳敵國破謀臣亡唐書吐蕃傳吐蕃本西羌屬蓋百有五十種散處河湟江岷間李陵答蘇武書此天下所希聞古今所未冇也丈夫鵲印搖邊月左傳吾淺之為丈夫也吳質詩慷慨自俯仰庶幾烈丈夫搜神記張影為梁相冇山鵲飛翔化為圓石影椎破之得一金印其文曰忠孝侯印王勃文鵲印蟬簪金社發公侯之始駱賓王詩賴有邊城月常伴客旌懸大將龍旗掣海雲史記淮隂侯傳平旦信建大將之旗鼓鼓行出井陘口周禮春官司常掌九旗之物名交龍為旗滕彥將旗銘龍旗所指八表澄清吳均詩車中旌拂雲盧照鄰賦雲覆海而沈沈四日落轅門鼓角鳴鮑照詩日落嶺雲歸周禮天官掌舍設車宫轅門陶翰詩將軍闢轅門耿介當風立諸葛亮軍令始出營豎矛戟舒幡旗嗚鼓角阮籍詩旗幟何翩翩但聞金鼓鳴張正見詩空林漢鼓鳴千羣面縳出蕃城梁武帝書鋭卒萬計鐵馬千羣南史梁元帝紀結隊千羣持戟百萬左傳許男面縳銜璧鮑照詩汗馬出長城洗兵魚海雲迎陳説苑武王伐討風霾而乘以大雨王曰天洗兵也魏武帝兵要大將之行雨濡衣冠是謂洗兵唐書李光弼傳李國臣力能抉關以折衝從收魚海五城遷中郎將孔稚圭表沿江入漢雲陳萬里盧照鄰詩隴雲朝結陳秣馬龍堆月照營詩之子于歸言秣其馬左傳鄭穆公使視客館則束載厲兵秣馬矣漢書西域傳樓蘭國最在束陲近漢當白龍堆駱賓王詩行月似依營虢州後亭送李判官使赴晉絳唐書地理志河南道虢州𢎞農郡本虢郡又河東道晉州平陽郡本臨汾郡絳州絳郡西原驛路挂城頭水經注汾水又西徑清原城北一統志太原縣唐徙治汾水北山移文馳煙驛路勒移山庭杜審言詩北斗挂城邊客散紅亭雨未休盧照鄰詩客散同秋葉蘇頤詩聚散同行客孫逖詩公府西巖下紅亭間白雲宋之問詩江雨入庭飛君去試看汾水上白雲猶似漢時秋宋之問詩君看水上芙蓉色水經注汾水出太原汾陽縣北管涔山漢武故事帝行幸河東祀后土顧視帝京欣然中流與羣臣飲宴乃自作秋風辭曰秋風起兮白雲飛草木黃落兮雁南歸又曰泛樓船兮濟汾河橫中流兮揚素波庾信詩新秋似舊秋草堂村尋人不遇數株垂栁欲依依南史張緒傳劉悛之為益州獻蜀栁數株枝條甚長狀若絲縷梁簡文帝詩垂栁復垂楊詩楊栁依依庾信賦昔年垂栁依依漢南庾信詩園栁始依依深巷斜陽暮鳥飛陶溍詩狗吠深巷中梁簡文碑夕陽斜影俱成拂鏡之暉蕭子隆詩初松切暮鳥新楊催曉風歸去來辭鳥倦飛而知還何遜詩日夕飛鳥還門前雪滿無行迹陶溍詩舫舟蔭門前梁元帝詩門前楊栁亂如絲晉子夜冬歌塗澀無人行冒寒往相覔若不信儂時但看雪上迹張協詩溪壑無人迹張載詩房櫳無行迹應是先生出未歸儀禮士冠禮遂以摯見于卿大夫鄉先生戰國䇿梧下先生魏之隱士人王孫賈毋曰汝暮出而不還則吾倚閭而望寄孫山人新林二月孤舟還一統志新林浦在江寧府西南二十里一名新林港江淹詩江南二月春庾信春賦二月楊花飛上路歸去來辭或命巾車或棹孤舟謝靈運詩孤舟有超越朱超道詩孤舟無四鄰水滿清江花滿山水經注聖女陂水無耗竭湛然清滿楚辭憑崑崙以澄霧兮隱岷山以清江盧照鄰詩風月清江夜山水白雲朝鮑泉詩新花滿新樹隋煬帝詩暮江平不動春花滿正開鮑照詩滿山又填谷借問故園隱君子陸機詩借問子何之虞炎詩方掩故園扉史記老子隱君子也庾信詩白石仙人芋青林隱士松時時來往住人間史記司馬相如傳長卿時時著書列子獨來獨往獨出獨入任昉詩江湖忽來往高適塞上聽吹笛雪淨胡天牧馬還宋之問詩廣庭憐雪淨述異記漢武帝湖中牧馬處至今野草皆冇嚼嚙之狀庾信文偃師張幕河陽牧馬漢書李廣利傳軍還至玉門者萬餘人馬千餘匹月明羌笛戌樓間魏武帝詩月明星稀庾信賦關山唯月明風俗通笛長二尺四寸七孔其後又有羌笛説文笛七孔角也羌笛三孔馬融長笛賦近世雙笛從羌起梁元帝詩旅泊依村樹江槎擁戌樓庾信詩戌樓侵嶺路借問梅花何處落張協詩借問此何時蝴蝶飛南園晉子夜歌梅花落己盡栁花隨風散庾信詩新芳花栁遍何處不宜春樂府解題梅花落笛中曲也自宋鮑照以下常為之風吹一夜滿關山梁簡文帝詩春風吹梅畏落盡蕭慤詩暮風吹竹起史記劉敬傳輕騎一日一夜可至秦中江總詩分手關山長庾信詩關山負雪行河水乘冰渡綦毋潛字季通荆南人開元十四年登進士第由宜夀尉入為集賢待制遷右拾遺過上人蘭若釋氏要覽梵言阿蘭若唐言無諍一云間靜處廣韻若人者切孟浩然詩問法尋蘭若山頭禪室挂僧衣紫騮馬歌辭高高山頭樹謝靈運賦傍危峯立禪室李白詩鷫鸘裘在錦屏上自君一挂無由披五燈會元世尊告迦葉吾將金縷僧伽黎衣傳付于汝窗外無人溪鳥飛隂鏗詩窗外落暉紅易閴其無人元行恭詩還似無人處幽蘭入雅琴淮南子鳥飛而高魚動而下賀循詩好鳥和鳴枝上飛黃昏半在山下路淮南子日至虞淵是曰黃昏楚辭曰黃昏以為期兮易山下出泉鮑照書半山以下純為黛色駱賓王詩山路猶南屬河源自北流却聽鐘聲來翠微徐陵諫深法師罷道書聽鐘聲而致敬庾信詩金鞍上翠微尹式詩雲薄鱗逾細山高翠轉微元結欵乃曲本集注大歷初結為道州刺史以軍事詣都使還州逢春水舟行不進乃作此曲令舟子唱之以取適於道路云演繁露元次山欵乃曲五章全是絶句如竹枝之類其謂欵乃者殆舟人於歌聲之外别出一聲以互相其歌也耶宋黃山谷云欵乃音媪靄湘中節歌聲十里楓林煙雨深庾信詩十里木繭香阮籍詩湛湛長江水上冇楓樹林張協詩騰雲似涌煙密雨如散絲鮑照詩煙雨交將夕無朝無暮有猿吟管子日有朝暮夜有晨昏謝朓詩山暝孤猿吟江淹賦猿之吟兮日光迥陳後主詩風巖朝藥落霧嶺晚猿吟停橈靜聽曲中意陳子昂詩停橈問土風廣韻橈楫也劉伶酒德頌靜聽不聞雷霆之聲鮑照詩靜聽無聞極視不見庾肩吾詩聽曲慙回顧好是雲山韶濩音禮記山川出雲蔡琰十八拍雲山萬里兮歸路遐左傳吳公子札來聘見舞韶濩者曰聖人之𢎞也注韶濩殷湯樂也劉長卿送李判官之潤州行營通典唐有採訪及節度使採訪使冇判官二人一統志鎮江府隋開皇中置潤州大業初州廢唐初復置潤州治丹徒萬里辭家事鼓鼙漢書班超傳相者曰生燕領虎頭飛而食肉此萬里侯相也魏文帝詩將適萬里道鮑照詩我初辭家從軍僑榮志溢氣干雲霄禮記君子聽鼓鼙之聲則思將帥之臣説文鼙騎鼓也金陵驛路楚雲西丹陽記秦始皇埋金玉雜寶以厭天子氣故名金陵謝朓入朝曲金陵帝王州孔稚圭北山移文馳煙驛路宋王高唐賦楚襄王與宋玉遊于雲夢之臺望高唐之觀其上獨冇雲氣玉曰所謂朝雲者也江春不肯留行客李嶠詩霞滿蜀江春世説衛江州在潯陽有知舊投之都不料理惟餉王不留行一片楚辭長袂拂面善留客些潘嶽詩迢迢逺行客草色青青送馬蹄江淹别賦春草碧色春水緑波又詩草色斂窮水古詩青青河畔草鬱鬱園中栁曹植詩俯身散馬蹄吳均詩青莎沒馬蹄瓜州驛送梁郎中一統志瓜州鎮在揚州府城南四十里蓋揚子江之沙磧其狀如瓜渺渺雲山去幾重吳均詩白雲方渺渺王臺卿詩誰言非勝境雲山獨在兹虞茂詩關山多道里相接幾重愁依依獨聽廣陵鐘李陵書望風懷想能不依依韓非子獨聽者為聰庾信詩獨聽竹林鐘史記五宗世家江都王建國除地入於漢為廣陵郡一統志揚州府漢武帝時名廣陵國唐
