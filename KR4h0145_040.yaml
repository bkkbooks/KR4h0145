body:
  text: 欽定四庫全書御選唐詩卷三十一七言絶句王之渙涼州詞晉書地理志漢改周之雍州為涼州蓋以地處西方常寒涼也樂苑涼州宫調曲開元中西涼府都督郭知運進集異記開元中之渙與王昌齡高適齊名共詣旗亭小飲有梨園伶官會宴妙妓四輩奏樂昌齡等私約曰我輩各擅詩名每不自定甲乙今密觀諸伶所謳若詩入歌詞多者為優初謳昌齡詩次謳適詩之渙指諸妓中最佳者曰待此子所唱如非我詩終身不敢爭衡次至雙鬟發聲果謳黃河云云因大諧笑黃河逺上白雲間山海經崑崙山高萬一千里白水出其東北陬屈向東南流為中國河新論四瀆之源河最高而長從高注下其流激迅劉孝孫望河詩回瞰黃河上惝恍屢飛魂何遜詩去帆若不見試望白雲中沈約詩置嶺白雲間一片孤城萬仞山庾信文月暈孤城塵驚虛援江淹江上之山賦挂青蘿兮萬仞竪丹石兮百重庾信終南山銘立壁千丈橫峯萬仞羌笛何須怨楊栁馬融長笛賦近世雙笛從羌起羌人伐竹未及己梁元帝賦聞羌笛之哀怨樂府解題漢橫吹曲二十八解七曰折楊栁上官儀詩笛怨栁花前春光不度玉門關張正見詩春光落雲葉後漢書班超傳注玉門關屬燉煌郡今沙州也去長安三千六百里溫子升涼州樂歌路出玉門關城接龍城坂一統志王門關在甘肅衛故瓜州西北一十八里劉長卿尋盛禪師蘭若釋氏要覽梵言阿蘭若唐言無諍一云間靜處秋草黃花覆古阡古詩秋草萋以緑孫楚詩零雨霑秋草張協詩寒花發黃采秋草含緑滋陶潛詩黃花復朱實食之夀命長漢書注阡陌田間道也南北曰阡東西曰陌隔林何處起人煙虞世基詩遙林卷宿煙庾信詩間峯直起煙曹植詩中野何蕭條千里無人煙周𢎞讓詩忽見茅茨屋曖曖有人煙山僧獨在山中老庾信詩野老時相訪山僧或見尋王績詩賴冇北山僧教我以真如謝靈運山居賦山中兮凊寂羣動兮自絶吳均詩山中自有宅桂樹籠青雲唯有寒松見少年宋書時人謂謝混肅肅如寒風之振松沈約寒松詩梢聳振寒聲青蔥標暮色王融詩華榮羈丱日生平少年時錢起歸雁瀟湘何事等間回曹植詩朝遊江北岸夕宿瀟湘渚謝朓詩洞庭張樂地瀟湘帝子遊張謂詩心中萬事如等間水碧沙明兩岸苔江淹四時賦園桃點紅流水碧色又詩青苔己結洧碧水復盈淇謝朓楚江賦沙明宿莽石路相懸王融詩日霽沙溆明王灣詩潮平兩岸濶李白詩兩岸猿聲啼不住二十五絃彈夜月史記封禪書太帝使素女鼓五十絃之瑟悲帝禁不止故破其瑟為二十五絃鮑令暉詩鳴絃慙夜月琴曲譜録琴弄有鴻雁來賓並凄涼調不勝清怨却飛來陶潛間情賦笛流逺以清哀古辭飛來雙白鵠乃從西北來暮春歸故山草堂谷口春殘黃鳥稀孔稚圭北山移文截來轅于谷口岑子敬詩谷口暗枝橫詩黃鳥于飛陸璣詩疏黃鳥常椹熟時往來在桑樹間皆應節超時之鳥梁簡文帝詩分花出黃鳥挂石下新泉辛夷花盡杏花飛楚辭露甲辛夷飛林薄本草辛夷花初發如筆北人呼為木筆其花最早南人呼為迎春汜勝之書杏花始榮輒耕輕土弱土杏花落復耕之輒藺之此謂一耕而五熟王褒詩桃花落杏花舒始憐幽竹山窗下謝朓詩窗前一叢竹青翠獨言奇劉孝孫詩虛窗隱竹叢庾信詩山窗臨絶頂王褒詩山窗雲作扉不改清隂待我歸禮記故貫四時而不改柯易葉謝朓逰後園賦清隂起兮池館涼王儉賦靈丘深沈蔓竹凝隂晚過橫灞寄張藍田三輔黃圖滻水出藍田北至灞陵入灞一統志藍田縣在西安府城東南九十里本秦舊縣周禮玉之次美者曰藍此縣山出玉故以名縣亂水東流落照時鮑照詩亂流灇大壑新語四瀆東流百川莫不從張正見詩高峯落回照黃花滿徑客行遲禮記季秋之月菊有黃華陶潛辭三徑就荒松菊猶存鮑照詩客行惜日月詩行道遲遲林端忽見南山色張充書弱霧輕煙乍林端而菴靄括地志終南山一名南山陶潛詩采菊東籬下悠然見南山吳均文天山共色馬上還吟陶令詩北史潘徽傳徽為隋王俊學士嘗從俊朝京師在塗令徽於馬上為賦一行庾信詩雲低馬上人晉書陶潛傳謂親朋曰聊欲絃歌以為三徑之資可乎執事者聞以為彭澤令韋應物登寶意寺上方舊遊自注寺在武功曽居此寺翠嶺香臺出半天庾闡詩翔霄拂翠嶺謝惠連詩飛蓋興翠嶺劉孝綽詩經臺總香藥李恆詩香臺瞰碧雲鮑照詩高峯插半天萬家煙樹滿晴川史記年表大侯不過萬家鮑照詩青冥搖煙樹袁嶠之詩俯仰晴川渙張九齡詩煙靄繞晴川諸僧近住不相識梁武帝文諸僧若披如來衣不行如來行是假名僧晉書陸機傳與弟雲入洛張華重其名如舊相識坐聽微鐘記往年陳子昻詩坐聽峽猿愁孔德紹詩臨風聽曉鐘蔡孚詩栁岸梅洲勝往年盧綸曲江春望西京記曲江以流水屈曲故名寰宇記曲江池漢武帝所造名為宜春苑其水曲折有似廣陵之江昌蒲翻葉栁交枝吕氏春秋冬至後五旬七日菖始生菖者百草之先也高誘注菖菖蒲水草也吳均詩莒蒲葉未齊宋迪詩翻葉迎紅日劉邈詠栁詩楊栁濯絲枝江總詩交枝落蔓隂暗上蓮舟鳥不知蕭子範詩蓮舟拂芰歸張九齡詩鳥避仙舟發錢起詩深樹雲來鳥不知更到無花最深處謝朓詩無花亦無實何以贈離居逰城南注曲江其深處不見底湘中記昭潭其下無底湘水最深處也玉樓金殿影參差十洲記崑崙山上有金臺五所玉樓十二所江總詩流泉灌金殿唐太宗詩日麗參差影郎士元夜泊湘江湘山木落洞庭波史記秦始皇紀浮江至湘山庾肩吾詩郢路方遼逺湘山始蔽虧漢武秋風辭草木黃落兮雁南飛張載詩白露終夜結木落柯條森水經注湘水之出於陽朔則觴為之舟至洞庭日月若出入於其中也楚辭洞庭波兮木葉下湘水連雲秋鴈多水經注湘水出零陵始安縣陽海山張衡詩我所思兮在桂林欲往從之湘水深潘嶽秋興賦高閣連雲江淹别賦值秋鴈兮飛日寂寞舟中誰借問後漢書馮衍傳守寂寞而存神沈約詩圓月在舟中庾信詩故人迎借問月明只自聽漁歌謝朓詩天高秋月明水經注衡山東南二面臨映湘川自長沙至此江湘七百里中有九背故漁者歌曰帆隨湘轉望衡九面李白詩漁歌月裡聞聽鄰家吹笙説文笙正月之音物生故謂之笙鳯吹聲如隔綵霞説文笙十三簧象鳯之身列仙傳王子喬好吹笙作鳯鳴丘遲詩詰旦閶闔開馳道聞鳯吹江淹賦見綵霞之夕照不知牆外是誰家吕氏春秋耳不能聞帷牆之外梁簡文帝詩誰家妖麗鄰中女李白詩不知秋思在誰家重門深鎖無尋處謝朓詩平明振衣坐重門猶未開庾信詩何處更相尋疑有碧桃千樹花徐陵書桃果三名栗園千樹顧况江上故居家在雙峯蘭若邊李白詩我家寄在沙丘旁庾信詩熊耳對雙峯杜甫詩身許雙峯寺門求七祖禪釋氏要覽蘭若梵言阿蘭若唐言無諍也一聲秋磬發孤煙杜甫詩一聲何處送書雁五經要義磬立秋之樂也范雲詩江干逺樹浮天末孤煙起山連極浦鳥飛盡庾信賦節竪山連文橫水蹙楚辭望涔陽兮極浦謝朓賦冽攢笳兮極浦丘遲詩巢空初鳥飛岑參詩惆悵鳥飛盡南溪聞夜鐘月上青林人未眠江淹别賦日下壁而沈采月上軒而飛光庾信七夕賦兔月初上羊燈次安揚雄賦若光若滅者布乎青林之下庾信詩白石仙人芋青林隱士松李白詩日色已盡花含煙月明欲素愁不眠戎昱移家别湖上亭本事詩韓晉公鎮浙西戎昱為部內刺史郡冇酒妓善歌昱情屬甚厚浙西樂將聞其能白晉公召置籍中昱餞於湖上為歌詞以贈之既至開筵命歌遂唱戎詞曲終韓問曰戎使君於汝寄情耶曰然淚隨言下韓命與妓百縑即時歸之其詞云云好是春風湖上亭梁簡文帝詩春風本自奇楊栁最相宜梁元帝纂要春曰青陽風曰陽風春風李白詩暝色湖上來王昌齡詩湖上水渺漫清江不可涉李白詩朝登北湖亭栁條藤蔓繫離情梁簡文帝詩栁條恆著地庾肩吾詩葉破栁條空蘇頲詩竹妨山鳥路藤蔓野人家杜甫詩藤蔓曲藏蛇王維詩賴諳山水趣稍解别離情黃鶯久住渾相識武平一詩黃鶯未解林間囀王維左掖梨花詩黃鶯弄不足銜向玉階飛蜀志諸葛亮傳亮分兵屯田為久住之基庾信小園賦三月負鋤相識五月披裘見尋李白詩白雲遙相識欲别頻啼四五聲江淹别賦與子之别思心徘徊梁元帝詩别時鳥啼户梁簡文帝詩鶯啼春欲駛李白詩坐來黃葉落四五梁簡文帝詩今旦聞春鳥何啻兩三聲于鵠大歷貞元間詩人隱居漢陽嘗為諸府從事泛舟入後溪雨餘芳草淨沙塵梁簡文帝詩雨餘雲稍薄庾信詩雲歸識雨餘王褒詩秋泉帶雨餘西都賦竹林果園芳草甘木崔皓詩芳草萋萋鸚鵡洲李白詩淪落歸沙塵杜甫詩回風颯颯吹沙塵水緑沙平一帶春梁元帝詩水緑晚萍生江淹别賦春草碧色春水緑波何遜詩水緑半含苔禇亮詩沙平寒水落皇甫曽詩平沙雪度春王勃詩花栁一園春惟有啼鵑似留客成都記杜鵑亦曰子規鮑照詩荆棘鬱蹲蹲中有一鳥名杜鵑王維詩萬壑樹參天千山響杜鵑梁簡文帝詩炊雕留上客又樂府擲黃金留上客桃花深處更無人禮記仲春之月桃始花江總詩桃花長新浪李白詩桃花流水杳然去易閴其無人王維詩西出陽關無故人王涯宫詞迎風殿裏罷雲和西京賦既新作於迎風增露寒與儲胥注武帝因秦林光宫增通天迎風儲胥露寒杜甫詩昭陽殿裏第一人周禮春官大司樂孤竹之管雲和之琴瑟武帝內傳董雙成吹雲和之笙王昌齡詩斜抱雲和深見月朦朧樹色隱昭陽起聽清蟬步淺莎李白詩白如白露鮮清如清唳蟬杜甫詩宫莎軟勝綿為愛九天和露滴漢書郊祀志九天巫祀九天注九天者謂中央鈞夭東方蒼天東北旻天北方玄天西北幽天西方皓天西南朱天南方炎天東南陽天也李白詩咳唾落九天隨風生珠玉謝靈運詩亭亭曉月映泠泠朝露滴孟浩然詩竹露滴清聲萬年枝上最聲多謝朓詩風動萬年枝日華承露掌沈約詩高梨冇繁露何減萬年枝孟浩然詩同聲和者多王建宫詞蓬萊正殿壓雲鼇唐六典大明宫有蓬萊殿儲光羲詩樹出蓬萊殿城開閶闔門漢書金安上傳數臨正殿延見羣臣傅休奕朝會賦坐太極之正殿嚴嵯峨以崔巍李白詩巨鼇莫戴三山去我欲蓬萊頂上行紅日初生碧海濤唐太宗詩紅輪不暫駐楊庶詩仙輪帶日紅李嶠詠弓詩桑質表初生十洲記扶桑在東海之東岸一萬里東復有碧海廣狹浩汗與東海等正作碧色甘香味美薛道衡詩駕黿臨碧海開著五門遙北望書闢四門傳開闢四方之門未開者禮記注天子五門臯雉庫應路也揚雄河東賦登六觀以遙望兮聊浮遊以經營阮籍詩登高臨四野北望青山阿赭黃新帕御牀高唐書車服志天子袍衫用赭黃遂禁臣民服支遁人日詩黃裳羅帕質杜甫至日詩去嵗兹辰捧御牀二籠煙紫氣日曈曈古三墳山氣籠煙川氣浮光晉書張華傳斗牛之間常有紫氣梁簡文帝詩栁路日曈曈宣政門開玉殿風六典大明宫正南曰丹鳯門門內正殿曰含元殿其北曰宣政門門內曰宣政殿南史朱異傳升紫霄之丹地排玉殿之金扉五刻閣前卿相出嵇康書華子魚不強幼安以卿相何承天詩卿相非所盼下簾聲在半天中盧詢樂府下簾還憶月孫綽賦鵬為羽傑鯤稱介豪翼遮半天背負重霄鮑照詩高岑隔半天三金吾除夜進儺名漢書百官公卿表中尉秦官武帝更名執金吾注金吾鳥名也主辟不祥天子出行職主先導以禦非常故執此鳥之象因以名官杜審言詩季冬除夜接新年秦中嵗時紀嵗除日進儺皆作鬼神狀內二老兒儺公儺毋畫袴朱衣四隊行廣韻袴脛衣也周禮夏官方相氏掌蒙熊皮黃金四日玄衣朱裳執戈揚盾