body:
  text: 欽定四庫全書集部八御選唐詩目録上總集類卷一五言古一唐太宗皇帝帝京篇九首於北平作幸武功慶善宫賦經破薛舉戰地初晴落景中宗皇帝九月九日幸臨渭亭登髙并序登驪山髙頂寓目明皇帝賜諸州刺史以題座右送忠州太守康昭逺等送李雍之任滑臺溫湯對雪登蒲州逍遙樓經河上公廟過王濬墓過晉陽宫行次成臯途經先聖擒建德之所緬思功業感而賦詩校獵義成喜遇大雪率題九韻以示羣臣德宗皇帝巾和節賜百官燕集因示所懷重陽燕九月十八賜百僚追賞因示所懷送張建封還鎮卷二五言古二王績古意岑文本奉和正日臨朝上官儀早春桂林殿應詔張文琮同潘屯田冬日早朝王勃山亭夜宴詠風劉庭芝嵩嶽聞笙采桑孤松篇盧崇道新都南亭别郭大元振李嶠秋山望月酬李騎曹早發苦竹館宋之問夜飲東亭雨從箕山來初至崖口入崖口五渡寄李適薛稷早春魚亭山邢象玉古意蘇頲昆明池宴坐王兵部珣見示以三韻因而有答卜園納凉即事奉和聖製登蒲州逍遙樓張說早霽南樓崔湜冀北春望張九齡晨出郡舍林下入廬山觀瀑布泉西山祈雨是日輒應賦詩言志巡按自灕水南行洪子輿嚴陵祠陳子昻酬暉上人夏日林泉修竹篇與東方左史虬卷三五言古三李白贈閭邱處士以詩代書答元丹邱望終南山寄紫閣隱者月夜江行寄崔員外宗之秋夜宿龍門香山寺奉寄王方城十七丈奉國營上人從弟幼成令問遊敬亭寄崔侍御送楊山人歸嵩山秋日魯郡堯祠亭下宴别杜補闕范侍御尋山僧不遇下終南山過斛斯山人宿置酒安州般若寺水閣納凉喜遇薛員外尋高鳳石門山中元丹丘遊南陽清泠泉挂席江上待月有懷登單父陶少府半月臺登太白峯遊謝氏山亭九日登巴陵置酒望洞庭水軍秋登巴陵望洞庭卷四五言古四李白與周剛清溪玉鏡潭宴别望廬山瀑布水遊太山三首奉陪商州裴使君遊石娥溪宿巫山下經下邳圯橋懷張子房待酒不至望月有懷落日憶山中春日獨酌二首月下獨酌聽蜀僧濬彈琴金陵聽韓侍御吹笛贈黃山胡公求白鷴卷五五言古五杜甫萬丈潭飛仙閣遊龍門奉先寺望嶽同諸公登慈恩寺塔赤谷西崦人家夏日李公見訪孟浩然宿叢師山房待丁公不至耶溪泛舟聽鄭五愔琴萬山潭南亭懷辛子登蘭山寄張立漢中漾舟題終南翠微寺空上人房尋香山湛上人題鹿門山王維春中田家作至滑州隔河望黎陽憶丁三寓終南别業渭川田家韋侍郎山居納凉崔濮陽兄季重前山興偶然作藍田石門精舍王昌齡齊心儲光羲釣魚灣幽居述華清宫霽後詒馬十一巽題陸山人樓泛茅山東溪仲夏入園中東陂終南幽館獻蘇侍御田家即事同諸公秋霽曲江俯見南山常建江上琴興張山人彈琴夢太白西峯湖中晚霽白湖寺後溪宿雲門卷六五言古六高適同薛司直諸公秋霽曲江俯見南山作岑參先主武侯廟南池夜宿思王屋青蘿舊齊登嘉州淩雲寺作緱山西峯草堂作自潘陵尖還少室居止秋夕憑眺秋夕聽羅山人彈三峽流泉送顔平原并序劉長卿龍門雜咏浮石瀨題蕭郎中開元寺新構幽寂亭江中晚釣寄荆南一二相識登西陵寺塔錢起酬王維春夜竹亭贈别夢尋西山準上人登聖果寺南樓雨中望嚴協律遊輞川至南山寄谷口王十六李祭酒别業俯視川林前帶雷岫韋應物同德寺雨後寄元侍御李博士春中憶元二遊龍門香山泉藍嶺精舍栁宗元秋曉行南谷經荒村早梅戲題階前芍藥崔皓入若耶溪崔曙山下晚晴潁陽東溪懷古丘為題農父廬舍泛若耶溪尋西山隱者不遇獨孤及同徐侍郎五雲溪新亭重集作長孫佐輔山居吳筠遊廬山五老峯登廬山東峯觀九江合彭蠡湖補編李白登錦城散花樓劉長卿白鷺張九齡奉和聖製送十道採訪使及朝集使張說過蜀道山李白廬山東林寺夜懷送溫處士歸黃山白鵝峯舊居遊南陽白水登石激作九日天台曉望書情寄從弟邠州長史昭杜甫大雲寺贊公房王維早朝贈裴十迪常建西山岑參聞崔十二侍御灌口夜宿報恩寺林卧劉長卿關門望華山奉陪蕭使君入鮑達洞尋靈山寺卷七七言古一中宗皇帝十一月誕辰內殿宴羣臣效柏梁體聯句景龍四年正月五日移仗蓬萊宫御大明殿㑹吐蕃騎馬之戲因重為柏梁體聯句明皇帝初入秦川路逢寒食春臺望沈佺期入少密溪宋之問寒食陸渾别業龍門應制劉庭琦奉和聖製瑞雪篇孫逖山隂縣西樓李白侍從宜春苑奉詔賦龍池栁色初青聽新鶯百囀歌西嶽雲臺歌送丹丘子送羽林陶將軍同王昌齡送族弟襄歸桂陽别山僧夜泊黃山聞殷十四吳吟把酒問月同族弟金城尉叔卿燭照山水壁畫歌當塗趙炎少府粉圖山水卷八七言古二杜甫短歌行贈王郎司直𤣥都壇歌寄元逸人醉歌行贈公安顔英華有十字少府請顧公題壁戲題王宰畫山水圖歌高都護驄馬行飲中八仙歌驄馬行渼陂行奉先劉少府新畫山水障歌高適賦得還山吟送沈四山人寄宿田家岑參漁父西亭子送李司馬范公叢竹歌送魏叔卿擢第歸東都因懷魏校書陸渾喬潭李頎送從弟遊江淮兼謁鄱陽劉太守夏宴張兵曹東堂愛敬寺古藤歌王維桃源行寒食城東即事崔皓七夕詞孟浩然夜歸鹿門歌丁仙芝餘杭醉歌贈吳山人卷九七言古三儲光羲薔薇張謂湖中對酒作王季友觀于舍人壁畫山水宿東溪李十五山亭元結宿無為觀劉長卿嚴陵釣臺送李康成赴江東使望龍山懷道士許法稜錢起賦得青城山歌送楊杜二郎中赴蜀軍畫鶴篇韋應物聽鶯曲皇甫冉雜言月洲歌送趙冽還襄陽郎士元郢州西樓吟張籍採蓮曲韓愈聽穎師彈琴栁州羅池廟詩石鼓歌李賀李憑箜篌引權德輿和李中丞慈恩寺清上人院牡丹花歌栁宗元漁翁張若虛春江花月夜陳潤宿北樂館皎然支公詩觀王右丞維滄洲圖歌補編賀知章望人家桃李花王維送崔五太守杜甫古柏行元結說回溪招退者韓翃送客還江東權德輿太原鄭尚書遠寄新詩走筆酬贈因代書賀韓愈雉帶箭劉禹錫洞庭秋月行西山蘭若試茶歌張籍賈客樂卷十五言律一太宗皇帝過舊宅臨洛水望終南山首春儀鸞殿早秋詠風詠雨秋日翠微宫秋日守嵗詠雨三層閣上置音聲賦得花庭霧春池栁賦簾秋日明皇帝經魯祭孔子而嘆之唯此溫泉是稱愈疾豈余獨受其福思與兆人共之乘暇尋遊乃言其志過老子廟途次陜州野次喜雪送賀知章軒遊宫十五夜觀拔河俗戲並序同劉晃喜雨千秋節賜羣臣鏡送趙法師還蜀因名山奠簡幸蜀西至劍門同玉真公主過大哥山池卷十一五言律二虞世南發營逢雨應詔侍宴歸雁堂陳叔達早春桂林殿應詔李百藥奉和正日臨朝應制楊師道初秋夜坐應詔上官儀詠雪應詔王勃仲春郊外杜審言奉和七夕宴兩儀殿應制蓬萊三殿侍宴奉敕詠終南山梨園亭侍宴應制和晉陵陸丞早春遊望李嶠長寧公主東莊侍宴奉和幸白鹿觀應制奉和九日幸臨渭亭登高應制得歡字甘露殿侍宴應制宗楚客正月晦日侍宴滻水應制賦得長字沈佺期奉和洛陽玩雪應制立春日內出綵花應制宋之問夏日仙萼亭應制麟趾殿侍宴應制李適奉和九日幸臨渭亭登高應制奉和遊禁苑幸臨渭亭遇雪應制李嶠奉和春日遊苑喜雨應詔趙彥昭奉和人日清暉閣宴羣臣遇雪應制劉憲奉和九月九日聖製登慈恩寺浮圖應制姚崇故洛陽城侍宴應制夜渡江張說奉和聖製經魯祭孔子應制恩敕麗正殿書院賜宴應制得林字奉和聖製溫泉言志應制侍宴滻水賦得濃字蘇頲奉和七夕宴兩儀殿春日芙蓉園侍宴應制張九齡奉和聖製送李尚書入蜀湖口望廬山瀑布水張均嶽陽晚景李商隱小園獨酌孟浩然臨洞庭李白宫中行樂秋登宣城謝眺北樓送友人入蜀江夏别宋之悌王維觀獵過香積寺歸輞川作岑參送張子尉南海登總持閣卷十二五言律三杜甫春宿左省初月天河夜宴左氏莊禹廟登兖州城樓常建破山寺後禪院祖詠蘇氏别業過鄭曲錢起秋夕與梁鍠文宴韋應物送汾城王主簿淮上喜會梁州故人張籍宿江店張祜題松汀驛姚合寄友人許渾嚴陵釣臺泊貽行侣喻坦之發浙江曹松秋日送方干遊上元釋廣宣九月菊花詠應詔杜審言宿羽亭侍宴沈佺期三月禁園侍宴李白訪戴天山道士不遇宋之問春日芙蓉園侍宴應制李嶠春日芙蓉園侍宴李白宫中行樂詞二首王維送元中丞轉運江淮杜甫晚出左掖高適别馮判官李白觀獵宋之問陸渾山莊王勃郊興王維酬張少府山居即事孟浩然尋白鶴巖張子容隱居宋之問壽陽王花燭圖劉長卿送張判官還京覲省岑參夜過盤石隔河望永樂寄閨中效齊梁體沈佺期和洛州康士曹庭芝望月有懷杜甫春夜喜雨孟浩然和張丞相春朝對雪盧照鄰春晚山莊率題二首王維山居秋暝孟浩然晚春寒食宴張明府宅沈佺期九日臨渭亭侍宴應制得長字春夜宿直孟浩然寒夜杜甫數陪李梓州泛江有女樂任諸舫戲為艷曲盧照鄰十五夜觀燈劉長卿幽琴王維從岐王夜宴衛家山池和尹諫議史館山池李白昌禪師山池卷十三五言律四杜甫鄭氏東亭李白宴陶家亭子王維終南山漢江孟浩然武陵泛舟杜甫長江楊炯梅花落岑參終南東溪中作與鮮于庶子泛漢江晦日陪侍御泛北池詠郡齊壁畫片雲杜甫題𤣥武禪師屋壁沈佺期紫騮馬杜甫胡馬駱賓王秋菊李白望漢陽栁色寄王宰杜甫嚴鄭公宅同咏竹得香字江梅劉長卿晚桃陳子昂夏日遊暉上人房沈佺期樂成白鶴寺遊少林寺攜琴得酒尋崇濟寺僧院孟浩然大禹寺義公房陳子昂春日登金華觀王勃郊園即事虞世南侍宴應詔賦韻得前字王績野望王勃聖泉宴遊三覺寺蘇味道春日應制喬知之侍宴應制杜審言都尉山臺劉長卿集梁耿開元寺所居院沈佺期嶽館宋之問扈從登封途中作扈從登封告成頌嵩山嶺應制張說和登驪山張九齡從幸溫泉喜雪李乂春日侍宴芙蓉園應制楊庶奉和九月九日登慈恩寺浮圖應制李恆奉和九月九日聖製登慈恩寺浮圖應制宗楚客奉和人日清暉閣宴羣臣遇雪應制韋述春日山莊孫逖上陽水窗賜宴宿雲門寺同邢判官尋龍湍觀歸湖中進船泛洛水李白宫中行樂三首侍從遊宿溫泉宫作口號贈徴君鴻廣陵贈别渡荆門送别送董將軍西征送友人尋雍尊師隱居流夜郎至江夏陪長史叔及薛明府宴興德寺南閣謝公亭卷十四五言律五孟浩然精思館山房過故人莊送友東歸夜渡湘水舟中曉望王維奉和聖製賜史供奉曲江宴應制從岐王過楊氏别業應教秋宵寓直輞川閒居贈裴秀才迪歸嵩山作輞川閒居送梓州李使君登河北城樓作使至塞上岑參奉送李太保兼御史大夫充渭北節度使寄左省杜拾遺酬崔十三陪封大夫宴瀚海亭納凉梁州陪趙行軍龍岡寺北庭泛舟宴王侍御杜甫懷李白陪鄭廣文遊何將軍山林送翰林張司馬南海勒碑王灣次北固山下盧象峽中作崔皓題潼關樓祖詠泊揚子岸題韓少府水亭儲光羲題山泉李頎宴陳十六樓送竇參軍王昌齡駕出長安張謂郡南亭子宴賈至對酒曲崔曙緱山廟閻防夜泛黃河作徐晶同蔡孚五亭詠劉長卿尋南溪常山道人隱居錢起和萬年成少府寓直秋夜對月寄楊補闕皇甫冉送盧山人歸林慮山歸渡洛水皇甫曾送孔徴士和謝舍人寓直司空曙題鮮于秋園林李端茂陵山行陪韋金部酬大理寺評事張芬賦得山泉送房造雲陽觀寄袁稠題崔端公園林耿湋早朝贈田家翁李嘉祐和張舍人中書寓直和都官苗員外秋夜寓直對雨簡諸知已送韋雍歸鍾山吳鞏白雲溪卷十五五言律六竇叔向春日早朝應制韓翃題蘇許公