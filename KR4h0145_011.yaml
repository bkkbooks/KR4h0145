body:
  text: 欽定四庫全書御選唐詩卷七七言古中宗皇帝十一月誕辰內殿宴羣臣效柏梁體聨句舊唐書中宗紀顯慶元年十一月乙丑生於長安唐書髙宗紀顯慶元年十一月乙丑以子顯生賜京官朝集使勳一轉三輔黃圗武帝元鼎二年春起柏梁臺帝嘗置酒其上詔羣臣和詩能七言者乃得上潤色鴻業寄賢才帝班固西都賦序內設金馬石渠之署外興樂府協律之事以興廢繼絶潤色鴻業書任官惟賢才左右惟其人晉書山濤傳甄拔屈隱搜訪賢才叨居右弼愧鹽梅李嶠舊唐書本傳神龍二年代韋安石為中書令三年加修文館大學士監修國史封趙國公易林左輔右弼金玉滿匱六典龍朔二年改中書省為西臺令為右相書若作和羮爾惟鹽梅傳羮須鹽醋以和之運籌帷幄荷時來宗楚客舊唐書中宗紀景龍二年九月兵部尚書郢國公宗楚客左衛將軍紀處訥並同中書門下三品史記髙帝紀運籌帷幄之中決勝千里之外吾不如子房陶潛詩時來茍𡨕會宛轡憩通衢職掌圖籍濫蓬萊劉憲舊唐書本傳神龍初自吏部侍郎出為渝州刺史俄而復入為太僕少卿兼修國史加修文館學士六典𢎞文館學士掌詳正圖籍教授生徒又武德初置修文館復改為𢎞文館又學者稱東觀為老氏藏室道家蓬萊山兩司謬忝謝鍾裴崔湜舊唐書本傳景龍二年遷兵部侍郎俄拜吏部侍郎尋轉中書侍郎同中書門下平章事與鄭愔同知選事又中宗紀二年冬西京吏部設兩侍郎銓試東都又置兩銓魏志鍾會傳會字士季正始中為祕書郎遷尚書中書侍郎世説王濬沖裴叔則詣鍾士季鍾曰裴楷清通王戎簡要後二十年此二賢當為吏部尚書冀爾時天下無滯才禮樂銓管效涓埃鄭愔唐書中宗紀三年三月太常少卿鄭愔守吏部侍郎續漢書張奮拜太常上疏言漢當改作禮樂圖書謹條禮樂異議三事願下有司以時考定六典太常卿之職掌邦國禮樂郊廟社稷之事少卿為之二説文涓小流貌又埃塵也李善上文選注表撮壤崇山導涓宗海謝朓詩散漫似輕埃陳師振旅清九垓趙彥昭舊唐書中宗紀三年二月以兵部侍郎趙彥昭為中書侍郎同中書門下平章事詩陳師鞠旅又振旅闐闐淮南子我與子汗漫期乎九垓之上梁簡文帝南郊頌九垓同軌四海無波欣承顧問侍天杯李適舊唐書本傳景龍中為中書舍人轉工部侍郎後漢書章帝紀朕思逢直士側席異聞皆欲置於左右顧問省納晉屮興書徐邈性好學尤善經傳補中書舍人專在西省每有顧問輒有獻替十洲記周穆王時西域獻夜光常滿杯暝夕出杯以向天比旦水汁滿中甘而香美斯實靈人之器張衡西京賦昔者天帝説秦繆公而覲之饗以鈞天廣樂帝有醉焉銜恩獻夀柏梁臺蘇頲舊唐書本傳神龍中纍遷給事中修文館學士中書舍人漢書東方朔傳朔捧觴再拜上萬嵗夀顔延之七繹昵賔獻夀中人奉膳謝莊賦乃命執事獻夀羞璧三輔舊事柏梁臺以香柏為之香聞數十里黃縑青簡奉康哉盧藏用舊唐書本傳景龍中為吏部侍郎又遷黃門侍郎兼昭文館學士轉工部侍郎尚書右丞劉孝威詩仁祀盛黃縑禮壇優紺席蘇頲授薛稷諫議大夫制擁垣密勿字列黃縑仙闥從容文飛赤管後漢書吳祐傳父恢為南海太守欲殺青簡以寫經書庾肩吾詩羽陵青簡出媯泉緑字分書庶事康哉潘尼詩協心毗聖世畢力讃康哉鮿生侍從忝王枚李人舊唐書本傳景龍中纍遷中書舍人史記留侯世家鮿生教我距關通典中書舍人専掌詔誥侍從署敕宣旨漢書王褒傳褒字子淵蜀人作中和樂職詩選好事者依鹿鳴之聲習而歌之上乃徵褒既至詔褎為聖主得賢臣頌上數與褒等放獵所幸宫館輒為歌頌又枚乘傳乘字叔淮隂人遊梁梁客皆善屬詞賦乘尤髙武帝聞乘乃以安車蒲輪徵謝惠連雪賦乃命旨酒會賔友召鄒生延枚叟右掖司言實不才馬懷素舊唐書本傳應進士舉登文學優贍科四遷左臺監察御史六典皇城在都城之西北南面三門中曰端門左曰左掖門右曰右掖門漢舊儀侍御史周官也漢興因而不改掌注言語糾諸不法宗伯秩禮天地開薛稷舊唐書本傳稷舉進士景龍中為諫議大夫昭文館學士纍拜中書侍郎歷工部禮部尚書周禮大宗伯之職掌建邦之天神人鬼地示之禮以佐王建邦國書天秩有禮自我五禮有庸哉帝歌難續仰昭回宋之問舊唐書本傳景龍中為考工員外郎時中宗增置修文館學士擇朝中文學之士之問與薛稷杜審言並膺其選當時榮之書帝庸作歌曰敕天之命惟時惟幾乃歌曰股肱喜哉元首起哉百工熙哉乃賡載歌曰元首明哉股肱良哉庶事康哉傳賡續載成也詩倬彼雲漢昭回于天微臣捧日變寒灰逺慚班左愧遊陪上官婕妤舊唐書后妃傳名婉兒常勸帝廣置昭文學士盛引當朝詞學之臣數賜遊宴賦詩倡和漢武帝內傳景帝夢神女捧日以授王夫人夫人吞之十四月而生武帝鮑照詩寒灰滅更燃漢書外戚傳成帝遊於後庭嘗欲與班婕妤同輦載婕妤辭上善其言乃止婕妤誦詩每進見上依則古禮晉書后妃傳左貴嬪名芬少好學善綴文帝聞而納之奉始八年封修儀陸機詩居陪華幄出從朱輪鮑照詩陳鍾陪夕宴日唐詩紀事景龍二年十一月十五日中宗皇帝降誕內殿宴羣臣因為柏梁體聨句帝謂侍臣曰今天下無事朝野多歡欲與卿等詞人時賦詩宴樂可識朕意不須惜醉大學士李嶠宗楚客等跪奏曰臣等多幸同遇昌期謬以不才策名文館思勵駑朽庶裨河嶽既陪天歡不敢不醉此後每遊别殿幸離宫駐蹕芳苑鳴笳仙禁或戚里宸筵王門巹席無不畢從景龍四年正月五日移仗蓬萊宫御大明殿會吐蕃騎馬之戲因重為柏梁體聨句唐書中宗紀神龍三年九月庚子大赦改元景龍唐書儀衛志凡朝會之仗三衛番上分為五仗號衙內五衛一曰供奉仗以左右衛為之二曰親仗以親衛為之三曰勳仗以勳衛為之四曰翊仗以翊衛為之五曰散手仗以親勛翊衛為之每月以四十六人立內廊閣外號曰內仗朝罷皇帝步入東序門然後放仗雍録大明宫本太極宫之後苑東北面射殿也地在龍首山上太宗初於其地營永安宫貞觀九年正月改名大明宫髙宗龍朔二年就修大明宫改為蓬萊宫取殿後蓬萊池為名也至三年四月移仗蓬萊宫之含元殿二十五日始御紫宸咸亨元年改蓬萊宫為含元殿長安五年又改為大明宫又東內大明宫含元殿之北為宣政殿宣政之北為紫宸殿紫宸之北為蓬萊殿又唐都城有三大內太極宫在西故名西內大明宫在東故名東內别有興慶宫號南內也三內更迭受朝而大明最數玉海含元殿長安元年改為大明殿唐書地理志龍朔後皇帝常居大明宫乃謂之西內髙宗厭西內湫濕龍朔三年始大興葺曰蓬萊宫吐蕃傳吐蕃本西羌屬蓋百有五十種散處河湟江岷間地直京師西八千里南史傅𢎞之傳𢎞之素習騎乘於姚泓馳道內戲馬甚有姿制大明御宇臨萬方帝廣韻宇又作宇荀子賦充盈乎大宇晉書武帝紀握圖御宇敷化導民沈約樂歌清蹕朝萬宇端冕臨正陽書誕告萬方宋書樂志時齊七政朝此萬方顧慙內政翊陶唐皇后唐書中宗后韋氏京兆萬年人帝在東宫被選為妃嗣聖初立為皇后沈約謝章懷慙起懼載溢心顔周禮天官女史掌王后之禮以詔后治內政崔駰大理針邈矣臯陶翊唐作士書惟彼陶唐有此冀方晉書樂志巍巍蕩蕩道邁陶唐典引炳諸典謨以冠德卓絶者莫崇乎陶唐鸞鳴鳳舞向平陽長寧公主唐書長寧公主中宗女韋后所生公羊傳天子嫁女於諸侯必使諸侯同姓者主之山海經鸞鳥自歌鳳鳥自舞孫氏瑞應圖鸞鳥鳳凰之佐也律中五音喜則鳴舞易林龍遊鳳舞嵗樂民喜張正見歌鸞歌鳳舞集天台金銀宫闕相向開史記曹參世家食邑平陽號曰平陽侯漢書外戚傳景帝王皇后長女號曰平陽公主史記衛青傳注如淳云本陽信長公主為平陽侯所尚秦樓魯館沐恩光安樂公主唐書安樂公主中宗最幼女姝秀辨敏韋后尤愛之列仙傳蕭史善吹簫秦穆公有女字弄玉妻焉教弄玉吹簫作鳯鳴為作鳯樓夫妻居其上感鳳凰來集一夕皆隨鳳去梁昭明太子詩好在鳳樓中春秋莊公元年築王姬之館于外謝朓臨海公主銘飾館東魯言歸景族詩為龍為光箋言天子恩澤光耀被及者也無心為子輒求郎太平公主唐書太平公主髙宗女武后所生后愛之傾諸女列子亦非無心者所能得近後漢書明帝紀館陶公主為子求郎不許謂羣臣曰郎官上應列宿出宰百里非其人則民受其殃是以難之雄才七步謝陳王溫王重茂舊唐書中宗第四子聖厯三年封北海王神龍初進封溫王唐書中宗神龍元年二月甲戌進封北海郡王重茂為溫王庾信謝滕王集序啓雄才蓋代逸氣橫雲魏志陳思王植字子建年十餘嵗誦讀詩論及辭賦數十萬言善屬文大和六年二月以陳四縣封植為陳王世説文帝嘗令東阿王七步中作詩不成者行大法應聲便得詩南史謝靈運云天下才共一石曹子建獨得八斗竒才博識安足繼之當熊讓輦愧前芳上官昭容唐書上官昭容名婉兒西臺侍郎儀之孫天性韶警善文章年十四有所制作若素搆自通天以來內掌誥命掞麗可觀中宗即位大被信任進拜昭容漢書外戚傳上幸虎圈熊佚出圈欲上殿馮婕妤直前當熊而立元帝以此倍敬重焉又成帝遊于後庭嘗欲與班婕妤同輦載媫妤辭上善其言而止傅休奕班媫妤畫贊斌斌婕妤履正修文進辭同輦以禮匡君納侍顯德讜對解紛晉書后妃傳后承前訓奉述遺芳又遺芳餘烈煥乎可紀再司銓管恩可忘吏部侍郎崔湜唐書中宗景龍三年三月戊午中書侍郎兼檢校吏部侍郎崔湜為中書侍郎同中書門下三品舊唐書中宗紀景龍二年冬西京吏部設兩侍郎銓試東都又置兩銓晉書阮放傳遷吏部郎在銓管之任甚有稱績詩胡能有定俾也可忘漢書蕭何傳上曰蕭何舉家數十人皆隨我功不可忘也劉孝綽詩故居猶可忘故人安可忘文江學海思濟航著作郎鄭愔唐書中宗景龍三年三月戊寅太常少卿鄭愔守吏部侍郎同中書門下平章事五月丙戌貶為江州司馬按舊唐書崔湜傳湜與愔同知選事銓綜失序為御史李商隱所劾愔坐配嶺表湜左轉為江州司馬上官昭容密與安樂公主曲為申理乃以愔為江州司馬授湜襄州刺史則愔為著作郎史無明文或雖貶而不之官故領此職也鍾嶸詩品陸文如海潘藻如江拾遺記京師謂鄭康成為經神何休為學海梁昭明太子啓涵蚌胎于學海卓爾超羣藴鵲抵於文山儼然孤秀張綰龍樓詩碑銘彼岸何逺津航絶濟萬邦考績臣所詳考功員外郎武平一唐書武平一名甄以字行博學工文辭隱嵩山修浮屠法屢詔不應中宗迫召為起居舍人景龍二年兼修文館直學士遷考功員外郎書協和萬邦詩綏萬邦屢豐年忠經聖君以聖德監于萬邦書三載考績三考黜陟幽明春秋繁露考績之法考其所積也天道積聚衆精以為光聖人積聚衆善以為功庾信步陸逞銘考績入於嵗成論功書之年表晉書周馥傳馥理識清正主定九品檢括精詳褒貶允當著作不休出中腸著作郎閻朝隱唐書閻朝隱字友蒨趙州欒城人景龍初纍遷著作郎魏書王粲傳注應璩為侍中典著作三輔黃圖承明殿著作之所也西京賦序內有承明著作之庭論衡著作者為文儒説經者為世儒詩民莫不逸我獨不敢休後漢書賈逵傳逵自為兒童常在太學不通人間事身長八尺二寸諸儒為之語曰問事不休賈長頭丘遲思賢賦問不休而鐘扣答無窮而座謐阮籍詩容好結中腸權豪屏迹肅嚴霜御史大夫竇從一舊唐書竇懷貞德明子改名從一神龍二年纍遷御史大夫張衡四愁詩序乂多豪右兼并之家注有權勢豪右大家也任昉會稽郡教權豪之族擅割林池勢富之家專利山海漢書蕭育為太守盜賊斷迹詩九月肅霜漢晉春秋怒如嚴霜喜如時雨潘嶽西征賦弛秋霜之嚴威流春澤之渥恩鑄鼎開嶽造明堂將作大匠宗晉卿舊唐書宗晉卿蒲州河東人神龍初纍遷將作大匠唐書宗晉卿河東蒲州人垂拱中典羽林兵宫苑間廏內外衆作無不總開中嶽造明堂鑄九鼎左傳昔夏之方有德也逺方圖物貢金九收鑄鼎象物而為之備禮記昔者周公朝諸侯於明堂之位天子負斧扆南向而立周禮冬官匠人周人明堂度九尺之筵東西九筵南北七筵堂崇一筵汲冢周書東方曰青陽南方曰明堂西方曰總章北方曰玄堂中央曰太廟晏子春秋明堂之制土事不文木事不鏤孝經援神契明堂者天子布政之宫玉醴由來獻夀觴吐蕃舍人明悉獵唐書景龍三年吐蕃遣使者納貢又遣宗俄請昏帝以雍王守禮女為金城公主妻之吐蕃遣尚贊吐明悉獵等逆公主後漢書張衡傳吸青岑之玉醴兮餐沆瀣以為糧雲笈七籖食玉醴之􅏁飲金液之漿庾肩吾詩玉醴吹巖菊銀床落井桐禮記衣其浣帛醴盞以獻薦其燔炙漢書叔孫通傳長樂宫成諸侯羣臣朝置法酒以尊卑次起上夀觴九行間居賦夀觴舉慈顔和唐詩紀事時上疑竇從一宗晉卿素不名屬文未即令續二人固請許之又吐蕃舍人明悉獵請令授筆與之悉獵云云上大悅賜與衣服明皇帝初入秦川路逢寒食水經注秦水西南歷隴川徑六槃口過清水城西南注清水清水上下咸謂之秦川初學記周舉魏武陸􅔘並云寒食斷火起於子推據左傳史記並無子推被焚之事按周禮司烜氏仲春以木鐸修火禁於國中注為季春將出火也今寒食準節氣是仲春之末清明是三月之初然則禁火蓋周之舊制洛陽芳樹映天津漢書地理志河南郡縣雒陽注漢火行忌水故去洛水而加佳一統志河南洛陽縣居洛水之陽故曰洛陽梁簡文帝洛陽道樂府洛陽佳麗所大道滿春光阮籍詩芳樹垂緑葉陸機詩嘉穀垂重穎芳樹發華巔元和郡縣志天津橘在河南縣北一統志天津橋在河南府城外西南架洛水隋煬帝建晉書天文志天津九星橫河中一曰天漢一曰天江灞岸垂楊窣地新一統志灞水在西安府城東本名滋水秦穆公改名章霸功也庾信詩蒲城桑落酒灞岸菊花秋三輔黃圖長楊宫中有垂楊數畝因為宫名説文窸窣聲不安梁元帝柳詩長條垂拂地輕花上逐風直為經過行樂處阮籍詩趙李相經過楊惲報孫會宗書人生行樂耳車洛陽道詩王孫重行樂不知虛度兩京春唐書地理志關內道古雍州之域上都初曰京城天寶元年曰西京至德二載曰中京上元二年復曰西京肅宗元年曰上都河南道古豫兖青徐之域東都隋置顯慶二年曰東都天寶元年曰東京肅宗元年復曰東京去年餘閏今春早左傳先王之正時也履端於始舉正於中歸餘於終注期之日三百六十有六日一月之行又有遲速而必分為十二月舉中氣以正月有餘日則歸之於終積而為閏曙色和風著花草蕭慤詩野禽喧曙色山樹動秋聲陸機賦熙朗日以熠耀扇和風其如波陸倕詩和風雜美氣下有真人遊可憐寒食與清明白帖春分後十五日斗指乙為清明沈佺期寒食詩洛中新甲子明日是清明光輝併在長安道古詩含英揚光輝沈炯詩名都一何綺春日吐光輝一統志陜西西安府長安縣秦因古城名曰長安漢置為縣隋遷都于此唐因之蔡君知長安道詩長安馳道上鐘鳴宫寺間自從關路入秦川祖孫登詩抽鞭上關路案關潼關也明皇又有潼關口號曰河曲回千里關門限二京一統志潼關在河南閿鄉縣西六十里與陜西西安府華隂縣分界爭道何人不戲鞭漢書霍光傳兩家奴爭道霍氏奴入御史府欲躢大夫門公子途中方蹴踘詩振振公子史記霍去病傳其在塞外穿域踏鞠注鞠以皮為之實以毛蹴踏而戲荆楚嵗時記寒食打毬注劉向别録曰蹴踘黃帝所造本兵勢也或云起於戰國鞠與毬同古人踏蹴以為戲也傳休奕彈碁賦序漢武帝好蹴鞠案踘古作鞠佳人馬上飛鞦韆楚辭聞佳人兮召余將騰駕兮偕逝史記陸賈傳時時前説稱詩書髙帝罵之曰乃公居馬上得之安事詩書庾信詩路髙山裏樹雲依馬上人古今藝術圖北方山戎寒食日用鞦韆為戲以習輕趫髙無際鞦韆賦序漢武帝後庭之戲本云千秋祝夀之詞也語訛轉為秋千後人不本其意乃造此字渭水長橋今欲渡書導渭自鳥鼠同穴三輔黃圖渭水出隴西首陽縣鳥鼠同穴山東北至華隂入河水經渭水又東過長安縣北注水上有梁謂之渭橋秦制也渭水貫都以象天漢橫橋南渡以法牽牛橋廣六丈南北二百八十步何遜詩風聲動密竹水影漾長橋庾信詩狹石分花徑長橋映水門蔥蔥漸見新豐樹後漢書光武紀望氣者至南陽曰氣佳哉鬱鬱蔥蔥漢書地理志京兆縣新豐髙祖七年置水經注髙祖王關中太上皇思東歸故象舊里制兹新邑立城社樹枌榆令街庭若一分置豐民以實兹邑故名之為新豐庾肩吾長安道詩逺聽平陵鐘遙識新豐樹逺看驪岫入雲霄一統志驪山在臨潼縣東南三里因驪戎所居故名山之麓溫泉所出宋之問詩驪岫接新豐岧嶤駕碧空阮籍詩寄顔雲宵間揮袖凌虛翔預想湯池起煙霧唐書地理志天寶六年更溫泉曰華清宫治湯井為池舊唐書職官志溫泉監掌湯池官禁之事北史蕭大圜傳近瞻煙霧逺睇風雲庾肩吾長安道詩合殿生光彩離宫起煙霧煙霧氛氲水殿開劉妙容宛轉歌願為煙與霧氛氲對容姿梁簡文帝大法頌序氛氲四照揮麗五色柳惲詩别島望雲臺天淵臨水殿徐陵詩荷開水殿香暫拂香輪歸去來魏武帝與楊彪書謹贈足下四望通幰七香車二乘注以七種香木為車駱賔王詩香輪騖水珠為網陶潛歸去來辭歸去來兮田園將蕪胡不歸今嵗清明忽己晚古詩嵗月忽已晚明年寒食更相陪沈約詩攜手同歡宴比迹共遊陪春臺望暇景屬三春梁元帝丹陽尹傳序求瘼餘晨頗多暇景唐太宗臨層亭賦惟萬幾之暇景屏千慮之巖廓嵇康琴賦三春之初麗服以時張協七命晞三春之溢露溯九秋之鳴颷髙臺聊四望謝朓詩積水望頳霞髙臺望歸翼王粲登樓賦登兹樓以四望兮聊暇日以消憂目極千里際楚辭九辨目極千里兮傷春心郭璞登百尺樓賦撫凌檻以遐想乃目極而肆運史記金城千里子孫帝王萬世之業也山川一何壯書奠髙山大川班固燕然山銘考傳驗圖窮覽其山川漢書東方朔傳拔劍割肉一何壯也沈約詩氣與三山壯太華見重巖書西傾朱圉鳥鼠至於太華山海經太華之山削成而四方其髙五千仞其廣千里晉書陸機陸雲傳贊疊意回舒若重巖之積秀棗據詩重巖吐神溜傾觴挹湧波終南分疊嶂詩終南何有有紀有堂毛萇注終南周之名山也五經要義太乙一名終南山在武功縣蓋終南南山之總名太乙一山之别號耳梁武帝詩夕池出濠渚朝雲生疊嶂梁簡文帝詩疊嶂迥參差連峯鬱相拒郊原紛綺錯蕭子範詩郊原共超逺林野雜依菲劉孝儀詩夜氣清簫管曉陳爍郊原西都賦周廬千列徼道綺錯參差多異狀上林賦臨曲江之隑州兮望南山之參差陸雲寒蟬賦靈嶽幽峻長林參差異苑溫嶠至牛渚磯聞水底有音樂之聲乃燃犀角而照之須臾見水族覆火竒形異狀其夜夢人謂曰與君幽明道隔何意相照耶佳氣滿通溝後漢書光武帝紀望氣者蘇伯阿望見舂陵郭唶曰氣佳哉鬱鬱蔥蔥然張衡東都賦東郊則有通溝大漕左思魏都賦疏通溝以濵路羅青槐以蔭塗遲步入綺樓列子子華之門徒縞衣乘軒緩步闊視北史栁遐傳徐步稍前曽不顧盼謝朓詩飛纓入華殿古詩交疏結綺窗虞世南詩日暉青瑣殿霞生結綺樓初鶯一一鳴紅樹梁書蕭子顯傳早雁初鶯開花落葉晉書劉實傳吾之好聞竽聲甚於先生欲一一列而聽之詩嚶其鳴矣求其友聲謝朓詩紅樹巖舒青莎水被歸鴈雙雙去緑洲漢武帝秋風辭草木黃落兮鴈南歸蘇頲詩雲前旅鴈歸晉書樂志雍雍雙鴈遊戲田畔公羊傳其諸為其雙雙而俱至者與述異記滄洲久視山下澄緑泉闊百餘步亦名流緑謝朓詩喧鳥覆春洲太液池中下黃鵠漢書武帝紀建章宫其西則有唐中數十里其北治大池漸臺髙二十餘丈名曰太液池又昭帝紀黃鵠下建章太液池中西京賦前唐中而後太液西京雜記始元元年黃鵠下太液池帝為歌曰黃鵠飛兮下建章昆明水上映牽牛漢書西南夷傳昆明國有池方二百里武帝欲伐昆明作池象之以習水戰西京賦乃有昆明靈沼黑水玄址牽牛立其左織女處其右三輔黃圖秦王都咸陽渭水貫都以象天漢橫橋南渡以法牽牛聞道漢家全盛日書我聞在昔太史公自序請悉論先人所次舊聞弗敢闕又天子始建漢家之封而太史公留滯周南不得與從事劉孝威詩漢家迎夏畢避暑甘泉宫漢書髙帝紀贊漢承堯運德祚已盛後漢書張綱傳大漢初隆及中興之世文明二帝德化尤盛班固典引竊作典引一篇雖不足雍容明盛萬分之一猶啓發憤悶覺悟童蒙光揚大漢軼聲前代沈佺期從幸漢故青門詩全盛今何在英雄復重論北齊元會大饗歌惟皇道升平日别館離宫趣非一上林賦離宫别館彌山跨谷謝朓詩觸賞聊自觀即趣咸已展江總樂府綺殿文雅遒玳筵歡趣密郭璞江賦及其譎變鯈恍符祥非一謝朓髙齋詩紛詭諒非一甘泉逶迤亘明光雍録古以甘泉名宫者三秦在渭南漢在雲陽隋在鄠縣西京賦處甘泉之爽塏乃隆崇而𢎞敷注甘泉山名阮籍東平賦逶迤漫衍繞以大壑夏侯湛山路吟道逶迤兮嵐氣侵武帝紀太初四年起明光宫辛氏三臺記加金玉珠璣為簾箔畫夜長明西都賦自未央而連桂宫北彌明光而亘長樂注三輔故事桂宫內有明光殿方言曰亘竟也五柞連延接未央漢書揚雄傳武帝廣開上林南至宜春鼎湖御宿昆吾旁南山而西至長楊五柞周袤數百里三輔黃圖五柞宫漢之離宫也宫中有五柞樹因以為名五柞皆連抱上枝覆蔭可數畝西京賦掩長楊而聨五柞繞黃山而款牛首景福殿賦階除連延蕭曼雲征范雲詩連延不可窮漢書髙帝至長安蕭何作未央宫潘嶽關中記未央宫殿皆疏龍首山土築之禮樂志靈殷殷爛揚光延夀命永未央周廬徼道縱橫轉史記衛令曰周廬設卒甚謹漢書西域傳龜兹王數來朝賀歸其國治宫室作徼道周衛如漢家儀音義直宿曰廬又中尉掌徼循京師謂遊徼循禁備盜賊也魏文帝詩天漢回西流三五正從橫江淹詩崤函多丘墟冀闕緬縱橫徐陵序椒房宛轉柘館隂岑宋之問歌松移岫轉左變而右易風生雲起出鬼而入神飛閣回軒左右長三輔黃圖武帝於未央宫營造日廣乃于宫西跨城池作飛閣通建章宫江淹詩置酒坐飛閣陸機吳趨行重欒承遊極回軒啓曲阿江淹詩神颷自逺至左右芙蓉披梁宣帝遊七山寺賦清流四繞吐溜悠長須念作勞居者逸世説謝奕作剡令有一老翁犯法以酒罰之太傅時年七八嵗在兄膝邊坐諫曰老翁可念何可作此晉書石勒載記勒力耕每聞鞞鐸之音歸以告其母母曰作勞耳鳴非不祥也東京賦經始勿亟成之不日猶謂為之者勞居之者逸注楚子曰翟亦有臺乎使者曰翟王茅茨不剪采掾不斫猶以作者太勞居者太逸也晉書嵇康傳任逸之情轉篤南史梁忠烈世子方傳性愛林泉好散逸勿言我後焉能恤論語非禮勿言又焉能為有焉能為亡詩我躬不閲遑恤我後沈約酬華陽先生詩豈忘平生懷靡盬不遑恤為想雄豪壯柏梁駱賔王與博昌父老書春渚青山載勞延想郭璞客傲羈九有之竒駿咸捴之於一朝豈惟豐沛之英南陽之豪武帝紀元鼎二年春起柏梁臺漢武舊事柏梁臺以香柏為梁香聞數十里古文苑武帝作柏梁臺詔羣臣二千石有能為七言詩者乃得上座帝曰日月星辰和四時自梁王以下作詩者二十五人何如儉陋卑茅室古樂府長跽讀素書書中竟何如晉書王彪之傳安欲更營宫室彪之曰中興初即位東府殊為儉陋元明二帝亦不改制成帝更營修築方之漢魏誠為儉狹復不至陋殆合豐約之中自可隨宜增蓋修補而已陸雲諫吳王啓第室之設可使儉而不陋凡在崇麗一宜節之以制論語卑宫室而盡力乎溝洫後漢書班固傳扶風掾李育客居杜陵茅室土階陽烏黯黯向山沈蜀都賦陽烏回翼兮髙標庾肩吾詩陽烏一轉翅千里定非虛參同契注寒來暑往運行於三百八十四爻兔起烏沈升降於三百八十四日梁元帝賦日黯黯而將暮風騷騷而渡河劉眘虛詩柴門向山路深柳讀書堂唐太宗詩慘日映峯沈愁雲隨蓋轉夕鳥喧喧入上林沈約詩網蟲垂户織夕鳥傍簷飛豆盧田詩朝見牧豎集夕聞棲鳥喧徐陵長安道詩喧喧擁車騎非但執金吾東方朔傳上使吾丘夀王舉籍阿城以南盩厔以東宜春以西欲除以為上林苑屬之南山司馬相如上林賦齊楚之事又烏足道乎君未覩夫壯麗也獨不聞天子之上林乎曹植詩歸鳥赴喬林翩翩厲羽翼薄暮賞餘回步輦陸機詩終朝理文案薄暮不遑暝廣雅日將落曰薄暮岑文本詩甲第多清賞芳辰命羽巵褚遂良詩獨有狂歌客來承歡宴餘西都賦乘茵步輦惟所息晏後漢書邊讓傳旦垂精於萬幾兮夕回輦於門館宋之問和大薦福寺詩六龍回玉輦雙樹謁金仙還念中人罷百金漢書文帝紀贊欲作露臺召匠計之直百金上曰百金中人十家之産吾奉先帝宫室常恐羞之何以臺為梅福傳福歸夀春求假軺傳條對輒報罷沈佺期字雲卿相州內黃人善屬文尤長七言之作擢進士第長安中纍遷通事舍人預修三教珠英轉考功郎給事中坐交張易之流歡州稍遷台州録事參軍神龍中召見拜起居郎修文館直學士歷中書舍人太子少詹事開元初卒建安後訖江左詩律屢變至沈約庾信以音韻相婉附屬對精密及佺期與宋之問尤加靡麗如錦繡成文學者宗之號為沈宋語曰蘇李居前沈宋比肩入少密溪全唐詩作小密溪未詳處所雲峯苔壁繞溪斜江淹詩平明登雲峯杳與廬霍絶顧野王虎丘山序秀壁數尋被杜蘭與苔蘚阮籍東平賦逶迤漫衍繞以大壑江路香風夾岸花謝朓詩江路西南永歸流東北騖古詞繡幕圍香風水經注夾岸崇深傾崖返捍陶潛桃花源記忽逢桃花林夾岸數百步中無雜樹芳草鮮美落英繽紛張正見詩槐花夾岸飛樹密不言通鳥道謝靈運詩林密蹊絶蹤史記李廣傳桃李不言下自成蹊南中志鳥道四百里以其險絶獸猶無蹊特上有飛鳥之道耳隂鏗詩曕雲望鳥道對柳憶家園雞鳴始覺有人家陶潛詩狗吠深巷中雞鳴桑樹巔帛道猷陵峯採藥詩茅茨隱不見雞鳴知有人人家更在深巖口史記司馬相如傳展鱗奮翼潛處乎深巖魏書李謐傳結宇重巖憑崖鑿石澗水周流宅前後淮南子地平則水周流水經注池水徵渟淵而周流謝靈運山居賦江水周乎舍下南史王裕之傳所居亭山林澗環周備登臨之美仲長統樂志論使居有良田廣宅背山臨流溝池環匝竹木周布場圃築前果園樹後遊魚瞥瞥雙釣童莊子若遊魚者釣􅌳以投之潘嶽詩遊魚動圓波陶潛詩臨水愧遊魚王逸九思目瞥瞥兮西投釋文瞥普蔑切暫見貌伐木丁丁一樵叟詩伐木丁丁鳥鳴嚶嚶爾雅注丁中莖切丁丁斫木聲王僧儒答江琰書田夫野老漁父樵客自言避喧非避秦沈約詩從宦非宦侣避世作避喧桃花源記自云先世避秦亂率妻子邑人來此絶境不復出焉薜衣耕鑿帝堯人上官昭容詩人將薜作衣帝王世紀帝堯時天下太和百姓無事有五十老人擊壤於道歌曰日出而作日入而息鑿井而飲耕田而食帝力何有於我哉相留且待雞黍熟論語止子路宿殺雞為黍而食之後漢書范式傳式與張邵為友式曰後二年當過拜尊親邵白母請殺雞為黍待之夕卧深山蘿月春詩以永今夕曹植賦中宵卧而嘆息左傳深山大澤韓詩外傳禽獸厭深山而下於都澤鮑博士聨句倣佛藤蘿月繽紛篁霧隂宋之問寒食陸渾别業後漢書周舉遷并州刺史移書介子推廟云中春寒食一月老少不堪今則三日而已荆楚嵗時記去冬節一百五日即有疾風暴雨謂之寒食唐書地理志河南府陸渾縣一統志嵩縣在河南府城南一百六十里古伊闕也秦晉遷陸渾之戎于此漢置陸渾縣屬𢎞農郡洛陽城裏花如雪漢書地理志河南郡故秦三川郡髙祖更名洛陽梁簡文帝洛陽樂府洛陽佳麗地大道滿春光蕭子顯詩洛陽梨花落如雪何遜聨句洛陽城東西却作經年别昔去雪如花今來花似雪徐陵詩欲見洛陽花如君隴頭雪陸渾山中今始發魏志胡昭傳轉居陸渾山中躬耕樂道以經籍自娛唐書地理志陸渾山一名方山旦别河橋楊柳風晉書杜預傳預以孟津渡險請立河橋於富平津議者以為殷周故都歷聖賢而不作者必不可立故也預曰造舟為梁河橋之謂也江總詩德陽穿洛水伊闕近河橋庾信春賦擁河橋而爭渡詩昔我往矣楊柳依依梁簡文帝詩春堤楊栁拂河橋夕卧伊川桃李月左傳秦晉遷陸渾之戎于伊川一統志伊水源出盧氏縣悶頓嶺經嵩縣界入於洛謝朓詩灞池不可别伊川難重違詩何彼穠矣華如桃李伊川桃李正芳新唐太宗詩獻嵗啓新芳寒食山中酒復春盧氏雜記寒食內宴宰相賜酴醿酒陶潛詩山中酒應熟詩為此春酒以介眉夀東坡題跋國史補云酒有郢之富春烏程之若下春榮陽之土窟春富平之石凍春劍南之燒春杜子美亦云聞道雲安麴米春裴鉶傳竒亦有酒名松醪春乃知唐人名酒多以春也野老不知堯舜力梁簡文帝詩都人野老雲集霧會庾信詩野老時相訪康