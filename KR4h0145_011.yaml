農扈春書曰肅時雨若禮記季春之月時雨將降下水上騰司馬相如封禪文甘露時雨厥壤可遊左傳郯子曰九扈為九農正注扈有九種春扈頒鶞夏扈竊玄秋扈竊藍冬扈竊黃棘扈竊丹行扈唶唶宵扈嘖嘖桑扈竊脂老扈鷃鷃以九扈為九農之號各隨其宜以教人事也張衡東京賦嘉田畯之匪懈行致賚於九扈注九扈農正知田事蔡雍獨斷春扈氏農正趣民耕種劉庭琦開元時人終雅州司户奉和聖製瑞雪篇紫宸飛雪曉徘徊唐六典紫宸殿即內朝正衙也明皇實録開元十二年三月宴朝集使於紫宸殿二十八年有慈烏巢紫宸殿之栱唐會要龍朔三年四月始御紫宸殿聽政楚辭增氷峩峩飛雪千里謝莊詠雪雜言始葐蒀以㽔轉終徘徊而煙曳謝朓詩飛雪天山來飄聚繩櫺外沈約雪詩徘徊騖情極層閣重門雪照開鮑照詩層閣肅天居沈約寄懷詩送日隱層閣引月入輕幬左思蜀都賦華闕雙迥重門洞開謝朓詩平明振衣坐重門猶未開九衢晶耀浮埃盡楚辭靡蓱九衢枲華安居注九交道曰衢沈約賦雕芳卉之九衢宋之問洞庭湖詩晶照目何在瀅熒心欲無楊師道咏雨詩長筵響奔溜清簟肅浮埃千品差池贄帛來班固東都賦庭實千品梁昭明太子七契若其珍異修筵斯溢千品萬類不可詳悉詩燕燕于飛差池其羽疏謂舒張其尾翼左傳鄭公孫僑曰謂我敝邑邇在晉國譬諸草木我臭味也何敢差池書五玉三帛傳玉帛所以為贄而見者何處田中非種玉崔皓詩日暮鄉關何處是又長干曲君家住何處搜神記羊公雍伯性篤孝葬父母無終山山髙無水公作義漿於坂頭有一人就飲飲訖以一斗石子與之云玉當生其中後當得婦乃種其石北平徐氏女甚有行公試求焉徐戲云得白璧一雙當為婚公至所種石中得五雙以聘徐氏遂以女妻之於種玉處名曰玉田張正見詩雪夢起瓊田孫楚雪賦膏澤偃液普潤中田誰家院裡不生梅宗子侯樂府不知誰家子提籠行採桑劉孝威擬古詩誰家妖冶折花枝梁簡文帝咏雪詩看花言可折定自非春梅何遜早梅詩衝霜當路發映雪擬寒開江總詩梅花色白雪中明埋雲翳景無窮已謝靈運撰征賦冒沈雲之暗靄迎素雪之紛霏張安世房中歌芬樹羽林雲景冥冥周思鈞詩綺筵乘晦景髙宴下陽池詩夙夜無已因風落地吹還起世説謝太傅寒雪日內集欣然曰白雪紛紛何所似兄子朗曰撒鹽空中差可擬兄女道韞曰未若柳絮因風起先過翡翠寶房中班固西都賦昭陽特盛隆乎孝成屋不呈材牆不露形翡翠火齊流耀含英注翠鳥形如燕赤而雄曰翡青而雌曰翠其羽可以飾幃帳漢書禮樂志神之出排玉房楊炯詩暄入瑤房裡春回玉宇前轉入鴛鴦金殿裏三輔黃圖武帝時後宫八區有昭陽飛翔增成合歡蘭林披香鳳凰鴛鴦等殿古樂府鴛鴦七十二羅列自成行江總詩流泉灌金殿美人含笑出聨翩楚辭美人既醉朱顔酡曹植詩有美一人被服􅊏羅庾信蒙賜酒詩阮籍披衣起王戎含笑來張柬之詩帶嬌移玉柱含笑捧金杯魏文帝彈棊賦聨翩靃繹展轉盤縈謝惠連雪賦聨翩飛灑徘徊委積艷逸相輕鬬容止何遜七召妍姿艷逸淑性間華江總詩憐才殊豔逸將别更留連晉書后妃傳序房樂希聲所以節其容止又王獻之傳獻之少有盛名髙邁不羈雖間居終日容止不怠羅衣點著渾是花邊讓章華臺賦羅衣飄颻綺組繽紛范雲樂府暮雨潤羅衣裴子野雪詩落樹似飛花徐陵雪詩六出舞崇花唐太宗望雪詩無樹獨飄花玉手摶來半成水曹植樂府攜玉手喜同行傅咸扇賦猥棄我其若遺去玉手而潛藏奕奕紛紛何所如謝惠連雪賦靄靄浮浮瀌瀌奕奕楚辭雪紛紛而薄木頓憶楊園二月初詩楊園之道猗於畝丘王僧達詩麥隴多秀色揚園流好音蕭子顯詩遊望桃花初庾信詩興雲榆莢晚燒剃杏花初羞同班女髙秋扇班婕妤怨歌行新裂齊紈素皎潔如霜雪裁成合歡扇團團似明月出入君懷袖動搖微風發常恐秋節至涼颷奪炎熱棄捐篋笥中恩情中道絶劉孝綽對雪詩恥均班女扇羞灑曹人衣隂鏗詩可惜逢秋扇何用合歡名欲照明王乙夜書書明王奉若天道宋齊語孫康家貧常映雪讀書姑射山中符聖夀莊子藐姑射之山有神人焉肌膚若氷雪綽約若處子元和郡縣志平山一名壺口山今名姑射山在晉州臨汾縣西八里莊子堯觀乎華華封人曰願祝聖人使聖人夀使聖人富使聖人多男子芙蓉闕下降仙車庾信詩長虹雙瀑布圓闕兩芙蓉七召列神童於羽帳侍玉女於仙車徐陵咏雪詩明朝闕門外應見海神車願隨睿澤流無限曹植求自試表沐浴聖澤潛潤德教可謂厚幸矣梁武帝詩連山去無限長報年豐貴有餘孫楚雪賦肅肅三白實獲豐年謝惠連雪贊氣遍霜繁年豐雪積張正見雪詩九冬飄逺雪六出表豐年易積善之家必有餘慶老子天之道損有餘補不足楚辭覽冀州兮有餘孫逖河南人開元中三擅甲科擢左拾遺歷集賢院修撰改考功員外郎遷中書舍人典詔誥判刑部侍郎終太子詹事諡曰丈山隂縣西樓漢書地理志會稽郡縣山隂會稽山在南王羲之蘭亭序會于會稽山隂之蘭亭元和志山隂縣秦舊地也隋改為會稽垂拱二年又割會稽西界别置山隂一統志山隂縣紹興府附郭都邑西樓芳樹間禮記仲秋之月可以築城郭建都邑張衡賦遊都邑以永久嵇喜詩都邑可優遊何必棲山原宗懍詩接里開都邑庾肩吾詩天禽下北閣織女入西樓梁元帝纂要春木曰芳樹洛陽伽藍記飛館生風重樓起霧髙臺芳樹家家而築陸機詩芳樹發華顛王融詩含情結芳樹逶迤霽色繞江山阮籍東平賦逶迤漫衍繞以大壑夏侯湛山路吟道逶迤兮嵐氣清何遜詩振衣喜初霽褰裳對晚晴王融渌水曲日霽沙漵明諸葛亮黃陵廟記趨蜀道履黃牛因覩江山之勝慧逺廬山記匡廬大嶺凡有七重風雲之所攄江山之所帶陶潛詩江山豈不險歸子念前途山月夜從公署出吳均詩挂月青山下南史蕭子顯傳風動春朝月明秋夜舞賦夫何皎皎之間夜兮明月爛以施光廣韻署廨署也詩月出皎兮江雲晚對訟庭還楊乂雲賦江湖以之深滿謝朓楚江賦雲沈山岫風蕩中川張正見詩歸雲向谷晚鮑照還都道中詩鱗鱗夕雲起獵獵晚風遒謝靈運詩虛館絶諍訟空庭來鳥雀誰知春色朝朝好謝朓詩春色滿皇州庾信詩春色方盈野枝枝綻翠英梁簡文帝詩緑葉朝朝黃二月飛花滿江草書嵗二月東巡守至於岱宗庾信馬射賦落花與芝蓋同飛楊柳共春旗一色梁簡文帝賦玩飛花之度窗看春風之入柳梁昭明太子詩江花玉面兩相似古詩涉江采芙蓉蘭澤多芳草一見湖邊楊柳風漢書趙充國傳百聞不如一見述異記越州鏡湖世傳軒轅鑄鏡湖邊因得名詩昔我往矣楊柳依依古樂府楊柳可藏烏風土記河朔春時疾風數日一作三日乃止曰吹花擘柳風遙憶青青洛陽道古詩青青河畔草綿綿思逺道世説潘嶽少時挾彈出洛陽道婦人遇者莫不連手共縈之梁簡文帝洛陽道樂府洛陽佳麗所大道滿春光李白侍從宜春苑奉詔賦龍池柳色初青聽新鶯百囀歌漢書嚴助傳勞侍從之事沈佺期詩自喜恩深陪侍從三輔黃圖宜春宫本秦離宫在長安城東南杜縣東近下杜又有宜春下苑在京城東南隅庾信春賦宜春苑中春已歸披香殿裏作春衣唐會要明皇在藩邸居興慶里宅有龍池湧出日以浸廣至開元中為興慶宫蕭子顯詩楊柳千條共一色何遜詩輕煙糝柳色梁元帝詩新鶯隱葉囀劉孝綽百舌詩孤鳴若無對百囀似羣吟東風己緑瀛洲草禮記孟春之月東風解凍班婕妤賦中庭萋兮緑草生梁昭明太子七契夾鍾之節春景依遲碧樹初蕊緑草含滋史記封禪書建章宫北治大池漸臺髙二十餘丈命曰太液池中有蓬萊方丈瀛洲壺梁象海中神山紫殿紅樓覺春好三輔黃圖武帝起紫殿雕文刻鏤黼黻以玉飾之成帝永始四年行幸甘泉郊泰畤神光降於紫殿王筠詩丹墀生細草紫殿納輕隂沈佺期詩紅樓疑見白毫光寺逼宸居福盛唐池南柳色半青青南史陳武帝紀上宰膺運康救羣黎鞠旅於溟池之南揚旌于桂嶺之北莊子松柏在冬夏常青青又青青之麥生於陵陂縈煙裊娜拂綺城沈佺期詩梅花寒待雪桂蕊晚留煙梁簡文帝詩洞庭枝裊娜澧浦葉參差古今合璧栁樹髙二三丈許裊娜枝條垂絲百尺挂雕楹南史張緒傳劉悛之為益州獻蜀栁數株枝條甚長狀若絲縷梁簡文帝為南平王章摶飛九萬實假扶搖之力沖天百尺無俟剞劂之功江總山亭銘髙桐百尺垂楊五株張衡西京賦雕楹玉碣班固西都賦雕玉瑱以居楹魏收詩礎潤上雕楹上有好鳥相和鳴曹植詩潛魚躍清波好鳥鳴髙枝謝朓詩香風蕊上發好鳥葉間鳴張駿詩鳩鵲與黧黃間關相和鳴何承天詩晨猿相和鳴間關早得春風情詩間關車之牽兮思孌季女逝兮梁簡文帝詩春風復有情蕭慤詩二月鶯聲才欲斷三月春風已復流春風卷入碧雲去江淹詩日暮碧雲合佳人殊未來千門萬户皆春聲史記武帝紀作建章宫度為千門萬户班固西都賦張千門而立萬户順隂陽以開闔徐陵玉臺新咏序凌雲槩日由余之所未窺千門萬户張衡之所曽賦是時君王在鎬京詩朱芾斯皇室家君王又魚在在藻有莘其尾王在在鎬飲酒樂豈又鎬京辟雍自西自東自南自北無思不服一統志陜西西安府鎬水在府城西北十八里上承鎬池下流合滮池水鎬京城在咸陽縣西南周武王自豐居鎬即此五雲垂輝耀紫清董仲舒雨雹對雲則五色而為慶三色而成矞宋書符瑞志慶雲五色者太平之應王粲七釋珥照夜之雙璫煥焴爚以垂暉南史齊髙帝紀秬草騰芳於郊園景星垂暉於清漢玉清隱書金霄鬱紫清仗出金宫隨日轉唐書儀衛志朝會之仗三衛畨上分為五仗皆帶刀捉仗列于東西廊下每日以四十二人立內廊閣外號曰內仗天子出則有細仗黃麾仗崔琰遂初賦列金宫之􅑬嵼方玉闕之嵯峩晉書天文志黃道日之所行也半在赤道外半在赤道內天回玉輦繞花行拾遺記穆天子御黃金璧玉之輦從朝及暮而窮宇宙之內通典秦以輦為人君之乘漢因以雕玉為之方徑六尺蘇頲詩繞花開水殿架竹起山樓始向蓬萊看舞鶴唐書髙宗紀始制蓬萊宫諸門殿亭等名相鶴經鶴陽鳥也軒前垂後則善舞鮑照舞鶴賦指蓬壺而翻翰望昆閬而揚音唳清音於丹墀舞飛容于金閣還過􅉅石聽新鶯案􅉅石當作􅉅若班固西都賦後宫則有掖庭椒房后妃之室合歡增城安處常寧􅉅若椒風披香發越蘭林蕙草鴛鸞飛翔之列注俱殿名新鶯飛繞上林苑漢書武帝紀建元二年開上林苑三輔黃圖漢上林苑即秦之舊苑也唐書太宗紀貞觀十八年宴雍州父老于上林苑願入簫韶雜鳳笙書簫韶九成鳳凰來儀傳韶舜樂言簫見細器之備史記樂書舜作十管韶簫長尺有二寸其形參差象鳳翼所以應十日之數列仙傳王子晉好吹笙作鳳凰鳴王融詩參差聞鳳笙西嶽雲臺歌送丹丘子書八月西巡守至於西嶽爾雅華山為西嶽一統志太華山在陜西西安府華隂縣南一十里即西嶽也以西有少華山故此號太華是山削成四方髙五千仞唐開元記華嶽雲臺觀中方丈之上有山崛起華山志嶽東北有雲臺峯其山兩峯崢嶸四面懸絶上冠景雲下通地脈嶷然獨秀有若靈臺周武帝時有道士焦道廣獨居此峯辟粒餐霞常有三青鳥報未然事周武帝親詣山庭臨軒問道谷口因置雲臺觀白本集元丹丘歌元丹丘愛神仙朝飲潁川之清流暮還嵩山之紫煙又有聞丹丘子營石門幽居詩西嶽崢嶸何壯哉廣韻崢嶸山峻揚雄甘泉賦閌閬閬其寥廓兮似紫宫之崢嶸左思蜀都賦經三峽之崢嶸躡五屼之蹇滻漢書陳平傳髙帝南過曲逆上其城望室屋甚大曰壯哉縣吾行天下獨見洛陽與是耳沈佺期西嶽詩西鎮何穹崇壯哉信靈造黃河如絲天際來孝經援神契河者水之伯上應天漢爾雅河出崑崙虛色白所渠并千七百一川色黃物理論河色黃者衆川之流蓋濁之也一統志黃河自龍門而下歷西安府韓城郃陽至朝邑縣界稍折而東入蒲州境漢書功臣表使黃河如帶禮記王言如絲其出如綸易豐其屋天際翔也楚辭天問九天之際安放安屬謝朓詩天際識歸舟易林太乙駕騮從天上來張説華山銘白帝西下黃河北來黃河萬里觸山動爾雅河百里一小曲千里一曲一直水經注河出崑山伏流地中萬三千里郭璞江賦呼吸萬里吐納靈潮準南子共工怒而觸不周之山郭璞江賦觸曲崖以縈繞盤渦轂轉秦地雷郭璞江賦盤渦谷轉凌濤山頽水經注沿波漱石環濤轂轉洞天記華山上應井鬼之精下鎮秦之分野枚乘七發混混庉庉聲如雷鼓木華海賦驚浪雷奔駭水迸集榮光休氣紛五采詩不顯其光箋光猶榮也氣有榮光也尚書中候成王觀於洛河沈璧禮畢王退俟至于日昧榮光並出休氣塞河庾信羽調曲居休氣而四塞在光華而兩旦易乾鑿度聖人受命瑞應先見於河河水先清清變白白變赤赤變黑黑變黃各三日漢書郊祀志長安東北有神氣成五采千年一清聖人在王子年拾遺記黃河千年一清至聖之君以為大瑞李蕭逺運命論黃河清而聖人生巨靈咆哮擘兩山揚雄河東賦河靈玃踢掌華蹈襄括地志華嶽本一山當河河水過而曲行河神巨靈手蕩腳踏開而為兩今腳迹在東首陽下手掌在華山今呼為仙掌河流二山之間開山圖巨靈胡者偏得神仙道能造山川出江河廣韻咆虓熊虎聲哮闞也庾信詩六國始咆哮縱橫未定交洪波噴箭射東海十洲記溟海無風而洪波百丈謝靈運詩莫辨洪波極誰知大壑東水經注渾洪贔怒濬波頽疊慎子河下龍門流駛如竹箭駟馬追之不及張衡南都賦總括趨欱箭馳風疾孔稚圭褚先生碑飛浪突雲奔湍急箭張正見公無渡河詩棹折桃花水帆橫竹箭流山海經箕尾之山其尾踆於東海三峯却立如欲摧述征記華山上有三峯直上晴霽可覩華山記三峯南峯西峯東峯也一統志華山有芙蓉明星玉女三峯史記藺相如傳相如持璧却立倚柱郭璞江賦巨石硉矹以前却又絶岸萬丈壁立赮駮廣韻摧折也史記孔子世家梁柱摧乎翠崖丹谷髙掌開水經注自上宫東北出四五十步有屈嶺東南望巨靈手迹惟見洪崖赤壁而已張協七命登翠阜臨丹谷張衡西京賦巨靈贔屭髙掌逺跖以流河曲厥迹猶存張説華山銘青崖白谷仰見靈掌趙彥昭詩河經大禹鑿山見巨靈開白帝金精運元氣洞天記少昊為白帝治西嶽淮南子西方金也其帝少昊其神太白注少昊以金德王號曰金天庾信賦地則石鼓鳴山天則金精動宿漢書律歷志太極中央元氣故為黃鍾後漢書李固傳斗斟酌元氣運平四時白虎通地者元氣所生萬物之祖石作蓮花雲作臺華山記山頂有池生千葉蓮華服之羽化因名華山北上有蓮花峯視諸峯為更髙薛道衡詩龍門竹箭急華嶽蓮花髙孔德紹行經太華詩疏峯起蓮葉危塞隱桃林雲臺閣道連窈冥史記天官書紫宫後六星絶漢抵營室曰閣道又秦始皇紀三十五年作前殿阿房周馳為閣道自殿下直抵南山方輿勝覽飛仙嶺在興州東三十里上有閣道百餘間即入蜀城老子窈兮冥兮其中有精水經注北眺巨海窈冥無極宋玉對楚王問鳳凰上擊九千里絶雲霓負蒼天翺翔乎杳冥之上中有不死丹丘生史記封禪書三神山嘗有至者諸仙人及不死之藥皆在焉列仙傳馬明生從安期先生受金液神丹方乃入華隂山合金液不死藥楚辭逺遊仍羽人于丹丘兮留不死之舊鄉注丹丘晝夜常明也神異記盧洪入山採茗遇一道士牽三青牛引洪至瀑布山曰吾丹丘子也開皇神告録隋開皇末有老翁詣唐髙祖曰公應天受命當在丹丘子之後帝曰丹丘為誰曰與公近籍隱居鄠杜間帝遂袖劍詣焉伏謁于苫宇之下先生曰吾久厭濁世汝羶於時者顯晦既殊幸無見忌帝愕而謝之武德初密遣太宗訪焉則其室已墟矣白本集樂府岑夫子丹丘生進酒君莫停明星玉女備灑掃集仙録明星玉女祠前有五石臼號曰玉女洗頭盆詩灑掃穹窒我征聿至漢書班媫妤傳共灑掃于幃幄兮顔延之文灑掃中嶽致廟九山麻姑搔背指爪輕葛洪神仙傳麻姑至蔡經亦舉家見之是好女子手爪似鳥經心中念曰背大癢時得此爪以爬背當佳也我皇手把天地户陸機功臣頌盧綰自微婉孌我皇齊書樂志於爍我皇體仁苞元易闔户謂之坤闢户謂之乾又天地設位注天地者易之門户西王母宴漢武帝歌大哉雖寥廓我把天地户丹丘談天與天語史記孟荀傳談天衍雕龍奭劉向别録騶衍之所言五德終始天地廣大書言天事故曰談天沈佺期詩經聲夜息聞天語九重出入生光輝楚辭天問圜則九重孰營度之又九辨豈不鬱陶而思君兮君之門以九重注天子有九門謂關門逺郊門近郊門城門皋門庫門雉門應門路門也庾信詩自布南風曲還來吹九重易利用出入民咸用之謂之神詩或出入風議易君子之光其暉吉也長歌行陽春布德澤萬物生光輝范雲詩軒蓋照墟落傳瑞生光輝東來蓬萊復西歸史記封禪書蓬萊方丈瀛洲三神山傳在渤海中十洲記蓬丘蓬萊山也對東海之東北岸周回五千里詩誰將西歸懷之好音長歌行百川東到海何時復西歸玉漿儻或全唐詩作惠故人飲詩含神霧華山上有明星玉女手執玉漿搜神記嵩山北有大穴一人嘗誤墮穴中行可十餘日見草屋中有二人對坐圍棊局下有一杯白飲墮者告以飢渴棊者曰可飲此遂飲之氣力十倍半年許乃出蜀歸洛下問張華曰此仙館所飲者玉漿也魏武帝樂府驂駕六龍飲玉漿史記范睢傳綈袍戀戀有故人之意古詩客從逺方來遺我一端綺相去萬餘里故人心尚爾騎二茅龍上天飛列仙傳呼子先者漢中卜師夀百餘嵗臨去呼酒家嫗急裝有仙人持二茅狗來子先將一與酒嫗騎之乃龍也上華山常於山大呼言子先酒母在此班固答賔戲泥蟠而天飛者應龍之神也送羽林陶將軍唐書百官志左右羽林軍大將軍各一人正三品將軍各三人從三品掌統北衙禁兵督攝左右廂飛騎儀仗大朝會則周衛階陛巡幸則夾馳道為內仗將軍出使擁樓船老子上將軍居左偏將軍居右吳語十旌一將軍載常建鼓挾經漢書汲黯傳夫以大將軍有揖客顧不重耶梁元帝賦趙將軍之建節辛侍中之出使史記平準書大修昆明池治樓船髙十餘丈旗幟加其上甚壯漢書武帝紀元鼎五年遣樓船將軍楊僕出豫章下湞水通典樓船之上建樓三重列女牆戰格樹幡幟開弩窗矛穴狀如城壘江上旌旗拂紫煙謝朓詩江上徒離憂釋名析羽為旌旌精也有精光也熊虎為旗軍將所建象其猛如虎與衆期其下也潘嶽文旌旗電舒戈矛林植東都賦旌旗拂天鮑照詩揚芬紫煙上萬里橫戈探虎穴漢書禮樂志體容與迣萬里漢書班超傳相者曰生燕頷虎頸飛而食肉此萬里侯相也盧照鄰中和樂歌橫戈碣石倚劍浮津後漢書班超傳不入虎穴不得虎子庾信鄭偉墓銘探虎穴而揮戈三杯拔劍舞龍泉唐中宗詩九日正乘秋三杯興已周史記項羽本紀項莊拔劍起舞項伯亦拔劍起舞常以身翼蔽沛公越絶書楚王作劒三枚一曰龍淵風胡子曰欲知龍淵狀如登髙山臨深淵按唐人避唐髙祖諱作龍泉郭元振寶劍篇良工鍛鍊凡千年鑄得寶劒名龍泉莫道詞人無膽氣漢書司馬相如傳贊詞人之賦麗以淫嵇康明膽論陳義奮辭膽氣凌雲臨行將贈繞朝鞭左傳晉人患秦之用士會也乃使魏夀餘偽以魏叛者請自歸于秦秦伯許之履士會之足於朝秦伯師於河西魏人在東夀餘曰請東人之能與夫二三有司言者吾與之先使士會士會辭秦伯曰若背其言所不歸爾帑者有如河乃行繞朝贈之策曰子無謂秦無人吾謀適不用也既濟魏人譟而還同王昌齡送族弟襄歸桂陽元和郡縣志郴州本長沙郡地漢分長沙立桂陽郡一統志天寶初改郴州為桂陽郡本朝改為郴州爾家何在瀟湘川圖經瀟水去零陵三十步源出九疑山至永與湘水合湘水在零陵北十五里其源自全來永與瀟水合二水合流謂之瀟湘曹植詩朝遊江北岸夕宿瀟湘沚謝朓詩洞庭張樂地瀟湘帝子遊青莎白石長江邊漢書司馬相如傳薜莎青蘋注莎即今青莎草也楚辭青莎雜樹兮繁草靃靡王融詩離軒思黃鳥分渚愛青莎江淹詩青莎被海月朱華冒水松詩揚之水白石鑿鑿寧戚飯牛歌滄浪之水白石粲魏志文帝南征臨江見波濤洶湧嘆曰長江天所以限南北也郭璞江賦蔭潭隩被長江阮籍詩湛湛長江水昨夢江花照江國三秦記昆明池通白鹿原原人釣魚綸絶而去夢于武帝求去其鈎三日戲於池上見大魚銜索帝曰豈不穀昨所夢耶取鈎放之梁昭明太子詩江花玉面兩相似庾信賦彼凌江而建國幾枝正發東窗前陶潛詩有酒有酒間飲東窗謝靈運山居賦闢東窗以矚近田謝朓詩髙卧東窗下覺來欲往心悠然張衡詩欲往從之隴坂長晉書謝安嘗與王羲之登冶城悠然遐想有髙世之志陶潛詩采菊東籬下悠然見南山魂隨越鳥飛南天古詩越鳥巢南枝曹植詩願隨越鳥翻飛南翔潘嶽詩徒懷越鳥志眷戀想南枝隋書天文志夏至極起而天運近北而斗去人逺日去人近南天氣至故蒸熱也秦雲連山海相接晉書天文志秦雲如行人木華海賦波如連山謝朓詩才見孤鳥還未辨連山極桂水橫煙不可涉楚辭桂水兮潺湲揚流兮津津江淹詩且泛桂水潮又桂水日千里一統志桂水在郴州城南六十里鮑照詩涓涓亂江流綿綿橫海煙送君此去令人愁莊子送君者皆自崖而返君自此逺矣江淹别賦送君南浦傷如之何風帆茫茫隔河洲釋名帆泛也隨風張幔曰帆使舟泛泛然也繁欽述行賦茫茫河濵詩關關雎鳩在河之洲酈炎詩靈芝生河洲謝靈運詩河洲多沙塵薛道衡詩疊鼓沸河洲春潭瓊草緑可折劉繪詩春潭無與窺秋臺誰與陟隋煬帝詩春潭漾月暉十洲記方丈有瓊田芝草庾闡遊仙詩瓊草被神丘江淹詩終嵗如瓊草紅華長翕赩西寄長安明月樓漢書地理志京兆縣治長安班固西都賦漢之西都實在雍州名曰長安傳休奕詩所思兮何在乃在西長安謝朓詩灞涘望長安北史邢邵傳邵修繕觀宇皆為之題名有清風觀明月樓李陵詩明月照髙樓相見餘光輝吳均詩相思自有處春風明月樓别山僧自注涇縣作何處名僧到水西梁書武帝紀聽覽餘間即於重雲殿及同泰寺講説名僧碩學四部聽衆常萬餘人一統志水西山在涇縣西五里下臨賞溪唐宣宗嘗遊此地有詩長安若問江南事報道風光在水西乘舟弄月宿涇溪準南子夫乘舟而惑者不知東西見斗極則悟矣王褒四子講德論膺騰撇波而濟水不如乘舟之逸也謝靈運賦卧洞房兮當何悅滅華燭兮弄明月宋之問太平公主山池賦披煙弄月兮宵未歸桂枝清霧兮濕羅衣一統志賞溪在涇縣治西一名涇溪源出石埭支流出太平縣至涇縣南陵宣城逾蕪湖入於江平明别我上山去史記留侯世家老父曰孺子可教矣後五日平明與我會此漢書叔孫通傳先平明謁者治禮引以次入殿門注未平明之前古詩上山採蘼蕪手攜金策踏雲梯孫綽遊天台山賦被毛褐之森森振金策之鈴鈴注金策錫杖也鈴鈴策聲謝靈運登石門最髙頂詩惜無同懷客共登青雲梯騰身轉覺三天近揚雄解難翠虬絳螭之將登乎天必聳身於蒼梧之淵漢武帝內傳帝見王母巾笈中有一卷書王母出以示曰此五嶽真形圖也乃三天太上所出舉足回看萬嶺低禮記執主器操幣圭璧則尚左手行不舉足沈約詩山東萬嶺鬱青蔥張纘賦千流共歸萬嶺分狀謔浪肯居支遁下詩謔浪笑傲陸機七徵溱洧以謔浪為歡劉孝綽詩謔浪雖云善江流苦未安髙逸沙門傳支遁字道林任心獨往風期髙亮世説支道林許掾共在會稽王齋頭支為法師許為都講支通一議四坐莫不厭心許送一難衆人莫不忭舞風流還與逺公齊晉書王獻之傳獻之少有盛名髙邁不羈風流為一時之冠庾信枯樹賦殷仲文風流儒雅海內知名蓮社髙賢傳法師慧逺博綜六經尤善莊老至潯陽見廬山間曠乃立精舍以去水猶逺舉杕叩地清流湧出所居盡林壑之美凡在瞻履神清氣肅此度别離何日見古詩上言長相思下言久離别相思一夜暝猿啼古詩著以長相思緣以結不解李陵答蘇武詩行人難久留各言長相思鮑照詩嘈噆晨鵾悲叫嘯夜猿清梁簡文帝詩北榮下飛桂南柯吟夜猿沈約詩噭噭夜猿鳴溶溶晨霧合魏徴詩古木鳴寒鳥空山啼夜猿夜泊黃山聞殷十四吳吟元和志黃山在太平縣西南四十里一統志黃山在徽州府城西北一百二十里舊名黟山唐天寶未改今名戰國策陳軫曰王獨不聞吳人之遊楚者乎楚王甚愛之病使人問之曰誠病乎意亦思乎左右曰誠思則將吳吟今軫將為王吳吟昨夜誰為吳會吟魏文帝詩行行至吳會吳郡志世多稱吳門為吳會風生萬壑振空林淮南子虎嘯而谷風生宋玉風賦夫風生於地起于青蘋之未庾闡風詩天吳踴靈壑將駕奔𡨕霄江淹詩萬壑共馳霧百谷爭往來褚爽賦風搖林而自清朱異田飲引屬風林之蕭瑟列子薛談撫節悲歌聲振林木張協詩鳴鶴聒空林陳子昂詩幽獨空林色龍驚不敢水中卧庾信禹渡江贊風飛鷁湧水起龍驚易雲從龍疏龍是水畜雲是水氣管子蛟龍水中之神者也馬融長笛賦龍吟水中不見已截竹吹之聲相似盧照鄰詩珠浦龍猶卧猿嘯時聞巖下音荆州記峽長七百里重巖疊嶂隱天蔽日常有髙猿長嘯屬引清逺又巴東三峽猿長鳴至三聲聞者垂淚鮑照詩猿嘯白雲裏庾信詩猿嘯風還急沈約聽猿詩既歡東林唱復佇西巖答蕭詮猿啼詩隔岩還嘯侣江淹詩露華識猿音梁元帝賦噴飛泉於天未鼓雷霆于巖下曹攄詩涓涓谷中泉鬱鬱巖下林我宿黃山碧溪月宋之問詩獨坐山中兮對松月駱賔王詩山行明月上溪宿密雲蒸聽之却罷松間琴吳志張綋傳晉平公使師曠作清角曠言德薄不足以聽之宋之問詩思君罷琴酌又松間明月長如此按琴曲有風入松朝來果是滄洲逸晉書王徽之傳西山朝來致有爽氣南史袁粲傳粲負才尚氣愛好虛逺嘗作五言詩言訪迹雖中宇循寄乃滄洲蓋其志也又張充傳飛竿釣渚濯足滄洲謝朓詩既歡懷祿情復協滄洲趣杜陽雜編隋大業九年元藏幾為過海使判官風飄至洲島間洲人云此滄洲去中國已數萬里其洲方千里花木常如二三月晉書劉驎之傳好遊山澤志存遁逸酤酒醍盤飰霜栗史記司馬相如傳相如之臨卭置酒舍酤酒又滑稽傳王先生徒懷錢酤酒與衛卒僕射飲漢書景帝紀大酺五日民得酤酒王褒僮約有一奴名便了倩行酤酒玉篇醍酒紅色廣韻醍醐也又盤器名世説殷仲堪食常五碗盤外無餘肴飯粒脫落盤席間輒食以噉之齊書崔祖思傳席五盞盤桃花米飯詩實穎實栗傳栗是穀穗成就之穎左傳嘉栗旨酒養生要集稻米粒白如霜半酣更發江海聲史記漢髙祖紀酒酣髙祖擊築自為歌詩楊惲報孫會宗書酒酣耳熱仰天而歌嗚嗚左思吳都賦中酒而作注中酒為半酣也劉向别録漢興以來善雅歌者魯人虞公發聲清哀動梁塵五經通義歌之言歡也以存志意故發聲而歌長言莊子就藪澤處間曠此冮海之士也客愁頓向杯中失何遜聨句若非今宴適詎使客愁輕陶潛詩且進杯中物駱賔王詩曲中驚别渚醉裡失愁容把酒問月自注故人賈淳令豫問之青天有月來幾時莊子有鳥焉其名為鵬絶雲氣負青天五燈會元少林雖有月蔥嶺不穿雲我今停杯一問之魏文帝秋胡行嘉肴不嘗旨酒停杯庾信詩跂窗催酒熟停杯待菊花人攀明月不可得賈誼治安策髙者難扳卑者易凌理勢然也古詩三五明月滿四五蟾兔缺魏武帝樂府明明如月何時可掇南史謝譓傳入吾室者但有清風對吾飲者唯當明月阮籍詩薄帷鑒明月清風吹我襟月行却與人相隨書日月之行有冬有夏詩十月之交疏月行疾日行遲二十九日有餘而月行天一周追及于日而與之會鮑照詩繡甍結飛霞璇題納行月朱超舟中望月詩惟餘故樓月逺近必隨人皎如飛鏡臨丹闕詩月出皎兮傳休奕詩皎皎明月光楊泉物理論京房説月與星有形無光日照之乃有光如以鏡照日而有影見古樂府何當大刀頭破鏡飛上天王僧孺發願文悟蕉蘆之非實知鏡月之虛衒張正見詩玉牀珠帳捲金樓鏡月斜傳休奕樂府絳闕紫宫崔嵬唐太宗秋日詩爽氣浮丹闕秋光淡紫宫緑煙滅盡清輝發木華海賦朱瀲緑煙江淹詩煙滅淮海見阮籍詩明月耀清輝沈約望秋月詩清輝懸洞房但見宵從海上來皇甫謐年厯月羣隂之宗光內日影以宵耀名曰夜光鮑照詩宵月向掩扉史記孝武帝紀李少君見上曰臣嘗遊海上見安期生食臣棗大如爪又魯仲連傳田單言魯連欲爵之魯連逃隱于海上寧知曉向雲中沒謝靈運詩夕慮曉月流朝忌曛日馳鮑照芙蓉賦飛澄華於曉月陶潛古詩明明雲間月虞騫視月詩靡靡露方垂暉暉光稍沒白兔搗藥秋復春後漢書天文志注月者隂精之宗積而成獸象兔隂之類傅休奕擬天問月中何有白兔搗藥江總詩兔月半輪明楚辭日月忽其不淹兮春與秋其代序嫦娥孤棲與誰鄰淮南子羿得不死之藥於西王母其妻嫦娥竊之奔于月戴逵間遊贊終古皆孤棲於一巖劉琨答盧諶詩既孤我德又闕我鄰朱超舟中望月詩大江闊千里孤舟無四鄰今人不見古時月禮記儒有今人與居古人與稽南史張融傳不恨我不見古人恨古人不見我今月曽經照古人詩日居月諸照臨下土又月出照兮陸機詩濛雨之隂照月之輝詩我思古人實獲我心古人今人若流水莊子冉求問於仲尼曰未有天地可知耶仲尼曰可古猶今也關尹子能於今中視古古中視今詩沔彼流水朝宗於海馬融長笛賦爾乃發聲類形狀似流水陸機賦川閲水以成川水滔滔而日度世閲人而為世人冉冉而行莫共看明月皆如此謝莊月賦隔千里兮共明月鮑照玩月詩三五二八時千里與君同庾信枮樹賦樹猶如此人何以堪惟願當歌對酒時魏武帝短歌行對酒當歌月光長照金樽裏詩匪東方則明月出之光古詩明月皎夜光謝靈運詩清醑滿金樽江淹詩金樽坐含霜同族弟金城尉叔卿燭照山水壁畫歌漢書地理志金城郡始元六年置注初築城得金故曰金城一統志蘭縣在臨洮府北二百十里秦為隴西郡漢置金城郡唐初置蘭州天寶初改金城郡今為蘭縣唐書百官志京縣尉六人從八品下畿縣尉二人正九品下上縣尉二人從九品上中縣尉一人從九品下中下縣尉一人從九品下下縣尉一人從九品下分判衆曹收率課調武德元年改書佐曰縣尉尋改曰正七年改縣正復曰尉南史袁粲傳引燭自照宋書宗炳傳炳好山水愛逺遊凡所遊履皆圖之於室髙臺粉壁圖蓬瀛髙臺案楊齊賢補注本作髙堂謝朓詩積水照赬霞髙臺望歸翼謝惠連詩髙臺驟登踐漢官儀省中皆以胡粉塗壁紫素界之畫古烈士顧野王舞賦圖長袖于粉壁寫纎腰於華堂庾信燈賦窗藏明於粉壁柳助暗於蘭閨列子渤海之東不知幾億萬里其中有五山焉一曰岱輿二曰員嶠三曰方壺四曰瀛洲五曰蓬萊所居之人皆仙聖之種拾遺記昆臺之山有垂白之叟宛若少童貌若氷雪歷蓬瀛而超碧海劉孝綽詩無因追羽翮及爾宴蓬瀛燭前一見滄洲清揚雄賦世有黃公者起於滄洲精神養性與道浮遊杜陽雜編隋大業九年元藏幾為過海使判官風飄至洲島間洲人云此滄洲去中國已數萬里其洲方千里花木常如二三月洪波洶湧山崢嶸魏文帝濟川賦臨濟川之層崖覽洪波之容裔劉協新論懸瀨碧潭瀾波洶涌揚雄甘泉賦閌閬閬其寥廓兮似紫宫之崢嶸左思賦徑三峽之崢嶸躡五屼之蹇嵼皎若丹丘隔海望赤城楚辭仍羽人于丹丘兮注丹丘晝夜常明也謝靈運緩歌行飛客結靈友凌空萃丹丘會稽記赤城山名色皆赤狀如雲霞天台之南門也孫綽遊天台山賦赤城霞起而建標支遁天台山銘序往天台山當由赤城山為道徑光中乍喜嵐氣滅謝靈運詩曉霜楓葉丹夕曛嵐氣隂江淹詩嵐氣隂不極日色半虧天謂逢山隂晴後雪漢書地理志會稽郡縣山隂會稽山在南王羲之蘭亭序暮春之初會于會稽山隂之蘭亭世説王子猷居山隂夜大雪睡覺開室命酌四望皓然回溪碧流寂無喧潘嶽詩回溪縈曲阻徐諼詩回溪浚兮曲沼阻古辭清水緑碧色江淹水上神女賦野田田而虛翠水湛湛而空碧徐陵太極殿銘帝旅無喧宋之問詩空山惟習靜中夜寂無喧又如秦人月下窺花源盧諶詩趙氏有和璧天下無不傳秦人來求市厥價徒空言王勃詩林塘花月下别是一家春陶潛桃花源記晉太原中武陵人捕魚為業緣溪行忽逢桃花林林盡水源得一山其間男女見漁人大驚自云先世避秦來此絶境不復出焉了然不覺清心魂沈佺期詩了然究諸品彌覺靜者安左傳心之精爽是為魂魄揚雄甘泉賦澄心清魂儲精垂思江淹詩何用苦心魂祗將疊嶂鳴秋猿荆州記巫峽長七百里兩岸連山略無絶處重岩疊嶂隱天蔽日常有髙猿長嘯屬引清逺任昉詩疊嶂易成響重以夜猿悲與君對此歡未歇庾信咏畫屏風詩定知歡未足橫琴坐石根謝靈運詩芳草亦未歇放歌行吟達明發古樂府有放歌行楚辭屈原既放遊于江潭行吟澤畔詩明發不寐却顧海客揚雲帆述異記鬱林郡有珊瑚市海客市珊瑚處也謝靈運赤城進帆詩揚帆采石華挂席拾海月馬融廣成頌方餘皇連舼舟張雲帆施霓幬欲使因之向溟渤莊子窮髮之北有溟海者天池也十州記蓬丘蓬萊山是也對東海之東北岸周回五千里外别有圓海繞山水色正黑謂之溟海博物志東海古稱渤海鮑照詩穿池類溟渤當塗趙炎少府粉圖山水漢書地理志九江郡縣當塗注禹所娶塗山侯國也有禹虛記纂淵海當塗本漢丹陽縣地晉分置于湖縣成帝乃僑立當塗縣又僑立淮南郡治於于湖以當塗屬焉唐武德屬宣州一統志隋徙當塗於姑孰宋屬太平州懶真子縣尉呼為少府者古官名也漢百官表云大司農供軍國之用少府則奉養天子亞大司農國朝之初縣多惟令尉令既呼明府故尉得呼少府也唐朝名畫録天寶初帝思蜀道嘉陵假吳道玄驛駟令往寫貌及回帝問其狀奏曰臣無粉本並記在心唐書崔植傳宋璟嘗手寫尚書無逸圖以獻其後朽暗乃代以山水圖峨眉髙出西極天益州記峩眉山在南安縣界張華博物志以為牙門山也一統志山在四川眉州城南二百里自岷山連岡疊嶂延袤三百餘里至此突起三峯其二峯對峙宛若峩眉滕邁慶雲抱日賦啓重霄而迥出得中道而遐征揚雄益州牧針華陽西極黑水南流司馬相如上林賦左蒼梧右西極張衡賦顧金天而歎息兮吾欲往乎西嬉唐朝名畫録張藻員外山水之狀其近也若逼人而寒其逺也若極天之盡羅浮直與南溟連羅浮山記羅羅山也浮浮山也二山合體謂之羅浮在增城博羅二縣之境舊説羅浮有七十石室七十二長溪南越志羅浮山髙三千六百丈周四千三百餘里嶺十五峯三十二雲笈七籖羅浮洞周五百里名朱明耀真之天是蓬萊之一島也堯時洪水浮海而來泊于羅山即抱朴子葛洪鍊丹處莊子吾失我常注魚之常相與者水也又海運則將徙於南溟南溟者天池也魏文帝登臺賦溪谷紆以交錯草木鬱其相連名公繹思揮彩筆魏志王粲傳粲曽祖父龔祖父暢皆為漢三公父謙為大將軍何進長史進以謙名公之胄欲與為婚見其二子使擇焉陸雲與陳彥明書名公之舉且可以為資詩敷時繹思我徂維求定李頎贈張旭詩興來灑素壁揮筆如流星潘嶽賦援彩筆以為銘驅山走海置眼前述異記始皇作石橫橋于海上欲過海觀日出處時有神人驅石不速神輒鞭之又白詩傾暉速短炬走海無停川謝靈運詩想見山阿人薜蘿若在眼南史顔延之傳鮑照曰君詩若鋪錦列繡雕繢滿眼江淹登黃蘖山詩況我葵藿志松木橫眼前滿堂空翠如可掃九歌靈偃蹇兮姣服芳菲菲兮滿堂謝莊月賦滿堂變容回遑如失名畫記山不待空青而翠鳳不待五色而綷謝靈運詩空翠難強名魚釣易為曲梁昭明太子擬古詩疏條索無隱落葉紛可掃赤城霞氣蒼梧煙孔靈符會稽記赤城山名色皆赤狀似雲霞天台之南門也雲笈七籖天台赤城山髙一萬八千丈洞周回五百里即桐柏王真人所理葛玄仙翁得道處上應台宿故名孫綽天台山賦赤城霞起而建標瀑布分流以界道文選注綽蓋圖其形而賦之也喜雨賦九光之霞冠于雲日五色之氣映於巖溪漢書武帝紀元鼎六年定越地以為南海蒼梧鬱林合浦交址九真日南珠崖儋耳郡離騷朝發軔于蒼梧兮夕余至於縣圃歷代名畫記袁倩有蒼梧圖傳於前代宋之問登禪定寺閣詩揮手拂雲煙洞庭瀟湘意渺綿莊子黃帝張咸池之樂于洞庭之野山海經洞庭之山帝之二女居之水經注洞庭湖廣圓五百里日月若出沒於其中圗經瀟水去零陵縣三十步源出九疑山至永與湘水合湘水在零陵北十五里其源自全來永與瀟水合二水合流謂之瀟湘一統志長沙府湘江在府城西源出廣西興安縣海陽山西北流至分水嶺分為二派曰漓水流而南曰湘水湘猶相也言有所合漓猶離也言違湘南流湘水至永州與瀟水合曰瀟湘會衆流以達洞庭謝朓詩洞庭張樂地瀟湘帝子遊江賦包山洞庭巴陵地道潛逵旁通幽岫窈窕陸機飲馬長城窟行冬來秋未返去家渺以綿張九齡題畫山水障詩對玩有佳趣使我心渺綿三江七澤情洄沿周禮職方揚州其川三江史記索隱按地理志有南江從會稽舊吳縣南東入海中江從丹陽蕪湖縣西東至陽羡縣東入海北江從會稽毗陵縣北東入海山海經注巴陵縣有洞庭陂江湘沅水共會巴陵故號三江口也子虛賦臣聞楚有七澤嘗見其一未覩其餘也臣之所見蓋特其小小者耳名曰雲夢顔延年詩七澤藹荆牧詩溯洄從之毛萇注逆流而上曰溯洄書沿於江海孔安國傳順流而下曰沿謝靈運詩山行窮登頓水涉盡洄沿驚濤洶湧向何處魏文帝滄海賦驚濤暴駭騰湧澎湃夏侯湛詩緑水兮長流驚濤兮拂石劉向九歎波逢洶湧紛滂沛兮明皇雜録開元中關輔旱上於龍池新創一殿詔少府監馮紹政於四壁各畫一龍紹政先畫素龍其狀蜿蜒如欲振湧設色未終有白龍自簷間出入於池中風波洶湧雲雷隨起孤舟一去迷歸年陶潛歸去來辭或棹孤舟又詩渺渺孤舟逝又詩誤落塵網中一去三十年李陵答蘇武書丁年奉使皓首而歸征帆不動亦不旋飄如隨風落天邊何遜詩無由下征帆獨與暮潮歸庾信詩路塵猶白水征帆獨背關顔延之曲水詩序天動神移淵旋雲被廣川書跋周著尊文采繁縟夔躍龍翔雷回雲紋有旋動之勢王羲之謝生帖東旋未期諸情罔罔詩其為飄風列子心凝神釋隨風東西潘嶽詩幹流隨風飄劉孝綽渡江詩天邊生岸影水上結雲隂宋之問上陽宫侍宴序參光有地遊日月於天邊睥逺無窮見城池于掌上心搖目斷興難盡詩中心搖搖文心雕龍物色之動心亦搖焉李嶠楚望賦目斷兮煙霧宋之問詩目斷南浦雲晉書王子猷傳乘興而來興盡而返幾時可到三山巔子夜歌小喜多唐突相憐能幾時懊儂歌月落天欲曙能得幾時眠史記封禪書蓬萊方丈瀛洲三神山在渤海中未至望之如雲及到三神山反居水下庾信哀江南賦序風飇道阻蓬萊無可到之期沈約詩氣與三山壯謝靈運詩浮舟千仞壑縱轡萬尋巔西峯崢嶸噴流泉華山志南峰一名岱頂登之則東西兩峯僅當腰膝之間楚辭下崢嶸而無地兮上寥廓而無天廣雅崢嶸髙廣貌梁元帝賦噴飛流于天末鼓雷霆於巖下江淹詩陽岫照鸞彩隂溪噴龍泉橫石蹙水波潺湲袁山松後漢書隗相養母至孝母好飲江流相常隆冬取水一朝橫石浮江無有難涉庾信枯樹賦節豎山連文橫水蹙又白詩長風鼓橫波合沓蹙龍紋枚乘七發瀄汨潺湲波揚流灑謝靈運山居賦氿泉傍出潺湲於東簷桀壁對峙硿礲於西霤東崖合沓蔽輕霧甘泉賦蛟龍連踡於東崖兮謝靈運詩巒隴有合沓往來無蹤轍謝朓遊敬亭山詩兹山亘百里合沓與雲齊孔稚圭北山移文斂輕霧藏鴻湍江總詩翠蓋承輕霧金羈照落暉深林雜樹空芊綿漢書嚴助傳隃領行數百里夾以深林叢竹陶潛桃花源詩序夾岸數百步中無雜樹謝朓詩阡眠起雜樹檀欒蔭修竹梁元帝晉安寺碑銘鳳昱之嶺芉綿映色謝靈運山居賦孤峯竦秀長洲芊綿此中𡨕昧失晝夜陶潛詩此中有真意欲辨已忘言易注始於冥昧淮南子春秋有代謝日月有晝夜隱几寂聽無鳴蟬歷代名畫記顧生首創維摩詰像有清羸示弱之容隱几忘言之狀上聲歌四座暫寂靜聽我歌上聲禮記孟秋之月寒蟬鳴梁元帝詩花餘拂戲鳥樹密隱鳴蟬長松之下列羽客天台山賦籍萋萋之纎草蔭落落之長松古詩何處結同心西陵松柏下王裒詩仙童時可遇羽客屢相逢袁彖詩羽客宴瑤宫旌蓋乍舒展對坐不語南昌仙晉折楊柳歌三伏熱如火籠窗開北户與君對踏坐漢書地理志豫章郡縣南昌莽曰宜善又梅福傳字子真九江夀春人也為郡文學補南昌尉元始中王莽専政福一朝棄妻子去九江至今傳以為仙南昌仙人趙夫子南史隱逸傳龔祈風姿端雅容止可觀范述見之歎曰此荆楚之仙人也史記孔子世家贊中國言六藝者折衷于夫子妙年厯落青雲士曹植求自試表終軍以妙年使越陳書髙宗紀或耆艾絶倫或妙年異等世説周伯仁嘗道桓茂倫曰嶔崎歷落可笑人也史記伯夷傳閭巷之人欲砥行立名者非附青雲之士烏能施於後世哉南史衡陽王曰身處朱門而情同江海形入紫闥而意在青雲訟庭無事羅衆賔魏書張長年傳為汝南太守有郡民劉崇之兄弟訟於郡庭謝靈運詩虛館絶爭訟空庭來鳥雀漢書平準書漢興七十餘年之間國家無事儀禮衆賔之席皆不屬焉曹植詩衆賔還城邑何以慰我心杳然如在丹青裏秋河賦躋攀不及限一水以心遙曠望空勞邈九宵而思杳王褒聖主得賢臣頌何必偃仰詘信若彭祖詬噓呼吸如喬松眇然絶俗離世哉晉書顧蘇愷之傳為謝鯤像在石巖裡云此子宜置丘壑中漢書武傳李陵賀武曰竹帛所載丹青所畫盧照鄰文翁講堂詩空梁無燕雀古壁有丹青五色粉圖安足珍書日月星辰山龍華蟲作會宗彛藻火粉米黼黻絺繡以五采彰施於五色作服汝明禮記五色成文而不亂名畫記古之祕畫珍圖固多散逸人間不得見之又白詩粉圖珍重五雲色真仙可以全吾身舊唐書真仙有道之士皆匿其姓名無求於代録異記鬼谷先生者古之真仙也漢書東方朔傳宫殿中可以避世全身何必深山之中蒿蘆之下漢武內傳修絶穀全身之術若待功成拂衣去關尹子屋宇舟車待人而成彼不自成知必有待老子功成而不居左傳叔向拂衣從之謝靈運詩髙揖七州外拂衣五湖裏史記晉世家秦送重耳至河咎犯曰臣從君周旋天下過亦多矣臣猶知之況於君乎請從此去矣武陵桃花笑殺人晉書潘京傳趙廞問曰貴郡何以名武陵京曰傳曰止戈為武詩稱髙平曰陵于是名焉一統志湖廣常德府有桃源縣以其地有桃源故名又桃源山在縣南二十里桃源洞一名秦人洞陶潛桃花源記晉太元中武陵人捕魚為業緣溪行忽逢桃花林魏收棹歌行桃發武陵岸隋煬帝詩鳥聲爭勸酒梅花笑殺人御選唐詩卷七
