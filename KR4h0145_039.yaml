body:
  text: 欽定四庫全書御選唐詩卷三十七言絶句溫庭筠河中紫極宫一統志山西平陽府蒲州古舜都漢蒲坂縣地隋大業初改河東郡唐改蒲州開元中改河中府天寶初改河東郡乾元中復為河中府昔年曽伴玉真逰南史張緒傳劉悛之獻蜀栁數株武帝曰此栁風流可愛似張緒當年李白詩還須結伴逰神仙傳深山修道夜冇仙女來獻花果鼻上有黃珠如粟者玉真也唐書景雲元年作金仙玉真觀張籍詩掃壇朝玉真陸陲詩下有真人逰每到仙宫即是秋鮑照桐賦儀丹丘之瑞羽棲清都之仙宫武后詩望駕幸仙宫祖詠詩經秋無客到曼倩不歸花落盡漢書東方朔傳東方朔字曼倩劉孝威詩花開人不歸宋子侯詩花落何飄揚丁六娘詩寄語落花風莫吹花落盡滿叢煙露月當樓唐太宗詩珠穿曉露叢杜甫詩煙霏想桂叢何遜詩墟上生煙露劉鑠詩明月照高樓鄭谷曲江春草劇談録曲江池本秦時隑州唐開元中疏鑿為勝境花卉環列煙水眀媚都人遊玩盛於中元上巳之節花落江隄簇曉煙劉孝綽詩花落浮浦出爾雅築土遏水曰隄白居易詩花簇紫霞英劉孝綽詩翠蓋承朝景朱旗曳曉煙雨餘江色逺相連梁簡文帝詩雨餘雲稍薄庾信詩雲歸識雨餘岑參詩酒光紅琥珀江色碧琉璃髙適詩逺色帶孤嶼魏文帝賦草木鬱其相連香輪莫輾青青草駱賓王詩香輪騖水珠為網權德輿詩九華仙洞七香輪劉銑詩東日如車輪三輾未上坡章碣對月詩璚輪正輾丹霄去銀箭休催皓露濃廣韻輾輾轉古詩青青河畔草留與遊人一醉眠孟浩然詩逰人五陵去岑參詩壚頭耐醉眠雪中偶題亂飄僧舍茶煙濕庾信詩霜風亂飄葉隂鏗詩春近寒雖轉梅舒雪尚飄晉書孝武帝紀帝初奉佛法立精舍於殿內引諸沙門以居之杜牧詩茶煙輕揚落花風韋應物詩夜眠楚煙濕密灑歌樓酒力微雪賦俄而微霰零密雪下孫楚雪賦豐隆灑雪交錯翻紛李逺詩明朝逢舊侣惟擬上歌樓白居易詩驅愁知酒力劉禹錫詩酒力半酣愁己散江上晚來堪畫處鮑照詩江上氣早寒仲秋始霜雪江淹賦琴柱急兮江上寒杜甫詩晚來山更碧諸葛亮文乃見江左大山壁立林麓峯巒如畫漁人披得一蓑歸管子漁人入海利在水也陶潛桃花源記晉太康中武陵漁人溪行忽逢桃花林儲光羲詩長蓑披我襟張志和漁父歌青篛笠緑蓑衣斜風細雨不須歸街西晚歸御溝春水繞間坊古今注長安御溝謂之楊溝植高楊於其上也亦曰禁溝卓文君白頭吟躞蹀御溝上溝水東西流王褒詩長洲春水滿臨泛廣川中王建詩騎馬傍間坊信馬歸來傍短牆岑參詩薄暮垂鞭信馬歸宋子侯詩歸來飲美酒曹植詩歸來宴平樂杜甫詩鄰雞還過短牆來白居易詩妾弄青梅度短牆君騎白馬傍垂楊幽榭名園臨紫陌李乂詩曲榭回廊繞澗幽廣韻榭臺榭爾雅有木者謂之榭李白登謝安墩詩我來酌清波於此樹名園杜甫詩名園依緑水謝莊詩紫陌協笙鏞王勃序近臨銅陌斜控銀墟晚風時帶牡丹香鮑照詩鱗鱗夕雲起獵獵晚風遒花譜牡丹謂之木芍藥天寶中禁中初重木芍藥得四本紅紫淺紅通白移植於興慶池沈香亭牡丹譜牡丹出洛陽者為第一自唐以後始盛劉禹錫詩惟有牡丹真國色花開時節動京城舒元輿牡丹賦英之甚紅鍾於牡丹拔類邁倫國香欺蘭韋莊鄜州遇寒食城外醉吟元和郡縣志鄜州漢為上郡雕隂之地後魏改為鄜州大業初復為上郡武德元年復舊為鄜州明一統志陜西延安府鄜州去府一百八十里荆楚嵗時記去冬節一百五日即有疾風甚雨謂之寒食吳越春秋闔閭春夏治於城中秋冬治於城外唐書白居易傳自號醉吟先生滿街楊栁緑絲煙王融詩緑栁蔭通街梁簡文帝詩楊栁亂成絲李白詩疏楊挂緑絲岑參詩楊栁萬條煙畫出清明二月天李白詩青冥倚天開彩錯疑畫出謝靈運詩屬值清明節榮華感和韶白帖春分後十五日為清明江淹詩江南二月春蕭慤詩二月鶯聲才欲斷好是隔簾花樹動梁簡文帝詩隔簾映翠篠元稹詩櫻桃花下隔簾看王融詩花樹雜為錦宗懍詩花樹數重開杜甫詩繫馬林花動女郎撩亂送鞦韆古木蘭詩不知木蘭是女郎庾信詩南市女郎砧謝偃詩撩亂垂絲昏栁陌岑參詩嶺雲撩亂起古今藝術圖北方山戎寒食日用秋千為戲以習輕趫者高無際鞦韆賦序漢武後庭之戲本云千秋祝夀之詞語訛為秋千後人不本其意乃造此字幽居春思禮記幽居而不淫曹植詩春思安可忘緑映紅藏江上村傅休奕蓮歌緑葉映長波白居易栁詩緑映杏園池綦毋潛詩花藏溪路遙李涉詩春雨蕭蕭江上村一聲雞犬似仙源世説王仲宣既葬文帝顧語同逰曰王好驢鳴各作一聲以送之李賀詩雄雞一聲天下白陶潛桃花源記阡陌交通雞犬相聞孟浩然詩秦人辨雞犬宋之問詩未窺仙源極獨進野人船王維桃源行不辨仙源何處尋閉門盡日無人到陳書沈炯傳恆閉門却掃無所交逰程曉詩閉門避暑卧後漢書和帝紀初令伏閉盡日注伏日盡日閉不干他事祖詠詩蘭若無人到翠羽春禽滿樹喧宋玉神女賦眉如翠羽王褒詩春禽羣嬉梁元帝春日篇日日春禽變杜甫詩幽花欹滿樹小水細通池元稹詩滿樹狂花滿樹風杜荀鶴溪興李白詩雖然剡溪興不異山隂時山雨溪風卷釣絲張正見詩山雨濕苔碑宋之問詩山雨初含霽會稽記漢鄭𢎞嘗采薪得一遺箭頃有人覔𢎞還之問何所欲𢎞識其神人曰嘗患若耶溪載薪為難願旦南風暮北風後果然故若耶溪風至今猶然杜甫詩溪風為颯然詩其釣維何維絲伊緡岑參詩蘆花冒釣絲瓦甌蓬底獨斟時韓非子瓦器至賤也不漏可盛酒方言罃甈謂之盎自關而西謂之盆其小者謂之升甌廣韻甌瓦器杜牧詩何如釣船雨蓬底睡秋江孔德紹詩對酒時獨斟醉來睡著無人喚白居易詩醉來枕麴貧如富杜甫詩客睡何曽著王建詩枕弓睡著待水生晉子夜歌無人相要喚流下灘前也不知淮南子循流而下易以至鮑照吳歌但觀流水還識是儂流下杜牧詩前灘急夜響張籍詩家在城邊亦不知趙嘏尋僧李端詩尋僧雪滿船斜日橫窗起暗塵何遜詩斜日照安流辛德源詩窗中斜日照梁簡文帝秋晚詩促隂橫隱壁長暉斜度窗徐伯陽詩藹藹日暮紅塵起蘇味道詩暗塵隨馬去眀月逐人來水邊門户閉間春范雲詩盈盈一水邊隂鏗詩池如洛水邊禮記出入門户王勃詩春日賦間居千竿竹裏花枝動白居易池上篇有竹千竿李白詩竹裏無人聲杜甫詩美花多映竹劉孝威詩隔牆花半隱猶見動花枝只道無人似有人易閴其無人南史傅昭傳袁粲嘗經昭户輒歎曰經其户寂若無人披其帷其人斯在豈非名賢禮記入虛如有人屈原九歌若有人兮山之阿披薜蘿兮帶女蘿江樓書感謝靈運詩繫纜臨江樓漢書藝文志哀樂之心感而歌詠之聲發獨上江樓思渺然王昌齡詩烽火城西百尺樓黃昏獨上海風秋武元衡詩春風獨上望京樓案白居易冇江樓聞砧詩何劭詩渺然心綿邈孟浩然詩林端意渺然月光如水水如天詩匪東方則明月出之光謝朓詩西户月光入溫庭筠瑶瑟怨碧天如水夜雲輕張融海賦東西無里南北如天同來玩月人何在李白詩好與雁同來三輔黃圖影娥池武帝鑿以玩月韋應物詩暫輟觀書夜還題玩月詩孟浩然詩獨步人何在漢書原涉傳拜天水太守長安敗諸假號起兵聞涉名爭問原尹何在拜謁之風景依稀似去年晉書王導傳風景不殊宋孝武帝詩粵值風景和劉禹錫詩宋臺梁館尚依稀岑參花樹歌今年花似去年好去年人到今年老李侍御歸炭谷山居同宿華嚴寺通志太乙谷在終南山下有太乙祠亦名炭谷又樊川在府城南二十里唐建華嚴寺改名華嚴川家在青山近玉京常建詩故人家在桃花岸高士傳韓順贊寧極青山古詩夕宿青山郭五星經天上白玉京黃金闕靈樞金景內傳上界玉京注玉京無為天也白雲紅樹滿歸程詩英英白雲張正見詩白雲凝絶嶺謝朓詩紅樹巖舒青莎水被岑參詩醉眠鄉夢罷東望羡歸程相逢一宿最高寺越謡歌君乘車我戴笠他日相逢下車揖詩傅一宿曰宿再宿曰信莊子止可以一宿而不可以久處栁宗元詩步登最高寺蕭散任疏頑半夜翠微泉落聲耿湋詩雲開半夜千村靜爾雅釋山未及上曰翠微疏未及頂上在傍坡陀之處名翠微孔德紹詩棲息翠微嶺王勃詩逺近聽泉聲李拯字昌時隴西人咸通末登進士第纍遷考功郎中退朝望終南山紫宸朝罷綴鵷鸞職官分紀紫宸殿者漢之前殿周之路寢雍録高宗咸亨元年改蓬萊宫為含元殿含元之北為宣政宣政之北為紫宸古樂府當須宴朝罷莊子南方有鳥其名鵷雛注鸞鳯之屬包何詩鴈序入鵷鸞丹鳳樓前駐馬看雍録大明宫南端門名丹鳳鮑照詩鳳樓十二重四户八綺窗顧况詩火樹鳳樓前庾信詩逢花駐馬看惟有終南山色在福地記終南山北去長安城八十里陶潛詩山色日夕佳晴明依舊滿長安潘嶽賦微雨新晴六合清朗劉長卿詩晴明分衆容舊唐書中宗紀復國號依舊為唐漢書地理志京兆尹縣長安高帝五年置謝朓詩灞涘望長安裴夷直夜意蕭疏盡地林無影謝惠連詩蕭疏野趣生孔德紹詩遙瞻盡地軸溫庭筠詩閣上見林影月中聞澗聲魏淡詩雲度時無影浩蕩連天月有波楚辭心飛揚兮浩蕩梁郊廟歌辭懷忽慌瞻浩蕩梁元帝詩并海連天合不開漢書郊祀志月穆穆以金波獨孤及文賦詩於月波獨立空亭人睡後楚辭表獨立兮山之上晉書謝鯤傳鯤避地豫章常行經空亭中夜宿儲光羲詩薄暮入空亭白居易詩食飽窗間新睡後腳輕林下獨行時洛橋風便水聲多一統志天津橋在河南府城外西南架洛水隋煬帝建即唐人所謂洛橋也盧照鄰詩誰能借風便江總詩罕有知音者空勞流水聲劉孝綽詩夜水聲帷薄薛能老圃堂邵平瓜地接吾廬史記蕭相國世家邵平者故秦東陵侯秦破後為布衣種瓜於長安城東名勝志邵平瓜田在舊長安城東門外今長安縣之西北盧照鄰詩地接神仙澗陶潛詩吾亦愛吾廬榖雨乾時偶自鋤孝經緯清明後十五日斗指辰為榖雨孟浩然詩春逢榖雨晴杜甫詩田家望望惜雨乾又葵荒欲自鋤昨日春風欺不在古雜曲歌辭春風一夜入閨闥楊花飄蕩落南家髙爽詩若人不在兹就牀吹落讀殘書司馬相如賦遂頽而就牀庾信詩隱士一牀書李白詩片片吹落春風香劉眘虛詩深栁讀書堂王勃詩玉架殘書隱宋氏林亭地濕莎青雨後天荀子平地若一水就濕也張均詩長沙卑濕地子虛賦薜莎青薠注莎即今青莎草虞世南奉和幽山雨後詩雨歇連峯翠皇甫松大隱賦鼉鳴雨天桃花紅近竹林邊陶潛桃花源記忽逢桃花林謝靈運詩山桃發紅萼王維桃源行近入千家散花竹孟浩然詩清風在竹林劉長卿詩瀑布懸林邊行人本是農桑客費昶詩行人早旋返曹植七步詩本是同根生漢書食貨志務民於農桑後漢書仲長統傳急農桑以豐委積韓非子傭客致力而疾耕記得春深欲種田春渚紀聞春候己深而林花未放漢書食貨志民受田嵗耕種者為不易拾遺記崑崙山有芝田數百頃羣仙種耨焉杜牧朱坡煙深苔巷唱樵兒嵗華紀麗栁籠門巷之晴煙戴叔倫詩陋巷無車轍煙蘿總是春别賦或春苔兮始生廬照鄰詩狹徑聞樵唱杜甫詩谷口樵歸唱張率詩歌兒流唱聲欲清花落寒輕倦客歸謝朓詩鳥散餘花落吳均詩花落夜霏霏張説詩酒著訝寒輕白行簡賦寒輕而猶未為霜陸機詩余本倦逰客何遜詩君隨結客去我乃倦逰歸藤岸竹洲相掩映庾信詩寒藤抱樹疏杜甫詩回䇿匪新岸所攀仍舊藤謝朓詩丹藤繞新竹入越記竹洲栁岸略如苕霅薛道衡賦掩映玲瓏權德輿詩日斜門掩映滿池春雨鸊鵜飛白