五雲中陳後主詩夢來還自疑西京雜記董仲舒曰太平之時雲則五色而為慶盧綸詩語音猶在五雲中趙璜開成三年登第曲江上巳劇談録曲江池本秦時隑州唐開元中疏鑿為勝境花卉環周煙水明媚都人遊賞盛於中和上已節後漢書禮儀志是月上已官民皆潔於東流水長隄十里轉香車皇甫謐序却阻長堤前臨清渠李巨仁詩長隄栁色翠案隄與堤通庾信賦十里五里長亭短亭盧照鄰文鳴香車於闕下王維歌行羅幃送上七香車寶扇迎歸九華帳兩岸煙花錦不如庾信詩寒沙兩岸白李白詩兩岸青山相對出陳子昻詩煙花飛御道羅綺照昆明杜甫詩紫禁正耐煙花繞又新詩錦不如欲問神仙在何處漢書郊祀志燕齊方士言冇神仙祭祀致福之術者以萬數盧照鄰文形骸寄文墨意氣托神仙庾信詩蓬萊入海底何處可追尋紫雲樓閣向空虛劇談録曲江池南即紫雲樓芙蓉苑西即杏園慈恩寺爾雅釋宫疏臺榭樓閣之異門牖行步之名皆自於宫故以釋宫總之也髙適詩不知將錫杖早晚躡空虛王維詩君恩深漢帝且莫上空虛錢珝字瑞文吳興人起之曽孫善文辭宰相王溥薦知制誥進中書舍人後貶撫州司馬未展芭蕉南方草木狀甘蕉一名芭蕉或曰巴苴冷燭無煙緑蠟乾梁元帝螢火詩集草訝無煙沈佺期詩山蕉卷緑油韓翃詩日暮漢宫傳蠟燭芳心猶卷怯春寒李乂詩徑節臨冬徑芳心待嵗芳徐摛冬焦卷心賦攀殘心於孤翠隋煬帝詞水殿春寒幽冷艷杜甫詩春寒花較遲一緘書札藏何事許渾詩何以慰行旅如公書一緘古詩客從逺方來遺我一書札禮記夫敬以和何事不行何妥入塞詩問此將何事嫖姚封冠軍會被東風暗坼看禮記孟春之月東風解凍江淹詩東風轉緑蘋朱放詩風吹芭蕉坼杜牧詩亂山何處坼書看唐求居蜀之味江山至性純慤王建帥蜀召為參謀不就邦人謂之唐隱居為詩撚稿為圓納之大瓢後卧病投瓢於江曰斯文茍不沈沒得者方知吾苦心耳至新渠有識者曰唐山人瓢也接得之十才二三庭竹月籠翠葉秋承露杜牧詩煙籠寒水月籠沙陸雲賦翳翠葉兮重蓋王儉竹賦翠葉與飛雪爭采庾信詩布葉俱承露開花共待風張正見詩葉淺還承露風亞繁梢暝掃煙韓愈詩蕭蕭野竹風吹亞張正見賦階前嫩竹詩翠竹梢雲自結叢沈炯詩竹煙生薄晚知道雪霜終不變顔延之文如彼竹柏負雪懷霜杜甫柟樹為秋風所拔歌野客頻留懼雪霜禮記其在人也如松柏之有筠也如竹箭之有心也故貫四時而不改柯易葉永留寒色在庭前宋之問詩日落西山隂衆草起寒色王績答杜之松書孫綽庭前空對長松一樹李白詩覺來眄庭前一鳥花間鳴題常樂寺案寺名無考桂冷香聞十里間駱賓王詩凌霜桂影寒庾信步虛詞空香萬里聞又賦十里五里長亭短亭殿臺渾不似人寰張衡東京賦於南則前殿靈臺江淹思北歸賦去三輔之臺殿鮑照舞鶴賦歸人寰之喧卑日斜回首江頭望梁元帝詩東方曉星沒西山晚日斜庾信詩水向蘭池泊日斜細栁園唐太宗詩回首長安道方歡宴柏梁劉長卿詩猿啼客散暮江頭一片晴雲落後山庾信至仁山銘瑞雲一片仙童兩人杜甫詩晴天養片雲成公綏雲賦狀葳嵬其不安吁可畏而欲落潘尼東武館賦後則崇山崔嵬滕潛爵里無考鳯歸雲飲啄蓬山最上頭何承天詩飲啄雖勤苦不願棲園林拾遺記蓬萊山亦名防丘亦名雲來髙二萬里廣七萬里盧思道詩遙居最上頭和煙飛下禁城秋唐太宗威鳯賦西翥則煙氛閟色東飛則日月騰光杜甫鳯凰臺詩自天銜瑞圖飛下十二樓顔延之詩嚴駕守禁城曽將弄玉歸雲去列仙傳蕭史者秦穆公時人善吹簫穆公女弄玉妻焉乃教弄玉吹簫作鳯鳴鳯凰來止其屋穆公為作鳯凰臺一旦同隨鳯飛去傅毅七激仰歸雲遡逰風張衡賦憑雲歸而遐逝兮金翿斜開十二樓述異記蘭陵山冇異鳥金翅而身黑説文翿翳也鳥名似鳯吳筠詩斜開碧海來史記武帝紀方士冇言黃帝時為五城十二樓以候神人吳均詩雍臺十二樓樓樓鬱相望紇干著爵里無考灞上名勝志灞水又北徑芷陽宫南秦襄王所造謂之灞上漢高帝回軍以待項羽處鳴鞭晚日禁城東庾信馬射賦鳴鞭則汗赭入埒則塵紅隋煬帝詩平郊送晚日岑參詩禁城春色曉蒼蒼李白詩扈從金城東渭水晴煙灞岸風山海經鳥鼠同穴之山渭水出焉而東注於河庾信賦渭水貫於天門宋之問詩江鶴弄晴煙唐書地理志上都京城左臨灞岸右抵灃水王粲詩南登灞陵岸都傍栁隂回首望杜甫詩官橋帶栁隂司馬相如文回首面內劉孝綽詩回首望長安春天樓閣五雲中爾雅春為蒼天孟浩然詩栁色半春天沈炯詩樓閣起迢迢舊唐書鄭肅傳天瑞有五色雲杜篤賦髙岫帶乎巖側洞房隱於雲中陳寡言字太初暨陽人從田良逸學道元和中住桐柏山山居醉卧茅堂不閉關文子暗若酡醉而甘卧晉書王允之傳允之總角從伯敦恆以自隨孰嘗夜飲允之辭醉先卧韋孟詩爰戾於鄒鬋茅作堂杜甫詩誤疑茅堂過江麓張正見樂府不閉長楊宫李白詩無人空閉關覺來開眼見青山李白詩覺來眄庭前一鳥鳴花間杜甫詩湖城城南一開眼陳後主詩青山帶濯枝松花落處宿猿在李白歌輕如松花落衣巾張正見詩還因搖落處寂寞盡秋風陳後主樂府風巖朝蕊落霧嶺晚猿吟麋鹿羣羣林際還史記司馬相如傳囿騶虞之珍羣徼麋鹿之怪獸劉琨詩麋鹿遊我前邢惇南征賦鹿呦呦以鳴羣王維詩遙知逺林際李九齡洛陽人唐末進士中山寄友人亂雲堆裏結茅廬陳子昻詩山川亂雲日謝朓詩望山白雲裏鮑照詩結茅野中宿後漢書李恂歸鄉里潛居山澤結草為廬與諸生織席以自給巳共紅塵迹漸疏應璩詩紅塵蔽於几榻江總樂府藹藹紅塵飛李嶠詩琴酒俗塵疏莫問野人生計事劉希夷詩野人何所有滿甕陽春酒