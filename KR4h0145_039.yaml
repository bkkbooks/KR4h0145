南夷傳西南君長以什數夜郎最大唐書地理志溱州溱溪郡縣夜郎貞觀十六年開山洞置後為夜郎郡陪族叔刑部侍郎曄及中書舍人賈至逰洞庭湖一統志洞庭湖在嶽州府城西南南湖秋水夜無煙南遷録嶽州洞庭湖南名青草北名洞庭所謂重湖也水經注青草湖與洞庭相通其南羅水出焉梁宣帝賦徑南湖而迥渡張説詩樹裏南湖一片明莊子秋水時至王勃文秋水共長天一色梁元帝螢火詩集草訝無煙耐可乘流直上天揚雄賦隨風乘流何遜詩獨楫乍乘流水經注太山直上七十里孔稚圭文干青雲而直上後漢書馮異傳光武曰我昨夜夢乘赤龍上天且就洞庭賒月色謝莊月賦氣霽林表雲斂天末洞庭始波木葉微脫水經注洞庭湖廣圓五百餘里日月若出沒其中王褒詩月色當秋夜將船買酒白雲邊元結詩將船何處去史記司馬相如傳相如之臨卬買一酒舍酤酒梁簡文帝詩縱意白雲邊鮑照詩林際無窮極雲邊不可尋王昌齡甘泉歌史記樂書漢家常以正月上辛祠太乙甘泉漢書文帝紀上幸甘泉注甘泉在雲陽本秦林光宫又揚雄傳上方郊祀甘泉泰畤召雄待詔承明之庭正月從上甘泉還奏甘泉賦以風乘輿執玉己登壇揚雄賦於是乘輿乃登夫鳯凰兮而翳華芝蔡雍獨斷車馬衣服器械百物曰乘輿禮記執玉不趍岑文本詩執玉儼相趍漢書郊祀志甘泉泰畤紫壇八觚宣通象八方庾信文登壇洛汭細草沾衣春殿寒南史齊紀為芳樂苑剗取細草來植階庭庾抱詩惟冇團階露承曉共沾衣庾肩吾詩雨足飛春殿昨夜雲生初拜月梁簡文帝詩交門光景麗祈年雲霧生漢書武帝紀元鼎五年十一月辛巳朔旦冬至立泰畤於甘泉天子親郊見朝日夕月注應劭曰天子春朝日秋夕月朝日以朝夕月以夕臣瓉曰漢儀注郊泰畤皇帝平旦出行宫東向揖日其夕西向揖月便用郊日不用春秋也師古曰春朝朝日秋暮夕月蓋常禮也郊秦畤而揖日月此又别儀吉中孚妻張氏詩拜月不勝情萬年甘露水精盤西京雜記上林苑冇萬年長生樹漢書禮樂志神之徠泛翊翊甘露降慶雲集春秋元命苞太隂水精為月梁簡文帝詩定用方諸水持添承露盤送别魏二醉别江樓橘柚香岑參詩青門須醉别少為解征鞍謝靈運詩日落當栖薄繫纜臨江樓書厥包橘柚錫貢傳小曰橘大曰柚古詩橘柚垂華實崔湜詩漁舟橘柚香江風引雨入船涼梁元帝詩江風當夏清簡文帝詩冷風雜細雨盧照鄰詩江前飛暮雨越絶書子胥從漁者之蘆崎船到即載入船而伏劉楨詩豁達來風涼憶君遙在湘山月梁武帝樂府寄語故情人知我心相憶庾信文追憶平生宛然在目君山志君山在嶽州府城西洞庭湖中又名湘山狀如十二螺髻水經注洞庭湖中有君山山有石穴潛通吳之包山郭景純所謂巴陵地道者也是山湘君之所逰處故名湘山矣庾肩吾詩郢路方遼逺湘山轉蔽虧貫休詩一林湘渚月愁聽清猿夢裏長沈佺期詩谷轉聽猿啼任昉文清猿與壺人爭旦張九齡詩所思如夢裏漁者歌巴東之峽巫峽長猿鳴三聲淚沾裳張説奉和聖製同玉真公主逰大哥山池題石壁唐書玉真公主傳字持盈始封崇昌縣主俄進上清玄都大洞三景師髙宗之孫睿宗之女弟張九齡文開元二年春上幸寧王第敘家人禮上曰大哥好作主人阿瞞但謹為上客舊唐書十八年夏四月侍臣以下宴於春明門外寧王憲之園池池如明鏡月華開沈佺期詩池偷明鏡圓謝朓詩方池含積水明月流皎鏡梁元帝詩共向江頭眺月華駱賓王詩千里月華開山學香爐雲氣來釋惠逺廬山記廬山東南有香爐山孤峯秀起逰氣籠其上則棼氲若煙沈佺期詩峯奪香爐巧左傳僖公五年日南至公登臺以望雲氣拾遺記衡嶽寶露壇時冇雲氣生焉神藻飛為鶺鴒賦江淹文眇望神藻鑒見丹襟詩脊令在原傳鶺鴒飛則鳴行則搖不能自舍耳唐書讓皇帝憲傳明皇友悌敦睦蓋天性然時有鶺鴒千數集麟德殿庭樹魏光乘作頌以獻帝喜亦為作頌薛稷詩離章動鶺鴒仙聲揚出鳯凰臺明皇帝同玉真公主過大哥山池詩鳯樓遙可見倣佛玉簫聲書簫韶九成鳯凰來儀初學記秦有鳯凰臺李嶠詩簫聲猶繞鳯凰臺王昌齡西宫秋怨漢書五行志董仲舒以為西宫小寢夫人之居左氏以為西宫公宫也三輔黃圖長秋宫太后常居之按通靈記太后成帝母也后宫在西秋之象也舊注班姬在長信其宫在西故曰西宫此為婕好之辭也芙蓉不及美人粧西京雜記卓文君臉際常若芙蓉爾雅疏江東人呼荷花為芙蓉莊子毛嬙麗姬人之所美也江淹賦燕趙歌兮傷美人鮑照芙蓉賦對粧則色殊水殿風來珠翠香徐陵詩荷開水殿香梁簡文帝詩縷散怪風來宋玉賦空穴來風傅毅賦珠翠的皪而照耀兮却恨含情掩秋扇王適詩更復含情一待君王粲詩含情欲待誰劉孝綽班婕妤怨妾身似秋扇庾信詩殘秋欲屏扇空懸明月待君王沈約賦明月孤懸司馬相如長門賦懸明月以自照兮詩室家君王曹植賦長寄心於君王王維九日憶山東兄弟風土記九月九日律中無射而數九荆楚嵗時記九月九日土人並藉野飲宴獨在異鄉為異客古樂府夢見在我旁忽覺在他鄉鮑照詩何况異鄉别王勃詩九月九日望鄉臺他席他鄉送客杯左傳子産相鄭伯以如晉使盡壞其館之垣而納車馬焉士文伯讓之曰敝邑以政刑之不修冦盜充斥是以令吏人完客所館今吾子壞之雖從者能戒其若異客何每逢佳節倍思親宋之問九日詩令節三秋晚張九齡詩自爾為佳節家語食美者思其親遙知兄弟登髙處詩凡今之人莫如兄弟庾信賦陸機則兄弟同居續齊諧記汝南桓景隨費長房逰學長房謂之曰九月九日汝家當冇災厄急令家人縫囊盛茱萸繫臂上登髙飲菊酒此禍可消阮籍詩登髙臨四野遍插茱萸少一人風土記九月九日折茱萸房以插頭言辟除惡氣而禦初寒急就篇藝蒜薺芥茱萸香注茱萸似榝而大食者貴其馨烈張諤詩歸來得問茱萸女周禮地官小司徒凡起徒役毋過家一人常建送宇文六花映垂楊漢水清孟浩然詩妓堂花映發書閣栁逶迤沈約詩髙楊拂地垂梁元帝詩巫山巫峽長垂栁復垂楊左傳楚國方城以為城漢水以為池隋煬帝樂府漢水逢逰女王適詩湛湛江水見底清微風林裏一枝輕傅毅舞賦順微風揮若芳馬融賦微風纎妙梁昭明太子詩爭逰上林裏張華賦巢林不過一枝江總詩秋樹相思一枝緑梁簡文帝賦風動枝輕即今江北還如此劉廷琦詩即今西望猶堪思宋之問詩鄉連江北樹雲斷日南天江淹詩素心正如此愁殺江南離别情古詩白楊多悲風蕭蕭愁殺人張華詩妾在江南隂江淹别賦知離夢之躑躅意别魂之飛揚蘇武詩惟念當離别恩情日以新除夜作月令廣義除盡今嵗以更新也荆楚嵗時記嵗除三百六旬之盡七十二候之窮家家具殽䔩宿嵗以迎新年相聚酣飲旅館寒燈獨不眠謝靈運詩旅館眺郊岐謝朓詩寒燈耿宵夢江總詩寒燈作花羞夜短屈原九章思不眠以至曙客心何事轉悽然陸機詩春芳傷客心謝朓詩客心悲未央謝元暉詩問我勞何事莊子凄然似秋暖然似春向秀賦序寒冰凄然故鄉今夜思千里石崇詩悠悠思故鄉魏文帝詩慊慊思歸戀故鄉宋之問詩猿聲今夜斷人腸班彪賦回千思而無家謝惠連賦馳遙思於千里愁鬢明朝又一年吳均詩積愁落芳鬢又緑鬢愁中改沈佺期詩明朝題漢柱唐太宗守嵗詩冬盡今宵促年開明日長李頎寄韓鵬為政心間物自間漢書董仲舒傳為政而宜於民者固當受祿於天孫綽逰天台山賦體靜心間朝看飛鳥暮飛還管子日有朝暮夜有晨昏古樂府神仙篇紫府事朝看魏文帝詩飛鳥翔我前陶潛歸去來辭鳥倦飛而知還又詩紛紛飛鳥還寄書河上神明宰范雲詩寄書雲間鴈詩河上乎翺翔任昉詩物色關下委裘河上晉書陸雲傳雲補浚儀令一縣稱為神明沈佺期詩洛陽舊有神明宰羡爾城頭姑射山一統志姑射山在府城西五十里山冇姑射蓮花二洞即莊子所謂有神人居焉者元和郡國志平山一名壺口山今名姑射山在晉州臨汾縣西八里張謂送盧舉使河源隋書煬帝紀大業五年伊吾吐屯設等獻西域地數千里乃置西海河源鄯善且永四郡故人行役向邊州梁元帝樂府同心宜共折故人懷故鄉吳均詩故人杯酒别詩父曰嗟豫子行役夙夜無己蘇武詩行役在強場相見未有期高適詩征馬向邊州蕭蕭嘶不休匹馬今朝不少留春秋作丘甲疏丘有戎馬一匹牛三頭是曰匹馬丘牛南史侯景傳匹馬孤行自執羈紲詩以永今朝梁簡文帝三月三日詩握蘭惟是旦採艾亦今朝詩不留不處司馬相如大人賦宅彌萬里兮曽不足以少留長路關山何日盡古詩長路漫浩浩班彪北征賦涉長路之綿綿兮逺紆回以樛流江淹恨賦關山無極張正見詩關山度曉月劎客逺徙征滿堂絲竹為君愁楚辭滿堂兮美人謝莊月賦滿堂變容回遑如失漢書張禹傳禹性習知音聲內奢淫身居大第後堂理絲竹管絃左思蜀都賦羽爵執競絲竹乃發御選唐詩卷三十
