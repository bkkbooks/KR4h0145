body:
  text: 欽定四庫全書御選唐詩卷二十四五言排律太宗皇帝正日臨朝四民月令正月一日七十二候之初三百六旬之端是謂正日唐書禮樂志皇帝元正今至受羣臣朝賀條風開獻節史記律書條風居東北主出萬物條之言條治萬物而出之故曰條風易通卦驗立春條風至風土記岳州自元旦獻嵗鄰里以飲宴相慶至十二而罷謂其日為開雲節謝靈運詩開春獻初嵗白日出悠悠灰律動初陽後漢書律厯志候氣之法為室三重户閉塗釁必周宻布緹縵室中以木為案毎律各一内庳外髙従其方位加律其上以葭莩灰抑其内端案厯而候之氣至者灰去其為氣所動者其灰散人及風所動者其灰聚殿中候用玉律十二惟二至乃候靈臺用竹律六十候日知其律王廙賦春可樂兮樂孟春之初陽百蠻奉遐賮詩因時百蠻班固賦内撫諸夏外綏百蠻顔延之賦有肆險而禀朔或逾逺而納賮説文賮㑹禮也萬國朝未央左傳禹㑹諸侯于塗山執玉帛而朝者萬國隋煬帝詩端拱朝萬國守文繼百王史記髙祖紀九年未央宫成髙祖大朝羣臣置酒未央前殿髙祖奉玉巵起為太上皇夀羣臣皆呼萬嵗括地志未央宫在雍州長安縣西北十里雖無舜禹蹟史記五帝紀自黄帝至舜禹皆同姓而異其國號以彰明徳左傳茫茫禹迹畫為九州鮑照詩御風親列途乗山窮禹蹟幸欣天地康易天地交泰后以財成天地之道輔相天地之宜九歌君欣欣兮樂康車軌同八表禮記車同軌謝恵連賛致之以徳車軌斯同晉書邵續傳國家應符撥亂八表宅心何承天詩仁聲被八表書文混四方禮記書同文晉書劉頌傳唐虞以前書文殘闕書四方風動論衡混一四海天下定寧赫奕儼冠益陳琳賦光赫奕而燭夜何晏賦赫奕昭爍若日月之麗天也史記平準書冠葢相望班固賦冠葢如雲七相五公紛綸盛服章髙士傳井丹字大春博學髙論京師為之語曰五經紛綸井大春左傳君子小人物有服章後漢書輿服志注漢明帝備其服章天子郊廟衣上皁下絳前三幅後四幅衣畫而裳繡羽旄飛馳道禮記比音而樂之及干戚羽旄之謂樂班固賦羽旄掃雲旌旗拂天史記秦始皇紀二十七年賜爵一級治馳道注馳道天子道也謝朓詩飛甍夾馳道鐘鼓震巖廊詩鐘鼔既設一朝饗之隋煬帝詩纓珮何濟濟鐘鼔何煌煌漢書董仲舒傳益聞虞舜之時游于巖廊之上垂拱無為而天下太平注巖廊殿下小屋也晉灼曰巖廊謂嚴峻之廊也組練輝霞色左傳楚子重使鄧廖帥組甲三百被練三千以侵呉謝朓元㑹曲分堦赩組練充庭羅翠旗謝靈運賦落月映嶼收霞斂色梁簡文帝詩曙色始成霞霜㦸曜朝光梁元帝詩霜戈臨塹白徐陵書霜戈雪㦸無非武庫之兵鮑照詩紫殿爭朝光隋煬帝詩朝光動劍彩晨宵懐至理梁簡文帝表至理隆而徳音闡何遜詩至理歸無為終愧撫遐荒晉書文帝紀仁風興于中夏流澤布于遐荒韋孟詩彤弓斯征撫寧遐荒春日𤣥武門宴羣臣闗中記未央宫東有蒼龍北有𤣥武即北闕也雍録大明宫北門為𤣥武門内有𤣥武殿韶光開令節梁簡文帝文五翳銷空韶光表節傅兖妻辛氏詩元正啟令節淑氣動芳年劉孝綽詩迴風飄淑氣陳叔達詩玉律動年華梁簡文帝詩芳年留帝賞駐輦華林側漢書袁盎傳陛下従代邸來郎官上書未嘗不止輦受其言洛陽圖經華林園在城内東北隅魏明帝起名芳林園齊王芳改為華林干寳晉紀泰始四年二月上幸芳林園與羣臣宴賦詩觀志梁簡文帝文晉集華林同文軌而髙宴髙宴栢梁前沈約詩奉髙宴於栢梁南史沈炯傳指栢梁而髙宴漢書武帝紀元鼎二年春起栢梁臺三輔舊事以香栢為之三輔黄圖帝嘗置酒其上詔羣臣和詩紫庭文珮滿傅休奕詩萬里升紫庭梁武帝詩戲金闕遊紫庭後漢書輿服志古者君臣佩玉丹墀衮紱連張衡賦青瑣丹墀注以丹漆地也廣絶交論趨走丹墀者疊跡周禮衮冕注古者天子冕服十二章至周以日月星畫於旌旗而冕服九章一曰龍二曰山三曰華蟲四曰火五曰宗彛皆畫以為繢六曰藻七曰粉米八曰黼九曰黻皆飾以為繡易朱紱方來説文紱綬也曹植表上慚華衮俯愧朱紱牛𢎞詩來朝圭紱連九夷簉瑤席晉書樂歌懐萬方納九夷玉篇簉倅也又齊也楚辭瑤席兮玉瑱五狄列瓊筵爾雅九夷八狄七戎六蠻謂之四海周禮職方氏掌四夷八蠻七閩九貉五戎六狄謝朓詩既通金閨籍復酌瓊筵醴娯賔歌湛露曹植娯賔賦遂衎賔而髙㑹禰衡賦序今日無用娯賔願為之賦詩湛湛露斯匪陽勿晞疏天子宴諸侯之詩也何遜詩羽觴歡湛露廣樂奏鈞天史記趙簡子曰吾至帝所甚樂與百神游於鈞天廣樂九奏萬舞潘岳賦陳鈞天之廣樂兮展萬舞之至歡清尊浮緑醑劉苞詩清尊久不薦淹留遂待君七啟浮蟻鼎沸酷烈椒馨謝朓詩緑蟻方獨持玉篇醑美酒也雅曲奏朱絃呉志周瑜傳吾雖不及䕫曠聞絃賞音足知雅奏也庾信賦聴雅曲於文絃禮記清廟之瑟朱絃而疏越一唱而三歎有遺音者矣江淹詩雲殿朱絃響粤余君萬國玉篇粤于也易首出庶物萬國咸寧還慚撫八埏淮南子九州之外乃有八埏牛𢎞詩恭已臨萬㝢宸居馭八埏庶㡬保貞固易顔氏之子其庶㡬乎詩庶㡬夙夜以永終譽易貞固足以幹事虛已厲求賢漢書五行志周既克殷以箕子歸武王虛己而問焉禮記彰人之善而美人之功以求下賢後漢書蔡邕傳求賢之道未必一途或以徳顯或以言揚出獵楚王雲夢澤書雲土夢作乂疏左傳昭三年楚子與鄭伯田於江南之夢定四年楚昭王寝於雲中司馬相如賦臣聞楚有七澤嘗見其一未覩其餘也臣之所見葢特其小小者耳名曰雲夢雲夢方九百里一統志雲夢縣在徳安府城南四十六里西魏於雲夢古城置縣因以為名又雲夢澤在安陸縣南五十里漢帝長楊宫庾信步虛詞漢帝看桃核齊侯問棗花三輔黄圖長楊宫本秦舊宫漢修之以備行幸宫中有垂楊數畝因名揚雄羽獵賦序武帝廣開上林東南至御宿昆吾旁南山西至長楊五柞何遜詩昔隨張博望辭帝長楊宫豈若因農暇左傳春蒐夏苗秋獮冬狩皆因農隙以講事也魏書薛謹傳謹命立庠教以詩書三農之暇悉令受業閱武出轘嵩晉書樂章皇之輔若閱武爪牙奮莫之禦又虞溥傳溥父秘為偏將軍鎮洮西溥従父之官専心墳籍時疆場閱武人爭視之溥未嘗寓目水經注三塗太行轘轅崤邑非南望也一統志轘轅山在鞏縣西南七十里其坂有十二曲道將去復還故名詩崧髙維岳峻極于天白虎通中央之岳獨加髙者何中央居四方之中最髙故曰崧髙山一統志嵩山在登封縣北一十里東曰太室西曰少室嵩其總名三驅陳銳卒易王用三驅庾信賦變三驅而畫鹿登百尺而懸熊漢書宣帝紀二年秋調關東輕車銳卒選郡國吏三百石伉健習騎射者皆従軍晉書景帝紀爰授銳卒畢力戎行七萃列材雄虞羲詩雲屯七萃士魚麗六郡兵王融序七萃連鑣九斿齊軌魏志武帝紀程昱説曹公曰劉備有雄材而甚得衆心寒野霜氛白朱異田飲引屬風林之蕭瑟值寒夜之蒼茫梁昭明太子詩寒風催夜霜張率詩秋冬交代序朝霜白綏綏平原燒火紅司馬相如賦楚亦有平原廣澤遊獵之地饒樂若此者乎鼂錯書土山丘陵曼衍相屬平原廣野此車騎之地也管子齊之北澤燒火光照堂下管子入賀桓公曰吾田野闢農夫必有百倍之利矣是嵗租税九月而具張緒詩雲根飛燒火古詩火旗焰焰燒天紅琱戈夏服箭國語晉恵公令韓簡挑戰穆公横琱戈出見使者晉書載記鐵騎干雲雕戈耀景司馬相如賦右夏服之勁箭注服盛箭器也夏后氏之良弓名繁弱其矢亦良即繁弱箭服故曰夏服也庾信賦夏箭三成青莖赤羽羽騎緑沈弓揚雄賦羽騎營營昈分殊事何遜詩長安美少年羽騎暮連翩北史張奫傳隋文帝賜奫緑沈甲獸文具裝蕭子雲詩緑沈弓項縦紫艾刀横拔怖獸潛幽壑漢書揚雄傳䠞竦讋怖注讋言禽獸驚走也嵇康賦登飛梁越幽壑晉書陸機傳賛桂生幽壑終保彌年之丹驚禽散翠空王融文危葉畏風驚禽易落謝靈運詩空翠難强名江淹賦野田田而虛翠水湛湛而空碧長烟晦落景郭璞詩升降隨長烟飄颻戲九垓廣雅日西落光反照於東謂之反景灌木振嚴風詩黄鳥于飛集于灌木左思詩何事待肅歌灌木自悲吟江淹書庶女告天振風襲於齊臺袁淑詩四面各千里縦横起嚴風所為除民瘼左傳勤惜民隠而除其害也詩瘼此下民南史循吏傳序日昃聴政求瘼卹隠非是悦林叢楚辭叢林之下無怨士兮蕭道明詩凉風散簟席霞色變林叢秋日斆庾信體周書庾信傳字子山父肩吾為梁太子中庶子掌管記東海徐摛為右衞率摛子陵及信並為抄撰學士父子出入禁闥恩禮莫與比既有盛才文並綺艷故世號為徐庾體嶺銜宵月桂釋氏通鑑碧落霧埋松嶺月梁簡文帝詩青山銜月規鮑照詩宵月向掩扉江淹詩宵月輝西極酉陽雜俎舊言月中有桂樹髙五百丈江總詩河邊月桂秋珠穿曉露叢洞冥記勒畢國飲丹露為漿丹露者日初出有露如珠也江淹賦秋露如珠宋文帝詩階上曉露潔謝朓詩惜曉露之方稀華曄詩露色變林叢蟬啼覺樹冷禮記孟秋之月寒蟬鳴庾信賦驚懶婦而蟬啼徐陵詩蟬咽覺山秋螢火不温風爾雅螢火即炤也拾遺記岱輿山北有玉梁梁下螢火大如蜂聲如雀庾信詩螢飄碎火流禮記季夏之月温風至曹植賦温風赫戲草木垂榦花生圓菊蕋梁簡文帝詩新花已自生嵇含菊花銘葳㽔圓秀翠葉紫莖盧諶菊花賦黄蕋星羅荷盡戲魚通爾雅荷芙蕖庾信詩夏餘花欲盡蕭慤詩香盡覺荷衰張衡賦渚戲躍魚漢相和歌魚戲蓮葉東魚戲蓮葉西拾遺記瀛洲東有淵洞有魚鼔舞羣戲逺望水間有五色雲就視乃此魚噴水為雲如慶雲之麗謝朓詩魚戲新荷動晨浦鳴飛雁左思詩嗷嗷晨雁翔庾信詩洞浦落遵鴻詩雝雝鳴雁淮南子夫雁従風而飛以愛氣力謝朓詩行雁飛且鳴夕渚集棲鴻温子昇詩微微夕渚暗曹植詩夕宿蘭渚禽經羣雁獨警注夜棲川澤中千百為羣有一雁不瞑以警衆也詩鴻飛遵渚颯颯髙天吹楚辭風颯颯兮木蕭蕭文心雕龍秋風颯颯謝朓詩颯颯髙樹秋説文天顛也至髙無上文子髙莫髙于天楚辭天髙而氣清薛道衡詩髙天澄逺色謝朓詩髙城凄夕吹氛澄下熾空陶潛詩露凝無遊氛袁淑賦旻㝢滌氛范雲詩桂水澄夜氛伏系之秋懐賦天宇澄肅劉楨大暑賦若熾燎之附體賦秋日懸清光賜房𤣥齡江淹詩寒郊無留影秋日懸清光秋露凝髙掌江淹賦秋露如珠劉孝綽詩上宫秋露結蔡邕釋誨蒹葭蒼而白露凝陸機詩肅肅素秋節湛湛濃露凝史記孝武紀承露仙人掌注仙人以手掌擎盤承甘露也三輔故事建章宫承露盤髙二十六丈上有仙人掌承露和玉屑飲之謝朓詩日華承露掌庾信詩露掌定髙雲朝光上翠微鮑照詩紫殿爭朝光梁簡文帝詩朝光照皎皎陽休之詩靄靄春光上爾雅山未及上曰翠微疏謂未及頂上在旁陂陀之處名翠微一説山氣青縹色故曰翠微左思賦鬱葐蒀以翠微參差麗雙闕司馬相如賦岑崟參差日月蔽虧阮籍詩日月逓參差古詩雙闕百餘尺曹植樂府雙闕曜朱光照耀滿重闈易林光明照耀謝靈運詩日落山照耀徐陵詩夕照滿西陂何晏賦複閣重闈左思賦重闈洞出仙馭隨輪轉顔延之賦飡霞之氣神馭乎九仙隋書音樂志騰日馭鼓雷鞭初學記日乗車駕以六龍羲和馭之木華賦狀如天輪膠戾而激轉劉孝威詩魯日尚迴輪禮記日在營室疏星次西流日行東轉靈鳥帶影飛廣雅日名陽烏梁元帝賦見靈烏之占巽觀司南之候離劉孝綽詩仙掌方晞露靈烏正轉風周髀算經日中立竿測影曹植賦翩飄飄而浮影若驚鵠之雙飛臨波無定彩徐陵日華詩乍逐細波移江淹賦日下壁而沈彩入隙有圓暉謝靈運詩秋首風入隙謝恵連賦終開簾而入隙沈約詩方暉竟户入圓影隙中來還當葵藿志傾葉自相依曹植表葵藿之傾葉太陽雖不為之迴光然終向之者誠也江淹詩況我葵藿志松柏眼前横謝恵連詩願君眷傾葉留景恵餘明劉孝綽詠日詩園葵一何幸傾葉奉離光謝靈運詩蒲稗相因依明皇帝春晚宴兩相及禮官麗正殿學士探得風字并序源唐書明皇紀開元八年正月辛巳京兆尹乾曜為黄門侍郎同中書門下平章事五月丁卯為侍中九年九月癸亥張説為兵部尚書同中書門下三品十一年四月甲子為中書令又百官志禮部尚書一人正三品侍郎一人正四品下掌禮儀祭享貢舉之事翰林志明皇置麗正殿學士名儒大臣皆在其中張説傳帝自東都將還京召説與禮官學士置酒集仙殿曰朕今與賢者樂於此當遂為集賢殿乃下制改麗正書院為集賢殿書院而授説為學士知院事六典洛陽皇宫南面三門右曰光政光政之内曰廣運明福明福之西曰崇賢門其内曰集賢殿朕以薄徳禮記其徳盛者其志厚祇應歴數書洪範四五紀一曰嵗二曰月三曰日四曰星辰五曰厯數庾信文主上恭膺寳厯嗣奉瑤圖正天柱之將傾列子天亦物也物有不足故昔者女媧氏鍊五色之石以補其闕紉地維之已絶説文紉女鄰切繟繩也郭璞曰以綫貫針曰紉楚辭紉秋蘭以為佩庾信樂府東南可以補地闕西北可以正天傾舊唐書本紀景隆四年六月睿宗曰宗社由汝安定神祇萬姓賴汝之力進封平王故得承奉宗廟晉書入則盡歡承奉周禮春官小宗伯之職掌建國之神位右社稷左宗廟後漢書和帝紀逺國珍羞今以薦奉宗廟垂拱巖廊書垂拱而天下治漢書董仲舒傳葢聞虞舜時游於巖廊之上垂拱無為而天下大治居海内之尊易乾元亨利貞疏於人事言之則君也父也以其居尊故在諸卦之首禮記富有四海之内處域中之大老子道大天大地大王亦大域中有四大而王居其一焉然後祖述堯典禮記仲尼祖述堯舜書堯典粤若稽古帝堯憲章禹績禮記憲章文武詩設都於禹之績敦睦九族書敦叙九族乂九族既睦㑹同四海書四海會同又聲教訖于四海猶恐烝黎未乂崔實政論古有移人通財以贍烝黎蔡邕九祝辭萬國和同兆民康乂徭戍未安魏文帝息兵詔且休力役罷省繇戍史記孝文帝傳賴宗廟之靈社稷之福方内乂安禮樂之政虧禮記禮樂刑政四達而不悖則王道備矣師儒之道喪周禮地官大司徒以本俗六安萬民四曰聨師儒乃命使者衣繡服漢書百官公卿表侍御史有繡衣直指者武帝所制注衣以繡衣尊寵之也又雋不疑傳暴勝之為直指使者衣繡衣持斧逐捕盜賊督課郡國行郡縣漢書韓延夀傳守左馮翊嵗餘不肯出行縣丞掾數白宜巡行郡中因人所利論語因民之所利而利之擇其可勞論語擇可勞而勞之所以便億兆也後漢書傳賛俾建永昌周徧億兆晉書周嵩傳上為宗廟無窮之計下收億兆元元之命舊唐書本紀開元二年關中自去秋至于是月不雨人多饑乏遣使賑給三年六月山東諸州大蝗紫微令姚崇奏差御史下諸道促官吏遣人驅撲焚瘞以救秋稼従之是嵗田收有穫人不甚饑開元十年八月丁亥遣户部尚書陸景先往許汝等州存撫賑給乃命將士後漢書光武帝紀大司馬呉漢自蜀還京師於是大饗將士班勞策勲擐介胄左傳躬擐甲胄禮記介冑則有不可犯之色礪矢石書礪乃矛左傳荀偃士匄率卒攻偪陽親受矢石審山川之向背書望于山川史記淮隂侯傳兵法右倍山陵前左水澤今者將軍令臣等反背水陳曰破趙會食臣等不服然竟以此勝應嵗月之孤虛書嵗月日時無易史記龜策傳日辰不全故有孤虛注六甲孤虛如甲子旬戌亥為虛辰巳為孤抱朴子従計約以奮擊常背孤而擊虛則黄帝吕尚范蠡伍員之所同也所以靜邊陲也左傳䖍劉我邊倕舊唐書本紀先天二年十一月癸卯講武於驪山甲辰畋獵于渭川開元二年正月甲申并州大都督府長史兼檢校左衞大將軍薛訥同紫微黄門三品仍總兵以討奚契丹二月突厥黙啜遣其子同俄特勒率衆寇北庭都䕶府右饒衞將軍郭䖍瓘繫敗之二年冬十月薛訥破吐蕃於渭川西界武階驛十年閏五月壬申兵部尚書張説往朔方軍巡邊乃命禮官周禮春官宗伯曰禮官之屬考制度書六年五服一朝又六年王乃時巡考制度于四岳稽典則書有典有則貽厥子孫舊唐書禮儀志開元十年詔國子司業韋縚為禮儀使専掌五禮序文昭武穆禮記宗廟之禮所以序昭穆也左傳管蔡郕霍魯衞毛那郜雍曹滕畢原酆郇文之昭也邘晉應韓武之穆也舊唐書本紀開元十一年八月戊申尊八代祖宣皇帝廟號獻祖光皇帝廟號懿祖班祔于太廟之九廟享天地神祇書山川鬼神亦莫不寧周禮大司樂凡樂六變則天神皆降八變則地祇皆出舊唐書禮儀志昊天上帝五方帝皇地祇神州及宗廟為大祀所以申嚴潔也王儉啟聖心過恭寧在嚴潔乃命學者繕落簡孟子北方之學者未能或之先也説文繕補也左傳繕甲兵注治也韻補繕整葺補治之義又編録文字謂之繕寫江總碑羽陵蠧迹嵩山落簡緝遺編漢書劉歆傳經或脱簡傳或間編注謂舊編爛絶纂魯壁之文章漢書劉歆傳魯恭王壊孔子宅欲以為宫而得古文于壊壁之中禮記立權度量考文章綴秦坑之煨燼禮記紉箴請補綴書序及秦始皇滅先代典籍焚書坑儒沈約梁鼓吹曲闢應和掃煨燼所以修文教也書三百里揆文教易修辭立其誠疏外則修理文教舊唐書本紀開元七年十二月丙戌置𢎞文崇文兩館讐校書郎官員十年六月辛丑上注釋孝經頒于天下經籍志開元三年左散騎常侍禇無量馬懐素侍宴言及經籍帝曰内庫皆先代舊書篇巻錯亂難于檢閱卿試為整比之七年詔公卿士庶之家所有異書官借様寫及四部書成上令百官入乾元殿東廊觀之無不駭其廣書錄大凡五萬一千八百五十二巻故能使流寓返枌榆之業後漢書亷范傳范流寓西州西州平歸鄉里漢書郊祀志髙祖禱豐枌榆社鄭氏注枌榆鄉名也戎狄稱藩屏之臣詩价人維潘大邦維屏舊唐書本紀開元三年二月十姓部落及髙麗王等各率其衆自突厥相繼來奔前漠後總二千餘帳開元十年夏四月封契丹首領松都督李鬱子為松漠郡王奚首領饒樂都督李魯蘇為饒樂郡王閏五月戊寅勅諸蕃充質宿衞子弟並放還國神祇歆其禋祀曹植詩備禮享神祇詩來方禋祀周禮春官以禋祀祀昊天上帝舊唐書本紀開元十一年十一月戊寅親祀南郊大赦天下庠序闡其經術禮記黨有庠術有序孟子夏曰校殷曰序周曰庠班固賦四海之内學校如林庠序盈門漢書東平思王傳尊修經術親近仁人既家六合賈誼論然後以六合為家後漢書崔駰傳六合怡怡比屋為仁時巡兩京唐書明皇帝紀開元十二年十一月庚午如東都十五年十月己卯至自東都又韋𢎞基傳髙宗常言兩都我東西宅函秦則委輸斯逺史記蘇秦傳秦東有崤函之固賈誼論秦孝公據崤函之固史記置平準于京師受天下委輸詩道之云逺鼎邑則朝宗所利史記成王在豐使召公復營洛邑周公卒營築居九鼎焉曰洛天下之中四方入貢道里均左傳成王克商遷九鼎于洛邑周禮春官春曰朝夏曰宗唐書張元素傳太宗謂房𤣥齡曰洛陽朝貢天下之中朕營之欲便四方百姓封畿四塞周禮制其畿疆而溝封之漢書地理志初雒邑與宗周通封畿東西長而南北短短長相覆為千里史記項羽紀關中阻山河四塞洛陽記左成臯右函谷前有伊闕却背孟津此四塞之國従來測景之都周髀算經日中立竿測景周禮大司徒以土圭之法測土深正景以求地中疏潁川陽城周公測景處古跡猶在張衡東京賦土圭測日影不縮不盈城闕千門詩在城闕兮東京賦殿未出乎城闕斾已返乎郊畛史記作建章宫度為千門萬户自昔交㑹之地詩自古在昔周禮四時之所交風雨之所㑹隂陽之所和乃建王國東京賦總風雨之所交然後以建王城唐太宗建東都詔心兹宇宙通貢賦于四方交乎風雨均朝宗于萬國隂陽代謝易立天之道曰隂與陽白虎通王者承天順理調和隂陽隂陽和萬物序休氣充塞符瑞並臻皆應徳而至南史袁湛傳論天長地久四時代謝日月相推説文推排也進也易日月相推而明生焉豈可使春色虛捐謝朓詩宛洛佳遨遊春色滿皇州韶華並歇梁元帝纂要春曰青陽景曰媚景韶景謝靈運詩屬值清明節榮華感和韶何遜詩於時春未歇乃置㫖酒詩兕觥其觩㫖酒思柔命英賢江淹詩君王禮英賢不恡千金璧有文苑之髙才後漢書文苑傳上下二巻又賈逵傳令逵自選公羊嚴顔諸生髙材者二十人教以左氏與簡紙經傳各一通有掖垣之良佐劉植詩誰謂相去逺隔此西掖垣唐書權徳輿傳徳輿知制誥獨直兩省乃上書言左右掖垣承天子命奉行詳覆各有攸司馮衍奏記樹名賢之良佐舉杯稱慶何樂如之徐陵表三元兆慶六宫司春得奏萬夀之杯預參百辟之禮同吟湛露之篇詩湛湛露斯匪陽不晞厭厭夜飲不醉無歸宜振凌雲之藻史記司馬相如傳相如奏大人之賦天子大悦飄飄有凌雲之氣于時嵗在乙丑開元十三年三月二十七日乾道運無窮易乾道愛化各正性命淮南子執要道之柄而遊于無窮之地沈佺期詩身世兩無窮恒將人代工書天工人其代之隋書髙帝紀代蒼蒼之工成巍巍之業謝瞻詩伊人感代工聿來扶興王隂陽調歴象書燮理隂陽又乃命羲和欽若昊天厯象日月星辰敬授人時竹書紀年帝顓頊十三年初作厯象唐書明皇紀性英武善騎射通音律厯象之學禮樂報𤣥穹禮記禮樂不可斯須去身左傳説禮樂而敦詩書詩書義之府也禮樂徳之則也宋郊祀歌烟薌鬯報清穹張華詩長劍横九野髙冠拂𤣥穹介胄清荒外史記絳侯世家亞夫持兵揖曰介胄之士不拜揚雄賦介冑被霑汗詩是用大介注介甲也説文胄兜鍪也列子逺在八荒之外七命公子曰大夫不遺來萃荒外衣冠佐域中後漢書鄭均傳均拜議郎帝賜以衣冠南史徐陵傳今衣冠禮樂日富年華漢書蕭望之傳賛身為儒宗輔佐之純近古社稷臣也魏武帝詩於鑠賢聖總統邦域言談延國輔禮記言談者仁之文也後漢書光武帝紀大司空融等奏議曰周封八百同姓諸姬並為建國夾輔王室享國長久為後世法晉書段灼傳有國者皆欲求忠以自輔詞賦引文雄漢書枚乘傳以病去官復游梁梁客皆善詞賦乘尤髙又揚雄傳非聖哲之書不好也顧嘗好辭賦庾肩吾詩愧乏天庭藻徒參文雅雄野霽伊川緑王融詩日霽沙溆明牛鳳及詩戒道伊川北通津澗水西山海經虢山伊水出焉西流注於河一統志伊水源出盧氏縣悶頓嶺東流經嵩縣洛陽偃師縣界入于洛水郊明鞏樹紅廣韻邑外曰郊一統志鞏縣在河南府城東一百三十里郭縁生述征記鞏縣周之鞏伯邑庾肩吾詩雲邊開鞏樹霧裏識嶤峯謝朓詩紅樹巖舒青莎水被冕旒多暇景易君子以莅衆疏冕旒垂目黈纊塞耳无為清淨民化不欺梁元帝序求瘼餘晨頗多暇景唐太宗賦惟萬㡬之暇景屏千慮于巖廊詩酒㑹春風南史袁粲傳獨步園林詩酒自適又蕭介傳介少交遊與兄弟文酒賞㑹時人以比謝氏烏衣之遊淮南子春風至則甘雨降生育萬物陶潛詩春風扇微和首夏花萼樓觀羣臣宴寧王山亭回樓下又申之以賞樂賦詩并序即魏文帝賦伊暮春之既替首夏之初期唐書讓皇憲傳始王永平唐隆元年進封宋明皇既討定蕭岑之難徙王寧先天後以隆慶舊邸為與慶宫而賜憲天子于宫西南置樓其西署曰花萼相輝之樓南曰勤政務本之樓帝時時登之聞諸王作樂必亟召升樓與同榻坐或就幸第賦詩燕嬉賜金帛侑歡萬物莫不氣兆乎上而形視乎下易大哉乾元萬物資始乃統天雲行雨施品物流形又精氣為物按視與示通鐵石異品論衡鐵石天然尚為鍛鍊者變易故質子華子類異則形異形異則氣異左思賦水物殊品鱗介異族雲蒸並濕淮南子山雲蒸柱礎潤草木無心易百榖草木麗乎土唐太宗賦纔有力以勝蝶本無心而引鶯春來咸喜漢書文帝紀當春和時草木羣生之物皆有以自樂宗懍詩今朝春氣來詩周邦咸喜故聖人𢎞道易聖人作而萬物覩論語人能𢎞道先王法天書古我先王暨乃祖乃父胥及逸勤文子上聖法天酒星主獻酬之義星經酒旗三星在軒轅六角南孔融書天有九星之曜詩獻酬交錯需卦陳飲食之象易雲上于天需君子以飲食宴樂近命羣臣北史魏髙祖紀引羣臣厯宴殷堂欣時樂宴陸雲文萬物欣時詩君子有酒嘉賔式燕以樂盡九春之麗景梁元帝纂要春曰芳春青春陽春九春謝朓侍宴曲麗景則春儀方在震匝三旬之暇日阮籍詩三旬將欲移謝朓詩讌嘉得暇日暢飲桂山北史王昕傳汝南王悦與府僚飲酒坐皆引滿酣暢淮南王招隠士桂樹叢生兮山之幽櫂歌沁水三輔黄圖昆明池中有龍首船常令宫女泛舟池中作櫂歌雜以鼓吹後漢書竇憲傳憲以賤直請奪沁水公主園田明一統志山西澤州沁河在沁水縣東五十里醇以養徳張載賦備味滋和體醇色清諸葛亮書儉以養徳味以平心左傳先王之濟五味和五聲也以平其心成其政也本將導達陽和傅亮讃發揮幽賾導達天人史記秦始皇紀時在中春陽和方起助成長育家語五行佐成上帝而稱五帝左傳為温慈恵和以效天之生殖長育亦朝廷多慶禮記朝廷之美濟濟翔翔南史齋武帝紀論積善多慶軍國餘閒者也干寳晉紀總論籌畫軍國嘉謀屢中司馬相如賦朕以覽聴餘閒無事棄日前月之晦公羊傳提月六鷁退飛提月者何逮是月晦日也細風飄雨梁元帝詩風細雨聲遲繁絃中止蔡邕賦繁絃既撾雅韻乃揚鮑照賦將興中止若往而歸列席半醉劉孝綽詩列位華池側庾信詩酒醺人半醉佳辰易失梁元帝纂要辰曰良辰曰嘉辰史記淮隂侯傳時者難得而易失者也絶興難追梁書王筠傳後重省覽歡興彌深王逸琴思楚歌寒來暑往難逐追良可惋也廣韻惋驚歎今年帶閏白虎通月有閏餘何周天三百六十五度四分度之一嵗十二月日過十二度故三年一閏五年再閏明隂不足陽有餘也節候全晚文心雕龍言節候則披文而見實暑氣猶清陶潛詩暑氣為之無芳草未歇謝靈運詩首夏猶清和芳草亦未歇申布雅意曹植書欲傾海為酒并山為肴伐木雲夢斬梓泗濵然後極雅意盡歡情復敘初筵詩賔之初筵左右秩秩披樂善之邸後漢書東平憲王蒼傳蒼與諸臣朝京師還國帝遣使手詔國中傳曰日者問王處家何等最樂王言為善最樂其言甚大坐忘憂之觀西京雜記梁孝王游于忘憂之館集諸遊士使各為賦東郊跬步書命汝尹兹東郊漢書王莽傳進不跬步南山在目詩秩秩斯干幽幽南山括地志終南山一名南山陶潛詩在目皓已潔足以締夏首之新賞崔駰賦迎夏之首末春之垂江淹詩㸃翰咏新賞補春餘之墜歡王僧孺詩麗景屬春餘清隂澄夏首朕登覽上宫晉書江逌傳登覽不以臺觀遊豫不以苑沼孟子館于上宫注上宫樓也俯臨長陌陸倕石闕銘周望原隰俯臨烟雨虞羲詩朱輪竟長陌暢衆心之怡虞國語衆心成城爾雅怡樂也謝朓詩歡虞宴兄弟懽歸騎之逶迤梁簡文帝詩歸騎息金隍袁宏賦曳羅裙以徘徊為鳳翼之逶迤鼓之以琴瑟詩我有嘉賔鼓瑟鼓琴侑之以筐篚左傳虢公晉侯朝王王饗醴命之宥注宥助也按宥同侑詩承筐是將淨住子筐篚之用非求不至衢樽意洽淮南子聖人之道猶中衢而置樽耶過者斟酌多少不同各得其所宜場藿思苗詩皎皎白駒食我場苗又食我場藿賦我有嘉賔之詩詩我有嘉賔鼓瑟吹笙奏君臣相説之樂孟子召太師曰為我作君臣相説之樂踟蹰西日詩搔首踟蹰左思賦魯陽揮戈而髙麾迴曜靈于太清將轉西日而再中齊既往之精誠吟翫乗風謝莊賦王乃尋繹吟翫説苑魚乗于水烏乗于風草木乗于時陸機漢髙祖功臣頌乘風藉響不知衷情之發於翰墨也説文衷方寸所藴也揚雄書言詞博覽翰墨為事今年通閏月禇翔詩今年有閏餘書以閏月定四時成嵗漢書律歴志朔不得中是為閏月入夏展春輝春秋繁露以夏養春以冬養秋廣韻展舒也紀少瑜詩庭樹發春輝樓下風光晚劉孝綽詩詎匹龍樓下素蕋映華扉王儉詩風光承露照霧色㸃蘭暉駱賔王詩坐惜風光晚城隅宴賞歸周禮城隅之制九雉曹植詩吾與二三子曲宴此城隅陳後主詩禁闥九重中宴賞三春日鼓咽咽醉言歸九歌揚政要書勸之以九歌俾勿壊漢郊祀歌九歌畢奏斐然殊鳴琴竽瑟㑹軒朱陸雲詩式揚好音後漢書蔡邕傳披露得失指陳政要六舞散朝衣漢書禮樂志國子皆樂歌九徳誦六詩習六舞五聲八音之和注師古曰六舞謂帗舞羽舞皇舞旄舞干舞人舞也王儉樂歌八簋陳室六舞充庭謝朓樂府綺席舞衣散北齊享廟樂辭禮申官次命改朝衣天喜時相合春秋繁露天亦有喜怒之氣哀樂之心與人相副老子天地相合以降甘露人和事不違管子為人上者制羣臣百姓通中央之人和莊子與人和者謂之人樂詩帝命不違至于湯齊禮記無聲之樂志氣不違禮中推意厚易嘉㑹足以合禮詩鹿鳴序鹿鳴宴羣臣嘉賔也既飲食之又實幣帛筐篚以將其厚意然後忠臣嘉賔得盡其心矣樂處感心微詩王在在鎬豈樂飲酒淮南子仁心之感恩接而憯怛生别賞陽臺樂前旬暮雨飛宋玉賦旦為朝雲暮為行雨朝朝暮暮陽臺之下沈約朝雲曲陽臺氤氲多異色范雲巫山髙曲朝雲去溟溟暮雨歸巖懸劉孝威詩飛雨入階廊同二相已下羣官樂遊園宴全唐詩注二相謂張説宋璟西京雜記漢宣帝樂遊廟一名樂遊原亦名樂遊苑基地最髙四望寛敞名勝志樂遊原在灞南五里本杜縣之東南一名鴻固原撰日巖廊暇曹昭賦時孟春之吉日兮撰良辰而將行漢書董仲舒傳葢聞虞舜之時遊于巖廊之上垂拱無為而天下平注巖廊謂嚴峻之廊也唐太宗賦今拱已于巖廊王僧達詩歡此乗日暇需雲宴樂初易雲上于天需君子以飲食宴樂左傳昔諸侯朝正于王王宴樂之于是乎賦湛露萬方朝玉帛書誕告萬方張華詩奄有萬方左傳禹會諸侯于塗山執玉帛者萬國庾信詩玉帛咸觀禮千品㑹簪裾國語道天子有千品萬官盧思詩臺苑盛簪裾地入南山近詩秩秩斯干幽幽南山一統志終南山在長安西南五十里一名南山蕭慤詩雲來覺山近城分北斗餘三輔黄圖長安城南為南斗形北為北斗形至今人呼漢京城為斗城楚辭長安直上北斗池塘垂柳宻曹植樂府池塘觀沼可娯謝靈運詩池塘生春草梁元帝樂府巫山巫峽長垂柳復垂楊蕭瑱詩垂柳對髙桐唐太宗雨詩濛柳添絲宻原隰野花疎詩皇皇者華于彼原隰張衡賦山谷原隰泱漭無疆張翰詩原隰殖嘉蔬江總詩野花不識采旅竹本無行梁元帝詩花疎有異香帟幕看逾暗左思賦張帟幕㑹平原注帟平帳也周禮曰田則張幕設帟王融序緹帷宿置帟幕宵懸歌鐘聴自虛左思賦元勲配敬仲之績歌鐘析邦君之賜鮑照詩庭下列歌鐘齊丘子儉于聴可以養虛興闌歸騎轉郎餘令詩興闌相顧起流水送香車梁簡文帝詩歸騎息金隍還奏弼違書書予違汝弼晉書郭璞傳古之令主開納忠讜以弼其違抱朴子匡過弼違者社稷之鯁也集賢書院成送張説上集賢學士賜宴得珍字唐書百官志集賢殿書院學士直學士侍讀學士修撰官掌刋緝經籍凡圖書遺逸賢才隠滯則承㫖以求之謀慮可施於時著述可行於世者考其學術以聞又開元十三年改麗正書院為集賢殿書院五品以上為學士六品以下為直學士宰相一人為學士知院事又張説傳説倡封禪議帝召説與禮官學士置酒集仙殿曰朕今與賢者樂於此當遂為集賢殿乃下制改麗正書院為集賢殿書院而説知院事廣學開書院晉書阮裕傳裕嘗以人不須廣學正應禮讓為先崇儒引席珍舊唐書陽嶠傳景龍末累轉國子司業奏修先聖廟及講堂因建碑前庭以紀崇儒之事晉書庾氷傳廣引時彦詢以政道禮記儒有席上之珍以待聘文心雕龍席珍流而萬世響呉均詩長安城中諸貴臣爭貴儒者席上珍集賢昭衮職史記燕召公世家燕昭王即位卑身厚幣以招賢者詩衮職有闕唯仲山甫補之後漢書楊賜傳五登衮職弭難乂寧邢劭文宻勿樞功逶迤衮職論道命台臣書立太師太傅太保兹惟三公論道經邦燮理隂陽考工記坐而論道謂之三公史記天官書魁下六星兩兩相比者曰三能注能音台禮樂沿今古禮記禮樂不可斯須去身左傳説禮樂而敦詩書詩書義之府也禮樂徳之則也漢書禮樂志禮節民心樂和民聲禮記五帝殊時不相沿樂三王異世不相襲禮闗尹子其來無今其去無古文章革舊新禮記立權度量考文章史記儒林傳文章爾雅訓詞深厚唐書文藝傳唐有天下三百年文章無慮三變易革去故也鼎取新也書舊染汚俗咸與維新漢書武帝紀朕嘉唐虞而樂殷周據舊以鑒新獻酬尊俎列詩獻酬交錯注始主人酌賔為獻賔既酌主人又自飲酌賔為酬晉書禮樂志獻酬納贄崇此禮容陶潛詩引滿更獻酬禮記樽鋪筵席陳樽俎列籩豆梁書諴雅歌禮達幽明敬行俎褚亮明堂樂章尊罍盈列賔主位班陳禮記一獻之禮賔主百拜又賔主象天地也㑹要貞元十二年御史臺奏御史内供奉者入閤日依宣政殿前班位易卑髙以陳貴賤位矣節變雲初夏江逌詩髙風催節變劉禕之詩節變風緒髙顧凱之詩夏雲多竒峯唐太宗詩北闕三春晚南榮九夏初時移氣尚春抱朴子外篇時移俗易物同賈異潛夫論日晏時移議無所定春秋繁露春氣愛秋氣嚴阮籍詩春氣感我心陳暄詩洛陽九逵上羅綺四時春所希光史冊廣韻希望也張敏頭責子羽文事力雖多而見功甚少宜其踡跼翦蹙至老無所希也揚子詩書以光之晉書何劭傳僕雖名位過幸少無可書之事惟與夏侯長容諫授博士可傳史冊耳李康運命論善惡書於史冊毁譽流於千載千載仰兹晨漢書王襃傳千載一㑹論説無疑申鑒得失一朝而榮辱千載何妥詩小臣屬千載時幸預簪纓張正見詩塗山萬國仰鮑照詩兹晨自為美王屋山送道士司馬承禎還天台書底柱析城至于王屋注王屋山名山狀如屋漢書地理志河東郡垣縣禹貢王屋山在東沇水所出一統志山在懐慶府濟源縣西八十里唐書隠逸傳司馬承禎字子微洛川温人事潘師正傳辟穀道引術徧遊名山廬天台不出開元中被召至都詔於王屋山置壇室以居紫府求賢士抱朴子項曼都言到天上先過紫府金牀玉几晃晃昱昱十洲記青丘風山山恒震聲有紫府宫天真仙女遊於此地唐書薛頤傳頤為道士帝為築觀九嵕山號曰紫府拜頤大中大夫往居之後漢書蔡邕傳求賢之道未必一途國語為遊士八十人奉之以車馬衣裘多其資幣使周遊於四方以號召天下之賢士清谿祖逸人謝靈運詩攅念攻别心旦發清谿隂張正見詩千仞清谿險詩仲山甫出祖四牡業業范蔚宗逸民傳論薛方逢萌聘而不肯至嚴光周黨王霸至而不能屈羣方咸遂志士懐仁斯固所謂舉逸人則天下歸心者乎江湖與城闕莊子魚相忘於江湖人相忘於道術史記貨殖傳范蠡乗扁舟浮於江湖詩在城闕兮陸機詩名都一何綺城闕鬱盤桓異跡且殊倫後漢書章帝紀明試以功則政有異跡江淹詩髙步超常倫間有幽棲者謝靈運詩資此永幽棲居然厭俗塵晉書韓康伯傳舅殷皓稱之曰康伯能自標置居然是出羣之器漢書嚴助傳厭承明之廬唐太宗詩對此留餘想超然離俗塵林泉先得性北史韋瓊傳所居之宅枕帶林泉舊唐書隠逸傳崔覲不樂仕進以耕稼為業隠於城固南山夫婦林泉相對嘯咏自娯梁昭明太子七啟得性行樂従好山南任昉詩得性千乗同山林無朝市芝桂欲調神南史禇伯玉傳王僧達曰褚先生従白雲遊舊矣比談討芝桂借訪茘蘿若己窺烟波臨滄洲矣唐書元行沖傳謂狄仁傑曰參术芝桂以防疾疢地道踰稽嶺世説王子敬云従山隂道上行山川自相映發使人應接不暇周禮夏官東南曰揚州其山鎮曰㑹稽史記夏本紀禹㑹諸侯江南計功命曰㑹稽㑹稽者㑹計也太史公自序遊江淮上㑹稽十道山川攷會稽山在紹興府諸暨縣東北一統志山在府城東南一十二里王羲之蘭亭序此地有崇山峻嶺天台接海濵名山記天台山即是定光寺諸佛所降葛仙公山也孫綽遊天台山賦序天台山者葢山嶽之神秀者也涉海則有方丈蓬萊登陸則有四明天台書海濵廣斥洞㝠記東方朔遊鴻濛之澤忽見王母采桑於白海之濵音徽従此間陸機詩音徽日夜離史記髙祖本紀公等皆去我亦従此逝矣謝朓詩行行未千里山川已間之萬古一芳春劉峻論歴萬古而一遇崔知賢詩結伴戲芳春早度蒲闗唐書地理志河中府河西縣有蒲澤闗一名蒲坂闗水經注魏襄王七年秦王來見于蒲坂闗一統志蒲州在山西平陽府西南鐘鼓嚴更曙唐書儀衞志天子出入則撞鍾庭設樂宫道路有鹵簿鼔吹七啟鐘鼓俱振簫管齊鳴班固賦衞以嚴更之署注嚴更督行夜鼓也梁昭明太子詩法鼓辭嚴更山河野望通史記項羽紀關中阻山河四塞文中子登雲中之城望龍門之闗曰壯哉山河之固阮籍詩登髙望九州悠悠分曠野鳴鑾下蒲坂史記司馬相如傳鳴和鑾揚樂頌上咸五下登三班固賦大輅鳴鑾飛斾入秦中王筠詩摐金飛斾汎此安流蕭慤詩約嶺停飛斾史記劉敬傳輕騎一日一夜可至秦中地險關逾壯易地險山川丘陵也劍閣銘窮地之險極路之峻虞義詩長城地勢險庾信銘金行地壯天平鎮尚雄越絶書聖人上知天下知地中知人此之謂天平地平漢書武五子傳天平地安隂陽和調春來津樹合顔延之詩春來無時豫説文津水渡也張説詩津樹入寒烟月落戍樓空鮑照賦星翻漢迴曉月將落梁元帝詩旅泊依村樹江槎擁戍樓庾信詩戍樓鳴夕鼓江總詩去後鳳樓空馬色分朝景恵慕道士詩馬色迷闗吏梁洽賦法朝景而霞駮朱超詩青山麗朝景雞聲逐曉風晉書祖逖傳與劉琨同寝夜聞荒雞鳴蹴琨覺曰此非惡聲也因共起舞所希常道泰易泰通也陸倕詩時逢世道泰蹇足步髙衢非復棄繻同漢書終軍傳初軍従濟南步入闗闗吏予軍繻軍問以此何為吏曰為復傳還當以合符軍曰大丈夫西遊終不復傳還棄繻而去軍為謁者使行郡國建節東出闗闗吏識之曰此使者乃前棄繻生也注張晏曰繻音須符也書帛裂而分之若劵契蘇林曰繻帛邊也舊闗出入皆以傳傳煩因裂帛頭以為符信也途經華岳飭駕去京邑晉書孫楚傳王輿整駕六龍徐征隋書樂章飾龍駕矯鳳旍張衡賦京邑翼翼四方所視蔡邕賦命僕夫其就駕兮吾將往乎京邑鳴鑾指洛川隋書樂章天迴地旋鳴鑾引警曹植賦流盻乎洛川張協賦耀乎洛川之曲循途經太華王融頌逶迤循途極夜無歸書西傾朱圉鳥鼠至于太華班固賦表以太華終南之山迴蹕暫周旋周禮師氏使其屬帥四夷之𨽻各以其兵守王之門且蹕注蹕止行人不得近王宫也禮記周旋中規張協詩謂得終暇日綢繆永周旋翠崿留斜影江淹騷體空山隠嶙兮窮翠崿王僧孺詩翠枝結斜影張正見詩幽桂無斜影深松有勁風懸巖冐夕烟庾肅之山賛懸巖沓翳神明攸居庾闡詩懸巖溜石髓芳谷挺丹芝王融詩髙樹升夕烟四方皆石壁山海經太華之山削成而四方其髙五千仞其廣十里南史徐伯珍傳伯珍移居九巖山館東石壁夜忽有赤光洞然江淹詩極眺清波深緬映石壁素五位配金天易五位相得而各有合漢書律歴志少昊曰青青者黄帝之子青陽也是其子孫名摯立土生金故為金徳天下號曰金天氏雲笈七籖少昊為白帝治西岳彷髴看髙掌司馬相如賦眇眇忽忽若神仙之彷彿述征記華山對河東之首陽山黄河流兩山之間古語云此本一山河水過之而曲行河神巨靈以手擘開其上以足踏離其下中分為兩以通河流今覩手迹于華山上若掌之形其足迹在首陽山亦存焉張衡賦髙掌逺蹠以流河曲依稀聴子先謝靈運詩依稀採菱歌列仙傳呼子先者漢中闗下卜師夀百餘嵗臨去呼酒家嫗令急裝便有仙人持二茅狗來至子先將一與酒嫗因各騎之乃龍也上華隂山常于山大呼言子先酒母在此終當銘嵗月水經注秦始皇觀禮于魯登嶧山之上命李斯以大篆勒銘山顛書嵗月日時無易陶潛詩服勤盡嵗月常恐功愈微従此記靈仙孫綽賦靈仙之所窟宅江淹詩南中多竒石赤縣饒靈仙喜雪日觀卜先征尸子泰山上有三峯東曰日觀雞鳴時見日出顔延之詩日觀臨東溟左傳先王卜征五年而嵗習其祥張衡賦卜征考祥終然允淑唐書禮樂志開元十二年四方治定嵗屢豐稔羣臣多言封禪中書令張説尺固請乃下制以十三年有事泰山時巡順物情書六年五服一朝又六年王乃時巡考制度於四岳易安土敦乎仁故能愛疏安土敦仁者萬物之情也物順其情則仁功瞻矣風行未備禮易風行天上小畜君子以懿文徳禮記敦樂而無憂備禮而不偏者其唯大聖乎班固典引燔瘞縣沈肅祗羣神之禮備雲宻遽飄霙易宻雲不雨自我西郊摯虞賦雲霏霏而四霙謝恵連雪賦憑雲升降従風飄零又霙淅瀝而先集廣韻霙雨雪雜也委樹寒花發雪賦徘徊委積何遜雪詩拂樹曉疑春裴子野雪詩落樹似飛花張正見詩寒花映日鮮縈空落絮輕呉均雪詩榮空如霧轉蕭子顯詩落絮亂従風朝如玉已㑹雪賦既因方而成珪亦遇圓而成璧任昉雪詩散葩似浮玉庭似月猶明何遜詩凝階夜似月劉璠雪賦似北荒之明月既覩膚先合公羊傳觸石而出膚寸而合不崇朝而徧雨乎天下者唯泰山爾潘尼賦氣觸石而結蒸兮雲膚合而仰浮還欣尺有盈左傳平地尺為大雪雪賦盈尺則呈瑞于豐年徐陵詩三農喜盈尺六出儛崇花登封何以報因此謝功成漢書武帝紀元封元年東巡海上還登封泰山應劭注王者功成治定告成於天刻石紀號有金策石函金泥玉檢之封白虎通功成封禪以告太平也必於太山何萬物所交代之處也必於其上何因髙告髙順其類也下禪梁父之山基廣厚也刻石紀號者著已之功跡以自倣效也天以髙為尊地以厚為徳故増泰山之髙以倣天附梁父之基以報地明天地之所命功成事遂有益於天地若髙者加髙厚者加厚矣幸鳳泉湯舊唐書明皇帝紀開元三年冬十月甲子幸郿縣之鳳泉湯一統志温泉在太白山下舊名鳳泉湯可治百病世傳清則愈疾濁則無驗西狩觀周俗書八月西巡狩至于西岳史記蘇秦傳周人之俗治産業力工商逐什一以為務南山歴漢宫三輔黄圖武帝建元三年開上林苑東南至藍田宜春御宿昆吾旁南山而西至長楊五柞北繞黄山周袤三百里離宫七十所王維詩黄山舊繞漢宫斜薦鮮知路近史記叔孫通傳孝恵帝曽春出遊離宫通曰古者有春嘗果方别今櫻桃熟可獻願陛下出因取櫻桃獻宗廟庾信書異邯鄲那應知路省斂覺年豐孟子秋省斂而助不給崔駰西巡頌惟秋穀既登上將省斂詩綏萬邦屢豐年左傳奉盛以告曰潔粢豐盛謂其三時不害而民和年豐也應璩書周征殷而年豐隂谷含神爨顔延之詩陽陸團精氣隂谷曳寒烟木華海賦陽氷不冶隂火潛然熺炭重燔吹炯九泉湯泉養聖功抱朴子水主純冷而有温谷之湯泉易䝉以養正聖功也晉樂歌肅肅清廟巍巍聖功益齡仙井合抱朴子臨沅縣有廖氏家世世夀考不知何故疑其井水殊赤乃試掘井得古人埋丹砂數十斛此丹汁入井是以飲其水而得夀張衡賦觀温泉浴神井張正見詩雲歸仙井暗霧解石橋通愈疾醴源通東觀漢記光武中元元年醴泉出於京師郡國飲醴泉者痼疾皆愈王襃温泉碑地伏流黄神泉愈疾禮記天不愛其道地不愛其寳人不愛其情是以地出醴泉爾雅水源曰泉庾信温湯碑豈若醴泉消疾聞乎建武之朝不重鳴岐鳳詩鳳皇鳴矣于彼髙岡何晏賦故能翔岐陽之鳴鳳誰矜陳寳雄史記封禪書文公獲若石云于陳蒼北阪城祀之其神或嵗不至或嵗數來來也常以夜光輝若流星従東南來集於祠鳴則若雄雞其聲殷殷云野雞夜鴝以一牢祠命曰陳寳晉太康地志秦文公時陳倉人獵得獸如彘不知名牽以獻之逢二童子童子曰此名為媦媦亦語曰二童名陳寳得雄者王得雌者霸張衡賦岐梁汧雍陳寳鳴雞在焉願將無限澤梁簡文帝詩連山去無限漢書劉向傳聖人即天地以耀物常無私於上均恩澤於下霑沐衆心同謝朓詩霑沐仰清徽周語衆心成城書同心同徳南出雀鼠谷答張説紀事云帝登封泰山南出雀鼠谷張説獻詩帝答之仍命羣臣應制一統志雀鼠谷在山西汾州介休縣西南二十里唐明皇開元中北巡并州常經此雷出應乾象易雷出地奮豫人乾為天姚信昕天論地形立于下天象運於上風行順國人易風行天上小畜君子以懿文徳晉書樂志化若風行澤猶雨散詩有覺徳行四國順之左傳國人望君如望慈父母焉川途猶在晉謝靈運詩豈伊川途念宿心愧相別一統志汾州府春秋時屬晉車馬漸歸秦詩有車粼粼有馬白顛陶潛詩結廬在人境而無車馬喧潘岳西征賦自京徂秦背陜關山險司馬相如賦蕩蕩乎八川分流相背而異態一統志陜州在河南府西三百里周為虢國地周召分治東西以陜為界即此木蘭詩關山度若飛徐陵詩關山三五月客子憶秦川易地險山川丘陵也北史于宣敏傳山川設險非親弗居横汾鼓吹頻漢武帝秋風辭汎樓船兮濟汾河横中流兮揚素波按漢書武帝紀元鼎四年冬行幸雍祠五畤自夏陽東幸汾隂注汾隂屬河東唐書儀衞志人君舉動必以扇道路有鹵簿鼓吹陸機賦原鼔吹之伊始葢禀命于黄軒草依陽谷變張協詩丹氣臨陽谷梁簡文帝詩渚蒲變新節花待北巖春江總詩野花寧待晦梁簡文帝賦待餘春于北閤何遜詩巖樹落髙花聞有鵷鸞客隋書音樂志懐黄綰白鵷鷺成行傅咸賦鸞翔鳳集羽儀上京張協詩咄此蟬冕客清詞雅調新陸機文賦闕太羮之遺味同朱絃之清汜雖一唱而三歎固既雅而不艷庾信詩泉湧富文詞陶潛詩詼諧無俗調求音思欲報陸機文賦叩寂寞而求音詩報之以瓊瑤心迹竟難陳謝幼度詩顧已難自許心迹猶未屏司馬相如文請為大夫粗陳其畧賜崔日知往潞州唐書崔日知傳日知字子駿終潞州長史一統志禹貢冀州之域商時為黎國後為潞子國戰國初為韓之别都後屬趙秦置上黨郡後周始置潞州隋初郡廢唐復為潞州潞國開新府晉書職官志魏黄權以車騎將軍開府儀同三司開府之名起於此北史魏武帝紀詔諸征鎮將軍王公杖節邊逺者聴開府辟召壺關寵舊林漢書地理志上黨郡有壺口關义縣壺關黎侯國也今黎亭是一統志壺關山在潞州城東南一十三里山形似壺漢於此置關陸機詩離烏悲舊林妙旌循吏徳桓温表旌徳理賢化道之所先庾信文旌徳景鐘勒勲彛器史記循吏傳奉職循理可以為治持悦庶氓心易損上益下民悦無疆禮記發號出令而民悦謂之和漢書循吏傳庶民所以無歎息愁恨之心者政平訟理也禮樂中朝貴禮記聖人作樂以應天制禮以配地禮樂明備天地官矣江總詩海内平生親中朝流寓士神明列郡欽左傳民奉其君愛之如父母敬之如神明徐陵文列郡無犬吠之驚揚風非贈扇晉書袁宏傳出為東陽郡謝安取一扇授之曰聊以贈行宏答曰輒當奉揚仁風慰彼黎庶易俗是張琴禮記移風易俗天下皆寧梁書武帝紀易俗陶人載和邦國韓詩外傳治國者若張琴然漢書董仲舒傳琴瑟不調者必解而更張之乃可鼓也為政而不行甚者必變而更化之乃可理也藩鎮謳謠滿潘岳賦藩岳作鎮輔我京室李尤賦藩鎮造而惕息徐陵碑物變謳謠風移笙管行宫雨露深左思賦烏聞梁岷有行宫之基歟禮記雨露既濡詩零露湑兮箋露者天所以潤萬物喻王者恩澤不為逺國不及也㑹書丞相策先賜潁川金漢書宋均傳以御史為丞相拜於前殿延登受策又循吏傳二千石有治理效輒以璽書勉勵増秩賜金又黄霸傳為潁川太守治為天下第一天子下詔稱揚賜爵闗内侯黄金百斤五鳳三年代丙吉為丞相為趙法師别造精院過院賦詩并序秋九月聴政觀風張衡疏聴政餘日觀省篇章禮記命太師陳詩以觀民風存乎遊息禮記息焉游焉張衡賦華葢於是乎臨映大帝於是乎遊息退朝之後歴西上陽入清虛院則法師所居之地也唐書地理志上陽宫在東都禁苑之東東接皇城之西南隅上元中置兩京記上陽宫西有西上陽宫兩宫夾谷水架虹橋以通往來法師得𤣥元之法唐書髙宗紀乾封二年如亳州祠老子追號太上𤣥元皇帝養浩然之氣孟子我善養吾浩然之氣故法此仙家特建真宇紫房對聳十洲記元洲有五芝服此得長生上多仙家沈約詩虛館清隂滿神宇曖微微仙傳拾遺木公居于雲房以紫雲為葢青雲為城鮑照詩紫房綵女弄明璫緑竹羅生宋玉賦芳草羅生既親重其人每經過其地以怡神洗雪舞賦娯神遺老永年之術易聖人以此洗心退蔵于宻魏書釋老志道家之教蠲去邪累澡雪心神積行樹功白日昇天嵇康養生論澡雪五臓疏徹開明進徳修業易君子進徳修業欲及時也張華詩進徳修業輝光日新何必齋心累月莊子顔囘曰敢問心齋仲尼曰唯道集虛虛者心齋也逺在順風莊子黄帝聞廣成子在空同之上往見之順下風而進再拜稽首而問因而賦詩用適其意云爾宗師心物外漢書藝文志儒家者流宗師仲尼以重其言後漢書朱浮傳博士之官為天下宗師齊竟陵王子良詩托性本魚鳥棲情閑物外梁元帝書縦賞山中游心物外為道運虛舟本際經運道一切為極尊而常處三清出諸天上故稱天尊温子昇表坐以運舟遂有利涉之用莊子方舟而濟于河有虛船來觸雖有褊心之人不怒晉書謝安傳賛太保沈浮曠若虛舟庾藴詩仰想虚舟説俯歎世上賔不戀巖泉賞梁蕭鈞詩巖泉咽不流謝朓詩安得凌風翰聊恣山泉賞來従宫禁遊宋書殷景仁傳宻邇宫禁詩來遊來歌温子昇文鳴玉鸞以來遊探𤣥知㡬嵗顔延之詩探道好淵𤣥觀書鄙章句鶡冠子踰年累嵗淮南王書歴嵗經年習靜更宜秋易林竒適無偶習靜獨處何遜詩習靜閟衣巾讀書煩几案後漢書郡國志南陽郡有宜秋聚洛陽故宫記洛陽有宜秋門煙樹辨朝色江淹詩緑樹鑠烟光何遜詩山烟涵樹色色江水映霞暉梁簡文帝詩奩鏡迷朝風湍聞夜流沈佺期詩伏湍喣潛石瀑水生輪風楚辭長瀨湍流泝江潭兮廣韻湍急瀨也薛道衡詩葉舟旦旦浮驚波夜夜流坐朝繁聴覽陸倕新刻漏銘序坐朝宴罷毎旦晨興盧思道文詰旦坐朝諮請填湊北史魏孝文帝紀聴覽政事従善如流任昉文聴覽之暇三餘靡失尋勝在清幽庾信詩蓬萊在海底何處可追尋孫逖詩地勝林泉好謝朓詩江垂得清賞山際果幽尋欲廣無為化説苑仁昭而義立徳博而化廣禮記王中心無為也以守至正論語無為而治者其舜也與老子我無為而民自化葛仙公詩天道常無為因兹庶可求端午三殿宴羣臣探得神字并序徳雍録三殿者麟殿也一殿而有三面故名律中㽔賔禮記仲夏之月律中㽔賔疏髙誘曰是月隂氣萎㽔在下象主人陽氣在上象賔客獻酬之象著詩獻酬交錯火在盛徳書申命羲叔宅南交日永星火以正仲夏禮記盛徳在火文明之義燀易見龍在田天下文明廣韻燀火起貌故以式燕陳詩詩我有㫖酒嘉賔式燕以敖禮記命太史陳詩以觀民風上和下暢者也漢書公孫𢎞傳人主和徳於上百姓和合於下則心和蔡邕状淑暢洽於羣生朕宵衣旰食鄒陽書始孝文皇帝寒心銷志未明求衣左傳楚君大夫其旰食乎輯聲教於萬方書聲教訖于四海又嗟爾萬方有衆卜戰行師説苑城濮之戰文公謂咎犯曰吾卜戰而龜熸吾欲無戰何如易利用行師征邑國也總兵鈐於四海廣韻兵鈐以閉房神府以備非常書奄有四海為天下君勤貪日給書爾惟克勤天下莫與汝爭能漢書髙帝紀論雖日不暇給規模𢎞逺矣憂忘心勞孟子聖人之憂民如此左傳君子勞心小人勞力聞蟬聲而悟物變禮記仲夏之月蟬始鳴陳子昂詩禪居感物變見槿花而驚候改禮記仲夏之月木槿榮顔延之詩嵗候初過半所賴濟濟朝廷禮記朝廷之美濟濟翔翔視成鵷鷺隋書音樂志懐黄綰白鵷鷺成行桓桓邊塞詩桓桓于征史記三王世家大司馬去病上疏曰陛下使臣去病待罪行間宜専邊塞之思慮責辦熊羆書則亦有熊羆之士不二心之臣保乂王家喜麥秋之有登禮記孟夏之月麥秋至漢書公孫𢎞傳隂陽和五穀登玩梅夏之無事薛道衡梅夏應教詩細雨應黄梅禮記天子無事與諸侯相見曰朝時雨近霽孟子有如時雨化之者宋玉賦遇天雨之新霽兮觀百谷之俱集西郊靃靡而一色易宻雲不雨自我西郊劉安招隠士青莎雜樹兮薠草靃靡庾信賦楊柳共春旗一色炎雲作峯江淹賦炎雲峯起南山嵯峨而異勢詩南山有臺班彪賦望山谷之嵯峨曹植詩浮沈各異勢正當召儒雅書序旁求儒雅以闡大猷宴髙明禮記仲夏之月可以居髙明廣殿肅而清氣生左思賦造文昌之廣殿屈原九歌乗清氣兮御隂陽列樹深而長風至國語列樹以表道宋玉賦長風至而波起兮若麗山之孤畝㕑人嘗散熱之饌禮記仲夏之月天子乃以彘嘗麥注麥之新氣尤盛以彘食之散其熱也酒正行逃暑之飲周禮天官酒正掌酒之政令魏文帝典論光禄大夫劉松北鎮袁紹軍與紹子弟嘗以三伏之際晝夜酣飲以避一時之暑故河朔有避暑飲庖捐惡鳥史記樂書注漢令五月五日為梟羮賜百官以惡鳥故食之俎獻肥龜風俗通節日又煮肥龜令極熟去骨加鹽鼔新筒裹楝續齊諧記屈原五月五日投汨羅每至此日竹筒貯米投水祭之漢建武中長沙歐回忽見一人稱三閭大夫曰常所遺苦蛟龍所竊可以楝樹葉塞其上以五采絲縳之回依其言香蘆角黍王筠詩結蘆同楚客風土記午日以菰葉裹黏米煮熟謂之角􅎟恭儉之儀有序左傳享以訓共儉按恭古作共易畧例尊卑有常序慈恵之意溥洽左傳宴以示慈恵漢書匈奴傳元康神爵之間鴻恩溥洽諷味黄老文心雕龍揚雄諷味亦言體同詩雅史記申不害傳學本黄老而主刑名致息心於真妙温子昇碑息心是歸淨行攸處抑揚游夏南史梁武帝紀論抑揚孔墨曹植書昔尼父制春秋游夏之徒不能措一辭滌煩想於詩書孫綽賦疏煩想於心胷禮記冬夏教以詩書超然𤣥覽老子滌除𤣥覽能無疵自足為樂何止柏枕桃門雲笈七籖神枕方用五月五日取山林柏為枕空中以柏心赤者為葢用藥三十二物續漢書禮儀志五月五日朱索五色桃印為門户飾以止惡氣驗方術於經記史記秦始皇紀悉召文學方術士甚衆欲以興太平傅咸表上違經記明文下壊景侯之解綵花命縷酉陽雜俎北朝五月進五時圖五時花施之帳上是日又進長命縷風土記端千造百索繫臂一名長命縷一名續命縷觀問遺於風俗風土記午日織組雜物以相贈遺班固賦東都主人喟然而嘆曰痛乎風俗之移人也感婆娑於孝女後漢書孝女曹娥傳曹娥者㑹稽上虞人父旴為巫祝漢安二年五月五日於縣江泝濤迎婆娑神溺死娥年十四乃沿江號哭遂投江而死憫枯槁之忠臣而已哉屈原漁父屈原既放遊於江潭顔色憔悴形容枯槁歎節氣之循環陸賈新論温之以節氣謝靈運詩四時循環轉寒暑自相承美君臣之相樂孟子為我作君臣相説之樂凡百在㑹咸可賦詩詩凡百君子敬而聴之王融序今日嘉㑹咸可賦詩五言紀其日端鍾嶸詩品逮漢李陵始著五言之目管輅别傳六甲為時日之端七韻成其火數周禮考工記鳥旟七斿以象鶉火注鶉火朱鳥之宿其屬有七星豈獨漢武之殿藝文類聚漢孝武帝元封三年作栢梁臺詔羣臣有能為七言詩乃得上坐盛朝士之連章周禮秋官朝士掌建邦外朝之灋論衡句有數以連章章有體以成篇魏文之臺寰宇記燕友臺在南皮魏文帝為五官中郎將時築壯辭人之並作云爾宋書謝靈運傳論自漢至魏辭人才子文體三變五月符天數庾信詩五月炎蒸氣易天數五五音調夏鈞吕氏春秋黄帝命伶倫與榮將鑄十二鐘以和五音漢書鄒陽傳注陶家名轉者為鈞葢取周回調鈞耳夏書五子之歌關石和鈞舊來傳五日提要錄五月五日午時為天中節無事不稱神魏収詩辟兵書鬼字神印題靈文穴枕通靈氣神仙傳泰山父者時漢武帝東巡見父鋤於道頭上白光髙數尺呼問之對曰有道士教臣作神枕枕有三十二竅二十四竅應二十四氣八竅應八風臣行之轉少齒生天隠子神仙亦人也在於修我靈氣勿為世俗所淪汙長絲續命人王筠詩長絲表良節金縷應嘉辰風俗通續命縷俗説以益人命四時花競巧庾信賦鳥多閒暇花隨四時沈約碑奕思之微秋儲無以競巧九子糭爭新晉無名氏折楊柳歌折楊柳作得九子糭思想勞歡手方殿臨華節何晏賦方軒九户初學記春節曰華節圓宫宴雅臣班固賦其宫室也據坤靈之正位倣太紫之圜方陳後主詩置酒來英雅進對一言重後漢書馬援傳閑於進對書自一話一言我則末惟成徳之彦以乂我受民法言言重則有法遒文六義陳晉書文苑傳賛子安太冲遒文綺爛劉峻論遒文麗藻方駕曹王詩序詩有六義焉一曰風二曰賦三曰比四曰興五曰雅六曰頌股肱良足詠書元首明哉股肱良哉風化可還淳詩序七月陳王業也周公陳后稷先公風化之所由致王業之艱難也唐書禮樂志調露二年幸洛陽城南樓宴羣臣太常奏六合還淳之舞端午端午臨中夏書日永星火以正仲夏時清日復長庾闡賦朝霞時清禮記月令仲夏之月日長至晉書天文志夏至日日行地上三百一十九度少弱故日長鹽梅已佐鼎書若作和羮爾惟鹽梅庾信啇調曲如和鼎實有寄于鹽梅麴糵且傳觴書若作酒醴爾惟麴糵禮記麴糵必時張衡賦儇才齊敏受爵傳觴事古人留迹魏文帝詩追念往古事陶潛詩聖賢留餘迹事事在中都年深縷積長孔徳紹詩嵗積松方偃年深椿欲秋風俗通五月五日以五色絲繫臂令人無病謂之長命縷當軒知槿茂王績詩日照當軒影禮記仲夏之月木槿榮成公綏木槿賦華甚鮮茂榮于仲夏向水覺蘆香庾信詩路塵猶向水大戴禮葦未秀為蘆王筠詩午日結蘆聞楚客億兆同歸夀劉琨表億兆攸歸庾信詩有慶兆民同論年天子萬薛道衡碑納蒸民於夀域羣公共保昌詩羣公先正辛徳源詩置酒宴羣公忠貞如不替書世篤忠貞南史王曇首傳王曇首之才器王僧綽之忠貞其世禄不替豈徒然哉貽厥後昆芳詩詒厥孫謀以燕翼予梁簡文帝文謹求散逸貽厥于後書垂裕後昆隋煬帝詩傳芳裕後昆春中興慶宫酺宴并序令漢書文帝紀十六年九月天下大酺廣韻酺大飲酒作樂夫抱器懐才含仁蓄徳魏書儒林傳鴻生碩儒之輩抱器晦已黎逢賦欲使懐才抱器自此鷹揚鹽鐵論含仁保徳易君子多識前言徃行以畜其徳可以坐而論道者考工記坐而論道謂之三公我於是乎闢重門以納之書闢四門易重門擊柝書工以納言作扞四方折衝萬里詩經營四方晏子春秋孔子曰不出樽俎之間而折衝千里之外晏子之謂也可運籌帷幄者漢書髙帝紀上曰夫運籌帷幄之中决勝千里之外吾不如子房我於是乎懸重禄以待之禮記忠信重禄西京雜記平津侯開東閣以招天下之士所得俸禄以奉待之是故外無金革之虞禮記袵金革漢官解詁典執金革以禦非常書四方無虞朝有搢紳之盛晉書輿服志所謂搢紳之士者搢笏而垂紳帶也所以巖廊多暇垂拱無為漢書董仲舒傳葢聞虞舜之時游於巖廊之上垂拱無為而天下太平注巖廊殿下小屋也不言而海外知歸禮記不言而信詩海外有截張衡賦天子有道守在海外禮記柔逺人則四方歸之不教而寰中自肅孝經聖人之教不肅而成其政不嚴而治莊子立不教坐不議李百藥詩聲教盡寰中元亨之道其在兹乎易大有元亨又其徳剛健而文明應乎天而時行是以元亨詩日監在兹况乎天地交而萬物通易泰小往大來吉亨則是天地交而萬物通也隂陽和而四時序白虎通隂陽和萬物序易與四時合其序所寳者粟莊子正得秋而萬寳成詩稼穡惟寳漢書鼂錯傳欲民務農在於貴粟所貴者賢書所寳惟賢則邇人安禮記賤貨而貴徳故以宵旰為懐唐書劉蕡傳終任賢之效無宵旰之憂黎元在念漢書郊祀志大路所歴黎元不知書念兹在兹盡力溝洫不知宫室之已卑論語卑宫室而盡力乎溝洫庾信五聲調曲溝洫劬勞多又居者非求隘卑宫豈難尚致敬鬼神不知飲食之斯薄論語菲飲食而致孝乎鬼神往以仲冬建子南至初陽禮記仲冬之月律中黄鐘玉燭寳典十一月建子冬至日南極影極長左傳僖公五年日南至白虎通冬至陽始起爰詔司存舊唐書宇文融傳凡爾司存勉以遵守式陳郊祀漢書郊祀歌嘉籩列陳孝經周公郊后稷以配天通考開元十一年十一月親享圜丘挹彛夏之誠請陳書陸子隆傳綏集彛夏甚得民和答人神之厚睠書神人以和班固賦謀人神以動作庾信圓丘歌幽顯對揚人神咫尺梁簡文帝南郊頌序封天答睠禮地徵靈禋歸太乙史記樂書嘗得神馬渥洼水中復次以為太乙之歌注太乙北極大星也漢書禮樂志武帝定郊祀之禮祀太乙于甘泉就乾位也又郊祀歌太乙况天馬下禮備上𤣥揚雄甘泉賦惟漢十世將郊上𤣥南史梁武帝紀仰迫上𤣥之眷俯惟億兆之心足以申昭報之情晉書樂志昭告神祗饗報功徳禮記郊之祭迎長日之至也大報天而主日也足以極嚴禋之道蘇味道詩孝享極嚴禋書禋于六宗周禮以禋祀祀昊天上帝庾信圓丘歌重陽禋祀大報天然心融萬類歸雷雨之先春中説百物生焉萬類形焉易天地解而雷雨作雷雨作而百果草木皆甲拆慶洽百僚象雲天而髙宴書百僚師師詩百僚是試易雲上于天需君子以飲食宴樂嵗二月書嵗二月東巡狩地三秦史記淮隂侯傳三秦可傳檄而定也漢書髙祖紀拜信為大將軍因陳三秦易并之計注章邯為雍王司馬欣為塞王董翳為翟王分王秦地故曰三秦水泛泛而龍池滿雍錄明皇為諸王時故宅宅有井井溢成池中宗時數有雲龍之祥即龍池也開元二年改為興慶宫日遲遲而鳳樓曙詩春日遲遲舊唐書明皇紀開元九年九月御丹鳳樓宴突厥首領青門左右軒庭映梅柳之春三輔黄圖長安城東出南頭第一門曰霸城門民見門色青名曰青城門或曰青門南史齊髙帝紀五色來儀于軒庭陶潛詩梅柳夾門植紫陌東西帟幕動烟霞之色謝莊詩紫陌協笙鏞左思賦張帟幕㑹平原注帟平帳也周禮曰田則張幕設帟王融序緹帷宿置帟幕宵懸注在旁曰帷在上曰幕帟在幕若幄中坐上承塵也皆以繒為之劉孝綽詩壺人告漏晚烟霞起將夕撞鐘伐鼓漢栢梁詩撞鐘伐鼓聲中詩雲起雪飛張衡賦度曲未終雲起雪飛歌一聲而酒一杯論語聞絃歌之聲晉書嵇康傳濁酒一杯彈琴一曲江總詩濁酒傾一杯舞一曲而人一醉圖畫見聞錄將軍裴旻詣呉道子請於天官寺畫神鬼數壁道子答曰將軍為吾纒結舞劍一曲詩既醉以酒詩以言志書詩言志歌永言思吟湛露之篇詩湛湛露斯匪陽不晞厭厭夜飲不醉無歸樂以忘憂論語發憤忘食樂以忘愛慙運臨汾之筆漢武故事帝行幸河東祠后土顧視帝京忻然中流與羣臣飲宴帝歡甚乃自作秋風辭曰汎樓船兮濟汾河横中流兮揚素波九達長安道爾雅一達謂之道路二達謂之岐旁三達謂之劇旁四達謂之衢五達謂之康六達謂之莊七達謂之劇驂八達謂之崇期九達謂之逵班固賦漢之西都實曰長安梁元帝賦洛陽小苑之西長安大道之東三陽别館春易拔茅連茹注三陽同志書洪範三曰木疏正月為春木位也三陽已生故三為木數唐書武后紀久視元年於神都作三陽宫㑹要聖歴三年造三陽宫于嵩陽縣後漢書郭后紀論恩加别館寵増黨戚晉書石崇傳崇在金谷别館登凉臺臨清流還將聴朝暇大戴禮成王中立而聴朝舊唐書職官志殿中監少監為之貳凡聴朝則率其屬以列于左右申鑒月正聴朝國家之大事也回作豫遊晨孟子一遊一豫為諸侯度王冋詩豫遊窮嶺厯藉此方春至不戰要荒服孫武子不戰而屈人之兵書五百里要服傳要來以文教又五百里荒服傳言荒又簡畧疏服名荒者政教荒忽因其故俗而教之無刑禮樂新書刑期于無刑民協于中禮記仲春之月百官靜事無刑大戴禮無市而民不乏無刑而民不違謝朓雩祭迎神歌清明暢禮樂新合酺覃土宇詩以開百室箋又有祭酺合醵之歡漢書文帝紀賜民爵一級女子百户牛酒酺五日注酺之為言布也王徳布于天下而合聚飲食為酺詩爾土宇昄章亦孔之厚矣魏書爾朱榮傳廣錫山河大開土宇歡宴接羣臣晉書王羲之傳欲與親知時共歡宴南史何戢傳齊髙帝與戢來往數申歡宴江總詩柏梁奉歡宴曹植文降接儔列周禮太宰以八柄詔王御羣臣玉斚飛千日梁簡文帝文玉斚瑤尊劉峻論霑玉斚之餘瀝博物志中山酒一醉千日庾信燕歌行蒲桃一杯千日醉瓊筵薦八珍舊唐書文宗二子傳論對食瓊筵謝朓詩既通金閨籍復酌瓊筵醴庾信歌筵終三薦周禮冢宰膳夫凡王之饋食用六穀膳用六牲飲用六清羞用百二十品珍用八物注珍謂淳熬淳母炮豚炮牂𢷬珍漬熬肝膋也梁武帝詩雕案出八珍蕭讓之詩賔筵盛八珍舞衣雲曳影隋煬帝詩浮香飄舞衣王勃乾元殿頌綵絢祥雲夾朱旗而曳影梁簡文帝詩風旗爭曳影歌扇月開輪張正見詩歌扇掩團紗庾信賦月入歌扇花承節鼓劉希夷詩池月憐歌扇山雲愛舞衣江總詩新月半輪空伐鼓魚龍雜詩伐鼓淵淵陸機詩伐鼔五嶺表漢書西域傳賛作曼衍魚龍角觝之戲以觀視之注魚龍者為含利獸先戲于庭及畢乃入殿前激水化成比目魚跳躍潄水作霧障日化成黄龍八丈遨戲于庭炫燿日光撞鐘角觝陳禮記善待問者如撞鐘左傳髙臺深池撞鐘舞女史記李斯傳二世作觳牴優俳之觀張衡賦程角觝之妙戲曲終酣興晚家語孔子厄陳蔡子路援戚而舞三終孔子和之曲三終周書張孫澄傳澄雖不飲酒而好觀人酣興庾信詩將軍髙宴晚須有醉歸人詩鼔咽咽醉言歸張衡賦客賦醉言歸江淹雜體歸人望烟火千秋節宴并序令節肇開明皇實錄開元十七年百官上表請以八月五日為千秋節情兼感慶晉書宣帝紀見父老故舊讌飲累日悵然有感徐陵文我皇誕聖膺此家慶率題八韻以示羣臣蘭殿千秋節漢武内事景帝坐崇芳閣上有丹霞起赤龍盤棟間使王夫人居之改為猗蘭殿遂夢日生武帝唐太宗詩望古茅茨約瞻今蘭殿廣漢靈帝歌千秋萬嵗喜難踰稱名萬夀觴易其稱名也小其取類也大魏書崔光伯傳臣吏之節執笏稱名詩天子萬夀張説詩玉醴還分萬夀觴風傳率土慶晉書吕光載記行人風傳詩率土之濵莫非王臣魏書爾朱榮傳道格普天仁沾率土書萬邦惟慶日表繼天祥禮斗威儀政理太平則時日五色張華賦費表祥乎金徳漢五行志虙羲氏繼天而王穀梁傳繼天者君也玉宇開花萼拾遺記翟乾祐於江岸翫月或問此中何有翟笑曰可隨我觀之瓊樓玉宇爛然唐書三宗諸子傳初明皇即位於宫西南置花萼相輝之樓宫縣動㑹昌周禮春官小胥正樂縣之位王宫縣諸侯軒縣大夫判縣士特縣辨其聲注樂縣謂鐘磬之屬縣于筍簴者宫縣四面皆縣如宫有牆也六典宫縣之舞八佾文王操翼翼翔翔彼鳯皇兮銜書來遊以㑹昌兮鮑照詩美哉物㑹昌衣冠白鷺下後漢書鄭均傳均拜議郎帝賜以衣冠隋書音樂志懐黄綰白鵷鷺成行枚乗七發洪淋淋焉若白鷺之下翔帟幕翠雲長左思賦張帟幕㑹平原注帟平帳也周禮曰田則張幕設帟王融序緹帷宿置帟幕宵懸陸機百年歌軒冕婀娜翠雲中陸雲詩翠雲崇靄庾信登歌蒼靈散翠雲長獻遺成新俗史記武帝紀天子親如五利之第自太主將相以下皆置酒其家獻遺之又孟嘗君傳與客語問親戚居處客去孟嘗君已使使存問獻遺其親戚禮記教順成俗書舊染汚俗咸與維新朝儀入舊章周禮夏官司士正朝儀之位漢書叔孫通起朝儀詩率由舊章張衡賦建象魏之兩觀旌六典之舊章月銜花綬鏡唐實録千秋節賜四品以上金鏡珠嚢縑綵拾遺記周靈王時異方貢石鏡色白如月謂之月鏡徐陵詩信來贈寳鏡亭亭似團月露綴綵絲嚢唐㑹要八月五日士庶以結絲承露嚢更相遺問續齊諧記𢎞農鄧紹嘗以八月旦入華山採藥見一童子執五綵嚢承栢葉上露紹問用此何為答曰赤松先生取以明目處處祠田祖唐實録開元年禮部奏請秋社㑹並就千秋節謝朓詩處處春雲生詩以御田祖以祈甘雨周禮凡國祈年于田祖龡豳雅擊土鼔以樂田畯北史魏本紀始均仕堯時逐女魃於弱水北人賴其勲舜命為田祖年年宴杖鄉劉緩詩年年情不窮禮記六十杖於鄉又射鄉之禮所以仁鄉黨也疏射謂鄉射鄉謂鄉飲酒也徐陵書介已知命賔又杖鄉深思一徳事史記好學深思心知其意書眷求一徳俾作神主惟尹躬暨湯咸有一徳管子尚精一徳以事其君小獲萬人康曹植七啟屢獲嘉祥左傳天子曰兆民諸侯曰萬民書永康兆民左丞相張説右丞相宋璟太子少傅源乾曜同日上官命宴都堂賜詩一首唐書宋璟傳開元十七年璟為尚書右丞相張説為左丞相源乾曜為太子少傳同日拜有詔太官設饌太常奏樂㑹百官尚書省東堂帝賦三傑詩自寫以賜赤帝收三傑史記髙祖紀髙祖被酒夜徑澤中大蛇當徑髙祖乃前拔劒擊斬蛇後人來至蛇所有一老嫗夜哭人問何哭嫗曰吾子白帝子也化為蛇當道今為赤帝子斬之又髙祖曰運籌策帷幄之中决勝千里之外吾不如子房鎮國家撫百姓給餽饟不絶糧道吾不如蕭何連百萬之軍戰必勝攻必取吾不如韓信此三者皆人傑也吾能用之此吾所以取天下也黄軒舉二臣史記黄帝者少典之子姓公孫名曰軒轅張衡賦登封降禪則徳齊乎黄軒帝王世紀黄帝夢大風吹天下之塵垢皆去又夢人執千鈞之弩驅羊萬羣帝寤而嘆曰風為號令執政者也垢去土后在也天下豈有姓風名后者哉夫千鈞之弩異力者也驅羊數萬羣能牧民為善者也天下豈有姓力名牧者哉于是依二占而求之得風后于海隅登以為相得力牧于大澤進以為將由來丞相重左思詩由來自古昔玉海相國丞相皆秦官唐書百官志唐因隋制以三省之長中書令侍中尚書令共議國政此宰相之職也後以僕射為尚書省長官與侍中中書令號為宰相品位既崇不欲輕授人六典左右僕射開元初改為左右丞相分掌國之鈞後漢書侍中分掌乗輿服物詩尹氏太師秉國之均我有握中璧淮南子玩天地于掌握之中雙飛席上珍蘇武詩何况雙飛龍北史天保初崔㥄為侍中弟仲文為銀青光禄大夫同日受拜時云兩鳯聨飛禮記儒有席上之珍以待聘呉均詩長安城中諸貴臣爭貴儒者席上珍子房推道要漢書張良傳良字子房蔡邕碑精微周宻包括道要仲子訝風神晉書律歴志漢末宋仲子集七厯以考春秋又衞玠傳風神秀異祖瓘甚竒之復輟台衡老陸機詩奕世台衡扶帝紫極春秋元命苞魁下六星兩兩而比曰三台環濟要畧殷有阿衡伊摯佐之太甲改為保衡皆三公官也將為調䕶人漢書張湯傳于故人子弟為吏及貧昆弟調䕶之尤厚鴛鸞同拜日張衡賦蘭林披香鳳皇鴛鸞車騎擁行塵禮記前有車騎則載飛鴻史記司馬相如傳相如之臨卭従車騎雍容閒雅甚都江淹賦驅征馬而不顧見行塵之時起樂聚南宫宴詩樂酒今夕君子維宴漢書髙祖紀置酒雒陽南宫又漢建尚書百官府曰南宫觴連北斗醇詩維北有斗不可以挹酒漿俾予成百揆書俾予従欲以治又納于百揆百揆時叙傳度百事總百官後漢書張衡傳百揆允當庶績咸理垂拱問彛倫書垂拱而天下治漢書董仲舒傳垂拱無為而天下太平書彛倫攸叙隋煬帝詩彛倫欣有序垂拱事端居早發太行山中言志書太行恒山至于碣石地理通釋太行山跨河北諸州為天下之脊清蹕度河陽晉書載記响清蹕于常道之門顔延之詩帝暉膺順動清蹕巡廣㕓漢書地理志河内郡縣河陽庾信賦河陽一縣倂是花凝笳上太行謝朓詩凝笳翼髙葢王融詩凝笳鬱摧愴火龍明鳥道左傳火龍黼黻南中志鳥道四百里以其絶險獸猶無蹊特上有飛鳥耳王襃詩鳥道無蹊徑鐵騎繞羊腸魏書慕容超傳司馬徳宗將劉裕伐超公孫五樓勸超拒之于大峴超曰但令度峴吾以鐵騎踐之此成擒也梁簡文帝詩石門留鐵騎氷城息夜軍史記魏世家魏伐趙㫁羊腸拔閼與注羊腸坂道在太行山魏文帝苦寒行羊腸坂詰曲車輪為之摧白霧埋隂壑梁元帝書青松白霧處處可怪沈約賦素烟晚帶白露晨縈沈佺期詩隂壑已永閉丹霞助曉光釋恵標詩丹霞拂層閣碧水泛蓬萊梁簡文帝詩靄靄夜中霜河開向曉光澗泉含宿凍庾信詩澗寒泉反縮山晴雲倒回司馬相如賦其北則盛夏舍凍裂地涉氷揭河庾信文烟凝不動泉凍無聲山木帶餘霜左傳山有木工則度之國語山木如市弗加于山沈約雁詩唼流牽弱藻斂翮帶餘霜野老茅為屋梁簡文帝序都人野老雲集霧㑹宋書裴松之傳松之在禁垣十餘年無宅借官地二畝起茅屋數間鮑照邊居行陋巷絶人徑茅屋摧山岡樵人薜作裳虞騫詩遙看野樹短逺望樵人細楚辭採薜茘以為裳沈約詩薜茘可為裳文杏堪作梁宣風問耆艾晉書武帝紀詔曰郡國守相三載一巡行屬縣此古之所以述職宣風展義也詩俾爾耆爾艾禮記五十曰艾服官政六十曰耆指使疏艾髮蒼白色如艾也耆至也至老之境也敦俗勸耕桑晉書張駿傳法制所以經綸邦國篤俗齊物後漢書章帝紀方春戒節人已耕桒其勅有司務順時氣無使煩擾韓詩外傳召伯撫蒸庶于阡陌之間而聴㫁百姓大悦耕桒倍力以勸凉徳慙先哲左傳虢多凉徳徐陵詩在余凉徳書不盡言曹植文徳配姜嫄不忝先哲潘岳賦賴先哲以常存徽猷慕昔皇詩君子有徽猷盧諶詩嘉其忠貞宣其徽猷拾遺記比于聖徳有踰前皇不因今展義左傳天子非展義不巡狩馬融頌展聖義于巡狩喜圻疇而詠八荒何以冐垂堂司馬相如書家累千金坐不垂堂孫綽賦雖一冐于垂堂乃永存乎長生遊興慶宫作并序邸唐書三宗諸子傳先天後以舊為興慶宫而賜寧薛申岐諸王第環列宫側天子於宫西南置樓其西署曰華萼相輝之樓南曰勤政務本之樓帝時時登之聞諸王作樂必亟召升樓與同榻坐或就幸地賦詩或燕嬉賜金帛侑歡暇日與兄弟同遊興慶宫登勤政務本及華萼相輝之樓所以觀風俗而勸人庾信漢武帝賛坐觀風俗不出蘭臺禮記移風易俗天下皆寧左傳善人勸焉崇友于而敦睦書惟孝友于兄弟又以親九族九族既睦魏志明帝紀古者諸侯朝䀻所以敦睦親親協和萬國也詩以言志歌以永言書詩言志歌永言傳為詩言志以導之歌永其文以長其言禮記詩言其志也歌詠其聲也情發于衷率題此什任昉啟託情風什希世罕工代邸青門右史記孝文帝紀代王至渭橋羣臣拜謁稱臣太尉勃跪上天子璽符代王謝曰至代邸而議之遂馳入代邸説文邸屬國舍三輔黄圖長安城東出南頭第一門曰霸城門民見門色青名曰青門離宫紫陌陲班固賦離宫别館三十六所張正見詩離宫建翠旃謝莊詩紫陌協笙鏞廣韻陲邊也庭如過沛日漢書髙祖紀十二年上破布軍還過沛留置酒沛宫悉召故人父老子弟佐酒上擊筑自歌沛父老諸母故人日樂飲極歡道舊故為笑樂庾肩吾詩過沛追鄉飲水若渡江時晉書元帝紀秦時望氣者云五百年後金陵有天子氣孫權稱號自謂當之考其厯數猶為未及元帝之渡江也乃五百二十六年太安之際童謠云五馬浮渡江一馬化為龍永嘉中帝與西陽汝南南頓彭城五王獲濟而帝竟登大位焉綺觀連雞岫袁朗詩金鳳凌綺觀璇題敞蘭宫宋書建平王宏文帝第七子也少而閑素篤好文籍太祖寵愛殊常為立第於雞籠山盡山水之美朱樓接雁池後漢書馮衍傳仗朱樓而四望兮採三芝之華英謝朓詩逶迤帶緑水迢逓起朱樓三輔黄圖梁孝王作曜華宫築兔園園中有雁池従來敦棣萼詩棠棣之華萼不鞾韡詩序棠棣燕兄弟也晉書孝友傳序夫天倫之重共氣分形心暌則葉顇荆枝生合則華承棣萼今此茂荆枝續齊諧記京兆田真兄弟三人分財生資皆平均惟堂前一株紫荆樹共議欲破三片明日其樹即枯死真見之大驚謂諸弟曰樹本同株聞將分砍所以顦顇是人不如木也因不復解樹樹即應聲榮茂萬葉傳餘慶顔延之序拓世貽統固萬葉以為量者也沈約文長世流祚垂之萬葉易積善之家必有餘慶蔡邕碑道徳餘慶延於無窮千年志不移子夜歌千年無轉移江淹詩所寄終不移凭軒聊屬目陸雲文丘園靡滯鸞驥憑軒郭璞賦遊華輦而永懐乃憑軾以寓目輕輦共追隨劉孝綽詩誰憶遊輕輦曹植詩清夜遊西園飛葢相追隨務本方崇訓論語君子務本漢書文帝紀導民之路在於務本阮籍文誦周孔之遺訓相輝保羽儀梁元帝書唯昆與季文藻相輝隋書經籍志黼藻相輝宫商間起易鴻漸于陸其羽可用為儀吉嵇康詩睎暘振羽儀時康俗易漸王粲銘人悦時康董仲舒策漸民以仁摩民以義節民以禮教化行而習俗美也徳薄政難施易徳薄而位尊潛夫論徳薄者惡聞美行書翕受敷施傳能合受三六之徳而用之以布施政教論衡王者脩身正行擴施善政鼓吹迎飛葢陸機鼔吹賦原鼓吹之伊始葢稟命於黄軒唐書儀衞志凡鼓吹五部一鼓吹二羽葆三鐃吹四大横吹五小横吹總七十五曲何遜詩飛葢交長術庾肩吾詩閣影臨飛葢絃歌送羽巵周禮小師掌教鼓鼗柷敔塤簫管絃歌淮南子絃歌鼓舞以為樂梁昭明太子詩中山浮羽巵沈約詩金瓶泛羽巵所希覃率土廣韻覃及也延也詩率土之濵莫非王臣後漢書王符傳澤及草木仁被率土孝弟一同規禮記上老老而民興孝上長長而民興弟尹義尚書如首如尾可以同規謝瞻詩肇允雖同規翻飛各異概送張説巡邊舊唐書張説傳開元九年拜兵部尚書同中書門下三品明年勅説為朔方節度大使往巡五城處置兵馬端拱復垂裳晉書阮孚傳正應端拱嘯詠以樂當年耳書垂拱而天下治風俗通三皇垂拱無為設言而民不違易黄帝堯舜垂衣裳而天下治長懐御逺方鮑照詩長懐無終極晉書張軌傳公卿舉才堪御逺永寧初出為䕶羌校尉凉州刺史北史韓秀傳論秀論邊得御逺之策股肱申教義書臣作朕股肱耳目史記孝文帝紀惟二三執政猶吾股肱也任昉表陛下𢎞宣教義豈求效于方今庾信文恂恂教義呉起西河之風戈劍靖要荒吕氏春秋多以珠玉戈劍為寳詩日靖四方晉書文帝紀思靖殊方寧濟八極書五百里要服乂五百里荒服荀勗詩外納要荒内延卿士命將綏邊服詩正義采薇出車以天子之命命將任昉文昔漢光命將坐知千里呉志陸遜傳敬服王命綏靖四方又薛綜傳綏邊撫裔寔有其人晉書前燕載紀論威加邊服雄圖出廟堂庾信詩雄圖屬天造淮南子修政廟堂之上而折衝千里之外後漢書班固傳將軍養志和神優游廟堂三台入武帳晉書天文志三台六星西近文昌二星曰上台為司命次二星曰中台為司中東二星曰下台為司禄又北落西南一星曰天綱主武帳江總賦陪武帳而香浮八座起文昌後漢書百官志六曹尚書并令僕二人為八座史記天官書斗魁戴匡六星曰文昌宫晉書成公綏傳帝皇正坐於紫宫侍臣列位於文昌寳胄匡韓主徐陵文蟬聨寳胄輝煥郊禋晉書周嵩傳傳説之相髙宗申召之輔宣王委以重權終致匡主史記留侯世家留侯張良者其先韓人大父開地相韓昭侯宣恵王襄哀王父平相釐王悼恵王秦滅韓良以家財求客為韓報仇以大父父五世相韓故華宗輔漢王任昉敘生自華宗世務間隔史記張丞相傳漢王以蒼為代相従攻臧荼有功封北平侯遷為訃相以列侯居相府領主郡國上計者茂先慚博物晉書張華傳華字茂先學業優博朗贍多通圖緯方伎之書無不畢覽著博物志十篇平子謝文章後漢書張衡傳衡字平子少善屬文游于三輔遂通五經貫六藝史記儒林傳文章爾雅訓辭深厚盡節恢時佐漢書王遵傳盡節勞心夙夜思職晉書宣帝紀决誠盡節伊傅可齊張衡賦遊都邑以永久無明畧以佐時輸誠禦寇場後漢書章帝紀詔曰羣工卿士各推精誠専急人事易擊䝉不利為寇利禦寇三軍臨朔野周禮夏官司馬凡軍制萬有一千五百人為軍大國三軍左傳晉侯蒐被廬作三軍晉凱歌戎車振朔野北史王紘傳國家龍光朔野雄步中原駟馬即戎行廣韻駟一乗四馬楚辭霾兩輪兮縶四馬援玉枹兮擊鳴鼓論語善人教民七年亦可以即戎矣左傳韓厥曰屬當戎行無所逃隠晉書陸機傳援吕䝉于戎行鼓吹威夷狄後漢書百官志將軍賜官騎三十人及鼓吹又班超傳建初八年拜超為將兵長史假鼓吹麾幢易弧矢之利以威天下班固賦因兹以威戎夸狄耀威靈而講武事旌軒溢洛陽周禮析羽為旌白虎通大夫軒車梁簡文帝詩洛陽佳麗所大道滿春光雲臺先著美後漢書朱景王杜等傳論永平中顯宗追感前世功臣乃圖畫二十八將于雲臺梁簡文帝文玉燭之美日著遐方今日更貽芳虞通之詩清塵誰能嗣及爾遘遺芳餞王晙巡邊唐書王晙傳滄洲景城人開元九年代張説為兵部尚書同中書門下三品充朔方軍節度大使河北河西隴右河東之軍盡屬是冬帝親郊追㑹大禮晙以氷壯請留將兵待邊手勅慰勉振武威荒服晉書桓彛傳賛振武兼文唐書王晙傳賛唐所以能威振夷荒斥大封域者亦有虎臣為之牙距也書五百里荒服曹植詩元化滂流荒服來王揚文肅逺墟書帝乃誕敷文徳舞干羽于兩階七旬有苗格詩矢其文徳洽此四國晉書夏侯湛傳一介之士皆奮筆揚文議制論道謝朓詩文教已肅武節既馳梁簡文帝詩鏡澈倒遙墟金壇申將禮史記淮隂侯﨤蕭何曰王必欲爭天下非信無與計事者王曰以為大將何曰幸甚於是王欲召信拜之何曰王必欲拜之擇良日齋戒設壇場具禮乃可耳玉節授軍符周禮掌節守邦國者用玉節禮記凡君召以三節疏節者以玉為之所以明信輔于君命者也梁元帝詩玉節威雲夢史記信陵君傳侯生曰嬴聞晉鄙之兵符常在王卧内誠得虎符奪晉鄙軍北救趙而西擊秦此五伯之伐也唐六典符寳郎凡國有大事則出納符節一曰銅魚符所以起軍旅易守長免胄三方外左傳郤至三遇楚子之卒見楚子必下免胄而趨風陸機従軍行朝飡不免胄漢書地理志東夷天性柔順異於三方之外注三方謂西南北也徐陵表昔蘇季張儀違鄉負俗尚復招三方以事趙請六國以尊秦銜刀萬里餘晉書王濬傳銜刀來渡江吾丘夀王驃騎論功論括地萬里四海晏然呉均詩嵇山萬里餘昔時呉㑹靜沈約賦昔時兮春日呉郡志世多稱呉門為呉㑹隋煬帝檄呉㑹雄俊之人湘郢耿介之士呉均詩忽值呉關靜今日虜庭虛荀子欲觀千載則審今日范曄匈奴論宣帝值虜庭分爭呼韓邪來臣乃權納懐柔因為邊衞六韜見其虛則進分閫仍推轂劉憲詩分閫恩何極漢書馮唐傳上古王者遣將必跪而推轂沈約詩推轂授神謨援桴且訓車史記穰苴曰將受命之日則忘其家臨軍約束則忘其親援枹鼓之急則忘其身注援作操枹音孚謂鼓挺也魏明帝樂府發桴若雷左傳訓卒利兵沈約詩戎車出細柳風揚旌斾逺春秋緯月離于畢則風揚沙作王融序雲潤星輝風揚月至詩悠悠斾旌隋煬帝白馬篇風交征斾揚庾肩吾詩絳天揚逺斾雨洗甲兵初六韜武王伐殷兵行之日大雨太公曰是洗濯甲兵詩王于興師修我甲兵左傳我張吾三軍而被吾甲兵以武臨之坐見台階謐後漢書郎顗傳三公上應台階下同元首行聞祅祲除宋書竟陵王誕傳祅祲廓清大明升曜宋文帝詩方欲除遺氛檄來雖插羽漢書息夫躬傳羽檄重迹而押至注羽檄檄之插羽者也顔延之詩羽檄馳無絶薛道衡詩插羽夜徵兵箭去亦飛書史記魯仲連傳齊田單攻聊城嵗餘不下魯仲連乃為書約之矢以射城中遺燕將舟楫功須著書若濟巨川用汝作舟楫後漢書班固傳功徳著于祖宗鹽梅望匪疎書若作和羮爾唯鹽梅晉書王湛傳冲素簡淡器量隤然有公輔之望不應陳七徳左傳武有七徳我無一焉潘尼銘文兼六行武備七徳白帖武有七徳禁暴戢兵安民和衆保大定功豐財欲使化先敷宋書武帝紀宣美王化導揚休風書文命敷于四海忠經式敷大化巡省途次上黨舊宫賦并序王書五載一巡守易先以省方觀民宋書武帝紀途次舊沛駕佇留城漢書地理志上黨郡秦置屬并州一統志後周置潞州隋大業初改為上黨郡并置上黨縣唐復為潞州天寳初改上黨郡唐書明皇紀開元二十年十月壬午如潞州辛卯赦潞州給復三年賜髙年粟帛朕昔在初九佐貳此州易乾卦初九潛龍勿用後漢書百官志軍假司馬假候皆為副貳唐書明皇紀累遷衞尉少卿潞州别駕未遇扶搖之力空俟海沂之詠爾雅扶搖謂之焱莊子注上行風謂之扶搖晉書王祥傳祥為徐州别駕政化大行時人歌之曰海沂之康實賴王祥邦國不空别駕之功洎大横入兆出處斯易漢書文帝紀大臣使人迎代王代王卜之兆得大横占曰大横庚庚余為天王夏啟以光於是代王詣長安易君子之道或出或處一揮寳劍遽履瑤圖漢書髙帝紀吾以布衣提三尺取天下阮籍詩揮劍臨沙漠曹植詩寳劍直千金李康論名載於籙圖庾信文恭膺寳厯嗣奉瑤圖承厯數而順謳謠書帝曰來禹天之厯數在汝躬後漢書郅夀傳立敢諫之旗聴歌謠於路劉孝威詩豫遊光帝則樂飲盛民謠著天衣而御區夏庾肩吾詩天衣疑拂石書用肇造我區夏晉樂歌𢎞濟區夏允集大命嗟乎向時沈黙駕四馬而朝京師晉書嵇康傳康見孫登従之遊登沈黙自守無所言説詩四馬既閑又京師之野唐書明皇紀景龍四年朝於京師遂留不遣今日逍遙乗六龍而問風俗詩所謂伊人于焉逍遙易時乘六龍以御天禮記天子巡狩覲諸侯問百年者就見之命太師陳詩以觀民風爰因巡省途次舊居山川宛然人事無間忽其鼎革周遊館宇觸目依然向秀賦徑山陽之舊居易革物者莫若鼎淮南子進退周遊莫不如志梁武帝詔廣開館宇招内後進雖迹異漢皇而地如豐邑擊筑慷慨酌桂留連空想大風題兹短什漢書髙帝紀髙祖沛豐邑中陽里人也又上還過沛留置酒沛宫悉召故人父老子弟佐酒酒酣上擊筑自歌曰大風起兮雲飛揚威加海内兮歸故鄉上乃起舞慷慨傷懐楚辭九歌援北斗兮酌桂漿梁元帝歌人生行樂耳何處不留連三千初擊浪九萬欲摶空莊子鵬之徙於南溟也水擊三千里摶扶搖而上者九萬里晉書宗慤傳願乗長風破萬里浪何遜詩何用生羽翰千里暫排空天地猶驚否易天地不交否君子以儉徳辟難隂陽始遇䝉易立天之道曰隂與陽又屯者物之始生也物生必䝉故受之以蒙存貞期歴試老子侯王得一以為天下貞髙允賦實靈祇之協賛故存貞而保吉書序虞舜側微堯將使嗣位歴試諸難佐貳佇昭融晉書何曽傳建官受任則置副佐書貳公𢎞化詩昭明有融多謝時康理王粲無射鐘銘休徵時序人悦時康徐彦伯詩五龍歸寳筭九燕叶時康良慙實賴功書萬世永賴時乃功長懐問鼎氣左傳定王使王孫滿勞楚子楚子問鼎之大小輕重焉夙負拔山雄項羽歌力拔山兮氣葢世不學劉琨舞晉書祖逖傳逖與司空劉琨俱為司州主簿情好綢繆共被同寝中夜聞荒雞蹴琨覺曰此非惡聲也因起舞先歌漢祖風唐太宗詩勞歌大風曲威加四海清英髦既包括王韶之詩美哉兹土世載英髦劉峻辨命論玉質金相英髦秀達蔡邕釋誨包括無外豪傑自牢籠史記髙祖紀子房蕭何韓信皆人傑也吾能用之此吾所以取天下也淮南子秉太一者牢籠天地莊子湯以庖人籠伊尹秦以羊皮籠百里奚人事一朝異史記趙世家事異而禮易王羲之蘭亭序雖世殊事異所以興懐其致一也詩一朝饗之謳歌四海同荀子近者歌謳而樂之梁簡文帝頌童稚有謳歌書四海㑹同如何昔朱邸謝朓牋朱邸方開效蓬心於秋實注諸侯朝天子於天子之所立舍曰邸諸侯朱户故曰朱邸今此作離宫漢書枚乘傳修治上林雜以離宫晉書天文志離宫六星天子之別宫雁沼澄瀾翠西京雜記梁孝王兔園中有雁池池間有鶴洲鳬渚虞世基詩澄瀾浮曉色鮑照詩清潭圓翠㑹猿巖落照紅西京雜記梁孝王兔園中有百靈山山有膚寸石落猿巖栖龍岫謝靈運詩日落山照曜隂鏗詩窻外落暉紅小山秋桂馥楚辭招隠士者淮南小山之所作也又桂樹叢生兮山之幽孔稚圭北山移文秋桂遣風江總詩聊承丹桂馥逺視白雲峯長坂舊蘭叢褚亮詩息駕遊蘭坂雕文折桂叢庾信詩舊蘭憔悴長殘花爛熳舒即是淹留處楚辭招隠士攀援桂枝兮聊淹留沈約詩遇可淹留處便欲息微躬乗歡樂未窮劉楨詩永日行游戲歡樂猶未央韓王元嘉髙祖第十一子少好學聚書萬巻以古文參定同異當世稱之奉和同太子監守違戀舊唐書髙宗紀永淳元年四月丙寅幸東都皇太子𢎞京師留守命劉仁軌裴炎薛元超等輔之乾象開層構易法象莫大乎天地呉志黄武二年改四分用乾象歴魏書廣陵王羽傳仰纂乾構君臨萬宇晉書符生載記大聖神武開構鴻基潘尼頌丕隆層構離明啟少陽易明兩作離大人以繼明照于四方王襃箴洊雷居震明兩作離顔延之序正體毓徳于少陽王宰宣哲於元輔謝莊表懋三王之教屬少陽之重卜征従獻吉左傳石㚟言于子嚢曰先王卜征五年而嵗習其祥書汝則従龜従筮従卿士従庶民従是之謂大同周禮占夢獻吉夢于王王拜而受之注詩云衆維魚矣旐維旟矣此所獻吉夢守器屬元良沈約表貳體宸極守器宗祧庾信文少陽養徳前星守器禮記一有元良萬國以貞梁簡文帝表羽籥東序長備元良之徳逖矣凌周誦書逖矣西土之人帝王世紀武王妃太公之女曰邑姜修教于内生太子誦遙哉掩漢莊後漢書孝明皇帝諱莊光武第四子十嵗能通春秋十九年立為皇太子梁簡文帝表魏平非擬漢莊靡繼王僧孺文聲出姬誦道由漢莊好士傾南洛荀子愛民而安好士而榮水經洛水出京兆上洛縣讙舉山注楚水出上洛縣西南楚山昔四皓隠于楚山即此山也多才盛北場晉書陸機傳人之為文章患才少機更患才多南史昭明太子傳名才並集文學之盛晉宋以來未之有也魏文帝書馳騖北場旅食南館梁簡文帝序侍従北場信一時之俊傑地分丹鷲嶺法華經耆闍窟山山形如鷲佛常居此故號鷲嶺師曠禽經南山有鳥名曰羌鷲黄頭赤目五色皆備謝靈運詩望嶺眷靈鷲延心念淨土途間白雲鄉白雲謠道里遼逺山川間之莊子乗彼白雲至于帝鄉儲誠䖍曉夕南齊書太子曰東儲徐陵表忠誠貫於日月孝義感於氷霜廣韻䖍恭也詩温恭朝夕執事有恪唐太宗詩曉夕重輕烟宸愛積炎凉温子昇文居宸納祜就日垂衣廣韻宸屋宇天子所居禮記思慈愛忘勞可謂用力矣注思父母之慈愛已而忘已之勞苦齊書樂志裁化變寒燠布政司炎凉珠璧連霄漢漢書律歴志日月如合璧五星如連珠庾信歌連珠合璧重光來李善文選序陛下則大居尊耀三辰之珠璧謝靈運詩照灼爛霄漢南史宋髙祖紀望霄漢以永懐盻山川以増佇萬物仰重光易大哉乾元萬物資始書昔君文王武王宣重光晉書元帝紀三葉重光御選唐詩巻二十四
