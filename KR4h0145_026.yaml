body:
  text: 欽定四庫全書御選唐詩卷二十七言律李白登金陵鳳凰臺晉書王導傳建康古之金陵舊為帝里唐書地理志注武德三年更江寧曰歸化八年更歸化曰金陵九年更金陵曰白丁謝朓詩江南佳麗地金陵帝王州鳳凰臺上鳳凰遊六朝事迹宋元嘉中鳳凰集於是山乃築臺于山椒以徵嘉瑞在府城西南二里今保寧寺是也一統志鳳凰臺故基在江寧縣治之南春秋元命苞鳳凰銜丹書遊于文王之都鳳去臺空江自流鄒陽賦龍盤鳥回鳳去鸞歸謝朓詩大江流日夜又結軫青郊路回瞰蒼江流吳宫花草埋幽徑吳都賦作離宫于建業繁欽詩褰裳躡花草梁簡文帝詩只言逐花草計較應非嫌王績詩山徑本幽回晉代衣冠成古丘駱賔王詩銘書非晉代畫壁是梁年易林被服衣冠遊戲道門顔延之詩衣冠終冥漠陳後主授江總尚書令策辭宗學府衣冠以為領袖儲光羲詩東江還故丘三山半落青天外丹陽記江寧北十二里濵江有三山相接即名為三山舊時津濟道也一統志三山在應天府西南五十七里下臨大江三峯排列故名張衡賦山崢嶸以嶮狹仰青天其如帶宋之問詩古槎天外落二水中分白鷺洲圖經白鷺洲在城西南八里明一統志古朱雀門外直江為白鷺洲史正志碑秦淮源出句容溧水兩山間自方山合流至建康分為二支一支入城一支繞城外共夾一洲曰白鷺即所謂二水中分白鷺洲也總為浮雲能蔽日古詩浮雲蔽白日陶潛詩重雲蔽白日水經注空野昏霾雲攢蔽日長安不見使人愁班固西都賦漢之西都實在雍州名曰長安晉書明帝紀帝數嵗屬長安使來元帝問曰日與長安孰近對曰長安近不聞人從日邊來也明日又問曰日近舉目則見日未聞舉目見長安也帝竒之沈約詩髙臺不可望望逺使人愁孟浩然詩峴山望不見風景使人愁杜甫贈田九判官梁丘哥舒翰討安祿山以田梁丘為軍司馬按梁丘唐書作良丘崆峒使節上青霄漢書武帝紀五年冬行幸雍祠五畤遂踰隴登空同西臨祖厲河而還一統志崆峒山在平凉府城西三十里周禮掌節注使節使卿大夫聘於天子諸侯行道所執之信也左思魏都賦恆碣砧􅑇于青霄河汾浩涆而皓溔徐陵文氣涌青霄神飛紫闥河隴降王款聖朝唐書明皇帝紀天寶十三載隴右河西節度使哥舒翰敗吐蕃復河源九曲又吐蕃傳天寶十四載蘇毗子悉諾羅來降封懷義王漢書宣帝紀百蠻鄉風款塞來享注款叩也皆叩塞門來服從也馮衍說鄧禹書聖朝享堯舜之榮將軍荷稷契之烈宛馬總肥秦苜蓿漢書西域傳大宛國多善馬張正見詩將軍入大宛善馬出從戎公羊傳圍者箝馬而秣之使肥者應客漢書食貨志乘堅策肥漢書西域傳大宛左右以蒲陶為酒馬嗜目宿漢使采蒲陶目宿種歸益種離宫館旁極望焉劉孝儀書馬銜苜蓿將軍只數漢嫖姚王褒燕歌行隴西將軍號都護樓蘭校尉稱嫖姚魏志禰衡傳餘子碌碌莫足數史記衛將軍驃騎傳大將軍姊子霍去病年十八幸為天子侍中善騎射再從大將軍受詔與壯士為剽姚校尉注服䖍音飄搖荀悅漢紀作票鷂票鷂徑疾之貌也陳留阮瑀誰爭長魏志王粲傳陳留阮瑀字元瑜謝靈運擬鄴中集序阮瑀管書記之任故有優渥之言左傳滕侯薛侯來朝爭長史記吳世家吳王與晉定公爭長陳琳檄吳將校文抗衡上國與晉爭長京兆田郎早見招漢書京兆尹注故秦內史髙帝元年屬塞國二年更為渭南郡九年罷復為內史武帝建元六年分為右內史太初元年更為京兆尹三輔决録注田鳳為尚書郎容儀端正每入奏事靈帝目送之因題柱曰堂堂乎張京兆田郎陶潛詩山澤久見招麾下賴君才並入左傳旝動而鼓注旝音怪旃也通帛為之蓋今大將之麾也漢書韓信傳項梁渡淮信仗劍從之居戲下無所知名注泛在旌戲之下也讀曰麾唐書哥舒翰傳翰拜太子先鋒兵馬元帥以田良丘為軍司馬蕭昕為判官王思禮鉗耳大福李承光髙元蕩蘇法鼎管崇嗣為屬將火拔歸仁李武定渾萼契苾寧以本部隸麾下獨能無意向漁樵莊子今子獨無意馬知不足耶意知而力不能行耶晉書庾敳傳敳著意賦以豁情從子亮見賦問曰若有意也非賦所盡若無意也復何所賦答曰在有無之間耳何遜詩豫志返漁樵劉孝威詩散步懷漁樵紫宸殿退朝口號㑹要龍朔三年四月二十五日始御紫宸殿聽政百僚奉賀注殿在大明宫雍録含元之北為宣政宣政之北為紫宸户外昭容紫袖垂禮記户外有二屨言聞則入言不聞則不入宋書后妃傳世祖孝建三年置貴妃又置昭儀昭容昭華唐書百官志注唐因隋制有昭儀昭容昭媛修儀修容修媛充儀充容充媛各一人為九嬪正二品梁簡文帝詩且復小垂手廣袖拂紅塵雙瞻御座引朝儀宫人引導至天祐間始革漢書梅福傳當户牖之法座注法座正座也聽朝之處猶言法宫法駕也後漢書隱逸傳光武與嚴光同宿光足加帝腹明日太史奏客星犯御座酉陽雜俎今閣門有宫人垂帛引百寮云起于天后又云起于晉褚太后至㑹昌中罷之周禮夏官司馬司士正朝儀之位辨其貴賤之等漢書叔孫通傳臣願徵魯諸生與臣弟子共起朝儀香飄合殿春風轉江總為陳六宫謝表香飄霧縠沈佺期詩罏氣晨飄接御香庾肩吾詩合殿生光彩沈佺期立春日內出剪綵花應制詩合殿春應早開箱綵預知杜審言詩香殿早迎春庾信詩春風滿路香楚辭光風轉蕙花覆千官淑景移江總詩花處近香來沈佺期詩徑狹千官擁李顒賦布和氣之烟煴舒朗景之淑鮮晝漏稀聞髙閣報周禮分以日夜注分以日夜者異晝夜漏也漏之箭晝夜共百刻冬夏之間有長短焉太史立成法有四十八箭謝朓詩髙閣常晝掩後漢書樊宏傳所起廬舍皆有重堂髙閣陂渠灌注天顔有喜近臣知左傳天威不違顔咫尺書綴衣虎賁疏皆左右近臣唐明皇送李雍詩黎庶既繁殖臨之勞近臣宫中每出歸東省管子黃帝有合宫以聽政雍録政事堂在東省屬門下至中宗時裴炎以中書令執政事筆故徙政事于中書省則堂在右省也㑹送夔龍集鳳池書伯拜稽首讓于夔龍注夔龍二臣名唐書上官儀傳御史供奉赤墀下接迹夔龍簉羽鵷鷺晉書荀勗傳勗自中書監除尚書令人賀之勗曰奪我鳳凰池諸君何賀耶謝朓直中書省詩兹言翔鳳池鳴珮多清響張說詩疇昔同聲友鶱飛出鳳池南鄰錦里先生烏角巾華陽國志錦江織錦濯其中則鮮明故命曰錦里益州記益州城張儀所築錦城在州南蜀時故宫也其處號錦里戰國策梧下先生魏之隱士晉書羊祜傳祜與從弟琇書曰既定邊事當角巾東路歸故里園收芋栗未全貧說文樹果曰園陶潛詩守拙歸園田周禮饋食之籩其實㮚吕氏春秋伊尹曰果之美者江浦之橘箕山之栗孝經援神契仲冬日昴星中收莒芋史記郭解傳徙豪富茂陵衛將軍為言解家貧不中徙上曰布衣權至使將軍為言此其家不貧慣看賔客兒童喜漢書主父偃傳為齊相遍召昆弟賔客散五百金豫之又陳遵傳性嗜酒每大飲賔客滿座晉書山簡傳鎮襄陽諸習氏有佳園池簡每出遊嬉多之池上置酒輒醉時有兒童歌曰山公出何許往至髙陽池日夕倒載歸酩酊無所知時時能騎馬倒著白接䍦舉鞭向葛疆何如并州兒得食階除鳥雀馴南史顧歡傳歡晚節服食不與人通每旦出户山鳥集其掌取食王粲登樓賦循階除而下降兮氣交橫於胸臆陶潛詩階除曠遊迹謝靈運詩空庭來鳥雀蘇頲詩喧鳥逼簷馴張說詩院竹鳥來馴秋水才深四五尺莊子秋水時至百川灌河晉書阮籍傳贊秋水揚波春雲斂映郭璞水贊惟水之竒莫測其深野航恰受兩三人方言舟自關而東謂之船自關而西謂之舟方舟或謂之航曹植詩涉浮濟兮泛輕航西溪叢語晉郭翻乘小舟歸武昌庾亮造之以其船狹小就引大船翻曰使君不以鄙賤而猥辱臨之此固野人之船也白沙翠竹江村暮司馬相如子虛賦外發芙蓉菱華內隱巨石白沙梁武帝泛天池詩白沙青漣漪陶𢎞景書青林翠竹四時俱備梁簡文帝詩翠竹垂秋采謝朓詩曖曖江村見離離海樹出張九齡詩日夕遵前渚江村投暮烟相送柴門月色新陶潛文翳翳柴門事我宵晨十六國春秋汜勝家財五十萬悉散之於宗族柴門灌園以琴書自娛王褒詠月贈人詩月色當秋夜陳子昂詩三五月華新涪城縣香積寺官閣唐書地理志劒南道梓州梓潼郡縣涪城一統志廢涪城縣在潼川州西北六十里寰宇記香積山在涪城縣東南三里北枕涪江維摩經維摩居士遣八菩薩往衆香國禮佛言願得世尊所食之餘於是香積如來以衆香鉢盛飯與之一統志官閣在潼川州北六十里寺下春江深不流顔延之詩春江壯風濤隋煬帝春江花月夜曲暮江平不動春花滿正開劉孝綽詩日入江風靜安波似未流山腰官閣迥添愁庾信枯樹賦橫洞口而敧卧頓山腰而半折張衡賦坐太隂之屏室兮慨含欷而增愁張九齡詩烟雲生逺愁含風翠壁孤雲細沈約詩巖間有佚女垂袂似含風虞羲竹詩含風自颯颯九華山録獨秀巖翠壁橫峙可愛梁武帝詩翠壁絳霄際江總貞女峽賦澄碧源之見底聳翠壁以臨危陶潛詩萬族各有托孤雲獨無依陳後主遊棲霞寺詩天迥浮雲細背日丹楓萬木稠法苑珠林佛光背日東照為初謝靈運詩曉霜楓葉丹埤雅楓葉作三脊霜發色丹水經注稠木旁生凌空交合梁昭明太子講席詩藥樹永繁稠小院回廊春寂寂王勃白鶴寺碑更起招提之院沈約法王寺碑回廊敞市復殿重起王勃龍懷寺碑回廊䆗窱自吐風飇列榭崢嶸坐含雲雨左思詩寂寂揚子宅梁簡文帝詩寂寂暮簷響黯黯垂簾色何遜詩沙汀暮寂寂蘆岸晚修修浴鳬飛鷺晚悠悠楚詞卜居汜汜若水中之鳬方言野鳬甚小好沒水中孫楚賦游鳬濯翅於素波蕭慤春日曲水詩麥壠一驚翬菱潭兩飛鷺楚辭九章開春發嵗兮白日出之悠悠張說詩心隨湖水共悠悠諸天合在藤蘿外長阿含經先於佛所淨修梵行生忉利天使彼諸天增益五福李嶠大雲寺碑諸天翼戴上升於兜率之宫范雲詩綿蠻弄藤蘿王績答馮子華書暮春三月登於北山松柏羣吟藤蘿翳景意甚樂之昏黑應須到上頭離騷曰黃昏以為期兮謝靈運詩朝遊窮曛黑古樂府東方千餘騎夫壻居上頭秋興蓬萊宫闕對南山唐㑹要貞觀間營永安宫後改為蓬萊宫咸亨初改蓬萊宫為含元殿又改大明宫北據髙原南望爽塏每天晴日朗南望終南如指掌京城坊市階陌俯視如在檻內劇談録含元殿鑿龍首岡以為基址左右立棲鳯翔鸞二闕史記髙祖紀蕭丞相營作未央宫宫闕壯甚陳子昂詩宫闕星河低拂樹詩幽幽南山括地志終南山一名南山杜審言詩北斗挂城邊南山倚殿前承露金莖霄漢間史記孝武紀其後又作柏梁銅柱承露仙人掌之屬注仙人以手掌檠盤承甘露也三輔舊事建章宫承露盤髙二十六丈大七圍以銅為之上有仙人掌承露和玉屑飲之班固西都賦抗仙掌以承露擢雙立之金莖注金莖銅柱也盧照鄰詩金莖承露起劇談録含元殿殿門去南門五里元㑹來朝者仰瞻玉座如在霄漢西望瑤池降王母列子周穆王升崑崙之丘遂賔于西王母觴於瑤池之上漢武故事七月七日上齊居承華殿忽有一青鳥從西來集殿上上問東方朔朔曰西王母欲來有頃王母至魏元忠詩寒風生玉樹凉月下瑤池東來紫氣滿函關關令內傳關令尹喜周之大夫也登樓四望見東極有紫氣西邁喜曰九十日之外應有聖人經過京邑至期果見老子抱朴子老子西遊遇關令尹喜于散關為喜著道德經一卷謂之老子或以為函谷關西征記關城路在谷中深險如函故名雲移雉尾開宫扇陸慧曉詩旌翻玉華晦神轉雲光移古今注雉尾扇起於殷世髙宗時有雉雊之祥服章多用翟羽周制以為王后夫人之車服緝雉羽為扇以障翳風塵也唐書儀衛志唐制人君舉動必以扇大駕鹵簿雉尾障扇四小團雉尾扇四方雉尾扇十二小雉尾朱畫團扇皆十二日繞龍鱗識聖顔晉書天文志日繞宸極埤雅龍八十一鱗具九九之數後漢書光武紀天下士大夫從大王於矢石之間者固望攀龍鱗附鳳翼以成其所志耳曹植詩遲奉聖顔如渴如飢一卧滄江驚嵗晚晉書謝安傳髙卧東山陳子昂詩幽卧不知春隋煬帝詩日落滄江靜詩嵗聿其暮疏九月之時是嵗晚之候王績詩無人堪作伴嵗晚亦悠哉幾回青瑣㸃朝班梁簡文帝詩靈桃恆可餌幾回三千年漢書元后傳赤墀青瑣注孟康曰以青畫户邊鏤中也師古曰刻為連環文而青塗之也漢官儀給事黃門之職日暮入對青瑣門拜名曰夕郎張九齡詩印從青瑣拜翰入紫宸揮沈約奏彈孔稚圭文正臣稚圭歷奉朝班㑹要景龍三年左臺御火崔蒞奏彈朝班不肅小至唐㑹要開元八年中書門下奏開元新格冬至日祀圓丘遂用小冬日視朝按小冬日即小至也謂至前一日猶小寒食之義天時人事日相催易後天而奉天時荀子上得天時下得地利國語人事不起勿為之始尉繚子天官時日不若人事也史記自序春秋上明三王之道下辨人事之紀陶潛詩野外罕人事張說詩共知人事何嘗定且喜年華去復來蘇味道詩玉漏莫相催冬至陽生春又來禮記仲冬之月日短至左傳日南至注自秋分日行南陸至冬至之日日南極史記律書日冬至則一隂下藏一陽上舒易七日來復疏五月一隂生十一月一陽生孝經說斗指子為冬至陽氣始生武平一詩東郊上苑望春來刺繡五紋添弱線周禮五采備謂之繡注此刺繡采所用也又繡以為裳者謂刺繡於裳史記貨殖傳刺繡文不如倚市門嵗時記晉魏間宫中以紅線量日影冬至後日添長一線唐雜録唐宫中以女功揆日之長短冬至後日晷漸長比常日增一線之功吹葭六琯動浮灰揚子調律者度竹為管蘆莩為灰列之九閉之中漠然無動寂然無聲微風不起纎塵不形冬至夜半黃鐘以應後漢書律厯志候氣之法為室三重户閉塗釁周密布緹縵室中以木為案每律各一內庳外髙從其方位加律其上以葭莩灰抑其兩端案律而候之氣至者灰去其為氣所動者其灰散人及風所動者其灰聚嵗華紀麗舜為玉琯以定律吕唐太宗守嵗詩四時運灰琯一夕變冬春劉允濟天賦托璇樞之妙術應玉琯之浮灰蕭慤詩緹室已飛灰岸容待臘將舒栁梁簡文帝詩岸栁垂長葉史記秦紀惠文君十二年初臘注十二月臘日也晉童謠二月盡三月初華生襄藩柳葉舒傅休奕柳賦長莖舒而增茂兮山意衝寒欲放梅謝朓詩蒼翠望寒山蕭慤詩山寒石道凍梁簡文帝梅花賦憐早花之驚節訝春光之遣寒馬懷素詩就暖風光偏著柳辭寒雪影半藏梅雲物不殊鄉國異周禮保章氏以五雲之物辨吉凶水旱降豐荒之祲象左傳凡分至啓閉必書雲物孔融書觀象雲物察應寒溫晉書王導傳過江人士每至暇日相要出新亭飲宴周顗中坐而歎曰風景不殊舉日有河山之異王勃春思賦盛年眇眇辭鄉國教兒且覆掌中杯廣韻覆倒也杜審言詩興盡聞壺覆鮑照詩臨流競覆杯陳後主詩極眺且傾杯李嶠太平公主山亭侍宴應制原注景龍三年八月十三日唐書諸公主傳太平公主則天皇后所生愛傾諸女田園遍近甸作觀池樂遊原以為盛集黃金瑞榜絳河隈神異經中央有宫以金為牆門有金榜以銀鏤題曰天皇之宫梁元帝詩玉題書仙篆金榜燭神光武帝內傳上元夫人遣一侍女問云上問起居逺隔絳河擾以官事遂替顔色拾遺記絳河去日南十萬里波如絳色庾信步虛詞絳河因逺别黃鶴來相迎淮南子舜釣於河濵漁者爭以曲隈深潭相豫廣韻隈水曲名白玉仙輿紫禁來司馬相如子虛賦乘雕玉之輿陸雲文駕琬琰之玉輿謝莊文收華紫禁注王者之宫以象紫微故謂宫中為紫禁碧樹青岑雲外聳淮南子崑崙山有碧樹在其北班固西都賦珊瑚碧樹周阿而生梁昭明太子七契碧樹初蕊緑草含滋張衡賦飲青岑之玉醴兮注青岑山名上髙者曰岑王康琚詩放神青雲外梁元帝賦對灌木之修聳朱樓畫閣水中開後漢書馮衍傳伏朱樓而四望兮採三秀之華英謝朓詩迢遞起朱樓庾肩吾詩歌聲臨畫閣詩宛在水中央龍舟下瞰鮫人室淮南子龍舟鷁首浮吹以虞班固西都賦乘輚輅登龍舟張衡賦號馮夷俾清津兮櫂龍舟以濟子張衡歸田賦俯瞰清流述異記南海中有鮫人室水居如魚不廢機織陶𢎞景水仙賦弄珠於淵客之庭卷綃於鮫人之室羽節髙臨鳳女臺駱賔王詩絳節朱旗分白羽曹植賦絶紫霄而髙騖飄珥節於天庭駱賔王文橫玉弩以髙臨列仙傳蕭史善吹簫穆公女弄玉妻焉日教弄玉作鳳鳴居數年吹簫似鳳聲鳳凰來止其屋公為作鳳臺廬照鄰序夕宿雞神之野朝登鳳女之臺一統志鳯女臺在鳯翔府寶雞縣遽惜歡娛歌吹晚班固東都賦聖上覩萬方之歡娛張協詩朝野多歡娛江淹詩太平多歡娛漢書儒林傳江公為歌吹諸生曰歌驪駒鮑照蕪城賦歌吹沸天江淹恨賦歌吹四起庾信步虛詞上元風雨散中天歌吹分王勔詩綺筵歌吹晚揮戈更郤曜靈回淮南子魯陽公與韓搆難戰酣日暮援戈而撝之日為之退三舍郭璞詩愧無魯陽德回日向三舍楚詞天問角宿未旦曜靈安藏魏志文帝紀注曜靈施光休氣雲蒸沈佺期奉和立春遊苑迎春禮記孟春之月以立春先立春三日太史謁之天子曰某日立春史記天官書立春四時之卒始也注謂立春日是去年四時之終卒今年之始也東郊暫轉迎春仗禮記立春之日天子親帥三公九卿諸侯大夫以迎春于東郊後漢書禮儀志立春之日京師百官皆衣青衣郡國縣道官下至斗食令史皆服青幘立青幡施土牛耕人於門外以示兆民皇覽唱之以角舞之以羽翟者迎春之樂也唐書百官志司仗典仗掌仗各二人上苑初飛行慶杯唐太宗詩金鞍移上苑玉勒騁平疇卓異記武后天授二年將遊上苑遣宣詔曰明朝遊上苑火速報春知花須連夜發莫待曉風吹於是凌晨名花瑞草布苑而開若有神助禮記冬至之日命相布德和令行慶施惠下及兆民風射蛟冰千片斷庾信詩黃河春冰千片穿謝靈運孝感賦孟積雪而抽笋王斷冰以鱠鮮許敬宗詩塞寒桃變色冰斷箭流聲氣衝魚鑰九關開駱賔王文劒氣衝而南斗平梁簡文帝詩夕門掩魚鑰楊炯崇文館宴集序魚鑰則環鎖晨開雀窗則銅樓旦闢芝田録門鑰必以魚取其不瞑目守夜之義楚辭虎豹九關注言天門凡有九重使神虎豹執其關閉漢郊祀歌九重開靈之斿垂恩惠鴻祜休林中覔草才生蕙易即鹿無虞惟入於林中曹植詩攀條摘蕙草梁簡文帝詩園梅斂新藻階蕙結初芳廣韻蕙香草蘭屬南方草木狀蕙草一名薰草氣如蘼蕪可以止癘廣志蕙草緑葉紫花魏武以為香燒之殿裏爭花併是梅江總侍宴臨芳殿詩花處近香來又二月柳爭梅庾信詩今朝梅樹下定有詠花人唐太宗首春詩曉雪間花梅歌吹銜恩歸路晚漢書儒林傳江公謂歌吹諸生曰歌驪駒蕪城賦歌吹沸天恨賦歌吹四起張華詩銜恩篤守義陸雲詩逺䝉眷顧言銜恩非望始陶潛詩行行循歸路庾信步虛詞歸路上鴻天王勔詩綺筵歌吹晚棲烏半下鳳城來梁簡文帝烏棲曲倡家髙樹烏欲棲岑之敬烏棲曲烏藏日暗行人息空棲隻影長相憶後漢童謠城上烏尾畢逋庾肩吾詩燭龍潛曜城烏啼盧照鄰詩春滿鳳凰城武平一一名甄以字行后族隱嵩山修浮屠法屢詔不應中宗迫召為起居舍人兼修文館直學士遷考功員外郎嘗因詩規戒明皇初貶蘇州參軍名亦不裒興慶池侍宴唐㑹要明皇在藩邸居興慶里宅有龍池湧出日以浸廣至開元中為興慶宫雍録明皇在藩邸宅有井潛復出水里中人悉移居遂鴻洞為龍池焉開元初以為離宫後又增廣遂為南內其正殿名大同殿殿之東北即有龍池殿鸞輿羽駕直城隈西都賦乘鸞輿備法駕何遜侍宴樂遊苑詩鸞輿和八襲鳳駕啓千羣沈約詩若䝉羽駕迎得奉金書召駱賔王詩三條九陌麗城隈萬户千門平旦開地理志興慶宫在皇城東南距京城之東開元二十六年六月築夾城入芙蓉園帳殿旌門此地開沈約詩帳殿臨春籞庾信華林園賦止立行宫裁舒帳殿周禮天官掌舍為帷宫設旌門注謂王行晝止有所展肆若食息張帷為宫則樹旌以表門又春官司常凡祭祀各建其旗㑹同賔客亦如之置旌門劉繪詩江山洵多美此地最為神庾肩吾詩别筵開帳殿離舟卷幔城皎潔靈潭圖日月江淹詩冰雪徒皎潔此焉守空貞謝靈運詩皎皎寒潭潔隋書經籍志魏氏日旁氣圖一卷日旁雲氣圖五卷駱賔王秋水詩圖雲景色淨寫月練花明張衡西京賦乃有昆明靈沼日月於是乎出入象扶桑與濛汜參差畫舸結樓臺張協洛褉賦青蓋雲浮參差相屬梁元帝詩蓮舟夾鶴氅畫舸覆緹油隂鏗詩新宫實壯哉雲裏見樓臺伏琛三齊略記海上蜃氣時結樓臺名海市舊唐書中宗紀景龍四年幸隆慶池結綵為樓宴侍臣泛舟戲樂波搖岸影隨橈轉酈炎詩靈芝生河洲蕩搖因洪波沈君攸詩波影雜霞無定色湍文觸岸不成圓庾信詩水光連岸動荀子水動而影搖劉孝綽詩斂橈隨水脈急槳度江湍廣韻橈楫也孫綽詩羽從風飄鱗隨浪轉梁昭明太子詩風來幔影轉風送荷香逐酒來鮑照詩木落江度寒鴈還風送秩王臺卿詩金風送影來梁簡文帝詩日落荷心香梁元帝牛渚磯碑花飛拂袖荷香入衣梁元帝詩那知步步香風逐庾信賦鳥何事而逐酒陶潛詩凱風因時來回飇吹我襟願奉聖情歡不極顔延之詩宣遊𢎞下濟窮逺凝聖情孔德紹詩和雲留睿賞薰風悅聖情王粲詩今日不極歡含情欲待誰古樂府千秋萬嵗樂無極長遊雲漢幾昭回陸機鞠歌行乘風逺遊騰雲端孔德紹詩思得乘槎便蕭然河漢遊詩倬彼雲漢昭回于天注昭回光轉也潘嶽西征賦擢金莖以承露干雲漢而上至虞茂昆明池詩隔河圖列宿星漢幾昭回韋元旦奉和幸安樂公主山莊應制唐書公主傳安樂公主中宗最幼女也下嫁武崇訓與太平七公主皆開府奪臨川長公主宅以為第天子親幸宴羣臣銀河南渚帝城隅江總歌織女今夕渡銀河爾雅小洲曰渚陸機詩南崖充羅幕北渚盈軿軒漢書陳咸傳得入帝城袁朗詩還望帝城中帝城何鬱鬱周禮城隅之制九雉古樂府鳳起方城隅帝輦平明出九衢漢書馮唐傳唐為郎中署長事文帝帝輦過問唐曰父老何事為郎劉孝威詩髙飛帝輦側逺託日輪中漢書叔孫通傳長樂宫成先平明謁者治禮以次入殿門爾雅四達謂之衢太𤣥經經衢回九路拾遺記蘧伯玉焚師㳙樂器于九達之衢恐後世傳造焉刻鳳盤螭凌桂邸劉協新論公輸之刻鳳也翠冠雲聳朱距電搖翽然一翥翻翔雲棟江總詠雙闕詩刻鳳棲清漢圖龍入紫虛西京雜記秦有青玉五枝燈下作蟠螭靈光殿賦蟠螭宛轉而承楣庾肩吾詩桂殿月偏來玉海郡國朝宿之舍在京者謂之邸朱邸邸有朱户也穿池疊石寫蓬壺莊子魚相造于水者穿池而養給閒居賦爰定我居築室穿池鮑照詩穿池類渤海北史魏太武帝紀詔於壺關東北大王山纍石為三封列子渤海之東有大壑焉其中有山一曰岱輿二曰員嶠三曰方壺四曰瀛洲五曰蓬萊孔奐詩京洛洵名都佳麗擬蓬壺璚簫暫下鈞天樂說文瓊赤玉也詩注瓊玉玉之美者韻㑹亦作璚三十國春秋涼州人得赤玉簫紫玉笛紫微王夫人歌玉簫和我神金醴釋我憂史記趙世家趙簡子寤曰我之帝所甚樂與百神遊於鈞天廣樂九奏萬舞西京賦昔者太帝悅秦穆公而覲之饗以鈞天廣樂庾信詩成文興大雅出豫奏鈞天綺綴長懸明月珠楚辭網户朱綴刻方連些注網户者以木為門扉而刻為方目使如網羅之狀朱綴者以朱丹飾其交綴之處使其所刻之方相連屬也劉憲詩綺綴玲瓏河色曉珠簾隱映月華窺李斯書垂明月之珠宋書符瑞志明月珠王者不盡鱗介之物則出陌上桑樂府耳中明月珠仙榜承恩爭既醉沈炯文崑山平圃銀榜相輝蓬閬仙宫金臺崛起髙唐宗詩玉庭浮瑞色銀榜藻祥徽姚察詩長隨畫堂裏承恩無所讓于仲文詩承恩叨並作詩既醉以酒傅毅舞賦騰觚爵之斟酌兮慢既醉其樂康方知朝野更歡娛詩序政遇醇和則歡娛被于朝野晉書杜預傳陛下聖明朝野清宴東都賦聖王覩萬方之歡娛魏文帝詩良辰啓初節髙構極歡娛張協詩昔在兩京時朝野多歡娛蘇頲侍宴安樂公主山莊應制駸駸羽騎歷城池詩載驟駸駸江總詩大車何杳杳奔馬遂駸駸說文駸馬行疾也揚雄校獵賦羽騎營營臚分殊事梁武帝詩羽騎凌雲轉禮記城郭溝池以為固韓非子築城池以守固帝女樓臺向晚披戰國策魯君曰昔者帝女令儀狄作酒王僧孺文盛此王姬光兹帝女徐陵詩樓臺非一勢臨玩自多竒傅縡詩樓臺宛轉曲皆通蕭慤詩春庭聊縱望樓臺自相隱盧照鄰詩途遙日向夕梁元帝序緹幔曉披既辨黃鍾之氣靈臺夕望便知玉井之色露灑旌旗雲外出李德林詩露自金盤灑風從玉樹吹司禮司常建九旗之名物折羽為旌交龍為旗禮記龍旗九旒天子之旌也潘嶽文旌旗電舒戈矛林植江淹詩懵懵雲外山王褒詩髙峯白雲外楊炯詩伏櫪排雲出風回巖岫雨中移司馬相如長門賦飄風回而赴閨兮舉帷幄之䄡䄡嵇康詩散髮巖岫沈約詩峯磴互相拒巖岫杳無窮梁武帝詩翻往雨中然梁簡文帝詩窗隂隨影度水色帶風移當軒半落天河水陸機詩阿那當軒織王融詩當軒卷羅縠梁簡文帝梅花賦漂半落而飛空三輔黃圖引渭水貫天都以象天河揚泉物理論水之精氣上浮宛轉隨流名曰天河張率詩長思不能寢坐望天河移繞徑全低月樹枝謝靈運山居賦復有水徑繚繞回員王績詩山徑半幽回庾信燈賦瓊鈎半上弱木全低顔延之詩風觀要春景月樹迎秋光梁元帝詩月中含桂樹後漢書明帝紀永平十七年甘露仍降樹枝內附簫鼓宸遊陪宴日梁武帝秋風辭簫鼓鳴兮發棹歌梁元帝文簫鼓騰空烟霞相接宋之問詩宸遊滿路輝鮑照河清頌崇文協律之士藴儛頌于外坐朝陪宴之臣懷揄揚于內沈佺期詩扈巡行太液陪宴坐明光和鳴雙鳳喜來儀詩鳳凰鳴矣于彼髙岡又肅雍和鳴左傳鳯凰于飛和鳴鏘鏘潘嶽笙賦雙鳯嘈以和鳴書簫韶九成鳳凰來儀注來儀者來舞而有容儀也顧愷之鳳賦望儀鳳之逸羣郭璞鳳鳥贊附翼來儀應我聖君廣達樓下夜侍酺宴應制李濯廣達樓賦德陽旁倚少室前瞻唐書明皇帝紀開元十三年十一月庚寅封于東嶽賜天下大酺七日案玉海唐廣達樓在東都唐書王君􅎢傳開元十四年君㚟大破吐蕃奏凱還宴君㚟及妻夏於廣達樓賜金帛實録開元二十四年八月壬子千秋節御廣達樓宴羣臣奏九部樂周禮族師春秋祭酺亦如之注酺者為人物烖害之神也族長無飲酒之禮因祭酺而與其民以長幼相獻酬焉東嶽封回宴洛京爾雅太山為東嶽漢書武帝紀元朔元年東巡東海上還封泰山降坐明堂陳後主詩太平無以報願上東封書南都賦陪京之南居漢之陽注京謂洛陽也陳後主詩遨遊出洛京西墉通曉㑹公卿曹植應詔詩爰暨帝宅稅此西墉說文墉城垣也釋名墉容也所以隱蔽形容吳志通曉不寐儀禮燕禮膳宰請羞於諸公卿者孟子公卿大夫此人爵也樓臺絶勝宜春苑隂鏗詩新宫實壯哉雲裏望樓臺徐陵詩樓臺非一勢臨玩自多竒漢書元帝紀水衡禁囿宜春下苑注宜春下苑即曲江池是也庾信春賦宜春苑中春已歸披香殿裏作春衣燈火還同不夜城沈佺期詩燈火灼爍九微映蘭氣氛氲百和香三齊略記不夜城在陽遷東南蓋古有日夜出此城以不夜名異之也正覩人間朝市樂後漢書魯恭傳閉户講誦絶人間事劉峻詩我思江海遊曽無朝市玩隋書廬思道傳勢利貨殖淡然不營雖籠絆朝市且三十載而獨往之心未始去懷抱也神仙傳白石先生年二千餘不失人間之樂忽聞天上管絃聲北史周文帝紀帝嘗從數騎于野忽聞簫鼓之聲以問從者皆莫之聞意獨異之古詩天上何所有厯厯種白榆庾信舞賦已曽天上學詎是世中生漢書郊祀志絲曰絃竹曰管蘭亭序雖無絲竹管絃之盛一觴一詠亦足以暢敘幽情劉憲詩恩光山水被聖祚管絃新酺來萬舞羣臣醉廣韻酺大飲酒作樂詩方將萬舞注萬者舞之總名又萬舞洋洋箋萬舞干舞也周禮太宰以八柄詔王御羣臣中庸體羣臣則士之報禮重詩既醉既飽小大稽首喜戴千年聖主明書衆非元后何戴晉書元帝紀劉琨等表曰蒼生顒然莫不欣戴聲教所加願為臣妾拾遺記丹丘千年一燒黃河千年一清至聖之君以為大瑞庾信詩洽斯百禮福以千年後漢書第五倫傳每讀詔書嘗歎息曰此聖主也宋書樂志六合寧承聖明杜甫卜居唐書本傳出為華州司功參軍流落劍南結廬成都西郊㑹嚴武節度劍南東西川往依焉顧注乾元二年十二月公至成都明年上元元年卜成都西郭浣花溪以居公題草堂詩云經營上元始是也浣花溪水水西頭寰宇記浣花溪在成都西郭外屬犀浦縣一名百花潭方輿勝覽浣花溪在成都府城西南五里一統志唐妓薛濤家潭旁以潭水造紙為十色箋李商隱詩浣花箋紙桃花色即此趙注公之居在浣花溪水西岸江流曲處公詩所謂田舍清江曲也址既蕪沒吕汲公鎮成都日於西岸佛舍梵安寺旁為立草堂焉牛鳳及詩通津澗水西世說士衡住西頭主人為卜林塘幽西都賦有西都賔問於東都主人西京雜記匡衡曰願得主人書遍讀之梁武帝答陶隱居書知欲從卜想咨請幽勝謀及蓍龜劉孝綽詩是日青春獻林塘多秀色頭陀寺碑膴膴亭臯幽幽林薄已知出郭少塵事南史謝靈運傳靈運出郭游行或一百六七十里王勃序幽居少事野性多間陶潛詩遂與塵事冥更有澄江銷客愁謝朓詩澄江淨如練王績詩不如髙枕上時取醉消愁何遜詩客心愁日暮劉孺聨句詎使客愁生無數蜻蜓齊上下張孟陽濛汜池賦珍魚産而無數爾雅蜻蜓一名負勞古今注蜻蜓即蜻蛉好飛集水上有青赤黃三種色青而大曰蜻蜓小而黃曰狐黎小而赤曰赤卒又名絳騶又名赤辨丈人埤雅蜻蜓尾端亭午則亭名之曰蝏以此字或作蜓楚辭將汜汜若水中之鳬與波上下偷以全吾軀乎一雙鸂鶒對沈浮庾信詩白鶴一雙來本草鸂鶒一名溪鴨又名紫鴛鴦左雄右雌羣伍不亂臨海異物志鸂鶒水鳥毛有五色食短狐其在溪中無復毒氣吳都賦鸂鶒鷛渠注鷛渠似鴨而雞足謝惠連賦覽水禽之萬類信莫麗乎鸂鶒詩載沈載浮西都賦沈浮往來雲集霧散東行萬里堪乘興世說陳太丘詣荀朗陵使元方將車季方持杖後從長文尚小載著車中既至荀使叔慈應門慈明行酒餘六龍下食文若亦小坐著膝前於是太史奏真人東行華陽國志蜀使費禕聘吳孔明送之禕歎曰萬里之行始於此矣寰宇記萬里橋在成都府中和門外昔諸葛亮送費禕聘吳至此世說王子猷曰吾本乘興而行興盡而返須向山隂上小舟世說王子猷居山隂夜大雪眠覺開室命酌酒西望皎然因起倣徨詠左思招隱詩忽憶戴安道時戴在剡即便夜乘小船就之經宿方至造門不前而返說文小舟為艇堂成隋唐嘉話杜甫在成都節度裴冕為卜居西郭浣花溪作草堂背郭堂成䕃白茅史記陳丞相世家家乃負郭窮巷以敝席為門蕭子雲酬王建安詩子家冠蓋里我館幽棲郭左傳與諸侯落之注宫室始成祭之曰落詩白茅包之杜之松答王績書䕃丹桂藉白茅通志茅類甚多惟白茅擅名緣江路熟俯青郊梁昭明太子詩道逢一俠客緣路問君居謝朓詩江路西南永歸流東北騖任昉詩滄江路窮此湍險方自兹謝朓詩結軫青郊路唐書禮樂志緹幕移候青郊啓蟄榿林礙日吟風葉甫自注榿木惟蜀地最宜種益部方物記榿林厥植易安數年輒成林民家蒔之不三年材可倍常齊東野語榿讀作敧庾肩吾詩疏林不礙日涸浦暫通潮張正見詩松吟欲舞風王勃詩野花常捧露山葉自吟風籠竹和烟滴露梢黃庭堅别集蜀人名大竹曰籠竹蔡夢弼注蜀有竹名籦籠沈炯詩竹烟生薄晚花色亂春朝宋之問詩潭曠竹烟盡洲香橘露團沈約詠竹詩風動露滴瀝張正見詩翠竹梢雲自結叢暫止飛烏將數子詩瞻烏爰止于誰之屋沈約詩秋鴻兮疏引寒烏兮聚飛劉孝威望棲烏篇夕烏飛參差單雄雜寡雌晉書樂志鳳將雛歌者舊曲也古樂府烏生八九子端坐秦氏桂樹間頻來語燕定新巢徐彥伯詩暗梁聞語燕夜燭見飛蛾太平廣記後魏元道康居林慮山書齊嘗有隻燕為巢嵗嵗必至忽聞燕呼康字曰景怡景怡樂以終身道康驚異曰爾禽而語何也燕曰我暫為禽耳以卿盛德故來相依古詩思為雙飛燕銜泥巢君屋易林不如新巢可以樂居唐太宗詩新巢封古樹旁人錯比揚雄宅漢書揚雄傳雄字子雲蜀郡成都人也有田一壥有宅一區明一統志揚雄宅內有草𤣥堂及墨池今成都縣治即其地也左思詩寂寂揚子宅門無卿相輿張載詩借問揚子宅想見長卿廬懶惰無心作解嘲陶潛詩阿舒已十八懶惰固無匹嵇康絶交書簡與禮相背懶與慢相成淮南子食土者無心而慧漢書揚雄傳雄方草太𤣥或嘲雄以𤣥尚白而雄解之號曰解嘲送李八祕書赴杜相公幕唐書百官志祕書郎三人從六品上掌四部圖籍以甲乙丙丁為部虞集注大厯二年六月劍南節度使杜鴻漸入朝辟李祕書入幕杜蓋先行李追赴之也當是其年九月作青簾白舫益州來漢焦仲卿妻詩箱簾六七十緑碧青絲繩古樂府青雀白鵠舫倦游録劉濬白舫百棹皆繡帆青簾多載伎女漢書武帝紀元封二年遣將軍郭昌中郎將衛廣發巴蜀兵平西南夷未服者以為益州郡明一統志四川古梁州地漢置益州部刺史巫峽秋濤天地回荆州記巴東三峽巫峽長一統志巫峽在巫山縣西三十里即巫山也曹毗觀濤賦伊山水之遼迥何秋月之淒清瞻滄洲之騰起觀雲濤之來征左思蜀都賦流漢湯湯驚浪雷奔望之天回即之雲昏木華海賦狀如天輪膠戾而激轉又似地軸挺拔而爭回石出倒聽楓葉下王績詩時時斷嶂遮往往孤峯出顔延之詩側聽風薄木謝靈運詩曉霜楓葉丹夕曛嵐氣隂楚辭洞庭波兮木葉下梁武帝搗衣詩中州木葉下邊城應早霜櫓搖背指菊花開吳志吕䝉傳䝉至尋陽使白衣搖櫓作商賈裝服晝夜兼行王勃採蓮曲桂棹蘭橈下長浦羅裙玉腕搖輕櫓王績詩春釀煎松葉秋杯浸菊花虞集注楓樹懸崖而生者則聽其落葉之聲船櫓向後而搖者則背指岸菊花開之處貪趨相府今晨發史記張蒼傳蒼以列侯居相府晉百官表注漢丞相府門無䦨不設鈴不警鼓言其深大闊逺無節限也王褒入朝詩嚴駕早凌晨任昉詩朝發富春渚恐失佳期後命催楚辭與佳期兮夕張謝莊月賦佳期可以還微霜霑人衣左傳宰孔謂齊侯曰且有後命無下拜陸機詩薄寒肅後命改服就藩臣張正見詩良時不可再騶馭鬱相催南極一星朝北斗漢書天文志老人星曰南極崔駰頌夀如南極子孫千億晉書天文志老人一星在弧南一曰南極常以秋分之旦見於景春分之夕沒于丁見則治平主夀昌詩維北有斗淮南子北斗之神有雌雄雄左行雌右行星經北斗星謂之七政天之諸侯亦謂帝車魁四星為璇璣杓三星為玉衡齊七政斗為人君號令之主五雲多處是三台周禮春官保章氏以五雲之物辨吉凶水旱降豐荒之祲象庾信華林園馬射賦正繪五彩之雲壺寧百福之酒論衡山大者雲多沈佺期詩泉臨香澗落峯入翠雲多晉書天文志三台六星兩兩而居起文昌列抵太微一曰天柱三公之位也在人曰三公在天曰三台主開德宣符也西近文昌二星曰上台主夀次二星曰中台主宗室東二星曰下台主兵趙子櫟注南極一星謂李祕書北斗指長安三台指杜相公劉長卿獻淮寧軍節度使李相公唐書方鎮表大厯十四年淮西節度使復治蔡州是年賜號淮寧軍建牙吹角不聞喧南史宋孝武帝紀建牙於軍門是時多不悉舊儀有一翁班白稱少從武帝征伐因使指揮事畢忽失所在潘嶽關中詩桓桓梁征髙牙乃建南史張興世傳興世父仲子嘗謂興世曰我雖田舍老公樂聞鼓角可送一部行田時欲吹之徐陵太極殿銘帝旅無喧王旗斯謐王胄詩當歌寂不喧三十登壇衆所尊世說摯瞻曽作四郡太守大將軍户曹參軍復出作內史年始二十九嘗别王敦敦謂瞻曰卿年未三十已為萬石亦太蚤瞻曰方于將軍少為太蚤比之甘羅已為太老史記淮隂侯傳贊相國深薦策拜登壇虞世南詩上將三略逺元戎九命尊家散萬金酬士死史記平原君傳家之所有盡散以饗士得敢死之士三千人又留侯世家不愛萬金之資為韓報讐强秦管子吳王好劍而國士輕死身留一劒答君恩史記孟嘗君傳馮先生甚貧猶有一劍耳晉書張華傳華補豫章令雷煥為豐城令煥到縣掘獄屋基得一石函中有雙劍並刻題一曰龍泉一曰太阿遣使送一劒與華佩詩天子萬年疏臣䝉君恩無以報答故願君長夀而已漁陽老將多回席漢書地理志漁陽郡秦置後漢書吳漢傳漁陽上谷突騎天下所聞也唐書地理志薊州漁陽郡開元十八年析幽州置漢書髙帝紀項羽願與沛公西入關懷王諸老將皆曰羽所過無不殘滅不如更遣長者又灌夫傳丞相娶燕王女為夫人有太后詔召列侯宗室皆往賀酒酣武安起為夀坐皆避席伏已魏其侯為夀獨故人避席耳餘半膝席魯國諸生半在門漢書地理志魯國屬豫州伯禽所封又儒林傳髙皇帝誅項籍引兵圍魯魯中諸儒尚講誦習禮絃歌之聲不絶史記叔孫通傳通徵魯諸生三十餘人資治通鑑狄仁傑嘗薦姚元崇桓彥範敬暉等數十人卒成反正之功或謂仁傑曰天下桃李悉在公門矣白馬翩翩春草緑詩有客有客亦白其馬魏志公孫瓉傳瓉為遼東屬國長史長乘白馬又選數十白馬為騎士號曰白馬義從袁淑詩劍騎何翩翩鮑照詩獸肥春草短沈炯詩草纎纎而垂緑邵陵西去獵平原春秋楚屈完來盟于師盟于召陵注召陵潁川縣也按邵古作召唐書地理志武德四年以郾城邵陵北舞西平置道州貞觀元年州廢省邵陵西平入郾城隸蔡州明一統志郾城縣在許州城南一百二十里召陵城在郾城縣東四十五里春秋盟于召陵即此公羊敗狄于太原傳上平曰原下平曰隰司馬相如子虛賦楚有平原廣澤遊獵之地虞世南詩揚桴上隴坂勒騎下平原自夏口至鸚鵡洲夕望嶽陽寄源中丞明一統志夏口在武昌府荆江之中正對沔口唐稱鄂州為夏口本在江北自孫權取對岸為夏口而江北之名始晦水經注江水又東徑江之右岸當鸚鵡洲一統志湖廣武昌府鸚鵡洲在府城南按嶽陽今嶽州府也源中丞一作元漢書百官表御史大夫有兩丞一曰中丞在殿中蘭臺掌圖籍外督部刺史內領侍御史受公卿奏事汀洲無浪復無烟楚辭搴汀洲兮杜若將以遺兮逺者柳惲詩汀洲採白蘋日暖江南春徐陵頌四海無浪三階已平梁元帝螢火詩著人疑不熱集草訝無烟江總詩石瀨乍深淺崖烟遞有無楚客相思益渺然左傳楚客聘于晉過宋太子知之請野享之江淹詩楚客心悠哉晉書嵇康傳吕安與康友每一相思輒千里命駕虞世南詩結友一言重相思千里至江淹詩渺然萬里遊漢口夕陽斜度鳥明一統志湖廣漢陽府漢口在大别山北即漢水與溳水合流入於大江處詩度其夕陽爾雅山西曰夕陽注暮乃見日庾信詩拱積行雲礙憣搖度鳥驚虞騫詩澄潭寫度鳥空嶺應鳴猿洞庭秋水逺連天戰國策秦與楚戰大破之取洞庭五渚水經注洞庭湖廣員五百餘里日月若出沒其中明一統志湖廣嶽州府洞庭湖在府城西南莊子秋水時至百川灌河沈約攜手曲斜簪映秋水開鏡比春粧後漢書光武帝紀旗幟蔽野埃塵連天孤城背嶺寒吹角庾信文月暈孤城塵驚虛援楊素詩荒塞空千里孤城絶四鄰梁元帝庾承先銘風翻嶺背月下松西通禮儀纂蚩尤與黃帝戰帝命吹角作龍鳴以禦之軍中製之以司昏曉南史王敬則傳敬則臨淮人母為女巫嘗謂人曰敬則生時胞衣紫色應得鳴鼓角人笑之曰汝子得為人吹角可矣後封尋陽郡公獨樹臨江夜泊船古樂府獨樹不成林王褒詩平原看獨樹亭臯望别村謝靈運詩臨江遲來客庾信賦誅茅宋玉之宅穿徑臨江之府隋書李安傳平陳之役安率蜀兵東下謂諸將曰水戰非北人所長今陳人依險泊船必輕我而無備以夜襲之可破也賈誼上書憂漢室漢書賈誼傳誼以為漢興二十餘年當改正朔易服色制度定官名興禮樂天子議以誼任公卿之位絳灌之屬盡害之乃毁誼天子疏之以誼為長沙王太傅既以適去意不自得度湘水為賦以弔屈原注適音謫戰國策說秦王書十上而說不行魯靈光殿賦瑞我漢室永不朽兮長沙謫去古今憐漢書五行志故為人所羡今為人所憐全唐詩話劉長卿字文房以祠部員外郎為轉運使判官吳仲孺誣奏貶播州南巴尉唐汝詢解此長卿被謫入楚以賈生自慰也觀校獵上淮西相公周禮校人掌王田獵之馬漢書成帝紀大校獵注校獵者大為闌校以遮禽獸而獵取也唐書方鎮表上元二年淮南西道節度使增領陳鄭潁亳汴宋曹徐泗九州徙治安州號淮西十六州節度使龍驤校獵邵陵東晉書五行志孫皓天紀中童謠曰不畏岸上獸但畏水中龍武帝聞之加王濬龍驤將軍車武子秦書苻堅與苻健入關堅時年十二未有位號健夢有天神遣使者拜堅為龍驤將軍後加此官以應神夢左思吳都賦命官師而擁鐸將校獵乎具區劉孝威詩材官足校獵凉秋戲射熊漢書地理志汝南郡縣召陵注即齊桓公伐楚次于召陵者也野火初燒楚澤空戰國策楚王遊于雲夢結駟千乘旌旗蔽天野火之起也若雲霓髙士傳焦先嘗結草為廬于河之湄其後野火燒其廬先因露寢遭冬雪大至袒卧不移司馬相如子虛賦臣聞楚有七澤嘗見其一未觀其餘也臣之所見蓋特其小小者耳名曰雲夢師事黃公千載後史記田單傳單令城中人曰當有神人為我師有一卒曰臣可以為師乎因反走田單乃起引還東鄉坐師事之又留侯世家張良遊下邳圯上有一老父至與良期後五日㑹此出一編書曰讀此為王者師後十三年見濟北穀城山下黃石即我矣庾信宇文盛志銘授圖黃石不無師表之心學劍白猿遂得風雲之志何妥詩小臣屬千載時幸預簪纓身騎白馬萬人中淮南子將軍不敢騎白馬魏志龎德傳德嘗乘白馬時謂之白馬將軍晉書五行志嘉平中有謠曰白馬素羈西南馳其誰乘者朱虎騎淮南子智過萬人者謂之英王粲詩連舫踰萬艘帶甲千萬人笳隨晚吹吟邊草顔延之七斁視華鼓之繁桴聽邊笳之嘶囀江淹賦吟燕笳而坐悲王勃與蜀城父老書輕蟬送夏驚晚吹於風園伏知道詩三更夜警新橫吹獨吟春吳邁逺胡笳曲邊風落裒草箭沒寒雲落塞鴻史記李廣傳廣出獵見草中石以為虎而射之中石沒鏃庾肩吾詩寒雲間石起秋葉下山飛徐陵詩角弓連兩兔珠彈落雙鴻梁昭明太子九月啓紫塞蒼鴻追風光而結陳三十擁旄誰不羡古樂府陌上桑三十侍中郎班固涿邪山祝文杖節擁旄鉦人伐鼓虞羲詩擁旄為漢將汗馬出長城周郎少小立竒功吳志周瑜傳孫策親自迎瑜授建威中郎將即與兵二千人騎五十匹瑜時年二十四吳中皆呼為周郎孫權討江夏瑜為前部大督曹公入荆州將士皆懼瑜曰請得精兵三萬人進駐夏口保為將軍破之乃取䝉衝鬭艦數十艘實以薪草膏油灌其中裹以帷幕同時發火延燒岸上營落人馬燒溺死者甚衆軍遂敗退還曹植樂府少小去鄉邑揚聲沙漠垂沈炯詩自言居漢世少小見豪雄漢書陳湯傳湯為人多策謀喜竒功錢起贈闕下裴舍人二月黃鶯飛上林蕭子顯詩二月春心動武平一詩黃鶯未解林間囀王維詩黃鶯弄不足銜向玉階飛詩黃鳥于飛吳均詩黃鸝飛上林漢書武帝元鼎二年初置上林苑又枚乘傳修治上林雜以離宫三輔故事上林苑連綿四百餘里春城紫禁曉隂隂王維詩疏雨過春城謝莊文收華紫禁文選注王者之宫以象紫微故名紫禁李嶠詩白玉仙輿紫禁來駱賔王詩城闕千門曉謝朓詩紫殿肅隂隂長樂鐘聲花外盡三輔黃圖長樂宫本秦之興樂宫也髙皇帝始居櫟陽七年長樂宫成徙居長安城西都賦自未央而連桂宫北彌明光而亘長樂禮記鐘聲鏗鏗以立號劉孝威詩鐘聲猶未絶李嶠詩羽騎參差花外轉沈佺期詩長樂宵鐘盡龍池柳色雨中深唐書禮樂志帝賜第隆慶坊坊南之地忽變為池帝即位作龍池樂以歌其祥沈佺期詩龍池躍龍龍已飛何遜詩輕烟滲柳色李白詩柳色黃金嫩王維詩雨中春樹萬人家陽和不散窮途恨史記時在中春陽和方起劉長卿詩草樹得陽和晉書阮籍傳籍時率意獨駕不由徑路車迹所窮輒慟哭而返鮑照詩窮途悔短計李白詩夜光抱恨良歎悲霄漢長懸捧日心賈謐詩青青寒雲上拂丹霄詩倬彼雲漢謝靈運詩結念屬霄漢江淹詩旌心徒自懸魏書程昱少時常夢兩手捧日昱私異之以語荀彧彧以白太祖太祖曰卿當終為吾腹心唐太宗詩心隨朗日髙獻賦十年猶未遇王維詩聞道甘泉能獻賦懸知獨有子雲才後漢書張衡傳作兩京賦以諷諫十年乃成袁宏三國名臣贊序未遇伯樂則千載無一驥羞將白髮對華簪杜甫詩羞將短髮還吹帽南史范縝傳縝年二十九髮白皓然乃作白髮詠以自嗟謝靈運詩星星白髮垂陶潛詩聊用忘華簪張九齡詩安用叨華簪宴曹王宅唐書列傳王名臯字子蘭天寶十一載嗣封由左司禦兵曹參軍纍遷江西節度使卒贈尚書左僕射諡曰成賢王駟馬退朝初孟子古之賢王好善而忘勢杜甫詩許與必詞伯賞遊實賢王蔡雍獨斷法駕有五色安車五色立車各一皆駕駟馬楚辭霾兩輪兮縶駟馬杜甫詩退朝花底散小苑三春帶雨餘庾信春賦停車小苑連騎長楊李頎詩小苑蔔萄花滿枝琴賦三春之初麗服以時乃攜友生以遨以嬉王褒詩秋風帶雨餘庾肩吾詩雲歸帶雨餘林沼蔥蘢多貴氣庾信卭竹杖賦摘芳林沼行樂軒除李頎詩松篁氣蔥蘢後漢書光武帝紀氣佳哉鬱鬱蔥蔥然沈佺期詩邸第樓臺多氣色杜甫詩門䦨多喜氣樓臺隱映接天居盧懷慎詩樓臺影就波中出裴㴶詩樓臺直與紫微通劉孝威詩堂皇更隱映蔡雍賦皇家赫赫而天居鮑照舞鶴賦仰天居之崇絶王維詩雲館接天居仙雞引敵穿紅藥本集仙雞詩序繁峙義興鎮酒家韓氏畜一雞以善鬬雄其鄉一日敵家以藥飼雞求與韓雞鬬韓雞被傷一賣藥道人過其門曰吾能活此韓欣然使療之雞果復生作仙雞詩以記之傅奕鬬雞賦或徉背而引敵杜甫詩穿花蛺蝶深深見謝朓詩紅藥當階翻宫燕銜泥落綺疏鮑照樂府猶勝吳宫燕古詩忽為雙飛燕銜泥巢君屋薛道衡詩空梁落燕泥李尤東觀銘綺疏外陳陸雲登臺賦綺疏列於東序玉篇綺疏窗也自歎平生相識願南史馬先琕傳大丈夫為時所知當進不求名退不逃罪乃平生願也陳子昂詩孤負平生願左傳吳季札聘于鄭見子産如舊相識杜甫詩佳士欣相識何如今日厠應徐曹植詩今日同堂庾肩吾