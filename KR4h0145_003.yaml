body:
  text: 欽定四庫全書御選唐詩目録下卷二十六五言絶句太宗皇帝詠弓賦得臨池栁於太原召侍臣賜宴守嵗詠燭賦得臨池竹探得李明皇帝潼關口號千秋節賜羣臣鏡續薛令之題壁文宗皇帝宫中題虞世南蟬蘇頲山鷓鴣詞汾上驚秋楊師道奉和詠弓蕭德言詠舞上官儀入朝洛隄步月王勃夜興他鄉敘興早春野望登城春望王適江濱梅盧照鄰浴浪鳥韋承慶江樓李乂元日恩賜柏葉應制閻朝隱奉和登驪山應制武平一遊涇川琴溪宋之問詠省壁畫鶴盧僎題殿前桂葉裴延詠剪花張説奉裴中書酒九日進茱萸山詩五首元萬頃春日池臺杜甫即事客中作絶句絶句六首王維鳥鳴澗蓮花塢鹿柴臨湖亭南垞欒家瀨北垞竹里館闕題崔國輔少年行裴迪華子岡茱萸沜欹湖孟浩然北澗泛舟春曉送朱大入秦元結石宫四詠王之渙登鸛鵲樓李白陪從祖濟南太守泛鵲山湖三首自遣夏日山中獨坐敬亭山紫藤樹劉方平采蓮儲光羲江西曲四首王昌齡朝來曲丘為左掖梨花賈至白馬祖詠終南山望餘雪陸海題奉國寺題龍門寺顔真卿夜集聯句太上隱者答人錢起竹間路江行無題二首竹嶼戲鷗石上苔池上亭劉長卿送靈徹上人郎士元山中即事戴叔倫泊湘口關山月題天柱山圖皇甫冉同李三月夜作山館顧况洛陽陌二首山中夜宿江上韋應物詠水精詠珊瑚詠琉璃詠琥珀秋夜題桐葉韓愈新亭稻畦鏡潭贈同遊裴度溪居韋處厚桃塢胡盧沼盤石磴張仲素宫中樂五首春遊曲王涯春江曲嚴維送人入金華白居易遺愛寺太平樂詞小曲新詞二首池西亭池上二首早秋獨夜題翰林東閣前小松劉禹錫庭竹題壽安甘棠館二首張籍胡蘆沼岸花宿雲亭施肩吾瀑布權德輿夏至日作王涯遊春曲二首令狐楚宫中樂五首遊春詞三首劉長卿湘妃怨逢雪宿芙蓉山朱慶餘重陽宴百花亭朱放題竹林寺宫詞卷二十七五言絶二張起春情雍裕之蘆花楊衡題花樹鮑溶山居盧同新月王建江館晚蝶劉商古意劉禹錫秋風引韓翃漢宫曲司空曙晚思許渾雨後思湖上居聞歌思天台李羣玉靜夜相思池塘晚景崔道融江村杜牧盆池有寄陸龜蒙江行皮日休間夜酒醒芳草渡司空圖偶題獨望河上即事借居孟遲題嘉祥驛唐彥謙春雪初霽杏花正芳月夜間吟裴夷直前山項斯江村夜泊杜荀鶴釣叟盧肇御溝水朱景玄雙櫧亭崔元瀚雨中對後簷叢竹成彥雄江上楓村行薛濤月楊師道中書寓直詠雨駱賓王於易水送人送别李嶠中秋月二首李白靜夜思渌水曲玉階怨秋浦歌觀放白鷹杜陵遊洞庭二首王維雜詩别輞川辛夷塢崔國輔古意採蓮孟浩然宿建德江儲光羲關山月王昌齡送李十五答武陵田太守題僧房裴迪木蘭柴孟浩然白石灘高適咏史田家春望送别劉長卿平蕃曲送張十八歸桐廬錢起題崔逸人山亭江行無題二首韋應物秋夜寄丘二十二員外盧綸和張僕射塞下曲答韋蘇州戴叔倫三閭廟栁中庸江行張仲素春閨令狐楚長相思北樓栁宗元江雪曉張籍梅溪白居易江樓聞砧李德裕題羅浮石賈島尋隱者不遇張碧幽思溫庭筠碧澗驛曉思裴度送别崔國輔怨辭長信草洛陽道中作孟浩然訪袁拾遺不遇儲光羲洛陽道二首韓偓效崔國輔體三首武瓘感事薛瑩秋日湖上潘佐送人往宣城張旭清溪泛舟吳筠題華山人所居貫休月夕錢起江行二首王維斤竹嶺李白秋浦歌王勃林塘懷友李白白鷺鷥虞世南春夜白居易秋中夜坐王勃春莊王績夜還東溪裴迪北垞東方虬春雪司空圖即事徐凝廬山獨夜李羣玉題竹錢起江行岑參題梁鍠城中高居李嶠風朱郴丹陽作靈徹天姥岑望天台山王建小松司空曙黃子陂李商隱微雨夏侯子雲藥圃雍裕之山中桂司空圖早朝施肩吾秋山吟朱景玄蓮亭錢起逢俠者朱景玄中峯亭錢起江行三首溫庭筠嘲三月十八日雪韓愈竹溪錢起江上曉行二首朱景玄四望亭徐凝香爐峯錢起江行鞠信陵長安道崔道融牧豎司空圖獨坐孟浩然戲題許渾早春懷江南李白秋浦歌張籍桃塢張喬夜漁景龍文館學士流杯池三首皇甫冉沅江夜入湖陳叔達菊白居易山下宿趙嘏寒塘韋應物善福寺閣楊凝送客往洞庭裴夷直方丈泉韋莊春早上官昭容遊長寧公主流杯池錢起江行張仲素聖明樂盧照鄰宿元武蓋嘉運陸州歌楊嗣復崑崙子六言絶句王維田園樂劉長卿發越州赴潤州使院留别鮑侍御皇甫冉小江懷靈一上人問季二司直所居雲山補編五言絶句王維文杏館木蘭柴裴迪斤竹嶺李收幽情皇甫冉送客劉方平春雪戴叔倫松鶴李益鷓鴣詞楊凌送客往睦州聶夷中田家卷二十八七言絶句一明皇帝過大哥山池題石壁題梅妃畫真傀儡吟德宗皇帝九日絶句趙彥伯從宴桃花園詠桃花應制劉憲奉和聖製遊苑遇雪應制徐彥伯上已祓禊渭濱應制崔液上元夜二首盧照鄰登封大酺歌沈佺期夜宴安樂公主宅奉和春日玩雪應制宋之問苑中逢雪應制李華春行寄興賀知章采蓮賈至春思張説奉和三日祓禊渭濵應制儲光羲題茅山華陽洞同武平一員外遊湖二首岑參山房即事常建塞下曲三日尋李九莊張潮采蓮詞王維寒食泛上作與盧員外象過崔處士興宗林亭送元二使安西戲題盤石張旭桃花溪劉長卿昭陽曲張旭山行留客劉長卿過鄭山人所居張旭春遊值雨王昌齡李倉曹宅夜飲春宫曲宴春源西宫春怨芙蓉樓送辛漸采蓮曲杜甫絶句贈花卿李白送孟君之廣陵峨眉山月歌春夜洛陽聞笛客中作望廬山瀑布清平調三首早發白帝城蘇臺覽古秋下荆門上皇西巡南京歌東魯門泛舟與史郎中欽聽黃鶴樓上吹笛望天門山盧綸裴給事宅白牡丹宋雍春日崔惠童宴城東莊錢起與趙莒茶宴春郊盧綸山店郎士元柏林寺南望戴叔倫題友人山居贈鶴林上人李涉題開聖寺羊士諤登樓韓翃羽林少年行二首寒食看調馬宿石邑山中江南曲送齊山人歸長白山顧况山僧蘭若韋應物登樓寄王卿陳羽戲題山居二首伏翼西洞送人韓愈酬王二十舍人涯雪中見寄早春呈水部張十八員外于鵠舟中月明夜聞笛題合溪乾洞盧同逢鄭三遊山卷二十九七言絶句二白居易晚秋間居題窗竹苦熱題恆寂師禪室過鄭處士畫木蘭花圖寄元郎中暮江吟思婦眉採蓮曲鄰女竹樓宿楊家南亭舟中夜坐家園三首元稹晚春竇庠金山寺竇鞏秋夕襄陽寒食寄宇文籍徐凝和嵩陽客月夜憶上清人廬山瀑布再歸松溪舊居宿西林歐陽詹題延平劍潭劉商題道濟上人房施肩吾秋夜山居二首遇醉道士武元衡春興春日偶作郊舍寓目王建十五夜望月宫詞馬逢宫詞張籍與賈島間遊秋思寄李渤尋仙朱慶餘題仙遊寺王涯獻壽詞遊春詞二首秋思二首令狐楚望春詞二首楊巨源宫燕詞和練秀才楊栁贈崔駙馬張繼楓橋夜泊權德輿戲贈天竺靈隱二寺寺主舟行夜泊題崔山人草堂雜興三首陸暢遊城東王駙馬亭題獨孤少府園林劉文史樂府贈成鍊師李翺贈藥山高僧惟儼趙嘏再贈賈島夏夜宿上谷開元寺夜期客不至嚴維丹陽送韋參軍司空曙江村即事王涯漢苑行張仲素漢苑行二首楊凌秋原野望春霽花萼樓南聞宫鶯長孫佐輔尋山家沈亞之題候仙亭蘇郁步虛詞劉禹錫洛中春末送杜録事赴蘄州李商隱宿駱氏亭寄懷崔雍崔衮常娥無題初食笋呈座中李羣玉南莊春晚引水行題王侍御宅江南紫極宫齋後韓偓醉著野塘寄鄰莊道侣卷三十七言絶句三溫庭筠河中紫極宫鄭谷曲江春草雪中偶題街西晚歸韋莊鄜州遇寒食城外醉吟幽居春思杜荀鶴溪興趙嘏尋僧江樓書感李侍御歸炭谷山居同宿華嚴寺李拯退朝望終南山裴夷直夜意薛能老圃堂宋氏林亭杜牧朱坡江南春長安晴望贈朱道靈清明漢江山行秋夕陳陶朝元引二首竹李郢南池洞靈觀流泉聽劉尊師彈琴陸龜蒙自遣詩三首懷宛陵舊遊和襲美春夕陪崔諫議櫻桃園宴雍陶韋處士郊居城西訪友人别墅崔塗放鷓鴣喻鳧憶友胡曾西園武陵溪曹唐小遊仙詩四首劉得仁村中間步馬戴寄雲臺觀田秀才崔道融郊居友人相訪秋霽高駢山亭夏日杜小山寒夜羅鄴雞冠花崔鉉詠架上鷹吳仁璧南徐題友人郊居薛逢定山寺鄭畋夜景又作趙璜曲江上已錢珝未展芭蕉唐求庭竹題常樂寺滕潛鳳歸雲紇干著灞上陳寡言山居李九齡山中寄友人左偃夜泊江上靈一題五僧院宿靜林寺李嶠奉和聖製幸韋嗣立山莊應制李乂奉和幸韋嗣立山莊侍宴應制李白贈汪倫王昌齡左遷龍標尉遙有此寄陪族叔刑部侍郎曄及中書舍人賈至遊洞庭湖王昌齡甘泉歌送别魏二張説奉和聖製同玉真公主遊大哥山池題石壁王昌齡西宫秋怨王維九日憶山東兄弟常建送宇文六除夜作李頎寄韓鵬張謂送盧舉使河源卷三十一七言絶句四王之渙涼州詞劉長卿尋盛禪師蘭若錢起歸雁暮春歸故山草堂晚過橫灞寄張藍田韋應物登寶意寺上方舊遊盧綸曲江春望郎士元夜泊湘江聽鄰家吹笙顧况江上故居戎昱移家别湖上亭于鵠泛舟入後溪王涯宫詞王建宫詞四首張仲素天馬詩李涉春晚遊鶴林寺寄使府諸公竇鞏尋道者隱處不遇白居易宿西林寺杜牧寄揚州韓綽判官宣州開元寺許渾客有卜居不遂謝亭送别溫庭筠瑤瑟怨咸陽值雨雍陶天津橋春望和孫明府懷舊山高駢訪隱者不遇王駕社日晴景韋莊金陵圖陳羽小江驛送陸侍御賈至答嚴大夫羅鄴公子行岑羲夜宴安樂公主宅張説送梁六自洞庭作李白永王東巡歌越中覽古王昌齡長信秋詞王維少年行賈至西亭春望送李侍郎赴常州杜甫漫興孟浩然濟江問舟子張潮贈秦糸錢起送崔山人歸山送趙冽歸襄陽韋應物答東林道士春思滁州西澗韓翃漢宫曲贈張千牛題玉真觀李祕書院沈佺期和聖製幸韋嗣立莊應制宋之問送司馬道士遊天台賀知章回鄉偶書二首王翰涼州詞李白長門怨山中問答陪族叔刑部侍郎曄及中書賈舍人至遊洞庭登廬山五老峯王昌齡長信秋詞閨怨采蓮曲觀獵送朱越岑參封大夫破播仙凱歌四首虢州後亭送李判官使赴晉絳草堂村尋人不遇寄孫山人高適塞上聽吹笛綦毋潛過上人蘭若元結欵乃曲劉長卿送李判官之潤州行營瓜州驛送梁郎中酬李穆見寄皇甫冉送魏十六還蘇州寄振上人無礙寺所居赴李少府山莊失路卷三十二七言絶句五皇甫曾韋使君宅海榴咏秦系山中贈耿湋拾遺戎昱寄許鍊師衛象古意戴叔倫宿灌陽灘送吕少府李益早度破訥沙臨滹沱見蕃使列名夜上受降城聞笛從軍北征劉禹錫隄上行二首楊栁枝詞宿都亭有懷與歌者何戡烏衣巷張籍玉山館别客秋山王建華清宫王涯宫詞三首張仲素秋雨曲上官昭容遊長寧公主宅流杯池吳商浩秋塘晚望法振送友人之上都曹唐題武陵洞花蕊夫人宫詞武元衡陌上暮春陳羽遊洞靈觀白居易竹枝詞鮑溶贈楊鍊師張祜瓜州聞曉角朱慶餘西亭晚宴李商隱夜雨寄北訪隱者不遇憶住一師東還杜牧赤壁洛陽秋夕許渾緱山廟送宋處士歸山寄桐江隱者薛逢題黃花驛薛能折楊栁項斯涇州聽張處士彈琴杜荀鶴題新雁方干東陽道中作崔塗感花劉長卿東湖送朱逸人歸王建江陵道中朱慶餘過耶溪杜牧念西遊陸龜蒙繡嶺宫貫休馬上行陸龜蒙懷錫山藥名離合牡牧江許渾守風淮隂李羣玉寄友唐彥謙賀李昌時禁苑新命張蠙龜山寺晚望徐寅初夏戲題李賀南園吉師老鴛鴦唐彥謙野竹韋莊稻田無名氏粉箋題詩杜甫解悶裴夷直晚涼薛能折楊栁獨孤及垂花塢醉後戲題并序顧况宫詞韓愈蒲萄張祜櫻桃李商隱雞薛濤酬雍才貽巴峽圖楊巨源灞岸栁城東早春鮑溶漢宫詞施肩吾春日餐霞閣雍陶春詠李羣玉書院二小松胡釘鉸小兒垂釣孫魴楊栁枝詞郎士元贈強山人陳羽過櫟陽山溪王建野池鮑溶答客方干題畫建溪圖徐彥伯從宴桃花園劉商題潘師房合溪水漲寄敬山人李約江南春張祜題勝上人山房儲嗣宗山泉周朴桃花王逢原送春補編賀知章詠栁王昌齡别辛漸韋應物寒食寄京師諸弟岑參赴北庭度隴思家劉方平夜月顧况安仁港口望仙人城戎昱早梅旅次寄湖南張郎中盧綸曲江春望楊凝送客入蜀李涉潤州聽暮角李商隱代祕書贈𢎞文館諸校書臣等謹案御選唐詩三十二卷聖祖仁皇帝選定命儒臣纂輯注釋仍悉奉睿裁鑒訂故典核詳盡無纎悉之憾其例别體分類凡五言古六卷七言古三卷五言律七卷七言律七卷排律二卷五言絶句附六言絶句二卷七言絶句五卷於作者姓氏略載其爵里行厯於詩則逐句箋釋分注行間悉引他書旁推互證不加疏解並用李善注文選例也乾隆四十六年四月恭校上總纂官臣紀昀臣陸錫熊臣孫士毅總校官臣陸費墀
