記衡山有懸泉滴瀝巖間泠泠如絃吳均書泉水激石泠泠作響錢起江行細竹漁家路水經注析城山不生草木數十步外多細竹史記龜䇿傳泉陽令使案籍視圖水上漁者五十餘家晴陽照結罾易結繩而為網罟說文罾魚網喜來邀客坐分與折腰菱謝朓樂府玊杯邀上客酉陽雜俎武陵記言三角曰菱兩角曰芰今吳中折腰菱多兩角張仲素聖明樂九陌祥烟合三輔舊事長安有八街九陌梁簡文帝頌泛祥烟於五部又詩溶溶紫烟合千春瑞月明梁簡文帝詩千春誰與樂丘遲詩千春長不移徐陵詩烟雲表色日月呈瑞宋武帝詩靄靄月初明宫花將苑栁趙彥昭詩宫樹千花發三輔舊事漢苑中有栁狀如人形先發鳯皇城梁簡文帝詩春色映空來先發院邊梅盧照鄰詩春滿鳯皇城盧照鄰宿𤣥武方池開曉色唐太宗詩池開照膽鏡梁簡文帝曲河開向曉光圓月下秋隂江淹詩秋至明月圓顔延之文晨烟暮靄春煦秋隂已乘千里興魏武帝詩老驥伏王櫪志在千里晉書徽之傳徽之居山隂夜雪初霽月色清朗忽憶戴逵逵時在剡便乘小船詣之經宿方至造門不前而返人問其故曰乘興而來興盡而反何必見安道耶還撫一絃琴王粲詩獨夜不能寐攝衣起撫琴陸機詩安處撫清琴水經注仙者孫登嵇叔夜嘗遇之于山彈一絃琴而五聲和蓋嘉運陸州歌按此詩唐詩韻滙作蓋嘉運詩郭茂倩樂府收入近代曲辭即王維終南山五律而逸其半注己見第十三卷分野中峯變隂晴衆壑殊欲投人處宿隔浦問樵夫楊嗣復崑崙子按此詩郭茂倩樂府收入近代曲辭即王維從岐王過楊氏别業五律而逸其半注己見第十四卷楊子談經去去一作處淮王載酒過醉來啼鳥換換一作緩坐久落花多六言絶句王維田園樂桃紅復含宿雨謝靈運詩原隰荑緑栁墟囿散紅桃梁元帝詩栁葉帶風轉桃花含雨開江總詩宿雨潤條枝栁緑更帶朝烟孫綽詩緑栁䕃坂王阮詩野曠易得月谷虛常帶烟唐太宗詩宿霧足朝烟花落家童未掃謝朓詩鳥散餘花落梁元帝詩池紅早花落水緑晚苔生史記季布傳并與其家童數十人之魯朱家所賣之劉令嫺詩落花掃更合鶯啼山客猶眠梁簡文帝詩鶯啼春欲駛郭璞詩長揖當塗人去來山林客劉長卿發越州赴潤州使院留别鮑侍御對水看山别離庾肩吾詩看山通迥枝楚辭悲莫悲兮生别離孤舟日暮行遲陶潜歸去來辭或命巾車或棹孤舟左傳日云暮矣沈約詩佇立日己暮詩行道遲遲江南江北春草栁惲江南曲汀洲採白蘋日落江南春宋之問詩鄉連江北樹雲斷日南天謝靈運詩萋萋春草生王孫遊有情獨向金陵去時晉書王導傳建康古之金陵舊為帝里唐書地理志武德三年更江寧曰歸化八年更歸化曰金陵一統志楚威王初置金陵邑因其地有王氣埋金以鎮之皇甫冉小江懷靈一上人品彚靈一越中雲門寺律師持律甚嚴尤善聲詩與劉長卿皇甫冉嚴維相倡和江上年年春早吳均詩風起秋江上李嶠汾隂行不見只今汾水上唯有年年秋雁飛杜甫詩衡霍生春早津頭日日人行漢書賈山傳直與之日日射獵論語三人行必有我師焉借問山隂逺近江總詩借問藏書處世說王子敬云從山隂道上行山川自相映發使人應接不暇唐書地理志越州㑹稽郡山隂縣武德七年析㑹稽置猶聞薄暮鐘聲左傳季康子伐邾及范門猶聞鐘聲廣雅日將落曰薄暮問季二司直所居雲山唐書百官志司直六人從六品上掌出使推按門外水流何處史記陳丞相世家家乃負郭窮巷以弊席為門然門外多長者車轍張華詩俯臨緑水流崔皓詩日暮鄉關何處是天邊樹繞誰家劉孝綽詩天邊生岸影水上結雲隂范雲詩水樹繞蟠枝李白詩誰家玉笛暗飛聲山色東西多少王維詩江流天地外山色有無中楚辭水波逺以冥冥兮眇不覩其東西孟浩然詩花落知多少朝朝幾度雲遮宋玉賦朝朝暮暮陽臺之下梁簡文帝詩緑葉朝朝黃紅顔日日異李白詩不向東山久薔薇幾度花杜甫詩浮雲薄漸遮御選唐詩卷二十七
