body:
  text: 欽定四庫全書御選唐詩卷二十七五言絶句張起爵里無考春情畫閣餘寒在梁簡文帝詩綺窗臨畫閣張說詩江上春來早可觀巧將春物妬餘寒新年舊燕歸張說詩唯願聖君無限壽長取新年續舊年鮑照雙燕詩悲歌辭舊愛梅花猶帶雪梁簡文帝詩絶訝梅花晚爭來雪裏窺庾信咏梅花詩不信今春晚俱來雪裏看江總詩梅花色向雪中明未得試春衣庾信賦冝春苑中春已歸披香殿裏作春衣雍裕之蘆花爾雅葭葦注即今蘆也詩正義葦之初生其名為葭稍大為蘆長成乃名為葦羣芳譜蘆一名為葦一名葭花名蓬蕽夾岸復連沙祖孫登詩弱栁垂江翠新蓮夾岸紅杜審言詩解紳宜就水張幕㑹連沙枝枝搖浪花庾信詩春色方盈野枝枝綻翠英梁元帝賦朝浮兮浪花夜集兮江沙月明渾似雪庾信舟中望月詩山明疑有雪岸白不關沙杜甫蒹葭詩暫時花戴雪江總碑花臺似雪無處認漁家杜甫詩桃源無處求王維詩樂府裁龍笛漁家伐釣竿楊衡字仲師吳興人初與苻載崔羣宋濟隱廬山號山中四友後登第官至大理評事詩一卷題花樹都無看花意偶到樹邊來何遜詩對影獨含笑看花時轉側劉希夷詩看花若有情倚樹疑無力太上隱者詩偶來松樹下髙枕石頭眠謝朓詩塘邊草雜紅樹際花猶白可憐枝上色一一為愁開杜甫詩春樹何曽歇寒花亦可憐何遜詩庭花枝上發新月霧中生王容詩大堤諸女郎一一皆春色鮑溶字德源元和進士第與韓愈李正封孟郊友善集五卷山居窈窕垂澗蘿曹攄詩窈窕山道深謝靈運詩側徑既窈窕環洲亦玲瓏洛陽伽藍記懸葛垂蘿能令風烟出入儲光羲詩澗淨緑蘿深䝉茸黃葛花謝朓詩霜晆紛綺錯秋町鬱䝉茸庾信啓永無黃葛之嗟方見青綾之重王績詩葛花消酒毒茰帶發羮香鴛鴦憐碧水詩鴛鴦于飛畢之羅之古樂府鴛鴦七十二羅列自成行梁昭明太子詩桂楫蘭橈浮碧水江花玉面兩相似房篆詩前溪流碧水後渚映青天照影舞金沙庾信詩歌聲上扇月舞影入琴絃蜀都賦金沙銀礫續博物志陶𢎞景云大茅山近東諸處碎石往往皆有金沙盧同范陽人隱少室山自號玉川子徴諫議不起韓愈為河南令愛其詩厚禮之詩三卷新月案古詩紀梁劉瑗新月詩通首俱同今亦見全唐詩仙宫雲箔卷南康記雩都縣有君山大風雨後聞絃歌其山謂之仙宫江淹詩列漢搆仙宫開天製寶殿劉孝威詩虬簷挂珠箔虹梁卷霜綃庾信詩玊押珠簾卷露出玊簾鈎拾遺記石虎于太極殿前起樓髙四十丈結珠為簾垂五色玉佩鏗鏘和鳴鮑照玩月詩始見西南樓纎纎如玊鈎清光無所贈江淹詩秋日懸清光常建詩松際露微月清光猶為君陶𢎞景詩只可自怡悅不堪持贈君相憶鳯皇樓梁武帝樂府寄語故情人知我心相憶晉宫閣名洛陽有鳯皇樓王僧孺詩嬴女鳯皇樓王建江館水面細風生杜甫詩春臺引細風淮南子虎嘯而谷風生菱歌慢慢聲楚辭涉江採菱發陽阿注楚人歌曲也謝靈運詩采菱調易急江南歌不緩唐詩紀事李白清平調詞李龜年歌之上親調玊笛以倚曲每曲遍將換則遲其聲以媚之客亭臨小市劉潜書暮宿客亭晨炊謁舍周禮地官質人大市以質小市以劑杜甫詩小市常爭米燈火夜粧明沈佺期七夕曝衣篇燈火灼爍九微映楊師道詩扇裏細粧將夜並風前獨舞共花榮晚蝶粉翅嫩如水埤雅蛺蝶粉翅有鬚一名胡蝶繞砌乍依風梁簡文帝詩回月臨窗度吟蠱繞砌鳴後漢書班超傳代馬依風梁簡文帝詠蝶詩復此從風蝶雙雙花上飛日髙山露解唐太宗詩心隨朗日髙志與秋霜潔鮑照詩山烟叠兮石露凝飛入菊花中徐防賦得蝶依草詩秋園花落盡芳菊數來歸劉孝綽詠素蝶詩出沒花中見劉商字子夏彭城人少好學工文善畫登大厯進士第官至檢校禮部郎中汴州觀察判官集十卷古意達曉寢衣冷陳書始陵王叔陵傳夜常不卧執燭達曉論語必有寢衣長一身有半集解今之被也開帷霜露凝說文在旁曰帷幔也隂鏗詩開帷傷隻鳯湛方生賦露凝結而為霜謝莊詩霜露凝晨感風吹昨夜淚潘嶽賦徑風戾而吹帷庾信賦朝光晃眼早風吹面蕭紀詩昨夜夢君歸何遜詩夜淚坐淫淫一片枕前氷庾信詩光如一片氷何遜詩枕前雙淚滴開元遺事貴妃初承恩召與父母相别泣涕登車時天寒淚結為紅氷劉禹錫秋風引何處秋風至庾信詩不知何處天邊禮記孟秋之月凉風至晏子春秋秋風至兮殫零落蕭蕭送雁羣史記荆軻傳風蕭蕭兮易水寒劉向九嘆秋風瀏以蕭蕭鮑照詩雁還風送秋孫逖詩歸情入雁羣朝來入庭樹世說西山朝來致有爽氣謝朓詩風入林而傷緑潘嶽賦庭樹槭以灑落兮王筠詩庭樹已先知孤客最先聞謝幼度詩孤客傷逝湍徐彥伯詩日夜流孤客孫萬壽詩客意慣風聲李陵書但聞悲風蕭條之聲顔延之詩隂蟲先秋聞韓翃漢宫曲駿馬繡障泥廣韻駿馬之俊埤雅相馬旁視見腹後視見足者駿馬也西京雜記武帝得二師天馬以緑地五色錦為蔽泥晉書王濟傳濟善解馬常乘一馬著連乾障泥前有水不肯渡濟曰此必是惜障泥解去便渡紅塵撲四蹄陽縉詩長楸廣路起紅塵陳後主紫騶馬蹀躞紅塵飛杜甫詩風入四蹄輕歸時何太晚陳後主紫騮馬揚塵歸上闌隂鏗詩還家何太晚日照杏花西梁簡文帝詩杏梁斜日照陽休之詩日照前窗竹周禮大司徙注西於土圭謂之日西是地於日為近西也司空曙晚思蛩吟窗下月埤雅蟋蟀隨隂迎陽一名吟蛩秋初生得寒乃鳴江洪秋風曲南籬寒蛩吟庭中無限月吳均詩夜月窺窗下草濕階前露蕭慤詩草濕蒹葭露謝朓詩何知白露下坐視階前濕晚景凄我衣陳後主詩晚景登髙臺庾信詩凄清臨晚景江逌賦微寒凄其薄人杜甫詩秋風淅淅吹我衣秋風入庭樹魏文帝詩秋風蕭瑟天氣凉栁惲詩秋風鳴細枝張正見詩飄風入徑枝曹植詩庭樹微消落吳均詩微風搖庭樹許渾雨後思湖上居前山風雨凉庾肩吾詩前山起黃葉易潤之以風雨梁簡文帝詩冷風雜細雨垂雲助麥凉歇馬坐垂楊庾信詩樹隂逢歇馬梁元帝詩垂楊拂砌塵何處芙蓉落劉長卿詩隨風飄向何處落爾雅疏江東人呼荷華為芙蓉說文芙之言敷也蓉之言動容也梁簡文帝詩棹動芙蓉落南渠秋水香鮑照芙蓉賦繞金渠之屈曲莊子秋水時至百川灌河陸厥詩秋水落芙蕖祖孫登詠水詩岸澗蓮香逺聞歌新秋絃管清張正見詩髙軒揚麗藻自是賦新秋張九齡詩園果讓新秋郭璞燕贊商人是頌詠之絃管孔德紹詩鈞天金石響洞庭絃管清時轉遏雲聲王維詩金杯緩酌清歌轉列子薛談學謳于秦青未窮青之技遂辭歸秦青弗止餞于郊衢拊節悲歌響遏行雲薛談乃謝求返終身不敢言歸曲盡不知處馬融賦曲終闋盡餘絃更興宋玊賦暗然而暝忽不知處月髙風滿城王昌齡詩未央前殿月輪髙盧照鄰詩寒辭楊栁陌春滿鳯皇城思天台支遁天台山銘余覽內經山記云剡縣東南有天台山一統志天台山在天台縣西一百一十里赤城雲雪深孔靈符㑹稽記赤城山內則有天台靈嶽玊室璿臺孫綽遊天台山賦赤城霞起而建標瀑布飛流以界道詩上天同雲雨雪氛氛張正見詩鷲嶺白雲深山客負歸心郭璞詩長揖當途人去來山林客嵇康詩內負宿心外恧良朋杜甫詩滿目飛明鏡歸心折大刀昨夜西齊宿李白詩昨夜東風入武陽南史蔡凝傳凝年位未髙而才地為時所重常端坐西齊自非素貴名流罕所交接月明琪樹隂子夜歌天髙星月明山海經崑崙之墟北有珠樹文玉樹玕琪樹天台山賦琪樹璀璨而垂珠北史魏收傳收折節讀書夏日坐板床隨樹隂諷誦李羣玉靜夜相思山空天籟寂王維詩夜靜春山空莊子汝聞人籟而未聞地籟汝聞地籟而未聞天籟王維詩夜禪山更寂水榭延輕凉崔湜詩水榭宜時涉拾遺記漢武帝息于延凉室魏文帝樂府冬被貂鼲溫暖夏服綺羅輕凉劉孝綽詩輕凉生筍席浪定一浦月莊子客刺船而去沿緣葦間孔子待水波定而後乘錢起詩潭空觀月定澗靜見雲多水經注鬱林南倉通壽泠即一浦也藕花間自香張籍詩秋風白藕花杜甫詩茵蔯春藕香梁元帝牛渚磯碑花飛拂袖荷香入衣池塘晚景風荷珠露傾謝朓詩風碎池中荷王融風賦韻珠露之參差陳後主詩涸浦如珠露韓愈詩荷折碧圓傾驚起睡鵁鶄祖珽詩時看逺鴻度乍見驚鷗起爾雅鳽鵁鶄注似鳬腳髙毛冠江東人家養之以厭火災枚乘七發鵷雛鵁鶄月落池塘靜陸厥詩雁起宵未央雲間月將落謝惠連詩池塘生春草金刀剪一聲錢起詩三軍版築脫金刀杜甫詩一聲何處送書雁崔道融荆州人以徴辟為永嘉令纍官右補闕避地入閩江村日暮片帆落王粲詩日暮遊西園沈約詩佇立日已暮李白詩疾風吹片帆日暮千里隔又帆落湖中天江村如有情謝朓詩曖曖江村見離離海上出虞騫詩長林帶朝夕孤嶺枕江村梁簡文帝賦如笙鳯之有情獨對沙上月梁元帝賦看白沙而似雪望却月而成眉張正見樂府對月想邊秋滿船人睡聲張九齡詩餘花滿客船劉禹錫詩世間人盡睡續仙傳夏侯隱登山渡水亦閉目美睡同行聞其鼻聲而不蹉趺人稱睡仙杜牧盆池鑿破蒼苔地論衡鑿地以為井李端詩重露濕蒼苔偷他一片天金華游録天池之裏有崖如兩扉而啓其一極黑暗中逺望石扉啓處天光下燭名一線天白雲生鏡裏詩英英白雲蔡凝詩春雲處處生南史宋文帝紀元嘉二十五年冬青州城南逺望見地中如水有影謂之地鏡邢劭甘露頌雲臨水鏡明月落階前阮籍詩薄帷鑒明月梁昭明太子詩月落林餘影杜甫詩階前樹拂雲有寄雲濶煙深樹李嶠賦霜盡川長雲平野濶令狐楚詩烟含苑樹深江澄水落秋謝朓詩澄江淨如練陳後主詩沙長見水落駱賔王詩風急夜江秋美人何處在詩有美一人楚辭送美人兮南浦沈約樂府所思竟何在明月萬山頭南史謝莊傳隔千里兮共明月李白詩輕舟已過萬重山杜甫詩時過北山頭陸龜䝉江行酒旗菰葉外孔融書天垂酒旗之曜庾肩吾詩黑米出菰葉樓影浪花中沈約詩可憐九層樓光影水上浮梁元帝賦朝浮兮浪花醉帆張數幅孫煒七引髙帆雲張後漢書馬融傳張雲帆施霓幬風土記帆從風之幔也施于船前各隨宜大小為制大者用布一百二十幅髙九尺唯待鯉魚風梁簡文帝詩塵散鯉魚風提要録鯉魚風乃九月風也皮日休間夜酒醒醒來山月髙楚辭衆人皆醉我獨醒劉禹錫詩酒對青山月孤枕羣書裏李白詩兀然就孤枕漢書劉向傳淮南有枕中鴻寶苑祕書左思詩卓犖觀羣書酒渴漫思茶白居易詩酒渴春深一碗茶陸羽茶經救渴飲之以漿蕩昏昧飲之以茶山童呼不起魏文帝詩西山兩童子古詩呼童烹鯉魚章碣詩睡起兒童帶簟紋芳草渡溪南越鄉音岑參詩南溪聞夜鐘王勃詩邊城琴酒處俱是越鄉人古栁渡江深南史劉瓛傳瓛兄弟共處蓬室習業不廢袁粲聞而詣之指㕔事前古栁樹曰人謂此是劉尹時樹今復見卿清德可謂不衰矣鮑照詩木落江渡寒杜甫詩江深隔寺門日晚無來客張籍詩山橋日晚行人少元結詩來客去客船俱向此中泊閒船繫緑隂張籍詩領誰相逐上閒船魏文帝詩栁垂重隂緑白居易詩眠松愛緑隂司空圖字表聖河中虞鄉人咸通末擢進士第由宣歙幕歷禮部郎中僖宗行在用為知制誥中書舍人歸隱中條山王官谷偶題水榭花繁處杜甫詩杖藜登水榭揮翰宿春天楊炯詩草茂瓊階緑花繁寶樹紅儲光羲采蓮詞淺渚荇花繁春晴日午前梁簡文帝春日詩雲穿天半晴張正見詩春光落雲葉花影發晴枝梁元帝纂要日在午曰亭午鳥窺臨檻鏡鶡冠子籠中之鳥空窺不出劉孝綽詩兹堂乃峭嶠伏檻臨曲池南史張貴妃傳嘗於閣