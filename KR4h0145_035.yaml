詩十五彈箜篌不忍見秋月謝靈運詩皎皎明秋月王臺卿箏詩惟有髙秋月秦聲獨可憐採蓮玉溆花爭發吳均詩逺澗自傾曲石溆復戔戔劉孝威詩葉舒非漸大花發似初開張正見詩花發四鄰明金塘水亂流劉楨詩菡蓞滿金塘張華荷詩照灼此金塘藻曜君王池謝靈運詩亂流趨正絶孤嶼媚中川鮑照詩亂流淙大壑相逢畏相失樂府越歌謡君乘車我戴笠他日相逢下車揖梁簡文帝詩相逢半路溪隔溪猶不渡又花茂蝶爭飛枝濃鳥相失並著採蓮舟梁簡文帝賦回渡輕船共採新蓮梁元帝賦泛柏舟而容與歌採蓮于渚畔班固賦方舟並騖孟浩然宿建德江唐書地理志睦州嘉定郡建德縣一統志建德縣嚴州府附郭有建德江移舟泊烟渚梁簡文帝賦畏風多而榜危驚舟移而花逺張正見詩舟移厯浦月櫂舉濕春衣劉孝綽詩暮烟生逺渚日暮客愁新陳子良詩我行逢日暮弭棹獨維舟陰鏗詩客行逢日暮結纜晚舟中又若非今宴適詎使客愁輕野曠天低樹謝靈運詩野曠沙岸近天髙秋月明沈佺期詩地盡覺天低江清月近人盧思道詩秋江見底清梁元帝江中月影詩澄江涵皓月朱超道舟中望月詩惟餘故樓月逺近必隨人儲光羲關山月樂府解題關山月傷離别也一雁過連營梁簡文帝詩一雁聲嘶何處歸淮南子過歸雁於碣石虞世南詩連營出武威繁霜覆古城魏武帝樂府天氣肅清繁霜霏霏北史隋紀天地大德降繁霜於秋夕李百藥詩悵然臨古城胡笳在何處杜摯笳賦序笳者李伯陽入西戎所作傳休奕笳賦序吹葉為聲庾信詩胡笳遙警夜又何處更相尋半夜起邊聲晉書劉琨傳乘月登樓清嘯中夜奏胡笳魏文帝書清風夜起悲笳微吹李陵書邊聲四起劉峻詩日暮動邊聲楊素詩薄暮邊聲起王昌齡送李十五怨别秦楚深江淹別賦有别必怨有怨必盈庾信詩南冠今别楚荆玉遂遊秦江中秋雲起宋孝武帝詩逺視秋雲發何遜詩雲霧江邊起梁簡文帝詩雲起夜疑城天長杳無隔老子天長地久蔡雍表巴土長逺山川修隔月影在寒水何遜送別詩簾中看月影張正見詩月影帶河流梁元帝詩澄江涵皓月水影若浮天王僧孺詩夜風入寒水答武陵田太守仗劍行千里戰國策聶政遂獨行仗劍至韓虞世南詩結交一言重相期千里至微軀感一言曺植文嗟微軀之自效庾信連珠須季布之一言又詩千金輕一言曽為大梁客不負信陵恩史記魏世家惠王三十一年徙治大梁注今浚儀漢書張耳傳耳大梁人少時及魏公子無忌為賔客史記魏公子傳安釐王封公子無忌為信陵君又公子仁而下士士方數千男爭往歸之晉書劉𢎞傳匹夫之交尚不負心吳均詩毛公與朱亥俱出信陵門題僧房棕櫚花滿院爾雅翼張揖上林賦注并閭棕也木髙一二丈旁更無枝葉大而圓有如車輪皆萃於木杪其下有皮重疊裹之每皮一匝為一節其花黃白結實作房如魚子狀梁簡文帝詩翻花滿階砌苔蘚入閒房古今注苔一名貟蘚一名緑蘚廣志室無人行則生苔蘚曺植詩閒房何寂寞緑草被階庭謝聸詩閒房有餘清彼此名言絶世說常使兩情皆得彼此俱暢書名言兹在兹疏名言謂已發於口薛道衡文名言頓絶空中聞異香列子天地者空中之一細物庾信步虛詞空香萬里聞裴迪木蘭柴述異記潯陽江中多木蘭樹韻㑹柴土邁切山居以木柵作寨或作柴蒼蒼落日時莊子天之蒼蒼其正色耶謝靈運賦日望新晴於落日祖孫登詩長川照落鳥聲亂溪水范雲詩通林鳥聲嬌王融文亂鶯聲於綿羽緣溪路轉深桃花源記緣溪行忘路之逺近王由禮詩雲生石路深幽興何時已陳子昻詩山深路轉幽湛方生詩此水何時流孟浩然白石灘跂石復臨水庾信詩跂石始調琴楚辭登山臨水兮送將歸弄波情未極謝靈運詩弄波不輟手玩景豈停目沈約咏雪詩嬋娟入綺窗徘徊騖情極日下川上寒謝朓詩揚舲浮大川惆悵至日下何承天詩子在川上惟以增懷浮雲淡無色古樂府浮雲多暮色魏文帝詩西北有浮雲鮑照詩重崖伏雲色楚辭葉烟邑而無色髙適咏史尚有綈袍贈詩尚有典型史記范雎傳須買曰范叔一寒如此哉乃取其一綈袍以賜之應憐范叔寒爾雅矜憐撫掩之也不知天下士史記魯仲連傳新垣衍再拜謝曰始以先生為庸人吾乃今日知先生為天下之士也後漢書馬援傳此子何足久稽天下士乎晉書劉實傳天下所共推則天下士也猶作布衣看莊子莊子大布之衣而過魏王史記李斯傳夫斯乃上蔡布衣閭巷之黔首田家春望出門何所見易出門同人又誰咎也王粲詩出門無所見晉書嵇康傳潁川鍾㑹造康康不為禮而煆不輟良久㑹去康語曰何所聞而來何所見而去㑹曰聞所聞而來見所見而去春色滿平蕪沈約詩春色犯寒來庾信詩春色方盈野枝枝綻翠滿英何遜七召玩竒花之春滿江淹詩白露掩九臯青平地蕪可歎無知已史記晏嬰傳越石父曰吾聞君子詘于不知已而信于知已者髙陽一酒徒史記酈生傳酈生瞋目按劍叱使者曰走復入言沛公吾髙陽酒徒也非儒人也送别楊栁東風樹詩昔我往矣楊栁依依古樂府暫出白門前楊栁可藏烏禮記東風解凍青青夾御河說范青青不伐將尋斧柯隋書食貨志自板渚引河達于淮海謂之御河河畔築御道樹以栁漢書杜周傳兩子夾河為郡近來攀折苦梁簡文帝折楊栁詩楊栁亂成絲攀折上春時應為别離多楚辭悲莫悲兮生别離樂莫樂兮新相知三輔黃圖霸橋在長安東漢人送客至此橋折栁贈别劉長卿平蕃曲絶漠大軍還漢書武帝紀衛青復將六將軍絶幕注沙上曰幕直度曰絶後漢書西域傳孝武深維久長之計命遣虎臣浮河絶幕劉峻出塞詩絶幕衝風急交河夜月明漢書李廣傳我去大軍數十里後漢書耿弇傳弇引兵至城陽降五校餘黨振旅還京師平沙獨戍間何遜詩野岸平沙合庾信詩平沙臨浦口後漢書龎參傳重之以大軍疲之以逺戍空留一片石江總詩不見披雲狀空留折桂心朝野僉載溫子升作寒陵山寺碑庾信讀而寫其本南人問信曰北方文士如何信曰唯有寒陵一片石堪共語萬古在燕山劉峻廣絶交論斯賢達之素交歷萬古而一遇後漢書竇憲傳登燕然山出塞三千餘里刻石勒功紀漢威德令班固作銘送張十八歸桐廬唐書地理志睦州新定郡有桐廬縣一統志桐廬縣在嚴州府城東一百里本漢富春縣之桐溪鄉唐初置嚴州尋廢以縣屬睦州歸人乘野艇江淹詩歸人望烟火說文艇小舟也帶月過江村陶潜詩帶月荷鋤歸虞世南詩帶月下虹橋謝朓詩曖曖江村見正落寒潮水禇亮詩沙平寒水落王維詩月明寒潮廣左思賦迎潮水而振緡相隨夜到門曺植詩飛蓋相追隨孫逖詩夜到丹陽郡元結詩扁舟皆到門錢起題崔逸人山亭藥徑深紅蘚庾肩吾詩向嶺分花徑隨階轉藥欄盧照鄰詩舊石開紅蘚山窗滿翠微張正見詩山窗葉去寒爾雅山脊岡未及上曰翠微左思賦鬱葐蒀以翠微注翠微山氣之輕縹也羡君花下酒應璩書吟咏花栁之下庾信詩落花催斗酒蝴蝶夢中飛莊子昔在莊周夢為蝴蝶古詩蝴蝶胡髙飛江行無題斗轉月未落隋煬帝詩更移斗柄轉梁簡文帝烏栖曲北斗橫天月將落舟行夜已深詩淠彼涇舟傳淠舟行貌湘州記繞川行舟遙望若一樹葉劉瑗詩月光移數尺方知夜已深有村知不逺梁元帝詩逺村雲裏出遙船天際歸風便數聲砧楊炯詩香逐便風來孟浩然詩挂席樵風便梁簡文帝詩城外搗砧聲二夕景殘霞落隋煬帝詩翛翛夕景清何遜詩殘霞亦半消梁簡文帝詩落霞乍續斷秋寒細雨晴顔延之詩秋至恆早寒梁簡文帝詩冷風雜細雨潘嶽賦微雨新晴六合清朗短纓何用濯孟子滄浪之水清兮可以濯我纓李陵詩臨河濯長纓曺植文振冠南嶽濯纓清川舟在月中行晉書袁宏傳謝尚秋夜乘月泛江㑹宏在舫中行誦詩尚即升舟與之談論張子容詩回舟月上韋應物秋夜寄丘二十二員外懷君屬秋夜魏文帝詩漫漫秋夜長南史蕭子顯傳風動春朝月明秋夜散步咏凉天劉孝威詩散步懷漁樵魏文帝燕歌行秋風蕭瑟天氣凉山空松子落後漢書假熲傳贊紛紜騰突谷靜山空列仙傳偓佺好食松實能飛行逐走馬以松子遺堯幽人應未眠易履道坦坦幽人貞吉隋煬帝書側席幽人夢想巖穴李白詩月明欲素愁不眠盧綸和張僕射塞下曲林暗草驚風何遜詩林密户稍隂草滋階欲暗虞世南詩日下林全暗鮑照文臨驚風之蕭條將軍夜引弓老子偏將軍居左上將軍居右徐陵詩將軍擁節起戰士夜鳴弓司焉遷書舉引弓之人一國共攻而圍之平明尋白羽李白詩平明拂劍朝天去家語白羽若月司馬相如上林賦彎繁弱滿白羽沒在石稜中新序楚熊渠子夜行見寢石以為伏虎關弓射之滅矢飲羽下視之石也却復射之矢摧無跡漢書李廣傳廣居右北平出獵見草中石以為虎射之中石沒羽杜甫詩湍減石􅏢生答韋蘇州露滴梧葉鳴謝靈運詩泠泠朝露滴鮑照詩紫蘭花已歇碧梧葉方稀乂風鳴兩岸葉秋風桂花發謝莊文秋風散兮凉葉稀孔稚圭北山移文秋桂遣風李嶠詩梧桐稍下葉仙桂欲開花唐髙宗詩巖桂發全香中有學仙人隋書王貞傳仰而不至方見學仙之逺唐太宗詩不似秦樓上吹簫空學仙吹簫弄山月列仙傳蕭史者秦穆公時人善吹簫穆公女弄玉妻焉一旦隨鳯飛去謝靈運賦滅華燭兮弄曉月戴叔倫三閭廟楚辭章句屈原仕於懷王為三閭大夫三閭之職掌王族三姓曰昭屈景一統志三閭廟在長沙府境內號三閭大夫祠沅湘流不盡水經注沅水下注洞庭方㑹於江湘中記湘水之出於陽朔則觴為之舟至洞庭則日月若出入於其中九歌令沅湘兮無波使江水兮安流阮籍詩適彼沅湘託分漁父杜甫詩不盡長江滚滚來屈子怨何深史記原賈傳屈平之作離騷蓋自怨生也又張湯傳買臣楚士深怨日暮秋風起左傳日云暮矣王粲詩日暮遊西園江淹賦或春苔兮始生乍秋風兮暫起蕭蕭楓樹林九歌風颯颯兮木蕭蕭劉向九歎秋風瀏以蕭蕭阮籍詩湛湛長江水上有楓樹林栁中庸名淡以字行河東人宗元之族御史并之弟也與弟中行皆有文名蕭穎士以女妻之仕為洪府户曹江行繁隂乍隱洲謝惠連詩繁雲起重隂諸葛頴詩張帆渡栁浦結纜隱梅洲落葉初飛浦陶潜詩落葉掩長陌庾信賦吹落葉之扁舟劉孝威詩荇浦浮新葉漁舟繞落花蕭蕭楚客帆荆軻易水歌風蕭蕭兮易水寒劉允濟詩楚客弄繁絲杜甫詩不夜楚帆落避風湘渚間孟浩然詩風止客帆收日暮寒江雨離騷日忽忽其將暮杜甫詩禹鑿寒江正穩流謝朓詩朔風吹飛雨蕭條江上來盧照鄰詩江前飛暮雨張仲素春閨裊裊城邊栁許敬宗賦扇晨飈而裊裊杜審言詩北斗挂城邊青青陌上桑古詩青青河畔草古今注羅敷采桑於陌上趙王見而悅之羅敷乃彈箏作陌上歌以自明吳均詩嫋嫋陌上桑䕃陌復垂塘提籠忘採葉宋子侯樂府提籠行採葉梁簡文帝詩薄晚畏蠶饑競採春桑葉昨夜夢漁陽漢書地理志漁陽郡秦置縣漁陽後漢書吳漢傳漁陽上谷突騎天下所聞也杜甫詩漁陽豪俠地擊鼓吹笙竽令狐楚長相思幾度春眠覺徐陵詩砌水何年溜簷桐幾度春孟浩然詩春眠不覺曉處處聞啼鳥南史陳文帝紀每雞人伺漏傳籖於殿中令投籖於階石上曰吾雖得眠亦令驚覺紗窗曉望迷劉孝威詩紗窗相向開庾信詩紗窗獨掩羅帳長垂盧照鄰詩窗曉聽鳴雞韋應物調笑詞東望西望路迷朦朦殘夢裏韋應物詩誰家懶婦驚殘夢猶自在遼西漢書地理志遼西郡秦置薛道衡詩前年過代北今歲往遼西北樓一統志在寧國府治北南齊守謝朓建咸通中刺史獨孤霖改為疊嶂樓舊唐書本傅元和十五年六月出為宣歙觀察使