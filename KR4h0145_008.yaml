名山記石門山在慶符縣治南下瞰石門江林薄間多蘭一名蘭山北山白雲裏隱者自怡悅詩陟彼北山言采其杞陶𢎞景應詔詩山中何所有嶺上多白雲只可自怡悅不堪持贈君相望試登髙史記吕不韋傳使者相望于道荀子吾嘗跂而望矣不如登髙之博見也韓詩外傳君子登髙必賦李乂九日幸臨渭亭登髙詩望幸紆千乘登髙自九重心隨飛鴈滅史記孔子世家衛靈公與孔子語見飛鴈仰視之色不在孔子孔子遂行謝朓髙松賦星回窮紀沙鴈相飛愁因薄暮起湛方生賦風淒淒兮薄暮范雲詩田家採樵去薄暮方歸來興是清秋發潘嶽秋興賦序染翰操紙慨然而賦于時秋也故以秋興命篇殷仲文詩獨有清秋日能使髙興盡時見歸村人平沙渡頭歇西京雜記太液池邊多平沙何遜詩逺岸平沙合范雲詩平沙斷還續天邊樹若薺劉孝綽詩天邊生岸影水上結雲隂顔氏家訓羅浮山記云望平地樹如薺故戴嵩詩云長安樹如薺薛道衡詩遙原樹若薺逺水舟如葉江畔洲如月庾信詩峽路沙如月山峯石似眉何當載酒來漢書揚雄傳家貧嗜酒時有好事者載酒肴從遊學晉陽秋陶潛九日無酒出宅邊菊叢中坐久之見白衣人來乃刺史王𢎞送酒即便就酌取醉而歸共醉重陽節魏文帝與鍾繇書嵗往月來忽逢九月九日九為陽數而日月並應俗嘉其名以為宜于長久故以享宴髙會庾肩吾詩獻夀重陽節回鑾上苑中漢中漾舟一統志漢江源出隴西嶓冢山由漢中流經鄖縣均州光化至襄陽府城北又東南經宜城抵安陸府至大别山入於江其水因地而名曰漾曰沔曰漢曰滄浪蓋總名為漢别言之則有四耳漾舟逗何處謝惠連詩成裝候良辰漾舟陶嘉月廣韻逗逗遛住也止也劉孝綽夕逗繁昌浦詩疑是辰陽宿於此逗孤舟神女漢臯曲韓詩外傳鄭交甫將南適楚遵彼漢臯臺下遇二女珮兩珠交甫目而挑之二女乃解珮以贈之水經注方山下水曲之隈云漢女昔遊處也故張衡南都賦曰遊女弄珠於漢臯之曲漢臯即方山之異名也元和志萬山一名漢臯山在襄陽縣西十一里雪罷氷復開元和志成都山嶺停雪常深百尺夏月融泮江川為之洪溢禮記孟春之月東風解凍蟄蟲始振魚上氷淮南子夫水向冬則凝而為氷向春則泮而為水王僧孺詩雪罷枝即青氷開水便緑張正見詩雪盡青山路氷消緑水池春潭千丈緑隋煬帝詩春潭漾月暉謝朓詩回流映千丈梁簡文帝詩凍解池開緑江淹别賦春草碧色春水緑波水經注清潭逺漲緑波凝靜輕舟恣往來戰國策乘夏水浮輕舟張衡南都賦爾乃撫輕舟兮浮清池亂北渚兮揭南涯左思蜀都賦泛輕舟於西川左傳行李之往來探玩無厭足謝靈運山居賦玩水弄石水經注清潭鏡徹行者莫不徘徊愛玩謝靈運賦申娛玩之無巳波影搖妓叉沈君攸詩波影雜霞無定色湍文觸岸不成圓劉緩詩叉光逐影亂陳後主詩翠叉綺袖波中漾沙光逐人目水經注水色清徹漏石分沙謝靈運詩弄波不輟手玩影豈停目蘇味道詩明月逐人來傾杯魚鳥醉陳後主臨髙臺詩臨窗巳響吹極目且傾杯嵇康絶交書遊山澤觀魚鳥心甚樂之簡文帝賦見遊魚之戲藻聽驚鳥之鳴雌宋之問餞獨孤少府序管召魚樂杯薰鶯醉聨句鶯花續南史雷次宗南還何尚之設祖道文義之士畢集為聨句詩文心雕龍聨句共韻則柏梁餘製水經注若耶溪上有一櫟樹謝靈運與從弟惠連常遊之作聨句題刻樹側宗懍早春詩鶯鳴一兩囀花樹數重開成公綏嘯賦若離若合將絶復續良會難再逢何遜詩願子加餐飯良會在何辰日入須秉燭擊壤歌日出而作日入而息陶潛詩日入羣動息劉孝綽夕逗繁昌浦詩日入江風靜安波似未流古詩晝短苦夜長何不秉燭遊題終南翠微寺空上人房詩終南何有有條有梅傳終南周之名山也潘嶽關中記其山一名中南言在天之中居都之南故曰中南一統志終南山在西安府城南五十里一名南山張禮遊城南注翠微寺在終南山上本太和宫一統志翠微宫在府城南八十里終南山上唐髙祖建名太和宫太宗改曰翠微終南翠微裏雨後宜返照梁元帝纂要日西落光返照於東謂之返景閉關久沈𡨕顔延年詩劉伶善閉關文中子或問陶元亮子曰五柳先生傳則幾於閉關矣陸機幽人賦超沈𡨕以絶緒豈世網之能加謝靈運詩沈𡨕豈别理守道自不攜杖策一登眺左思招隱詩杖策招隱士荒塗橫古今陸機逸民賦杖短策而遂往湛方生遊園咏乘夕陽而含咏杖輕策以行遊盧諶詩登髙眺遐荒張九齡詩暇日時登眺荒郊臨故岐遂造幽人室易履道坦坦幽人貞吉陸機逸民賦咏幽人於鳴琴始知靜者妙謝靈運詩還得靜者便儒道雖異門周武帝詔至道𢎞深混成無際岐路既分源流愈逺三墨八儒朱紫交競九流七略異説相勝雲林頗同調陸機賦方介丘於尺阜托雲林于一木謝靈運詩誰謂古今殊異代可同調兩心喜相得史記魏其武安傳灌夫魏其兩人相為引重相得甚歡王褒聖主得賢臣頌聚精會神相得益彰畢景共談笑宋之問詩畢景至緱嶺嶺上煙霞生史記滑稽傳優孟長八尺多辨常以談笑諷諫漢書敘傳禁中設宴飲之會趙李諸侍中皆引滿舉白談笑大噱左思詩吾慕魯仲連談笑却秦軍暝還髙窗眠晉書陶潛傳嘗言夏月虛間髙卧北窗之下清風颯至自謂羲皇上人時見逺山燒崔皓詩山頭野火寒多燒雨裏孤峯濕作煙緬懷赤城標支遁天台山銘序往天台當由赤城為道徑孔靈符會稽記赤城山名色皆赤狀似雲霞孫綽天台山賦赤城霞起而建標更憶臨海嶠宋書謝靈運傳尋山陟嶺必造幽峻巖陳千重莫不備盡嘗自始寧南山直至臨海從者數百人臨海太守王琇驚為山賊徐知靈運乃安康樂集有登臨海嶠與從弟惠連詩風泉有清音水經注風泉傳響於青林之下巖猿流聲於白雲之上王融渌水曲日霽沙溆明風泉動華燭左思詩何必絲與竹山水有清音陶潛間情賦激清音以感余何必蘇門嘯晉書阮籍傳籍嘗於蘇門山遇孫登與商略終古及栖神導氣之術登皆不應籍因長嘯而退至嶺半聞其聲若鸞鳯之音乃登之嘯也尋香山湛上人一統志香山在河南府城西南龍門白居易記龍門十寺遊觀之盛香山為冠又香山在府城南二十五里兩山對峙東曰香山西曰龍門朝遊訪名山曹植詩朝遊江北岸夕宿瀟湘沚陸機詩朝遊遊層城夕息旋直廬書告于皇天后土所過名山大川史記封禪書自殽以東名山五自華以西名山七又自序藏之名山副在京師山逺在空翠謝靈運詩杪秋尋逺山山逺行不盡又空翠難強名漁釣易為曲庾肩吾春夜詩水光懸蕩壁山翠下添流氤氲亘百里易天地絪緼萬物化醇正義絪緼相附著之義釋文本又作氤氲謝靈運入道至人賦飛英明于對溜積氤氲而為峯易震驚百里書百里賦納總詩維此聖人瞻言百里戰國策行百里者半於九十莊子適百里者宿舂糧適千里者三月聚糧日入行始至禮記內則日入而夕慈以旨甘擊壤歌日出而作日入而息陶潛詩日入羣動息歸鳥趨林鳴劉孝綽詩日入江風靜安波似未流谷口聞鐘聲孔稚圭北山移文截來轅于谷口杜妄轡于郊端禮記鐘聲鏗鏗以立號號以立橫君子聽鐘聲則思武臣林端識香氣張充與王儉書竒禽異羽或巖際而逢迎弱霧輕煙乍林端而菴藹列子終北之國山名壺頂頂有口名滋穴有水湧出名曰神瀵其民沐浴膚毛脂澤香氣經旬乃歇晉書禮樂志蘭風發芳氣蓋世同其芬江淹詩涼風蕩芳氣碧樹先秋落杖策尋故人後漢書鄧禹傳光武收河北禹杖策軍門左思招隱詩杖策招隱士荒塗橫古今陶潛詩故人賞我趣挈壺相與至解鞍暫停騎魏志武帝紀紹渡河追公軍至延津南公勒兵駐營南阪下令騎解鞍放馬南史陳慶之傳魏遣荆州刺史王羆據武牢時滎陽未拔士衆皆恐慶之解鞍秣馬喻衆悉使登城水經注風穴肅肅常有微風寒吹凌人不可暫停石門殊豁險謝靈運詩躋險策幽居披雲卧石門徐悱詩此江稱豁險兹山復鬱盤篁徑轉森邃廣韻篁竹名宋之問詩沓嶂開天小叢篁夾路迷潘嶽懷舊賦柏森森以攢植謝萬春遊賦碧巘增邃灌木結隂法侣欣相逢王融文屈祇鷲之法侣梁武帝金剛般若懴文恆沙衆生皆為法侣樂府越謠歌君乘車我戴笠他日相逢下車揖君擔簦我跨馬他日相逢為君下清談曉不寐後漢書鄭太傳孔公緒清談髙論噓枯吹生宋書蔡廓傳論世重清談士推素論詩耿耿不寐又不遑假寐蔡琰詩不能寐兮起屏營平生慕真隱漢書馬援傳援見公孫述以為當握手如平生劉峻廣紀交論時與親舊敘闊陳説平生宋書何尚之傳尚之致仕於方山著退居賦未幾復攝職袁淑録古隱士有迹無實者著真隱傳以嗤焉纍日探多異史記下之不能纍日積勞取尊官厚祿以為親戚交遊光寵後漢書郭太傳太至南州過袁奉髙不宿而去從黃叔度纍日不去晉書宣帝紀見父老故舊宴飲纍日史記趙世家窮鄉多異曲學多辨野老朝入田史記蕭相國世家相國因為民請曰長安地狹上林中多空地棄願令民得入田荆楚嵗時記春分日有鳥如烏先雞而鳴架架格格民候比鳥則入田山僧暮歸寺庾信詩野老時相訪山僧或見尋松泉多逸響庾信終南山義谷銘松桂危懸風泉虛韻古詩彈箏奮逸響新聲妙入神宋書謝靈運傳論綴平臺之逸響採南皮之髙韻孫楚賦順谷風以撫節飄逸響乎天庭苔壁饒古意沈佺期詩雲峯苔壁繞溪斜江路香風夾岸花崔湜詩窈窕穿苔壁差池樹石壇願言投此山詩願言則懷身世兩相棄鮑照詩君平獨寂寞身世兩相棄題鹿門山襄陽記鹿門山舊名蘇嶺山建武中襄陽侯習郁立神祠於山刻二石鹿夾神道口俗因謂之鹿門廟遂以廟名山一統志鹿門山在襄陽府東南三十里漢龎德公唐孟浩然俱隱居於此清曉因興來范雲詩楚山清曉雲晉書王徽之傳嘗居山隂夜雪初霽忽憶戴逵乘船詣之造門不前而反人問其故曰乘興而來興盡而反何必見安道耶乘流越江峴枚乘七發汨乘流而下降兮或不知其所止何遜詩單艫時向浦獨楫乍乘流謝莊月賦川路長兮不可越晉書羊祜傳祜樂山水每風景必造峴山置酒言詠終日一統志峴山在襄陽府南七里沙禽近方識何遜詩漁舟乍同歸沙禽時獨赴浦樹逺莫辨宋之問舟行詩浦樹浮鬱鬱臯蘭覆靡靡漸至鹿門山山明翠微淺顔延之詩庭昏見野隂山明望松雪庾信詩山明疑有雪岸白不關沙爾雅山未及上曰翠微疏謂未及頂上在旁陂陀之處一説山氣青縹色故曰翠微也李巨仁登名山篇翠微橫鳥路珠澗入星橋巖潭多屈曲陳子昂詩巖潭相映媚溪曲屢環周鮑照芙蓉賦被瑤塘之周流繞金渠之屈曲舟楫屢回轉易舟楫之利以濟不通庾信義谷序緑槐秋市舟楫相通水經注帆隨湘轉望衡九面謝靈運詩川渚屢經復乘流玩回轉昔聞龎德公采藥遂不反襄陽者舊傳龎德公隱鹿門山孔明每至其家獨拜牀下後漢書龎公傳龎公者南郡人也居峴山之南未嘗入城府後攜妻子登鹿門山采藥不反金澗養芝术鮑照登香爐峯詩金澗測泉脈璇淵抱星漢顔延之釋何衡陽書芻豢之功幸至百齡芝术之懿亟聞千嵗謝靈運曇隆法師誄茹芝术而共餌石牀卧苔蘚水經注夷水東徑石室村人駱都到此室邊采蜜見一仙人坐石牀上劉刪采藥詩石牀新溜乳金竈欲成丹廣志空室無人行則生苔蘚紛吾感耆舊離騷紛吾既有此內美兮又重之以修能注紛盛貌後漢書魯恭傳恭再在公位選辟髙第至卿郡守者數十人而耆舊大姓或不蒙薦舉唐書藝文志習鑿齒襄陽耆舊傳五卷結攬事攀踐漢逸詩陽春被惠澤枝葉可攬結張九齡詩昔年亟攀踐征馬復來過隱迹今尚存張九齡詩還慙大隱迹空想列仙蹤髙風邈已逺後漢書嚴光傳同抗髙尚之風則宜矯俗白雲何時去莊子乘彼白雲至於帝鄉陶𢎞景詩山中何所有嶺上多白雲丹桂空偃蹇左思吳都賦洪桃屈盤丹桂灌叢楚辭桂樹叢生兮山之幽偃蹇連綣兮枝相蟉探討意未窮沈佺期詩幽壑巳永閉雲竇絶探討回艫夕陽晚何遜詩眷言還九派回艫出五洲説文艫船頭刺棹處詩度其夕陽王維字摩詰河東人工書畫與弟縉俱有俊才開元九年進士調太樂丞厯右拾遺左補闕拜吏部郎中天寶末為安祿山所得服藥陽瘖賊平特原之責授太子中允遷中書舍人給事中轉尚書右丞維詩名盛於開元天寶間寧薛諸王駙馬豪貴之門無不拂席迎之得宋之問輞川别墅山水絶勝與道友裴迪往來賦詩篤於奉佛晚年長齋禪誦卒贈祕書監寶應中縉集詩六卷表上之敕答云卿伯氏位列先朝名髙希代抗行周雅長揖楚辭詩家者流時論歸美克成編録歎息良深春中田家作屋上春鳩鳴楚辭九歌鳥次兮屋上水周兮堂下禮記月令仲春之月鷹化為鳩曹植贈徐幹詩春鳩鳴飛棟流猋激櫺軒村邊杏花白陶潛詩昔欲居南村非為卜其宅謝朓詩曖曖江村見汜勝之書杏始華榮輒耕輕土四民月令杏花盛桑葉白庾信詩興雲榆莢晚燒剃杏花初持斧伐逺揚詩取彼斧戕以伐逺揚傳逺枝逺也揚條揚也王褒僮約持斧入山斷槧裁轅荷鋤覘泉脈庾信小園賦三春負鋤相識五月披裘見尋陶潛詩晨興理荒穢帶月荷鋤歸江淹詩雖有荷鋤倦濁酒聊自適博物志地以名山為輔佐石為之骨川為之脈鮑照香爐寺詩霜崖滅土膏金澗測泉脈劉峻詩泉脈洞杳杳流波下不極新燕識舊巢古樂府新燕弄初調杜鵑競晨鳴晉書吕光載記先徙海西郡人於諸郡其人謠曰朔馬心何悲念舊中心勞燕雀何徘徊意欲還故巢舊人看新厯書人惟求舊器非求舊惟新隋書髙祖紀夏四月戊寅頒新厯北史信都芳傳李業興撰新厯自以為長於趙􅜫何承天祖沖之三家臨觴忽不御禮記命酌曰請行觴曹植求通親親表聞樂而拊心臨觴而歎息鮑照詩乘璫散珮盈玉除停觴不御欲誰須惆悵逺行客楚辭九辨廓落兮羈旅而無友生惆悵兮而私自憐後漢書馮衍傳風波飄其並興兮情惆悵以增傷潘嶽詩漫漫三千里迢迢逺行客至滑州隔河望黎陽憶丁三寓一統志大名府滑縣本古豕韋之國春秋為衛地秦漢皆為濮陽地劉宋置兖州後周改杞州隋改滑州大業初改東郡唐改為滑州又黎陽津在黎陽故城東又名白馬津隔河見桑柘江總詩定言神女隔河來禮記命野虞母伐桑柘潘嶽詩春草鬱青青桑柘何奕奕藹藹黎陽川長門賦望中庭之靄靄兮束晳詩瞻彼崇丘其林靄靄王僧孺詩藹藹夜庭黃一統志衛河淇水合流至黎陽故城為黎水望望行漸逺孟子望望然去之謝朓詩望望忽超逺何由見所思孤峯沒雲煙梁書徐勉誡子嵩書聊于東田間營小園華樓迥榭頗有臨眺之美孤峯叢薄不無糾紛之異梁書張𢎞策傳恆隨髙祖遊處每入室常覺有雲煙氣陸機詩秋水漫長柯寒木入雲煙謝靈運詩遂登羣峯首邈若升雲煙故人不可見古詩故人心尚爾詩愛而不見搔首踟躇河水復悠然詩河水洋洋北流活活又河水清且漣猗南史漁父傳竹竿籊籊河水悠悠李尤盟津銘洋洋河水朝宗于海張正見詩色映長河水花飛髙樹風陶潛詩采菊東籬下悠然見南山江淹詩所向同逺好臨風載悠然賴有政聲逺後漢書杜根傳根位至巴郡太守政甚有聲時聞行路傳蘇武詩四海皆兄弟誰為行路人左傳縣人傳之張九齡詩吉甫頌聲傳終南别業詩終南何有傳終南周之名山中南也釋文終南一名太一又名地肺一統志終南山在西安府城南五十里南史謝靈運傳移籍會稽修營别業傍山帶江盡幽居之美中嵗頗好道何遜詩中嵗無乖違漢武內傳王母遣問上元夫人云天事勞我致以愆面劉徹好道適來視之淮南王八公操知我好道公來下兮晚家南山陲詩幽幽南山漢書東方朔傳南山者天下之阻也南有江淮北有河渭括地志終南山一名南山廣韻陲邊也興來每獨往世説王子猷居山隂夜大雪忽憶戴安道便乘小船就之經宿方至造門不前而返人問其故王曰乘興而來興盡而返何必見戴淮南子山谷之人輕天下細萬物而獨往勝事空自知南史竟陵王子良傳子良少有清尚禮才好士善立勝事夏月客至為設爪飲及甘果行到水窮處道藏經晉時有戍卒屯于子午谷入谷之西澗水窮處忽見鐵鎖下垂約百有餘丈坐看雲起時史記封禪書晝有白雲起封中漢書五行志雲起于山而彌于天淮南子山致其髙而雲起焉春秋説題辭雲之為言運也動隂路觸石而起謂之雲含陽而起以精運也偶然值林叟談笑無還期史記滑稽傳優孟者故楚之樂人也長八尺多辨常以談笑諷諫左思詩吾慕魯仲連談笑却秦軍樂府吐之無還期渭川田家書導渭自鳥鼠同穴淮南子渭水多力宜􅎟山海經鳥鼠同穴之山渭水出焉東流注于河漢書貨殖傳渭川千畝竹春秋説題辭渭之為言布也渭渭流行貌周官雍州其浸渭洛為關中三川是也一統志渭河在陜西西安府城北五十里出臨洮府渭源縣鳥鼠山西北谷東流經盩厔興平咸陽渭南至華隂界入黃河斜光照墟落王僧孺詩斜光隱西壁暮雀上南枝説文墟大丘也廣韻落聚落也管輅别傳郭恩字義博能仰觀輅從義博學三十日中通夜不卧語義博君但相語墟落處所耳窮巷牛羊歸戰國策蘇秦特窮巷掘門桑户棬樞之士耳史記貨殖傳原憲不厭糟粳匿于窮巷詩日之夕矣牛羊下來野老念童僕丘遲詩村童忽相聚野老時一望易旅即次懷其資得童僕貞漢書萬石君傳童僕欣欣如也唯謹陶潛歸去來辭童僕歡迎稚子候門倚杖候荆扉鮑照詩腰鐮刈葵藿倚杖牧