秋也以秋興命篇況君池上間謝朓髙齋間望詩已琴有池上酌復此風中悠悠西林下詩瞻彼日月悠悠我思爾雅悠悠洋洋思也江淹詩晨遊任所萃悠悠藴真趣又清思詩明月沒西林詩于以求之于林之下自識門前山古西洲曲樹下即門前門中露翠鈿劉孝威詩似覺前山來千里橫黛色戰國策沃野千里地勢形便宗炳登白鳥山詩仰升數百仞俯覽眇千里水經注青霞翠發望同點黛鮑照詩半山以下純為黛色何遜照水聨句臨橋橫黛色映渚湄鉛暉數峯出雲間後漢書逸民傳矯慎少學黃老隱遁山谷汝南吳蒼遺書曰足下審能騎龍弄鳳翔嬉雲間者亦非狐兔燕雀所敢謀也魏文帝芙蓉池詩丹霞夾明月華星出雲間嵯峨對秦國古歌仰兹山兮迢迢層石構兮嵯峨潘嶽詩崇岡鬱嵯峨史記蘇秦傳秦四塞之國李斯上秦皇書必秦國之所生然後可合沓藏荆關謝靈運詩巒隴有合沓往來無蹤轍荆州記其北有四關魯陽伊闕之屬鮑照凌煙樓銘東臨吳甸西眺楚關殘雨斜日照江淹赤虹賦殘雨蕭颯光煙豔爛梁簡文帝納涼詩斜日晚駸駸又雨詩倘令斜日照併欲似遊絲何遜詩暮煙起遙岸斜日照安流夕嵐飛鳥還謝靈運詩夕曛嵐氣隂廣韻嵐山氣也易飛鳥遺之音管子鳥之飛也必還山集谷陶潛詩山氣日夕佳飛鳥相與還故人今尚爾後漢書楊震傳故人知君君不知故人古詩故人心尚爾歎息此頽顔陶潛詩歌竟長歎息駱賔王詩秪應傾玉醴時許寄頽顔偶然作陶潛任天真晉書陶潛傳字元亮宋書潛字淵明或云淵明字元亮南史淵明或云深明名元亮梁昭明太子陶淵明傳字元亮潯陽柴桑人也少有髙趣博學善屬文穎脫不羣任真自得琴操注伏羲作琴用五絃修身理性反其天真也其性頗耽酒淵明傳不解音聲而畜無絃琴一張每酒適輒撫弄以寄其意貴賤造之者有酒輒設淵明若先醉便語客我醉欲眠卿可去其真率如此北史裴叔業傳弟逺好彈琴耽酒自從棄官來淵明傳謂賔朋曰聊欲絃歌以為三徑之資可乎執事聞之以為彭澤令晉書義熙三年解印去縣頃之徵著作郎不就顔延之陶徵士誄道不偶物棄官從好家貧不能有潛五柳先生傳性嗜酒而家貧不能恆得謝靈運逸民賦有酒則舞無酒則醒九月九日時菊花空滿手淵明傳嘗九月九日出宅邊菊叢中坐久之滿手把菊潛九日間居詩序余間居愛重九之名秋菊盈園而持醪靡由詩秋菊有佳色裛露掇其英荆楚嵗時記九月九日佩茱萸食餌飲菊花酒中心竊自思倘有人送否白衣攜壺觴果來遺老叟詩中心好之續晉陽秋潛九日無酒出籬悵望久之見白衣人至乃王𢎞送酒使也即便就酌醉而後歸潛歸去來辭引壺觴以自酌盻庭柯以怡顔後漢書劉寵傳拜會稽太守郡中大化徵為將作大匠山隂縣有五六老叟龎眉皓髮自若耶山谷間出人齎百錢以送寵且喜得斟酌詩式燕且喜蘇武詩願子留斟酌敘此平生親後漢書馬武傳世祖每勞饗諸將武輒起斟酌于前世祖以為歡潛詩過門更相呼有酒斟酌之安問升與斗説苑順針縷者成帷幕合升斗者實倉廩奮衣野田中今日嗟無負禮記奮衣由右上取二綏跪乘魏文帝詩野田廣開闢川渠互相經鮑照詩酒出野田稻菊生髙岡草潛詩若復不快飲空負頭上巾兀傲迷東西潛飲酒詩規規一何愚兀傲差若穎楚辭水波逺以冥冥兮渺不覩其東西廬山記太史公東遊登其峯嶺而遐觀南眺五湖北望九江東西肆目若登天庭焉簔笠不能守詩爾牧來思何蓑何笠列子吾君方將被蓑笠而立乎畎畝之中傾倒強行行南史江湛傳及左右推排之殆於傾倒吳越春秋行行各努力兮古詩行行重行行酣歌歸五柳書酣歌于室南史梁蕭恭曰仰眠床上看屋梁而著書豈如臨清風對朗月登山泛水肆意酣歌也淵明傳嘗著五栁先生傳以自況曰先生不知何許人也亦不詳姓字宅邊有五栁樹因以為號焉庾肩吾謝賜宅啓交垂五柳若元亮之居生事不曽問肯愧家中婦華陽國志德陽縣有澤漁之利望山樂水土地易為生事南史潛妻翟氏志趣亦同能安苦節夫耕於前妻鋤於後梁武帝樂府十五嫁為盧家婦藍田石門精舍一統志藍田山在藍田縣東南三十里山出玉英故名又名玉山形如覆車故又名覆車山長安志驪山縣東南三里按土地記云即藍田山也事物紀原漢明帝立精舍以處攝摩騰即白馬寺注今人以佛寺為精舍不知乃儒者教授之所釋迦譜息心所栖故曰精舍落日山水好謝惠連詩落日隱櫩檻謝靈運詩昏旦變氣候山水含清暉漾舟信歸風蜀都賦試水客漾輕舟注漾浮行也江淹愛逺山騷緤余馬于椒阿漾余舟于沙衍陸機賦或乃萍流而浮轉或因歸風以自返又詩願托歸風響寄言遺所欽玩竒不覺逺因以緣源窮謝靈運詩行源徑轉逺謝朓詩緣源殊未巳歸徑窅如迷遙愛雲木秀張説東山記虹泉電射雲木虛吟初疑路不同安知清流轉西都賦祛黼帷鑑清流阮瑀為曹公與孫權書濯鱗清流飛翼天衢蓮社髙賢傳清流環階白雲生棟蘭亭序又有清流激湍映帶左右董京詩清流可飲至道可餐偶與前山通庾肩吾詩前山黃葉起捨舟理輕策文選注策杖也左傳捨舟於淮汭謝靈運詩捨舟眺回渚停策倚暮松又裹糧杖輕策湛方生賦乘夕陽而含詠杖輕策以行遊果然愜所適説文愜快也應劭曰志滿也老僧四五人逍遙蔭松柏阮籍詩仙者四五人逍遙宴蘭房詩于焉逍遙楚辭聊逍遙以相羊莊子逍遙篇注夫小大雖殊而放於自得之場則物任其性事稱其能名當其分逍遙一也豈容勝負於其間哉詩施于松柏楚辭飲石泉兮蔭松柏蜀都賦楩楠幽藹于谷底松柏蓊鬱于山峯朝梵林未曙潛確類書佛有五種梵音正直和雅清徹深滿周遍逺聞又曹子建遊魚山聞空中梵天之音清響哀惋獨聽良久乃摹其節寫為梵唄夜禪山更寂沈炯詩石座應朝請山龕擬夜禪道心及牧童書人心惟危道心惟微支道紀頌道心超不二王僧達詩圭璋既文府精理亦道心莊子黃帝將見大隗於具茨山至襄城之野七聖皆迷遇牧馬童子問塗唐太宗詩回輿訪牧童世事問樵客晉書王質伐木至信安石室山見二童圍碁與質一物如棗核食之不覺飢看碁未終起視斧柯巳爛歸無復當時人矣庾信詩樵客遇圍碁暝宿長林下劉庭芝詩朝鳴集銀樹暝宿下金塘陳琳詩逍遙步長林嵇康與山巨源書禽鹿見羈雖飾以金鑣饗以嘉肴愈思長林而志在豐草也焚香卧瑤席庾信華林園馬射賦屬車釃酒復道焚香楚辭瑤席兮玉瑱盍將把兮瓊芳溫子升舜廟碑既緝藥房遂鎮瑤席澗芳襲人衣爾雅山夾水曰澗説文芳香草也楚辭芳菲菲兮襲豫古樂府採蓮曲發花田葉芳襲衣山月映石壁吳均詩桂月青山下列子趙襄子狩於中山有一人從石壁中出再尋畏迷誤明發更登歷詩明發不寐疏從明而至夜則地暗至旦而明則地開發陸機詩明發遺安寐陸雲詩明發有想如結子心鮑照詩笙歌待明發笑謝桃源人花紅復來覿説文覿見也宋史地理志常德府桃源縣乾德中析武陵縣置陶潛桃花源記晉太元中武陵人捕魚為業緣溪行忽逢桃花林林盡水源得一山有小口從口入行數十步豁然開朗其間男女怡然自樂見漁人大驚自云先世避秦亂來絶境問今何世乃不知有漢無論魏晉漁人辭去詣太守説即遣人隨往竟迷不得路隋煬帝詩小苑花紅洛水緑王昌齡字少伯京兆人登開元十五年進士第補祕書郎二十三年中宏詞科調汜水尉遷江寧丞晚節不護細行貶龍標尉昌齡詩緒密而思清與髙適王之渙齊名時謂王江寧集十卷齋心莊子顔回曰回之家貧惟不飲酒不茹葷者數月矣若此則可以為齋乎曰是祭祀之齋非心齋也回曰敢問心齋仲尼曰惟道集虛虛者心齋也江總詩絶俗俗無侣修心心自齋女蘿覆石壁詩蔦與女蘿施于松柏傳女蘿兔絲松蘿也屈原九歌若有人兮山之阿衣薜荔兮帶女蘿古樂府南山幕幕兔絲花東林青青女蘿樹南史徐伯珍傳宅南有九巖山伯珍移居之館東石壁夜忽有赤光洞照江淹詩極眺清波深緬映石壁素庾信積麥崖佛龕銘橫鐫石壁暗鑿山梁王勃淨慧寺碑石壁經文下映龍宫之業溪水幽朦朧沈約詩溪水徒自清微容豈足玩潘嶽秋興賦月朦朧以含光兮李嶠詩朦朧煙霧曉紫葛蔓黃花洞冥記地花氣葛于地下生花入地十丈乃得此葛其根倒出名金虎鬚草亦名紫鬚葛也盧諶詩譬彼樛木蔓葛以敷張翰詩青條若總翠黃花似散金娟娟寒露中鮑照玩月詩末映西北墀娟娟似蛾眉淮南子斗指辛則寒露零郭璞詩寒露拂陵苕朝飲花上露莊子藐姑射之山有神人居焉不食五穀吸風飲露離騷朝飲木蘭之墜露兮夕餐秋菊之落英謝靈運詩巖下雲方合花上露猶泫夜卧松下風世説李元禮謖謖如松下風南史陶𢎞景特愛松風庭院皆植松雲英化為水詩英英白雲注白雲水上輕清之氣當夜而上騰者也本草雲母一名雲英色多青列仙傳咀嚼雲英庾闡詩朝潄雲英玉蕊夕挹玉膏石髓光采與我同沈約詩斂袵依光采端笏奉仁明日月蕩精魄説文日實也太陽之精月闕也太隂之精中論形體者人之精魄也德義令聞者精魄之榮華也郭璞江賦挺異人于精魄江淹詩隱淪駐精魄寥寥天府空左思詩寥寥空宇內庾友詩馳心域表寥寥逺邁莊子不言之辨不道之道若有能知此之謂天府注焉而不滿酌焉而不竭雲笈七籖太乙天之源日月天之眼玄液天之潤六虛天之光幽宫天之府儲光羲兖州人登開元中進士第又詔中書試文章歷監察御史集七十卷釣魚灣詩之子于釣言綸之繩尸子燧氏教人以漁廣韻灣水曲也垂釣緑灣春孔叢子吾始下釣垂一魴之餌曹植七啓乃使任子垂釣魏氏發機梁昭明太子陶淵明集序莊周垂釣於濠伯成躬耕於野張正見詩結宇長江側垂釣廣川潯江淹别賦春草碧色春水緑波春深杏花亂楊炯賦日永春深夏小正正月梅杏柂桃則華四民月令清明時節杏花盛庾信詩興雲榆莢晚燒剃杏花初唐太宗詩拂林花亂彩響谷鳥分聲潭清疑水淺水經注清潭逺漲緑波凝淨湘中記湘水至清雖深五六丈見底了了然謝靈運賦潭結緑而澄清左傳郇瑕氏土薄水淺莊子覆杯水于坳堂之上則芥為之舟置杯焉則膠水淺而舟大也素書水淺者大魚不遊何遜詩川平看鳥逺水淺見魚驚荷動知魚散詩隰有荷華爾推荷芙蕖其莖茄其葉荷其本蔤其華菡萏其實蓮其根藕其中的的中薏古詩江南可採蓮荷葉何田田魚戲荷葉東魚戲荷葉西魚戲荷葉南魚戲荷葉北謝朓詩魚戲新荷動日暮待情人江淹詩日暮碧雲合佳人殊未來鮑照詩回軒駐輕蓋留酌待情人維舟緑楊岸詩泛泛楊舟紼纚維之吳志甘寧常以錦維舟何遜詩居人行轉軾客子暫維舟王褒詩垂楊夾浦緑江總詩岸緑開河柳幽居幽人下山徑易履道坦坦幽人貞吉戴逵間遊贊以廣一往之咏以舒幽人之心水經注山徑委深峯阜交蔭去去夾青林古詩去去日已逺江總詩青山去去愁水經注風泉傳響於青林之下巖猿流聲於白雲之上陶𢎞景書青林翠竹四時俱備謝靈運山居賦拂青林而激波揮白沙而生漣滑處莓苔濕異苑天台山石有莓苔之險孫綽遊天台山賦踐莓苔之滑石搏壁立之翠屏謝靈運山居賦凌石橋之莓苔暗中薜蘿深楚辭被薜荔兮帶女蘿晉書謝安傳論褫薜蘿而襲朱組去衡泌而踐丹墀謝靈運詩想見山阿人薜蘿若在眼春朝煙雨散范雲治西湖詩擁鍤勸年首提爵勞春朝庾信詩春朝迎雨去秋夜隔河來猶帶浮雲隂郭璞詩為蓋停雲隂翠鬱映玉樽梁簡文帝詩浮隂即染浪清氣始乘衣述華清宫舊唐書明皇本紀天寶六載冬十月戊申幸湯泉宫改為華清宫雍録華清宫正門曰津陽門津陽門之東曰瑤光樓其南有長生殿集靈臺朝元閣老君殿注長生殿齋殿也有事於朝元閣即齋沐於此殿天寶七載玄元皇帝見於朝元閣老君殿在朝元閣之南玉石為老君像制作精絶上林神君宫漢書東方朔傳建元三年起上林苑三輔黃圖漢上林苑即秦之舊苑也武帝建元三年開東南至藍田宜春御宿昆吾旁南山而西至長楊五柞北繞黃山瀕渭水而東周袤三百里又枚乘傳修治上林雜以離宫司馬相如上林賦且夫齊楚之事又烏足道乎君未覩夫壯麗也獨不聞天子之上林乎史記封禪書上求神君舍之上林中蹄氏觀聞其言不見其人云三輔黃圖夀宫北宫有神仙宫夀宫張羽旗設供具以禮神君神君來則肅然風生帷帳皆動此地即明庭唐太宗詩一朝辭此地四海遂為家史記封禪書黃帝接萬靈明庭明庭者甘泉也漢書地理志黃帝治萬國朝諸侯乃作合宫兼明庭布政于甘泉漢劉歆賦回天門而鳳舉躡黃帝之明庭王褒靈壇銘明庭朝禮仙官羽衣山開鴻濛色莊子在宥篇雲將東遊過扶搖之枝而適遭鴻蒙經典釋文鴻蒙司馬云自然元氣也一云海上氣也天轉招搖星隋書天文志周天三百六十五度四分度之一又中分之則半覆地上半覆地下故二十八宿半隱半現天轉如車轂之運也漢書天文志日東行星西轉庾信文星機北轉日轡西回曲禮招搖在上急繕其怒注招搖星在北斗杓端主指者疏春秋運斗樞云北斗七星第一天樞第二璇第三璣第四權第五玉衡第六開陽第七搖光搖光即招搖也史記天官書杓端有兩星一內為矛招搖孟康注近北斗者招搖招搖為天矛星經招搖星在梗河北三雪報大有朝野僉載正月見三白田公笑赫赫又北人諺曰要宜麥見三白春秋宣公十有六年冬大有年公羊傳大有年者何大豐年也穀梁傳五穀大熟為大有年孰謂非我靈陸陲新漏刻銘況我神造通幽洞靈霽後詒馬十一巽髙天風雨散詩謂天蓋髙易鼓之以雷霆潤之以風雨詩風雨淒淒雞鳴喈喈清氣在園林九歌髙飛兮安翔乘清氣兮御隂陽顔延之陶徵士誄璿玉致美不為池隍之寶桂椒信芳而非園林之實況我夜初靜關氏易傳晝動六時也夜靜六時也動則變靜則息沈約詩月華臨靜夜夜靜滅氛埃當軒鳴緑琴拾遺記白帝子歌曰璇宫夜靜當軒織張華詩北方有佳人端坐鼓鳴琴陸機詩間夜撫鳴琴白帖相如有緑綺琴從卓氏奏求凰之曲張載詩美人遺我緑綺琴何以贈之雙南金雲開北堂月王僧辨表九縣雲開六合清朗劉遵度關山詩隴樹寒色落塞雲朝欲開詩言樹之背傳背北堂也陸機詩安寢北堂上明月入我牖庭滿南山隂詩南山有臺北山有萊張華詩俠客樂幽險築室窮山隂不見長裾者孔叢子子髙衣長裾振裒袖方履粗翣見平原君漢書鄒陽傳飾固陋之心則何王之門不可曳長裾乎空歌遊子吟蘇武詩請為遊子吟冷冷一何悲題陸山人樓暮聲雜初鴈淮南子季秋之月候鴈來賔陶潛詩往燕無遺影來鴈有餘聲梁簡文帝賦得隴坻鴈初飛詩隴狹朝聲聚風急暮行稀夜色涵早秋江淹詩煙光拂夜色華舟蕩秋風王勃秋江送别詩早是他鄉值早秋江亭明月帶江流獨見海中月韋元旦詩惟應西海月來就掌珠圓照君池上樓謝朓髙齋間望詩巳有池上酌復此風中琴謝靈運登池上樓詩池塘生春草園栁變鳴禽唐太宗詩綺觀連雞岫朱樓接鴈池山雲拂髙棟淮南子山雲草莽水雲魚鱗江總登廣州城詩海樹一邊出山雲四面通梁元帝碑嶕嶢髙棟窅靄修櫳王勃滕王閣詩畫棟朝飛南浦雲天漢入雲流詩維天有漢爾雅牛斗之間為天漢之津魏文帝詩天漢回西流三五正縱橫不惜朝光滿東京賦消啓明掃朝霞登天光于扶桑唐太宗詩朝光上翠微其如千里遊史記秦紀造父長驅歸周一日千里陸厥詩平原十日飲中散千里遊泛茅山東溪地域志茅山在句容縣南五十里山有大茅山中茅山小茅山三茅君得道於此因名一統志茅山形如句字初名句曲山因茅君得道于此更今名道書為第八洞天第一福地山有三峯三茅君各占一峯良常仙系記大司命君茅名盈字叔申咸陽人弟固定録君字季緯弟衷保命君字思和住句曲四十三年司命君將之赤城玉洞之府别其弟曰此去便有局務相關不得數見須一年一見耳時人為之謠曰茅山連金陵江湖據下流三頭神乘白鵠各治一山清晨登仙峯峯逺行未極謝靈運詩杪秋行逺山山逺行不近江海霽初景謝靈運詩緬邈江海遼爾雅雨止為霽釋名景境也明所照處有境限也草木含新色易百穀草木皆甲坼禮記天地和同草木萌動陶潛詩孟夏草木長繞屋樹扶踈何遜詩日夕棲鳥還浮雲起新色而我任天和劉伶詩而我更重之江淹詩而我在萬里莊子正汝形一汝視天和將至漢書禮樂志嘉承天和伊樂厥福謝靈運雪贊彼厲我和王康琚詩推分得天和此時聊動息張正見詩此時積長嘆謝朓詩動息無兼遂岐路多徘徊望鄉白雲裏岑文本詩既欣投轄賞暫緩望鄉情謝靈運詩巖髙白雲屯發棹清溪側釋名在旁撥水曰棹使船棹進也謝瞻詩分手東城隂發棹西江隩謝靈運詩攢念攻别心旦發清溪隂松柏生深山無心自貞直禮記如松柏之有心也劉楨詩松柏有本性王鋒修柏賦既殊祥而抗立亦含貞而挺正仲夏入園中東陂方塘深且廣水經注方塘蓄水澤潤不窮劉楨詩方塘含白水中有鳬與雁庾信賦方塘水白釣渚池圓李百藥詩髙宴臨方塘後漢書南蠻傳滇有池周回二百餘里水源深廣而末更淺狹伊昔俯吾廬揚雄幽州牧針伊昔唐虞實為平陸説文廬寄也舍也陶潛詩衆鳥欣有託吾亦愛吾廬環岸垂緑柳孫綽詩縹芹映流緑柳蔭坂謝靈運詩原隰荑緑柳盈潭發紅蕖王勃採蓮賦飛木蘭之畫楫兮駕芙蓉之綺船問子何去幽潭採蓮韻會荷芙蕖亦作夫渠梁簡文帝詩紅蕖間青瑣紫露濕丹楹江總雲堂賦緑芰懸插紅蕖倒生上延北原秀爾雅髙平曰原庾信銘秋風北原北史王世充傳潛登北原乘髙而下下屬幽人居易履道坦坦幽人貞吉謝靈運登緑嶂山詩幽人常坦步髙尚邈難匹暑雨若混沌書夏暑雨鮑照芙蓉賦當融風之暄蕩承暑雨之平渥莊子倏與忽時相遇于混沌之地渾沌待之甚善河圖括地象兩儀未分其氣混沌晴明如空虛何遜喜晴詩振衣喜初霽褰裳對晚晴莊子形充空虛乃至委蛇漢書董仲舒傳隂常居大冬而積于空虛不用之處阮籍達莊論無欲者易足空虛者受實此鄉多隱逸後漢書岑彭傳曽孫杞魏郡太守招聘隱逸與參政事嵇康詩巖穴多隱逸輕舉求吾師水陸見樵漁魏志王基傳水陸並農以實軍資江淹靈丘竹賦每貫名于華戎將擅竒于水陸孔魚詩蘭澤伴樵漁廢賞亦何貴謝靈運詩孤遊非情歡賞廢理誰通為歡良易攄曹植七啓為歡未泄白日西頽歡徐陵玉臺新詠序投壺玉女為盡于百驍且言重觀國易觀國之光利用賔于王管子觀國者觀君觀軍者觀將陸雲祖考頌周史表觀國之爻鮑照還都詩征夫喜觀國遊子遲見家梁元帝賦時濫假于中台掌邦教之觀國當此賦歸歟論語子在陳曰歸與歸與王粲登樓賦昔尼父之在陳兮有歸與之嘆音終南幽館獻蘇侍郎書終南惇物詩終南何有有條有枚五經要義終南山長安南山也一名太乙張衡西京賦終南太乙崇崫崔崒一統志終南山在西安府府城南五十里曹植大署賦積素氷于幽館氣飛結而為霜卜築青巖裏朱異詩曰余今卜築兼以隔囂紛南史王𢎞之傳始寧沃洲有佳山水𢎞之依巖築室謝靈運顔延之並相欽重又到洽傳築室巖阿幽居積嵗沈約赤松澗詩何時當來還延佇青巖側雲蘿四垂隂劉協新論碧蘿附于青松以茂淩雲之葉陶𢎞景尋山志髙松上兮函停雲低蘿下兮屢迷鳥鮑照賦結中洲之雲蘿託綿思于遙夕洛陽伽藍記髙林巨樹足使日月蔽虧懸葛垂蘿能令風煙出入庾信詩宛宛藤蘿垂徐勉萱草賦其葉四垂其跗六出張衡西京賦吐葩揚榮布葉垂隂虛室若無人莊子虛室生白吉祥止止陶潛詩户庭無塵雜虛室有餘間謝靈運自序傳素秋澄景則獨酌虛室易豐其屋蔀其家窺其户閴其無人潘嶽懷舊賦空館閴其無人喬木自成林詩南有喬木不可休息淮南子喬木之下足以適情謝朓詩窗中列逺岫庭際俯喬林拾遺記紫桂成林傅休奕賦靈草蔽崖嘉木成林陶潛詩亭亭淩風桂八幹共成林時有清風至南史謝瀹傳謝譓曰入我室者唯有清風曹植詩微隂翳陽景清風飄我衣側聞採樵音列子夫子嘗語伯昏瞀人吾側聞之試以告汝左傳請無扞採樵者以誘之張協詩投耒循岸垂時聞採樵音鳳皇鳴髙岡詩鳳皇鳴矣于彼髙岡李皓述志賦和吟鳳之逸響應鳴鸞于南岡望望隔層岑禮記望望焉如有從而弗及謝朓懷故人詩望望忽超逺何由見所思江淹詩假乘試行遊北望髙山岑又靜默鏡綿野四睇亂層岑既言山路逺陸機詩駕言尋飛遁山路鬱盤桓夏侯湛山路吟陟山路兮遐征揚雄河東賦既發軔于平盈兮誰謂路逺而不能從沈約和謝宣城詩神交疲夢寐路逺隔思存復道溪流深謝朓詩山積陵陽阻溪流春穀泉春秋繁露流深者其水不測張衡詩我所思兮在桂林欲往從之湘水深偓佺空中遊司馬相如上林賦偓佺之倫暴于南榮搜神記偓佺者槐山採藥父也好食松實能飛行逮走馬昭靈李夫人歌衆影玄空中兩會自然疇虬龍水中吟埤雅有角曰虬龍王延夀魯靈光殿賦虬龍騰以蜿蜒易雲從龍疏龍是水畜雲是水氣故龍吟則景雲出庾信詩日落江風靜龍吟回上遊何當見輕翼前溪歌花落逐水去何當順流還李陵詩因風附輕翼以遺心藴蒸曹植離繳雁賦挂微軀之輕翼兮忽頽落而離羣左思蜀都賦追輕翼赴絶逺為我達逺心夏侯湛東方朔贊序逺心曠度曹植贈石崇詩分離踰十載思逺心增結江淹詩心逺路已迥意滿辭未陳田家即事應璩詩田家無所有酌醴焚枯魚何遜詩無為淹戚里見就還田家陶潛詩即事多所欣蒲葉日巳長魏甄后塘上行蒲生我池中其葉何離離徐陵文望杏敦耕瞻蒲勸穡杏花日巳滋王融策秀才文將使杏花菖葉耕穫不愆清甽冷風述遵無廢四民月令杏花盛桑葉白庾信詩興雲榆莢晚燒剃杏花初老農要看此論語吾不如老農貴不違天時易後天而奉天時禮記天生時而地生財迎晨起飯牛莊子百里奚爵祿不入于心故飯牛而牛肥準南子寧戚欲干齊桓公困窮無以自達將任車以商於齊宿於郭門外桓公郊迎客寧戚飯牛車下擊牛角而疾商歌桓公命後車載之雙駕耕東災爾雅田一嵗曰災謝朓詩連隂盛農節臺笠聚東災蚯蚓土中出禮記孟夏之月蚯蚓出論衡天旦雨螻蟻徙蚯蚓出古令注蚯矧善長吟於地中江東謂之歌女或謂之鳴砌田烏隨我飛袁山松後漢書陳弇學尚書躬自耕種常有黃雀飛來隨弇翺翔魏文帝詩飛鳥翔我前阮籍詩羣鳥飛翩翩羣合亂啄噪玉篇啄鳥食也廣韻噪羣呼也嗷嗷如道飢詩鴻雁于飛哀鳴嗷嗷束晢詩嗷嗷林烏受哺于子我心多惻隱詩我思古人實獲我心劉向九歎外傍徨而遊覽兮內惻隱而含哀顧此兩傷悲詩女心傷悲撥食與田烏南史顧歡傳歡字景怡家貧父使田中驅雀歡作黃雀賦而歸雀食稻過半晚節服食不與人通每旦出户山鳥集其掌取食日暮空筐歸南史柳元景傳少時貧苦嘗至大雷日暮寒甚頗有羈旅之歎王粲詩日暮遊西園易林刲羊不當女執空筐親戚更相誚禮記兄弟親戚稱其慈也國語親戚補察左思詩親戚還相蔑孔稚圭北山移文列壑爭譏羣峯竦誚我心終不移詩我心匪石不可轉也江淹詩兔絲及水萍所寄終不移同諸公秋霽曲江俯見南山兩京新記朱雀桁東第五街皇城之東第三街升道坊龍華尼寺南有流水屈曲謂之曲江雍録唐曲江本秦隑州至漢為樂遊原隋會黃渠水穿城而入為芙蓉池長安中於原上置亭遊賞正月晦日三月三日九月九日京城士女即此袚褉一統志曲江池在西安府城東南一十里雍録終南山橫亘關中南面西起秦隴東徹藍田凡雍岐郿鄠長安萬年相去八百里而連綿峙據其南者皆此之一山也一統志終南山在西安府城南五十里一名南山天靜終南髙朱使欣詩江如曉天靜石似暮雲張張衡西京賦終南太乙崇屈崔崒傅休奕賦終南鬱以崔巍俯映江水明沈約詩俯映石磷磷楚辭令沅湘兮無波使江水兮安流枚乘七發江水逆流海水上潮阮籍詩湛湛長江水上有楓樹林有若蓬萊水山海經蓬萊山在海中漢書郊祀志自威宣燕昭使人入海求蓬萊方丈瀛洲此三神山者相傳在渤海中去人不逺郭璞遊仙詩吞舟涌海底髙浪駕蓬萊淺深見澄瀛詩就其深矣方之舟之就其淺矣泳之遊之謝惠連詩日落泛澄瀛星羅遊輕橈羣峯懸中流水經注髙巒截雲層陵斷霧競舉羣峯之上謝靈運賦九泉别澗五谷異巘羣峯參差出其間連岫復陸成其坂歐陽詹曲江記回岡旁轉圓環四匝中成坎窞崇山濬川鈎結盤護涵虛抱景氣象澄鮮石壁如瑤瓊陶𢎞景書兩岸石壁五色交輝詩投我以木桃報之以瓊瑤左思詩石泉潄瓊瑤陸雲詩超迹皇英質如瑤瓊魚龍隱蒼翠水經注汧水出五色魚俗以為靈莫敢採捕因謂為魚龍水謝朓詩蒼翠望寒山崢嶸瞰平陸鳥獸遊清泠山海經豐山神耕父處之常遊清冷之淵郭璞贊清冷之水在乎山頂耕父是遊流光灑景陸雲詩雲乘靄下泉冽清冷菰蒲林下秋鮑照賦立菰蒲之寒渚康駢劇談録曲江菰蒲蔥翠柳隂四合薜荔波中輕離騷攬木根以結茝兮貫薜荔之落蕊山蔓浴蘭沚按山蔓應作山夔次句以水若屬對意自顯然國語木石之怪夔罔兩説文如龍一足有腳手人面之形又全唐詩作戛唐詩紀作􅀈俱不可解楚辭浴蘭湯兮沐芳詩菁菁者莪在彼中沚説文小渚曰沚水若居雲屏顔延之詩山祗蹕嶠路水若驚滄流注水若水神也盧思道詩山祗效靈物水若薦休徵張協七命雲屛爛汗瓊壁青蔥嵐氣浮渚宫江淹詩嵐氣隂不極日色半虧天左傳子西泝江將入郢王在渚宫下見之孤光隨曜靈沈約咏雁詩羣浮動輕浪單泛逐孤光楚辭角宿未旦曜靈安藏注曜靈日也張衡歸田賦曜靈俄景繼以望舒隂隂豫章館三輔黃圖上林有豫章觀武帝造在昆明池中亦曰昆明觀張衡西京賦豫章珍館揭焉髙峙注以豫章木為館也宛宛百花亭一統志百花亭在九江府城東梁刺史邵陵王綸建梁元帝有詩大君及羣臣易大君有命禮記體羣臣則士之報禮重劇談録曲江開元中為勝境中和上已節賜宴臣僚會於山亭京兆府大陳筵席恩賜太常及教坊聲樂池中備綵舟數隻惟宰相三使北省官與翰林學士登焉燕樂方嚶鳴易雲上於天需君子以飲食燕樂左傳昔諸侯朝正於王王燕樂之於是乎賦湛露則天子當陽諸侯用命也詩嚶其鳴矣求其友聲謝靈運詩鳴嚶巳悅豫幽居獨鬱陶吾黨二三子論語吾黨之小子狂簡又二三子偃之言是也兹辰怡性情鮑照詩兹辰自為美易利貞者性情也中論學也者所以疏神達思怡情理性聖人之上務也逍遙滄洲時詩河上乎逍遙莊子逍遙篇注物任其性事稱其能名當其分逍遙一也袁粲詩訪迹雖中宇循寄乃滄洲謝朓詩既歡懷祿情復協滄洲趣乃在長安城漢書地理志長安縣屬京兆尹髙帝五年置三輔黃圖三輔共治長安城中謝朓詩灞涘望長安河陽視京縣胡師耽登終南山詩煙霞亂鳥道俯見長安城常建開元中進士大歷中為盱眙尉詩似初發通莊却尋野徑百里之外方歸大道其旨逺其興僻佳句輒來唯論意表淪於一尉士論悲之江上琴興江上調玉琴吳均詩露下寒葭中風起秋江上漢書揚雄傳隂陽清濁穆羽相和兮若夔牙之調琴庾信詩下橋先勸酒跂石始調琴賀徹詩薄暮髙堂上調琴召美人王融詠幔詩每聚金爐氣時駐玉琴聲鮑照詩玉琴生網羅一絃清一心庾信詩棲烏送一絃郭璞詩中有冥寂士靜嘯撫清絃鮑照朗月行靚裝坐帷裏當户弄清絃庾肩吾詩蘭堂上客至綺席清絃撫劉協新論神恬心清則形無纍矣嵇康琴賦愔愔琴德不可測兮體清心逺邈難極兮丘遲題琴朴詩清心有素體直幹無曲枝泠泠七絃遍湘中記衡山有懸泉滴瀝巖間泠泠如絃有白鶴回翔其上如舞漢蘇武詩請為遊士吟泠泠一何悲文賦文徽徽以溢目音泠泠而盈耳葛洪詩洞隂泠泠風佩清桓談新論神農氏為琴七絃足以通萬物而考理亂也揚子昔舜彈五弦之琴而天下治堯加二絃以合君臣之恩爾雅疏琴五絃象五形大絃為君小絃為臣文王武王加二絃以合君臣之恩也三禮圖琴第一絃為宫次為商次為角次為徵次為羽次為少宫次為少商風俗通琴七絃者法七星也晉書孫登傳登好讀易撫七絃琴嵇康酒會詩但當體七絃寄心在知已萬木澄幽隂南史張充傳桂蘭綺靡叢雜於山幽松柏森隂相繚於澗側江總山亭銘樹影搖窗池光動幕月澄遙溆風清近壑能使江月白何遜宿南洲浦詩違鄉已信次江月初三五梁元帝詩澄江涵皓月水影若浮天庾信舟中望月詩山明疑有雪岸白不關沙又令江水深楚辭使江水兮安流七發江水逆流海水上潮韓詩外傳子貢曰臣之事仲尼譬猶渴操壺杓就江海而飲腹滿而去又安知江海之深乎左傳魏獻子曰新田土厚水深居之不疾張衡詩我所思兮在桂林欲往從之湘水深始知枯桐枝列子人有枯桐樹者鄰父請以為薪其人不悅曰鄰父徒欲為薪而教吾伐之也七發龍門之桐髙百尺而無枝范雲詩來棲桐樹枝庾信詩桐枝長舊圍可以徽黃金梁元帝秋夜詩金徽調玉軫兹夜撫離鴻漢書食貨志金有三等黃者為上白金為中赤金為下張山人彈琴屈原九歌山中人兮芳杜若飲石泉兮蔭松柏君去芳草緑徐幹詩君去日已逺楚辭吾誰與玩此芳草西峯留玉琴華山志南峯一名岱頂登之則東西兩峯僅當腰膝謝朓詩時駐玉琴聲豈惟丘中賞詩丘中有麻左思詩巖穴無結搆丘中有鳴琴注尚書大傳子夏曰弟子受書于夫子者不敢忘雖退而巖居河濟之間深山之中作壤室尚彈琴其中以歌先王之風則可以發憤矣江表傳周瑜謂蔣幹曰吾雖不及夔曠然聞絃賞音足知雅曲也李嶠詩暫悅丘中賞還希物外遊兼得清煩襟嵇康琴賦懲躁雪煩注雪蕩煩悶也湛方生風賦竦神襟以清滌朝從山口還陶潛桃花源記武陵人捕魚逢桃花林林盡便得一山有小口髣佛若有光便捨船從口入出嶺聞清音説文嶺阪也廣韻嶺山陂也王暕詩趙瑟含清音了然雲霞氣沈佺期詩了然究諸品彌覺靜者安江淹詩時菊耀巖阿雲霞冠秋嶺莊子絶雲氣負青天庾信詩定取流霞氣時添承露杯照見天地心嵇康琴賦感天地以致和易復其見天地之心乎玄鶴下澄空韓非子衛靈公之晉平公觴之施夷之臺公曰有新聲願請以示乃召師曠援琴鼓之有玄鶴二八道南方來集於郎門之垝聲聞于天公大悅成公綏琴賦伯牙彈而六馬仰秣子野揮而玄鶴翔鳴陶潛詩氣和天維澄班坐依逺流翩翩舞松林詩翩翩者隼蒸然來思魏彭城王協詩問松林松林經幾冬山川何如昔風雲與古同改絃叩商聲隋書梁彥光傳改絃易調庶有以變其風俗公羊傳注聞商聲則使人方正而好義阮籍詩素質出商聲又聽飛龍吟嵇康琴賦飛龍鹿鳴鵾雞遊絃注漢房中樂有飛龍章樂府解題飛龍引者古樂府魚龍六曲之一樂府詩集楚辭離騷曰為余駕飛龍兮雜瑤象以為車曹植飛龍篇亦言求仙者乘飛龍而升天與楚辭同稍覺此身妄嵇康琴賦恬虛樂古棄事遺身傳燈録四大各離今者妄身當在何處漸知仙事深曹植飛龍篇我知真人長跪問道西登玉堂金樓復道授我仙藥神皇所造教我服食還精補腦其將鍊金鼎江淹别賦守丹竈而不顧鍊金鼎而方堅注鍊金鼎鍊金為丹之鼎也抱朴子九轉丹在神鼎中永矣投吾簪蒼頡篇簪所以持冠左思詩躊躇足力煩聊欲投吾簪夢太白西峯水經注地理志曰太一山古文以為終南杜預以為中南也亦曰太白山在武功縣南俗云武功太白去天三百杜彥達曰太白山南連武功山於諸山最為雄傑冬夏積雪望之浩然元和志在郿縣東南五十里關中諸山莫髙於此積雪六月不消録異記金星之精墜於中南圭峯之西因號為太白山福地記終南西連太白至於隴山三秦記太白山從長安向西可二百里一統志在陜西西安府武功縣南九十里夢寐升九巖後漢書郎顗傳夙夜夢寐盡心所計謝靈運詩夢寐佇歸舟釋我吝與勞史記夏本紀道九山索隱岍壺口砥柱太行西傾熊耳嶓冢內方岐是九山也南史徐伯珍宅南九里有髙山班固謂之九巖山杳靄逢元君梁元帝陶𢎞景碑嶕嶢髙棟窅靄修櫳張均灉湖詩杳靄涌寒岑三秦記太白山中常有一道士不食五穀自言太乙之精齋潔乃得見之水經注太白山上有谷春祠山下有太白祠老子內傳授元君神圖寶章還丹伏火水汞金液之術修真入道祕言清朝北望紫緑白雲為三元君於立春日乘八輪之輿上詣天帝之三素飛雲也遺我太白岑詩王事敦我政事一埤遺我記纂淵海太白山極髙巍巍秀傑山上有洞名十一洞天又有橫雲如瀑布則澍雨上有太白湫謝朓詩若遺金門步見就玉山岑廣韻山小而髙曰岑寥寥辭垢氛庾信終南山義谷銘寥廓上淨崢嶸下鎮謝靈運詩海岸常寥寥空館盈清思又述祖德詩兼抱濟物性而不攖垢氛陳子昂詩我愛鬼谷子清溪無垢氛結宇在星漢晉書江逌傳屏居臨海棄絶人事剪茅結宇耽玩載籍謝朓治宅詩結宇夕隂街荒幽橫九曲宋書宗炳傳結宇衡山欲懷尚平之志魏武帝碣石篇日月之行若出其中星漢燦爛若出其裏魏文帝燕歌行明月皎皎照我牀星漢西流夜未央宴林閉絪緼宋之問遊法華寺詩宴林薰寶樹水溜滴金沙易天地絪緼萬物化醇正義絪緼相附著之義釋文本又作氤氲謝靈運入道至人賦飛英明於對溜積氤氲而為峯簷楹覆餘翠謝惠連詩落日隱櫩楹升月照亷櫳櫩同簷蕭子鈞詩山翠餘煙積川平晚照收唐太宗詩日晃百花色風動千林翠巾舄生片雲傅子漢末王公多著縑巾説苑襄城君履青舄立乎流水之上江淹賦秋露下兮點劒舄春苔生兮綴衣巾庾信文瑞雲一片仙童兩人時往溪谷間法言時來則來時往則往能來能往者朱鳥之謂歟義谷銘八溪分注九谷通源淮南子邅回州谷之間而滔騰大荒之野孤亭晝仍曛寰宇記孤嶼亭在永嘉江中謝靈運所遊後人建亭其上鮑照登大雷岸與妹書遨神清渚流睇正矄庾肩吾詩峯樓霞早發林殿日先曛松峯引天影庾信佛龕銘百仞崖橫千尋松直水經注秀嶂分霄層崖刺天岑參詩引影到繩牀石瀨清霞紋楚辭九歌石瀨兮淺淺飛龍兮翩翩左思魏都賦蘭渚莓莓石瀨湯湯班固終南山賦嶔崟鬱律萃於霞氛旁吐飛瀨上挺修林謝朓詩餘霞散成綺何遜詩疏樹翻髙葉寒流聚細紋恬目緩舟趣梁簡文帝曲水宴詩濯伊臨灞蕩心愈目唐太宗詩對此恬千慮無勞訪九仙宋之問遊稱心寺詩望諧舟客趣恩發海人煙謝靈運賦呈美表趣胡可勝殫霽心投鳥羣後漢書馬援傳開心見誠無所隱伏班固賦榮期綺季此焉恬心陶潛詩栖栖失羣鳥日暮還獨飛阮籍詠懷詩焉見孤翔鳥翩翩無匹羣春風又搖棹禮記孟春之月東風解凍管子吾不能以春風風人梁湘東王春日詩春還春節美春日春風過李嶠詩迎風欲舉棹潭島花紛紛武陵人歌樂兹潭兮安流孟浩然詩曲島尋花藥回潭折芰荷庾信終南山詩樹宿含櫻鳥花留釀蜜蜂杜甫詩採花香泛泛坐客醉紛紛湖中晚霽湖廣舟自輕王粲詩方舟順廣川陸厥詩日暮無輕舟江天欲澄霽謝莊詩煙竟山郊逺霧罷江天分謝靈運詩時竟夕澄霽雲歸日西馳孫逖别韋士曹序天與澄霽神助幽隂是時清絶望陸雲書頃日視之實自清絶楚辭登白蘋以騁望氣色猶霾曀謝惠連詩氣色少諧和木華海賦霾曀潛銷莫振莫竦劉孝綽詩如何此日風霾曀駭波瀾踟蹰金霞白詩搔首踟蹰太玄經四九為金為西方為秋色白江淹賦霞晃朗而下飛波上日初麗何遜詩薄雲巖際出初月波中上謝靈運詩白日麗江臯沈炯詩雲開萬里徹日麗百川明煙虹落鏡中説文虹螮蝀狀如蟲釋名虹攻也純陽攻隂之氣張説詩雲峯吐日月石壁淡煙虹晉書王羲之云每行山隂道上如鏡中遊樹木生天際四皓采芝歌樹木莫髙山崔嵬焦仲卿詩今日大風寒寒風摧樹木魏武帝詩樹木何蕭瑟易豐其屋天際翔也謝朓詩天際識歸舟雲中辨江樹杳杳巖欲辨鮑照詩杳杳落日晚濛濛雲復閉束晳詩奕奕玄霄濛濛甘霤言乘星漢明蜀都賦若雲漢含星而光耀洪流魏武帝碣石篇日月之行若出其中星漢燦爛若出其裏魏文帝燕歌行明月皎皎照我牀星漢西流夜未央鮑照詩璇淵抱星漢又覩寰瀛勢南史梁紀論聲振寰宇津流遐裔史記中國外如赤縣神州者九乃所謂九州也于是有禆海環之人民禽獸莫能相通如一區中者乃為一州如此者九乃有大瀛海環其外微興從此愜張九齡詩地將幽興愜情與舊遊疏悠然不知嵗陶潛詩悠然見南山管子時者所以記嵗也試歌滄浪清孟子滄浪之水清兮可以濯我纓沈約詩滄浪有時濁清濟涸無津遂覺乾坤細易乾坤其易之門耶劉允濟詩迹隨造化久利與乾坤博韋承慶詩大造乾坤闢恩深雨露垂豈念客衣薄曹植詩焉念無衣客古詩遊子寒無衣將期永投袂江淹詩投袂既憤悶晉書劉琨傳贊枕戈長息投袂徼功陸機詩投袂赴門塗遲回漁火間史記索隱祗敬遲回不能去之趙冬曦詩鶴聲聒前浦漁火明暗叢一雁聲嘹唳庾信詩雨歇殘虹斷雲歸一雁征謝惠連詩嘹唳度雲雁李百藥笙賦逺而聽之若遊鴛翔鶴嘹唳飛空陳子昂詩葳㽔蒼梧鳳嘹唳白露蟬白湖寺後溪宿雲門會稽記雲門山在縣南三十里水經注山隂縣南有玉笥竹林雲門天柱精舍並疏山創基架林裁宇割潤延流盡泉石之好落日山水清謝靈運撰征賦望新晴于落日謝惠連詩落日隱櫩楹左思詩非必絲與竹山水有清音謝靈運詩昏旦變氣候山水含清暉亂流鳴淙淙鮑照日落望江詩亂流潨大壑長霧匝髙林説文淙水聲舊蒲雨抽節庾信喜晴詩桐枝長舊圍蒲節抽新寸新花水對窗梁簡文帝樂府細萍重疊長新花歷亂開李嶠詠山詩古壁丹青色新花綺繡紋謝靈運詩羣木既羅户衆山亦對窗溪中日巳沒歸鳥多為雙楚辭因歸鳥而致辭兮羌迅髙而難當曹植詩歸鳥數移柯翩翩厲羽翼陸機詩思駕歸鴻羽比翼雙飛翰杉松引直路爾雅注煔似松生江南可以為船作柱埋之不腐疏煔俗作杉書至于五千疏五千里者直方之數若其回邪委曲動有倍加之較是直路五千里也詩周道如砥其直如矢出谷臨前湖詩出自幽谷遷于喬木謝靈運詩出谷日尚早入舟陽已微洲渚晚色靜謝靈運詩辛勤風波事款曲洲渚言沈約詠菰詩結根布洲渚江總詩林前暝色靜花處近香來又觀花與蒲詩彼澤之陂有蒲與荷入溪復登嶺李德林詩登嶺望重關振佩且鳴環草淺寒流速魏文帝典論弓燥手柔草淺獸肥謝朓詩邑里向疏蕪寒流自清泚圓月明髙峯唐太宗喜雪詩照壁臺圓月飄珠箔穿露陶𢎞景書髙峯入雲清流見底庾信積麥崖佛龕銘髙峯尋雲深谷無景春山因獨宿詩敦彼獨宿亦在車下劉向九歎旦徘徊于長坂兮夕傍徨而獨宿松隂澄初夜江淹詩翩翩征鳥翼蕭蕭松柏隂曙色分逺目蕭慤詩野禽喧曙色山樹動秋聲日出城南隅史記封禪書七曰日主祠成山成山斗入海最居齊東北隅以迎日出云古詩日出東南隅照我秦氏樓又羅敷善蠶桑採桑城南隅青青媚川陸古金人銘青青不伐將尋斧柯古詩青青河畔草水經注升眺清逺勢盡川陸陸機詩川陸殊塗軌亂花覆東郭梁武帝芳樹樂府雜色亂參差衆花紛重疊碧氣消長林嵇康書禽鹿見羈雖飾以金鑣饗以嘉肴愈思長林而志在豐草也四郊一清影周禮秋官遂士掌四郊之賦千里歸寸心謝莊月賦隔千里兮共明月沈約詩以我徑寸心從君千里外前瞻王程促劉庭芝詩賔遊寬旅宴王事促嚴程却戀雲門深梁書何子季傳以會稽多靈異往遊焉居若耶山雲門寺畢景有餘興南史張充傳長羣魚鳥畢景松阿拾遺記時命水嬉隨風輕漾畢景忘歸乃至通夜到家調玉琴王融咏幔詩每聚金爐氣時駐玉琴聲御選唐詩卷五
