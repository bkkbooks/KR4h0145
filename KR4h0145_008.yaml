body:
  text: 欽定四庫全書御選唐詩卷五五言古杜甫字子美其先襄陽人天寶初應進士不第後獻三大禮賦明皇竒之召試文章授京兆府兵曹參軍肅宗即位靈武甫自賊中遁赴行在拜左拾遺以論救房琯出為華州司功參軍嚴武鎮成都奏為參謀檢校工部員外郎賜緋乃於成都浣花里種竹植樹枕江結廬縱酒嘯歌其中蜀帥相攻甫攜家扁舟下峽沂沿湘流寓居耒陽天寶間甫與李白齊名時稱李杜然元稹之言曰李白壯浪縱恣擺去拘束誠亦差肩子美矣至若鋪陳終始排比聲韻大或千言次猶數百詞氣豪邁而風調清深屬對律切而脫棄凡近則李尚不能歷其藩翰況堂奧乎白居易亦云杜詩貫穿古今盡工盡善殆過於李元白之論如此萬丈潭太平寰宇記萬丈潭在甫宅西洪濤蒼石山徑岸壁如目見之一統志在成都縣東南七里俗傳昔有黑龍自潭飛出一名鳳皇潭青溪合𡨕寞郭璞詩青溪千餘仞王勃淨惠寺碑文野老紓花向青溪而不返神物有顯晦易天生神物聖人則之晉書張華傳華報留煥書曰詳觀劒文乃干將也莫邪何復不至雖然天生神物終當合耳晉書隱逸傳論君子之行殊塗顯晦之謂也劉峻辨命論夫聖人之言顯而晦微而婉龍依積水盤荀子積水成盤蛟龍生焉窟壓萬丈內木華海賦盤盓激而成窟孫綽天台山賦臨萬大之絶𡨕局步凌垠崿梁元帝與劉智藏書經丘園而局步楊炯王勃集序乃相循於局步豈見習於通方説文垠岸也崿崖也張衡西京賦在彼靈囿之中前後無有垠崿淮南子未有形埒垠崿側身下煙靄楚辭願側身而無所又揚雲霓之暗靄兮鳴玉鸞之啾啾陸雲文芳塵穆以煙煴彤雲起而深靄前臨洪濤寬水經注洪濤灌山遂成巨井木華海賦洪濤瀾汗萬里無際却立蒼石大魏志明帝紀注氐池縣大栁谷口夜激波湧溢曉而有蒼石立水中白石畫之為牛馬鳥八卦玉玦之象山危一徑盡簡文帝晚春賦既浪激而沙流亦苔生而徑危岸絶兩壁對水經注灕水東北徑石門口山髙嶮絶對岸若門削成根虛無山海經太華之山削成而四方顔延之詩踐華因削成司馬相如上林賦乘虛無與神俱淮南子虛無者道之所居也倒影成淡濧水經注素湍緑潭回清倒影孫綽天台山賦或倒景於重溟注山臨水而影倒故曰倒景也廬山諸道人遊石門詩序流光回照則衆山倒影廣韻淡水搖動貌濧漬也濡也黑知灣環底韻會灣水曲也漩澴波貌宋玉髙唐賦不見其底虛聞松聲清見光炯碎孤雲倒來深古謠孤雲兩角去天一握陶潛詩孤雲獨無依飛鳥不在外王粲詩飛鳥翔故林蕭慤春賦飛鳥排花度水經注鳥鼠之山穴地而共處鼠內而鳥外髙蘿成帷幄江淹江上之山賦挂青蘿兮萬仞豎丹石兮百重司馬相如賦舉帷幄之襜襜陸機詩輕條象雲搆密葉成翠幄寒木壘旌斾水經注垂崖俯視猿狖驚心寒木被潭森沈駭觀梁簡文帝登城詩靡靡見虛煙森森視寒木宋玉髙唐賦垂旒旌斾康協終南行楓丹杉碧疊旌立斾逺川曲通流謝惠連詩遐川阻昵愛修渚曠清容管子水者地之血氣如筋脈之通流者也淮南子江淮通流四海溟涬嵌竇潛泄瀨隂鏗詩石竇引環流水經注飛泉側瀨於窮坎之下謝靈運撰征賦水激瀨而駿奔造幽無人境孫綽天台山賦序卒踐無人之境陶潛詩結廬在人境而無車馬喧發興自我輩晉書王衍傳聖人忘情最下不及然則情之所鍾當在我輩又孫綽傳嘗作天台賦以示范榮期每至佳句輒云應是我輩語告歸遺恨多詩言告言歸將老斯遊最左傳使營菟裘吾將老焉閉藏修鱗蟄淮南子隂氣極則萬物閉藏蟄蟲首穴出入巨石礙司馬相如子虛賦外發芙蓉菱花內隱巨石白沙水經注夾岸崇深傾崖返捍巨石臨危若墜復倚庾信詩門嫌磁石礙何當暑天過快意風雨會周禮大司徒以土圭之法測土深日至之景尺有五寸謂之地中天地之所合也四時之所交也風雨之所會也飛仙閣方輿勝覽飛泉嶺在興州東三十里相傳徐佐卿化鶴跧泊之地故名飛仙有閣道百餘間即入蜀路華陽國志諸葛亮相蜀鑿石駕空為飛梁閣道水經注大劍戍至小劍三十里連山絶險飛閣相通謂之閣道土門山行窄史記陸行載車水行乘船泥行乘橇山行乘輂廣韻輂居玉切禹所乘直轅車説文駕馬也一作檋謝靈運贈臨海太守詩邦君難地險旅客易山行微徑緣秋毫後漢書隗囂傳方望曰聞烏氏有龍池之山微徑南通與漢相屬其旁時有竒人聊及間暇訪求其真魏志田疇傳太祖北征烏桓軍次無終方夏水不得進疇曰舊道出盧龍達於柳城自建武陷絶垂二百載尚有微徑可通莊子天下莫大於秋毫之末而泰山為小周𢎞正表析至微于秋毫渙層氷于幽谷棧雲闌干峻史記棧道千里通于蜀漢通志棧道在褒斜谷中飛仙閣即今武曲關北棧閣五十三間總名連雲棧梁州圖經棧道連空極天下之至險興利州至三泉縣橋閣共一萬九千三百八十間護險編欄共四萬七千一百三十間左思吳都賦珠琲闌千注闌干縱橫也魏武帝善哉行月沒參橫北斗闌干曹植樂府騰觚飛爵闌干同量梯石結搆牢梁元帝賦途嶮峭而巉絶路登陟而如梯左思詩巖穴無結搆丘中有鳴琴謝朓詩結搆何迢遞曠望極髙深江總棲霞寺碑披拂榛梗結搆茅茨萬壑欹疏林晉書顧愷之傳千巖競秀萬壑爭流鮑照登廬山詩千巖盛阻積萬壑勢回縈江淹詩萬壑共馳騖百谷爭往來孫綽詩疏林積涼風阮卓詩髙風應爽節搖落漸疏林積隂帶奔濤文子積隂不生積陽不化淮南子積隂之寒氣為水虞茂詩長瀾疑浴日連島類奔濤寒日外淡泊陶潛詩慘慘寒日李百藥詩總轡臨秋原登城望寒日莊子淡與泊相遇諸葛亮誡子書非淡泊無以明志長風中怒號晉書宗慤傳願乘長風破萬里浪吳筠詩長風倒危葉宋玉髙唐賦崒中怒而特髙兮若浮海而望碣石注崒聚也謂兩浪相合聚而中髙也莊子大塊噫氣其名為風作則萬竅怒號歇鞍在地底張衡賦追慌忽于地底兮始覺所歷髙潘嶽詩望廬思其人入室想所歷往來雜坐卧易往來井井左傳行李之往來共其乏困史記淳于髠傳州閭之會男女雜坐楚辭士女雜坐亂而不分些劉孝綽詩坐卧猶懷想人馬同疲勞吳志孫韶傳權過建業乃得朝覲權問青徐諸屯要害逺近人馬衆寡魏將帥姓名盡具識之魏武帝苦寒行行行日巳逺人馬同時飢左傳民不罷勞師無怒讟政有經矣後漢書今大耿兵少于彼又皆疲勞浮生有定分莊子其生若浮棗腆詩窮達有定分慷慨復何辭飢飽豈可逃北史馮元興傳元興家素貧約食客恆數十人同其飢飽左傳君天也天可逃乎歎息謂妻子劉植詩投翰長歎息綺麗不可忘阮德如詩撫軫增歎息令子安能忘詩妻子好合我何隨汝曹馬援戒子弟書龍伯髙敦厚周慎口無擇言吾愛之重之願汝曹效之杜季良豪俠好義吾愛之重之不願汝曹效也後漢張奂戒子弟書汝曹薄祜遊龍門奉先寺兩京新記煬帝登北邙觀伊闕曰此龍門也自古何不建都於此元和郡縣志伊闕山在河南府伊闕縣北四十五里黃鶴注此當是開元二十四年後遊東都時作巳從招提遊更宿招提境釋氏要覽梵語云柘鬭提奢唐言四方生物訛柘為招去鬭奢留提故稱招提即今十方住持寺也隂壑生靈籟沈佺期詩隂壑巳永閉雲竇絶探討師古注靈籟風也猶雨曰靈雨月林散清影曹植詩明月澄清影天闕象緯逼韋述東都記龍門號雙闕以與大內對峙若天闕焉拾遺記師延精述隂陽曉明象緯莫測其為人雲卧衣裳冷鮑照升天行雲卧恣天行詩東方未明顛倒衣裳欲覺聞晨鐘庾信詩出寺響晨鐘令人發深省望嶽後漢書祭祀志注嶽者靈氣之所宅水經泰山為東嶽在博縣西北注岱宗也王者封禪於其山示增髙也有金策玉檢之事焉元和志泰山在兖州乾封縣西北三十里白帖冠五嶽之首一統志泰安州在濟南府城南一百八十里宋改乾封縣為奉符置泰安軍尋改州泰山在州北五里岱宗夫如何書嵗二月東巡守至于岱宗五經通義岱者代也東方萬物始交代之處宗長也泰山記盤道屈曲而上凡五十餘盤經小天門大天門西巖為仙人石門東南巖為日觀雞鳴時見日出陸機齊謳行崇山入髙冥齊魯青未了孟子周公之封於魯為方百里也太公之封於齊也亦為方百里也史記貨殖傳泰山之陽則魯其隂則齊淮南子泰山之容巍巍然髙望之千里不見唾堁逺之故也後魏孝文帝祭嵩髙山文峻極吳青陳子昂詩唯見逺山青造化鍾神秀莊子以天地為大爐以造化為大冶王羲之蘭亭詩大矣造化工萬殊莫不均孫綽天台山賦序蓋山嶽之神秀謝靈運泰山吟岱宗秀維嶽崔崒刺雲天一統志山有三峯秦觀獨秀隂陽割昏曉易立天之道曰隂與陽謝靈運善哉行隂灌陽叢凋華墮萼子華子太真剖割通之而為一離之而為兩禮記孟春之月日在營室昏參中旦尾中曹毗對儒大人達觀任化昏曉元和志開元十三年冬登封泰山登封之夕凝氛昏晦迅風激烈皇帝出齋宫露立以請及明清霽旗幡不搖事畢至山下日又抱戴明曜五色蕩胸生層雲樂府古辭當須蕩中情遊心恣所欲馬融廣成讃洞蕩胸臆發明耳目公羊傳觸石而出膚寸而合不崇朝而雨遍天下者其惟泰山之雲乎史記封禪書武帝封泰山後有白雲起封中庾肩吾詩層雲埋峻嶺絶澗倒危峯決眥入歸鳥漢書司馬相如傳弓不虛發中必決眥楚辭因歸鳥而致辭兮羌迅髙而難當曹植詩歸鳥赴喬林翩翩厲羽翼會當凌絶頂一覽衆山小一統志由盤道至絶頂髙四十餘里謝靈運詩凌峯步曽崖沈約詩絶頂復孤圓史記秦始皇紀登兹泰山周覽東極世説若使阡陌條暢則一覽而盡揚子法言登東嶽然後知衆山之峛崺也况介丘乎泰山記東巖為介丘崔皓詩直上孤頂髙平看衆山小同諸公登慈恩寺塔原注時髙適薛據先有作一統志慈恩寺在陜西西安府城南曲江池側唐髙宗為文德皇后建又云雁塔在慈恩寺中西京雜記寺西院浮屠髙三百尺長安志慈恩寺在萬年縣東南八里髙標跨蒼穹蜀都賦陽烏回翼乎髙標詩靡有旅力以念穹蒼爾雅穹蒼蒼天也郭璞注天形穹窿其色蒼蒼丹元子步天歌昭昭列象布蒼穹烈風無時休書烈風雷雨弗迷自非曠士懷鮑照詩安知曠士懷登兹翻百憂詩逢此百憂方知象教力王屮頭陀寺碑正法既沒象教陵夷注謂為形象以教人也足可追𡨕搜孫興公天台賦非夫逺寄𡨕搜篤信通神者何有遐思而存之仰穿龍蛇窟千家注龍蛇窟謂塔間磴道屈曲而升也始出枝撑幽魯靈光殿賦枝撑權丫而斜據黃庭堅杜詩箋慈恩寺下數級皆枝撑洞黑出上級始明七星在北户春秋運斗樞北斗七星第一天樞第二璇第三機第四權第五玉衡第六闓陽第七瑤光居隂布陽故曰日北吳都賦開北户以向日河漢聲西流古詩河漢清且淺魏文帝詩河漢回西流羲和鞭白日楚辭吾令羲和弭節注羲和日御也又白日昭只少昊行清秋月令孟秋之月其帝少昊注少昊金天氏潘尼詩朱明送夏少昊迎秋殷仲文詩獨有清秋日泰山忽破碎泰山據全集改秦山舊注秦山謂終南諸山登山望之大小錯雜如破碎然黃鶴本作泰山引宣和問樊察序雁塔題名為證謬矣按宋樊察序雁塔題名云杜詩所謂泰山忽破碎涇渭不可求蓋言其髙逺賈誼旱雲賦相撞擊而破碎涇渭不可求詩涇以渭濁一統志涇水發源陜西平涼府西南白巖至西安府髙陵會於渭渭水發源臨洮府渭源縣鳥鼠山至華隂縣入黃河舊注涇渭二水從西北來逺望則不可求其清濁之分也鮑照詩涇渭不可雜俯視但一氣魏文帝詩俯視清水波西征賦化一氣而甄三才焉能辨皇州謝朓詩春色麗皇州鮑照詩表裏望皇州回首叫虞舜蒼梧雲正愁山海經南方蒼梧之丘蒼梧之淵中有九疑山在長沙零陵界中文選注歸藏啓筮有白雲出自蒼梧入於大梁謝朓詩雲去蒼梧野惜哉瑤池飲日晏崑崙丘列子穆王升崑崙之丘以觀黃帝之宫遂賔於西王母觴於瑤池之上乃觀日之所入日行萬里鮑照詩夕飲乎瑤池史記張湯傳日晏天子忘食黃鵠去不息哀鳴何所投韓詩外傳田饒謂魯哀公曰夫黃鵠一去千里止君園池啄君稻粱君以其從來逺也故臣將去君黃鵠舉矣晉書黃鵠曲黃鵠參天飛詩鴻雁于飛哀鳴嗷嗷阮籍詩願為雲間鳥千里一哀鳴君看隨陽雁各有稻粱謀書陽鳥攸居注陽鳥隨陽之鳥鴻雁之屬廣絶交論分雁鶩之稻粱説文稻稌也楊泉物理論粱者黍稷之總名也赤谷西崦人家地里志秦州有崦嵫山在赤谷之西曹操與劉備戰于此谷川水為之丹因號曰赤谷一統志赤谷在秦州西南七十里中有赤谷川崦嵫山在秦州西五十里在赤谷之西故曰西崦躋險不自安謝靈運詩躋險策幽居披雲卧石門出郊巳清目後漢書馮緄傳拜車騎將軍詔策緄曰出郊之事不復內御淮南子清目而不以視靜耳而不以聽溪回日氣暖論衡儒言日中有三足烏日者火也烏者日氣也徑轉山田熟後漢書淳于恭傳家有山田果樹人或侵盜輒為收採鳥雀依茅茨謝靈運詩虛館絶諍訟空庭來鳥雀墨子堯堂髙三尺土階三等茅茨不翦南史何敬容傳築茅茨于鍾阜聊優遊以卒嵗藩籬帶松竹爾雅樊籬也注謂藩籬也張華鷦鷯賦生于蒿萊之間長于藩籬之下南史韋睿傳所至頓舍修立館宇藩籬墉壁皆應繩準夏侯湛薺賦齊精氣于款冬均貞固于松竹梁元帝與劉智藏書山間芳杜自有松竹之娛如行武陵暮欲問桃源宿陶潛桃花源記晉太元中武陵人捕魚緣溪行逢桃花林夾岸數百步林盡水源便得一山山有小口捨船從口入其中男女衣著悉如外人自云先世避秦來此不復出焉停數日辭去詣太守説如此太守遣人尋向所志遂迷不復得路夏日李公見訪本集自注李時為太子家令唐書宗室世系表太子家令李炎逺林暑氣薄李德林詩逺林才有色遙水漫無流春秋繁露天地之化喜則為暑氣而有生長也公子過我遊詩麟之趾振振公子史記平原君傳贊平原君翩翩濁世之佳公子也又司馬相如傳王吉曰長卿久宦遊不遂而來過我貧居類村塢庾信杏花詩依稀映村塢僻近城南樓三秦記城南韋杜去天尺五雍録杜曲在啓夏門外西向即少陵原所謂城南杜也傍舍頗淳朴史記髙祖紀髙祖適從旁舍來莊子唐虞始為天下澆淳散朴陸機詩至樂非有假安事澆淳朴所願亦易求古詩齊心同所願含意俱未申隔屋喚西家邴原别傳君謂僕以鄭為東家丘君以僕為西家愚夫耶借問有酒不詩有酒湑我牆頭過濁醪左思賦濁醪如河江淹賦濁醪夕飲展席俯長流禮記及庭布席各從其事張衡賦俯釣長流清風左右至禮記孟秋之月涼風至四民月令清風戒寒客意巳驚秋孫萬夀詩客意慣風聲胡師耽詩甕牖秋風驚巢多衆鳥鬭魏書李惠傳雍州廳事有燕爭巢鬭巳纍日葉密鳴蟬稠禮記仲夏之月蟬始鳴又孟秋之月寒蟬鳴梁元帝詩樹密隱鳴蟬苦遭此物聒南史王晏聞羣蛙鳴曰此殊聒人耳孰謂吾廬幽陶潛詩吾亦愛吾廬又結廬在人境而無車馬喧水花晚色靜古今注芙蓉一名荷華一名水華何遜詩林葉下仍飛水華披未落梁簡文帝採蓮賦物色雖晚徘徊未返江總詩林前暝色靜庶足充淹留劉安招隱士攀桂枝兮聊淹留齊竟陵王子良詩丘壑每淹留風雲多賞會預恐尊中盡後漢書孔融傳融雖家居而賔客日滿其門嘗嘆曰坐上客常滿尊中酒不空吾無憂矣更起為君謀孟浩然少隱鹿門山年四十乃遊京師與張九齡王維為忘形交維私邀入內署適明皇至浩然匿牀下維以實對帝喜詔浩然出誦所為詩至不才明主棄帝曰朕未嘗棄卿奈何誣我因放還張九齡鎮荆州署為從事浩然為詩造意極苦篇什既成洗削凡近當明皇時章句之風大得建安體論者推李杜為尤介其間能不愧者浩然也宿叢師山房待丁公不至夕陽度西嶺詩度其夕陽劉琨詩夕陽忽西流庾闡詩拂駕升西嶺羣壑忽已暝謝靈運詩林壑斂暝色松月生夜涼王融遊仙詩璧門涼月舉珠殿秋風迥風泉滿清聽水經注風泉傳響於青林之下巖猿流聲於白雲之上庾信終南山義谷銘松桂危懸風泉虛韻王融渌水曲日霽沙渚明風泉動華燭抱朴子注清聽於九韶者巴人之聲不能悅其耳陸機吳趨行四座並清聽聽我歌吳趨樵人歸欲盡虞騫詩逺望樵人細煙鳥栖初定王粲詩上有雙栖鳥懷春向我鳴唐太宗詩晚煙含樹色栖鳥雜流聲盧照鄰詩上舞雙栖鳥中秀合歡枝之子期宿來詩彼其之子邦之彥兮孤琴候蘿徑齊髙帝塞客吟欷園琴之孤弄想庭藿之餘馨齊竟陵王詩蘿徑轉連綿松軒方杳藹耶溪泛舟水經注若耶溪水上承嶕峴麻溪溪下孤潭周數畝麻潭下注若耶溪水至清照衆山倒影窺之如畫寰宇記若耶溪在會稽縣東二十八里落影餘清暉庾闡賦映曉雲而色暗照落影而俱紅梁簡文帝馬槊譜序春亭落影秋臯晚靜謝靈運詩昏旦變氣候山水含清暉顔延之釋奠會詩清暉在天容光必照輕棹弄溪渚梁昭明太子七契縱輕棹兮泛龍舟陸機詩泛舟清川渚謝靈運詩弭棹薄枉渚澄明愛水物梁元帝烏棲曲月華似璧星如佩流影澄明玉堂內禮記加豆陸産也其醢水物也傅咸神泉賦序在夏則冷涉冬而溫溫則水物冬生冷則氷可以過潘嶽西征賦菜蔬芼實水物唯錯臨泛何容與劉孝綽太子洑詩臨泛自多美況乃還故鄉王褒臨泛奉和詩長洲春水滿臨泛廣川中莊子因案人之所感以求容與其心楚辭聊逍遙兮容與宋玉神女賦時容與以微動兮志未可乎得原