泥此金百鑄其色變白冇光如銀即銀燭是也鮑照賦輝蔥河之銀燭江淹別賦共金爐之夕熏崔道融詩凊極不知寒欲問吳江别來意杜甫詩欲問平安無使來張翰思吳江歌秋風起兮佳景時吳江水兮鱸魚肥崔信明詩楓落吳江冷青山明月夢中看梁簡文帝詩青山銜落日古詩夕宿青山外又仰看明月光杜審言詩明月高秋迥愁人獨夜看鮑照詩夢中長路近覺後大江違春宫曲昨夜風開露井桃鮑照詩昨夜宿南陵沈約詩既為風所開復為風所落古詩桃生露井上蕭慤龍門桃花詩舊聞開露井未央前殿月輪高史記高祖七年二月至長安治未央宫九年冬十月淮南梁趙楚王朝未央宫置酒前殿三輔黃圖未央前殿東西五十丈高三十五丈前殿曰路寢見羣臣諸侯處也丘巨源詩清風生月輪賀循詩星稀漢轉月輪明平陽歌舞新承寵漢書外戚傳孝武衛皇后字子夫為平陽主謳者武帝過平陽既飲謳者進帝獨悅子夫賜平陽主金千斤李適長寧公主東莊侍宴詩歌舞平陽第易承天寵也簾外春寒賜錦袍何遜詩簾外隔飛螢漢書成帝紀陽朔元年二月春寒又服繡夾綺衣長襦錦袍各一魏武帝與楊彪書今遺足下貴室錯彩羅縠錦袍一領宴春源源向春城花幾重宋之問詩源水看花入謝朓詩春城麗白日阿閣跨層樓周宗懍早春詩花樹數重開江明深翠引諸峯莊子水靜則明唐太宗詩約嶺煙深翠王臺卿詩清江窮廣深謝靈運山居賦注仰眺層峯俯鏡濬壑與君醉失松溪路古樂府我欲與君相知綦毋潛詩清泠松下溪山館寥寥傳暝鐘袁慶隆詩山館引夕凉支遁詩寥寥石室朗洛陽迦藍記龍華寺有鐘一口撞之聞五十里豫章王蕭綜聞此鐘聲以為奇異遂造聽鐘歌三首傳于世梁元帝九貞館碑西楹之鐘夜響孟浩然詩山寺鳴鐘晝已昏西宫春怨舊注班姬在長信其宫在西故曰西宫此為婕好之辭也西宫夜靜百花香公羊傳西宫者小寢也沈約詩夜靜滅氛埃古樂府春風宛轉入曲房送送小苑風花香欲捲珠簾春恨長拾遺記越有美女夷光以貢於吳吳處以椒華之房貫細珠為簾幌朝下以蔽景夕捲以待月楊炯詩行人斷消息春恨幾徘徊斜抱雲和深見月周禮犬司樂孤竹之管雲和之瑟注雲和山名也出美木用為瑟其聲清亮漢武帝內傳西王母命侍女董雙成吹雲和之笙虞騫詩清夜未云疲珠簾聊可發泠泠玉潭水映見蛾眉月朦朧樹色隱昭陽秋興賦月朦朧以含光兮江淹詩風光多樹色三輔黃圖武帝時後宫八區冇昭陽飛翔增成合歡蘭林披香鳳凰鴛鴦等殿西都賦昭陽特盛隆於孝成注昭陽殿名孝成趙皇后弟絶幸居昭陽舍芙蓉樓送辛漸一統志芙蓉樓在鎮江府城上西北隅與萬嵗樓相對寒雨連江夜入吳韋應物詩夜聞寒雨滴隂鏗詩江連巫峽長春秋定公五年於越入吳陳子昻詩山川半入吳平明送客楚山孤荀子君平明而聽朝車􅛴詩平明發下蔡孔融詩逺送新行客韓非子楚和氏得璞玉於楚山之中謝朓詩林端楚山見洛陽親友如相問一統志洛陽本成周地居洛水之北故曰洛陽洛陽故城在河南府東周公所營成周也陸機詩親友多零落孟浩然詩行侣如相聞一片冰心在玉壺庾信至仁山銘瑞雲一片鮑照詩清如玉壺冰嵗華紀麗霜樹盡摧枯葉玉壺漸結輕冰辛延年詩就我求清酒絲繩提玉壺采蓮曲樂録草木二十四曲內有採蓮曲古辭江南可采蓮蓮葉何田田荷葉羅裙一色裁梁元帝采蓮賦荷葉雜衣香梁簡文帝賦嘗聞蕖可重采擷欲為裙上聲歌羅裙隨風起蕭子顯詩楊栁千條共一色芙蓉向臉兩邊開古今注芙蓉一名荷花鮑照芙蓉賦牽芙蓉而水嬉梁元帝賦蓮花亂臉色庾信詩影照兩邊人楊方詩秋草生兩邊亂入池中看不見吳均詩朝雲亂入目甄皇后塘上行蒲生我池中易行其庭不見其人聞歌始覺有人來徐陵銘樹裏聞歌駱賓王啓薛邑聞歌揖馮歡於彈鋏潘嶽詩始覺夏衾單梁簡文帝銘人來當花杜甫絶句兩箇黃鸝鳴翠栁陸璣詩疏黃鳥鸝鶹也或謂之黃栗留吳均詩黃鸝飛上苑緑芷出汀洲王融詩翠栁䕃通街朱闕臨髙城聞人蒨詩緑葵向光轉翠栁逐風斜一行白鷺上青天梁簡文帝樂府棹動芙蓉落船移白鷺飛莊子冇鳥焉其名為鵬絶雲氣負青天窗含西嶺千秋雪自注西山白雪四時不消庾肩吾詩樹隱臨城日窗含度水風陶潛詩峩峩西嶺內元和志岷山去青城山百里天色晴明望見成都山嶺常積雪百丈一統志西山在成都府西一名雪嶺門泊東吳萬里船北齊書宋世良傳清河郡東南有曲隄成公一姓阻而居之羣盜多萃於此人為之語曰寧度東吳㑹稽不歷成公曲隄左思詩長嘯激清風志若無東吳郭璞江賦呼吸萬里吐納靈潮元和志萬里橋架大江水在縣南八里蜀使費禕聘吳諸葛亮祖之歎曰萬里之行始於此矣橋因以名謝靈運詩迢迢萬里帆茫茫終何之贈花卿上元二年梓州刺史段子璋反襲東川節度使李奐於綿州自稱梁王改元成都尹崔光逺率將花驚定攻拔之斬子璋奐得復位錦城絲管日紛紛水經注其道西故錦官也言錦工織錦則濯之江流而錦至鮮明濯以沱江則錦色弱矣遂命之為錦里庾信詩錦城遙可望回鞍念此時鹿愈詩絲管韵未成莫使絃響絶曹植樂府齊謳楚舞紛紛歌聲上徹青雲半入江風半入雲左傳宋人以兵車百乘文馬百駟贖華元於鄭半入華元逃歸梁元帝詩江風當夏清庾信詩日落江風靜列子薛談學謳於秦青未窮青之枝辭歸秦青餞於郊衢拊節悲歌聲振林木響遏行雲洛陽伽藍記徐月華善彈箜篌哀聲入雲此曲祇應天上有古詩誰能為此曲無乃杞梁妻高昻詩天上人間無可比庾信詠舞詩已曽天上學詎是世中生廣德神異録葉法善嘗引上逰於月宫因聆天樂上自曉音律默記其曲歸而傳之遂為霓裳羽衣曲人間能得幾回聞列子耳目所觀聽非人間之有李白送孟君之廣陵故人西辭黃鶴樓吳均詩故人杯酒别天清明月亮王褒詩河橋望行旅長亭送故人續齊諧記黃鶴山者仙人子安乘黃鶴過此上有黃鶴樓九域志鄂州有黃鶴樓煙花三月下揚州洛陽伽藍記其中烟花露草或傾或頽王融詩烟花雜如霧魏舊歌陽春二三月楊栁齊作花蕭慤詩三月春風已復流釋名揚州州界多水水波揚也隋煬帝詩軸轤千里泛歸舟言旋舊鎮下揚州孤帆逺影碧山盡梁簡文帝書夕鳥歸林懸孤帆而未息隂鏗詩天際冇孤帆江淹詩掩映金淵側逰豫碧山隅惟見長江天際流魏志文帝臨江見波濤洶湧曰長江天塹天之所以限南北也郭璞江賦䕃潭隩被長江謝朓詩天際識歸舟雲中辨江樹梁元帝詩逺村雲裏出遙船天際歸峨眉山月歌水經注益州記云峨眉山在南安縣界去成都南千里秋日澄清望見兩山相峙如蛾眉焉一統志峨眉山在眉州城南二百里來自岷山連岡疊嶂延袤三百餘里峨眉山月半輪秋王羲之書蜀中峨眉山夏含霜雹左思蜀都賦抗峨眉之重阻劉孝綽望月詩輪光缺不半扇影出將圓江總詩兔月半輪明狐關一路平影入平羌江水流元和郡縣志平羌縣本漢南安縣地周武帝置平羌縣因縣內平羌水又平羌水經雅州嚴道縣東二里一統志平羌江在雅州城北舊傳羌人入寇諸葛亮於此平之因名謝朓詩結軫青郊路回瞰蒼江流夜發清溪向三峽南史垣崇祖傳高祖遣荀伯玉敕以邊事受㫖夜發唐書地理志資州有清溪縣一統志清溪縣唐置宋省今屬成都府水經注巴東三峽謂廣溪峽巫峽西陵峽也三峽七百里中兩岸連山略無闕處重巖疊嶂隱天蔽日非亭午夜分不見曦月左思蜀都賦經三峽之崢嶸思君不見下渝州楚辭專思君兮不可化古詩思君令人老嵗月忽已晚唐書地理志渝州南平郡本巴郡天寶元年更名一統志秦滅蜀立巴郡隋改渝州本朝改重慶府春夜洛陽聞笛誰家玉笛暗飛聲梁武帝樂府誰家兒女對門居開顔發艷照里閭西京雜記秦咸陽宫有玉笛長二尺三寸二十六孔吹之則見車馬山林隱轔相次吹息亦不復見銘曰昭華之琯陳後主詩玉笛隨絃上金鈿逐照回曹植七啓飛聲激塵依違厲響散入春風滿洛城管子吾不能以春風風人梁簡文帝詩春風本自奇楊栁最相宜庾肩吾詩風長曙鐘近地逈洛城遙庾信詩雜樹本推金谷縣諸花舊滿洛陽城此夜曲中聞折栁徐陵樂府卓女紅粧期此夜唐書禮樂志梁樂府有云快馬不須鞭反插楊栁枝下馬吹橫笛愁殺路旁兒此歌辭元出北國即鼓角橫吹曲折楊栁枝是也梁元帝賦已寤歌於折栁復行吟而采蓮何人不起故園情詩何人不將經營四方駱賓王詩故園梅栁尚冇餘春來勿使芳菲歇何遜詩方抱新離恨獨守故園秋客中行蘭陵美酒鬱金香漢書地理志東海郡縣南陵唐書地理志武德三年以故南陵地置武進縣曹植詩美酒斗十千周禮春官鬱人注鬱鬱金香草宜以和鬯玉碗盛來琥珀光庾闡斷酒誡椎金罍碎玉碗庾信春賦芙蓉玉碗蓮子金杯博物志松脂淪入地化為琥珀袁嵩酒賦泛芳樽以琥珀鄒陽酒賦流光醳醳但使主人能醉客史記滑稽傳主人留髠而送客古樂府主人前進酒王績詩醉客喜年光不知何處是他鄉庾信詩不知何處天邊古樂府他鄉各異縣輾轉不相見岑文本詩既欣投轄賞暫緩望鄉情望廬山瀑布逺法師廬山記廬山西南冇石門山其狀似雙闕壁立千仞而瀑布流焉廬山記山南山北冇瀑布無慮十餘處香爐在瀑布之傍水源出山頂人未有窮者或曰西八康王谷為水簾東為開先之瀑布一統志廬山在江西九江府城南二十五里日照香爐生紫烟劉綺詩徘徊映日照又日照爛成綺逺法師廬山記東南冇香爐山孤峯秀起游氛籠其上則棼氲若烟支曇諦廬山賦香爐吐雲以象煙梁簡文帝詩金風飄紫烟遙看瀑布挂前川虞騫詩遙看野樹短本集望廬山瀑布水詩昔登香爐峯南見瀑布水挂流三百丈噴壑數十里飛流直下三千丈支曇諦廬山賦懸霤分流以飛湍孫綽天台山賦瀑布飛流而界道水經注挂溜騰虛直瀉山下廬山記瀑布水出山腹挂流三四百丈飛湍林表若望懸素疑是銀河落九天白帖天河曰銀河蘇頲詩池水落銀河淮南子上逋九天下貫九野注九天八方中央也清平調樂史後序開元中禁中初重木芍藥即今牡丹也得四本紅紫淺紅通白者上因移植于興慶池東沈香亭前㑹花方繁開命李龜年持金花箋宣賜李白立進清平調三章白欣然承詔宿酲未解因援筆賦之唐書禮樂志平調清調周房中樂遺聲碧雞漫志明皇宣白進清平調乃是令白于清平調中製詞蓋古樂取聲律高下合為三調曰清調平調側調明皇止令就擇上兩調偶不樂側調故也雲想衣裳花想容楚辭青雲衣兮白霓裳司馬相如賦花容自獻春風拂檻露華濃宋玉賦寤春風兮發鮮榮孔德紹詩露華疑濯錦詩零露濃濃若非羣玉山頭見穆天子傳北征東還至於羣玉之山注西王母所居者㑹向瑶臺月下逢楚辭望瑶臺之偃蹇兮見有娀之佚女書斷爛若瑶臺之月沈約詩蔽虧崑山樹含吐瑶臺月二一枝穠艷露凝香開天遺事明皇與貴妃同看木芍藥上親折一枝與妃子遞嗅其豔帝曰不惟萱草忘憂此花香豔尤能醒酒詩何彼穠矣花如桃李子夜歌清露凝如玉雲雨巫山枉斷腸宋玉高唐賦序昔者先王嘗遊高唐夢一婦人曰妾巫山之女也願薦枕席王因幸之去而辭曰妾在巫山之陽高丘之阻旦為朝雲暮為行雨朝朝暮暮陽臺之下水經注巴東三峽巫峽長猿鳴三聲斷人腸借問漢宫誰得似可憐飛燕倚新粧陳叔逹詩因妍入漢宫漢書外戚傳孝成趙皇后本長安官人屬陽阿主家學歌舞號曰飛燕成帝嘗微行出過陽阿主作樂上見飛燕而悅之召入宫後為皇后王訓