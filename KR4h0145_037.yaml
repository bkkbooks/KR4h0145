騮一日上幸諸苑侍者進瑞鞭上曰昔朕西幸有二駿今獲此鞭可謂三絶矣中書舍人韓翃因吟曰云云宿石邑山中唐汝詢解一統志云真定府獲鹿縣本戰國趙之石邑縣有西屏山高數百丈為一郡奇景今詩極狀其高疑指此山也浮雲不共此山齊魏文帝詩西北有浮雲亭亭如車蓋古詩西北有高樓上與浮雲齊山靄蒼蒼望轉迷說文靄雲貌岑參詩崖口上新月石門破蒼靄魏武帝詩山川相繆鬱乎蒼蒼張正見詩石梁雲外失蓬丘霧裏迷宋之問詩潮回出浦駛洲轉望鄉迷曉月暫飛高樹裏鮑照芙蓉賦泛明采於宵波飛澄華於曉月王融回文詩池蓮照曉月李白詩鷹隨月兔飛吳越春秋秋蟬登高樹飲清露陸雲詩虎嘯深谷底雞鳴高樹顛庾信銘樹裏聞歌枝中見舞秋河隔在數峯西謝朓詩秋河曙耿耿寒渚夜蒼蒼謝靈運賦羣峯參差出其間連岫復陸成其坂宋之問明河篇昏見南樓清且淺曉落西山縱復橫江南曲古今樂録梁武帝改西曲製江南弄七曲張正見詩欲奏江南曲聊有棹歌詩長樂花枝雨㸃銷傅咸紫華賦序紫花一名長樂花劉孝威詩隔牆花半隱猶見動花枝羯鼓録宋開府璟善羯鼓始承恩顧與上論鼓事曰頭如青山峯手如白雨㸃江城日暮好相邀李白詩江城五月落梅花王粲詩日暮逰西園顔延之詩日暮行采歸李白詩若戀幽居好相邀弄紫霞春樓不閉葳蕤鎖陳後主詩春樓髻梳罷南陌競相隨禮記外戶而不閉韓非子不謹其閉不固其門司馬相如子虛賦錯翡翠之葳蕤王粲詩昊天降豐澤百卉挺葳蕤緑水斜通宛轉橋傅休奕詩上翳青雲景下鑒緑水波謝朓詩逶迤帶緑水迢遞起朱樓崔日用詩鳳閣斜通平樂觀隂鏗詩畫橋長且曲傍嶮復憑流送齊山人歸長白山屈原九歌山中人兮芳杜若飲泉石兮䕃松柏抱朴子長白乃泰山之副嶽魏書地形志東平郡博平縣有長白山明一統志山東濟南府長白山在長山縣西南三十里髙二千九百丈周六十里雲雨長白故名舊事仙人白兔公史記淮隂侯傳信曰大王自料勇悍仁彊孰與項王臣嘗事之請言項王之為人續仙傳侯道華好子史手不釋卷或問要此何為答曰天上無愚瞢仙人古詩仙人騎白鹿髮短耳何長抱朴子白兔公彭祖弟子掉頭歸去又乘風莊子雲將曰今我願合六氣之精以育羣生為之奈何鴻䝉拊髀雀躍掉頭曰吾弗知杜甫送孔巢父詩巢父掉頭不肯住陶潛歸去來辭歸去來兮田園將蕪胡不歸說苑魚乘水鳥乘風草木乘于時柴門流水依然在後漢書楊震傳柴門絶賓客十六國春秋汜勝家財五十萬悉散之於宗族柴門灌園以琴書自娛詩沔彼流水朝宗于海韓詩外傳伯牙鼓琴志在流水韋時立詩偶來伊水曲溪嶂各依然一路寒山萬木中儲光羲詩茅茨對三峯梧桐開一路杜甫詩幽尋非一路逺色有諸嶺王維詩寒山轉蒼翠高適詩驚飈蕩萬木杜甫詩含風翠壁孤雲細背日丹楓萬木稠劉長卿詩逺磬秋山裏清猿古木中顧况山僧蘭若釋典浮屠所居西域謂之蘭若謂虛靜處也絶頂茅菴老此生王褒詩山窗臨絶頂盧照鄰詩絶頂橫臨日孤峯半繞天拾遺記任末依山林之下編茅為菴陶潛詩聊復得此生寒雲孤木伴經行栁惲詩寒雲晦滄洲庾肩吾詩寒雲間石起秋葉下山飛陳子昻詩水木淡孤清楊炯賦山中禪定樹下經行世人那得知幽徑楚辭世人皆濁我獨清沈佺期詩旁人那得知胡師耽詩墜葉積幽徑駱賓王詩幽徑還生拔心草遙向青峯禮磬聲梁簡文帝文高巖鬱起帶青雲而作峯岑參詩黛青天際峯詩既和且平依我磬聲韋應物登樓寄王卿踏閣攀林恨不同棗璩詩矯足登雲閣相伴步九華謝靈運詩攀林搴落英後漢書矯慎隱遁山谷汝南吳蒼遺書曰足下勤處隱約乘雲行泥棲宿不同每冇西風何嘗不歎楚雲滄海思無窮晉書天文志楚雲如日十洲記滄海島在北海口水皆蒼色故謂之滄海蕭轂詩滄海故交分辛德源詩託意在無窮數家砧杵秋山下孟浩然詩水竹數家連何遜詩砧杵鳴四鄰杜甫詩星月動秋山王勃詩朝朝翠山下一郡荆榛寒雨中梁書徐摛傳摛年老愛泉石意在一郡以自怡養潘嶽詩荆棘成榛阮籍賦寒雨淪而下降庾信詩梅逐雨中黃陳羽江東人登貞元進士第歷官樂宫尉佐戲題山居雲蓋秋松幽洞近淮南子日月欲明浮雲蓋之孔範詩白雲浮逺蓋謝靈運詩皎潔秋松氣韓琮詩霜凜近秋松陳子昻詩石泉何冥密幽洞無留行水穿危石亂山深孔叢子山溜至柔石為之穿列子登高山履危石江總詩危石聳前洲張謂詩路入亂山行庾信詩山深雲濕衣門前自有千竿竹江淹詩樹下即門前詩籊籊竹竿顧况詩若為種得千竿竹嚴維詩明朝别後門還掩修竹千竿一老身免向人家看竹林程曉詩觸熱到人家王維詩看竹何須問主人穆天子傳天子乃樹之竹是為竹林庾信思舊銘王子猷之舊徑惟餘竹林二雖有柴門長不關後漢書楊震傳于是杜門絶賓客曹植詩柴門何蕭條陶潛歸去來辭門雖設而常關儲光羲詩巖扉長不關片雲高木共身閒儲光羲詩華陽洞口片雲飛淮南子去高木而巢扶枝張協詩凝霜疏高木晉書華嶠傳頥身於清閒之宇猶嫌住久人知處蜀志諸葛亮傳分兵屯田為久住之基王維詩偶被時人知髙士傳童馥入林慮山中家人求不知處見欲移居更上山江洪詩移居玉池上庾信詩更上增城山古詩上山採蘼蕪伏翼西洞送人爾雅蝙蝠服翼疏蝙蝠自關而東謂之服翼臨海記黃石山穴中冇伏翼如鵝鴨大洞裏春晴花正開劉長卿詩桃花洞裏居人滿梁簡文帝春日詩雲開天半晴隋煬帝詩春花滿正開看花出洞幾時回江淹詩看花桃李津庾闡賦吹雲霧而出洞穴駱賓王詩為問春花幾時滿殷勤好去武陵客司馬遷報任安書僕與李陵素非能相善也未嘗銜杯酒接殷勤之餘歡魏中山王詩殷勤屬知已杜甫詩好去張公子通家别恨添陶潛桃花源記晉太康中武陵人捕魚為業緑溪行忽逢桃花林林盡水源得一山從口入其間男女見漁者大驚自云先世避秦時來此絶境問今何世乃不知有漢漁人辭去詣太守說即遣人隨往竟迷不得路劉長卿詩深藏武陵客時過洞庭湖莫引世人相逐來峯參詩世人逐勢爭奔走李白詩不與世相逐龎德公於忽操後逐逐其猶來韓愈酬王二十舍人涯雪中見寄三日柴門擁不開禮記用民之力嵗不過三日陶潛文翳翳柴門事我宵晨庾信詩浮橋翠蓋擁吳均春詠羅幃閉不開階平庭滿白皚皚吳均詠雪詩凝階似花積范雲詩寒沙四面平王衡玩雪詩寒庭浮暮雪又皎潔隨處滿張衡賦行積冰之皚皚兮清泉沍而不流岑參詩半空白皚皚今朝踏作瓊瑶迹舊唐書禮儀志昨夜則息風收雨今朝則天晴日暖岑參詩細草新花踏作泥詩投我以木桃報之以瓊瑶吳都賦躍馬疊迹為有詩從鳳沼來劉琨答盧諶書適足以彰來詩之益美耳鄭繇水鏡賦影圓鳳沼聲激龍門杜甫詩鳳沼接亨衢早春呈水部張十八員外舊唐書張籍傳纍授國子博士水部員外郎轉水部郎中世謂之張水部云唐書百官志水部郎中員外郎各一人掌津濟船艫渠梁堤堰溝洫漁捕運漕碾磑之事天街小雨潤如酥三輔舊事長安城中八街九陌杜甫詩陵天經中街漢書京房傳丙戌小雨丁亥䝉氣去易雨以潤之華陽國志㴻雨潤禾苗廣韻酥酪屬牛羊乳為之本草别録佛書稱乳成酪酪成酥酥成醍醐草色遙看近却無孔稚圭詩草雜今古色徐陵太極殿銘函谷遙看美皇居之佳麗范靜妻沈氏登樓曲憑高川陸近李白詩白玉盤中看却無最是一年春好處崔敏童詩一年始有一年春王勃春思賦霜前雪裏知春早看栁看梅覺春好張說詩幸共三春好儲光羲詩直為經過行樂處不知虛度兩京春絶勝烟栁滿皇都王訓詩學舞勝飛燕楊巨源詩楊栁含烟灞岸春謝朓詩宛洛佳遨逰春色滿皇州曹植應詔詩肅承明詔應㑹皇都于鵠舟中月明夜聞笛浦裏移舟候信風何遜詩解纜及朝風落帆依暝浦孟浩然詩移舟泊烟渚淮南子若繞之候風注綄者候風之羽也唐國史補江西舟船自白沙泝流而上常待東北風謂之信風蘆花漠漠夜江空江總詩蘆花霜外白謝朓詩生煙紛漢漠耿湋詩風馭南行逺長山與夜江戴叔倫詩故園江海空更深何處人吹笛杜甫詩更深氣如縷黃淡思歌逐郎何處索後漢書馬融傳融善鼓琴好吹笛疑是龍吟寒水中范雲詩疑是徐方牧既是復疑非易雲從龍疏龍是水畜雲是水氣故龍吟則景雲出庾信詩龍吟逈上逰李白詩笛奏龍吟水王僧儒詩夜風入寒水沈約詩開襟濯寒水解帶臨清風杜甫詩日落青龍見水中題合溪乾洞又見劉商集題作題潘師房渡水傍山尋絶壁庾信詩河水乘冰渡又春賦沙頭渡水人南史謝靈運傳靈運移籍㑹稽修營舊業傍山帶江孫逖詩日落扁舟此路尋江總詩幽崖聳絶壁白雲飛處洞天開詩英英白雲蜀都賦雲飛水宿宋之問詩龍游洞裏天郭璞江賦豁若天開仙人來往行無跡古詩仙人騎白鹿王臺卿詩神仙乍來往莊子其來無跡其往無崖拾遺記燕昭王即位廣延國獻善舞者二人體氣輕馥或行無跡影石徑春風長緑苔孔稚圭北山移文石徑荒凉徒延佇梁武帝樂府一葉度春風芳華自相接南史陳伯之傳暮春三月江南草長孟浩然詩清泉盡緑苔盧同逢鄭三遊山相逢之處花茸茸樂府越謡歌他日相逢下車揖蕭撝詩石蒲今尚冇採摘更相逢劉孝綽詩丰茸花樹舒廣韻茸茸草生貌峭壁攢峯千萬重劍門山記峭壁中斷兩崖相嶔高適詩峭壁連空洞攢峯疊翠微孔稚圭文攢峯竦誚駱賓王詩攢峯銜宿霧又青山幾萬重他日期君何處好越絶書伍員奔吳至江上漁者歌曰日昭昭侵以施與子期乎蘆之崎元結詩問吾常偃息泉上何處好寒流石上一株松謝朓詩寒流自清泚唐德宗詩曲池潔寒流南史蕭思話傳嘗從文帝登鍾山北嶺中道有盤石清泉上使於石上彈琴宋之問詩石上泉聲帶雨秋儲光羲詩盤石青巖下松生磐石中庾信詩惟愁郭門外應足數株松御選唐詩卷二十八
