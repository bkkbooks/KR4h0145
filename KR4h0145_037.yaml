body:
  text: 欽定四庫全書御選唐詩卷二十八七言絶句明皇帝過大哥山池題石壁張九齡敕賜寧王池宴詩序開元二年上幸寧王第叙家人禮上曰大哥好作主人阿瞞但謹為上客澄潭皎鏡石崔嵬謝靈運賦潭結緑而澄清謝朓詩方池含積水明月流皎鏡沈約詩洞徹隨深淺皎鏡無冬春詩陟彼崔嵬蔡雍九疑山碑登此崔嵬托靈神仙萬壑千巖暗緑苔晉書顧愷之傳人問以㑹稽山川之狀愷之云千巖競秀萬壑爭流鮑照詩千巖狀岨積萬壑勢縈回古今注苔或紫或青一名緑錢一名緑蘚沈約詩清源泛緑苔林亭自有幽貞趣王勃序戲馬凌空狎林亭而半反宋之問詩林亭春未闌陶潜詩有客賞我趣每每過林園沈炯賦矧幽庭之閒趣具春物之芳華况復秋深爽氣來王由禮鳴蟬詩秋深響自清駱賓王詩秋爽帶池凉晉書王徽之傳西山朝來致有爽氣唐太宗詩爽氣澄蘭沼題梅妃畫真梅妃外傳江妃名采蘋善屬文自比謝女所居悉種梅樹上以其所好戲名梅妃憶昔嬌妃在紫宸蔡琰胡笳十八拍傷今感昔兮三拍成世說潘嶽謂孫秀曰孫令猶憶疇昔周旋否梁簡文帝詩負態動餘嬌爾雅妃嫓也對也唐㑹要龍朔三年四月始御紫宸殿聽政李燈詩覃恩降紫宸鉛華不御得天真曹植洛神賦芳澤無加鉛華弗御陶𢎞景詩鉛華沈照帳孤明莊子真者所以受於天也霜綃雖似當時態魏文帝詩絹綃白如雪張衡定情賦斷當時而呈美冠百匹而無雙宋玉神女賦志態橫出不可勝記曹植洛神賦柔姿綽態爭奈嬌波不顧人劉孝綽咏眼詩含嬌􅝇己合楚辭娛光渺視目增波曹植洛神賦託微波而通辭詩寧不我顧漢書外戚傳一顧傾人城再顧傾人國傀㒦吟一作梁鍠咏木老人作樂府雜録傀㒦子起漢祖平城之圍其城一面即冒頓妻閼氏兵強於三面陳平訪知閼氏妒忌造木偶人運機舞埤間閼氏望見謂是生人慮下城冒頓必納遂退軍刻木牽絲作老翁晉書輿服志指南車刻木為仙人衣羽衣立車上逸人傳丁蘭刻木為人埤雅今人乘風放紙鳶鳶輒引絲而上魏文帝書已成老翁但未頭白耳沈炯詩道邊一老翁雞皮鶴髮與真同列仙傳夏姬得道雞皮三少庾信竹杖賦鶴髮雞皮蓬頭歷齒西京雜記畫工有毛延夀為人形醜好老少必肖其真須臾弄罷寂無事阮瑀賦子情悅其美麗無須臾而有忘魏文帝典論余於他戲弄之事少所喜還似人生一夢中漢書魏豹傳人生一世間如白駒過隙郭璞詩人生如寄莊子且有大覺而後知其大夢也德宗皇帝九日絶句禁苑秋來爽氣多班固西都賦西郊則有上囿禁苑林麓藪澤陂池顔延之詩夕帳亭皋晨儀禁苑古楊白花詞春去秋來雙燕子杜甫詩髙秋爽氣相鮮新昆明風動起滄波漢書武帝紀發謫吏穿昆明池社甫詩昆明池水漢時功南史蕭子顯傳風動春朝月明秋夜楚辭與汝逰兮九河衝風起兮揚波王儉碑文鼓棹則滄波振蕩中流簫鼓誠堪賞詎假橫汾發棹歌漢武帝秋風辭泛樓船兮濟汾河橫中流兮揚素波簫鼓鳴兮發棹歌水經汾水出太原汾陽縣北管涔山三輔黃圖昆明池中有龍首船常令宫女泛舟池中作棹歌雜以鼓吹丘遲詩棹歌發中流趙彥伯從宴桃花園詠桃花應制紅萼競然春苑曙謝靈運詩山桃發紅萼鮑照白紵曲含桃紅萼蘭芽紫梁簡文帝詩林間花欲然張正見桃賦花然樹色庾信春賦宜春苑中春已歸虞世南詩春苑月徘徊䒠茸新吐御筵開司馬相如賦羅䒠茸之游樹兮離樓梧而相撐梁武帝樂府䒠茸臨紫桂梁簡文帝咏桃詩初桃麗新采照地吐其芳宋之問詩岩花應待御筵開長年願奉西王宴管子導血氣以求長年江淹詩漢武願長年劉憲詩願奉宸逰億萬年穆天子傳天子觴西王母於瑶池之上武帝內傳七月七日王母至自設天厨又命侍女設桃果須臾以玉盤盛桃七顆以呈王母以四顆與帝三顆自食近侍慚無方朔才沈約安陸王碑爰自近侍式贊權衡漢書東方朔傳朔字曼倩武帝徴舉方正賢良文學才力之士朔來上書上令待詔公車漢武故事東郡獻短人呼東方朔至短人指朔謂上曰西王母種桃三千年結子此兒己三過偷之矣梁昭明太子錦帶書三冬勤學慕方朔之雄才陶潜詩愧我非韓才劉憲奉和聖製逰苑遇雪應制龍驂曉入望春宫魏書李平傳雲軒鑾輅行幸有期鳯服龍驂尅駕近日沈約樂遊苑詩沃若動龍驂雜録望春亭在禁苑東南高原之上舊記多云望春宮一統志望春宫在西安府城東一十里正逢春雪舞香風嵇康琴贊澡以春雪淡若洞泉沈約詩搖絲帶抗紫莖舞春雪雜流鶯古詩繡幕圍香風晉白紵歌舞陽春白日風花香庾信詩春風滿路香花光併灑天文上梁簡文帝詩燕來枝益軟風飄花轉光陳後主詩映日花光動迎風香氣來隋煬帝詩颯灑林花落易觀乎天文以察時變潘嶽閒居賦窺天文之祕奧寒氣行銷御酒中禮記季冬之月命有司出土牛以送寒氣古詩孟冬寒氣至北風何慘栗魏彥深賦薑以取熱酒以排寒曹植樂府御酒停未飲貴戚跪東廂劉孝威詩才人豹尾內御酒屬車中徐彥伯名洪以字行兖州瑕丘人七嵗能為文對䇿高第調永夀尉蒲州司兵參軍屢遷給事中預修三教珠英由宗正卿出為齊州刺史移蒲州擢修文館學士工部侍郎歷太子賓客上已祓禊渭濱應制後漢書禮儀志是月上已官民皆潔於東流水曰洗濯祓除蔡雍月令章句三月上已祓禊水濱晴風麗日滿芳洲潘嶽閒居賦微雨新晴王羲之蘭亭序惠風和暢謝靈運詩白日麗江皋盧思道上已稧飲詩山泉好風日楚辭九歌采芳洲兮杜若劉孝綽三日曲水宴詩芳洲亘千里逺近光風扇雲幕春筵祓錦流西京雜記成帝設雲帳雲幄雲幕於甘泉紫殿世謂三雲殿邢邵三日華林園詩芳筵羅玉俎激水漾金巵謝朓詩上已惟昔於彼禊流祓穢河滸張樂春疇張正見詩光涵濯錦流皆言侍蹕璜溪宴庾信賦悵從蹕之留歡眷回鑾之餘舞竹書注文王至於磻溪之水吕尚釣於涯王下趨拜曰望公七年乃今見光景於斯尚立變名答曰望釣得玉璜其文要曰姬受命昌來提撰爾洛鈐報在齊謝靈運侍宴詩禮備朝容樂關夕宴暫似乘槎天上游博物志天河與海通有居海濱者年年八月乘槎來去庾信楊栁歌流槎一去上天池袁奭從駕遊山詩天游響仙蹕崔液字潤甫湜之弟工五言詩擢進士第一人湜常呼其小字曰海子我家龜龍也官至殿中侍御史上元夜白帖嵗有三元正月十五為上元玉漏銅壺且莫催後漢書律歷志孔壺為漏浮箭為刻孫綽漏刻銘乃制妙漏挈壺是銓梁武帝詩玉壺承夜急蘭膏依曉煎梁簡文帝詩洞門扇未掩金壺漏已催鐵關金鎖徹明開梁簡文帝守東華門開詩落關猶待漏北史赤土國傳金鎖非王賜不得服用離騷吾令帝閽開關兮楊炯宴集序魚鑰則環鎖晨開雍録唐世以三元放燈放燈之夕即通曉不閉門誰家見月能閒坐鮑照玩月詩始見西南樓纎纎如玉鈎薛道衡詩空庭聊步月閒坐獨臨風何處聞燈不看來吳質與魏太子箋曜靈匿景繼以華燈輦下記先天初上御安福門觀燈太常作樂歌七修類藁元宵放燈起唐開元間謂天官好樂地官好人水官好燈上元乃三官下降之日故從十四至十六夜放燈後增至五夜二神燈佛火百輪張涅盤經如來闍維訖收舍利罌置金牀上天人散花奏樂繞城步步燃燈十二里佛名經有三萬億日月燈明佛何遜詩花燈慧火明瓔珞經佛眉像珠火江總詩玉軑輕輪五香散金燈夜火百花開朝野僉載睿宗于安福門外作燈輪高二十丈於燈輪下踏歌三日夜刻像圖形七寶裝迦葉經有一國王子名大精進一比丘於白㲲上畫佛形像持與精進見像心大歡喜沈約像銘序圖妙像於檀香寫遺影於祇樹蕭子良文菩薩志意堅強故得自然宫殿七寶房舍沈約歌行瑶裝映層綺影裏如聞金口說指月録室羅筏城有河名曰金水中流現五佛影楞嚴經清淨在音聞梁昭明太子七契必枉話言敬聆金口空中似散玉毫光法華經爾時佛前有七寶塔湧出住在空中三昧經菩薩擲鉢于空中水經注爾時諸神天人側塞空中散天香花劉潛無量夀佛像碑毫散珠輝法華經世尊放眉間白毫相光照東方萬八千世界高賢傳劉程之於正念佛中見阿彌陀佛玉毫光照盧照鄰登封大酺歌漢盡武帝紀元封元年東巡東海上還登封泰山又文帝紀十六年九月得玉杯刻曰人主延夀令天下大酺廣韻酺大飲酒作樂日觀仙雲隨鳳輦泰山記東南巖名日觀雞一鳴時見日始欲出長三丈所顔延之詩日觀臨東溟蕭詮詩别有仙雲起時向楚王宫漢書郊祀志天子禪泰山畫有白雲出封中謝莊詩鳯蓋起流雲仙傳拾遺西王母乘翠鳯之輦天門瑞雪照龍衣漢樂歌天門開詄蕩蕩泰山記盤道屈曲而上經小天門大天門張正見詩同雲遙映嶺瑞雪近浮空宋書符瑞志元日雪降殿庭時右衛將軍謝莊下殿雪積衣上上以為瑞沈約詩螭衣方陸離書日月星辰山龍華蟲作㑹繁絃綺席方終夜蔡雍琴賦曲引興兮繁絃撫漢舊儀祭天用六綵綺席六重上一丈中一幅四周緣之玉几沈君攸歌絲繩玉壺傳綺席論語終夜不寢妙舞清歌歡未歸魏文帝書妙舞莫巧於絳樹清歌莫激于宋臘曹植詩極情妙舞仙仙體輕洛神賦馮夷鳴鼓女媧清歌班固東都賦皇歡浹羣臣醉詩厭厭夜飲不醉無歸沈佺期夜宴安樂公主宅濯龍門外主家親後漢書明德馬后紀前在濯龍門上見外家問起居者車如流水馬如游龍唐六典興慶宫北曰濯龍門阮籍詩近在青門外漢書東方朔傳出入主家徐陵詩主家能教舞鳴鳳樓中天上人列仙傳蕭史善吹簫秦穆公有女字弄玉妻焉教弄玉吹簫作鳯鳴公為作鳳臺夫婦居其上感鳳凰來集一夕皆隨鳳去鮑照詩鳳樓十二重王僧儒詩嬴女鳳凰樓庾信詠舞詩已曽天上學詎是世中生自有金杯迎甲夜梁武帝樂府碧玉奉金杯庾信詩紅袖捧金杯南史沈懷文傳膏雨迎夜清景麗朝漢舊儀晝漏盡夜漏起省中黃門持五夜五夜者甲夜乙夜丙夜丁夜戊夜還將綺席代陽春鄒陽酒賦綃綺為席沈約賦散芳塵於綺席梁元帝繤要春曰芳春青春陽春九春唐太宗詩華林滿芳景洛陽遍陽春奉和春日玩雪應制北闕彤雲掩曙霞史記高祖紀蕭丞相治未央宫立東闕北闕陸機樂府駕言出兆闕孫綽遊天台山賦彤雲斐亹以翼櫺皎日炯晃於綺疏梁昭明太子啓彤雲垂四面之葉梁簡文帝詩曙色始成霞東風吹雪舞山家禮記月令東風解凍范雲詩東風栁線長戴皓車馬行晚至如吹雪梁簡文帝咏雪詩鹽飛亂蝶舞李爽山家閨怨詩山中無早梅瓊章定少千人和謝惠連雪賦庭列瑶階林挺瓊樹王衡玩雪詩瓊樹似新栽宋玉對楚王問客有歌於郢中者其始曰下里巴人國中屬而和者數千人其為陽春白雪國中屬而和者不過數十人是其曲彌高其和彌寡後漢書孔融傳贊孤音少和銀樹長芳六出花西京雜記上林苑有白銀樹十株黃銀樹十株梁簡文帝序玉桃卷葉銀樹抽芳顔延之文如彼樹芳實穎實發梁昭明太子啓玉雪開六出之花宋之問苑中逢雪應制紫禁仙輿詰旦來謝莊文收華紫禁李善注王者之宫象紫微故謂宫中為紫禁真誥仙道有八景之輿西都賦乘鸞輿備法駕左傳詰朝將見杜預注詰朝平旦也丘遲詩詰旦閶闔開青旗遙倚望春臺禮記孟春之月天子乘鸞路駕蒼龍載青旗爾雅有鈴曰旗唐書地理志京兆萬年縣有望春宫臨滻水西岸有北望春宫西京記西京禁苑內有望春宫在高原之上東臨灞滻今上曽登北亭賦春臺詠朝士奉和凡數百不知庭霰今朝落詩相彼而雪先集維霰江華謝朓阻雪聨句風庭舞流霰庾信詩今朝梅樹下定有詠花人謝靈運詩紛紛霰雪落疑