貧家似不貧北史蔡景王整傳世間貧家兄弟多相愛由相假藉劉長卿詩青苔黄葉滿貧家元稹詩家有驪珠不復貧外布芳菲雖笑日吳越春秋内脩其德外布其道儲光羲薔薇歌秦家女兒愛芳菲畫眉相伴採葳蕤賈氏説林武帝與麗娟看花時薔薇始開態若含笑帝曰此花絶勝佳人笑也麗娟曰笑可買乎帝曰可麗娟遂取黄金百斤作買笑錢奉帝為一日之歡薔薇名買笑自麗娟始駱賔王詩分黄俱笑日中含芒刺欲傷人杜甫除草詩芒刺在我眼焉能待髙秋本草薔薇莖多刺勒人梁元帝詩薔薇嫌刺多朱慶餘薔薇詩綠攢傷手刺清香往往生遙吹謝靈運賦怨清香之難留劉緩薔薇詩輕香共逐吹蘇頲詩往往花間逢綵石狂蔓看看及四鄰孟郊賞薔薇詩狂艷如索扶左傳無使滋蔓獨孤及詩紫蔓青條拂酒壺孟浩然詩看看似相識淮南子髙懸大鏡坐見四隣庾信詩昨夜鳥聲春驚鳴動四鄰遇有客來堪玩處易有不速之客三人來陶潛詩有客賞我趣每每顧林園儲光羲薔薇歌庭影離離正堪玩一端晴綺照烟新古詩客從逺方來遺我一端綺梁簡文帝薔薇詩照日吐新芽祖詠詩清明烟火新奉和襲美夏景冲澹作蟬雀參差在扇紗南史何戢傳宋武帝賜戢蟬雀扇善畫者顧景秀所畫詩參差荇菜盧照鄰詩宿鳥復參差梁元帝詩團扇掩輕紗張正見詩歌扇掩團紗竹襟輕利籜冠斜孟郊詩竹氣碧衣襟潘岳西征賦開襟乎清暑之館又詩輕襟隨風吹蔡邕彈碁賦輕利調博易使馳騁漢書髙祖紀髙祖為亭長乃以竹皮為冠及貴常冠所謂劉氏冠也注竹皮笋皮謂笋上所解之籜耳南史明僧紹傳僧紹還攝山髙帝賜竹根如意笋籜冠隱者以為榮壚中有酒文園㑹史記司馬相如傳相如之臨卭買一酒舍酤酒而令文君當壚又相如拜為孝文園令卓文君白頭吟今日斗酒㑹明旦溝水頭儲光羲詩詞客向文園琴上無絃靖節家晉書陶潛傳潛畜素琴一張絃徽不具每朋酒之㑹則撫而和之曰但得琴中趣何勞絃上聲梁昭明太子靖節先生傳淵明不解音律而畜無絃琴一張芝畹烟霞全覆穗説文芝神草也楚辭余既滋蘭之九畹兮又樹蕙之百畆謝朓詩左蕙畹兮彌望右芝原兮寫目北史徐則傳飡松餌术棲息烟霞王績賦石菌抽葉金芝吐穗橘州風浪半浮花水經注湘水又北逕南津城西西對橘州杜甫詩喬口橘州風浪促庾信詩倐忽河中風浪吹異物志橘白華赤實劉孝儀謝橘啓倒影陽池垂華金堞李孝貞詠橘詩白華散如雪閒思兩地忘名者獨孤及詩海西望京口兩地各天末武元衡詩兩地山河分節制顔氏家訓上士忘名中士立名不信人間髮解華莊子有人間世篇髙士傳宗測少靜退不樂人間遂往廬山止祖田宅後漢書邊讓傳幕府初開博選清英華髮舊德並為元龜新序齊國有閭丘卭年十八道遮宣王願得小仕宣王曰子年尚稚未可也士亦華髮墮顛而後可用耳王適詩華髮欲成翁皮日休禇家林亭廣庭遙對舊娃宫曹植詩豐年大置酒玉樽列廣庭隋書天文志置器廣庭則函牛之鼎如釜述異記吳王於宫中作海靈館館娃閣左思吳都賦幸乎館娃之宮吳郡志靈岩山在平江府城西吳王别苑在焉有館娃宮唐太宗詩丹陵幸舊宫竹島蘿溪委曲通李白詩野竹攢石生含烟映江島孟浩然詩鬱島藏深竹又蘿月映深溪王昌齡詩女蘿覆石壁溪水幽濛朧傅縡詩樓臺宛轉曲皆通茂苑樓臺低檻外左思吳都賦佩長洲之茂苑謝莊詩茂苑豈舊林徐陵詩樓臺非一勢臨玩自多竒王勃詩檻外長江空自流太湖魚鳥徹池中書震澤注震澤吳南太湖名越絶書太湖周三萬六千頃漢書司馬相如傳東注太湖注太湖在吳縣晉書嵇康傳㳺山澤觀魚鳥心甚樂之王豐之詩感興魚鳥西京雜記積草池中有珊瑚樹蕭疎桂影移茶具杜甫詩瓠葉轉蕭疎梁元帝樂府桂影含秋色王褒童約烹茶盡具餔已蓋蔵唐書隠逸傳陸羽嗜茶著茶經三篇言茶之原之法之具尤備狼籍蘋花上釣筒史記淳于髠傳杯盤狼籍韓愈詩狂風簸枯榆狼籍九衢内劉希夷詩蘋花日自新類要蘋花五出黄細而香盛于中夏案陸龜䝉漁具詩序云緡而竿者總謂之筌筌之流曰筒龜䝉與日休各有釣筒詩爭得共君來此住南史禇伯玉傳禇先生從白雲㳺舊矣近故要其來此冀慰日夜白居易詩洛下園林終共住便披鶴氅對清風晉書王恭傳恭嘗披寉氅裘涉雪而行孟昶窺見之歎曰此真神仙中人也杜審言詩鶴氅競尋玉南史謝譓傳入我室者但有清風對我飲者惟當明月阮籍詩清風吹我襟曹唐贈南嶽馮處士爾雅江南衡注衡山南嶽晉書天文志少微四星在太微西南第一星處士白石溪邊自結廬詩揚之水白石鑿鑿甯戚飯牛歌滄浪之水白石粲杜甫詩飽聞榿木三年大為致溪邊十畆隂陶潛詩結廬在人境而無車馬喧唐書王績傳仲長子光隱者也結廬北渚凡三十年白居易詩擬近東林寺溪邊結一廬風泉滿院稱幽居王融綠水曲風泉動華燭王􅋄頭陀寺碑崖谷共清風泉相渙孟浩然詩風泉滿清聽禮記幽居而不淫杜甫詩梅發對幽居鳥啼深樹劚靈藥庾信詩春山百鳥啼趙冬曦詩舊館逢花發他山值鳥啼阮瑀苦雨詩深樹猶沾裳説文劚斫也十洲記仙草靈藥甘液玉英靡所不有孟浩然詩瑞花長自下靈藥豈須栽花落閒窓讀道書宋子侯詩纎手折其枝花落何飄揚謝朓詩鳥散餘花落梁簡文帝詩玩飛花之度窓魏志張魯傳祖父陵學道鵠鳴山中造作道書梁武帝㑹三教詩中復觀道書有名與無名烟嵐晚過鹿裘濕賈島詩烟嵐沒曉村白居易詩晚嵐林葉暗沈佺期詩歸路烟霞晚列子孔子逰於泰山見榮啓期行乎郕之野鹿裘帶索鼓琴而歌淮南子文繡白狐人之所好也而堯白衣揜形鹿裘禦寒盧照鄰詩天寒禦鹿裘祖詠詩雲濕坐禪衣水月夜明山舍虚江總脩心賦寢處風雲馮栖水月唐太宗聖教序松風水月未足比其清華左傳恒星不見夜明也子夜歌秋夜涼風起天髙星月明杜甫詩四更山吐月殘夜水明樓南史周顒傳雖有妻子獨居山舍又京産傳請劉瓛至山舍講書傾資供待陶𢎞景尋山志庭虛月映琴響風哀孟浩然詩松月夜窓虛支頤冷笑緣名出王維詩搘頤問樵客案搘同支李白詩時人見我指殊調見余大言皆冷笑白居易詩閒談冷笑接交親錢起詩安危皆報國文武不緣名終日王門强曳裾易君子終日乾乾老子驟雨不終日崔駰達㫖下不步卿相之庭上不登王公之門漢書鄒陽傳飾固陋之心則何王之門不可曳長裾乎杜甫詩鄒生惜曳裾鄭谷舟行九派迢迢九月殘説苑禹鑿江以通於九派灑五湖而定東海郭璞江賦流九派於潯陽鮑照詩九派引滄流潘岳詩迢迢逺行客謝靈運詩迢迢萬里帆茫茫何所之詩九月授衣晉子夜歌適憶三陽初今已九秋暮沈佺期詩亭傳理殘秋舟人相語且相寛木華海賦舟人漁子徂南極東盧綸詩舟人夜語覺潮生白居易詩相逢不閒語爭奈日長何杜甫詩他鄉意緒寛村逢好處嫌風便謝朓詩曖曖江村見韓愈詩最是一年春好處又盆城去鄂渚風便一日耳丘為泛若耶溪詩每尋樵風便往來殊不難酒到醒來覺夜寒劉伶酒德頌兀然而醉豁爾而醒杜甫詩酒醒思卧簟衣冷欲裝綿梁簡文帝詩寒重夜風吹李白夜坐吟冬夜夜寒覺夜長蓼水白波喧夏口詩予又集于蓼傳水草也急就篇注葉長鋭而薄生於水中者曰水蓼莊子白波若山海水震蕩水經注白波奮流自成潭渚杜甫詩黄牛峽水喧南史何尚之傳夏口在荆江之中正對沔口通接雍梁實為津要王維詩青草瘴時過夏口一統志夏口在武昌府唐稱鄂州為夏口本在江北自孫權取對岸名夏口而江北之名始晦柿園紅葉憶長安唐書鄭䖍傳䖍好書嘗恐無紙慈恩寺貯柿葉數屋日取肄書久之殆徧張均詩園紅柿葉稀班固西都賦漢之西都實安在雍州名曰長安傅休奕詩所思兮何在乃在西長季鷹可是思鱸鱠引退知時自古難晉書張翰傳字季應齊王冏辟為大司馬東曹掾翰謂同郡顧榮曰有四海之名者求退良難吾本山林間人無望於時子善以明防前以智慮後因見秋風起思吳中菰菜蓴羮鱸魚膾曰人生貴得適志何能羈宦數千里以要名爵乎遂命駕歸人皆謂之見機王昌齡詩忽憶鱸魚膾扁舟往江東白居易詩秋風一筯鱸魚膾張翰搖頭喚不迴韓溉江南人松倚空髙樹淨無塵陸龜䝉詩繡嶺花殘翠倚空陸雲詩雞鳴髙樹巔顔延之詩回飈巻髙樹沈約賦鬱彼髙松棲根得地耿湋詩山河迢逓淨纎塵曹唐詩樹入天台石路新雲和草淨迥無塵往事閒徴夢欲分史記自序述往事思來者白居易詩閑徴雅令窮經史吳志孫皓傳注丁固為尚書夢松樹生其腹上謂人曰松字十八公也後十八年吾其為公乎元稹詩人生同大夢夢與覺誰分翠色本宜霜後見謝偃髙松賦獨潔固而不渝常猗猗而結翠李徳林詩嵗寒無改色孟郊詩青松多夀色曹毗文松以負霜稱雋陶潛詩懐此貞秀姿卓為霜下傑寒聲偏向月中聞沈約寒松詩梢聳拔寒聲青葱標暮色謝朓髙松賦懐風音而送聲當月路而留影劉得仁聽松聲詩況復當秋暮偏宜在月明白居易詩蕭寥發為聲半夜明月前啼猿想帶蒼山雨徐陵詩猿啼知谷晚唐太宗詩别鶴栖琴裏離猿啼峽中韋應物詩春潮帶雨晚來急岑參詩夜猿啼山雨歸鶴應和紫府雲元結詩鄉園不見重歸鶴李嶠松詩隺栖君子樹白居易詩不見千年鶴多栖百丈松十洲記青丘有紫府宮天真仙女逰於此地庾信廣成子贊治身紫府問政青丘劉孝綽詩舒雲類紫府陶潛詩雲隺有竒翼莫向東園競桃李阮籍詩嘉樹下成蹊東園桃與李王勃詩東園垂栁徑韓愈詩邇來又見桃與梨交開紅白如爭競李白詩願君學長松愼勿作桃李春光還是不容君李百藥賦眷春光而怡送白居易詩時時偷眼看春光史記孔子世家不容何病不容然後見君子顧況詩為報烟霞道人間久不容崔塗字禮山江南人光啓四年登進士第鸚鵡洲即事水經注江水又東逕歎父山江之右岸當鸚鵡洲庾信賦落帆黄鶴之浦藏船鸚鵡之洲一統志鸚鵡洲在武昌府城南跨城西出江中黄祖殺禰衡處衡嘗作鸚鵡賦故名列子周之尹氏有老役夫晝則呻呼而即事陶潛詩即事多所欣悵望春襟鬱未開謝朓詩停驂我悵望元稹詩悵望殘春萬般意江淹詩憂襟未能整潘岳西征賦開襟乎清暑之館陶潛詩凱風因時來回飈開我襟重吟鸚鵡益堪哀楚辭立江介而長吟兮愁哀哀而累息李白詩重吟真曲和清吹後漢書禰衡傳黄祖長子射大㑹賔客人有獻鸚鵡者射舉巵於衡前曰願先生賦之以娛佳賔衡攬筆而作文無加㸃辭采甚麗李白望鸚鵡洲懷禰衡詩吳江賦鸚鵡落筆超羣英劉妙容歌歌宛轉宛轉凄以哀曹瞞尚不能容物黄祖何因解愛才魏志武帝紀太祖武皇帝姓曹諱操字孟德注太祖一名吉利小字阿瞞又吳人作曹瞞傳後漢書禰衡傳衡少有才辨氣尚剛傲曹操欲見之不肯往而數有恣言操怒謂孔融曰衡竪子孤殺之猶雀鼠耳顧此人素有虚名逺近將謂孤不能容之今送與劉表視當如何于是遣人騎送之復侮慢於表表以江夏太守黄祖性急故送衡與之衡為祖作書記祖大㑹賔客衡言不遜順祖慙恚遂殺之李白詩魏帝營八極蟻視一禰衡黄祖斗筲人殺之受惡名幽島暖聞燕雁去陶雍詩幽島曲池相隠映王逸九思風習習以和暖李益詩忽聞燕雁一聲去迴鞍挾彈平陵園荆州圖記沮縣西北平里有雁浮山髙三十餘里脩岩遐亘擢幹干霄雁南翔北歸徧徑其上曉江晴覺蜀波來温庭筠詩開屏見曉江楊炯浮漚賦狀若初蓮出浦映晴江而未開江元稹詩秦人惟識秦中水長憶吳江與蜀何人正得風濤便晉書王濬傳濬將至秣陵王渾遣信要令暫過論事濬舉帆直指報曰風利不得泊也王粲浮淮賦于是帆風興濤征鼔若電孔德紹詩思得乘風便蕭然河漢遊一㸃輕帆萬里迴杜甫詩輕帆好去便錢起詩涼吹片帆輕郭璞江賦呼吸萬里吐納靈潮南史宗慤傳願乗長風破萬里浪杜荀鶴字彦之池州人有詩名自號九華山人大順二年第一人擢第復還舊山宣州田頵遣至汴通好朱全忠厚遇之表授翰林學士主客貟外郎知制誥自序其文為唐風冬末同友人泛瀟湘水經注湘水出零陵始安縣陽海山即陽朔山也湘中記曰湘水之出於陽朔則觴為之舟至洞庭日月若出入於其中也又二妃神逰洞庭之淵出入瀟湘之浦瀟者水清深也湘中記曰湘川清照五六丈下見底石如樗蒲矣五色鮮明白沙如霜雪赤崖若朝霞是納瀟湘之名矣殘臘泛舟何處好風俗通夏曰嘉平殷曰清祀周曰大蜡漢改曰臘李頻詩零落梅花過殘臘故園歸去醉新年魏明帝歌泛舟黄河隨波潺湲王彪之詩泛舟理飛棹杜牧詩借問春風何處好綠楊門巷馬頭斜最多吟興是瀟湘李白詩鏡湖流水漾清波狂客歸舟逸興多杜甫詩吟多興有餘曹植詩夕宿瀟湘沚謝朓詩瀟湘帝子逰就舟買得魚偏美晉書夏統傳賈充就船與語其應如響杜甫詩魚知丙穴由來美酒憶郫筒不用沽張籍詩鄠陂魚美酒偏濃踏雪沽來酒倍香張九齡詩不辭山路逺踏雪也相過詩無酒酤我張籍詩好酒問人沽王績詩稍覺池亭好偏宜酒甕香白居易詩更愧殷勤留客意魚鮮飯細酒香濃猿到夜深啼嶽麓蕭顯題猿詩挂月影才通猿啼迥入風徐安貞詩巴東下歸棹莫待夜猿啼劉瑗詩月光移數尺方知夜已深一統志嶽麓山在湖廣長沙府善化縣西南亦名靈麓峰即衡山七十二峯之一上有嶽麓書院雁知春近别衡陽劉孝綽詩洞庭春水綠衡陽旅雁歸王勃滕王閣序雁陣驚寒聲㫁衡陽之浦唐書地理志衡州衡陽郡本衡山郡天寶元年更名衡陽縣一統志回雁峯在湖廣衡州府雁至此不過遇春而回與君剰采江山景晉書樂志逺詳經籍近采故事王勃兠率寺浮圖碑野淨川明風景挾江山之助裁取新詩入帝鄉李商隠詩十嵗裁詩走馬成張華詩良朋貽新詩後漢書劉隆傳河南帝城多近臣南陽帝鄉多近親常建詩玉帛朝回望帝鄉杜甫詩草奏何時入帝鄉山居寄友人野吟何處最相宜許棠詩野吟聲自髙陸龜䝉詩縱調為野吟梁簡文帝詩春風本自竒楊栁最相宜張謂詩南園春色正相宜春景暄和好入詩梁元帝纂要春景曰和景梁簡文帝書暮春美景風雲韶麗隋書田德懋傳春日暄和氣力何似杜甫詩日出清江望暄和散旅愁朱慶餘詩空餘孤嶼來詩景髙下麥苗新雨後國語髙髙下下謝靈運詩纎纎麥垂苗劉商詩麥苗縈隴雉初鳴梁簡文帝詩麥雨交新溜史記日者傳天新雨道少人王維詩空山新雨後淺深山色晚晴時孟浩然詩山明翠微淺宋之問賦爽氣浮兮黛壑深李白詩叠春山色郎士元詩山色知殘雨何遜詩振衣喜初霽褰裳對晚晴王維詩天氣晚來晴半巖雲脚風牽斷温庭筠詩紫氣氤氲捧半巖韓愈詩雲脚飛銀線易林北風相牽提笑言語元稹詩風牽卧栁絲朱超詩孤生若㫁雲劉禹錫詩㫁雲發山色平野花枝鳥踏垂梁簡文帝銘鬱鬱翠微遼遼平野杜甫詩星隨平野濶劉孝威詩隔墻花半隱猶見動花枝太平御覽鷙鳥不立垂枝倒載干戈是何日禮記倒載干戈包之以虎皮將帥之士使為諸侯名之曰建櫜然後知武王之不復用兵也史記留侯世家偃革為軒倒置干戈書傳千楯也説文戈平頭㦸也近來麋鹿欲相隨孟子與木石居與鹿豕遊魏文帝賦踐麋鹿之曲蹊聽百鳥之羣鳴杜甫詩荆扉對麋鹿應共爾為羣錢起詩春山載酒逺相隨蘇廣文名字世次無考歸華山因寄幕府周禮夏官職方氏河南曰豫州其山鎮曰華山注華山在華隂山海經太華之山削成而四方其髙五千仞其廣十里又西曰小華之山史記李牧傳市租皆輸入幕府為士卒費索隠注古者出征以幕帟為府署故曰幕府山村寥落野人稀王維詩山村人夜歸杜甫詩歸雲擁樹失山村王勃序琴臺遼落猶停隠遁之賔元稹詩寥落古行宮庾信賦名為野人之家王季友詩野人宿在山家少杜預論水利疏往者東南草創人稀王維詩寉巢松樹遍人訪蓽門稀竹裏衡門掩翠微李白詩竹裏無人聲杜甫詩竹裏行厨洗玉盤詩衡門之下可以栖遲南史袁粲傳席門常掩三徑纔通爾雅山未及上曰翠微尹式詩山髙翠轉微溪渡夜隨明月入杜甫詩溪行一流水曲折方屢渡左傳宵涉潁注夜渡畏晉知之庾信詩姮娥隨月落子夜歌冶逰步明月謝朓詩西户月光入亭臯春伴白雲飛漢書司馬相如傳亭臯千里靡不被築注言為亭堠於臯隰中栁惲詩亭皋木葉下隴首秋雲飛杜甫詩青春作伴好還鄉隂鏗詩海上春雲雜漢武帝秋風辭秋風起兮白雲飛嵇康嬾慢仍躭酒晉書嵇康傳嵇康字叔夜譙國銍人有竒才不自藻飾好老莊拜中散大夫山濤將去選官舉康自代康乃與濤書告絶康書縱逸來久簡與禮相背嬾與慢相成濁酒一杯彈琴一曲志願畢矣白居易詩懶慢不相訪隔街如隔山杜甫詩躭酒須微禄説文躭樂也范蠡逋逃又拂衣史記范蠡事越王勾踐二十餘年以為大名之下難以久居乃自與其私徒屬乘舟浮海變姓名稱陶朱公易歸而逋其邑人三百户晉書郭瑀傳張天錫備禮徵之瑀指翔鴻以示之曰此鳥也安可籠哉遂深逃絶迹謝靈運詩髙揖九州外拂衣五湖裏汀畔數鷗閒不起廣韻汀水際平沙也杜甫詩但見羣鷗日日來髙適詩念兹川路濶羨爾沙鷗閒盧照鄰詩迸水驚秋鷺騰沙起狎鷗只應知我已忘機老子知我者希則我貴矣李白詩杖策尋英豪立談乃知我又我醉君復樂陶然共忘機儲光羲詩達士志寥廓所在能忘機周朴字太朴吳興人避地福州寄食烏石山僧寺桐柏觀書導淮自桐柏風俗通南陽平氏縣桐柏大復山在東南淮水所出也水經注桐柏山南有淮源廟廟中有石龜十二枚極大名勝志桐柏山在南陽府桐柏縣東南一里峰巒竒秀上有玉女卧龍紫霄翠微蓮華諸峰淮水出其下東南一境清心目河圖括地象西北為天門東南為地户古樂府日出東南隅後漢書伏湛傳為平原太守郡内以安平原一境湛所全也吳均詩空香清人心杜甫詩出郊已清目孫綽遊天台山賦恣心目之寥朗任緩步之從容有此千峰插翠微梁簡文帝詩百嶺相迂蔽千峰共隱天唐太宗詩碧峰插遙天劉繪詩翠微上拂景庾信詩金鞍上翠微人在下方衝月上南史傅昭傳袁粲每經昭户輒歎曰經其户寂若無人披其室其人斯在李嶠文誦經則上界遙聞彈指則下方俱動杜甫詩秀氣衝牛斗李白詩暮從碧山下山月隨人歸鶴從髙處破烟飛鮑照舞鶴賦驚身蓬集矯翅雲飛何遜詩連翩御飛鶴杜甫詩蘭若山髙處烟霞障幾重詩有鳥髙飛亦傅于天獨孤及詩逺空霞破露月輪劉繪詩駕鶴乘紫烟巖深水落寒侵骨水經注伏陵山髙峻岩障寒深隂崖積雪江總詩橋平疑水落沈君道詩水落金沙淺庾信詩中流覺水寒杜甫詩北來肌骨苦寒侵門靜花開色照衣崔顥詩夜直千門靜劉孝威詩花開人不歸梁元帝詩日移花色異風散水紋長髙適詩門前駟馬光照衣欲識蓬萊今便是漢書郊祀志自威宣燕昭使人入海求蓬萊方丈瀛洲注此三神山者相傳在渤海中去人不逺常有至者山海經上有仙人宫室皆以金玉為之魯范詩乗空向紫府控鶴下蓬萊更於何處學忘機劉長卿詩何處戀海鶴岑參詩忘機壓塵喧浪跡向江海吳融太保中書令軍前新樓本傳韋昭度討蜀表傳掌書記唐書章昭度僖宗再狩山南昭度平李昌符遷太保兼侍中昭宗即位守中書令王建攻陳敬瑄於成都以昭度為西川節度使敬瑄不受詔顧彦朗與建合兵以討拜昭度兼行營討撫使乃建幢節行城下諭其衆十二䦨干壓錦城漢書郊祀志黄帝時為五城十二樓以候神人樂府古詞䦨干十二曲垂手明如玉江淹詩盡日䦨干頭益州記錦城在益州南笮橋東流江南岸其處號錦里城元和郡國志錦城在成都南十里李白詩日照錦城頭半空人語落灘聲薛道衡詩浮雲半空上清吹隔池來子夜歌中宵無人語杜甫詩黄牛峽靜灘聲轉風流近接平津閣晉書王獻之傳獻之髙邁不羈風流為一時之冠王維詩風流三接令公香漢書公孫𢎞傳元朔中封丞相𢎞為平津侯又𢎞自起徒步數年至宰相封侯于是起客館開東閤以延賢人孫逖詩開閤寵平津氣色髙含細栁營謝恵連詩氣色少諧和李華銘景象光徹江湖含氣漢書周亞夫傳以河内守亞夫為將軍軍細栁王維詩忽過新豐市還歸細栁營盡日捲簾江草綠後漢書桓榮傳詔諸生雅吹擊磬盡日乃罷樂府西洲曲巻簾天自髙海水搖空綠孫逖詩二月飛花滿江草栁惲詩深庭秋草綠髙門白露寒有時欹枕雪峰晴元稹詩誰憐獨欹枕斜月透窓明李白詩江帶峩嵋雪又萬㸃雪峰晴錢起詩晞陽瑞雪晴不知奉詔朝天後魏書叔孫俊傳每逢詔宣外必告示殷勤杜甫詩奉詔許牽裾賈至詩銀燭朝天紫陌長劉長卿詩向日三千里朝天十二樓誰此登臨看月明梁宣帝賦盡登臨之雅致庾信詩逰客喜登臨王建詩遇晴須看月魏武帝詩月明星稀禁直偶書本傳以禮部郎中為翰林學士昭宗御南闕羣臣稱賀融最先至帝有指授叠十許藁融跪作詔少選成語當意詳後遷承㫖玉皇新復五城居翼聖傳玉皇君居於雲房常有紅雲繞之元稹詩我是玉皇香案吏漢書郊祀志方士有言黄帝時為五城十二樓以候神人李白詩天上白玉京十二樓五城劉孝綽詩佳麗實皇居仙館詞臣在碧虛王褒銘明庭朝禮仙館羽衣班固兩都賦序言語侍從之臣朝夕論思日月獻納唐太宗詩言談延國輔詞賦引文雄楊巨源詩雲陛臨黄道天門在碧虚錦砌漸看翻芍藥盧照鄰詩封霜連錦砌防露拂瑤階詩贈之以芍藥謝朓詩紅藥當堦翻蒼苔依砌上江總詩欲題芍藥詩不成鏁窓還詠隔蟾蜍後漢書梁冀第舍窓牖皆有綺疏青瑣鮑照詩玉鈎隔瑣窓韻譜瑣或作鏁西京雜記漢廣川王得玉蟾蜍腹容五合水以為書滴常衮詩綴簾金翡翠賜硯玉蟾蜍敢期林上靈烏語漢書宣帝紀時鸞鳳集長樂宫東闕樹上束晳詩嗷嗷林烏受哺於子唐太宗詩仙馭隨輪轉靈烏帶影飛韓愈詩朝日照屋百鳥語貪草雲間彩鳳書漢書武帝方好藝文嘗召司馬相如等視草翰林志學士於禁中草書詔謂之視草宗楚客詩窈窕神仙閣參差雲漢間事始石季龍置戲馬觀上安詔書用五色紙銜於木鳳口而頒行謝朓詩綵鳳鳴朝陽司空曙詩紫鳳朝銜五色書爭奈滄浪頻入夢書嶓冢導漾東流為漢又東為滄浪之水一統志滄浪水在均州四十里即禹貢滄浪之水任昉詩長泛滄浪水杜甫詩故人入我夢明我長相憶白波無際落紅蕖莊子白波若山水經注白波奮流自成潭渚徐陵文巴漢樓船凌波無際江總賦綠芰懸插紅蕖倒生杜甫詩雨浥紅蕖冉冉香庾信詩蓮衣落夏蕖新雁杜牧詩為問寒沙新到雁去時還向杜陵無湘浦春波始北歸水經注湘水又北左㑹瓦官水口湘浦也湘水左逕麓山東山北有白露水口湘浦也湘水左合誓口又北至石廓口並湘浦也右合麻溪水口湘浦也謝靈運緩歌行娥皇發湘浦又孝感賦起春波於寒川江淹賦春草碧色春水綠波禮記季冬之月雁北鄉杜甫詩萬里衡陽雁今年又北歸玉闗搖落又南飛後漢書班超傳臣不敢望到酒泉郡但願生入玉門闗注玉門闗屬燉煌郡今沙州也吳孜詩玉闗信使㫁借詩問不相諳楚辭九辨蕭瑟兮草木搖落而變衰劉孝綽禁林寒氣晚方秋未搖落蔡邕胡笳十八拍雁南飛兮欲寄邊