門虎牙楚之西塞也孟浩然詩西塞沿江島張志和漁父辭西塞山前白鷺飛張正見詩峯㫁玉山前白居易詩山光水色緑於藍亂雲如絮滿澄潭杜甫詩亂雲低薄暮庾信詩秋雲粉絮結杜牧詩晴雲似絮惹低空隂鏗詩洞庭春溜滿水經注筑陽水中有孤石挺出其下澄潭沈佺期詩碧水澄潭映逺空孤峰漸映湓城北李白詩振錫還孤峰異苑衡山有三峰一峰名芙蓉峰上有泉飛派如一幅絹分映青林唐書地理志潯陽本湓城武德四年更名又别析置湓城縣王維詩白頭浪裏出湓城宋之問詩杜陵城北花盈滿片月斜生夢澤南徐陵詩片月窺花簟張若虛詩江潭落月復西斜禮記月生於西古樂府兩頭纎纎月初生書雲土夢作乂傳雲夢之澤在江南漢書地理志南郡華容縣南有雲夢澤韓愈詩朝逰孤嶼南㸑動曉烟烹紫蕨詩執㸑踖踖易暌火動而上陸機詩民動如烟劉孝綽詩朱旗曳曉烟詩七月烹葵及菽栁惲詩野蕨開初紫李德裕詩飯思飡紫蕨露和香蔕摘黄柑謝莊表珍露呈味於禁林廣志柑有二十一種有成都平蔕柑桂海果志饅頭柑近蒂起饅頭尖者味香勝庾肩吾啓仙厨始摘猶堆青玉之盤南史張暢傳太武求黄柑唐書蕭嵩傳荆州進黄柑他年却棹扁舟去九歌桂棹兮蘭栧劉孝綽詩扁舟去平樂朱超道詩扁舟已入浪孤帆漸逼天長孫佐輔詩獨隨孤棹去孟浩然詩前路舍舟去終傍蘆花結一菴劉長卿詩秋傍竹花多江總詩蘆花霜外白駱賔王詩雁起蘆花晚齊書竟陵王子良傳編草結菴不違涼暑續仙傳酆去奢登山結菴以居陸龜䝉傳尋僧助結菴羅鄴題滄浪峽水經注武當縣西北四十里漢水中有洲名滄浪洲地記曰水出荆山東西流為滄浪之水是近楚都一統志滄浪水在均州北四十里即禹貢滄浪之水儲光羲詩自有滄浪峽誰為無事人門向紅塵日日開風俗通門亦昏閉晨開扞難守固應璩書紅塵蔽於几榻祖詠詩走馬入紅塵梁簡文帝詩日日春禽變沈佺期詩氣衝魚鑰九闗開入門襟袖逺塵埃儀禮士相見禮主人揖入門右賔奉贄入門左古辭飲馬長城窟行入門各自媚誰肯相為言陶潛賦顧襟袖以緬邈王融詩襟袖三春隔禮記前有塵埃則載鳴鳶丘遲詩野馬雜塵埃暗香惹步澗花發許渾詩早蓮飄暗香劉孝威雜言香出衣步近氣逾飛徐摛詩岸曲斜梁阻何時香步歸古辭至今衣袖惹天香徐陵詩落花承歩履流澗寫行衣韓愈詩百花寥落梨花發晚景逼簷溪鳥迴庾信詩凄清臨晚景張何賦晚景彌秀晴江轉春陶𢎞景尋山志夕鳥依簷敬括花萼樓賦飛鳥拂簷而斜度綦母潛詩窓外無人溪鳥飛杜甫詩渚清沙白鳥飛迴不為市朝行路近周禮夏官量人掌建國之法營國城郭營后宫量市朝道巷門渠國語大者陳之原野小者致之市朝華陽國志京師天下之市朝也潛夫論君臣義重行路禮輕李嶠詩雲霞仙路近有誰車馬看山來禮記獻車馬者執策詩我有車馬阮籍詩出門臨永路不見行車馬陶潛詩晨夕看山川事事悉如昔庾肩吾詩看山通迥枝劉長卿詩日暮更看山又轉岸前山來可憐嚴子持竿處沈約詩且縱嚴陵釣岑參詩灘上思嚴子雲中想許由列子臨河持竿心無雜慮惟魚之念徐陵書持竿而釣徴聘不來雲水終年鎖綠苔杜甫詩稻穫空雲水川平對石門李頎詩鐵馬嘶雲水郭璞遊仙詩終年不華皓李商隠詩宻鎖重闗掩綠苔拾遺記靈帝起舘千間采綠苔而被階丘遲詩檐際落黄葉堦前網綠苔題水簾洞栁宗元水簾詩懸爾粲成簾羅注無時休案一統志水簾洞醴陵縣及衡山華山俱有水從石頂流下如簾適當洞口亂泉飛下翠屏中後漢書耿恭傳飛泉湧出楚辭吸飛泉之微液兮陸機詩飛泉潄鳴玉李白廬山瀑布詩飛流直下三千尺天台山賦搏壁立之翠屏唐明皇詩翠屏千仞合名共珍珠巧綴同尹文子一曰命物之名方圎白黒是也洛陽伽藍記西域塔初成用珍珠為羅網覆其上李商隠詩豈得珍珠始是車晉書苻堅載記懸珠簾於正殿又張駿傳窮盡珍巧任昉苦熱詩霡霂類珠綴沈約詩網軒映珠綴一片長垂今與古庾信至仁山銘瑞雲一片仙童兩人王融聯句玉溜簷下垂闗尹子古之善揲蓍灼龜者能於今中示古古中示今孔穎達禮記正義序博物通人知今温古半山遙聽水兼風鮑照書半山以下純為黛色王粲詩殘月半山低顔延之詩側聽風薄木遙睇月開雲張正見詩影照龍門水聲入洞庭風雖無舒巻隨人意淮南子隂陽嬴縮舒巻淪於不測王融樂府烟雲乍舒巻朱超詩舒巻聽人裁梁簡文帝詩栁枝無極軟春風隨意來又可憐年幾十三四工歌巧舞入人意自有潺湲濟物功楚辭九歌觀流水兮潺湲江淹賦欷潺湲兮沬袖廣韻潺湲水流貌張祜題御溝詩都縁濟物心無阻從此恩波處處流杜甫詩知君才是濟川功劉長卿詩名達濟時功每向暑天來往見孔融詩巖巖鍾山首赫赫炎天路杜甫詩炎天避欝蒸易日往則月來月往則日來王維詩今人自來往疑將仙子隔房櫳李白詩伯陽仙家子容色如青春李商隠詩仙子玉京路主人金谷園唐明皇詩跡與塵囂隔王維詩隔窓雲霧生衣上班偼伃賦房櫳虚兮風泠泠傅亮賦鑒明月於房櫳張華詩房櫳自來風梁元帝詩無因謝神女一為出房櫳譚用之贈索處士不將桂子種諸天晉書郄詵傳猶桂林之一枝唐書五行志垂拱四年三月雨桂子於台州旬餘乃止韓終採藥詩闇河之桂實大如棗得而食之後天而老駱賔王詩桂子月中落白居易詩因何栽種在人家雲笈七籖一唱萬真和九徧諸天朝長得尋君水石邊異苑可於水際見尋棗據詩髙迹可尋宋書隠逸傳論巖壑閒逺水石清華范雲詩盈盈一水邊白居易詩吟詩石上坐引酒泉邊酌元豹夜寒和霧隠山海經即谷之山多元豹子虛賦其下則有白虎元豹曹植昇天行元豹逰其下列女傳陶答子化陶三年名譽不興其妻謂之曰妾聞南山有元豹霧雨七日而不食欲澤其衣毛而成其文章故藏隠以逺害今君與此背得無後患乎白居易詩庭際蕭疎夜氣寒謝朓詩雖無元豹姿終隠南山霧董思恭詩終南晨豹隠驪龍春暖抱珠眠莊子河上有家貧恃緯蕭而食者其子沒於淵得千金之珠其父謂其子曰取石來鍛之夫千金之珠必在九重之淵而驪龍頷下子能得珠者必遭其睡也使驪龍而寤子尚奚微之有哉謝靈運詩含悲忘春暖七啓綴以驪龍之珠李德裕詩碧海宵澄驪龍躍出杜甫詩此時驪龍亦吐珠袁淑文抱梁而眠山中宰相陶𢎞景劉逖詩縱意在山中梁書陶𢎞景傳𢎞景字通明丹陽秣陵人自號華陽隠居時人謂為山中宰相諡貞白先生南史陶𢎞景傳𢎞景止句曲山梁武帝早與之逰及即位恩禮愈篤書問不絶時人謂為山中宰相洞裏眞人葛稚川隂鏗詩洞裏閲仙書莊子闗尹老明乎古之博大真人哉文子得天地之道故謂之真人賈誼賦真人恬漠兮獨與道息晉書葛洪傳洪字稚川又傳論稚川束髮從師老而忘倦楊炯渾天賦明入於地葛稚川所以有辭一度相思一惆悵潘岳詩嵗寒守一度王翰詩落花一度無再春李陵與蘇武詩行人難久留各言長相思古詩上言長相思下言久離别九辨惆悵兮而私自憐張衡詩路逺莫致倚惆悵水寒烟澹落花前史記荆軻傳風蕭蕭兮易水寒庾信詩半道聞荷風中流覺水寒白居易詩烟澹月濛濛舟行夜色中又天曉烟景澹劉令嫺詩落花掃更合蕭子範詩惟願落花遲張正見詩競噪長枝裏爭飛落木前御選唐詩巻二十三
