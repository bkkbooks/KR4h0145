body:
  text: 欽定四庫全書御選唐詩卷二十三七言律崔櫓大中時舉進士仕為棣州司馬岸梅含情含怨一枝枝王粲詩今日不極歡含情將訴誰梁簡文帝詩冬朝日照梁含怨下前床説苑越使諸發執一枝梅遺梁王陸凱詩江南無所有聊贈一枝春古詩枝枝相覆蓋斜壓漁家短短籬元稹詩凍壓花枝著水低史記龜筴傳泉陽令使按籍視圖水上漁者二十餘家劉長卿詩漁家帶夕陽杜甫詩茅舍竹籬短梅花吐未齊錢起梅花詩村籬冷落開惹袖尚餘香半日何遜詩晴軒連瑞氣同惹御香芬古詩馨香盈懐袖路逺莫致之王維六祖碑花惟薝蔔不散餘香向人如訴雨多時庾信詩向人長曼臉劉長卿詩嵐烟瀑水如向人初學記梅熟而雨曰梅雨張正見詩梅樹亘長虹芳林散輕雨庾信詩跂石多時望杜甫詩雪殘鳷鵲亦多時初開偏稱雕梁畫劉孝威綵花詩葉舒非漸大花發似初開王維詩燕語雕梁晚隂鏗詩雕梁畫早梅張正見詩梅梁横發蕊未落先愁玉笛吹詩桑之未落其葉沃若西京雜記髙祖初入咸陽周行府庫有玉笛長二尺三寸六孔吹之則見車馬山林隠嶙相次吹息則不復見銘曰昭華之琯李白詩黄鶴樓中吹玉笛江城五月落梅花樂府詩集梅花落笛中曲也行客見來無去意孔融詩送逺新行客嵗暮乃歸來梁昭明太子詩行客行路遙釋名懐回也未有去意回來就之也解帆烟浦為題詩宋孝武帝詩解帆憩通渚杜甫詩解帆嵗云暮可與春風歸王建汎水曲載酒入烟浦方舟泛緑波孟浩然詩孤嶼共題詩杜甫詩桐葉坐題詩李羣玉字文山澧州人性曠逺赴舉一上而止惟以吟咏自適裴休觀察湖南延致之及為相以詩薦授𢎞文館校書未幾乞假歸望月懐友浮雲捲盡看朣朧李陵詩仰視浮雲馳奄忽互相踰陳後主詩天迥浮雲細山空明月深隋煬帝詩天淨宿雲巻羊士諤詩霽色朝雲盡潘岳秋興賦月朣朧以含光兮劉孝綽望月詩朣朧入牀簟直出滄溟上碧空初學記東海通謂之滄海東海之别又有溟海左思吳都賦其東則有滄溟鯷壑洪濤汗漫韓愈詩三秋端正月今夜出東溟梁元帝詩夜輪懸素皓朝光蕩碧空隋煬帝詩碧空霜華淨盈手水光寒不濕陸機擬明月何皎皎詩照之有餘輝攬之不盈手戴暠月重輪行北堂豈盈手西園偏照人鮑至詩岸暗水光來王維新竹詩疎影月光寒易水流濕楊衡詩月華泛灧紅蓮濕流天素彩靜無風王彪之井賦月流天而霜炯謝莊月賦白露靄空素月流天沈約謝賜絹啓素彩氷華陸贄月臨鏡湖賦蔽空素彩列韓愈月蝕詩寒氣眉􅀢頑無風酒花蕩漾金尊裏孟郊詩酒花薰别顔阮籍詩人情有慷慨蕩漾焉能排劉希夷詩綠波蕩漾玉為砂謝靈運詩清醑滿金尊李白詩唯願當歌對酒時月光長照金尊裏櫂影飄颻玉浪中李懐逺詩湍髙棹影沒陸贄月臨鏡湖賦棹影乍浮如上天邊之漢潛夫論隨景風而飄颻曹植洛神賦飄颻兮如流風之迴雪駱賔王啓文江宿浪織玉瀲以韜霞李商隠詩月浪衝天天宇濕川路正長難可越美人千里思何窮謝莊月賦美人邁兮音塵闕隔千里兮共明月臨風長嘆將焉歇川路長兮不可越隂鏗詩風烟望相接川路恨成遙虞騫詠月詩佳人復千里餘影徒揮忽李郢贈羽林將軍漢書天文志北宫虛危其南有衆星曰羽林天軍軍西為壘又百官公卿表郎中令掌宮門户期門羽林皆屬焉後漢書百官志羽林郎比三百石凡六郡良家選補唐書兵志髙宗龍朔二年始取府兵越騎步射置左右羽林軍又百官志左右羽林軍大將軍各一人正三品將軍各三人從三品虬髯憔悴羽林郎説文虬龍子無角又頰上曰髯魏志崔琰虬髯對客直視屈原漁父篇面目枯槁形容憔悴庾信詩今年喜夫壻新拜羽林郎曽入甘泉侍武皇漢書武帝幸甘泉宫師古注甘泉宫在雲陽本秦林光宫後漢書百官志羽林掌宿衛侍從本武帝以便馬從獵王昌齡詩白馬金鞍從武皇鵰沒夜雲知御苑左傳鶻鳩氏注鵰也陳叔達詩翔禽遙出沒杜甫畫鶻行側腦看青霄寧為衆鳥沒王維詩回看射鵰處千里暮雲平沈佺期詩驚春御苑中馬隨仙仗識天香唐書儀衞志天子駕出承天門敇侍臣乗馬又左右金吾衛將軍循仗檢校各二人執䂍稍騎從又兵志羽林軍大朝㑹則執仗以衛階陛行幸則夾馳道為内仗王維詩畫鷁移仙仗杜甫詩常思仙仗過崆峒趙嘏詩好風飄下九天香五湖歸去孤舟月周禮揚州其浸五湖吳錄五湖者太湖之别名以其周行五百餘里故以五湖為名先賢傳勾踐滅吳范蠡乃扁舟浮五湖不返陶潛歸去來辭歸去來兮田園將蕪胡不歸謝靈運詩拂衣五湖裏陶潛詩渺渺孤舟逝岑參詩江上孤舟月六國平來兩鬢霜史記秦并六國案六國韓魏齊楚燕趙又蘇秦傳六國合從併力蘇秦為從約長並相六國庾信詩既無六國印翻思二頃田白居易詩欺我鬢如霜惟有桓伊江上笛晉書桓伊傳伊善吹笛有蔡邕柯亭竹嘗自吹之王徽之泊船青溪素不相識伊於岸上過客稱伊小字曰此桓野王也徽之便令吹笛伊時貴顯素聞徽之名下車作三調弄畢上車去客主不通一言伊以功進右將軍封永脩縣侯劉長卿詩江上何人復吹笛卧吹三弄送殘陽馬融長笛賦序性好吹笛獨卧平陽塢中唐書漢中王瑀知音常過永興里聞吹笛問左右曰此太常工乎曰然他日識之曰何故卧吹笛工驚謝李商隠詩實自怯殘陽嚴郭爵里無攷賦百舌鳥禮記仲夏之月反舌無聲疏反舌百舌鳥易緯通卦騐能反覆其舌隨百鳥之聲此禽輕巧少同倫沈約百舌賦有反舌之微禽亦班名於庶鳥祖詠百舌詩巧囀任天姿劉孝綽百舌詩孤鳴若無對我聽長疑舌滿身杜甫百舌詩花宻藏難見枝髙聽轉新又知音兼衆語整翮豈多身星未没河先報曉王褒詩落星侵曉沒李商隠詩長河未沒曉星沈劉禹錫百舌詩曉星寥落春雲低初聞百舌間闗啼沈約百舌詩既含意于將曉亦流妍於始旦王維聽百舌鳥詩拂曙能先百鳥啼栁猶粘雪便迎春唐太宗栁詩縈雪臨春岸王維百舌詩入春解作千般語杜甫詩重重只報春劉禹錫詩舌端萬變乘春暉頻嫌海燕巢難定劉兼燕詩髙門頻入莫爭嫌吳均詩一燕海上來説文燕作巢避戊巳日庾肩吾新燕詩登巢識故泥王建春燕詩新燕新燕何不定東家綠池西家井却訝林鶯語不眞武平一詩黄鸝未解林間囀杜甫詩林鶯遂不歌王建詩春寒囀小未分明劉禹錫百舌詩黄鸝吞聲燕無語莫倚清風更多事沈約反舌賦因風起哢曳響生竒劉禹錫百舌吟迎風弄影如自矜梁簡文帝鴛鴦賦追清風而雙舉金人銘無多事玉樓還有晏眠人楊巨源詩楊栁玉樓晴徐陵詩百舌曉驚眠劉長卿詩樓上花枝笑獨眠劉禹錫百舌吟墮珥妖姬和睡聞譚用之字藏用五代末人善為詩而官不達贈釣魚李處士風俗通處士者隱居放言也罷吟鸚鵡草芊芊禰衡鸚鵡賦序時黄祖子射賔客大㑹有獻鸚鵡者舉酒於衡前曰禰處士今日無用娛賔願為之賦案孔融薦禰衡表亦稱處士平原禰衡嚴武詩莫倚善題鸚鵡賦崔顥詩芳草萋萋鸚鵡洲廣韻芊草盛宋玉髙唐賦仰視山巔肅何芊芊注芊芊青也許渾詩緑波無路草芊芊又泛鴛鴦水上天詩鴛鴦在梁埤雅雄鳴曰鴛雌鳴曰鴦梁元帝賦雲出山而相似水含天而難别又詩水影若浮天栁宗元詩洞庭秋盡水如天一棹冷含楊栁雨薛瑩詩單棹横疎雨錢起詩楊栁依歸棹韓愈詩冷雨澀不晴杜牧栁詩巫娥廟裡低含雨片帆香挂芰荷烟李白詩疾風吹片帆李適詩輕帆截浦觸荷來張九齡詩來汎芰荷香孟浩然詩潭香聞芰荷本草荷髙曰芰荷綠搖江澹萍離岸沈約詩搖綠蒂抗紫莖魏文帝詩萍藻泛濫浮澹澹隨風傾阮脩詩澄澄綠水澹澹其波夏侯湛浮萍賦既澹澹以順流又雍容以隨風有纒薄于岸側或迴滯於湍中紅㸃雲疎橘滿川李頎詩宻葉散紅㸃庾信啓花落交映連珠疎㸃駱賔王詩疎雲瑞葉輕禹貢厥包橘柚注小曰橘大曰柚張華詩橘生湘水側沈約橘詩朱苞待霜潤何處邈將歸畫府數莖紅蓼一漁船何劭詩長懐慕仙類𦕈愁心綿邈唐書禇亮傳命閻立本圖十八學士亮為之讚藏畫府以彰禮賢之重廣韻蓼辛草也温庭筠詩雨濕蓼花千穗紅方干詩吾家釣臺畔似此兩三莖張正見詩分火照漁船顧非熊詩近水上漁船方干字雄飛新定人咸通中一舉不得志遂遯㑹稽漁於鑑湖歿後十餘年宰臣張文蔚奏名儒不第者五人請賜一官以慰其魂干其一焉題桐廬謝逸人江居一統志桐廬縣在浙江嚴州府城東一百里本漢富春縣之桐溪鄉吳廣武中析置桐廬縣少小髙眠無一事孫萬夀詩少小拙謀身韓愈詩少小尚竒偉徐陵文門前擾擾我且安眠耿湋竹亭詩閑詠疎篁近髙眠逺岫微白居易詩盡日後㕔無一事白頭老監枕書眠五侯勲盛欲如何漢書元后傳上悉封舅譚為平阿侯商成都侯立紅陽侯根曲陽侯逢時髙平侯五人同日封故世謂之五侯後漢書單超傳封超新豐侯璜武原侯瑗東武陽侯悺上蔡侯衡汝陽侯五人同日封故世謂之五侯案璜徐璜瑗具瑗悺左悺衡唐衡也李嘉祐詩傲吏身閒笑五侯史記李斯傳聞之荀卿曰物禁太盛今人臣之位無居臣上者可謂富貴極矣湖邊倚杖寒吟苦杜甫詩栁綻湖邊綠王維詩倚杖柴門外秋興賦蟬嘒嘒以寒吟杜牧寄張祜詩仲蔚欲知何處在苦吟林下拂詩塵石上横琴夜醉多宋書蕭思話傳嘗從太祖登鍾山道有磐石清泉上使於石上彈琴因賜以銀酒鍾曰相賞有松石間意李白詩手舞石上月又横琴倚髙松孟浩然詩抱琴來取醉宋書孔凱傳醉日居多鳥自樹梢隨果落白居易詩開花寄樹梢劉商詩鳥喧殘果落許渾詩鳥驚山果落人從窓外卸帆過庾信詩澗水纔窓外湛方生詩落帆依江渚李中詩沙汀月冷帆初缷孟浩然詩龍沙豫章北九日挂帆過由來朝市為真隱王康居詩小隱隱林藪大隱隱朝市白居易詩大隱在朝市小隱在丘樊宋書何尚之傳袁淑錄古隱士有跡無實者著真隱傳以嗤焉杜甫詩薄劣慙真隠可要棲身向薜蘿郭璞詩山林隠遯棲玉篇薜山芹也又薜荔也蘿女蘿托松而生南史宗測傳度形而衣薜蘿杜甫詩洞口經春長薜蘿再題路支使南亭行處避松兼礙石庾信詩横石三五片長松一兩株又欹松横礙馬又洞石礙横松杜甫詩出入巨石碍即須門徑落斜開劉長卿詩門徑蒼苔合庾信賦入欹斜之小徑六帖後漢張仲蔚蓬蒿滿室惟開一行徑謝靈運山居賦剪榛開徑杜甫詩柴門不正逐江開愛邀舊客看漁釣謝幼度詩愛客不告疲張説詩命駕邀漁父杜甫詩舊客舟碍滯潘岳閒居賦沼池足以漁釣張載濛汜池賦攬漁釣之所收貪聽新禽駐酒杯髙隠傳戴顒春日攜雙柑斗酒人問何之曰往聽黄鸝聲鮑泉詩新禽新聽好蕭瑱詩新禽爭弄響何遜詩夕駐臨卭杯杜甫詩莫怪頻頻勸酒杯樹影不隨明月去王冷然賦搖樹影于青岸劉孝綽林下映月詩明明三五月垂影當髙樹杜甫詩月林散青影溪聲常送落花來陳閏詩溪聲雨聲聽不辨趙嘏詩溪聲涼傍客衣秋劉孝綽詩落花浮浦出王維詩何因吹送落花來睡時分得江淹夢五色毫端弄逸才梁書江淹傳淹常夢人以五色筆與之由是文思日進南史淹嘗宿冶亭夢一丈夫自稱郭璞謂曰吾有筆在卿處多年可以見還淹乃探懐中得五色筆一枝以授之抱朴子吐琳瑯於毫墨之端後漢書蔡邕傳伯喈曠代逸才左思詩弱冠弄柔翰聽段處士彈琴幾年調弄七條絲楊希道詠琴詩齊娥初發弄趙女正調聲廣雅神農氏琴五絃曰宫商角徴羽文王増二絃曰少宮少商劉長卿聽琴詩冷冷七絲上靜聽松風寒裴儀直詩殷勤封在七條絲元化分功十指知陳子昂詩深居觀元化元結樂歌元化油油兮孰