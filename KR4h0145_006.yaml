body:
  text: 欽定四庫全書御選唐詩卷三五言古李白字太白隴西成紀人少有逸才志氣宏放初隱岷山天寶初至長安賀知章見其文嘆曰子謫仙人也言於明皇召見奏頌一篇有詔供奉翰林不為親近所容懇求還山浪迹江湖終日沈飲永王璘辟為僚佐璘敗白坐長流夜郎會赦得還文宗時詔以白歌詩裴旻劍舞張旭草書為三絶云集三十卷贈閭丘處士賢人有素業魏志徐胡傳評徐邈清尚𢎞通胡質素業負粹舊唐書虞世南傳兄世基隋時當朝貴盛被服擬於王者世南雖同居而躬履勤儉不失素業乃在沙塘陂書傳澤障曰陂漢書揚雄傳跇巒坑超唐陂注唐陂陂之有隄唐者也竹影掃秋月庾信至仁山銘壁繞藤苗窗含竹影荷衣落古池離騷製芰荷以為衣兮集芙蓉以為裳間讀山海經漢書藝文志山海經十三篇隋書經籍志山海經圖讃二卷郭璞注劉潛謝賜鉢啓雕鏤海籍圖載山經散帙卧遙帷南史孔惇之傳茅屋蓬户庭草蕪徑床上惟有數帙書謝靈運詩淩澗尋我室散帙問所知廣韻書帙亦謂之書衣梁元帝答劉縮書枕中之記即用為枕帷前之帙仍可為帷江淹詩鍊藥矚虛幌泛瑟卧遙帷且耽田家樂楊惲報孫會宗書田家作苦嵗時伏臘烹羊炮羔斗酒自勞遂曠林中期張華詩隱士託山林遁世以保身世説謝公道豫章若遇七賢必自把臂入林野酌勸芳酒晉書陶潛傳王𢎞密知潛當往廬山乃遣其故人龎通之等齎酒先於半道邀之潛既遇酒便引酌野亭欣然忘進南史顔延之傳身居儉約不營財利布衣蔬食獨酌郊野當其為適傍若無人謝莊月賦芳酒登鳴琴薦園蔬烹露葵謝承後漢書戴𢎞為河間相因自免歸家不復仕灌園蔬以經書教授陶潛詩歡言酌春酒摘我園中蔬庾信詩披衣求木實拂雪就園蔬宋玉諷賦為臣煮露葵之羮曹植七啓霜蓄露蔡蕭大圜言志詩穫菽尋汜氏之書露葵徵尹君之訓如能樹桃李韓詩外傳春樹桃李夏得蔭其下秋得食其實焉為我結茅茨史記堯舜采椽不斫茅茨不剪南史馬樞傳鄱陽王築别室以處之樞惡其崇麗乃於竹林間自營茅茨而居又何敬容傳會稽謝郁致書誡之曰君侯宜杜門念失無有所通築茅茨於鍾阜聊優遊以卒嵗以詩代書答元丹丘青鳥海上來史記司馬相如傳有三足鳥為之使注三足鳥青鳥也主為西王母取食山海經三危之山有青鳥居之陶潛詩翩翩三青鳥毛色竒可憐今朝發何處口銜雲錦書沈約詩銜書必青鳥與我忽飛去薛道衡詩願作王母三青鳥飛來飛去傳消息鳥去凌紫煙郭璞遊仙詩赤松臨上遊駕鴻乘紫煙鮑照詩揚芬紫煙上垂彩緑雲中沈約詩紫煙鬱氛氳書留綺窗前左思蜀都賦開髙軒以臨山列綺窗而瞰江古詩交疏結綺窗潘嶽詩明月入綺窗開緘方一笑漢書薛宣傳一笑相樂斯亦可矣乃是故人傳史記范睢傳綈袍戀戀猶有故人之意古詩相去萬餘里故人心尚爾又前日風雪中故人從此去故人深相勗南史王秀之傳秀之從父敬𢎞致仕隱吳興與秀之父瓉之書深勗以靜退憶我勞心曲詩言念君子溫其如玉在其板屋亂我心曲曹植詩思子沈心曲長歎不能言離居在咸陽禮記吾離羣而索居亦已久矣詩正大夫離居古詩同心而離居憂傷以終老史記秦本紀孝公十二年作為咸陽築冀闕徙都之元和郡縣志本秦舊縣也漢興以為渭城縣屬右扶風符堅時改為咸陽郡後魏移咸陽郡於涇水北今涇陽縣理是也隋開皇九年改涇陽為咸陽武德二年置縣山南曰陽水北曰陽縣在北山之南渭水之北故曰咸陽三見秦草緑古詩回風動地起秋草萋以緑置書雙袂間古詩置書懷袖中三嵗字不滅張華白紵舞歌雙袂齊舉鸞鳳翔羅裾飄颻昭儀光引領不暫間陸機詩引領望歸斾古詩眄睞以適意引領遙相睎長望杳難見劉向九嘆征子勞於周行兮處婦憤而長望庾信詩離關一長望别恨幾重愁浮雲橫逺山古詩浮雲蔽白日遊子不顧返沈約詩浮雲一南北何由展言宴謝靈運詩杪秋尋逺山山逺行不近望終南山寄紫閣隱者詩終南何有有紀有堂又如南山之夀又秩秩斯干幽幽南山詩緝周都豐鎬而對南山故天保祝君斯干考室括地志終南山一名南山張禮遊城南記圭峯紫閣在終南山寺之西通志紫閣峯在圭峯東旭日射之爛然而紫其形上聳若樓閣然一統志紫閣峯在鄠縣東南三十里出門見南山易出門同人又出門交有功陶潛詩採葡東籬下悠然見南山引領意無限左傳吕相絶秦曰及君之嗣也我君景公引領西望曰庶撫我乎史記淮隂侯傳信常過樊將軍噲噲跪拜送迎言稱臣曰大王乃肯臨臣信引領笑曰生乃與噲等為伍秀色難為名王融詩五芝多秀色劉孝綽詩是日青春獻林塘多秀色漢書董仲舒傳陽以成嵗為名此天意也蒼翠日在眼謝朓詩蒼翠望寒山崢嶸瞰平陸謝靈運時想見山阿人薜蘿若在眼有時白雲起史記孝武帝紀天子至梁父封泰山其夜若有光晝有白雲起封中天際自舒卷易豐其屋天際翔也疏如鳥之飛翔於天際言隱翳之深也楚辭九天之際安放安居謝朓宣城詩天際識歸舟雲中辨江樹隂鏗詩天際晚帆孤梁簡文帝馬寶頌序縉雲旦卷南風晚扇王融樂府煙雲乍舒卷猿鳥時斷續沈約詩風斾卷復舒雲霞清似轉心中與之然託興每不淺晉書庾亮傳亮在武昌諸佐吏殷浩之徒夜登南樓俄而不覺亮至諸人將起避之庾徐曰老子於此興復不淺何當造幽人易履道坦坦幽人貞吉陶潛詩鳯隱於林幽人在丘滅迹棲絶巘曹植潛志賦退引身以滅迹進出世而取榮謝幼度詩滅迹入雲峯詩陟則在巘廣韻巘語偃切山形似甑張協七命於是登絶巘遡長風月夜江行寄崔員外宗之唐書崔日用傳子宗之好學有風檢與李白杜甫相知杜甫飲中八仙歌宗之瀟灑美少年舉觴白眼望青天皎如玉樹臨風前飄飄江風起梁元帝詩江風當夏清蕭颯海樹秋廣韻颯風聲陳後主詩季冬初陽始寒氣尚蕭颯東方朔十洲記聚窟洲在西海中有大樹與楓木相似樹方花香聞數百里述異記珊瑚生海底一樹數十枝謝朓詩曖曖江村見離離海樹出江總登廣州城詩海樹一邊出山雲四面通登艫美清夜郭璞江賦舳艫相屬注舳舟尾艫船頭鮑照詩登艫眺淮甸魏文帝詩清夜延貴客明燭發髙光挂席移輕舟謝靈運詩揚帆采石華挂席拾海月月隨碧山轉水合青天流王勃滕王閣序落霞與孤鶩齊飛秋水共長天一色杳如星河上杜審言詩宫闕星河低拂樹殿廷燈燭上薰天但覺雲林幽歸路方浩浩古詩長路望浩浩徂川去悠悠詩驅馬悠悠言至于漕徒悲蕙草歇南方草木狀蕙草一名熏子氣如蘼蕪可以止癘謝朓詩無言蕙草歇留垣芳可搴復聽菱歌愁張協七命川客唱淮南之曲榜人奏采菱之歌鮑照詩簫弄澄湘北菱歌清漢南岸曲迷後浦説文浦濵也沙明瞰前洲爾雅水中可居曰洲江淹詩古槎橫近澗危石聳前洲懷君不可見古樂府故鄉不可見長望始此回望逺增離憂楚辭風颯颯兮木蕭蕭思公子兮徒離憂秋夜宿龍門香山寺奉寄王方城十七丈奉國瑩上人從弟幼成令問一統志闕塞山亦名龍門在河南府城西南三十里又龍門十寺遊觀之盛香山為最朝發汝海東戰國策鯨魚朝發崑崙之墟暴鬐於碣石謝惠連詩朝發浦陽汭夕宿浙江湄枚乘七發北望汝海注汝水出魯陽山東北入淮海汝稱海大言之也暮棲龍門中莊子古者禽獸多而人民少于是人皆巢居以避之晝拾橡栗暮棲木上地志闕塞山一名伊闕俗名龍門韋述東都記龍門號雙闕以與大內對峙若天闕元和志伊闕兩山相對望之若闕伊水流其間故名水寒夕波急山海經髙前之山其上有水焉甚寒而清帝臺之漿也飲之者不心痛庾信詩中流覺水寒九歌嫋嫋兮秋風洞庭波兮木葉下木落秋山空禮記季秋之月草木黃落淮南子木葉落而長年悲左思蜀都賦木落南翔氷泮北徂望極九霄迥潘嶽賦思託身於九霄張淵觀象賦陟秀峯以遐眺望靈象於九霄沈約詩託慕九霄中賞幽萬壑通晉書顧愷之傳山隂道上千巖競秀萬壑爭流使人應接不暇目皓沙上月謝莊月賦訴皓月而長歌何遜望初月詩的的與沙淨艷豔逐波輕心清松下風漢官儀秦始皇封禪泰山風雨暴至休於松樹下因封其樹為五大夫南史陶𢎞景特愛松風庭下皆植松每聞其響欣然為樂世説李元禮謖謖如長松下風劉楨詩亭亭山下松瑟瑟谷中風玉斗橫網户晉書天文志北斗七星魁四星為璇璣杓三星為玉衡鶡冠子斗杓西指天地皆秋庾信樂歌玉斗調元協楚辭網户朱綴刻方連些注門扉刻方目如羅網然今亮槅也銀河耿花宫白帖天河謂之銀漢亦曰銀河江總歌織女今夕渡銀河興在趣方逸歡餘情未終阮籍詩娛樂未終極鳳駕憶王子揚雄河東賦乃撫翠鳳之駕鮑照詩鳳臺無還駕陳後主七夕詩鳯駕今時度列仙傳王子喬周靈王太子晉也好吹笙作鳳凰鳴虎溪懷逺公髙僧傳廬山東林寺逺法師所居三門內有小渠名曰虎溪桂枝坐銷歇淮南王招隱士桂樹叢生兮山之幽偃蹇連踡兮枝相樛攀援桂枝兮聊淹留晉書郤詵猶桂林之一枝鮑照詩容華坐銷歇棣華不復同詩棠棣之華鄂不韡韡晉書張載張協傳贊載協飛芳棣華增映流恨寄伊水沈約詩折風落迅羽流恨滿青松山海經虢山伊水出焉西流注於河後漢書郡國志盧氏有熊耳山伊水清水所出元和志伊水在河南縣東南十八里西自陸渾縣流入徐陵詩鳳吹臨伊水盈盈焉可窮古詩盈盈一水間脈脈不得語遊敬亭寄崔侍御一統志敬亭山在寧國府城北十里山有萬松亭虎窺泉通志敬亭山古名昭亭東臨宛溪南俯城闉煙市風帆極目如畫我家敬亭下輒繼謝公作南齊書謝朓字玄暉少好學有美名文章清麗出為宣城太守朓敬亭山詩兹山亘百里合沓與雲齊隱淪既已託靈異居然棲上千蔽白日下屬帶回溪相去數百年風期宛如昨髙逸沙門傳支遁少而任心獨往風期髙亮潘嶽詩念此如昨日誰知己千年謝靈運詩違志已如昨二紀及兹年登髙素秋月韓詩外傳君子登髙必賦漢書登髙能賦可以為大夫王仲宣詩登髙且遊觀梁元帝纂要秋曰白藏亦曰素秋孫楚雁賦迎素秋而南遊背青春而北息劉琨詩朱實隕徑風繁英落素秋陶潛詩和澤周三春清涼素秋節下望青山郭謝朓詩不對芳春酒還望青山郭俯視鴛鷺羣沈約和宛陵王抄書詩空幸參鴛鷺比秀恧瓊芝沈佺期和岑尚書詩昔陪鴛鷺後今望鵾鵬飛宋之問重赴嶺南詩還將鴛鷺羽重入鷓鴣羣飲啄自鳴躍莊子澤雉十步一啄百步一飲世説張華見褚陶語陸平原曰君兄弟龍躍雲津顧彥先鳯鳴朝陽謂東南之寶已盡不意復見禇生陸曰公未覩不鳴不躍者耳夫子雖蹭蹬海賦蹭蹬窮波注失勢貌瑤臺雪中鶴離騷望瑤臺之偃蹇兮陸機前緩聲歌北徵瑤臺女張説玄武門侍射詩雪鶴來銜箭星麟下集絃獨立窺浮雲易君子以獨立不懼遁世無悶楚詞表獨立兮山之上梁武帝詩嬌怨獨立特為誰江淹去故鄉賦絶世獨立兮投君子之一顧蘇武詩俯觀江漢流仰視浮雲翔晉書王羲之傳飄若浮雲矯若驚鴻魏文帝詩西北有浮雲亭亭如車蓋其心在寥廓廣韻寥深也廓空也史記司馬相如傳下崢嶸而無地兮上寥廓而無天又鷦明已翔於寥廓而羅者猶視乎藪澤庾信終南山義谷銘寥廓上浮崢嶸下鎮曹植詩太谷何寥廓山樹鬱蒼蒼南史謝朓傳朓寄西府詩曰常恐鷹隼擊時菊委嚴霜寄言罻羅者寥廓已髙翔時來顧我笑詩顧我則笑一飯葵與藿本草鳬葵堪食即荇菜也莊子音義藿豆葉曹植詩處富不忘貧有道在葵藿陸機詩無以肉食資取笑藜與藿鮑照詩腰鐮刈葵藿倚杖牧雞豚世路如秋風劉孝標廣絶交論世路險巇後漢書崔駰傳子欲勉我以世路不知其跌而失吾之度也楚詞悲秋風之動容兮漢武帝秋風辭秋風起兮白雲飛魏文帝詩秋風蕭瑟天氣涼相逢盡蕭索樂府越謠歌君乘車我戴笠他日相逢下車揖君擔簦我跨馬他日相逢為君下九辨蕭瑟兮草木搖落而變衰注蕭瑟寒涼之意漢書蕭瑟輪囷是謂慶雲陶潛詩蕭瑟空宇中腰間玉具劍漢書王莽傳玉具寶劍後漢書馮異傳賜以乘輿七尺具劍注具謂以寶玉裝飾之東觀記作玉具劍隋書禮儀志一品玉具劍佩山玄玉意許無遺諾袁陽詩一朝許人諾何能坐相捐壯士不可輕漢書壯士能復飲乎相期在雲閣晉書利鹿孤載記隆安二年利鹿孤餞楊桓于城東謂之曰卿有佐時之器夜光之寶當振纓雲閣耀價連城區區河右未足以逞卿才力三輔黃圖雲閣三世所造甘泉賦乘雲閣而上下兮紛蒙籠以混成梁元帝與蕭挹書握蘭雲閣解紱龍樓棗據詩矯足登雲閣相伴步九華送楊山人歸嵩山名山志嵩髙山者五嶽之中嶽也釋名云山大而髙曰嵩元和郡縣志嵩髙山東曰太室西曰少室嵩髙總名山髙二十里周回一百三十里一統志嵩山在登封縣北十里我有萬古宅嵩陽玉女峯唐書地里志河南府登封縣本嵩陽縣紀異志嵩山之上有玉女搗帛石瑩徹光潔山下人曰立秋前一日中夜常聞杵聲嵩髙山記山北有玉女三臺陳子昂送中嶽真人序登玉女之峯窺石人之廟長留一片月挂在東溪松吳均詩懸風白雲上挂月青山下爾去掇仙草詩薄言掇之傳掇拾也十洲記瀛洲生神芝仙草長洲有仙草靈藥菖蒲花紫茸春秋運斗樞玉衡散為菖蒲抱朴子菖蒲須石上一寸九節紫花者尤善謝靈運詩新蒲含紫茸嵗晚或相訪王褒詩嵗晚悲窮律他鄉念索居王績詩無人堪作伴嵗晚獨悠哉青天騎白龍列仙傳陵陽子明釣得白龍拜而放之後得白魚腹中有書教子明服食五石之脂三年白龍來迎止陵陽山上秋日魯郡堯祠亭下宴别杜補闕范侍御一統志兖州春秋時為魯國戰國時為薛郡漢置兖州晉改為魯郡北齊改為任城郡隋大業初為魯郡唐為兖州天寶初又為魯郡今為兖州府堯祠在城東南七里元和志在洙水之西案李白堯祠送竇明府詩紅泥亭子赤闌干碧流環轉青錦湍即此我覺秋興逸潘嶽秋興賦序于時秋也故以秋興命篇王勃滕王閣序遙吟俯暢逸興遄飛誰云秋興悲宋玉九辨悲哉秋之為氣也山將落日去古詩行行復行行白日薄西山謝靈運詩日落山照曜水與晴空宜蕭慤詩蟬噪聞疑斷池清映似空王勃滕王閣序秋水共長天一色魯酒白玉壺淮南子楚會諸侯魯趙皆獻酒於楚王主酒吏求酒於趙趙不與吏怒乃以趙厚酒易魯薄者楚王以趙酒薄遂圍邯鄲故曰魯酒薄而邯鄲圍詩清酒百壺辛延年詩就我求清酒絲繩提玉壺送行駐金羈晏子春秋曽子將行晏子送曰嬰聞贈人以財不若以言曹植詩白馬飾金羈連翩西北馳沈約詩金羈玳瑁鞍歇鞍憩古木謝惠連詩挂鞍長林樹飲馬修川湄庾信詩樹隂逢歇馬又髙堰歇金鞍江總卞山楚廟詩間階剃宿莽古木斷懸蘿解帶挂橫枝沈約詩開襟濯寒水解帶臨清風王筠詩月至每開襟風過時解帶歌鼓川上亭莊子鼓歌以舞之潘嶽笙賦縈纒歌鼓網羅鍾律曲度神飇吹漢書元帝紀自度曲被歌聲王褒洞簫賦徐聽其曲度兮亷察其賦歌王粲公宴詩管絃發徽音曲度清且悲梁簡文帝詩蕙風卷旌神飇擊轂江淹詩神颷自逺至左右芙蓉披風歸碧海夕陸機賦或乃萍流而浮轉或因歸風以自反十洲記扶桑東有碧海與東海等拾遺記歷蓬瀛而超碧海雁沒青天時謝朓詩差池逺雁沒颯沓羣鳬驚盧思道從軍行長風蕭蕭渡水來歸雁連連映天沒莊子絶雲氣負青天相失各萬里梁簡文帝詩早知半路應相失古詩相去萬餘里各在天一涯茫然空爾思詩豈不爾思尋山僧不遇石徑入丹壑孔稚圭北山移文石徑荒涼徒延佇髙僧傳東林寺內别置禪林森樹煙凝石徑苔合孫綽太平山銘上干翠霞下籠丹壑鮑照詩天寒多顔色妍容逐丹壑松門閉青苔謝靈運詩牽葉入松門釋惠標詩松門夾細葉石徑染新苔説文苔水衣也張協詩青苔依空牆間階有鳥迹何思澄詩間階花蕊香江總卞山楚廟詩間階剃宿薺古木斷懸蘿禪室無人開謝靈運山居賦傍危峯立禪室又招提精舍詩禪室棲空觀講宇析妙理窺窗見白拂世説王夷甫恆捉白玉麈尾與手都無分别挂壁生塵埃晉書陶侃傳侃漁於雷澤網得一織梭以挂於壁南史王微傳終日端坐床席皆生塵埃惟當坐處獨淨使我空嘆息陶潛詩歌竟長嘆息持此感人多欲去仍徘徊李陵詩徘徊蹊路側悢悢不能辭王粲詩徘徊不能去佇立望爾形陸雲登臺賦悵將逝而徘徊香雲遍山起江總香贊海岸相傳香流大千縈空雜霧散迥飛煙花雨從天來建康圖經梁武帝時有僧講經於長干寺天雨寶花今有雨花臺梁元帝啓髙明可仰與天花而俱落庾信詩香煙聚為塔花雨積成臺已有空樂好梁武帝詩繚繞聞天樂王筠開善寺碑寶樹搖而成樂況聞清猿哀水經注猿鳴至清山谷傳響泠泠不絶任昉文清猿與壺人爭旦緹幕與素瀨交輝謝靈運詩秋蟬鳴北澗哀猿響南巒江總詩哀猿數處愁了然絶世事魏氏春秋阮籍曠逺不羈縱酒昏酣遺落世事南史王延之傳延之清靜寡欲見親舊未嘗及世事陶潛歸去來辭請息交以絶遊世與我而相違此地方悠哉陶𢎞景碑文悠哉曠矣宇宙之靈也梁簡文帝詩三界信悠哉下終南山過斛斯山人宿置酒李詩補注斛斯復姓暮從碧山下江淹詩悵然山中暮梁簡文帝賦逺山碧暮山紅日既宴誰與同古樂府上山採蘼蕪下山逢故夫山月隨人歸鮑照詩懸崖棲歸月却顧所來徑蒼蒼橫翠微詩蒹葭蒼蒼白露為霜穆天子傳天子筮獵蘋澤其卦遇訟逢公占之曰訟之繇藪澤蒼蒼莊子天之蒼蒼其正色耶曹植詩大谷何寥廓山樹鬱蒼蒼爾雅山未及上曰翠微疏謂未及頂上在旁陂陀之處名翠微一説山氣青縹色故曰翠微也蜀都賦鬱葐蒀以翠微崛巍巍以峩峩相攜及田家魏志夏侯尚傳清河王經始為郡守經母謂經曰汝田家子今仕至二千石物太過不祥可以止矣應璩詩田家無所有酌醴焚枯魚童稚開荆扉蔡雍袁滿來墓碑雖則童稚令聞芬芳梁簡文帝菩提樹頌斑白不提挈童稚有謳歌陶潛詩白日掩荆扉虛室絶塵想王褒詩竹館掩荆扉池光晦晚暉緑竹入幽徑孫楚登樓賦晞朝陽之素暉羡緑竹之茂隂張協詩浮陽映翠林回颷扇緑竹梁昭明太子詩丹藤繞垂幹緑竹蔭清池江淹詩緑竹夾清水秋蘭彼幽徑青蘿拂行衣詩蔦與女蘿施於松上傳蔦寄生也女蘿兔絲松蘿也爾雅翼女蘿色青而細長無雜蔓絲長如帶江淹江上之山賦挂青蘿兮萬仞豎丹石兮百重司馬相如賦玉叉挂臣冠羅袖拂臣衣梁元帝詩臨池影入浪從風香拂衣歡言得所憩陶潛詩歡言酌春酒摘我園中蔬詩蔽芾甘棠勿剪勿敗召伯所憩廣韻憩息也美酒聊共揮禮記漬取牛肉必新殺者薄切之必絶其理湛諸美酒期朝而食之以醢若醯醷北史盧元明傳少時途遇中山王熙歎曰盧郎有如此風神惟須誦離騷飲美酒自為佳器古詩不如飲美酒被服紈與素曹植樂府歸來宴平樂美酒斗十千陶潛詩揮杯勸孤影長歌吟松風蘇武詩長歌正激烈謝莊月賦訴皓月而長歌南史陶𢎞景傳特愛松風庭院皆植松曲盡河星稀魏武帝短歌行月明星稀烏鵲南飛梁簡文帝詩天霜河白夜星稀我醉君復樂昭明太子撰陶淵明傳貴賤造之者有酒輒設淵明若先醉便語客我醉欲眠卿可去其真率如比陶然共忘機陶潛詩揮兹一觴陶然自樂莊子漢隂丈人曰有機械者必有機事有機事者必有機心盧照鄰詩耕田虞訟息鑿井漢機忘安州般若寺水閣納涼喜遇薛員外一統志湖廣德安府禹貢荆州之域雲夢即此地唐改為安州尋為安陸郡案蕭士贇補注本薛員外下有乂字翛然金園賞莊子古之真人翛然而往翛然而來經律異相須達多長者欲營精舍請佛住有祇陀太子園廣八十頃太子戲曰滿以金布便當相與長者出金布八十頃故曰祇樹給孤獨園逺近含晴光樓臺成海氣史記天官書海旁蜃氣象樓臺唐太宗詩海氣百重樓巖松千丈蓋草木皆天香易雷雨作而百果草木皆甲拆宋之問詩桂子月中落天香雲外飄忽逢青雲士史記伯夷傳閭巷之人欲砥行立名者非附青雲之士惡能施於後世哉郤正釋譏盧敖翺翔乎玄闕若士竦身乎雲霄共解丹霞裳黃庭經黃庭內人服錦衣紫霞飛裾雲氣羅謝朓賦厭白玉而為飾霏丹霞而為裳水退池上熱謝朓詩已有池上酌復此風中琴風生松下涼南史陶𢎞景傳特愛松風庭下皆植松吞討破萬象孫綽天台山賦渾萬象以冥觀兀同體於自然褰窺臨衆芳漢書揚雄傳注子規常以立夏鳴鳴則衆芳皆歇而我遺有漏楊齊賢集注梁武帝謂達磨曰朕造寺寫經有何功德對曰此但人天小果有漏之因如影隨形雖有非實與君用無方易神無方而易無體心垢都已滅羅釋藏經起信論衆生心未離垢法身不現垢離則現永言題禪房洛陽伽藍記景林寺有禪房一所內置祇洹精舍尋髙鳳石門山中元丹丘後漢書逸民傳髙鳯字文通南陽葉人也少為書生専精誦讀其後遂為名儒教授西唐山中又白元丹丘歌元丹丘好神仙朝飲潁水之清流暮還嵩岑之紫煙尋幽無前期水經注萬象遐淵思絶根尋世説補謝康樂尋山陟嶺必造幽峻南史張充與王儉書曰桂蘭綺靡叢雜於山幽松柏森隂相繚於澗側周禮具修前期注前期前所諏之期也沈約詩生平少年日分手易前期乘興不覺逺晉書王徽之傳乘興而來興盡而返詩道之云逺曷云能來沈約文爭途忘逺南史陶𢎞景傳仰青雲覩白日不覺為逺矣蒼巖渺難涉後漢書袁紹傳道出朝歌蒼岩谷晉書符朗載記登涉山水不知老之將至又趙至傳與稽蕃書悠悠三千路難涉矣白日忽欲晚張載詩白日隨天回暾暾圓如規謝朓詩餘雪映青山寒霧開白日楊師道詩登臨日將晚蜀都賦志未騁時欲晚未窮三四山已歷千萬轉晉書顧愷之傳人問以會稽山川之狀愷之云千巖競秀萬壑爭流湘中記衡山東南二面臨映湘川七百里中有九背漁者歌曰帆隨湘轉望衡九面寂寂聞猿愁樂府雜録廣場寂寂若無一人何遜詩沙汀暮寂寂蘆岸晚修修漁者歌猿鳴三聲斷人腸陳子昂詩卧聞塞鴻斷坐聽峽猿愁行行見雲收古詩行行重行行張正見詩睢苑涼風起章臺雲氣收虞世南詩日下林全暗雲收嶺半空髙松來好月張華賦慕隴坻之髙松沈約髙松賦鬱彼髙松栖根得地梁簡文帝望月詩今夜月光來嵇康詩皎皎亮月麗於髙隅空谷宜清秋詩皎皎白駒在彼空谷家語幽蘭生于空谷不以無人而不芳後漢書郡國志南陽郡有宜秋聚殷仲文詩獨有清秋日能使髙興盡溪深古雪在爾雅注溪曰谷疏山谷中水注入澗溪也馬援武溪深行滔滔武溪一何深鳥飛不度獸不敢臨蜀州志峩眉山太始雪相傳從古日積石斷寒泉流詩原隰既平泉流既清又爰有寒泉水經注山頂泉流瀑布懸瀉謝朓詩寒流自清泚峯巒秀中天江淹思北歸賦跨金峯與翠巒宗炳登白鳥山詩杲杲羣峯分岌岌衆巒起班固西都賦樹中天之華闕豐冠山之朱堂登眺不可盡廬山記太史公東遊登其峯嶺而遐觀南眺五湖北望九江東西肆目若登天庭焉張融海賦長尋髙眺惟水與天禮記西不盡流沙南不盡衡山東不盡東海北不盡恆山丹丘遙相呼拾遺記髙辛有丹丘之國獻瑪瑙甕以盛甘露帝德所洽被於殊方也楚辭仍羽人于丹丘兮王逸注丹丘晝夜長明也神異記盧洪入山採茗遇一道士牽三青牛引洪至瀑布山曰吾丹丘子也晉書閻續傳交如布衣相呼以字顧我忽而哂詩顧我則笑論語夫子哂之注哂微笑也遂造窮谷間左傳深山窮谷固隂沍寒謝惠連隴西行窮谷是處考槃是營風賦夫庶人之風塕然起於窮巷之間淮南子邅回州谷之間始知靜者間支遁詩熙怡安沖漠優遊樂靜間詩十畝之間兮桑者間間兮留歡達永夜史記淳于髠傳堂上燭滅主人留髠而送客當此之時髠心最歡能飲一石何遜詩永歡常數刻髙宗詩共敘一宵歡謝靈運羅浮山賦發潛夢於永夜若遡波而乘桴清曉方言還王勃南郊頌屏翳清曉飛亷警旦晉書陸雲傳雲嘗夜望草中火光至一家寄宿見一年少共談老子向曉辭去詩薄言還歸陶潛歸去來辭鳥倦飛而知還遊南陽清泠泉南都賦耕父揚光于清泠之淵薛綜注清泠水名在南陽西鄂山下惜彼落日暮劉刪詩山邊歌落日陳良遊俠篇日暮河橋上揚鞭惜晚暉愛此寒泉清易井冽寒泉食詩爰有寒泉在浚之下左思招隱詩前有寒泉井聊可瑩心神范雲詠井詩兼冬積溫水疊暑必寒泉西暉逐流水蕭子範詩暝泉促西暉詩沔彼流水朝宗于海北史蕭大圜傳面修原而帶流水倚郊坰而枕平臯庾信詩春洲鸚鵡色流水桃花香蕩漾遊子情江淹詩蕩漾不可期史記髙祖紀謂沛父老曰遊子悲故鄉古詩遊子不顧返曹植詩遊子久不歸不識阡與陌空歌望雲月補注道家步虛詞有碧落空歌盧照鄰贈李榮道士詩寶貺幽難識空歌迥易分卓文君白頭吟皚如山上雪皎若雲中月曲盡長松聲長笛賦曲終闋盡餘絃更興天台賦蔭落落之長松髙唐賦不見其底虛聞松聲挂席江上待月有懷待月月未出望江江自流謝朓詩大江流日夜客心悲未央倏忽城西郭青天懸玉鈎楚辭倐而來兮忽而逝鮑照玩月城西詩始見西南樓纎纎如玉鈎虞羲秋月詩初生似玉鈎裁滿如團扇素華雖可攬阮籍詩素月垂景輝雲笈七籖神公攝遊氣飄飄練素華陸機詩照之有餘輝攬之不盈手清景不同遊曹植公宴詩明月澄清景列宿正參差陸雲逸民賦望靈嶽之清景兮想佳人于雲端耿耿金波裏空瞻鳷鵲樓詩耿耿不寐漢郊祀歌月穆穆以金波謝朓詩金波麗鳷鵲注鳷鵲觀在雲陽甘泉宫外吳均詩日映昆明水春生鳷鵲樓登單父陶少府半月臺一統志單縣在兖州府城南十里本魯單父邑漢為縣唐屬宋州又半月臺在單縣治東北隅陶公有逸興湛方生賦軒濠梁之逸興暢方外之宴適王勃賦嗣南商之逸興有東海之遐賔不與常人俱司馬相如文夫非常者固常人之所異也築臺像半月左傳莊公三十有一年春築臺于郎夏築臺於薛秋築臺於秦徐陵孝義寺碑明星皎皎流半月之光回向髙城隅詩俟我于城隅曹植詩曲宴此城隅盧諶詩逍遙步城隅暇日聊遊豫置酒望白雲司馬相如賦置酒於皓天之臺曹植詩置酒髙殿上親友從吾遊陶潛詩遙遙望白雲懷古意何深梁簡文帝詩白雲在天蒼波無極商飇起寒梧禮記孟秋之月其音商張載詩秋風吐商氣蕭瑟掃前林梁簡文帝詩景落商飇靜煙開四郊謐賀敳詩涼葉下庭梧王勃賦披拂寒梧秋山入逺海謝靈運詩杪秋尋逺山吳均詩山沒清波內桑柘羅平蕪禮記命野虞母伐桑柘謝朓詩桑柘起寒煙江淹詩白露淹江臯青滿平地蕪水色渌且明梁簡文帝詩水色帶風移劉峻詩羅綾文水色庾肅之水贊湛湛涵緑清瀾澄濬妙質柔明雲深夜潤令人思鏡湖會稽記漢順帝永和五年會稽太守馬臻創立鏡湖在會稽山隂兩縣界輿地志山隂南湖即鏡湖也縈帶郊郭連屬峯岫白水翠巖互相映發一統志鏡湖在紹興府城西南三十二里終當過江去晉書王羲之傳右軍初渡浙江便有終焉之志會稽多佳山水名士多居之愛此暫踟蹰詩愛而不見搔首踟蹰潘嶽詩徘徊不忍去徙倚步踟蹰登太白峯水經注太白山南連武功山於諸山最為秀傑冬夏積雪望之皓然録異記金星之精墜於終南圭峯西因號太白山一統志在武功縣南九十里即道書第十一洞天西上太白峯夕陽窮登攀詩度其夕陽傳山西曰夕陽疏夕乃見日故名夕陽張華蕭史曲火粒願排棄霞霧好登攀荀濟詩金碧應仿佛輪鏡幾登攀太白與我語為我開天關楚辭命天閽其開關兮排閶闔而望豫晉書天文志東方角二星為天門其間大門也其內天庭也願乘泠風去莊子列子御風而行泠然善也直出浮雲間魏文帝詩西北有浮雲亭亭如車蓋蘇武詩俯觀江漢流仰視浮雲翔舉手可近月古詩舉手長勞勞兩情同依依晉白紵歌髙舉兩手白鵠翔前行若無山一别武功去古謠武功太白去天三百漢書地理志右扶風有武功縣一統志武功山在武功縣南一百里何時復更還江淹詩遊子何時還遊謝氏山亭淪老卧江海謝靈運詩心歡賞兮嵗易淪隱玉藏彩疇識真書沿於江海莊子身在江海之上心居魏闕之下韓詩外傳齊景公謂子貢曰仲尼賢乎曰聖人也曰其聖何如子貢曰不知也若臣之事仲尼譬猶渴操壺杓就江海而飲之腹滿而去又安知江海之深乎再歡天地清老子天得一以清地得一以寧病間久寂寞楚辭山蕭條而無獸兮野寂寞而無人鮑照詩君平獨寂寞身世兩相棄嵗物徒芬榮鮑照詩嵗物盡淪傷孤貞為誰立梁昭明太子芙蓉賦初榮夏芬晚花秋曜借君西池遊文選謝混遊西池詩注混字叔源西池丹陽西池也混思與友朋相與為樂也山謙之丹陽記西池孫登所創王筠詩扁舟泛西池聊以散我情王獻之帖前書云至于散情嫂疾苦療得所深喜慰阮籍詩心腸未相好誰云亮我情掃雪松下去後漢書袁安傳注時大雪積地丈餘洛陽令身出案行至安門無有行路令人除雪見安左傳松柏之下其草不殖顔延之詩山明望松雪陶潛詩班荆坐松下捫蘿石道行水經注秦望山徑路險絶攀蘿捫葛然後能升蕭慤樂府山寒石道凍葉下故宫秋謝公池塘上南史謝惠連傳惠連十嵗能屬文靈運云每有篇章對弟惠連輒有佳句嘗於永嘉西堂詩思不就忽夢見惠連即得池塘生春草之句春草颯已生謝靈運詩萋萋春草生王孫遊有情江淹别賦春草碧色春水緑波陸倕思田賦嵗月忽其云暮庭草颯以萎黃花枝拂人來劉孝威詩隔牆花半隱猶見動花枝張正見詩暗開脂粉弄花枝山鳥向我鳴禽經山鳥巖栖詩伐木丁丁鳥鳴嚶嚶王粲詩上有特栖鳥懷春向我鳴王籍詩鳥鳴山更幽田家有美酒應璩詩田家無所有酌醴焚枮魚古詩不如飲美酒被服紈與素落日與之傾謝靈運撰征賦望新晴于落日起明光于躋月陶潛詩一觴雖獨進杯盡壺自傾醉罷弄歸月謝靈運賦卧洞房兮當何悅滅華燭兮弄曉月鮑照詩懸崖棲歸月遙欣稚子迎法苑珠林遙欣大覺曠矣神功陶潛歸去來辭僮僕歡迎稚子候門九日登巴陵置酒望洞庭水軍水經注巴丘山在湘水右岸山有巴陵故城本吳之巴丘邸閣城也漢書髙祖紀漢王入彭城置酒髙會水經注洞庭湖廣員五百餘里日月若出沒其中一統志洞庭湖在嶽州府城西南禹貢九江孔殷即洞庭也晉書王濬傳臣水軍風發行有次第無緣得於長流之中回船過渾楊齊賢集注時賊逼華容縣故軍於洞庭以為長沙鄂嶽之蔽九日天氣清宋玉九辨泬寥兮天髙而氣清注秋天髙朗體清明也登髙無秋雲柳惲詩亭臯木葉下隴首秋雲飛造化闢川嶽莊子以天地為爐以造化為大冶班固東都賦紹百王之荒屯因造化之蕩滌顔延之詩氣生川嶽隂煙滅淮海見了然楚漢分史記酈食其傳兩雄不俱立楚漢久相持不決顔延之登巴陵城樓詩江漢分楚望衡巫奠南服長風鼓橫波宋玉髙唐賦長風至而波起張協七命登絶巘遡長風屈原九歌衡風起兮橫波合沓蹙龍文王褒洞簫賦薄索合沓罔象相求吳均詩糾紛巫山石合沓洞庭瀾王勃采蓮賦望洲草兮翡翠色動浦水兮驪龍文憶昔傳遊豫孟子一遊一豫為諸侯度江淹詩遊豫碧山隅樓船壯橫汾史記平準書大修昆明池治樓船髙十餘丈旗幟加其上甚壯漢武故事帝行幸河東祠后土顧視帝京欣然中流與羣臣飲燕乃自作秋風辭曰泛樓船兮濟汾河橫中流兮揚素波今兹討鯨鯢孟子今兹未能左傳古者明王伐不敬取其鯨鯢而封之以為大戮于是乎有京觀傅休奕詩天恩赦有罪東土放鯨鯢旌斾何繽紛陳琳與公孫瓉書戰夫引領竦望旌斾離騷佩繽紛其繁飾兮芳菲菲其彌章注繽紛盛貌白羽落酒樽家語赤羽若日白羽若月國語白羽之矰注矰矢名以白羽為飾後漢書王霸傳賊聚衆挑戰霸方饗士作倡樂箭射營中中霸前酒樽安坐不動洞庭羅三軍周禮大司馬王六軍大國三軍次國二軍小國一軍班固西都賦覽山川之體勢觀三軍之殺戮黃花不掇手禮記季秋之月鞠有黃華詩采采芣苡薄言掇之戰鼓遙相聞詩擊鼓其鏜踊躍用兵駱賔王蕩子從軍賦隱隱地中鳴戰鼓遙遙天上出將軍國語夜戰聲相聞足以不乖劒舞轉頽陽史記軍中無以為樂請以劍舞淮南子魯陽公與韓戰援戈而麾日反三舍謝瞻詩頽陽照通津當時日停曛廣韻曛日入也又黃昏時酣歌激壯士書酣歌於室史記樊噲傳噲直撞入立帳下項羽問為誰張良曰沛公參乘樊噲項羽曰壯士賜之巵酒彘肩吳志留贊為將臨敵必先被髮叫天抗音而歌左右應之乃進戰戰無不克可以摧妖氛髙琳詩何以報天子沙漠靜妖氛握齱東籬下漢書酈食其傳握齱好苛禮注握齱急促貌齱初角切陶潛詩采菊東籬下悠然見南山淵明不足羣南史陶潛傳字淵明或云字深明名元亮説文羣輩也蕭士斌集注此言淵明不足羣者蓋用武之時儒士必為所輕太白其以淵明自況乎秋登巴陵望洞庭舊唐書地理志嶽州隋巴陵郡武德四年置巴州領巴陵華容沅江羅湘隂五縣六年為嶽州一統志嶽州府屬巴陵縣漢下雋地吳巴陵府城西南為洞庭湖書九江孔殷傳始於鄂陵終于江口會於桑落洲注九江即洞庭也水經注洞庭湖廣員五百餘里日月若出沒其中荆州記巴陵南有洞庭湖亦曰青草湖以湖南青草山為名初學記洞庭在巴陵郡亦謂之太湖清晨登巴陵楚辭泬寥兮天髙而氣清陶潛詩夙晨裝吾駕啓途情已緬寰宇記羿屠巴蛇於洞庭其骨若陵故曰巴陵水經注巴丘山在湘水右岸山有巴陵故城本吳之巴丘邸閣城也晉立巴陵縣於此江賦爰有包山洞庭巴陵地道潛逵傍通幽岫窈窕駱賔王餞宋三之豐城序巴陵地道楓江連白馬之門周覽無不極史記秦始皇紀親巡逺方黎民登兹泰山周覽東極班固終南山賦天氣肅清周覽八隅詩豈敢憚行畏不能極箋極至也謝靈運詩徙倚窮騁望目極盡取討宋之問漢江宴别詩嬉遊不可極留恨此山川明湖映天光嶽陽風土記郡冇青草洞庭巴丘三湖支曇諦賦縈以三湖帶以九江東京賦消啓明掃朝霞登天光於扶桑張華祖道征西詩陶以仁化曜以天光徹底見秋色湘中記湘水至清雖深五六丈見底了了然傳燈録譬獸渡河惟大香象徹底截流梁元帝詩桂影含秋色桃華染春源唐太宗詩素秋開律碧沼凝光秋色何蒼然詩蒹葭蒼蒼白露為霜箋蒹葭在衆草之中蒼蒼然也謝朓詩寒城一以眺平楚正蒼然際海俱澄鮮吳均詩白雲浮海際明月落河濵江淹四時賦冬隂北邊永夜不曉平蕪際海千里飛鳥謝靈運詩空水共澄鮮山青滅逺樹北夢瑣言湘江北流至嶽陽達蜀江夏潦後蜀江漲遏湘波溢為洞庭凡數百里而君山宛在水中何遜詩天暮逺山青潮去遙沙出梁昭明太子開善寺詩落星埋逺樹新霧起朝陽何遜詩水底見行雲天邊看逺樹水緑無寒煙江淹别賦春草碧色春水緑波謝朓詩切切隂風暮桑柘起寒煙來帆出江中釋名隨風張幔曰帆何遜詩去帆若不見試望白雲中陳子昂詩孤帆出霧中陽慎從祀麓山廟詩江帆得分行漢書武帝紀自潯陽浮江親射蛟江中獲之去鳥向日邊謝朓遊後園賦日栖榆柳霞照夕陽孤蟬已散去鳥成行晉書明帝紀元帝問日與長安孰近對曰長安近不聞人從日邊來也風清長沙浦宋文帝登景陽樓詩階上曉露潔林下夕風清史記項羽紀項王出之國使人徙義帝曰古之帝王地方千里必居上遊乃使使徙義帝長沙郴縣漢書賈誼傳誼為長沙王太傅度湘水為賦弔屈原曰恭承嘉惠兮俟罪長沙舊唐書地理志長沙秦置長沙郡漢為長沙國治于湘縣武德為潭州一統志長沙郡翼軫分野軫旁有小星曰長沙應其地宋之問早入清逺峽詩寂歷環沙浦蔥蘢轉石圻山空雲夢田書雲土夢作乂周禮夏官職方氏正南曰荆州其澤藪曰雲夢子虛賦秋田乎青丘倣徨乎海外吞若雲夢者八九於胸中曽不芥蒂宋玉小言賦楚襄王既登陽雲之臺令諸大夫景差唐勒宋玉等並造大言賦賦畢而宋玉受賞王曰又有能為小言賦者賞之雲夢之田瞻光惜頽髮蘇武詩寒夜立清庭仰瞻河漢濵又願君崇今德隨時愛景光曹植詩明月照髙樓流光正徘徊劉孝標廣絶交論仰宵燭之未光郭璞遊仙詩採藥遊名山將以救年頽江總詩年髮兩如此傷心獨幾時閲水悲徂年陸機嘆逝賦心閲水以成川水滔滔而日度後漢書馬援傳贊徂年已流壯情方勇江總詩徂年若驚電别日欲成秋北渚既蕩漾嶽陽風土記洞庭湖西岸有沙洲堆阜隆起即青草廟下一湖之內中有此洲南名青草北名洞庭所謂重湖也楚辭帝子降兮北渚江淹詩北渚有帝子蕩漾不可期東流自潺湲莊子順流而東行後漢書禮儀志上已官民皆潔於東流水上洗濯袚除去宿垢疢為大潔楚辭觀流水兮潺湲魏文帝詩谷水潺潺木落翩翩廣韻潺湲水流也郢人唱白雪戰國策宋玉曰客有歌於郢中者其始曰下里巴人國中屬而和者數千人其為陽春白雪國中屬而和者數十人陳琳答東阿王箋聽白雪之音觀渌水之節然後東野巴人蚩鄙並著越女歌採蓮史記楚世家右擁越女蕭統五月啓蓮花泛水艷如越女之腮又白詩西施越溪女明豔光雲海又詩若耶溪旁採蓮女鮑照詩棹女歌採蓮南史羊侃傳侃自造採蓮棹歌兩曲甚有新致相和曲江南可採蓮蓮葉何田田聽此更斷腸庾信詩風流響和韻哀怨聲悽斷謝靈運詩越客腸今斷憑崖淚如泉沈佺期送司馬白雲歸天台詩憑崖飲蕙氣過澗摘靈草劉越石詩淚下如流泉御選唐詩卷三
