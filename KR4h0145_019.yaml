蔽景夕捲以待月杜審言詩卷簾惟待月前溪歌憂思出門倚逢郎前溪渡悵望成幽夢王融曲水詩序體元則大悵望姑射之阿謝朓詩悵望南浦時杜甫詩悵望好林泉謝朓詩歸夢相思夕沈約佛記序或憑人以言托想成夢尤難信曉一無所録依依識故蹊陶潛詩依依在耦耕梁簡文帝詩依依别路岐江總詩共此依依情無奈年年别謝靈運詩來人忘新術去子惑故蹊杜甫詩桃隂想舊蹊賦得山泉送房造泉水山邊去易山下出泉詩毖彼泉水亦流于淇張僧鑒潯陽記雞籠山下澗中有數十處纍石若有人功水深尺餘朝夕輒有湧泉溢出髙人月下看蓮社髙賢傳宋武曰逺公世表之人元結詩髙人黨茂宗王勃詩林塘花月下李白廬山瀑布詩海風吹不斷江月照還空王昌齡詩青山明月夢中看潤松秋草淨沈約髙松賦露雖滋而不潤孫楚詩晨風飄岐路零雨霑秋草李白詩甘與秋草同杜甫詩茅齊付秋草落澗夜聲寒江總詩石澗水流靜山窗葉去寒張說詩石澗泉虛落松崖路曲回梁元帝詩金鋪掩夕扇玉壺傳夜聲水經注林寒澗肅委曲穿深竹子虛賦紆徐委曲鬱橈溪谷王維詩洞房隱深竹清夜聞遙泉杜甫詩映竹水穿沙潺湲過逺灘魏明帝詩泛舟黃河隨波潺湲謝靈運詩且申獨往意乘月弄潺湲益州記伏犀灘東南六十里其崖峻嶮逺聖朝無隱者馮衍說鄧禹書聖朝享堯舜之榮張九齡詩聖朝岩穴選應待鶴書徵岑參詩聖朝無闕事自覺諫書稀論語子曰隱者也早晚罷漁竿詩夜如何其箋夜如何其問早晚之詞李頎詩早晚薦雄文似者宋書江夏王義恭傳將以蒲帛之聘感以大倫之美庶投竿釋褐翻然來儀應璉與弟書昔伊尹輟耕郅鄆投竿杜甫詩白水漁竿客清秋鶴髮翁雲陽觀寄袁稠花洞晚隂隂徐彥伯詩花洞留宸賞還旗繞夕烟王勃詩牽花尋紫洞步葉下清溪又洞晚秋泉冷巖朝古樹新漢書禮樂志靈之至慶隂隂相放􅜜震淡心仙壇隔杏林范雲詩石室棲千祕金壇謁九仙唐樂章瑤壇肅靈瑞金闕映仙居神仙傳董奉居山不種田日為人治病亦不取錢重病愈者使栽杏五株輕者一株如此數年計得十餘萬株鬱然成林漱泉春谷冷庾信麥積山佛龕銘漱泉珉谷吹塵石牀庾闡詩手澡春泉潔目玩陽葩鮮薛道衡文春泉如醴出自京師秋露凝甘遍於竹葦宋孝武帝清暑殿賦山懷風兮谷吐泉隋煬帝詩谷泉驚暗石風松動夜聲梁昭明太子答晉安王書冷泉石鏡一見何必勝于傳聞庾信詩風池還更暖寒谷遂成暄搗藥夜窗深宋武帝紀帝伐荻新洲見大蛇射之傷明日復至洲裏聞有杵臼聲見童子數人皆青衣搗藥曰吾王為劉寄奴所射合散傅之帝叱之皆散乃收藥而返傅休奕擬天問月中何有白兔搗藥梁簡文帝詩何時玉窗裏夜夜更縫衣石上開仙酌淮南子紫芝生於山而不能生於磐石之上陶潛詩故老贈余酒乃言飲得仙庾信詩仙童下赤城仙酒餉王平李德林詩壺盛仙客酒瓶貯帝臺漿楚辭華酌既陳有瓊漿些松間對玉琴宋書蕭思話傳嘗從太祖登鍾山北嶺上使於石上彈琴因賜以銀鍾酒謂曰相賞有松石間意宋之問詩松間明月長如此鮑照詩玉琴生網羅王融詩每聚金爐氣時駐玉琴聲梁元帝詩金徽調玉軫兹夜撫離鴻戴家溪北住續晉陽秋戴逵不樂當世以琴書自娛隱㑹稽剡山國子博士徵不就世說郗超每聞欲髙尚隱退者輒為辦百萬資并為造立居宇在剡為戴逵起宅甚精整戴與所親書曰近至剡如官舍名勝志剡山在嵊縣西北其支隴東下為戴安道宅又黃山在縣南十里又名方山其下為戴安道宅今屬桃源鄉雪後去相尋晉書王徽之居山隂夜雪初霽月色清朗四望皓然忽憶戴逵逵時在剡便夜乘小船詣之造門不前而反人問其故徽之曰本乘興而來興盡而反何必見安道耶題崔端公園林杜氏通典侍御史之職有四謂推彈公廨雜事定殿中監察以下職事及進名改轉臺內之事悉主之號為臺端他人稱之曰端公其知雜事者謂之雜端最為雄劇上士愛清輝老子上士聞道勤而行之沈約詩側聞上士說尺木乃騰霄江淹别賦别有華隂上士服食還仙陸機詩清暉溢天門謝靈運詩山水含清暉李白詩清暉映竹石開門向翠微楚辭令昭明兮開門古樂府開門枕水渚王勃詩九日重陽節開門有菊花爾雅山未及上曰翠微疏謂未及頂上在旁陂陀之處名翠微一說山氣青縹色故曰翠微也左思蜀都賦鬱葐蒀以翠微何遜詩髙山鬱翠微抱琴看鶴去嵇康絶交書抱琴行吟弋釣草野張說詩悠然白雲意乘興抱琴過孟浩然詩抱琴來取醉垂釣坐乘閒湯惠休詩黃鶴西北去銜我千里心王勃序徘徊去鶴將别蓋而同飛枕石待雲歸陸雲逸民賦策短杖而遂往乃枕石而漱流南史隱逸傳關康之寓居南平昌顔延之等入山候之見其散髮被黃布帊席松葉枕一塊白石而卧了不相盻延之等咨嗟而退謝靈運詩雲歸日西馳鮑照詩朝朝見雲歸梁元帝詩雲歸山望濃野坐苔生席李嶠詩野席蘭琴奏宋書五行志謝靈運每出入自扶接者常數人民間謠曰四人挈衣裙三人捉坐席梁元帝詩苔生岸泉緑沈約詩客位紫苔生江淹思歸賦青苔生兮綴衣巾杜甫詩隨意坐莓苔髙眠竹挂衣耿湋竹庭詩閒詠疏篁近髙眠逺岫微李華與弟莒書未遇趙公之舉馬廏髙眠古今一也韋應物詩橫竹挂朝衣杜甫詩絺衣挂蘿薜舊山東望逺謝靈運詩剖竹守滄海挂帆過舊山鮑照詩願遂宿志意不使舊山空陳琳詩東望看疇野回顧覽園林蘇頲詩東望望春春可憐楊炯詩極望關山逺李白詩望逺增離憂惆悵暮花飛馮衍顯志賦情惆悵以增傷晉書習鑿齒傳徘徊移日惆悵極多杜甫詩臨風默惆悵蕭慤詩窗梅落晚花庾成師詩憶别春花飛韋述詩花飛樵路香杜甫詩一片花飛減却春耿湋早朝韻㑹朝見曰朝夕見曰夕劉向賢明讃於鑠姜后光配周宣晏起早朝永巷告愆江總詩五侯新拜寵七貴早朝歸鐘鼓餘聲裏詩鐘鼓既設一朝饗之禮記鍾鼓干戚所以和安樂也案鐘古作鍾七啓鐘鼓俱振簫管齊鳴沈佺期詩嶺上樓臺千里起城中鐘鼓四天聞文心雕龍韻氣一定故餘聲易遣案唐汝詢解本餘聲作音聲禮記君子聽鐘聲則思武臣聽鼓鼙之聲則思將帥之臣千官向紫微荀子古者天子千官諸侯百官春秋合誠圖北辰其星五在紫微中春秋元命苞紫之言此也言天神運動隂陽開閉皆在此中也晉書天文志紫微大帝之座天子之常居也孔融薦禰衡表龍躍天衢振翼雲漢揚聲紫微垂光虹霓冒寒人語少晉子夜歌塗澀無人行冒寒往相覔南史梁武帝紀冬月四更竟即敕把燭看事執筆觸寒手為皴裂世說有北來道人好才理與林公相遇瓦官寺講小品於時竺法深孫興公悉共聽此道人語李白詩若耶溪邊采蓮女笑隔荷花共人語魏志邢顒傳言少理多真雅士也乘月燭來稀晉書袁宏傳謝尚鎮牛渚秋夜乘月率爾與左右微服泛江又庾亮傳亮鎮武昌佐史殷浩之徒乘月登南樓不覺亮至將起避之亮曰諸君少住老子於此興復不淺王績詩青溪歸路直乘月夜歌還張九齡望月詩滅燭憐光滿披衣覺露滋清漏聞馳道謝朓酬德賦忘清漏之不緩惜曉露之方睎杜審言詩霜白宵鐘徹風清曉漏聞史記始皇紀二十七年治馳道注馳道天子道也謝朓詩飛甍夾馳道垂楊䕃御溝陽固詩御溝屬清洛馳道通丹屏輕霞映瑣闈謝莊詩夕天霽晚氣輕霞澄暮隂謝瞻詩輕霞冠秋日迅商薄清穹王維詩山鳥羣飛日隱輕霞郭璞三珠樹贊濯彩丹波自相霞映江總木槿賦朝霞映月殊未妍珊瑚照水定非鮮漢舊儀黃門郎日暮入對青瑣闈拜名曰夕郎王洙杜甫詩緩步歸青瑣注青瑣謂省門也以青畫户邊鏤刻爾雅宫中之門謂之闈猶看嘶馬處庾信詩連峯對嶺度嘶馬隔河聞吳均詩日昏笳亂動天曙馬爭嘶庾信詩胡笳遙警夜塞馬暗嘶羣未啓掖垣扉薛元超詩儲禁銅扉啓宸行玉路遙蔡夢弼杜甫詩晚出左掖注宣政殿東有東上閣門西有西上閣門故以掖稱劉楨詩誰謂相去逺隔此西掖垣董思恭星詩歷歷東井舍昭昭右掖垣王勃九成宫頌宸扉既闢一宇宙而來王聖籙潛躋二乾坤而作帝贈田家翁老人迎客處禮記七十曰老又客至於寢門主人出迎客王維詩田舍有老翁垂白衡門裏籬落稻畦間廣韻籬藩籬也落聚落也急就篇注田區謂之畦今之種稻及菜者取名蠶屋朝寒閉禮記古者天子諸侯必有公桑蠶室近川而為之築宫仞有三尺棘牆而外閉之楊泉蠶賦粵召夫役築室于房于房伊何在庭之東東受日景西望餘陽庾肩吾詩蠶寒更養身蠶書居蠶欲溫居繭欲凉田家晝雨閒庾信詩田家足閒暇鮑照詩晝夜淪霧雨門閭新剃草爾雅巷門謂之閭禮記仲夏門閭毋閉孟冬戒門閭周禮剃氏掌殺草月令季夏之月大雨時行燒剃行水利以殺草如以熱湯鄭注剃猶迫也芟草也謂萊地先剃其草乾燒之至此月大雨水潦蓄其中而田美可稼也樵採舊諳山史記孫叔敖為相勸民冬秋山採春夏以水各得其便范雲詩田家樵採去薄暮方來歸自道誰相友孟子出入相友邀人試往還文心雕龍木沓水匝樹雜雲合目既往還心亦吐納劉長卿詩田家或往還李嘉祐字從一趙州人天寶七年擢第授祕書正字歷鄱江江隂令入為中臺郎上元後歷台州袁州刺史與嚴維劉長卿冷朝陽諸人友善為詩麗婉有齊梁風和張舍人中書寓直通典漢尚書郎直宿建禮門奏事明光殿及為詔令乃中書舍人也記纂淵海中書省令二人總判省事唐開元改紫微令漢主留才子皇甫謐釋勸論輔唐虞之主化堯舜之人王褒頌遇明君遭聖主洪子輿詩漢主召子陵任昉文預奉恩留左傳昔髙陽氏有才子八人天下之民謂之八愷髙辛氏有才子八人天下之民謂之八元潘嶽西征賦終童山東之英妙賈生洛陽之才子春城直紫微吳邁逺詩緑樹搖雲光春城起風色王維詩栁暗百花明春深五鳳城蘇頲春晚紫微省直詩直省清華接建章晉書天文志紫微太帝之座天子之常居也唐書百官志開元元年改中書曰紫微省岑參詩聨步趨丹陛分曹限紫微對花閶闔靜何遜詩誰能北窗下獨對後園花岑參詩三殿花香入紫微白居易詩獨坐黃昏誰是伴紫微花對紫微郎離騷吾令帝閽開關兮倚閶闔而望豫漢書禮樂志遊閶闔觀玉堂注閶闔天門崔皓詩夜直千門靜過竹吏人稀蔣渙和徐侍郎中書叢竹韻中禁夕沈沈幽篁别作林喬知之寓直詩開軒竹氣靜蘇頲詩竹下鵷雛繞鳳凰岑參詩條山映吏人王維詩省中啼鳥吏人稀裁詔催添燭通典中書舍人下筆為詔誥文士之極任諸官莫比王維詩朝罷須裁五色詔吕氏春秋管仲觴桓公樂之而徴燭唐書栁公權傳公權充翰林書詔學士嘗夜召對于亭燭窮而語未盡宫人以爉液濡紙繼之韓翃詩日暮漢宫傳爉燭將朝欲更衣左傳趙宣子盛服將朝尚早坐而假寐張華詩束帶俟將朝廓落晨星稀詩東方未明顛倒衣裳漢書灌夫傳坐乃起更衣玉堂宜嵗久三輔黃圖未央宫有殿閣三十二椒房玉堂在其中風賦徜徉中庭北上玉堂隂鏗詩瀛洲玉作堂詩奉璋峩峩髦士攸宜唐書楊綰傳舍人年久者為閣老杜甫詩長番嵗時久且莫厭彤闈漢書嚴助傳厭承明之廬勞侍從之事劉孝綽詩積照朗彤闈庾信詩傳呼擁絳節交㦸映彤闈和都官苗員外秋夜寓直對雨簡諸知已唐書百官志刑部都官郎中員外郎各一人掌俘𨽻簿録多雨南宫夜楚辭山峻髙以蔽日兮下幽晦以多雨漢書天文志月失中道移而西入畢則多雨故詩云月離于畢俾滂沱矣言多雨也杜甫詩碧澗雖多雨秋沙先少泥史記天官書注太微天帝南宫也郎位五星在太微中帝坐東北何遜詩鄭履入南宫庾信詩南宫生絳雲仙郎寓直時王維詩仙郎有意憐同舍李頎詩漢宫題柱憶仙郎潘嶽秋興賦序寓直於散騎之省唐書百官志侍御史凡二司理事與給事中中書舍人更直朝堂何遜詩寓直慚虎賁漏長丹鳳闕劉孝威詩赤道漏猶長李憕詩雙闕天河近千門夕漏長唐六典丹鳳門在含光殿前漢書東方朔傳陛下以城中為小圖起建章左鳳闕右神明號稱千門萬户唐太宗詩爽氣浮丹闕王維詩帝子逺辭丹鳳闕秋冷白雲司潘嶽秋興賦露淒清以凝冷薛道衡詩月冷疑秋夜虞世南詩紫殿秋風冷漢書百官公卿表注黃帝受命有雲瑞故以雲紀官春官為青雲夏官為縉雲秋官為白雲冬官為黑雲中官為黃雲螢影侵階亂蕭和螢火賦時臨池而泛影陽縉照帙秋螢詩飛影黃金散李雍詩瀑水侵階濺舞衣鴻聲出苑遲禮記季秋之月鴻雁來賔謝靈運詩飛鴻響聲逺音陳後主夜亭度雁賦聽霜鴻之度蕭條人吏散楚辭山蕭條而無獸兮野寂寞而無人鮑照舞鶴賦臨驚風之蕭條後漢書第五倫傳蜀地肥饒人吏富貴南史張纘傳為吳興太守省煩苛務清淨人吏便之李白詩政成聞雅頌人吏皆拱手小謝有新詩李白宣州謝朓樓詩蓬萊文章建安骨中間小謝又清發張華詩援翰賦新詩陶潛詩登髙賦新詩送韋雍歸鍾山輿地志鍾山古名金陵山一名北山齊周顒隱於此其山磅礴竒秀比諸山特髙宋濓遊鍾山記鍾山一名金陵山漢未秣陵尉蔣子文逐賊死山下吳大帝封蔣侯大帝祖諱鍾又更名蔣山實作揚都之鎮武侯所謂鍾山龍蟠是也祁門官罷後唐書地理志歙州新安郡縣六歙休寧黟績溪婺源祁門一統志祁門在徽州府城西一百八十里本漢黟縣地唐永泰初土寇作亂僞置閶門縣後討平因其壘置縣以縣東北有祁山西南有閶門灘乃合名祁門李白詩黃霸初臨郡陶潛未罷官負笈向桃源謝承後漢書袁宏博覽羣書六藝常負笈尋師又髙𢎞到官自負笈單步入界荆州先賢傳董正少有美姿太守舉孝亷正負笈單步上還舉版也葉少藴桃花源述淵明所謂桃花源今鼎州桃花觀即是其處湖湘間人頗能言其勝事云自晉宋來由此上升者六人山十里間無雜禽惟二鳥往來觀中未嘗有增損淵明言劉子驥聞知欲往不果子驥見晉書隱逸傳儲光羲詩去時能憶竹園遊來時莫忘桃源記萬卷常開帙博物志蔡雍有書近萬卷王維詩開軒御衣服散帙理章句張謂詩不用開書帙千峯不閉門吳均與朱元思書爭髙直指千百成峯李白詩千峯爭攢聚萬壑絶凌歷後漢書孫敬常閉户號閉户先生晉書後人為羊祜諱以户為門庾信小園賦雖有門而長閉緑楊垂野渡本草注江東人通名楊柳北人都不言楊楊樹枝葉短柳樹枝葉長又楊枝硬而揚起故謂之楊柳枝弱而垂流故謂之栁益一物二種也梁元帝緑柳詩長條垂拂地張正見詩楊栁未垂空說文津水渡也王維新晴野望詩郭門臨渡頭村樹連溪口黃鳥傍山村禽經倉庚黧黃黃鳥也今謂之黃鶯黃鸝野民曰黃栗留語聲囀耳其色黧黑而黃故名黧黃詩云黃鳥以色呼也杜甫詩黃鳥時兼白鳥飛王維詩嵗晏輸井稅山村人夜歸念爾能髙枕詩無念爾祖孟浩然詩念爾習詩禮未曽違户庭漢書酈寄說吕産吕祿云髙枕王千里李白詩羡君無紛喧髙枕碧霞裏岑參詩郡中無事髙枕眠丹墀㑹一論李白詩鼓鐘出朱邸金翠照丹墀蕭穎士詩紫英黃萼照灼丹墀鮑照詩寧能與爾曹瑕瑜稍辨論吳鞏少微子以文行知名開元中為中書舍人白雲溪爾雅水注川曰溪山徑入修篁水經注山徑委深王績詩山徑本幽回杜審言詩薜蘿山徑入荷芰水亭開任昉秋竹賦臨池沼夾修篁顧野王虎丘山序曲澗潺湲修篁䕃映深林蔽日光宋之問詩林篁天際密漢書嚴助傳行數百千里夾以深林叢竹荀子芷蘭生於深林非以無人而不芳劉向九歎阜杳杳以蔽日後漢書丁鴻傳干雲蔽日之木起於蔥青楊子赫赫乎日出之光阮籍詩皎若白日光夏雲生嶂逺顧愷之詩夏雲多竒峯沈約詩夏雲清朝景謝靈運詩雲生嶺逾疊謝朓詩雲生樹隂逺盧思道詩極野雲峯合遙嶂日輪低張九齡詩雲嶂天涯盡瀑水引溪長梁簡文帝招真館碑瀑水懸流雜天河而俱灑盧照鄰詩瀑水含秋氣垂藤引夏涼蘇味道詩瀑水交飛雨氣寒宋之問詩逶迤碧水長秀跡逢皆勝劉孝綽詩林塘多秀色王勃山亭宴序留美跡於芳亭晉書孫統傳淪跡下邑窮觀勝地南史梁始興王憺傳勝境名山多所尋履王同詩美景多勝跡清芬坐轉凉陸機文賦誦先人之清芬謝靈運山居賦旦延隂而物清夕栖芬而氣敷楚辭風伯為余先驅兮氛埃辟而清凉陶潛詩清凉素秋節回看玉樽夕神異經西北荒中有玉饋之酒酒泉注馬上有玉樽玉籩取一尊一尊復生與天同休無乾時曹植樂府日苦短樂有餘乃置玉樽辦東㕑江淹詩共惜玉樽暮願使光隂遲歸路賞前忘陶潛詩行行循歸路沈佺期詩歸路烟霞晚謝靈運詩清暉能娛人游子憺忘歸沈約詩忘歸屬蘭杜御選唐詩卷十四
