body:
  text: 欽定四庫全書御選唐詩卷十四五言律孟浩然精思館山房一作遊精思觀題觀主山房出處無考誤入花源裏晉書劉實傳誤入卿內陶潛桃花源記武陵人捕魚為業緣溪行忽逢桃花林林盡水源得一山武平一詩烟松寒翠幄雪徑繞花源初憐竹徑深梁昭明太子㽔賔五月啓追凉竹徑托䕃松間徐陵詩竹徑䝉蘢巧茅齊結構新張正見詩落逺香風急飛多花徑深庾信詩絶愛猿聲近誰憐花徑深方知仙子宅漢宫殿名長安有仙人觀天台山賦靈仙之所窟宅曹植遊仙詩王子奉仙樂又崑崙本吾宅未有世人尋湛方生廬山神仙詩序絶阻重險非人跡之所遊陸機賦世閲人而為世注一代之人通呼為世麋元譏許由世人歸其髙行宋之問詩世人共稱嗟梁武帝逸民詩事迹易見理相難尋舞鶴過間砌梁簡文帝詩游魚動池葉舞鶴散階塵吳均吳城賦東有鑄劒殘水西有舞鶴故壥庾信答移市教欲令吹簫舞鶴還反舊鄽鮑照舞鶴賦唳清響於丹墀廣雅砌戺也飛猿嘯密林應瑒西狩賦俯掣奔猴仰捷飛猿徐陵銘鳴蛇之洞深谷隱於蒼天飛猿之嶺喬木參於雲日謝靈運詩密林含餘清逺峯隱半規張九齡詩惟有巴猿嘯哀音不可聽漸通𤣥妙理北史藝術傳論或叙其𤣥妙申鑒幽深謂之𤣥理微謂之妙曹植輔臣論志存太虛安心𤣥妙成公綏嘯賦𤣥妙足以通神悟靈精微足以窮幽測深南史朱臯傳頗言𤣥理時為詩詠北史髙允傳天下妙理至多何遽問此盧諶詩昔在暇日妙尋通理深得坐忘心莊子顔回曰回坐忘矣仲尼曰何謂坐忘回曰墮支體黜聰明離形去智同于大通此謂坐忘過故人莊故人具雞黍古詩悵然逺相望知是故人來陶潛詩故人賞我趣挈壺相與至吳均詩故人杯酒别論語殺雞為黍而食之後漢書范式傳式與張邵為友式曰後二年當過拜至期邵白母請殺雞為黍待之母曰二年之别千里約言何相信之審耶至日果至范雲詩恨不具雞黍得與故人揮邀我至田家謝朓樂府渠碗送佳人玉杯邀上客駱賔王序辭塵成契冒雨相邀應璩詩田家無所有酌醴焚枯魚陶潛詩田家豈不苦緑樹村邊合梁簡文帝詩已見垂鈎挂緑樹任昉詩緑樹懸宿根朱超道詩古村空列樹劉孝綽還渡浙江詩日暮愁隂合繞樹噪寒烏青山郭外斜古詩夕宿青山郭謝朓詩逺望青山郭吕氏春秋宿於郭外江總詩樹動丹樓出山斜翠磴危開軒面場圃蜀都賦開髙軒以臨山列綺窗而瞰江阮籍詩開軒臨四野詩九月築場圃周禮地官場人掌國之場圃而樹之果蓏珍異之物後漢書仲長統傳場圃築前果園樹後謝朓辭記室箋捨耒場圃奉筆兔園把酒話桑麻鮑照詩握君手執杯酒周禮地官載師凡宅不毛者注謂不樹桑麻漢書地理志魯地地狹民衆頗有桑麻之業西征賦華實紛敷桑麻條暢陶潛詩相見無雜言但道桑麻長何遜詩善鄰談穀稼故老述桑麻待到重陽日魏文帝與鍾繇書嵗往月來忽復九月九日九為陽數而日月並應故曰重陽輦下嵗時記都城重九後一日宴賞號小重陽還來就菊花月令季秋之月菊有黃華南史陶潛九月九日無酒出宅邊菊叢中坐久之王𢎞送酒至即便就酌醉而後歸庾信詩蒲城桑落酒灞岸菊花天江總詩故鄉籬下菊今日幾花開送友東歸士有不得志史記魏其日默默不得志張衡四愁詩序張衡不樂久處機密陽嘉中出為河間相鬱鬱不得志為四愁詩栖栖吳楚間後漢書徐稚傳何為栖栖不遑寧處班固答賔戲聖賢之治栖栖皇皇史記諸侯年表自陳以西南至九疑東帶江淮穀泗薄㑹稽為梁楚吳淮南長沙國又李廣傳吳楚軍時廣從太尉亞夫擊吳楚軍取旗廣陵相遇罷漢書地理志廣陵國景帝四年更名江都武帝元狩三年更名廣陵古長干曲妾家揚子渡便弄廣陵潮枚乘七發將以八月之望觀濤乎廣陵之曲江詩邂逅相遇適我願兮彭蠡泛舟還說苑楚昭王欲之荆臺遊司馬子期進諫曰荆臺之遊左洞庭之波右彭蠡之水其樂使人遺老謝靈運賦貫廬江之長路出彭蠡而南浮一統志彭蠡湖在南康府東南一名鄱陽左傳秦輸粟於晉自雍及絳命之曰泛舟之役王粲詩泛舟蓋長川王彪之詩泛舟理飛棹檣出江中樹古樂府長檣鐵鹿子布帆阿那起郭璞江賦舳艫相屬萬里連檣隂鏗詩行舟逗逺樹度鳥息危檣謝朓詩雲中辨江樹波連海上山張融海賦山橫蹙浪風倒摧波王筠詩水動連山波劉孝綽觀濤詩乍出連山合風帆明日逺何處更追攀風土記帆從風之幔也施于船前各隨大小為制吳均詩旅帆風飄揚劉刪詩回艫乘派水舉帆逐風分庾信詩明朝雲雨散何處更相尋王粲詩朋友相追攀夜渡湘水張衡四愁詩我所思兮在桂林欲往從之湘水深一統志湖廣長沙府湘江在府西環城而下源出廣西興安縣海陽山西北流至分水嶺分為二派曰漓水流而南曰湘水流而北湘猶相也言有所合也客行貪利涉史記武王封師尚父于齊營丘東就國道宿行遲逆旅之人曰吾聞時難得而易失客寢甚安殆非就國者也太公聞之夜衣而行黎明至國鮑照詩客行惜日月易需有孚光亨貞吉利涉大川又同人于野亨利涉大川陸雲榮啓期贊居貞思樂之林利涉忘憂之沼夜裏渡湘川左傳宵涉潁注夜渡畏晉知之漢書趙充國傳充國至金城須兵滿萬騎夜遣三校銜枚先渡渡輒營陳唐汝詢注湘川即湘水庾闡詩心結湘川渚目散沖宿霄外吳均詩朝雲亂人目帝女湘川露氣聞芳杜詩英英白雲露彼菅茅傳露亦有雲言天地之氣無微不著駱賔王詩寒光千里暮露氣三江秋屈原九歌采芳洲兮杜若注杜香草也沈約郊居賦既取隂于庭樾又因籬于芳杜庾信對酒歌春水望桃花春洲藉芳杜歌聲識采蓮書詩言志歌永言聲依永律和聲禮記善歌者使人繼其聲沈佺期詩還如流水曲日晚棹歌聲古樂府江南可采蓮蓮葉何田田鮑照詩輿童唱秉椒櫂女歌采蓮南史羊侃傳性豪侈自造采蓮櫂歌兩曲甚有新致榜人投岸火漢書司馬相如傳榜人歌聲流喝注榜船也月令云命榜人榜人船長也張協七命淵客唱淮南之曲榜人奏采菱之歌唐汝詢注榜人望岸火而投恐暗中失道漁子宿潭烟木華海賦舟人漁子徂南極東劉孝綽釣竿篇釣舟畫采鷁漁子服冰紈說文潭水深處梁簡文帝詩夕波照孤月山枝斂夜烟又水烟浮岸起遙禽逐霧征行侣時相問異苑晉太元末姚祖為郡吏經衡山下有數少年執筆作書祖謂是行侣休息乃枉過之未至百步翻然飛揚崔皓詩停舟暫相問或恐是同鄉潯陽何處邊案唐汝詢唐詩解本潯陽作涔陽楚詞望涔陽以極浦橫大江以揚靈注涔陽江崎名一統志涔水在湘川北七十里穀梁天王狩于河陽傳水北為陽庾信詩御史府中何處宿洛陽城頭那得栖又不知何處天邊舟中曉望挂席東南望木華海賦維長綃挂帆席謝靈運詩揚帆采石華挂席拾海月周禮夏官職方氏東南曰揚州梁鴻適吳詩逝舊邦兮遐征將遙集兮東南詩誰謂宋逺跂豫望之青山水國遙謝朓詩不對芳春酒還望青山郭入蜀記姑熟溪東南數峯如黛蓋青山也山南小市有謝𤣥暉故宅基南望平野極目而環宅皆流泉竒石青林文篠真佳處也一統志青山在青陽縣北五里縣以此山得名顔延之詩水國周地險河山信重復庾信詩山川遙不見舳艫爭利涉漢書武帝紀自尋陽浮江舳艫千里薄樅陽而出注舳船後持柁處也艫船前頭刺櫂處也郭璞江賦舳艫相屬萬里連檣易同人於野亨利涉大川虞世南詩良辰喜利涉解纜入淮潯來往任風潮任昉濟浙江詩昧旦乘輕風江湖忽來往謝靈運詩客遊倦水宿風潮難具論祖珽望海詩雲島相接連風潮無極已問我今何適吳均詩問子今何去去採江南蓮莊子彼且奚適也天台訪石橋孫綽天台山賦天台山者蓋山嶽之神秀者也十道山川考天台山在台州天台縣北十里髙萬八千丈周旋八百里其山八重四面如一又天台山賦跨穹窿之懸磴臨萬丈之絶冥踐莓苔之滑石搏壁立之翠屏注懸磴石橋也莓苔即石橋之苔也翠屏石橋之上石壁之名也啓䝉記注天台山石橋路徑不盈尺長數十步步至滑下臨絶冥之澗一統志天台山在台州天台縣西北一十里路由楢溪前有石橋坐看霞色曉何遜曉發詩早霞麗初日清風消薄霧梁簡文帝詩薄雲初起雨曙色始成霞疑是赤城標支遁天台山銘序往天台當由赤城山為道徑㑹稽記赤城山名色皆赤狀似雲霞十道山川考赤城山在天台縣北六里遊天台山賦赤城霞起以建標注天台山圖赤城山天台之南門也建標立物以為之表識也王維奉和聖製賜史供奉曲江宴應制唐書百官志乘輿所在必有文學之士下至伎術之流直於别院太宗時時召名儒學士草制而猶未有名號乾封以後始稱北門學士開元初乃置翰林待詔以張說張九齡等為之掌四方表疏批答應和文章又既以中書務劇文書擁滯乃選文學之士號翰林供奉與集賢院學士分掌制敕西京雜記京城龍華寺南有流水屈曲謂曲江秦時為宜春苑漢為樂遊苑劇談録曲江池唐開元中疏鑿為勝境花卉環列烟水明媚都人遊玩盛於中和上已節一統志曲江池在西安府城東南一十里國史補進士大宴于曲江亭子謂之曲江㑹侍從有鄒枚漢書嚴助傳厭承明之廬勞侍從之事庾信詩平時欣侍從沈佺期應制詩自喜恩深陪侍從史記梁孝王來朝從遊說之士齊人鄒陽淮隂枚乘吳莊忌夫子之徒相如見而悅之水經注梁孝王大治宫室自宫連屬于平臺與鄒枚司馬之徒極遊於其上李白詩梁苑傾鄒枚瓊筵向水開謝朓詩既通金閨籍復酌瓊筵醴舊唐書傳論降輿朱邸對食瓊筵阮修上已㑹詩坐此華筵臨彼素流阮籍東平賦背險向水沈佺期早朝詩閶闔連雲起巖廊拂霧開言陪柏梁宴陸機詩居陪華幄出從朱輪鮑照詩陳鐘陪夕宴漢書武帝紀元鼎二年春起柏梁臺古文苑武帝作柏梁臺詔羣臣二千石能為七言詩者乃得上坐王融詩小臣竊自嘉預奉柏梁宴新下建章來晉神絃歌真官今來下漢武帝歌黃鵠飛兮下建章史記東方朔傳陛下以城中為小圖起建章左鳳闕右神明號稱千門萬户括地志建章宫在雍州長安縣故城西張說詩贈君芳杜草為植建章臺李嶠詩白玉仙輿紫禁來對酒山河滿魏武帝樂府對酒歌太平陸機樂府良㑹罄美服對酒宴同聲史記項羽紀關中阻山河四塞地肥饒可都魏書崔光傳逺存矚眺周見山河陶潛擬古詩山河滿目中移舟草樹回梁元帝詩自解青絲纜將移丹桂舟梁簡文帝採蓮賦畏風多而榜危驚舟移而花逺庾信賦草樹混淆枝格相交宋之問詩草樹饒野意山川多古情蜀都賦流漢湯湯驚浪雷奔望之天回即之雲昏天文同麗日梁昭明太子謝看講啓莫測天文徒觀玉府鄭義真奉和過溫湯詩天文遂仰觀詩疏王者繼天理物當與日同故易曰大人與日月合其明也王褒燕歌行初春麗日鶯欲嬌沈約詩麗日屬上已駐景惜行杯蘇武詩隨時愛景光王融散曲徐歌駐行景史記叔孫通傳諸侯羣臣皆朝禮畢復置法酒以尊卑次起上夀觴九行梁元帝詩復看遙舸似行杯從岐王過楊氏别業應教舊唐書惠文太子範傳初封鄭王改封衛王徙封巴陵郡王進封岐王好學工書雅愛文章之士與閻朝隱劉庭琦張諤鄭繇篇題倡和多聚書畫古跡為時所稱宋書謝靈運傳靈運移籍㑹稽修營别業傍山帶江盡幽居之美揚子談經處揚雄解難宓犧氏之作易也綿絡天地經以八卦文王附六爻孔子錯其象而彖其辭然後發天地之藏定萬物之基典謨之篇雅頌之聲不溫純深潤則無以揚鴻烈而章緝熙漢書揚雄傳贊雄以為經莫大於易故作太𤣥文中子劉炫見子談六經淮王載酒過漢書淮南王傳淮南王安為人好書鼓琴招致賔客方術之士數千人又揚雄傳贊雄家貧嗜酒人希至其門時有好事者載酒肴從遊學興闌啼鳥緩緩一作換南史沈慶之傳沈僧昭為山隂縣武陵王紀為㑹稽太守宴坐池亭畦鳴聒耳殊廢絲竹之聽僧昭呪厭十許口便息及日晚王欲其復鳴僧昭曰王歡已闌今恣汝鳴即便喧聒樂府前溪歌但聞林鳥啼庾信詩春山百鳥啼顧野王羅敷行風輕鶯韻緩坐久落花多梁元帝詩坐久翠眉愁顧野王羅敷行露重落花遲庾信馬射賦落花與芝蓋齊飛李德源詩池上落花浮徑轉回銀燭杜審言詩徑轉危峯逼橋回缺岸妨穆天子傳天子之珤璇珠燭銀注銀有精光如燭也鮑照賦潤蓬山之瓊膏輝蔥河之銀燭王勃越州山亭序星回漢轉露下風髙銀燭掩花瑤觴抒興林開散玉珂陶潛詩林鳥喜晨開梁元帝春日詩玉珂隨風度金鞍照日輝舊唐書輿服志馬珂一品以下九子四品七子五品五子類篇鵰入海為珂爾雅翼曰珂黃黑色其骨白可以飾馬非特取其容兼取其聲嚴城時未啓抱朴子恐奸釁之不虞故嚴城以備之沈約文塞草未衰嚴城于焉早閉周禮閽人以時啓閉謝朓詩平明振衣坐重門猶未開前路擁笙歌陶潛歸去來辭問征夫以前路鮑照大雷岸與妹書風吹雷歘夜戒前路孔稚圭褚先生碑子晉笙歌馭鳳于天海江淹賦笙歌畹右琴舞池東秋宵寓直潘嶽秋興賦序以太尉掾兼虎賁中郎將寓直於散騎之省注寓寄也建禮髙秋夜漢典職尚書郎主作文書起草晝夜更直於建禮門內蔡質漢官儀宫北朱雀門至止車門內崇賢門內建禮門文選注崇禮門東建禮門即尚書下省門古樂府髙秋八九月沈約詩臨池清溽景開幌望髙秋蕭子顯自序風動春朝月明秋夜承明候曉過漢書嚴助傳賜書曰詔制㑹稽太守君厭承明之廬張晏注承明廬在石渠閣外直宿所止曰廬玉海漢承明在石渠閣外為祕府居近君之地所以親儒生劉孝綽詩步出金華省遙望承明廬鮑照賦曜繡羽以晨過九門寒漏徹禮記餧獸之藥毋出九門注天子有九門謂關門逺郊門近郊門城門臯門庫門雉門應門路門也唐書髙祖紀永徽五年十月癸卯築京師羅郭起觀于九門六典京城左河華右隴坻前終南後九嵕南面三門中曰明德左曰啓夏右曰安化東面三門中曰春明北曰通化南曰延興西面三門中曰金光北曰開逺南曰延平鮑照還都道中詩太息終農漏左思吳都賦晷漏肅唱明宵有程竇翬漏賦濃氛鬱沈轉冬漏于寒林萬井曙鐘多周禮方百里為一同積萬井其中漢書刑法志天子畿內提封萬井陳子昂謝賜衣表三軍叶慶萬井相歡庾肩吾詩風長曙鐘近月迥藏珠斗駱賔王詩月迥寒沙靜風急夜江秋星經北斗星謂之七政天之諸侯亦謂帝車魁四星為璇璣杓三星為玉衡齊七政斗為人君號令之主漢書律厯志日月如合璧五星如連珠雲消出絳河司馬相如大人賦煥然霧除霍然雲消阮籍大人先生傳雲氣消真人來廣志天河亦曰絳河漢武帝內傳上元夫人遣一侍女問云上聞起居逺隔絳河庾信步虛詞絳河因逺别黃鵠來相迎杜審言七夕詩白露含明月青霞斷絳河更慚衰朽質江總詩庸疏濫應阮衰朽恧連章南陌共鳴珂梁武帝河中之水歌十四採桑南陌頭褚亮詩言是東方騎來尋南陌車梁元帝詩鳴珂隨局駛輕塵漾影移徐陵詩華軒翼葆吹飛益響鳴珂輞川間居贈裴秀才迪唐書王維傳維别墅在輞川地竒勝有華子岡敧湖竹里館栁浪茱萸沜辛夷塢與裴迪游其中賦詩相酬為樂一統志輞川在西安府藍田縣西南唐王維置别業於此寒山轉蒼翠謝朓詩蒼翠望寒山崢嶸瞰平陸隂鏗詩寒山但見松徐陵詩山寒微有雪石路本無塵秋水日潺湲莊子秋水時至百川灌河晉書阮籍傳贊秋水揚波春雲斂映梁元帝詩重以秋水文波秋雲似羅九歌觀流水兮潺湲七發瀄汨潺湲波揚流灑謝靈運詩石淺水潺湲日落山照耀又入華子岡詩且申獨往意乘月弄潺湲倚杖柴門外晉春秋謝安所居有石一株常倚杖相對鮑照詩腰鏟刈葵藿倚杖牧雞豚後漢書楊震傳于是柴門絶賔客十六國春秋前凉録汜勝家財五十萬悉散之于宗族柴門灌園以琴書自娛陶潛文翳翳柴門事我宵晨臨風聽暮蟬古詩臨風送懷抱謝莊賦臨風歎兮將焉歇謝靈運詩蕭瑟含風蟬嘹唳度雲雁江總詩山階步皎月澗户聽凉蟬渡頭餘落日梁簡文帝烏棲曲採蓮渡頭擬黃河郎今欲渡畏風波張九齡詩萬井緣津渚千艘咽渡頭謝靈運賦望新晴于落日謝惠連詩落日隱簷楹鮑照詩日落嶺雲歸墟里上孤烟陶潛詩曖曖逺人村依依墟里烟范雲詩江干逺樹浮天末孤烟起庾信詩野戍荒烟起青山百鳥啼復值接輿醉論語楚狂接輿歌而過孔子莊子吾聞言於接輿大而無當往而不返吾怖其言若河漢而無極也髙士傳接輿姓陸名通晉書袁宏傳遇醉忘辭在醒貽答狂歌五栁前袁宏三國名臣序贊接輿以之行歌魯連以之赴海盧照鄰山行詩狂歌欲歎鳳失路反占龜晉書陶潛傳常著五柳先生傳以自況曰先生不知何許人亦不詳其姓氏宅邊有五柳樹因以為號焉梁昭明太子啓尋五栁之先生琴尊雅興謁孤松之君子鸞鳳騰翻庾信詩三山猶有鶴五柳更無春歸嵩山作清川帶長薄曹植文振冠南嶽濯纓清川劉楨詩清川過石渠陸機詩清川帶華薄又按轡遵長薄吳均詩花舞依長薄楚辭注草木交曰薄車馬去間間詩子有車馬弗馳弗驅古詩驅車策駑馬游戲宛與洛詩十畝之間兮桑者間間兮流水如有意詩沔彼流水朝宗于海庾信詩春洲鸚鵡色流水桃花香暮禽相與還蕭子隆詩初松切暮鳥孔德紹詩繞枝驚夜禽陶潛詩山氣日夕佳飛鳥相與還荒城臨古渡隂鏗詩荒城髙仞落庾信詩日晚荒城上蒼茫餘落暉落日滿秋山謝靈運撰征賦望新晴于落日蕭琛詩落日搖征轡江淹詩金鍰映秋山梁昭明太子書悟秋山之心登髙而托逺迢遰嵩山下謝瞻詩迢遰封畿外支曇諦賦面崔巍背迢遞歸來且閉關中說或問陶元亮子曰哲人也歸去來有避地之心焉五柳先生則幾於閉關矣沈約詩且復共歸來含情寄杯酒顔延之詩劉伶善閉關懷情滅聞見輞川閒居唐書王維傳維别墅在輞川地竒勝有華子岡敧湖竹里館栁浪茱萸沜辛夷塢一統志輞川在西安府藍田縣西南曹植遊觀賦靜閒居而無事將遊目以自娛魏書李騫傳處江淮而不變對朝市而閒居一從歸白社晉書董京傳初與隴西計吏俱至洛陽被髮而行逍遙吟詠常宿白社中沈約郊居賦乍容身於白社亦寄孥于伯通一統志白社里在河南舊洛城建春門晉逸士董京居此不復到青門詩蹶父孔武靡國不到三輔黃圖長安城東出南頭第一門名曰青城門或曰青門阮籍詠懷詩昔聞東陵瓜近在青門外時倚簷前樹列子心凝形釋骨肉都融不覺形之所倚足之所履隨風東西猶木葉幹殼莊子今子外乎子之神勞乎子之精倚樹而吟據槁梧而瞑徐陵長千寺碑遊巖倚樹宴坐經行唐太宗詩碧鱗驚棹側紫燕舞簷前逺看原上村徐陵太極殿銘甘泉逺望觀正殿之崢嶸函谷遙看美皇居之佳麗水經注淇水又東北徑淇陽川徑石城西北城在原上帶澗枕淇青菰臨水映說文蔣菰也廣雅菰生陂澤中葉如蒲葦春亦生筍謂之茭白西京雜記菰之有首者謂之緑節宋玉九辨登山臨水兮送將歸李嶠詩曉來何處低臨水無限鴛鴦妒不飛謝靈運山居賦華映水而增光氣結風而回敷何遜七召綺霞映水蛾月生天白鳥向山翻詩麀鹿濯濯白鳥翯翯又振鷺于飛傳鷺白鳥也西京雜記白鳥朱冠鼓翼池干管子鳥之飛也必還山集谷詩肇允彼桃蟲拚飛維鳥釋文拚芳煩反洪武正韻拚與翻同寂寞於陵子莊子恬淡寂寞虛無無為此道德之質也宋玉九辨燕翩翩其辭歸兮蟬寂寞而無聲淮南子太清之始和順以寂寞孟子處於於陵疏於陵齊之别邑劉向於陵子序於陵子齊之亷士名子仲為人灌園著書十二篇髙士傳陳仲子齊人也將妻子適楚居於陵自謂於陵仲子楚王聞其賢欲以為相遣使持金百鎰聘仲子仲子謝使者逃去為人灌園張協詩取志於陵子比足黔婁生桔橰方灌園莊子子貢過漢隂見一丈人方將為圃畦鑿隧而入井抱甕而出灌子貢曰有械於此鑿木為機後重前輕挈水若抽數如泆湯其名為橰又師金曰子獨不見夫桔橰者乎引之則俯舍之則仰禮記奉席如橋衡注橋井上㮮橰釋文㮮音結依字作桔橰見莊子史記商君傳趙良見商君曰何不歸一十五都灌園于鄙潘嶽閒居賦膳灌園鬻蔬以供朝夕之送梓州李使君唐書地理志梓州梓潼郡本新城郡天寶元年更名元和志梓州禹貢梁州之域秦為蜀郡漢置廣漢郡宋置新州開皇未改為梓州因梓潼水為名也一統志四川潼川州唐為梓州萬壑樹參天鮑照書吞納百川寫泄萬壑又河清頌序澄波萬壑潔瀾千里徐陵文喬樹參於雲日周𢎞讓詩灌木上參天千山響杜鵑梁簡文帝銘野寂雲興禽繁山響禽經江左曰子規蜀右曰杜宇歐越曰怨鳥一曰杜鵑荆楚嵗時記杜鵑初鳴先聞者主别離山中一夜雨沈約詩山中咸可說賞逐四時移楚辭山峻髙以蔽日兮下幽晦以多雨北史吳遵傳山出雲故知有雨鹽鐵論太平之時旬而一雨雨必以夜樹杪百重泉張衡西京賦杪木未注杪猶表也定法師孤石詩嵓隈恆灑浪樹杪鎮搖風水經注瀑布水出山腹挂流三四百丈飛湍林表望若懸素淮南子積水重泉黿鼉之所便也丘遲詩萬尋仰危石百丈窺重泉漢女輸橦布左思蜀都賦巴姬彈絃漢女擊節沈約詩巴童暗理瑟漢女夜縫裙又蜀都賦布有橦華麵有桄榔注橦華者樹名橦其花柔毳可績為布也元和志梓州賦布巴人訟芋田左傳哀公十八年巴人伐楚華陽國志禹治水命州巴蜀以屬梁州漢書貨殖傳蜀卓氏曰吾聞岫山之下有踆鴟師古注踆鴟謂芋也又華陽國志汶山郡有大芋如踆鴟也蜀都賦其園則有蒟蒻茱萸瓜疇芋區文翁翻教授漢書文翁傳文翁少好學通春秋為蜀郡守見蜀地僻陋欲誘進之選郡縣小吏開敏有材者遣詣京師受業博士又修起學宫招下縣子弟以為學官弟子繇是大化比齊魯焉不敢倚先賢書不惟不敢且不暇廣韻倚依倚也禮記祀先賢于西學傅休奕詩依賢義不恐登河北城樓作唐書地理志陜州縣平陸本河北𨽻蒲州貞觀元年來屬記纂淵海平陸縣春秋虞國地漢屬河東郡後魏置河北郡唐天寶初以開漕瀆得古劒有篆文曰平陸因更名井邑傅巖上周禮九夫為井四井為邑陸雲詩井邑自相循書說築傅巖之野惟肖傳傅氏之巖在虞虢之界通道所經有澗水壞道常使胥靡刑人築護此道說賢而隱代胥靡築之以供食記纂淵海傅巖在平陸縣東即傅說隱處楚辭說操築于傅巖兮武丁用而不疑陶𢎞景尋山志散髮解帶盤旋巖上客亭雲霧間水經注濼水北為大明湖湖上有客亭左右楸梧水木明瑟劉潛書暮宿客亭晨炊謁舍李白勞勞亭詩天下傷心處勞勞送客亭木華海賦薈蔚雲霧盧諶詩山阿起雲霧杜蘭香詩逍遙雲霧間呼吸發九疑髙城眺落日梁元帝詩却月隱髙城謝朓詩寒城一以眺平楚正蒼然鮑照詩迥眺出谷雲謝靈運撰征賦望新晴於落日盧照鄰詩飛泉如散玉落日似懸金極浦映蒼山楚辭望涔陽兮極浦江淹詩停艫望極浦水經注夷水徑宜都北東入大江所經皆石山略無土岸其水虛映俯視游魚如乘空也謝朓詩蒼翠望寒山崢嶸瞰平陸郭熙山水訓山之烟嵐四時不同春山淡冶而如笑夏山蒼翠而欲滴岸火孤舟宿何遜詩暮烟起遙岸崔國輔詩村烟和海霧舟火亂江星陶潛詩渺渺孤舟逝綿綿歸思紆又文舫舟同濟三宿水濵漁家夕鳥還維本集詩漁家逐水愛山春沈約詩網蟲垂戶織夕鳥傍簷飛何遜詩日夕棲鳥逺浮雲起秋色陶潛詩厲厲氣遂嚴紛紛飛鳥還寂寥天地暮楚辭九辨寂寥兮收潦而水清庾信步虛詞絶想寂寥前易天地定位山澤通氣蔡雍釋誨時逝嵗暮默而無聞心與廣川閒琴賦思假物以託心李白詩心與浮雲閒王粲詩方舟順廣川謝靈運詩舍悽泛廣川劉鑠詩河廣川無梁山髙路難越孫綽遊天台山賦遊覽既周體靜心閒使至塞上單車欲問邊史記信陵君傳晉鄙舉手視公子曰吾擁十萬之衆屯于境上國之重任今單車來代之何如哉漢書龔遂傳為渤海太守單車獨行至府李陵答蘇武書足下昔以單車之使適萬乘之虜漢書武帝紀元封元年遣使者告單于曰單于能戰天子自將待邊不能亟來臣服屬國過居延漢書霍去病傳分處降者于河南因其故俗為屬國注不改其本國之俗而屬于漢故號屬國又武帝紀將軍霍去病公孫敖出北地二千餘里過居延注居延胸奴中地名韋昭以為張掖縣失之張掖所置居延縣以安處所獲居延人而置此縣征蓬出漢塞陳後主詩鳥轉逐征蓬史記胸奴傳單于既入漢塞未至馬邑百餘里見畜布野而無人牧怪之後漢書和帝紀論偏師出塞則漠北地空張正見關山月輪隨出塞車歸雁入胡天史記楚世家楚人有好以弱弓微繳加歸雁之上者漢武帝秋風詞草木黃落兮雁南歸梁簡文帝詩一雁聲嘶何處歸張正見從軍詩長榆接逺天大漠孤烟直李陵答蘇武書出大漠之外後漢書竇憲傳燕然山銘曰陵髙闕下雞鹿經磧鹵絶大漠范雲詩天未孤烟起庾信詩野戍孤烟起又間烽直起烟長河落日圓庾信賦對玉關而羈旅坐長河而暮年江淹别賦去復去兮長河湄張正見折楊栁色映長河水謝朓詩暗曖日將落何遜詩蒼茫落日暉吕氏春秋日在天視其奚如曰正圓山海經西望日之所入其氣圓何遜詩赤日下城圓蕭關逢候吏漢書李廣傳孝文十四年胸奴入蕭關注在上郡北唐書地理志大中五年以蕭關置武州李德林從駕還京詩蕭關獵騎旋張說詩出得蕭關北儒衣不稱身後漢書王霸傳光武至下曲陽傳聞王郎兵在後至滹沱河候吏還白河水流澌無船不可濟光武令霸往視霸即曰冰堅可渡光武笑曰候吏果妄語也都護在燕然漢書鄭吉傳吉既破車師降日逐威震西域遂并護車師以西北道故號都護都護之置自吉始焉後漢書和帝紀論都護西指則通譯四萬梁簡文帝渡關山詩直指遮歸道都護總前期後漢書竇憲傳溫犢須日逐等八十一部率衆降遂登燕然山刻石勒功紀漢威德薛道衡出塞詩受降今更築燕然已重刻岑參奉送李太保兼御史大夫充渭北節度使即太傅光弼弟舊唐書職官志正一品太保一員三師訓導之官天子所師也從三品御史大夫一員掌持邦國刑憲典章以肅政朝廷天寶中緣邊禦戎之地置八節度使受命之日賜之旌節謂之節度使得以專制軍事外任之重無比焉又李光弼傳光弼營州栁城人上元元年加太尉兼中書令弟光進與李輔國同掌禁兵代宗委以心膂加太子太保兼御史大夫凉國公渭北節度使光進與光弼甲第並開極一時之榮詔出未央宫漢書宣帝紀下詔假公田貸種食曹植表願陛下沛然垂詔使諸國慶問四節得展北齊書魏蘭根傳發詔授官咸由聖㫖史記蕭丞相營作未央宫漢書蕭何作未央宫潘嶽關中記未央宫殿皆疏龍首山土作之登壇近總戎史記淮隂侯傳贊相國深薦策拜登壇漢書髙帝紀漢王設壇場拜信為大將軍張九齡送趙都護詩逺圖常畫地超拜乃登壇溫子升請大將表脫獨委臣專總戎旅兵術靡常軍機屢變以臣當之必所未達裴讓之詩皇威奮武略上將總神兵上公周太保書庸建爾于上公又立太師太傅太保兹惟三公又王朝步自周則至于豐惟太保先周公相宅禮記保也者慎其身以輔翼之而歸諸道者也大戴禮昔者周成王幼在襁褓之中召公為太保保者保其身體也副相漢司空漢書朱雲傳御史大夫宰相之副九卿之右不可不選又百官表御史大夫秦官位上卿銀印青綬掌副丞相應劭曰侍御史之率故稱大夫掌副丞相唐中宗制誠副相之榮級實次卿之通任書伯禹作司空又三八政四曰司空又司空掌邦土居四民時地利漢書成帝紀以御史大夫為大司空又百官志司空公一人掌水土事弓抱關西月王褒詩俯視雲似蓋低望月如弓庾信詩明月動弓弰明餘慶詩劍花寒不落弓月曉逾明唐太宗詩野落飛星劍弦虛半月弓吳均詩何當見天子畫地取關西王融詩抱月如可明懷風殊復清旗翻渭北風劉孝綽詩臨風畫角憤耀日采旗翻謝偃賦隂風發陳雲屯鼉鼓震紅旗翻舊唐書李光進傳光進從郭子儀破賊收兩京纍有戰功遷渭北節度使周𢎞讓復王少傅書江南燠熱橘柚冬青渭北沍寒楊榆晚葉江總詩終南雲影落渭北雨聲過楚辭乘回風兮載雲旗魏收詩仁旗指旦風弟兄皆許國管子善氣迎人親如弟兄後漢書耿弇傳為大將軍與弟舒連擊五校賊破之光武即位詔弇進攻漁陽弇以父況據上谷兄弟無在京師者自疑不敢獨進上書求詣洛陽詔報曰將軍舉宗為國何嫌何疑而欲求徵況聞亦遣舒弟國入侍帝善之復以國弟廣舉並為中郎將弇兄弟六人皆垂青紫當代以為榮晉書陸玩傳以身許國義忘曲讓孔稚圭詩本持許國志況復武德彰天地荷成功書地平天成萬世永賴時乃功又立太師太傅太保燮理隂陽二公𢎞化寅亮天地弼子一人陸陲石闕銘雷動風驅天行地止袁朗詩規模唯聖作負荷曉成功寄左省杜拾遺唐書百官志龍朔二年改門下省曰東臺侍中曰左相又門下省左拾遺六人掌供奉諷諫又杜甫傳至德二載走鳳翔上謁拜左拾遺聨步趨丹陛禮記拾級聚足連步以上王筠詩昔入睢陽苑連步披風雲北史樊子蓋傳願奉丹陛隋書薛道衡傳趨事紫宸馳驅丹陛分曹限紫微楚辭分曹並進干寶司徒儀從事中郎之職分曹綱紀其事維正大體唐書百官志開元中改政事堂號中書門下列五房於其後分曹以主衆務又罷東西分日之限晉書天文志紫微大帝之座天子之常居也唐書百官志開元元年改中書省曰紫微省中書令曰紫微令六典宣政殿東廊有日華門門下省在門外東上閣即在殿左宣政殿西廊有月華門中書省在門外西上閣即在殿右曉隨天仗入唐書儀衛志朝㑹之仗有五皆帶刀捉仗列於東西廊下五代史李琪傳唐故事天子日御殿見羣臣曰常參朔望薦食諸陵寢御便殿曰入閣宣政前殿也謂之衙衙有仗紫宸便殿也謂之閣其不御前殿而御紫宸也乃自正衙喚仗由閣門而入百官候朝于衙者因隨以入見故謂之入閣雍録正觀元年制自今中書門下及三品以上入閣議事皆命諫官隨之有失輒諫又東西二閣在宣政殿東西兩序分立朔望御紫宸則宣政所立之仗聽喚而入先東立者隨東仗入自東閣先西立者隨西仗入自西閣暨至㑹於紫宸殿下則復分班對立也暮惹御香歸何遜詩晴軒連瑞氣同惹御香芬沈佺期詩爐氣晨飄接御香白髮悲花落論衡白髮復黑齒落更生陶潛詩白髮被兩鬢易林嵗暮花落陽入隂室陸雲詩時暮復何言花落理必賤江淹詩花落豈留英青雲羡鳥飛史記伯夷傳非附青雲之士鳥能施於後世哉揚雄解嘲當途者升青雲陶潛詩望雲慚髙鳥陸機詩仰瞻淩霄鳥羡爾歸飛翼聖朝無闕事馮衍說鄧禹書聖朝享堯舜之樂將軍荷稷契之烈杜審言詩聖朝尚邊策詔論兵戈偃詩衮職有闕惟仲山甫補之後漢書梁冀傳宜崇賢善以輔朝闕吳越春秋達於策慮輕於朝事自覺諫書稀漢書儒林傳王式為昌邑王師治事使者責問曰師何以無諫書徐儀詩隨意尺書稀酬崔十三案品彚本作酬崔十三侍御登玉壘山思故園見寄玉壘天晴望左思蜀都賦廓靈關以為門包玉壘而為宇劉孝威蜀道難玉壘髙無極銅梁不可攀一統志四川成都府玉壘山在灌縣西北二十九里湔水出此案湛方生有天晴詩梁簡文帝詩凍解池開渌雲穿天半晴諸峯盡覺低謝靈運山居賦羣峯參差出其間連岫復陸藏其坂蕭慤望山詩巖低石倒險嶺髙松更疏故園江樹北詩樂彼之園園有樹檀駱賔王詩惟有寒潭菊獨似故園花謝朓詩天際識歸舟雲中辨江樹宋之問詩河橋不相送江樹逺含情又鄉連江北樹雲斷日南天斜日嶺雲西梁簡文帝詩斜日晚駸駸庾肩吾詩去影背斜日虞世南詩緑野明斜日青山淡晚烟鮑照詩日落嶺雲歸陶𢎞景詩山中何所有嶺上多白雲淮南子日西垂景在樹端謂之桑榆曠野看人小詩匪兕匪虎率彼曠野元籍詩登髙望九州悠悠分曠野隋書天文志置器廣庭則函牛之鼎如釡堂崇十仞則八尺之人猶短物有陵之非形異也王孝禮詠鏡詩猶嫌鏡裏促看人未好通陳後主臨髙臺烟裏看鴻小風來望葉回長空共鳥齊唐太宗詩殘雲收翠嶺夕霧結長空魏志管輅傳注凌虛之鳥愛其清髙不願江漢之魚阮籍詩髙鳥翔山岡燕雀棲下林山髙徒仰止管子山者物之髙者也惠者主之髙行也詩髙山仰止景行行止晉書慕容廆載記欽髙仰止注情彌久不得日攀躋詩求之不得寤寐思服南史王𢎞之傳嘗垂綸於三石頭過者不識問得魚賣否𢎞之曰亦自不得得亦不賣說文攀引也穀梁大事于大廟躋僖公傳躋升也陪封大夫宴瀚海亭納凉舊唐書封常清傳封常清蒲州猗氏人天寶十一載為安西副大都護攝御史中丞十三載入朝攝御史大夫仍權知北庭都護持節充伊西節度等使唐書地理志關內道瀚海都督府以回紇部置細管雜青絲詩既備乃奏簫管備舉庾信詩細管吹叢竹新杯卷半荷崔湜詩仙管雜風流後漢招商歌清絲流管歌玉鳬虞世南詩鏞管咸奏絲桐畢陳宋之問詩主人絲管清且悲千杯倒接䍦孔叢子平原君與子髙飲强子髙酒曰昔有遺諺堯舜千鍾孔子百觚子髙曰以子所聞聖賢以道德兼人未聞以飲也晉書山簡傳山簡鎮襄陽惟酒是耽童兒歌曰山公出何許往至髙陽池日夕倒載歸酩酊無所知時時能騎馬倒著白接䍦爾雅注白鷺翅上有長翰江東取為接䍦按白接䍦白巾也庾信詩不如飲酒髙陽池日暮歸時倒接䍦軍中乘興出漢書周亞夫傳軍中聞將軍令不聞天子之詔又將軍約軍中不得驅馳王粲詩軍中多沃饒人馬皆溢肥晉書王徽之傳徽之忽憶戴逵夜乘小船詣之造門不前而返人問其故徽之曰本乘興而來興盡而返何必見安道耶陶𢎞景尋山志乃乘興而遂往遵巖路以逺遊海上納涼時漢書蘇武傳武既至海上廩食不至掘野鼠去草實而食之於靬王弋射海上給其衣食隂鏗詩海上春雲雜天際晚帆孤吳地記夏駕湖夀夢盛夏乘駕納涼之處李百藥賦或通天而納涼徐陵詩納凉髙樹下直坐落花中日沒鳥飛急阮籍詩日沒不周西月出丹淵中陸機樂府白日既沒明燈輝陶潛詩日沒星與昴勢翳西山顛又衆鳥相與飛簡文帝詩野鳥歷塘飛又隴坻雁初飛詩隴狹朝聲聚風急暮行稀虞世南秋雁詩日暮霜風急山髙雲過遲詩陟其髙山陸機詩驅馬陟隂山山髙馬不前沈約八詠吳山髙兮髙難度淮南子山致其髙而雲起焉沈約白雲詩秋風西北起飄我過城闕陳後主詩山髙雲氣積陸雲九愍方輕飇而炯遲吾從大夫後詩三事大夫禮記五十命為大夫唐書百官志御史臺大夫一人正三品論語以吾從大夫之後歸路擁旌旗陶潛詩行行循歸路計日望舊居謝靈運詩始得傍歸路沈佺期詩歸路烟霞晚山蟬處處吟尚書符擁旗方伯周禮交龍為旗析羽為旌潘嶽文旌旗電揮庾信詩旌旗事琬圭董思恭詩願逐旌旗轉飄飄侍直廬梁州陪趙行軍龍岡寺北庭泛舟宴王侍御唐書地理志興元府漢中郡本梁州漢川郡開元十三年以梁凉聲相近更名褒州二十年復曰梁州唐書百官志行軍司馬掌弼戎政居則習搜狩有役則申戰守之法詩泛彼柏舟亦泛其流北史裴叔業傳梁祐叔業從姑子也從容風雅嘗與朝廷名賢泛舟洛水以詩酒自娛唐百官志御史臺其屬有三院一曰臺院侍御史𨽻焉誰宴霜臺使晉書王羲之傳欲與親知時共歡宴韓休詩祖宴初留賞崔篆御史針簡上霜凝筆端風起杜氏通典御史所居之署謂之憲臺為風霜之任漢書雋不疑傳暴勝之為直指使者唐書百官志監察御史分察尚書省六司繇下第一人為始出使亦然行軍粉署郎又參送程使君詩好日發行軍漢官儀省中皆胡粉塗壁故曰粉署白帖諸曹郎曰粉署亦曰仙署沈佺期詩盈盈粉署郎五日宴春光唱歌江鳥沒七命川客唱淮南之曲榜人奏採菱之歌梁簡文帝當壚曲迎來挾瑟易送别唱歌難張正見釣竿篇人來水鳥沒韋承慶詩江鳥沒還浮吹笛岸花香古今注武溪深馬援南征所作援門生袁寄生善吹笛援作歌以和之後漢書馬融傳好吹笛庾信詩短歌吹細笛何遜詩岸花臨水發江燕繞檣飛釣竿篇楫渡岸花洗晉白紵舞歌陽春白日風花香酒影搖新月晉書樂廣傳嘗有親客久闊不復來廣問其故答曰前䝉賜酒見杯中有蛇意甚惡之既飲而疾於時㕔壁間有角漆畫作蛇廣意杯中蛇即角影也復置酒于前處謂客曰酒中復有所見否客曰所見如初廣乃告其所以客豁然意解庾信詩若交臨酒影荀子水動而影搖人不以定美惡鮑泉詩新花滿新樹新月麗新輝江總詩新月半輪空灘聲聒夕陽梁元帝詩灘聲下濺石杜甫詩黃牛峽靜灘聲轉郭璞江賦千類萬聲自相喧聒劉琨詩夕陽忽西流宋之問天門歌晚隂兮足風夕陽兮赩紅江鐘聞已暮異苑西河有鐘在水中晦朔輒鳴羈客聞而悽愴傳燈録晨雞暮鐘沈約詩佇立日已暮歸棹緑川長梁簡文帝詩悠悠歸棹人徐彥伯採蓮曲歸棹落花前吳均詩錦帶雜花鈿羅衣垂緑川謝朓詩草含亭臯逺霞生川路長杜甫懷李白白也詩無敵李陽冰李翰林詩序凡所著述言多諷興自三代以來風騷之後馳驅屈宋鞭撻揚馬千載獨步惟公一人劉全白李翰林碣善賦詩才調英邁往往興㑹屬詞恐古人之善詩者亦不逮飄然思不羣古樂府念我一身飄然曠野成公綏嘯賦心滌蕩而無纍志離俗而飄然後漢書景十三王傳贊夫惟大雅卓爾不羣曹植詩懷此王佐材慷慨獨不羣清新庾開府梁昭明太子詩灌園實溫雅摛藻每清新周書庾信傳信博覽羣書尤善春秋左氏傳聘於東魏文章辭令盛為鄴下所傳來聘於我遂留長安封臨清邑子遷驃騎大將軍開府儀同三司俊逸鮑參軍後漢書袁紹傳故九江大守邊讓英才俊逸陸倕感知己賦濟濟冠蓋祁祁俊逸宋書鮑照傳照文辭贍逸世祖以為中書舍人臨海王子頊為荆州照為前軍參軍掌書記之任渭北春天樹史記叔孫通傳為宗廟渭北衣冠月出遊之沈佺期詩渭北升髙苑河南祓褉場雍録秦宫殿多在咸陽咸陽渭北也江總樂府春心自浩蕩春樹聊攀折李嶠上髙長史書河陽春樹開四照於詞林江東日暮雲晉書王坦之傳坦之字文度弱冠有重名時人為之語曰江東獨步王文度梁簡文帝與劉孝儀令西河觀寶江東獨步陶潛詩日暮天無雲春風扇微和江淹詩日暮碧雲合佳人殊未來何時一樽酒茅山父老歌何時乎來遊宋之問下山歌君再遊兮何時沈約詩勿言一樽酒明日難重持張正見樂府前有一樽酒重與細論文論衡論發胸臆文成手中非說經藝之人所能為也陸機文賦序故作文賦以述先士之盛藻因論作文之利害所由詩品顔延論文精而難曉陪鄭廣文遊何將軍山林唐書鄭䖍傳明皇置廣文館以䖍為博士嘗為天寶軍防録言典事該諸儒服其善著書時號鄭廣文長安志塔坡在韋曲西何將軍之山林也通志少陵原乃樊川之北原自司馬村起至何將軍山林而盡在杜城之東韋曲之西不識南塘路楚辭曽不知路之曲直兮南指月與列星江總詩鳥歸猶識路遊城南記南塘按許渾詩云背嶺枕南塘其亦韋曲之左右乎今知第五橋通志韋曲之西有華嚴寺寺西北有雁鶩陂陂西北有第五橋隋開皇三年築京城引香積渠水自赤欄橋經第五橋西北入城遊城南記第五橋在韋曲之西與沈家橋相近又內家橋之西有沈家橋第五橋亦以姓名名園依緑水世說王子敬入㑹稽經吳門顧辟疆有名園先不識主人徑往其家值顧方集賔友而王遊歷既畢指麾好惡傍若無人三秦記漢武有名園曰樊川曹植詩遊魚潛緑水梁簡文帝北渚詩緑水濺長袖梁元帝詩水緑晚萍生野竹上青霄庾肩吾詩野竹交臨浦劉孝先詩竹生荒野外梢雲聳百尋王訓詩竹路上青霄左思蜀都賦干青霄而秀出徐陵陳公九錫文氣涌青霄神飛紫闥谷口舊相得髙士傳鄭朴字子真谷口人修道靜默揚雄稱其德曰谷口鄭子真耕于岩石之下名振京師史記灌夫傳灌夫亦倚魏其而通列侯宗室為名髙兩人相為引重其游如父子然相得歡甚無厭恨相知晚也王褒聖主得賢臣頌聚精㑹神相得益彰濠梁同見招莊子莊子與惠子遊于濠梁之上楊素詩濠梁暮共往一統志鳳陽府濠水有二源東源出鍾乳山西源出鏌鋣山二水至升髙橋合流至府舊城西南有石絶水謂之濠梁又號石梁河莊子嘗觀魚于此陶潛詩山澤久見招胡事乃躊蹰平生為幽興嵇康絶交書時與親舊叙闊陳說平生顔延之詩雖為五載别相與昧平生晉書王徽之傳居山隂夜雪初霽忽憶戴逵乘船詣之造門不前而返人問其故曰乘興而來興盡而返何必見安道耶陳子昂詩山深興轉幽未惜馬蹄遙莊子馬蹄可以踐霜雪曹植詩俯身散馬蹄吳均詩青莎沒馬蹄盧思道詩寄語當窗婦非關惜馬蹄送翰林張司馬南海勒碑原注相公製文唐翰林故事翰林院在銀臺門內天下以藝能伎術召見者之所處也黃鶴注按唐志翰林無司馬今題云勒碑其文又是相國已製則張非文詞之士殆鐫工之精者按南詔傳𤣥宗詔何履光以兵定南詔境立馬援銅柱乃還蓋在天寶七載恐是此時往勒碑唐志廣州南海郡屬嶺南道冠冕通南極左傳王使詹桓伯辭于晉曰我在伯父猶衣服之有冠冕風俗通黃帝始制冠冕垂衣裳北史李賢傳論位髙望重光國榮家跗萼連暉椒聊繁衍冠冕之盛當時莫與比焉王融詩迹殊冠冕客淮南子章亥自北極步至南極郭璞江賦竭南極窮東荒漢書天文志老人星曰南極宋書天文志周天三百六十五度五百八十九分度之百四十五半覆地上半在地下其二端謂之南極北極文章落上台禮記立權度量考文章史記儒林傳文章爾雅典論論文蓋文章經國之大業不朽之盛事晉書天文志東壁二星主文章又三台六星兩兩而居起文昌列抵太微一曰天柱三公之位也在人曰三公在天曰三台主開德宣符也西近文昌二星曰上台為司命主夀次二星曰中台為司中主宗室東二星曰下台為司祿主兵所以昭德塞違也詔從三殿去漢舊儀詔書以朱鈞施行東觀漢紀第五倫每見光武詔書常嘆息曰此聖主也曹植表即日奉手詔驚喜踴躍釋名詔照也人暗不見事以此示之使昭然也又告也教也雍録翰林院東當三院三殿者麟德殿也一殿而有三面故名三殿三院即三殿也李絳為中書舍人嘗言為舍人踰月不得賜對有詔明日對三殿碑到百蠻開廣韻碑被也宗廟以麗牲後人因之銘勒功德詩因時百蠻毛萇傳百蠻蠻服之百國漢書陳湯傳威振百蠻武暢四海東都賦內撫諸夏外綏百蠻沈佺期詩問我投何處西南盡百蠻野館濃花發謝惠連詩飲餞野亭館分袂澄湖隂庾信喜晴詩水白澄還淺花紅曝更濃又鳥囀歌來花濃雪聚劉孝威詩葉舒非漸大花發是初開春帆細雨來何遜南還道中詩遽逐春流返歸帆得望家盧僎詩曉騎辭朝逺春帆向楚長拾遺記行者歌曰清風細雨雜香來梁簡文帝詩冷風雜細雨張正見詩細雨濯梅林楊師道詩窗臨鳳凰沼颯颯雨聲來不知滄海上庾信遊仙詩不知髙幾里低頭看世間楊子浮滄海而知江河之惡沱也春秋繁露受命而海內順之猶衆星之拱北辰流水之宗滄海也應瑒詩浩浩長河水九折東北流晨夜赴滄海海流亦何抽史記孝武紀李少君曰臣嘗遊海上見安期生隂鏗詩海上春雲雜天際晚帆孤天遣幾時回茅山父老歌白鶴翔青天何時復來遊庾信詩何時得雲雨復見翔寥廓江淹詩遊子何時還王灣洛陽人登先天進士第開元初為滎陽主簿馬懷素請校正羣籍召學涉之士分部撰次灣在選中祕書罷撰又與陸紹伯等同校麗正院書終洛陽尉灣詞翰早著其海日生殘夜江春入舊年之句當時稱最張說手題於政事堂每示能文令為楷式次北固山下水經注京城西北有别嶺入江三面臨水髙數十丈號曰北固一統志北固山在鎮江府治北下臨長江其勢險固客路青山外梁昭明太子樂府行客行路遙故鄉日迢迢簡文帝詩緑潭倒雲氣青山銜日規古詩夕宿青山外宋之問詩函谷青山外昆明落日邊行舟緑水前周禮考工記作舟以行水漢書溝洫志蜀守李冰穿二江成都中皆可行舟魏文帝善哉行湯湯川流中有行舟杜審言詩行舟縈緑水東京賦渌水淡淡張華詩俯臨渌水流南史庾杲之傳庾景行泛渌水依芙蓉何其麗也潮平兩岸闊王僧孺詩漾漾旦潮平水經注兩岸雙闕善能雲舉岑之敬詩河渡冰開兩岸分庾信詩寒沙兩岸白祖孫登詩岸闊蓮香逺風正一帆懸漢書律厯志至治之世天地之氣合以生風天地之風氣正十二律定廣韻帆舟上幔趙冬曦詩風帆摩天垠孫綽望海賦商客齊唱潮流往還各資順勢雙帆同懸海日生殘夜齊地記不夜城蓋古有日夜出此城以不夜名異之也泰山記日觀雞鳴時見日始欲出長三丈所江春入舊年杜審言詩雲霞出海曙梅柳渡江春李嶠詩霞滿蜀江春鮑照凌烟樓序賞絶舊年張說詩惟願聖君無限夀長取新年續舊年鄉書何處達歸雁洛陽邊何遜樂府故鄉有書信縱橫印檢開史記楚世家楚人有好以弱弓微􅗤加歸雁之上者漢書蘇武傳常惠教使者言天子射上林中得雁足有係帛書言武等在某澤中陸雲詩願假歸鴻翼翻飛浙江汜范雲詩寄書雲間雁為我西北飛一統志河南府洛陽縣本成周地居洛水之北故曰洛陽盧象字緯卿汶水人開元中由前進士補祕書郎轉右衛倉曹掾丞相張九齡深器之擢左補闕河南府司録司勳員外郎名盛氣髙少所卑下左遷齊邠鄭三郡司馬入為膳部員外郎集十二卷峽中作唐太宗詩别鶴棲琴裏離猿啼峽中髙唐數百里宋玉髙唐賦序楚襄王與宋玉遊于雲夢之臺望髙唐之觀襄陽耆舊傳楚懷王遊于髙唐夢與神遇自稱巫山之女王遂為置觀于巫山之南號為朝雲至襄王時復遊髙唐荆州記宜都宜昌縣三峽七百里兩岸連山略無絶處樹色接陽臺江淹詩風光多樹色露華翻蕙隂何遜詩山烟涵樹色江水映霞暉張正見賦苔畫波文花然樹色宋玉髙唐賦旦為朝雲暮為行雨朝朝暮暮陽臺之下寰宇記陽雲臺髙一百二十丈南枕長江宋玉云遊陽雲之臺望髙唐之觀即此也方輿勝覽神女廟在巫山縣西北三百五十步有陽臺一統志陽臺在巫山縣治西北晚見江山霽徐陵下州郡璽書峽雲晚霽星象夜張宋之問詩晚霽江天好謝靈運詩江山共間曠雲日相照媚王融詩襟袖三春隔江山千里長王勃靈瑞寺碑每至兩江春返四野初晴山川霽而風景凉林甸清而雲霧絶宵聞風雨來王融詩潺湲石溜寫綿蠻山鳥聞詩風雨淒淒雞鳴喈喈宋玉九辨何曽華之無實兮從風雨而飛揚陶潛詩微雨從東來