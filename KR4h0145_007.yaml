body:
  text: 欽定四庫全書御選唐詩卷四五言古李白與周剛清溪玉鏡潭宴别原注潭在秋浦桃胡陂下余新名此潭一統志池州府清溪源出洘溪山與石人嶺水合北流匯為玉鏡潭又東流經府門外復折而北至清溪口入大江康樂上官去永嘉遊石門宋書謝靈運封康樂公性奢豪車服鮮麗器物多改舊制世共宗之咸稱謝康樂也出為永嘉太守肆意遊遨所至輒為詩遊名山志石門澗六處石門遡水上入兩山兩邊石壁右邊石巖下臨澗水靈運登石門最髙頂詩晨策尋絶壁夕息在山栖疏峰抗髙館對嶺臨回溪江亭有孤嶼謝靈運登江中孤嶼詩江南倦遊覽江北曠周旋懷雜道轉迥尋異景不延亂流趨正絶孤嶼媚中川雲日相輝映空水共澄鮮千載跡猶存我來憩秋浦一統志秋浦在池州府城西南八十里長八十里闊三十里四時景色宛如瀟湘沿革志秋浦隋縣名池陽記秋浦帶郡城南連驛道為舟楫之路三入桃陂源千峰照積雪九歌斫冰兮積雪劉歆遂初賦漂積雪之皚皚兮涉凝露之隆霜陶潛詩袁安困積雪邈然不可千萬壑盡啼猿世說千巖競秀萬壑爭流鮑照詩千巖盛積阻萬壑勢瀠洄水經注巴東三峽巫峽長猿啼三聲斷人腸謝靈運詩噭噭夜猿啼興與謝公合文因周子論掃崖去落葉後漢書鄭太傅猶以烈風掃彼枯葉陶潛詩空庭多落葉慨然知己秋丘遲詩檐際落黃葉席月開清樽陶𢎞景解官表席月澗門橫琴雲際劉苞詩清樽久不薦淹留遂待君溪當大樓南補注大樓山名一統志山在池州府城南七十里溪水正南奔回作玉鏡潭澄明洗心魂梁元帝詩月華似璧星如珮流影澄明玉堂內江淹詩何用苦心魂此中得佳境陶潛詩此中有真意晉書漸入佳境可以絶囂喧謝靈運王子晉讃王子愛清淨區中實囂喧清夜方歸來酣歌出平原尚書酣歌于室左傳凡平原出水為大水上林賦馳丘陵上平原鮑照蕪城賦瀰迤平原别後經此地為余謝蘭蓀楚詞蓀橈兮蘭旌注香草也舊唐書崔慎由傳挺松筠之貞姿服蘭蓀之懿行望廬上瀑布水釋慧逺廬山記山在尋陽南有匡裕先生者出殷周之際隱遁潛居其下受道於仙人而共嶺時謂所止為仙人之廬而命焉其山大嶺凡七重圓基周回垂三五百里東南有香爐山其上氛氳若香烟西南石門前有雙闕壁立千餘仞而瀑布流焉一統志廬山在九江府南二十五里山之陽為南康山之隂為九江西登香爐峯廬山記山東南有香爐峯孤峯秀起游氣籠其上即棼藴若烟南見瀑布水挂流三百丈廬山記瀑布水在黃龍西北數里水出山腹中挂流三四百丈飛湍出林表望之如懸素水經注廬山北石門有雙石髙竦其狀如門水導雙石中懸流飛瀑望之連天若曳飛練於天中矣噴壑數十里歘如飛電來江總驄馬驅樂府萬里朝飛電論功易走丸隱若白虹起禮記君子比德于玉氣如白虹天也初驚河漢落古詩河漢清且淺相去復幾許半灑雲天裏莊子黃帝得之以登雲天謝靈運詩岱宗秀維嶽崔崒刺雲天仰觀勢轉雄壯哉造化功賈誼賦天地為爐兮造化為工海風吹不斷淮南子天下之物莫柔於水斬之不斷焚之不然江月照還空何遜宿南浦詩違鄉已信次江月初三五空中亂潨射廣韻潨水㑹也左右洗青壁晉書宋纎傳丹崖百丈青壁千尋梁簡文帝箏賦依青壁而懷芳飛珠散輕霞謝莊詩夕天霽晚氣輕霞澄暮雲謝瞻詩輕霞冠秋日迅商薄晴空流沫拂穹石莊子孔子觀於吕梁懸水三千仞流沫四十里司馬相如上林賦赴隘狹之口觸穹石激堆崎而我樂名山書所過名山大川史記自殽以東名山五自華以西名山七對之心益閒孫綽遊天台山賦遊覽既周體靜心閒無論潄瓊液郭璞蜂賦吮瓊液於懸峯吸頳津於晨景且得洗塵顔但諧宿所好陶潛詩詩書敦宿好林園無俗情永願辭人間史記留侯世家願棄人間事欲從赤松子遊耳髙士傳宗測少靜退不樂人間遂往廬山止祖舊宅遊太山唐書地理志兖州魯郡乾封縣有泰山一統志太山在泰安州北五里即東嶽岱宗也其山屈曲盤道至絶頂髙四十餘里四月上太山石屏御道開本集自注天寶元年四月從故御道上太山孫綽遊天台賦踐莓苔之滑石搏壁立之翠屏虞茂詩金溝低御道虞世南詩油雲隂御道六龍過萬壑易時乘六龍以御天漢官儀天子法駕所乘曰金根車駕六龍以御天下晉書顧愷之傳萬壑爭流鮑照詩萬壑勢縈回澗谷隨縈回爾雅山夾水曰澗水注溪曰谷水經注太山中溪水東南流徑東天門下出下谷東流古者帝王升封處憩此水水上往往有石竅存焉蓋古設舍所跨處也一統志太山下有東中西三溪馬跡繞碧峯江淹賦刻劃崷崒兮山雲而碧峯于今滿青苔淮南子谷之汙生以青苔江淹賦嗟青苔之依依兮無色類而可方游名山志緣崖而上悉青苔無别草木飛流灑絶巘孫綽遊天台賦瀑布飛流以界道謝靈運賦泉飛流以㵼空詩陟則在巘注小山别於大山也唐太宗小山賦參差絶巘威紆短徑水急松聲哀蕭慤詩泉鳴知水急泰山記小天門有秦時五大夫松宋玉髙唐賦不見其底虛聞松聲鮑照詩復澗隱松聲北眺崿嶂竒西都賦北眺五陵鮑照詩合沓崿嶂雲傾崖向東摧水經注空岫隂深邃澗暗密傾崖上合恆有落勢洞門閉石扇泰山記泰山西巖為仙人石門茅君內傳岱宗之洞周回三千里名曰三宫空洞之天謝靈運詩石閭何暗靄明堂祕靈篇江總文平臺纍陟石扇暫履地底興雲雷易雷出地奮公羊傳觸石而出膚寸而合不崇朝而遍雨乎天下者其泰山之雲乎登髙望蓬瀛泰山記泰山東南巖有日觀者雞一鳴時見日始出有秦觀者望見長安吳觀者望見㑹稽周觀者望見鎬阮籍詩登髙望九州劉孝綽詩無因追羽翰及爾宴蓬瀛唐太宗小山賦想蓬瀛兮靡覿望崑閬兮難期想像金銀臺曹植賦遺情想像史記封禪書蓬萊方丈瀛洲此三神山者諸仙人存焉郭璞遊仙詩吞舟涌海底髙浪駕蓬萊神仙排雲出但見金銀臺天門一長嘯漢官儀泰山東上七十里至天門泰山記泰山盤道屈曲而上凡五十餘盤經小天門大天門仰視天門如從穴中窺天窗一統志泰山有東西二天門後漢書向栩傳栩少為書生不好言語而好長嘯成公綏嘯賦邈跨俗而遺身乃慷慨而長嘯萬里清風來成公綏嘯賦飄遊雲於太清集長風乎萬里左思詩長嘯激清風玉女四五人漢武內傳帝閒居承華殿見一女子曰我墉宫玉女王子登也至七月七日王母暫來言訖不知所在神異經東荒中有大石室東王公居之常與玉女共投壺王延夀魯靈光殿賦神仙嶽嶽於棟間玉女窺窗而下視一統志泰山巔有玉女池飄颻下九垓淮南子吾與汗漫期於九垓之外司馬相如封禪文上暢九垓下泝八埏郭璞詩飄颻戲九垓含笑引素手齊武帝詩含笑一轉私自憐古詩纎纎出素手遺我流霞杯司馬相如大人賦呼吸沆瀣飱朝霞揚雄甘泉賦吸清雲之流霞論衡河東項曼斯好道曰有數仙人飲我流霞一杯數月不飢吳均七夕詩神仙定不及寧用流霞杯稽首再拜之自愧非仙才漢武內傳西王母曰劉徹好道然形慢神穢雖當語之以至道殆恐非仙才也曠然小宇宙養生論曠然無憂思孟子登泰山而小天下後漢書仲長統傳可以凌霄漢出宇宙之外矣棄世何悠哉莊子夫欲免為形者莫如棄世棄世則無纍成公綏嘯賦傲世忘榮絶棄人事謝朓詩耳目暫無擾懷古何悠哉於按李白詩意以仙才自負俯視人間昔賀知章見白長安解金龜換酒謂白曰子謫仙人也世遂以謫仙稱之此詩託興與郭璞遊仙諸詩同指而風格過之雖其淪落之餘不無感慨襟期浩然可想見其生平也二平明登日觀史記留侯世家老父謂良曰孺子可教矣後五日平明與我㑹此水經注太山東南山頂名曰日觀峯雞一鳴時日始欲出長三丈許舉手開雲關王勃詩晨征犯烟磴夕憩在雲關精神四飛揚莊子精神四達上際於天下蟠於地又齊戒疏瀹而心澡雪而精神詩載飛載揚漢髙帝大風歌大風起兮雲飛揚如出天地間易以言乎天地之間則備矣黃河從西來水經河水東入塞過敦煌酒泉張掖郡南又東過隴西窈窕入逺山曹植飛龍篇晨遊太山雲霧窈窕謝朓詩仄徑既窈窕環洲亦玲瓏憑崖攬八極謝靈運山居賦髙居唐而胥宇臺依崖而穴墀鮑照詩凌崖採三露攀鴻戲五烟謝朓詩凌崖必千仞尋蹊將萬轉列子至人揮斥八極神氣不變淮南子八紘之外乃有八極陸機文賦精騖八極心遊萬仞目盡長空間唐太宗詩目盡結長空偶然值青童真詰茅山天市壇昔東海青童君曽乘獨輪飛飇之車按行此山緑髮雙雲鬟神仙傳麻姑是好女子年十八九許於頂中作髻餘髮垂至腰笑我晚學仙神仙傳漢武遣使者行河東忽見一女子笞一老翁俯首跪受杖使者怪問之女曰此翁乃妾之子也昔吾舅氏伯山甫以神藥教妾妾教子服之不肯今遂衰老行不及妾故杖之隋書王貞傳仰而不至方見學仙之逺蹉跎凋朱顔楚詞驥垂兩耳中坂蹉跎阮籍詩娛樂未及終白日忽蹉跎楚詞美人既醉朱顔酡鮑照詩暉暉朱顔酡紛紛織女梭王康琚詩凝霜凋朱顔躊躇忽不見詩愛而不見搔首躊躇浩蕩難追攀楚詞怨靈修兮浩蕩又心飛揚兮浩蕩王粲詩朋友相追攀三日觀東北傾尸子泰山上有三峯東曰日觀雞鳴時見日出西曰秦觀可望長安始皇登此西望故名又西曰越觀可望㑹稽一名月觀以與日觀相對南史沈炯傳炯嘗獨行經漢武通天臺為表奏曰射之罘於海浦禮日觀而稱功顔延之詩𤣥天髙北列日觀臨東溟楚詞天問康回憑怒地何故以東南傾注康回共工名淮南子共工之力觸不周之山使地東南傾陸機詩招搖西北指天漢東南傾兩崖夾雙石海水落眼前古樂府枯桑知天風海水知天寒梁簡文帝怨歌行秋風吹海水寒霜依玉除何遜七召望雲氣而款關候海水而重譯庾信齊王進赤雀表海水無波天星不動天光搖空碧左傳有山之材而照之以天光張衡東京賦登天光於扶桑傅休奕詩枝燈若火樹庭燎繼天光江淹水上神女賦野田田而虛翠水湛湛而空碧千峯爭攢聚孔稚圭北山移文列壑爭譏攢峯竦誚謝靈運浮雲讃俄巳就飛散豈得復攢聚萬壑絶凌歷晉書顧愷之傳愷之至荆州人問以㑹稽山水之狀愷之云千巖競秀萬壑爭流鮑照登廬山詩千巖盛阻積萬壑勢回縈江淹詩萬壑共馳騖百谷爭往來緬彼鶴上仙家語緬然長思出于四門周章逺望廣韻緬彌兖切逺也水經注幽烟冥緬非生人所安支遁詩晞陽熙春圃悠緬歎時往陶潛感士不遇賦蒼冥遐緬人事無巳列仙傳王子晉好吹笙作鳯鳴游伊雒間道士浮丘公接上嵩山二十餘年後來於山上告桓良曰告我家七月七日待我緱氏山頭果乘白鶴駐山顛望之不得到舉手謝時人而去去無雲中跡神仙傳雞鳴天上犬吠雲中長松入雲漢穆天子傳天子升長松之隥戰國策荆有長松文梓孫綽賦䕃落落之長松薛道衡詩簷隂翻細柳澗影落長松晉書皇甫謐傳時清道真可以冲邁此真吾生濯髮雲漢鴻漸之秋也逺望不盈尺楚詞逺望兮芊眠晉書羊祜傳嘗謂從事鄒湛等曰自有宇宙便有此山由來賢達勝士登此逺望如我與卿者多矣雪賦盈尺則呈瑞於豐年李善文選序周巡綿嶠品盈尺之珍楚望長瀾搜徑寸之寶山花異人間徐陵山齊詩山花臨舞席水影照歌牀庾信隱士詩野鳥繁絃轉山花焰火然又五張寺經藏碑皮紙骨筆木葉山花象負之所未勝龍藏之所不盡史記留侯曰願棄人間事從赤松子遊髙士傳宗測少靜退不樂人間遂往廬山止祖舊宅五月雪中白爾雅五月為臯禮月令是月也日長至半夏生木槿榮鮑照詩隂崖積夏雪陽谷散秋榮江總詩梅花色白雪中明庾信咏園花詩自紅無假染真白不須粧王勃詩桂密巖花白終當遇安期漢書郊祀志李少君曰臣嘗遊海上見安期生安期生食臣棗大如爪安期生仙者通蓬萊中合則見不合則隱郭璞詩安期煉五石於此鍊玉液漢武內傳上藥有風實雲子玉液金漿洞簫賦朝露清泠而隕其側兮玉液浸潤而承其根江淹詩道人讀丹經方士鍊玉液奉陪商州裴使君遊石娥溪李白自注時欲東遊遂有此贈一統志西安府商縣唐初為商州天寶初為上洛郡乾元初復為商州屬關內道按石娥溪一名仙娥溪商州志仙娥峯丹青斑駁天然圖畫唐人名峯下水曰仙娥溪名勝志仙娥峯洞壑幽邃李白嘗遊焉有橫天聳翠壁噴壑鳴紅泉之句裴公有仙標拔俗數千丈後漢書仲長統傳至人能變達士拔俗孔稚圭北山移文耿介拔俗之標世說庾子嵩目和嶠森森如千丈松淡蕩滄洲雲鮑照詩春風淡蕩俠思多揚雄激靈賦世有黃公起於滄洲怡神養性與道浮游南史張充傳飛竿釣渚濯足滄洲飄颻紫霞想趙景真與嵇茂齊書飄颻逺遊之士託身無人之鄉黃庭內景經上清紫霞虛皇前注紫霞宫一名紫瓊宫陸機詩輕舉凌紫霞剖竹商洛間晉書良吏傳論建旟剖竹漢書地理志𢎞農郡縣商上洛班固西都賦商洛緣其隈鄠杜濵其足注商洛山名括地志商州東八十里商洛縣古之商國卨所封也政成心巳閒詩豳風疏述其政教之成則為豳頌蕭條出世表楚辭山蕭條而無獸兮野寂寞其無人陸機列仙賦夫何列仙𤣥妙超攝生乎世表冥寂閉𤣥關郭璞詩中有冥寂士顔延之詩劉伶善閉關王屮頭陀寺碑𤣥關幽鍵感而遂通我來屬芳節解榻時相悅後漢書徐稚傳陳蕃為稚特設一榻去則懸之宋之問詩一朝逢解榻纍日共銜杯禮記相說以解按說與悅同褰帷對雲峯後漢書賈琮傳為冀州傳車垂赤帷裳琮曰刺史當逺視廣聽何垂帷裳以自掩乎命褰之江淹詩平明登雲峯杳與廬霍絶揚袂指松雪曹植酒賦或揚袂屢舞或拍劍清歌顔延之詩山明望松雪暫出東城邊史記項羽紀項王乃復引兵而東至東城乃有二十八騎遂遊西巖前南史雷次宗傳徵詣郡為築室於雞籠山西巖下謂之招隱館橫天聳翠壁梁簡文帝烏栖曲北斗橫天月將落江總貞女峽賦聳翠壁以臨危噴壑鳴紅泉謝靈運山居賦訪鍾乳於洞穴訊丹砂於紅泉尋幽殊未歇左傳得臣猶在憂未歇也愛此春光發沈約詩春光發隴首溪旁饒名花石上有好月命駕歸去來世說東平吕安服嵇康髙致每一相思千里命駕陶潛歸去來辭歸去來兮田園將蕪胡不歸露華生翠苔王儉春夕詩露華方照嵗雲彩復經春說文苔蘚也在垣曰垣衣在屋曰苔邪淹留惜將晚楚辭攀桂枝兮聊淹留復聽青猿哀青猿斷人腸荆州記巴東三峽歌云猿啼三聲斷人腸遊子思故鄉漢書髙帝紀謂沛父兄曰遊子悲故鄉魏文帝詩綿綿思故鄉明發首東路詩明發不寐有懷二人疏夜地暗至旦而明明地開發故謂之明發也漢書韓信傳北首燕路注首趣向也式究切顔延之詩振策眷東路傾側不及羣此歡焉可忘宿巫山下漢書注巫山在南郡巫縣西南方輿勝覽巫峽杜宇所鑿以通江水紀要在巫山縣南三十里蜀人謂之東峽以在蜀境東也昨夜巫山下盛𢎞之荆州記西峽巫峽歸峽七百里中兩岸連山略無闕處重巖疊嶂隱天蔽日自非亭午夜分不見日月也入蜀記巫山峯巒上入霄漢山腳直插江中十二峯不可悉見所見八九峯惟神女峯最纎麗竒峭宜為仙真所托凝真觀後山半有石壇平曠傳是禹見神女授符書於此詩在南山之下猿聲夢裏長水經注三峽每晴初霜旦林寒澗肅有髙猿長嘯屬引淒異空岫傳響故漁者歌曰巴東三峽巫峽長猿鳴三聲淚沾裳庾信枯樹賦對月峽而吟猿入蜀記祝史云每八月十五夜月明時有絲竹之音往來峯頂山猿皆鳴逹旦桃花飛緑水三月下瞿塘詩桃之夭夭灼灼其華禮記仲春之月桃始華漢書溝洫志河決而桃華水洋溢注三月水漲也荆州記巫峽當冬春之間則素湍緑潭回清倒影張正見樂府櫂折桃花水帆橫竹箭流水經注峽中有瞿塘黃龕二灘泝沿所忌圖經瞿塘峽在䕫州東一里舊名西陵峽瞿塘乃三峽之門峽口有灧澦堆古樂府灧澦大如馬瞿塘不可下方輿紀要在䕫府東八里兩崖對峙中貫一江雨色風吹去宋之問詩雨色搖丹嶂宋玉髙唐賦序巫山之女曰旦為朝雲暮為行雨朝朝暮暮陽臺之下又湫兮如風淒兮如雨風止雨霽雲無處所南行拂楚王詩悠悠南行襄陽耆舊傳赤帝女曰瑤姬未行而卒葬于巫山楚懷王遊髙唐夢與神遇遂為置觀號曰朝雲髙唐賦序楚襄王與宋玉遊于雲夢之臺玉曰昔者先王嘗遊髙唐怠而晝寢夢見一婦人曰妾巫山之女也為髙唐之客聞君遊髙唐願薦枕席王因幸之注雲夢楚藪也在南郡華容縣九域志大仙廟巫山神女祠也髙丘懷宋玉髙唐賦序妾在巫山之陽髙丘之阻史記屈原傳楚有宋玉景荖之徒皆好辭而以賦見稱王逸楚詞注宋玉郢人屈原弟子為楚大夫訪古一霑裳江淹詩常慕先達槩觀古論得失漢鐃歌臨水逺望泣下霑衣梁元帝詩寒夜猿聲徹遊子淚沾裳經下邳圯橋懷張子房一統志邳州在淮安府城西北四百五十里秦置下邳縣圯橋在城東南隅漢書張良嘗遊下邳圯上有一老父直墮其履圯下顧謂良曰孺子下取履良愕然欲歐之為其老乃彊忍下取履因跪進父以足受之笑而去復還曰孺子可教矣後五日平明與我期此良曰諾五日平明良往父巳先在怒曰與老人期後何也去後五日蚤㑹五日雞鳴往父又先在復怒曰後何也去後五日復早來五日良夜未半往有頃父亦來喜曰當如是出一編書曰讀是則為王者師後十年興十三年孺子見我濟北穀城山下黃石即我巳遂去不見子房未虎嘯破産不為家王褒聖主得賢臣頌虎嘯而谷風冽漢書良家僮三百人弟死不葬悉以家財求客刺秦王為韓報仇以五世相韓故滄海得壯士椎秦博浪沙漢書良嘗學禮淮陽東見倉海君得力士為鐵椎重百二十斤秦皇帝東遊至博浪沙中良與客狙擊秦皇帝誤中副車秦皇帝大怒大索天下求賊甚急良乃更名姓亡匿下邳師古注倉海君當世賢者之號又博浪沙河南陽武南地名浪舊作狼報韓雖不成天地皆震動漢書良曰家世相韓及韓滅不愛萬金之資為韓報仇彊秦天下震動潛匿遊下邳豈曰非智勇史記運籌帷幄之中制勝於無形子房謀計其事無智名無勇功漢書贊聞張良之智勇以為其貌魁梧竒偉反若婦人女子我來圯橋上懷古欽英風北山移文張英風於海甸唯見碧流水曽無黃石公歎息此人去蕭條徐泗空一統志泗水出山東泗水縣南流過沛縣至徐州城東北合沛水入淮待酒不至玉壺繫青絲辛延年詩就我求清酒絲繩提玉壺鮑照詩清如玉壺氷直如朱絲繩沽酒來何遲史記滑稽傳武帝徵北海太守詣行在所有文學卒史王先生者自請與太守俱至宫下待詔宫府門王先生徒懷錢沽酒與衛卒僕射飲日醉不視其太守禮記夫子曰賜爾來何遲也山花向我笑徐陵詩山花臨舞席水影照歌牀庾信詩野鳥繁絃轉山花焰火然詩顧我則笑沈攸之詩花笑鶯歌詠正好銜杯時劉伶酒德頌捧罌承槽銜杯潄醪晚酌東山下流鶯復在兹春風與客醉魏志徐邈傳時科禁酒而邈私飲至於沈醉校事趙達問以曹事邈曰中聖人達白之太祖太祖甚怒度遼將軍鮮于輔進曰平日醉客謂酒清者為聖人濁者為賢人邈性修慎偶醉言耳王績詩春來日漸長醉客喜年光今日仍相宜望月有懷清泉映疏松水經注寒松上䕃清泉下注虞騫詩疏松含白水不知幾千古嵩髙山記嵩嶽有大松或千嵗百嵗傅𤣥詩世有千年松寒月搖清波魏文帝詩俯視清水波仰看明月光流光入窗户曹植詩明月照髙樓流光正徘徊沈約月詩方暉竟户入圓影隙中來郭璞詩風出窗户裏對此空長吟楚辭立江介而長吟兮禰衡賦長吟逺慕哀鳴感類思君意何深古詩思君令人老嵗月忽巳晚漢書陸賈傳陳平常燕居深念賈往不請直入坐陳平方念不見賈賈曰念何深也陸機詩離思一何深無因見安道興盡愁人心晉書王徽之傳常居山隂夜雪初霽月色清朗忽憶戴逵在剡夜乘小船詣之造門不前而反人問其故曰本乘興而來興盡而反何必見安道耶梁簡文帝詩裁紅㸃翠愁人心庾肩吾詩樓上徘徊月窗中愁思人落日憶山中雨後烟景緑江淹惜晚春詩烟景抱空意蘅杜綴幽心晴天散餘霞謝朓詩餘霞散成綺澄江淨如練東風隨春歸禮記東風解凍爾雅東風曰谷風古詩四顧何茫茫東風搖百草發我枝上花宗懍詩鶯嗚一兩轉花發數重開張正見詩花影發新枝花落時欲暮前溪歌花落逐水去何當順流還梁元帝詩獨念春花落還似昔春時詩曰歸曰歸嵗亦暮止鮑照詩紅顔零落嵗將暮寒光宛轉時欲沈見此令人嗟崔融瓦松賦彼懷寶而遇賞此不材而見嗟願遊名山去禮記名山大澤不以封史記孟子荀卿傳鄒衍作書十餘萬言先列中國名山大川水土所殖物類所珍又報任安書藏之名山傳之其人學道飛丹砂李陽冰太白詩序天子知其不可留賜金歸之遂請北海髙天師授道籙於齊州紫極宫劉全白李翰林碣志尚道術謂神仙可致史記封禪書李少君言祀竈則致物致物則丹砂可化為黃金左思蜀都賦丹砂赩熾出其坂蜜房郁育被其阜梁武帝樂府但使丹砂就能令億萬年春日獨酌東風扇淑氣禮記東風解凍南史宋衡陽王義季傳陽和扇氣播厥之始陸機詩蕙草饒淑氣水木榮春暉水經注目對魚鳥水木明瑟謝混遊西池詩景仄鳴禽集水木湛清華謝朓杜若賦憑瑤圃而宣游臨水木而延佇陸機詩萍以春暉江總詩二月春暉暉雙燕理毛衣白日照緑草班固答賔戲守窔奧之熒燭未仰天庭而覩白日古詩浮雲蔽白日遊子不顧返鮑照詩春吹回白日霜髙落塞鴻謝朓髙齊視事詩餘雪映青山寒霧開白日梁昭明太子七契夾鐘之節春景依遲碧樹初蕊緑草含滋徐陵與王僧辨書闢緑草於應門開青槐於武庫江總詩乍愜南階悲緑草誰堪東陌怨黃金落花散且飛庾信馬射賦落花與芝蓋同飛楊栁共春旗一色梁簡文帝詩偏使紅花散飄揚落眼前劉楨詩芙蓉散其花菡萏溢金塘梁簡文帝箏賦玩飛花之度窗看春風之入栁孤雲還空山陶潛咏貧士詩萬族各有托孤雲獨無依衆鳥各已歸晉書穆帝紀升平四年鳳凰復見豐城衆鳥隨之淮南子赤肉懸則烏鵲集鷹隼鷙則衆鳥散陶潛詩衆鳥欣有託吾亦愛吾廬謝朓詩日出衆鳥散山暝孤猿吟楚辭因歸鳥而致辭兮羌迅髙而難當曹植詩歸鳥赴喬林翩翩厲羽翼劉琨詩浮雲為我結歸鳥為我旋彼物皆有託陸機詩女蘿亦有托蔓葛亦有尋何邵詩吉士懷貞心悟物思有託吾生獨無依莊子養生主吾生也有涯而知也無涯西都賦排飛闥而上出若遊目於天表似無依而洋洋曹植愁思賦原野蕭條兮烟無依對此石上月張正見樂府看花憶塞草對月想邊秋長醉歌芳菲傅毅舞賦禮有三爵之制頌有醉歸之歌楚辭芳菲菲其彌章庾肩吾詩佳期竟不歸春日生芳菲二我有紫霞想陸機詩輕舉乘紫霞緬懷滄洲間陶潛扇上畫贊緬懷千載托契孤遊虞世基詩緬懷古人節思酬明主恩謝朓詩既歡懷祿情復協滄洲趣思對一壺酒北齊書李元忠傳孫騰司馬子如嘗共詣元忠見其坐樹下擁被對壺庾信答王司空餉酒詩開君一壺酒細酌對春風淡然萬事閒淮南子淡然無欲而民自朴禮記百官得其宜萬事得其理史記律書六律為萬事根本橫琴倚髙松陶𢎞景表席月澗門橫琴雲際庾信詩定知歡未足橫琴坐石根張華賦慕隴坻之髙松顔延之詩惜無丘園秀景行彼髙松把酒望逺山世說畢卓嘗謂人曰左手持蟹螯右手持酒杯拍浮酒船中便足了一生矣西京雜記卓文君眉色如望逺山陳子昂詩惟見逺山青長空去鳥沒唐太宗詩夕霧結長空張九齡詩歸雲納前嶺去鳥投遙村落日孤雲還謝靈運撰征賦望新晴於落日起明光於躋月隋煬帝白紵歌菱潭落日雙鳬舫江淹詩孤雲出北山宿烏驚東林又雨絶無還雲但恐光景晚漢書武帝紀詔曰朕郊祀上帝見羣鶴留止薦於泰畤光景並見宿昔成秋顔沈約詩宿昔減容顔王康琚詩凝霜凋朱顔月下獨酌花間一壺酒徐悱妻答外詩鳴鸝葉中舞戲蝶花間驚足南史梁世子方等傳嘗著論曰一壺之酒以養性一簞之食足以怡形獨酌無相親陶潛歸去來辭引壺觴以自酌宋書顔延之傳身居儉約不營財利布衣蔬食獨酌郊野當其為適旁若無人南史謝譓不妄交接門無雜賔有時獨酌曰入吾室者但有清風禮記上下相親謂之仁舉杯邀明月梁簡文帝詩欲祛九秋恨聊舉十千杯謝莊月賦隔千里兮共明月南史謝譓曰對我飲者惟當明月對影成三人列子黃帝書曰形動不生形而生影後漢書崔駰傳抱影獨立與士不羣易有不速之客三人來月既不解飲晉書孫綽傳嘗曰山濤吾所不解影徒隨我身說苑行非為影也而影隨之任昉詩形應影隨曩行今止何遜詩齊兒敢為俗蜀物豈隨身暫伴月將影行樂須及春漢書楊惲傳人生行樂耳須富貴何時夏侯湛春可樂賦春可樂兮樂東作之良時古詩行樂當及時謝萬春遊賦撫鳴琴而懷古登修臺而樂春我歌月徘徊詩我歌且謠魏武帝短歌行對酒當歌謝靈運善哉行擊節當歌對酒當酌曹植詩明月照髙樓流光正徘徊我舞影零亂詩蹲蹲舞我唐太宗詩隔棟歌塵合分階舞影連謝靈運詩清波時零亂醒時同交歡楚辭衆人皆醉我獨醒漢書陸賈傳謂陳平曰君何不交歡太尉深相結醉後各分散北史崔瞻傳性好讀書酒後清言聞者莫不傾耳陶潛詩放歡一遇既醉還休又人生無根蒂飄如陌上塵分散逐風轉此巳非常身謝靈運維摩經贊莫昵緣合時當視分散日永結無情遊詩心如結兮晉書郭文曰思由憶生不憶故無情庾杲之與劉虯書夫山水無情應之以㑹愛間在我相期邈雲漢江淹别賦至如一去絶國詎相見期詩倬彼雲漢為章于天張衡西京賦左牽牛而右織女似雲漢之無涯聽蜀僧濬彈琴蜀僧抱緑綺梁元帝纂要古琴名有緑綺司馬相如琴傅休奕琴譜序蔡雍有緑綺琴天下之名器也江總詩可憐嶧陽木裁為緑綺琴嵇康書抱琴行吟西下峨嵋峯一統志峩嵋山在四川嘉定州峩嵋縣南有大峩中峩小峩三山相連是為三峩為我一揮手沈炯詩為我彈清琴嵇康琴賦伯牙揮手鍾期聽聲如聽萬壑松纂要古琴曲有河間雜歌二十一章其一曰風入松江淹詩萬壑共馳霧百谷爭往來客心洗流水到溉詠琴詩寄語調絃者客子心易驚吕氏春秋伯牙方鼓琴志在流水鍾子期曰善哉湯湯乎若江河嵇康琴賦狀若崇山又象流波餘響入霜鐘陸瑜琴賦識竒響於餘烟山海經豐山有九鐘是知霜鳴郭璞曰霜降則鐘鳴故言知也纂要齊桓公琴名號鐘不覺碧山暮梁簡文帝賦逺山碧暮水紅劉希夷夏彈琴詩碧山崒岑寂素絲何清幽秋雲暗幾重柳惲詩隴首秋雲飛王儉賦下流雲而自重金陵聽韓侍御吹笛一統志應天府禹貢揚州之域戰國屬楚楚威王初置金陵邑因其地有王氣埋金以鎮之故名晉置江寧縣唐武德中改曰歸化尋改曰金陵韓公吹玉笛風俗通笛滌也所以滌邪穢納之雅正也西京雜記秦咸陽宫有玉笛長二尺三寸六孔吹之則見山林車馬隱隱鱗次息亦不見名曰昭華之琯倜儻流英音史記魯仲連傳好竒偉倜儻之畫策馮衍顯志賦既倜儻而髙引兮願觀其從容風吹繞鍾山南史雷次宗傳徵詣都為之築室於鍾山西巖下孔稚圭北山移文鍾山之英草堂之靈一統志鍾山在府東北周回六十里吳大帝為蔣子文立廟因改蔣山輿地志古曰金陵山一名北山齊周顒隱此其山磅礴竒秀比諸山特髙萬壑皆龍吟晉書顧愷之傳愷之至荆州人問以㑹稽山川之狀愷之云千巖競秀萬壑爭流鮑照登廬山詩萬壑勢回縈馬融長笛賦龍吟水中不見已截竹吹之聲相似周𢎞讓賦長笛吐清氣詩商聲傳後出龍吟鬱前吐王子停鳳管列仙傳王子喬好吹笙作鸞鳳鳴沈約詩沃若動龍驂參差凝鳳管師襄掩瑤琴家語孔子學琴於師襄子襄子曰吾雖擊磬以為官然能于琴鮑照詩明鏡塵匣中瑤琴生網羅餘韻度江去王獻之桃葉歌桃葉復桃葉渡江不用楫天涯安得尋古詩相去萬餘里各在天一涯贈黃山胡公求白鷴元和志黃山在太平縣西南四十里上有泉水泉側多黃連一統志黃山在徽州府城西北一百二十里世傳黃帝常與容成子浮丘公合丹於此禽經白鷴似山雞而色白張衡西京賦招白鷴下雙鵠請以雙白璧史記虞卿傳趙王賜白璧一雙鮑照詩羞當白璧貺買君雙白鷴西京雜記閩越王獻髙帝白鷴黑鷴各一雙白鷴白如錦世說曹毗才如白地光明錦白雪恥容顔宋玉賦肌如白雪江淹詩白雪凝瓊貌照影玉潭裏江淹詩何時秋海上照影弄長川虞騫詩泠泠玉潭水刷毛琪樹間梁元帝賦刷其羽毛梁簡文帝鳬詩刷羽向沙洲海內西經有文玉玗琪樹孫綽天台賦琪樹璀璨而垂珠夜棲寒月靜嵇康鴛鴦詩朝翔素瀨夕栖靈洲謝靈運詩鳥鳴識夜棲沈約詩月華臨靜夜朝步落花間盧思道孤鴻賦晨沐清露安趾徐步鍾嶸詩評落花依草禽經白鷴行止閒暇我願得此鳥淮南子一目之羅不可以得鳥玩之坐碧山列子海上人有好鷗鳥者每旦從鷗鳥遊其父曰汝取來吾玩之梁簡文帝賦逺山碧暮水紅胡公能輟贈籠寄野人還晉書王羲之傳山隂道士好養鵝羲之求之道士云為寫道德經當舉羣相贈羲之寫畢籠鵝而歸御選唐詩卷四
