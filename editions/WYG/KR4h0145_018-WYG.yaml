body:
  text: 欽定四庫全書御選唐詩巻十三五言律杜甫鄭氏東亭全唐詩鄭氏上有重題二字甫自注在新安界唐書地理志河南府縣新安華亭入翠微洛陽名園記環溪王開府宅園甚潔華亭者南臨池池左右翼而北過凉榭復滙為大池周圍如環故云然也爾雅山脊岡未及上翠微左思蜀都賦鬱葐蒀以翠微崛巍巍以峩峩注翠微山氣之輕縹也沈約樂府鶴樓峻連翠微庾信詩金鞍上翠微秋日亂清暉詩秋日萋萋江淹詩秋日懸清光傅休奕樂府素日馳清暉謝靈運詩山水含清暉崩石敧山樹江淹學梁王兔園賦崩石梧岸崱屴蔵隂庾信詩敧松横礙馬曹植詩大谷何寥廓山樹鬱蒼蒼蕭慤詩山樹動秋聲清漣曳水衣詩河水清且漣猗謝靈運侍汎舟詩風遼泠兮水漣猗廣韻曳牽也引也張協詩堂上水衣生紫鱗衝岸躍左思蜀都賦觴以清醥鮮以紫鱗張説謝上表窮鱗更躍汝南先賢傳葛𤣥見遺大魚者𤣥謂暫煩此魚到河伯處以丹書紙納魚口中擲水有頃魚還躍上岸吐墨書青黒色如木葉而飛張騫躍魚應詔詩何用游溟海且躍夭淵池摯虞觀魚賦攅聚輻蹙或躍或沈蒼隼䕶巢歸詩鴥彼飛隼説文隼鷙鳥傅休奕詩蒼隼時鷹揚左思蜀都賦巢居棲翔聿兼鄧林向晚尋征路隂鏗雪裏梅花詩今來漸異昨向晚判聖朝張九齡晚霽登王六東閣詩向晚白雲生鮑照詩雞鳴戒征路陳子昂詩離亭暗風雨征路入雲烟殘雲傍馬飛隋煬帝詩㫁霧時通日殘雲尚作雷漢髙祖大風歌大風起兮雲飛揚呉均詩簷上素雲飛庾信詩輕雲飄馬足李白宴陶家亭子白自注潯陽作曲巷幽人宅説文巷邑中道也直曰街曲曰巷梁昭明太子詩京華有曲巷易履道坦坦幽人貞吉詩此維與宅説文宅託也人所投託也髙門大士家漢書于定國傳定國父于公其閭門壊父老方共治之于公謂曰少髙大門閭令容駟馬髙葢車我治獄多隂徳子孫必有興者左傳衞侯與元咺訟士榮為大士注大士治獄官也池開照膽鏡詩滮池北流廣韻池沼也張説詩池如明鏡月華開西京雜記髙祖初入咸陽宫有方鏡廣四尺髙五尺九寸表裏洞明人直來照之影則倒見以手映心則見腸胃五蔵厯然無礙庾肩吾咏美人看畫詩相看如照鏡薛道衡豫章行見膽明鏡自生塵林吐破顔花説文平土有叢木曰林盧照鄰詩梅花扶院吐博物志合歡蠲忿萱草忘憂李百藥賦花飄香兮動笑緑水蔵春日張華詩仰映髙林茂俯臨緑水流南史庾杲之傳杲之字景行王儉用為衞將軍長史蕭緬與儉書曰庾景行汎緑水依芙蓉何其麗也又循吏傳序都邑之盛士女昌逸歌聲舞節炫服華粧桃花緑水之間秋月春風之下無往非適詩春日遲遲晉書樂志仁配春日威踰秋霜青軒秘晚霞鮑令暉詩灼灼青軒女冷冷髙堂中虞炎咏簾詩青軒明月時紫殿秋風日盧思道詩晚霞浮極浦盧照鄰詩龍銜寳葢承朝日鳳吐流蘇帶晚霞若聞絃管妙漢書張禹傳後堂理絲竹管絃郭璞燕賛商人是頌咏之絃管嵇康聲無哀樂論此必為至樂不可托之於瞽史必須聖人理其絃管爾乃雅音得全也許敬宗奉和三臺詩妙管含秦鳳仙姿麗斗牛金谷不能誇石崇金谷詩序予有别廬在河南縣界金谷澗晉書石崇傳崇有别館在河陽之金谷一名梓澤財産豐積室宇𢎞麗絲竹盡當時之選庖膳窮水陸之珍水經注金谷水在河南太白原東南流經石崇故居王維終南山一統志終南山在陜西西安府城南五十里一名南山東西連亘藍田咸寧長安盭厔四縣之境郡縣志終南山在京兆府萬年縣南五十里五經要義終南山長安南山也一名太乙潘岳關中記其山一名中南言在天之中居都之南故曰中南書終南惇物至于鳥鼠詩終南何有有條有梅又節彼南山維石巖巖左傳荆山終南九州之險也太乙近天都漢書太乙山又為終南山地理志武功縣有太乙山古文以為終南亦曰太白山在武功縣南去長安二百里俗云武功太白去天三百地理通釋終南南山之總名太乙一山之别號一統志太乙山在終南山南二十里連亘秀特上插雲霄名勝志終南山道書謂之太乙山關中三山記太白武功二山在郡縣葢舊武功縣地也今武功縣無此山按何景明曰太華終南太乙實一山延亘不絶太華在華隂終南在長安太白在郡各望其地異號命耳舊注終南在天之中居都之南故云近天都也晉書天文志天都星主衣裳文繡連山到海隅福地記終南山東接驪山太華西連太白至于隴山北去長安城八十里南入楚塞連屬東西諸山周迴數百里謝朓詩未辨連山極沈約詩連山無㫁絶書帝光天之下至于海隅注隅角也舊注按終南去海極遙到海隅者形容之辭耳蔣注謂東方為海隅豈齊魯之間亦皆終南耶蔣又謂中峯之北為雍為井鬼中峯之南為梁為翼軫恐一山未必如此分屬白雲迴望合穆天子傳白雲在天莊子華封人曰乗彼白雲至于帝鄉謝靈運詩巖髙白雲屯謝朓詩望山白雲裏何遜詩試望白雲中江總詩日暮碧雲合青靄入看無鮑照登大雷岸與妹書左右青靄表裏紫霄王筠詩日坂散朱雰天隅斂青靄江淹詩虛堂起青靄崦嵫生暮霞分野中峯變天文志天有十二次地有十二辰保章氏以星土辨九州故謂分野庾信終南山詩鵠葢上中峯王襃詩中峯雲已合絶頂日猶晴舊注言山形既廣非一星之分野所能該今指中峯為限而各屬一星則變其分野矣隂晴衆壑殊盧照鄰樂府序紫樓金闕雕石壁而鏤羣芳碧甃銅池俯銀津而横衆壑舊注不惟星文有别即壑澗之隂晴亦自有殊欲投人處宿漢武故事上嘗至栢谷夜投亭長亭長不納乃宿于逆旅漢書時上微行宣曲以南十二所休更衣投宿諸宫劉向九嘆夕投宿于石城隔水問樵夫盧思道詩復聞隔湘水揚雄長楊賦士有不談王道者則樵夫笑之唐詩紀事或説維此詩譏時也太乙近天都連山接海隅言勢焰盤據朝野也白雲迴望合青靄入看無言徒有其表也分野中峯變隂晴萬壑殊言恩澤偏也欲投人處宿隔水問樵夫畏禍深也漢江書嶓冢導漾東流為漢又東為滄浪之水過三澨至于大别南入于江山海經注漢水出隴坻道縣嶓冢山初名漾水東流至都沮縣始為漢水一統志漢江源出隴西嶓冢山至襄陽府東南大别山入于江楚塞三湘接盛𢎞之荆州記荆門虎牙楚之西塞江淹詩奉義至江漢始知楚塞長寰宇記湘潭湘鄉湘源謂之三湘屬長沙府荆門九派通後漢書光武紀公孫述遣將田戎任滿據荆州注荆門在峽州夷陵縣東南唐書地理志江陵府有荆門縣一統志荆門州在湖廣荆州府北一百八十里書荆州九江孔殷應劭漢書注江自廬江潯陽分為九也説苑禹鑿江通於九派郭璞江賦流九派乎潯陽李善注水别流為派江流天地外楚辭令沅湘兮無波使江水兮安流湛方生詩盻江流兮洋洋書光被四表格于上下傳其名聞充溢四外至於天地宋玉大言賦長劍耿耿倚天外仲長統樂志論逍遙一世之上睥睨天地之間可以凌霄漢出宇宙之外矣阮籍大人先生傳今吾乃飄颻于天地之外與造化為友山色有無中江淹詩山色與雲平列子蕩蕩然不覺天地之有無孫綽遊天台山賦忽出有而入無慧逺詩起滅有無際郡邑浮前浦袁淑詩意氣深自負肯事郡邑權王𢎞表伏聞廣陵前浦榛蕪歴久近復開除清源虚邃梁元帝詩初言前浦合波瀾動逺空謝靈運詩傾耳聆波瀾釋名風吹水成紋曰瀾瀾連也波體泛流相及連也庾信詩可憐數行雁黙黙逺空排襄陽好風日漢書地理志南郡縣襄陽應劭注城在襄水之陽故曰襄陽晉書宣帝紀襄陽水陸之衝襄陽樂古辭朝發襄陽城庾信詩今朝好風日留醉與山翁晉書山簡鎮襄陽唯酒是耽諸習氏荆土豪族有佳園池簡每出嬉遊多之池上置酒輒醉名之曰髙陽池孟浩然武陵泛舟唐書地理志朗州武陵郡屬山南道一統志常徳府戰國時屬楚秦置黔中郡漢初改武陵郡武陵溪在府城西三十里源出武山入沅江武陵川路狹魏收櫂歌桃發武陵岸栁拂武昌樓謝恵連詩鼔枻川路始月賦川路長兮不可越隂鏗詩川路恨成遙古詩相逢狹路間劉遵詩路狹幰難回前棹入花林梁簡文帝詩悠悠歸棹入渺渺去帆驚梁武帝詩朝日照花林庾信詩徙倚就花林莫測幽源裏仙家信㡬深晉書宣帝紀情深阻而莫測宋之問詩未窺仙源極獨進野人船十洲記𤣥洲有五芝𤣥澗澗水甘如蜜飲之長生與天地相畢上多仙家王勃詩鶴岑有竒徑麟洲富仙家水迴青嶂合沈約詩崚嶒起青嶂沈佺期詩青嶂妓樓懸雲度緑溪隂庾信讃石門雲度銅梁雨來又詩雲度絃歌響唐太宗白日半山詩谿隂處處生坐聴清猿嘯南史張裕傳裕子鏡與客談顔延之従籬邊取胡床坐聴辭義清𤣥延之曰彼有人焉荆州記峽長七百里兩岸連山畧無㫁處常有髙猿長嘯屬引清逺任昉文清猿與壺人爭旦庾信詩猿嘯風還急彌清塵外心莊子聖人遊乎塵垢之外晉書謝安傳論文靖始居塵外髙謝人間殷仲文詩哲匠感蕭晨肅此塵外軫杜甫長江書岷山道江東别為沱又東至于澧過九江至于東陵東迆北㑹為匪東為中江入于海魏志文帝南征臨江見波濤洶湧歎曰長江天塹天之所以限南北也陸機論長江制其區宇又漢髙帝功臣頌髙步長江浩浩終不息書浩浩滔天宋之問髙山引攀龍窈窕兮上躋懸峯長路浩浩兮此去何従易冥升利於不息之貞禮記天髙地下萬物散殊而禮制行矣流而不息合同而化而樂興焉乃知東極臨史記秦始皇紀登兹㤗山周覽東極淮南子禹使大章步自東極至于西極二億三萬三千五百里使豎亥步自北極至于南極二億三萬三千五百里七千五步左思呉都賦出乎大荒之中行乎東極之外衆流歸海意水經注漣水經連道縣控行衆流合成一溪謝靈運山居賦衆流所湊萬泉所滙汎濫異態首毖終肥史記司馬相如傳夏后氏堙鴻水決江疏河灑沈澹災東歸之於海而天下永寧左思呉都賦百川派别歸海而㑹萬國奉君心易首出庶物萬國咸寧左傳禹㑹諸侯于塗山執玉帛者萬國張正見詩軌文通萬國旌節靖三邊京房易傳坤純隂用事象配地屬土柔道光也隂凝盛與乾相納臣奉君也色借瀟湘闊趙子櫟注瀟湘在潭州三峽之水下入洞庭與瀟湘相逺故云色借也山海經洞庭之山帝之二女居之是常遊於江淵澧沅之間交瀟湘之淵出入必以飄風暴雨曹植詩朝遊江北岸夕宿瀟湘沚謝朓詩洞庭張樂地瀟湘帝子遊聲驅灧澦深寰宇記䕫州灔澦堆在州之西蜀江中心瞿唐峽口冬水淺出二十餘丈夏水漲半沒王洙注世説灔澦如象瞿唐莫上灔澦如馬瞿唐莫下言其險絶舟人常以此候之未辭添霧雨漢書鄒陽傳浮雲出遊霧雨咸集接上遇衣襟按遇王洙注本作過公羊傳沾袍注袍衣前襟也爾雅佩襟謂之褑方言袒飾謂之直襟杜詩博議江流之大不辭霧雨雨接江流而上過人衣襟之間所謂波浪兼天者如此楊炯華隂人幼聰敏博學善屬文年十一舉神童授校書郎為崇文館學士遷詹事司直左轉梓州司法㕘軍秩滿遷婺州盈川令贈著作郎炯聞時人以四傑稱乃自言曰愧在盧前恥居王後有盈川集三十巻梅花落樂錄漢横吹曲有梅花落本笛中曲也窻外一株梅庾肩吾詩窻梅朝始發徐陵梅花落對户一株梅寒花五出開張正見詩霜雁排空動寒花映日鮮何遜早梅詩映雪擬寒開蘇子卿梅花落中庭一樹梅寒多葉未開祇言花是雪不悟有香來韓詩外傳凡草木花多五出雪花獨六出宋書五行志夀陽公主卧含章殿簷下梅花落公主額上成五出花拂之不去影隨朝日逺香逐便風來曹植詩容華曜朝日鮑泉詠梅詩可憐堦下梅飄蕩逐風迴鮑照梅花落搖蕩春風媚春日又念爾零落逐風飇陳後主梅花落映日花光動迎風香氣來隂鏗詠雪梅詩従風還共落映日不俱消泣對銅鈎障漢宫舊事碧障漆竿銅鈎廣韻障界也隔也又步障也梁簡文帝詩攀鈎落綺障鮑泉梅花詩度簾拂羅幌愁看玉鏡臺世説温嶠姑有女托嶠覔壻嶠報云覔得佳壻因自下玉鏡臺一枚江總梅花落梅花芳菲臨玉臺朝攀晚折還復開徐陵梅花詩風吹上鏡臺行人㫁消息梁簡文帝詩落花依度詩幰垂栁拂行人梁元帝欲覔行人寄消息薛道衡詩一去無消息那能惜馬蹄春恨㡬徘徊王僧孺詩旅心已多恨春至尚離羣徐陵咏梅詩倡家怨思妾樓上獨徘徊陳後主梅花落佳人早插髻試立且徘徊岑參終南東溪中作書終南惇物至于鳥鼠雍録終南山横亘闗中南面西起秦隴東徹藍田凡雍岐郿鄠長安萬年相去亘八百里而連綿峙據其南者皆此一山也一統志終南山在西安府城南五十里一名南山禹貢所稱終南即此溪水碧於草房篆詩前溪流碧水梁簡文帝採蓮曲桂檝蘭橈浮碧水江淹詩幽冀生碧草又別賦春草碧色春水緑波潺潺花底流魏文帝丹霞蔽日行谷水潺潺沈約詩願以潺湲水霑君纓上塵魏收詩雪溜添春浦花水足新流張正見賦得岸花臨水發詩影間蓮花石光涵濯錦流盧照鄰詩花飛清渭流沙平堪濯足范雲詩寒沙四面平何遜慈姥磯詩逺岸平沙合庾信詩平沙臨浦口陸機詩濯足暘谷波陶潛詩山澗清且淺可以濯吾足劉孝勝武溪深行羞學滄浪水濯足復濯纓石淺不勝舟謝靈運詩石淺水潺湲鮑至山池詩石淺好縈苔梁簡文帝呉郡石像碑試就提捧豁爾勝舟李百藥詩横舟石岸前洗藥朝與暮宋之問詩今日遊何處春泉洗藥歸一統志洗藥池在興國縣葛洪過境見山靈水秀遂結菴築壇鑿池洗藥管子日有朝暮夜有晨昏薛道衡酬楊僕射山亭詩朝朝散霞彩暮暮澄秋色釣魚春復秋後漢書髙鳳傳以農畝為業隠身漁釣馮衍賦夫莊周之釣魚兮辭卿相之髙位文子釣魚不可以無餌白帖釣魚不得由守坻不堅陶潛詩春秋多佳日興來従所適晉書王徽之傳居山隂夜雪初霽忽憶戴逵乗船詣之造門不前而返人問其故曰本乘興而來興盡而返何必見安道耶又庾亮傳在武昌諸佐吏乗秋夜登南樓亮至諸人將起避之亮曰諸君少住老子於此處興復不淺南史循吏傳序桃花緑水之間秋月春風之下無往非適還欲向滄洲南史袁粲傳負才尚氣愛好虛逺嘗作五言詩言訪跡雖中宇循聲乃滄洲葢其志也謝朓詩既歡懷禄情復協滄洲趣與鮮于庶子泛漢江舊唐書李权明傳叔明字晉卿閬州新政人本姓鮮于氏兄仲通並涉學輕財好施為京兆少尹以疾辭除右庶子出為卭州刺史尋拜東川節度唐六典太子左春坊左庶子二人正四品上書嶓冢導漾東流為漢山海經嶓冢之山漢水出焉東南流注於江左傳楚國方城以為城漢水以為池一統志漢陽府前枕蜀江北帶漢水急管更須吹鮑照白紵歌古稱渌水今白紵催絃急管為君舞呉均與柳惲詩聞君吹急管相思雜採蓮庾信詩然香鬱金屋吹管鳳皇臺杯行莫遣遲王粲詩合坐同所樂但愬杯行遲酒光紅琥珀鄒陽酒賦流光醳醳甘滋泥泥博物志松脂入地千年化為茯苓茯苓化為琥珀袁山松酒賦泛芳樽以琥珀馨桂發而蘭興江色碧琉璃何遜詩露清曉風冷天曙江光爽十洲記方丈在東海中央東西南北岸相去正等方面各五千里上専是羣龍所聚有全玉疏璃之宫晉書王濟傳帝嘗幸其宅供饌甚豐悉貯琉璃器中梁簡文帝詩雲開瑪瑙葉水淨琉璃波日影浮歸棹周禮大司徒以土圭之灋測土深正日景以求地中班固東都賦上反宇以葢戴激日景而納光王勃詩去驂嘶别路歸棹隠寒洲徐彦伯採蓮曲春歌弄明月歸棹落花前蘆花罥釣絲江總詩蘆花露外白楓葉水前丹韻㑹罥綰也郭璞海賦或挂罥於岑㟼之畔鮑照詩絲罥千里心詩其釣維何維絲伊緡列子詹何以獨繭絲為綸芒針為鈎引盈車之魚於百仞之川山公醉不醉晉書山簡傳簡字季倫性温雅永嘉三年出為征南將軍都督荆襄交廣四州諸軍事優游卒嵗惟酒是耽詩既醉以酒又不醉無歸問取葛彊知山簡傳簡鎮襄陽習氏有佳園池簡每出多至池上置酒輒醉童兒歌曰山公出何許往至髙陽池日夕倒載歸酩酊無所知時時能騎馬倒著白接籬舉鞭問葛彊何如并州兒彊家在并州簡愛將也晦日陪侍御泛北池六典周官宗伯屬官御史掌邦國都鄙及萬民之治令以贊冢宰凡治之者受法令焉以其在殿柱之間亦謂之柱下史秦改為侍御史春池滿復寛王襃濬池詩長洲春水滿臨泛廣川中陳嘉言晦日重宴詩蓂華凋上葉栁色靄春池劉友賢晦日宴髙氏林亭詩池碧新流滿弓嗣初晦日重宴詩春溜滿新池晦節耐邀歡公羊傳提月六鷁退飛過宋都提月者何僅見是月晦日也何休注提月邊也魯人語也在是月之㡬盡曹植酒賦將承歡以接意郎餘令晦日宴髙氏林亭詩三春休晦節九谷泛年華月帶蝦䗫冷春秋孔演圖蟾蜍月精也五經通義月中有兔與蟾蜍何兔隂也蟾蜍陽也與兔並明隂係陽也抱朴子黄帝醫經有蝦䗫圖言月生始二日蝦䗫始生周禮蟈氏注鄭氏司農云蟈讀為蜮蜮蝦䗫也霜隨獬豸寒通典御史為風霜之任彈糺不法百僚震恐官之雄峻莫之比焉崔篆御史箴簡上霜凝胡廣漢官儀御史四人持書皆法冠法冠者秦始皇滅趙以其君冠賜御史一名柱後一名獬豸獬豸獸名一角知人曲直觸邪佞故執法者冠之水雲低錦席吕氏春秋山雲草莽水雲魚鱗陳嘉言晦日重宴詩綺席珍羞滿韓重宣晦日宴髙氏林亭詩此時陪綺席岸栁拂金盤梁簡文帝詩岸栁垂長葉窻桃落細跗又水苔隨纜段岸栁拂舟垂南史劉穆之傳以金盤貯㯽榔一斛以進之日暮舟中散左傳日云暮矣寡君