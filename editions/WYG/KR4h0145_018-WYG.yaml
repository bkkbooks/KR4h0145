中央鈞天東方蒼天東北旻天北方𤣥天西北幽天西方皓天西南朱天南方炎天東南陽天也詩鶴鳴于九臯聲聞于天日出瞻佳氣擊壤歌日出而作日入而息鑿井而飲耕田而食詩羔裘如膏日出有曜水經注日觀者雞一鳴時見日始欲出長三丈許故以名焉後漢書光武帝紀望氣者至南陽曰氣佳哉鬱鬱蔥蔥袁奭従駕遊山詩平原與上路佳氣逺蔥蔥杜審言詠終南山詩半嶺通佳氣中峯繞瑞烟蔥蔥繞聖君楊炯詩天門開奕奕佳氣鬱蔥蔥王粲詩籌策運帷幄一由我聖君晉釣竿曲玉衡正三辰造化賦羣形退願輔聖君與神合其靈口號贈徵君鴻自注此公時被徵唐書隠逸傳盧鴻字顥然博學善書籕廬嵩山開元初備禮徵再不至五年詔曰朕虛心引領于今數年有司其齎束帛之具重宣兹㫖想有以翻然易節副朕意焉鴻至東都謁見不拜曰禮者忠信所薄臣敢以忠信見帝拜諫議大夫固辭復下制許還山按舊唐書作盧鴻一陶令辭彭澤晉書陶潛傳潛字元亮少懐髙尚躬耕自資為彭澤令郡遣督郵至縣吏白應束帶見之潛歎曰我不能為五斗米折腰拳拳事鄉里小人即解印去縣一統志彭澤縣屬九江府梁鴻入㑹稽後漢書逸民傳梁鴻字伯鸞扶風人東出關作五噫之歌肅宗聞而非之求鴻不得乃易姓運期名燿字侯光與妻子去適呉依大家臯伯通居廡下為人賃舂伯通異之乃舍之于家鴻潛閉户著書十餘篇又郡國志㑹稽郡秦置本治呉立郡呉乃移山隂我尋髙士傳馬明生詩我將尋真人澄神挹容景晉書嵇康傳康能屬文撰上古以來髙士為之傳賛又皇甫謐傳謐所著甚多又撰髙士逸士列女等傳並重于世隋書經籍志虞槃佐撰髙士傳二巻又周𢎞讓撰髙士傳七巻君與古人齊詩我思古人實獲我心魏志毛玠傳太祖以素屏風素馮几賜玠曰君有古人之風故賜君古人之服吕覽周公旦曰與我齊者吾不與處無益我者也淮南子形不齊而實齊也雲卧留丹壑鮑照昇天行雲卧恣天行沈約詩秩滿撫白雲淹留事芝髓孫綽太平山銘上干翠霞下籠丹壑鮑照詩妍容逐丹壑宋之問詩白羽搖丹壑一統志盧鴻巖在登封縣東二十里唐處士盧鴻讀書處天書降紫泥庾信讃帝刻桐葉天書掌文蘇頲詩自有天文降無勞訪海槎漢舊儀天子六璽皆以武都紫泥封之隴右記武都紫水有泥其色紫而粘貢之用封璽書不知楊伯起庾信詩不知髙㡬里低頭看世間後漢書楊震傳震字伯起𢎞農華隂人少好學明經博覽無不窮究諸儒為之語曰關西孔子楊伯起嘗客居于湖不答州郡禮命數十年衆人謂之晚暮而震志愈篤年五十乃始仕州郡大將軍鄧隲聞其賢而辟之舉茂才四遷荆州刺史呉均詩昔聞楊伯起拖玉振清風早晚向關西詩夜如何其箋夜如何其問早晚之辭韓非子舉事慎隂陽之和種樹接四時之適無早晚之失寒温之灾則入多許天正詩龍湖膏澤下早晚徧枯窮徐陵文濟北顔淵闗西孔子李行言秋晚度廢關詩贈言楊伯起非復是關西廣陵贈别漢書地理志廣陵國景帝四年更名江都武帝元狩三年更名廣陵記纂淵海隋改為揚州唐武徳九年屬淮南道天寳曰廣陵郡乾元復曰揚州玉瓶沽美酒樂府古辭就我求清酒絲䋲提玉壺揚雄酒箴觀瓶之居在井之湄鹽鐵論古者不市食及其後則有屠沽廣韻沽買也古詩不如飲美酒被服紈與素曹植樂府歸來宴平樂美酒斗十千數里送君還白帖十里一長亭五里一短亭江淹古别離黄雲蔽千里遊子何時還又送君如昨日簷前露已溥庾信詩浦喧征棹發亭空送客還繫馬垂楊下庾信賦倚弓於玉女窓扉繫馬於鳳皇樓柱李益詩風吹山下草繫馬河邊樹又白惜餘春賦醉愁心於垂楊隨柔條以斜結梁元帝詩巫山巫峽長垂柳復垂楊李嶷詩侍獵長楊下銜杯大道間劉伶酒徳頌捧甖承槽銜杯漱醪崔恵童詩一月人生笑㡬回相逢相值且銜杯江總閨怨寂寂青樓大道邊儲光羲詩朝看大道上落花亂馬足天邊看緑水梁元帝臨秋賦水含天而難别劉孝綽渡江詩天邊生岸影孟浩然詩孤帆天際看謝朓詩逶迤帶緑水傅休奕詩下鑒緑水波南史庾杲之傳蕭緬與王儉書曰庾景行泛緑水依芙蓉何其麗也海上見青山史記孝武帝紀李少君見上曰臣嘗遊海上見安期生食臣棗大如𤓰又白詩天海空青蒼謝朓詩不對芳春酒還望青山郭入蜀記姑熟溪東南數峯如黛葢青山也興罷各分袂晉書王徽之傳乗興而來興盡而返拾遺記蕭鳳使玉門關勸酒謂兄曰庶分袂不悲何遜詩當憐此分袂何須别醉顔鮑照詩停觴不語欲誰須王昌齡留别詩醉别何須更惆悵蘇頲詩莫愴分飛岐路别楚辭美人既醉朱顔酡渡荆門送别郭璞江賦荆門闕竦而盤礴水經注江水東歴荆門虎牙之門荆門山在南上合下開其狀似門虎牙山在北此二山楚之西塞也寰宇記荆門本漢舊地荆襄之要津一統志荆門州在湖廣荆州府北一百八十里渡逺荆門外梁簡文帝詩關山逺可度逺度復難思來従楚國遊國語赫赫楚國而君臨之甯戚飯牛歌吾當與爾適楚國詩彼君子兮逝肯來遊温子昇寒陵山寺碑鳴玉鑾以來遊山隨平野盡宗羈詩烟生山欲盡呉均詩蔽草覆平野梁簡文帝文遼遼平野江入大荒流夏侯湛詩江水兮浩浩長流兮萬里謝朓詩大江流日夜山海經大荒之中有山名曰大荒之山日月所入是謂大荒之野左思呉都賦出乎大荒之中行乎中極之外注大荒謂海外也張協七命絶景乎大荒之遐阻吞響乎幽山之窮奥月下飛天鏡古樂府破鏡飛上天劉孝先詩飛鏡㸃青天横照滿樓前梁簡文帝望月詩形同七子鏡何遜望初月詩破鏡出雲明雲生結海樓梁簡文帝詩祈年雲霧生裴讓之詩絶野寒雲生玉襃詩雲生壠底黒張協詩翳翳結繁雲史記天官書海旁蜃氣象樓臺梁元帝詩海氣旦如樓蔡凝賦得處處春雲生詩為樓欲近城仍憐故鄉水楚辭念我長生而久仙不如反余之故鄉漢髙祖大風歌威加海内兮歸故鄉石崇詩悠悠思故鄉謝朓詩歎息東流水如何故鄉陌萬里送行舟郭璞江賦呼吸萬里吐納靈潮南史宗慤傳乗長風破萬里浪沈約従軍行風巻萬里波魏文帝善哉行湯湯川流中有行舟梁簡文帝詩花葉灑行舟仍持送逺客謝恵連詩通川絶行舟送董將軍西征本集作送白利従金吾董將軍西征西羌延國討漢書宣帝紀神爵元年遣後將軍趙充國强弩將軍許延夀擊西羌後漢西羌傳西羌之本出自三苗羌姓之别也左傳令尹之不能爾所知也國將討焉白起佐軍威史記白起者郿人也善用兵事秦昭王為左庶長遷為武安君戰國策白起率數萬之師以與楚戰舉鄢郢燒夷陵南并蜀漢又越韓魏攻强趙使秦業帝趙楚懾服不敢攻秦者白起之勢也後漢書耿純傳賛純植義發奉兵佐威劍抉浮雲氣莊子天子之劍上抉浮雲下絶地紀此劍一用匡諸侯天下服矣又絶雲氣負青天弓彎明月輝賈誼過秦論士不敢彎弓而報怨伏知道詩試將弓學月聊持劒比霜唐太宗詠弓詩上弦明月半楊炯詩烏號明月弓梁簡文帝詩月輝横射枕馬行邊草緑楚辭邊馬顧而不行鮑照蕪城賦白楊早落塞草前衰駱賔王従征詩邊沙逺雜風塵氣塞草長垂霜雪天盧照鄰詩漢地草應緑邊庭沙正飛旌巻曙霜飛梁元帝文虹旌式巻唐太宗詩階蘭凝曙霜七命風厲霜飛抗手凛相顧孔叢子子髙遊趙還有鄒文李節者送别流涕交頤子髙抗手而已温子昇寒陵山寺碑壯士凛以爭先庾信别張司馬詩前席慘無言離悲兩相顧寒風生鐵衣吕氏春秋風有八等炎風滔風熏風巨風淒風飂風厲風寒風木蘭歌朔氣傳金柝寒光照鐡衣送友人青山横北郭茅山父老歌白鶴翔青山何時復來遊何遜詩青山不可上一上一惆悵謝朓詩不對芳春酒還望青山郭呉均詩驅車還北郭白水遶東城左傳所不與舅氏同心者有如白水古逸詩浩浩白水張衡賦㪺白水以為漿梁宣帝賦清流四遶吐溜悠長古詩東城髙且長逶迤自相屬蕭子顯詩出入東城里此地一為别劉繪詩江山信多美此地最為神唐太宗詩一朝辭此地四海遂為家王粲詩風流雲散一别如雨孤蓬萬里征古詩孤蓬轉霜根鮑照蕪城賦孤蓬自振驚砂坐飛江淹詩渺然萬里遊劉刪詩寄謝千金子安知萬里蓬古八變歌翩翩飛蓬征愴愴遊子懐浮雲遊子意李陵與蘇武詩仰視浮雲馳奄忽互相踰又攜手上河梁遊子暮何之古詩浮雲蔽白日遊子不顧返江淹詩浮雲抱山川遊子御故鄉落日故人情謝靈運撰征賦望新晴於落日梁簡文帝詩落日芳春暮陳後主詩思君如落日無有暫還時古詩前日風雪中故人従此去任昉詩猶我故人情揮手自兹去劉琨詩揮手長相謝劉鑠詩揮手従此辭史記晉世家秦送重耳至河咎犯曰臣従君周旋天下過亦多矣請従此去蕭蕭班馬鳴詩馬鳴蕭蕭范雲詩蕭蕭良馬鳴左傳有班馬之聲牛𢎞歌辭班馬蕭蕭蘇頲詩班馬長嘶落景催尋雍尊師隠居羣峭碧摩天劉峻山棲志羣峯叠起接漢連霞淮南子上峭山赴深谿張正見賦峯髙一萬峭峙三百古樂府黄鵠摩天極髙飛逍遙不計年詩所謂伊人于焉逍遙陶𢎞景賦更天地之彌固終逍遙以長年宋書王華傳治阿之宰不必計年王勃詩松石偏宜古藤蘿不計年撥雲尋古道莊子上抉浮雲郭璞詩神仙排雲出王融詩蘿徑若披雲謝朓詩尋雲陟累榭廣韻撥理也除也倚樹聴流泉莊子倚樹而吟據髙梧而瞑徐陵長干寺碑遊巖倚樹宴坐經行詩觀其流泉江總詩流泉灌金殿花暖青牛卧隋煬帝詩落花香暖衆紋紅列仙傳老子乗青牛車去入大秦神仙傳封君達隴西人服煉水銀年百嵗如三十許騎青牛號青牛道士嵩山記嵩髙山有大松樹或百嵗或千嵗其精化為青牛松髙白鶴眠沈約髙松賦鬱彼髙松棲根得地神境記滎陽郡南有孤松千丈常有雙鶴晨必接翮夕必偶影列仙傳王子喬乗白鶴住緱氏山頭語來江色暮古樂府浮雲多暮色徐陵詩岸烟多暮色岸水帶斜暉獨自下寒烟江總閨怨篇池上鴛鴦不獨自謝朓詩切切隂風暮桑柘起寒烟江淹詩宿草凌寒烟流夜郎至江夏陪長史叔及薛明府宴興徳寺南閣唐書李白傳永王璘辟為府僚佐璘起兵逃還彭澤璘敗當誅郭子儀請解官以贖有詔長流夜郎㑹赦還潯陽又地理志鄂州江夏郡縣江夏一統志武昌府縣江夏紺殿横江上説文紺深青色江總幡賛光分紺殿采布香城楚辭横大江兮揚靈謝朓詩心事俱已矣江上徒離憂呉均詩風起秋江上青山落鏡中謝朓詩還望青山郭梁簡文帝詩青山銜月規虞世南賦鏡青山之幌澈釋恵標詩人似鏡中行虞世南詩呉趨自有樂還似鏡中遊劉憲詩樓船直在鏡中移沈佺期釣竿篇人疑天上坐魚似鏡中懸岸迴沙不盡江賦陽侯吸硪以岸起洪濤涴湧而雲迴何遜詩逺岸平沙合梁簡文帝詩迴沙溜碧水王僧孺詩沙岸淨如掃禮記西不盡流沙南不盡衡山東不盡東海北不盡恒山日映水成空梁簡文帝頌日映金雲風搖銀草又修竹賦日映花靡謝靈運詩空水共澄鮮劉楨詩寒水清若空沈約詩兩溪共一瀉水潔望如空宇文㫤詩烟生山欲盡潭淨水恒空天樂流香閣莊子天機不張而五官皆備此之謂天樂法苑珠林北印度國有月光玉塔常放神光仙花天樂古樂府太和曲國鳥尚含天樂囀梁武帝詩繚繞聞天樂周流揚梵聲禮記流而不息合同而化而樂興焉唐太宗詩聲流三處管響亂一重弦庾信詩尚聞香閣梵謝偃詩逶迤度香閣蓮舟颺晚風梁元帝詩蓮舟夾鶴氅畫舸覆油緹蕭子範詩蓮舟拂芰歸沈君攸曲蓮舟泛浪華又詩蓮舟凌沙轉不碍孔徳紹詩蓮舟泛錦磧極目眺江干范泰詩軒翼颺輕風崔湜詩曲渚颺輕風鮑照詩鱗鱗夕雲起獵獵晚風遒恭陪竹林宴韻㑹陪厠也隨也増韻貳也伴也魏氏春秋嵇康寓居河内之山陽縣與之遊者阮籍山濤向秀籍兄子咸王戎劉伶遊於竹林號為七賢沈佺期詩扈従行太液陪宴坐明光留醉與陶公崔日用詩恩深答效淺留醉與宸暉晉書陶潛傳潛為彭澤令在縣公田悉令種秫穀曰令吾嘗醉於酒足矣謝公亭自注亭葢謝朓范雲之所遊齊書謝朓傳隆昌初除秘書丞未拜仍轉中書郎出為宣城太守一統志亭在寧國府城北謝公離别處一統志亭即謝朓送零陵内史范雲處古詩上言長相思下言久離别李陵詩良時不再至離别在須臾風景每生愁世説周顗與王導諸人登新亭嘆曰風景不殊舉目有江河之異曹植釋愁文未知子愁每由生客散青天月盧照鄰詩客散同秋葉周髀天青黑為表丹黄為裏張衡賦仰青天其如帶天謝莊月賦白露曖空素月流山空碧水流盧思道賦空山照秋月蕭瑱詩澗水初流碧池花春映日梁元帝詩映日通風隠珠幔飄花拂葉度金池陳後主詩映日花光動窻竹夜鳴秋謝朓思歸賦園桃春發窻竹夏涼又詩翛翛映窻竹又七夕賦素鐘登御夷律鳴秋今古一相接關尹子其來無今其往無古謝靈運詩誰謂古今殊異代可同調杜預左傳序考其時則相接長歌懐舊遊五經通義發聲而歌長言陸機詩長歌赴促節鮑照詩懐古復懐今長懐無終極陸機詩念昔良遊于焉永歎何承天詩願言桑梓思舊遊御選唐詩巻十三
