臺三品前後居相位數載多識臺閣故事神龍時貶眉州刺史還為益州長史春日應制温液吐㳙㳙東京賦温液湯泉黒丹石淄陸機詩層雲無温液嚴霜有凝威越王貞温泉詩坎徳疏温液山隈派煖流嵇康琴賦蒸靈液以布雲據神淵而吐溜傅休奕桑椹賦繁實離離含甘吐液家語㳙㳙不止將成江河孔融詩涓涓江漢流潘岳射雉賦泉㳙涓而吐溜庾信徴調曲纎纎不絶林薄成涓涓不止江河生跳波急應絃張華詩浮醪隨觴轉素蟻自跳波劉峻金華山棲志清瀾微注滴瀝生響白波跳沫汹涌成音謝靈運詩急絃動飛聴清歌拂梁塵陸機文賦譬偏絃之獨張含清唱而靡應簪裾承睿賞南史張充與王儉書曰茂陵之彦望冠葢而長懐渭川之甿佇簪裾而永歎劉孝綽詩圓淵倒荷芰方鏡寫簪裾庾信詩星橋擁冠葢錦水照簪裾魏收晦日泛舟應詔詩睿賞芳月色宴言忘日暮庾肩吾奉和泛舟漢水詩陪歌承睿賞接醴待恩筵劉端和詩睿賞叶春芳開筵臨畫堂花栁發韶年王容詩入花花不見穿栁栁隂碎庾信賦落花與芝葢同飛楊柳共春旗一色袁爽詩澗水含初溜山花發早叢梁簡文帝詩桃含可憐紫柳發㫁腸青王融歌韶年春已仲明星夜未央聖酒千鍾洽曹植樂府御酒停未飲貴戚跪東廂李暠詩天㕑千品降御酒百壺傾劉孝威樂府御酒屬車中孔融難魏武帝禁酒書堯非千鍾無以建太平孔非百觚無以堪上聖孔叢子昔有遺諺堯舜千鍾孔子百觚子路嗑嗑尚飲十榼庾肩吾曲水宴詩百戲俱臨水千鍾共逐流鮑照詩醴洽深恩遍宸章七曜懸榖梁傳七曜為之盈縮注日月五星李尤漏刻銘仰釐七矅俯順坤徳陸雲泰伯碑文膺慶二儀協靈七曜易懸象著明莫大乎日月微臣従此醉梁簡文帝詩微臣今拜手願帝永無窮禇淵詩微臣夙多幸後漢書班固傳皇歡浹羣臣醉還是夢鈞天史記趙世家趙簡子寤曰我之帝所甚樂與百神遊于鈞天廣樂九奏萬舞張衡西京賦昔者大帝説秦穆公而覲之以鈞天廣樂呉都賦羅金石與絲竹若鈞天之下陳庾信詩成文興大雅出豫奏鈞天喬知之同州馮翊人與弟侃備並以文詞知名知之尤稱俊才則天時累除右補闕遷左司郎中為武承嗣所害侍宴應制紫禁肅晴氛謝莊文掩映瑤光收華紫禁左傳春王二月乙丑日南至梓慎望氛注氛氣也鮑照詩日氛映山浦江淹詩重陽集清氛朱樓落曉雲馮衍顯志賦伏朱樓而四望兮採三秀之華英謝朓詩逶迤帶緑水迢逓起朱樓范雲詩桂水澄夜氣桂山清曉雲薛道衡詩洞開朝霧斂石濕曉雲濃豫遊龍駕轉梁簡文帝詩豫遊戲馬館教戰昆明池劉孝綽詩豫遊尤夏諺楚辭龍駕兮帝服翺翔兮周章沈約文陪龍駕於伊洛侍鳳葢於咸陽周𢎞讓詩五岳迴龍駕天樂鳳簫聞史記趙世家簡子窹曰我之帝所甚樂與百神遊于鈞天廣樂九奏萬舞不類三代之樂其聲動人心梁武帝詩繚繞聞天樂徐景安樂書舜樂謂簫韶九成鳳皇來儀故制鳳簫洞簫以彰徳也梁簡文帝箏賦江南之竹弄玉有鳴鳳之簫焉竹外仙亭出謝朓治新居北窻詩池北樹如浮竹外山猶映劉峻山居志寺觀之前皆植脩竹檀欒蕭瑟被陵縁阜竹外則有良田區軫花間輦路分徐徘妻劉氏詩鳴鸝葉中舞戲蝶花間驚班固西都賦輦路經營脩除飛閣顔延之詩陟降騰輦路尋雲抗瑤甍南史裴子野傳蘭陵蕭琛言其評論可與過秦王命分路揚鑣朱异詩耿耿樵路分微臣一何幸褚淵詩微臣夙多幸薄宦奉明時詞賦奉明君漢書枚乘傳以病去官復游梁梁客皆善詞賦乗尤髙魏文帝書仲宣獨善詞賦左思詩詞賦擬相如京氏易傳坤隂凝感與乾相納臣奉君也杜審言都尉山臺漢書百官公卿表䕶軍都尉秦官奉車都尉掌御乗輿車駙馬都尉掌駙馬唐書百官志奉車都尉駙馬都尉皆無定員皆従五品下按山臺品彚本作山亭紫藤縈葛藟南方草木狀紫藤莖如竹根重重有皮可用以降神本草拾遺紫藤一名招豆藤其子熬香著酒中令酒不敗虞炎詩紫藤拂花樹黄鳥度青枝詩南有樛木葛藟縈之疏藟與葛異亦葛之類也陸璣詩疏藟一名巨苽似燕薁延蔓生葉似艾白色其子赤可食左傳葛藟猶能庇其本根故君子以為比阮籍詠懐詩葛藟延幽谷綿綿𤓰瓞生緑刺罥薔薇本草薔薇一名牛勒一名牛棘一名刺紅一名薔蘼種類不一有大紅粉紅黄白四色花大如錢又一種名野薔薇其花甚香栁惲詩當户種薔薇枝葉太㽔㽔下釣看魚躍夏侯湛抵疑子不嫌僕徳之不劭而疑其位之不到是猶反鏡而索照登木而下釣僕未以此為不肖也王績詩東川聊下釣南畝試揮鋤詩王在靈沼於仞魚躍列子匏巴鼓琴而鳥舞魚躍張衡賦翾鳥舉而魚躍將往走乎八荒探巢畏鳥飛易林探巢得雛鳩鵲俱來使我心娯拾遺記武王伐紂樵夫牧豎探髙鳥之巢得玉璽文曰水徳將滅木祚方盛世説王平子出為荆州王太尉及時賢送者傾路時庭中有大樹上有鵲巢平子脱衣巾徑上樹取鵲子神色自若傍若無人詩有鳥髙飛亦傳于天史記老子傳鳥吾知其能飛魚吾知其能游獸吾知其能走劉向九歎三鳥飛以自南兮覽其志而欲北葉疎荷已晚北史何妥傳八嵗時游國子學助教顧良戲之曰子姓是荷葉之荷為河水之河妥應聲曰先生是眷顧之顧為新故之故沈君道詩水落金沙淺雲髙玉葉疎爾雅荷芙蕖其莖茄其葉蕸其本蔤其華菡萏其實蓮其根藕其中的的中薏謝朓詩夏木轉成帷秋荷望如益枝亞果新肥風俗通垂枝布葉霍然而大魏文帝詩卑枝拂羽葢庾信詩春杯猶雜泛細果尚連枝北史蘇瓊傳郡人趙穎得新𤓰一雙自來奉瓊置于聴事梁上竟不割人聞受趙穎𤓰欲貢新果入門知穎𤓰猶在相顧而去勝迹都無限王羲之蘭亭序俯仰之間已為陳迹王冏詩美景多勝迹南史王裕之傳子恢之被召為秘書郎敬𢎞求為奉朝請與恢之書曰秘書有限故有競朝請無限故無競梁武帝詩連山去無限長洲望不極只應伴月歸陶潛田居詩晨興理荒穢帶月荷鋤歸晉書袁宏傳謝尚鎮牛渚秋夜乘月率爾與左右微服泛江劉長卿集梁耿開元寺所居院一統志開元寺在陜西西安府城内唐建到君幽卧處陳子昂詩謝病南山下幽卧不知春又寂寥守窮巷幽獨卧空林為我掃莓苔後漢書陳蕃傳蕃嘗閑處一室而庭宇蕪穢薛勤候之曰何不洒掃以待賔客古今注空室無人行則生苔蘚孫綽遊天台山賦踐莓苔之滑石宋書王微棲遲於環堵之室苔草沒堦花雨無時落庾信詩花雨積成臺王襃靈壇銘序香雨乘空天花入室梁簡文帝書法水晨流天花夜落五燈㑹元須菩提尊者在巖中宴坐諸天雨花讃歎松風終日來南史陶𢎞景特愛松風庭院皆植松每聞其響欣然為樂謝朓風賦入山户而松凉斯則幽人之風也謝靈運銘雲往拂山風來過松莊子飄風不終朝驟雨不終日路經深竹過洛陽伽藍記永明寺房廡庭列脩竹簷拂髙松謝靈運詩連巖竟路塞宻竹使徑迷江總山亭銘竹深葢雨石暗迎薰謝瞻詩逍遙越郊肆願言屢經過門向逺山開蜀都賦開髙軒以臨山謝靈運詩羣木既羅户衆山亦對窻梁簡文帝詩泉溜逺山鳴江洪詩逺山清無雲豈得長髙枕晉書謝安傳髙卧東山人言安石不出將如蒼生何論衡髙枕幄卧以俟其時謝朓詩髙枕東窻下中朝正用才三禮義宗天子諸侯皆有三朝一曰外朝二曰中朝三曰内朝中朝之名或内或外人君旦夕親政見卿大夫之朝也所謂辨色而入者在此朝也玉海唐宣政殿在周為中朝凡試策舉人在此左傳維楚有才晉實用之陶潛詩巖巖顯朝市帝者慎用才沈佺期嶽館詩崧髙維嶽駿極于天爾雅嵩髙為中嶽禹所名也白虎通徳論中央之嶽居四方之中而髙故曰嵩髙嵩山志唐則天后號為神嶽又崇福宫在萬嵗峯前唐之太乙觀也其下有亭館焉洞壑仙人館世説嵩山北有大穴有人墜入行十許日忽曠然見明草屋中有人對奕下有一杯自飲墜者乞嘗之氣力十倍出告張華華曰此仙館所飲者玉漿也名山記天下三十六洞天第六為嵩山司真洞天後漢書班固傳超洞壑越峻崖江賦域之以盤巖豁之以洞壑曹植逺遊篇仙人翔其隅西都賦實列仙之攸館非吾人之所寜庾信温湯碑嵩嶽二仙之館不孤擅於天池孤峯玉女臺嵩山志玉柱峯在嵩陽書院後下有三醉石又老翁玉人玉女金匱積翠太白六峯又石淙出玉女臺下平樂澗嵩髙山記山北有玉女三臺漢武於此見三仙女故名魯靈光殿賦玉女窺窻而下視陳子昂送人還中嶽序去囂世走青雲登玉女之峯窺石人之廟空濛朝氣合詩我來自東零雨其濛謝朓詩空濛如薄霧嵩山志雞鳴峯在東北五更之初便見日出李嶠詩金竈浮烟朝漠漠沈約詩溶溶晨霧合漢書律歴志至治之世天地之氣合以生風窈窕夕陽開曹植飛龍篇晨遊泰山雲霧窈窕宋之問嵩山天門歌紛窈窕兮巖倚披以鵬翅洞膠葛兮峯稜層以龍鱗又晚隂兮足風夕陽兮赩紅楊炯詩仙都日月開荒澗含輕雨唐則天后遊石淙詩序平樂澗近接嵩嶺俯屆箕峯詩千尋幽澗浴雲衣狄仁傑詩飛泉灑液恒疑雨薛曜詩風吹細雨即虹泉鮑照園葵賦飛雨輕灑虛巖應薄雷王勅詩複嶂迷晴色虛巖辨暗流則天后詩萬仞髙巖蔵日色崔融詩洞口仙巖類削成傳燈録呼山山應淮南子隂陽相薄感而為雷園葵賦沈雷逺震正逢鸞與鶴薛道衡詩普天逢盛日説文鸞赤神靈之精也赤色五采雞形鳴中五音頌聲作則至相鶴經鶴陽鳥也而遊於隂葢羽族之宗長仙人之騏驥也杜子春傳登華山見一居處室屋嚴潔綵雲遙覆鸞鶴飛翔其上江淹香爐峯詩此山具鸞鶴狄仁傑石淙詩羽仗遙臨鸞鶴駕歌舞出天來詩式歌且舞樂府古辭歌舞自相逐神仙傳王方平降蔡經家一時金鼓簫管之聲皆従天而下李嶠詩天子春遊動地來宋之問扈従登封途中作史記司馬相如傳扈従横行出乎四校之中元和郡縣志登封縣本漢嵩髙縣武帝元封元年置後省入陽城髙宗將有事于中岳分陽城緱氏置嵩城縣則天因封岳改為登封一統志登封縣在河南府城東一百四十里帳殿鬱崔嵬庾肩吾詩帳殿掩芳洲庾信馬射賦帷宫宿設帳殿開筵舊唐書禮儀志御帳殿受朝賀葢行幸時幄幕為殿也説文崔嵬髙不平也詩陟彼崔嵬何安景福殿賦髙甍崔嵬飛宇承霓仙遊實壯哉顔延之詩善遊皆聖仙蕭慤詩仙遊本多趣隂鏗詩新宫實壯哉文中子登雲中之城望龍門之闕曰壯哉山河之固曉雲連幕捲范雲詩楚山清曉雲薛道衡詩石濕曉雲濃説文幕幔也顧野王詩窻開翠幔捲夜火雜星迴淮南子晝則多旌夜則多火江總詩金燈夜火百花開禮記星迴于天潘岳賦夜既分兮星漢迴谷暗千旗出陳後主詩谷暗宵征響風髙夜笛喧戰國策楚王遊於雲夢結駟千騎旌旗蔽日山鳴萬乗來史記封禪書天子東幸緱氏禮登中岳太室従官在山下聞若有言萬嵗云封禪儀事畢皇帝再拜羣臣稱萬嵗音動山谷陸雲文裔皇聖之豐祐膺萬乗之多福謝靈運撰征賦雲檣千艘靁輜萬乘扈従良可賦揚雄羽獵賦序孝成帝時羽獵雄従以為非堯舜成湯文王三驅之意故因校獵賦以風之漢書揚雄傳雄従至射熊館還上長楊賦又藝文志登髙能賦可以為大夫終乏掞天才陸機演連珠髦俊之才世所希乏左思蜀都賦幽思絢道徳摛藻掞天庭庾肩吾詩陳思掞天才庾信詩逢君摛掞才扈従登封告成頌唐書武后紀垂拱四年改嵩山為神岳萬嵗通天元年臘月甲戌如神岳甲申封于神岳改元曰萬嵗登封十月乙亥禪于少室複道開行殿史記秦始皇紀始皇令咸陽之旁二百里内宫觀二百七十複道相連又自雍門以東至涇渭殿屋複道周閣相屬又孫叔通傳注複道閣道也説苑秦始皇作前殿阿房宫為複道自阿房度渭水屬咸陽元和志漢之複道不止長樂有之未央之北有桂宫北宫明光之屬各皆有宫而長相往來者皆有複道也庾信華林園馬射賦止立行宫裁舒帳殿鈎陳列禁兵晉書天文志北極五星鈎陳六星皆在禁宫中鈎陳後宫也星經鈎陳六星在五帝下主天子六軍將軍又主三公庾肩吾詩鈎陳萬騎轉閶闔九闗通庾信華林園馬射賦玉衡正而泰階平閶闔開而鈎陳轉唐書百官志右羽林軍大將軍掌統北牙禁兵王筠詩閣道趨文昌禁兵連武庫和風吹鼓角陸機樂府和風飛清响鮮雲垂薄隂又和風未及暖遺凉清且凛後漢書鼓角鳴于地中水經注聞鼓角鞞鐸之聲佳氣動旗旌後漢書光武帝紀望氣者蘇伯阿為王莽使至南陽遙望見舂陵郭唶曰氣佳哉鬱鬱蔥蔥然釋名旌精也言有精光也旗期也言與衆期于下也廣雅天子之旌髙九仞禮含文嘉天子之旗九仞十二旒曳地易林干旄旗旌執幟在郊家語旌旗繽紛下蟠于地後騎迴天苑晉書元帝紀帝微行至于湖隂察王敦營壘敦使五騎物色追帝帝見逆旅賣食嫗以七寳劍與之曰後有騎來可以此示也王粲英雄記郭汜吕布獨共對戰布以矛刺中汜汜後騎遂前救汜史記天官書句曲九星三處羅一曰天旗二曰天苑三曰九斿唐書百官志尚承局掌内外閑廏之馬左右六閑亦曰天苑庾信華林園馬射賦皇帝翊四校于仙園迴六龍于天苑前山入御營庾肩吾詩前山黄葉起説文營匝而居也又軍壘曰營唐書兵制志貞元初太宗擇善射者百人為二畨于北門長上曰百騎以従田獵又置北衙七營選材力驍壯月以一營畨上十二年始置左右屯營于𤣥武門領以諸衞將軍號飛騎萬方俱下拜宋書樂志時齊七政朝此萬方東都賦聖上覩萬方之歡娯左傳王使宰孔賜齊侯胙齊侯將下拜孔曰天子以伯舅耄老加勞賜一級無下拜後漢書陳元傳留思聖藝眷顧儒雅採孔子下拜之義卒淵聖獨見之㫖相與樂昇平左思詠史詩相與觀所尚庾信商調曲有剛有㫁四方可以寧既頌既雅天下乃升平王融詩周雅聴休明齊徳覯昇平崧山嶺應制漢書武帝元封二年幸中嶽嶺獲駁鹿翼日登嵩髙吏卒咸聞呼萬嵗者三翼翼髙旌轉禮記車馬之美匪匪翼翼楚辭鳳皇翼其承旂兮髙翺翔之翼翼陸雲九愍飛芝葢之翼翼周禮春官司常全羽為旞析羽為旌注全羽析羽皆五采繫之於旞旌之上所謂注旄於干首也爾雅注旄首曰旌旍同鮑照詩乘墉揮寳劍蔽日隠髙旍梁簡文帝詩丹旌風轉碧幔雲移蕭慤詩游騎騰文馬前驅轉翠旌鏘鏘鳳輦飛詩四牡彭彭八鸞鏘鏘左傳鳳皇于飛其鳴鏘鏘楚辭前輕輬之鏘鏘兮後輜乗之従従秦嘉詩肅肅僕夫征鏘鏘揚和鈴唐書天子輦七一曰大鳳輦舊唐書樂章車移鳳輦斾轉紅旗仙傳拾遺西王母乗翠鳯之輦而來與穆王歡飲隋煬帝步虛詞翠霞乘鳳輦碧霧翼龍輿江淹賦侍青鑾以雲聳夾翠輦以霞飛塵消清蹕路淮南子雨師灑道風伯掃塵陸雲詩和風弭塵清暉映葢司馬相如大人賦煥然霧除霍然雲消晉書載記響清蹕于常道之門馳金車于山陽之館北史儒林傳帝服衮冤乘碧輅陳文物備禮容清蹕而臨太學王襃詩衡街響清蹕偵候起相風沈約梁雅樂歌清蹕朝萬㝢端冕臨正陽月賦清蘭路肅桂苑應璩文按轡清路周望四野雲濕従臣衣薛道衡詩洞開朝霧斂石濕曉雲濃後漢書和帝十五年十一月甲申車駕還宫賜従臣及留者公卿以下錢布各有差西都賦第従臣之嘉頌何遜詩雖憐水上影復恐濕羅衣張正見詩舟移停浦水舉棹濕春衣白羽搖丹壑儀禮鄉射禮君國中射則皮樹中以翿旌獲白羽與朱羽糅注皮樹獸名家語赤羽如日白羽如月國語呉王陳士卒為萬人以為方陣皆白羽白旂素甲白羽之矰望之如荼注矰矢名以白羽為衞上林賦彎繁弱滿白羽孫綽太平山銘上干翠霞下籠丹壑鮑照詩妍容逐丹壑天營逼翠微晉書天文志紫宫垣十五星一曰紫微大帝之座也一曰天營爾雅山未及上曰翠微疏謂未及頂上在旁陂陀之處名翠微一説山氣青縹色故曰翠微也蜀都賦鬱葐蒀以翠微崛巍巍以峩峩孫綽太平山銘懸棟翠微飛宇雲際芳聲耀千古詩文王有聲遹駿有聲晉書樂志今我聖皇焜耀前輝曹植詩千古長若斯舊唐書音樂志上元樂舞者舞之必成字十六變而畢有聖超千古道泰百王皇帝萬年寳祚彌昌字四海警宸威書聲教訖于四海詩肇域彼四海庾信文威警建平之戍温子昇文居宸納祐就日垂衣書肅將天威荀子發誡布令而敵退是主威也魏文帝述征賦仰乾威之靈光張華詩戎車震朔野羣師賛皇威張説和登驪山寰宇記驪山在昭應縣東二十里即藍田山也一統志驪山在臨潼縣東南三里寒山上半空謝莊月賦騰吹寒山弭葢秋坂謝朓詩蒼翠望寒山沈約詩寒山望積雪薛道衡詩浮雲半空上清吹隔池來臨眺盡寰中南史徐勉傳華樓迥觀頗有臨眺之美沈約詩即事既多美臨眺殊復竒謝靈運逸民賦指寰中以為期李百藥詩聲教盡寰中是日巡遊處李徳林文鸞駕巡遊留臺務廣虞世南詩巡遊光帝典晴光逺近同唐太宗詩晴光脆柳枝劉孝綽詩芳洲直千里逺近風光扇川明分渭水沈炯詩雲開萬里徹日麗百川明書導渭自鳥鼠同穴水經渭水出隴西首陽縣渭谷亭南鳥䑕山三輔黄圖渭水貫都以象天漢唐太宗望終南山詩重巒俯渭水樹暗辨新豐江淹騷體臨星朏兮樹闇看日爍兮霞淺西京雜記太上皇徙長安居深宫悽愴不樂髙祖乃作新豐移諸故人實之太上皇乃悦一統志新豐城在臨潼縣東一十五里庾肩吾詩遙識新豐樹巖壑清音暮謝靈運詩巖壑寓耳目楊素詩巖壑澄清景左思詩山水有清音王僧孺詩等嶰谷之清音天歌起大風王勃碑文奏鳴鳳于天歌下清羣籟史記髙祖紀髙祖酒酣自為歌曰大風起兮雲飛揚文中子大風安不忘危其霸心之存乎周明帝詩奉杯延故老今聞歌大風張九齡従幸温泉喜雪按品彚本有奉和姚令公五字漢書文帝紀上幸甘泉注蔡邕云天子車駕所至臣民以為僥倖故曰幸劉潛啟自碣宫陪宴釣臺従幸攀附鱗翼三十餘載晉書紀瞻傳有温泉而無寒火唐書地理志京兆府昭應驪山有温泉宫天寳六載更温泉曰華清宫治湯井為池環山列宫室又築羅城置百司及十宅一統志陜西西安府驪山在臨潼縣東南二里山之麓温泉所出唐明皇帝更名昭應萬乗飛黄馬漢書東方朔傳蘇秦張儀一當萬乗之主而都卿相之位澤及後世陸雲九愍裔皇聖之豐祐膺萬乘之多福謝靈運撰征賦雲檣千艘雷輜萬乘淮南子黄帝治天下鳯皇翔于庭麒麟遊于郊飛黄服皁注飛黄如狐背亦有角乘之夀三千嵗郭璞賛飛黄竒駿乗之難老唐書兵志以尚乘掌天子之御左右六閑飛黄吉良龍媒騊駼駃騠天苑千金狐白裘史記孟嘗君傳秦昭王囚孟嘗君孟嘗君使人抵昭王幸姬求解幸姬曰妾願得君狐白裘此時孟嘗君有一狐白裘直千金入秦獻之昭王更無他裘坐有能為狗盜者曰臣能得狐白裘乃夜為狗行入秦宫蔵中取所獻狐白裘以獻秦王幸姬管子代之出狐白之皮狐白應隂陽之變六月而壹見禮記君衣狐白裘錦衣以禓之漢書匡衡傳長安令楊興説樂陵侯史髙曰富貴在身而列士不譽是有狐白之裘而反衣之也注師古曰狐白謂狐腋下之皮其毛純白為裘輕故貴也正逢銀霰積詩如彼雨雪先集維霰傳霰暴雪也箋將大雨雪始必微温雪自上下遇温氣而摶謂之霰久而寒勝則大雪矣沈約賦巖陬兮海岸氷多兮霰積南史梁武帝紀帝發襄陽自冬積霰至是開霽士卒咸悦如向玉京遊靈樞金景内經下離塵境上界玉京枕中書𤣥都玉京七寳山周圍九萬里在大羅天之上瑞色鋪馳道謝恵連雪賦盈尺則呈瑞于豐年唐髙宗詩玉庭浮瑞色銀牓藻祥徽史記秦始皇紀二十七年治馳道漢書成帝紀不敢絶馳道注馳道天子所行道若今之中道也謝朓詩飛甍夾馳道垂楊䕃御溝花文拂綵旒韓詩外傳凡草木花皆五出雪花獨六出漢郊祀歌被華文厠霧縠曳阿錫佩珠玉按花古作華禮記天子玉藻十有二旒前後邃延注雜采曰藻天子以五采藻為旒按綵古作采庾肩吾詩三子俱來入髙軒映綵旒宋之問詩空樂繁行漏香烟薄綵旒還聞吉甫誦詩文武吉甫萬邦為憲傳吉甫尹吉甫也又吉甫作誦其詩孔碩又吉甫作誦穆如清風不共郢歌儔戰國䇿客有歌於郢中者始曰下里巴人國中屬而和者數千人為陽阿薤露和者數百人為陽春白雪和者數十人引商刻羽雜以流徵和者不過數人而已張協詩不見郢中歌能否居然别李乂春日侍宴芙蓉園應制雍録曲江隋鑿之為芙蓉池且為芙蓉園水殿臨丹籞栁惲詩天淵臨水殿庾信詩荷香薰水殿沈約三日侍宴詩帳殿臨春籞説文篽禁苑也漢書注篽者折竹以繩連綿禁禦使人不得往來山樓遶翠微庾信銘氷谷銀砂山樓石柱沈約樂府鶴樓峻連翠微左思蜀都賦鬱葐蒀以翠微昔遊人託乗魏文帝與呉質書追思昔游猶在心目陸機詩疇昔之遊好合纒綿楚辭質菲薄而無因兮焉託乗而上浮魏文帝與呉質書従者鳴笳以啟路文學託乘于後車盧思道詩應徐託後乘今幸帝垂衣易黄帝堯舜垂衣而天下治摯虞黄帝賛垂衣而治萬國乂安澗篠縁峯合廣韻篠細竹也江總詩澗漬長低篠江逌竹賦縁崇嶺帶迴川梁簡文帝詩前時篠生今欲合盧思道詩極野羣峯合巖花逗浦飛何遜詩巖樹落髙花陳子良詩巖花映綬開劉孝綽詩落花浮浦出梁簡文帝詩逗浦憶辰陽張正見詩花飛髙樹風朝來江曲地晉書王徽之傳西山朝來致有爽氣水經注謝𤣥于江曲起樓森聳可愛王勃賦繞江曲之寒沙無處不光輝沈炯詩名都一何綺春日吐光輝楊庶爵里無考奉和九月九日登慈恩寺浮圖應制西京雜記漢武帝宫人賈佩蘭九月九日佩茱萸食蓬餌飲菊花酒云令人長夀葢相傳自古莫知其由景龍文館記九月九日中宗幸慈恩寺登浮圖羣臣獻菊花酒稱夀張禮遊城南注慈恩寺本隋無漏寺貞觀二十一年髙宗在春宫為文徳皇后立為慈恩寺永徽三年沙門三蔵法師起塔長安中摧倒天后及王公施錢重加營造雍録慈恩寺西院塔崇三百尺萬乗臨真境張衡南都賦總萬乗兮徘徊陸雲文裔皇聖之豐祐膺萬乗之多福謝靈運撰征賦雲檣千艘雷車萬乘梁昭明太子解二諦義此智未真而習觀真境豈得以智未真智而使境非真境雲笈七籖服靈寳神丹後自然神靈骨輕身有光明足蹈真境而為上仙也重陽眺逺空齊民月令重陽日必以糕酒登髙眺迥以暢秋志庾肩吾侍宴九日詩獻夀重陽節迴鑾上苑中桓子新論及其乗風蹈峯而聲徹眺逺者其勢通也梁簡文帝詩可憐數行雁㸃㸃逺空排慈雲浮雁塔梁簡文帝大法頌慈雲吐澤法雨垂凉白帖如來慈心如彼大雲䕃注世界西域記昔有比丘見羣雁飛翔乃曰可充我食一雁即墮地佛曰此雁王也不可食因立雁塔梁簡文帝愛敬寺銘仙衣梵帶去雁塔而來遊陸倕天光寺碑龍城愧飾雁塔慙珍日宇奪暉月宫掩麗定水映龍宫楞嚴經月光童子修習水觀初成此觀有弟子闚窻觀室唯見清水後出定身質如初謝朓詩舊埒新塍分青苗白水映庾肩吾春日詩水映寄生竹梁元帝善覺寺碑花疑鳳翼殿若龍宫江總鐘銘朝驚鷲嶺夜動龍宫寳鐸含飇響梁昭明太子講席詩寳鐸旦參差名香晚芬郁簡文帝同泰寺浮圖詩銀燭踰汝漢寳鐸邁昆吾洛陽伽藍記永寧寺繡柱金鋪駭人心目髙風永夜寳鐸和鳴鏗鏘之聲聞十餘里陸機演連珠賁鼓宻而舍響朗笛疎而吐音陶潛閑情賦願在竹而為扇含淒飈於柔幄何遜七召竹距石以袤通水韻松而含響仙輪帶日紅江總詩徐輪動仙駕唐太宗賦秋日懸清光詩仙馭隨輪轉列子日初出大如車輪沈約詩紅輪映早寒唐太宗詩紅輪不暫停天文將瑞色易觀乎天文以察時變觀乎人文以化成天下潘岳閒居賦窺天文之秘奥究人事之終始唐髙宗詩玉庭浮瑞色銀牒藻祥薇輝煥滿寰中陳書蔡景歴傳雕麗輝煥摛掞絢藻謝靈運逸民賦指寰中以為期謝莊鸚鵡賦審國音於寰中梁元帝長沙寺碑咸秩社首義盡於寰中李恒進士第官安陽令奉和九月九日聖製登慈恩寺浮圖應制風土記九月九日律中無射而數九俗尚折茱萸房以插頭辟除惡氣續齊諧記費長房謂桓景曰九月九日汝家當有災宜作絳嚢繫臂登髙飲菊花酒此禍可除寳地臨丹掖王融出家順善篇頌澡身浴徳晦迹埋名將安寳地誰留化城王僧孺為南平王讓儀同表神夢紫霄心飛丹掖香臺瞰碧雲拾遺記宋景公燒異香于臺上有野人請見語未來之兆已往之事萬不失一又石虎舂雜寳異香為屑使數百人于樓上吹散之名曰芳塵臺盧照鄰遊昌化山精舍詩寳地乗峯出香臺接漢髙江淹詩日暮碧雲合闗河天外出陶潛詩關河不可踰謝朓詩旌節去關河宋玉賦長劍耿耿倚天外阮籍大人先生傳霓旌飄兮雲旂靄樂游兮出天外張正見度闗山天外落竒兵城闕樹中分陸機詩名都一何綺城闕鬱盤桓顔延之詩城闕生雲烟梁簡文帝詩葉影樹中移睿藻蘭英秀王襃詩徒知仰睿藻抽辭殊未申虞茂詩睿藻冠風騷漢武帝秋風詞蘭有秀兮菊有芳魏文帝秋胡行俯折蘭英仰結桂枝陸機詩幽蘭盈道合長秀被髙岑仙杯菊蕋薰庾信䝉賜酒詩仙人一遇飲分得兩三杯西京雜記九月九日飲菊花酒令人長夀庾信詩餘菊尚浮杯盧湛菊花賦黄蕋星羅謝靈運山居賦花分薫而媚秀願將今日樂曹植詩今日同堂出門異鄉詩王在在鎬豈樂飲酒長奉聖明君晉書樂志進願輔聖君宋書樂志六合寧承聖明何承天詩願我聖明君遐期保萬春宗楚客奉和人日清暉閣宴羣臣遇雪應制景龍三年雍録閣本大明宫圖清暉閣在太液池上東北邊窈窕神仙閣張衡西京賦羣窈窕之華麗嗟内顧之所觀王延夀靈光殿賦旋室㛹娟以窈窕注窈窕深也史記封禪書公孫卿曰陛下可為觀如緱城置脯棗神人宜可致也且仙人好樓居於是令長安作蜚亷桂觀甘泉作益延夀觀曹植辨道論觀神仙於瀛州求安期于邊海洞𡨕記元鼎元年起招仙閣于甘泉宫闕上燒荃蘼香屑止用粟許其香氣三月不絶宋孝武帝詩逢臯列神苑遭壇樹仙閣參差雲漢間揚雄甘泉賦増宫嵾差注嵾與㕘同唐太宗詩㕘差麗雙闕照耀滿重闈詩倬彼雲漢為章于天疏天漢起于東方經箕尾之間史記天官書紫宫後六星絶漢抵營室曰閣道潘岳西征賦擢仙掌以承露干雲漢而上至九重中禁啟楚辭君之門以九重注天子有九門謂關門逺郊門近郊門城門臯門雉門應門庫門路門也庾信詩自布南風曲還來吹九重後漢書宦者傳論閽者守中門之禁徐陵書中朝大議曽未矜論清禁嘉謨安能相及李尤東觀銘升降三除貫啟七門梁簡文帝書桂宫既啟復垂雙闕之宴沈約詩閶闔既洞啟龍樓亦髙闢七日早春還薛道衡詩入春纔七日離家已二年梁簡文帝詩梅花特早偏能識春謝燮早梅詩迎春故早發獨自不疑寒梁元帝詩春還春節美太液天為水史記封禪書建章宫北治大池漸臺髙二十餘丈命曰太液池中有蓬萊方丈瀛洲壺梁象海中神山漢書郊祀志北治大池漸臺二十餘丈名曰太液東都賦太液昆明鳥獸之囿顔延之曲水詩序苑太液懐層山劉孝威詩紫川通太液丹岑連少華易坎為水晉書天文志天在地外水在天外水浮天而載地者也梁元帝臨秋賦雲出山而相似水含天而難别蓬萊雪作山唐㑹要貞觀問營永安宫後改為蓬萊宫咸亨初改蓬萊宫為含元殿又改大明宫北據髙原南望爽塏每天晴日朗望終南如指掌京城坊市階陌俯視如在檻内唐書地里志龍朔後帝嘗居大明宫乃謂之西内髙宗厭西内湫濕龍朔三年始大興葺曰蓬萊宫後漢書班超傳西域有白山通嵗有雪亦名雪山謝莊雪賦眄隰則萬頃同縞瞻山則千巖俱白今朝上林樹詩縶之維之以永今朝梁簡文帝三月三日詩握蘭惟是旦採艾亦今朝庾信詩今朝得夢蘭漢書東方朔傳建元三年起上林苑西京雜記初修上林苑羣臣逺方各獻名果異卉三千餘種植其中亦有制為美名以標竒麗也呉均詩雞鳴上林苑薄暮小平津全唐詩話李義府八嵗舉神童文皇在上林有捕得鳥者義府進詩曰上林如許樹不借一枝棲上曰今以全樹借汝無處不堪攀嵇康與山巨源絶交書自惟至熟有必不堪者七甚不可者五陶𢎞景詩只可自怡悦不堪持贈君庾信枯樹賦樹猶如此人何以堪謝靈運嶺表賦蘿蔓絶攀苔衣流滑棗據詩徙倚憑髙山仰攀桂樹柯韋述京兆人家有書二千巻兒時記覽皆徧綴文操牘便就舉進士時甚少儀形眇小考功郎宋之問曰韋學士童年有何事業對曰性好著書之問曰本求異才果得遷固開元中詔馬懐素編次圖書奏用述等二十六人同於秘閣詳録四部書五年而成述好譜學又于栁冲姓族系錄外撰開元譜二十卷張説引為集賢院直學士累遷尚書工部侍郎在書府四十年居史職二十年勒成國史事簡記詳蕭穎士以為譙周陳夀之流春日山莊謝朓詩解佩拂山莊梁昭明太子詩命駕出山莊廣韻莊莊田初嵗開韶月夏小正初嵗祭耒始用暢也曹植詩初嵗元祚吉日惟良謝靈運詩開春獻初嵗白日出悠悠梁元帝纂要孟春曰初嵗又春景曰韶景田家喜載陽應璩詩田家無所有酌醴焚枯魚盧照鄰詩田家自有樂誰肯謝香溪詩春日載陽梁武帝賦獻嵗發暉春日載陽晚晴搖水態何遜詩振衣喜初霽褰裳對晚晴司馬相如上林賦隨風澹淡與波搖蕩又八川分流相背而異態遲景蕩山光詩春日遲遲謝恵連三月三日詩遲遲和景婉夭夭園桃灼庾肩吾春夜詩水光懸蕩壁沈約詩山光浮水至春色犯寒來浦淨漁舟逺駱賔王詩水淨望如空劉孝威詩漁舟繞落花王勃滕王閣序漁舟唱晚響窮彭蠡之濵唐太宗詩深悲黄鶴孤舟逺花飛樵路香庾成師詩憶别春花飛庾信馬射賦序落花與芝葢同飛沈約詩安仁採樵路徐陵啟拾金樵路髙士所羞晉白紵舞歌陽春白日風花香李百藥賦花飄香兮動笑虞世南詩吹花送逺香自然成野趣淮南子因天地之自然謝道韞詩非工復非匠雲構發自然陶潛歸去來辭園日涉以成趣武三思石淙山詩對酒鳴琴追野趣都使俗情忘曹植七啟肥遯離俗澄神定靈陶潛詩林園無俗情孫逖上陽水牕賜宴按品彚本作奉和四月三日上陽水牕賜宴應制唐書地理志東都上陽宫在禁苑之東東接皇城之西南隅上元中置髙宗常居以聴政翰林盛事開元中張説等十八人為學士于東都上陽宫含象亭圖形寫御賛述之釋名牕聰也于内外見之聰明也廣韻在牆曰牖在屋曰窻韓詩外傳晉平公使范昭觀齊國之政景公賜之宴北史韋師傳上召師與左僕射髙頻上柱國韓擒虎等於卧内賜宴令各叙舊事以為笑樂李諧述身賦或林嬉于月夜或水宴于景斜今日逢新夏荀子欲觀千載則審今日古詩今日良宴㑹歡樂難具陳陶潛詩今日天氣佳魏文帝槐賦俾暮春之既替即首夏之初期支遁詩三春迭云謝首夏含朱明歡遊續舊旬應璩與弟書間者北遊喜歡無量陶潛桃花源詩童孺縦行歌斑白歡遊詣魏明帝詩遊弗淹旬遂屆揚土廣韻十日曰旬氣和先作雨禮記奮至徳之光動四氣之和以著萬物之理論衡瑞應之出殆無種類因善而起氣和而生晉書律歴志春氣和則角聲調後漢書費長房傳東海大旱長房至海上見其人請雨乃曰東海君有罪吾前繫于葛陂今方出之使作雨也於是雨立注恩厚别成春新書仁義恩厚人主之芒刃也權勢法制人主之斤斧也後漢書劉虞傳虞以恩厚得衆懐被北州春秋繁露明王正喜以當春正怒以當秋班固答賔戲其君天下也炎之如日威之如神函之如海養之如春鳳管臨清洛列仙傳王子喬好吹笙作鳳鳴遊伊洛間浮丘公接引上嵩山謝朓七夕賦回龍駕之容裔亂鳳管之淒鏘孔稚圭表縦金龍吹鬱其前鳴笳鳳管疊其後梁元帝啟殷殿初基拾龍淵之寳虞祠始搆獻鳳管之玉潘岳藉田賦清洛濁渠引流激水劉孝綽昭明太子集序宴遊西園祖道清洛書伊洛瀍澗傳伊出陸渾洛出上洛一統志河南河南府洛水源出陜西洛南縣冢嶺山東流經盧氏永寧宜陽洛陽偃師鞏縣入於河龍輿下紫宸阮籍詩良馬騁龍輿隋煬帝詩翠霞乗鳳輦碧霧翼龍與唐明皇帝實錄開元十二年三月宴朝集使于紫宸殿唐㑹要龍朔三年四月始御紫宸殿聴政百僚奉賀雍録含光之北為宣政宣政之北為紫宸此中歌在藻陶潛桃花源記此中人語云不足為外人道也又詩此中有真意欲辨已忘言詩魚在在藻有頒其首王在在鎬豈樂飲酒箋魚之依草猶人之依明王也王融曲水詩序信凱讌之在藻知和樂於食萍李嶠上禮食表不恥獻芹之陋方期在藻之歡還見躍潛鱗詩王在靈沼於牣魚躍又潛雖伏矣亦孔之炤北齊明堂樂歌潛鱗躍翠漣宿雲門寺杜甫歌若耶溪雲門寺吾獨胡為在泥滓青鞵布襪従此始一統志寺在浙江紹興府雲門山晉王獻之居此嘗有五色祥雲詔建寺號雲門今名廣孝寺香閣東山下庾信詩尚聞香閣梵猶聴竹林鐘謝偃詩逶迤度香閣宋之問詩綵仗紅旌繞香閣一統志雲門山在府城南三十里呉均詩掛月青山下烟花象外幽洛陽伽藍記其中烟花霧草或傾或倒沈約詩年芳被禁籞烟花繞層曲孫綽天台山賦散以象外之説暢以無生之篇梁武帝文爍靈義於象外江總詩情幽豈徇物志逺易驚羣宋之問詩離宫秘苑勝瀛洲别有仙人洞壑幽懸燈千嶂夕江總燈賛寳燈夜開光遍花臺梁簡文帝詩窻斜八綺燈懸百枝世説謝康樂尋山陟嶺必造幽峻巖嶂千重莫不徧歴陳後主三善殿夕望山燈詩金岫多風烟華燈此岫邊張纉賦水泓澄以闇夕山參差而辨旦盧照鄰詩途遙日向夕捲幔五湖秋通典諸葛亮屯于陽平巻幔開四門掃地却飲酒王融詠幔詩月映不辭巻風來輒自輕顧野王詩窻開翠幙巻周禮夏官職方氏揚州其浸五湖注具區五湖在呉南張勃呉錄五湖者太湖之别名以其周行五百餘里故曰五湖晉西洲曲採蓮南塘秋何遜詩蕭散烟霧晚淒清江漢秋駱賔王詩葉下洞庭秋畫壁餘鴻雁楚辭天問注屈原見楚有先王之廟及公卿祠堂圖畫天地山川神靈及古聖賢怪物行事因書其壁呵而問之庾信詩龍來隨畫壁鳳起逐吹簧又寒壁畫花開爾雅注列枿餘也疏遺餘也法苑珠林散壊無遺餘詩鴻雁于飛紗窻宿斗牛庾信蕩子賦紗窻獨掩羅帳長垂劉孝威詩紗窻相向開無名氏詩深掩粧窻卧碧紗説文宿止也晉書天文志州郡躔次斗牽牛織女呉越揚州又張華傳斗牛之間常有紫氣庾信賦路已分於湘漢星猶看於斗牛更疑天路近西京賦要羨門乎天路曹植詩髙髙上無極天路安可窮鮑照詩龍飛逸天路李嶠詩雲霞天路近夢與白雲遊列子黄帝閒居大庭之館而夢遊於華胥氏之國南齊髙逸傳褚伯玉居瀑布山三十餘年王僧達為呉郡苦禮致之丘珍孫與僧達書僧達答曰褚先生従白雲遊舊矣近故要其來此冀慰日夜張九齡詩翻疑夢裏遊王昌齡詩西歸夢中遊同邢判官尋龍湍觀歸湖中唐書百官志節度使觀察使等皆有判官一人星使下天京後漢書李郃傳和帝分遣使者微行到益發州投邸郃時夏夕露坐因仰觀問曰二君京師時寧知朝廷有二使耶二使曰不聞也郃指星示云有二使星向益州分野故知之耳晉書天文志流星天使也星大者使大小者使小漢書周勃傳亞夫至灞上趙涉遮説曰將軍此去諸侯以為従天而下也詩有命自天命此文王于周于京李白詩粲粲呉與史衣冠耀天京雲湖喜晝晴潯陽記晉義熙中呉隸於雲湖中為魚塞有人言晚當有大魚攻塞幸勿害之隸曰諾頃之大魚至羣魚従之拾遺記靈帝遊西園歌曰千年萬嵗喜難踰左傳敬仲曰臣卜其晝梁簡文帝詩雲穿天半晴更従探穴處史記自序南遊江淮上㑹稽探禹穴江總賦太史來而探穴宋之問詩禹穴今朝到耶溪此路通還作棹歌行蕭放咏竹詩還作葛陂龍隋書地理志洞庭競渡之戲迅檝齊馳櫂歌亂響陸機櫂歌行名謳激清唱榜人縦櫂歌張正見詩欲奏江南曲聊習棹歌行絲管荷風入拾遺記帝奏招商之歌以來涼氣曰清絲流管歌玉鳬宋之問詩風泉度絲管散駱賔王詩衣麝入荷風謝朓詩風入芳帷簾帷竹氣清南史雪霰交下簾帷皆白祖詠秋日聞百舌鳥詩秋天聞好鳥驚起出簾帷張説詩天香涵竹氣蘇頲詩館將花雨映潭與竹聲清莫愁歸路逺崔峒詩平子四愁今莫比陶潛詩行行循歸路沈佺期遊少林寺詩歸路烟霞晚揚雄河東賦既發軔於平盈兮誰謂路逺而不能従水月夜虛明江總賦寢處風雲憑棲水月唐太宗聖教序松風水月未足比其清華南史蕭子顯傳自序曰登髙目極臨水送歸風動春朝月明秋夜有來斯應毎不能己陶𢎞景尋山志庭虛月映江總月詩水上動搖明進船泛洛水書導洛自熊耳東北㑹于澗瀍山海經洛水出洛西山東北注河入成臯之西漢宫典職徳陽殿周遊容萬人自偃師去宫四十五里激洛水於殿下禁園紆睿覽班固西都賦西郊則有上囿禁苑林麓藪澤庾信華林園馬射賦皇帝翊四校於仙園迴六龍於天苑唐六典大明宫在禁苑之東南接宫城之東北隅韋安石詩睿覽八紘外天文七曜披仙棹叶時遊江總詩仙舟李膺棹小馬王戎鑣宋之問詩仙遊實壯哉茅山父老歌何時乎來遊洛北風花樹帝王世紀武王營洛邑而定鼎焉今洛陽縣西南洛水之北有鼎中觀是也庾信詩水紋恒獨㫁風花直亂迴虞世南詩驚鳥排林度風花隔水來王融詩花樹雜為錦月池皎如練丘遲與陳伯之書雜花生樹羣鶯亂飛江南彩畫舟爾雅江南曰揚州史記貨殖傳江南卑濕多竹木豫章出黄金古樂府江南可採蓮蓮葉何田田論衡船車載人孰與其徒多也素車朴船孰與加漆采畫也然則鴻筆之人國之船車采畫也蕭慤詩凌晨方畫舟芳生蘭蕙草楚辭余既滋蘭之九畹兮又樹蕙之百畮又芝蘭變而不芳兮荃蕙化而為茅古詩蘭澤多芳草春入鳳皇樓薛道衡詩入春纔七日離家已二年鮑照詩鳳樓十二重四户八綺窻江淹詩蕩子久從征鳳樓簫管閑王僧孺詩嬴女鳳皇樓漢姬栢梁殿興盡離宫暮殷仲文詩獨有清秋日能使髙興盡晉書王徽之傳徽之居山隂夜雪初霽忽憶戴逵逵時在剡便乘小舟詣之經宿方至其門不前而返人問其故曰乘興而來興盡而返何必見安道耶漢書枚乗傳修治上林雜以離宫班固西都賦離宫别館三十六所晉書天文志離宫六星天子之别宫烟光起夕流江淹詩烟光拂夜色華舟盪秋風庾闡閑居賦晨渠吐溜歸潮夕流謝靈運嶺表賦看朝雲之抱岫聴夕流之注澗李白宫中行樂水緑南薫殿曹植詩遊魚潛緑水謝朓入朝曲逶迤帶緑水帝舜南風曲南風之薰兮可以解我民之愠兮六典興慶宫之北曰濯龍門其内左曰芳苑門右曰麗苑門南走龍池曰瀛洲門内曰南薰殿花紅北闕樓司馬相如上林賦發紅華垂朱榮駱賔王詩花枝發夜紅史記漢髙祖紀蕭丞相營作未央宫立東闕北闕張衡西京賦北闕甲第當道直啟陸機樂府駕言出北闕鶯歌聞太液盧照鄰詩蝶戲緑苔前鶯歌白雲上岑羲詩花笑鶯歌迎帝輦漢書郊祀志建章宫北治大池漸臺髙二十餘丈名曰泰液班固西都賦前唐中而後太液覽滄海之湯湯張衡西京賦顧臨太液滄池漭沆鳳吹繞瀛洲梁武帝詩鳳吹方㕘差梁昭明太子七契鳳吹鼉鼓終不屑情丘遲詩詰旦閶闔開馳道聞鳳吹廣韻吹尺偽切史記秦始皇紀徐市言海中有三神山名曰蓬萊方丈瀛洲仙人居之漢書揚雄傳武帝營建章鳳闕神明馺娑漸臺泰液象海水周流方丈瀛洲蓬萊窮極妙麗班固西都賦濫瀛洲與方壺蓬萊起乎中央孔紹徳詩何須問方士此處即瀛洲素女鳴珠珮史記封禪書太帝使素女鼓五十絃瑟揚雄賦聴素女之清聲兮觀宓妃之妙曲謝恵連詩鳴珮專後輿庾信春賦鳴珮凌波之水梁簡文帝樂府下牀著珠珮捉鏡安花鑷沈約履詩逆轉珠珮響先表繡桂香天人弄綵毬魏畧邯鄲淳見曹植才辨歸對其所知歎植之才謂之天人水經注崑崙山有墉城西王母之所治真宫仙虛之所宗品物羣生希竒特甚天人濟濟不可具記孫萬夀詩英辨接天人唐書百官志中尚署令一人丞二人嵗寒食獻毬荆楚嵗時記寒食打毬鞦韆拖鈎之戲武平一詩令節重遨遊分鑣戲綵毬今朝風日好詩以永今朝梁簡文帝三日詩握蘭惟是日採艾亦今朝庾信詩今朝好風日園苑足芳菲盧思道詩山泉好風日張説詩何許承恩宴山亭風日好宜入未央遊詩夜如何其夜未央疏未央者前限未到之詞故漢有未央宫三輔黄圖髙祖七年蕭何造未央宫括地志未央宫在雍州長安縣西北十里班固西都賦自未央而連桂宫北彌明光而亘長樂蘇頲詩芳園翠輦遊二寒雪梅中盡南史梁南平王偉傳每祁寒積雪則遣人載樵米隨乏絶者賦給之謝靈運苦寒行嵗嵗層氷合紛紛霰雪落唐太宗詩寒辭去冬雪暖帶入春風梁昭明太子五日啟凍雨洗梅樹之中庾肩吾詩梅花應可折倩為雪中看張正見詩雪盡青山路氷銷緑水池唐太宗詩送寒餘雪盡迎嵗早梅新春風柳上歸潘