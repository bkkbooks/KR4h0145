注春鳥蟄而始出者若今南郡黄雀之屬戰國策黄雀因是以俯噣白粒仰棲茂樹述異記淮水中黄雀至秋化為蛤春復為黄雀徐幹詩顧瞻空寂寂唯聞燕雀聲杜甫詩春知催柳變江與放船清唐太宗詩年柳變池臺清溪一路踏花歸王襃詩鳥道無蹊徑清溪有波瀾庾闡詩朝濟清溪岸張正見詩千仞清溪險王維詩鹿女踏花行徐摛詩岸曲斜梁阻何時香步歸空林野寺經過少謝靈運詩卧疴對空林江總詩空林徹夜鐘王維詩積雨空林烟火遲岑參詩野寺荒臺晚杜甫詩野寺根石壁爾雅郵過也注道路所經過古辭華山畿曲願君如行雲時時見經過杜甫詩幽棲地僻經過少落日深山伴侣稀謝靈運賦望新晴於落日謝恵連詩落日隠簷楹左傳其蔵冰也深山窮谷固隂沍寒于是乎取之晉書朱冲傳冲毎聞徵書至輒逃入深山庾信詩山深雲濕衣本起經我今欲滅諸苦故來至此諸苦㫁時當與一切衆生作伴侣杜甫詩不獨避霜雪其如儔侣稀負米到家春未盡家語子路曰由事二親之時食藜藿之食為親負米百里之外親沒南遊于楚従車百乗積粟萬鍾累絪而坐列鼎而食雖欲食藜藿為親負米不可復得也杜甫詩負米夕葵外讀書秋樹根髙士傳牛牢恒有疾州郡之官常先到家致意焉孟浩然詩林卧愁春盡李白詩春盡秋轉碧風蘿閑掃釣魚磯王筠詩昧旦清音上風氣入纎蘿錢起詩雲木聳鶴巢風蘿掃虎穴楚辭避世隠身釣魚江濵淮南子設鼠者機動釣魚者泛杭任重者車鳴也杜甫詩兒扶立釣磯孟浩然詩釣磯平可望苔磴滑難步儲光羲詩出徑惜松影入舟憐釣磯過故人陳羽山居陳羽江東人登貞元進士第厯官東宫尉佐向來攜酒共追攀杜甫詩向來幽興極髙隠外書戴顒春日攜雙柑斗酒往聴黄鸝聲此日看雲獨未還王僧達詩歡乗此日暇杜甫詩此日此時人共得庾信詩遙看塞北雲杜甫詩憶弟看雲白日眠又龎公隠未還不見山中人半載易行其庭不見其人詩自我不見于今三年謝𤣥暉詩故人心不見沈約詩山中有桂樹王粲詩哀彼東山人屈平九歌山中人兮芳杜若依然松下屋三間别賦唯世間兮重别謝主人兮依然左傳松栢之下其草不殖劉越石詩繫馬長松下世説蔡司徒在洛見陸機兄弟住參佐廨中三間瓦屋魯靈光殿賦三間四表八維九喁峯攅仙境丹霞上孔稚圭北山移文列壑爭譏攅峯竦誚宋之問詩江回雲壁轉天小霧峯攅又宴唐鄉山亭序苔閣茅軒髣髴入神仙之境魏文帝芙蓉池詩丹霞夾明月華星出雲間鮑照詩摛堞隠丹霞沈佺期詩緒言霞上開機事塵外掃水遶漁磯緑玉灣郭璞塟經勢如降龍水繞雲従韓愈詩或採于薄漁于磯江淹别賦春草碧色春水緑波何遜詩水緑半含苔却望夏陽懐二妙全唐詩作夏洋一統志夏州城在寧夏衞城東黄河岸側晉時赫連據此稱大夏魏置夏州又洋縣在漢中府城東南一百二十里本漢城固縣也後魏分置興勢縣尋于縣置儻城郡隋初郡廢縣屬洋州晉書衞瓘傳瓘為尚書令與尚書郎索靖俱善草書時人號為一臺二妙滿崖霜樹曉斑斑南史張充傳介然之志峭聳霜崖鮑照詩霜崖滅土膏呉邁逺樂府簷隠千斑霜樹梁昭明太子啟霜抱樹而擁柯後漢書五行志車斑入河間寄劉禹錫謝相園西石徑斜晉書謝安傳安於土山營墅樓館林竹甚盛每攜中外子姪往來游集南史王儉傳儉嘗謂人曰江左風流宰相唯有謝安水經注石徑﨑嶇人跡裁交孔稚圭北山移文石徑荒凉徒延佇庾信賦入攲斜之小徑知君習隠暫為家沈約詩知君心有憶北山移文學道東魯習隠南郭有時出郭行芳草陶潛詩有時不肯言南史謝靈運傳靈運出郭游行或一百六七十里顔延之詩驅車出郊郭行路正逶遲楚辭王孫遊兮不歸芳草生兮萋萋孫綽蘭亭集後序髙嶺千尋長湖萬頃乃藉芳草鑑清流覽卉物觀魚鳥長日臨池看落花詩春日遲遲疏遲遲者日長而暄之意唐明皇詩時清日復長馬融廣成宫頌棲遲乎昭明之觀休息乎髙光之榭以臨乎宏池劉緩詩新花臨曲池梁元帝賦春花落兮春日暉庾信賦落花與芝葢同飛楊柳共青旗一色又看飛花之度窻春去能忘詩共賦沈約詩春秋更去來參差不相見隋煬帝詩故年春始去今年秋復來陶潛詩春秋多佳日登髙賦新詩又歸去來辭臨清流以賦詩客來應是酒頻賖易有不速之客三人來古詩客従逺方來遺我雙鯉魚呉志潘璋傳璋性博蕩嗜酒居貧好賖酤債家至門輒言後豪富相還古辭可憐白鼻騧相將入酒家無錢但共飲畫地作交賖杜甫詩鄰人有美酒稚子也能賖五年不見西山色左傳卜征五年而嵗習其祥詩自我不見于今三年晉書王徽之傳西山朝來致有爽氣謝朓詩迤邐西山足又渺渺蒼山色沈沈寒水波江淹詩山氣亘百里山色與雲平悵望浮雲隠落霞謝朓詩停驂我悵望輟棹子夷猶劉繪詩相思將安寄悵望南飛鴻魏文帝詩西北有浮雲亭亭如車葢梁簡文帝詩浮雲舒五色瑪瑙映霜天又落霞乍續㫁晚浪時迴復沈君攸詩鶴葢低昂照落霞朱灣宴楊駙馬山亭廣韻駙馬都尉漢官武帝置晉尚公主者並加之駙付也垂楊拂岸草茸茸梁元帝詩巫山巫峽長垂柳復垂楊又落花灑行路垂楊拂砌塵又柳條恒拂岸庾肩吾詩春枝拂岸影上來還杯繞客光中度盧仝詩相逢之處花茸茸白居易詩草縷茸茸雨剪齊繡户窻前花影重沈約詩鳴珠簾於繡户散芳塵于綺席江淹賦雕臺繡户當衢横術鮑照詩朗月出東山照我綺窻前王維詩來日綺窓前寒梅作花未張正見詩風前花未㫁日處影還重鱠下玉盤紅縷細禮記肉細者為膾開業平陳記呉都獻松江鱸魚煬帝曰金虀玉鱠東南佳味漢武内傳西王母以玉盤盛桃七枚四枚與帝自食三枚張衡詩美人贈我青琅玕何以報之雙玉盤江淹頌為我羽翼委君玉盤杜甫詩刀鳴膾縷飛酒開金甕緑醅濃庾信詩開君一壺酒細酌對春風隋書賀若弼傳上聞弼有功驛召之命登御坐賜以寳劒寳帶金甕金盤各一李白詩遙看漢水鴨頭緑却似葡萄初撥醅廣韻醅酒未漉也中朝駙馬何平叔通典周制天子有四朝二曰中朝在路門外夏官司士正其位唐明皇詩禮樂中朝貴魏志曹爽傳注何晏字平叔正始初為散騎常侍郎遷侍中尚書前以尚主得賜爵為列侯南國詞人陸士龍詩滔滔江漢南國之紀鮑照詩南國有儒生漢書司馬相如傳賛詩人之賦麗以則詞人之賦麗以淫晉書陸雲傳雲字士龍與兄機齊名幼時閔鴻竒之曰此兒若非龍駒當是鳳雛落日泛舟同醉處謝靈運賦望新晴於落日隋煬帝詩菱潭落日雙鳬舫左傳秦輸粟于晉自雍及絳相繼命之曰泛舟之役魏明帝詩泛舟黄河隨波潺湲王彪之詩泛舟理飛棹酒譜勾踐得酒則流之于江與士同醉陸雲文矧同波而俱醉白居易詩心期同醉卯時杯回潭百丈暎千峯宋之問序落霞歸而疊嶂明飛泉灑而迴潭響孟浩然詩迴潭石下深綠篠岸傍宻庾信文華隂百丈之泉豈獨髙于蓮井丘遲詩百丈窺重泉呉均書夾岸髙山互相軒邈爭髙直指千百成峯王建字仲初潁州人大厯十年進士初為渭南尉厯秘書丞侍御史太和中出為陜西司馬従軍塞上後歸咸陽卜居原上建工樂府與張籍齊名宫詞百首尤傳誦人口早春五門西望書疏天子五門臯庫雉應路三禮義宗宫門有五法五行百官朝下五門西易百官以治書唐虞稽古建官惟百沈佺期詩軒裳半下朝塵起春風滿御堤沈約詩塵起邯鄲陸陶潛詩春風扇微和沈約詩春風滿春樹岑參詩野店臨官路重城壓御堤黄帕葢鞍呈過馬唐書禮樂志天子肆覲刺史贄其土之實錦綺繒布葛越皆五兩為東覆以黄帊又地理志寧州彭原郡土貢五色覆鞍氊春明退朝錄北都使宅有過馬㕔韓偓詩中官過馬不教嘶注上乗馬中官馭以進謂過馬既過乃蹀躞嘶鳴也紅羅繫項鬭迴雞班固西都賦紅羅颯纚綺組繽紛辛延年詩不惜紅羅裂何論輕賤軀本草大薊小薊一名雞項草戰國策臨淄甚富而實其民無不吹竽鼓瑟撃筑彈琴鬬雞走狗者曹植詩鬬鷄東郊道東城老父傳明皇喜民間清明鬬鷄立雞坊于兩宫間選六軍小兒五百人使馴養之館松枝重牆頭出唐書百官志武徳四年置修文館于門下省九年改曰𢎞文館王融詩羃䍥女蘿草蔓衍旁松枝南史張譏傳後主幸鍾山開善寺召従臣坐于寺西松林下勅譏豎義索麈尾未至勅取松枝以代麈尾杜甫詩牆頭過濁醪渠柳條長水面齊説文渠水所居也周禮掌固掌修城郭溝池樹渠之固注渠上有樹也北史柳昂傳柳條通體弱獨搖不須風梁元帝詩長條垂拂地顧野王詩馳道柳條長王襃詩離離嶺樹齊惟有教坊南草色韋誕景福殿賦教坊講肆才士布列唐書百官志京都置左右教坊掌俳優雜技王僧孺文霜銷草色王維詩雨中草色緑堪染古苔隂地冷凄凄説文菭水衣也賈至詩舊館秋隂生緑苔魏書裴安祖傳安祖常出直天熱舍樹下有鷙鳥逐雉雉急投之遂觸樹而死安祖愍之取置隂地良久得蘇王昌齡詩萌草拆隂地詩秋日凄凄百卉具腓潘岳賦寒凄凄以凛凛上張𢎞靖相公唐書宰相世系表元和九年六月河中節度使張𢎞靖為刑部尚書同中書門下平章事九年十二月𢎞靖守中書侍郎十年正月𢎞靖罷檢校吏部尚書河東節度使傳封三世盡河東宋書孔琳之傳襲封之印奕世相傳舊唐書張嘉貞蒲州猗氏人也開元八年擢中書侍郎同中書門下平章事累封河東侯晚年一子本名寳符開元末召見賜名延賞貞元二年徵為中書侍郎同中書門下平章事子𢎞靖字元理元和中拜刑部尚書同中書門下平章事時號三相張氏云又地理志河中府隋河東郡武徳元年置蒲州治雙泉縣三年移蒲治河東縣家占中條第一峯括地志蒲州河東縣雷首山一名中條山一統志中條山在蒲州東南一十五里張子容詩朝雲暮雨連天暗神女知來第㡬峯旱嵗天教作霖雨書若嵗大旱用汝作霖雨爾雅三日以往為霖雨杜甫詩霖雨思賢佐明時帝用補山龍曹植求自試表志欲自効于明時杜甫詩罷歸無舊業老去戀明時詩衮職有闕惟仲山甫補之書予欲觀古人之象日月星辰山龍華蟲作㑹疏山取能興雲雨龍取變化無方草開舊路沙痕在劉長卿詩舊路青山在唐故事宰相初拜京兆使人載沙填路自私第至於城東街名曰沙堤王君攸詩浪息累沙痕日照新池鳳跡重張翰詩暮春和氣應白日照園林張載濛汜池賦想白日之納光覩洪暉之皓􅀈晉書荀勗傳勗為中書監除尚書令人賀之曰奪我鳯凰池諸君何賀耶謝朓直中書省詩兹言翔鳯池鳴佩多清響杜甫詩欲知世掌絲綸美池上於今有鳳毛卑散自知霄漢隔張説詩攀雲引疲散南史宋髙祖紀望霄漢以興懐王勃詩鸞情極霄漢李白贈崔侍御詩夫子在其間遂成雲霄隔若為門下賜従容戰國策齊人有馮煖者貧不能自存使人屬孟嘗君寄食門下張華詩門下多豪賢庾信演連珠門下賔客任安獨存莊子鯈魚出遊従容是魚樂也史記留侯世家所與上従容言天下事甚衆江淹詩従容冰井臺清池暎華薄上武元衡相公唐書武元衡傳字伯蒼舉進士為華原令徳宗欽其才召拜員外郎遷右司郎中以詳整任職擢御史中丞嘗對延英帝目送之曰是真宰相器元和二年拜門下侍郎同中書門下平章事旌旗坐鎮蜀江雄釋名析羽為旌旌精也有精光也又熊虎為旗將軍所建象其猛如虎與衆期其下也謝朓詩旌旗散容與簫管吹參差任昉表王暕坐鎮雅俗𢎞益已多唐書武元衡傳時蜀新定髙崇文為節度使不知吏治詔元衡檢校吏部尚書兼門下侍郎同平章事為劒南西川節度使帝令重開舊閣崇漢書公孫𢎞傳公孫𢎞起自徒步數年至宰相于是起客館開東閣以延賢人與參謀議通典陳三公之制開黄閣置鴟尾劉長卿詩松蘿深舊閣舊唐書武元衡傳元和八年徵還至駱谷重拜門下侍郎平章事襃貶唐書天厯上杜預春秋序指行事以正襃貶任昉詩直史兼襃貶孔安國尚書序少昊顓頊髙辛唐虞之書謂之五典史記漢太初元年十一月甲子朔旦冬至天厯初改建于明堂諸神受紀捧持堯日慶雲中魏志程昱傳注昱少時嘗夢上泰山兩手捧日盧照隣文歌雲佑漢捧日匡堯史記堯紀就之如日杜正倫詩湛露依堯日尚書大傳于是俊乂百工相和而歌卿雲帝舜乃倡之曰卿雲爛兮糺縵縵兮瑞應圖非氣非烟五色絪緼謂之慶雲支遁詩嘉祥歸宰相藹若卿雲浮孤情迥出鸞凰外郭璞詩放情凌霄外王維詩鑾輿迥出千門柳離騷鸞凰為余以先駕兮雷師告余以未具揚雄反騷鸞凰騰而不屬兮豈獨飛廉與雲師健思潛搜海嶽空劉長卿詩孔璋才素健劉楨詩君侯多壯思文雅縦横飛孫綽遊天台山賦序非夫逺寄冥搜篤信通神者何肯遙想而存之髙適詩探象㑹冥搜鮑照河清頌澄波海嶽鏡流蔥山徐陵書化感烟雲量懐海嶽文心雕龍意翻空而易竒長得蕭何為相國史記蕭相國世家髙祖自將至邯鄲使使拜丞相何為相國益封五千户梁元帝令周粤天官秦稱相國自西流水盡朝宗詩自西自東書弱水既西詩沔彼流水朝宗于海謝朓牋汙横之水思朝宗而每竭王維詩君王來袚褉灞滻亦朝宗武元衡字伯蒼河南緱氏人建中四年登進士第累辟使府至監察御史徳宗知其才召授比部員外郎嵗内三遷至右司郎中尋擢御史中丞順宗立罷為右庶子憲宗即位復前官進户部侍郎元和二年拜門下侍郎同平章事尋出為劍南節度使八年徵還秉政早朝為盜所害贈司徒諡忠愍秋燈對雨坐聴宫城傳晚漏南史張裕傳裕子鏡與顔延之鄰居顔談議飲酒喧呼不絶而鏡靜黙後鏡與客談延之于籬邊取胡牀坐聴鏡辭義清𤣥延之曰彼有人焉由是不復酣叫六典唐都城三重外一重名京城内一重名皇城又内一重名宫城亦名子城漢書董賢傳賢隨太子官為郎傳漏在殿下注傳漏奏時刻陸倕新漏刻銘序皇帝毎旦晨興屬傳漏之音聴雞人之響唐書百官志宫門郎掌宫門管籥凡夜漏盡擊漏鼓而開夜漏上水一刻擊漏鼓而閉起看衰葉下寒枝蘇武詩征夫懐往路起視夜何其古詩常恐秋節至焜黄花葉裒陸機詩豐條逐春盛落葉後秋衰柳惲詩亭臯木葉下李百藥詩喬木下寒葉何遜詩祁祁寒枝動濛濛秋雨駛李白詩猿影掛寒枝空庭緑草閑行處何遜詩空庭秋月華盧思道詩空庭緑草深古詩迴風動地起秋草凄以緑宋南平王鑠詩堂上生流塵庭中緑草滋沈約詩東郊豈異昔聊可閑余步社甫詩興饒行處樂細雨黄花獨對時王融詩細雨亂叢枝梁簡文帝詩細雨階前入灑砌復沾惟禮記鞠有黄華洛陽伽藍記秋霜降草則菊吐黄花張協詩寒花發黄采宋南平王鑠詩獨對明燈歎蟋蟀已驚凉節至詩十月蟋蟀入我牀下古里語蟋蟀鳴懶婦驚阮籍詩開秋兆凉氣蟋蟀鳴東壁王粲詩凉風兆秋節魏畧公孫淵表曰臣本欲須凉節乃取彌等茱萸空憶故人期風土記茱萸榝也九月九日熟色可採時也西京雜記宫内九月九日佩茱萸食蓬餌飲菊花酒令人長夀曹植詩茱萸自有芳不若蘭與桂沈約詩漠漠牀上塵心中憶故人江總詩故人朝市狎心期林壑乖相逢莫厭樽前醉古詩相逢狹路間道狹不容車徐孝克詩願言于此地攜手屢相逢杜甫詩樽前失詩流塞上得國寳髙適詩飲酒莫辭醉醉多適不愁春去秋來總不知沈約詩春秋更來去參差不相見隋煬帝詩故年春始去今年秋復來荀濟詩年來空自老嵗去不知春酬嚴司空荆南見寄書司空掌邦土居四民時地利杜氏通典秦無司空置御史大夫漢更名御史大夫曰大司空後漢去大為司空公後周為冬官謂之大司空卿隋及唐復為三公㑹要唐貞元二年勅自上都至汴州為大路驛至荆南為次路驛金貂再入三公府漢官儀侍中金蟬左貂金取堅剛蟬居髙食潔貂内勁悍而外温潤梁元帝賦珥金貂而待問何胥詩日彩麗金貂書立太師太傅太保兹惟三公漢書彭宣傳宣為大司空上書言三公鼎足承君玉帳連封萬户侯抱朴子兵在太乙玉帳之中不可攻也唐書藝文志兵家有玉帳經一巻史記蕭相國世家悉封何父子兄弟十餘人皆有食邑乃益封何二千户又李廣傳文帝曰惜乎子不遇時如令子當髙帝時萬户侯豈足道哉孔紹安詩若使三邊定當封萬户侯簾捲青山巫峽曉庾信詩朱簾捲麗日又玉押珠簾捲朱超詩青山麗朝景江總詩青山近照樓水經注望帝使鼈靈鑿巫峽通水蜀得陸處郭璞江賦衝巫峽以迅激濟江流而起漲梁元帝詩巫山巫峽深峭壁聳春林雲凝碧樹渚宫秋子夜歌寒雲浮天凝張正見詩白雲凝絶嶺列子呉楚之國有大木焉其名為櫾碧樹而冬生梁昭明太子七契碧樹初蕊緑草含滋左傳王使子西為商公沿漢泝江將入郢王在渚宫下見之元和志渚宫楚别宫也一統志渚宫在江陵縣故城北杜甫詩髙鳥連雲暮寒蟬碧樹秋劉琨坐嘯風清塞晉書劉琨傳琨在晉陽常為胡騎所圍城中窘迫無計琨乃乗月登樓長嘯賊聞之凄然長歎向曉並棄圍而走後漢二郡謠南陽太守岑公孝𢎞農成瑨但坐嘯謝朓詩専城空坐嘯晉書劉𢎞傳賛威靜荆塞化行江澳謝朓裁詩月滿樓齊書謝朓傳朓善𨽻書長五言詩沈約嘗云二百年來無此詩也李白詩髙人屢解陳蕃榻過客同登謝朓樓杜甫詩故林歸未得排悶强裁詩鮑照詩碧樓含夜月劉孝先詩飛鏡㸃青天横照滿樓前白雪調髙歌不得宋玉對楚王問客有歌于郢中者其為陽春白雪國中屬而和者不過數十人杜氏通典博物志云白雪是天帝使素女鼓五絃琴曲名以其調髙人和遂寡自宋玉以來迄今千祀未有能歌白雪者美人南國翠娥愁詩有美一人清揚婉兮曹植詩南國有佳人容華若桃李庾信詩南國美人去梁元帝詩汗輕紅粉濕坐久翠眉愁李白詩紅粧欲醉宜斜日百尺清潭寫翠娥劉禹錫西塞山懐古詩話長慶中元微之劉夢得韋楚客同㑹樂天舍論南朝興廢事各賦金陵懐古以西塞山為題夢得畧無造意引滿而成樂天覽之曰四人探驪龍子先獲珠所餘鱗爪何用耶遂罷唱一統志西塞山在武昌大冶縣東九十里王濬樓船下益州晉書王濬傳濬字士治𢎞農人為益州刺史武帝謀伐呉濬乃作大船連舫方百二十步受二千餘人以木為城起樓櫓開四出門其上皆得馳馬往來舟楫之盛自古未有呉志晉命龍驤將軍浮江東下一統志成都古蜀國漢曰益州蜀漢都此金陵王氣黯然收晉書秦時望氣者云五百年後金陵有天子氣始皇東巡以厭之改其地為秣陵塹北山以絶其王氣名勝志金陵古丹陽秦始皇埋金玉雜寳以厭天子氣故名曰金陵謝朓詩江南佳麗地金陵帝王州孟浩然詩自古登臨處非今獨黯然庾信賦將非江表王氣終於三百年乎千尋鐵鎖沈江底廣韻八尺曰尋晉書王濬傳呉人於江險磧要害之處並以鐵鎖横截之又作鐵錐長丈餘暗置江中以逆距船濬乃作大筏數十方百餘步縛草為人披甲持仗令善水者以筏先行筏遇鐵錐錐輒著筏去又作火炬長十餘丈大數十圍灌以蔴油在船前遇鎖然炬燒之須臾融液㫁絶於是船無所礙一片降旗出石頭司馬相如長楊賦提劍而叱之所過麾城摲邑下將降旗呉志孫權傳建安十六年權徙治秣陵明年城石頭晉書王渾傳王濬破石頭降孫皓威名益振晉書王濬傳濬入於石頭皓乃備禮造於壘門濬躬解其縛送於京師人世㡬回傷往事潘岳秋興賦放浪乎人間之世江總銘屑屑人世茫茫大千岑參詩五朝變人世千載空江聲史記述往事思來者春秋繁露孔子作春秋理往事正是非山形依舊枕寒流駱賔王詩山形類九折水經注依山傍江開勢明逺憑墉藉阻髙觀枕流韋應物西塞山詩勢従千里奔直入江中㫁嵐横秋塞雄地束江流滿謝朓詩寒流自清泚駱賔王詩其間寒流激今逢四海為家日漢書髙帝紀天子以四海為家張衡西京賦掩四海而為家杜甫詩天下車書共一家故壘蕭蕭蘆荻秋周禮夏官量人營軍之壘舍量其市朝川涂軍社之所置廣韻壘軍壁也水經注八陣圖東跨故壘益州記姜維抗鍾㑹故壘其山峭壁千丈下臨絶澗九歌風颯颯兮木蕭蕭爾雅蒹薕注荻也蘆屬而小可為箔又葭蘆注此即蒹葭之葭謂蘆爾杜甫秋興詩請看石上藤蘿月已暎洲前蘆荻花徐陵詩江秋岸荻黄柳絮本草柳花一名絮四民月令三月三日以及上除採栁絮飄颺南陌起東鄰祖孫登風詩飄颺楚王宫徘徊繞竹藂宋子侯詩花落何飄颺梁武帝樂府十四採桑南陌頭李白詩南陌愁為落葉分鮑照詩風起花四散庾肩吾啟池通西舍之流窻暎東鄰之棗王維詩山陽多北户潛水在東鄰漠漠濛濛暗度春枚乘柳賦堦草漠漠白日遲遲吁嗟細柳流亂輕絲李端折楊柳雨烟遙漠漠唐太宗詠柳詩濛濛添絲宻李白詩池草暗生春鮑令暉詩經秋復度春皇甫曽詩平沙雪度春花巷暖隨輕蝶舞李端詩雀乳盻巢花巷靜魏文帝柳賦景風扇而増暖岑參詩風恬日暖蕩春光杜甫詩顛狂栁絮隨風舞宋之問詩飛花隨蝶舞沈約詩輕舞信徘徊杜甫詩風輕粉蝶喜花暖蜜蜂喧玉樓晴拂艶粧人十洲記崑崙山有玉樓十二孟浩然詩草迎金埓馬花伴玉樓人楊巨源詩楊柳玉樓晴梁元帝樓檐柳詩拂檐應有意偏宜桃李人劉希夷詩玉樓思艷粧縈回謝女題詩筆唐明皇帝雪詩縈回屢逐風崔湜詩落絮縈衫袖世説謝太傅雪夜内集公曰白雪紛紛何所似兄子胡曰撒鹽空中差可擬兄女道藴曰未如柳絮因風起杜甫詩題詩好細論又甫詩石欄斜㸃筆桐葉坐題詩㸃綴陶公漉酒巾晉書謝朗傳夜月明淨㑹稽王道子歎以為佳朗子重在座率爾曰不如微雲㸃綴戴叔倫柳花詩綴雪含霜誰忍攀南史陶潛傳潛少有髙趣嘗著五栁先生傳以自況郡將候潛值其酒熟取頭上葛巾漉酒畢旋復著之玉篇漉竭也涸也滲漉也又巾佩巾也本以拭物後人著之於頭何處好風偏似雪陶潛詩微雨従東來好風與之俱梁元帝詠柳詩輕花上逐風又栁絮飄晴雪唐太宗柳詩縈雪臨春岸張九齡詩風花亂成雪李白柳詩樹樹花如雪隋河堤上古江津隋書食貨志自板渚引河達於淮海謂之御河河畔築御道樹以柳開河記大業年築隄自大梁至灌口堤下栽垂柳詔民間有柳一株賞以一縑故百姓競植之龍舟所過香聞百里盧綸詩若到隋堤上應逢花滿船郭璞江賦衝巫峽以迅激蹲江津而起浪李白詩漢水東連揚子津注永淳元年析江都縣置揚子縣有𤓰步步即渡江處横江建康之西津揚子建康之東津也韓愈和庫部盧四兄曹長元日朝回本集原注盧汀也唐六典周禮夏官有司甲下大夫司戈盾弓矢以辨其職以待軍事今庫部郎中之任也唐書百官志庫部郎中員外郎各一人掌戎器鹵簿儀仗國史補尚書丞郎郎中相呼為曹長天仗宵嚴建羽旄唐書儀衞志朝㑹之仗五皆帶刀捉仗列坐於東西廊下岑參詩曉隨天仗入唐書禮樂志羣官就次侍中版請中嚴舊唐書職官志凡駕行幸有夜警晨嚴之制左傳晉人借羽旄於鄭孟子見羽旄之美東都賦羽旄掃霓旌旗拂天詩建彼旄矣春雲送色曉雞號蔡凝詩春色徧空明春雲處處生瑞應圖五色絪緼謂之慶雲易通卦驗冬至之日見雲送迎王維詩絳幘雞人報曉籌史記厯書鷄三號卒明注三號三鳴也言夜至鷄三鳴則天曉金爐香動螭頭暗庾信詩非是金爐氣何闗栢殿香賈至詩衣冠身惹御爐香唐書儀衞志朝日殿上設黼扆躡席薰爐香案又百官志起居舍人秉筆隨宰相入殿夾香案分立殿下直第二螭首和墨濡筆皆即坳處時號螭頭雍録殿前螭頭葢玉階扶欄上壓頂横石刻為螭頭之狀玉珮聲來雉尾髙詩瓊瑰玉珮崔曙詩春風鳴玉珮隋煬帝詩長階鳴珮聲賈至詩劍佩聲隨玉墀步古今注殷髙宗有雉雊之祥故有雉尾扇唐書儀衞志人君舉動必以扇雉尾障扇四小團雉尾扇四方雉尾扇十二杜甫詩雲移雉尾開宫扇戎服上趨承北極左傳戎服將事唐書儀衞志黄旗仗立於兩階之次皆戎服也又步甲隊毎隊一人戎服大袍帶横刀執旗二人引二人夾皆戎服大袍帶弓箭沈約詩晨趨朝建禮徐彦伯詩予亦趨三殿肩隨謁九重爾雅北極謂之北辰注北辰天之中杜甫詩玉几由來天北極儒冠列侍暎東曹史記酈食其傳沛公不好儒客冠儒冠來者輒解其冠溺溲其中杜甫詩儒冠多悞身魏都賦藹藹列侍金蜩齊光續漢書東西曹掾比四百石崔顥詩西掖黄樞近東曹紫禁連太平時節難身遇亢倉子太平之時上士運其識中士竭其能魏武帝詩對酒歌太平時荀子寒暑知節而五穀時熟易林四時順節民安其業袁宏名臣賛古之君子不患𢎞道難遭時難遭時不難遇君難晉書皇甫謐傳寄身聖世託道之靈郎署何須歎二毛漢武故事帝輦過郎署見顔駟龎眉皓髮上問曰叟何時為郎對曰臣文帝時為郎文帝好文而臣好武至景帝好貌而臣貌醜陛下即位好少而臣已老是以三世不遇荀悦漢紀馮唐白首屈于郎署左傳君子不重傷不擒二毛注頭白有二色潘岳秋興賦序子年三十有二始見二毛以太尉掾兼虎賁中郎將寓直於散騎之省楊巨源長安春游鳳城春報曲江頭王維詩柳暗百花明春深五鳳城杜甫詩銀漢遙應接鳳城王綽詩玉管潛移律東郊始報春雍録曲江漢時周迴六里餘唐周七里占三十頃地在城東南昇道坊龍華寺之南宋之問詩栁變曲江頭上客年年是勝游史記春申君傳有客三千上客皆躡珠履司馬相如賦上客何國之公子劉瑗詩江南少許地年年情不同王維詩年年春更歸宋璟詩承恩續勝遊劇談錄曲江池本秦時隑洲唐開元中疏鑿為勝景花卉環列烟水明媚都人游玩盛於中和上已之節秦中嵗時記二月二日曲江挑菜士民遊觀者極盛日暖雲山當廣陌江淹賦旭日始暖陳後主詩曖日暖源桃岑參詩風恬日暖蕩春光蕭慤詩雲來覺山近崔湜詩山河眺望雲天外沈約詩秋風吹廣陌天清絲管在髙樓王羲之蘭亭序天朗氣清恵風和暢杜甫詩天清風巻幔蘭亭序雖無絲竹管絃之盛宋之問詩主人絲管清且幽古詩西北有髙樓王延夀魯靈光殿賦陽榭外望髙樓飛觀蘢蔥樹色分仙閣李頎詩松篁氣蔥蘢白居易詩樓閣蘢蔥半隠天何遜詩山烟涵樹色江淹詩風光多樹色王維詩樹色分揚子劉允濟賦望仙閣之秀出沈佺期詩並命登仙閣通宵直禮闈縹緲花香泛御溝楊乂雲賦漂渺翩綿鬱若升烟陶𢎞景仙風賦縹緲遙裔劉瑗詩遙望疑花發聞香知異春杜甫詩春風花草香古今注長安御溝謂之楊溝謂植楊其上也呉均詩青瑣門外安石榴連枝接葉夾御溝賀文標詩泛水拂垂楊桂壁朱門新邸第西京雜記温室以椒塗壁被之文繡香桂為柱梁簡文帝碑文柱削芳桂漢冊魏公九錫文是用錫君朱户晉書麯允傳南望朱門北望青樓東觀漢記竇氏一公兩侯三公主四二千石相與並代自祖及孫官府邸宅相望漢書諸侯邸第百餘皆髙祖一切功臣漢家恩澤問鄼侯史記天子始建漢家之封漢書劉向傳聖人常無私於上均恩澤於下史記蕭相國世家髙帝以何功最盛封為鄼侯注鄼音賛鄼有二縣其屬沛郡者音嵯屬南陽者音賛按茂陵書蕭何國在南陽宜呼賛今多呼嵯漢書蕭何傳武帝元狩中復下詔以鄼户二千四百封何曽孫慶為鄼侯又宣帝時求問蕭相國後在者下詔以鄼户二千封其𤣥孫建世為鄼侯早朝鐘聲清禁纔應徹南史齊武帝以宫内不聞鼓漏置鐘於景陽樓以應五鼓何遜早朝詩詰旦鐘聲罷隠隠禁門通傅咸賦穆穆清禁濟濟羣英祖詠詩寒疎清禁漏夜警羽林兵庾信詩鐘聲徹建章漏報仙闈儼已開後漢書律歴志孔壺為漏浮箭為刻下漏數刻以考中星昏明生焉杜甫詩晝漏稀聞髙閣報廣韻闈宫中門也錢起詩應驚片雪下仙闈唐書百官志宫門郎掌宫門管籥凡夜漏盡擊鼓而開夜漏上水一刻擊漏鼓而閉雍録元和元年置百官待漏院在建福門外候禁門啟入朝雙闕薄烟籠菡萏史記髙祖紀蕭丞相營作未央宫立東闕北闕車􅀈詩雙闕似芙蓉李嶠詠烟詩迥浮雙闕路遙拂九仙衣諸葛穎詩薄烟淨遙色詩隰有荷華疏未開曰菡萏已發曰芙蓉王延夀魯靈光殿賦發秀吐榮菡萏披敷何晏景福殿賦菡萏赩翕纎縟紛披九成初日照蓬萊魯靈光殿賦漸臺臨池層曲九成注言重髙九層也謝朓觀雨詩既灑百常觀復集九成臺何遜早朝詩初日照相風雨京記大明宫紫宸殿北曰蓬萊殿趙彦昭詩飛橋象河漢懸榜學蓬萊雍録蓬萊殿後有蓬萊山山聳起池中朝時但向丹墀拜左傳凡朝以正班爵之義張衡西京賦青瑣丹墀漢官儀尚書奏事于明光殿省中以丹朱漆地曰丹墀唐書禮樂志皇帝受羣臣朝賀其日皇帝出即御座王公以下以次入就位典儀曰再拜賛者承傳在位者皆再拜仗下方従碧殿迴唐書儀衞志朝罷皇帝入東序門然後放仗又内外仗隊七刻乃下常參朝日六刻即下景福殿賦文以朱緑飾以碧丹沈佺期詩碧殿下秋隂又早朝詩儼若神仙去紛従霄漢迴聖道逍遙更何事莊子聖道運而無所積故海内服韓詩外傳孔子抱聖人之心彷徨於道徳之域逍遙乎無形之鄉張衡南都賦聖皇之所逍遙靈祇之所保綏願將巴曲賛康哉宋玉對楚王問客有歌於郢中者其始曰下里巴人國中屬而和者數千人杜甫詩南翁巴曲醉書庶事康哉注衆事皆得安寧唐太宗詩穆矣薰風茂康哉帝道昌元日含元殿下立仗丹鳳樓門下宣赦相公稱賀玉燭寳典正月為端月其一日為元日亦曰上日唐六典大明宫南面五門正南曰丹鳳門丹鳳門内正殿曰含元殿雍錄咸亨元年改蓬萊宫為含元殿殿南端門名丹鳳門唐書儀衞志千牛備身冠進徳冠服袴裮皆執御刀弓箭升殿列御座左右内外諸門帶刀捉仗而立號曰立門仗舊唐書肅宗紀至徳二載十二月戊午朔御丹鳳門下制大赦唐六典凡元旦大陳設於太極殿今含元殿皇帝衮冕臨軒禮畢中書令與供奉官獻夀殿上皆呼萬嵗臨軒啟扇似雲收許敬宗詩睿想追嘉豫臨軒御早秋王勃乾元殿頌序天子臨軒採荀卿之故事王維少年行天子臨軒賜侯印將軍佩出明光宫唐書儀衞志平明侍中奏外辦皇帝步出西序門索扇扇合皇帝升御座扇開左右留扇各三杜甫詩雲移雉尾開宫扇虞世南詩雲收嶺半空率土朝天劇水流詩率土之濵莫非王臣班固薦謝夷吾表上以光七曜之明下以厭率土之望左思呉都賦若率土而論都則非列國之所觖望也李白詩始聞鍊氣調金液復道朝天赴玉京杜甫詩東家蹇驢許借我泥滑不敢騎朝天詩沔彼流水朝宗于海張華詩仰䕃髙林茂俯臨緑水流瑞色含春當正殿唐髙宗詩玉庭浮瑞色楊庶詩天文將瑞色輝煥滿寰中梁簡文帝賦草含春而色動蘇頲詩歌舞妙含春漢書金安上傳數臨正殿延見羣臣傅休奕朝㑹賦坐太極之正殿嚴嵳峩以崔巍唐書太宗紀貞觀三年正月丙午以旱避正殿香烟捧日在髙樓王維早朝詩香烟欲傍衮龍浮杜甫詩朝罷香烟攜滿䄂魏志程昱傳注昱嘗夢上泰山兩手捧日昱本名立太祖乃加其上日更名昱也盧照隣文歌雲佐漢捧日匡堯錢起詩霄漢常懸捧日心王延夀魯靈光殿賦陽榭外望髙樓飛觀張協賦髙樓特起竦峙岧嶤三朝氣蚤迎恩澤漢書孔光傳嵗之朝曰三朝注嵗之朝月之朝日之朝故曰三朝班固東都賦春王三朝㑹同漢京鄭愔詩幸同葵藿傾陽早張九齡折梅詩林惜迎春早漢書劉向傳聖人即天地以耀物常無私於上均恩澤於下協和萬邦黎民無怨曹植責躬詩序愚臣徘徊於恩澤而不敢自棄萬嵗聲長繞冕旒漢書武帝紀詔曰朕親登嵩髙御史乗屬在廟旁吏卒咸聞呼萬嵗者三論衡陸賈新語毎奏一篇左右稱曰萬嵗盧照隣詩九州四海常無事萬嵗千秋樂未央大戴禮古者冕而前旒所以蔽明也沈佺期詩爽氣臨旌㦸朝光映冕旒王維詩萬國衣冠拜冕旒請問漢家功第一史記蕭相國世家列侯畢已受封及奏位次皆曰平陽侯曹參功最多宜第一闗内侯鄂君進曰曹參雖有野戰畧地之功此特一時之事漢與楚相距滎陽蕭何嘗全闗中以待陛下此萬世之功也奈何以一旦之功而加萬世之功哉蕭何第一曹參次之髙祖曰善麒麟閣上識鄼侯漢書蘇武傳甘露三年上思股肱之美乃圖畫其人于麒麟閣法其容貌署其官爵姓名唯霍光不名明著中興輔佐列於方叔召虎仲山甫焉三輔黄圖麒麟閣蕭何造杜甫詩今代麒麟閣何人第一功史記蕭相國世家髙祖以蕭何功最盛封為鄼侯注鄼今南陽鄼縣也張籍寒食内宴荆楚嵗時記去冬節一百五日即有疾風甚雨謂之寒食鄴中記寒食三日作酪醴煮粳米及麥為酪𢷬杏仁煮作粥城闕沈沈向曉寒陸機詩名都一何綺城闕鬱盤桓顔延之詩城闕生雲烟司馬相如上林賦沈沈隠隠砰磅訇磕沈佺期詩雲竇下沈沈張九齡詩未央鐘漏晚仙宇靄沈沈李白詩長川瀉落月洲渚曉寒凝岑參詩雞鳴紫陌曙光寒恩當令節賜餘歡杜甫詩喜結仁里歡況因令節求宋之問詩佳節三秋晚重陽九日歡司馬遷報任安書未嘗銜杯酒接殷勤之餘歡李鏡逺蜨蝶行青年已布澤微虫應節歡瑞烟深處開三殿杜審言詩半嶺通佳色中峯繞瑞烟翰林故事翰林院在銀臺門内麟徳殿西重廊之後三殿者麟徳殿也一殿而有三面故以三殿為名杜甫詩詔従三殿去碑到百蠻開春雨微時引百官説苑春風風人春雨雨人杜甫詩心在水晶域衣霑春雨時潘岳閒居賦微雨新晴六合清朗陶潛詩微雨従東來好風與之俱易百官以治萬民以察書冢宰掌邦治統百官均四海董仲舒策正朝廷以正百官正百官以正萬民寳樹樓前分繡幙王勃滕王閣序非謝家之寳樹接孟氏之芳鄰駱賔王詩宴林薫寳樹水溜滴金沙顧況上元夜詩雲車龍闕下火樹鳳樓前王融散曲金枝湛明燎繡幕裂芳燃劉孝威詩璚綃挂繡幕象簟列華牀綵花廊下暎朱欄梁簡文帝招真館碑帷葉綵花巻舒蹊逕陳元康十四年禁奢詔應鏤金銀薄及庶物化生土木人綵花之屬並皆禁絶左思魏都賦禁臺省中連闥對廊李尤東觀賦上承重閣下屬周廊李白明堂賦赬欄各落偃蹇霄漢盈楹迴合蟬聨汗漫宫筵戲樂年年别庾肩吾詩陪歌承睿賞接醴侍恩筵杜審言詩帝子王孫捧御筵舊唐書音樂志明皇於聴政之暇教太常樂工子弟三百人為絲竹之戲音響齊發毎初年望夜御勤政樓作樂夜闌遣宫女於樓前縛架出眺歌舞以娯之若繩戲竿木詭異巧妙固無其比盧僎詩年年洛陽陌花鳥弄歸人戎昱詩楊柳烟含灞岸春年年攀折為行人已得三迴對御看易晝日三接疏言非惟䝉賜蕃多又被親寵頻數三度接見也國史補李白在翰林多沈飲後對御引足令髙力士脱鞾李白詩常得君王帶笑看御選唐詩巻二十
