萋萋草盛貌楚辭春草生兮萋萋此史達奚武傳同州旱帝勅武祠華岳晚不得還即於岳上藉草而宿江總賦徑行藉草宴坐臨渠謝靈運詩杪秋尋逺山山逺行不近何遜詩天暮逺山青梁簡文帝文鬱乎此山竒狀増多壺觴須就陶彭澤陶潛歸去來辭引壺觴以自酌盻庭柯以怡顔韋元旦詩壺觴既卜仙人夜歌舞旋停織女梭襄陽記司馬徳操常詣龎徳公值其渡沔徳操竟入其室呼徳公妻子使速作黍徐元直向云當來就我與徳公談晉書陶潛傳潛謂親朋曰聊欲絃歌以為三徑之資可乎執事者聞之以為彭澤令一統志彭澤縣屬九江府時俗猶傳晉永和離騷蹇吾法夫前修兮非時俗之所服又何時俗之工巧兮偭規矩而改錯陸雲詩秉心金石固豈従時俗傾晉書王嘉傳所造牽三歌䜟事過皆驗累世猶傳之書法要録永和九年王右軍與親友四十二人修禊于蘭亭揮毫製序按永和晉穆帝年號更使輕橈徐轉去謝瞻詩日落泛澄瀛星羅遊輕橈王籍櫂歌行輕橈暮不息復逐夜潮上武平一詩波搖岸影隨橈轉曹植九華扇賦隨皓腕以徐轉劉峻詩去去無終極微風落日水増波古樂府微風吹閨闥呉均詩皎皎日將上獵獵起微風謝恵連詩落日隠檐楹梁簡文帝詩暉暉隠落日九歌與女遊兮九河衝風至兮水揚波魏文帝臨渦賦䕃髙樹兮臨曲阿微風起兮水増波張華詩増波動芰荷送張道士歸茅山謁李尊師一統志茅山在句容縣東南四十五里形如句字初名句曲山後因茅君得道於此更今名道書為第八洞天第一福地向山獨有一人行庾信詩獵馬向山横史記河渠書禹湮洪水泥行蹈橇山行即橋尸子山行乗樏祖孫登詩獨有相思意聊敞鳳凰臺隋書姚察傳我平陳唯得此一人易一人行則得其友近洞應逢雙鶴迎一統志茅山華陽洞玉柱洞茅洞又有良常羅姑天窻碧巖諸洞庾信明月山銘風生石洞雲出山根王勃序萍水相逢南史庾域傳域為懐寧太守母好鶴唳域營求孜孜不怠一旦雙鶴來下論者以為孝感所致何晏詩雙鶴比翼遊羣飛戲太清庾信步虛詞黄鵠來相迎嘗以素書傳弟子唐書藝文志枕中素書一巻不著録張商英序黄石公圯橋所授子房素書世人多以三畧為是此傳者之悞也晉有盜發子房塚於玉枕中得此書太平經悟師一人教十弟子還因白石號先生列仙傳焦先煮白石食之或以與人味如芋庾信詩白石仙人芋青林隠士松神仙傳白石先生者恒煮白石為糧就白石山居故號白石先生孟子先生將何之無窮杏樹何年種淮南子執要道之柄而遊于無窮之地武元衡詩三千世界本無窮神仙傳董奉居廬山為人治病重者種杏五株輕者一株庾信詩移梨付苑吏種杏乞山人王襃輕舉篇流珠餘舊竈種杏發新叢㡬許芝田帶月耕古詩相去復㡬許神異經鐘山在北海之子地仙家數十萬畊田種芝草課計頃􅒪拾遺記崑崙山第九層山形漸小狹下有芝田蕙圃皆數百頃羣仙種耨焉盧思道詩春朝露濕九芝田陶潛詩帶月荷鋤歸山海經稷之孫叔均是始作牛耕師事少君年嵗久神仙傳東陵聖母師事劉綱史記封禪書李少君以祠竈穀道却老方見上少君者故深澤侯舍人主方匿其年及其生長常自謂七十能使物却老荀濟詩咄嗟改容髩俄傾彌年嵗駱賔王賦蕩子别來年月久欲隨旌節往層城周禮掌節凡邦國之使節山國用虎節土國用人節澤國用龍節門闗用符節貨賄用璽節道路用旌節注今使者所擁節是也淮南子崑崙山有層城九重天台山賦茍台嶺之可攀亦何羨於層城蕭子顯詩睿心重禪室遊駕陟層城皇甫曽早朝日寄所知長安雪夜見歸鴻漢書地理志京兆尹縣長安髙帝五年置西都賦漢之西都實在雍州名曰長安晉書王徽之傳居山隂夜雪初霽忽憶戴逵便夜乗小船詣之家語衞靈公與孔子語見飛鴻過仰視之顔延之歸鴻詩萬有皆同春鴻雁獨辭歸謝朓詩停琴佇凉月滅燭聴歸鴻紫禁朝天拜舞同謝莊文收華紫禁李善注王者之宫象紫微故謂宫中為紫禁李嶠詩白玉仙輿紫禁來舊唐書韓𢎞傳朝天有慶就日方伸易林長樂行觴千秋起舞拜受大福唐書禮樂志内閑廏使引戲馬五坊使引象犀入場拜舞曙色漸分雙闕下唐明皇詩曙色和風著花草李白詩紗窗曙色新庾信祀五帝歌閶闔朝分李嶠詩烏署曉光分魏志陳思王傳注建髙門之嵯峩兮浮雙闕乎太清又閶闔起丹扉雙闕耀朱光史記封禪書新垣平使人持玉杯上書闕下獻之平言上曰闕下有寳玉氣來者已視之果有獻玉杯者刻曰人主延夀班固詩上書詣闕下梁武帝樂府照耀雙闕下漏聲遙在百花中説文漏以銅受水刻節晝夜百刻唐髙宗詩路曲回輪影岩虛傳漏聲古樂府春風宛轉入曲房兼送小苑百花香劉孝先詩夜樓明月弦露下百花鮮虞世南詩横空一鳥度照水百花然何遜詩日色花中亂庾信詩低橋澗底度狹路花中行爐烟乍起開仙仗梁簡文帝詩爐烟入斗帳蕭放詩銀龍銜燭燼金鳳起爐烟庾信文鼎氣常浮爐烟咸起唐書儀衞志凡朝㑹之仗五一曰供奉仗二曰新仗三曰勲仗四曰翊仗五曰散手仗皆帶刀捉仗立於東西廊下毎月以四十六人立内廊閣外號曰内仗玉佩成行引上公詩何以贈之瓊瑰玉佩禮記疏自士以上皆有玉佩宋書樂志羅列自成行李尤東觀賦好緑樹之成行傅休奕詩列宿自成行書庸建爾于上公家語生為上公共荷發生同雨露李嶠謝表受恩于天但知榮荷爾雅春為青陽一曰發生潛夫論春夢發生夏夢髙明禮記雨露既濡不應黄葉久隨風易林桑芳將落隕其黄葉丘遲詩檐際落黄葉階前網緑苔陸機浮雲賦飛仙凌虛隨風游騁楊乂雲賦隨風徘徊流行菴藹寄中書王舍人唐書百官志中書省舍人六人正五品上掌侍進奏參議表章凡詔㫖制勅璽書册命皆起草進畫既下則署行腰金載筆謁承明戰國策黄金横帶魏畧文帝時西域來獻紫球腰帶唐書車服志紫為三品之服金玉帶銙十三緋為四品之服金帶銙十一淺緋為五品之服金帶銙十禮記史載筆士載言南史任昉傳昉尤長載筆才思無窮漢書嚴助傳君厭承明之廬注承明廬在石渠閣外直宿所止曰廬西都賦又有承明金馬著作之庭梁元帝詩驂駕乗駟馬謁帝朝承明至道安禪得此生禮記雖有至道弗學不知其善莊子至道之精窈窈㝠㝠至道之極昬昬黙黙梁武帝方丈曲至道虛凝張纉南征賦尋太傅之故宅今築室以安禪江總詩金河知證果石室乃安禪陶潛詩嘯傲東軒下聊復得此生西掖㡬年綸綍貴漢官儀左右曹受尚書事前世文士以中書在右因謂中書為右曹又稱西掖劉楨詩誰謂相去逺隔此西掖垣陸機詩日月相追周旋萬里倏忽㡬年陶潛詩不知㡬何年禮記王言如綸其出如綍東山遙夜薜蘿情晉書謝安傳寓居㑹稽與王羲之及許詢桑門支遁遊處出則漁弋山水入則言詠屬文雖受朝寄然東山之志始末不渝六朝事迹上元縣有東山在崇禮鄉今土山是也謝安寓居㑹稽棲遲東山此安之舊隠也後於土山營築以擬東山今去縣二十里楚辭倩杪秋之遙夜兮心繚悷而有哀晉書謝安傳論褫薜蘿而襲朱組去衡泌而踐丹墀宋之問詩睿藻光岩穴宸襟洽薜蘿風傳刻漏星河曙舊唐書孔㯋達傳風傳闕里梁武帝閶闔篇衞尉屯兵上期門曉漏傳周禮挈壺氏掌刻漏河圖括地象川地布精上為星河張正見詩耿耿長河曙月上梧桐雨露清江淹别賦月上軒而飛光庾信賦兔月先上羊燈次安何遜詩初月波中上詩梧桐生矣于彼朝陽禮記雨露既濡唐太宗詩初秋玉露清許敬宗詩芝房夕露清聖主好文誰為薦楊惲書伏惟聖主之恩不可勝量王襃聖主得賢臣頌遇明君遭聖主南史袁畯傳梁武帝雅好詞賦時獻文章于南闕者相望焉論衡文章滂沛不遭有力之引薦亦時遺棄於衡門之下閉門空賦子虛成後漢書馮衍傳西歸故郡閉門自保乂陳寔傳閉門懸車棲遲養老漢書司馬相如傳相如客遊梁得與諸侯遊士居乃著子虛之賦蜀人楊得意為狗監侍上上讀子虛賦而善之曰朕獨不得與此人同時哉得意曰臣邑人司馬相如自言為此賦上驚乃召問相如文心雕龍昔儲説始出子虛初成秦皇漢武恨不同時郎士元春宴王補闕城東别業唐書百官志門下省左補闕六人従七品上掌供奉諷諫大事廷議小則上封事柳陌乍隨洲勢轉盧照隣詩寒辭楊柳陌春滿鳳皇城王維詩青青楊柳陌陌上别離人劉勰新論觀形而運竒隨勢而應變孟浩然詩洲勢逶迤繞碧流鴛鴦鸂􅈃滿沙頭謝朓詩淩崖必千仞尋壑將萬轉花源忽傍竹隂開陶潛桃花源記武陵人捕魚為業忽逢桃花林夾岸林盡水源便得一山張説詩桃花春徑滿悞識武陵源劉潛詩依歌移弱步傍竹艷新粧孫擢詩晚花猶結子新竹未成隂能將瀑水清人境梁簡文帝招真館碑瀑水懸流雜天河而俱灑劉斌詩石梁髙鳥路瀑水近天河盧照鄰詩瀑水含秋氣垂藤引夏凉陶潛詩結廬在人境而無車馬喧王勃文信可下清人境上配天都直取流鶯送酒盃張説詩繞殿流鶯凡㡬樹當溪亂蝶許多叢賈至詩百囀流鶯繞建章庾信詩上元應送酒來向蔡經家又美酒餘杭醉芙蓉即奉盃李嶠詩還將石溜調琴曲更取峯霞入酒盃杜甫詩莫怪頻頻勸酒盃山下古松當綺席呉均詩挂月青山下何遜詩家本青山下好上青山上李白詩貞心比古松漢舊儀祭天用綵綺席六重鄒陽酒賦綃綺為席犀璩為鎮江淹詩綺席生浮埃沈君攸詩絲繩玉壺傳綺席簷前片雨滴春苔唐太宗詩元燕舞簷前髙適詩簷前白日應可惜籬下黄花為誰有岑參詩江邨片雨外野寺夕陽邊潘岳詩晨溜承簷滴古詩夜雨滴空階别賦春宫閟此青苔色又或春苔兮始生乍秋風兮蹔起地主同聲復同舍左傳夫諸侯之㑹事既畢矣侯伯致禮地主歸餼以相辭也注地主所㑹主人也岑參詩使君地主能相送易同聲相應同氣相求樂府解題同聲歌漢張衡所作也陸機樂府良㑹罄美服對酒宴同聲史記司馬相如傳相如客遊梁梁孝王令與諸生同舍淮南子三人同舍唐書陸扆傳扆文思敏速揮翰如飛同舍服其能留歡不畏夕陽催杜甫詩泛愛容霜髩留歡一夜闌詩不畏强禦書乃罔畏畏注不畏其所當畏也遜逖詩傳車春色送離興夕陽催孟浩然詩談𤣥殊未已歸騎夕陽催盧綸春日題杜叟山下别業南史謝靈運傳始寧有故宅及墅遂移籍㑹稽修營别業傍山帶江盡丘壑之美石崇思歸引序篤好林藪遂肥遯於河陽别業儲光羲詩别業在青山白鳥羣飛山半晴詩白鳥翯翯沈約詩白鳥暎青疇射雉賦涉青林以遊覽兮樂羽族之羣飛王維文山鳥羣飛日隠輕霞梁簡文帝詩長嶼横山半張九齡詩初逢山雨晴渚田相接有泉聲岑參詩芋葉蔵山逕蘆花雜渚田張衡西京賦結棼橑以相接孟浩然詩荆呉相接水為鄉吕覽髙泉之山其上有湧泉焉陶潛别傳淵明嘗聞田水聲倚杖聴之歎曰此水過吾師丈人矣王勃詩逺近聴泉聲園中曉露青叢合鮑照詩園中鳥多佳聲庾信詩今日小園中宋文帝詩階上曉露潔謝朓詩惜曉露之方晞梁簡文帝詩倒流映碧叢江總石室銘岫濃翠合林虛桂靜孟浩然詩水迴青嶂合橋上春風緑野明劉希夷詩天津橋上繁華子李白詩年年橋上遊子夜春歌春風振榮林謝靈運詩春晚緑野秀唐太宗詩和風吹緑野虞世南詩緑野明斜日青山澹晚烟雲影㫁來峯影出祖孫登詩流清雲影深庾信詩聴歌雲即㫁杜甫詩雲㫁嶽蓮臨大路楊思道詩日落横峯影王績詩時時㫁嶂遮往往孤峯出林花落盡草花生呉均詩林花合復分顧野王序林花翻麗乍飄揚於蘭臯謝朓詩鳥散餘花落李白詩楊花落盡子規啼江淹賦草自然而千花江淹恨賦