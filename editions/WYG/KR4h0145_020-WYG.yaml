家玉笛暗飛聲散入春風滿洛城盧諶詩伏軾徑入闗江淹去故鄉賦泣故闗之已盡儲光羲詩送客臨伊水車行出故闗惆悵梅花落後漢書馮衍傳情惆悵而増傷馬融長笛賦惆悵怨懟古今樂錄梅花落本笛中曲也江總詩長安少年多輕薄雨兩常唱梅花落李嶠詠笛詩逐吹梅花落李白詩黄鶴樓中吹玉笛江城五月落梅花山川不可尋易地險山川丘陵也班固燕然山銘考傳驗圖窮覽其山川陳子昂出塞曲星月開天陣山川列地營謝靈運詩髙髙入雲霓還期那可尋李白詩餘韻渡江去天涯安可尋王昌齡詩横笛怨江月扁舟何處尋秋日韋少府㕔池上詠石容齋四筆唐人好以它名標榜官稱縣令曰明府丞曰賛府尉曰少府主人得幽石禮記主人者接人以仁以徳厚者也謝靈運詩白雲抱幽石王臺卿詩石幽銜細草日覺公堂清詩躋彼公堂韋應物詩公堂日為倦幽襟自兹曠李白詩為邦黙自化日覺氷壺清一片池上色盧詢詩支機一片石庾信詩河邊一片石不復肯支機謝朓詩已有池上酌岑參孤石詩一片他山石巉巉映小池劉長卿孤石詩一片孤雲長不去莓苔古色空蒼然孤峯雲外情逺公廬山記孤峯秀起定法師詠孤石詩獨拔羣峯外孤秀白雲中王襃詩髙峯白雲外恵標詩定知雲壑裏併佇白雲情舊溪紅蘚在古今注苔或紫或青一名員蘚宋之問詩錦績織苔蘚盧照鄰詩舊石開紅蘚新荷覆緑池秋水緑痕生莊子秋水時至百川灌河晉書阮籍傳賛秋水揚波春雲斂色張均詩石痕秋水落何必澄湖徹王獻之帖鏡湖澄澈清流瀉注山川之美使人應接不暇水經注水色澄澈漏石分沙移來有令名南史到溉傳溉第居近淮水齋前小池冇竒礓石長一丈六尺帝戲與賭之并禮記一部溉并輸焉石即迎置華林園宴殿前移石之日都下傾城縦觀所為到公石也晉書殷浩傳少標令名鮑照詩君子樹令名羊士諤泰山人登貞元元年進士第累至宣歙巡官元和初拜監察御史出為資州刺史林塘臈候劉孝綽詩林塘多秀色江總詩鳳葢繞林塘史記秦本紀恵文公十二年初臈始皇三十一年更名臈曰嘉平獨㫁臈者嵗終大祭縦吏民宴飲南國氷霜冷詩滔滔江漢南國之紀江淹詩南國多異山雜樹共冬榮宋之問詩南國無霜霰鮑照詩君不見氷上霜表裏隂且寒傅休奕桃賦亦有冬桃冷伴氷霜年華已暗歸何遜詩客子行行倦年光處處華宋之問詩連年見物華梁簡文帝賦年歸氣新搖芸動塵費昶詩春隨楊柳歸李白詩寒雪梅中盡春風柳上歸閒招别館客宋書雷次宗傳元嘉十五年徵至京師開館於雞籠山聚徒教授久之還廬山二十五年又徵詣京邑為築室於鍾山西巖下謂之招隠館杜甫詩並向殊庭謁俱承别館追沈佺期詩選客虛前館徴歌滿後堂李白詩招客得英才逺念故山薇陶潛詩中宵竚遥念謝靈運詩故山日已逺宋之問詩好採舊山蔽杜甫詩繫書元浪語愁絶故山薇野艇虚還過釋名船二百斛已下曰艇其形徑挺一二人所乘行也張志和漁父詞秋山入簾翠滴滴野艇傍檻雲依依莊子方舟而濟于河有虛船來觸雖褊心之人不怒杜甫詩對君疑是泛虛舟李白詩輕舟已過萬重山歸禽宿更飛陶潛詩日入羣動息歸鳥趣林鳴王維詩暮禽相與還梁簡文帝序露禽乍聚望比翼之翺翔歸鳥時宿聞同心之夜響沈約詩飄薄出孤嶼未曽宿蘭渚飛飛忽云倦相鳴集池籞忘言亦何事莊子得意忘言得言忘象陶潛詩欲辨已忘言孟浩然詩従此願忘言王維詩仙家未必能勝此何事吹簫向碧空杜甫詩獨鶴不知何事舞酣賞步清暉北齊書邢邵傳終日酣賞盡山泉之致謝靈運詩昏旦變氣候山水含清暉李白詩清暉映竹日翠色明松雲劉禹錫鶴歎并引友人白樂天去年罷呉郡唐書白居易傳字樂天以太子左右庶子分司東都復拜蘇州刺史挈雙鶴雛以歸余相遇於揚子津李白詩横江西望阻西秦漢水東流揚子津閱玩終日翔舞調態一符相書唐書藝文志浮丘公相鶴經一巻信華亭之尤物也陶𢎞景瘞鶴銘鶴夀不知其㡬壬辰嵗得於華亭唐書地理志蘇州華亭天寳十載析嘉興置夢溪筆談鶴惟華亭之鶴窠村所出為得地他雖有凡格也左傳夫有尤物足以移人今年春樂天為秘書監唐書白居易傳文宗立以秘書監召不以鶴隨置之洛陽第漢書地理志河南郡縣雒陽一旦予入門問訊其家人鶴軒然來睨如記相識相鶴經軒於前故後指短桓敬道鶴賦延脩頸以軒矚徘徊俯仰鮑照舞鶴賦躑躅徘徊振迅躍摧沈約夜鶴篇俛仰弄清音似含情顧慕填膺而不能言者相鶴經鶴燕膺鳳翼江淹恨賦置酒欲飲悲來填膺賈誼鵩鳥賦鵩迺太息舉首奮翼口不能言請對以臆因作鶴歎以贈樂天范蔚宗詩序客有寄余雙鶴者其一揚翰皎潔響逸九臯其一翅折志哀自視缺然余因歎玩之遂為之詩寂寞一雙鶴謝靈運詩心跡雙寂寞李白鶴賛長唳風宵寂立霜曉曹植詩雙鶴俱遨遊何晏詩雙鶴比翼遊羣飛戲太清主人在西京後漢書耿弇傳光武指弇曰是我北道主人也班固西都賦有西都賔問於東都主人江淹别賦惟世間兮重别謝主人兮依然帝王世紀漢髙帝都長安光武都洛陽時人是以謂洛陽為東京長安為西京曹植詩驅馬過西京故巢呉苑樹易林鳥反故巢歸其室家傅休奕詩孤雌翔故巢隋書五行志烏程有樹髙百尺旁無附枝上有鶴巢民欲取之不可上王維詩鶴巢松樹遍杜甫詩古木松杉巢水鶴毛詩義疏鶴蒼色者謂之赤頰今呉人園中皆養之一統志長洲苑在太湖北岸呉王闔閭遊獵處韋應物詩依微呉苑樹深院洛陽城沈佺期詩誰謂此中難可到自憐深院得迴翔宋子侯詩洛陽城東路桃李生路傍庾信詩諸花舊滿洛陽城徐引竹間步盧思道賦晨沐清露安趾徐步陳書馬樞傳鄱陽王欽其髙尚别築空以處之樞惡其崇麗乃於竹林間自營茅茨而居焉隂鏗咏鶴詩乍動軒墀步宋臨川康王鶴賦趾象虯以振步逺含雲外情水經注清暑臺秀宇澄明通望周博遊者登之以暢逺情宋之問詩江樹逺含情相鶴經翔於雲故毛豐而肉疎江洪鶴詩猶冀凌雲志萬里共翩翩庾信鶴賛雲飛欲舞露落先鳴誰憐風月好南史褚彦回傳嘗聚袁粲舍初秋凉夕風月甚美彦回援琴奏别鵠之曲沈約聞夜鶴篇對此孤明月臨風振羽儀李白詩㑹稽風月好却遶剡溪迴鄰舍坐吹笙原注東鄰即王家西京雜記匡衡勤學而無燭鄰舍有燭而不逮衡乃穿壁引其光以書映光而讀之顔延之文伊好之洽接閻鄰舍列仙傳王子喬好吹笙作鳳皇鳴後告其家曰七月七日待我於緱氏山頭及期果乗白鶴而去李徳裕書樓晴望庾信文王仲宣有讀書之樓幽居人世外禮記幽居而不淫杜甫詩梅發對幽居李頎詩開士幽居祇樹林潘岳秋興賦放曠乎人間之世劉孝綽詩既異人世勞聊比化城樂江總瓊法師碑銘屑屑人世茫茫大千宋書孔淳之傳緬想人外三十年矣文心雕龍心纒㡬務而虛述人外崔顥詩寥寥人境外閒坐聴春禽久厭市朝喧崔曙瓢賦許何挂而厭喧顔何飲而為樂盧綸詩嵇康本厭喧周禮夏官量人量市朝道巷門渠戰國策爭名者于朝爭利者于市今三川周室天下之市朝也史記孟嘗君傳日暮之後過市朝者掉臂而不顧陸機詩遺情市朝永志丘園孫綽詩交情逺市朝王維詩秋野田疇盛朝光市井喧杜甫詩始為江山靜終防市井喧蒼翠連雙闕謝朓詩蒼翠望寒山崢嶸瞰平陸韋應物詩氛氳緑樹多蒼翠千山出曹植賦建髙門之嵯峨兮浮雙闕乎太清繁欽詩嘉樹吐翠葉列在雙闕涯鮑照樂府九塗平若水雙闕似雲浮盧照鄰詩巖巖雙闕似芙蓉微茫辨九原陳子昂詩巫山綵雲沒髙丘正微茫張九齡詩微茫空裏烟李白賦試登髙而望逺極雲海之微茫禮記趙文子與叔譽觀乎九原殘虹映鞏樹褚亮詩晴天度旅雁斜影照殘虹杜審言詩日氣抱殘虹庾肩吾詩雲邊開鞏樹唐明皇詩郊明鞏樹紅宋之問詩遙憐鞏樹花應滿斜日照轘轅虞世南詩緑野明斜日陳子昂詩斜日隠離亭梁簡文帝詩杏梁斜日照王勃詩斜照移仙影李白詩日照錦城頭張衡東京賦迴行道乎伊闕邪徑捷乎轘轅注轘轅十二曲道將去復還故曰轘轅庾信思舊銘原隰載馳轘轅長别劉孝孫詩清晨發巖邑車馬走轘轅薄暮柴扉掩楚辭薄暮雷電廣韻薄至也魏文帝善哉行上山采薇薄暮苦飢范雲詩田家樵采去薄暮方來歸還聞稚子説有客款柴扉王維詩山中相送罷日暮掩柴扉誰知仲蔚園三輔决録注張仲蔚扶風人也少與同郡魏景卿隠身不仕所居蓬蒿沒人陶潛詩仲蔚愛窮居遶宅生蒿蓬岑參詩若訪張仲蔚衡門滿蒿萊東谿本集春暮思平泉雜咏二十首之一劇談録李徳裕東都平泉莊去洛城三十里卉木臺榭若造仙府逺方之人多以異物奉之一統志平泉莊在縣南三十里李衞公園也有平泉樹石記近蓄東谿水周禮地官稻人以瀦畜水以防止水南史劉勔傳聚石畜水髣髴丘中任昉東溪詩交柯溪易隂反景澄餘映王昌齡詩谿水上䝉蘢杜甫詩溪水纔尺餘悠悠起渌波張説詩聞道神仙不可接心隨湖水共悠悠曹植賦遂乃背通谷對緑波别賦春草碧色春水緑波李白詩芙蕖嬌緑波綵鴛留不去蕭鈞詩浪隨文鷁轉渡逐綏鴛浮謝靈運詩風來不可託鳥去豈為聴李白詩白鷗閒不去爭拂酒筵飛芳草日應多楚辭芳草生兮萋萋西都賦竹林果園芳草甘木曹植詩子好芳草豈忘爾貽崔顥詩芳草萋萋鸚鵡洲古詩涉江採芙蓉蘭澤多芳草夾岸生竒篠水經注孟門即龍門上口也夾岸崇深傾厓返棹張正見詩柳影縁溝合槐花夾岸飛隂鏗詩夾篠澄深緑含風結細漪張説詩倚棹攀岸篠憑船弄波月韋應物詩岸篠復迴溪溪溪曲如月廣韻篠細竹也縁巖覆女蘿孫逖詩涉澗猜行潦縁厓畏宿氛魏書李謐傳結宇依巖憑厓鑿室詩蔦與女蘿傳女蘿兔絲松蘿也爾雅女蘿色青而細長無雜蔓九歌若有人兮山之阿披薜茘兮帶女蘿王昌齡詩女蘿覆古壁劉孝綽詩倚巖忽迴望援蘿遂上征蘭橈思無限梁簡文帝采蓮曲桂檝蘭橈浮碧水江花玉面兩相似庾信詩錦纜回沙磧蘭橈避荻洲唐太宗詩飛葢去芳園蘭橈遊翠渚梁武帝詩連山去無限長洲望不極李白詩出門見南山引領意無限為感濯纓歌孟子有孺子歌曰滄浪之水清兮可以濯我纓蘇武詩臨河濯長纓念子悵悠悠劉孝勝詩羞學滄浪水濯足復濯纓顧非熊元和時人況之子為盱貽尉棄官隠茅山詩一巻桃巖憶賈島案文苑英華作姚巖寺路懐友路向桃巖去案桃巖去英華作姚巖寺陶潛桃花源記此中人語云不足為外人道也既出得其船便扶向路嚴維送桃巖成上人歸本寺詩長老歸縁起桃花憶舊巖多行洞壑間謝靈運詩邦君難地險旅客易山行後漢書班固傳超洞壑越峻崖郭璞江賦域之以盤巖豁之以洞壑洛陽伽藍記司馬張倫造景陽山有若自然深溪洞壑邐逶連接鶴聲兼野靜詩鶴鳴于九臯聲聞于天到溉詠琴詩無勞别鶴聲隂鏗詠鶴詩乍動軒墀步時轉入琴聲韓非子時雨降集曠野閒靜溪色帶村閒張融海賦瀾文不動波色還驚梁簡文帝詩窓隂隨影度水色帶風移錢起詩一逕入溪色數家連竹隂廣韻村墅也増韻聚落也任昉汎東溪詩黝黝桑柘繁芃芃麻麥盛疎葦秋前渚詩七月流火八月雈葦疏初生為葭長大為蘆成則名為葦李頎詩八月寒葦花秋江浪頭白蕭慤詩池亭三伏後林館九秋前栁惲詩相思白露亭永望秋風渚李白詩秋渚晦寒姿詩江有渚傳渚小洲也水岐成渚斜陽雨後山詩度其夕陽梁簡文帝招真館碑旭日晨臨同迎若華之色夕陽斜影俱成拂鏡之暉岑參詩深巷斜陽暮鳥還儲光羲詩涼氣生霽後張籍詩謝家兄弟重城裏不