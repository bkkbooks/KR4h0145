客曹植詩消夜遊西園蜀記昔有人姓杜名宇王蜀號曰望帝化為子規于規鳥名禽經江左曰子規蜀右曰杜宇甌越曰怨鳥一名杜鵑埤雅鶯以喜轉䳌以悲啼蕭大圜賦鵑欲啼而芷歇浮客空留聴孔安國尚書傳浮行也鮑照詩浮客未西歸謝恵連詩眷眷浮客心辛徳源歌落花従風俄度春空留可憐何處行江總詩空留折桂心徐悱妻劉氏聴百舌詩注意歡留聴誤令粧不成襃城聞曙雞唐書地理志興元府襃城義寧二年更名襃中貞元三年復故名一統志襃城縣屬漢中府在府城西北四十五里王融詩綿蠻山雨聞庾信詩一羣催曙雞數處驚眠鳥王襃詩伺潮聞曙雞李嶠詠笛風俗通笛滌也所以滌邪穢納之雅正也羌笛寫龍聲説文笛七孔角也羌笛三孔風俗通笛長二尺四寸七孔其後又有羌笛馬融長笛賦近世雙笛従羌起羌人伐竹未及已龍吟水中不見已截竹吹之聲相似劉孝先詠竹詩誰能制長笛當為吐龍吟長吟入夜清梁簡文帝箏賦抗長吟以靡曼魏文帝詩長笛吐清氣賀徹詩羌笛吐清音劉孝綽詩凉秋夜笛鳴闗山孤月下陸瓊闗山月邊城與明月俱在闗山頭徐儀詩蒼茫孤月上樂府詩集大横吹部其樂器有笛樂府解題横吹曲有闗山月來向隴頭鳴通典天水郡有大坂名曰隴坁亦曰隴山即漢隴闗也三秦記其坂九回上者七日乃越上有清水四注下所謂隴頭水也一統志隴山在鳳翔府隴州西北六十里張正見詩隴頭鳴四注又羌笛含流咽虞羲詩羌笛隴頭鳴樂府解題漢横吹曲二十八解李延年造二曰隴頭逐吹梅花落劉峻詩輕香共逐吹江淹詩長安少年多輕薄兩兩共唱梅花落張正見詩不分梅花落還同横笛吹樂府解題横吹曲有梅花落樂府詩集梅花落本笛中曲也含春柳色驚梁簡文帝賦草含春而色動􅙌世南詩春光催栁色陳後主折楊栁楊柳動春情倡園妾屢驚祖孫登栁詩欲驗傷攀折三春横笛中樂府解題漢横吹曲二十八解七曰折楊柳唐書禮樂志梁樂府有云上馬不捉鞭反抝楊柳枝下馬吹横笛愁殺行客兒此即横吹曲折楊柳枝也行觀向子賦坐憶舊鄰情晉書向秀傳秀作思舊賦云余與嵇康吕安居止接近其後並以事見法逝將西邁經其舊廬于時鄰人有吹笛者發聲寥亮追思曩昔游宴之好感音而歎故作賦劉孝孫笛詩征客懐離緒鄰人思舊情庾肩吾詩廣陵餘故曲山陽有舊鄰張説鳳樓尋勝地鮑照詩鳳樓十二重四户八綺窓霞顧野王詩鳳樓臨廣陌仙掌入烟舊唐書明皇紀開元九年九月御丹鳳樓宴突厥首領西掖持醇酒劉楨贈徐幹詩誰謂相去逺隔此西掖垣初學記中書省在右因謂中書為右省又稍西掖鄒陽酒賦凝醳醇酎千日一醒張載酃酒賦中山冬啟醇酎秋發酒經空桑穢飲醖以稷夌以成醇醪酒之始也東山就白雲晉書謝安傳寓居㑹稽與王羲之及許詢桑門支遁遊處出則漁弋山水入則言詠屬文雖受朝寄然東山之志始未不渝形於言色謝靈運詩偶與張邴合久欲還東山六朝事跡晉謝安寓居㑹稽棲遲東山後於金陵土山營築以擬東山今去上元縣二十里謝靈運詩春晚緑野秀巖髙白雲屯陶𢎞景詩山中何所有嶺上多白雲南史褚伯玉傳王僧達答丘珍孫曰褚先生従白雲遊舊矣開軒緑池映張協七命望玉繩而結極承倒影而開軒阮藉詩開軒臨四野登髙望所思傅休奕蓮歌緑葉映長波陳子昂詩巖潭相映媚梁簡文帝春賦苔染池而盡緑桃含山而併紅命席紫蘭芬禮記哀公曰敢問儒行孔子對曰遽數之不能終其物悉數之乃留更僕未可終也哀公命席曹植七啟紫蘭丹椒施和必節江淹詩秋夜紫蘭生湛湛明月光梁昭明太子七契下筆蘭芬張率詩冉冉蘭麝芬舞度花為伴梁簡文帝舞賦響玉砌而遲前度金扉而斜入沈約秦筝曲迎歌度舞遏歸風張衡舞賦増芙蓉之紅花兮光的爍以發揚謝偃觀舞賦似兩艶之同發類雙花之偶然梁昭明太子林下作伎詩泉將影相得花與面相宜鶯來管作羣唐太宗詩芝田初雁去綺樹巧鶯來梁昭明太子啟鳥哢芳園韻響王喬之管王粲鶯賦歴長夜以向晨聞倉庚之羣鳴太平多樂事漢書食貨志三考黜除餘三年食進業曰登再登曰平三登曰泰平後漢書謝夷吾傳堯登稷契政隆泰平魏武帝詩對酒歌太平時吏不到門謝靈運詩序天下良辰美景賞心樂事四者難并春物共氛氲謝朓詩朋情以鬰陶春物方駘蕩沈約賦看春物而懐之聞好音於庭樹何遜詩旅客長憔悴春物自芳菲謝莊雪賦散漫交錯氛氲蕭索梁簡文帝序氛氲四照暉嚴五色江總詩祥露曉氛氲上林朝晃朗張九齡三月三日申王園亭宴集後漢書禮儀志三月上已日官民皆禊于東流水上宋書禮志魏以後但用三日不復用已唐書三宗諸子傳恵莊太子撝本名成義垂拱三年始王恒俄改王衡陽睿宗立進王申稽亭追往事晉書王羲之傳嘗與同志宴集于㑹稽山隂之蘭亭自為序以申其志史記太史公自序述往事思來者後漢書馮異傳明鏡所以照形往事所以知今睢苑勝前聞九域志睢陽郡有梁孝王東苑方三百里王筠詩昔入睢陽苑連步披風雲張正見詩睢苑凉風舉一統志睢州在歸徳府城東一百二十里晉書外戚傳序詳觀往誥逖聴前聞梁簡文帝七勵堯舜垂拱煥彼前聞又登城北望詩登樓傳昔賦出薊表前聞飛閣凌芳樹三輔黄圖帝作建章宫在未央宫西長安城外帝以城中為小乃於宫西跨城池作飛閣通建章宫搆輦道以上下洛陽伽藍記瑤光寺北有金墉城髙祖在城内作光極殿重樓飛閣遍城上下従地望之有如雲也崔駰七依丹柱雕楹飛閣層樓梁武帝遊女曲舞飛閣歌長生陸機詩芳樹發華顛王融詩復此佳麗人含情結芳樹華池落采雲陸機詩移居華池邊何遜詩禁林終宴晚華池物色新沈約白雲詩倒影入華池南史齊髙帝紀有虞揖譲卿雲發采庾信三月三日華林園馬射賦序正繪五采之雲藉草人留酌孫綽蘭亭集後序藉芳草鑑清流謝恵連詩藉草繞迴壑江總賦經行藉草宴坐臨渠蘇武詩我有一尊酒欲以贈逺人願子留斟酌叙此平生親劉峻金華山棲志班荆林下陳樽置酌銜花鳥赴羣梁簡文帝詩銜花落北户劉孝孫詩銜花向玉墀曹植詩飛鳥繞樹翔噭噭鳴索羣阮籍詩焉見孤翔鳥翩翩無匹羣向來同賞處陳書孫瑒傳毎良辰美景賔僚並集泛長江而置酒亦一時之勝賞焉駱賔王詩一朝心賞同惟恨碧林曛謝萬蘭亭詩碧林輝翠萼朱异詩暮坐極林曛自豫章南還江上作漢書地理志豫章郡髙帝置莽曰九江屬揚州漢官儀豫章郡樹生庭中故以名郡一統志江西南昌府漢始置豫章郡唐為洪州天寳初改豫章郡唐書九齡出為冀州刺史以母不肯去鄉里故表換洪州都督徙桂州兼嶺南按察選補使召為祕書少監集賢院學士知院事按此詩應是洪州徙嶺南時作九齡韶州人故云南還也歸去南江水晉書陶潛傳義興三年解印去縣乃賦歸去來辭後漢書贛有豫章水謝靈運詩啟户向南江磷磷見底清詩揚之水白石粼粼韻㑹水生崖石間與磷同浙中記浙水至清雖深五六丈見底了了然陶𢎞景書髙峯入雲清流見底呉均書水皆縹碧千丈見底轉聞空闊處列子吾側聞之試以告語李百藥泂簫賦對吟空闊之情聊洗滯留情王羲之書蕩滌塵垢研遣滯慮太史公自序留滯周南不得與封禪之事魏文帝詩呉㑹非吾鄉安得乆留滯浦樹遙相待宋之問詩浦樹浮鬱鬱禮記久相待也逺相致也江總樂府雲車欲發應相待江鷗近若迎南越志江鷗一名海鷗在漲海中隨潮上下庾信詩野鶴能自獵江鷗解獨漁江淹詩可以狎鷗鳥津途别有趣抱朴子津途殊闢傅亮表伊洛榛蕪津途久廢王融芳樹曲萱風良有趣況乃濯吾纓謝朓詩况乃故人杯孟子滄浪之水清兮可以濯我纓李陵與蘇武詩臨河濯長纓曹植文濯纓彈冠諮諏榮貴耒陽溪夜行一統志湖廣衡州府耒陽縣在府城東南一百三十五里秦置耒縣屬長沙郡漢初改曰耒陽縣屬桂陽郡以在耒水之陽故名隋改耒隂唐復曰耒陽爾雅水注川曰谿乗夕棹歸舟何劭詩秋風乗夕起明月照髙樹王彪之詩汎舟理飛棹王勃詩歸棹隠寒洲謝靈運詩夢寐佇歸舟釋我吝與勞謝朓詩天際識歸舟縁源路轉幽謝朓詩縁源殊未極歸徑窅如迷楚辭九章修路幽蔽道逺忽兮新論石泉潛流不以澗幽而不清陳子昂詩路迥光逾逼山深興轉幽月明看嶺樹子夜歌秋夜凉風起天髙星月明魏武帝樂府月明星稀烏鵲南飛梁簡文帝詩星芒侵嶺樹月暈隠城樓風靜聴溪流劉孝綽詩日入江風靜安波似未流戰國策飲茹溪之流謝朓詩溪流春穀泉嵐氣船間入江淹詩嵐氣隂不極日色半虧天説苑恵子欲之梁渡河而遽墮水中船人救之恵子曰子居艘楫之間吾不如子霜華衣上浮謝朓詩嵗逺荒城思霜華宿草陳梁武帝詩衣上芳猶在梁簡文帝序氣冷金扉霜浮玉管猿聲雖此夜水經注巴束三峽巫峽長猿鳴三聲涙霑裳謝靈運詩噭噭夜猿啼沈佺期詩何忍猿啼夜荆王枕席間謝朓詩蕙風入懐抱聞君此夜琴又飢鼯此夜啼陳後主詩山花此夜光不是别家愁楚辭九辨去鄉離家兮來逺客有美一人兮心不懌陳子昂詩違此鄉山别長謠去國愁庾信詩離闗一長望别恨㡬重愁李白送殷淑白鷺洲前月楊齊賢集注秦淮與外江夾一洲曰白鷺一統志江南江寧府白鷺洲在府西南江中何遜詩違鄉已信次江月初三五天明送客回書曰暘谷傳日出于谷而天下明故稱暘谷王逸九思天庭明兮雲霓蔵三光朗兮鏡萬方史記淳于髠傳日暮酒闌盃盤狼藉堂上燭滅主人留髠而送客三輔黄圖灞橋在長安東跨水作橋漢人送客至此橋折柳贈别江奄别賦張飲東都送客金谷青龍山後日一統志江南江寧府青龍山在府東南三十五里又句容縣南七十里亦有青龍山江總詩霧暗山中日風驚隴上秋早出海雲來墨子賢者之治道也早出莫入書寅賔出日疏恭敬導引將出之日帝王世紀日出而作日入而息古樂府日出東南隅照我秦氏樓淮南子湯禱桑林而四海之雲湊千里之雨至流水無情去詩沔彼流水朝宗于海北史蕭大圜傳面修原而帶流水倚郊甸而枕平臯庾信詩春洲鸚鵡色流水桃花香劉勰新論魚不畏網而畏鵜復讐者不怨鏌鋣而怨其人網無心而鳥有情劍無情而人有心也征帆逐吹開何遜詩無由下征帆獨與暮潮歸庾信詩路塵猶向水征帆獨背闗袁朗詩枯蓬惟逐吹墜葉不歸林劉孝威詩幸息榜人唱聊望髙帆開相看不忍别梁簡文帝賦回照金屛裏脈脈兩相看陸瑜束飛伯勞歌西王青鳥秦女鸞姮娥婺女慣相看詩行道遲遲箋行于道路之人至將離别尚舒行江淹别賦攀桃李兮不忍别送愛子兮霑羅裙更進手中杯禮記侍飲于長者酒進則起陶潛詩一觴雖獨進盃盡壺自傾梁元帝懐舊賦序清酒繼進甘果徐行世説畢卓嘗謂人曰給酒數百斛船左手持蟹螯右手持酒杯拍浮酒船中便足了一生矣過崔八丈水亭髙閣横秀氣後漢書樊宏傳所居廬舍皆有重堂髙閣陂渠灌注潘岳秋興賦序髙閣連雲陽景罕曜文心雕龍秀氣成采清幽併在君唐明皇帝詩尋勝在清幽簷飛宛溪水謝朓聨句玉溜簷下垂謝靈運山居賦流泉傍出潺湲於東檐劉峻詩激水簷前溜庾信詩泉飛疑度雨一統志宛溪在寧國府城東源出嶧陽山其流清激窻落敬亭雲謝朓遊敬亭山詩兹山亘百里合沓與雲齊朱异詩窻引北巖雲江總詩散漫繞窓雲又終南雲影落一統志敬亭山在寧國府城北一十里猿嘯風中㫁水經注三峽每晴初霜旦林寒澗肅有髙猿長嘯屬引凄異空岫傳響庾信詩猿嘯風還急梁簡文帝詩猿啼㫁還續袁朗詩猿聲出峽㫁漁歌月裏聞外史陸續曰續家於呉中漁釣而歌以畢吾志郭璞江賦嘆漁父之櫂歌王勃序榜謳齊引漁歌互起謝莊月賦愬皓月而長歌世説桓子野每聞清歌輒喚奈何閒隨白鷗去沙上自為羣何遜詩可憐雙白鷗朝夕水上游謝朓詩鷗鳬戲沙衍張均詩寒沙聚夜鷗西京雜記太液池邊多平沙沙上鵜鶘鷓鴣鵁鶄鴻鶂動輒成羣孟浩然題融公蘭若釋氏要覽梵言阿蘭若唐言無諍一云閒靜處又浩然詩問法尋蘭若精舍買金開晉書孝武帝紀帝初奉佛法立精舍於殿内引諸沙門以居之經律異相須達多長者欲營精舍請佛住有祗陀太子園廣八十頃可居白太子太子戲曰滿以金布便當相與長者出金布八十頃精舍告成漢書直不疑傳其同舍有告歸誤持同舍郎金去已而金主覺亡意不疑不疑謝有之買金償陳子昂詩山水開精舍流泉遶砌迴詩相其隂陽觀其流泉薛道衡賦水逶迤而遶砌梁元帝詩遶砌縈流水沈佺期詩神池遶漢回芰荷薫講席説文芰菱也爾雅荷芙蕖離騷製芰荷以為衣兮集芙蓉以為裳法苑珠林淨居天有千枝蓮華香氣芬薰齊書良政傳裴覬於聰明觀聴講不讓劉秉席松栢映香臺國語松栢之地其土不肥蜀都賦松栢蓊鬱於山峯張協賦松林摻映以攅列宋大始歌舞曲江波澈映石栢開文盧照鄰詩香臺接漢髙宋之問詩香臺隠翠微法雨晴飛去法華經諸飢渴衆生以法雨充滿謝靈運文仰𢎞如來宣揚法雨潘岳閒居賦微雨新晴六合清朗張九齡詩初逢山雨晴畫史張僧繇畫龍㸃晴即飛去天花晝下來維摩經時維摩詰室有一天女聞所説法即以天花散諸菩薩髙僧傳梁僧法雲講次天花散墜張説詩搖揚花雜下庾信詩中天梵響來談𤣥殊未已世説王夷甫妙於談𤣥庾肩吾詩談𤣥止谷神王勅詩日暮情何已李白序幽賞未已髙談轉清歸騎夕陽催梁簡文帝詩歸騎息金隍唐明皇詩興闌歸騎轉詩度其夕陽孫逖詩傳車春色逺離興夕陽催宿立公房支遁初求道沙門傳支遁字道林河内林慮人或曰陳留人本姓闗氏少而任心獨往風期髙亮嘗于餘杭沈思道行泠然獨畼年二十五始釋形入道李鏡逺詩求道志新堅深公笑買山世説支道林就深公買卬山深公曰未聞巢由買山而隠沈佺期詩支遁愛山情漫切如何石巖趣三輔黄圖雲陽宫東北有石門山岡巒糾紛干霄秀出有石巖容數百人晉書顧愷之傳嘗圖謝鯤象在石巖裏云此子宜置丘壑中韋述詩自然成野趣自入户庭間沈佺期詩天河入户低易不出户庭无咎陶潛詩户庭無塵雜苔澗春泉滿宋之問詩苔澗深不測梁昭明太子書理與春泉爭溢庾闡詩手澡春泉潔薛道衡碑春泉如醴出自京師庾信詩白石春泉滿蘿軒夜月閒鮑照詩攀蘿席中軒參同契碧潭夜月青山暮雲無非金丹法象阮籍達莊論季秋遙夜之月梁武帝詩懐情入夜月張説詩瑤臺紫月閒能令許𤣥度晉陽秋許詢字𤣥度與支遁相善世説簡文曰𤣥度才情故未易多有許又劉尹云清風朗月輒思𤣥度吟卧不知還後漢書曹襃傳襃慕叔孫通為漢禮儀沈吟専思寝則懐抱筆札行則誦習文書晉書陶潛傳夏月虛閒髙卧北窓之下陳子昂詩幽卧不知春陶潛歸去來辭鳥倦飛而知還宿武陽川武陽川一作武陵川未詳川暗夕陽盡何遜詩江暗雨欲來庾信詩澗暗泉偏冷詩度其夕陽爾雅山西曰夕陽注暮乃見日埤雅雨氣成虹朝陽射之則在西夕陽射之則在東孤舟泊岸初陶潛歸去來辭或命巾車或棹孤舟又詩眇眇孤舟逝綿綿歸思紆王襃詩對樓還泊岸迎波暫守風嶺猿相叫嘯徐陵銘飛猿之嶺喬木森於雲日陳後主詩風巖朝蕋落霧嶺晚猿吟木華海賦更相叫嘯詭色殊音鮑照詩嘈囋晨鵾思叫嘯夜猿清王融詩滴瀝寒泉溜叫嘯秋猿啼潭影似空虛薛道衡詩澗影落長松莊子形充空虛乃至委蛇羽獵賦勝空虛距連巻就枕滅明燭漢書王莽傳因凴几寐不復就枕矣史記滑稽傳日暮酒闌合尊促坐男女同席堂上燭滅楚辭蘭膏明燭魏文帝詩明燭發髙光扣舷聞夜漁江賦忽忘夕而宵歸咏采蔆以扣舷水經注宓子治單父孔子使巫馬期觀焉入其境見夜漁者雞鳴問何處詩風雨凄凄雞鳴喈喈春秋説題辭雞為積陽南方之象故陽出雞鳴以類感也焦仲卿妻詩雞鳴外欲曙江淹詩獨坐東軒下雞鳴夜已晞張率詩何處訪公子讀曲歌蓮儂在何處人物似秦餘呉志顧雍傳心精體宻貫道達微才照人物徳允衆望晉書劉毅傳少勵清節然好臧否人物阮瑀詩布恵綏人物西京賦獲林光于秦餘桃花源記自云先世避秦亂來絶境問今何世岑參宿嚴給事别業唐書百官志門下省給事中四人掌侍左右分判省事凡百司奏抄侍中既審則駁正違失詔勅不便者塗竄而奏還謂之塗歸季終奏駁正之目郭外山色暝管子内為之城外為之郭釋名郭廓也廓落在城外也江淹詩山色與雲平謝靈運詩林壑斂暝色蕭子範詩暝景促西暉主人林館秋西都賦有西都賔問於東都主人世説王徽之字子猷呉中士大夫家有美竹欲觀之便乗輿造竹下詠嘯良久主人灑掃請坐不顧而去郭璞蓬萊山賛蓬萊之山玉碧搆林金臺雲館皜哉獸禽庾信詩寒谷梨應重秋林栗更肥疎鐘入户内徐孝克詩晨朝宣賛偈寒夜斂疎鐘釋慧淨詩塵飛揚雅範風度引疎鐘北史權㑹傳㑹方處學堂講説忽有旋風吹雪入户沈佺期詩山月臨窓近天河入户低儀禮特牲饋食禮主人従西面於户内管子聚于户内阮籍詩外厲貞素談户内滅芬芳片月到牀頭徐陵詩片月窺花簟輕寒入錦巾晉書王湛傳兄子濟嘗詣湛見牀頭有周易問曰叔父何用此為鮑照詩牀頭恒有沽酒錢遙夜惜已半楚辭靚杪秋之遙夜兮陶潛詩愁人難為辭遙遙春夜長淮南子雞知將旦鶴知夜半白虎通周以十一月為正色尚赤以夜半為朔樂府嚴霜半夜落清言殊未休晉書樂廣傳廣善清言而不長于筆南史蕭思話傳子眎性靜退少嗜欲好學能清言榮利不闗于中北史崔逞傳子瞻酒後清言聞者莫不傾耳陶潛扇上畫賛交酌林下清言究微蘇武詩歡樂殊未央謝朓詩縁源殊未極後漢書賈逵傳諸儒為之語曰問事不休賈長頭君雖在青瑣漢書元后傳赤墀青瑣注青瑣者刻為連環文而青塗之也後漢書梁冀傳連房洞户柱壁雕鏤加以銅漆窓牖皆有綺疏青瑣圖以雲氣漢官儀給事黄門之職日暮入對青瑣門拜名曰夕郎呉都賦雕欒鏤楶青瑣丹楹注户兩邊以青畫為瑣文景福殿賦青瑣銀鋪是為閨闥心不忘滄洲史記髙祖紀豐吾所生長極不忘耳南史表粲傳粲愛好虛逺嘗作五言詩訪迹雖中宇循寄乃滄洲又張充傳飛竿釣渚濯足滄洲謝朓詩既懽懐禄情復協滄洲趣杜甫野望清秋望不極殷仲文詩獨有清秋日能使髙興盡劉峻詩薊門秋氣清盧諶詩登髙眺遐荒極望無崖㟧謝朓詩滄波不可望望極與天平梁武帝詩長洲望不極迢逓起層隂謝瞻詩迢逓封畿外謝靈運詩迢逓陟陘峴謝朓詩結搆何迢逓瞻望極髙深江淹詩日落長洲浦曽隂萬里生陸沖詩重巒有層隂逺水兼天淨韓子失火而取水于海海水雖多火必不滅矣逺水不救近火也隋煬帝詩逺水翻如岸薛道衡詩逺水舟如葉莊子道兼于天駱賔王詩水淨望如空孤城隠霧深庾肩吾詩寒鳥歸孤城楊素詩孤城絶四鄰謝朓詩終隠南山霧梁元帝晉安寺碑分佩隔浦艎檣隠霧葉稀風更落庾成師詩憶别春花飛已見秋葉稀梁簡文帝詩亟搖故葉落陸機賦序落葉俟微風以隕山迥日初沈陳子良詩峯迥雜花明沈佺期闗山月樂府暈落闗山迥隂鏗詩昬昬隴日沈潘徽詩日沈山氣合虞世南詩雕甍落日沈獨鶴歸何晚謝朓詩獨鶴方朝唳何遜詩獨鶴凌空逝劉峻書暮聴羈雌獨鶴班婕妤𢷬素賦哀離鶴之歸晚昬鴉已滿林何遜詩城隂度塹黒昬鴉接翅歸鮑照詩今年陽初花滿林謝朓詩蕭瑟滿林聴輕明響澗音螢火爾雅螢火即炤注螢火夜飛腹下如火光故曰即炤博雅景天螢火䗲也幸因腐草出禮記季夏之月蟋蟀居壁腐草為螢疏腐草得署濕之氣故為螢梁昭明太子六月啟螢飛腐草光浮帳裏之書蟬噪繁柯影入機中之髩庾信詩螢排亂草出雁捨㫁蘆飛敢近太陽飛説文日者實也太陽之精君象也謝莊雪賦太陽曜不固其節駱賔王螢火賦共爝火而齊息避太陽于始旦沈旋詠螢火詩雨墜弗虧光陽昇反奪照梁簡文帝詩朧朧月色上的的夜螢飛梁元帝池中燭影詩度渚若螢飛未足臨書卷晉書夏月則練嚢盛數十螢火以照法言一巻之書不勝異説焉必立之師漢武内傳帝見王母中笈中有一巻書盛以紫錦之嚢帝問此書可得瞻盼否王母出以示之曰此五嶽真形圖也演繁露古書皆巻至唐始為葉子今書册也時能㸃客衣庾信對燭賦龍沙雁塞甲應寒天山月沒客衣單隨風隔幔小李嶠詩寒催數雁急風送一螢來張率白紵歌明月入牖風吹幔終夜悠悠坐申旦南史栁惔傳栁惔甚重其婦頗成畏憚女妓精麗畧不敢視僕射張稷為惔妻賞敬惔每欲見妓恒因稷請奏其妻隔幔坐妓然後出張正見詩分簾疑碎璧隔幔似垂鈎帶雨傍林微易林乗雨帶雲與飛鳥俱梁元帝詠螢火詩到來燈下暗翻往雨中然陶潛詩日入羣動息歸鳥趣林鳴任昉竟陵王狀依林搆宇傍巖拓架張華鷦鷯賦形微處卑物莫之害十月清霜重詩九月築場圃十月納禾稼又九月肅霜十月滌場史記叔孫通傳漢七年長樂宫成諸侯羣臣皆朝十月謝朓詩興以暮秋月清霜落素枝薛道衡宴喜賦霜重庭蘭秋深氣寒孫萬夀詩葉落霜威重蓂疎月色殘飄零何處歸謝莊雪賦憑雲升降従風飄零劉勰新論春蕋雖茂假朝露而抽翠秋葉誠危因微風而飄零盧照鄰荷詩常恐秋風早飄零君不知庾信詩蓬萊入海底何處可追尋又不知何處天邊晉書謝安傳嘗與孫綽等泛海風起浪湧諸人並懼安吟嘯自若風轉急安徐曰如此將何歸耶舟人承言即回衆服其雅量李頎晚歸東園荆扉帶郊郭爾雅闔謂之扉注闔門扇也陶潛詩白日掩荆扉王襃詩竹館掩荆扉水經注逺出郊郭絲楊被浦何遜詩郊郭勤二頃形體憇一廡稼穡滿東菑書土爰稼穡傳種曰稼斂曰穡正義周禮注云種穀曰稼若嫁女之有所生然則穡是惜也言聚蓄之可惜也共為治田之事分為種斂二名耳虞世南詩稼檣良所重方復悦豐年爾雅田一嵗曰菑注今江東呼初耕地反草為菑謝朓詩連隂盛農節臺笠聚東菑倚杖寒山暮鮑照詩倚杖牧雞豚庾信詩寒山無物香隂鏗詩寒山但見松江淹詩悵然山中暮鳴梭秋葉時梁簡文帝詩鳴梭逐動釧蕭詮詩弄杼鳴梭桃織手王儉表秋葉辭條不假風飇之力何遜詩㡬經秋葉飛沈佺期詩落葉驚秋婦髙砧促暝機迴雲覆隂谷庾信詩山晴雲倒回又圜丘歌瞻仰迴雲顔延之詩陽陸團精氣隂谷曳寒烟返景照霜梨説文落光返照其東謂之反景庾信詩夕陽含水氣返景照河堤急就篇梨柿柰桃待露霜澹泊真吾事魏志盧毓傳注盧欽少居名位不願財利清虛澹泊動修典禮諸葛亮誡子書非澹泊無以明志非寧靜無以致逺陶潛詩商歌非吾事依依在耦耕清風别自兹南史謝譓傳入吾室者但有清風殷遙句容人天寳間為忠王府倉曹參軍友人山亭故人従薄宦古詩悵然逺相望知是故人來謝朓詩故人清尊賞禮記道合則服従賈誼文贏糧而景従南史陶潛傳弱年薄宦不絜去就之迹何遜詩薄宦恧師表往往涉清溪後漢書班固傳神池靈沼往往而在古詩涉江采芙蓉謝靈運詩攅念攻别心旦發清溪隂李白詩清溪清我心水色異諸水張旭詩桃花盡日隨流水洞在清溪何處邊鑿牖對山月淮南子百姓穿户鑿牖自取照焉杜甫詩鑿翠開户牖劉禹錫詩對酒青山月李白詩峨眉山月半輪秋陸機詩安寝北堂上明月入我牖褰裳拂澗霓詩子恵思我褰裳涉溱陸雲詩明發有思淩波褰裳李商隠詩平時避暑拂虹蜺杜甫詩川蜺飲練光江淹赤虹賦序昔登香爐峯上千接白雲今行九石山下親弄絳霓遊魚逆水上張協七命遊魚瀺灂於緑波陸機文賦若遊魚銜鈎而出重淵之深枚乗七發江水逆流海水上潮史記秦始皇紀八年河魚大上宿鳥向風棲梁宣帝遊七寳寺賦瑞鳥之所棲宿唐太宗賦露宿鳥之全翮李白詩所向非徒然杜甫詩吹面受和風蕭琛詩弱柳向低風韋應物詩今將獨夜意偏知對影栖一見桃花發能令秦漢迷後漢書禰衡傳目所一見易通卦驗驚蟄大壯初九桃始華王勃序山人對興即是桃花之源王維詩水上桃花紅欲然劉孝威詩花發是初開杜甫詩我有江隂竹能令朱夏寒史記自序推三代錄秦漢漢書張釋之傳釋之言秦漢問事文帝稱善獨孤及詩桃花迷聖代杜甫詩詣絶古今迷丁仙芝剡溪館聞笛晉書王徽之傳居山隂夜雪初霽忽憶戴逵逵時在剡便夜乗小舟詣之造門不前而返人問其故曰本乘興而來興盡而返何必見安道耶一統志溪在嵊縣治南一名戴溪即晉王徽之雪夜訪戴安道處夜久聞羌笛梁簡文帝對燭賦夜久惟煩鋏天寒不畏蛾風俗通笛長二尺四寸七孔其後又有羌笛説文笛七孔筩也羌笛三孔馬融長笛賦近世雙笛従羌起羌人伐竹未及已梁元帝賦聞羌笛之哀怨陳後主詩風髙夜笛喧劉孝孫笛詩凉秋夜笛鳴寥寥虛客堂左思詩寥寥空宇内梁昭明太子詩髙宇既清虚堂復靜漢書陳遵傳性嗜酒毎大飲賔客滿堂山空響不散後漢書段顃傳賛段追兩狄束馬縣鋒紛紜騰突谷靜山空陳後主詩山空明月深楊炯詩山空夜猿嘯王融詩散響谷雲浮沈約詩江南簫管地妙響發孫枝溪靜曲宜長張九齡詩風靜聴溪流劉琨扶風歌我欲竟此曲此曲悲且長草木生邊氣禮記天地和同草木萌動宋玉九辨蕭瑟兮草木搖落而變衰陶潛詩道狹草木長駱賔王詩野昏邊氣合崔㤗之詩車馬生邊氣城池泛夕凉左傳楚國方城以為城漢水以為池謝朓詩衣巾引夕凉楊師道詩雲歸起夕凉虛然異風出江淹詩風蕭蕭而異響髣髴宿平陽潘岳賦目彷彿乎平素劉孝綽詩髣髴鑒窓簾馬融長笛賦序融性好吹笛而為督郵無留事獨卧郿平陽塢中有雒客舍逆旅吹笛為氣出精列相和注漢書右扶風有郿縣平陽塢聚邑之名也周𢎞讓賦得長笛吐清氣詩氣咽平陽塢傅縡笛賦殊響抑揚似出平陽庾信詩笛韻平陽塢渡揚子江維揚志揚州府揚子江其源出岷山經成都下三峽而㑹于洞庭東過武昌與漢水合過九江㑹為彭蠡下蕪湖又東過江寧而愈大此江之正派也其在揚子者西自黄天蕩十步沙與建康為界由𤓰步下小帆山入儀真縣境横亘縣束南下至鐵釘港鵞鴒醮與鎮江分界東北入江都爪洲歴通泰海門而入海所謂揚子江也桂楫中流望王勃書荷裳桂楫拂衣于東海之東漢書賈誼傳是猶渡江亡維楫中流而遇風波漢式帝秋風辭横中流兮揚素波丘遲詩櫂歌發中流空波兩畔明蘇源明詩月澄凝兮明空波儀禮士虞禮賔長以肝従實于俎縮右盥疏謂牙兩畔最長者闗尹子重雲蔽天江湖黯然游魚茫然忽望波明食動幸賜于天林開揚子驛華陽宫記循夀山而西移竹成林復開小徑至百數步一統志廢揚子縣在儀真縣境唐永淳初置後廢置驛孫逖揚子江樓詩驛道青楓外人烟緑嶼間山出潤州城李嶠詩霧巻晴山出風恬晚浪收沈佺期詩山出盡如鳴鳳嶺唐書地理志潤州丹陽郡武徳三年置取潤浦為州名海盡邊隂靜禮記注海水之所委也沈約詩中有凌風樹迴望川之隂江寒朔吹生江淹賦琴柱急兮江上寒張正見詩寒蟬噪楊柳朔吹犯梧桐唐太宗詩代馬依朔吹更聞楓葉下列子吾側聞之試以告語謝靈運詩曉霜楓葉丹江總詩蘆花霜外白楓葉水邊丹梁昭明太子啟風拂林而葉下唐太宗詩林黄疎葉下淅瀝度秋聲謝莊雪賦霰淅瀝而先集雪紛糅而遂多顔真卿字清臣京兆長安人博學工詞章事親孝開元中舉進士又擢制科累遷平原太守河朔陷獨平原城守具備即拜户部侍郎代宗立除檢校刑部尚書封魯國公與元載不合貶峽州别駕遷撫湖二州刺史載誅擢刑部尚書盧杞當國益惡之李希烈陷汝州杞奏遣真卿往諭拘脅累嵗不屈而死謚文忠真卿立朝正色剛而有禮非公言直道不萌于心善正草書筆力遒婉世寳傳之登平望橋下作名勝志望仙橋在平望鎮去縣東四十里登樓四望湖天一色唐初屬呉興張祐詩一派呉興水西來此驛分平望之水源自天目山東流至荻塘㑹爛溪而出鎮宋紹興中建南北驛堂宇百餘間専為國信使停宿之所今平望驛仍其故址登橋試長望梁元帝詩登舜橋而延首瞰禹井而淹留庾信詩上橋還倚望遙看採菱船阮籍賦游平圃以長望兮乗脩水之華旂庾信詩離闗一長望别恨㡬重愁望極與天平漢書蘇武傳窮目極望不見所識曹植賦野蕭條而極望曠千里而無人顔延之詩息徒顧將夕極望梁陳分江淹賦水則逺天相逼浮雲共色王勃滕王閣序秋水共長天一色又采蓮曲葉嶼花潭極望平際海蒹葭色江淹賦平蕪際海千里飛鳥詩蒹葭蒼蒼白露為霜説文葭葦之未秀者廣韻蘆也韓詩外傳吾出兼葭之中入夫子之門鮑照賦對蒹葭之遂黄視零露之方白終朝鳬雁聲詩終朝采緑不盈一匊老子飄風不終朝驟雨不終日曹植芙蓉賦觀者終朝情猶未胡足詩將翺將翔弋鳬與雁西京雜記太液池邊皆是彫紫籜緑節之類其間鳬雛雁子布滿充積劉楨詩方塘含白水中有鳬與雁隂鏗詩溜船惟識火驚鳬但聴聲薛道衡詩寒夜哀笛曲霜天㫁雁聲近山猶髣髴蕭慤詩泉鳴知水急雲來覺山近王勃詩物外山川近晴初景靄新曹植賦髣髴兮若輕雲