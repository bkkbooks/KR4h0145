body:
  text: 欽定四庫全書御選唐詩巻十五五言律竇叔向字遺直京兆人代宗時常衮為相引為左拾遺内供奉貶漂水令五子羣常牟庠鞏皆工詞章有聨珠集行于時叔向工五言名冠時輩春日早朝應制紫殿俯千官三輔黄圖武帝起紫殿雕文刻鏤黼黻以王飾之成帝永始四年行幸甘泉郊泰時神光降于紫殿鮑照詩紫殿爭朝光謝朓詩紫殿肅隂隂沈佺期詩徑狹千官擁王維詩芙蓉闕下㑹千官春松應合歡曹植賦華茂春松漢宫闕名長安有合歡殿張衡西京賦後宫則昭陽飛翔増城合歡注皆殿名御爐香燄暖何遜詩晴軒連瑞氣同惹御香芬沈佺期詩爐氣晨飄接御香賈至詩衣冠身惹御爐香左思呉都賦飛爓浮烟傅宰博山香爐賦寒夜含暖馳道玉聲寒史記秦始皇紀二十七年賜爵一級治馳道注馳道天子道也謝朓入朝曲飛甍夾馳道丘遲詩詰旦閶闔開馳道聞鳳吹禮記古之君子必佩玉左徵角右宫羽注玉聲中也拾遺記翔風妙别玉聲言西方北方玉聲沈重而性温潤佩服者益人性靈東方南方玉聲輕潔而性清凉佩服者利人精神乳燕翻珠綴鮑照樂府乳燕逐草蟲杜甫詩鳴鳩乳燕青春深王融詠幔詩幸得與珠綴羃䍥君之楹何遜七召璧璫自耀珠綴恒響梁簡文帝東飛伯勞歌網户珠綴曲瓊鈎祥烏集露盤呉志孫權傳赤烏元年詔曰間者赤烏集于殿前朕所親見若神靈以為嘉祥者改年宜以赤烏為元宋書符瑞志蒼烏者賢君修行孝慈于萬姓不好殺生則來南史范雲傳進見齊髙帝㑹有獻白烏帝問此何瑞靈曰臣聞王者敬宗廟則白烏至援神契徳至鳥獸則白烏下三輔舊事建章宫承露盤以銅為之上有仙人掌承露和玉屑飲之梁簡文帝詩定用方諸水持添承露盤庾信詩露盤髙掌滴風烏平翅迴宫花一萬樹王昌齡詩西宫夜靜百花香李白詩宫花爭笑日張説詩堤含宫樹春不敢舉頭看晉書明帝紀舉頭見日李白詩舉頭看明月韓翃字君平南陽人登天寳十三載進士第臨淄侯希逸宣武李勉相繼辟幕府建中初以詩受知徳宗除駕部郎中知制誥擢中書舍人翃與錢起盧綸輩號大厯十才子為詩興致繁富一篇一詠朝野珍之題蘇許公林亭唐書本傳蘇頲字廷碩雍州武功人隋尚書僕射威之孫左僕射許國公瓌子襲封仕至同紫微黄門平章事罷為禮部尚書與張説以文章顯時號燕許大手筆平津東閣在漢書公孫𢎞傳元朔中封丞相𢎞為平津侯其後以為故事至丞相封自𢎞始也又𢎞自起徒步數年至宰相封侯於是起客館開東閤以延賢人與參謀議孫逖詩作京雄近縣開閤寵平津爾雅小閨謂之閤别是竹林期魏氏春秋嵇康寓居河内之山陽縣與之遊者陳留阮籍河内山濤河南向秀籍兄子咸琅邪王戎沛人劉伶相與友善遊于竹林號為七賢世説謝公道豫章若遇七賢必自把臂入林庾信思舊銘嵇叔夜之山庭尚多楊柳王子猷之舊徑唯餘竹林李白詩且耽田家樂遂曠林中期萬葉秋聲裏陸雲頌靈根既茂萬葉垂林江淹賦一枝百頃萬葉共隂江總詩千行珠樹出萬葉瓊枝長蕭慤詩野禽喧曙色山樹動秋聲周𢎞讓詩木葉動秋聲千山落照時孫綽天台山賦序或匿峯于千嶺梁簡文帝詩千峯共隠天宋之問詩豈意南中岐路多千山萬水分鄉縣梁簡文帝詩宻房寒日晚落照度窓邊駱賔王詩掩映飛軒垂落照參差步障引朝霞門隨深巷靜崔顥詩夜直千門靜張正見詩塵隨幽巷靜嘯逐逺風清李嶠詩巷靜遊禽入門閒過客稀王維詩洒空深巷靜積素廣庭閒又詩深巷斜暉靜門閒髙栁疎窻過逺鐘遲梁簡文帝賦玩飛花之度窻考工記鐘小而長則聲舒而聞逺李白詩螢飛秋窻滿月度霜閨遲岑參詩日沒鳥飛急山髙雲過遲客舍苔生處水經注漫澗水北有逆旅亭謂之漫口客舍蔡希寂詩綿綿鐘漏洛陽城客舍貧居絶送迎王維詩客舍青青柳色新梁元帝詩露出浦流紅苔生岸泉緑沈約詩賔階緑錢滿客位紫苔生依依又賦詩梁簡文帝詩行行異沂海依依别路岐江總詩共此依依情無奈年年别陶潛歸去來辭臨清流而賦詩又遊斜川詩序欣對不足率爾賦詩蔣渙洌之弟擢進士天寳未為給事中永泰初歴鴻臚卿日本使嘗遺金帛不受惟取牋一畨為書以貽其副終禮部尚書和徐侍郎中書叢篠韻唐書百官志中書省侍郎二人廣韻篠細竹也張九齡詩片雲自孤逺叢篠亦清深中禁夕沈沈沈佺期詩上台行揖讓中禁動光輝宗楚客詩九重中禁啟史記陳涉傳故人入宫見殿屋帷帳曰涉之為王沈沈者注沈沈宫室深邃之貌上林賦沈沈隠隠沈佺期詩雲竇下沈沈張九齡詩未央鐘漏晚仙宇藹沈沈李白詩月寒天清夜沈沈幽篁别作林楚辭九歌余處幽篁兮終不見天鮑照詩幽篁愁暮見王維詩獨坐幽篁裏彈琴復長嘯郭璞蜜蜂賦迴騖林篁經營堂窟劉峻金華山棲志蕙樓菌榭隠映林篁宋之問詩林篁天際宻穆天子傳天子西征至于樂池乃樹之竹是曰竹林色連雞樹近傅休奕賦嘉竹翠色江淹竹賦窓崢嶸而緑色世語劉放孫資久典機任獻肇心内不平殿中有雞栖樹二人相謂此亦久矣其能復㡬指謂放資急就篇注雞栖樹即皂莢樹北史隠逸傳雞樹騰聲鵷池播美盧思道詩丰茸雞樹宻影落鳳池深庾信銘窻銜竹影賀循詩緑竹影參差葳㽔帶曲池張文琮詩影照鳳池水香飄雞樹風晉書荀勗傳勗自中書監除尚書令人賀之勗曰奪我鳳皇池何賀耶為重凌霜節江逌竹賦凌驚風茂寒鄉籍堅氷負雪霜謝靈運山居賦樹凌霜而振緑北史節義傳序内懐鐵石之心外負凌霜之節顧野王拂崖篠賦等貞節之嵗寒張正見山中翠竹詩複澗蔵髙節能虛應物心老子聖人虛其心實其腹晉書王濛傳晚節虛已應物恕而後行莫不愛敬焉江逌竹賦含虛中以象道劉孝先竹詩無人賞髙節徒自抱貞心年年承雨露陶潛詩年年見霜雪誰謂不知時李白詩年年桃李月羅綺自相親禮記雨露既濡君子履之必有怵惕之心江逌竹賦翕幽液以潤本承清露以擢莖蕭大圜竹花賦縹枝承露緗箬來風長對紫庭隂後漢書皇甫規傳生長邊逺希涉紫庭傅休奕詩蘭茝出荒野萬里升紫庭陸機桑賦夫何佳樹之洪麗超托居乎紫庭王融詩紫庭風日好青槐枝葉新鮑照月下登樓聨句繽紛篁霧隂王儉靈丘竹賦靈丘深沈蔓竹凝隂崔峒博陵人登進士第為拾遺集賢學士終於州刺史藝文傳云終右補闕大厯十才子之一也詩一巻送師弟往台州按全唐詩作潤州送師弟自江夏往台州一統志隋開皇中置潤州大業初州廢以其地屬江都郡唐初復置潤州治丹徒又漢置江夏郡治沙羡唐為鄂州天寳初改江夏郡唐書地理志台州臨海郡武徳四年置一統志唐置海州尋改台州因天台山為名杜甫詩台州地闊海冥冥雲水長和島嶼青逺客乗流去史記天官書翼為羽翮主逺客楚辭去鄉離家兮來逺客古詩人生天地間忽如逺行客賈誼賦乗流則逝兮得坻則止枚乗七發汨乘流而下降兮或不知其所止左思呉都賦汨乗流以砰宕翼颸風之䬟䬟孤帆向夜開梁簡文帝與劉孝綽書夕鳥歸林懸孤帆而未息陳子昂詩古木生雲際孤帆出霧中陶潛詩向夕長風起寒雲沒西山劉孝威詩幸息榜人唱聊望髙帆開春風江上使鮑照詩六樂陳廣坐組帳揚春風梁元帝纂要春風曰暄風陽風吕氏春秋伍員至江上欲涉有一丈人刺小船度之問其名不告荆州記陸凱詩曰折梅逢驛使寄與隴頭人江南無所有聊贈一伎春前日漢陽來古詩前日風雪中故人従此去左傳欒貞子曰漢陽諸姬楚實盡之梁武帝詩宓妃生洛浦遊女出漢陽唐書地理志鄂州江夏郡漢陽縣一統志唐置沔州治漢陽縣天寳初改漢陽郡又漢水在府城北五里禹貢嶓冢導漾東流為漢是也穀梁天王狩于河陽傳山南為陽水北為陽别路猶千里徐陵詩青雀離帆逺朱鳶别路遙唐太宗詩深愁黄鶴孤帆逺獨歎青山别路長王勅詩去驂嘶别路歸棹隠寒洲蘇武詩黄鵠一逺别千里顧徘徊陶潛詩我行豈不遙登陟千里餘謝莊月賦美人邁兮音塵絶隔千里兮共明月離心重一杯宋孝武帝詩連嵗矜離心今兹幸良集鮑照舞鶴賦心惆悵而哀離陶潛詩故老贈余酒乃言飲得仙試酌百情逺重觴忽忘天晉書嵇康傳但守陋巷教養子孫濁酒一杯彈琴一曲志願畢矣又張翰傳翰任心自適不求當世或謂之曰卿乃可縦適一時獨不為身後名耶答曰使我有身後名不如即時一杯酒剡溪木未落謝靈運詩暝投剡中宿明登天姥岑李白夢遊天姥吟湖月照我影送我到剡溪一統志剡溪在紹興府嵊縣治南一名戴溪即晉王徽之雪夜訪戴逵處屈原離騷惟草木之零落兮恐美人之遲暮張載詩池寒稍下雁木落久無蟬謝靈運詩鳥鳴識夜栖木落知風發屈原離騷及榮華之未落兮相下女之可貽羨爾過天台孫綽遊天台山賦序天台山者葢山嶽之神秀者也涉海則有方丈蓬萊登陸則有四明天台㑹稽記赤城山内則有天台靈岳玉室璇臺張正見神仙篇鸞歌鳳舞集天台金闕銀宫相對開洞天福地記天台赤城山髙一萬八千丈周迴五百里上應台星故曰天台一統志浙江台州府天台山在天台縣西一百一十里張繼字懿孫襄州人登天寳進士第大厯未檢校祠部員外郎分掌財賦於洪州髙仲武謂其累代詞伯秀發當時詩體清迥有道者風晚次淮陽水經注淮水又東逕淮陽城北臨泗水岨于二水之間述征記淮陽太守治自後置戍縣亦有廢興也一統志古淮陽城在泗州故徐城東北一百五十里晉義熙中置郡微凉風葉下曹植樂府秋風發微凉寒蟬鳴我側盧諶賦微凉漸屆溽暑日收孫綽詩疎林積凉風虛岫結凝霄張正見詩睢苑凉風舉章臺雲氣收繁欽秋思賦風清凉以激志兮樹動葉而鼔條謝莊文秋風散兮凉葉稀楚辭洞庭波兮木葉下論衡風衰葉下集于道路何遜詩樹葉下簷飛楚俗轉清閒史記貨殖傳越楚則有三俗淮北西楚其俗剽輕彭城以東東楚其俗類徐僮衡山九江南楚其俗大類西楚張衡賦處幽泉以閒清陸機擬古詩佳人撫琴瑟纎手清且閒謝瞻詩夕霽風氣凉閒房有餘清宋之問詩竹房閒且清候館臨秋水周禮地官凡國野之道五十里有市市有候館候館有積九歌登山臨水兮送將歸莊子秋水時至百川灌河晉書阮籍傳賛秋水揚波春雲斂映梁簡文帝賦重以秋水揚波秋雲似羅庾信詩秋水牽沙落郊扉掩暮山顔延之詩側同幽人居郊扉常晝閉謝朓詩嵗華春有酒初服偃郊扉沈約詩四衢道難闢八正扉猶掩梁簡文帝詩偃蹇暮山虹王勃滕王閣序烟光凝而暮山紫月明潮漸近夏侯湛謠星稀兮月明謝靈運詩天髙秋月明抱朴子月之精生水是以月盛而潮大海嶠志潮隨月盈虧楊泉物理論月水之精潮有大小月有虧盈虞茂詩鏡中看月近露濕雁初還何遜詩露濕寒塘草陽休之詩露濕後園薇盧思道詩春朝露濕九芝田禮記仲秋之月鴻雁來梁簡文帝賦得隴坻雁初飛詩隴狹朝聲聚風急雁行稀鮑照詩木落江渡寒雁還風送秋庾信詩稻粱俱可戀飛去復飛還浮客了無定謝恵連詩悽悽留子言眷眷浮客心鮑照詩旅雁方南過浮客未西歸陶潛詩蕭索空宇中了無一可悦梁武帝詩逺思如可取近至了無形張協詩羈旅無定心翩翩如懸旌王淑英妻劉氏昭君怨一生竟何定萍流淮海間周禮秋官萍氏掌禁川游者疏萍草無根取名不沈溺海賦或乃萍流而浮轉呉均詩瀾漫紫萍流孔魚詩木舌無時用萍流復在余書淮海惟揚州潘岳西征賦漕引淮海之粟沈約詩翠鳳翔淮海史記陸賈傳﨑嶇山海間張南史字季直幽州人以試參軍居揚州折節讀書深入詩境富陽南樓望浙江風起漢書地理志泰山郡縣富