復長嘯楚辭招隠王孫遊兮不歸春草生兮萋萋謝靈運詩萋萋春草繁身寂心成道杜甫詩余亦師粲可身猶縛禪寂陳子昂詩水月心方寂孟浩然詩吾道貴閒寂正宗紀如來以往世㑹然燈佛于蓮華城然燈授之記曰汝後成佛如我號曰釋迦牟尼更刼無數逮迦葉佛世迺以菩薩成道花閒鳥自啼沈佺期詩閒花開石竹王維詩落花寂寂啼山鳥杜甫詩野花隨處發春鳥異方啼細泉松徑裏水經注細泉輕流望川競注宋之問詩石響細泉回杜甫詩竹竿裊裊細泉分劉孝先詩洞户臨松徑虛窓隠竹叢盧照鄰詩松徑有秦官綦母潛詩羽客北山尋草堂松徑深返景竹林西説文落光反照其東謂之反景王維詩返景入深林復照青苔上漢書地理志鄠杜竹林南山檀柘魏氏春秋嵇康寓居河内山陽縣阮籍山濤向秀籍兄子咸王戎劉伶相與遊于竹林號為七賢庾信思舊銘王子猷之舊徑唯餘竹林孟浩然竹亭詩逸氣假毫翰清風在竹林晚與門人别江淹别賦與子之别思心徘徊徐陵雙林寺傳大士碑銘噭噭門人承師若親依依出虎谿庾信詩故人迎借問念舊始依依王維詩田夫荷鋤至相見語依依廬山記恵逺法師送客過虎谿虎輒鳴號送陶元亮陸靜修與語道合不覺送過虎谿因大笑世傳三笑圖李白詩笑倒廬山逺何須過虎谿衞葉爵里無考晚投南村陶潛詩昔欲居南村非為卜其宅聞多素心人樂與數晨夕客行逢日暮謝靈運詩客行有苦樂但問客何行何遜詩客子行行倦年光處處華隂鏗詩蒼茫嵗欲晚辛苦客方行左傳日云莫矣淮南子魯陽公與韓搆難戰酣日莫援戈而撝之日返三舍王粲詩日莫遊西園顔延之詩日莫行采歸物色桑榆時按暮古作莫原野散秋暉禮記循行國邑周視原野穆天子傳曠原之野飛鳥之所解羽宋書符瑞志元嘉二十八年尋陽柴桑菽粟旅生彌漫原野謝莊文躊躇冬愛怊悵秋暉何遜詩山鶯空曙響隴月自秋暉劉禹錫觀雲篇蔥蘢含晚景潔素凝秋暉南陌人初㫁梁武帝詩河中之水向東流洛陽女兒名莫愁十三能織綺十四採桑南陌頭王樞詩復聞南陌上日暮採蓮歸陳後主採桑樂府春樓髻梳罷南陌競相隨宋樂府讀曲歌計約黄昏後人㫁猶未來王湜詩雨驟行人㫁唐明皇詩草合人蹤㫁塵濃鳥跡深西林鳥盡歸曹植賦刈桂蘭而秣馬舍余車於西林江淹詩明月沒西林許渾詩待月西林月正圓廣庭無樹草無烟何遜詩夕鳥己西度殘霞亦半消鮑照書旋風四起思鳥羣歸陳後主詩螢光息復起暗鳥去翻歸暗蓬沙上轉鮑照書寒蓬夕巻古樹雲平李白詩閒隨白鷗去沙上自為羣杜甫詩沙上草閣柳新暗城邊野池蓮欲紅古詩孤蓬轉霜根司馬彪詩秋蓬獨何辜飄颻隨風轉駱賔王詩蓬轉俱行役爪時獨未還寒葉月中飛何遜詩岸薺生寒葉村梅落早花李百藥詩喬木下寒葉亭林落曉霜傅休奕擬天問月中何有白兔𢷬藥酉陽雜俎月中有桂樹髙五百丈下有一人常斫之樹隨合庾肩吾詩寒雲間石起秋葉下山飛何遜詩㡬經秋葉飛驟見春流瀰李白詩客似秋葉飛飄颻不言歸村落無多在史記五帝紀帝舜所居成聚注聚謂村落也白居易詩晚出看田畝閒行傍村落聲聲近𢷬衣南史宋鄭鮮之傳劉毅當鎮江陵武帝㑹于江寧㑹戲積錢隠人毅先擲得雉帝甚不悦良久乃荅之既擲得盧鮮之大喜徒跣遶牀大叫聲聲相續述異記搗衣山在瑯琊山南絶險巖有方石昔有神女于此搗衣其石明瑩謂之玉女搗練碪籟紀𢷬衣者秋深治衣之聲也庾信啟平陵月夜驚聞𢷬衣江總宛轉歌不怨前階促織鳴偏愁别路𢷬衣聲劉方平河南人邢襄公政㑹之後與元徳秀善不仕秋夜泛舟林塘夜發舟劉孝綽詩林塘多秀色江總詩鳳葢繞林鑒塘駱賔王賦林塘改夏雲物迎秋晉書王傳髙風啟塗龍舟電發張説詩江妾晨炊􅎟津童夜濯舟蟲響荻颼颼顔延之詩夜蟬當夏急隂蟲先秋聞陽休之秋詩夜蟲扶砌響輕蛾遶燭飛詩疏義薍或謂之荻風俗通荻筩也言其聲音荻荻名自定也談苑江東蘆賤而荻賁先一年生者蘆也明年生者荻也水經注氣蕭蕭以瑟瑟風颼颼而飀飀萬影皆因月陸雲詩如彼日月萬景攸正注萬景萬物之影浮言物無遺照也梁元帝詩澄江涵皓月水影若天因本經月宫中有影者須彌山大洲中有閻扶提樹因此樹故名閻扶洲其樹髙大影見月輪因有此影千聲各為秋郭璞江賦千類萬聲自相喧聒栁􅈯陽春歌春鳥一囀有千聲周𢎞讓詩木葉動秋聲劉孝威詩織素起秋聲蕭慤詩望知雲氣合聴識水聲秋孫萬夀詩日斜山氣冷風近樹聲秋嵗華空復晚謝朓詩嵗華春有酒盧照鄰詩柳色摇嵗華温子昇詩空復撫鳴琴詩蟋蟀在堂疏九月之時是嵗晚之候嵗遂其將欲晚矣鄉思不堪愁徐陵書體中何如豈無鄉思魏徵詩日夕鄉思多梁元帝詩中江離思切蓬髩不堪秋論語人不堪其憂宋玉賦愁思無已秦嘉詩愁思難為數西北浮雲外古詩西北有髙樓上與浮雲齊魏文帝詩西北有浮雲亭亭如車葢王融詩浮雲自西北江淹詩懵懵雲外山何遜詩日夕望髙城眇眇青雲外伊川何處流書伊洛澗瀍既入于河注伊水出熊耳山至洛陽入洛洛㑹伊瀍澗三水以入河梁簡文帝詩我后懐初照不與伊川同薛道衡詩驚鴻出洛水翔鶴下伊川一統志伊水源出盧氏縣悶頓嶺水流經嵩縣洛陽偃師縣界入于洛水江淹詩西洲在何處徐陵文何處相望山邊一樓詩如川之流韓翃酬程近秋夜即事見贈長簟迎風早潘岳詩長簟竟牀空何遜詩北窓倒長簟王昌齡詩客來舒長簟開閣延清風張協七命嶤榭迎風陶潛詩緩帶盡歡娯起晚眠常早空城淡月華鮑照樂府雀乳四鷇空城之阿庾信賦若方鏡而無影似空城而未居孟浩然詩微雲淡河漢梁元帝烏栖曲共向江頭眺月華江淹詩露彩方泛艶月華始徘徊何遜詩髙樹北風響空庭秋月華星河秋一雁河圖括地象川徳布精上為星河杜審言詩宫闕星河低拂樹江淹賦值秋雁兮飛日當白露兮下時庾信詩雲歸一雁征宋之問明河篇烏鵲橋邊一雁飛砧杵夜千家古子夜歌佳人理寒服萬結砧杵勞何遜詩砧杵鳴四鄰庾信詩今夜長門月應如晝日明説苑景公令吏致千家之邑於晏子杜甫詩千家山郭靜朝暉節候看應晚晉書天文志華葢杠旁六星曰六甲可以分隂陽而配節候文心雕龍言節候則披文而見時謝靈運詩衾枕昧節候王維詩舊人看新厯杜甫詩草木嵗月晚心期卧已賖楊公筆録宋向栁與顔峻友善峻貴柳貧曰我與士遜心期久矣豈可以勢利處之任昉詩中道遇心期楊巨源詩應將清淨結心期杜甫詩幽事供髙卧沈約詩方悟大音賖向來吟秀句蘇頲詩向來無事日猶長杜甫詩向來吟橘頌文心雕龍凡篇章秀句裁可百二詩品謝朓竒章秀句往往遒警不覺已鳴鴉孟浩然詩春眠不覺曉處處聞啼鳥杜甫詩野鴉無意緒鳴噪自紛紛李白詩東方日出啼早鴉奚賈富春人尋許山人亭子桃源若逺近陶潛桃花源記晉太元中武陵人捕魚為業縁溪行忘路之逺近忽逢桃花林夾岸數百步芳草鮮美落英繽紛馬融賦聿皇求索乍近乍逺漁子棹輕舟郭璞江賦于是蘆人漁子擯落江山劉孝綽釣竿篇釣舟畫彩鷁漁子服水紈陶潛歸去來辭或命中車或棹孤舟張衡南都賦爾乃撫輕舟兮浮清池陸機賦泛輕舟於西川川路行難盡謝莊月賦臨風歎兮將馬歇川路長兮不可越謝恵連詩軌息陸塗初枻鼔川路始杜甫詩去去行難盡人家到漸幽庾信賦名為野人之家是謂愚公之谷王維詩杏樹壇邊漁父桃花源裏人家蕭子良書含真抱朴比調雲霞背谷居幽寓歡林溆楊炯賦叢菊芳兮庭之幽山禽拂席起張正見詩秋山被旅葛夏户響山禽杜甫詩山禽引子哺紅果水經注曲池接筵飛沼拂席宋書羊欣傳嘗詣謝混混拂席改衣然後見之溪水入庭流杜甫詩當時浣花橋溪水纔尺餘謝朓詩山積陵陽阻溪流春穀泉楚辭水流兮堂下顔延之詩門水環堦引流分席元結詩泉源在庭户洞壑當門前君是何年隠庾信詩何年金竈成左思詩杖策招隠士王康琚詩小隠隠陵藪庾肩吾詩仙人翻可見隠士更難尋如今成白頭杜甫詩飄泊到如今史記鄒陽傳白頭如新傾葢如故杜甫詩白頭行短盡渾欲不勝簪包何字幼嗣潤州延陵人融之子登天寳進士第大厯中為起居舍人與弟佶齊名世稱二包江上田家近海川原薄博物志天地四方皆海水相通地在其中葢無㡬也總而言之謂之四海言皆近于海也班固漢書賛中國川原以百數莫著於四瀆而河為宗也人家本自稀史記六國表詩書所以復見者多蔵人家儲光羲詩深谷有人家梁簡文帝詩秋風與白團本自不相安杜甫詩沙邊自宿稀􅎟苗期臘酒詩芃芃􅎟苗隂雨膏之謝朓齊雩祭歌族雲蓊鬱温風扇興雨祁祁黍苗遍崔寔四民月令臘明日更新謂之小嵗進酒尊長脩賀君師又十月上辛命典饋清麯釀冬酒以供臘祀也岑參詩臘酒飲未盡春衫縫已成霜葉是寒衣左思詩弱葉棲霜雪謝靈運詩曉霜楓葉丹漢書寒之於衣不待輕煖列子聖人衣足以葢形以禦風寒楚辭無衣裘以禦寒古詩遊子寒無衣市井誰相識史記平準書孝恵髙后時為天下初定復弛商賈之律然市井之子孫亦不得仕宦為吏國語管子曰昔聖王之處士也使就閒燕處工就官府處商就市井處農就田野風俗通市亦謂之市井言人至市有所鬻賣者當於井上洗濯令香潔然後到市也鮑照詩擾擾遊宦子營營市井人王維詩相顧無相識長歌懐采薇漁樵夜始歸何遜詩爾情深鞏洛予念返漁樵劉孝威詩散步懷漁樵王維詩山村人夜歸不須騎馬問沈約詩霞衣不待縫雲錦不須織六帖謝靈運守永嘉人曰騎紫馬者太守也杜甫詩騎馬欲雞栖恐畏狎鷗飛虞世南詩恐畏無人識列子海上之人好鷗者毎旦之海上従鷗鳥遊鷗烏之至者百數江淹詩物我俱忘懐可以狎鷗鳥鄭常肅代間人寄邢逸人羨君無外事老子為無為事無事味無味漢書朱雲傳在田野無事且留我東閣可以觀四方竒士西京雜記司馬相如為上林子虛賦意思蕭散不復與外事相闗日與世情違陶潛詩泛此忘憂物逺我遺世情陶𢎞景尋山誌倦世情之易擾乃杖策而尋山張説詩禪室従來雲外賞香臺豈是世中情莊子方且與世違而心不屑與之俱是陸沈者也地僻人難到漢書南粤王趙佗傳老夫處僻馬牛羊齒已長杜甫詩百年地僻柴門迥五月江深草閣寒又五盤詩地僻無網罟水清反多魚祖詠詩蘭若無人到真僧出復稀溪深鳥自飛馬援武溪行滔滔武溪一何深鳥飛不度獸不能臨隋煬帝詩蟬鳴秋氣近泉吐石溪深嵇康詩魚龍瀺灂山鳥羣飛梁簡文帝詩朝日斜來照户春鳥爭飛出林儒衣荷葉老禮記哀公問于孔子曰敢問何謂儒服孔子曰丘少居魯衣逢掖之衣及長居宋冠章甫之冠復漢書桓榮傳建武十九年拜榮為博士駕幸太學㑹諸博士論難于前榮被服儒衣温恭有藴藉張説詩列筵榮賜食送客貴儒衣楚辭製芰荷以為衣兮集芙蓉以為裳王勃文荷葉滋而曉露繁李欣詩荷葉裹江魚白甌貯香秔野飯藥苗肥李頎詩樵者乘霽歸野夫及星飯宋之問詩石髓非一巖藥苗乃萬族髙適詩秋韭何青青藥苗數百畦岑參詩終日看本草藥苗滿前階王維詩鄖國稻苗秀楚人菰米肥李白詩多雨紅榴折新秋緑芋肥若問湖邊意述異記越州鏡湖世傳軒轅鑄鏡湖邊因名而今憶共歸詩恵而好我攜手同歸謝莊賦馳遙思于千里願接手而同歸戎昱荆南人登進士第衞伯玉鎮荆南辟為従事建中中為辰䖍二州刺史採蓮曲南史羊侃傳性豪侈善音律自造采蓮棹歌兩曲甚有新致相和曲江南可採蓮蓮葉何田田梁簡文帝採蓮曲香風起白