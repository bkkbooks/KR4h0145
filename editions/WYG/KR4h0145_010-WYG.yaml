廡竇臮述書賦重則突兀嵩華風動金琅璫南史齊宗室子顯傳風動春朝陳後主詩風動萬籟答漢書西域傳註琅璫長鎖也今殿角皆有之一曰殿角懸鈴其聲琅璫天黒閉春院晉書天文志天了無質仰而瞻之髙逺無極故蒼蒼然譬之俯察千仞之深谷而窈黒也周禮天官閽人以時啟閉王勃白鶴寺碑更起招提之院地清棲暗芳宋之問詩暗芳足幽氣玉繩迴㫁絶春秋元命苞玉衡北兩星為玉繩謝朓詩玉繩低建章鮑照賦星翻漢回謝靈運詩㫁絶雖殊念鐵鳳森翺翔班固賦鳳鶱翥於甍標咸遡風而欲翔王勃文鐵鳳連甍文王操翼翼翺翔彼鳳凰兮梵放時出寺異苑曹思王植登魚山忽聞巖岫裏有誦經聲便效而則之今梵唱皆植所造庾信詩中天梵響來劉楨詩步出北寺門鐘殘仍殷牀張説詩城外宵鐘徹閨門曙火殘詩殷其雷傳殷雷聲也異苑沙門支法存有八尺沈香板床明朝在沃野戰國策蘇秦説秦恵王曰大王之國沃野千里陸機詩沃野爽且平苦見沙塵黄梁簡文帝碑刼數沙塵寂寥誰辨王僧達詩黄沙十里昏何承天樂府戰城南衝黄塵王維早朝皎潔明星髙謝靈運賦明舒照兮殊皎潔詩子興視夜明星有爛蒼茫逺天曙沈約詩蒼茫失洲嶼張正見詩長榆接逺天槐霧暗不開何遜詩槐霧曉氤氲江總詩霧暗山中日中論霍然若開霧而觀天城鴉鳴稍去河東記鵶鳴國周遞數百里其間日月所不及終日昬暗常以鴉鳴知晝夜始聞髙閣聲後漢書樊宏傳所起廬舍皆有重堂髙閣張正見詩髙閣暎奔曦莫辨更衣處漢書灌夫傳坐乃起更衣稍稍去銀燭已成行江總詩挂纓銀燭下晉書潘岳傳芻秣成行金門儼騶馭揚雄解嘲今吾子幸得應金門上玉堂有日矣張正見詩騶馭鬱相催贈裴十迪風景日夕佳晉書王導傳風景不殊舉目多江山之異詩日之夕矣陶潛詩山氣日夕佳與君賦新詩嵇康琴賦臨清流賦新詩陶潛詩春秋多佳日登髙賦新詩澹然望逺空揚雄長揚賦使海内澹然永無邊城之菑金革之患王勃思春賦惜青樓之望逺李白詩晴雲散逺空如意方支頤庾信對酒曲王戎如意舞莊子左手支頤春風動百草莊子春風發而百草生古詩四顧何茫茫東風搖百草蘭蕙生我籬離騷余既滋蘭之九畹兮又樹蕙之百晦司馬相如上林賦下摩蘭蕙上拂羽葢爾雅樊籬也註謂藩籬曖曖日暖閨離騷時曖曖其將逝兮結幽蘭而延佇王筠有所思樂府曖曖巫山髙江淹四時賦旭日始暖蕙艸可織又閨中風暖陌上草薫田家來致詞漢書楊惲傳田家作苦古樂府羅敷前致詞使君一何愚欣欣春還臯陶潛歸去來辭木欣欣以向榮宗楚客詩九重中禁啟七日早春還潘岳秋興賦耕東臯之沃壤兮注水田曰臯東者取其春意淡淡水生陂潘岳詩緑池泛淡淡孫權遺曹公書春水方生公宜速去淮南子譬若同陂而灌田其愛水均也隂鏗詩萬頃溢澄陂桃李雖未開詩何彼穠矣華如桃李史記李廣傳賛桃李不言下自成蹊荑萼滿芳枝張説張司馬序室邇蘭芬族聨荑萼楚辭折芳枝與瓊華兮沈約詩流鶯復滿枝請君理還策陶潛詩悵恨獨策還﨑嶇歴榛曲南史隠逸傳褚伯玉往剡居瀑布山三十餘年丘珍孫與王僧達書曰禇先生不事王侯􅎨髙木食有年載矣望其還策之日蹔紆清塵亦願助為譬説敢告將農時孟子不違農時陶潛歸去來辭農人告余以春及將有事于西疇常建西山一身為輕舟鮑照詩一身仕闗西維摩經是身如浮雲曹植洛神賦御輕舟而上溯陳子昂詩騖檝漾輕舟落日西山際謝靈運賦望新晴於落日晉書王徽之傳西山朝來致有爽氣耳常隨去帆影何遜詩去帆若不見試望白雲中梁簡文帝詩渺渺去帆驚賀朝清詩巖巖石帆影如得海風便逺接長天勢徐防觀濤詩稍見逺天浮駱賔王詩層巖逺接天王勃滕王閣序秋水共長天一色又詩洲渚亘長天物象歸餘清莊子凡有貌象聲色者皆物也水經注荆門山南有門象虎牙以物象受名李嶠詩金簴有餘清林巒分夕麗孔稚圭北山移文望林巒而有失江淹賦既艷溢于時暮方照麗於霜分亭亭碧流暗陶潛詩亭亭凌風桂梁元帝賦巖亭亭其似葢喬知之詩下有碧流水上有丹桂香王勃詩虛巖辨暗流日入孤霞繼擊壤歌日出而作日入而息劉孝綽詩日入江風靜孔稚圭北山移文髙霞孤暎王勃滕王閣序落霞與孤騖齊飛渚日逺隂暎謝靈運詩雲日相輝暎謝朓詩竹樹澄逺隂湖雲尚明霽宋玉髙唐賦風止雨霽雲無處所謝靈運詩時竟夕澄霽雲歸日西馳林昬䠂色來沈烱詩林烟樹下昬江淹詩風光多樹色岸逺荆門閉徐堅棹歌行烟生歸岸逺水經注江水東歴荆門虎牙之間荆門山在南上合下開其狀似門至夜轉清迥曹植詩清夜遊西園張九齡詩清迥江城月流光萬里同蕭蕭北風厲楚辭九歌風颯颯兮木蕭蕭詩北風其凉晉書樂志凉風清且厲沙邊鴈鷺泊詩鳬鷖在沙謝朓賦星迴窮紀沙鴈相飛盧照隣詩迸水驚愁鷺騰沙起狎鷗左思蜀都賦羽族紛泊宿處蒹葭蔽劉希夷詩暮宿南洲草詩蒹葭蒼蒼白露為霜鮑照賦對蒹葭之遂黄視零露之方白圓月逗前浦唐太宗詩照璧臺圃月飄珠箔穿露梁簡文帝詩逗浦憶辰陽陳子昂詩沙浦明如月孤琴又搖曳王敬伯歌垂月照孤琴鮑照歌行搖曳髙帆舉泠然夜遂深莊子列子御風而行泠然善也王勃賦峯深夜久潭靜秋新白露霑人袂禮記孟秋之月白露降古詩白露沾野草時節忽復易王粲詩迅風拂裳袂白露霑衣襟岑參聞崔十二侍御灌口夜宿報恩寺元和志灌口鎮在灌縣西二十六里後魏置聞君尋野寺便宿支公房王績詩結衣尋野路負杖入山房髙僧傳支遁字道林陳留人家世事佛投跡越之剡山於沃州小嶺立寺行道僧衆禀學溪月泠深殿王績詩清溪歸路直乗月夜歌還薛道衡詩月泠疑秋夜陳後主詩殿深炎氣少江雲擁迴廊宋之問詩江雲欲變霞異聖傳玉帝所居常有紅雲擁之王勃龍懐寺碑迴廊䆗窱自吐風飇然燈松林靜梁元帝詩然燈疑夜火張説詩然燈美夜月初圓魏書彭城王勰傳髙祖幸代都路傍有大松樹十數根令勰賦詩其詩曰問松林松林經㡬冬山川何如昔風雲與古同劉勰新論林之性靜所以動者風搖之也煮茗柴門香六帖逸人王休居太白山毎冬取溪氷琢其精瑩者煮建茗供賔客曹植樂府柴門何蕭條陶潛文翳翳柴門事我宵晨勝事不可接南史齊竟陵王子良傳子良少有清問禮才好士善立勝事謝朓詩馳暉不可接何況隔兩鄉相思幽興長李陵詩各言長相思謝朓詩别後能相思何嗟異封壤陳子昂詩山深興轉幽林卧偶得魚鳥趣嵇康與山巨源書遊山澤觀魚鳥心甚樂之陶潛詩有客賞我趣每每顧林園復兹水木涼謝混遊西池詩水木湛清華劉孝威詩臨池愛水涼逺峯帶雨色謝靈運遊南亭詩宻林含餘清逺峯隠半規朱超對雨詩落照依山盡浮凉帶雨來落日搖川光謝靈運撰征賦望新晴於落日起明光於霽月江總詩水上動搖明盧照隣詩川光搖水箭臼中西山藥易㫁木為杵掘地為臼杜預疏藥杵臼澡槃熨斗釡甕銚槃鎢鋗皆亦民間之急用也魏文帝折楊栁行西山一何髙髙髙殊無極上有兩仙童不飲亦不食與我一丸藥光耀有五色沈約詩若䝉西山藥頽齡尚能度袖裏淮南方古詩置書懐袖中三嵗字不滅神仙傳漢淮南王劉安作内書二十二篇又中篇八章言神仙黄白之事名為鴻寳唯愛隠几時孟子隠几而卧註隠憑也莊子南郭子綦隠几而坐仰天而噓嗒然似喪其耦獨遊無何鄉南史陶𢎞景傳𢎞景特愛松風庭院皆植松有時獨遊泉石望見者以為神仙莊子今子有大樹患其無用何不樹之于無何有之鄉廣莫之野劉長卿關門望華山一統志潼關在華隂縣東四十里名勝志潼水在闗西一里闗因以名自函谷至斯髙出雲表山海經華山其髙五千仞削成而四方逺而望之有若華狀客路瞻太華梁簡文帝詩客行祗念路書西傾朱圉鳥鼠至於太華西都賦表以太華終南之山三峯髙際天崔顥詩岧嶤太華俯咸京天外三峯削不成漢書嚴助傳三代至盛際天接地夏雲亘百里顧愷之詩夏雲多竒峯謝朓詩兹山亘百里合沓與雲齊合沓遙相連謝靈運詩巒隴有合沓往來無蹤轍魏文帝登臺賦溪谷行以交錯草木鬱其相連雷雨飛半腹易雷雨之動滿盈左思魏都賦雷雨窈𡨕而未半廬山記水出山腹挂流三四百丈飛湍雲表太陽在其巔詩十月之交疏日者太陽之精詩維山崔巍傳崔巍山巔也翠微闗上近庾信詩金鞍上翠微丘遲賦永展帶于關上長緝巾於林底瀑布懸林邊孫綽遊天台賦瀑布飛流以界道庾信詩長虹雙瀑布圓闕兩芙蓉易即鹿無虞惟入於林中愛此衆秀容劉楨魯都賦岱宗邈其層秀沈佺期詩諸嶺皆峻秀中峯特美好淮南子泰山之容巍巍然髙能令西望偏左傳乃使公孫獲處許西偏景福殿賦温房承其東序凉室處其西偏徘徊忘暝色甘泉賦徘徊招搖雲遲遲兮謝靈運詩林壑斂暝色雲霞収夕霏泱漭成隂烟上林賦經乎桂林之中過乎泱漭之野顔延之曲水詩序松石峻峗蔥翠隂烟曽是朝百靈東都賦禮神祗懐百靈李百藥詩百靈警朝宗亦云㑹羣仙十洲記生洲上有仙家數萬王勃詩鳳琴調上客龍轡儼羣仙瓊漿豈易挹楚辭華酌既陳有瓊漿些詩惟北有斗不可以挹酒漿毛女非空傳列仙傳毛女字玉姜秦始皇宫人逃之華隂山食松柏遍體生毛故謂之毛女張九齡河上公廟篇姓名終不識章句此空傳彷彿仍佇想仲長統樂志論呼吸精和求至人之髣髴傅亮修張良廟教過大梁者或佇想於夷門幽期如眼前謝靈運賦石幽期而知賢張揣景而示信梁簡文帝詩偏使紅花散飄揚落眼前金天有清廟唐明皇帝詩四方皆石璧五位配金天詩於穆清廟肅雝顯相上林賦登明堂坐清廟松柏隠蒼然詩如松柏之茂古豓歌南山石巍巍松柏何離離陶潛詩蒼蒼谷中樹冬夏常如兹奉陪蕭使君入鮑達洞尋靈山寺鮑達洞未詳出處張芸叟南征録繁昌東界有靈山寺踞山頂殿閣重複山居秋更鮮南史謝靈運作山居賦并自注以言其事王維詩空山新雨後天氣晚來秋秋江相暎碧李白詩挂帆秋江上陳子昂詩巖潭相映媚江淹賦水湛湛而空碧杜甫詩江碧鳥逾白獨臨滄洲路北史韋夐傳臨滄洲而謝支伯謝朓詩復協滄洲趣如待挂帆客南史鄧琬傳欲沿流挂帆杜甫詩挂帆逺色外驚浪滿呉越遂使康樂侯南史謝靈運襲封康樂公宋受命降公爵為侯披榛著雙屐趙至與嵇康兄子蕃書涉澤求蹊披榛覔路南史謝靈運尋山陟嶺嘗著木屐上山則去其前齒下山去其後齒杜甫詩謝氏尋山屐入雲開嶺道杜甫詩半入江風半入雲謝靈運山居賦山磯下而回澤瀨石上而開道永日尋泉脈水經注提琴命友嬉娯永日博物志無水之時人不知泉脈劉峻詩泉脈洞杳杳古寺隠青冥法苑珠林五臺山方三百里中有佛光山仙華山王子塔古寺六所杜甫詩老身古寺風泠泠楚辭據青㝠而攄虹兮王維詩連天凝黛色百里遙青㝠空中寒磬夕列子夫天地空中之一細物岑參詩幽磬清曉夕蒼苔絶行徑謝朓詩蒼苔依砌上六帖後漢張仲蔚蓬蒿滿空惟開一行徑飛鳥無去跡易飛鳥遺之音晉書文苑傳投魚深泉放飛鳥謝朓遊後園賦去鳥成行李白詩長空去鳥沒樹杪下歸人王維詩山中一夜雨樹杪百重泉王昌齡詩南粤歸人夢海樓水聲過幽石陶潛别傳淵明嘗聞田水聲倚杖聴之謝靈運詩白雲抱幽石任情趣逾逺北史李栗傳栗在道武前舒放倨惰不自祇肅笑唾任情晉書嵇康傳其髙情雅趣率然𤣥逺移步竒屢易唐太宗詩移步出詞林離騷時繽紛其變易兮又何可以淹留蘿木靜䝉䝉廣雅女蘿松蘿也李白詩紫藤挂雲木仙詩壯氣何䝉䝉風烟深寂寂楊烱詩林壑人事少風烟鳥路長何遜詩汀沙暮寂寂徘徊未能去駱賔王詩風景蹔徘徊洛神賦悵盤桓而不能去畏共桃源隔宗懔詩所言春不至未有桃花源趙景真與嵇蕃書乗髙眺逺則山川幽隔御選唐詩巻六補編
