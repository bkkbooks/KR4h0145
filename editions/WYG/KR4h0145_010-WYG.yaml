body:
  text: 欽定四庫全書御選唐詩巻六補編李白登錦城散花樓譙周益州志成都織錦既成濯于江水其文分明勝於初成他水濯之不如江水也元和郡國志錦城在成都縣南十里故錦官城也一統志散花樓在子城東北隅錦官城在萬里橋南因其有錦官故名猶合浦之珠官也日照錦城頭梁簡文帝詩杏梁斜日照餘輝暎美人庾信詩錦城遙可望迴鞍念此時蕭子顯詩洛陽城頭雞欲曙朝光散花樓鮑照詩碧樓含夜月紫殿爭朝光梁簡文帝詩朝光照皎皎唐太宗詩髙軒曖春色邃閣媚朝光金窻夾繡户張超文金窻鬱律劉勰新論繡户洞房則簔不如裘江淹賦雕臺繡户當衢横集珠箔懸瓊鈎漢武故事武帝起神室以白珠織為箔玳瑁壓之劉孝威詩蚪簷挂珠箔梁元帝詩落月如懸鈎庾信詩幔城金麥穂瓊鈎銀蒜條飛梯入雲中南史張綱設飛樓雲梯木幔板屋庾信詩飛梯聊度絳合弩暫臨汾謝靈運詩共登青雲梯陸機百年歌軒冕婀娜翠雲中何遜詩去帆若不見試望白雲中極目散我憂王粲登樓賦平原逺而極目兮蔽荆山之髙岑詩駕言出遊以寫我憂暮雨向三峽髙唐賦旦為朝雲暮為羅行雨范雲樂府暮雨潤衣晉書桓冲傳樂鄉城以上四十餘里北枕大江西接三峽輿地志楚地有三峽明月峽巫山峽廣澤峽春江遶雙流顔延之詩春江壯風濤劉孝綽詩欲待春江暮爭途向洛陽蜀都賦帶二江之雙流抗峩嵋之重阻注江水出岷山分為二江徑成都南東流經之故曰帶也揚雄蜀都賦兩江弭其前今來一登望詩今我來思雨雪霏霏曹植詩始出嚴霜結今來白露晞漢書陳湯傳每過城邑山川常登望如上九天遊易雲上于天楚辭九天之際安放安屬漢書郊祀志九天巫祀九天師古注九天者謂中央鈞天東方蒼天東北昊天北方𤣥天西北幽天西方皓天西南朱天南方炎天東南陽天也晉書樂志奮鷹揚振乾威曜電光凌九天劉長卿白鷺爾雅鷺舂鉏注白鷺也頭翅背上皆有長翰毛江東人取為睫攡枚乗七發其始起也洪淋淋焉若白鷺之下翔劉孝威詩白鷺隠青苗亭亭常獨立水經注雷澤西南十許里有小山孤立峻上亭亭嵥峙謂之歴山魏文帝詩西北有浮雲亭亭如車葢晉書庾敳傳有逺韻處衆人中居然獨立北史盧思道傳作孤鴻賦序曰鎩翮牆隂偶影獨立川上時延頸論語子在川上陶潛詩昭昭天宇闊晶晶川上平史記司馬相如傳南夷之君西僰之長常效貢職不敢怠墮延頸舉踵喁喁然皆爭歸義欲為臣妾秋水寒白毛莊子秋水時至百川灌河沈約攜手曲斜簪映秋水開鏡比春粧詩有馬白顛疏白顛額有白毛駱賔王咏鵞詩白毛浮緑水紅掌撥清波夕陽弔孤影詩度其夕陽謝朓後園賦日棲榆柳霞照夕陽陶潛詩欲言無子和揮杯勸孤影謝靈運詩孤影莫與諼王勃寒梧棲鳯賦月照孤影幽姿閒自媚謝靈運詩潛虬媚幽姿古樂府入門各自媚誰肯相為言逸翮思一騁郭璞詩逸翮思拂霄迅足羨逺游鮑照舞鶴賦逸翮後塵翺翥先路如有長風吹晉書宗慤傳叔父問所志慤曰願乘長風破萬里浪庾信賦吹落葉之扁舟飄長風於上游詩籜兮籜兮風其吹女青雲在俄頃屈原九歌青雲衣兮白霓裳魏志荀攸賈詡傳賛注張子房青雲之士非陳平之倫郭璞江賦倏忽數百千里俄頃張九齡奉和聖製送十道採訪使及朝集使唐書百官志注景雲二年置十道按察使道各一人開元二年曰十道按察採訪處置使漢制考漢之朝集使謂之上計吏謂上一年計㑹文書及功狀也三年一上計史記范雎傳昭王召王稽拜為河東守三嵗不上計通典開元二十五年命諸道採訪使考課善績三年一奏漢書張蒼傳蒼以列侯居相府領主郡國上計者萬國趨河洛左傳禹會諸侯於塗山執玉帛而朝者萬國張正見詩軌文通萬國史記封禪書三代之君皆在河洛之間張衡東京賦泝洛背河左伊右瀍課最力已陳漢書兒寛傳寛遷左内史以負租課殿當免民恐失之大家牛車小家擔負輸租課更以最唐書柳冕傳漢法三載上計以㑹課最班彪王命論英雄陳力羣策畢舉賞延恩復博書罰勿及嗣賞延於世謝靈運賦荷賞延之渥恩垂衣深共理易黄帝堯舜垂衣裳而天下治何遜詩垂衣化比屋呉志步隲傳賢人君子所以興隆大化佐理時務者也改瑟其咸若漢書董仲舒傳譬之琴瑟不調甚者必解而更張之乃可鼓也書山川鬼神亦莫不寧暨鳥獸魚鼈咸若王勃詩禮樂咸若首路迴竹符諸葛亮詔旍麾首路史記孝文帝紀初與郡國守相為銅虎符竹使符注以竹箭五枚長五寸鐫刻篆書第一至第五分鑣揚木鐸晉書孝武帝賛鄭叔分鑣梁昭明太子文選序分鑣並驅周禮天官小宰注古者將有新令必奮木鐸以警衆使明聴也木鐸木舌也文事奮木鐸武事奮金鐸戒程有攸往任昉書零雪戒途非滅跡之郊梁簡文帝詩絶水亟稽程易君子有攸往詔餞無淹泊詩申伯言邁王餞于郿陶潛詩淹留忘宵晨又前途當㡬許未知止泊處昭晰動天文鮑照樂府智哉衆多士服理辨昭晰易觀乎天文以察時變潘岳閒居賦窺天文之秘奥殷勤在人瘼司馬遷報任安書僕與李陵未嘗銜杯酒接殷勤之餘懽謝靈運樂府鄙哉愚人戚戚懐瘼持久望兹念東方朔七諫皇天保其髙兮后土持其久書念兹在兹克終期所託詩靡不有初鮮克有終阮籍詩人誰不善始尠能克厥終行矣當自强史記楚世家伍尚謂伍胥曰子其行矣易天行健君子以自强不息禮記知困然後能自强也春耕庶秋穫國語以待時耕注時耕謂立春之後漢書食貨志春耕夏耘秋穫冬蔵庾信詩谷口看秋穫張説過蜀道山水經注秦恵王欲伐蜀而不知道作五石牛以金置尾下言能屎金蜀王負力令五丁引之成道我行春三月詩我行其野蕭慤春賦三月春風已復流丘遲與陳伯之書暮春三月江南草長山中百花開沈約詩山中有桂樹庾信詩緑房千子熟紫穂百花開披林入峭蒨南史徐勉傳臨池觀魚披林聴鳥張載詩披林採新橘左思招隠詩峭蒨青蔥間竹柏得其真攀磴陟崔嵬水經注石磴縈委若羊腸焉梁蕭統詩牽蘿下石磴攀桂陟松梁詩陟彼崔嵬四皓采芝操樹木莫莫髙山崔嵬白雲半峯起陶𢎞景詩山中何所有嶺上多白雲謝靈運詩巖髙白雲屯梁簡文帝詩絶嶺隔天餘長嶼横山半清江出峽來水經岷山在蜀郡氐道縣大江所出至巫縣故城南又東徑巫峽注巫山峽而蜀水不流望帝使鼈靈鑿巫峽通水蜀得陸處誰知髙深意魏武帝短歌行山不厭髙水不厭深水經注函谷闗邃岸天髙空谷幽深緬邈心幽哉陶潛閒情賦顧襟袖以緬邈張正見詩披襟出蘭畹命酌動幽心李白廬山東林寺夜懐後漢書郡國志誌廬山在尋陽縣其山大嶺凡七重圓基周回垂三百五里釋氏通鑑慧逺於山東建東林寺山神降靈願加資助一統志廬山在九江府城南二十五里東林寺在廬山晉慧逺與同門慧永居西林學徒日衆别居林之東謝靈運為鑿池種蓮號蓮社我尋青蓮宇駱賔王詩物外狎招尋梁簡文帝佛像銘滿月為面青蓮在眸唐太宗立寺詔法鼓所振變炎火於青蓮陳子昂詩聞道白雲居窈窕青蓮宇獨往謝城闕淮南子山谷之人輕天下細萬物而獨往沈約詩秋風西北起飄我過城闕霜清東林鐘謝朓詩清霜落素枝王襃詩律改三秋節氣應九鐘霜駱賔王詩風霜入曙鐘庾信詩獨聴竹林鐘水白虎溪月古逸詩浩浩白水廬山記慧逺法師送陶元亮陸脩靜與語道合不覺送過虎溪因大笑世傳三笑圖一統志虎溪在九江府城南江總賦寝處風雲馮棲水月天香生虛空水經注爾時諸神天人側塞空中散天香花庾信浮圖詩天香下桂殿仙梵入伊笙法華經其佛嘗處虚空為衆説法天樂鳴不歇張衡西京賦昔者大帝悦秦繆公而覲之饗以鈞天廣樂博物志漢武帝時弱水西國有人來獻香積九十餘日香猶不歇宴坐寂不動沈約法王寺碑振錫經行祗林宴坐易寂然不動感而遂通天下之故大千入毫髮華嚴經二千大千世界之中有百億須彌山江總香賛海岸相傳香流大千論衡方今聖明有浸豐益美之化無細大毫髮之虧鮑照詩毫髮一為瑕丘山不可勝湛然㝠真心王維西方變畫賛湛然不動疑過於往來漢書王貢傳序獨嚴湛㝠不作茍見不治茍得陳書周𢎞正傳凝心妙本常自得于天真曠刼㫁出沒髙僧傳昔漢武穿昆明池底得黒灰問東方朔朔曰可問西域梵人後竺法蘭至衆人追問之蘭云世界終盡刼火洞燒此灰是也謝朓詩出沒眺樓雉何遜七召居隠磷而出沒送温處士歸黄山白鵞峯舊居元和郡縣志黄山在太平縣西南四十里上有泉水泉側多黄連羅願新安志黄山舊名黟山在歙縣西北百二十八里東南則歙西南為休寧西北則蔽於寧國府之太平縣唐天寳六年勅改為黄山黄山四千仞新安志黄山髙一千一百八十仞三十二蓮峯一統志黄山有峯三十二水源亦三十六丹崖夾石柱晉書宋纎傳丹崖千丈青壁萬尋盧照隣賦疑石柱之亭亭菡萏金芙蓉詩彼澤之陂有蒲菡萏張翰詩團輔圓頤菡萏芙蓉爾雅疏江東人呼荷華為芙蓉伊昔昇絶頂王襃詩山窻臨絶頂盧照隣詩絶頂横臨日孤峯半倚天下窺天目松魯靈光殿賦玉女窺窻而下視水經注洞溪水出呉興郡於潛縣北天目山杭州圖經天目山上有兩湖如左右目故名陶潛詩泉従山中來早晚發天目仙人鍊玉處古詩仙人騎白鹿紫微夫人詩鍊玉飛八瓊羽化留餘蹤晉書許邁傳邁徧遊名山後莫測所終好道者皆謂之羽化庾信碑清徽令範千載餘蹤亦聞温伯雪莊子温伯雪子適齊舍於魯仲尼見之而不言子路曰吾子欲見温伯雪子久矣見之而不言何耶王融為竟陵王與隠士劉虬書昔宣尼之見伯雪師利之往維摩豈不知相忘之道哉諒有以也獨往今相逢江淹詩凝神任獨往古詩相逢狹路間採秀辭五岳楚辭采三秀于山前東方朔文踐赤縣而遨五岳行陂澤而息名山攀岩歴萬重謝靈運詩攀林搴落英駱賔王詩青山㡬萬重歸休白鵞嶺北史邢昭傳性好談賞公事歸休恒須賔客自伴舊注白鵞嶺在黄山渴飲丹砂井淮南子渴而求飲抱朴子臨沅廖氏世世壽考後徙去他人居之復多夀考疑其井水赤掘之得丹砂數十斛鳳吹我時來梁武帝樂府丈人少徘徊鳯吹方參差陶潛詩時來茍㝠㑹宛轡憩通衢雲車爾當整水經注衞叔卿居華山中嘗乗雲車駕白鹿見漢武帝顔氏家訓車乘衣服必貴齊整去去陵陽東世説去去無可復用相投宣州志陵陽山在涇縣西南百里乃陵陽竇子明釣龍之處行行芳桂叢古詩行行重行行淮南子招隠士桂樹叢生兮山之幽迴溪十六度新安志黄山有溪二十四潘岳詩回溪縈曲阻謝靈運詩對嶺臨回溪碧嶂盡晴空沈約詩崚嶒起青嶂他日還相訪南史陶子鏘傳子鏘逢謝超宗下車相訪詣建康令乗橋躡彩虹史記夏紀山行乘檋注檋一作橋以鐵如錐施履下以上山不蹉跌也楚詞建彩虹以摽搖沈約詩標峯彩虹外遊南陽白水登石激作漢書地理志南陽郡縣舂陵師古注元朔五年以零陵泠道之舂陵鄉封長沙王子買為舂陵侯至戴侯仁徙南陽白水鄉水經注渭水又東與豐水㑹無他髙山異巒所有惟原阜石激而已朝涉白水源楚辭朝吾將濟於白水兮晉書載記登山涉水一統志白河在湖廣鄖陽府城東北源出南陽府鄧州界下入漢江蹔與人俗疎任昉序有髙世之度脱落塵俗島嶼佳境色江總脩心賦望島嶼之邅迴面江源之重沓世説顧長康每食蔗自尾至本人問之曰漸入佳境江天涵清虛謝莊詩烟竟山郊逺霧罷江天分漢書敘傳清虛澹泊世説清虛日來滓穢日去目送去海雲嵇康詩目送歸鴻手揮五絃江總詩去雲目徒送離琴手自揮淮南子四