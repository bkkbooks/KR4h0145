body:
  text: 欽定四庫全書御選唐詩巻二十三補編李頎寄綦母三唐書藝文志綦母潛字孝通開元中由宜夀縣尉入為集賢院待制新加大邑綬仍黄書今朕作大邑於茲新洛左傳大官大邑身之所庇也漢書百官志比二千石以上皆銅印黄綬近與單車向洛陽李陵荅蘇武書足下昔以單車之使漢書循吏傳龔遂為渤海太守單車獨行到府又地理志河南郡縣洛陽梁簡文帝樂府洛陽佳麗所大道滿春光顧盻一過丞相府揚雄荅賔戲虞卿以顧盻而捐相印張濛賦聊登陟兮一過史記蕭相國世家何以丞相留收巴蜀填撫諭告使給軍食荀綽晉百官表注漢丞相府門無䦨不設鈴不警鼓言其深大濶逺無節限也蕭子顯詩丞相府中烏未飛風流三接令公香後漢書王暢傳士女沾教化黔首仰風流庾信賦殷仲文風流儒雅海内知名易晉康侯用錫馬蕃庶畫日三接習鑿齒襄陽記荀令君至人家坐幕三日香氣不歇南川稉稻花侵縣謝朓詩息駕南川涘梁簡文帝書分竹南川剖符千里魏文帝書新城稉稻上風吹之五里聞香謝靈運詩滮池溉稉稻劉長卿詩暮天江色裏野鶴稻花中李白詩河陽花作縣西嶺雲霞色滿堂庾闡詩拂駕升西嶺陶潛詩峩峩西嶺内江淹詩雲霞冠秋嶺鮑照詩重巖秋雲色唐太宗詩組練輝霞色九歌芳菲菲兮滿堂共道進賢䝉上賞周禮夏官大世司馬進賢興功以作邦國史記蕭相國家上曰吾聞進賢受上賞看君幾嵗作臺郎杜甫詩看君多道氣孔融薦禰衡表路粹嚴象亦用竒才擢拜臺郎衡宜與為比韓翃寄徐州鄭使君江城五馬楚雲邊杜甫詩江城孤照日山谷逺含風李白詩江城五月落梅花遯齋閒覽漢時朝臣出使為太守増一馬故曰五馬晉書天文志楚雲如日鮑照詩林際無窮極雲邊不可尋梁簡文帝詩縱意白雲邊不羨雍容畫省年詩無然歆羨史記司馬相如傳從車騎雍容閒雅甚都傅毅賦雍容惆悵不可為象漢書典職尚書省皆以粉壁畫古賢烈士曰畫省亦曰粉省才子舊稱何水部左傳昔髙陽氏有才子八人天下之民謂之八愷髙辛氏有才子八人天下之民謂之八元南史何遜傳天監中兼尚書水部郎唐書百官志水部郎中貟外郎各一人掌津濟船艫渠梁堤堰溝洫漁捕運漕碾磑之事使君還繼謝臨川後漢書冦恂傳使君建節銜命以臨四方古樂府使君從南來五馬立踟蹰宋書謝靈運傳太祖不欲使東歸以為臨川内史賜秩中二千石射堂草遍收殘雨晉書成帝紀帝嘗欲於後園作射堂庾信春賦拂塵看馬埒分朋入射堂王勃詩草遍南亭合應璩與岑文瑜書雨垂落而復收江淹賦雨蕭索光烟豔爛杜審言詩日氣含殘雨官路人稀對夕天六朝事迹淨妙寺舊臨官路王褒詩黄山獵地廣青門官路長杜甫詩赤甲山下行人稀謝莊詩夕天霽晚氣雖卧郡齋千里隔陶潛詩夏月虛閒髙卧北窓之下韋應物詩今朝郡齋冷謝莊月賦隔千里兮共明月李白詩日暮千里隔與君同見月初圎韋應物詩如何日夕待見月三四圎梁簡文帝詩月色與池同劉孝威詩今夜月輪圎魏徵詩露重麟膠勁風髙月影圎戴叔倫和汴州李相公勉人日喜春一統志祥符縣漢為浚儀縣屬陳留郡後周改汴州隋廢陳留郡以縣屬鄭州唐於此置汴州唐書李勉傳代宗詔勉節度汴宋德宗立就加同中書門下平章事董勛荅問禮俗正月一日為雞二日為狗三日為猪四日為羊五日為牛六日為馬七日為人李充傳正月七日厥日惟人年來日日春光好梁湘東王詩春心日日異張正見詩春光落雲葉王僧孺詩非願嵗物華徒用風光好今日春光好更新荀子欲觀千載則審今日鮑泉春日詩新光新氣早獨獻菜羮憐應節荆楚嵗時記人日以七種菜為羮李乂人日應制詩幸陪人勝節長願奉垂衣京房傳萬物應節而生遍傳金勝喜逢人典戒人日造華勝相遺像瑞圖金勝之形又像西王母戴勝也烟添栁色看猶淺何遜詩輕烟淡栁色蕭子範詩春情寄栁色李適詩淑氣初含梅色淺鳥踏梅花落己頻蕭子範詩鳥語出梅中何遜詩村梅落早花東閣此時聞一曲杜甫詩東閣官梅動詩興鮑照詩一曲動情多翻令和者不勝春宋玉文為之歌陽春白雪國中屬而和者不過數人宋之問詩陽橋花栁不勝春崔峒博陵人登進士第為拾遺集賢學士終於州刺史大厯十才子之一也題桐廬李明府官舍唐書地理志睦州新定郡有桐廬縣訟堂寂寂對烟霞王勃文軒堂清寂左思詩寂寂揚子宅門無卿相輿北史隠逸傳飡松餌术棲息烟霞五栁門前聚曉鴉晉書陶潛傳嘗著五栁先生傳以自況曰先生不知何許人不詳姓字宅邊有五栁樹因以為號焉古子夜歌暫出白門前楊栁可藏烏李白詩東方日出啼早鴉流水聲中視公事江總詩罕有知音者空勞流水聲禮記公事不私議楊巨源詩不妨公事資髙卧無限詩情要細論寒山影裏見人家王維詩寒山轉蒼翠秋水日潺湲岑參詩藥椀搖山影魚竿帶水痕王維詩雨中春樹萬人家觀風競美新為政禮記命太史陳詩以觀民風杜甫詩姚公美政誰與儔又為政風流今在茲計日還知舊觸邪杜審言詩紅粉樓中應計日燕支山下莫經年晉書輿服志法冠一名柱後或謂之獬豸冠髙五寸凡執法官皆服之或謂獬豸神羊能觸邪佞蘇頲詩冠危有觸邪可惜陶潛無限酒陶潛詩歸去來山中山中酒應熟不逢籬菊正開花江總詩故鄉籬下菊今日幾花開盧照鄰詩東籬菊正芳沈約詩開花已匝樹流鶯復滿枝王建上杜元潁相公唐書杜元潁傳如晦五世孫貞元末及進士第以右補闕為翰林學士敏文辭憲宗特所賞嘆吳元濟平論書詔勤遷司勲貟外郎知制誥穆宗以元潁多識朝章尤被寵拜中書舍人户部侍郎為學士承㫖以本官同中書門下平章事學士金鑾殿後居唐書百官志唐之學士𢎞文集賢分𨽻中書門下省而翰林學士獨無所屬又李白傳天寶中賀知章言之召見金鑾殿論當世事西京記大明宫紫宸殿北曰蓬萊殿西北曰金鑾殿天中行坐侍龍輿沈佺期詩書報天中赦人從海上聞後漢書循吏傳光武數行公卿郎將列於禁坐隋文帝詩翠霞乘鳳輦碧霧翼龍輿承恩不許離牀拜王臺卿詩承恩奉教義杜甫詩承恩數上南薰殿後漢書仇覽傳林宗與融齎刺就房謁之遂請留宿林宗嗟嘆下牀為拜宻詔常教倚案書翰林志學士於禁中草詔唐書温造傳授山南西道節度使許以便宜從事造曰臣計諸道戎蠻之兵方還願得宻詔受約束用此足矣庾肩吾啓登玉案而上陳馬上喚遮紅觜鴨史記陸賈傳馬上得之寧可以馬上治之乎岑參詩火山五月行人少看君馬上疾如鳥李白秋獵孟諸詩要遮相馳逐遂出城東田杜陽雜編建中二年南方貢朱來鳥形有類於戴勝而紅觜紺尾杜甫詩紅觜漫多知船頭看釣赤鱗魚杜甫詩風急打船頭崔顥詩渚畔鱸魚舟上釣杜甫詩泉出巨魚長比人丹砂作尾黄金鱗閒曹散吏無相識孟浩然詩官曹幕府賢晉書周訪傳訪為縣功曹陶侃為散吏左傳吳公子札聘於鄭見子産如舊相識王維寄張丞相詩舉世無相識終身思舊恩猶記荆州拜謁初書荆及衡陽惟荆州漢書袁盎傳盎告歸道逢亟相申屠嘉下車拜謁髙適詩人當汲引初劉禹錫送李尚書鎭滑州唐書李德裕傳德裕為浙西觀察使再期而俗大變軍用充足太和三年召拜兵部尚書出為鄭滑節度使又地理志滑州靈昌郡本東郡天寶元年更名南徐報政入文昌元和志潤州本吳之朱方邑始皇改為丹陽三國吳號曰京城劉宋改為南徐州治京口鎭王昌齡詩樓頭廣陵近九月在南徐史記魯世家三年而報政晉書成公綏傳輔臣列位於文昌唐明皇詩八座起文昌東郡須才别建章元和郡縣志滑州本春秋時衛地戰國屬魏秦初置東郡袁宏三國名臣贊才為世出世亦須才括地志建章宮在雍州長安縣西二十里長安故城西庾肩吾詩臨雲出建章視草名髙同蜀客漢書淮南王安傳武帝好藝文以安屬為諸父辨博善為文詞甚尊重之每為報書及賜帝名司馬相如等視草乃遣注草謂文之藁草庾信詩名髙六國共史記司馬相如者蜀郡成都人也擁旄年少勝荀郎班固文杖節擁旄鉦人伐鼓晉書荀羨傳羨字令則弱冠與瑯琊王洽齊名後遷建威將軍吳國内史除北中郎將徐州刺史監徐兖二州揚州之晉陵諸軍事假節時年二十八中興方伯未有如羨之少者黄河一曲當城下元和志滑州黄河去外城二十步漢王尊為東郡太守河水盛浸瓠子隄尊臨決河不去後人為立河侯祠趙整詩昔聞孟津河千里作一曲緹騎千重照路傍徐陵文緹騎盈道張正見詩栁葉飄緹騎張説詩連營火百里縱觀人千重劉楨詩輦車飛素蓋從者盈路傍自古相門還出相詩自古在昔南史王訓傳訓年十六召見文德殿應對爽徹上目送之謂朱异曰可謂相門有相唐書列傳李德裕宰相吉甫子也如今人望在巖廊後漢書盧植傳盧尚書海内大儒人之望也唐太宗賦今拱已於巖廊髙適詩樽俎資髙論巖廊挹大猷送周使君罷渝州歸郢州别墅唐書地理志渝州南平郡本巴郡天寶元年更名隋書地理志義陽郡齊置司州魏改曰郢州廣韻墅田廬也晉書謝安傳安命駕出山墅與幼度圍棋賭别墅君思郢上吟歸去晉書陶潛傳義興三年解印去縣乃賦歸去來辭故自渝南擲郡章漢官儀二千石以上銀印龜紐文曰章刻曰某官之章野戍岸邊留畫舸庾信詩野戍孤烟起陳子昂詩野戍荒烟㫁梁元帝詩畫舸覆緹油岑參詩紅亭移酒席畫舸逗江村綠蘿隂下到山莊曹植詩綠蘿緣玉樹郭璞詩綠蘿結髙林謝朓詩解佩拂山莊梁昭明太子詩命駕出山莊池荷雨後衣香起謝朓詩願緝吳山杜寧摘楚池荷又風碎池中河北周明帝詩香飄蓮葉衣梁元帝牛渚磯碑花飛入袖荷香入衣又採蓮曲蓮花亂臉色荷葉雜衣香庭草春深綬帶長劉鑠詩庭中綠草滋杜審言詩杜若幽庭草芙蓉曲沼花杜甫詩鳴鳩乳燕青春深三齊記畧鄭康成居不其城南山中賜教授山下草如薤葉長尺餘人號康成書帶草唐明皇鏡詩更銜長綬帶留意感人深杜甫詩水荇牽風翠帶長只恐鳴騶催上道洛陽伽藍記髙陽王雍出則鳴騶御道文物成行北山移文鳴騶入谷鶴書赴隴晉書李宻傳郡縣逼迫催臣上道不容待得晚菘嘗南史齊周顒隠鍾山王儉謂曰卿在山中何所食荅曰赤米白鹽緑葵紫蓼又問何者為佳曰春初早韮秋末晚菘題王郎中宣義里新居愛君新買街西宅南史吕僧珍傳百萬買宅千萬買隣韓愈詩街東街西講佛經客到如逰鄠杜間錢起詩客到衡門下漢書宣帝尤樂鄠杜之間注杜屬京兆鄠屬扶風雨後退朝貪種樹國語公父文伯退朝南史徐勉傳穿池種樹少寄閒情潘岳賦序築室種樹逍遙自得申時出省趁看山説文申者吏以晡時申旦政也杜甫詩宫中每出歸東省錢起詩對巻也看山門前巷陌三條近古子夜歌暫出白門前西都賦披三條之廣路駱賔王詩三條九陌麗城隈墻内池亭萬境閑孟浩然詩言避一時暑池亭五月開陳造詩一鑑照萬境見擬移居作鄰里江洪詩移居玉池上周禮地官遂人五家為鄰五鄰為里王維詩斗酒為隣里不論時節請開闗孔融書時節如流古詩時節忽復易楚辭吾令帝閽開闗兮羽獵賦戲八鎭而開闗李逺字求古蜀人太和五年進士第累官忠建江三州刺史終御史中丞詩一巻贈𢎞文杜校書唐書百官志武徳四年置修文館於門下省九年改曰𢎞文館又校書郎掌讐校典籍刋正文章唐六典𢎞文館校書郎二人髙倚霞梯萬丈餘易林登髙安梯李白詩長嘯倚天梯元稹詩願登青雲路别望丹霞梯後漢書蘇充傳天有白虹長可萬丈僧皎然詩髙枝不知幾萬丈世人仰望徒攀援共看移步入宸居唐太