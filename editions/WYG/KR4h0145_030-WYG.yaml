晴刷日月髙碧開星辰王昌齡宿京口江詩霜天起長望殘月生海門名勝志焦山之東北有二島對峙謂之海門波澄瀨石寒如玉王屮頭陀寺碑川静波澄龍翔雲起孟浩然詩波澄水更清梁武帝詩石瀨鳴濺濺樂府白石郎曲積石如玉列松如翠草接汀蘋緑似烟栁惲詩汀洲採白蘋李益詩緑楊如水草如烟温庭筠詩岸平多草烟安得乘槎更東去博物志天河與海通近世有人居海渚者年年八月有浮槎去來不失期人有竒志立飛閣於槎上多齎糧乗槎而去周明帝詩乘槎下釣磯十洲風外弄潺湲十洲記巨海之中有祖洲瀛洲𤣥洲炎洲長洲元洲流洲生洲鳳麟洲聚窟洲有此十洲乃人跡稀絶處虞茂望海詩十洲風霧逺屈原九歌觀流水兮潺湲謝靈運詩且申獨往意乘月弄潺湲御選唐詩巻二十三補編
