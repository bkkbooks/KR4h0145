body:
  text: 欽定四庫全書御選唐詩巻二五言古王績字無功絳州龍門人文中子之弟隋未授秘書省正字不樂在朝求為六合丞嗜酒不任事尋還鄉里唐武徳初以前官待詔門下省時太樂署史焦革家善釀績求為丞革死棄官歸東臯號東臯子集五卷古意桂樹何蒼蒼楚辭桂樹列兮紛敷吐紫華兮布條江淹詩蒼蒼山中桂團團霜露色秋來花更芳自言嵗寒性南史傳論貞勁之節嵗寒自有性也異物志桂冬夏長緑不知露與霜范雲詠桂詩不識風霜苦安知零落期幽人重其徳易履道坦坦幽人貞吉徙植臨前堂庾信枯樹賦昔之三河徙植九畹移根漢書田蚡傳前堂羅鐘鼓立曲旃傳休奕艷歌行媒氏陳束帛羔雁鳴前堂連卷八九樹偃蹇二三行山海經桂木八樹在賁隅東淮南王招隠士桂樹叢生兮山之幽偃蹇連卷兮枝相繚枝枝自相糾葉葉還相當古詩東西植松栢左右種梧桐枝枝相覆葢葉葉相交通去來雙鴻鵠韓詩外傳鴻鵠一舉千里所恃者六翮耳古詩願為雙鴻鵠奮翅起髙飛栖息兩鴛鴦詩鴛鴦于飛箋言其止則相偶飛則為雙古歌辭入門時左顧但見雙鴛鴦鴛鴦七十二羅列自成行榮䕃誠不厚楚辭美桂樹之冬榮大戴禮樹成䕃而鳥息焉斤斧亦勿傷逸周書山林非時不外斤斧以成草木之長管子惡金以鑄斤斧鉏夷鋸􅠁試之木土赤心許君時後漢書光武帝紀蕭王推赤心置人腹中此意那可忘岑文本字景仁鄧州人沈敏有姿儀博綜經史美談論善屬文初為蕭銑典篇翰太宗授祕書郎上藉田三元二頌擢中書舍人晉拜中書令集六十巻奉和正日臨朝左傳凡朝以正四民月令正月一日七十二候之初三百六旬之始是謂正日案太宗有正日臨朝詩時雍表昌運書黎民於變時雍石崇詩武則不猛化則時雍日正叶靈符書協時月正日馮衍銘元正上日百福孔靈漢書班彪傳漢徳承堯有靈命之符曹植詩迴駕觀紫微與帝合靈符晉書郭璞傳王者之作必有靈符塞天人之心徳兼三代禮禮記三代之禮一也民共由之又三代之王也必先其令聞詩云明明天子令聞不已三代之徳也功包四海圖書聲教訖于四海踰沙紛在列顔延之曲水詩序棧山航海踰沙軼漠之貢府無虛月執玉儼如超禮記執玉不趍左傳禹㑹諸侯于塗山執玉帛者萬國清蹕喧輦道周禮師氏使其屬帥四夷之隸各以其兵服守王之門外且蹕注蹕止行人不得近王宫也晉書載記響清蹕于常道之門馳金車于山陽之館沈約樂歌清蹕朝萬㝢端冕臨正陽司馬相如上林賦華榱璧璫輦道纚屬三輔黄圖武帝于未央宫西跨城池作飛閣通建章宫構輦道以上下注輦道為閣道可以乗輦而行庾肩吾經呉郵亭詩輦道通闗塞王城似太原張樂駭天衢莊子北門成問于黄帝曰帝張咸池之樂于洞庭之野吾始聞之懼復聞之怠卒聞之而惑易何天之衢漢書叙傳攀龍附鳯並乗天衢晉書天文志房四星為明堂天子布政之宫也中間為天衢黄道之所經也七曜由乎天衢則天下平和拂蜺九旗映宋玉髙唐賦蜺為旌翠為葢張衡東京賦龍輅充庭雲旗拂蜺顔延之曲水詩序九斿齊軌建旗拂蜺周禮司常掌九旗之物名各有屬以待國事潘岳藉田賦五輅鳴鑾九旗揚斾儀鳳八音殊書簫韶九成鳳皇來儀班固幽通賦虞韶美而儀鳯兮孔忘味於千載書八音克諧無相奪倫佳氣浮仙掌後漢書光武紀望氣者遙見春陵唶曰氣佳哉欝欝葱葱然史記武帝紀作栢梁銅柱承露仙人掌之屬三輔舊事仙人掌在甘泉宫班固西都賦抗仙掌以承露擢雙立之金莖薫風繞帝梧帝王世紀舜彈五絃琴歌南風曰南風之薰兮可以解吾民之愠兮吕氏春秋東南曰熏風詩巻阿疏鳯皇非梧桐不栖韓詩外傳黄帝致齋于宫鳳乃蔽日而至止帝東園集帝梧桐梁簡文帝上白兔表豈殊丹岫之羽下止帝梧張正見詩丹山下威鳳來集帝梧中天文光七政易觀乎天文以察時變潘岳閒居賦闚天文之秘奥書在璿璣玉衡以齊七政注日月五星各異政也皇恩被九區劉騊駼郡太守箴大漢遵周化洽九區陸機宴宣猷堂詩九區克咸讌歌以永方陪瘞玉禮桓譚新論修封泰山瘞玉岱宗注凡封山則埋玉庾信祀方澤歌瘞玉埋俎蔵芬斂氣珥茟岱山隅魏志陳思王植傳安宅京室執鞭珥茟出従華葢入侍輦轂潘岳贈陸機詩優游省闥珥茟華軒鮑照謝永安令啟振纓珥茟聨承貴寵周禮職方氏河東曰兖州其山鎮曰岱山注岱山即泰山東岳也上官儀字游韶陜州陜人貞觀初擢進士第召授𢎞文館直學士遷祕書郎太宗毎屬文遣儀視藁私宴未嘗不預高宗即位為祕書少監進西臺侍郎同東西臺三品儀工詩其詞綺錯婉媚人多效之謂之上官體早春桂林殿應詔步輦出披香晉書山濤傳帝嘗講武於宣武塲詔乗步輦従左思西都賦乗茵步輦惟所息宴注皇后婕妤乗輦四人輿以行三輔黄圖武帝時後宫八區有昭陽披香等殿西都賦茝若椒風披香發越庾信春賦宜春苑中春已歸披香殿裏作春衣清歌臨太液陶潜詩清歌發新聲緑酒開芳顔晉白紵歌清歌徐舞降祇神四座歡樂胡可陳漢書郊祀志建章宫北治大池漸臺髙二十餘丈名曰太液西京雜記始元元年黄鵠下建章宫太液池帝乃作歌曉樹流鶯滿沈約詩開花已匝樹流鶯復滿枝春堤芳草積爾雅築土遏水曰堤楚辭芳草兮萋萋王孫兮不歸風色翻露文王儉詩風光承露色何遜詩寒潭見底清風色極天淨鮑照賦常佇景而翻露雪花上空碧庾信詩雪花深數丈氷床厚尺餘陳叔達詩雪花聨玉樹氷彩散瑤池江淹水上神女賦野田田而虛翠水湛湛而空碧花蝶來未已梁簡文帝首夏詩竹水俱蔥翠花蝶兩飛翔楊續安徳山池宴集詩花蝶亂風影萍藻含春流山光曖將夕陶潛詩山氣日夕佳張文琮貝州人髙宗相文瓘之弟好自寫書筆不釋手貞觀中為侍書御史三遷亳州刺史為政清簡永徽中拜户部侍郎出為建州刺史同潘屯田冬日早朝假寐懐古人詩不遑假寐北史常景傳景經涉山水悵然懐古乃擬劉琨扶風歌十二首東京賦慨長思而懐古傅亮為宋公修張良廟叙抒懐古之情存不刋之烈夙興瞻曉月詩夙興夜寐無忝爾所生謝靈運詩夕慮曉月流朝忌曛日馳鮑照芙蓉賦汎明綵于宵波飛澄華于曉月王融春遊迴文詩池蓮照曉月􅗦錦拂朝風通晨禁門啟鮑照詩伐鼔早通晨漢書息夫躬傳以醫技得幸出入禁門李尤東觀銘升降三除貫啟七門藉田賦前驅魚麗屬車鱗萃閶闔洞啟㕘塗方駟冠葢趨朝謁史記平準書冠葢相望班固西都賦冠葢如雲七相五公陸倕感知已賦濟濟冠葢祁祁儁逸楊素贈薛播州詩閶門既趨朝承明還宴語北史房謨傳謨為新豐令政為三輔最上嘉賜米物時雍州諸縣令每朔朝謁上必呼恭懿至榻前訪以化下之術霜靄清九衢謝偃賦霜氣斂靄夜景澂廓楚辭天問靡蓱九衢枲華安居頭陀寺碑文九衢之草千計四照之花萬品沈約賦雕芳卉之九衢霞光照雙闕庾闡採藥詩霞光煥􅓂靡虹景照㕘差張正見門有車馬客行飛觀霞光啟重門平旦開曹植銅爵臺賦建髙門之嵯峩兮浮雙闕乎太清又樂府閶闔啟丹扉雙闕曜朱光孫楚韓王臺賦雙闕碣以峻峙貫雲氣而上征鮑照樂府九塗平若水雙闕似雲浮江淹詩雙闕開馳道朱宫羅第宅紛綸文物紀髙士傳井丹字大春博學髙論京師為之語曰五經紛綸井大春左傳文物以紀之煥爛聲明發宋書傅陸傳隆轉太常太祖以新撰禮論付隆隆上表曰後之學者未逮曩時而問難星繁充斥兼兩摛文列錦煥爛可觀郭璞江賦鱗甲鏙錯煥爛錦斑劉允濟明堂賦崑山之玉樓偃蹇曽何髣髴滄海之銀宫煥爛安足翺翔左傳聲明以發之腰劍佩陸離晉書張華傳少時有相者言吾出六十位登三事當得寳劍佩之文中子衣裳襜如劍佩鏘如皆所以防其躁也楚辭髙余冠之岌岌兮長余佩之陸離注陸離㕘差衆貌又紛總總其離合兮班陸離其上下大人賦衍漫流爛痑以陸離鳴玉和清越國語王孫圉聘于晉定公饗之趙簡子鳴玉以相後漢書蔡邕傳舒紳緩佩鳴玉以步綽有餘裕文心雕龍天子垂珠以聴諸侯鳴玉以朝西征賦飛翠緌拖鳴玉以出入禁門者衆矣禮記叩之其聲清越以長其終詘然樂也宋史樂志竹聲清越失之則髙顔延之詩芬芳歇蘭若清越奪琳珪王勃字子安絳州龍門人文中子通之孫六嵗善文辭未冠及第授朝散郎數獻頌闕下沛王召署府修撰諸王鬭雞勃戲為文檄髙宗斥之客劍南勃父福畤坐勃故左遷交趾令勃往省父渡海溺水年二十八屬文初不精思先磨墨數升引被覆面而卧忽起書之不易一字與楊炯盧照鄰駱賔王齊名天下稱王楊盧駱號四傑山亭夜宴桂宇幽襟積楚辭桂樹叢生兮山之幽乂桂棟兮蘭橑又飲菌若之朝露兮搆桂木以為室山亭凉夜永潘岳秋興賦何微陽之短晷覺凉夜之方永謝靈運羅浮山賦發潛夢於永夜若溯波而乗桴梁簡文帝宫體詩無奈良夜永起登樓上頭森沈野徑寒鮑照銅山掘黄精詩銅谿晝森沈乳竇夜涓滴肅穆巖扉靜晉書賀循傳循徳量邃茂才鑒清逺厯試二城刑政肅穆荀悦漢紀大會羣臣於長樂宫成禮而罷莫不肅穆竹晦南河色張融海賦鏡河色於魦潯梁簡文帝初秋詩巻幌通河色開窻引月輝荷翻北潭影徐陵鴛鴦賦拂荇戲而波散排荷翻而水落沈約賦池翻荷而納影風動竹而吹衣清興殊未歸林端照初景張充與王儉書竒禽異羽或巖際而逢迎弱霧輕烟乍林端而菴藹詠風肅肅凉景生水經注風穴其深不測而穴中肅肅常有微風加我林壑清謝靈運詩林壑斂暝色雲霞收夕霏驅烟尋磵户孔稚圭北山移文磵户摧絶無與歸石徑荒凉徒延佇卷霧出山楹晉書劉惔傳論勝氣籠霄飛談卷霧孔稚圭北山移文還飇入幕瀉霧出楹去來固無跡動息如有情日落山水靜為君起松聲宋玉髙唐賦不見其底虛聞松聲南史陶𢎞景傳特愛松風庭院皆植松劉庭芝一名希夷汝州人少有文華落魄不拘常格為人所害希夷善為従軍閨情詩詞㫖悲苦孫昱撰正聲集以其詩為集中之最嵩嶽聞笙爾雅山大而髙曰崧注今中嶽崧髙山葢依此名亦作嵩後漢祭祀志注嶽者靈氣之所宅記纂淵海嵩山在登封縣北漢武帝祠中岳聞神呼萬嵗者三即此名山志嵩髙山者五嶽之中岳也月出嵩山東詩月出皎兮又崧髙維嶽駿極于天白虎通中央之岳居四方之中而髙故曰嵩山月明山益空魏武帝記月明星稀烏鵲南飛子夜歌秋夜凉風起天髙星月明山人愛清景左傳氷山人取之縣人傳之輿人納之𨽻人蔵之淮南子山谷之人輕天下細萬物而獨往九歌山中人兮芳杜若飲泉石兮䕃松栢張華詩明月曜清景散髮卧秋風郭璞詩散髮蕩𤣥溜終年不華皓漢武帝秋風辭秋風起兮白雲飛風止夜河清宋玉髙唐賦風止雨霽雲無處所詩倬彼雲漢昭回于天注雲漢天河也昭光也回轉也其光隨天而轉言雲漢者夜晴則天河明獨夜草蟲鳴王粲詩獨夜不能寐攝衣起撫琴謝瞻詩獨夜無物役寝者亦云寧詩喓喓草蟲張華詩翔鳥鳴翠偶草蟲相和吟仙人不可見南史隠逸傳龔祈風姿端雅容止可觀范述見之歎曰此荆楚之仙人也古詩仙人騎白鹿髮短耳何長乗月近吹笙晉書袁宏傳謝尚鎮牛渚秋夜乗月率爾與左右微服汎江庾亮傳亮鎮武昌諸佐吏殷浩之徒乗月登南樓穆天子傳吹笙鼔簧中心翔翔吕氏春秋墨子見荆王錦衣吹笙絳脣吸靈氣陸罩咏笙詩管清羅袖拂響合綘唇吹管子靈氣在心一來一逝郭璞詩燕昭無靈氣漢武非仙才玉指調真聲古辭玉女羅坐吹笛笙梁武帝子夜歌玉指調嬌絃唐書秋氣和則商聲調真聲是何曲三山鸞鶴情史記齊人徐市上書言海中有三神山名曰蓬萊方丈瀛洲漢書三神山者諸仙人及不死之藥皆在焉其物禽獸盡白而黄金白銀為宫闕未至望之如雲既至三神山乃居水下臨之患且至風輒引船而去終莫能至潘岳笙賦摹鸞音以厲聲顧野王笙賦㑹别鶴於清商昔去落塵俗任昉王儉集序司徒袁粲有髙世之度脱落塵俗願言聞此曲詩願言則懐今來卧嵩岑詩昔我往矣楊柳依依今我來思雨雪霏霏魏書裴衍傳伏見嵩岑極天苞育名草修生救疾多遊此岫何幸承幽音呉筠詩代乏識疑者幽音誰與論神仙樂吾事漢書郊祀志燕齊方士言有神仙祭祀致福之術者以萬數三輔黄圖長樂宫有神仙殿左傳范宣子曰有陳非吾事也漢書酷吏傳王温舒曰嗟乎今冬月益展一月足吾事矣笙歌銘夙心後漢書趙壹傳惟君明叡平其夙心呉志周魴傳銘心立報永矣無貳采桑古樂苑相和曲陌上桑一曰艷歌羅敷行宋鮑照作采桑古今注陌上桑者出秦氏女子秦氏邯鄲人有女名羅敷出採桑于陌上趙王見而欲奪焉羅敷乃彈箏作歌以自明樂府解題羅敷采桑為使君所邀盛誇其夫壻為侍中郎以拒之楊柳送行人青青西入秦詩昔我往矣楊柳依依三輔黄圖灞橋在長安東跨水作橋漢人送客至此橋折栁贈别古詩青青河畔草誰家采桑女樓上不勝春陌上桑日出東南隅照我秦氏樓秦氏有好女自名為羅敷羅敷善蠶桑採桑城南隅又使君遣吏徒問是誰家姝盈盈灞水曲陌上桑盈盈公府步王臺卿陌上桑盈盈陌上女一統志灞水在陜西西安府東二十里步步春芳緑蕭子範羅敷行微步弄妖姿應璩與従弟君苗君胄書結春芳以崇佩折若華以翳日梁元帝詩處處春芳動日日春禽變紅臉耀明珠梁簡文帝樂府玉貌歇紅臉長嚬串翠眉陳後主樂府紅臉桃花色客别重羞看晉書衞玠傳王濟嘗語人曰與玠同遊冏若明珠之在側朗然照人絳脣含白玉張率羅敷艷歌含貝開丹吻陸罩詩管清羅袖拂響合絳脣吹回首渭橋東封禪文昆蟲凱澤回首面内一統志中渭橋在陜西西安府西北二十五里東渭橋在府東北五十里西渭橋在舊長安城西遙憐春色同謝朓詩宛洛佳遨遊春色滿皇州梁簡文帝詩春色映宫來先發院邊梅沈約詩山光浮水至春色犯寒來徐陵詩年芳袖裏出春色黛中安庾信詩春色方盈野枝枝綻翠英青絲嬌落日陌上桑青絲以為籠桂枝為籠鈎緗綺弄春風陌上桑緗綺為下裙紫綺為上襦攜籠長歎息逶遲戀春色詩四牡騑騑周道逶遲江淹别賦車逶遲于山側看花若有情何遜詩對影獨含笑看花時轉側倚樹疑無力莊子倚樹而吟據槁梧而瞑徐陵長干寺碑遊巖倚樹宴坐經行蕭子顯采桑詩挂筐須葉滿息倦重枝隂薄暮思悠悠廣雅日將落曰薄暮漢書吕后傳戚夫人歌云終日舂薄暮陸機詩薄暮不遑瞑使君南陌頭後漢書寇恂傳使君建節銜命以臨四方陳後主采桑詩南陌競相隨相逢不相識歸去夢青樓傅休奕艷歌行青樓臨大巷幽門結金樞徐伯陽羅敷艷歌青樓含照本暉暉孤松篇蠶月桑葉青詩蠶月條桑顔延之詩蠶月觀時暇桑野多經過詩桑之未落其葉沃若四民月令三月昬參星夕杏花盛桑葉白梁簡文帝詩薄晚畏蠶飢競采春桑葉鶯時栁花白禮記仲春之月倉庚鳴庾肩吾春日詩桃紅栁絮白照日彼隨風澹艷烟雨姿敷芳陽春陌陳後主樂府爭弄遊春陌相邀開繡户如何秋風起漢武帝秋風辭秋風起兮白雲飛草木黄落兮雁南歸零落従此始禮記仲夏行秋令則草木零落果實早成鹽鐵論秋蓬被霜遭風則零落獨有南澗松詩于以采蘋南澗之濵周景式廬山記石門北巖有數百樹松攅生絶崖上南臨石門澗澗中仰視之離離如駢塵不嘆東流水書導沇水東流為濟吕氏春秋水泉東流日夜不休後漢書禮儀志上已官民皆絜于東流水上曰洗濯祓除去宿垢疢為大絜𤣥隂天地冥王粲七釋農功既登𤣥隂戒寒謝恵連雪賦𤣥隂凝不昧其潔太陽曜不固其節神仙傳帝問葛仙公曰百姓思雨寧可得乎曰雨易得乃書符著社中一時之間天地晦㝠大雨流注皓雪朝夜零庾肅之雪賛霰雨馺灑皓雪其霏謝恵連雪賦憑雲升降従風飄零豈不罹寒暑易寒暑相推而嵗成焉詩二月初吉載離寒暑為君留青青莊子受命于地惟松栢獨也正在冬夏青青青青好顔色落落任孤直孫綽遊天台山賦䕃落落之長松沈約寒松詩喬榦淩雲直隋煬帝古松詩孤生小庭裏羣樹遙相望謝靈運詩羣木既羅户衆山亦對窻古詩兩宫遙相望衆草不敢逼左傳松栢之下其草不殖陶潛詩青松在東園衆草沒其姿靈龜卜真隠易舍爾靈龜説苑靈龜五色似玉似金淮南子千年之松上有叢蓍下有伏龜仙鳥宜栖息神境記滎陽郡南有石室室後有孤松千丈常有雙鶴晨必接翮夕輒偶影白帖鶴千嵗栖于偃葢松恥受秦帝封漢官儀秦始皇上封泰山逢疾風暴雨賴得松樹因覆其下封為五大夫庾信詩水奠三川石山封五樹松願言唐侯食史記五帝紀注堯年十六以唐侯為天子列仙傳偓佺好食松實體毛數寸能飛行逐走馬以松子遺堯堯不服時受服者皆三百嵗寒山夜月明山冷氣清清張協七命寒山之桐出自大𡨕淒兮歸鳳集謝朓髙松賦集九仙之羽儀棲五鳯之光景庾信枯樹賦將雛集鳳比翼巢鸞吹之作琴聲琴厯琴曲有風入松謝朓髙松賦懐風音而送聲當月路而留影松子卧遙岑列仙傳赤松子神農時雨師服水玉㪚能入火自燒隨風雨上下寂聴疑野心鮑照蕪城賦凝思寂聴心傷已摧江淹詩寂聴積空意凝望信長懐清泠有真曲山海經豊山神耕父處之常遊清冷之淵劉楨黎陽山賦雲興風起蕭瑟清泠葛洪詩洞音泠泠風佩清樵采無知音戰國策昔者秦攻齊令有敢去栁下季壟五十步而樵採者死不赦謝朓詩樵采咸共同荆莎聊可藉列子伯牙善鼓琴志在髙山鍾子期稱曰峩峩然若泰山志在流水曰洋洋然若江河子期死伯牙絶絃以無知音者美人何時來詩云誰之思西方美人離騷惟草木之零落兮恐美人之遲暮江淹擬怨别詩日暮碧雲合佳人殊未來幽徑委緑苔郭璞江賦緑苔鬖莎乎研上謝莊月賦緑苔生閣芳塵凝榭沈約詠月詩應門照緑苔吁嗟深澗底左思詩鬱鬱澗底松離離山上苗棄捐廣厦材班媫妤團扇詩棄捐篋笥中恩情中道絶王襃四子講徳論大厦之材非一丘之木潘尼詩崑山積瓊玉廣厦搆衆材盧崇道睿宗朝為太常卿坐聓崔湜流嶺南後私還都下事敗勅杖新都南亭别郭大元振元和志新都縣南至成都府四十八里本漢舊縣也屬廣漢郡開皇十八年改為興樂縣武徳二年分成都縣地重置一統志新都縣在成都府北六十五里竹徑女蘿蹊梁昭明太子五月啟追凉竹徑托隂松間徐陵詩竹徑䝉籠巧茅齋結搆新詩蔦與女蘿傳女蘿兔絲松蘿也安世房巾歌豐草葽女蘿施蓮洲文石隄漢書溝洫志據堅地作石隄勢必完安又梅福傳願一登文石之陛靜深人俗㫁庾信思舊銘閨深夜靜風髙月寒尋翫往還迷左貴嬪感離詩披省所賜告尋玩悼離詞文心雕龍木沓水匝樹襍雲合目既往還心亦吐納碧潭透初月南史隠逸傳論碧澗清潭翻成麗矚劉勰新論懸瀨碧潭瀾波洶湧鮑照詩初月波中上盧思道詩初月正如鈎懸光入綺樓素林驚夕栖梁元帝晚棲烏詩日暮連翻翼俱向上林棲褰幌納鳥侣梁簡文帝初秋詩巻幌通河色開窻引日暉謝朓離夜詩離堂華燭盡别幌清琴哀張融賦合聲鳴侣並翰翻羣左思蜀都賦鴻儔鵠侣注水鳥多羣飛故言儔侣也宋江夏王義恭詩悲鴻失良匹俯仰戀舊侣罷琴聴猿啼蕭顯夜猿啼詩掛月影才通猿啼迥入風佳辰改宿昔漢樂府逺道不可思宿昔夢見之阮籍詩攜手等歡愛宿昔同衾裳勝寄在暌攜王融與劉虬書層山絶澗還帶畿畎膏田沃野亘望廡㕓信可以招往隠淪栖集勝寄謝靈運詩即事怨暌攜感物方懐戚長懐賞心愛荀昶擬古詩上言各努力下言長相懐鮑照詩懐古復懐今長懐無終極謝靈運擬魏太子詩序天下良辰美景賞心樂事四者難并又詩永絶賞心望長懐莫與同沈約詩寄言賞心客嵗暮爾來同如月復如珪江淹别賦秋月如珪李嶠字巨山趙州賛皇人弱冠擢進士第始調安定尉舉制策甲科武后時官鳳閣舍人每有大手筆皆特命嶠為之累遷鸞臺侍郎知政事封趙國公景龍中以特進守兵部尚書同中書門下三品睿宗立出刺懐州明皇貶為滁州别駕改廬州嶠富於才思初與王楊接踵中與崔蘇齊名晚諸人没獨為文章宿老一時學者皆取法焉秋山望月酬李騎曹唐六典左右金吾衞騎曹參軍事六人愁客坐山隈管子平原之隰奚有於髙大山之隈奚有於深潘岳文朝濟洛川夕次山隈懐抱自悠哉王羲之蘭亭脩禊叙或取諸懐抱晤言一室之内謝靈運詩懐抱觀古今隋書隠逸傳序放情宇宙之外自足懐抱之内況復髙秋夕潘岳秋興賦天晃朗而彌髙謝混秋夜長賦夜既分而氣髙何瑾悲秋夜賦天寥廓兮髙寒明月正徘徊曹植詩明月照髙樓流光正徘徊亭亭出迥岫陶潛歸去來辭雲無心以出岫皎皎映層臺老子合抱之木生於毫末九層之臺起於累土色帶銀河滿白帖天河謂之銀漢亦曰銀河江總歌織女今夕渡銀河當見新秋停玉梭光含玉露開潘岳賦月朣朧以含光兮露淒清以凝冷梁昭明答湘東王書玉露夕流金風時扇簡文帝南郭頌金車出野玉露霑墀淡雲籠影度劉孝綽詩月色度雲來夏侯湛賦月翳翳以隠雲時籠籠以投光虛暈抱輪迴淮南子畫隨灰而月暈闕注有軍士相圍守則月暈以蘆灰環闕其一面則月暈亦闕於上庾信詩星芒一丈燄月暈七重輪谷邃凉隂靜王僧達文凉隂掩軒娥月寝耀山空夜響哀何承天巫山髙樂府山禽中夜響晨猿相和鳴寒催數雁過禮記季秋之月鴻雁來賔盧思道賦南翔衡陽避祁寒也風送一螢來禮記季夏之月腐草為螢獨軫離居恨禮記吾離羣而索居亦已久矣張衡賦悲離居之勞心兮情眷眷而思歸遙憶故人杯謝朓詩山川不可盡況乃故人杯早發苦竹館一統志苦竹嶺在祁陽縣東一百七十里山多苦竹李白詩纔登苦竹嶺復憩金沙泉合沓巖嶂深王襃洞簫賦注合沓重沓也謝靈運登廬山絶頂詩巒隴有合沓往來無蹤轍謝朓遊敬亭山詩兹山亘百里合沓與雲齊沈約詩合沓共天隠參差互相望水經注巖嶂峻險世説謝康樂尋山陟嶺必造幽峻巖嶂千重莫不遍歴朦朧烟霧曉潘岳秋興賦月朦朧以含光兮露凄清以凝冷北史蕭大圜傳近瞻烟霧逺睇風雲鮑照詩短翮不能飛徘徊烟霧裏荒阡下樵客沈約宿東園詩野徑既縈紆荒阡亦交互王僧孺詩序或蹲林卧石藉卉班荊不過野畯田老漁父樵客野猿驚山鳥北山移文山人去兮曉猿驚鹽鐵論曽子倚山而吟山鳥下翔師曠鼔琴百獸率舞劉勰新論漢順帝聴山鳥之音云勝絲竹之響伽藍記叙野獸穴於荒階山鳥巢于庭樹嵇康詩魚龍瀺灂山鳥羣飛開門聽潺湲後漢書馮異傳光武為司隸校尉道經父城辭異等開門奉牛酒迎又丁鴻傳開門教授楚九歌觀流水以潺湲枚乗七發瀄汨潺湲波揚流灑張衡賦亂弱水之潺湲兮逗華隂之湍渚謝靈運入華子岡詩且申獨往意乗月弄潺湲入徑尋窈窕郭璞江賦潛逵旁通幽岫窈窕謝靈運山居賦濬澗潭而窈窕除菰洲之紆餘栖鼯抱寒木莊子夫逃空虛者藜藿柱乎鼪鼯之徑廣韻鼯似鼠一曰飛生亦作􅀈􅀈張衡西京賦超殊榛摕飛鼯廣韻摕庭結切謂捎取之也水經注猿狖驚心寒木被潭梁簡文帝登城詩靡靡見虛烟森森視寒木流螢飛暗篠沈約賦流螢暗明燭雁聲㫁裁續王筠秋夜詩流螢漸收火絡緯欲催機庾信詩池水朝含墨流螢夜聚書梁簡文帝詩隔簾隂翠篠廣韻篠先鳥切細竹也早霞稍霏霏何遜曉發詩早霞麗初日清風消薄霧楚辭雲霏霏而承宇謝靈運詩林壑斂暝色雲霞收夕霏殘月猶皎皎詩月出皎兮傅武仲舞賦夫何皎皎之閑夜兮明月爛以施光庾肩吾詩月皎疑非夜林疎似更秋嵇康詩皎皎亮月麗于髙隅行看逺星稀魏武帝詩月明星稀謝朓京路夜發詩曉星正寥落晨光復瀁漭梁簡文帝詩天霜河白夜星稀漸覺遊氛少潘岳秋興賦游氛朝興槁葉夕隕陶潛詩露凝無逰氛天髙肅景澈我行撫軺傳廣韻軺市昭切使車南史陳伯之傳佩紫懐黄讃帷幄之謀乗軺建節奉疆場之任鮑照詩乗軺實金羈當壚信珠服漢書京房傳房為魏郡太守自請願無屬刺史約嵗竟乗傳奏事漢書平帝紀徵天下通知逸經古記天文歴算鐘律小學史篇方術本草及以五經論語孝經爾雅教授者在所為駕一封軺傳遣詣京師釋名傳郵傳也人所止息去後人復來轉轉相傳無常人也兼得傍林沼庾信卭竹杖賦摘芳林沼行樂軒除貪翫水石竒宋書隠逸傳論巖壑閒逺水石清華水經注靈石傑處臨江壁立霞駁有若繢焉水石驚瀨傳響不絶不知川路渺周禮地官遂人萬夫有川川上有路以達于畿湛方生帆入南湖詩白沙淨川路青松蔚巖首謝恵連汎南湖詩軌息陸途初枻鼓川路始謝莊月賦臨風歎兮將焉歇川路長兮不可越徒憐野心曠淮南子有野心者不可借便勢有愚質者不可與利器晉書向秀傳嵇意逺而疎吕心曠而放詎惻浮年小莊子小知不及大知小年不及大年方解寵辱情老子寵辱若驚謝朓酬徳賦離寵辱于毁譽王融法樂辭寵辱誰為心永託累塵表南史阮孝緒傳願迹松子于瀛海追許由于窮谷以免塵累晉書王戎傳戎有人倫鑒識常目王衍神姿髙徹如瑤林瓊樹自是風塵表物宋之問字延清汾州人偉儀觀雄于辨甫冠武后召與楊炯分直習藝館有集十巻夜飲東亭春水鳴大壑莊子諄芒將東之大壑適遇苑風于東海之濵皓月吐層岑謝莊月賦愬皓月而長歌説文山小而髙曰岑岑壑景色佳慰我逺遊心楚辭願輕舉而逺遊張衡賦喬松髙跱孰能離結精逺遊使心攜曹植逺遊篇逺遊臨四海俯仰觀洪波暗芳足幽氣家語芝蘭生於深林不以無人而不芳梁簡文帝夜遊北園詩暗花舒不覺明波動見流拾遺記洞庭山有靈洞采藥之人入行十里迥然天清霞耀花芳柳暗驚栖多衆音髙興南山曲殷仲文詩獨有清秋日能使髙興盡詩南山有臺北山有萊髙士傳法真恬靜寡欲太守欲以功曹相屈真曰若欲吏之真將在北山之北南山之山矣長謠横素琴説文謠徒歌也晉書陶潛傳不解音而蓄素琴一張弦徽不具雨従箕山來史記伯夷傳余登箕山其上葢有許由冢云元和志許由山在告成縣東南十二里記纂淵海箕山在登封縣東許由居此一統志在登封縣東南三十里一名崿嶺雨従箕山來管子五政順時春雨乃來陶潛讀山海經詩微雨従東來好風與之俱朱超詩落照依山盡浮凉帶雨來道書東龍門之南有許由山髙大四絶其北有潁水堯聘許由處倏與飄風度詩飄風自南傳飄風迴風也老子飄風不終朝楚辭九歌令飄風兮先驅使凍雨兮灑塵精明西峯日曹植詩東北望呉野西眺觀日精一統志倚箔山在登封縣西望如立箔緑縟南溪樹後漢書延篤傳草木之生始于萌芽終于彌蔓枝葉扶疎榮華繁縟袁淑桐賦越衆木之薰陶勝雜樹之藻縟劉琨詩緑葉繁縟柔條修罕一統志潁水在登封縣西四十里有三源出少室南溪為右源此時客精廬左傳圖之此為時也後漢儒林傳注精廬講習之舍髙僧傳晉沙門恵逺見廬峯清淨足以息心始住龍泉精舍又恵逺於廬山集一時名士髙僧於般若臺精舍幸䝉真僧顧孫綽天台賦應真飛錫以躡虛無量夀經慧眼見真能度彼岸傳燈録真如有變易如回無明作大智之類廣韻僧沙門也深入清淨理詩鴥彼飛隼疏以興彼武勇之衆能深入於敵謝靈運王子晉讃王子愛清淨區中實囂喧冀見浮丘公與爾共繽翻寳林語録佛告迦葉曰吾清淨法眼以付汝妙㫁往來趣書惟克果㫁乃罔後艱呉志三嗣主傳注疇咨俊茂好謀善㫁易小往大來吉亨則是天地交而萬物通也上下交而其志同也禮記禮尚往來往而不來非禮也來而不往亦非禮也意得兩契如謝靈運辨宗論一悟得意之論又累盡則無誠如符契言盡共忘諭易書不盡言言不盡意辨國語惟善人能受盡言宗論同遊諸道人並業心神道求解言外人物志善諭者以一言明數事漢書京房傳上謂房曰已諭觀花寂不動圓覺經譬彼病目見空中花五燈㑹元世尊在靈山㑹上拈花示衆是時衆皆寂然維摩詰經天女以天花散諸菩薩即皆墮落至大弟子便著不墮天女曰結習未盡故花著身結習盡者花不著身聞鳥懸可悟五燈㑹元昔有僧因看法華經至諸法從本來常自寂滅相忽頓不决行住坐卧每自體究都無所得忽於春日聞鶯聲頓然開悟向夕聞天香陶潛詩向夕長風起寒雲沒西山庾信浮圖詩天香下桂殿仙梵入伊笙淹留不能去淮南王招隠士攀援桂枝兮聊淹留史記孔子世家賛子低回留之不能去云初至崖口水經注伊水歴崖口山峽也歴峽北流即古三塗山也有七谷水注之崖口衆山㫁法言升東岳而知衆山之峛崺也况介丘乎謝靈運詩羣木既羅户衆山亦對窻嶔崟聳天壁沈炯賦其山則嶔岑㠑嵬岩􅀈婆陀氣衝落日紅謝靈運撰征賦望新晴于落日起明光于躋月隋煬帝詩菱潭落日雙鳬舫影入春潭碧春江花月夜夜露含花氣春潭漾月輝錦繢織苔蘚小爾雅雜綵曰繢孔叢子錦繢紛華所服不過温體新論雕文刻鏤傷於農事錦繢綦組害於女紅蔡邕彈碁賦采若錦繢平若停水呉都賦簡其華實則亄費錦繢廣志空室無人行則生苔蘚丹青畫松石孝經疏洛龜曜書丹青垂萌漢書蘇武傳竹帛所載丹青所畫揚子聖人之言炳若丹青張綱集書功金石圖形丹青子虛賦其土則丹青赭堊雌黄白坿王屮頭陀寺碑漢晉兩明並勒丹青之飾阮籍詩丹青著明誓永世不可忘宋書蕭思話傳従太祖登鍾山北嶺中道有盤石清泉上使于石上彈琴因賜以銀酒鍾謂曰相賞有松石間意顔延之曲水詩序松石峻絶蔥翠隂烟水禽泛容與洛神賦鯨鯢踊而夾轂水禽翔而為衞謝靈運鸂􅈃賦覽水禽之萬類信莫麗乎鸂􅈃史記司馬相如傳弭節徘徊翺翔容與離騷聊逍遥兮容與何遜詩逸翮超容與巖花飛的礫王勃詩桂宻巖花白梨疎林葉紅微路従此深郭璞賦越南山之髙嶺修焦丘之微路我來限于役詩君子于役不知其期曷至哉謝朓詩于役尚有期鄂渚同遊衍惆悵情未已後漢書馮衍傳風濤飄其並興兮情惆悵以增傷晉書習鑿齒傳徘徊移日惆悵極多九辨廓落兮羇旅而無友生惆悵兮而私自憐魏武帝樂府夜夜安得寐惆悵以自憐陶潛歸去來辭既自以心為形役奚惆悵而獨悲羣峯黯將夕謝靈運山居賦羣峯㕘差出其間連岫複陸成其坂陶潛詩凉風起將夕夜景湛虛明又遊斜川序魴鯉躍鱗于將夕水鷗乘和以翻飛顔延之詩息徒顧將夕極望梁陳分劉孝綽詩壺人告漏晚烟霞起將夕入崖口五渡寄李適水經注潁水又東五渡水注之其水東流南陽城西石溜縈委溯者五涉故亦謂之五渡水抱琴登絶壑栰木泝清川廣韻大曰栰小曰桴乗之渡水曹植文振冠南岳濯纓清川陸雲九愍詔河憑以清川命湘娥以安流路極意謂盡潘岳詩路極悲有餘勢迴趣轉綿謝靈運詩川渚屢經復乗流翫迴轉班彪北征賦涉長路之綿綿兮逺紆迴以樛流又靈運詩巖峭嶺稠疊洲縈渚連綿人逺草木秀詩其室則邇其人甚逺山深雲影鮮史記貨殖傳淵深而魚生之山深而獸往之謝靈運詩雲日相輝映空水共澄鮮余負海嶠情爾雅山鋭而髙曰嶠謝靈運有登臨海嶠初發疆中作自昔微尚然謝靈運詩伊余乗微尚拙訥謝浮名彌曠逾十載劉楨詩自夏涉𤣥冬彌曠十餘旬今來宛仍前未窺仙源極獨進野人船陶潛桃花源記桃花臨夾岸數百步漁人欲窮其林林盡水源便得一山山有小口髣髴若有光便捨船従口入時攀乳竇憩水經注易水又東逕孔山北山下有鍾乳穴穴出佳乳廣韻竇穴也鮑照詩銅谿晝森沈乳竇夜涓滴江淹詩乳竇既滴􅄋丹井復寥泬屢薄天窻眠書外薄四海疏薄者逼近之意漢官儀泰山盤道屈曲而上凡五十餘盤經小天門大天門仰視天門如従穴中窺天窻矣王延夀魯靈光殿賦懸棟結阿天窻綺疏注天窻髙窻也庾信步虛詞天窻影迹深夜絃響松月朝楫弄苔泉因冥象外理孫綽遊天台山賦散以象外之説暢以無生之篇梁武帝捨道歸釋文啟瑞迹于中天爍靈義于象外永謝區中縁謝靈運江中孤嶼詩想像崑山姿緬邈區中縁碧潭可遺老劉勰新論懸瀨碧潭瀾波洶涌傅毅舞賦娯神遺老永年之術丹砂堪學仙抱朴子臨沅廖氏世世夀考後徙去他人居之復多夀考疑其井水赤掘之得古人所埋丹砂數十斛本草丹砂久服通神明不老史記封禪書黄帝且戰且學仙隋書王貞傳仰而不至方見學仙之逺窺而不覩始知遊聖之難莫使馳光暮曹植詩羨明月之馳光顧征禽之駛翼江總棲霞寺碑項日流影東方韜其大明面月馳光西照匿其成魄摯虞思遊賦感昆吾之易越兮懐暉光之速暮空為歸鶴憐搜神記丁令威化鶴歸遼集城門華表柱言曰有鳥有鳥丁令威去家千年今始歸薛稷字嗣通汾隂人擢進士第景龍中昭文館學士睿宗立拜中書侍郎參知機務歴太子少保以翊賛功封晉國公工書畫早春魚亭山兖州志魚亭山在兖州府魚臺縣即魯公觀魚處春氣動百草爾雅春為青陽注氣清而温春秋繁露春氣愛漢書律厯志少陽者東方也東動也陽氣動物于時為春春蠢也物蠢生迺動運禮記孟春之月天氣下降地氣上騰天地和同草木萌動莊子春風發而百草生史記律書孟春氷泮發蟄百草奮興紛榮時㫁續爾雅木謂之華草謂之榮張衡歸田賦百草滋榮陶潛詩草榮識節和王融詩烟霞乍巻舒蘅芳時㫁續白雲自髙妙詩英英白雲陶𢎞景詩山中何所有嶺上多白雲文心雕龍孔融體氣髙妙徘徊空山曲應瑒詩問子遊何鄉戢翼正徘徊楊師道詩芳草無行逕空山正落花陽林花已紅周禮注陽木生于南山也孫綽天台賦恵風佇芳于陽林左思詩白雲佇隂岡丹葩曜陽林寒澗苔未緑鮑照詩刈黍寒澗隂馬懐素詩映水輕苔猶隠緑伊余息人事晉書王長文傳閉門自守不交人事庾信詩野情風月曠山心人事疎蕭寂無營欲世説韓康伯門庭蕭寂居然有名士風流嵇康詩與世無營神氣晏如論衡老子恬淡無欲養精愛氣束晳詩堂堂處子無營無欲客行雖云逺鮑照詩客行惜日月魏武帝樂府行行日已逺曹植詩悠悠逺行客翫之聊自足晉書紀瞻傳園池竹木有足賞翫焉邢象玉爵里無攷古意家中酒新熟庾信詩跂窻催酒熟胡思眈詩甕中酒新熟園裏木初榮陶潛停雲詩序罇湛新醪園列初榮又歸去來辭木欣欣以向榮停杯欲取醉魏文帝樂府嘉肴不嘗㫖酒停杯嵇康家誡取醉為佳悒然思友生詩矧伊人矣不求友生楚辭廓落兮羈旅而無友生陶潛詩叩枻新秋月臨流别友生忽聞有竒客晉書謝安傳桓温請安為司馬既到温甚喜歡笑竟日既出温問左右頗嘗見我有此客否何姓復何名楚辭問其姓名不告而退陶潛五栁先生傳先生不知何許人也亦不詳其姓氏嗜酒陶彭澤晉書陶潛傳潛字元亮少懐髙尚穎脱不羈性嗜酒而家貧不能恒得親舊知其如此或置酒招之造飲必醉為彭澤令在縣公田悉令種秣曰令吾嘗醉於酒足矣能琴阮步兵晉書阮籍傳籍字嗣宗嗜酒善彈琴嘗聞步兵營㕑人善醸貯酒三百斛遂求為步兵校尉何須問寒暑詩載離寒暑水經注元帝廣求方士漢中送道士王仲都詔問所能對曰能忍寒暑徑共坐山亭庾信思舊銘序嵇叔夜之山亭尚多楊柳王子猷之舊徑惟餘竹林舉袂袪啼鳥包明月詩將曙與未曙百鳥啼窻前揚巾掃落英離騷朝飲木蘭之墜露兮夕餐秋菊之落英左思蜀都賦敷蕋葳㽔落英飄颻心神無俗累左思詩聊可瑩心神歌詠有新聲阮籍樂論歌詠詩曲將以宣和平著不逮也沈約梁雅樂歌或風或雅流歌詠史記李延年傳善歌為變新聲張衡南都賦彈箏吹笙更為新聲古詩彈箏奮逸響新聲妙入神新聲是何曲滄浪之水清書嶓冢導漾東流為漢又東為滄浪之水楚辭滄浪之水清兮可以濯我纓蘇頲字廷碩瓌之子幼敏悟一覽千言輒覆誦擢進士第調烏程尉舉賢良方正歴修文館學士中書舍人明皇愛其文由紫微侍郎知政事與李乂對掌書命帝曰前世李嶠蘇味道文擅當時號蘇李今朕得頲及又何愧前人襲父封爵號小許公諡文憲頲與燕國公張説稱望畧等世稱燕許昆明池宴坐王兵部珣見示以三韻因而有答漢書武帝紀元狩三年減隴西北地上郡戍卒半發謫吏穿昆明池注西南夷傳越嶲昆明國有滇池方三百里漢使求通身毒國為昆明所閉欲伐之故作昆明池象之以習水戰在長安西南周回四十里長安志昆明池在長安縣西二十里沈約詩荒渠集野鴈安用昆明池畫舸疾如飛梁元帝詩蓮舟夾鶴氅畫舸覆緹油詩王旅嘽嘽如飛如翰遙遙泛夕暉石鯨吹浪隠廣韻鯨渠京切大魚也三輔舊事清淵北有鯨魚刻石為之長三丈西京雜記昆明池刻玉石為鯨魚每至雷雨常鳴吼鬐尾皆動任希古昆明池應制詩回眺牽牛渚激賞鏤鯨川玉女步塵歸班固西都賦臨乎昆明池左牽牛而右織女注漢宫闕疏曰昆明池有二石人牽牛織女象張衡東京賦牽牛立其左織女處其右魯靈光殿賦神仙岳岳于棟間玉女窺窻而下視洛神賦淩波微步羅襪生塵獨有銜恩處明珠在釣磯三秦記昆明池昔有人釣魚綸絶而去遂通夢于漢武帝求去鈎帝明日戲於池見大魚衘索取而放之間三日池邊得明珠一雙帝曰豈非魚之報耶廣韻石激水曰磯陸雲詩銜恩戀行邁興言在臨觴小園納涼即事徐陵詩納涼髙樹下直坐落花中煩暑避蒸鬱居閒習髙明潘岳有閒居賦禮記仲夏之月可以居髙明可以逺眺望長風自逺來晉書宗慤傳叔父問所志慤曰願乗長風破萬里浪層閣有餘清鮑照詩層閣肅天居馳道直如髮散灑納涼氣蕭條遺世情楚辭山蕭條而無獸兮野寂漠其無人陶潛詩泛此忘憂物逺我遺世情奈何誇大隠晉書郗愔傳論方回奕世登台露冕為飾援髙人以同志抑惟大隠者歟王康琚詩小隠隠陵藪大隠隠朝市終日繫塵纓孔稚圭北山移文昔聞投簪逸海岸今見解蘭縳塵纓奉和聖製登蒲州逍遙樓唐明皇帝集御製登蒲州逍遙樓詩一首唐書地理志河中府河東郡本蒲州通鑑唐開元九年春正月丙辰改蒲州為河中府置中都官僚一準京兆河南六月己卯罷中都復為蒲州記纂淵海蒲州春秋晉蒲坂地後魏為河東郡後周改蒲州唐屬河東道一統志山西平陽府蒲州在府城西南四百五十里夢溪筆談蒲中逍遙樓楣上有唐人書在昔堯舜禹遺塵成典謨詩自古在昔先民有作書堯典曰若稽古帝堯舜典曰若稽古帝舜大禹謨曰若稽古大禹陸機演連珠臣聞世之所遺未為非寳魏都賦魏地者前王之桑梓列聖之遺塵孔安國書序典謨訓誥誓命之文庾信詩止戈興禮樂修文盛典謨聖皇東巡狩書睿作聖獨㫁上古天子庖犧氏神農氏稱皇晉書張纉傳配聖皇以邁迹豈商周之比隆又樂志嘉瑞出靈應彰降繁祉祚聖王書嵗二月東巡狩孟子巡狩者巡所守也況乃經此都記纂淵海河東古為虞舜都開元中改河中府陞中都樓觀紛迤邐後漢書梁冀傳發屬縣卒徒繕修樓觀數年乃成王羲之帖成都城池門屋樓觀皆是秦時司馬錯所修梁簡文帝従軍行迤邐觀鵞翼參差覩雁行山河㡬縈紆通鑑魏武侯浮西河而下中流顧謂呉起曰美哉山河之固也記纂淵海歴山在州南即舜耕處又龍門山在河東縣西即禹鑿通黄河處黄河在州西門外入河南境又媯汭水在縣北堯釐降二女於此子虛賦其山則盤紆岪鬱隆崇􅟭崒西都賦步甬道以縈紆沈約釣竿詩桂舟既容與緑浦復回紆緬懐祖宗業書允懐于兹詩明發不寐有懷二人陶潛畫賛緬懐千載托契孤遊長慶集本注武徳中始作秦皇破陣樂以歌太宗之功業漢書宣帝紀論功光祖宗業垂後嗣相繼文武圖禮記夫孝者善繼人之志善述人之事者也書丕顯哉文王謨丕承哉武王烈又惟懐永圖陸機文賦濟文武于將墜宣風聲于不冺任昉書聖圖睿範歌思是歸孔稚圭上新定法律表躡厯登皇乗圖踐帝尚徳既無險禮記先王尚有徳尊有道任有能蔡邕陳仲弓碑由其模範從其趣尚易林安仁尚徳易王公設險以守其國又屯利貞注大亨則无險故利貞後漢書光武帝紀賛金湯失險車書共道觀風諒有孚禮記命太師陳詩以觀民風左傳天子省風以作樂易觀有孚顒若又有孚發若信以發志也謝靈運送孔令詩餞宴光有孚豈如汾水上通鑑漢元鼎四年冬十月上自夏陽東幸十一月甲子立后土祠於汾隂睢上上親望拜漢武帝故事帝行幸河東祠后土顧視帝京忻然中流與羣臣飲讌帝歡甚乃自作秋風詞曰泛樓船兮濟汾河横中流兮揚素波阮籍詩東南有射山汾水出其陽謝朓詩遺情汾水垂冕鴻宫簫鼔事遊娯書下管鼗鼔詩籥舞笙鼓樂既和奏秋風詞簫鼓鳴兮發棹歌梁元帝南岳碑簫鼓騰空烟霞相接星辰奪采燈燭非明潘岳詩嬉娯絲竹撫髀舞韶阮瞻上已㑹詩臨清川而嘉讌聊假日以遊娯張説字道濟洛陽人武后策賢良方正説所對第一授左補闕擢鳯閣舍人忤㫖配流欽州中宗召還累遷工部兵部侍郎修文館學士睿宗拜為中書侍郎知政事開元初進中書令封燕國公尋出刺相州左轉岳州召拜兵部尚書知政事勅令巡邊後為集賢院學士尚書左丞相卒諡文貞説為人敦氣義重然諾朝廷大述作多出其手與蘇頲號燕許大手筆謫岳州後詩益悽惋人謂得江山之助早霽南樓全唐詩作岳陽早霽南樓范致明岳陽風土記岳陽樓城西門樓也下瞰洞庭景物寛闊唐開元四年中書令張説除守此州每與才士登樓賦詩自爾名著其後太守于樓北百步復創樓名曰燕公樓山水佳新霽左思詩山水有清音爾雅雨止為霽南樓翫初旭廣雅曰初出曰旭夜來枝半紅雨後洲全緑四運相終始阮籍大人先生傳飄颻於四運翺翔乎八隅陸機詩四運循環轉寒暑自相承萬形紛代續易品物流形世説殷謝諸人共集謝因問殷眼徳屬萬形萬形來入眼不陸雲詩類聚百族羣分萬形適臨青草湖一統志青草湖在湖廣岳州府一名巴丘湖北連洞庭南接瀟湘毎秋夏水泛與洞庭為一水涸則此湖先乾青草生焉張志和漁歌青草湖中月正圓巴陵漁父棹歌連再鼓黄鶯曲毛詩草木蟲魚疏黄鳥黄鸝鶹也或謂之黄栗留幽州謂之黄鶯一謂之黄鳥地穴穿東武武疑作呉漢書包山下有穴潛行水底無所不通號為地脈山海經洞庭穴在長沙巴陵按今呉縣太湖内洞庭山有穴通洞庭湖為道家林屋洞天東武乃漢縣名在今山東青州府諸城縣境通典漢有東武郡今髙宻諸城縣是也無地穴通楚呉應譌武江流下巴蜀巴一作西水經岷山在蜀郡邸縣大江所出潛確類書岷江瀘雒渝四水為蜀四大川故名四川總名曰西蜀岳陽風土記荆江出巴蜀自髙注下濁流洶湧夏秋暴漲則逆泛洞庭瀟湘清流頓皆混濁岳人謂之飜流水歌聞枉渚邅九歌朝發枉渚兮夕宿辰陽潛確類書枉渚在常徳府城南亦名蒼溪陸雲詩通波激枉渚又弭楫薄枉渚謝靈運賦發青田之枉渚逗白岸之空亭舞見長沙促一統志岳州秦長沙地劉宋立巴陵郡隋改曰岳州今又有長沙府漢書長沙定王傳王母微無寵故王卑濕小國注景帝後二年諸王來朝有詔更前稱夀歌舞定王但張袖小舉手左左笑其拙上怪問之對曰臣國小地狹不足回旋心逺居無陋陶潛詩心逺地自偏神和生自足文子至于神和遊于心手之間放意寫神論辨而形于絃此不傳之道也吕氏春秋天全則神和矣申鑒君子本神為貴神和徳平而道通是為保真白髮悲上春白帖正月曰上春建寅之月湘東王詩空爽上春期知常謝先欲汲冢周書五徳既明民乃知常道徳經夫物芸芸各歸其根歸根曰靜靜曰復命復命曰常知常曰明不知常妄作凶知常容容乃公公乃王王乃天天乃道道乃久没身不殆又知和曰常知常曰明又欲先民必以身後之崔湜字澄瀾定州人擢進士第累轉左補闕預修三教珠英附武三思上官昭容由考功員外郎驟遷中書舍人兵部侍郎俄拜中書侍郎檢校吏部侍郎同中書門下平章事為御史劾奏貶江州司馬安樂公主従中申䕶改襄州刺史韋氏稱制復同中書門下三品睿宗立出為華州刺史除太子詹事景雲中太平公主引為中書令明皇立流嶺外以常預逆謀追及荆州賜死湜執政時年三十八常暮出端門緩轡賦詩張説見之歎曰文與位固可致其年不可及也冀北春望左傳冀之北土馬之所生回首覽燕趙史記春申君傳説秦昭王曰大王之地一經兩海要約天下是燕趙無齊楚齊楚無燕趙也左思魏都賦開胷殷衞跨躡燕趙春生兩河間爾雅兩河間曰冀州注自東河至西河曠然萬里餘際海不見山江淹四時賦平蕪際海千里飛鳥雨歇青林潤揚雄羽獵賦繽紛往來轠轤不絶若光若滅者布於青林之下庾信詩白石仙人芋青林處士松烟空緑野閒謝靈運詩春深緑野秀巖髙白雲屯問鄉何處所史記晉世家介之推従者懸書國門曰龍欲上天五蛇為輔龍已升雲四蛇各入其宇一蛇獨怨終不見處所何遜詩出國乃參差㑹歸同處所目㫁白雲還張九齡字子夀韶州曲江人七嵗知屬文擢進士第始調校書郎以道侔伊吕科為左拾遺進中書舍人出為冀州刺史以母不肯去鄉里表換洪州都督徙桂州兼嶺南按察選補使以張説薦為集賢院學士俄拜中書侍郎同平章事遷中書令為李林甫所忮改尚書右丞貶荆州刺史諡文獻晨出郡舍林下晨興步北林陶潛詩晨興理荒穢詩鬱彼北林陶潛詩北林榮且豐蕭散一開襟殷仲文詩直置忘所宰蕭散得遺慮謝朓詩乗此終蕭散垂竿深澗底潘岳西征賦開襟乎清暑之館陶潛詩回飇開我襟復見林上月娟娟猶未沈鮑照詩术映東北墀娟娟似蛾眉片雲自孤逺梁簡文帝浮雲詩可憐片雲生暫合復還輕陶潛詩孤雲獨無依沈約詩時雲靄空逺叢篠亦清深廣韻篠細竹也漢書嚴助傳行數百千里夾以深林叢竹無事由來貴道徳指歸論盛徳之人無為無事方知物外心張衡歸田賦茍縱心於物外安知榮辱之所如入廬山觀瀑布泉周景式廬山記匡俗周威王時生而神靈廬於此山世稱廬君故山取號焉一統志廬山在南康府西北二十里古名南障疊嶂九層崇巖萬仞周五百餘里實南方巨鎮也廬山記開先禪院舊傳昭明太子之居山南山北有瀑布無慮十餘處西入康王谷為水簾東為開先之瀑布絶頂有懸泉廬山記水源山頂人未有窮者應貞賦髙溜承崖懸泉屬嶺陸機漏刻賦激懸泉以逺射跨飛途而遙集喧喧出烟杪岑之敬詩喧喧洛水濵支曇諦廬山賦香爐吐雲以像烟甘泉湧霤而先潤不知㡬時嵗但見無昏曉曹毘文大人達觀任化昏曉江總詩麥氣涼昏曉閃閃青巖落世説裴令公有儁容姿雙眸閃閃若巖下電沈約詩何時當來還延佇青巖側鮮鮮白日皎易林不風不雨白日皎皎廬山記廬山甚髙峻每雨其下成潦而上猶皎日洒流濕行雲孔靈符㑹稽記飛流洒散冬夏不竭梁簡文帝招真館碑髙巖鬱起帶青雲而作峯瀑水懸流雜天河而俱洒列子秦青善歌能使聲振林木響遏行雲陶潛閒情賦行雲逝而無語濺沫驚飛鳥名山記入峽千餘丈有兩瀑布相對飛下嵌根有盤石承之激為飛雨濺沫薛道衡入郴江詩跳波鳴石磧濺沬擁沙洲陶潛詩山氣日夕佳飛鳥相與還丘遲詩巢空數鳥飛雷吼何噴薄郭璞江賦湓流雷呴而電激南史任昉傳雲飛雷薄顯棣華之微㫖左思呉都賦濆薄沸騰注水相激蕩曰濆薄江賦協靈通氣濆薄相陶箭馳入窈窕慎子河下龍門流駛竹箭駟馬追之不及王珣虎丘山記交林上合蹊路下通升降窈窕亦不猝至江賦潛逵傍通幽岫窈窕昔聞山下䝉易山下出泉䝉君子以果行育徳今乃林巒表孔稚圭北山移文望林巒而有失水經注白水在黄龍南即瀑布也水出山腹挂流三四百丈飛湍林表望若懸素物情有詭激後漢書周澤傳澤為太常清潔修行盡敬宗廟當世疑其詭激坤元曷紛矯易至哉坤元萬物資始黙然置此去變化誰能了易乾道變化髙唐賦須臾之間變化無窮郭璞詩淮海變微禽我生獨不化西山祈雨是日輒應賦詩言志本集洪州西山一統志西山在南昌府城西大江之外三十里一名南昌山兹山藴靈異宋書孝武帝紀霍山是曰南嶽實惟國鎮韞靈呈瑞沈約上舊宫表韞靈千古合祥百代晉書干寳傳寳撰集古今神祗靈異人物變化名為搜神記虞羲巫山髙曲南國多竒山荆巫獨靈異范雲詩岱山饒靈異沂水冨英竒走望良有歸書望于山川注九州名山大川五岳四瀆之屬皆一時望祭之春秋四卜郊不從猶三望公羊傳三望者何望祭也然則曷祭祭泰山河海疏鄭𤣥謂淮海岱也禮記柴而望祀山川左傳並走羣望注望祀山川皆走往祈禱丘禱亦已久論語丘之禱久矣甿心難重違廣韻氓莫耕切民也甿同齊書王融傳北地殘氓東都遺老翹心仁政延首王風謝承後漢書楊賜讓還侯爵朝廷重違其志遲明申藻薦漢書髙帝紀於是沛公乃夜引軍従他道還偃旗幟遲明圍宛城三匝注言圍城事畢然後天明明遲于事故曰遲明變為去聲音丈二反左傳澗溪沼沚之毛蘋蔡蕰藻之菜筐筥錡釜之器潢汙行潦之水可薦于鬼神可羞于王公陳書蕭允傳鄱陽王出鎮㑹稽允為長史帶㑹稽郡丞行經延陵季子廟設蘋藻之薦託異代之交為詩以敘意先夕旅巖扉禹貢蔡䝉旅平注祭山曰旅獨宿雲峯下詩敦彼獨宿亦在車下劉向九歎旦徘徊于長坂兮夕傍徨而獨宿鮑照詩愁來攅人懷羈心苦獨宿江淹詩平明登雲峯杳與廬霍絶江總詩聊承丹桂馥逺視白雲峯蕭條人吏稀楚辭山蕭條而無獸兮野寂寞而無人我來不外適詩我來自東零雨其濛幽抱自中微魏畧欲知幽微莫若易人倫之紀莫若禮多識山川草木之名莫若詩江淹詩精衞銜木石誰能測幽微髙允答宋欽書執玩反覆銘于心抱靜入風泉奏水經注風泉傳響于青林之下巖猿流聲于白雲之上王融渌水曲日霽沙淑明風泉動華燭王屮頭陀寺碑文巖谷共清風泉相渙庾信終南山義谷銘松桂危懸風泉虛韻涼生松栝圍書杶榦栝栢廣韻栝古活切同檜木名栢葉松身㑹稽記㑹稽境特多名山水峯㟧隆峻吐納雲霧松栝楓栢摧榦竦條窮年滯逺想莊子和之以天倪因之以曼衍所以窮年也郭璞江賦傲自足于一嘔尋風波以窮年世説謝安嘗與王羲之登冶城悠然逺想有髙世之志寸晷閱清暉漢書李尋傳夫日者衆陽之長煇光所燭萬里同晷人君之表也廣韻晷居洧切日影也潘尼詩寸晷難寳豈無璵璠謝靈運詩昬旦變氣候山水含清暉顔延之釋奠㑹詩清暉在天容光必照虛美悵無屬魏志荀彧傳推誠心不為虛美素情緘所依沈約陽春曲楊柳垂地燕差池緘情忍思落容儀北齊享廟樂歌孝心緬邈爰屬爰依詭隨嫌弱操詩無縱詭隨以謹無良疏詭戾人之善隨従人之惡羈束謝貞肥後漢書張升傳升少好學多闗覽而任情不羈注不羈謂超絶等倫不可羈東也張協詩述職投邊城羈束戎旅間易遯亨小利貞又上九肥遯无不利蜀志譙周傳注桓温薦譙秀表曰巴西譙秀植操貞固抱徳肥遯揚清渭波義濟亦吾道晉書齊獻王攸傳昔在周成旦奭作傳外以明徳自輔内以親親自固徳以義濟親則自然荀子天下為一諸侯為臣通達之屬莫不従服無他故焉以濟義矣又以國齊義一日而白湯武是也注齊當為濟史記孔子世家詩云匪兕匪虎率彼曠野吾道非耶誠存為物祈易閑邪存其誠陶潛賦坦萬慮以存誠憩遙情于八極禮記以為民祈福又祭有祈焉有報焉靈心歘以應參同契神明或告人兮心靈乍自悟梁武帝詩蘭湯浴身垢懴悔淨心靈王延夀魯靈光殿賦歇歘幽藹雲覆霮䨴洞杳冥兮廣韻歘許勿切暴起也後漢書馬融傳雨露時㴻祥應時至顔延之曲水詩序晷緯昭應山瀆效靈甘液幸而飛繁欽硯賛漸漬甘液吸受流芳謝朓樂歌凍雨飛祥雲靡閉閣且無責漢書韓延夀傳髙陵民有昆弟訟田延夀大傷之移病不聴事入卧傳舍閉閤思過于是訟者深自悔願以田相移不敢復爭延夀大喜開閤延見又嚴延年傳延年母従東海來到洛陽適見報囚母大驚便止都亭不肯入府延年出至都亭謁母母閉閤不見延年免冠頓首閤下後漢書呉祐傳祐為太守政惟仁簡以身率物民有爭訟者輒閉閤自責然後㫁其訟以道譬之孟子人之易其言也無責耳矣隨軒安敢希謝承後漢書鄭𢎞遷淮陽太守消息繇賦政不煩苛行春大旱隨車致雨庾信文祥雲入境行雨隨車多慙徳不感隋書秦孝王俊傳伐陳之役以為山南道行軍元帥謂使者曰謬當推轂愧無尺寸之功以此多慙耳後漢書劉瑜傳政致和平徳感祥風知復是耶非漢武帝歌是耶非耶立而望之翩何珊珊其來遲巡按自灕水南行磨書百官志監察御史十五人掌分察百僚巡按州縣獄議軍戎祭祀營作太府出納皆莅焉水經灕水出陽海山注灕水與湘水出一山而分源也南與溈水合出邵陵縣界理棹雖云逺謝靈運之郡詩述職期蘭暑理棹變金素詩道之云逺曷云能來飲氷寧有惜莊子葉公曰吾爨無欲清之人今吾朝受命而夕飲氷吾其内熱歟況乃佳山川書望于山川怡然傲潭石史記孔子世家有所穆然深思焉有所怡然髙望而逺志焉陶潛桃花源記黄髮垂髫並怡然自樂竒峯岌前轉水經注方嶺雲回竒峯霞舉茂樹隈中積戰國策黄雀因是以俯噣白粒仰棲茂樹後漢書班固傳甘露宵零于豐草三芝軒翥于茂樹猿鳥聲自呼王融巫山髙曲烟雲乍巻舒猿鳥聲㫁續風泉氣相激水經注風泉傳響于青林之下巖猿流聲于白雲之上張衡西京賦伏櫺檻而俯聴聞雷霆之相激目因詭容逆心與清暉滌謝靈運詩昏旦變氣候山水含清暉紛吾謬執簡離騷紛吾既有此内美兮又重之以修能注紛盛貌左傳南史氏執簡以往初學記顔延之為御史中丞何尚之與延之書曰絳騶清路白簡深劾取之仲容或有虧耶行郡將移檄後漢書岑彭傳遣偏將軍屈充移檄江南班行詔命文心雕龍相如之難蜀父老文曉而喻博有移檄之實即事聊獨歡列子鄭之役夫晝則呻吟而即事夜則昏憊而熟寐何遜詩日長禁户倦即事思短晨素懐豈兼適悠悠詠靡盬詩王事靡盬傳盬不堅固也謝靈運撰征賦靡盬顇於征人庶以窮日夕劉楨贈五官中郎將詩清談同日夕情盻叙殷勤洪子輿睿宗時官侍御史姜晦時為中丞諷劾韋安石子輿不従嚴陵祠後漢書逸民傳嚴光少有髙名與光武同遊學及光武即位光乃變姓名隠身不見帝令以物色訪之齊國上言有一男子披羊裘釣大澤中帝疑其光乃備安車遣使聘之三返而後至除為諫議大夫不屈乃耕於富春山通志子陵祠在浙江嚴州府桐廬縣富春山下漢主召子陵歸宿洛陽殿詩公歸不復於汝信宿元和志建武元年入洛陽遂定都焉洛陽宫北據邙山南直伊闕之口洛水貫都有河漢之象逸民傳光至車駕即日幸其館復引入論道舊故因共偃卧光以足加帝腹上明日太史奏客星犯帝座甚急帝笑曰朕故人嚴子陵共卧耳客星今安在漢志周伯老子王蓬絮國王温星皆客星也史記項羽紀沛公安在阮籍詠懐詩簫管有遺音梁王安在哉隠跡猶可見記纂淵海富春山是子陵隠處駱賔王宴序擬迹小山陶心大隠漢書郊祀志公孫卿曰仙人可見楚辭逺遊時髣髴以遙見兮精皎皎以往來水石空潺湲水經注自桐廬縣至於潛凡十有六瀨第二是嚴陵瀨瀨帶山山下有石室漢光武帝時嚴子陵之所居也故山及瀨皆即人姓名之山下有盤石周迴十數丈交枕潭際葢陵所游也枚乘七發瀄汨潺湲披揚流灑謝靈運七里瀨詩石淺水潺湲日落山照曜松篁尚蔥蒨詩如竹苞矣如松茂矣水經注襄陽侯習郁依范蠡養魚法作大陂池列植松篁於池側徐陵與李那書山澤晻靄松竹參差左思詩峭舊青蔥間竹柏得其真江淹斆顔延之侍宴詩青林結冥濛丹巘被蔥蒨岸深翠隂合水經注函谷闗邃岸夭髙空谷幽深記纂淵海交岸是錦峯繡嶺謝靈運賦沈分湘岸延情蒼隂江淹詩再逢緑草合重見翠雲生川迥白雲徧周禮職方揚州其川三江水經注韋昭曰松江浙江浦陽江也王粲登樓賦路逶迤而修迥兮川既漾而濟深記纂淵海唐方干隠釣臺東白雲源謝靈運詩春晚緑野秀巖髙白雲屯陶𢎞景答梁武帝問山中何所有嶺上多白雲沈約早發定山詩摽峯綵虹外置嶺白雲間幽徑滋蕪沒水經注山徑委深王績黄頰山詩野心長寂寞山徑本幽迴梁宣帝七山寺賦踐逵草之蕪沒撥蓁芿之彌䝉荒祠羃霜霰庾信張良賛穀城餘石還歸舊祠元苞經塵冪于巖又否霧幂幂詩白露為霜又如彼雨雪先集維霰鮑照疏煦蒸霜霰莩甲雲露垂釣想遺芳記纂淵海桐廬縣本漢富春地有釣臺為子陵坐釣之所下瞰嚴陵瀨上接七里灘潘岳閒居賦池沼足以漁釣舂税足以代耕謝靈運詩目覩嚴子瀨想屬任公釣陶淵明集序莊周垂釣于濠伯成躬耕於野晉書儒林傳餘芳遺烈煥乎可紀張華詩誰與翫遺芳佇立獨咨嗟掇蘋羞野薦詩于以采蘋南澗之濵又薄言掇之注掇拾也禮記俎豆牲醴薦羞皆有等差左傳澗谿沼沚之毛蘋蘩蕰藻之菜可薦於鬼神可羞於王公髙風激終古逸民傳同抗髙尚之風則宜矯俗蜀志郤正傳雲合霧集風激電飛周禮則于馬終古登陁也注齊人之言終古猶言常也晉書陸機陸雲傳賛文藻宏麗獨步當時言論慷慨冠乎終古語理忘榮賤晉書范汪傳博學多通善談名理蓮社髙賢傳周續之曰情致兩忘者市朝亦巖穴耳梁書伏挺傳物我兼忘寵辱誰滯方驗道可尊文心雕龍摽蓍龜于前驗西京雜記夫人無幽顯道在則為尊山林情不變周禮職方大司徒辨其山林之名物逸民傳賛江海㝠滅山林長往張華詩隠士托山林遯世以保真孔稚圭北山移文形馳魄散志變神動稽康養生論守常而不變陳子昂子昂字伯玉梓州射洪人初舉進士入京不為人知有賣胡琴者價百萬子昂顧左右輦千緡市之衆驚問子昂曰予善此曰可得聞乎曰明日可入宣陽里如期偕往則酒餚畢具奏琴語曰蜀人陳子昂有文百軸不為時人知此賤工之使豈宜留心舉而碎之以其文百軸徧贈㑹者一日之内名滿都下擢進士第武后朝為靈臺正字數上書言事右拾遺武攸宜北討表為管記軍中文翰皆委之為段簡所中卒于獄唐興文章承徐庾餘風子昂横制頽波始歸雅正李杜以下咸推宗之酬暉上人夏日林泉要覽瓶沙王呼佛弟子為上人内有徳智外有勝行在人之上故名上人聞道白雲居窈窕青蓮宇爾雅窕閒也注窈窕閒隙郭璞江賦潛逵旁通幽岫窈窕謝靈運山居賦濬潭澗而窈窕除菰洲之紆餘楞嚴經縱觀如來青蓮花眼神僧傳佛圖澄西域人策杖見石勒勒曰佛道有何靈驗澄曰至道雖逺亦可以近事為證即取器盛水燒香呪之須臾生青蓮花勒由此信服巖泉萬丈流周明帝詩嶺松千仞直巖泉百丈飛丘遲發宻巖口詩萬尋仰危石百丈窺重泉樹石千年古林卧對軒窻山隂滿庭户張華詩俠客愛幽險築室窮山隂陸機詩彷彿谷水陽婉孌崑山隂方釋塵事勞陶潛詩閒居三十載遂與塵事㝠従君襲蘭杜楚辭紉秋蘭以為佩又采芳洲兮杜若又繚之兮杜衡注杜衡香草也江孝嗣詩石泉行可照蘭杜向含風呉均詩願君嗣蘭杜時采東臯薇修竹篇與東方左史虬禮記動則左史書之晉書職官志著作郎周左史之任也龍種生南嶺後漢書費長房傳長房辭歸翁與一竹杖曰騎之任所之則自至矣既至可以杖投葛陂中也長房乗杖須臾來歸即以杖投陂顧視則龍也馬融長笛賦龍鳴水中不見已截竹吹之聲相似又惟籦籠之竒生兮于終南之隂崖陶潛詩延目識南嶺空嘆將焉如孤翠鬱亭亭徐摛冬蕉巻心賦投殘心于孤翠植晚玩于冬餘張衡西京賦干雲霧而上達状亭亭以苕苕峯嶺上崇崒薛道衡詩峯嶺既崔嵬林叢亦青翠沈約郊居賦其為状也則巍峩崇崒喬枝拂日烟雨下微冥屈原九歌杳冥冥兮羌晝晦東風飄兮神靈雨江淹騷體林中電兮雨冥冥江上風兮木颯颯夜聞鼯鼠叫爾雅注鼯鼠狀如小狐似蝙蝠肉翅飛且乳亦謂之飛生聲如人呼荀子鼯鼠五枝能飛不能上屋能縁不能窮木能浮不能渡谷能穴不能掩身能走不能先人馬融長笛賦猨蜼晝吟鼯鼠夜叫晝䀨泉壑聲江淹禾連頌迸采泉壑騰光淵丘春風正澹蕩枚乗七發湍流遡波人澹蕩之白露已清泠王襃洞簫賦朝露清泠而隕其側兮玉液浸潤而承其根哀響激金奏抱朴子嶧陽孤桐不能無絃而激哀響陸雲詩華容溢藻幄哀響入雲漢左傳金奏肆夏之三拾遺記蓬萊山有浮筠之簳風吹竹折聲如鐘磬之音宻色滋玉英孝經援神契神靈滋液則有玉英九章登崑崙兮食玉英梁簡文帝鏡銘金精玉英氷輝沼清嵗寒霜雪苦顧野王拂崖篠賦陪嘉宴于秋夕等貞節之嵗寒左思呉都賦竹則苞筍抽節往往榮結緑葉翠莖冐霜停雪含彩獨青青王儉竹賦翠葉與飛雪爭采貞柯與層氷競鮮江淹竹賦鬱春華于石岸赩夏彩于沙汀詩瞻彼淇澳緑竹青青豈不厭凝冽羞比春木榮陶潛歸去來辭木欣欣以向榮春木有榮歇鮑照樂府年貌不可留身意㑹盈歇此節無凋零劉勰新論暄然而春榮華者不謝凄然而秋凋零者不憾始願與金石終古保堅貞周禮輪人輪已庫則於馬終古登阤也注齊人之言終古猶言常也離騷懐朕情而不發兮余焉能忍與此終古竺法真羅山記嶺南道無䈥竹惟此山有之其大尺圍細者色如黄金堅貞疎節􅙌羲竹詩挺此堅貞性來樹朝夕池不意伶倫子吹之學鳳鳴漢書律歴志黄帝使伶倫自大夏之西昆侖之隂取竹之解谷生其竅厚均者㫁兩節間而吹之以為黄鍾之宫制十二筩以聴鳳之鳴其雄鳴為六雌鳴亦六拾遺記岑華山有􅤈竹為簫管吹之若羣鳳之鳴遂偶雲和瑟周禮大司樂雲和之琴瑟注雲和山名漢武内傳王母命侍女董雙成鼔雲和之笙何承天答書雲和六變實降天神張樂奏天庭莊子黄帝張咸池之樂于洞庭之野晉書陸雲傳廣樂九奏必登昊天之庭孫楚笳賦順谷風以撫節飄逸響乎天庭妙曲方千變魏文帝詩清歌發妙曲樂正奏笙竽司馬彪詩焉得成琴瑟何由揚妙曲簫韶已九成書簫韶九成鳳皇來儀信䝉雕斵美北史周武帝紀詔曰彫斵之物並賜貧人常願事仙靈晉書劉驎之傳嘗採藥至衡山見澗水南有二石囷一囷閉一囷開水深廣不得過還家或説囷中皆仙靈方藥諸雜物驎之欲更尋索終不復知處也鮑照詩従師入逺岳結友事仙靈江淹登香爐峯詩此山具鸞鶴往來盡仙靈驅馳翠虬駕揚雄解嘲獨不見夫翠虬之將登乎天必聳身于蒼梧之淵陸雲九愍垂結雲之翠虬駕琬琰之玉輿伊鬱紫鸞笙説文笙十三簧象鳳之聲潘岳笙賦寫皇翼以插羽摹鸞音以厲聲結交嬴臺女蘇武詩骨肉縁枝葉結交亦相因列仙傳簫史者秦穆公時人善吹簫能致孔雀白鶴穆公女弄玉好之公妻焉乃教弄玉作鳳壺一旦夫妻隨鳯飛去王融詩命駕瑤池隈過息嬴女臺吟弄昇天行樂府題辭升天行曹植云日月何時留鮑照云家世宅闗輔攜手登白日詩恵而好我攜手同行逺遊戲赤城楚辭悲時俗之迫阨兮願輕舉而逺遊曹植樂府逺遊臨四海俯仰觀洪波㑹稽記赤城山名色皆赤状如雲霞天台圖曰赤城天台之南門也孫綽遊天台山賦赤城霞起以建標庾信詩千燈照赤城低昂𤣥鶴舞漢書楊惲傳奮袖低昂頓足起舞晉白綜歌凝停善睞容儀光宛若龍轉乍低昂㫁續綵雲生河圖崑崙山有五色雲氣永願隨衆仙曹植詩乗風忽登舉彷彿見衆仙庾信徵調曲衆仙就朝于瑤水羣帝受享于明庭三山遊玉京史記封禪書蓬萊方丈瀛洲三神山在渤海中未至望之如雲及到三神山反居水下臨之風輒引去終莫能至云靈樞内經下離塵境上界玉京元君太霄隠書無上大道君治無極大羅天中玉京之上七寳元臺金牀玉几御選唐詩巻二
