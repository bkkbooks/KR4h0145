body:
  text: 欽定四庫全書御選唐詩巻二十二七言律李商隱寄令狐學士唐書令狐綯傳字子直大中初召為考功郎中知制誥入翰林為學士秘殿崔嵬拂彩霓王延夀賦立靈光之秘殿劉潛平等刹下銘序制兼秘殿何晏賦髙甍崔嵬飛字承霓徐陵太極殿銘偃師迴顧崔嵬德陽宋之問詩帳殿鬱崔嵬王融詩建旗拂霓爾雅霓雌虹也初學記義熙二年七月彩虹出西方曹司今在殿東西唐書鄭䖍傳明皇置廣文舘以䖍為博士䖍聞命不知廣文曹司何在雍錄韋執誼故事曰置學士院後又置東學士院於金鑾殿之西李肇志亦曰德宗移院於金鑾坡西也劉孝威詩複道東西長賡歌太液翻黄鵠書乃賡載歌沈佺期詩賡歌樂嵗豐史記封禪書建章宫北治大池漸臺髙十餘丈名曰太液劉孝威詩紫川通太液漢書昭帝紀始元元年春二月黄鵠下建章宮太液池中又昭帝歌黄鵠飛兮下建章從獵陳倉獲碧雞漢書司馬相如傳嘗從上至長楊獵張籍詩少年從獵出長楊史記封禪書文公獲若石云於陳倉北阪城祠之其初或嵗不至或嵗數來來也常以夜光輝若流星從東南來集於祠城則若雄雞其聲殷云野雞夜雊以一牢祠命曰陳寶水經注陳倉縣有陳倉山山上有寶雞鳴祠秦文公宻畤於陳倉北阪祠青帝焉漢書郊祀志或言益州有金馬碧雞之神可醮祭而致注金形似馬碧形似雞崔國輔詩晴光舞碧雞曉飲豈知金掌迥史記武帝紀上作銅柱承露仙人掌之屬三輔舊事承露盤髙二十六丈大七圍以銅為之上有仙人掌承露和玉屑飲之班固西都賦抗仙掌以承露擢雙立之金莖夜吟應訝玉繩低孟浩然詩風霜徒夜吟春秋元命苞玉衡北兩星為玉繩張衡西京賦上飛闥而仰眺正睹瑤光與玉繩謝朓詩玉繩低建章杜甫詩天近玉繩低鈞天雖許人間聽史記趙世家簡子寤語大夫曰我之帝所甚樂與百神遊於鈞天廣樂九奏萬舞不類三代之樂庾信詩出豫奏鈞天後漢書魯恭傳恭閉户誦讀絶人間事潘岳賦放曠乎人間之世閶闔門多夢自迷楚辭倚閶闔而望予漢書禮樂志遊閶闔觀玉臺注閶闔天門揚雄甘泉賦登椽欒而羾天門兮馳閶闔而入凌競岑參詩鄉遙夢亦迷對雪原注時欲之東寒氣先侵玉女扉詩二之日栗烈傳栗烈寒氣也古詩孟冬寒氣至陶潛詩寒氣冒山澤杜甫詩御裌侵寒氣李尤函谷闗銘玉女流眄而下視庾信賦倚弓於玉女窗扉宋之問詩窗搖玉女扉清光旋透省郎闈庾肩吾詩清光此夜出南史王韶之傳晉自孝武以來以省官一人管詔誥住西省因謂之西省郎白帖諸曹郎署曰粉署劉孝綽對雪詩浮光亂粉壁積照朗彤闈梅花大庾嶺頭發梁簡文帝雪詩看花言可折定自非春梅江總詩梅花色白雪中明白帖大庾嶺上梅南枝己落北枝方開一統志大庾嶺在南安府西南二十五里其上多梅又名梅嶺庾肩吾詩窗梅朝始發栁絮章臺街裏飛世説謝大傅寒雪日内集與兒女講論文義俄而雪驟公欣然曰白雪紛紛何所似兄子朗曰撒鹽空中差可擬兄女道韞曰未若栁絮因風起劉孝綽對雪詩栁絮亦霏霏漢書張敞傳敞無威儀時罷宴㑹走馬過章臺街使御吏驅自以便面􅶈馬李白詩章臺折楊栁張正見春雪詩飛隨團扇風欲舞定隨曹植馬梁簡文帝雪朝詩翻霙舞三襲曹植有白馬篇有情應濕謝莊衣陶拱詩升髙似有情宋書符瑞志元日花雪降殿庭時謝莊下殿雪集衣還白上以為瑞於是公卿作花雪詩張正見詩櫂舉濕春衣龍山萬里無多逺鮑照詩胡風吹朔雪千里度龍山古詩相去萬餘里留待行人二月歸史記以稽市物注稽留待也王融詩早望行人歸梁元帝詩欲覔行人寄消息江總詩二月栁爭梅蕭慤詩二月鶯聲纔欲㫁二旋撲珠簾過粉墻白居易詩白撲栁飛絮鮑照詩珠簾無隔露謝莊明堂歌構瑤戺聳珠簾陳書皇后傳臨春結綺望仙三閣外施珠簾白居易詩玲瓏映粉墻輕於栁絮重於霜梁元帝詩栁絮飄春雪易林早霜晚雪謝惠連雪贊氣遍繁霜年豐雪積已隨江令誇瓊樹陳書江總傳至德四年授尚書令日與後主遊宴後庭謂之狎客南史張貴妃傳後主每引賔客遊宴共賦新詩其曲有玉樹後庭花臨春樂等其略云璧月夜夜滿瓊樹朝朝新王衡翫雪詩瓊樹似新裁又入盧家妬玉堂梁武帝歌盧家蘭室桂為梁沈佺期古意盧家少遊婦欝金堂古樂府黄金為君門白玉為君堂孫綽天台山賦玉堂隂映於髙隅隂鏗詩羅浮銀是殿瀛洲玉作堂侵夜可能爭桂魄清異錄武帝宣内供奉賜食既退侵夜上獨映琉璃燈籠觀書梁簡文帝詩夜輪懸素魄唐太宗望月詩魄滿桂枝圎王維詩桂魄初生秋露微忍寒應欲試梅粧桓譚新論元帝時漢中道人王仲都能忍寒乃於盛寒日令袒衣載以駟馬於昆明池上環水而走仲都無變色金陵志夀陽公主人日臥於含章殿簷下梅花落公主額上成五出之花拂之不去經三日洗之乃落宫中效之今稱梅花粧闗河凍合東西路史記蘇秦傳秦四塞之國東有闗河謝朓歌旌節去闗河李乂詩闗河雲外連李益過飲馬泉詩從來凍合闗山路今日分流漢使前腸斷斑騅送陸郎江淹别賦行子腸斷百感悽惻杜甫詩孤城此日腸堪斷愁對寒雲雪滿山說文騅馬蒼黒雜色一曰蒼白色陳樂府陳孔驕赭白陸郎乘斑騅按陳孔謂陳暄孔範陸謂陸瑜李賀詩陸郎去矣乘斑雕人掌雲曳雪留陸郎辛未七夕恐是仙家好别離十洲記炎洲元洲多仙家生洲接蓬萊十七萬里上有仙家數萬王勃詩麟洲富仙家李白詩伯陽仙家子容色如青春楚辭九歌悲莫悲兮生别離何遜七夕詩别離不得語河漢漸湯湯故教迢遞作佳期楊炯詩相思明月夜迢遞白雲天杜甫詩清秋望不極迢遞起層隂楚辭九歌與佳期兮夕張謝莊月賦佳期可以還梁武帝七夕詩妙㑹非綺節佳期乃涼年由來碧落銀河畔度人經昔於始青天中碧落空歌注東方第一天有碧霞遍滿是名碧落李白詩步綱繞碧落翟楚賢碧落賦體象皎鏡是開碧落白帖天河謂之銀漢亦曰銀河江總詩織女今夕渡銀河陳子昂詩昨夜銀河畔星文犯遙漢可要金風玉露時梁昭明太子文玉露夕流金風時扇李宻詩金風颺初節玉露凋晚林沈佺期詩金風吹綠梢玉露洗紅籜清漏漸移相望久謝朓賦忘清漏之不緩惜曉露之方晞杜甫詩清漏往時同姚合詩清漏和砧疊韋承慶詩閑宵鐘箭移魏文帝燕歌行牽牛織女遙相望王筠代牽牛荅織女詩終日遙相望杜甫牽牛織女詩萬古永相望七夕誰見同微雲未接過來遲徐陵闗山月月出栁城東微雲掩復通孟浩然詩微雲淡河漢陸雲詩風連雲接張説詩雲接楚王臺古詩思君令人老軒車來何遲漢武帝歌是耶非耶立而望之偏何姍姍其來遲陳後主詩羅愇夜寒捲相望人來遲豈能無意酬烏鵲莊子今子獨無意焉知不足耶杜甫詩獨能無意向漁樵淮南子烏鵲填河成橋而渡織女風俗記織女七夕當渡河俠鵲為橋庾肩吾七夕詩倩語雕陵鵲填河未可飛惟與蜘蛛乞巧絲詩蠨蛸在户注小蜘蛛長脚者俗呼喜子荆楚嵗時記七月七日人家婦女結綵樓穿七孔針陳瓜果於庭中以乞巧有喜子網於瓜上則以為符應宋之問詩留巧付蜘蛛天寶遺事七夕宫女陳瓜花酒饌求恩織女星捉蜘蛛閉合中曉視絲希宻為得巧之候杜甫牽牛織女詩蛛絲小人態曲綴瓜果中和馬郎中移白菊見示抱朴子劉生丹法白菊花汁蓮花汁樗汁和丹蒸之服一年夀五百嵗陶詩只采黄金實錢起詩馬上還吟陶令詩陶潛詩采菊東籬下潘尼秋菊賦真人采其實王母接其葩盧諶菊賦黄蕋星羅左九嬪菊花頌秋耀金華王筠詩菊花偏可喜碧葉媚金英杜甫詩采采黄金花何由滿衣袖鍾㑹菊花賦芳實離離映藻煌煌郢曲新傳白雪英宋玉對楚王問客有歌於郢中者曰下里巴人國中屬而和者數千人為陽春白雪國中屬而和者不過數十人陳琳荅東阿王牋聽白雪之音觀綠水之節然後東野巴人蚩鄙益著謝希逸琴論白雪師曠所作商調曲也離騷夕餐秋菊之落英鍾㑹菊花賦揉以玉英素色不同籬下發李白詩素色愁明湖戴叔倫詩繁花連素色岑參詩為報使君多泛菊更將絃管醉東籬陳叔逵詠菊詩露下發金英繁花疑自月中生江總詩繁花霽後發李端詩繁花勝雪天杜甫詩斫却月中桂清光應更多浮杯小摘開雲母潘岳賦浮杯樂飲絲竹駢羅庾信詩殘秋欲屏扇餘菊尚浮杯陳叔逵詠菊詩但令逢採摘寧辭獨晚榮謝靈運永嘉記百卉正芳時聊以小摘供日杜甫詩自鋤稀菜甲小摘為情親唐書地理志濠州土貢雲母異物志雲母一名雲精帶露全移綴水精張正見詩帶露依深葉卞伯玉菊賦含凝露而吐英魏書波斯傳多大眞珠頗黎琉璃水精瑟瑟唐書康國傳波刺斯人富饒出金銀水精李白白葡桃賦疑是老僧休念誦腕前推下水精珠本草水精一名水晶一名水玉偏稱含香五字客漢官儀尚書郎含雞舌香伏奏事魏晉世語司馬景王命中書郎虞松作表再呈不可意令松更定之中書郎鍾㑹為定五字以呈景王王曰不當爾耶沈佺期詩五字擢英才從茲得地始芳榮沈約賦欝彼髙松棲根得地杜甫古栢行落落盤踞雖得地㝠㝠孤髙多烈風鍾㑹菊花賦百卉彫瘁芳菊始榮又仰撫雲髻俯弄芳榮温庭筠休澣日西掖謁所知漢書張安世傳休沐未嘗出鮑照詩休澣自公日劉楨贈徐幹詩誰謂相去逺隔此西掖垣洛陽故宫銘洛陽宫有東掖門西掖門赤墀髙閣自從容禮記天子赤墀漢書梅福傳願登文石之陛陟赤墀之塗注以丹淹泥塗殿上也韋應物詩曉拂爐烟裊赤墀張衡賦命王良掌策駟兮踰髙閣之鏘鏘宋之問上陽宫侍宴序髙閣重甍瞰崇牖而連北斗漢書張良傳所與從容言天下事甚衆白居易詩賢侯辟士禮從容玉女雙扉報曙鐘王延夀魯靈光殿賦玉女窺窗而下視李白明堂賦玉女攀星於網户庾信賦倚弓於玉女窗扉駱賓王詩風霜入曙鐘日麗九華青瑣闥謝靈運詩白日麗江臯沈炯詩日麗百川明魏志文帝紀黄初七年築九華臺摶物志漢武帝好神仙西王母遣使告帝當來乃供帳九華殿待之漢書元后傳青瑣注孟康曰以青畫户邊鏤中也師古曰刻為連瑣文而以青塗之也漢官儀給事黄門之職日暮入對青瑣門拜名曰夕郎范雲詩攝官青瑣闥吳均詩雲障青瑣闥風吹承露臺雨晴雙闕翠微峯張九齡詩試上紅樓望初逢山雨晴李頎詩鸕鷀山頭微雨晴曹植樂府雙闕曜朱光孫楚賦雙闕碣以峻峙貫雲氣而上征鮑照樂府雙闕似雲浮爾雅山未及上曰翠微左思蜀都賦鬱葐蒀以翠微崛巍巍以峩峩陳子昂宴集序披翠微而列坐左對青山毫端蕙露滋仙草抱朴子吐琳琅於毫墨之端沈約文究八體於毫端鮑照詩簾委蘭薰露帳含桃李風十洲記瀛洲生神芝仙草長洲有仙草靈藥李白送楊山人詩爾去掇仙草菖蒲化紫茸琴上薰風入禁松古今樂錄舜彈五絃之琴歌南風之詩曰南風之薰兮可以解吾民之愠兮吕氏春秋東南曰薰風崔湜詩只此歡娛齊鎬宴惟應率舞樂薰風風俗通河間雜歌二十一章内有風入松琴集風入松晉嵇康所作也皎然風入松歌西嶺松聲落日秋千枝萬葉風飀飀美人援琴弄成曲寫得松間聲斷續荀令鳳池春婉娩晉書荀朂傳自中書監為尚書令或有賀之者朂曰奪我鳳凰池諸君何賀耶賈至詩共沐思波鳳池上朝朝染翰侍君王何遜七召青春婉娩上客經過好將餘潤變魚龍駱賔王啟曲逮恩光滋餘潤於東里錢起詩露下添餘潤三秦記河津一名龍門桃花浪起魚躍而上之躍過者為龍否則㸃額而還遊南塘寄知者白鳥梳翎立岸莎詩白鳥翯翯沈約詩白鳥映青疇王維詩白鳥向山翻白居易靈鶴贊白翎雪開盧綸詩岸莎青