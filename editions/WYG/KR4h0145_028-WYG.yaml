詩草色引長隄易行其庭不見其人王維詩行盡清溪不見人一嶺桃花紅錦黦隋書禮儀志桃區一嶺盡是琉璃禮記月令仲春之月桃始華庾信樂府桃花顔色好如馬杜甫詩不分桃花紅似錦玉篇黦黒有文也廣韻紆物切音鬱黄黒色也又於歇切音謁色壊也又居月切音厥半溪山水碧羅新沈約詩溪水徒自清杜甫詩洄洄山根水儲光羲詩山中有流水借問不知名中華古今注秦始皇令三妃九嬪當暑戴芙蓉冠子以碧羅為之祖詠詩碧羅象天閣坐輦乘芳春岑參泛漾陂詩碧洗雲山新髙枝百舌猶欺鳥曹植詩好鳥鳴髙枝禮記仲夏之月反舌無聲注反舌百舌鳥晉子夜歌花塢蝶雙飛栁隄鳥百舌杜甫詩赤葉楓林百舌鳴又巢邊野雀羣欺燕帶葉梨花獨送春張正見詩涵花沒淺纜帶葉動深船王勃詩桂宻巖花白梨疎林葉紅李白詩梨花白雪香白居易詩梨花一枝春帶雨轉愈詩吏人休報事公作送春詩仲蔚欲知何處在三輔決錄注張仲蔚扶風人也少與同郡魏景卿隠身不仕所居蓬蒿沒人岑參詩若訪張仲蔚衡門滿草萊韋應物詩廣陵何處在苦吟林下拂詩塵樂府古辭林下與歡居潘岳秋興賦序僕野人也偃息不過茅屋茂林之下晉白紵舞歌質如輕雲色如銀袍以光軀巾拂塵李逺字求古蜀人第太和進士歴忠建江三州刺史終御史中丞失鶴秋風吹却九臯禽曹植詩秋風發微涼梁簡文帝詩秋風吹海水詩鶴鳴于九臯聲聞于天鄭箋臯澤中水溢出為坎自外數至九喻深逺也韓詩九臯九折之澤庾信鶴贊九臯遙集三山迴歸月賦聆臯禽之夕聞一片閑雲萬里心梁簡文帝詩可憐片雲生暫重復還輕王勃詩閑雲潭影日悠悠劉繪詩朝雲萬里色江洪詠鶴詩猶冀凌雲志萬里共翩翩鮑照舞鶴賦抱清迥之明心碧落有情應悵望度人經注東方第一天有碧霞遍滿是云碧落李白詩步綱繞碧落注綱罡氣也劉勰新論魚不畏網而畏鵜網無心而鳥有情也謝朓詩停驂我悵望杜甫詩悵望好林泉青天無路可追尋茅山父老歌白鶴翔青天曹植文天路髙邈良無由縁陸機文附翼雲霄雙飛天路楚辭願陳志而無路庾信詩蓬萊入海底何處可追尋來時白雪翎猶短梁簡文帝舞鶴詩來自芝田逺相鶴經大毛落茸毛生色雪白宋臨川王鶴賦羽凝素而雪映鮑照舞鶴賦驚身蓬集矯翅雪飛髙適冲和先生詩頭戴鶡鳥冠手搖白鶴翎杜甫詩太史候鳬舄王喬隨鶴翎去日丹砂頂漸深禽經注鶴之馴養於家庭者飲露則飛去王勃文徘徊去鶴將别蓋而同飛書礪砥砮丹疏丹者丹砂淮南八公相鶴經鶴之上相瘦頭朱頂鮑照舞鶴賦精含丹而星曜頂凝紫而烟華華表柱頭留語後續搜神記丁令威本遼東人學道於靈虛山後化鶴歸遼集城門華表柱時有少年舉弓欲射之鶴乃飛徘徊空中言曰有鳥有鳥丁令威去家千嵗今來歸遂上冲天更無消息到如今易林春南秋北不失消息薛道衡詩一去無消息駱賔王詩鴻來鴈度無消息贈寫御容李長史案唐制内則左右衞以下外則大都督府以下凡管兵開府者皆有長史玉座塵消硯水清沈佺期詩野花飄御座河栁拂天衣宋之問詩塵消清蹕路雲濕侍臣衣王羲之題筆陣圖後夫紙者陣也筆者刀矟也墨者鍪甲也水硯者城池也楊師道詠硯詩圎池類壁水輕翰染烟華傅休奕筆賦濯之以清水芬之以幽蘭龍髯不動彩毫輕晉書郭璞傳攀驪龍之髯撫翠禽之毛廣韻髯頰鬚也海賦輕塵不飛纎羅不動庾信文譬其毫翰則風雨爭飛論其文采則魚龍百變初分隆凖山河秀史記漢髙祖紀髙祖為人隆凖而龍顔美鬚髯後漢書光武帝紀隆凖日角李白詩長揖山東隆凖公隋書音樂志顯允盛德隆我前構瑤源彌瀉瓊根逾秀乍㸃重瞳日月明世說顧長康畫人或數年不㸃目睛曰四體妍媸本無闗於妙處傳神寫照正在阿堵中淮南子堯眉八彩舜目重瞳史記項羽本紀贊吾聞舜目蓋重瞳子易日月麗乎天宫女捲簾時暗認後漢書皇后紀論光武六宫稱號惟皇后貴人又置美人采女三等李白詩宫女笑藏鈎杜甫詩宮女開函近御筵何遜詩珠簾旦初捲王勃詩珠簾暮捲西山雨崔湜詩捲簾雙燕入侍臣開殿盡遙驚宋之問詩花落侍臣衣庾肩吾詩别筵開帳殿杜甫詩落筆四座驚三朝供奉無人敵杜甫詩三朝出入榮唐書李白傳明皇召見金鑾論當世事奏頌一篇帝賜食親為調羮有詔供奉翰林唐志𤣥宗置翰林院延文章之士下至藝能技術之流皆待詔於此杜甫詩白也詩無敵始覺僧繇浪得名圖繪寶鑑張僧繇吳人天監中歴官至右將軍吳興太守以丹青馳譽於時世謂僧繇畫骨氣竒偉規模宏逸而六法精備當與顧陸並驅爭先王沈魏書鄧颺鄧禹後也少得士名於京師許渾贈茅山髙拾遺唐書地理志潤州延陵縣有茅山明一統志茅山在句容縣東南四十五里山形如句字初名句曲山後因茅君得道於此更今名山有三峯三茅君各占一峯謂之三茅峯唐書百官志門下省左拾遺六人從八品上掌供奉諷諫大事廷議小事上封事諫獵歸來綺季歌漢書司馬相如傳嘗從上至長楊獵是時天子方好自逐野獸相如因以疏諫王勃詩前年諫獵出長安楚辭王孫兮歸來王褒碧雞頌歸來歸來漢德無疆史記留侯世家四人從太子年皆八十有餘鬚眉皓白上問各言名姓曰東園公角里先生綺里季夏黄公班固終南山賦榮期綺季此焉恬心古今樂錄四皓隠居南山作紫芝之歌大茅峰影滿秋波茅山志句曲山漢有三茅君來治其上時又名茅君之山三君乘白鶴各集山之三處人有見者復因鶴集之處分為大茅君中茅君小茅君三峯焉白居易詩影落杯中五老峯褚亮臨髙臺詩浮光隨日度漾影逐波深楚辭嫋嫋兮秋風洞庭波兮木葉下白居易詩秋波紅蓼水夕照青蕪岸山齋留客掃紅葉南史謝舉傳舉宅内山齋捨以為寺泉石