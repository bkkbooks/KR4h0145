食桑葉作繭者名蟓即今蠶也本草棘蠶欒蠶皆各因所食之葉命名今之柘蠶與桑蠶並育即棘蠺是也齊民要術柘葉食蠺絲可作琴瑟等絃清明響徹勝於凡絲逺矣溪鳥引雛蒲稗深綦母潛詩窗外無人溪鳥飛僧皎然詩溪鳥逐人還杜甫詩檣燕引雛飛白居易詩池藕重生葉林鴉再引雛謝靈運還湖中詩芰荷迭映蔚蒲稗相因依杜甫詩蒲稗各自長帆勢依依投極浦隂鏗詩鼔聲隨聽絶帆勢與雲隣詩昔我往矣楊栁依依嚴維詩孤棹也依依屈原九歌望涔陽兮極浦謝靈運賦入極浦而邅迴迷不知其所適鐘聲杳杳隔前林禮記鐘聲鏗鏗以立號號以立横左傳吳公子自衛如晉將宿於戚聞鐘聲焉楚辭日杳杳以西頽注杳杳逺貌劉長卿詩蒼蒼竹林寺杳杳鐘聲晚耿湋詩疎鐘隔山林平劉孝威詩霧罷前林見風息涌川故山迢遞故人去應㻛詩日暮歸故山謝靈運詩故山日已逺王勃臨髙臺髙臺迢遞絶塵埃孟浩然詩迢遞秦京道李陵荅蘇武書幸謝故人勉事聖君古詩前日風雪中故人從此去一夜月明千里心陳後主七夕詩惟當有今夕一夜不迢迢世説劉尹云清風明月輒思𤣥度淮南子道德之論譬如日月馳騖千里不能改其處也謝莊月賦美人邁兮音塵闕隔千里兮共明月楚辭目極千里兮傷春心湯惠休詩黄鶴西北去銜我千里心送郭秀才案全唐詩有遊天台山四字雲埋隂壑雪凝峰張籍詩郊原飛雨至城闕濕雲埋宋之問山池賦陽崖奪景隂壑生風韋應物詩隂壑雪松埋謝莊月賦柔祇雪凝圎靈水鏡鮑照詩晨登峴山首霜雪凝未通杜甫詩暮倚髙樓對雪峯半壁天台已萬重史萬嵗石城山詩鎮壓西南天半壁李白詩半壁見海日空中聞天雞㑹稽記赤城山有天台靈岳玉室璇臺明一統志浙江台州府天台山在天台縣西一百一十里道書云是山上應台星超然秀出有八重視之如一帆髙一萬八千文周迴八百里蔡琰胡笳十八拍雲山萬重兮歸路遐駱賔王詩青山幾萬重人度碧溪疑輟棹李膺笮橋贊人懸半空度彼絶壑顧況詩板橋人度泉聲杜甫詩碧溪搖艇濶朱果爛枝繁謝朓詩停驂我悵望輟棹子猶夷髙適詩我行倦風湍輟棹將問津僧歸蒼嶺似聞鐘張祜金山寺詩僧歸夜船月龍出曉堂雲司空曙詩白雲秋色逺蒼嶺夕陽髙左傳季康子伐邾及范門猶聞鐘聲洛陽伽藍記殷暉宅内地下常聞鐘聲遂捨宅為寺暖眠鸂鶒晴灘草杜祭酒别傳君曽作被暖眠不覺晏起乃歎曰暖眠使人忘起王建詩傍岸鵁鶄逐暖眠臨海異物志鸂鶒水鳥毛有五色食短狐其在溪中無復毒氣謝靈運鸂鶒賦覽水禽之萬類信莫麗乎鸂鶒沈佺期詩使君灘上草岑參詩水漲灘草沒髙挂獼猴暮澗松白居易詩雲展帆髙挂何遜詩猿挂似懸瓜詩毋教猱升木疏猱獼猴也楚人謂之沐猴楚辭獼猴兮熊羆賈島詩鶴曽棲處挂獼猴左思詩鬱鬱澗底松離離山上苗曽約共遊今獨去南史孔淳之傳淳之與徵士戴顒王𢎞之等共為人外之遊武元衡詩與君寂寞意共作草堂遊岑參送王昌齡詩羣公滿天闕獨去過淮水赤城西面水溶溶㑹稽記赤城山名色皆赤狀如雲霞天台之南門也明一統志赤城山在天台縣北六里白居易新葺水齋詩繚繞府西面潺湲池北頭楚辭心溶溶其不可量兮情澹澹其若淵李華詩覆溪窈窕波涵石洶溶溶送張尊師杜甫題李尊師松樹障子歌老夫清晨梳白頭𤣥都道士來相訪能琴道士洞庭西晉書戴逵傳逵少有文藝能鼔琴武陵王晞聞其能琴使召焉逵對使破琴初學記太霄琅書經曰人行大道號曰道士士者理也事也身心順理惟道是從故曰道士樓觀本記曰周穆王尚神仙幽逸之人置為道士水經注洞庭廣圎五百餘里明一統志洞庭在岳州府城西南風滿歸帆路不迷禇亮詩蘭逕香風滿梅梁暖日斜獨孤及詩東風滿帆來五兩如弓弦何遜南還道中詩遽逐春流返歸帆得望家王維詩向國惟看日歸帆但信風班固幽通賦乘髙而遌神兮道遐邇而不迷對岸水花霜後淺吳志周魴傳魴誘曹休牋曰今使君若從皖道進住江上魴當從南對岸歴口為應晉書地理志明帝常居廣陵南與京口對岸古今注荷花一名水華何遜詩水花披未落唐太宗詩水花翻照樹堤蘭倒插波楊炯詩香淺澤花疎傍簷山果雨來低任昉竹賦入房掃文石傍簷拂象床沈趣詠雀詩傍簷葺寒草張協七命商山之果漢臯之榛杜審言詩仲冬山果熟張九齡詩交紛瑞雨來杜甫詩㝠㝠細雨來耿湋詩晚果紅低樹杉松近晚移茶竈王維詩間花滿巖谷瀑水映杉松韋應物詩披雲看杉松梁簡文帝詩薄晚畏蠶饑茶經竈無用突者白居易詩趁暖泥茶竈防寒夾竹籬巖谷初寒蓋藥畦晉書阮籍傳有聲若鸞鳳之音響乎巖谷薛道衡詩鸞旗歴巖谷晉子夜歌初寒八九月獨纒自絡絲謝靈運詩孟冬初寒節氣成博物志陳葵子秋種覆蓋令經冬不死春有子也岑參詩小吏趨竹徑松庭侵藥畦他日相思兩行字論語他日又獨立古詩客從逺方來遺我一書扎上言長相思下言久離别置書懐袖中三嵗字不滅韋應物詩反覆相思字中有故人心晉書束晳傳有人於嵩髙山得竹簡一枚上兩行科斗書莫有知者李賀詩縹緗兩行字蟄蟲蠧秋芸無人知處武陵溪李白詩無人知所去愁倚兩三松髙士傳童馥入林慮山中家人求不知處陶潛桃花源記晉太康中武陵人捕魚為業緣溪行忽逢桃花林林盡便得一山山有小口便捨船從口入屋舍儼然有良田美池桑竹之屬黄髮垂髫並怡然自樂自云先世避秦時亂率妻子邑人來此絶境不復出焉張九齡詩且言臨海郡兼話武陵溪明一統志湖廣常德府武陵溪在城西三十里再遊姑蘇玉芝觀吳地記玉芝觀梁天監二年置髙梧一葉下秋初王僧孺書詠髙梧而賦脩竹梁簡文帝詩避暑髙梧側淮南子一葉落而天下知秋駱賔王秋宴序一葉