body:
  text: 欽定四庫全書御選唐詩巻一五言古唐太宗皇帝帝姓李氏諱世民神堯次子初建秦邸即開文學館既即位殿左置𢎞文館悉引内學士畨宿更休聽朝之閒則與討論典籍雜以文詠詩筆草隸卓越前古至於天文秀發沈麗髙朗有唐三百年風雅之盛帝實有以啟之焉帝京篇秦川雄帝宅三秦記長安正南秦嶺嶺根水流為秦川一名樊川魏明帝詩出身秦川爰居伊洛尉繚子天子宅千畝函谷壯皇居一統志函谷舊闗在靈寶縣南一十里老耼西度田文東出皆此闗函谷新闗在新安縣東二里項羽坑秦降卒處漢樓船將軍楊僕恥為闗外人上書乞以家財東徙闗武帝為移於此綺殿千尋起江總樂府綺殿文雅遒玳筵歡趣宻周禮疏八尺曰尋梁書朱异傳金山萬丈縁陟未登玉海千尋窺暎不測離宫百雉餘漢書枚乗傳修治上林雜以離宫班固西都賦離宫别館三十六所周禮注長三丈髙一丈曰雉左傳都城過百雉公羊傳注天子之城千雉髙七雉公侯百雉髙五雉連甍遙接漢張衡西京賦鳳鶱翥於甍標注甍棟也左思蜀都賦比屋連甍千廡萬室詩維天有漢監亦有光楊泉物理論漢者水之精氣飛觀迥淩虛曹植詩飛觀百餘尺臨牖御櫺軒隋書食貨志咸竦飛觀頽巖塞川雲日隠層闕釋名闕在門兩旁中央闕然為道也梁簡文帝詩帝京風雨中層闕烟霞浮風烟出綺疏張衡西京賦交綺豁以疏寮注疏刻穿之也交結綺文豁然穿以為寮也寮小窻也後漢書梁冀傳窻牖皆綺疏青瑣陸雲登臺賦綺疏列於東序朱户立於西廂二巖廊罷機務漢書董仲舒傳葢聞虞舜之時遊於巖廊之上垂拱無為而天下太平注巖廊殿下小屋也南史梁元帝紀雖戎畧殷凑機務繁多軍書羽檄文章詔誥㸃亳便就殆不虚手崇文聊駐輦北史儒林傳序内有崇文之館外重成均之職廣韻駐止也輦人步挽車玉匣啟龍圖南史齊髙帝紀披金繩而握金鏡開玉匣而總地維竹書紀年龍圖出河龜書出洛赤文篆字以授軒轅南齊書髙帝紀鳳書表肆類之運龍圖顯班瑞之期金繩披鳳篆後漢書祭祀志以金為繩徐陵玉臺新詠序麗以金繩裝之寳軸古今篆𨽻文體鳳篆白帝朱宣氏有鳳鳥之瑞文字取以為象韋編㫁仍續史記孔子世家孔子晚而喜易序彖繫象説卦文言讀易韋編三絶縹帙舒還巻梁昭明太子文選序詞人才子則名溢於縹囊飛文染翰則巻盈於緗帙注縹青白色對此乃淹留戰國䇿莊辛謂楚王曰臣請避於趙淹留以觀之欹案觀墳典劉孝綽昭明太子集序臨書幌而不休對欹案而忘怠左傳左史倚相趨過王曰是能讀三墳五典八索九丘注三墳五典三皇五帝之書也魏文帝答北海王詔王精硏墳典眈味道真三移步出詞林梁昭明太子答晉安王啟殽核文史漁獵詞林停輿欣武宴庾信華林園馬射賦將軍戎服來㕘武宴琱弓寫明月詩敦弓既堅釋文敦音雕畫弓也案琱與雕同庾信華林園馬射賦弓如明月對堋馬似浮雲向埒駿馬疑流電拾遺記穆王八駿戰國䇿吕不韋説陽泉君曰君之駿馬盈外廏庾信謝滕王賚馬啟流電爭先浮雲連影驚雁落虛弦戰國策更嬴謂魏王曰臣為王引弓虛發而下鳥有間雁從東方來更嬴以虛發而下之啼猿悲急箭吕氏春秋荆王有白猿王自射之則摶矢而熙使養由基射之始調弓矯矢猿擁樹而號閱賞誠多美於兹乃忘倦四鳴笳臨樂館廣韻笳簫捲蘆葉吹之也樂書似觱栗而無孔後世鹵簿用之魏文帝與呉質書從者鳴笳以啟路文學托乗於後車庾信奉和山池詩鳴笳臨絶浪飛葢歴通渠漢書武帝紀元封六年夏京師民觀角觝於上林平樂館張衡西京賦大駕幸乎平樂之館張甲乙而襲翠被眺聴歡芳節纂要春節曰芳節急管韻朱弦鮑照白紵歌古稱渌水今白紵催弦急管為君舞呉均與柳惲贈荅詩聞君吹急管相思雜采蓮禮記清廟之瑟朱弦而疏越一倡而三嘆侯瑾箏賦朱弦微而慷慨江總詩風亭翠斾開雲殿朱弦響清歌凝白雪張衡賦雙材悲於不納兮並詠詩而清歌宋玉對楚王問其為陽春白雪國中屬而和者數十人彩鳳肅來儀書簫韶九成鳳凰來儀謝朓樂府彩鳳鳴朝陽薛道衡詩盤龍隨鏡隠彩鳳逐帷低𤣥鶴紛成列史記樂書師曠援琴而鼓之一奏有𤣥鶴二八集乎廊門再奏之延頸而鳴舒翼而舞陳琳詩𤣥鶴浮清泉綺樹煥青㽔去兹鄭衞聲論語放鄭聲禮記鄭音好濫淫志衞音趨數煩志雅音方可悦孫綽頌雅音永寂而心存高範五芳辰追逸趣梁元帝纂要春辰曰芳辰江總詩上已娯春褉芳辰喜月離禁苑信多竒風俗通苑藴也言薪蒸所藴積也周禮注疏古謂之囿漢謂之苑漢書省禁苑以予民西都賦西郊則有上囿禁苑林麓藪澤西京賦上林禁苑跨谷彌阜庾信吹臺山銘禁苑斜通舂人常聚橋形通漢上詩維天有漢監亦有光又倬彼雲漢為章於天楊泉物理論星者元氣之英漢者水之精氣發而升精華浮上宛轉隨流名曰天漢一統志秦始皇作離宫於渭南北渭水貫都以象天漢横橋南渡以法牽牛徐陵長安道樂府横橋象天漢庾信詩橋横天漢分峯勢接雲危烟霞交隠暎花鳥自㕘差何如肆轍跡左傳昔穆王欲肆其心周行天下將皆必有車轍馬跡焉老子善行無轍跡酒徳頌行無轍跡止無室廬赭白馬賦跨中州之轍跡窮神化之軌躅庾肩吾詩轍迹光周頌巡遊盛夏功萬里賞瑤池穆天子傳觴西王母於瑤池之上神仙傳崑崙閬風苑有玉樓十二立臺九層左瑤池右翠水梁昭明太子詩唐遊薄汾水周載集瑤池六飛葢去芳園西京賦注華葢星覆北斗天子法而作葢劉峻與宋玉山元思書驅馬金張之館飛葢許史之廬漢書注許伯宣帝皇后父史髙皇帝外家也金金日磾也張張安世也許氏史氏有外屬之恩金氏張氏自托在於近狎也曹植詩清夜遊西園飛葢相追隨庾肩吾詩閣影臨飛葢鶯鳴入洞簫傅休奕𤓰賦選美芳園重簡其珍蘭橈遊翠渚楚詞注橈船小楫也梁簡文帝采蓮曲桂棹蘭橈浮碧水江花玉面兩相似庾信詩錦纜回沙磧蘭橈避荻洲釋名小洲曰渚渚遮也江總詩翠渚還鑾輅瑤池命羽觴萍間日影亂荷處香風舉桂楫滿中川釋名揖捷也與枻通楚辭桂棹兮蘭枻張纉賦忽中川而反顧懐舊鄉而延佇謝靈運詩亂流趨孤嶼孤嶼媚中川張正見詩芳蘭夾兩岸野燎燭中川弦歌振長嶼禮記弦歌詩誦論衡太平之世唐虞之時政得民安絃歌鼔舞比屋而有庾信賦見鼎鐘於金張聞弦歌於許史説文嶼島也在水為島在陸為嶼沈約賦結榜窮渚思臨長嶼梁簡文帝詩絶嶺隔天餘長嶼横江半何遜詩鐃吹響清江懸旗出長嶼豈必汾河曲水經汾水出太原汾陽縣管涔山漢武帝故事帝行幸河東祠后土顧視帝京欣然中流作秋風辭泛樓船兮濟汾河横中流兮揚素波晉書輿服志横汾河而祠后土登甘泉而祭昊天庾信詩定土汾河上戈船聊試遊方為歡宴所晉書王羲之傳欲與親知時共歡宴南史何戢傳齊髙帝為領軍與戢來往申歡宴梁江總詩栢梁奉歡宴茍濟詩風月接歡宴七落日雙闕昬曹植銅爵臺賦建髙門之嵯峩兮浮雙闕於太清晉書張軌傳軌大城姑臧初漢未博士侯瑾謂其門人曰後城西泉水當竭有雙闕起其上中有霸者出焉至魏嘉平中郡官果起學館築雙闕於泉上至是張氏遂霸西河古詩兩宫遙相望雙闕百餘尺孫綽遊天台山賦雙闕雲竦以夾路瓊臺中天而懸居迴輿九重暮孔叢子趙簡子使聘夫子夫子將至及河聞鳴犢竇犨之見殺也迴輿而旋庾信詩三元隨建節八景逐迴輿宋玉九辯豈不鬱陶而思君兮君之門以九重注天子有九門謂闗門逺郊門近郊門城門臯門庫門雉門應門路門也庾信詩自布南風曲還來吹九重長烟散初碧郭璞遊仙詩升降隨長烟飄颻戯九垓皎月澄輕素詩月出皎兮張協七命禀氣靈淵受精皎月後趙録石虎大起宫殿層甍疊宇飛檐拂雲圖以丹青色以輕素沈約詩夕隂帶層阜長烟引輕素褰幌翫琴書廣韻幌帷幔也劉歆逐初賦玩琴書以條暢何劭贈張華詩私願偕華􅄠逍遙綜琴書開軒引雲霧張協七命望玉繩而結極承倒景而開軒阮籍詩開軒臨四野登髙望所思列子虹蜺也雲霧也風雨也四時也此積氣之成乎天者也木華海賦瀝滴渗淫薈蔚雲霧謝靈運詩定山緬雲霧赤亭無淹薄斜漢耿層閣謝莊月賦於時斜漢左界北陸南躔謝朓詩玉繩隠髙樹斜漢耿層臺鮑照詩層閣肅天居馳道直如􅄠沈約詩送日隠層閣引月入輕幬清風搖玉樹詩吉甫作誦穆如清風淮南子崑崙上有玉樹珠樹璇樹漢武故事上起神屋前庭植玉樹珊瑚為枝碧玉為葉庾信啟甘泉宫裏玉樹一叢八歡樂難再逢芳辰良可惜梁元帝纂要春辰曰芳辰江總詩上已娯春褉芳辰喜月離玉酒汎雲罍十洲記瀛州有玉膏如酒名曰玉酒飲之輒醉令人長生古樂府金丹欲成猶百鍊玉酒新熟㡬千年江總瑪瑙盌賦寳出崑崙之仙阜觴即𤣥洲之玉酒詩酌彼金罍注罍酒器刻以雲雷之象以黄金飾之周禮注山罍刻而畫之為山雲之形庾信華林園馬射賦熊耳刻杯飛雲畫罍蘭肴陳綺席荀禮論椒蘭芬苾所以養鼻也習鑿齒文芳芬起於椒蘭邊讓章華臺賦蘭肴山竦椒酒淵流注蘭肴謂芳若蘭也嵇康琴賦蘭肴兼御㫖酒清醇鄒陽酒賦綃綺為席犀璩為鎮沈君攸詩絲繩玉壺傳綺席秦箏趙瑟響髙堂千鍾合堯禹孔叢子平原君與子髙飲强子髙酒曰昔有遺諺堯舜千鍾孔子百觚子路嗑嗑尚飲十榼古之聖賢無不能飲也戰國策昔帝女儀狄作酒而美進之於禹禹飲而甘之遂疏儀狄百獸諧金石書八音克諧無相奪倫又䕫曰於予擊石拊石百獸率舞庶尹允諧禮記金石絲竹樂之器也得志重寸隂晉書陶侃傳侃常語人曰大禹聖者乃惜寸隂至於衆人當惜分隂忘懐輕尺璧淮南子聖人不貴尺之璧而貴寸之隂帝王世紀禹不重徑寸之璧而愛日之寸隂潘尼祭禹廟文物貴尺璧我懐寸隂九建章歡賞夕漢書武帝紀太初元年起建章宫二八盡妖妍左傳晉悼公賜魏絳女樂二八歌鐘二肆宋玉楚辭二八齊容起鄭舞些注二八二列也羅綺昭陽殿左思魏都賦錦繡襄邑羅綺朝歌漢書趙后傳后弟昭儀居昭陽舍其中庭彤朱殿上髹漆芬芳玳瑁筵酉陽雜俎後梁韋琳為鯉表曰逺厠玳筵猥頒象筯珮移星正動禮記凡帶必有佩廣韻佩玉之帶珮同袁淑桐賦被藉兮烟霞懐佩兮星虹扇掩月初圓古今注舜作五明扇班偼伃詩裁成合歡扇團團似明月無勞上𤣥圃穆天子傳舂山之澤清水出泉温和無風所謂𤣥圃水經注崑崙之山三級下曰樊桐中曰𤣥圃上曰増城即此是神仙漢書郊祀志燕齊方士言有神仙祭祀致福之術者以萬數於北平作漢書地理志右北平郡秦置屬幽州一統志永平府秦遼西右北平二郡地翠野駐戎軒江總文曳􅉬旗之舒巻問翠野之㕘差後漢書朱祐等傳賛有來羣后捷我戎軒曹植陳審舉表豹尾已建戎軒騖駕盧龍轉征斾魏志武帝紀田疇為鄉導引軍出盧龍塞元和郡縣志平州有盧龍鎮山如龍形其土色黑釋名云土黒曰盧盧然解散也廣韻繫旐曰斾遙山麗如綺魏文帝善哉行感心動耳綺麗難忘長流縈似帶張衡歸田賦仰飛纎􅌳俯釣長流曹植詩樹木發春華清池激長流漢書功臣表封爵之誓曰使黄河如帶泰山若厲國以永存爰及苗裔庾闡詩悠想盻長川輕瀾渺如帶海氣百重樓史記天官書海旁蜃氣象樓臺漢書武帝紀元封五年詔曰朕巡荆揚輯江淮物㑹大海氣以合泰山巖松千丈葢袁宏詩森森千丈松磊砢非一節抱朴子天陵偃葢之松玉策記千嵗松樹枝葉四邊披起上杪不長望而視之有如偃葢兹焉可遊賞何必襄城外莊子黄帝將見大隗乎具茨之山方明為御昌㝢驂乗張若謵朋前馬昆閽滑稽後車至於襄城之野七聖皆迷無所問塗幸武功慶善宫賦元和志武功漢舊縣古有邰國堯封后稷之地在渭水南今郿縣地是也案舊縣境有武功山武功水是則縣本以山水立名也唐書地理志武功南十八里有慶善宫臨渭水武徳元年髙祖以舊第置宫乂禮樂志太宗生於武功之慶善宫貞觀六年幸之宴從臣賞賜閭里同漢沛宛夀丘惟舊跡史記五帝紀舜作什器於夀丘注在魯東門之北黄帝生處宋書符瑞志黄帝軒轅氏母曰附寳見大電光繞斗樞星照郊野感而孕二十五月而生黄帝於夀丘陸倕文姬水夀丘載記山川之目丹陵負夏僅傳鄉黨之名豐邑乃前基詩既伐于崇作邑于豐史記豐邑注豐在京兆鄠縣東粤予承累聖懸弧亦在兹禮記男子生則設弧於門左庾信詩蘭芬猶載寢篷箭始懸弧棗據雜詩士生則懸弧有志在四方弱齡逢運改魏書彭城王勰傳挺徳弱齡誕質至孝梁武帝贈臨川王宏詔爰初弱齡行彰素履逮於應務嘉猷載緝後漢書荀彧傳功申運改迹疑心一提劒鬱匡時史記髙祖紀吾從布衣提三尺劍取天下晉書樂志髙祖提劍寰中削平天下又樂歌匡時拯俗休功葢世指揮八荒定抱朴子儀蕭曹之指揮史記秦始皇紀秦孝公以來有席卷天下包舉宇内囊括四海之意并吞八荒之心注八荒八方荒忽極逺之地説苑八荒之内有四海四海之内有九州天子處中州而制八荒耳揚雄甘泉賦天閫决兮地垠開八荒協兮萬國諧懐柔萬國夷詩懐柔百神及河喬嶽張衡東京賦道胡不懐化胡不柔顔延之詩徳禮既普洽川嶽徧懐柔易首出庶物萬國咸寧左傳禹㑹諸侯於塗山執玉帛而朝者萬國説文夷平也梯山盛入款韓非子韓昭王令工施鈎梯上華山隋書音樂志棧壑忘阻梯山匪夐後漢書光武紀光武二十四年匈奴薁鞬日逐王比遣使款五原塞南史梁武帝紀殊俗百蠻重譯獻款駕海亦來思韓詩外傳成王時有越裳氏重三譯而朝曰吾受命國之黄􅄠曰久矣天之不迅風海之不波溢也三年於兹矣意者中國有聖人乎盍往朝之顔延之曲水詩序棧山航海踰沙軼漠之貢府無虚月庾信華林園馬射賦雕題鑿齒識海水而來王單于陪武帳史記匈奴單于注單于廣大之貌言其象天單于然漢書汲黯傳上嘗坐武帳黯前奏事上不冠望見黯避帳中使人可其奏晉書天文志北落西南一星曰天綱主武帳庾信賦侍戎韜於武帳聴雅曲於文弦日逐衞文螭漢書宣帝紀匈奴日逐王先賢撣將人衆萬餘來降晉書匈奴傳呼延氏最貴則有左日逐右日逐世為輔相王襃四子講徳論日逐舉國而歸徳王鑒七夕詩六龍奮瑤轡文螭輔瓊車端扆朝四岳儀禮注扆如綈素屏風畫斧文以示威亦天子所居也沈約詩憑玉宅海端扆御天書四岳注四岳官名一人而總四岳諸侯之事也無為任百司禮記王中心無為也以守至正老子我無為而物自化書百司庶府沈約為梁武帝與謝朏勅自居元首臨對百司霜節明秋景陶潛送客詩爰以履霜節登髙餞將歸謝恵連離合詩嘯歌亦何適肅爾凌霜節輕冰結水湄爾稚水草交曰湄詩所謂伊人在水之湄釋名湄眉也如目臨眉也王粲詩列車息衆駕相伴緑水湄芸黄遍原隰詩裳裳者華芸其黄矣傳芸黄草色也沈約詩寥戾野風急芸黄秋草腓爾雅髙平曰原下隰曰隰詩皇皇者華于彼原隰班固西都賦溝塍刻鏤原隰龍鱗禾穎積京坻説文禾嘉穀也以二月而種八月始熟得時之中故謂之禾詩實穎實栗注穎垂穎也禾穂謂之穎詩曽孫之庾如坻如京注坻水中之髙地也京髙丘也粟庾之多髙大如渚坻如丘京也共樂還鄉宴歡此大風詩史記髙祖紀髙祖還歸過沛置酒沛宫酒酣作歌曰大風起兮雲飛揚文中子大風安不忘危其霸心之存乎經破薛舉戰地舊唐書太宗紀薛舉以勁卒十萬來逼渭濵太宗親撃之破其衆畧地至於隴坻昔年懐壯氣提戈初仗節曲禮疏戈如㦸而横淮南子陽貨赴闈而逐揚劍提戈而走梁元帝告四方檄中權後勁龔行天罰提戈䝉險隕越以之玉篇節竹約也唐書車服志大將出賜旌以顓賞節以顓殺節垂畫木盤三相去數寸隅垂赤麻心隨朗日髙陸機賦熙朗日以熠燿扇和風其如波謝靈運賦潛夜隠輝幽境朗日志與秋霜潔淮南子寳劍之色如秋霜後漢書孔融傳懍懍焉皓皓焉其與琨玉秋霜比質可也移鋒驚電起桓範簡騎論夫騎者軍之鋒鋭也往如電發去如風過傅休奕正都賦馬如激電轉戰長河決後漢書溝洫志河決而桃花水羨溢梁武帝紀擁數州之兵以誅羣豎懸河注火奚有不滅營碎落星沈應瑒賦投璧玉而沈星楊素詩兵寝星芒落陣卷横雲裂庾信謝滕王閣集序啟雄才葢代逸氣横雲王襃詩平雲如陣色楊素詩雲横虎落陣一揮氛沴靜氛祥氣也玉篇相傷謂之沴又水不利也再舉鯨鯢滅左傳古者明王伐不敬取其鯨鯢而封之以為大戮於是乎有京觀左思呉都賦長鯨吞航修鯢吐浪於兹撫舊原爾雅廣平曰原屬目駐華軒白虎通諸侯路車大夫軒車十六國春秋徳非管仲不足華軒棠阜智非孔明豈足三顧草廬陶潛詩草廬寄窮巷甘以辭華軒沈沙無故跡史記淮隂侯傳信與龍且夾濰水陳夜令人為萬餘囊滿盛沙壅水上流龍且遂迫渡水信使人決壅囊水大至即擊之減竈有殘痕史記孫子傳魏趙攻韓齊救之孫子使軍入魏地為十萬竈明日為五萬竈又明日為二萬竈龎涓大喜倍日并行逐之暮至馬陵盡破涓軍浪霞穿水淨湘中記湘水至清雖深五六丈見㡳了了然白沙如霜雪赤岸如朝霞謝朓詩川霞旦上薄山光晚餘照梁簡文帝詩乍如落霞發頗似巫雲登峯霧拖蓮昬後漢書張楷傳楷字公超隠居𢎞農山所居成市後華隂山南遂有公超市能為五里霧孔徳紹經華山詩山昬五里霧日落二華隂疎峯起蓮葉危塞隠桃林華山記山頂有池生千葉蓮華服之羽化因名華山世途亟流易潘岳詩荏苒冬春謝寒署忽流易人事殊今昔長想眺前蹤梁簡文帝詩終夜慕前蹤撫躬聊自適屈原離騷心猶豫而狐疑兮欲自適而不可漢書髙鳳傳潛心篤行以漁釣自適晉書張翰傳任心自適不求當世初晴落景晚霞聊自怡盧思道詩晚霞浮極浦落景照長亭陶𢎞景詩只可自怡悦不堪持贈君初晴彌可喜日晃百花色劉孝威謝東宫賜淨饌啟千品甘露之食百花珍藥之果庾信㯽榔詩緑房千子熟紫穂百花開風動千林翠南史齊宗室子顯傳風動春朝月明秋夜潘岳蓮花賦恵風動春氣和盻清池翫蓮花池魚躍不同吕氏春秋宋桓司馬有寳珠抵罪出亡王使人問珠之所在曰投之池中於是竭池而求之無得魚殫焉裴子野游華林園賦譬籠鳥與池魚本山川而有思園鳥聲還異鮑照樂府春山茂春日行園中鳥多巧聲寄言博通者琴賦序吟詠之不足寄言以廣意後漢書崔琦少遊學京師以文章博通稱南史劉勰篤志好學博通經論知予物外意梁簡文帝神山寺碑㡬圓上聖智周物外中宗皇帝帝諱顯髙宗第七子始封周王徙封英王改名哲永隆元年立為皇太子及即位太后臨朝廢為廬陵王神龍元年復辟在位六年諡曰孝和集四十巻失傳九月九日幸臨渭亭登髙并序九全唐詩話景龍三年月九日幸臨渭亭與羣臣賦詩續齊諧記汝南桓景隨費長房遊學長房謂之曰九月九日汝南當有大灾令家人縫囊盛茱萸繫臂上登山飲菊花酒此禍可消今世人九日登髙始此陶潛盈把晉書陶潛傳字元亮大司馬侃之曽孫也為鎮軍㕘軍謂親朋曰聊欲弦歌以為三徑之資可乎執事者聞之以為彭澤令續晉陽秋陶潛嘗九日無酒宅邊摘菊盈把坐其側既浮九醖之歡西京雜記以正月旦作酒八月成一曰九醖一曰醇酎王僧孺敬子任傳九醖斯浮百羞並薦畢卓持螯須盡一生之興晉書畢卓傳卓嘗謂人曰右手持酒盃左手持蟹螯拍浮酒船中便足了一生矣人題四韻南史王僧孺傳竟陵王子良嘗夜集學士刻燭為詩四韻者則刻一寸以此為率同賦五言鍾嶸詩品逮漢李陵始著五言之目其最後成隋書周羅㬋傳羅㬋為左衞率㕘宴席陳主曰周左率武將詩每前成文士何後也罰之引滿石崇金谷集序遂各賦詩或不能者罰酒三斗漢書叙傳禁中設燕飲之㑹皆引滿舉白九日正乗秋謝恵連詩悽悽乗蘭秋言餞千里舟三杯興已周左傳臣侍君宴過三爵非禮也漢書朱博傳博為人亷儉食不重味案上不過三盃泛桂迎樽滿楚辭奠桂酒兮椒漿注切桂於酒中袁山松酒賦泛芳樽以琥珀馨桂發而蘭興吹花向酒浮孫楚菊花賦飛金英以浮㫖酒周明帝詠摘花詩酒浮花不沒花含酒更香長房萸早熟風土記茱萸榝也九月九日熟色赤可采時也彭澤菊初收何藉龍沙上豫草記龍沙郡北帶江沙甚潔白髙峻而陂有龍形舊俗為九月九日登髙處寰宇記龍沙在豫章城北一帶甚白而髙峻左右居人時見龍跡方得恣淹留戰國策莊辛請楚王曰之臣請避於趙淹留以觀登驪山髙頂寓目通鑑景龍三年十二月甲午上幸驪山温湯太平寰宇記驪山在昭應縣東南二里即藍田山也記纂淵海在臨潼縣雍録驪山秦漢隋唐皆常遊幸四郊秦漢國周禮天官遂士掌四郊記纂淵海秦都咸陽漢都闗中通鑑漢髙祖五年婁敬求見上上召見問之敬曰秦地被山帶河可入闗而都之上問張良良曰闗中左崤函右隴蜀阻三面而守獨以一面東制諸侯此所謂金城千里天府之國也婁敬説是也上即日西都長安八水帝王都司馬相如上林賦蕩蕩乎八川分流註灞滻涇渭澧鎬澇潏凡八川江總詩濯流齊八水開襟入四衢左傳凡邑有宗廟先君之主曰都閶闔雄里閈離騷吾令帝閽開闗兮倚閶闔而望予張衡西京賦正紫宫於未央表嶢闕於閶闔註天有紫微宫王者象之宫門名曰閶闔後漢書成武侯順傳順與光武同里閈説文汝南平輿里門曰閈城闕壯規模詩在城闕兮東京賦殿未出乎城闕斾已反乎郊畛漢書髙祖本紀雖日不暇給規模𢎞逺矣西京賦規模踰溢不度不臧貫渭稱天邑水經渭水出隴西首陽縣渭谷亭南鳥鼠山記纂淵海秦皇兼天下都咸陽渭水貫都以象天漢書肆予敢求爾於天邑商張華詩發軔上京出自天邑含岐實奥區説文岐山在長安西美陽縣界山有兩岐因以名焉西京賦實維地之奥區神臯註自古以雍州積髙神明之隩金門披玉館史記滑稽傳金馬門者宦署門也門旁有銅馬故謂之金馬門揚雄解嘲今吾子幸得應金門上玉堂有日矣班固西都賦於是天子乃登屬玉之館歴長楊之榭因此識皇圖東都賦於是聖皇乃握乾符闡坤珍披皇圖稽帝文明皇帝帝諱隆基睿宗第三子始封楚王後為臨淄郡王景雲元年進封平王立為皇太子英武多能開元之際勵精政事海内殷盛旁求宏碩講道藝文貞觀之風一朝復振賜諸州刺史以題座右開元十六年帝自擇廷臣為諸州刺史許景先虢州源光裕鄭州寇泚宋州鄭温琦邠州袁仁恭杭州崔志亷襄州李昇期邢州鄭放定州蔣挺湖州裴觀滄州崔誠遂州凡十一人行詔宰相諸王御史以上祖道洛濵盛供具奏太常樂帛舫水嬉賜詩令題座右且給筆紙令自賦焉眷言思共理漢書循吏傳序孝宣嘗稱曰庶民所以安其田里而亡嘆息愁恨之心者政平訟理也與我共此者其惟良二千石乎鑑夢相惟良書夢帝賚予良弼又非佞折獄惟良折獄徐陵與王呉郡書西洎江沱同仰惟良之化猗歟此推擇漢書韓信傳家貧無行不得推擇為吏聲績著周行詩嗟我懐人寘彼周行又人之好我示我周行賢能既俟進周禮地官鄉老及鄉大夫羣吏獻賢能之書於王王再拜受之登於天府内史貳之後漢書郭伋傳徵拜潁川太守帝勞之曰賢能太守去帝城不逺河潤九里冀京師并蒙福也黎獻實佇康書萬邦黎獻共惟帝臣文心雕龍正位北辰嚮明南面所以運天樞毓黎獻漢書元帝紀詔曰葢聞賢聖在位隂陽和風雨時日月光星辰靜黎庶康視人當如子左傳良君賞善而刑淫養民如子葢之如天容之如地愛人亦如傷孟子文王視民如傷講學試誦論禮記講學以耨之陸機講漢書詩税駕金華講學秘館漢書何武傳行部必先即學宫見諸生試其誦論問其得失然後入傳舍阡陌勸耕桑史記秦紀孝公十二年為田開阡陌魏武帝樂府越陌度阡注阡陌皆道也南北曰阡東西曰陌後漢書明帝紀詔曰方春戒節人以耕桑其勅有司務順時氣使無煩擾虛譽不可飾列子遑遑爾競一時之虚譽漢書公孫𢎞傳與内富厚而外詭服以釣虛譽者殊科清知不可忘魏志胡質傳注質子威晉武帝賜見嘆其父清謂威曰卿清孰與父清威對曰臣父清恐人知臣清恐人不知是臣不如者逺也求名迹易見顔氏家訓忘名者體道合徳享鬼神之福祐非所以求名也安貞徳自彰易安貞之吉應地無疆訟獄必以情左傳小大之獄雖不能察必以情教民貴有常易動靜有常剛柔㫁矣竹書紀年日月有行星辰有常恤惸且存老禮記恤孤獨以逮不足人八十月告存注每月致膳撫弱復綏强左傳撫弱者昧以務烈所可也勉哉各祗命書疇敢不祗若王之休命知予眷萬方書誕告萬方宋書樂志時齊七政朝此萬方送忠州太守康昭逺等一統志忠州在重慶府城東春秋戰國為巴地秦屬巴郡漢置臨江縣唐改忠州以巴人蔓子及郡守嚴顔皆著忠烈故名唐書天寳元年改刺史為太守端拱臨中樞書垂拱而天下治唐書髙儉傳詔曰端拱三川不憂闗中者以屬卿也隋煬帝詩端拱朝萬國守文繼百王隋書天文志北極辰也其紐星天之樞也揚子植中樞因無隅文獻通考北極五星在紫微宫中第五星為天樞緬懐共予理後漢書嚴光傳光武幸其館光卧不起帝撫光腹曰咄咄子陵不可相助為理耶不有臺閣英後漢書仲長統傳光武皇帝政不任下雖置三公事歸臺閣注臺閣謂尚書也乂黄瓊傳初瓊隨父在臺閣習見故事詩美如英疏英是賢才絶異之稱孰振循良美史記太史公自叙奉法循理之吏不伐功矜能百姓無稱亦無過行作循吏列傳後漢書和帝紀數詔有司務擇良吏今猶不改分符侯甸内説文符信也漢制以竹長六寸分而相合漢書文帝紀注與郡守為符各分其半右留京師左以與之隋書文帝紀開皇九年頒木魚符於總管刺史雄一雌一書五百里侯服注侯國之服又五百里甸服注畿内之地甸田服事也拜手明庭裏書臯陶拜手稽首注首至手又至地也王襃靈壇銘明庭朝禮仙官羽衣誓節期飲冰禮記約信曰誓莊子朝受命而夕飲冰徐陵文奉詔崇朝飲冰將夕調人方導水周禮地官司徒調人掌司萬民之難而調和之茍子夫義者内節於人而外節於萬物者也上安於主而下調於民者也後漢書桓譚傳威徳更與文武迭用然後政調於時而􅏥人可定北史循吏序傳自罷侯置守厯年永久統以方牧仍世相循所以寛猛為用庇人調俗國語防民之口甚於防川川壅而潰傷人必多民亦如之是故為川决之使導為民者宣之使言嘉聲馳九牧後漢書杜根傳根位至巴郡太守政甚有聲蔡邕文望形表而景附聆嘉聲而響和書六卿分職各率其屬以倡九牧孔融論盛孝章書孝章要為天下大名九牧之人所甚稱嘆恵化光千祀魏志盧毓傳毓遷安平廣平太守所在有恵化南史垣崇祖傳崇祖為竟陵恵化大行木連理上有光如燭咸以為善政所致書伊訓注夏曰嵗殷曰祀周曰年梁昭明太子文選序自姬漢以來渺焉悠邈時更七代數逾千祀時雨侔昔賢書曰肅時雨若禮記天降時雨山川出雲三輔决録茂陵郭汲為穎川化如時雨芳猷貫前史謝朓酬徳賦結徳言而為佩帶芳猷而為服江總詩悠然值君子復此暎芳猷佇爾頌中和周禮春官大司樂以樂徳教國子中和祗庸孝友漢書兒寛傳惟天子建中和之極兼總條貫金聲而玉振之又何武傳王襃頌漢徳作中和樂職宣布詩三篇吾將令卿士詩百辟卿士媚於天子徐陵太極殿銘肅肅卿士邕邕承弼送李邕之任滑臺舊唐書李邕傳景隆元年拜左臺殿中御史改户部員外郎貶崔州舍城丞開元三年擢為户部郎中左遷括州司馬後徵陳州刺史累轉括淄滑三州刺史元和郡縣志滑州即古滑臺城城有三重又有都城周二十里相傳衞靈公所築小城昔滑氏為壘後人増以為城屬河南道一統志滑縣在大名府城南二百三十里漢家重東郡前漢書循吏傳序孝宣知民事之艱難拜刺史守相輒親見問二千石有治理效輒以璽書勉厲増秩賜金或爵至闗内侯是故漢世良吏於是為盛前漢書地理志東郡秦置屬兖州元和郡縣志始皇五年拔魏二十城初置東郡漢因之東晉時慕容徳自鄴南往滑臺宋武既平慕容之後於此置兖州仍置東郡開皇九年於今州里置杞州十六年改杞州為滑州大業三年又改為東郡宛彼白馬津水經注舊東郡白馬縣神馬亭有神馬寺去白馬津可二十里東南去白馬縣故城可五十里開山圖所謂白馬山也一統志黎陽津在黎陽故城東又名白馬津漢酈食其所謂守白馬之津即此黎庶既蕃殖國語財用蕃殖於是乎始淮南子仁義大布而萬物蕃殖易林甘雨降嘉黎庶蕃殖臨之勞近臣潘尼詩及爾同僚具惟近臣逺别初首路諸葛亮伐魏詔旍麾首路其所經至亦不欲窮兵極武顔延之詩改服飾徒旅首路跼險艱鮑照詩首路或㕘差投駕均逺托今行方及春課成應第一通典漢景帝更名郡守為太守掌治民進賢勸功决訟撿姦常以春行所主縣秋冬遣無害吏平其罪法論殿最又漢制縣令秋冬集課上計於所屬郡國前漢書黄霸傳霸以外寛内明得吏民心户口嵗増治為天下第一王隠晉書解修遷瑯琊太守治績天下第一良牧爾當仁漢宣帝詔庶民所以安其田里而亡嘆息愁恨之心者政平訟理也與我共此者其惟良二千石乎温湯對雪長安志驪山在臨潼縣東南二里温湯在山下唐書髙祖紀武徳六年二月庚戌幸温湯王子獵於驪山甲寅至自溫湯又明皇紀開元五年置温泉宫於驪山天寳六年改為華清宫北風吹同雲詩北風其凉劉刪詩離羣思北風詩上天同雲雨雪雰雰疏在上天同起其雲西京雜記雪雲曰同雲庾肩吾詩寒光晦八極同雲暗九天同雲飛白雪孟子白羽之白猶白雪之白世説謝安集兒女講論文義俄而雪驟公欣然曰白雪紛紛何所似兄子朗曰撒鹽空中差可擬兄女道藴曰未若柳絮因風起白雪乍迴散曹植賦飄颻兮若流風之迴雪謝莊雪賦迴散崇積之勢飛聚凝曜之竒同雲何慘烈班固西京賦雨雪飄飄風霜慘烈梁武帝擣衣詩隂蟲日慘烈庭草復芸黄未見温泉冰雪賦焦溪涸湯谷凝火井滅温泉冰晉書紀瞻傳今有温泉而無寒火其故何也抱朴子水主純冷而有温谷之湯泉火體宜熾而有蕭丘之寒焰魏都賦温泉毖湧而自浪華清蕩邪而難老寧知火井滅水經火山出火井左思蜀都賦火井沈熒於幽泉髙爓飛煽於天垂注蜀都有火井在臨邛縣西南火井鹽井也欲出其火以家火投之須臾許隆隆有聲焰出通天光輝十里以鬲盛之接其光而無炭也表瑞良在兹謝恵連雪賦盈尺則呈瑞於豐年袤丈則表沴於隂徳周書明帝紀天不愛寳地稱表瑞庶㡬可怡悦陶𢎞景詩只可自怡悦登蒲州逍遙樓舊唐書地理志河中府隋河東郡武徳元年置蒲州治開元八年置中都改蒲州為河中府其年罷中都依舊為蒲州一統志山西平陽府蒲州在府城西南四百五十里春秋時為蒲坂唐改蒲州屬河東道夢溪筆談蒲中逍遙樓楣上有唐人横書梵字相傳是霓裳譜長榆息烽火史記淮南王傳廣長榆開朔方注長榆塞名水經注榆林塞即漢書所謂榆溪舊塞也自漢西去悉榆栁之藪縁歴沙陵屆龜兹縣西出故謂廣長榆也梁元帝賦若驅馬於長榆漢書文帝紀烽火通於甘泉後漢書杜茂傳盧芳據髙柳帝遣段忠鎮守北邊築亭候修烽火隋煬帝飲馬長城窟行縁巖驛馬上乗空烽火發髙柳靜風塵漢書地理志代郡縣髙柳西部都尉治水經注髙柳在代中其山重巒疊巘霞舉雲髙連山隠隠東出遼塞庾信司馬裔誌銘築塞長榆營軍髙柳李康運命論風驚塵起散而不止庾信詩馬有風塵氣人多闗塞衣卜征巡九洛左傳石㚟言於子囊曰先王卜征五年而嵗習其祥祥習則行不習則増修其徳而改卜張衡東京賦卜征考祥終然允淑注征巡行也梁武帝詔每嵗卜征躬事巡省莊子九洛之事治成徳備注九洛洛書九疇也庾信馬射賦舜以甲子之朝披圖而巡洛王勃乾元殿頌黄軒瞰月樵門頽九洛之功展豫出三秦左傳天子非展義不巡狩孟子一遊一豫為諸侯度史記始皇紀項籍滅秦之後各分其地為三名曰雍王塞王翟王是為三秦又淮隂侯傳今大王舉而東三秦可傳檄而定也昔是潛龍地易潛龍勿用一統志龍潛宅在平陽府芮城縣唐髙祖微時隠此今為上理辰易飛龍在天上治也案上理即上治避髙宗諱改時平乗道泰漢書食貨志三考黜除餘三年食進業曰登再登曰平三登曰泰平易天地交泰陸倕傳時逢世道泰蹇足步髙衢聊賞遇年春劉端初春宴東堂詩睿賞叶春芳史記天官書立春四時之卒始也注立春日是去年四時之終卒今年之始也沈約詩旅遊媚年春年春媚遊人黄河分地絡山海經河源出崑崙之山水經注崑崙墟地之中也其髙萬一千里東南流黄水入中國為黄河平陽府志黄河在蒲州河津平陸芮城垣曲界王襃詩常山臨代郡亭障繞黄河張衡西京賦爾乃振天維衍地絡注維綱也絡網也宋孝武帝詩層峯亘天維曠渚緜地絡鮑照游思賦仰盡兮天經俯窮兮地絡飛觀接天津曹植東征賦登城隅之飛觀兮望六師之所營嵇康琴賦髙軒飛觀廣厦間房爾雅箕斗之間注箕龍尾斗南斗天漢之津梁離騷朝發軔於天津兮夕余至乎西極晉書天文志天津九星横河中主四瀆津梁一覽遺芳翰世説王珣曰若使阡陌條暢則一覽而盡盧照隣詩遊人試一覽臨觀果忘疲通典麗藻芳翰千載肅如神漢書王襃傳上下俱欲懽然交欣千載一㑹論説無疑何妥詩小臣屬千載時幸預簪纓禮記清明在躬志氣如神史記五帝紀帝堯者放勲其仁如天其知如神經河上公廟神仙傳河上公者莫知其姓氏漢文帝時結菴於河濵帝讀老子有不解者幸其菴問之公授帝素書二巻曰余注此凡傳三人矣遂失所在一統志廟在河南府陜州昔聞有耆叟晉書文帝紀耆叟荷崇養之徳鰥寡䝉矜恤之施劉楨國文甫碑龍徳逸民黄􅄠耆叟河上獨遺榮詩河上乎逍遙張協詩達人知止足遺榮忽如無謝靈運詩彭薛裁知恥貢公未遺榮文選注鍾㑹有遺榮賦跡與塵囂隔陶潛桃花源詩借問遊方士無乃太塵囂謝朓詩塵囂自兹隔賞心於此遇心將道徳并易和順於道徳而理於義史記老子傳老子修道徳其學以自隠無名為務著上下篇言道徳之意五千言詎以天地累禮記除去天地之害寧為寵辱驚老子得之若驚失之若驚是謂寵辱若驚矯然翔寥廓夏侯湛東方朔像賛矯矯先生史記司馬相如傳鷦鷯已翔乎寥廓而羅者猶視乎藪澤曹植詩山谷何寥廓謝朓詩寄言罻羅者寥廓已髙翔如何屈堅貞易貞固足以幹事論語不曰堅乎磨而不磷杜公瞻詩屠釣采堅貞𤣥𤣥妙門啟老子𤣥之又𤣥衆妙之門蔡邕翟先生碑𤣥𤣥焉測之無源汪汪焉酌之不竭晉書皇甫謐傳遊精於六藝之府散意於衆妙之門者有年矣肅肅祠宇清詩肅肅在廟爾稚肅肅敬也東方朔像賛逍遙城郭觀先生之祠宇㝠漠無先後後漢書張奐傳施及㝠漠謝靈運佛影銘金好㝠漠白豪幽曖詩不自我先不自我後淮南子先後上下不可不審那能紀姓名禮記男子書名婦人書姓史記項羽紀書足以記名姓而已過王濬墓晉書本傳濬字士治𢎞農湖人封襄陽縣侯葬栢谷山大營塋域墓垣周四十五里呉國分牛斗周禮注分野斗牛女揚州晉室命龍驤晉書羊祜傳呉有童謠曰阿童復阿童銜刀渡江東不畏岸上獸但畏水中龍祜聞之曰此必水軍有力㑹濬徵為大司農小字阿童因表留濬監益州諸軍事加龍驤將軍後漢書呉漢傳呉公鷙彊實為龍驤又何進傳今將軍總皇威握兵要龍驤虎步髙下在心蜀志諸葛亮傳亮海之素志進欲龍驤虎視苞括四受任敵已滅晉書本傳武帝謀伐呉詔濬修舟艦濬乃作船於蜀太康元年正月發自成都二月壬寅入於石頭皓肉袒面縳收其圖籍封其府庫荀勗省吏議量能受任思不出位策勲名不彰左傳凡公行告於宗廟反行飲至舍爵策勲禮也晉書本傳王渾表濬違詔不受節度誣罪狀之桓温表濬建元勲於當年著嘉慶於身後居美未盡善晉書本傳范通謂濬曰卿功則美矣然恨所以居美者未盡善也矜功徒自傷晉書本傳濬自以功大而為渾父子及豪强所抑屢為有司所奏每進見陳其攻伐之勞及見枉之罪或不勝忿憤徑出不辭長㦸今何在晉書本傳濬嘗起宅開門前路廣數十步或謂之何太過濬曰吾欲使容長㦸旌旗衆咸笑之曰陳勝有言燕雀安知鴻鵠之志孤墳此路旁不觀松栢茂晉書本傳濬墓面别一門松栢茂盛空餘荆棘塲東征賦覩蒲城之丘墟兮生荆棘之榛榛歎嗟懸劒壠史記呉季札北過徐徐君好季札劒季札知之還至徐解劒繫墓樹而去水經注徐城外有墓昔延陵季子解劒於此所謂不違心許也誰識夢刀祥晉書本傳濬夜夢懸三刀於卧屋梁上須臾又益一刀濬驚覺意甚惡之主簿李毅再拜賀曰三刀為州字又益一刀明府其臨益州乎果遷為益州刺史過晉陽宫唐書髙祖紀大業十三年髙祖留守太原領晉陽宫監元和郡縣志帝堯始封於唐又徙晉陽即今太原也禹自安邑都晉陽至周成王以封弟叔虞是為晉侯中有三城其一曰大明城古晉陽城也傳言董安于所築東魏孝靜帝於此置晉陽宫隋又更名新城煬帝更置晉陽宫城髙四丈周迴七里緬想封唐處帝王世紀帝摯登位封異母弟放勲為唐侯詩唐文釋文唐者周成王之母弟叔虞所封也舊唐書髙祖紀皇祖虎後魏封隴西郡公周受禪追封唐國公髙祖以周天和元年襲唐國公實惟建國初周禮天官惟王建國辨方正位左傳天子建國諸侯立家俯察伊晉野易俯以察於地理詩唐風釋文漢曰太原郡在古冀州太行恒山之西太原太岳之野其南有晉水叔虞之子燮父因改為晉侯仰觀乃參虛易仰以觀於天文左傳遷賓沈於大夏主參唐人是因以服事夏商其季世曰唐叔虞當武王邑姜方震太叔夢帝謂已余命而子曰虞將與之唐屬諸參而蕃育其子孫及成王滅唐而封太叔焉故參為晉星唐書樂志太常卿韋萬石定凱安舞六變一變象龍興參墟井邑龍斯躍易改邑不改井陸雲詩修路無窮迹井邑自相循舊唐書髙祖紀武徳六年十二月以奉義監為龍躍宫城池鳳翔餘春秋運斗樞天樞得則鳯凰翔賈誼賦鳯凰翔於千仞兮覽徳輝而下之張衡東京賦龍飛白水鳯翔參墟林塘猶沛澤孟子沛澤多而禽獸也至注沛草木之所生臺榭宛舊居書惟宫室臺榭傳土髙曰臺有木曰榭運革祚中否庾信哀江南賦若江陵之中否乃金陵之禍始時遷命兹符傅遐皇初頌帝王之起必有天命瑞應自然之符顧循承丕基書厥子乃弗肯堂矧肯構蔡邕司空楊公碑祗愈服宏業克丕肯構北齊書文宣帝紀文襄承構廣前業怵惕多憂虞書怵惕惟厲易悔吝者憂虞之象也尚恐威不逮書懋乃后徳交修不逮復慮化未孚豈徒勞轍迹左傳昔穆王欲肆其心周行天下將皆必有車轍馬迹焉顔延之詩周御窮轍迹夏載奠山川所期訓戎車詩戎車既安如輊如軒周禮夏官戎僕掌馭戎車沈約詩戎車出細柳餞席遵上林習俗問黎人史記秦始皇紀遂登㑹稽宣省習俗黔首齋莊左思魏都賦情有險易者習俗之殊也視巡慰里閭左思魏都賦夾以府寺班之里閭永言念成功詩永言孝思書成允成功頌徳臨康衢列子堯治天下五十年微服遊於康衢聞兒童謠曰立我蒸民莫匪爾極不識不知順帝之則長懐經綸日易雲雷屯君子以經綸嘆息履庭隅艱難安可忘詩序七月陳王業也周公陳后稷先公風化之所由致王業之艱難也欲去良踟蹰詩愛而不見搔首踟蹰李陵詩執手野踟蹰行次成臯途經先聖擒建徳之所緬思功業感而賦詩漢書地理志河南郡成臯故虎牢元和郡縣志古東虢國鄭之制邑漢之成臯縣一名武牢開皇十八年改成臯為汜水縣一統志汜水縣在開封府鄭州西一百一十里舊唐書太宗紀武徳四年二月竇建徳以兵十萬來援世充至於酸棗太宗親率步騎趣武牢建徳自滎陽西上築壘於板渚以太宗屯武牢相持二十餘日太宗牧馬河北誘之建徳果悉衆而至陳兵汜水列陣自辰至午兵士逡巡斂退太宗親率輕騎追而誘之建徳迴師而陣未及整列太宗先登擊之生擒建徳於陣有隋政昬虐羣雄已交爭繆襲鐃歌芟夷鯨鯢驅羣雄先聖按劍起史記蘇秦傳韓王勃然作色按劍仰天嘆息唐太宗詩提劍鬱匡時叱咤風雲生史記淮隂侯傳項王喑啞叱咤千人皆廢魏志賈詡傳註指揮可以振風雲叱咤足以興雷電徐陵文叱咤而起風電吹嘘如倒山岳易雲從龍風從虎飲馬河洛竭左傳楚子北師次於郔將飲馬於河而歸史記封禪書秦公卜居雍後子孫飲馬於河遂都雍潘岳登虎牢山賦凴修阪兮停車臨寒泉兮飲馬晉書懐帝紀永嘉三年大旱江漢河洛皆竭可涉水經洛水出京兆上洛縣至鞏南而入河元和志鞏縣與成臯中分洛水西則鞏東則成臯作氣嵩華驚左傳夫戰勇氣也一鼔作氣再而衰三而竭初學記嵩高山者五岳之中岳也元和志在登封縣北八里初學記華山者五岳之西岳也括地志在華州華隂南八里華山記山頂有池生千葉蓮花服之羽化因曰華山克敵睿圖就左傳克敵必示子孫以無忘武功薛道衡隋髙祖頌尚想睿圖永惟聖則舊唐書太宗紀建徳陳兵汜水世充將陣於其南太宗謂諸將曰賊起山東未見大敵今度險而戰是無政令逼城而陣有輕我心我按兵不出彼乃氣哀陣久卒餓必將自退追而擊之無往不克吾與公等約必以午時後破之建徳列陣自辰至午兵士飢􅌒皆坐列又爭飲水逡巡斂退太宗擊之所向皆靡擒俘帝道亨唐書太宗紀武徳四年二月生擒建徳於陣六月凱旋太宗親披金甲陳鐵馬一萬騎甲士三萬人前後部鼔吹俘二偽主及隋氏器物輦輅獻於太廟莊子帝道運而無所積故天下歸劉峻辨命論驅貔虎奮尺劍入紫微升帝道顧慚嗣寳厯搜神記虞舜耕於厯山得玉厯於河際之巖舜知天命之在已體道不倦徐陵檄周文主上恭􅈾寳厯嗣奉瑤圖陸卬詩皇家膺寳厯兩地復㕘天顔師古詩七政璿衡始三元寳厯新恭承天下平漢書元帝紀恭承天地託於公侯之上禮記國治而后天下平幸過剪鯨地左傳古者明王伐不敬取其鯨鯢而封之以為大戮徐陵文鯨鯢俱剪又實剪長鯨感慕神且英庾信賀平鄴都表雖復八風並唱未足頌其英聲六樂俱陳無以歌其神武校獵義成喜遇大雪率題九韻以示羣臣按義成地名無攷唐書方鎮表貞元元年立義成軍在衞滑與此不合故不採入弧矢威天下易弦木為弧剡木為矢弧矢之利以威天下疏弧木弓也釋名矢指也言有所指向迅疾也旌旗遊近縣爾雅注旄首曰旌有鈴曰旗釋名析羽為旌熊虎為旂又旌精也言有精光也旗期也言與衆期於下也史記司馬相如傳方今田時重煩百姓已親見近縣一面施鳥羅史記殷本紀湯出見野張羅四面乃去其三面祝曰欲左左欲右右不用命乃入吾網呉志張紘傳注合肥城久不拔紘進計曰古之圍城開其一面以疑衆心今可小寛之以觀其變唐太宗詩旗旂四望合罝羅一面求紫玉歌南山有鳥北山張羅三驅教人戰易王用三驅疏三面著人驅禽班固東都賦舉烽伐鼓申令三驅殷仲文解尚書表申三驅於大信呉子教戰之令短者持矛㦸長者持弓弩强者持旌旗勇者持金鼓弱者給厮養智者為謀主暮雲成積雪後漢書郡國志注雲南縣西有山特髙與雲氣相連結五月霜雪皓然沈約詩蒼雲軫暮色詩傳豐年之冬必有積雪任昉詩土膏候年動積雪表辰暮曉色開行殿陶潛詩晨色奏景風蔡邕獨㫁乗輿所在曰行在所庾信華林園賦止立行宫裁舒帳殿皓然原隰同爾雅廣平曰原下濕曰隰不覺林野變宋書謝靈運傳古巢居穴處曰巖棲棟宇居山曰山居在林野曰丘園陸機詩嚴駕東征肅邁林野傅休奕鷹賦獨飛峙於林野兮復徘徊於天庭北風勇士馬詩北風其凉雨雪其滂古詩代馬依北風鮑照蕪城賦才力雄富士馬精妍東日華組練莊子日出於東方入於西極古樂府日出東南隅左傳組練三百被練三千謝朓元㑹曲分階赭組練充庭羅翠旂又登孫權故城詩北拒溺驂鑣西龕收組練觸地銀麞出漢書律歴志角觸也物觸地而出戴芒角也穆天子傳天子賜曹奴之鹿白銀之麞連山縞鹿見陶𢎞景尋山誌右連山而無際左憑海而齊天殷仲堪白鹿表白者正色鹿者景福嘉義月兔落髙矰張衡靈憲月者隂精之宗積而成獸象蟾兔劉孝綽林下暎月詩攅柯半玉蟾袤葉彰金兔廣韻矰弋射矢也莊子鳥髙飛以避矰弋之害星狼下急箭史記天官書九遊東大星曰狼下有四星曰弧直狼注弧九星在狼東南天之弓也以伐叛懷逺矢向狼既欣盈尺飛謝恵連雪賦盈尺則呈瑞於豐年注凡平地尺為大雪隠公之時大雪平地一尺是嵗大熟復憶磻谿便竹書紀年王將畋史徧卜之曰將大獲非熊非羆天遣大師以佐昌臣至於磻溪之水吕望釣於涯王下趨拜之曰望公七年乃今見光景於斯水經注渭水之右磻谿水注之其東南有石室葢太公所居也水流次平石釣處即太公垂釣之所也其投竿跽餌兩膝遺迹猶存是有磻谿之稱也嵗豐將遇賢楊潛初理論正月四方黄氣其嵗大豐宋書樂志嵗時豐衍九土樂昇平禮記聘名士禮賢者俱荷皇天眷書乃祖成湯克齊聖廣淵皇天眷佑誕受厥命徳宗皇帝帝諱适代宗長子初封奉節郡王廣徳二年立為皇太子善屬文尤長於篇什每與學士言詩於浴堂殿夜分不寐三令節御製詩勅羣臣賡和品第優劣四方貢藝者帝多親試或有乖謬濃筆㸃抹之稱㫖即翹足朗吟詫宰相曰此朕門生無不服帝之藻鑑焉在位二十五年諡曰孝中和節賜百官燕集因示所懐唐書徳宗以寒食多與上已同日欲以二月名節自我為古李泌請廢正月晦以二月朔為中和節文武百辟進農書以示務本與上已九日為三令節民間是日以青囊盛百穀相問遺號為獻生子至化恒在宥後漢書仲長統傳今欲張太平之紀綱立至化之基址齊民財之豐寡正風俗之奢儉非井田實莫由也晉書阮冲傳旁求俊乂以輔至化莊子聞在宥天下不聞治天下也在之也者恐天下之淫其性也宥之也者恐天下之遷其徳也不淫其性不遷其徳有治天下者哉保和兹息人易各正性命保合太和魏書崔浩傳恬神保和納御嘉福禮記既蜡而收民息已左傳晉侯歸謀所以息民魏絳請施舍輸積聚以貸自公以下茍有積者盡出之後漢書章帝紀冀以息事寧人敬奉天氣推誠撫諸夏中説周公推之以誠則不言而信與物長為春雲笈七籖使人陽達而不失於充日夜無隂而與物為春即是合而生時於心者也仲月風景煖禮記注有田者既祭又薦新祭以首月薦以仲月王勃兜率寺碑野曠川明風景扶江山之助禁城花柳新顔延之詩夙御嚴清制朝駕守禁城梁元帝詩牆髙舉不及花新摘未舒唐太宗詩未佩蘭猶小無絲柳尚新芳時協金奏梁元帝纂要春時曰芳時周禮鐘師掌金奏注擊鐘以為奏樂之節左傳楚子享卻至金奏作於下國語所以金奏散陽出滯也注太蔟正聲為商故為金奏顔延之五君詠達音何用深識微在金奏賜宴同羣臣北史韋師傳上召師與左僕射髙熲等於卧内賜宴令各叙舊事以為笑樂絲竹豈云樂蘇武傳絲竹厲清聲班固東都賦金石布絲竹和曹植詩顧視東西廂絲竹與鞞鐸左思詩何必絲與竹山水有清音劉孝綽詩九成變絲竹百戱起魚龍忠賢惟所親漢書元帝紀明王在上忠賢布職則羣生和樂方外蒙澤庶洽朝野意詩序政遇醇和則歡娯被於朝野晉書杜預傳陛下聖明朝野清宴曠然天下均漢書匡衡傳臣愚以為宜一曠然大變其俗後漢書班彪傳成王即位天下曠然太平重陽燕魏文帝與鍾繇書九為陽數而日與月並應故曰重陽早衣對庭燎鄒陽書始孝文皇帝寒心銷志未明求衣梁武帝詔兼晚冬晷促機事罕暇夜分求衣詩夜如何其夜未央庭燎之光周禮秋官凡邦之大事共墳燭庭燎注墳燭麻燭也躬化勤意誠詩序闗睢后妃之徳也世皆知文王能得内助而不知本於文王之躬化禮記意誠而后心正時此萬機暇書兢兢業業一日二日萬㡬梁武帝答周𢎞正詔萬機小暇試當討論適與佳節并魏文帝詩適與飄風㑹曹植冬至表千載昌期一陽佳節謝靈運擬鄴中集詩序天下良辰美景賞心樂事四者難并曲池潔寒流左思魏都賦疎圃曲池謝朓詩邑里向疏蕪寒流自清泚芳菊舒金英漢武帝秋風辭蘭有秀兮菊有芳孫楚菊花賦飛金英以浮㫖酒王筠詩菊花偏可喜碧葉媚金英乾坤爽氣滿易天尊地卑乾坤定矣世説西山朝來致有爽氣臺殿秋光清梁元帝鍾山飛流寺碑瞻洛陽之臺殿唐太宗秋日翠微宫詩秋光凝翠嶺凉吹肅離宫朝野慶年豐謝莊與世祖啟事檄至輒布之京邑朝野同欣里頌塗歌室家相慶左傳奉盛以告曰潔粢豐盛謂其三時不害而民和年豐也易林年豐嵗熟民人安息梁武帝詩年豐亷讓多髙㑹多歡聲史記項羽紀置酒髙㑹司馬相如上林賦魚鼈歡聲萬物衆夥永懐無荒戒良士同斯情詩維以不永懐又好樂無荒良士瞿瞿漢書呉王濞傳同情相求九月十八賜百寮追賞因書所懐雨霽霜氣肅國語辰角見而雨畢註辰角大星蒼龍之角星也寒露初朝見東方雨畢者雨氣盡也宋玉髙唐賦風止雨霽雲無處所詩九月肅霜註肅霜謂秋氣肅而霜降也天髙雲日明楚辭泬㵳兮天髙而氣清魏志公孫度傳註私從一隅永瞻雲日謝靈運詩雲日相輝暎繁林已墜葉應貞詩繁林收陽彩宻花解華叢謝靈運賦送墜葉於秋晏遲含萼於春初寒菊仍舒榮禮記季秋之月鞠有黄華夏小正榮鞠註鞠黄華華榮也謝莊月賦菊散芳於山椒嵇含銘煌煌丹菊季秋彌榮傳統妻辛女菊花頌英英麗草禀氣靈和春茂翠葉秋曜金華梁簡文帝長沙宣武王碑銘春藤絡户寒菊臨池懿此秋節時謝靈運歸塗賦時旻秋之杪節更延追賞情水經注吹畦風馨觸岫延賞池臺列廣宴漢武帝故事上行幸河東顧視帝京忻然中流與羣臣飲讌歡甚顔延之曲水詩序排鳳闕以髙遊開爵園而廣宴絲竹傳新聲禮記金石絲竹樂之器也漢書張禹傳性習知音聲後堂理絲竹管弦左思蜀都賦羽爵既競絲竹乃發晉書石崇傳絲竹盡當時之選史記李延年傳善歌為變新聲北堂書鈔文帝在摩陂劉子直能為新聲帝以屏隔之使合新韻古詩彈箏奮逸韻新聲妙入神至樂非外奬隂符經至樂性徐至靜性亷陸機招隠詩至樂非有假安事澆淳樸謝靈運詩沮障自可美容心非外奬江淹詩去矣從所欲得失非外奬浹歡同中誠禮記故酒食者所以合歡也史記孝文帝紀帝施徳恵天下填撫諸侯四夷皆洽歡庶敦朝野意永使風化清易聖人久於其道而天下化成書永清四海漢書薛宣傳御史大夫内承本朝之風化外佐宰相統理天下後漢書順帝紀遣侍中杜喬等八人分行州郡班宣風化舉實臧否送張建封還鎮唐書本傳貞元四年拜建封御史大夫徐泗濠節度使十三年來朝帝不待日召見延英殿元已賜宴曲江特詔與宰相同榻食其還鎮帝賦詩以餞時雖馬燧渾瑊劉元佐李抱真等勲寵卓越未有以詩餞者建封又賦詩以自儆勵牧守寄所重周禮太宰施典於邦國建其牧曲禮九州之長入於天子之國曰牧才賢生為時陸雲贈顧尚書詩行成世則才為時生宣風自淮甸後漢書遣侍中杜喬等八人分行州郡班宣風化舉實臧否禹貢導淮自桐栢東㑹於泗沂東入於海禮王制千里之内曰甸服鮑照詩登艫眺淮甸按建封以徐濠泗節度使鎮徐州陳師道記徐州南通江淮授鉞膺藩維東京賦授鉞四七共工是除摯虞新禮儀漢魏故事遣將出征符節郎授鉞於朝堂王巾頭陀寺碑觀政藩維樹風江漢資治通鑑綱目李泌以江淮漕運自淮入汴以甬橋為咽喉李納一旦竊據徐州則失江淮矣請徙張建封鎮徐州入覲展遐戀禮春見曰朝秋見曰覲臨軒慰來思漢書天子自臨軒文選註天子御平臺曰臨軒詩烝然來思忠誠在方寸徐陵勸進表忠誠貫於日月孝義成於冰霜蜀志徐庶辭先主而指其心曰本欲與將軍共圖王霸之業者以此方寸之地也今方寸亂矣感激陳情詞後漢書朱穆傳論専諸荆卿之感激侯生豫子之投身蔡邕琴賦感激絃歌一低一昂阮籍詩感激生憂思萱草謝蘭房劉琨重贈盧諶詩鄧生何感激千里來相求楚辭願陳情以自行兮報國原所向忠經有報國篇曹植詩思一効筋力糜軀以報國恤人予是資左傳又不能字人之孤而恤之歡宴不盡懐謝瞻詩懽餘宴有窮莊子有問而應之盡其所懐車馬當還期謝靈運詩理棹遄還期穀雨將應候孝經緯清明後十五日斗指辰為穀雨行春猶未遲謝承後漢書鄭𢎞為臨淮太守行春白鹿方道夾轂而行勿以千里遙禮記自江至於衡山千里而遙自東河至於東海千里而遙陶潛詩千里雖遙孰敢不至而云無已知論語不患莫已知御選唐詩巻一
