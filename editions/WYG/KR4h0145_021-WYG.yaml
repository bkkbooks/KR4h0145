body:
  text: 欽定四庫全書御選唐詩巻十六五言律賈島字浪仙范陽人初為浮屠韓愈教其為文遂舉進士詩思人僻當其苦吟雖逢公卿不之覺也憶江上吳處士荀子古之所謂處士者徳盛者也能靜者也修正者也知命者也著是者也晉書天文志少微四星在太微西南第一處士星閩國揚帆去周禮職方氏疏叔熊避難於濮蠻墮其俗後分七種謂之七閩史記東越傳閩越王無諸及越東海王搖者皆越王勾踐之後也秦併天下以其地為閩中郡謝靈運詩揚帆采石華挂席拾海月劉潛詩揚帆乘浪華噪鼓要風力蟾蜍虧復團後漢書天文志注羿請藥於西王母姮娥竊之以奔月是為蟾蜍五經通義月中有兔與蟾蜍何也兔隂也蟾蜍陽也而與兔並明隂係陽也唐太宗望月詩輪虧鏡彩缺吳均賦挂皎月而常團駱賔王秋月詩雲披玉繩淨潮滿鏡輪團杜審言月詩暫將弓並曲翻與扇俱團秋風吹渭水楚辭嫋嫋兮秋風江淹詩烟光拂夜色華舟盪秋風沈約詩夏雲清朝景秋風揚早蟬吳均詩風吹承露臺山海經鳥鼠同穴之山渭水出焉而東流注于河河圖括地象鳥鼠同穴山地之幹也渭水出其中後漢書郡國志隴西郡渭水所出東流長安落葉滿長安陸機文賦悲落葉於勁秋陶潛詩櫚庭多落葉三輔黄圖三輔共治長安城中班固西都賦漢之西都實在雍州名曰長安梁元帝賦洛陽小苑之西長安大道之東此地聚㑹夕劉繪詩江山信多美此地最為神庾信遊山詩道士封君達仙人丁令威煑丹於此地居然未肯歸漢書地理志鄭土陿而險山居谷飲男女亟聚㑹何遜詩一同心賞夕暫解去鄉愁杜甫詩披霧初歡夕髙秋爽氣澄當時雷雨寒孫萬夀詩當時金谷裏昔日平陵東易天地解而雷雨作雷雨作而百果草木皆甲拆晉書天文志栁八星主雷雨左思魏都賦雷雨窈㝠而未半皦日籠光於綺寮阮籍賦寒雨淪而下降王昌齡詩寒雨連江夜入吳蘭橈殊未返廣韻橈楫也梁簡文帝采蓮曲桂楫蘭橈浮碧水江花玉面兩相似梁元帝采蓮賦水濺蘭橈蘆侵羅􅳭庾信詩錦纜迴砂磧蘭橈避荻洲李白金陵江上遇蓬池隠者詩羅浮麻姑臺此去或未返消息海雲端蔡琰詩迎問其消息輒復非鄉里梁元帝詩欲覔行人寄消息駱賔王詩鴻來雁度無消息杜甫詩碧知湖外草紅見海東雲古善哉行淮南八公要道不煩叅駕六龍游戲雲端陸機詩乘風逺遊騰雲端謝朓詩雲端楚山見林表吳岫微題李凝幽居閒居少隣並禮記孔子閒居子夏侍文中子子謂賈瓊王孝逸凌敬曰諸生何樂瓊曰樂閒居曹植賦靜閒居而無事潘岳閒居賦序乃作閒居賦以歌事遂情焉孟浩然詩行樂悵無隣南史陸慧曉傳慧曉與張融並宅草逕入荒園南史孔惇之傳茅室蓬户庭草蕪徑劉孝威詩丹庭斜草逕王勃詩小逕偏宜草陶潛歸去來辭田園將蕪何不歸謝莊北宅秘園詩窮園自荒深唐太宗詩園荒一徑㫁鳥宿池中樹説苑樹髙者鳥宿之枚乘七發朝則鸝黄鳱鴠鳴焉暮則羈雌迷鳥宿焉魏文帝詩離鳥夕宿在彼中洲西京雜記積草池中有珊瑚樹一本三柯又孤樹池中有洲洲上煔樹一株六十餘圍望之重重如蓋謝靈運樂府鬱鬱河邊樹僧敲月下門庾信詩山僧或見尋陶潛詩叩門拙言辭王維宫槐陌詩譍門但迎掃畏有山僧來李白詩㑹向瑤臺月下逢隋唐嘉話島初赴舉京師一日於馬上得句云鳥宿池中樹僧敲月下門初欲作推字練之未定不覺衝尹時韓吏部權京兆左右擁至前島具告所以韓立馬良久曰作敲字佳矣過橋分野色杜甫詩攜錢過野橋謝朓詩月隂洞野色宋之問詩野色遍呈秋李白詩芳草換野色移石動雲根論衡湍瀨之流沙石轉而大石不移何者大石重而沙石輕也南史到溉傳溉齋前有竒礓石帝戲與賭之溉輸焉即迎置華林園移石之日都下縦觀所謂到公石也張協詩雲根臨八極沈君攸桂檝泛河中詩渺渺雲根侵逺樹暫去還來此郭璞詩去來山林客孟浩然詩岩扉松徑長寂寥惟有幽人自來去幽期不負言謝靈運撰征賦石幽期而知賢案石謂黄石公古詩誓天不相負劉歆新序論文不負原之期案文謂晉文圍原期以三日不爽約而原降公羊傳荀息可謂不食其言矣賈充詩若能不食言與君同所宜暮過山村數里聞寒水水經注渚水濖漲方數里又聲聞數里十八拍夜聞隴水兮聲鳴咽王僧孺詩夜風入寒水沈約詩開襟濯寒水山家少四鄰呉均山中詩山中自有宅李爽山家閨怨詩山中無早梅荆扉達曙開左傳諸侯守在四鄰李白詩蒼茫空四鄰怪禽啼曠野埤雅䲭鵂釋鳥所云怪䲭是也陳後主詩啼禽靜或諠詩匪兕匪虎率彼曠野阮籍詩登髙望九州悠悠分曠野陸機詩野途曠無人落日恐行人謝朓詩落日飛鳥逺又藩日髙城上梁元帝詩欲覔行人寄消息何遜詩寂寂行人疎初月未終夕向遜七召映景星于初月謝靈運詩眷西謂初月謝朓送神曲雨㝠㝠又終夕邊烽不過秦後漢書祭肜曰卧鼔於邊庭滅烽於幽嶂張協詩烽火列邊亭地理通釋秦形勝之國也帶河阻山縣隔千里持㦸百萬秦得百二焉地勢便利其以下兵於諸侯譬猶居髙屋之上建瓴水也杜甫秦州雜詩西征問烽火又沱江不向秦蕭條桑柘外淮南子蕭條者形之君寂寞者音之主也楚辭山蕭條而無獸兮江淹詩適見葉蕭條禮記命野虞毋伐桑柘潘岳詩桑柘何奕奕李嶠詩鬱鬱桑柘繁烟火漸相親史記律書天下殷富粟至十餘錢鳴雞吠狗烟火萬里可謂和樂者乎江淹詩歸人望烟火穉子候簷隙王縉詩南過竹里館日與道相親宿孤館落日投村戍謝靈運撰征賦望新晴於落日王維詩髙城眺落日極浦映蒼烟廣韻戍舍也從人荷戈也杜甫詩日色隠孤戍愁生為客途杜甫詩江草日日喚愁生儲光羲詩河洲多青草朝暮増客愁梁昭明太子詩行客行路遥王灣詩客路青山外寒山晴後緑謝靈運詩南州實炎德桂樹陵寒山王維詩寒山轉蒼翠秋水日潺湲崔顥遊天竺詩青翠滿寒山藤蘿覆冬沼張九齡詩試上江樓望初逢山雨晴秋月夜深孤顧愷之詩秋月揚明輝陶潛詩叩枻新秋月臨流别友生陸彦章月夜詩明月偏憐汝幽人獨夜深梁簡文帝詩夕波照孤月杜甫詩永夜月同孤孟浩然詩開軒琴月孤橘樹千株在杜甫詩楓林橘樹丹青合盧綸詩橘樹當家童襄陽耆舊傳李衡作宅於武陵龍陽汎洲上種橘千株勅其子曰吾有千頭木奴不責汝衣食嵗上一匹絹可以不貧矣沈約郊居賦李衡則橘林千樹石崇則雜果萬株李華文千株茂樹百道春泉漁家一半無王維詩漁家伐釣竿劉長卿詩漁家帶夕陽李嘉祐詩漁家足水禽唐太宗望雪詩迎風一半斜王維詩秦川一半夕陽開自知風水靜杜甫詩窮冬急風水逆浪開帆難陶𢎞景尋山志日斜雲而色黛風過水而安流庾信詩日落江風靜王勃詩日落山水靜為君起松聲舟繫岸邊蘆杜甫詩孤舟一繫故園心又繫舟今夜逺崔國輔詩泗水入淮處南邊古岸存何遜詩沙汀暮寂寂蘆岸晚修修大戴禮葦未秀為蘆憶吳處士半夜長安雨淮南子雞知將旦鶴知夜半古樂府嚴霜半夜落班固西都賦漢之西都乃在雍州名曰長安杜甫詩夜雨翦春韭燈前越客吟劉邈詩燈前裁獸錦史記陳軫傳越人莊舄仕楚而病楚王曰舄故越人也亦思越否中謝對曰凡人之思故在其病也彼思越則越聲不思越則楚聲使人往聽之猶尚越聲也謝靈運詩越客腸今㫁王粲登樓賦莊舄顯而越吟孤舟行一月陶潛詩渺渺孤舟逝劉長卿詩寒雨泊孤舟李白詩山逐泛舟行詩一月三㨗萬水與千岑宋之問詩豈意南中岐路多千山萬水分鄉縣廣韻山小而髙曰岑島嶼夏雲起左思吳都賦島嶼綿邈江總賦望島嶼之邅迴晉子夜歌昔别春風起今還夏雲浮盧思道詩夏雲樓閣起汀洲芳草深楚辭搴芳洲兮杜若古辭長樂戲汀洲隂鏗詩汀洲浪已息古詩涉江採芙蓉蘭澤多芳草陸機詩芳草忽已茂何當折松葉庾肩吾詩何當風日好目極長沙垂爾雅樅松葉拍身本草松葉有一鬛五鬛七鬛拂石剡溪隂梁簡文帝謝賚袈裟啓拂石慚華裁金非重庾肩吾詩天衣初拂石世説王子猷居山隂夜大雪忽憶戴安道時安道居剡即便夜乘小船就之一統志剡溪在嵊縣治南一名戴溪唐太宗詩溪隂寸寸生孟浩然詩雲度綠溪隂姚合郡中西園西園春欲盡後漢書馬融傳宿麒麟於西園魏文帝芙蓉池詩乘輦夜行遊逍遙步西園李白長干行八月蝴蝶來雙飛西園草王融詩春盡風颯颯孟浩然詩林卧愁春盡開軒覽物華李白詩别來門前草春盡秋轉碧庾信詩夏餘花欲盡芳草逕難分西都賦竹林果園芳草甘木孫綽蘭亭後序藉芳草鑑清流崔顥詩芳草萋萋鸚鵡洲張正見詩草長三徑合楊師道詩芳草無行逕殷遙詩暗草侵苔徑晴楊掃石磯朱异詩耿耿樵路分靜語唯幽鳥李嶠詩巷靜逰禽入門閒過客稀後漢書蔡邕傳伯翳綜聲於鳥語幽明錄五月五日翦鸜鵒舌教學人語無所不名杜甫詩日長惟鳥雀詩出自幽谷遷于喬木劉禹錫詩晝長幽鳥喧閒眠獨使君漢書汲黯傳黯拜淮陽太守不受印綬上曰淮陽吏民不相得吾徒得君重卧而治之隂鏗詩獨眠雖已慣岑參詩有時著書暇盡日窓中眠後漢書冦恂傳使君建節銜命以臨四方三國志曹公從容謂先主曰天下英雄唯使君與操耳晉書桓伊傳使君於此不凡古樂府使君從南來宻林生雨意謝靈運詩宻林含餘清逺峯隠半規孟浩然詩飛猿嘯宻林顔延之詩山烟冒壠生劉孝威詩雲樹交為宻雨日共成虹詩藴隆蟲蟲疏暑氣藴藴然雷聲隆隆然熱氣蟲蟲然如此無復雨意古石帶苔文隂鏗詩古石何年卧枯樹幾春空唐太宗詩古石衣新苔新巢封古樹王績詩崩榛横古蔓荒石擁寒苔王融迴文斜峯繞逕曲聳石帶山連常建詩藥院滋苔文雖去清秋逺殷仲文詩獨有清秋日能使髙興盡杜甫詩清秋望不極迢遞起層隂史記中間相去不甚逺謝靈運詩不惜去人逺朝朝見白雲髙唐賦朝朝暮暮陽臺之下梁簡文帝詩綠葉朝朝黄陳後主詩瓊樹朝朝新唐書狄仁傑傳仁傑登太行山反顧見白雲孤飛孔椎珪文白雲誰侣陶𢎞景詩山中何所有嶺上多白雲孔紹安詩欲識相思處山川間白雲過靈泉寺水經注華嶽靈泉二所一名蒲池西流注於澗一名太上泉東注澗下上官神廟近東北隅偶尋靈跡去宋之問詩徒尋靈異跡周顧愜心目江淹文靈跡深潭江總攝山栖霞寺碑銘我開梵宇面壑臨丘我圖靈跡果植因修宋之問詩古今信靈跡中州莫與京幽徑入氲氛庾信詩幽徑忽春臨胡師耽詩墮葉積幽徑廬山記孤峯秀起游氣籠其上則氛氲若烟沈約詩氛氲屢迴沒轉壑驚飛鳥謝朓遊山詩凌崖必千仞尋壑將萬轉張九齡詩濺沫驚飛鳥穿山踏亂雲呉均詩山上萬重雲庾信詩山深雲濕衣王筠詩連山捲亂雲宋之問詩間闗踏雲雨水從巖下落水經注瀑布垂巖懸河注壑謝靈運詩巖下雲方合張九齡望瀑布水詩閃閃青崖落溪向寺前分廬山道人石門詩序清泉分流而合注水經注溪水自湖兩分釋子遊何處水經注脩脩釋子渺渺禪棲徐陵雙林寺碑釋子彈琴歌為千偈而已長阿含經聞四子端正曰此真釋子也陶潛詩今復在何處庾信詩何處更相尋空堂日漸曛司馬相如賦日黄昬而絶望兮長獨託於空堂阮籍詩徘徊空堂上江淹詩孤景吟空堂庾肩吾詩林殿日先曛蘇頲詩蘿翳漸移曛秋夜月中登天壇禮記燔柴於泰壇祭天也後漢書祭祀志注上帝壇圜八觚徑五丈髙九尺李益詩朝遊碧峯三十六夜上天壇月邊宿秋蟾流異彩顧愷之詩秋月揚明輝江淹别賦秋露如珠秋月如珪後漢書天文志注羿請藥於西王母姮娥竊之以奔月是為蟾蜍五經通義月中有兔與蟾蜍應瑒