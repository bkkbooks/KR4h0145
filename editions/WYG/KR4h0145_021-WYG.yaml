有多門郃陵王啓髙門洞啓不因銅馬之飾唐明皇詩元元妙門啓初地本無程法苑珠林十地頌曰如竹破初節餘節速能破得初地真智諸地即當得解琬詩瑞塔臨初地劉長卿詩已依初地長杜甫詩山行有常程回步忽山盡謝偃賦始綽約以迴步顧況詞回步遊三洞朱超詩落照依山盡王之渙詩白日依山盡萬縁從此生傳燈錄達摩謂二祖汝但外息諸緣可以入道二祖從此皆息萬緣心如枯木郎士元詩心持半偈萬縁空六言律韓翃送陳明府赴淮南書導淮自桐柏漢書諸侯王年表北界淮瀕畧廬衡為淮南唐書地理志淮南採訪使治揚州初學記淮南道者禹貢揚州之域又得荆州之東界自淮以南畧江而西盡其地也年華近過清明陳叔達詩玉律動年華孝經緯春分後十五日斗指乙為清明淮南子距冬至四十五日條風至條風至四十五日明庶風至明庶風至四十五日清明風至皇甫冉詩已度清明節落日微風送行謝靈運撰征賦望新晴於落日李白詩烟花宜落日絲管醉春風吳均詩獵獵起微風又李白詩送行駐金羈髙適詩無那春風欲送行黄鳥綿蠻芳樹詩綿蠻黄鳥傳綿蠻小鳥貌詩義疏黄鳥鸝鶹或謂黄栗留幽州謂之黄鶯阮㙖詩黄鳥鳴髙桑盧照鄰詩出谷有綿蠻韋應物詩綿綿蠻蠻如有情宋之問詩芳樹搖春晚李嶠詩芳樹雜花紅紫騮躞蹀東城詩騏騮是中箋馬赤身黒鬣曰騮陳後主詩蹀躞紫騮馬又陳後主樂府蹀躞紅塵飛李白詩暫出東城邊花間一杯促膝徐悱妻劉氏詩戲蝶花間舞蘇頲詩往往花間逢綵石晉書嵇康傳濁酒一杯彈琴一曲庾信詩眼前一杯酒南史王瞻傳嘗詣劉彦直曰引滿促膝唯余二人何遜詩促膝今何在銜杯誰復同烟外千里含情梁簡文帝詩浮烟槐外通沈約詩以我徑寸心從君千里外劉長卿詩故人千里道滄波一年别杜甫詩漸衰那此别忍淚獨含情應渡淮南信宿隋煬帝早渡淮詩淮甸未分色李白詩復作淮南客因逢桂樹留詩於汝信宿傳宿猶處也再宿曰信諸侯擁斾相迎孟浩然詩行縣擁諸侯儲光羲詩今之太守古諸侯出入雙旌垂七旒劉長卿詩長驅擁斾旌易林我有好爵與喜相迎源乾曜詩歡娛此無限詩酒自相迎盧綸送萬臣把酒留君聽琴杜甫詩把酒從衣濕丁仙芝詩醉後留君待明月禮記君子聽琴瑟之聲則思志義之臣李孝貞鳴雁行聽琴旋蔡子難堪嵗暮離心詩曰歸曰歸嵗亦暮止顔延之詩嵗暮臨空房涼風起坐隅楚詞衆駭遽以離心兮又何以為此伴也宋孝武帝詩連嵗矜離心今茲幸良集霜葉無風自落謝靈運詩曉霜楓葉丹范雲詩霜葉㫁霜枝張正見賦風落新枝霜飛故葉秋雲不雨空隂鮑照詩散漫秋雲逺蕭蕭霜月寒栁惲詩亭臯木葉下隴首秋雲飛易宻雲不雨易林不風不雨白日皎皎唐太宗詩雲空㸃綴隂人愁荒村路細沈約詩望逺使人愁孫萬夀詩人愁慘雲色隂鏗詩村路入江窮杜甫詩石古細路行人稀馬怯寒溪水深江淹别賦馬寒鳴而不息庾信詩寒水細澄沙沈約詩溪水徒自清張衡詩我所思兮在桂林欲往從之湘水深隋煬帝詩蟬鳴秋氣近泉吐石溪深望盡青山獨立水經注望諸山畧盡其勢謝朓詩還望青山郭江總詩青山去去愁梁武帝詩嬌怨獨立特為誰更知何處相尋庾信詩不知何處天邊又何處更相尋李德林詩相尋欲逐名温庭筠字飛卿太原人宰相彦博裔孫工為詞章小賦與李商隠齊名稱温李然行無檢愊數舉進士不第思神速每入試押官韻作賦凡八叉手而成時號温八又徐商鎮襄陽署為巡官不得志去歸江東後商知政事欲白用㑹商罷相楊收疾之貶方城尉再遷隋縣尉送李億東歸黄山逺隔秦樹漢書地理志右扶風槐里縣有黄山宫張衡西京賦掩長楊而聨五柞繞黄山而欵牛首王維詩黄山舊繞漢官斜李白詩雲陽一去已逺隔杜甫詩兩行秦樹直紫禁斜通渭城張衡西京賦正紫宫於未央謝莊文掩影瑤光收華紫禁韓翃詩緑水斜通宛轉橋水經注太史公曰長安故咸陽也髙帝更名新城武帝别為渭城别路青青栁弱徐陵詩朱鳶别路遙王勃詩去驂嘶别路王維詩渭城朝雨裛輕塵客舍青青栁色新杜審言詩烟銷垂栁弱霧巻落花輕前溪漠漠苔生樂府前溪歌憂思出門倚逢郎前溪度謝朓遊東田詩逺樹暖阡阡生烟紛漠漠梁元帝詩露出浦流紅苔生岸泉緑沈約詩賔階緑泉滿客位紫苔生和風澹蕩歸客王羲之蘭亭序惠風和暢陶潛詩日暮天無雲春風扇微和杜甫詩吹面受和風鮑照白紵曲春風澹蕩佚思多謝靈運詩歸客謝海隅落月殷勤早鶯鮑照舞鶴賦星翻漢迥曉月將落杜甫詩落月在屋梁司馬遷報任少卿書未嘗銜杯酒接殷勤之餘惟李白詩惜别空殷勤梁書蕭子顯傳風動春朝月明秋夜早雁初鶯開花落葉孫萬夀詩幽谷早鶯鳴灞上金樽未飲三輔黄圖霸水出藍田谷西北入渭霸橋在長安東跨水作橋漢人送客至此橋折栁贈别史記髙帝紀漢元年十月沛公兵遂先諸侯至霸上謝靈運詩金尊盈清湑陳子昂詩金樽對綺筵梁簡文帝與蕭臨川書黒水初旋未申十千之飲讌歌己有餘聲北齊書宋游道傳時將還鄴㑹霖雨行旅擁於河橋遊道於幕下朝夕讌歌杜甫詩吟多意有餘陶潛詩來雁有餘聲文心雕龍韻氣一定故餘聲易遣御選唐詩巻十六
