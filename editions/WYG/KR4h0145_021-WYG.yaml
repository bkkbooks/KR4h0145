經有四等之果一曰須陁洹二曰斯陁含三曰阿羅含四曰阿羅漢阿羅漢已上至菩薩者深見佛性以至成道太極眞人歌勤研𤣥中思道成更相過阮籍達莊論形神在我而道可成題沈道士新亭何處好攀躋小長干曲君家住何處崔顥詩日暮鄉闗摯何處是元結詩問我常偃息泉上何處好虞賦攀招搖而上躋兮岑參詩山髙徒仰止不得日攀躋新亭俯舊溪庾信詩樹似新亭岸杜甫詩新亭結搆罷張華詩俯臨緑水流岑參詩悔别青山憶舊溪座中千里近盧僎詩吹笙玉座中禮記自恒山至于南河千里而近自南河至于江千里而近簷下四山低陶潛詩藍縷茅簷下未足為髙棲吳均詩蜘蛛簷下挂水經注浙江又東逕靈隠山山在四山之中謝靈運山居賦四山周迴雙流逶迤岑參詩玉壘天晴望諸峯盡覺低小浦依林曲劉楨京口記過長岡五里得屠兒浦者昔諸屠兒居此小浦因以為名也薛道衡詩曲浦騰烟霧任昉文依林構宇傍巖拓架杜甫詩結宇依空林范雲詩乃鑒長林曲回塘繞郭西南都賦收歡命駕分背迴塘梁簡文帝詩泛水入迴塘又迴塘繞碧莎杜甫雨詩正灑郭西田桃花春滿地禮記仲春之月桃始華王維詩水上桃花紅欲然李白詩池花春映日釋氏通鑑樂聲振空雨花滿地歸路莫相迷陶潛詩行行循歸路計日望舊居謝靈運詩始得傍歸路杜甫莫相疑行不爭好惡莫相疑徐安貞詩唯愁仙路迷若邪春興水經注若邪溪水上承嶕峴麻溪溪之下孤潭周數畝下注若邪溪水至清照衆山倒影窺之如畫一統志若邪溪在紹興府城東南二十五里與鏡湖合西施採蓮歐冶鑄劍於此春生若溪水春秋繁露少陽因木而起助春之生也陸機周處碑春水方生揮插同於雲雨杜甫詩好雨知時節當春乃發生李白詩宛似雲門對若溪王維詩言入桃花川每逐青溪水雨後漫流通淮南子春風至則甘雨降元稹詩繞郭烟嵐新雨後仲長統昌言澶漫瀰流無所底極宋之問詩漸見江勢濶行嗟水流漫蕭琛詩荆吳渺何際烟波千里通芳草行無盡班固西都賦竹林果園芳草甘木杜甫詩但訝鹿皮翁忘機對芳草左思吳都賦草則布濩臯澤蟬聨陵丘夤縁山岳之岊羃䍥江海之流清源去不窮張衡賦旦余沐于清源兮晞余髪於朝陽沈約詩清源泛緑苔杜甫詩湛湛長江去枚乘七發汨乘流而下降兮或不知其所止野烟迷極浦梁簡文帝詩古樹無枝葉荒郊多野烟劉禹錫詩揚子江頭烟景迷九歌望涔陽兮極浦江淹詩停艫望極浦斜日起微風梁簡文帝詩斜日晚駸駸虞世南詩緑野明斜日青山淡晚烟吳筠詩獵獵起微風數處乘流望左思吳都賦汨乘流以砰宕何遜詩單艫時向浦獨楫乍乘流髙適詩春流自茲逺倚楫時一望依稀似剡中李賀詩依稀和氣排冬嚴一統志漢剡縣地屬㑹稽郡南史隠逸傳㑹稽剡縣多名山晉書王徽之字子猷嘗雪夜泛舟剡溪訪戴安道造門即返或問之曰乘興而來興盡而返李白詩此行不為鱸魚膾自愛名山入剡中僧泚大厯時人北原别業野外車騎絶杜甫詩野外堂依竹籬邊水向城又不愁野外無供給史記蘇秦傳過洛陽車騎輜重諸侯各發使送之甚衆又司馬相如傳相如之臨卭車騎雍容閒雅甚都陶潛詩結廬在人境而無車馬喧古原松柘隂李商隠詩驅車登古原潘岳詩春草鬱青青松柘何奕奕江淹詩翩翩征鳥翼蕭蕭松柏隂流鶯出谷靜張説詩繞殿流鶯凡幾樹賈至詩百囀流鶯繞建章詩出於幽谷遷於喬木梁昭明太子啓啼鶯出谷爭傳求友之音李白詩花飛出谷鶯陳書武帝紀谷靜山空春草閉門深謝靈運詩池塘生春草後漢書陳寔傳閉門懸車棲遲養老孟浩然詩吾昔與爾輩閉門常讀書杜甫詩草深迷市井王維詩一向石門裏任君春草深學稼農為業論語樊遲請學稼子曰吾不如老農漢書蕭望之傳杜陵家世以農為業忘情道作心晉書王衍傳聖人忘情最下不及於情情之所鍾正在我輩髙適詩感時常激切於己即忘情王僧達詩珪璋既文府精理亦道心李端詩月明潭影澄空性夜靜猿聲證道心因知上皇日詩譜序詩之興也諒不於上皇之世疏上皇謂伏羲三皇之最先者王績詩何忝上皇人沈約詩堯年舜日歡無極鑿井在雲林擊壤歌日出而作日入而息鑿井而飲耕田而食李白詩鑿井當及泉儲調光羲詩清露洗雲林孟浩然詩雲林有同法振大厯貞元間以詩名越中贈程先生紗帽度殘春宋書徐瑗曰帽名猶冠也古者有冠無幘冠下有纚以繒為之後世施幘於冠因裁纚為帽隋書禮儀志帽自天子下及士人通冠之以白紗者名髙頂帽又有繒皂雜紗為之髙屋下裙蓋無定准鮑令暉詩經秋復度春李嘉祐詩山木暗殘春虛舟寄一身陶潛詩虚舟縱逸棹回復遂無窮謝靈運詩溟漲無端倪虚舟有超越晉書託虛寂以寄身世説一身之外無長物溪邊逢越女韋元旦賦越女浣紗眇鮮明之莫及李白詩西施越溪女出自苧羅山杜甫詩越女天下白鑑湖五月涼花裏問秦人王融詩花裏寄春情陶潛桃花源記太元中武陵人捕魚忽逢桃花林林盡便得一山捨舟從口入其中種作人見漁人問所從來便要還家自云秦時來此絶境古塞連山靜岑參詩古塞千年空隂山獨崔嵬崔國輔詩山深古塞秋水經注兩岸連山畧無闕處沈約樂府連山無斷絶易疏艮象山山體靜止故留止也隂霞落海新謝靈運詩水宿淹晨暮隂霞屢興沒王籍詩隂霞生逺岫王勃滕王閣序落霞與孤鶩齊飛杜審言詩雲霞出海曙有時城郭去陶潛詩有時不肯言釋名城盛也盛受國都也又郭廓也廓落在城外也汲冡周書城郭溝渠髙厚是量陸機樂府命駕登北山延佇望城郭暗與酒家親淮南子酤酒買肉不離屠酟之家列仙傳酒客梁市上酒家客也杜甫飲中八仙歌李白一斗詩百篇長安市上酒家眠曹植酒賦和睚眥之宿憾雖怨讐其必親處黙初與貫