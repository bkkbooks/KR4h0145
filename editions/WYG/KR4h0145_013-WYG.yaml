恵王元年于成都置蜀郡因蜀山以為名也鮑照賦山森森兮萬重江淹文山濃淡而萬重仙經最説青城峯江淹望江上諸山詩海外果可學嵗暮誦仙經青城山記岷山連峯接岫千里不絶青城乃第一峯也此山前號青城後曰大面山其實一耳河圗括地象白沙一百八景青城三十六峯青城嶔岑倚空碧楚辭嶔岑碕礒兮硱磳磈硊水經注積石嵯峨嶔岑隠阿沈烱賦其山也則嶔岑㠑㟴巖㟬婆陀或孤峯而秀聚或逸出而横羅釋智炫詩秀嶺接重烟嶔岑上半天江淹詩野田田而虚翠水湛湛而空碧逺壓峩眉呑劍壁益州記峨眉山在揵為南安縣界去成都千里秋日清澄望見兩山相峙如蛾眉焉名山記益州西南青城山山形如城其山有崖舍赤壁南連峨眉山一統志峨眉山在眉州城南二百里來自岷山連岡疊嶂延袤三百餘里至此突起三峯其兩山對峙宛若蛾眉張載劍閣銘是曰劍閣壁立千仞元和志劍閣道自利州益昌縣界而南十里至大劍鎮合今驛道鎮在劍州東四十八里其山峭壁千丈下瞰絶澗飛閣以通行旅寰宇記小劍城在利州益昌縣西南五十里水經注云益昌縣有小劍城去大劍城三十里連山絶險飛閣通衢故謂之劍閣也劍州劍門縣諸葛武侯相蜀于此立劍門以大劍山至此有隘束之路故曰劍門㫁統志大劍山在保寧府劍州北三十里其山峭壁中兩崖相嶔如門之闢如劍之植又名劍門山又小劍山與大劍山相屬大劍雖號天險徑路頗夷小劍則鑿石架閣有不容越者錦屏雲起易成霞一統志錦屏山在保寧府城南三里江南岸上兩峯花木間雜故名淮南子山致其髙而雲起焉宋孝武帝詩霏雲起兮汎濫謝朓遊後園賦山霞起而削成江淹詩雲霞冠秋嶺古三墳雲起流霞玊洞花明不知夕青城山記山有七十二小洞應七十二候有八大洞應八節福地記青城洞周迴二千里雲笈七籖十大洞天者處大地名山之間羣仙統治之所五曰青城山洞庾信文青城仙洞黄石祠壇陳後主詩花照逺林明陳子良詩峯逈雜花明謝偃賦當霽夕而愈曉星臺二妙逐王師楊秉疏先王建國順天制官太微積星名為郎位入奉宿衞出牧百姓晉書衞瓘傳瓘拜尚書令與尚書郎索靖俱善草書時人號為一臺二妙詩於鑠王師阮瑀軍書王粲詩魏志王粲傳陳留阮瑀字元瑜少受學於蔡邕建安中太祖以為司空軍謀祭酒管記室軍國書檄多瑀所作也典畧太祖初征荆州使瑀作書與劉備及征馬超又使瑀作書與韓遂此二書今俱存又太祖嘗使瑀作書與韓遂時太祖適近出瑀隨従因於馬上具草書成呈之太祖􅒆筆欲有所定而竟不能増損庾信銘翩翩書記則阮瑀陳琳魏志王粲傳粲字仲宣山陽髙平人也著詩賦論議六十篇又太祖紀建安二十年三月公西征張魯十一月魯降公自南鄭還是行也侍中王粲作五言詩以美其事日落猿聲連玉笛謝靈運詩日落當棲薄繫纜臨江流鮑照詩日落嶺雲歸延頸望江陰水經注巴東三峽巫峽長猿鳴三聲淚沾裳徐嶷詩白雲連鳥道青壁遞猿聲梁簡文帝詩笛聲下復高猿啼㫁還續西京雜記秦咸陽有玊笛長二尺三寸二十六孔吹之則見車馬山林隠隠相次息亦不見名曰昭華之琯晴來山翠傍旌旗蕭鈞詩山翠餘烟積川平晚照收庾肩吾詩水光懸蕩壁山翠下添流孫子夫金鼓旌旗者所以一三軍之耳目也緑蘿春月營門近郭璞詩緑蘿結髙林孔稚圭北山移文秋桂遣風春蘿罷月陳後主詩中宵照春月晉書羊祜傳執棨當營門知君對酒遥相思魏武帝詩對酒當歌阮籍詩對酒不能言悽愴懐酸辛北史李孝貞傳每晦日輒引賔客弦歌對酒終日為歡鮑照詩徒酌相思酒李陵詩萬里遥相思畫鶴篇點素凝姿任畫工唐太宗咏雪詩入扇縈離匣㸃素皎殘機文心雕龍龍鳳以藻繢呈瑞虎豹以炳蔚凝姿西京雜記元帝後宫既多不得常見令畫工圗形按圗召見霜毛玉羽照簾櫳鮑照舞鶴賦疊霜毛而弄影振玉羽而臨霞謝恵連詩升月照簾櫳崔顥詩春意罷簾櫳借問飛鳴華表上曺植白馬篇借問誰家子幽并遊俠兒張協詩借問此何時蝴蝶飛南園江總詩借問蔵書處惟君故人在詩題彼脊令載飛載鳴趙壹窮鳥賦思飛不得欲鳴不可續搜神記遼東城門華表柱忽有一鶴集徘徊空中言曰有鳥有鳥丁令威去家千載今來歸何如粉繢綵屏中晉書山簡傳舉鞭問葛疆何如并州兒鮑照河清頌鞶繡成錦粉繢顓軒劉允濟詩神功多粉繢元氣猶斟酌西京雜記昭陽殿木畫屏風文如蜘蛛絲縷吴均詩陸離看寳帳爛熳照文屏文昌宫近芙蓉闕史記天官書斗為帝車運於中央臨制四鄉斗魁戴匡六星曰文昌宫注文昌官為天府左思魏都賦造文昌之廣殿極棟宇之𢎞規庾信詩長虹雙瀑布圎闕兩芙蓉王維詩芙蓉闕下會千官蘭室氤氲香且結家語與善人居如入芝蘭之室久而不聞其香與之俱化矣陸機詩邃宇列綺窻蘭室接羅幕謝靈運賦飛英明於對溜積氤氳而為峯宋之問詩太平多樂事春物共氤氳隋樂府雙帶仍分影同心巧結香爐氣朝成緱嶺雲王融咏幔詩每聚金爐氣時駐玉琴聲列仙傳王子喬見桓良曰告我家七月七日待我緱氏山頭至期果乗白鶴往山巔望之不得到宋之問詩畢景至緱嶺嶺上烟霞生銀燈夜作華亭月閻朝隠薛王花燭行玉盤錯落銀燈照珠帳玲瓏寳扇開晉書陸機傳華亭鶴唳可得聞乎日暖花明梁燕歸江淹四時賦旭日始暖蕙草可織王維詩栁暗百花明春深五鳳城李白詩一溪初入千花明楚辭燕翩翩其辭歸兮潘岳秋興賦野有歸燕隰有翔隼駱賔王詩簷前歸燕並頭棲應驚片雪在仙闈杜甫白小詩入肆銀花亂傾箱雪片虚應璩與趙叔潜書入侍華幄出典禁闈劉孝綽詩積照朗彤闈主人顧盼千金重後漢書耿弇傳光武指弇曰此我北道主人也張衡西都賦有西都賔問於東都主人後漢書馬援傳援上馬據鞍顧盼以示可用戰國策馮煖曰千金重幣也百乗顯使也誰肯徘徊五里飛古詩孔雀東南飛五里一徘徊韋應物聴鶯曲東方欲曙花㝠㝠詩東方未明顛倒衣裳晉書左貴嬪傳東方云曙百祗奉迎又循吏傳鄧攸歌曰紞如打五鼔雞鳴天欲曙禮記氛霧冥冥雷乃發聲莊子昭昭生于冥冥江淹騷體林中電兮雨㝠㝠啼鶯相唤亦可聴梁簡文帝詩鶯啼春欲駛無為空掩扉陰鏗詩鶯啼歌扇後花落舞觴前何胥詩鶯啼落春後雁度在秋前高隠傳戴顒春日攜雙柑斗酒人問何之曰往聴黄鸝聲耳謝朓詩一聴春鶯喧再視秋鴻沒乍去乍來時近逺薛道衡詩願作王母三青鳥飛去飛來傳消息馬融長笛賦聿皇求索乍近乍逺纔聞南陌又東城風俗通南北曰阡東西曰陌梁簡文帝詩浮雲似帳月如鈎那能夜夜南陌頭宋之問詩城東宫闕擬昭回南陌溝塍殊綺錯古詩東城髙且長忽往上林翻下苑史記始皇紀乃營作朝宫渭南上林苑漢書東方朔傳建元三年起上林苑三輔黄圗漢上林苑即秦之舊苑也武帝建元三年開東南至藍田宜春御宿昆吾傍南山而西至長揚五柞北繞黄山瀕渭水而東周袤三百里西京雜記初修上林苑羣臣逺方各獻名果異卉三千餘種植其中亦有製為美名以標竒麗也陸厥詩平旦上林苑日入伊水濵吴均詩雞鳴上林苑薄暮小平津漢書元帝紀水衡禁囿宜春下苑注宜春下苑即曲江池是也又貢禹傳詔令省宜春下苑以與貧民綿綿蠻蠻如有情詩綿蠻黄鳥止于丘隅劉勰新論魚不畏網而畏鵜網無心而鳥有情也欲囀不囀意轉嬌禽經鶯以喜囀徐陵侯安都徳政碑春鶊始囀必具籠筐秋蟋載吟競鳴機杼唐太宗詩喬柯囀嬌鳥范雲詩平臯草色嫩通林鳥聲嬌羌兒弄笛曲未調風俗通笛長二尺四寸七孔其後又有羌笛説文笛七孔筩也羌笛三孔馬融長笛賦近世雙笛從羌起梁元帝賦聞羌笛之哀怨晉書桓伊傳王徽之泊舟青溪伊于岸上過徽之令人謂伊曰聞君美吹笛試為我一奏伊是時已貴顯素聞徽之名便下車踞胡牀為作三調㺯畢便上車去客主不交一言樂府詩集梅花落本笛中曲也孫萬夀詩宜城醞始熟陽翟曲新調前聲後聲不相及莊子前者唱于而後者唱喁文心雕龍喈喈逐黄鳥之聲梁簡文帝舞賦似㫁霞之照彩若飛鸞之相及秦女學筝指猶澁梁簡文帝詩倡樓秦女乍相値江淹詩畫作秦王女乘鸞向烟霧秦玉鸞詩可憐秦館女不及洛陽花楚辭扶秦筝而彈徽古詩秦筝奮逸響新聲妙入神謝靈運燕歌行闢窻開幌弄秦筝沈約詠筝詩絃依髙張㫁聲隨妙指續梁昭明太子詠彈筝人詩塵多澁移柱風燥脆調絃須臾風暖朝日暾儀禮寡君有不腆之酒請吾子與君須臾焉史記樂書君子不可須㬰離禮僧祗律二十羅預名一須臾一日一夜有三十須臾江總賦聊假日以須臾王逸九思風習習兮和暖百草萌兮華榮鮑照園葵賦風暖凌開土昌泉動陸雲賦結隆思于朝日兮綴永念于汜暉楚辭暾将出兮東方隋書樂志朝日歌扶木上朝暾謝靈運詩早聞夕飈急晚見朝日暾流音變作百鳥喧蕭子範蟬詩流音繞叢藿餘響切髙軒謝靈運詩園栁變鳴禽曺植詩空室自生風百鳥翩南征王粲詩百鳥何繽翻振翼羣相追陸機詩不覩白日景但聞寒鳥喧謝朓詩共奉荆臺績一聴春鳥喧誰家嬾婦驚殘夢劉孝先詩誰家有明鏡暫借照心看古諺促織鳴嬾婦驚庾信小園賦聚空倉而雀噪驚嬾婦而蟬嘶何處愁人憶故園徐悱妻詩同心何處恨楚辭羌愈思兮愁人虞炎詩方掩故園扉伯勞飛過聲局促左傳伯趙氏司至者也注伯趙伯勞也以夏至鳴冬至止爾雅鵙伯勞也注似鶷􅗾而大古東飛伯勞歌東飛伯勞西飛燕黄姑織女時相見古詩蟋蟀傷局促何遜賦嗟窮烏之小鳥意局趣而馴擾廣韻促一作趣戴勝下時桑田緑禮記季春之月鳴鳩拂其羽戴勝降于桑注織絍之鳥張衡賦戴勝愸其既歡兮又誚余之行遲詩星言夙駕説于桑田神仙傳麻姑云接侍以來已見東海三為桑田不及流鶯日日啼花間沈約詩流鶯復滿枝張説詩繞殿流鶯凡㡬樹當蹊亂蝶許多叢梁元帝詩處處春芳動日日春禽變徐悱妻詩鳴鸝葉中舞戲蝶花間騖能使萬家春意闌史記年表大侯不過萬家小者五六百户庾信崔訦碑户牖萬家陳平之鄉里江淹怨别詩始懐未及嘆春意秋方驚有時㫁續聲不了沈約詩冬泉㫁方續唐太宗詩古木㕘差影寒猿㫁續吟虞世南琵琶賦抑揚嘈囋聨綿斷續晉書庾純傳賈充宴朝士而純後至曰旦有小市井事不了是以後來飛去花枝猶裊裊水衡記張僧繇于金陵安樂寺畫二龍不點晴每云點之即飛去人以為誕妄因點其一須臾雷霆破壁一龍乗雲上天一龍不點睛者現在劉孝威詩隔牆花半隐猶見動花枝張正見詩暗開脂粉弄花枝王延夀王孫賦縁百仞之髙木攀窈裊之長枝徐伯陽詩圎籠裊裊掛青絲鐵鈎冉冉勝丹桂還栖碧樹鎖千門鮑照蕪城賦璇淵碧樹弋林釣渚之館梁昭眀太子七契碧樹初蕋緑草含滋史記孝武紀作建章宫度為千門萬户西都賦張千門而立萬户順隂陽以開闔徐陵玉臺新詠序千門萬户張衡之所曽賦春漏方殘一聲曉謝朓酬徳賦忘清漏之不緩惜曉露之方晞梁簡文帝頌曉漢斜陰挈壺升漏徐陵書鐺鐺曉漏江總詩詰曉三春暮新雨百花朝皇甫冉字茂政潤州人十嵗能屬文張九齡歎異之天寳間登第授無錫尉大厯中為王縉掌書記後為左金吾衞兵曺參軍左補闕有集三巻雜言月洲歌送趙冽還襄陽陶潜詩相見無雜言但道桑麻長文選雜詩註雜者不拘流例遇物即言故云雜也水經注城在襄水之陽故名曰襄陽一統志湖廣襄陽府秦為南郡東漢劉表為荆州刺史徙治襄陽縣三國魏置襄陽郡治宜城隋初郡廢大業中復置唐復為襄陽府漢之廣矣中有洲書嶓冢導漾東流為漢詩漢之廣矣不可方思一統志湖廣襄陽府漢江源出隴西嶓冢山由漢中流經鄖縣均州光化至府城北又東南經宜城抵安陸至大别山入于江其水因地而名曰漾曰沔曰漢曰滄浪捴名為漢詩闗闗雎鳩在河之洲傳水中可居者曰洲洲如月兮水環流案洲如月故名月洲也文心雕龍樞中所動環流無倦流􅣇􅣇兮湍與瀨詩河水洋洋北流活活廣韻活水流聲同􅣇李白詩流水鳴活活釋名水流沙石上曰湍瀨淮南于昔舜釣于河濵期年而漁者争處湍瀨以曲隈深潭相予阮籍詩炎光延萬里洪川蕩湍瀨漢書武帝紀下瀨注瀨湍也吴越謂之瀨中國謂之磧草青青兮春復秋古詩青青河畔草鬱鬱園中栁莊子朝菌不知晦朔蟪蛄不知春秋離騷春與秋其代序江淹賦春草暮兮秋風驚秋風罷兮春草生苦竹林竹譜苦竹有白有紫而味苦世説張廌隠居頤志家有苦竹數十頃張于竹中為屋常居其中香楓樹南方草木狀楓香樹似白楊葉圎而岐有脂而香宋之問詩楚竹幽且深中雜楓香林樵子罛師㡬家住廣韻樵柴也又取薪者也爾雅笊大網詩施罛濊濊鱣鮪發發説文師長也禮記命漁師伐蛟取鼉登龜取黿宋之問浣紗篇家住雷門曲髙閣凌飛霞萬山飛雨一川來江淹雜辭石青紅兮百疊山濃淡兮萬重謝朓詩朔風吹飛雨蕭條江上來詩十千維耦箋一川之間萬夫故有萬耦徐安貞詩雲日明千里旌旗照一川巴客歸船傍洲去左傳巴子使韓服告于楚請與鄧為好楚子使道朔将巴客以聘于鄧注道朔楚大夫巴客韓服也梁元帝詩逺村雲裏出遥船天際歸莊子漁父刺船而去延縁葦間歸人不可遲伏知道為王寛書恒開錦幔速望人歸張熾歸去來引歸去來歸期不可違芳杜滿洲時本草杜若一名杜蘅味辛微溫久服益氣輕身屈原九歌山中人兮芳杜若注杜若生南郡漢中沈約郊居賦既取隂于庭樾人因籬于芳杜無限風烟皆自悲王勃詩浦樓低晚照鄉路隔風烟楊炯詩林壑人事少風烟鳥路長史記宋世家箕子隠而鼔琴以自悲孔仲智羈謠空以羈自悲莫辭貧賤阻心期禮記不隕穫于貧賤不充詘于富貴楊公筆録宋向栁與顔竣友善竣貴栁貧曰我與士遜心期久矣豈可以勢利處之任昉詩中道遇心期家住洲頭定近逺馬融長笛賦乍近乍逺沈約詩不知聲近逺惟見山重沓朝泛輕橈暮當返謝瞻詩日落泛澄瀛星羅遊輕橈王籍櫂歌行輕橈暮不息復逐夜潮上不能隨爾臥芳洲楚辭采芳洲兮杜若将以遺兮下女庾肩吾詩並命登飛閣列坐對芳洲自念天機一何淺莊子其嗜慾深者其天機淺郎士元字君胄中山人天寳十五載進士寳應初補渭南尉歴右拾遺出為郢州刺史與錢起齊名故語曰前有沈宋後有錢郎郢州西樓吟元和志郢州本江夏郡雲杜縣之地周地圗記曰蠻人田金生代居此地常為邊患梁普通末遣郢州刺史元樹討平之因置新州後魏改溫州因温水為名也隋廢州武徳重置貞觀復廢於長夀改置郢州承天府志勝春秋屬楚左傳桓十年君次於郊郢是也魏文帝立郢州元改安陸府國初降為州後以世宗潜邸陞府名承天一統志郢州白雪樓在州治石城西下臨漢江取宋玉對楚王問客有歌於郢中為陽春白雪而名胡曽詩古郢雲間白雪樓漢江還繞石城流謝諤白雪樓記楚地諸州皆有樓觀收攬竒秀而郢之白雪尤稱雄雅連山盡處水縈迴水經注三峡長七百里兩岸連山畧無闕處沈約詩連山無㫁絶河水復悠悠鮑照詩千巖盛阻積萬壑勢縈迴山上城門臨水開舊唐書髙麗傳太宗征髙麗師次白崖城其城因山臨水楚辭登山臨水兮送将歸劉楨魯都賦九衢交錯三門㫄開儲光羲臨江亭詩江勢将天合城門向水開朱䦨直下一百丈南史蕭正義傳北固山頂有小亭登降甚狹正義為刺史廣其路㫄施朱䦨武帝幸其地大悦登望久之杜審言詩仰攀人屢息直下騎纔通晉書馬岌銘詩曰丹崖百丈青壁萬尋庾信詠畫屏風詩髙閣千尋跨重簷百丈齊日暖遊鱗自相向江淹四時賦旭日始暖蕙草可織岑參詩風恬日暖蕩春光戯蝶遊蜂亂入房吴都賦北山亡其翔翼西海失其遊鱗沈約詩千仞寫喬樹百丈見逰鱗晉書阮咸傳圓坐相向大酌更飲劉希夷詩與君相向轉相親昔人愛險閉層城揚雄城門校尉箴盤石唐芒襲險重固南史梁武帝紀憑險作守兵食兼資杜甫詩孤城早閉門水經注崑崙之山三級上曰層城一名天庭世説桓征西治江陵城甚麗會賔僚出江津望之云若能目此城者有賞顧長康時為客在坐目曰遥望層城丹樓如霞今人愛閒江復清陶潜園居詩户庭無塵雜虚室有餘閒支遁詩熙怡安冲漠優遊樂静閒盧思道詩楚江百重映孟浩然詩野曠天低樹江清月近人沙洲楓岸無來客薛道衡入栁江詩跳波鳴石磧濺沫擁沙洲李嶠詩岸花明水樹川鳥亂沙洲隋煬帝詩夏潭䕃脩竹高岸坐長楓李適之詩為問門前客今朝㡬個來草綠花紅山鳥鳴庾信行雨山銘草綠衫同花紅面似栁惲詩深庭秋草緑高門白露寒梁簡文帝詩翠網隨烟碧丹花共日紅鹽鐵論大夫曰曽子倚山而吟山鳥下翔王籍詩蟬噪林逾静鳥鳴山更幽王維詩月出驚山鳥時鳴春澗中張籍採蓮曲古今樂録梁天監十一年冬武帝改西曲製江南上雲樂十四曲江南弄七曲一曰江南弄二曰龍笛曲三曰採蓮曲四曰鳳笛曲五曰採菱曲六曰遊女曲七曰朝雲曲南史羊侃傳侃性豪侈善音律自造採蓮棹歌兩曲甚有新致秋江岸邉蓮子多古詩涉江採芙蓉相和曲江南可採蓮爾稚疏芙蓉江東呼為荷菡萏蓮花也讀曲歌芙蓉萬層生蓮子信重沓採蓮女兒凭船歌鮑照詩輿童唱秉椒棹女歌採蓮漢書灌夫傳乃效女曺兒呫囁耳語注師古曰女曺兒猶言兒女輩也古樂府採蓮童曲扣檝命童侣齊聲採蓮歌神仙傳郭四朝者秦時得道來句曲山南所住處作塘遏澗水乘船遊戲其中毎扣船而歌青房圎實齊戢戢鮑照芙蓉賦青房兮規接紫菂兮圎羅梁元帝芙蕖賦緑房兮翠葢素實兮黄螺爾雅戢聚也疏蔵聚也濈詩爾羊來思其角濈争前競折漾微波梁簡文帝教春流既長舳艫争前晉書樂志渟瀾發微波洛神賦託微波以通辭試牽緑莖下尋藕梁元帝芙蕖賦紫莖兮文波爾雅荷芙蕖其莖茄吴都賦綠葉翠莖爾雅荷其根藕夏侯湛芙蕖賦潜靈藕于𤣥泉擢修莖乎清波古樂府青荷葢緑水芙蓉披紅鮮下有並根藕上生並目蓮斷處絲多刺傷手盧思道採蓮曲折藕弄長絲崔輔國詩離緒㫁荷絲王勃詩折藕愛連絲梁簡文帝賦荷稠刺宻晉書范宣傳嘗以刀傷手陸機豪士賦序代大匠斵者必傷其手白練束腰䄂半巻漢書王莽傳太后宜且衣繒練注帛無文者宋玉賦腰如束素梁元帝採蓮賦纖腰束素遷延顧步曺植芙蓉賦擢素手于羅袖接紅葩于中流梁簡文帝詩細簾時半卷不插玉釵粧束淺司馬相如美人賦玉釵挂臣冠羅袖拂臣衣王僧孺詩稍知玉釵重漸見羅襦寒北史李弼傳命皆裝束廣韻淺不深也船中未滿度前洲朱超採蓮曲湖裏人無限何日滿船時江淹詩古槎横近澗危石聳前洲借問阿誰家住逺張協詩借問此何時三國志龎統傳向者之論阿誰為失宋之問浣紗篇家住雷門曲崔顥江南行君家住何處歸時共待暮潮上陳後主採蓮曲歸時會被喚且試入蘭房何遜詩暮潮還入浦夕鳥飛向家王維詩相看不忍發慘淡暮潮平七發江水逆流海水上潮鮑照遊思賦雲逕兮海衝上潮兮送風徐陵詩朔氣凌疎木江風送上潮自弄芙蓉還盪槳爾雅疏芙蕖别名芙蓉鮑照芙蓉賦搴芙蓉而水嬉梁元帝採蓮賦妖童媛女蕩舟心許古樂府莫愁樂艇子打兩槳韓愈字退之南陽人少孤刻苦為學盡通六經百家貞元八年擢進士第才髙又好直言累被黜貶初為監察御史上疏極論時事貶陽山令元和中再為博士改比部郎中史館修撰轉考功知制誥進中書舍人又改庶子裴度討淮西請為行軍司馬以功遷刑部侍郎諫迎佛骨謫刺史潮州移袁州穆宗即位召拜國子祭酒兵部侍郎使王庭湊歸轉吏部為時宰所搆罷為兵郎侍郎尋復吏部卒贈禮部尚書諡曰文愈自比孟子闢佛老異端䔍舊恤孤好誘進後學以之成名者甚衆文自晉魏來拘偶對體日衰至愈一返之古而為詩豪放不避粗險格之變亦自愈始焉聴穎師彈琴李賀穎師聴琴歌竺僧前立當吾門梵宫真相眉稜尊昵昵兒女語玉篇昵親近也史記魏其武安侯傳灌夫罵臨汝侯曰生平毁程不識不直一錢今日長者為夀乃效女兒呫囁耳語索隠女兒猶云兒女也恩怨相爾汝闗尹子天下之理恩或化讐讐或化恩陸機豪士賦序廣樹恩不足以敵怨北史陳竒傳游稚嘗衆辱竒或爾汝之或指為小人竒無降志何遜詩宴交無爾汝杜甫詩忘形到爾汝劃然變軒昻傅毅舞賦明詩表㫖嘳息激昻勇士赴敵塲班固西都賦平原赤勇士厲新論勇士一呼三軍皆避北史辛雄傳明主賞必行罰必信使親疎貴賤勇怯賢愚開鐘鼓之音旌旗之列莫不奮激競赴敵塲浮雲栁絮無根蒂晉書王羲之傳尤善草𨽻論者稱其筆勢以為飄若浮雲矯若驚鴻魏文帝詩西北有浮雲亭亭如車葢世説謝太傅寒雪日内集曰白雪紛紛何所似兄子胡曰撤鹽空中差可擬兄女曰未若栁絮因風起徐陵詩栁絮飛還聚游絲㫁復結陶潜詩人生無根蒂飄若陌上塵天地濶逺隨飛揚陶潜詩昭昭天宇濶皛皛川上平史記高祖紀大風起兮雲飛揚喧啾百鳥羣陸機詩不覩白日暮時聞寒鳥喧何遜詩杳杳星出雲啾啾雀隠樹王粲詩百鳥何繽翻振翼羣相追張翰詩長鳴摇羽翼百鳥互相和忽見孤鳳皇詩鳳皇于飛翽翽其羽史記日者傳鳳皇不能與燕雀為羣躋攀分寸不可上張華蕭史曲火粒願排棄雲霧好攀躋杜甫詩一丘蔵曲折緩步有躋攀後漢書律厯志準之聲明暢易達分寸又粗劉勰新論君子不􅈔盈尺之璧而珍分寸之陰失勢一落千丈强後漢書裴楷傳石者安類墜者失勢拾遺記岱輿山有玉梁千丈梁去𤣥流千餘丈雲氣生其下謝朓詩逺山翠百里迴流映千丈木蘭詩賞賜百千强杜甫詩四松初栽時大抵三尺强韓集本注筭家以有餘為强嗟余有兩耳未省聴絲篁戰國策李兑含人謂兑曰竊觀君與蘇君談也其辨過君其博過君願君堅塞兩耳無聴其辨也文心雕龍志感絲篁氣變金石自聞穎師彈起坐在一㫄史記陸賈傳尉佗迺蹶然起坐謝陸生曰居蠻夷中久殊失禮義王襃僮約餧食馬牛鼔四起坐夜半益芻推手遽止之周禮司儀注土揖推手小下之也時揖平推手也天揖推手小舉之也莊子孔子推琴喟然而歎韓子衞靈公之晉平公觴之酒酣靈公曰有新聲願請以示乃召師涓令坐師曠之㫄援琴撫之未終師曠撫止之曰不可遂也濕衣淚􅒔􅒔漢鐃歌臨山望逺泣下霑衣張協七命撫促柱則酸鼻揮危絃則淚流沈炯詩雍門何假設落淚自淫淫廣雅􅒔􅒔沛沛流也穎乎爾誠能無以氷炭置我腸荀子無恤親疎無論貴賤惟誠能之求郭象莊子注喜懼戰於胸中固已結氷炭於五臓矣陶潜詩孰若當世士氷雪滿懷抱魏武帝樂府絃歌感人腸傅休奕詩青雲徘徊為我愁腸栁州羅池廟詩一統志栁州秦為桂林郡隋以馬平縣置象州大業初廢以其地屬始安郡貞觀初改栁州天寳初改龍城郡後復為栁州又栁州羅池在栁州城東水可溉田相近有栁宗元祠名羅池廟韓愈羅池廟碑宗元為栁州刺史不鄙棄其民動以禮法民咸化服流逋四歸樂生興事又栁侯嘗與其部将魏忠謝寧歐陽翼飲酒驛亭殁三年降於州之後堂歐陽翼等見而拜之其夕見夢於翼曰館我於羅池其月丙辰廟成大祭許顗詩話栁宗元守栁州日築龍城得白石微辨刻畫曰龍城栁神所守驅厲鬼山左首福土氓制九醜此宗元自記也韓愈作羅池廟碑云福我兮夀我驅厲鬼兮山之左葢用此事茘子丹兮蕉黄南方草木狀茘支樹冬夏榮茂青華朱實一樹下子百斛王逸茘支賦皮似丹罽膚若明璫孔稚圭茘枝啟灼灼丹華吐日離離繁星著天南方草木狀蕉花如芙蓉著莖未百餘子剝其子色黄白味似蒲萄雜肴蔬兮進侯堂詩爾肴既脯又殽核維旅疏殽是總名其實核亦為殽也爾雅菜謂之蔬説文凡草菜可食者通名為蔬禮記堂事交乎階注謂堂下之人送饌至堦堂上之人在堦受取是也侯之船兮兩旗史記夏本紀陸行乗車水行乗船史記正義兩旗者左旗九星在河鼓左也右旗九星在河鼓右也皆天之鼔旗所以為旌表九歌入不言兮出不辭乗迴風兮載雲旗渡中流兮風泊之史記周本紀武王渡河中流白魚躍王舟中漢武帝秋風辭汎樓船兮濟汾河横中流兮揚素波晉書王濬傳濬攻吴順風鼔棹徑造三山将至秣陵王渾使人邀令暫過論事濬曰風利不得泊也鄧析子同舟渡海中流遇風待侯不來兮不知我悲易萃聚而升不來也九歌望夫君兮未來宋玉九辯不得見兮心悲侯乗駒兮入廟説文馬二嵗曰駒水經注武陽龍尾山仙者羽化之處得遺詠曰命蜚螭駕白駒尚書大傳廟者貌也其以貌言之也慰我民兮不嚬以笑廣韻嚬眉蹙也禮記思其居處思其笑語韓非子嚬有為嚬笑冇為笑任昉詩送君千里笑紓我百憂嚬鵞之山兮栁之水一統志鵞山在栁州城西山巔有石如鵞宗元詩曰荒山秋日午獨上意悠悠如何望鄉處西北是融州又栁水在府城南一名潯水源出懐逺縣流經象州歴潯藤至廣州界入于海宗元詩曰栁州栁刺史種栁栁江邉桂樹團團兮白石齒齒楚辭嘉南州之炎徳麗桂樹之冬榮江淹詩蒼蒼山中桂團團霜露色詩揚之水白石鑿鑿太平寰宇記神居山石齒齒如排牙侯朝出游兮暮來歸詩駕言出游以寫我憂陸機詩終朝出游薄暮歸六情逸豫心無違公羊傳其言來歸何喜之也春與猿吟兮秋鶴與飛孔稚圭北山移文蕙帳空兮夜鶴怨山人去兮曉猿驚庾信枯樹賦臨風亭而唳鶴對月峡而吟猿北方之人兮為侯是非宋玉楚辭北方不可以止些莊子彼亦一是非此亦一是非又是其所非而非其所是亢倉子以是為非以非為是陶潛詩是非茍相形雷同共毁譽柳宗元與蕭俛書僕與罪人交官以是進聖朝寛大貶黜甚薄不塞衆人之怒􅉪語轉侈飾智求進者更詈僕以快仇人之心千秋萬嵗兮侯無我違劉妙容宛轉歌千秋萬嵗同此情陶潛詩千載不相違北齊享廟樂辭教思孝享多福無違福我兮夀我詩卜爾百福如㡬如式易林振除災害更與夀福書九五福一曰夀注人有夀而後能享諸福故夀先也傅休奕享神歌樹百福底自古錫萬夀迄在今驅厲鬼兮山之左左傳匹夫匹婦魂魄猶能憑依于人以自淫厲吕氏春秋季冬紀注前嵗一日擊鼔驅疫厲之鬼下無苦濕兮髙無乾毛詩疏高平曰原下濕曰隰又黍宜髙燥而寒稌宜下濕而暑范子計然五土之宜各有髙下髙而陽者多豆平而隂者多五穀鹽鐵論周公時天下太平丘陵髙下皆熟稉稌充羨兮蛇蛟結蟠玉篇稉亦作秔廣韻秔稌皆稻名張衡南都賦若其厨膳則有華薌重秬漢臯香秔詩豐年多黍多稌禽經鵙鳴則蛇結禮記季夏之月命漁師伐鮫取鼉朱异詩蛟螭蟠結若飛若動舊注言稉稌之穂如蛇蛟我民報祀兮無怠禮記祭有報焉有祈焉注報謂若獲禾報社也論衡凡祭祀之義有二一曰報功二曰修先報功以勉力修先以崇恩也禮記祭不欲疏疏則怠怠則忘簡文帝祀七里廟詩以兹敬弗怠其始自今兮欽于世世詩自今以始嵗其有書世世享徳萬邦作式石鼔歌元和郡縣志石鼔文在天興縣南二十里許石形如鼔其數有十葢記周宣王畋獵之事其文即史籀之迹貞觀中吏部侍郎蘇勗紀其事云虞禇歐陽共稱古妙雖嵗久譌闕然遺迹尚有可觀歐陽修集古録石鼔文久在岐陽初不見稱于前世至唐人始盛稱之韋應物以為周文王之鼓至宣王刻詩韓退之直以為宣王之鼓在今鳳翔孔子廟中其文可見者四百六十五磨滅不可識者過半前世傳紀所載古逺竒怪之事類多虚誕而難信況載紀不載不知韋韓二君何據而為文宣之鼓也退之好古不妄者予姑取以為信耳至於字畫亦非史籀不能作也雍録斵石為鼔不可考擊而遂刻文其上三代之前無有古人托物見意田漁必用衆致衆必以鼔因其鼓之入用而斵石象之因以記事焉後漢橋公廟有石鉦石鉞以及石鼔蔡邕與為銘辭曰是用鏤石作兹鉦鉞軍鼔陳之東階以勒公文武之勲焉古來識事於石豈必専為鼔形顧岐陽田漁其用在鼔因用以著辭焉耳帝京景物畧石鼔高二尺廣徑一尺有竒其數十其文籀其詞頌天子之田元大徳十一年虞集為大都教授得之泥中始移國學大成門内張生手持石鼓文舊唐書韓愈傳與吴郡張籍友善每退公之隟則相與談讌論文賦詩又張籍傳性詭激能為古體詩韓愈尤重之累授國子博士水部員外郎轉水部郎中世謂之張水部云勸我試作石鼓歌梁簡文帝答湘東王書試筆成文臨池染墨詩是用作歌将毋來諗少陵無人謫仙死長安志少陵西有杜子美故宅雍録少陵原在長安縣南四十里舊唐書李白傳初賀知章見白賞之曰此天上謫仙人也才薄将奈石鼓何杜甫李潮八分歌我今衰老才力薄潮乎潮乎奈爾何周綱陵遲四海沸揚雄解嘲往者周綱解結羣鹿争逸廣韻觱沸泉涌出貌宣王憤起揮天戈詩序六月宣王北伐也采芑宣王南征也史記周本紀宣王即位修政法文武成康之遺風天下復宗周又秦楚之際月表發憤其所為天下雄晉書載記奮劍與夕火争光揮戈與秋月競色王維表指旗而黒祲旋静揮戈而白日再中大開明堂受朝賀孟子夫明堂者王者之堂也禮記朝諸侯於明堂之位天子負扆南鄉而立明堂也者明諸侯之尊卑也三輔黄圖明堂所以正四時出教化天子布政之宫也黄帝曰合宫舜曰總章殷人曰陽館周人曰明堂史記叔孫通傳漢七年長樂宫成諸侯羣臣皆朝皇帝輦出房百官執職傳警引諸侯王以下以次奉賀通典後漢嵗首為大朝受賀諸侯劍珮鳴相磨易地上有水比先王以建萬國親諸侯左傳昔諸侯朝正於王王宴樂之于是乎賦湛露則天子當陽諸侯用命也文中子衣冠襜如劍珮鏘如所以防其躁也賈至詩劍珮身隨玉墀步岑參詩花迎劍珮星初落蒐於岐陽騁雄俊左傳春蒐夏苗秋獮冬狩皆於農隙以講事也又椒舉言於楚子曰成有岐陽之蒐班固東京賦岐陽之蒐又何足數詩居岐之陽在渭之将箋文王謀居在岐山之陽居渭水之側一統志鳳翔府周為岐周地西魏為岐陽郡隋為岐州天寳初改扶風郡屬闗内道史記蔡澤傳蔡澤天下雄俊𢎞辯智士也鶡冠子人情者大小愚智賢不肖雄俊豪英相萬也萬里禽獸皆遮羅枚乗七發逐狡獸集輕禽説文遮遏也増韻蔽也鮑照河清頌序馴象西爵充羅外囿梁昭明太子殿賦鏤華形以列羅鐫功勒成告萬世秦之罘碑羣臣頌功請刻於石表垂於常式後漢書竇憲傳憲登燕然山刻石勒功紀漢威徳令班固作銘班固東都賦憲章稽古封岱勒成漢書蕭何傳鄂千秋曰蕭何嘗全闗中待陛下此萬世功也竇憲傳封神丘兮建隆嵑熙帝載兮振萬世鑿石作鼓隳嵯峨水經注湞陽峡西岸傑秀壁立虧天昔常鑿石架閣令兩岸相接劉安招隠士山氣巃嵸兮石嵯峨張衡西京賦嵯峨崨嶪曹植詩靈鼇帶方丈神岳儼嵯峨從臣才藝咸第一後漢書和帝紀永元十五年十一月車駕還宫賜從臣及留者錢帛各有差班固西都賦苐從臣之嘉頌南史栁惲傳分其才藝足了十人北史蘇夔傳帝謂宇文述虞世基曰鴻臚之職須歸令望寧有多才藝美容止可接賔客者乎史記蕭相國世家蕭何功第一杜甫詩今代麒麟閣何人第一功揀選撰刻留山阿後漢書儒林傳序為功臣子孫四姓未屬别立校舍搜選高能以受其業又班固傳天子會諸儒講論五經作白虎通徳論令固撰集其事陳子昂感遇詩奈何窮金玉雕刻以為尊楚辭若有人兮山之阿披薜茘兮帶女蘿古詩冉冉孤生竹結根太山阿雨淋日炙野火燎劉刪青草詩雨淋三春葉風傳十步香宋之問賦春風晝蕩爍日相煎曹植樂府願為中林草秋隨野火燔杜甫李潮八分歌嶧山之碑野火焚棗木傳刻肥失真鬼物守䕶煩撝呵漢書劉向傳淮南有枕中鴻寳苑祕書言神仙使鬼物為金之術得其書幼而誦讀杜甫山寺詩諸天必歡喜鬼物無嫌猜晉書孫綽傳所居齊前種一株松恒自守䕶説文撝手指也呵大言而怒也公從何處得紙本韋應物石鼔歌今人濡紙脱其文既撃既掃白黒分毫髮盡備無差訛魏甄后塘上行莫以毫髮故棄捐素所愛鮑照白頭吟毫髮一為瑕丘山不可勝杜甫李潮八分歌陳倉石鼔久已訛辭嚴義宻讀難曉法言商書駿發而嚴厲文心雕龍孟堅雅懿故裁宻而思麗平子淹通故慮周而藻宻鍾嶸詩品顔延論文精而難曉字體不類𨽻與科庾肩吾書品書名起於河洛字勢發於倉史又𨽻體發源秦時𨽻人下邳程邈所作始皇見而重之以奏事繁多篆字難製遂作此法故曰𨽻書水經注古文出於黄帝之世倉頡本鳥跡為字自秦用篆書焚燒先典魯共王得孔子宅書不知有古文謂之科斗書葢因科斗之名遂效其形耳韋續書法科斗書不知年代或曰顓頊髙陽氏所作年深豈免有缺畫文心雕龍漢初吏民上書字謬輒劾是以馬字缺畫而石建懼辠快劒斫斷生蛟鼉杜甫李潮八分歌快劍長㦸森相向説文斫擊也禮記月令季夏之月命漁師伐蛟取鼉司馬相如子虛賦其中則有神龜蛟鼉瑇瑁鼈黿鸞翔鳳翥衆仙下㑹要龍朔二年上自為書與遼東諸将許圉師見而驚喜曰逸少少力而妍子敬妍而少力今觀聖跡兼絶二王鳳翥鸞迴實古今書聖杜甫詩筆飛鸞聳立章罷鳳騫騰又羣仙不愁思冉冉下蓬壺珊瑚碧樹交枝柯西京雜記積草池中尺有珊瑚樹高一丈二一本三柯上有四百六十三條是南市越王趙佗所獻至夜光景常欲燃述異記欝林郡有珊瑚珊瑚樹碧色生海底一株數十枝大者高五六尺世説石崇嘗與王愷爭豪武帝嘗以一珊瑚樹髙二尺許賜愷枝柯扶疎世罕其比愷以示崇崇以鐵如意撃碎之淮南子崑崙墟有増城九重碧樹瑶樹在其北班固西都賦珊瑚碧樹周阿而生金繩鐵索鎖紐壯封禪儀以金為繩以石為泥壇土色赤白黒各如其方色漢官儀泰山従天闗直上七里羊腸逶迤名曰環道往往絙索可得而登也韻畧鎖鉅鐺説文紐系也古鼎躍水龍騰梭水經注周顯王四十二年九鼎淪没泗淵秦始皇時鼎見於斯水始皇使數千人沒水系而行之未出龍齒齧斷其系晉書陶侃傳侃少時漁於雷澤網得一梭以挂于壁有頃雷雨化為龍而去陋儒編詩不收入荀子上不能好其人下不能隆禮安時不兔為陋儒而已二雅褊迫無委蛇詩序言天下之事形四方之風謂之雅雅者正也言王政之所由興廢也政有小大故有小雅焉大雅焉詩維是褊心是以為刺後漢書第五倫傳拘迫大義詩退食自公委蛇委蛇箋委曲自得之貌孔子西行不到秦掎摭星宿遺羲娥説文掎偏引摭拾也曹植與楊徳祖書劉季緒才不能逮于作者而好詆呵文章掎摭利病梁簡文帝答湘束王書我既拙于為文不敢輕有掎摭釋名星散也列位布散也宿宿也星各止宿其處也山海經東南海之水甘泉之間有羲和國有女子曰羲和嘗浴日于甘泉郭璞注堯因是立羲和之官以主四時准南子羿請不死之藥于西王母姮娥竊之奔月宫姮娥羿妻也張衡靈憲姮娥奔月是為蟾蜍按韓醇曰詩意謂石鼓文不編于詩而二雅不載孔子言詩小者具述而此文獨遺是猶掎摭星宿而遺日月也嗟予好古生苦晚論語好古敏以求之者也漢書禮樂志魏文侯最為好古秦嘉詩歡會常苦晚對此涕泪雙滂沱詩寤寐無為涕泗滂沱憶昔初䝉博士徵舊唐書韓愈傳為連州山陽令量移江陵府掾曺元和初召為國子博士其年始改稱元和舊唐書憲宗紀永貞二年春正月丁夘御含元殿受朝賀畢御丹鳳樓大赦天下改元曰元和故人従軍在右輔古詩相去萬餘里故人心尚爾謝朓詩山川不可極況乃故人杯王粲詩従軍有苦樂但問所従誰三輔黄右輔圖三輔皆有都尉京輔都尉治華隂左輔都尉治髙陵都尉治郿為我量度掘臼科詩經始靈臺疏經理而量度初始為靈臺之基址禮記量地以制邑度地以居民易掘地為臼説文臼舂也𨽻首作臼又科程也廣韻坎也孟子盈科而後進按孫汝聴曰謂安石鼔處濯冠沐浴告祭酒禮記澣衣濯冠以朝又将適公所宿齋戒沐浴史記荀卿傳齊宣王時荀卿最為老師齊尚修列大夫之缺而荀卿三為祭酒焉注禮食必祭先飲酒亦然以席中之尊者一人當祭耳後因以為官名如此至寶存豈多易林大都王市稠人多寳氊苞席裹可立致魏志鄧艾傳陰平道山高谷深至為艱險艾以氊自裹推轉而下詩我心匪席不可卷也亢倉子太平其立致矣十鼓祗載數駱駝史記蘇秦傳秦説楚王曰大王誠能用臣之計燕代槖駝良馬必實外廏又司馬相如傳其獸則麒麟角端騊駼槖駝薦諸太廟比郜鼎左傳桓公二年夏四月取郜大鼎于宋戊申納于太廟光價豈止百倍過魏書李神儁傳汲引後生長其光價孔穎達毛詩正義序申公騰芳於鄢郢毛氏光價於河間史記蘇秦傳齊紫敗素也而賈十倍注謂紫色價貴於帛十倍嵇康養生論謂商無十倍之價農無百斛之望此守常而不知變者也聖恩若許留太學後漢書种岱傳李燮上書曰岱為聖恩所拔遐邇具瞻宜有異賞呉質詩䝉念聖主恩榮爵與衆殊周禮大司樂職掌成均之法以治建國之學董仲舒策太學賢士之闗教化之本原也通典貞觀五年太宗數幸國學遂増築學舍千二百間國學之盛近古未有諸生講解得切磋史記叔孫通傳臣願徵魯諸生與臣弟子共起朝儀漢書班超傳相者曰祭酒布衣諸生耳而當封侯萬里之外後漢書張酺傳酺以尚書數講御前以論難當意史記集解序中散大夫徐廣為作音義具列同異兼述訓解詩如切如磋漢書董仲舒傳切磋究之觀經鴻都尚填咽水經注蔡邕以嘉平四年奏求正定六經文字靈帝許之邕乃自書丹于碑使工鐫刻立于大學門外其觀經及筆寫者車乗日千餘兩填塞街陌矣後漢書靈帝紀光和元年二月始置鴻都門學士梁書陶𢎞景傳永明十年上表辭禄公卿祖之供帳甚盛車馬填咽洛陽伽藍記名僧徳衆負錫為羣車騎填咽繁衍相傾坐見舉國來奔波仲長統昌言救患赴難跋涉奔波者憂樂之盡也謝恵連詩念彼奔波意慮回惑杜甫詩天下學士亦奔波剜苔剔蘚露節角説文剜削也剔解骨也韋應物石鼓歌石如鼓形數止十風雨缺訛苔蘚􅧣後漢書虞詡傳不遇盤根錯節何以别利器乎禮記毁方而瓦合疏圭角謂圭之鋒鋩有楞角安置妥帖平不頗賈誼陳政事疏置諸安處則安陸機文賦或妥帖而易施或齟齬而不安杜甫朝享太廟賦神姦妥帖不敢秘其精又詩千里初妥帖楚辭循繩墨而不頗大厦深簷與葢覆淮南子大厦成而燕雀相賀晉書和嶠傳庾覬曰嶠森森如千丈松雖磥砢多節目施之大厦有棟梁之用又慕容徳載記齊魯固多君子接慎巴生淳于鄒田之徒蔭修簷臨清沼馳朱輪佩長劍牛𢎞明堂議方圎葢覆九六之道也經歴久逺期無佗漢書律厯志陰陽之施化萬物之終始既類旅於律吕又經歴於日辰又東方朔傳堯舜禹湯文武成康上古之事經歴數千載尚難言也説文它蛇也上古草居患它故相問得無它乎後漢書隗囂傳若束手自詣保無他也嵇康秋胡行惟有貧賤可以無他按佗古作它又與他同中朝大官老於事漢書龔勝傳下将軍中朝者議後漢書黄瓊傳使中朝二千石以上議其禮左思魏都賦中朝有注漢氏大司馬侍中散騎諸吏為中朝丞相六百石以下為外朝説苑李克曰我與子之居也豈與我比周以求大官哉後漢書郭伋傳朝廷多舉伋可為大司空帝以并州尚有盧芳之儆欲使久於其事故不召詎肯感激徒媕娿後漢書朱穆傳論専諸荆卿之感激侯生豫子之投身情為恩使命縁義輕蔡邕琴賦感激絃歌一低一昻説文媕娿陰娿也廣韻媕娿不決牧童敲火牛礪角莊子黄帝将見大隗於具茨山至襄城之野遇牧馬童子問塗王維詩道心及牧童孟浩然詩荷鋤隨牧童潘岳詩歘如敲石火水經注北山有石赤白色以兩石相打則水潤打之不已潤盡則火出春秋鼷䑕食郊牛角淮南子甯戚叩牛角而疾商歌書若金用汝作礪説文礪麤悍石誰復著手為摩挲晉書杜預傳譬如破竹數節之後皆迎刃而解無復著手處也庾肩吾詩燭下夜縫衣春寒偏著手釋名摩挲手上下之言也後漢書薊子訓傳與一老人共摩挲銅人古樂府新買五尺刀懸著中梁柱一日三摩挲劇于十五女日銷月鑠就埋没楚辭質銷鑠以汋約兮神要渺以淫放何遜詩餘暉晚銷鑠宋之問詩黄金忽銷鑠南史郭祖深傳飾口利辭競相推薦訥直守信坐見埋没六年西顧空吟哦詩乃眷西顧揚雄解嘲蔡澤以噤吟而笑唐舉韻㑹哦唫也孫綽天台山賦序不任吟想之至聊奮藻以散懐羲之俗書趁姿媚顔真卿張長史十二意筆法逸少學鍾勢巧形容及其獨運意疎字緩樊汝霖注周宣王時史籀始變大篆為籀書石鼔文籀書也秦變古為篆為𨽻今又變為楷世俗書爾非古書也阮籍詩流盼發姿媚言笑吐芬芳數紙尚可博白鵞晉書王羲之傳性愛鵞山陰有一道士養好鵞羲之往觀意甚悦固求市之道士云為寫道徳經當舉羣相贈耳羲之欣然寫畢籠鵞而歸繼周八代争戰罷論語其或繼周者雖百世可知也蔣之翹注八代謂漢魏晉宋齊梁陳隋自周而下不啻八代論其正統又頗多説今以石鼔所在言之其秦漢晉魏宋齊周隋八代與無人收拾理則􅄼隋書禮樂志按漢初典章滅絶諸儒捃收於溝渠牆壁之間左傳牛則有皮犀兕尚多棄甲則􅄼杜預注那猶何也方今太平日無事詩序維天之命太平告文王也後漢書謝夷吾傳班固薦夷吾曰臣聞堯登稷契政隆太平舜用臯䕫治致雍熙魏武帝詩對酒歌太平禮記天子無事則嵗三田史記平準書漢興七十餘年之間國家無事則人給家足柄任儒術崇丘軻史記禮書今上即位招致儒術之士令共定儀唐書選舉志太宗即位益崇儒術史記孔子世家叔梁紇與顔氏女禱於尼丘得孔子生而首上圩頂故因名曰丘云又孟子列傳孟軻鄒人也受業子思之門人法言或問勇曰軻也曰何軻也曰謂孟軻也若荆軻君子盜諸安能以此上論列司馬遷報任安書仰首仲眉論列是非願借辯口如懸河晉書郭象傳王衍每云聴象語如懸河瀉水而不竭唐書王勃傳楊炯文如懸河之不竭范傳正李白碑白論當世務草和蕃書辯如懸河筆不停綴石鼓之歌止於此嗚呼吾意其蹉跎晉書周處傳入吴尋二陸見雲具以情告曰欲自修而年已蹉跎恐将無及王襃九懐驥垂兩耳兮中坂蹉跎李賀字長吉七嵗能辭章韓愈皇甫湜過其家使賀賦詩援筆輒就自目曰高軒過自是有名賀每旦日出騎弱馬從小奚奴背古錦囊遇所得書投囊中及暮歸足成之詩尚竒詭絶去畦徑當時無能效者樂府數十篇雲韶諸工皆合之絃管仕為協律郎李憑箜篌引風俗通箜篌又坎侯漢武帝祀太山太一后土令樂人侯調依琴作坎侯言坎坎應節也侯以姓冠章耳或説空侯取其空中釋名箜篌師延所作杜佑通典古樂府有箜篌引麗玉作吴絲蜀桐張髙秋闗尹子非手非竹非絲非桐曹毘箜篌賦其絃則鳥號之絲陸璣草木疏益州白桐宜為琴瑟董仲舒賢良策譬之琴瑟不調甚者必解而更張之乃可鼓也陸機文賦譬偏弦之獨張含清唱而靡應宋子侯詩髙秋八九月沈約詩臨池清溽景開幌望髙秋張正見侍宴詩髙秋藐姑射睿照屬汾川空山凝雲頽不流庾信司馬裔碑銘谷寒無日山空足雲淮南子山雲草莽水雲魚鱗陶𢎞景詩空山霜滿高烟平江總詩山雲四面通顔延年詩空城凝寒雲薛道衡詩凝雲迷代郡傅休奕西都賦起若翔電降若頽雲顔延之詩流雲藹青闕梁邵陵王綸詩雲駛影疑流淮南子地平則水不流水經注池水澂渟淵而不流列子秦青撫節悲歌響遏行雲江娥啼竹素女愁書觀厥刑于二女疏劉向列女傳云二女長曰娥皇次曰女英舜既升為天子娥皇為后女英為妃張華博物志舜二妃淚下染竹成斑為湘江之神張衡西京賦奏淮南度陽阿感河馮懐湘娥曹植九詠揚激楚兮詠湘娥郭璞江賦協靈爽于湘娥庾信詩啼枯湘水竹史記泰帝使素女鼔五十絃瑟王襃九懐聞素女兮微歌揚雄賦聴素女之清聲兮觀宓妃之妙曲張衡賦素女撫絃而遺音李憑中國彈箜篌孟子我欲中國而授孟子室宋玉對楚王問引商刻羽雜以流徵國中屬而和者不過數人而已古焦仲卿妻詩十五彈箜篌十六誦詩書崑山玉碎鳳皇呌晉書郗詵傳臣舉賢良對策第一猶桂林之一枝崑山之片玉庾信賦荊山鵲飛而玊碎書簫韶九成鳳皇來儀何思澄詩妾有鳳皇曲非無陌上桑庾信詩琴曲隨流水簫聲逐鳳皇芙蓉泣露香蘭笑爾稚荷一名芙蕖郭璞注江東人呼為芙蓉古詩涉江采芙蓉蘭澤多芳草劉楨詩芙蓉散其華菡萏溢金塘庾信詩露泣連珠下家語如入芝蘭之室久而不聞其香琴操孔子自衞反魯隠谷之中見香蘭獨茂沈攸之詩特底唤懽來花笑鶯歌詠十二門前融冷光三輔黄圖都城有霸城清明宣平覆盎鼎路便門章城直城雍門洛門厨城横門十二門三輔决録長安十二門西都賦立十二之通門潘尼詩玉以瑜潤珠以光融潘岳秋興賦月朣朧以含光兮露淒清以凝冷薛道衡詩吹笙朔氣冷照劍日光寒二十三絲動紫皇晉志紫微天帝之座沈約郊居賦降紫皇于天闕女媧鍊石補天處帝王世紀女媧氏亦風姓也承庖犧制度蛇身人首一號女希是為女皇淮南子昔有女媧氏鍊五色石以補天庾信道士步虛詞鵠巢堪鍊石蜂房得煑金梁元帝賦葢立極而補天騐璧合而珠連石破天驚逗秋雨神仙傳王烈之太行山中忽聞山東殷殷如雷聲烈往視之乃見山破石裂數百丈魏都賦天宇駭地廬驚晉書震天駭地梁簡文帝答張纉書春庭落景轉蕙承風秋雨且晴檐梧初下夢入神山教神嫗史記蓬萊方丈瀛洲此三神山者在渤海中未至望之如雲及到三神山反居水下欲到則風引船而去漢書燕昭王使人入海求蓬萊方丈瀛洲三神山張衡賦神山崔巍搜神記晉永嘉中兖州有神嫗號成夫人好音獨能彈箜篌老魚跳波瘦蛟舞張華詩浮醪隨觴轉素蟻自跳波張九齡詩潭清能徹底魚樂好跳波琴譜蔡琰八法外有揆刺撥刺魚尾翻波貌又鯉魚三跌子亦指法也楚辭麋何為兮庭中蛟何為兮水裔北齊皇夏樂歌風雲馳九域龍蛟躍四溟吳質不眠倚桂樹魏志吴質字季重以才學通博為五官将及諸侯所禮愛劉義慶箜篌賦器荷重于吴君漢書第五倫傳竟夕不眠莊子倚樹而吟徐陵長干寺碑遊巖倚樹宴坐經行楚辭招隠士桂樹叢生兮山之幽露脚斜飛濕寒兔何遜詩露濕寒塘草盧思道詩春朝露濕九芝田蕭慤詩草濕蒹葭露劉逖對雨詩細落疑舍霧斜飛覺帶風傳休奕擬天問月中何有白兔𢷬藥沈約詩平岡走寒兔按本文倚桂樹濕寒兔似指月中桂樹而言段成式酉陽雜俎云月桂下有一人常斫之人姓吴名剛西河人學仙有過謫令伐樹注家遂謂吴質即吴剛之誤但段成式乃晚唐人賀與韓愈同時不應用其語又有因曺植有箜篌引謂吴質為植客而引劉義可慶箜篌賦器荷重于吴君句以實之但吴質傳中事無考且植客亦不止質一人而初學記中箜篌下有吴妃引文亦無考前人謂王明妃為明君則吴君或即吴妃通稱亦未可知大抵賀詩多竒詭難曉惟依文注釋而已權徳輿字載之天水畧陽人未冠即以文章稱歴官禮部尚書同平章事出為山南西道節度使卒贈左僕射謚曰文徳輿積思經術無不貫綜其文雅正贍縟為貞元元和問縉紳羽儀文集五十卷和李中丞慈恩寺清上人院牡丹花歌唐書百官志御史臺大夫一人正三品中丞三人正四品下長安志慈恩寺隋無漏寺故地高宗在春宫為文徳皇后立故名慈恩圓覺要覽内有徳智外有勝行在人之上曰上人牡丹譜牡丹出丹州延州東出青州南出越州而出洛陽者乃天下第一舒元輿牡丹賦序天后之鄉西河也精舍下有牡丹其花特異天后歎上苑之有闕因命移植焉因此京國牡丹日月寖盛澹蕩韶光三月中鮑照詩春風澹蕩俠思多李白詩春風正澹蕩暮雨來何遲唐太宗詩韶光開令序淑氣動芳年丘遲與陳伯之書暮春三月江南草長雜花生樹羣鶯亂飛牡丹偏自占春風蕭慤春賦二月鶯聲纔欲㫁三月春風已復流特過寳地尋香徑王融出家頌澡身浴徳晦跡埋名将安寳地誰留化城王勃龍懐寺碑香城寳地左右林泉香譜吴王起響屧廊采香徑梁簡文帝行雨山銘芸香馥徑石鏡臨墀又見新花出故叢謝朓詠薔薇詩新花對白日故蕋逐行風梁簡文帝採桑樂府細萍重疊長新花歴亂開蕭瑱詩拂筵多軟幹映户悉花叢陳後主採桑樂府去後花叢散曲水亭西杏園北王羲之蘭亭序清流激湍映帶左右引以為流觴曲水列坐其次劇談録開元中上已節賜宴臣僚會于曲江山亭恩賜教坊聲樂池中備綵舟數隻惟宰相三使北省官與翰林學士登焉一統志曲江亭在曲江池西南唐時宴進士處張禮遊城南記芙蓉園在曲江西南與杏園皆秦宜春下苑地穠芳深院紅霞色蘇頲詩曉入宜春苑穠芳吐禁中沈佺期詩誰謂此中難可到自憐深院得迴翔江淹詩喬松日夜疎紅霞旦夕生李白詩春光白門栁霞色赤城天擢秀全勝珠樹林劉義恭感春賦草承澤而擢秀花順氣而飛馨山海經三珠樹生厭火國北赤水上樹如栢葉皆為珠呉均詩安得崑崙山偃蹇三珠樹陳子昂感遇詩翡翠巢南海雌雄珠樹林結根幸在青蓮域班固南都賦結根竦本垂條嬋媛陶潜詩采采榮木結根于兹晉書佛圖澄傳澄呪鉢中青蓮花生法華經有人聞是亦能隨喜讃善者是人口中常出青蓮香艷蕋仙房次第開杜甫詩坐接春杯氣心傷艷蕋梢益部方物畧記娑羅花聚葩共房葉附華外根不得徙杜甫詩波漂菰米沈雲黒露冷蓮房墜粉紅書厥貢羽毛齒革疏諸州貢物多種其次第皆以當州貴者為先金剛經爾時世尊食時著衣持鉢入舍衞大城乞食於其城中次第乞已還至本處含烟洗露照蒼苔梁元帝賦登樓一望惟見逺樹含烟江淹詩沅湘含翠烟鄭愔詩風吹數蝶亂露洗百花鮮潘岳庭前安石榴賦壁衣蒼苔瓦被駁蘚龎眉倚杖禪僧起王襃四子講徳論龎眉耆耉之老咸愛惜朝夕張衡賦尉龎眉而郎潜兮逮三葉而遘武鮑照詩腰鐮刈葵藿倚杖牧雞豚廣韻禪静也僧沙門也輕翅縈枝舞蝶來陸雲寒蟬賦振修緌以表首舒輕翅而迅翰劉繪池上梨花詩縈叢似亂蝶梁簡文帝春日詩蝶颺縈空儛唐太宗述聖賦序舞蝶遊絲帶清飈而散彩李適詩蝶舞飛行飄御席鶯歌度曲繞仙杯上官儀初春詩花蝶來未已獨坐南臺時共美後漢書宣秉傳光武特詔御史中丞與司𨽻校尉尚書令會同並専席而坐故京師號曰三獨坐北齊書宋游道傳文襄以崔暹為御史中丞游道為尚書左丞曰卿一人處南臺一人處北省當使天下肅然事文類聚御史臺梁及後魏北齊謂之南臺閒行古刹情何已徐陵出自薊北門行燕山對古刹代郡隠城樓白帖莊嚴差别名之為刹梵刹者西域以柱表刹示所居處也花間一曲奏陽春徐悱妻劉氏答外詩鳴鸝葉中儛戲蝶花間騖世説王曇首年十四五便歌諸妓向謝公稱歎謝後出東府土山上作伎王時作兩丸髻著袴褶騎馬往土山下林中作一曲歌戰國策客有歌于郢中者始曰下里巴人國中屬而和者數千人其為陽春白雪國中屬而和者數十人而已鮑照詩蜀琴抽白雪郢曲發陽春應為芬芳比君子司馬相如上林賦芬芳漚鬰酷烈淑郁謝靈運山居賦對百年之髙木納萬代之芬芳梁元帝芳樹詩芬芳君子樹柳宗元漁翁杜甫詩九秋驚雁序萬里狎漁翁元結詩誰能相伴作漁翁漁翁夜傍西巖宿説文傍近也任昉文依林搆宇傍巖拓架南史雷次宗傳徵詣都為築室于鍾山西巖下謂之招隠館泰山記西巖為仙人石閭宗元本集注集中有西山宴遊記西巖即西山也詩獨寐寤宿永矢弗告岑參詩夜宿月近人杜甫詩相逢成夜宿隴月向人圎曉汲清湘然楚竹沈約文半蔵晚飱負户晨汲湘中記湘川清照五六丈下見底石如摴蒲矣杜甫詩明然林中薪暗汲石底井宋之問詩楚竹幽且深半雜楓香林杜甫詩秋風楚竹冷烟銷日出不見人陸機功臣頌身與烟銷名與風興盧思道詩鳥散空城久烟消古樹疎詩羔裘如膏日出有曜擊壤歌日出而作日入而息古羅敷行日出東南隅照見秦氏樓孟浩然詩日出氣象分始知江湖闊錢起湘靈鼓瑟詩曲終人不見江上數峯青欵乃一聲山水緑元結欵乃曲序大厯丁未中漫叟以軍事詣都使還舟行不進作欵乃五首舟子唱之葢欲取適於道路耳苕溪漁隠叢話元次山集欵乃曲注欵音襖乃音靄棹船之聲洪駒父謂欵音靄乃音襖遂反其音是不看次山集而妄為之說耳左思詩何必絲與竹山水有清音謝靈運詩昬旦變氣候山水含清暉庾肩吾詩水光懸蕩壁山翠下添流裴迪詩山翠拂人衣何遜詩水緑半含苔李白詩水緑天青不起塵迴看天際下中流王維詩閣道迴看上苑花謝朓詩天際識歸舟孟浩然詩孤帆天際看李白詩孤帆逺影碧空盡惟見長江天際流史記呉起傳武侯浮西河而下中流漢武帝秋風辭横中流兮揚素波丘遲詩櫂歌發中流巖上無心雲相逐陶𢎞景尋山誌散髮解帶盤旋巖上陶潛歸去來辭雲無心以出岫杜甫詩上有無心雲下有欲落石李白詩淵明歸去來不與世相逐張若虚揚州人兖州兵曺與賀知章張旭包融號吳中四士春江花月夜樂府詩集春江花月夜陳後主所作後主常與宫中女學士及朝臣相和為詩太常令何胥又善於文詠採其尤艷麗者以為此曲春江潮水連海平顔延之詩春江壯風濤抱朴子春日居東宿天高一萬五千里故春潮漸起也秋日居西宿天卑一萬五千里故秋潮漸減也左思呉都賦結輕舟而競逐迎朝水而振緡隋煬帝春江花月夜詩暮江平不動春花滿正開流波将月去潮水帶星來玉海枕江連海海上明月共潮生抱朴子月之精生水是以月盛而潮大楊泉物理論月水之精潮有大小月有虧盈海嶠志潮隨月虧盈灧灧隨波千萬頃何遜望新月詩灧灧逐波輕張衡南都賦澹澹隨波郭璞江賦排流呼吸隨波遊延後漢書黄憲傳郭林宗曰叔度汪汪若千頃陂何處春江無月明梁元帝江中月影詩即此春江上無俟百枝燃阮籍詩月明星稀天髙氣寒子夜歌天高星月明江流婉轉遶芳甸謝朓詩逈瞷蒼江流鮑照詩清流婉轉時欲沈隋煬帝樂府清歌婉轉繁絃促謝朓詩雜英滿芳甸張正見詩斂翮依芳甸月照花林皆似霰梁武帝詩朝日照花林庾信詩花林鳥未栖柳惲詩春花落如霰説文霰積雪也釋名霰星也氷雪相搏如星而散空裏流霜不覺飛陸機感時賦結凝霜于寒空張協七命越奔沙輾流霜注流猶飛也雲笈七籖流霜瑩雪禽經霜蜚則霜露翥則露七命風厲霜飛駱賔王啟霞煥霜飛汀上白沙看不見廣韻汀水際平沙也湘中記白沙如積雪梁元帝賦看白沙而似雪江天一色無纖塵謝莊詩霧罷江天分范雲詩江天自如合漢書梅福傳一色成體謂之醇梁武帝詩山河同一色王勃序秋水共長天一色劉瑾甘樹賦滌纖塵以開襟皎皎空中孤月輪古詩明月何皎皎傅休奕詩皎皎明月光列子夫天地空中之一細物庾信詩嬌轉滿空中梁簡文帝詩夕波照孤月徐儀詩蒼茫孤月上江總詩新月半輪空參同契詩撈出碧潭一輪月駱賔王詩弓開漢月輪江畔何人初見月劉向九歎步周流於江畔諸葛穎詩月色含江樹江月何年初照人何遜宿南洲浦詩江月初三五王融詩春江夜明月還望情如何盧照鄰詩江月夜臨空人生代代無窮己庾信司馬裔碑代代英賢􅄞康詩周覽無窮已江月年年祗相似陶潛詩年年見霜雪易與天地相似故不違傅縡詩如畫如花定相似不知江月待何人庾信詩不知髙㡬里低頭看世間王融詩結鏡待君明但見長江送流水江賦隩彼長江阮籍詩湛湛長江水詩沔彼流水陳子良詩月影素寒流白雲一片去悠悠詩英英白雲沈約詩白雲隨玉趾庾信至仁山銘瑞雲一片爾雅悠悠洋洋思也陸機賦天悠悠其彌高雲鬱鬱而四布青楓浦上不勝愁楚辭湛湛長江兮上有楓説文楓木厚葉弱枝爾雅注楓樹似白楊一統志青楓浦在長沙府劉陽縣張正見詩王孫春好遊雲鬢不勝愁誰家今夜扁舟子宋子侯詩不知誰家子庾信詩今夜長門月史記貨殖傳范蠡乗扁舟浮于江湖何處相思明月樓古詩上言長相思曹植詩相思無終極又明月照高樓流光正徘徊北史邢邵傳邵繕修觀宇皆為之名題有清風觀明月樓可憐樓上月徘徊梁簡文帝詩可憐枝上花庾肩吾詩樓上徘徊月窻中愁思人湯恵休詩月華始徘徊應照離人粧鏡臺梁元帝詩若使月光無逺近應照離人今夜啼魏文雜物疏鏡臺出魏宫中有純銀參帶鏡臺謝朓咏鏡臺詩照粉拂紅粧遮户簾中卷不去沈約咏月詩方暉竟户入圎影隙中來拾遺記椒花之房貫細珠為簾朝下以蔽影夕捲以待月王融咏幔詩月映不辭卷梁簡文帝詩正衣還向鏡迎春試卷簾𢷬衣砧上拂還來庾信詩畏思浣紗石空憶𢷬衣砧此時相望不相聞老子隣國相望雞犬之聲相聞願逐月華流照君呉均詩願逐東風去嵇康詩月華臨静夜庾信詩舟子夜離家開舲望月華曹植詩願為南流景馳光見我君鴻雁長飛光不度詩鴻雁于飛疏鴻雁愛力遇風迅舉馬援武溪深行滔滔武溪一何深鳥飛不度獸不敢臨魚龍潜躍水成文樂動聲儀風雨感魚龍嵇康詩魚龍瀺灂山鳥羣飛庾丹詩風至水迴文温子昇詩湛淡水成文昨夜閒潭夢落花隋煬帝春江花月夜詩夜露含香氣春潭漾月暉南史丘遲傳點綴映媚似落花依草梁武帝詩含桃落花日可憐春半不還家梁簡文帝詩可憐淮水去來潮春隄楊栁覆河橋藝文類聚一年分為四時時皆九十餘日春之半秋之半晝夜長短等庾信春賦三晡未醉莫還家江水流春去欲盡山海經岷山江水出焉東北流注于海江潭落月復西斜楚辭遊于江潭鮑照詩輕鴻戲江潭蕭綜詩西樹隠落月蕭和賦斜月西傾獨照蓬瀛斜月沈沈蔵海霧子夜歌斜月垂光照謝朓陳郎聨句春岸望沈沈清流見瀰瀰王襃咏霧詩帶樓凝海氣沈約望海詩分空臨海霧駱賔王詩海霧籠邉徼碣石瀟湘無限路書夾右碣石入于河史記秦始皇紀始皇之碣石使燕人盧生求羨門高誓刻碣石門壊城郭決通隄防漢書注碣石海邉山名一統志碣石山在永平府昌黎縣西北其山穹窿似塚有石特出其形如柱疑即禹貢冀州之碣石水經注二妃神遊洞庭之淵出入瀟湘之浦瀟者水清深也湘中記湘川清照五六丈下見底石如摴蒲矣五色鮮明白沙如霜雪赤崖若朝霞是納瀟湘之石矣一統志湘水源出廣西興安縣海陽山西北流至分水嶺分為二𣲖曰灕水流而南曰湘水流而北至永州與瀟水合故曰瀟湘不知乗月㡬人歸子夜歌乗月採芙蓉薛道衡詩人歸落雁後落月搖情滿江樹謝靈運詩摇蕩箕濮情謝朓詩雲中辨江樹宋之問詩河橋不相送江樹逺含情陳潤大厯間人終坊州鄜城令宿北樂館欲眠不眠夜深淺晉書陶潛傳貴賤造之者有酒輒設潛若先醉便語客曰我醉欲眠卿可去其真率如此後漢書第五倫傳倫回吾兄子嘗病一夜十返而安寢吾子有疾雖不省視而竟夕不眠世説許侍中顧司空俱作丞相従事嘗夜至丞相許戲二人歡極丞相命使入已帳眠顧至曉不得快熟許上牀便咍臺大鼾丞相顧諸客曰此中亦難得眠處劉瑗詩月光移數尺方知夜已深祖詠詩月出夜方淺越鳥一聲空山逺曹植詩願隨越鳥翻飛南翔張九齡詩思擾南山曲情揺越鳥枝江淹詩竊悲蘅杜暮攬涕即空山陶𢎞景詩空山霜滿高烟平謝靈運詩杪秋尋逺山山逺行不近庭木蕭蕭落葉時陶潛詩庭字倚餘木倐忽日月虧古詩白楊何蕭蕭江淹詩蕭蕭松柏隂淮南子木葉落長年悲杜甫詩無邊落木蕭蕭下溪聲雨聲渾不辨謝靈運長溪賦飛急聲之瑟泊梁元帝詩風送雨聲遲夜短更籌急莊子兩涘渚涯之間不辨牛馬溪流潺潺雨習習謝朓詩山積陽陵阻溪流春穀泉魏文帝樂府谷水潺潺木落翩翩詩習習谷風以陰以雨燈影山光滿窻入張正見詩華燈共影落杜甫詩燈影照無睡沈約詩山光浮水至常建詩山光悦鳥性謝靈運佛影銘激波映墀引月入窻棟裏不知渾是雲隂鏗詩棟裏歸雲白窻外落暉紅王維詩不知棟裏雲去作人間雨曉來但覺衣裳濕晉書王徽之傳西山朝來致有爽氣庾信詩山深雲濕衣祖詠詩雲濕坐禪衣皎然姓謝氏名晝長城人靈運十世孫也居抒山文章儁麗顔真卿聿應物並重之與之酬唱貞元中勅寫其文集入於秘閣詩七卷支公詩髙逸沙門傳支遁字道林河内林慮人或曰陳留人本姓闗氏少而任心獨往風期高亮嘗於餘杭山沈思道行冷然獨暢後終于洛陽支公養馬復養鶴世説支道林嘗養馬數匹或言道人畜馬不韻支曰貧道重其神駿又支道林好鶴有人遺以雙鶴少時翅長欲飛意甚惜之乃鎩其翮鶴反顧其翅垂頭視之道林曰既有凌霄之心何肯作人耳目近玩養其翮成縱之使去率性無機多脱畧禮記率性之謂遒北史辛慶之傳慶之率性儉素不尚華侈莊子漢陰丈人曰有機械者必有機事有機事者必有機心晉書謝尚傳尚開率穎秀脱畧細行不為流俗之事江淹恨賦脱畧公卿跌宕文史何遜詩顧予晚脱畧懐抱日淹淪天生支公與凡異詩天生烝民有物有則汝南先賢傳薛勤造陳仲舉其父出迎勤曰足下有不凡子吾來候之范縝神滅論聖人之形必異於凡髙僧傳支遁幼有神理聰明秀徹家世事佛早悟非常之理凡情不到支公地梁昭明太子解二諦義凡情所見見其起動聖人所見見其不生得道由來天上仙髙僧傳耆域曰八嵗雖誦百嵗不行誦之何益人皆知敬得道者不知行之自得道南史謝靈運傳孟顗事佛精懇靈運嘗謂顗曰得道書須慧業丈人生天當在靈運前成佛必在靈運後隋元始天尊開刼度人為所度者皆諸天仙上品為僧却下人間寺髙逸沙門傳道林家世奉佛年二十五入道按莊子有人間世一篇張仙卿詩騁景葢飛霄尋此人間契事物紀原漢明帝時攝摩騰自西域以白馬䭾經來初止鴻臚寺遂取寺為名創置白馬寺髙僧傳遁投跡越之剡山于沃洲小嶺立寺行道僧衆稟學時有情者遁著銘以朂之世説支道林従東出住東安寺道家諸子論自然史記禮書孝文好道家之學以為繁禮飾貌無益于治陳丞相世家平曰我多陰謀是道家之所禁漢書戰國縱横真偽分争諸子之言紛然淆亂老子人法地地法天天法道道法自然此公惟許逍遥篇晉書阮籍傳裕有肥遁之志王羲之曰此公近不驚寵辱世説支道林在白馬寺與馮太常共語因及逍遥支卓然標新義于郭向之表又道林與王羲之論逍遥篇支作數千言才藻新竒王遂披襟解帶流連不能已山陰詩友喧四座世説支道林與許謝輩共集王家謝顧謂諸人今日可謂彦會當共言詠因取莊子漁父一篇支作七百語四座稱善晉書王羲之傳初度浙江便有終焉之志㑹稽有佳山水名士多居之謝安孫綽李充許詢支遁皆以文義冠世與羲之同好嘗宴集于㑹稽山陰之蘭亭流觴賦詩佳句縦横不廢禪晉書孫綽傳嘗作天台賦以示友人范榮期每至佳句輒云應是我輩語揚雄解嘲一縦一横論者莫當世説支道林作即色論示王郎中王都無言説支曰默而識之乎王曰既無文殊誰能見賞觀王右丞維滄洲圗歌滄洲誤是真書嶓冢導漾東流為漢又東為滄浪之水疏漢水有二源東源出秦州嶓冢始出為漾二水南流為沔至漢中東流為漢水武當縣北四十里有洲曰滄浪洲水曰滄浪水杜甫詩何年顧虎頭滿壁畫滄洲北史齊廣寧王孝珩傳孝珩嘗於射堂壁畫一蒼鷹見者皆以為真唐朝名畫録韋偃以越筆點簇山水雲烟曲盡其妙宛然如真萋萋忽盈視詩維葉萋萋楚詞春草生兮萋萋潘岳籍田賦襲春服之萋萋兮接游車之轔轔王勃滕王閣序山原曠其盈視便有春渚情南史謝朓傳惟待清江可望俟歸艎於春渚謝靈運詩笳鳴發春渚税鑾登山椒歴代名畫記天生縦任無所祖述動筆形似畫外有情褰裳掇芳芷詩子恵思我褰裳涉溱楚辭因芙蓉以為媒兮憚褰裳而濡足何遜詩振衣喜初霽褰裳對晚晴詩采采芣苢薄言掇之楚辭畦㽞夷與揭車兮雜杜蘅與芳芷劉向九歎淹芳芷於腐井兮弃雞駭於筐簏颯然風至草不動風賦楚襄王遊於蘭臺之宫宋玉景差侍有風颯然而至論語草上之風必偃潘岳射雉賦雖形隠而草動本草别録獨活得風不搖無風自動始悟丹青得如此沈約詩方悟大音賖周禮秋官職金凡金玉錫石丹青之戒令受其入征者漢書蘇武傳竹帛所載丹青所畫管子丹青在山民知而取之晉書桓温傅木猶如此庾信賦樹猶如此陶潛詩但願長如此躬耕非所嘆丹青變化不可尋易乾道變化又四時變化而能久成漢書外戚傳世俗嵗殊時變日化張衡賦玩陰陽之變化兮詠雅頌之徽音棗據詩惟憑嘉謨高迹可尋翻空作有移人心文心雕龍意翻空而易竒詞徵實而難巧莊子自無適有以至於三而況自有適有乎陶𢎞景詩宅無乃生有在有則還空晉書紀瞻傳海外移心重譯入貢樂府解題伯牙學琴于成連成連云吾師方子春今在東海中能移人情易聖人感人心而天下和平猶疑雨色斜拂座蕭詮巫山髙雨色詎分空宋之問詩雨色搖丹嶂泉聲聒翠微岑參宿東溪詩晚來南村黒雨色和人烟杜甫詩沱水臨中座乍似水涼來入襟劉孝綽詩倚巖欣石冷臨池愛水涼謝恵連歌涼來温謝寒往暑却班婕妤𢷬素賦桂露朝滿凉襟夕輕梁簡文帝詩避暑高梧側清風來入襟杜甫詩繪事功殊絶幽襟興激昻滄洲説近三湘口寰宇記湘潭湘鄉湘陰為三湘陶潛詩遥遥三湘滔滔九江崔湜襄陽詩江山距七澤烟雨接三湘南史何尚之傳夏口在荆江之中正對沔口誰知卷得在君手謝靈運文帙舒軸巻詩六轡在手魏志陳思王傳自少至終篇籍不離于手南史臧嚴傳行止書巻不離手披圗擁褐臨水時穆天子傳天子至崑崙之丘披圗視典梁宣帝遊七山寺賦披圗悟于禹心庾信馬射賦序舜以甲子之朝披圗而巡洛陶潛詩淒厲嵗云暮擁褐曝前軒楚辭登山臨水送将歸翛然不異滄浪叟莊子翛然而往侗然而來是謂衞生之經世説南陽劉驎之隠于陽岐荆州刺史桓冲徵為長史一見冲因陳無用翛然而退又庾子嵩讀莊子開巻一尺許便放去曰了不異人意岑參詩扁舟滄浪叟心與滄浪清蔡邕月令問答叟長老之稱御選唐詩卷九
