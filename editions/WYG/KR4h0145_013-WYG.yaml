body:
  text: 欽定四庫全書御選唐詩巻九七言古儲光羲薔薇本草薔薇一名牛棘一名牛勒一名山棗一名薔蘼裊裊長數尋吴均詩裊裊能隨風離離堪度日小爾雅四尺謂之仞倍仞謂之尋尋舒兩肱也陸機詩女蘿亦有託葛蔓亦有尋青青不作林楚辭秋蘭兮青青古樂府青青園中葵古詩青青河畔草崔駰達㫖髙樹靡陰獨木不林一莖獨秀當庭心説文莖草木幹也杜公瞻咏同心芙蓉詩一莖孤引綠雙影共分紅竹譜凌羣獨秀蓊茸紛披唐太宗桃詩如何仙嶺側獨秀隠遥芳子夜歌階上香入懷庭中花照眼數枝分作滿庭陰古詩枝枝相覆葢葉葉相交通張衡西京賦吐范揚榮布葉垂陰陸機樂府和風習習薄林柔條布葉垂陰春日遲遲欲將半詩春日遲遲爾雅遲遲徐也左傳一年分為四時時皆九十餘日春之半秋之半晝夜長短等晝夜中分百刻故春秋之半稱春秋分庭影離離正堪玩江總詩庭暉連樹彩簷影接雲光甄后詩其葉何離離左思詩離離山上苗沈約詩繁蔭上蓊茸促節下離離風動露滴瀝月照影參差枝上嬌鶯不畏人沈約詩流鶯復滿枝江總詩金谷萬株連綺甍梅花宻處蔵嬌鶯王襃詩初春麗景鶯欲嬌葉底飛蛾自相亂陶潜詩薔薇葉已抽王襃詩薔薇花開百重葉古今注蛺蝶一名野蛾又蛾飛廣五六丈謝朓詩飛蛾再三繞輕花四五重劉孝綽蝶詩出沒花中見參差葉際飛庾信賦蛾飛則碎花亂下秦家女兒愛芳菲古辭陌上桑秦氏有好女自名為羅敷楚辭芳菲菲其彌章庾肩吾詩佳期竟不歸春日生芳菲庾信詩今朝風日好園苑足芳菲畫睂相伴采葳蕤漢書張敞傳敞為婦畫眉沈約樂府小婦獨無事對鏡畫蛾睂張華詩相伴步園疇鮑泉薔薇詩佳麗新粧罷含笑折芳叢謝朓詩葳蕤向春秀栁惲薔薇詩當户種薔薇枝葉太葳㽔髙處紅鬚欲就手梁簡文帝詩下枝低可見髙處逺難知梁元帝薔薇詩牆髙舉不及潘岳安石榴賦緗的點于紅鬚江總永陽王山亭銘山條紫的水葉紅鬚宋子侯詩提籠行採桑素手折其枝低邊綠刺已牽衣謝朓薔薇詩低枝詎勝葉輕香幸自通杜審言詩紫藤縈葛藟綠刺􅇢薔薇梁簡文帝賦荷稠刺宻亟牽衣而綰裳梁元帝看摘薔薇詩横枝斜綰袖嫩葉下牽裾蒲桃架上朝光滿博物志張騫使西域還得蒲桃廣志蒲桃有黄白黒三種左思魏都賦蒲桃結陰劉緩摘薔薇詩繞架尋多處窺叢見好枝梁簡文帝詩朝光照皎皎久漏轉駸駸楊栁園中暝鳥飛詩楊栁依依古詩鬱鬱園中栁梁簡文帝詩水曲文魚聚林暝鴉鳥飛連袂踏歌従此去潘岳藉田賦躡踵側肩掎黨連袂唐書元徳秀傳明皇酺五鳳樓下命三百里縣刺史皆以聲樂集徳秀時為魯山令惟樂工數十人連袂歌于蒍于舊唐書睿宗紀上元夜上皇御安福門觀燈出内人連􅃑踏歌縦百寮觀之風吹香氣逐人歸詩蘀兮蘀兮風其吹女梁簡文帝薔薇詩氤氲不肯去還來上階香庾信賦夜風吹香氣隨謝朓薔薇詩新花對白日故蕋逐行風劉緩摘薔薇詩鮮紅同映水輕香共逐吹張謂字正言河南人天寳二年登進士第乾元中為尚書郎大厯間官至禮部侍郎三典貢舉湖中對酒作夜坐不厭湖上月世説司馬太傅齋中夜坐於時天月明浄都無纖翳太傅歎以為佳魏文帝典論自敘逐禽輒十里馳射常百步日多體健心毎不厭海山記湖上月偏照列仙家晝行不厭湖上山世説王子敬云従山陰道上行山川自相映發使人應接不暇儲光羲詩東風何時來吹綠湖上山眼前一尊又長滿謝靈運詩浮歡昧眼前蘇武詩我有一尊酒欲以遺逺人沈約詩勿言一尊酒明日難重持後漢書孔融傳融好士賔客日盈其門嘗嘆曰座上客常滿尊中酒不空吾無憂矣心中萬事如等閒何遜詩相思不可寄直在寸心中禮記萬事得其序史記滑稽傳萬事盡然言不可極梁簡文帝詩離憂等閒别主人有黍萬餘石史記淳于髠傳主人留髠而送客西京雜記曺元理過友人陳廣漢廣漢為之取酒鹿脯數片曰有倉猝客無倉猝主人詩有稷有黍有稻有秬史記大宛傳宛左右以蒲陶為酒富人蔵酒至萬餘石久者數十嵗不敗濁醪數斗應不惜左思魏都賦清酤如濟濁醪如河江淹賦濁醪夕引素琴晨張史記淳于髠傳臣飲一斗亦醉一石亦醉子夜歌傾倒無所惜即今相對不盡歡後漢書張禹傳彭宣之來也禹見之於便坐講論經義日晏賜食不過一肉巵酒相對蜀志費禕傳常以朝晡聴事其間接納賔客飲食嬉笑每盡人之歡事亦不廢南史孔淳之傳淳之與王敬𢎞為人外之游敬𢎞女適淳之子以烏羊繫所乗車轅提壺為禮盡歡共飲迄暮而歸别後相思復何益謝靈運詩别後情更延李陵詩萬里遥相思古詩著以長相思縁以結不解後漢書孟敏傳甑已破矣顧之何益益又張升傳升任情不羈常嘆曰茍不相識従物何茱萸灣頭歸路賖元和志茱萸灣隋仁夀四年開以通漕運其側有茱萸村因名通志茱萸灣在江都縣東北二十里漢吳王濞開茱萸灣通海陵倉是也梁簡文帝阻歸賦終知客遊之阻無解歸路之賖願君且宿黄公家世説桓濬冲為尚書令乗軺車經黄公酒壚下顧謂後車客吾昔與叔夜嗣宗共酣飲於此今對此雖近邈若山河風光若此人不醉庾信詩日色臨平樂風光滿上蘭李嶠詩鳳城春色已含韶人日風光倍覺饒詩厭厭夜飲不醉無歸參差辜負東園花阮籍詩四時更代謝日月遞參差李陵答蘇武書辜負陵心區區之意阮籍詩嘉樹下成蹊東園桃與李王季友河南人家貧賣履博極羣書豫章太守李勉引為賔客甚敬之杜甫詩所謂豐城客子王季友也觀于舍人壁畫山水唐書百官志中書省舍人六人掌侍進奏參議表章起居舍人二人掌修記言之史通事舍人十六人掌朝見引納殿庭通奏野人宿在山家少孟子其所以異于深山之野人者㡬希嵇康與山濤書野人有快曝背而美芹子欲獻之至尊庾信小園賦名為野人之宋是為愚公之谷劉琨扶風歌朝發廣莫門暮宿丹水山李爽山家閨怨詩山中無早梅荆扉逹曙開張正見山家閨怨詩山中桂花晚勿為俗人留朝見此山謂山曉蔡琰十八拍朝見長城兮路杳漫陶潛詩採菊東籬下悠然見南山江淹詩此山具鸞鶴往來盡仙靈范雲詩桂水澄夜氣桂山清曉雲伏知道詩曉色映山明半壁仍棲嶺上雲庾信寒園即目詩遊仙半壁畫隠士一牀書陶𢎞景詩山中何所有嶺上多白雲開簾欲放湖中鳥謝莊雪賦始緣甍而冒棟終開簾而入隙王僧孺詩二八人如花三五月如鏡開簾一種色當户兩相映何遜詩開簾覺水動徐悱妻劉氏詩開簾對春樹王叔之傷孤鳥詩序偶得二鳥将欲放之夜黄曲湖中百種鳥半雌半是雄獨坐長松是阿誰劉琨答盧諶詩序塊然獨坐穆天子傳天子升長松之隥戰國策墨子曰荆有長松文梓孫綽賦蔭落落之長松薛道衡詩澗影落長松三國志龎統傳向者之論阿誰為失古詩家中有阿誰趙整琴歌一旦緩急語阿誰再三招手起來遲易初筮告再三瀆書至于再至于三古詩一彈再三歎慷慨有餘哀沈約詠箎詩雕梁再三繞輕塵四五移王逸楚辭章句以手曰招以言曰召蜀志黄權傳宣王與諸葛亮書曰黄公衡快士也每坐起歎述足下于公大笑向余説漢書于公為廷尉髙大其門閭子定國為丞相隋書于仲文為遷安太守蜀中為之語曰明㫁無雙有于公漢書高帝紀九年十月置酒前殿羣臣皆稱萬嵗大笑為樂小弟丹青能爾為魏文帝艷歌何嘗行小弟雖無官爵鞍馬􅀈􅀈往來王侯長者遊漢書蘇武傳竹帛所載丹青所畫張綱集書功金石圗形丹青古詩石犬不可吠銅䭾徒爾為宿東谿李十五山亭上山下山入山谷南史謝靈運傳靈運尋山陟嶺必造幽峻巖障數十重莫不備盡登躡常著木屐上山則去其前齒下山去其後齒古樂府上山采蘼蕪下山逢故夫夏侯湛小路吟冒晨朝兮入大谷馮衍顯志賦陂山谷而閒處兮守寂寞而存神陳琳游覽詩肅肅山谷風黯黯天路陰谿中落日留我宿謝靈運撰征賦望新晴於落日起明光于隮月韓非子衞靈公告師㳙曰有鼓新聲者使人問左右盡報弗聞子為聴而寫之師㳙因静坐撫琴而寫之明日報曰臣得之矣請復一宿習之靈公因復留宿明日而習之松石依依當主人宋書蕭思話傳従太祖登鍾山北嶺中道有磐石清泉上使于石上彈琴因賜以銀鍾酒謂曰相賞有松石間意顔延之曲水詩序松石峻絶蔥翠陰烟詩昔我往矣楊栁依依公羊取郜大鼎于宋傳此取之宋其謂之郜鼎何器從名地従主人班固西都賦有西都賔問於東都主人主人不在意亦足世説嵇康與吕安善毎一相思千里命駕安後來値康不在喜出户延之不入王羲之帖省足下别疏具彼土山川諸竒揚雄蜀都左太冲三都殊為不悉彼故為多竒令人遊目意足也名花出地兩重階古樂府捻香散名花易雷出地奮古詩阿閣三重階絶頂平天一小齋王襃詩絶頂日猶晴吴均書東有青山絶壁平天韻㑹燕居之室曰齋本意由來是山水後漢書張敏傳孔子垂經典臯陶造法律原其本意皆欲禁民為非也南史陶𢎞景傳性愛山水每經澗谷必坐臥其間文心雕龍志在山水琴表其情何用相逢語舊懷樂府越謡歌君乗車我戴笠他日相逢下車揖君步行我乗馬他日相逢馬當下嵇康詩黄老路相逢元結字次山河南人擢上第復舉制科國子司業蘇源明薦之結上時議三篇擢右金吾兵曺參軍攝監察御史為山南西道節度㕘謀以討賊功遷監察御史裏行代宗授著作郎拜道州刺史進容管經畧使罷還杜甫覽結舂陵行曰不意復見比興體制微婉頓挫之詞宿無為觀名勝志無為觀在九疑山梁太清年建九疑山深㡬千里漢書地理志零陵郡營道縣九疑山在其南水經注九疑山盤基蒼梧之野峯秀數郡之間異嶺同勢遊者疑焉故名九疑一統志山在藍山縣西南五十里史記貨殖傳淵深而魚生之山深而獸往之江總詩遼西水凍春風少薊北鴻來路㡬千謝莊月賦隔千里兮共明月峯谷﨑嶇人不到名勝志九疑山有九峯峯導一溪岫壑重阻庾信麥積崖佛龕銘髙峯尋雲深谷無景詩瞻彼阪田箋阪田﨑嶇磽确之田陶潜歸去來辭既窈窕以尋壑亦﨑嶇而經丘長笛賦間介無蹊人迹罕到山中舊有仙姥家王韶之神境記九疑山有九井昔何侯煉丹於此汲一井則九井皆動又有魯女觀在何侯宅西庾肩吾詩山中定可留郭璞文請藥西姥烏得如羿神仙傳王方平以千錢與餘抗姥相聞求其沽酒王勃詩鶴岑有竒徑麟洲富仙家十里飛泉遶丹竈名勝志九疑山修真四壇第一壇有古人煉丹鐺釡第二壇有青池東流楚辭吸飛泉之微液兮懷琬琰之英華陸機詩飛泉漱鳴玉慎蒙山栖志魏野居陜東郊手植竹樹清泉環遶江淹詩守丹竈而不顧鍊金鼎而方堅庾信詩自可尋丹竈何勞憶酒罏如今道士三四人詩始者不如今云不我可杜甫詩艱難昧生理飄泊到如今大霄琅書經人行大道號曰道士道士者何理也事也身心順理惟道是従従道為事故稱道士王和論書表羲之性好鵞山陰曇􅙓邨有一道士養鵞十餘王清旦乗小船故往意大願樂郭璞詩青谿千餘仞中有一道士阮籍詩仙者四五人逍遥宴蘭房茹芝鍊玉學輕身庾闡登九疑山詩懸巖漏石髓芳谷挺丹芝冷冷雲珠落漼漼玉蜜滋易林茹芝餌黄飲食玉瑛杜甫詩吾愛漢初老時清猶茹芝雲及七籖紫微王夫人詩鍊玉飛八瓊李白詩仙人鍊玉處羽化留餘蹤史記留侯世家良乃學辟穀導引輕身本草黄精白术久服輕身不飢葳蕤逺志久服好顔色輕身不老霓裳羽葢􅅖臨壑楚辭青雲衣兮白霓裳神仙感遇傳仙女皆素練寛衣舞於廣庭曰霓裳羽衣也張衡東京賦羽葢葳蕤葩瑵曲莖蜀志先主傳少時與宗