无咎象曰或躍在淵進无咎也古今注甘露二年龍見上郡騰躍五色沈約宋書太祖為宜都王纂大位在道冇黒龍躍出負上所乘舟易乾九五飛龍在天利見大人象曰飛龍在天大人造也莊子藐姑射之山有神人焉乗雲氣御飛龍而逰乎四海之外張衡東京賦龍飛白水鳯翔參墟龍徳先天天不違易見龍在田利見大人何謂也子曰龍徳而正中者也又先天而天弗違後天而奉天時天且弗違而况於人乎池開天漢分黄道唐太宗詩池開照膽鏡詩維天有漢監亦有光又倬彼雲漢為章於天漢書蕭何傳語曰天漢其稱甚美又天文志日有中道月有九行中道者黄道也一曰光道月有九行者黑道二出黄道北赤道二出黄道南白道二出黄道西青道二出黄道東龍向天門入紫微漢書禮樂志天門開詄蕩蕩北史齊文宣紀従文襄行過遼陽山獨見天門開餘無人見者列子清都紫微帝之所居晉書天文志紫微大帝之座也天子之常居也邸第樓臺多氣色説文邸屬國之舍也漢書髙帝紀注第謂甲乙之次第後漢書安帝紀帝自在邸第數有神光照室三齊記海上蜃氣時結樓臺徐陵詩樓臺非一勢臨玩自多奇何遜詩山中氣色滿君王鳬鴈有光輝説苑君之鳬雁食以菽粟西京雜記太液池邊皆是彫胡紫蘀緑節之類其間鳬雛雁子布滿充積漢郊祀歌配上帝兮揚光輝古長歌行萬物生光輝為報寰中百川水梁元帝長沙寺碑咸秩社首義盡於寰中李百藥詩聲教盡寰中莊子秋水時至百川灌河淮南子百川學海而至於海丘陵學山而不至於山木華海賦嘘吸百川洗滌淮漢來朝此地莫東歸書江漢朝宗於海傳二水入海有似於朝宗尊也漢書溝洫志河決率常於平原東郡聞禹治河時本空此地以爲水隈唐太宗過舊宅詩一朝辭此地四海遂爲家張正見詩塗山萬國仰滄海百川歸侍宴安樂公主新宅應制唐書諸公主傳安樂公主營第及安樂佛廬皆憲寫宫省而工緻過之皇家貴主好神仙蔡邕述行賦皇家赫而天居彰陸機詩垂慶惠皇家陸雲詩象齒南金來格皇家漢書髙帝紀相魯元公主亦皆貴後漢書皇后紀漢制皇女皆封縣公主儀服同列侯其尊崇者加號長公主儀服同藩王漢書郊祀志燕齊方士言有神仙祭祀致福之術者以萬數漢書揚雄傳往時武帝好神仙别業初開雲漢邊南史謝靈運傳移籍㑹稽脩營别業石崇思歸引序肥遯於河陽别業梁簡文帝詩珠簾影空捲桂户向池開詩倬彼雲漢為章于天阮籍詩雲漢邈無梁鮑照詩林際無窮極雲邊不可尋山出盡如鳴鳯嶺水經注山形特秀異於衆嶽亭亭逺出唐書武后紀垂拱二年有山出於新豐縣改新豐為慶山列仙傳蕭史者善吹簫秦穆公冇女字弄玉妻焉教弄玉吹簫作鳯鳴感鳯凰來集一旦皆隨鳯去一統志鳯翔府有鳴鳯山舊傳嘗有鳯鳴其上池成不讓飲龍川唐書安樂公主嘗請昆明池為私沼帝曰先帝未有以與人者主不悦自鑿定昆池延袤數里辛氏三秦記龍首山長六十里頭入渭水尾達樊川云昔有黒龍従南山出飲渭水其行道因成土山粧樓翠幌教春住盧思道詩粧樓對馳道宋文帝詩瑶軒籠翠幌唐太宗詩彤庭飛綵斾翠幌曜明璫廣韻幌帷幔也庾信銘比花依樹登榭要春舞閣金鋪借日懸何胥詩舞閣思陽春陳子良詩綺雲臨舞閣丹霞薄翠臺西都賦排玉户而颺金鋪蜀都賦金鋪交暎張正見詩飛闥敞金鋪三輔黄圖注金鋪者扉上有金花花中作獸及龍蛇鋪者以銜環也易懸象著明莫大乎日月劉楨詩仰視白日光皎皎高且懸詩敬従乗輿來此地齊書豫章王嶷傳永明末車馬數逰幸惟嶷陪従鮑照啟振纓珥筆聨承貴寵豈臣浮朽所可叅從蔡邕獨㫁天子車馬衣服器械百物曰乘輿子虚賦乗輿弭節徘徊翺翔曹植詩玉馬充乗輿芝蓋樹九華劉繪詩江山信多美此地最為神稱觴獻夀樂鈞天亢倉子景王步前稱觴為亢倉子夀傅休奕詩臨軒進爵獻夀翩翩漢書叔孫通傳上夀觴九行史記趙世家趙簡子疾五日寤曰我之帝所甚樂與百神逰於鈞天廣樂九奏萬舞不類三代之樂其聲動心西京賦昔者大帝悦秦穆公而覲之饗以鈞天廣樂庾信詩出豫奏鈞天李嶠奉和人日宴大明宫恩賜綵縷人勝應制荆楚嵗時記正月七日為人日剪綵為人或鏤金箔為人帖屏風上亦戴之頭鬢使入新年形容改新賈充典戒人日造華勝相遺像瑞圖金勝之形又像西王母戴勝也雍録大明宫本太極之後苑東北面射殿也地在龍首山上太宗初於其地營永安宫貞觀九年改名大明宫高宗龍翔二年就脩大明宫改名蓬萊取殿後蓬萊池為名也咸亨元年改為含元殿長安五年又改為大明宫唐書地理志龍朔後皇帝常居大明宫鳯城景色己含韶六典大明宫南面五門正南曰丹鳯門杜詩趙注秦穆公女吹簫降其城因號丹鳯城其後言京師之城曰鳯城戴暠詩黒龍過飲渭丹鳯俯臨城本集詠城詩獨下仙人鳯羣驚御史烏南史宋孝武紀三月乙未建牙於軍門其日牙立之後景色開霽鮑至詩年還節已仲舒緑氣方韶梁元帝纂要春曰青陽景曰媚景和景韶景人日風光倍覺饒李充登安仁峯銘正月七日厥日惟人䇿我良駟陟彼安仁謝朓詩風光草際浮江洪詩日沒風光靜逺山深無雲梁簡文帝詩樹密風聲饒江總洛陽道樂府槐路風塵饒桂吐半輪迎此夜庾肩吾望月詩星流時入暈桂長欲侵輪吴均詩疎風時吐月劉孝綽望月詩輪光缺不半扇影出將圓鮑泉望月詩此夜月將弦蓂開七葉應今朝田俅子堯為天子蓂莢生於庭為帝成歴白虎通蓂莢者樹名月一日一莢生十五日畢至十六日一莢去故夾階而生以明日月也述異記堯爲仁君歴草生階宋書符瑞志一名歴筴月小則一莢焦而不落劉義恭頌昔在放勲蓂莢數朝薛道衡人日詩入春纔七日詩以永今朝梁簡文帝三月三日詩握蘭惟是旦