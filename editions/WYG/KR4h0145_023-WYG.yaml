樹為姓未詳吹律之本翩翩來伴慶雲翔詩翩翩者佳烝然來恩劉孝威驄馬驅樂府翩翩驄馬驅横行復斜趨虞舜卿雲歌卿雲爛兮糺縵縵兮史記天官書若烟非烟若雲非雲郁郁紛紛蕭索輪囷是為卿雲正義卿音慶漢書禮樂志甘露降慶雲出曹植五㳺詠九州不足步願得凌雲翔傅休奕降神歌澤雲翔化風舒遥同蔡起居偃松篇唐書職官志起居郎起居舎人掌錄天子起居法度天子御正殿則郎居左舍人居右冇命退而書之季終以授史官貞觀中以給事諫議大夫兼知起居清都衆木總芬榮説文天子所宫曰都列子清都紫微鈞天廣樂帝之所居沈約松賦清都之念方逺姑射之想悠然謝朓髙松賦以衆木之為選貫山川而自永陳子昻詩孤松宜嵗晚衆木愛芳春陶潛歸去來辭木欣欣以向榮孫綽文譬若春圃載芬載敷傳道孤松最出羣周禮訓方氏誦四方之傳道注傳道世之所傳説往古之事也楚辭邃古之初誰傳道之陶潛歸去來辭撫孤松而盤桓謝偃髙松賦何兹松之挺秀擢脩幹於孤林後漢書蔡邕傳拔萃出羣揚芳飛文名接天庭長景色法言仰天庭而知天下之居卑也哉魯靈光殿賦高經華葢仰看天庭鮑照詩松色隨野深江淹詩風光多樹色崔融表得五方之氣象合四時之景色氣連宫闕借氛氲史記松栢為百木之長也而守宫闕梁簡文帝頌序氛氲四照輝麗五色沈約詩氛氲屢迴沒吴均詩氛氲如冇意懸池的的承華露晉中興書耆老得敬則松栢受甘露顔師古賦光風細轉清露㣲懸沈約髙松賦既捎雲於清漢亦倒景於華池李徳林松詩擢秀邇華池注南子注的的明也梁簡文帝詩的的半臨池三秦記漢上林苑有承露池張正見詩葉淺還承露顧煊露詩飛空猶藴狀集物始成華偃蓋重重拂瑞雲玉記千年松樹枝葉四面披起上杪不長望之有如偃蓋抱朴子天陵偃蓋之松張正見詩西北春雲起遥臨偃蓋松西京雜記太液池西冇一池池上冇洲洲上有樹一株六十餘圍望之重重如蓋王儉髙松賦上拂天而獨逺下流雲而自重西京雜記瑞雲曰慶雲曰景雲孫氏瑞應圖捎雲瑞雲也人君徳至則出若樹木捎捎然也不惜流膏助仙鼎古詩不惜歌者苦漢武内傳藥冇松柏之膏服之可以延年𤣥中記松膏流入地中千年為茯岑江淹詩廣成愛神鼎淮南好丹經沈佺期詩仙人六膳調神鼎願將楨幹奉明君詩維周之楨傳楨幹也疏周王之國能生此賢人則是我周家幹事之臣臣能幹事則國以人安晉書凉武昭王傳挺秀幹之菁蔥經嵗寒而彌芳書元首明哉王粲詩結髪事明君受恩良不訾按此詩舊作七言律全唐詩篇末多二句云莫此㝠靈南楚樹朽老江邊代不聞遂載入徘律中今仍舊王維積雨輞川莊作舊唐書文藝傳維别墅在輞川雍録輞川在藍田縣王維别墅在焉本宋之問别圃也一統志輞川在西安府藍田縣西南積雨空林烟火遲庾信詩繁雲猶暗嶺積雨未開庭杜審言詩積雨生昬霧謝靈運詩空林響法鼓列子庖厨之下不絶烟火史記律書天下殷富粟至十餘錢鳴雞吠狗烟火萬里嵇康養生論意速而事遲蒸藜炊黍餉東菑王褒頌羮藜含糗者不足與論太牢之滋味詩疏藜莖葉皆如王芻蒸為茹古今注稻之黏者為黍晉書裴楷傳炊黍在甑詩饁彼南畝傳孫炎曰饁野之餉吴均詩賴此持相餉爾雅田一嵗曰菑謝朓詩籉笠聚東菑漠漠水田飛白鷺陸機君子冇所思行廛里一何盛街巷紛漠漠謝朓詩逺樹曖阡阡生烟紛漠漠晉書食貨志東南以水田為業人無牛犢隋書髙穎傳水田早熟蕭慤詩菱潭兩飛鷺劉孝威詩白鷺隠青苗梁簡文帝詩船移白鷺飛隂隂夏木囀黄鸝漢書禮樂志靈之至慶隂隂王粲思友賦夏木兮結莖春鳥兮愁鳴陶潛詩夏木獨森疎蘇頲詩黄鸎急囀春風盡詩黄鳥于飛集于灌木其鳴喈喈陸璣詩疏黄鳥黄鸝留也或謂之黄栗留幽州人謂之黄鶯高隠外書戴顒春日攜雙柑斗酒往聴黄鸝聲山中習靜觀朝槿梁書陶𢎞景傳自號華陽隠居時人謂為山中宰相沈約詩山中有桂樹易林奇適無偶習靜獨處王勣逰北山賦聊習靜而為娱埤雅木槿五月始華華如葵潘岳朝菌賦序朝菌者蓋朝華而暮落世謂之木槿江總木槿詩朝霞暎日殊未妍珊瑚照水定非鮮王僧孺詩妾意在寒松君心逐朝槿松下清齋折露葵陶潛詩班荆坐松下又維本集詩科頭箕踞長松下舊唐書文藝傳維奉佛居常疏食不茹葷血晚年長齋不衣文采真誥清齋禮太素支遁詩令月肇清齋唐太宗春池栁詩㑹須君子折宋玉賦煑露葵之羮潘岳閒居賦緑葵含露古諺觸露不搯葵野老與人爭席罷庾信詩野老時相望山僧或見尋唐明皇詩野老茅為屋孟子善與人同老子夫惟不爭故天下莫能與之爭莊子陽子居遇老子蹵然變容曰敬聞命矣其往也舍者避席其反也舍者與之爭席矣北齊書崔暹傳諸公在坐暹高視徐步而入不讓席而坐徐陵詩日斜馳逐罷海鷗何事更相疑列子海上之人有好鷗鳥者每旦従鷗鳥逰鷗鳥住而不去其父曰我聞鷗鳥皆従汝逰汝取來我玩之明日之海上鷗鳥舞而不下南越志海鷗在漲海中隨潮上下庾肩吾詩海鷗時出沒陶潛歸去來辭樂夫天命復奚疑崔顥黄鶴樓九域志鄂州有黄鶴樓一統志黄鵠山在武昌府西南一名黄鶴山世傳仙人騎黄鶴過此因名黄鶴樓在城西南隅黄鶴磯上世傳仙人子安乗黄鶴過此又云費文偉登仙駕黄鶴返憩於此昔人已乗黄鶴去王羲之蘭亭序毎攬昔人興感之由若合一契謝晦詩功遂侔昔人述異記荀環字叔偉嘗東逰憩江夏黄鶴樓上望西南有物飄然降自霄漢俄頃已至乃駕鶴之賓也鶴止户側仙者就席羽衣虹裳賓主驩對已而辭去跨鶴騰空而滅此地空餘黄鶴樓唐太宗詩一朝辭此地四海遂為家黄鶴一去不復返湯惠休詩黄鶴西北去銜我千里心荆軻歌壯士一去不復還庾信詩流槎一去上天池王褒詩經年一去不相聞白雲千載空悠悠梁昭明太子詩白雲飛兮江上阻吴均詩白雲方渺渺張正見臨髙臺詩飛棟臨黄鶴高窻度白雲漢書王褒傳千載一㑹陸機賦天悠悠其彌高陶潛詩悠悠東去雲晴川歴歴漢陽樹袁嶠之詩俯仰晴川渙古詩天上何所冇歴歴種白榆漢無名氏詩衆星何歴歴唐書地理志鄂州江夏郡有漢陽縣今爲府屬湖廣一統志漢陽漢安陸地屬江夏郡隋大業初改曰漢陽芳草萋萋鸚鵡洲班固西都賦竹林果園芳草廿木古詩蘭澤多芳草江淹别賦君結綬兮千里惜瑶草之徒芳詩維葉萋萋謝靈運詩萋萋春草繁水經注江水又東逕歎父山江之右岸當鸚鵡洲庾信賦落帆黄鶴之浦藏船鸚鵡之洲一統志鸚鵡洲在武昌府南跨城西大江中尾直黄鵠磯即黄祖殺禰衡處衡嘗作鸚鵡賦故地得名日暮鄉關何處是説文日落草中曰暮南史栁元景傳少時貧苦嘗下都至大雷日暮寒甚頗有覊旅之歎沈約詩竚立日已暮周書庾信傳雖位望通顯常有鄉關之思張説詩相逢皆得意何處是鄉關烟波江上使人愁江總詩日迥烟波長唐太宗詩烟波澄舊碧謝朓詩心事俱已矣江上徒離憂吴均詩風起秋江上鮑照詩夕聽江上波賈至早朝大明宫呈兩省僚友唐書地理志大明宫在禁苑東南貞觀八年置高宗龍朔二年改曰蓬萊宫長安元年復為大明宫潛確類書開元中謂尚書省為南省中書門下為北省又謂門下為左省中書為右省或通謂之兩省銀燭朝天紫陌長穆天子傳天子之寶璿珠燭銀郭璞曰銀有精光如燭也顧野王舞影賦列銀燭兮蘭房周禮春見日朝于仲文詩紫陌結朱輪禁城春色曉蒼蒼顔延之詩朝駕守禁城謝朓詩春色滿皇州莊子天之蒼蒼其正色耶鮑照詩曀曀寒野霧蒼蒼隂山柏千條弱栁垂青瑣蕭子顯詩楊栁千條共一色祖孫登詩弱栁垂江翠衛宏漢舊儀黄門郎日暮入對青瑣門拜庾信賦赤墀青瑣西漢王根之宅百囀流鶯繞建章劉孝綽詩百囀似羣吟沈約詩流鶯復滿枝三輔黄圖武帝太初元年作建章宫度為千門萬户徐陵詩因來入建章劍珮聲隨玉墀步史記髙祖令蕭何帶劒履上殿禮記行則鳴珮玉鮑照詩虚容遺劒珮王融樂府丹榮照玉墀衣冠身惹御爐香史記留侯世家衣冠甚偉唐書儀衛志朝日殿上設黼扆蹋席熏爐香案何遜詩同惹御香芬共沐恩波鳯池上丘遲詩肅穆恩波被晉書荀勗傳勗久在中書專管機事及失之甚惘惘悵悵或冇賀之者勗曰奪我鳯凰池諸君賀我耶朝朝染翰侍君王宋玉髙唐賦朝朝暮暮秋興賦序染翰操紙鮑照詩染翰餉君琴謝朓詩君王嗣徳聲江淹詩君王禮英賢不恡千金璧王維和賈至舍人早朝大明宫之作唐書賈至字幼隣擢明經第拜起居舍人知制誥歴中書舍人絳幘雞人報曉籌董仲舒上書執事者皆赤幘蔡邕獨斷幘者古之卑賤執事不冠者之所服也漢官儀宫中輿臺並不得畜雞夜漏未明三刻雞鳴衛士候於朱雀門外著絳幘雞唱三體詩注絳幘者朱冠以象雞周禮雞人夜嘑旦以嘂百官注夜漏未盡雞鳴時也説文嘂髙聲廣韻古弔切庾肩吾詩刻燭驗更籌虞世南早朝詩玉花停夜燭金壺送曉籌尚衣方進翠雲裘周禮司服中士掌王之服辨其名物漢儀注泰置六尚謂尚冠尚衣尚食尚沐尚席尚書杜氏通典戰國冇尚衣尚冠之職後周有司服上士二人中士二人隋改為尚衣局置奉御二人唐因之唐書百官志尚衣掌供冕服宋玉諷賦翳承日之華披翠雲之表崔融嵩山啟母廟碑青霞衣兮翠雲裳九天閶闔開宫殿楚辭九天之際安放安屬吕氏春秋天有九野廣韻九天之際曰九垠九天之外次曰九陔楚辭吾令帝閽開關兮倚閶闔而望予淮南子西方曰西極之山閶闔之門説文閶闔天門也沈約詩高馳入閶闔後漢書百官志光禄勲卿一人掌宿衛宫殿門户庾肩吾詩别筵開帳殿離舟捲幔城萬國衣冠拜冕旒易首出庶物萬國咸寧左傳禹㑹諸侯於塗山執玉帛者萬國後漢書鄭均傳均拜議郎告歸帝賜以衣冠北周書唐瑾傳退朝休沐恒著衣冠以對妻子禮記天子之冕朱緑藻十有二旒易君子以蒞衆疏冕旒垂目黈纊塞耳沈佺期詩爽氣臨旌㦸明光暎冕旒日色纔臨仙掌動邢邵詩天高日色淺庾信詩日色臨平樂風光滿上蘭史記武帝紀作柏梁銅柱仙人掌之屬廟記神明臺武帝造上有承露盤有銅仙人舒掌捧銅盤玉杯承雲表之露和玉屑服之以求仙道庾信詩擎置仙人掌應添瑞露漿揚子日動而東天動而西香烟欲傍衮龍浮孫綽逰天台山賦衆香馥以揚烟庾信詩香烟聚成塔花雨積為臺禮記天子龍衮注畫龍於衮衣也東都賦脩衮龍之法服張正見詩香浮佳氣裏鮑照詩時見逺烟浮朝罷須裁五色詔史記袁盎傳絳侯為丞相朝罷趨出意得甚唐書儀衛志朝罷皇帝步入東序門然後放仗陸陲詩議曹坐朝罷尺板嗣芳徽事始石季龍置戲馬觀上安詔書用五色紙銜於木鳯口而頒行珮聲歸到鳯池頭西京雜記昭陽殿織珠為簾風至則鳴如珩珮之聲潘岳西征賦想珮聲之遺響謝朓詩兹言翔鳯池鳴珮多清響卞伯玉赴中書省詩躍鱗龍鳯池揮翰紫宸裏文選注鳯池中書省也奉和聖製從蓬萊向興慶閣道中留春雨中春望之作雍録大明宫地本太極宫之後苑射殿也在龍首山上太宗初於其地營太極宫以備清暑九年改名大明宮龍朔二年高宗改名蓬萊宫取殿後蓬萊池為名也又大興京城東南角有坊名隆慶中冇明皇為諸王時故宅開元二年七月以宅為宫既取隆慶以為宫名而帝之二名其一為隆故改隆為興是為興慶宫也開元二十年築夾城通芙蓉園自大明宫夾東羅城複道由通化興安門次經春明門延喜門又可達曲江芙蓉園而外人不知也渭水自縈秦塞曲山海經注渭水出隴西首陽縣鳥鼠同穴山至高陵合涇水經秦漢故都淮南子渭水多力宜黍庾信賦渭水貫於天門蕭賁詩前登灞陵道還曕渭水流陸雲詩郁郁寒水縈史記蘇秦傳秦四塞之國也被山帶渭沈炯表西凉義衆阻秦塞而不通黄山舊繞漢宫斜漢書地理志扶風槐里縣冇黄山宫孝惠二年建三輔黄圖黄山宫在興平縣西三十里武帝微行西至黄山宫即此張衡西京賦繞黄山而歎牛首庾肩吾詩桂宫連複道黄山開廣路梁宣帝遊七山寺賦望塗山而斜繞蕭子範詩光景斜漢宫横梁照彩虹鑾輿迥出千門栁班固西都賦乗鑾輿備法駕梁簡文帝啟侍鑾輿而行幸何遜詩鑾輿和八龍史記孝武帝紀作建章宮千門萬户班固西都賦張千門而立萬户順隂陽以開闔吴均詩出入千門扉陶潛詩梅栁夾門植閣道迴看上苑花張衡西京賦鈎陳之外閣道相尋王筠詩閣道趨文昌三輔黄圖上林苑秦之舊苑也周袤三百餘里羣臣逺方各獻名花異卉三十餘種宋之問詩源水看花入吴均詩黄鸝飛上苑庾肩吾詩迴輿上苑中盧思道詩上林花樹百枝然雲裏帝城雙鳯闕謝朓詩望山白雲裏隂鏗詩雲裏望樓臺後漢書郭伋傳賢良太守去帝城不逺何遜詩帝城猶隠約漢書東方朔傳起建章左鳯闕右神明千門萬戸繁欽鳯闕賦築雙鳯之崇闕表大路以遐通水經注建章宫圓闕臨北道有鳯凰在闕上故號鳯闕也雨中春樹萬人家洛陽伽藍記鳥鳴春樹蝶舞花叢沈約詩春風起春樹江總樂府春心自浩蕩春樹聊攀折史記年表大侯不過萬家小者五六百户庾信文户牖萬家陳平之鄉里史記六國年表詩書所以復見者多藏人家為乗陽氣行時令史記封禪書夜明者陽氣動也春夏則發秋冬則藏禮記是月也生氣方盛陽氣發泄春秋繁露陽氣出於東北入於西北發於孟春畢於孟冬而物莫不應禮記季冬之月天子乃與公卿大夫共飭國典論時令以待來嵗之宜後漢書明帝紀詔曰百僚師尹其勉脩厥職順時令以綏兆人不是宸遊玩物華李適詩禁苑秋光入宸遊霽色髙宋之問詩香刹中天起宸遊滿路輝盧思道詩京洛多妖艷餘香愛物華王勃序物華天寶楊炯青苔賦春澹蕩兮景物華勅賜百官櫻桃唐書百官志凡王言之制冇七一曰冊書二曰制書三曰慰勞制書四曰發勅五曰勅㫖六曰論事勅書七曰勅牒易百官以治書惟説命總百官博物志櫻桃大者如彈丸芙蓉闕下㑹千官三輔舊事建章宫門北起圓闕髙二十五丈車􅛴洛陽道樂府重關如隠起雙闕似芙蓉庾信終南山詩長虹雙瀑布圓闕兩芙蓉史記封禪書新垣平使人持玉杯上書闕下獻之班固詩上書詣闕下思古歌雞鳴荀子古者天子千官諸侯百官吕氏春秋大聖無事而千官盡能紫禁朱櫻出上䦨謝莊文收華紫禁注王者之宫以象紫㣲故謂宫中為紫禁李嶠詩白玉仙輿紫禁來左思蜀都賦朱櫻春熟素柰夏成案梁簡文帝冇奉答南平王賚朱櫻詩唐本草熟時深紅色者謂之朱櫻案上䦨古通作上蘭三輔黄圖上林有上蘭觀纔是寢園春薦後三輔黄圖孝文太后孝昭太后皆冇寢園禮記庶人春薦韭夏薦麥秋薦黍冬薦稻史記叔孫通傳孝惠帝春出遊離宫叔孫生曰古者有春嘗果方今櫻桃熟可獻願陛下出因取櫻桃獻宗廟上乃許之諸果獻由此興李綽嵗時記四月一日内園進櫻桃寢廟薦訖頒賜各有差非闗御苑鳥銜殘梁簡文帝詩非關長信别張衡西京賦上林禁苑跨谷彌阜沈佺期翫雪詩灑瑞天庭裏驚春御苑中唐書張説傳御苑東西二十里外無牆垣扄禁内冇榛藂谿谷禮記仲夏之月羞以含桃先薦寢廟呂氏春秋含桃注含桃鸎桃也鸎鳥所含食故言含桃鮑照三日詩鳬雛掇苦薺黄鳥銜櫻梅六書故口中未茹者皆曰銜與含函嗛通歸鞍競帶青絲籠庾信詩歸鞍畏日晚張説東都酺宴詩洛橋將舉燭醉舞拂歸鞍古樂府青絲為籠係徐伯陽日出東南隅行圓籠裊裊挂青絲鐵鈎冉冉勝丹桂中使頻傾赤玉盤漢書宦者傳凡詔所徴求皆令西園騶密約勅號曰中使沈約安陸昭王碑中使相望注天子私使曰中使杜審言詩禹食傳中使堯尊徧下臣司馬相如上林賦其石則赤玉玫瑰琳珉昆吾魏志挹婁傳其地出赤玉好貂漢武内傳西王母以七月七日降帝宫命侍女索桃須臾以玉盤盛桃七枚以四枚與帝自食三枚東觀漢記明帝宴羣臣大官進櫻桃以赤瑛盤賜羣臣月下視之盤與櫻桃同色羣臣皆笑云是空盤飽食不須愁内熱莊子無能者無所求飽食而遨遊汎若不繫之舟魏志管寧傳注有隠者焦先河東人也饑則出為人客作飽食而已不取其值本草圖經櫻桃洛中南都者最勝食之調中益氣但發虚熱耳莊子葉公子髙將使於齊問於仲尼曰吾爨無欲清之人今吾朝受命而夕飲冰我其内熱與注食美者必内熱大官還有蔗漿寒漢書百官公卿表少府屬官冇大醫大官湯官導官注大官主膳食後漢書百官志大官令一人六百石掌御飲食楚辭胹鼈炮羔有柘漿些漢耆禮樂志百末㫖酒布蘭生泰尊柘漿析朝酲南方草木狀諸柘一曰甘蔗彼人謂之石蜜梁元帝謝賚瓜啟味奪蔗漿甘踰石蜜本草甘蔗性甘寒和中助脾除熱潤燥和太常韋主簿五郎温湯寓目之作舊唐書職官志太常寺主簿二人掌印勾檢稽失省署抄目博物志凡水源有石硫黄其泉則温唐書地理志京兆府昭應有宫在驪山下貞觀十八年置咸亨二年始名温泉宫天寶六年更温泉曰華清宫治湯井為池環山列宫室又築羅城置百司及十宅雍録温湯在臨潼縣南一百五十步在驪山西北一統志温泉在西安府昭應縣驪山庾信詩小臣欣寓目漢主離宫接露臺漢武帝故事驪山湯初始皇砌石起宇至漢武又加脩飾焉三輔黄圖離宫天子出遊之宫也又漢西郊有苑囿林麓藪澤連亘繚以周垣四百餘里離宫别館三百餘所司馬相如上林賦離宫别館彌山跨谷漢書文帝紀嘗欲作露臺召匠計之直百金帝曰百金中人十家之産也吾奉先帝宫室常恐羞之何以臺為注新豐縣南驪山之頂有露臺鄉文帝所欲作臺之處秦川一半夕陽開三秦記長安正南秦嶺嶺根水流為秦川一名樊川魏明帝詩出身秦川愛居伊洛隋煬帝詩畫輪途始半爾雅山西曰夕陽詩度其夕陽青山盡是朱旗繞江總詩緑溆明層殿青山照近樓朱超詩青山麗朝景張衡東京賦髙祖膺籙受圖杖朱旗而建大號注高祖立為沛公旗幟皆赤故曰朱也梁元帝文朱旗夕建如赤城之霞起江總詩紅旗照島嶼鳯葢繞林塘碧澗翻從玉殿來南史隠逸傳論碧澗清潭翻成麗矚蕭瑱詩澗水初流碧南史朱异傳升紫霄之丹地排玉殿之金扉梁簡文帝詩玲瓏玉殿虚雍録驪山上湯池臺殿環列山谷新豐樹裏行人度漢書地理志京兆新豐縣髙祖七年置注太上皇思東歸於是高祖改築城市街里以象豐徙豐民以實之故號新豐庾信詩遥識新豐樹李嶠詩樹暗辨新豐庾信銘樹裏聞歌詩行人彭彭謝朓詩月出行人稀小苑城邊獵騎迴漢書蕭望之傳望之以射䇿甲科為郎署小苑東門候庾信春賦停車小苑連騎長楊又詩小苑禁門開長楊獵客來李徳林詩蕭關獵騎旋聞道甘泉能獻賦懸知獨有子雲才漢書揚雄傳揚雄字子雲蜀郡成都人也孝成帝時客冇薦雄文似相如者上方郊祠甘泉泰畤汾隂后土召雄待詔承明之庭正月従上甘泉還奏甘泉門賦以風又叙傳淵哉若人實好斯文初擬相如獻賦黄庾信詩懸知曲不悮杜甫奉和賈至舍人早朝大明宫唐書賈曾傳曾洛陽人開元初拜中書舍人與蘇晉同掌制誥皆以文辭時號蘇賈子至字幼鄰拜起居舍人知制誥歴中書舍人乂百官志中書省舍人六人掌侍進秦參議表章起居舍人二人掌脩記言之史通事舍人十六人掌朝見引納殿庭通奏雍録唐有三大内迭受朝而大明最數唐書地理志龍朔後皇帝常居大明宫髙宗始大興葺曰蓬萊宫五夜漏聲催曉箭漢舊儀省中黄門持五夜五夜者甲夜乙夜丙夜丁夜戊夜沈佺期詩五夜曉鐘稀後漢書律歴志孔壺為漏浮箭為刻唐髙宗詩巖虛傳漏聲張説詩寒更玉漏催武平一詩惟愁銀箭曉相催王勃乾元殿頌序虬箭司更銀漏與三辰合運九重春色醉仙桃易林紫闕九重尊嚴在中冠帶垂衣天下康寧張説詩銜恩向九重謝朓詩春色滿皇州梁簡文帝詩春色暎宫來先發院邊梅賈至原唱詩禁城春色曉蒼蒼沈佺期詩定是風光牽宿醉李白詩絲管醉春風漢武帝内傳王母既至命侍女以玉盤盛仙桃與帝酉陽雜俎仙桃出彬州蘇耽仙壇王昌齡詩昨夜風開露井桃旌旗日暖龍蛇動禮記龍旗九旒天子之旌也唐開元禮大駕鹵簿道駕龍旗十二潘岳文旌旗電舒岑參詩風恬日暖蕩春光唐明皇詩龍蛇開陣法又甫本集詩古壁畫龍蛇西京雜記咸陽宫有青玉五枝燈作蟠螭以口銜燈燈然鱗甲皆動宫殿風微燕雀高後漢書百官志光禄勲卿一人掌宿衛宫殿門户六典大明宫有蓬萊殿吴均詩獵獵起微風又甫本集詩微風燕子斜班彪王命論燕雀之儔不奮六翮之用阮籍詩燕雀棲下林李白詩寄言燕雀莫相啅自有雲霄萬里高朝罷香烟攜滿袖史記越世家范蠡曰君王早朝宴罷又袁盎傳絳侯為丞相朝罷趨出意得甚上禮之恭常目送之賈至詩衣冠身惹御鑪香王維詩香烟欲傍衮龍浮盧照隣詩瓊漿暎月攜齊髙帝報沈攸之書殷勤攜袖李徳林序加以奏閣趨墀盈懐滿袖詩成珠玉在揮毫隋書周羅㬋傳為左衛率參宴席陳主曰周左率武將詩毎前成何也孟浩然詩刻燭限詩成荀子贈人以言重於金石珠玉晉書衛玠傳驃騎將軍武濟毎見玠輙嘆曰珠玉在側覺我形穢又甫本集詩揮毫落紙如雲烟欲知世掌絲綸美本集自注舍人先世掌絲綸後漢書劉昆傳昆子軼為太子中庶子遷宗正遂世掌宗正焉禮記王言如絲其出如綸翰林志惟翰林之司掌絲綸之命左傳世濟其美不隕其名池上於今有鳯毛賈至詩共沐恩波鳯池上岑參和賈至詩獨有鳯凰池上客左傳絳縣人曰臣生之嵗正月甲子朔四百冇四十五甲子矣其季於今三之一也漢書武帝紀稽之往古制宜於今南史謝超宗傳帝謂謝莊曰超宗殊有鳯毛又甫本集詩一毛生鳯穴宣政殿退朝晚出左掖六典大明宫正南曰丹鳯門門内正殿曰含元殿其北曰宣政門門内曰宣政殿史記天官書太微南四星執法中端門門左右掖門漢書未央宫掖門注非正門而在兩傍若人之臂掖天門日射黄金榜楚辭廣開􅀆天門史記天官書蒼帝行徳天門為之開注王者行春令布徳澤秋天下則上應靈威仰之帝而天門為之開以發徳化也天門即左右角間也淮南子排閶闔鑰天門栁喜日浴咸池賦紅光下射疑萍實之欲沈神異經中央冇宫以金為牆門有金榜以銀鏤題曰天皇之宫春殿晴薫赤羽旗庾肩吾詩雨足飛春殿淮南子孟夏之月天子服赤玉建赤旗宋玉髙唐賦偈􅀆若駕駟馬建羽旗注周禮曰析羽為旍謂破五色鳥羽為之也陸機詩羽旗棲瓊鑾宫草菲菲承委佩卞蘭許昌宫賦丹草用隅靈木成行楊脩許昌宫賦植神木與靈草楚辭芳菲菲其彌章注菲菲猶勃勃芳草貌也司馬相如上林賦郁郁菲菲衆香發越禮記主佩垂則臣佩委爐烟細細駐遊絲姚察詩雲氣合爐烟劉斌詩香爐烟氣多唐書儀衛志朝日殿上設黼扆躡席熏爐香案羊球登西樓賦畫棟浮細細之輕雲庾信詩洛陽逰絲百丈連梁武帝詩晻曖矚逰絲沈約詩逰絲暎空轉雲近蓬萊常五色董仲舒雨雹對雲則五色而為慶庾信華林園馬射賦序正繪五采之雲漢書郊祀志自威宣燕昭使人入海求蓬萊方丈瀛洲此三神山者相傳在渤海中去人不逺常有至者唐書地理志大明宫在禁苑東南高宗厭西内湫濕龍朔二年始大興葺改曰蓬萊宫雪殘鳷鵲亦多時晉書陶侃傳積雪始晴餘雪猶濕徐陵詩雪色故年殘杜審言詩梅花落處疑殘雪司馬相如上林賦過鳷鵲望露寒三輔黄圖甘泉苑武帝置苑中起宫殿臺閣百餘所冇仙人觀石闕觀封巒觀鳷鵲觀謝朓詩金波麗鳷鵲侍臣緩步歸青瑣班固西都賦言語侍従之臣曹植詩侍臣省文奏陛下體仁慈宋之問詩花落侍臣衣湛方生詩任緩步以升降謝朓詩緩步遵委渚北史劉光伯傳緩步代車漢書元后傳赤墀青瑣注孟康曰以青畫户邊鏤中天子制也師古曰刻為連瑣文而以青塗之也後漢書百官志注黄門郎屬黄門令日暮入對青瑣門拜名曰夕郎宫閣簿青瑣門在南宫陳子艮詩雍容入青瑣退食從容出每遲詩退食自公後漢書楊秉傳逶迤退食足抑茍進之風枚乗賦從容安步孫綽逰天台山賦任緩步之從容曲江對酒司馬相如賦臨曲江之隑洲􅀆顔師古注曲岸之洲曲江也昔漢武帝穿以為宜春苑其水曲折有似廣陵之江故名索隠隑音祈即碕字謂曲岸頭也秦中嵗時記二月二日曲江採菜士民逰觀者極盛隋營京城宇文愷鑿之為池又㑹黄渠水自城外南來可以穿城而入故隋世遂従城外包之入城為芙蓉池且為芙蓉園也雍録唐曲江本秦隑州至漢為宣帝樂逰苑城上春雲覆苑牆禮記城上不呼吴均詩惟聞啞啞城上烏蔡凝詩春雲處處生張正見詩西北春雲起西都賦西郊則冇上囿禁苑繚以周牆四百餘里唐書食貨志韋堅於長樂坡瀕苑墻鑿潭於望春樓下以聚漕舟江亭晚色靜年芳摭言進士榜出後宴曲江亭謂之曲江㑹王勃詩江亭明月帶江流謝朓詩瑶池曖晚色沈約詩年芳被禁籞又麗日屬上已年芳俱在斯林花著雨臙脂濕梁簡文帝詩林花初墮蔕吴均詩林花合復分古今注燕支出西方土人以染中國人謂之紅藍以染粉為面色梁簡文帝詩臙脂逐臉生庾信詩濕花飛未逺隂雲歛尚低水荇牽風翠帶長詩參差荇菜爾雅莕接余其葉符郭璞注叢生水中葉圓在莖端長短隨水深淺江東食之杜審言詩綰霧青條弱牽風紫蔓長劉孝威詩風荇敵餘香梁簡文帝詩翠蔕留餘結龍武新軍深駐輦舊唐書太宗選飛騎之尤驍健者别署百騎以為翊衛備中宗加置萬騎自開元以來與左右羽林軍名曰北門四軍開元二十七年改為左右龍武軍唐書兵志左右龍武軍肅宗至徳二載補元従扈従不足則取他色帶品者同四軍亦曰神武天騎制如羽林黄鶴注至徳二載左右神武兩軍賜名天騎今詩作於次年故曰新軍漢書注駕人以行曰輦唐太宗詩崇文聊駐輦芙蓉别殿謾焚香唐書地理志興慶官在皇城東南謂之南内築夾城入芙蓉園黄鶴注芙蓉園有殿而曲江又連芙蓉苑駕常幸其中亦有殿故曰别殿甫詩云江頭宫殿鎖千門是也雍録自大明宫夾東羅城復道又可以達芙蓉園故杜甫詩言其初時擬幸芙蓉已遂留駐龍武也顔延之曲水詩序離宫設衛别殿周徼庾信賦屬車釃酒複道焚香何時詔此金錢㑹後漢書西域傳以金銀為錢銀錢十當金錢一舊唐書開元元年九月宴王公百僚於承天門令左右於樓下撒金錢許中書門下五品以上官及諸司三品以上官爭拾之暫醉佳人錦瑟傍詩凡此飲酒或醉或否謝朓樂府渠椀送佳人玉杯迎上客本集趙注醉佳人傍者葢曲江宴時賜太常教坊樂也劇談録開元中上已節賜宴臣僚㑹於曲江山亭恩賜太常教坊聲樂惟宰相三使北省官與翰林學士登焉周禮樂器圖飾以寶玉者曰寶瑟繪文如錦曰錦瑟古今樂志錦瑟之為器也其絃五十其柱如之江淹賦雕柱彩瑟九華六出臘日風俗通禮傳曰夏曰嘉平殷曰清祀周曰大蜡漢改曰臘臘者獵因獵取獸祭先祖也或曰臘接也新故交接狎獵大祭以報功也蔡邕獨㫁臘者嵗終大祭縦吏民宴飲荆楚嵗時記十二月八日為臘日玉燭寳典漢以戌日為臘魏以辰晉以丑臘日常年暖尚遥今年臘日凍全消庾信詩常年臘月半己覺梅花䦨不信今春晚俱來雪裏看謝莊文雨零露湛冬暖春暄劉孝威詩節暖衣須變禮記孟春之月東風解凍又季冬行夏令則時雪不降冰凍消釋管子日至六十日而陽凍釋七十日而隂凍釋梁簡文帝詩凍解池開渌侵陵雪色還萱草禮記諸侯相接以敬讓則不相侵陵徐陵春情詩風光今旦動雪色故年殘詩焉得諼草言樹之背註諼草合歡食之令人忘憂本草萱草一名忘憂一名療愁漏洩春光有栁條左傳言語漏洩職汝之由春宴録貴家遊賞曲江剪百花裝成獅子互相遺送以蜀錦流蘇牽之曰春光且莫去留與醉人看李百藥笙賦縦勝氣之逍遥眷春光而怡逸梁簡文帝詩栁條恒著地楊花好上衣縦酒欲謀良夜醉史記高祖紀還歸過沛留置酒沛宫悉召故人父老子弟縦酒七發列坐縦酒蕩樂娱心郭璞遊仙詩縱酒濛氾濱禮記觀蜡注蜡者嵗十二月之祭黨正屬民飲酒於序無不醉者史記晉世家重耳愛齊女毋去心齊女乃與趙衰謀醉重耳載以行蘇武詩芳聲良夜發隨風聞我堂詩厭厭夜飲不醉無歸還家初散紫宸朝庾信春賦百丈山頭日欲斜三晡未醉莫還家孫逖詩龍輿下紫宸唐㑹要龍朔三年始御紫宸殿聴政雍録含元之北為宣政宣政之北為紫宸五代史李琪傳唐故事天子日御殿見羣臣曰常參朔望御便殿曰入閤紫宸便殿也自正衙喚仗由閤門而入百官候朝於衙者因隨以入見口脂面藥隨恩澤景龍文館記臘日賜北門學士口脂蠟脂以碧鏤牙筩盛之太平御覽盧公家範臘日上澡豆及頭膏面脂口脂梁武帝詩三月桃花合面脂禮記百日之蜡一日之澤注言民有百日之勞今一日使之飲酒燕樂是君之恩澤曹植文忠臣徘徊於恩澤而不敢自棄翠管銀罌下九霄拾遺記周穆王重霄寶器冇岑華鏤管穆天子傳􅜑之人無鳬天子賜之黄金銀罌四七唐書韓偓傳臘日賜銀盒子駐顔膏牙香等繡香囊一枚庾闡詩翔虬凌九霄張淵觀象賦陟秀峯以遐眺望靈象乎九霄沈佺期詩玉房九霄露夜露下天高秋水清宋玉九辯白露既下降百草􅀆奄離披此梧楸王勃序金風生而景物清白露下而光隂晚九辯泬寥兮天高而氣清寂漻兮收潦而水清莊子秋水時至百川灌河潘岳秋興賦澡秋水之涓涓􅀆玩逰鯈之潎潎届原漁父滄浪之水清兮可以濯我纓空山獨夜旅魂驚江淹詩懐此書兮望空山陶𢎞景詩空山霜滿高烟平王粲詩獨夜不能寐攝衣起撫琴謝瞻詩獨夜無物役寢者亦云寧駱賓王詩勞歌徒自奏客魂誰為招乂驚魂聞葉落危魄逐輪埋疎燈自照孤帆宿玉篇鐙錠也初學記無足曰鐙有足曰錠案鐙燈通用司馬相如長門賦懸秋月以自照兮徂清夜於洞房梁簡文帝與劉孝綽書夕鳥歸林懸孤帆而未息陳子昻詩古木生雲際孤帆出霧中新月猶懸雙杵鳴鮑泉詩新花滿新樹新月麗新輝何遜詩庭花枝上發新月霧中生易懸象著明莫大乎日月庾信詩月懸惟返照晉子夜歌佳人理寒服萬結砧杵勞庾信夜聽搗衣詩石燥砧逾響桐虚杵絶鳴唐汝詢注杵即砧杵兩人對𢷬故曰雙南菊再逢人卧病禮記季秋之月鞠冇黄華釋文鞠本又作菊黄鶴注甫以去年秋至雲安故云南菊再逢謝朓在郡卧病詩淮揚股肱郡高卧猶在兹北書不至鴈無情漢書蘇武傳常惠教使者言天子射上林中得雁足有繫帛書言武等在某澤中詩期逝不至而多為恤劉勰新論網無心而鳥冇情劒無情而人有心陸厥詩雁返無南書寸心何由寫步檐倚杖看牛斗楚辭曲屋步櫩宜擾蓄些史記司馬相如傳步檐周流長途中宿注步櫩步廊也左思魏都賦比滄浪而可濯方步櫩而有踰案櫩與檐同鮑照詩腰鐮刈葵藿倚杖牧雞豚史記天官書北宫南斗為廟牽牛為犧牲注南斗六星牽牛六星並北宫之宿庾信詩龍淵觸牛斗繁弱駭天狼王勃滕王閣序物華天寶龍光射牛斗之墟銀漢遥應接鳯城詩惟天有漢監亦冇光鮑照詩夜來坐幾時銀漢傾露落雞跖集天河謂之銀漢廬照隣詩寒辭楊栁陌春滿鳯凰城沈佺期詩歌吹銜恩歸路晚棲烏半下鳯城來趙子櫟注鳯城言長安岑參奉和中書舍人賈至早朝大明宫唐書賈至傳至擢明經第解褐單父尉従幸蜀拜起居舍人知制誥歴中書舍人又地理志上都大明宫在禁苑東南南接京城之北面西接京城之東北隅長千八百步廣千八十步曰東内本永安宫貞觀九年改曰大明宫雍録大明宫地本太極宫之後苑東北面射殿也地在龍首山上雞鳴紫陌曙光寒詩雞既鳴矣朝既盈矣易林雞鳴時節家樂無憂謝莊應詔詩紫陌協笙鏞劉孝綽詩紆餘出紫陌盧思道詩旌門曙光轉尹伯奇履霜操履朝霜兮採晨寒鶯囀皇州春色䦨陸璣詩疏注禽經曰鶯以喜囀梁元帝詩新鶯隠葉囀謝朓詩春色滿皇州梁簡文帝詩春色暎宫來庾信詩春色方盈野沈佺期詩聞道清明近春聞向夕闌金闕曉鐘開萬户漢書郊祀志黄金銀為宫闕張正見詩金闕銀宫相向開劉禕之九成宫詩帝圃疏金闕仙臺駐玉鸞劉緩照鏡賦夜籌已竭曉鐘將絶孔徳紹詩臨風聴曉鐘梁簡文帝詩玲瓏朱户開漢書東方朔傳圖起建章左鳯闕右神明號稱千門萬户西都賦張千門而立萬户玉階仙仗擁千官漢書外戚傳切皆銅沓冒黄金塗白玉階西都賦玉階彤庭張衡賦蹈玉階之嶢崢唐書儀衞志凡朝㑹之仗五一曰供奉仗二曰親仗三曰勲仗四曰翊仗五曰散手仗皆帶刀捉仗立於東西廊下每月以四十六人立内廊閤外號曰内仗沈佺期詩徑狹千官擁東京賦千品萬官花迎劍佩星初落沈佺期詩花迎宸翰發顔延之詩陸離迎宵佩文中子衣裳䄡如劍佩鏘如薛道衡賦織女下而星落庾肩吾詩周星疑更落王勃賦浦涵珠而星落栁拂旌旗露未乾梁簡文帝詩垂栁拂行輪沈佺期詩栁拂旌門暗蘭依帳殿生張協七命旌拂霄堮注乗空而行故旌旗拂於雲霄之崖周禮交龍為旗析羽為旌詩白露未晞傳晞乾也獨有鳯凰池上客杜審言詩獨有宦逰人晉書荀勗傳勗自中書監除尚書令人賀之勗曰奪我鳯凰池諸君何賀耶韋承慶直中書省詩清切鳯凰池通典魏晉以來中書監令掌賛誥命以其地在禁近謂之鳯凰池陽春一曲和皆難宋玉對楚王問客冇歌於郢中者其始曰下里巴人國中屬而和者數千人其為陽春白雪國中屬而和者數十人後漢書黄瓊傳李固素慕瓊以書遺之曰陽春之曲和者必寡嵇康書彈琴一曲鮑令暉詩願作陽春曲宫商長相尋宋之問詩徒斐陽春和難參艷曲餘髙適夜别韋司士得城字周禮夏官司士掌羣臣之版以治其政令唐書百官志上州司士參軍事一人従七品下中州司士參軍事一人正八品髙館張燈酒復清晉書華譚傳虚高館以俟賢謝靈運詩疏峯抗高館南史韋叡傳嘗張燈達曙李白詩張燈宴華池詩爾酒既清夜鐘殘月雁歸聲晉書夏統傳甲夜之初撞鐘擊鼓梁元帝賦響平陵之夜鐘王粲詩殘月半山低陳子昻詩殘月迥臨邊漢武帝秋風辭草木黄落兮雁南歸庾信詩雁歸知向暖陶潛詩來雁有餘聲只言啼鳥堪求侣庾信詩只言千日飲梁簡文帝詩啼鳥忽度行孟浩然詩處處聞啼鳥詩嚶其鳴矣求其友聲陸厥詩鳬鵠嘯儔侣無那春風欲送行王維詩強欲従君無那老湘東王詩春日奉風過庾信詩春風滿路香孔融詩逺送新行客嵗暮乃來歸黄河曲裏沙為岸向秀賦濟黄河以汎舟兮河圖河水九曲長九千里入於渤海春秋文公十二年晉人秦人戰於河曲注河曲在河東蒲坂縣南陸機賦遵河曲以悠逺岑參詩黄沙磧裏客行迷王僧孺詩沙岸淨如埽白馬津邊栁向城史記荆燕世家漢四年使劉賈渡白馬津入楚地注括地志黎陽津一名白馬津在滑州白馬縣北三十里漢書酈食其傳守白馬之津梁元帝詩山過白馬津荆州記縁城堤邊悉植細栁緑條散風清隂交陌莫怨他鄉蹔離别詩莫怨具邇古樂府他鄉各異縣楚辭余既不難夫離别兮古詩上言長相思下言久離别知君到處有逢迎杜審言詩知君書記本翩翩唐太宗詩春風狹斜道含笑待逢迎王勃序千里逢迎高朋滿座李頎題璿公山池逺公遁跡廬山岑髙僧傳晉慧逺見廬峯清淨足以息心遂住龍泉精舍廬山記逺法師在廬阜三十餘年影不出山跡不入俗鮑照詩遯跡避紛囂課農栖寂寞梁昭明太子陶潛傳彭城劉遺民亦遯跡於匡山爾雅山小而髙曰岑江淹詩假乗試行逰北望髙山岑開士幽居祗樹林徐陵傳大士碑猗歟開士類此難思法苑珠林開士應真𨗳揚未教禮記幽居而不淫庾信詩幽居對䝉密梁簡文帝相宫寺碑鹿苑豈殊祗林何逺金剛經佛在舍衞國祗樹給孤獨園注祗洹林樹名片石孤雲窺色相蕭慤春賦巖前片石迥如樓三秦記孤雲兩角去天一握陶潛詩萬族各有託孤雲獨無依楞嚴經離諸色相無分别性清池皓月暎禪心張衡南都賦撫輕舟兮浮清池謝莊月賦愬皓月而長歌梁元帝詩澄江涵皓月水影若浮雲江淹詩禪心暮不雜蕭子良書道性天悠禪心自謐指揮如意天花落張衡西京賦洪崖立而指揮抱朴子儀蕭曹之指揮羨張陳之奇畫齊書明僧紹傳僧紹住江乗攝山太祖遺竹根如意筍籜冠庾信對酒曲山簡倒接䍦王戎如意舞維摩經時維摩詰室有一天女見諸天人所説法便見其身即以天花散諸菩薩髙僧傳梁僧法雲講次天花亂墜坐卧閒房春草深法華經經行若坐卧乃至説一偈洛陽伽藍記坐卧兮於其側春夏兮其逰陟曹植七啟踐飛除即閒房何邵詩閒房來清氣廣庭發暉素楚辭春草生兮萋萋鮑照詩露色染春草泉源潔水苔此外俗塵都不染孔稚圭北山移文抗塵容而走俗狀沈約詩因戒倦輪飄習障従塵染王冋詩法像無塵染淨住子心常無碍空有不染王融在家善門頌處塵貴不染被褐重懷珠惟餘𤣥度得相尋續晉陽秋許詢字𤣥度高陽人風情簡素司徒􅁺辟不就與法門支遁相善世説支道林許掾諸人共在㑹稽王齋頭支為法師許為都講支通一義四座莫不厭心許送一難衆人莫不忭舞鮑令暉詩願作陽春曲宫商長相尋劉長卿送皇甫曽赴工部唐書百官志工部尚書一人正三品侍郎一人正四品下掌山澤屯田工匠諸司公廨紙筆墨之事其屬有四一曰工部二曰屯田三曰虞衡四曰水部東遊久與故人違晉書王羲之傳頃東逰還脩植桑果今盛敷榮率諸子抱弱孫逰觀其間以娱目前莊子雲將東逰過扶揺之枝而適遭鴻䝉古樂府相去萬餘里故人心尚爾詩行道遲遲中心有違謝靈運文山川路邈心往形違西去荒凉舊路微北山移文澗户摧絶無與歸石徑荒凉徒延佇温子并寒陵山寺碑寂寞銷沈荒凉磨滅盧諶詩南望舊京路嚴武詩斗城憐舊路秋草不生三徑庭孫楚詩晨風飄岐路零雨沾秋草傅𤣥飲馬長城窟行春至草不生期盡歎無聲晉書陶潛傳聊欲絃歌以為三徑之資三輔決録蔣詡隠於杜陵舍中三徑惟羊仲求仲従之逰庾肩吾詩三徑沒荒林行人獨向五陵歸詩駪駪征夫傳征夫行人也謝靈運詩搔首訪行人漢書王嘉傳嘉奏封事云惟陛下慎已之所獨向察衆人之所共疑漢書原涉傳郡國諸豪及長安五陵諸為氣節者皆歸慕之西都賦南望北霸北眺五陵吴均詩子憐三緗薜我憶五陵薇離心日逺如流水鮑照詩非同年嵗意誰共别離心桓譚新論謂天盖高而聴甚卑謂日蓋逺而照甚近詩沔彼流水朝宗于海庾信詩春洲鸚鵡色流水桃花香囘首川長共落暉司馬相如封禪文昆蟲凱澤囘首内向唐太宗詩囘首長安道方歡宴栢梁謝朓詩草含亭臯逺霞生川路長梁簡文帝序愁賦玩飛花之入户看斜暉之度寮楚客豈勞傷此别戰國策秦王謂甘茂曰楚客來使者多健與寡人爭辭劉允濟詩巴人緩疎節楚客弄繁絲李白詩狂歌自此别滄江欲暮自沾衣范雲詩滄江路窮此古樂府天寒嵗欲暮李白詩語來江色暮獨自下寒烟漢鐃歌臨水遥望泣下霑衣錢起和王員外晴雪早朝舊唐書尚書諸司員外郎従六品上階唐書百官志太宗省内外官定制為七百三十員然是時己有員外置其後又有特置同正員又吏部户部禮部左丞總焉兵部刑部工部右丞總焉員外郎各一人従六品上紫微晴雪帶恩光列子清都紫微帝之所居辛氏三秦記未央宫一名紫微宫梁元帝詩栁絮飄晴雪鄭康成毛詩箋為龍為光言天子恩澤光曜被及者也繞仗偏隨鴛鷺行周禮宮正以時比宮府次舍注舍諸居守舍以諸仗直廬也唐書百官志開元初復詔脩史官非供奉者皆隨仗而入位於起居郎舍人之次禽經宷寮雝雝鴻儀鷺序注鴻雁屬飛有行列也鷺白鷺也小不踰大飛有次序百官縉紳之象也北齊樂曲懐黄綰白鴛鷺成行長信月留寧避曉史記始皇二十七年作長信宫三輔黄圖漢長信宫太后之宫也従路門至周廟門有長信宫在其中蕭子良賓僚七要過哀鴻於月曉何遜詠雪詩凝階夜似月拂樹曉疑春宜春花滿不飛香三輔黄圖宜春宫本秦之離宫在長安城東南杜縣司馬相如上林賦下棠梨息宜春注宜春宫在社縣東即今曲江池梁簡文帝詩櫛比園花滿王衡翫雪詩皎潔隨處滿流亂逐風迴劉孝綽詩風飄花樹香獨看積素凝清禁謝惠連雪賦積素未虧白日朝鮮又詩積素惑原疇劉禎詩拘限清切禁傅咸賦穆穆清禁濟濟羣英已覺輕寒讓太陽梁簡文帝書零雨送秋輕寒迎節張纉詩輕寒帶春序詩十月之交疏日者太陽之精雪賦太陽曜不固其節題柱盛名兼絶唱三輔決録田鳯字季宗為尚書郎容儀端正入奏事靈帝日送之因題柱曰堂堂乎張京兆田郎沈佺期詩明朝題漢柱三署有光輝漢書黄瓊傳盛名之下其實難副宋書謝靈運傳論絶唱高蹤久