body:
  text: 欽定四庫全書御選唐詩巻十七七言律中宗皇帝立春日逰苑迎春禮記某日立春盛徳在木後漢書禮儀志立春之日夜漏未盡五刻京都百官皆衣青衣施土牛耕人於門外以示兆民離錄太極宫北冇内苑有禁苑宫居都城之北内苑又居宫北禁苑又居内苑之北也禮記立春之日天子親帥三公九卿諸侯大夫以迎春於東郊神臯福地三秦邑張衡西京賦爾乃廣衍沃野厥田上上實惟地之奥區神臯注自古以雍州積高神明之隩故立畤郊上帝諸神祠皆聚之臯局也謂神明之界局也張正見神仙篇神岳吹笙遥謝手當知福地有仙才盧思道詩大川開寳匣福地下金繩史記髙帝紀項羽三分關中立秦三將章邯為雍王司馬欣為塞王董翳為翟王又淮隂侯傳大王舉而東三秦可傳檄而定也玉臺金闕九仙家漢書郊祀歌逰閶闔觀玉臺注玉臺上帝之所居陶𢎞景水仙歌迎九位於金闕謁三素於玉清張正見神仙篇金闕銀宫相向開列仙傳涓子著天人經四十八篇隠宕山能致風雨受伯陽九仙法沈約詩眷言採三秀徘徊望九仙十洲記生洲在東海丑寅之間上有仙家數萬寒光猶戀甘泉樹鮑照詩寒光宛轉時欲沈史記樂書漢家嘗以正月上辛祠太乙甘泉漢書文帝紀三年五月上幸甘泉注本秦林光宫又揚雄傳上方郊祀甘泉泰畤后土以求繼嗣正月従上甘泉還奏甘泉賦以風左思三都賦序揚雄賦甘泉而陳玉樹青蔥淑氣偏臨建始花陸機詩蕙草饒淑氣魏志武帝紀注帝自漢中至洛陽起建始殿庾信詩建始移交讓徽音種合昏又枯樹賦開花建始之殿落實睢陽之園䌽蝶黄鶯未歌舞六朝錄劉子卿居廬山有五綵雙蝶來逰花上其大如燕詩黄鳥于飛陸機詩疏今謂之黄鶯黄鸝也謝偃詩黄鶯始哢即嬌人古樂府花笑鶯歌舞梁簡文帝詩蝶颺縈空舞梅香栁色已矜誇鮑照詩細葉發梅香晉子夜歌梅花落已盡栁花隨風散江總詩梅花栁色春難遍又二月梅爭栁顔氏家訓孫楚矜誇凌上隋書李諤傳矜誇自大迎春正啟流霞席古三墳雲氣流霞揚雄甘泉賦噏青雲之流霞兮飲若木之露英陳子良詩流霞席上滿迥雪掌中飛蹔囑曦輪勿遽斜廣韻曦日光也梁簡文帝文器冇水縁方見圓曦之影劉孝威詩秦雲猶變色魯日尚迴輪顔延之曲水詩序情盤景遽歡洽日斜梁元帝詩西山晚日斜明皇帝春日出苑逰矚太子時作三陽麗景早芳辰書洪範三曰木疏正月為春木位也三陽己生故三為木數晉白苧舞歌鳴絃清歌及三陽李嶠詩三陽偏勝節謝朓侍宴曲水詩麗景則春儀方在震虞羲春郊詩景麗鳥和春劉孝綽詩麗景花上鮮梁昭明太子啟東風拂地啟青陽之芳辰梁元帝纂要春曰青陽辰曰良辰嘉辰芳辰李嶠立春日詩剪綵學芳辰四序佳園物候新沈約明堂登歌布徳焉在四序將收北齊元㑹大享歌四序氤氲三光昭晰蕭慤詩隨時四序合晉書山簡傳諸習氏荆土豪族有佳園池簡毎出逰嬉多之池上置酒輒醉名曰高陽池梁簡文帝晚春賦嗟時序之迴斡嘆物候之推移虞綽詩况當此春節物候驚田里杜審言詩獨有宦逰人偏驚物侯新梅花百樹障去路白帖大庾嶺上梅花南枝已落北枝方開梁簡文帝詩絶訝梅花晚爭來雪裏窺梁元帝詠梅詩梅含今春樹庾信詩細塵障路起何遜梅花詩銜霜當路發垂栁千條暗囘津梁元帝樂府巫山巫峽長垂栁復垂楊庾信行雨山銘横藤礙路垂栁低人梁簡文帝春日想上林詩栁條恒著地王褒詩楊栁拂地數千條王瑳折楊栁枝影侵雲暗謝偃詩參差濃葉暗桑津鳥飛直為驚風葉史記老子傳孔子曰鳥吾知其能飛丘遲詩巢空初鳥飛韋鼎詩一鳥忽相驚庾信詩荷風驚宿鳥陳子良詩驚鳥屢飛恒失侣梁昭明大子啟風拂林而下葉魚沒都由怯岸人莊子夢為魚而沒於淵梁簡文帝賦鱓魚逰而不沒庾信詩懸知岸上人遥振江中鼓北魏咸陽王謠洛水湛湛彌岸長行人那得渡惟願聖主南山夀後漢書第五倫傳毎讀詔書常歎息曰此聖主也一見決矣楊惲報孫㑹宗書伏惟聖主之恩不可勝量王褒聖主得賢臣頌遇明君遭聖主詩如南山之夀王融曲水詩序上陳景福之賜下獻南山之夀梁簡文帝南郊頌序南山之夀無極七百之基永固張正見樂逰苑侍宴詩願薦南山夀明明奉萬年何愁不賞萬年春詩天子萬年庾信詩有慶兆民同論年天子萬鶡冠子斗柄東指天下皆春唐髙宗詩方期六合泰共賞萬年春鄭愔字文靖滄州人年十七進士擢第天后時為殿中侍御史貶宣州司户既遷吏部侍郎人日侍宴大明宫北史魏收傳初魏帝宴百僚問何故名人日收對曰正月一日為雞二日為狗三日為猪四日為羊五日為牛六日為馬七日為人雍録唐有三大内太極宫在西名西内大明宫在東名東内别冇興慶宫號南内三内迭受朝而大明最數瓊殿含光暎早輪南史升紫霄之丹地排玉殿之金扉謝莊宋明堂歌璇庭寂玉殿虚晉書皇甫謐傳泰液含光元氣混蒸秋興賦月朣朧以含光兮露凄清以凝冷王褒詩人傳陌上桑未曉已含光梁簡文帝詩夜輪懸素魄朝光蕩碧空玉鑾嚴蹕望初晨離騷揚雲霓之晻靄兮鳴玉鸞之啾啾劉義暴白馬賦揚玉鑾之玲瓏沈約詩玉鑾隠雲霧劉禕之詩帝圃疏金闕仙臺駐玉鑾後漢書楊秉傳王者至尊出入冇常警蹕而行靜室而止唐書儀衛志天子升路太僕授轡黄門侍郎奏請發鑾駕動警蹕池開凍水仙宫麗禮記冰凍消釋江總詩隴水凍無聲何遜詩㶑灧故池水蒼茫落日暉南康記雩都縣冇君山大風雨後聞絃歌其山謂之仙宮武后詩望駕幸仙宫樹發寒花禁苑新張協詩寒花發黄采秋草含緑滋張正見詩霜雁排空㫁寒花暎日鮮西都賦西郊則有上囿禁苑林麓藪澤西京賦上林禁苑跨谷彌阜唐太宗詩禁苑春暉麗花蹊綺樹粧佳氣徘徊籠細網後漢書光武帝紀望氣者蘇伯阿為王莽使至南陽遥望見舂陵郭唶曰氣佳哉欝欝葱葱然宋書符瑞志徘徘徊徊雍雍喈喈南都賦彈琴擫籥流風徘徊梁簡文帝與僧正教琉璃密室自可輕風難入龍鬚細網足使飛燕不過殘霙淅瀝染輕塵謝靈運雪賦霰淅瀝而先集雪粉糅而遂多海賦輕塵不飛纎羅不動李康逰山序若流電之過户牖輕塵之棲弱草良時荷澤皆迎勝李陵詩良時不再至顔延之詩良時為此别漢書劉向傳聖人即天地以耀物常無私於上均徳澤於下協和萬邦黎民無怨曹植對酒行含生䝉澤草木茂延又表沐浴聖澤潛潤徳教窮谷晞陽猶未春左傳日在北陸而藏冰西陸朝覿而出之其藏冰也深山窮谷固隂沍寒於是乎取之嵇康詩抗首潄朝露晞陽振羽儀支遁詩晞陽熙春圃崔日用滑州靈昌人進士舉大足元年為宗楚客稱薦擢新豐尉神龍中附楚客三思驟遷兵部侍郎兼脩文館學士復預討韋庶人謀授黄門侍郎參知機務開元中拜吏部尚書終幷州大都督長史奉和聖製春日幸望春宫應制雍録望春亭在禁苑東南高原之上舊記多云望春宫其東正臨滻水也一統志望春宫在西安府城東一十里滻水西岸東郊風物正薫馨禮記立春之日天子親率三公九卿諸侯大夫以迎春於東郊陶潛斜川詩序天氣澄和風物閒美蘇武詩芬馨良夜發隨風聞我堂素滻鳬鷖戲緑汀潘岳西征賦南冇𤣥灞素滻湯井温谷盧思道詩今留素滻曲夏木已成隂駱賓王詩我住青門外家臨素滻濱一統志滻水在西安府城東一十五里源出藍田縣詩鳬鷖在涇傳鳬水鳥也鷖鳬屬太平則萬物衆多張衡南都賦汰瀺灂兮船容裔陽侯澆兮掩鳬鷖王勃春思賦春水春魚樂春汀春鴈舉鳯閣斜通平樂觀謝靈運詩朝逰登鳯閣鮑照凌雲樓序鳯閣起於漢京唐書百官志光宅元年改中書省曰鳯閣漢書西域傳烏孫元貴靡願復尚漢公主天子自臨平樂觀㑹外國君長大角觝設樂而遣之王褒従軍行講戎平樂觀學戲羽林亭龍旗直逼望春亭詩龍旗十乗禮記龍旗九旒天子之旌也淮南子大路龍旗羽葢垂緌梁昭明太子七契鵠葢龍旗初不闗意一統志望春亭在滻水傍光風揺動蘭英紫楚辭光風轉蕙汎崇蘭些注光風謂雨已日出而風草木皆有光也南史蕭子顯傳風動春朝王融詩薫風動蘭月魏文帝賦隨囘風以揺動兮吐芬氣之穆清又秋胡行俯折蘭英江淹青苔賦春禽悲兮蘭莖紫淑氣依遲栁色青陸機詩蕙草饒淑氣沈約三日侍林光殿宴詩淑氣婉登晨劉孝綽詩迴風飄淑氣落景煥新光唐太宗春日宴羣臣詩韶光開令序淑氣動芳年梁昭明太子七契夾鍾之節春景依遲碧樹初蕋緑草含滋何遜詩輕烟滲栁色鮑照三日詩氣暄動思心栁青起春懐渭浦明晨脩禊事徐陵傅大士碑巖溪藴徳渭浦呈祥王勃九成宫頌大輅徜徉載飛熊於渭浦一統志渭河在西安府城北五十里出渭源縣曹植詩明晨秉機杼日昃不成文王羲之蘭亭序永和九年嵗在癸丑暮春之初㑹于㑹稽山隂之蘭亭脩稧事也羣公傾賀水心銘詩羣公先正晉書束晢傳武帝問摯虞三日曲水之義晢進曰秦昭王以三日置酒河曲金人捧水心之劍曰令君制有西夏乃霸諸侯因此立為曲水二漢相縁皆為盛集韋元旦京兆萬年人擢進士第補東阿尉遷左臺監察御史與張易之為姻屬易之敗貶感義尉後復進用終中書舍人興慶池侍宴應制雍錄六典所記曰隆慶坊舊宅有井忽湧為小池周袤十數畝常有雲氣或黄龍出其中至景雲間潛復出水其沼浸廣里中悉移居遂澒洞為龍池焉開元初以為離宫後又増廣遂為南内又開元二年七月以宅為宫既取隆慶坊名以為宫名而帝之二名其一為隆故改隆為興是為興慶宫也滄池漭沆帝城邊三秦記漢未央宫有滄池中築漸臺張衡西京賦顧臨太液滄池漭沆注漭沆寛大也劉孝綽詩滄池誠自廣張正見詩滄池聊薄逰東觀漢記河南帝城多貴臣南陽帝鄉多近親朱超城上鳥樂府朝飛集帝城隋煬帝詩洛陽城邊朝日暉殊勝昆明鑿漢年漢書武帝紀減隴西北地上郡戌卒半發謫吏穿昆明也注昆明國有滇池方三百里漢使求通身毒國而為昆明所閉今欲伐之故作昆明池象之以習水戰在長安西南周囘四十里江淹遂古篇漢鑿昆明灰炭全兮魏書肅宗紀治歴明時前王茂軌考辰正朔奕代通規是以北平革定於漢年楊偉草算於魏世夾岸旌旗疏輦道王粲詩蟋蟀夾岸鳴張正見詩槐花夾岸飛孫祖登詩新蓮夾岸紅周禮析羽曰旌説文析羽注旄首也所以精進士卒也又熊旗五斿以象伐星士卒以為期釋名熊虎為旗與衆期之於下也戰國䇿旌旗蔽空謝朓詩旌旗散容裔漢書武帝紀建章宮南立神明臺井幹樓廣五十餘丈輦道相屬庾肩吾詩疏山開輦道隂鏗詩輦道乗雙闕中流簫鼓振樓船説苑魏武侯浮西河而下中流顧謂左右曰美哉河山之固也漢武帝秋風辭汎樓船兮濟汾河横中流兮揚素波簫鼓鳴兮發棹歌庾信詩玉軸汎中流江總詩北宫命簫鼓史記平準書大脩昆明池治樓船高十餘丈旗幟加其上甚壯漢書注作大船上施樓故號樓船雲峯四起迎宸幄王融詩雲峯帝鄉起江淹詩平明登雲峯杏與廬霍絶庾肩吾詩雲峯入夏池左貴嬪賦風蕭蕭而四起鮑照書旋風四起羣鳥思歸唐書禮樂志皇太子加元服前一日尚舍設御幄於太極殿前釋名幄屋也以帛衣板施之形如屋也水樹千重入御筵范雲詩水樹饒蟠枝王景和登浮圖詩綴葉披天藻吹花散御筵宴樂已深魚藻詠詩我有㫖酒以宴樂嘉賓之心又魚在在藻有頒其首王在在鎬豈樂飲酒承恩更欲奏甘泉庾肩吾侍宴詩承恩謝命淺念報在身前徐陵詩承恩豫下席應阮獨何人漢書文帝紀三年五月上幸甘泉注廿泉在雲陽本秦林光宫又揚雄傳召雄待詔承明之庭従上甘泉