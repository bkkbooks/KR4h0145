春入鳯凰樓劉孝綽詩屏居青門外結宇灞成隂楊師道詩一御瑶池駕詎憶長城隂梁簡文帝春情詩蝶黄花紫燕相隨楊低栁合路塵飛桃李不須令更種通鑑太后嘗問狄仁傑朕欲得一佳士用之誰可者仁傑曰有張柬之其人雖老宰相才也仁傑又嘗荐姚元崇桓彦範敬暉等數十人或謂仁傑曰天下桃李悉在公門矣早知門下舊成蹊戰國策齊人有馮煖者貧乏不能自存使人屬孟嘗君願寄食門下張華詩門下多豪英史記李廣傳賛桃李不言下自成蹊梁元帝詩桂潭連菊岸桃李暎成蹊曹唐字堯賓桂州人初為道士後舉進士不第咸通中累為使府從事羽林賈中丞漢書百官公卿表注羽林亦宿衛之官言其如羽之疾如林之多也一説羽所以為王者羽翼也唐書兵志髙宗龍朔二年始取府兵越騎步射置左右羽林軍大朝㑹則執仗以衛階陛行幸則夾馳道為羽仗唐書百官志御史臺大夫一人正三品中丞三人正四品下大夫掌以刑法典章糾正百官之罪惡中丞為之貳四十年前百戰身王胄詩相知四十年漢書韓信傳武安君有百戰百勝之計晉書索琳傳進救新平大小百戰手擒賊帥李羌王褒詩將軍百戰未封侯曽驅虎隊掃邊塵左傳狄虒彌建大車之輪䝉之甲以為櫓左執之右拔㦸以成一隊孟獻子曰詩所謂有力如虎者也唐書兵志五十人為隊隊冇正淮南子雨師灑道風伯掃塵李陵書滅跡掃塵蘇味道詩伐邢知有屬已見靜邊塵風悲鼓角榆關暮蔡琰胡笳十八拍日暮風悲兮邊聲四起魏武帝苦寒行北風聲正悲後漢書公孫瓉傳梯衝舞吾樓上鼓角鳴於地中通典李靖兵法曰凡教旗於平原曠野登高逺視處大將居其上左右各置鼓角十二漢書枚乗傳昔秦北備揄中之關注即今所謂榆關也隋書文帝紀開皇三年城榆關一統志榆關在撫寧縣東三十里日暖旌旗隴草春江淹四時賦旭日始暖蕙草可織岑參詩風恬日暖蕩春光杜甫詩旌旗日暖龍蛇動釋名旌精也言冇精光也旗期也言與衆期於下也潘岳文旌旗電舒戈矛林植杜甫詩隴草蕭蕭白韓愈詩横飛玉盞家山曉逺蹀金珂塞草春鐵馬慣牽邀上客陸倕石闕銘鐵馬千羣朱旗萬里注鐵馬鐵甲之馬也庾信文鐵馬冇河橋之戰禮記效馬效羊者右牽之庾信詩牽馬向渭橋史記晏嬰傳越石父賢在縲紲中晏子解左驂贖之延為上客謝朓詩玉杯邀上客金魚多解乞佳人唐書車服志隨身魚符者以明貴賤應召命皆盛以魚袋三品以上飾以金五品以上飾以銀天授二年改佩魚為龜其後三品以上龜袋飾以金四品以銀五品以銅中宗初罷龜袋復給以魚杜甫詩金魚換酒來李白對酒憶賀監詩序太子賓客賀監於長安紫極宫一見呼余為謫仙人因解金龜換酒為樂按賀知章為祕書監淮南子佳人不同體美人不同面而皆悦於目李延年歌北方有佳人絶世而獨立胷中别有安邊計莊子機心藏於胷中則純白不備司馬相如子虚賦吞雲夢者八九其於胷中曽不蔕芥漢書趙充國傳選擇良吏拊循和輯此全師保勝安邊之册南史何承天傳魏軍南伐宋文帝訪捍禦之畧承天上安邊論凡陳四事陳子昻答韓使同在邊詩聞詔安邊使曽是故人謨誰睬髭鬚白似銀古樂府行者見羅敷下擔捋髭鬚白居易詩位髙方稱白髭鬚元稹詩翠娥潛笑白髭鬚又白髮過於冠色白銀釘少校頷中銀髙適送衛縣李寀少府類要唐時縣尉多稱少府黄鳥翩翩楊栁垂詩黄鳥于飛禽經倉庚黧黄黄鳥也亦曰楚雀亦曰商庚夏蠶候也郭璞黄鳥讃爰有黄鳥其鳴自呌左思魏都賦翩翩黄鳥江珙詠鶴詩猶冀凌雲志萬里共翩翩梁簡文帝詩春堤楊栁拂河橋沈約詩髙楊拂地垂張正見詩三陽弱栁垂春風送客使人悲梁簡文帝詩春風本自奇楊栁最相宜沈約詩臨春風春風起春樹庾信詩結客少年場春風滿路香三輔黄圗霸橋在長安東跨水作橋漢人送客至此橋折栁贈别江淹别賦帳欽東都送客金谷説苑應侯與賈子坐聞有鼓琴之聲應侯曰今之琴一何悲也賈子曰夫張急調下故使人悲耳江淹别賦惟樽酒兮叙悲怨别自驚千里外江淹别賦别方不定别理千名有别必怨有怨必盈謝莊月賦隔千里兮共明月江淹謝惠連贈别詩方作雲峯異豈伊千里别論交却憶十年時説苑論交合友所以相致也梁簡文帝華月詩欲傳千里意不照十年悲雲開汶水孤帆逺劉遵度開山塞雲朝欲開薛據詩雲開天宇靜書浮於汶疏汶水出泰山萊蕪縣原山西南入濟水經注濟水又北汶水注之戴延之所謂清口也兖州志東平州有汶水縣梁簡文帝書夕鳥歸林懸孤帆而未息陳子昻詩孤帆出霧中庾肩吾詩逺帆似凌空路繞梁山匹馬遲一統志梁山在夀張縣南九十里南史侯景傳或匹馬孤行自執羈紲江暉詩雪暗馬行遲此地從來可乗興唐太宗詩一朝辭此地四海遂為家沈佺期詩為報寰中百川水來朝此地莫東歸晉書王徽之傳乗興而來興盡而返宋之問詩乗興入幽棲留君不住益凄其沈后答後主詩情知不肯住教遣若為留詩凄其以風羅鄴餘杭人累舉進士不第以韋莊奏追賜進士及第贈官補闕老將百戰辛勤歸帝鄉戰國策外黄徐子曰臣有百戰百勝之術晉書索琳傳進救新平小大百戰張正見詩故人輕百戰南史劉懷珍傳以禁旅辛勤求為閒職韓愈詩辛勤三十年莊子乗彼白雲至於帝鄉陳書吴明徹傳遷鎮東將軍呉興太守世祖謂曰呉興雖郡帝鄉之重故以相授君其勉之南班班裏最南行唐書儀衛志朝日百官序班於通乾觀象門南入宣政門至閤門班於殿庭武班供奉者立於横街之北次千牛中郎將次千牛將軍次過狀中郎將次接狀中郎將次押柱中郎將次押柱中郎次排階中郎將次押散手杖中郎將次左右金吾衛大將軍王建田侍中歸鎮詩䕫龍班裏侍中髙韓愈碑秀出班行乃動帝目弓欺猿臂秋無力史記李將軍傳廣為人長猿臂其善射亦天性也耿湋入塞曲猿臂銷弓力南史卜天與傳天與善射弓力兼倍魏書奚康生傳蕭衍聞康生能引彊弓力至十餘石故特作大弓兩張送康生康生便㑹集文武乃用平射猶冇餘力白居易詩白露降而弓力調劍泣虬髯曉有霜鮑照詩雙劍將别離先在匣中鳴淮南子寶劍之色如秋霜魏文帝歌辭歐氏寶劍何為低昻白如積雪利若秋霜張東之出塞詩楚劍利如霜張説王君􅎢碑小頭鋭上猿臂虬髯耿湋入塞曲虬髯長劍威杜甫詩次問最少年虬髯十八九李白詩天河落曉霜千古恥非書竹帛蘇頲論激清一時流譽千古墨子以其所行書於竹帛傳遺子孫吴越春秋名可留於竹帛後漢書鄧禹傳見光武曰但願明公威徳加於海内禹得効其尺寸垂功名於竹帛耳一心猶是向河湟漢書趙充國傳注湟水出金城臨塞外東入河湟水之北是漢地唐書吐蕃傳湟水出濛谷抵龍泉與河合河之上流由洪濟梁西南行二千里世舉謂西戎地曰河湟郡國志湟水名湟河亦謂之樂都水出青海東亂山中東南流至蘭州西南入黄河韓愈書納君於唐虞收地於河湟年年宿衛天顔近江總詩無那年年别劉緩詩年年情不窮後漢書耿秉傳為執金吾帝毎巡郡國及幸宫觀秉常領禁兵宿衛左右唐書百官志左右衛上將軍各一人大將軍各一人將軍各二人掌宫禁宿衛左傳天威不違顔咫尺杜甫詩天顔有喜近臣知曽把功勲奏建章法言人道交功勲成南史庾蓽傳鄧元起功勲甚著名地卑瑣願名掛士流楊炯詩丈夫皆有志㑹見立功勲漢書武帝紀太初元年起建章宫注在未央宮西又宣帝紀元康元年置建章衛尉王褒入塞詩建章樓閣迥曹唐贈南岳馮處士書五月南巡守至於南岳如岱禮史記封禪書南岳衡山也寂寥深木閉烟霞庾信步虚詞凝真天地表絶想寂寥前盧照隣詩寂寂寥寥楊子居王維詩黄鸝囀深木嚴維獨孤中丞逰雲門寺詩深木鳴騶馭南史張充傳獨餐烟霞高卧風月北史徐則傳飡松餌术棲息烟霞洞裏相知有幾家隂鏗詩洞裏閲仙書劉長卿詩桃花洞裏居人滿一統志衡山盤繞八百里有七十二峯十洞十五巖楚辭樂莫樂兮新相知李陵書人之相知貴相知心李白詩湖南七郡凡幾家笑看潭魚吹水沫庾信詩魚潭見酒船李白詩潭澄羡躍魚一統志衡山有九池九潭九井抱朴子蜂窠為蠟水沫為石此皆柔脆變為堅剛梁簡文帝詩逰魚吹水沫醉嗔溪鹿喫蕉花説文嗔張目也一統志衡山有二十五溪詩呦呦鹿鳴食野之苹魏文帝歌呦呦逰鹿銜草鳴麑格物總論芭蕉叢生根出地面兩三莖成一簇中心抽幹作花桂海虞衡志芭蕉有數種極大者凌冬不彫中抽幹長數尺節節有花王建詩零落蕉花雨打開穿厨歴歴泉聲細孫楚祭介子推文清泉甘水充君之厨何仲誼七夕詩歴歴珠星疑拖佩一統志衡山有三十八泉張祐詩泉聲到地盡楊衡夜雨滴空堦詩始兼泉響細稍雜更聲促繞屋悠悠樹影斜陶潛詩繞屋樹扶疎陸機賦天悠悠其彌高楊思𤣥詩寒叢樹影疎梁簡文帝詠藤詩纎條寄喬木弱影掣風斜夜靜著灰封釜竈關氏易傳晝動六時也夜靜六時也傅休奕詩夜靜微風起江淹别賦守丹竈而不顧煉金鼎而方堅庾信詩自可尋丹竈何勞憶酒壚雲笈七籖九丹成為仙藥之上當起火夜數十日伺候火力不可令失其適又作竈屋長四丈南向中央作竈竈令四方四面開口盛藥土釡以好糠火燒之令去釜一尺許調適視火勿令暴猛自添文武養丹砂參同契注鉛屬金其性至剛藏於坎中非猛烹極煅不能飛上故用武火逼之而不可施以文汞屬水其性至柔藏於離中一見真鉛自然不動故用文火煉之而不可施以武史記封禪書李少君言上曰祀竈則致物致物而丹砂可化為黄金成以為飲食器則益夀梁武帝樂府但使丹砂就能令億萬年江淹丹砂可學賦信名山及石室驗青澒與丹砂劉威㑹昌時人遊東湖黄處士園林偶向東湖更向東梁武帝詩河中之水向東流杜甫詩安西都䕶胡青驄聲價歘然來向東數聲雞犬翠㣲中陶潛詩狗吠深巷中雞鳴桑樹巔人桃花源記阡陌交通雞犬相聞爾雅山脊岡未及上翠微左思蜀都賦欝葐蒀以翠微崛巍巍以峩峩注翠微山氣之輕縹也沈約樂府鶴樓峻連翠微遥知楊栁是門處王維詩遥知兄弟登髙處陶潛五栁先生傳先生不知何許人也亦不詳其姓字宅邊冇五栁樹因以為號焉又詩楊栁夾門植江總尋草市宅詩看栁尚知門髙適詩門栁蕭蕭噪暮鴉似隔芙蓉無路通古今注芙蓉一名荷花夏侯湛芙蓉賦臨清池以逰覽觀芙蓉之麗花王維詩當軒對樽酒四面芙蓉開楚辭願陳志而無路宋之問詩迷路出花難樵客出來山帶雨王僧孺書或蹲林卧石藉卉班荆不過田畯野老漁父樵客李嶠詩荒阡下樵客張正見詩山雨濕苔碑庾肩吾詩雲甍猶帶雨漁舟過去水生風顔氏家訓五員之托漁舟王勃滕王閣序漁舟唱晚響窮彭蠡之濱庾肩吾詩窻含度水風物情多與閒相稱杜甫詩幽居見物情孫綽賦逰覽既周體靜心閒李白詩淡然萬事閒所恨求安計不同陸機豪士賦身危由於勢過而不知去勢以求安楞嚴經心悟實相身意輕安皇甫冉秋日東郊閒看秋水心無事莊子秋水時至百川灌河潘岳秋興賦澡秋水之涓涓兮玩逰鯈之潎潎李嶠上髙長史書洞庭秋水清九流於心鏡老子為無為事無事史記陳軫傳陳軫見犀首曰公何好飲也曰無事也坐對寒松手自栽杜甫詩坐對秦山晚孟浩然詩如何春月栁猶憶嵗寒松劉長卿詩最憶門前栁閒居手自栽廬岳髙僧留偈别伏滔逰廬山序廬山者江陽之名嶽徐陵書峯號香爐依然廬岳一統志廬山東林寺晉僧惠逺居之三十餘年不出隋書經籍志髙僧傳六巻虞孝敬撰唐書藝文志道宗續髙僧傳三十二巻孫逖詩異域今無外髙僧代所稀徐陵傳大士碑安禪合掌説偈論經韋應物詩暫與雲林别茅山道士寄書來南史陶𢎞景傳止於句容之句曲山曰此山下是第八洞宫名金陵華陽之天昔漢有咸陽三茅君得道來掌此山故謂之茅山茅山志三茅君乗白鵠各集山之三處時人分為大茅君中茅君小茅君三山焉一統志茅山在句容縣東南四十五里郭璞詩青谿千餘仞中冇一道士李頎詩嵩陽道士餐柏實居處三花對石室庾信賦玉關寄書杜甫詩幾嵗寄我空中書燕知社日辭巢去文吕雜録燕以春社來秋社去謂之社燕禮記擇元日命民社杜甫燕子來舟中詩舊入故園嘗識主如今社日逺看人説文燕布翅枝尾作巢避戊巳爾雅翼以戊巳書燕巢則燕去王勃文吴宫尚逺頻驚去燕之心菊為重陽冒雨開魏文帝與鍾繇九日送菊書是月律中無射言羣木百草無有射地而生惟芳菊紛然獨榮杜甫九日詩舊日重陽日傳杯不放杯李白詩菊花何太苦遭此兩重陽駱賓王冒雨尋菊序辭塵成契冒雨相邀社甫詩櫓揺背指菊花開淺薄將何稱獻納禮記伋則安能疏子思自以才能淺薄不及聖祖故云庾亮讓中書令表微誠淺薄未垂察諒班固兩都賦序朝夕論思日月獻納潘岳詩愧無獻納尸素已甚臨岐終日獨遲囘鮑照舞鶴賦指㑹規翔臨岐矩步爾雅二塗謂之岐易君子終日乾乾又見幾而作不俟終日史記孔子世家祗囘畱之注言祗敬遲囘不能去之鮑照放歌行臨路獨遲囘孟浩然詩故人今在位林下莫遲囘御選唐詩巻十七
