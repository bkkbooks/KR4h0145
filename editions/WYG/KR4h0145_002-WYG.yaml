body:
  text: 欽定四庫全書御選唐詩目録中巻十七七言律一中宗皇帝立春日遊苑迎春明皇帝春日出苑遊矚鄭愔人日侍宴大明宫崔日用奉和聖製春日幸望春宫應制韋元旦興慶池侍宴應制蘇瓌興慶池侍宴應制岑義奉和春日幸望春宫應制沈佺期龍池篇侍宴安樂公主新宅應制李嶠奉和人日宴大明宫恩賜綵縷人勝應制張説奉和春日出苑矚目應令舞馬千秋萬嵗樂府詞遙同蔡起居偃松篇王維積雨輞川莊作崔顥黄鶴樓賈至早朝大明宫呈兩省僚友王維和賈至舍人早朝大明宫之作奉和聖製從蓬萊向興慶閣道中留春雨中春望之作勅賜百官櫻桃和太常韋主簿五郎温湯寓目之作杜甫奉和賈至舍人早朝大明宫宣政殿退朝晚出左掖曲江對酒臘日夜岑參奉和中書舍人賈至早朝大明宫高適夜别韋司士得城字李頎題璿公山池劉長卿送皇甫曾赴工部錢起和王員外晴雪早朝韋應物寄李儋元錫包何和程員外春日東郊即事張南史江北春望贈皇甫補闕李紳憶春日曲江宴後許至芙蓉園薛逄漢武宫詞李商隱九成宫促漏温庭筠利州南渡許渾咸陽城西門晚眺劉滄題王校書山齋韓偓中秋禁直翫水禽羅隱杏花王貞白洗竹張説奉和聖製春日幸望春宫應制沈佺期奉和春初幸太平公主南莊應制錢起和李員外扈從温泉宫楊巨源寄同年中書舍人錢起山中酬楊補闕見過韋蟾送盧尚書之靈武戎昱上李常侍曹唐羽林賈中丞高適送衞縣李寀少府羅鄴老將曹唐贈南岳馮處士劉威遊東湖黄處士園林皇甫冉秋日東郊巻十八七言律二王維春日與裴迪訪吕逸人不遇杜甫江村許渾晚自朝臺津至韋隱居郊園章碣對月許渾鶴林寺中秋翫月陸龜䝉中秋待月劉兼對雨秦韜玉春雪李建勲重戲和春雪寄沈員外朱灣長安喜雪李建勲鍾山寺避暑秦韜玉八月十五夜同衞諫議看月韋元旦立春遊苑應制李山甫寒食司空曙早夏寄元校書温庭筠池塘七夕許渾觀章中丞夜按歌舞曹松水晶念珠項斯古扇羅鄴白角簟釋若虛古鏡孟浩然登安陽城樓郎士元馮翊西樓羅鄴洛水崔顥行經華隂張濯題舜廟李紳禹廟無名氏長信宫錢起長信怨孟浩然春情杜甫城西陂汎舟宇文鼂尚書之甥崔彧司業之孫尚書之子重汎鄭監前湖韋莊雪夜汎舟遊南溪貴公子李白贈郭將軍劉兼貴遊蘇頲景龍觀送裴士曹雍陶咏雙白鷺王維百舌鳥李建勲蝶崔興宗勅賜百官櫻桃秦韜玉對花惜花李建勲落花羅隱梅花李建勲薔薇劉兼玉燭花李建勲重臺蓮包何闕下芙蓉張賁和魯望白菊陸龜䝉憶白菊秦韜玉牡丹羅隱牡丹李商隐牡丹殷文圭題友人庭竹劉兼新竹温庭筠楊栁陸龜䝉和襲美揚州看辛夷花次韻趙嘏題横水驛雙峯院松温庭筠法雲寺雙檜張祜揚州法雲寺雙檜呉融紅樹張説㴩湖山寺巻十九七言律三沈佺期從幸香山寺李頎宿瑩公禪房聞梵劉長卿送惠法師遊天台因懷智大師故居郎士元詶錢起秋夜宿靈臺寺見寄本集作題精舍寺王維過乘如禪師蕭居士嵩丘蘭若杜甫玉臺觀王維送方尊師歸嵩山李白送賀監歸四明應制曹唐劉晨阮肇遊天台劉阮洞中遇仙子王維酌酒與裴迪劉兼宣賜錦袍設上贈郡客耿湋賀李觀察禱河神降雨白居易寄韜光禪師李頎送魏萬之京李洞漁父秦韜玉釣翁李嶠奉和初春幸太平公主南莊應制沈佺期興慶池侍宴應制奉和春日幸望春宫應制李乂興慶池侍宴應制李適奉和春日幸望春宫應制侍宴安樂公主山莊應制帝幸興慶池戲競渡應制奉和立春遊苑迎春宋之問奉和春初幸太平公主南莊應制三陽宫侍宴應制得幽字崔湜奉和春日幸望春宫鄭愔奉和春日幸望春宫宗楚客奉和幸安樂公主山莊應制趙彥昭人日侍燕大明宫應制張説隆慶池侍宴應制蘇頲奉和春日幸望春宫應制扈從鄠杜興慶池應制奉和春日幸太平公主南莊應制張九齡奉和聖製早發三鄉山行賈曾奉和春日出苑矚目應令李邕奉和春初幸太平公主南莊應制沈佺期和上已連寒食有懷京洛孫逖立春日贈韋侍御等諸公張諤延平門高齋亭子應岐王教李憕奉和聖製從蓬萊向興慶閣道中留春雨中春望之作應制王維勅借岐王九成宫避暑應教酬郭給事盧象駕幸温泉岑參西掖省即事奉和杜相公發益昌和祠部王員外雪後早朝即事張謂春園家宴巻二十七言律四李白登金陵鳳凰臺杜甫贈田九判官梁丘紫宸殿退朝口號南鄰涪城縣香積寺官閣秋興小至李嶠太平公主山亭侍宴應制沈佺期奉和立春遊苑迎春武平一興慶池侍宴韋元旦奉和幸安樂公主山莊應制蘇頲侍宴安樂公主山莊應制廣達樓下夜侍酺讌應制杜甫卜居堂成送李八祕書赴杜相公幕劉長卿獻淮寧軍節度使李相公自夏口至鸚鵡洲夕望岳陽寄源中丞觀校獵上淮西相公錢起贈闕下裴舍人宴曹王宅韓翃題仙遊觀送冷朝陽還上元送客歸江州皇甫冉三月三日義興李明府後亭汎舟送張道士歸茅山謁李尊師皇甫曾早朝日寄所知寄中書王舍人郎士元春宴王補闕城東别業盧綸春日題杜叟山下别業長安首秋即事司空曙長安曉望寄程補闕李端贈郭駙馬題元注林園章八元題慈恩寺塔戴叔倫越溪村居過故人陳羽山居寄劉禹錫朱灣宴楊駙馬山亭王建早春五門西望上張𢎞靖相公上武元衡相公武元衡秋燈對雨酬嚴司空荆南見寄劉禹錫西塞山懷古栁絮韓愈和庫部盧四兄曹長元日朝回楊巨源長安春遊早朝元日含元殿下立仗丹鳳樓門下宣赦相公稱賀張籍寒食内宴巻二十一七言律五白居易送王十八歸山寄題仙遊寺錢塘湖春行西湖晚歸回望孤山寺贈諸客李紳憶春日太液池亭候對憶夜直金鑾殿承㫖鄭谷鷓鴣劉得仁奉和翰林丁侍郎禁署早春晴望杜牧同趙二十二嘏訪張明府郊居聯句萬楚驄馬張謂别韋郎中李白題東谿公幽居鸚鵡洲杜甫奉酬嚴公寄題野亭之作嚴公仲夏枉駕草堂兼攜酒饌得寒字即事劉長卿漢陽獻李相公錢起登劉賓客高齋上中書李侍郎宴王補闕城東小池幽居春暮書懐和慕容法曹尋漁者寄城中故人韓翃送王光輔歸青州兼寄儲侍御題張逸人園林送康洗馬歸滑州韋應物自鞏洛舟行入黄河即事寄府縣僚友郎士元酬王季友題半日村别業兼呈李明府盧綸詶暢當尋嵩岳麻道士見寄于鵠公子行竇鞏南陽道中作戴叔倫寄萬德躬故居朱灣尋隱者章九山人於東溪草堂王建贈王樞密贈崔禮駙馬酬于汝陽曉雪見寄武元衡春題龍門香山寺權德輿田家即事送李處士山居劉禹錫送源中丞充新羅冊立使和牛相公遊南莊醉後寓言戲贈樂天兼見示羊士諤遊郭駙馬山池韓愈和水部張員外宣政衙賜百官櫻桃詩楊巨源贈史開封張籍謝裴司空寄馬題韋郎中新亭送韓侍御歸山寄和州劉使君白居易香爐峯下新卜山居草堂初成偶題東壁尋郭道士不遇舟中晚起杭州春望元稹清都春霽寄胡三呉十一早春尋李校書過襄陽樓呈上府主嚴司空樓在江陵節度使宅北隅以州宅夸于樂天重夸州宅旦暮景色兼酬前篇末句和樂天早春見寄巻二十二七言律六李商隱寄令狐學士對雪二首辛未七夕和馬郎中移白菊見示温庭筠休澣日西掖謁所知遊南塘寄知者寄盧生陪節度遊河亭杜牧殘春獨來南亭寄張祜李逺失鶴贈寫御容李長史許渾贈茅山高拾遺送蕭處士歸緱嶺别業送韋秀才送郭秀才送張尊師再遊姑蘇玉芝觀夜歸驛樓李紳守滁陽深秋憶登郡城望瑯琊北樓櫻桃花南庭竹海棠别石泉賈島題虢州三堂贈呉郎中田將軍書院張祜和牧之九華見寄王叡詠松詠竹朱慶餘台州鄭員外郡齋雙鶴趙嘏長安晚秋薛逢詠栁五峯隱者馬戴宿王屋天壇題廬山寺劉滄八月十五夜玩月題敬亭山廟登醴泉縣樓題金山寺來鵬與友人遊玉塘莊巻二十三七言律七崔櫓岸梅李羣玉望月懷友李郢贈羽林將軍嚴郭賦百舌鳥譚用之贈釣魚李處士方干題桐廬謝逸人江居再題路支使南亭聽段處士彈琴敘錢塘異勝鹽官王長官新創瑞隱寺送孫百篇遊天台楊䕫題鄭山人郊居章碣寄友人陸龜䝉闔閭城北有賣花翁討春之士往往造焉因招襲美薔薇奉和襲美夏景沖澹作皮日休禇家林亭曹唐贈南嶽馮處士鄭谷舟行韓溉松崔塗鸚鵡洲即事杜荀鶴冬末同友人汎瀟湘山居寄友人蘇廣文歸華山因寄幕府周朴桐柏觀呉融太保中書令軍前新樓禁直偶書新雁憶山泉春雨即事韓偓殘春旅舍鵲曹松陪湖南李中丞宴隱溪王貞白庾樓曉望李中江邊吟竹題吉水縣㕔前新栽小松韋莊西塞山下作羅鄴題滄浪峽題水簾洞譚用之贈索處士補編李頎寄綦毋三韓翃寄徐州鄭使君戴叔倫和汴州李相公勉人日喜春崔峒題桐廬李明府官舍王建上杜元潁相公劉禹錫送李尚書鎮滑州送周使君罷渝州歸郢州别墅題王郎中宣義里新居李逺贈𢎞文杜校書李商隱鄭州獻從叔舍人褎賈島早秋寄題天竺靈隱寺温庭筠題李處士幽居南湖宿雲際寺李郢錢塘青山題李隱居西齋皮日休宿報恩寺水閣鄭谷竹韋莊南省伴直題姑蘇凌處士莊徐鉉京口江際弄水巻二十四五言排律太宗皇帝正日臨朝春日𤣥武門宴羣臣出獵秋日斆庾信體賦秋日懸清光賜房𤣥齡明皇帝春晚宴兩相及禮官麗正殿學士探得風字首夏花萼樓觀羣臣宴寧王山亭回樓下又申之以賞樂賦詩并序同二相已下羣官樂遊園宴集賢書院成送張説上集賢學士賜宴得珍字王屋山送道士司馬承禎還天台早渡蒲關途經華岳喜雪幸鳳泉湯南出雀鼠谷荅張説賜崔日知往潞州為趙法師别造精院過院賦詩并序端午三殿宴羣臣探得神字并序端午春中興慶宫酺宴并序千秋節宴并序左丞相張説右丞相宋璟太子少傅源乾曜同日上官命宴都堂賜詩一首早發太行山中言志遊興慶宫作并序送張説巡邊餞王晙巡邊巡省途次上黨舊宫賦并序韓王元嘉奉和同太子監守違戀巻二十五五言排律二虞世南奉和幽王雨後應令許敬宗奉和秋暮言志應制奉和元日應制李嶠奉和皇帝丘禮撫事述懷應制宗楚客奉和幸上陽宫侍宴應制王勃泥溪宋之問靈隱寺陳子昂白帝城懷古沈佺期昆明池侍宴應制宋之問奉和晦日幸昆明池應制張説奉和聖製過王濬墓應制奉和聖製暇日與兄弟同遊興慶宫作應制奉和聖製度蒲關應制奉和聖製爰因巡省途次舊居應制三月二十日詔宴樂遊園賦得風字蘇頲奉和晦日幸昆明池奉和幸韋嗣立山莊侍宴應制席豫奉和聖製答張説扈從出雀鼠谷張九齡恩賜樂遊園宴應制韋抗奉和聖製送張説上集賢學士賜宴得西字盧僎上幸皇太子新院應制孫逖奉和李右相中書壁畫山水杜甫奉和嚴中丞西城晚眺十韻奉觀嚴鄭公㕔事岷山沲江畫圖十韻得忘字祖詠清明宴司勲劉郎中别業滕珦釋奠日國學觀禮聞雅樂白行簡咏夫子鼓琴得其人春從何處來葉元良御製段太尉碑舒元輿履春冰鄭蕢春臺晴望獨孤良弼上已接清明遊宴童翰卿昆明池織女石周存禁中春松趙蕃薦冰高弁省試春臺晴望沈佺期李員外秦援宅觀妓七言排律魚𤣥機春情寄子安補編五言排律張九齡奉和聖製南出雀鼠谷答張説李嶠奉和拜洛應制奉和幸韋嗣立山莊侍宴應制沈佺期酬蘇員外味道夏晚寓直省中見贈王維奉和聖製重陽節奉和聖製幸玉真公主山莊因題石壁十韻之作應制春日直門下省早朝李白春日歸山寄孟浩然送友人尋越中山水耿湋元日早朝御選唐詩目録中
