body:
  text: 欽定四庫全書御選唐詩巻二十七補編王維文杏館文杏裁為梁香茒結為宇西京雜記初脩上林苑羣臣逺方各獻名果異樹杏二文杏蓬萊杏司馬相如賦飾文杏以為梁水經注泉陵縣有香茒氣甚芬香明皇帝詩野老茒為屋不知棟裏雲去作人間雨王勃詩畫棟朝飛南浦雲公羊傳觸石而出膚寸而合不崇朝而遍雨乎天下者惟泰山爾書用汝作霖雨木蘭柴秋山歛餘照梁昭明太子書悟秋山之心登髙而逺托謝朓詩山光晚餘照上官儀詩巖花歛餘照飛鳥逐前侣何遜詩日夕飛鳥還廣韻侣伴侣也江淹詩解纜候前侣何遜七召追風蕭於前侣彩翠時分明字林翠青羽雀梁武帝樂府分明無兩心周𢎞正詩的的最分明夕嵐無處所詩日之夕矣廣韻嵐山氣也史記晉世家終不見處所宋玉髙唐賦風止雨霽雲無處所裴迪斤竹嶺王維輞川集序余别業在輞川山谷其遊止有孟城㘭華子岡文杏館斤竹嶺等與裴迪閑暇各賦絶句明流紆且直梁簡文帝詩明波動見流沈約郊居賦面淮流之清直謝朓望三湖詩連汀見紆直呉均詩問余來何遲山川幾紆直緑篠宻復深宋之問詩夤縁緑篠岸遂得青蓮宫劉孝綽詩方塘交宻篠王勃詩篠宻夜窓寒張九齡詩叢篠亦清深一徑通山路六帖後漢張仲蔚蓬蒿滿室惟開一行徑後漢書隗囂傳龍池之山微徑南通與漢相接魏志張遼傳天柱山髙峻二十餘里道險狹步徑裁通張正見詩雪盡青山路行歌望舊岑晉書嵇康傳子房之佐漢接輿之行歌其揆一也陶潛桃花源詩童孺縱行歌鮑照詩之子安所適我方棲舊岑李收幽情幽人惜春暮易履道坦坦幽人貞吉陽休之詩遲遲暮春日潭上折芳草杜甫詩百頃風潭上千章夏木清西都賦竹林果園芳草甘木崔顥詩芳草萋萋鸚鵡洲佳期何時還楚辭登白蘋兮騁望與佳期兮夕張謝莊月賦佳期可以還欲寄千里道謝莊月賦美人邁兮音塵絶隔千里兮共明月孫楚詩餞我千里道皇甫冉送客西塞雲山逺荆州記郡西沂江六千里南岸有山名曰荆門北岸有山名虎牙二山相對楚之西塞也孟浩然詩西塞沿江島南陵問驛樓杜甫詩雲輕處處山謝靈運詩杪秋尋逺山山逺行不近張九齡詩清曠前山逺東風道路長禮記東風解凍古詩道路阻且長盧照隣詩懐書道路長人心勝潮水常建詩潭影空人心郭璞江賦呼吸萬里吐納靈潮李白詩潮水定可信天風難與期相送過潯陽王維詩握手一相送心悲安可論郭璞江賦流九􅉽乎潯陽漢書地理志廬江郡縣潯陽禹貢九江在南皆東合為大江通典尋陽漢舊縣在江北蘄州界晉温嶠移於江州柴桑劉方平春雪飛雪帶春風楚辭増冰峩峩飛雪千里些謝朓詩飛雪天山來徐陵詩輕雪帶風斜呉均詩雪逐春風來徘徊亂繞空謝惠連雪賦連翩飛灑徘徊委積劉璠雪賦散亂徘徊雰霏皎潔祖孫登詩飛緜亂上空君看似花處韓詩外傳凡草木花多五出雪花獨六出裴子夜詠雪詩落樹似飛花呉均詠雪詩凝堦似花積偏在洛陽東何遜聨句洛陽城東西却作今年别昔去雪如花今來花似雪徐陵詩欲見洛陽花如君隴頭雪戴叔倫松鶴雨濕松隂凉王維詩草色全經細雨濕杜甫詩枝藜長松隂又槐夏午隂凉風落松花細孫逖送李郎中序風落崤澠霜飛河濆李白五雲裘歌輕如松花落衣巾杜甫詩崖宻松花熟山杯竹葉新獨鶴愛清幽謝朓詩獨鶴方朝唳何遜詩獨鶴凌空逝唐明皇詩尋勝在清幽飛來不飛去古辭飛來雙白鶴乃從西北來李白鷺鷥詩人驚逺飛去直向使君灘杜甫麗人行青鳥飛去銜紅巾李益鷓鴣詞禽經隨陽越雉鷓鴣也飛必南翥注鷓鴣白黒成文其名自呼王維詩不堪頻唱鷓鴣詞湘江斑竹枝水經湘水出零陵陽海山唐書地理志雷州土貢斑竹錦翅鷓鴣飛李白詩苦竹南枝鷓鴣飛劉長卿詩不見鷓鴣飛處處湘雲合謝朓詩處處春雲生史記淮隂侯傳天下之士雲合霧集郎從何處歸劉長卿詩孤舟何處來楊凌送客往睦州明一統志浙江嚴州府禹貢揚州之域天文牛女分野秦為㑹稽郡唐為睦州水濶盡南天劉孝威詩水濶牽牛遥賈至詩莫道巴陵湖水濶長沙南畔更蕭條杜甫詩楚星南天黒蜀月西霧重李白詩夢隨越鳥飛南天孤舟去渺然陶潜詩渺渺孤舟逝又歸去來辭或命巾車或棹孤舟何邵詩渺然心緜邈杜甫詩舟楫渺然從此去江湖逺適無前期驚秋路傍客孟浩然詩洞庭去逺近楓葉早驚秋皇甫冉詩淮南木落己驚秋曺景宗詩借問路旁人何如霍去病古辭兄弟四五人皆為侍中郎五日一時來從者盈路傍日暮數聲蟬魏收詩宴言忘日暮沈君攸詩日暮野風生林蟬候節鳴隋煬帝詩露濃山氣冷風急蟬聲哀髙適詩髙樹多凉吹疎蟬足㫁聲聶夷中字坦之河東人咸通十二年登第官華陽尉田家鋤田當日午劉章耕田歌非其種者鋤而去之韋應物詩薄田失鋤耨生苗安可任孫綽天台山賦注午日中也梁元帝纂要日在午曰亭午汗滴禾下土劉孝威詩凝滴汗垂花詩禾役穟穟廣雅稻穗謂之禾誰念盤中餐韻㑹飲饌曰餐楊凝式韭花帖畫寢乍興調飢正甚忽䝉簡翰猥賜盤餐杜甫詩畦蔬繞茅屋自足備盤餐粒粒皆辛苦廣韻粒米粒書烝民乃粒杜甫詩香稻啄殘鸚鵡粒陸機詩翩翩宦遊子辛苦誰為心髙適詩運甓調辛苦御選唐詩卷二十七補編
