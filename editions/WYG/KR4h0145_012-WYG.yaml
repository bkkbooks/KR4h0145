body:
  text: 欽定四庫全書御選唐詩巻八七言古杜甫短歌行贈王郎司直古今樂録王僧䖍技録平調七曲一曰長歌行二曰短歌行舊注王司直時為蜀中御史甫贈友詩官有王司直即其人唐書百官志司直掌糾劾官僚王郎酒酣拔劍斫地歌莫哀世説天壤之内乃有王郎又此是王郎歌史記荆軻嗜酒日興狗屠及髙漸離飲於燕市酒酣以往髙漸離撃筑荆軻和而歌於市左思詩荆軻飲燕市酒酣氣亦震哀歌和漸離獨若旁無人後漢齊武王傳張卭拔劍擊地我能拔爾抑塞磊落之竒才漢髙帝求賢詔我能尊顯之南史謝方明傳必被抑塞文心雕龍磊落以使才史記公孫鞅年少有竒才又周昌曰君之史趙堯年雖少然竒才也蜀志諸葛亮傳司馬宣王案行其營壘處所曰天下竒才也豫章翻風白日動陸賈新語楩楠豫章天下之名木本草豫章乃二木名一類二種顔師古曰豫即枕木章即樟木南史宋髙祖紀精貫白日鯨魚跋浪滄溟開古今注鯨魚雌曰鯢皆長千里眼為明月珠木華海賦横海之鯨庾信燈賦動鱗甲於鯨魚梁昭明太子集序滄溟之深不能比其大且脱劒珮休徘徊文中子衣裳襜如劒珮鏘如袁淑傚白馬篇彯纓去函谷投珮出甘泉馬融廣成頌徘徊安步西得諸侯棹錦水漢書王嘉傳今之郡守重於古諸侯釋名在旁撥水曰棹司馬相如投卓文君書錦水有鴛漢宫有木一統志二江一名汶江一名流江經成都府城南七里蜀人以此水濯錦鮮明故名錦江蜀錦譜蜀以錦擅名天下故城名以錦官江名以濯錦欲向何門趿珠履漢書鄒陽書臣飾愚陋則何王之門不可曳長裾乎史記春申君傳趙使欲夸楚為瑇瑁簪刀劒室以珠玉飾之請命春申君客春申君客三千人其上客皆躡珠履以見趙使趙使大慚説文趿進足有所擷取桑轄切仲宣樓頭春色深荆州記當陽城樓王仲宣登之而作賦方輿勝覽仲宣樓在荆州梁髙季興建魏志王粲字仲宣山陽人獻帝西遷乃之荆州依劉表謝朓詩春色滿皇州青眼髙歌望吾子晉書阮籍傳籍能為青白眼見禮俗之士以白眼對之嵇康挾琴造焉乃見青眼陶潛讀史述采薇髙歌慨想黄虞禮記望吾子之教之也注吾子相親之詞眼中之人吾老矣陸雲詩髣髴眼中人國語中行宣子謂趙文子曰惜也吾老矣𤣥都壇歌寄元逸人十洲記𤣥洲在北海去岸三十六萬里上有太𤣥都仙伯真公所治本集注𤣥都壇漢武帝所築在長安南山子午谷中故人昔隠東䝉峯漢書霍去病傳衞青寵日衰而去病日益貴青故人門下多去事去病古詩相去萬餘里故人心尚爾陶潛詩脱有經過便念來存故人論語疏顓臾主祭䝉山在東故曰東䝉一統志䝉山在費縣西北七十里以其居魯之東一名東山已佩含景蒼精龍公孫端劒銘従革庚新含景吐商抱朴子道術諸經可以却惡防身者如含景蔵形亦各有效也春秋繁露劒之在左蒼龍象也史記索隠東方蒼帝其精為龍故人今居子午谷漢書子午道従杜陵直絶南山逕漢中注子北方也午南方也言通南北道相當今京城直南山有谷通梁漢道者名子午谷一統志子午谷在西安府城南一百里獨在隂崖結茅屋潘岳西征賦眺華頂之隂崖鮑照詩隂崖積夏雪又結茅野中宿韓非子旄象豹胎必不食於茅屋之下晉書羅含傳含轉州别駕以廨舍喧擾於城西小洲上立茅屋伐木為材織葦為席而居屋前太古𤣥都壇漢書朱邑傳明主遊心太古廣延茂士晉魏春秋蘇門山有隠者阮籍従之與談太古無為之道玉京經𤣥都玉京山有七寳城太上無極大道虚皇君之所治也髙仙之𤣥都焉青石漠漠常風寒山海經嬴母之山其下多青石述異記利州葭萌縣玉女房是大石穴前有竹數莖下有青石壇每因風自掃謝朓詩生烟紛漠漠梁簡文帝詩淇水漠漠苔浮張華詩巢居知風寒齊書謝超宗傳超宗詣東府門自通其時風寒慘厲太祖謂四座曰此客至今人不衣自煖子規夜啼山竹裂爾雅疏蜀王望帝化為子規禽經江介曰子規蜀右曰杜宇注甌越間曰怨鳥夜啼達旦血漬草木家語南山有竹弗揉自直庾信角調曲識韻者探窮山之竹王母晝下雲旗翻漢武内傳七月七日有一青鳥集殿前東方朔曰此西王母欲來也有頃果至列仙傳穆王與王母㑹於瑤池雲旗霓裳擁簇自天而下屈原九歌入不言兮出不辭乗迴風兮載雲旗謝靈運詩雲旗興暮節劉孝孫詩耀日采旗翻知君此計誠長往史記范睢傳誰為此計者乎潘岳西征賦悟山􅇓之逸士卓長往而不返孔稚圭北山移文或嘆幽人長往芝草琅玕日應長十洲記方丈洲仙家數十萬耕田種芝草課頃計畝如種稻状後漢書明帝紀永平十七年芝草生殿前書厥貢惟球琳琅玕張衡詩美人贈我青琅玕漢武内傳太上之藥有廣庭芝草碧海琅玕鐵鎖髙垂不可攀道蔵經晉時有戍卒屯於子午谷入谷之西澗水窮處忽見鐵鎖下垂約百有餘丈戍卒欲挽引而上有虎蹲踞焉王勃詩江漢深無底梁岷不可攀致身福地何蕭爽福地記終南山東接驪山太華西連太白至於隴山周迴百里名曰福地王勃序人髙調逺地爽氣清醉歌行贈公安顔英華有十字少府請顧公題壁古今樂録王僧䖍宴樂技録平調有七曲一曰長歌行二曰短歌行荆州記呉大帝推劉備為左將軍荆州牧鎮油口居此時人號為左公故名其城為公安一統志公安縣在荆州府城東南七十里本漢武陵郡之孱陵縣地漢末以劉備為左公居此號公安晉置公安縣黄鶴注顧公即顧八分文學名況神仙中人不易得世説王右軍見杜𢎞治歎曰膚如凝脂目如㸃漆此神仙中人又孟昶在京口嘗見王恭乗髙輿披鶴氅裘於時微雪昶於籬間窺之嘆曰此真神仙中人史記淮隂侯傳蕭何曰諸將易得耳至如信者國士無雙顔氏之子才孤標易顔氏之子其庶㡬乎梁元帝碑文獨振孤標倫類之所逺絶天馬長鳴待駕馭史記大宛傳大宛多善馬其先天馬子也漢郊祀歌太乙況天馬下霑赤汗沬流頳梁元帝詩正月土膏初欲發天馬照耀動農祥劉琨贈盧湛詩序騄驥倚輈於呉坂長鳴於伯樂知與不知也呉志張昭傳夫人君者謂能駕馭英雄驅使羣賢北史周太祖紀帝知人善任能駕馭英豪一見之者咸思用命秋鷹整翮當雲霄淮南子秋風下霜鷹雕搏摯華覈表揚虎視之威厲秋鷹之爪蘇頲詩海外秋鷹擊霜前旅雁歸史記留侯世家鴻鵠髙飛一舉千里羽翮已就横絶四海支遁詩孰是騰九霄不奮沖天翮晉書熊逺傳攀龍附鳳翺翔雲霄陸機詩美人何其曠灼灼在雲霄阮籍詩寄顔雲霄間君不見東呉顧文學尹洙注顧況呉人漢書仲長統傳秦時以文學徵待詔博士君不見西漢杜陵老班固西都賦漢之西都在於雍州實曰長安漢書宣帝紀元康元年更名杜縣為杜陵水經注長安南出東頭第一門本名覆盎門其南有杜城應劭曰故杜陵之下聚落也甫奉先詠懐詩杜陵有布衣老大意轉拙詩家筆勢君不嫌漢書藝文志凡詩六家四百一十六卷歌詩二十八家三百四十四篇詩賦百有六家千三百一十八篇王羲之筆勢論畧告汝子敬吾觀汝書性過人仍未閑規矩今述筆勢論十篇開汝之性詞翰升堂為君掃南史王儉傳虞正為中書舍人甚嫻詞翰陳子昂詩交遊紛若鳳詞翰宛如麟漢書藝文志如孔氏之門用賦也則賈誼登堂相如入室矣是日霜風凍七澤後漢書盧植傳論風霜以别草木之性張衡同聲歌願為羅衾幬在上衞風霜司馬相如子虛賦臣聞楚有七澤嘗觀其一未見其餘也臣之所見葢特其小小者耳名曰雲夢按禹貢疏左傳昭三年楚子與鄭伯田於江南之夢定四年楚昭王寝於雲中漢陽圖經雲在江之北夢在江之南雲夢居七澤之二餘未詳烏蠻落照銜赤壁唐書南蠻傳邛部六姓一姓白蠻五姓烏蠻廣雅日西落反照於東謂之反景水經注江水左逕百人山南右逕赤壁山北昔周瑜與黄葢詐魏武大軍處也元和郡縣志赤壁山在武昌縣西一百二十里北臨大江其北岸即烏林與赤壁相對一統志在武昌府東南九十里圖經云在嘉魚縣西七十里其地今屬嘉魚酒酣耳熱忘頭白史記髙祖紀過沛留置酒沛宫酒酣髙祖撃筑自為歌詩揚惲報孫㑹宗書酒後耳熱仰天撫缶而歌烏烏魏文帝與呉質書酒酣耳熱仰而賦詩忽然不自知其樂也又行年已長大已成老翁但未頭白耳古樂府半白半黒頭上􅄠感君意氣無所惜史記晏子傅意氣揚揚甚自得也卓文君白頭吟男兒重意氣何用錢刀為一為歌行歌主客史記滑稽傳主人留髠而送客皇甫謐三都賦序作者又因主客之辭正之以魏都折之以王道戲題王宰畫山水圖歌張彦逺名畫記王宰蜀中人多畫蜀山玲瓏嵌空巉嵯巧峭益州畫名畫記王宰大厯中家於蜀川能山水意出象外十日畫一水周禮硩蔟氏以方書十日之號注方版也十日謂従甲至癸又考工記設色之工五注摹倣物體曰畫釋名畫挂也以五色挂物上也子華子琅琊之東渤海稽天非一水之鍾也古詩盈盈一水間五日畫一石詩五日為期禮記今夫山一卷石之多子華子太山之髙非一石之積也能事不受相促迫易天下之能事畢矣春秋疏促迫不暇之意參同契彼促我迫王宰始肯留真蹟唐朝名畫録王宰家於西蜀貞元中畫山水樹石出於象外曽於㕔事見一圖障臨江雙樹一松一柏古藤縈繞上盤於空下著於水千枝萬葉交植屈曲又於興善寺見畫四時屏風若移造化風候雲物八節四時於一座之内陶𢎞景與武帝啟世論咸云江東無復鍾跡今諭㫖云真跡雖少可得而推是猶有存者壯哉崑崙方壺圖文中子子登雲中之城望龍門之闗曰壯哉山河之固書織皮崑崙疏王肅云崑崙在臨羌西鄭以崑崙為山水經崑崙墟在西北河水出其東北陬列子渤海之東有大壑焉其中有山三日方壺拾遺記三壺海中三山也一曰方壺則方丈也二曰蓬壺則蓬萊也三曰瀛壺則瀛洲也形如壺器上廣中狹下方十洲記方丈洲在東海中心西南東北岸正等方丈方面各五千里上専是羣龍所聚挂君髙堂之素壁左思蜀都賦置酒髙堂漢官典職省中皆粉壁紫素界之畫古烈士王延夀魯靈光殿賦素壁皜曜以月照洛陽伽藍記對户交窓朱柱素壁甚為佳麗巴陵洞庭日本東山海經洞庭地穴在長沙巴陵郭璞江賦爰有包山洞庭巴陵地道潛逵傍通幽岫窈窕一統志洞庭在岳州府城西南毎嵗六七月問岷峩雪消水暴漲自荆江逆入洞庭清流為之改色唐書日本傳日本在海中自言國近日所出故以為名又日本國東西南北皆際於海赤岸水與銀河通枚乗七發凌赤岸篲扶桑郭璞江賦鼓洪濤於赤岸南兖州記𤓰步山東五里有赤岸山南臨江中孝經援神契河者水之伯上應天漢楊泉物理論水之精氣上浮宛轉隨流水名曰天河博物志舊説天河與海通近有居海上者年年八月有浮槎來此人乘槎去至一處見一女方織一丈夫牽牛渚次問為何處曰可詣蜀問嚴君平此人還問君平曰某年某月有客星犯牽牛即天河也白帖天河謂之銀漢亦曰銀河中有雲氣隨飛龍易雲従龍又飛龍在天莊子絶雲氣負青天王襃聖主得賢臣頌龍興而致雲氣南康記湘源下流百里有峽兩岸皆髙山峽岸下數十里有蛟龍窟時時有霧氣起舟人漁子入浦溆木華海賦於是舟人漁子徂南極東郭璞江賦於是蘆人漁子擯落江山薛道衡詩連旌暎浦漵疊鼓拂河洲山木盡亞洪濤風左傳山有木工則度之番禺記潮水陵山觸岸湧起成濤説文亞次也張衡西京賦起洪濤而揚波木華海賦洪濤瀾汗萬里無際尤工逺勢古莫比宣和畫譜隋展子䖍善畫臺閣寫江山逺近之勢尤工又顧愷之天才傑出獨歩無偶妙造精微雖荀衞曹張未足以方駕也世説顧長康畫有蒼生來所無咫尺應須論萬里南史齊竟陵王子昭胄傳賁字文奐能書善畫於扇上圖山水咫尺之内便覺萬里為遥焉得并州快剪刀周禮職方氏正北曰并州釋名并州其州或并或設因以為名也爾雅注南方人呼剪刀為劑刀釋名剪刀剪進也所剪稍進前也剪取呉松半江水水經南江東則松江出焉一統志呉江在呉江縣東源出太湖一名松江又名松陵江亦曰笠澤經崑山入海謝安舟楫風還起晉書謝安傳安嘗與孫綽等泛海風起浪湧諸人並懼安吟嘯自若舟人猶去不止風轉急安徐曰如此將何歸耶舟人承言即回衆咸服其雅量書若濟巨川用汝作舟楫楚辭衝風起兮横波梁苑池臺雪欲飛漢書梁孝王傳孝王築東苑方三百餘里廣睢陽城七十里大治宫室為複道自宫連屬於平臺三十餘里如淳注平臺在大梁東北離宫所在也師古注今其城東二十里所有故臺基其處寛博土俗云平臺也一統志梁園在開封府東南一名梁苑梁孝王遊賞之所張衡西京賦度曲未終雲起雪飛謝恵連雪賦嵗將暮時既昬寒風積愁雲繁梁王不悦遊於兔園俄而微霰零宻雪下杳杳東山攜漢妓魏志管輅傳注若俯眩深溪杳杳兮精絶晉書謝安傳寓居㑹稽與王羲之及許詢桑門支遁游處出則漁弋山水入則言詠屬文及登台輔雖受朝寄然東山之志始末不渝謝靈運詩偶與張邴合久欲還東山注東山謂㑹稽始寧也一統志東山在紹興府上虞縣西南四十五里晉謝安髙卧東山即此晉書謝安傳雖放情丘壑然每遊賞必以妓女従泠泠修竹待王歸宋玉風賦清清泠泠東方朔七諫便娟之修竹兮寄生乎江潭上葳㽔而防露兮下泠泠而來風枚乗兔園賦修竹檀欒池始作睢陽之苑九域志睢陽池水庾信文修竹夾有梁孝王東苑中有修竹園西京雜記梁孝王苑中竒果佳樹瑰禽異獸靡不畢備世人言梁孝王竹園也楚辭王孫遊兮不歸春草生兮萋萋髙都䕶驄馬行唐書髙仙芝髙麗人善騎射開元未夫䝉靈詧表為安西副都䕶漢書鄭吉傳吉威震西域遂并䕶車師以西北道故號都䕶都䕶之置自吉始焉注並䕶南北二道故謂之都説文驄馬青白雜色安西都䕶胡青驄舊唐書貞觀十七年置安西都䕶府於西州顯慶三年移治龜兹國城于闐以西波斯以東十六都䕶府隸焉後漢書桓典傳常乘驄馬京師畏憚為之語曰行行且止避驄馬御史隋書吐谷渾有青海中有小山至冬冰合嘗得波斯馬放入海因生驄馬日行千里故時稱青驄海馬古詩躑躅青驄馬聲價歘然來向東赭白馬賦聲價隆振又歘聳擢以鴻驚注歘忽也法華經歘然火起漢天馬歌天馬徠歴無草徑千里循東道此馬臨陣久無敵史記項王謂亭長曰吾騎此馬五嵗所向無敵戴暠詩刀環臨陣鳴與人一心成大功國語勠力一心大戴禮均馬力齊馬心應徳璉慜驥賦展心力於知已兮史記亷頗曰我為趙將有攻城野戰之大功功成恵養隨所致老子功成而不居又功成名遂赭白馬賦願終恵養蔭本枝兮飄飄逺自流沙至曹植詩飄飄隨長風書西被於流沙禮記西不盡流沙元和郡縣志居延澤在張掖縣東北一千六百里即古流沙天馬歌天馬徠従西極涉流沙雄姿未受伏櫪恩赭白馬賦弭雄姿以奉引漢書李尋傳馬不伏櫪不可以趨道注伏櫪謂伏槽櫪而秣之魏武帝樂府老驥伏櫪志在千里梁元帝謝賜馬啟相彼騏驥猶深戀主矧伊伏櫪彌結懐恩説苑受恩者當必報梁邵陵王謝賚馬啟戀徳銘心矚恩雨淚猛氣猶思戰場利宋玉笛賦悲猛氣兮飄疾西征賦何猛氣之咆哮戰國策魏之地勢固戰場也腕促蹄髙如踣鐵相馬經馬腕欲促促則健蹄欲髙髙耐險峻齊民要術馬腕欲促而大其間纔容靽蹄欲得厚二三寸硬如石南都賦馬腕餘足神異經西南大宛有良馬蹄如汗腕可握日行千里至日中而汗血説文踣頓也逸雅踣頓踣而前也交河㡬蹴層冰裂漢書西域傳車師前國王治交河城元和郡縣志貞觀四年於漢車師前王地置交河縣取界内交河為名交河源出縣北天山分流城下一統志今為西畨火州地王洙注唐安西去交河七十里顧野王詩交河冰未堅許氏説文蹴攝也楚辭層冰峩峩東方朔神異經北方有層冰萬里厚百丈古兩頭纎纎詩腷腷膊膊春冰裂五花散作雲滿身名畫録開元内廏有飛黄照夜浮雲五花之乗丹元子步天歌五個吐花王良星注王良五星其四星曰天駟旁一星曰王良亦曰天馬王僧孺詩散漫輕烟轉霏微商雲散萬里方看汗流血天馬歌經萬里兮歸有徳又太乙貺天馬下霑赤汗沫流赭漢書武帝紀太初四年春貳師將軍李廣利獲汗血馬來作西極天馬之歌注應劭曰大宛舊有天馬種蹋石汗血汗従前肩膊小孔中出如血號一日千里東觀漢記聞武帝歌天馬霑赤汗今親見其然血従肩膊上小孔中出梁簡文帝繫馬詩青驪流赭汗緑地懸花蹄梁元帝詩汗赭疑霑勒衣香不逐風長安壯兒不敢騎漢書地理志京兆尹縣長安髙帝五年置三輔黄圖三輔共治長安城中又長安有九市八街九陌閭里一百六十西都賦漢之西都實在雍州名曰長安樂府折楊栁歌健兒須快馬快馬須健兒洛陽伽藍記快馬健兒不如老嫗吹箎史記樊噲傳壯士賜之巵酒淮南子畏馬之辟也不敢騎走過掣電傾城知梁簡文帝賦夜曠塵昬星流電掣曹毘馬射賦奔電無以追其蹤謝莊舞馬賦藴浮雲之鋭影戢追電之逸足顔延之天馬状遇山為風值雲成電庾信謝賚馬啟流電爭光浮雲連影孫楚詩傾城逺追送注傾猶盡也青絲絡頭為君老古樂府青絲纒馬尾黄金絡馬頭梁元帝紫騮馬詩長安美少年金絡飾連錢宛轉青絲鞚照耀珊瑚鞭楊師道詩苔流染絲絡何由却出横門道漢書西域傳百官送至横門外三輔黄圖長安城北西頭第一門曰横門其外有橋曰横橋水經注北出西頭第一門本名横門如淳曰音光故曰光門程大昌雍録自横門渡渭而西即是趨西域之路飲中八仙歌唐書李白傳帝欲官白妃輒沮止白自知不為親近所容益驁放不自修與賀知章李適之汝陽王璡崔宗之蘇晉張旭焦遂為酒中八仙人李陽冰草堂集序公浪迹縦酒與賀知章崔宗之等為八仙之遊知章騎馬似乗船舊唐書知章性放曠善談笑晚年尤縦誕無復規檢自號四明狂客又稱秘書外監遨遊里巷醉後屬辭動成巻軸晉書山簡傳兒童歌曰山公出何許往至髙陽池日夕倒載歸酩酊無所知時時能騎馬倒著白接䍦史記夏本紀禹水行乗船越絶書夫越水行而山處以船為車以楫為馬蔡夢弼集注浙人不喜騎馬而喜乗船杜葢嘲之眼花落井水底眠張華詩三雅朱何遲耳熱眼中花梁簡文帝箏賦耳熱眼花之娯千金萬年之夀呉均雜句夢中難言見終成亂眼花鮑令暉詩莫作瓶落井一去無消息抱朴子余従祖仙公毎大醉輒入深淵之底一日許乃出王氏神仙傳王元芝夜兄一道士因隨之行在西江水底月光中不見泥沙水隨自開庾信詩遙望芙蓉影只言水底然汝陽三斗始朝天唐書三宗諸子列傳讓皇帝憲子十九人其聞者璡璡眉宇秀整性謹潔善射帝愛之封汝陽王唐史拾遺汝陽王嘗於明皇前醉不能下殿上遣人掖出之璡謝罪曰臣以三斗壯膽不覺至此石崇金谷集序遂各賦詩以叙中懐不能者罰酒三斗道逢麴車口流涎説文麴酒母也魏文帝與呉質書蒲萄釀以為酒甘於麴蘖道之固以流㵪咽嗌按㵪同涎恨不移封向酒泉三秦記酒泉郡城下有金泉泉味如酒故名酒泉拾遺記羌人姚馥嗜酒羣􅒰呼為渴羌武帝擢為朝歌宰遷酒泉太守左相日興費萬錢唐書宗室宰相傳李適之恒山愍王孫也喜賔客飲酒至斗餘不亂天寳元年代牛仙客為左相嘗與李林甫爭權不協乃上宰政求散職以太子少保罷晉書何曽傳曽字穎考奢豪日食萬錢猶曰無下箸處飲如長鯨吸百川左思呉都賦長鯨吞航修鯢吐浪莊子秋水時至百川灌河木華海賦魚則横海之鯨突兀孤遊噏波則洪漣踧蹜吹澇則百川倒流銜盃樂聖稱避賢劉伶酒徳頌捧罌承槽銜盃潄醪本事詩李適之罷免意憤日飲醇酎且為詩曰避賢初罷相樂聖且銜盃為問門前客今朝㡬個來宗之瀟洒美少年舊唐書崔宗之日用之子襲封齊國公孔稚圭北山移文瀟洒出塵之想何遜樂府城東美少年重月輕萬億乂詩長安美少年羽騎暮連翩舉觴白眼望青天列子景公舉觴自罰晉書阮籍傳籍任情不羈能為青白眼見禮俗之士以白眼對之列子至人者上闚青天皎如玉樹臨風前世説魏明帝使后弟毛曽與夏侯泰初並坐時人謂蒹葭倚玉樹又謝太傅問諸子侄子弟亦何預人事而正欲使其佳車騎荅曰譬如芝蘭玉樹欲使其生於階庭耳庾肩吾詩風前細塵起唐太宗度洛水詩霞處流縈錦風前瀁巻羅蘇晉長齋繡佛前舊唐書蘇晉珦之子數嵗知為文舉進士歴官户吏二部侍郎終太子左庶子南史劉虬精信釋氏衣粗布禮佛長齋又徐孝克蔬食長齋持菩薩戒杜修可注蘇晉學浮屠術嘗得胡僧恵澄繡彌勒佛一本寳之曰是佛好飲米汁願事之他佛不愛也醉中往往愛逃禪孟子􅏉墨必歸於楊逃楊必歸於儒魏書釋老志沙門恵始坐禪於白渠廣韻禪靜也李白一斗詩百篇唐書李白傳明皇召見金鑾殿論當世事奏頌一篇帝賜食親為調羮有詔供奉翰林白猶與飲徒醉於市帝坐沈香亭子意有所感欲得白為樂章召入而白已醉左右以水頮面稍解授筆成文婉麗精切無留思史記淳于髠傳臣飲一斗亦醉一石亦醉晉書陸納傳出守呉興之姑熟辭桓温曰方守逺郡欲與公一醉以展下情温欣然納之及受禮惟酒一斗鹿肉一柈坐客愕然燉煌張氏傳扶風孟佗以蒲萄酒一斗遺張讓即拜凉州刺史孔安國尚書序典謨訓誥誓命之文凡百篇長安市上酒家眠三輔黄圖長安市有九六市在道西三市在道東凡四里為一市漢書欒布傳布窮困為酒家保王勣詩日逐劉伶去宵隨畢卓眠天子呼來不上船禮記君天下曰天子范傳正李白碑明皇泛白蓮池公不在宴召公作序時公已被酒翰苑中命髙將軍扶以登舟自稱臣是酒中仙李陽冰草堂集敘朝列賦謫仙人歌凡數百首張旭三杯草聖傳唐書張旭傳旭蘇州呉人嗜酒每大醉呼叫狂走乃下筆或以頭濡墨而書既醒自視以為伸不可復得也世呼張顛王愔文章志張伯英臨池學書池水盡黒家之衣帛必書而後練草書為世所寳韋仲將謂之草聖脱㡌露頂王公前古樂府少年見羅敷脱㡌著悄頭陸倕劒閣銘穿胷露頂之豪箕坐椎髻之長范曄西域傳論莫不露頂肘行東向而朝天子左傳可薦於鬼神可羞於王公史記莊周傳王公大人不能器之揮毫落紙如雲烟髙允徵士頌揮毫頌徳江總詩飛文綺縠采落紙波濤流潘岳楊荆州誄翰動若飛紙落如雲謝靈運詩遂登羣峯首邈若升雲烟髙彪詩抗志凌雲烟焦遂五斗方卓然唐史拾遺焦遂口吃對客不出一言醉後酬酢如注射時目為酒吃語林劉伶飲酒一石至醒復飲五斗其妻諫曰非養生之道宜㫁之伶曰善當祝鬼神自誓耳卿可致酒五斗吾當㫁之妻如其言伶祝曰天生劉伶以酒為名一飲一石五斗解酲婦人之言慎莫可聴於是乃飲酒御肉塊然復醉江淹詩思乗扶搖翰卓然陵風矯髙談雄辯驚四筵陸機詩髙談一何綺劉峻廣絶交論縦碧雞之雄辨謝瞻詩四筵霑芳醴驄馬行甫自注太常梁卿勅賜馬也李鄧公愛而有之命甫製詩説文驄馬青白雜色也後漢書桓典傳典拜侍御史執政無所迴避常乗驄馬京師畏憚為之語曰行行且止避驄馬御史鮑照結客少年場行驄馬金絡頭錦帶佩呉鈎隋書西域傳吐谷渾有青海常得波斯草馬放入海因生驄駒能日行千里故時稱青海驄鄧公馬癖人共知唐書宗室世糸表紀王慎後鄧國公汝州刺史行休晉書王濟傳濟善解馬性故杜預謂濟有馬癖初得花驄大宛種名畫記明皇好馬命韓榦悉圖其駿有玉花驄照夜白等漢書西域傳大宛國多善馬馬汗血其先天馬子也張正見詩將軍入大宛善馬出従戎薛曜舞馬篇星精龍種競騰驤夙昔傳聞思一見古樂府逺道不可思夙昔夢見之曹植白馬篇宿昔秉良弓公羊傳所見異詞所聞異詞所傳聞異詞後漢書馬援傳臣嘗師事子阿受相馬骨法考之行事輒有效驗臣愚以為傳聞不如親見視影不如察形漢書趙充國傳百聞不如一見牽來左右神皆竦禮記效馬效羊者右牽之庾信昭君辭冰河牽馬渡雪路抱鞍行後漢書匈奴傳昭君豐容靚飾光照漢宫顧影徘徊竦動左右潘岳射雉賦暾出苗以入場愈情駭而神竦雄姿逸態何崷崪傅休奕鷹賦雄姿邈世逸氣横生顔延之赭白馬賦弭雄姿以奉引張協七命天驥之駿逸態超越班固西都賦巖峻崷崪金石崢嶸顧影驕嘶自矜寵魏志何晏傳晏性自喜動靜粉白不去手行步顧影列子子列子學於壺丘子林壺丘子林曰子知持後則可以言持身矣曰願聞持後曰顧若影則知之詩四牡有驕梁簡文帝繫馬詩蹀足絆中憤搖頭櫪上嘶史記項羽紀賛自矜功伐左傳無怙富無恃寵隅目青熒夾鏡懸張衡西京賦猛􅐧髬髵隅目髙眶注隅目角眼視也班固西都賦琳珉青熒顔延之赭白馬賦雙瞳夾鏡兩􅀈協月傅休奕乗輿馬賦目若曜星符采横發髙顛懸日雙壁象月相馬經眼睛欲如懸鈴紫焰光肉騣碨礧連錢動唐書五行志開元二十九年滑州刺史李邕獻馬肉騣麟臆嘶不類馬何遜守風詩碨礧衝波白爾雅青驪驎曰驒注色有深淺班駁如魚鱗今連錢驄也北齊書陽休之傳有觸籓之羝羊乗連錢之驄馬曹毘馬射賦體與機㑹動若驚風謝朓郊祀曲鏘鏘玉鑾動朝來少試華軒下晉書王徽之傳西山朝來致有爽氣潛夫論馬不試則良駑疑杜摯詩騏驥馬不試婆娑槽櫪間王微詩思婦臨髙堂長想憑華軒未覺千金滿髙價韓非子馬似鹿而題之千金然而有百金之馬而無一金之鹿者馬為人用而鹿不為人用也漢書西域傳上遣使者持千金及金馬以請宛善馬庾信詩試策千金馬來登五丈原曹植磐石篇方舟尋髙價珍寳麗以通赤汗微生白雪毛漢書武帝紀太初四年春李廣利獲汗血馬來又禮樂志太乙況天馬下沾赤汗沫流赭詩有馬白顛疏顛額有白毛也孟子白馬之白也猶白雪之白銀鞍却覆香羅帕江淹别賦龍馬銀鞍朱軒繡軸周𢎞正詩銀鞍耀紫韁唐書地理志寧州彭原郡土貢五色覆鞍氊説文帛三幅曰帕支遁詩黄裳羅帕質卿家舊賜公能取北史袁聿修傳聿修為尚書郎未曽受升斗之遺邢邵戲呼為清郎大寧初聿修以太常少卿出使邵送白紬聿修不受邵報書云弟昔為清郎今日復作清卿矣後漢書賈復傳復馬羸光武解左驂以賜之穀梁傳取之中廏而置之外廏天廏真龍此其亞晉書天文志東壁北十星曰天廏主馬之官若今驛亭也周禮注凡馬八尺以上為龍南史曹景宗傳我在鄉里騎快馬如龍北史源師傳師攝祠部後屬孟夏以龍見請雩髙阿那肱謂為真龍出現大驚喜師云此是龍星初見禮當雩祭非謂真龍别有所降魏志䓒彧傅論荀彧賈詡庶乎算無遺策經達權變其良平之亞歟南史王藉傳藉甚工草書筆勢遒放孔琳之流亞也晝洗須騰涇渭深張説隴右監牧頌朝刷閬風夕洗天泉禮記季春之月乃合累牛騰馬遊牝於牧顔延之赭白馬賦料武藝品驍騰庾肩吾詩渥水出騰駒詩涇以渭濁湜湜其沚史記范睢傳北有甘泉谷口南帶涇渭一統志渭河出臨洮府渭源縣鳥鼠山西北谷東流經盩厔興平咸陽渭南至華隂界入黄河涇河發源平凉府界岍頭山經邠州醴泉涇陽至髙陵縣入渭朝趨可刷幽并夜漢書李尋傳馬不伏櫪不可以趨道顔延之赭白馬賦旦刷幽燕晝秣荆越左思魏都賦洗兵海島刷馬江洲漢書地理志周改禹徐梁二州合之於雍青分冀州之地以為幽并地理通釋冀州之域大於九州於是分為幽并梁元帝詩方逐幽并去西北共連翩吾聞良驥老始成呉質答東阿王牋猶絆良驥之足而責以千里之任孫楚鷹賦策良驥服羔裘魏武帝詩老驥伏櫪志在千里老子大器晚成此馬數年人更驚後漢書卓茂傳茂為丞相史常出道中有人認茂馬者茂問失馬㡬日對曰月餘矣茂曰然此馬畜已數年遂解馬與之曰即非所失幸至丞相府還我後馬主自得馬慚媿詣茂史記滑稽傳此鳥不蜚則已一蜚沖天不鳴則已一鳴驚人豈有四蹄疾於鳥莊子馬蹄可以踐霜雪曹植詩俯身散馬蹄埤雅隼鷂屬也一名雀鷹葢迅疾之鳥不與八駿俱先鳴穆天子傳天子之馬八駿赤驥盗驪白義踰輪山子渠黄驊騮騄駬左傳平隂之役先二子鳴尸子戰如鬬雞勝者先鳴時俗造次那得致曹植詩時俗薄朱顔誰為發皓齒後漢書呉漢傳漢謹厚少文造次不能以辭自達又董仲舒傳陛下居得致之位操可致之勢又有能致之資魏文帝與孫權書前使於禁郭及夫所遺纎驪馬本欲使禁自致之念將軍倘欲速得今故以付徐奉往雲霧晦㝠方降精列子虹蜺也雲霧也風雨也四時也此積氣之成乎天者也史記龜筴傳正畫無見風雨晦㝠雲葢其上五色清黄晉書天文志五星盈縮失位其精降於地為人典畧神馬河之精郭璞馬讃馬出明精祖自天駟白帖馬房星之精故房星為天駟春秋説題辭地精為馬十二月而生張説隴右羣牧使頌水瑞感而河龍出星精應而天駟下近聞下詔喧都邑班固東都賦乃申舊章下明詔唐書兵志開元九年詔天下之有馬者州縣皆先以郵逓軍旅之役定户復縁以升之禮記仲秋之月可以築城郭建都邑班固西都賦都都相望邑邑相屬肯使騏驎地上行戰國策世無騏驎騄駬王之駟已備矣爾雅翼麒麟善走故良馬亦名為騏驎後漢書馬援傳行天莫如龍行地莫如馬拾遺記穆王馭八龍之駿按轡徐行以匝天池之域渼陂行長安志渼陂在鄠縣西十道志陂魚甚美因名之千家註以水味美故配水以為名風俗通陂者繁也言因下鍾水以繁利萬物也岑參兄弟皆好竒唐詩紀事至徳中杜甫等薦參識度清逺議論雅正髙棅品彚註子美詩岑參多新詩又云髙岑殊緩步參與子美非薄交也繁欽與魏文帝牋兼愛好竒攜我逺來遊渼陂詩恵而好我攜手同行南齊書髙測傳尋山採藥逺來至此陸機詩友朋自逺來天地黤慘忽異色江淹郊外望秋詩汀臯日慘色舊注黤慘不明貌波濤萬頃堆琉璃呉越春秋因揚波成濤江總詩丹水波濤汎隋書徐則傳千尋萬頃莫測其涯廣雅琉璃珊瑚皆為珠梁簡文帝詩雲開瑪瑙葉水淨琉璃波琉璃汗漫汎舟入淮南子徙倚於汗漫之宇詩汎彼柏舟左傳秦輸粟於晉自雍及絳相繼命之曰汎舟之役集韻汎通作泛事殊興極憂思集王羲之蘭亭敘雖世殊事異所以興懐其致一也張協七命歡極樂殫迴節而旋王粲詩憂思壯難任鼉作鯨吞不復知説文鼉水蟲似蜥蜴而長大廣博物志鯨魚海魚也大者長千里呉都賦長鯨吞航惡風白浪何嗟及西京雜記昔人有遊束海者既而風惡何遜詩浪白風初起詩何嗟及矣主人錦帆相為開曹植詩主人寂無為隂鏗詩洞庭春溜滿平湖錦帆張舟子喜甚無氛埃詩招招舟子楚詞氛埃辟而清凉注氛昬濁之氣鳬鷖散亂櫂謳發詩鳬鷖在涇注毛萇曰鳬水鳥也鷖鳬屬陸璣毛詩草木蟲魚疏鳬大小如鴨青色卑脚短喙鳥之謹愿者也蒼頡解詁鷖鷗也列子始驚駭散亂矣方言楫謂之櫂説文謳齊謳也呉都賦櫂謳唱簫籟鳴絲管啁啾空翠來前漢志絲曰絃竹曰管鮑照詩絲管感暮情禮記小者至於燕雀猶有啁噍之頃焉注噍與啾同陳後主詩歇霧含空翠沈竿續蔓深莫測列子投綸沈鈎謝朓詩乗此終蕭散垂竿深澗底王粲海賦其深不測舊注沈竿續蔓戲測水之淺深也菱葉荷花淨如拭古樂府採蓮曲汎舟採菱葉詩隰有荷華毛詩草木蟲魚疏荷芙蕖江東呼為荷雜記雍人拭羊註拭淨也宛在中流渤澥清詩宛在水中央漢武帝曲横中流兮揚素波丘遲詩櫂歌發中流子虛賦浮渤澥註渤澥海之别支也下歸無極終南黒荀子渤海東有大壑其下無底曰歸墟謝朓詩漢廣流無極詩終南何有書終南惇物至於鳥鼠一統志終南山在西安府城南五十里一名南山半陂以南純浸山雍録渼陂源出終南山動影裊窕沖融間江總詩動搖山水影謝靈運山居賦濬潭澗而窈窕除菰洲之紆餘木華海賦沖融滉瀁船舷暝戛雲際寺郭璞江賦詠採菱以扣舷廣韻舷船邊也長安志雲際山大定寺在鄠縣東南十六里隋仁夀元年置居賢捧日寺正韻戛轢也謝靈運詩暝還巖際宿舊註謂船舷經過之聲水面月出藍田闗詩月出皎兮唐書地理志京兆府有藍田闗一統志藍田闗在西安府藍田縣東南九十八里本秦嶢闗雍録嶢闗在渼陂東南此時驪龍亦吐珠莊子夫千金之珠必在九重之淵驪龍頷下能得珠者必遭其睡七啟綴以驪龍之珠尚書考靈曜蔵龍吐珠馮夷擊鼓羣龍趍江賦冰夷倚浪以傲睨註冰夷水仙人也郭璞云冰夷馮夷也莊子馮夷得之以返大川淮南子馮夷服八石而得水仙洛神賦馮夷擊鼓女媧清歌十洲記方丈在大海中央上専是羣龍所聚西京賦萬騎龍趍湘妃漢女出歌舞史記秦始皇紀上問博士曰湘君何神博士對曰聞之堯女舜之妻列女傳二妃在湘江之間俗謂之湘君列仙傳鄭交甫遊漢江見二女解珮與之洛神賦従南湘之二妃攜漢濵之遊女後漢劉盆子傳共擊鼓歌舞金支翠旗光有無漢書禮樂志房中歌金支翠華庶旄翠旗注樂上衆飾有流翅羽葆以黄為支其首敷散若草木之秀華也夏侯湛褉賦擢翠旗揚繁纓子虛賦覽於有無咫尺但愁雷雨至左傳天威不違顔咫尺易天地解而雷雨作蒼茫不曉神靈意沈約詩出漲海之蒼茫九歌東風飄兮神靈雨少壯㡬時奈老何向來哀樂何其多漢武帝秋風辭歡樂極兮哀情多少壯㡬時奈老何世説謝太傅語王右軍曰中年傷於哀樂與親友别輒作數日惡奉先劉少府新畫山水障歌長安志蒲城縣開元四年建睿宗橋陵改為奉先縣一統志蒲城縣在華州城北一百二十里唐改奉先縣堂上不合生楓樹禮記堂上接武白虎通歌者在堂上舞者在堂下山海經黄帝殺蚩尤棄其械化為楓樹阮籍詩湛湛長江水上有楓樹林恠底江山起烟霧匡謬正俗俗謂何物為底郭璞江賦蘆人漁子擯落江山謝靈運詩江山共開曠庾肩吾詩望望江山阻北史蕭大圜傳近瞻烟霧逺眺風雲庾肩吾詩離宫起烟霧聞君更掃赤縣圖白帖王子猷過戴安道飲安道求子猷書子猷攘臂大言曰我雖辭翰不及古人與君一掃素壁史記騶衍傳中國名赤縣神州江淹詩赤縣多仙靈長安志奉先縣隸京兆府開元十七年昇為赤縣乗興遣畫滄洲趣世説乗興而來興盡而返南史張充傳飛竿釣渚濯足滄洲袁粲詩訪跡雖中宇循寄乃滄洲謝朓詩既懽懐禄情復協滄洲趣畫師亦無數南史梁武帝紀百濟國求毉工畫師詔許之唐書閻立本傳太宗泛舟春苑池見異鳥容與波上召立本侔状閣外傳呼畫師閻立本立本羞悵流汗薛道衡昭君辭不䝉女史進更失畫師情詩萬億及秭疏言其多無數也好手不可遇抱朴子刻削者比肩而班狄擅絶手之稱梁簡文帝書張士簡之賦周升逸之辨亦誠佳手難可復遇對此融心神魏書釋老志其為教也蠲去邪思澡雪心神左思詩前有寒泉井聊可瑩心神知君重毫素陸機文賦紛葳蕤以馺遝唯毫素之所擬注毫筆也縑曰素顔延之詩深心託毫素豈但祁岳與鄭䖍畫録空有其名不見踪跡二十五人祁岳在李國恒之下唐書鄭䖍傳善圖山水好書嘗自寫其詩并畫以獻帝大署其尾曰鄭䖍三絶筆迹逺過楊契丹陸機謝表事蹤筆跡皆可推校南史王僧䖍傳辭製既雅筆迹又麗名畫記隋楊契丹官至上儀同六法備該殊豐骨氣山東體製允屬斯人得非𤣥圃裂穆天子傳乃銘迹於𤣥圃之上以詔後世離騷朝發軔於蒼梧夕余至於𤣥圃水經注崑崙之山三級二曰𤣥圃一名閬風嵇康遊仙詩飄飄戲𤣥圃黄老相過従國史補烟玉笛其聲清壯山石可裂無乃瀟湘翻圖經湘水自海陽發源至零陵北而營水㑹之二水合流謂之瀟湘瀟湘水清深之名也悄然坐我天姥下謝靈運詩暝投剡中宿明登天姥岑元和郡縣志天姥山石壁上有刋字科斗形髙不可識春月樵者聞簫鼔笳吹之聲聒耳元嘉中遣名畫寫狀於團扇即此山也寰宇記天姥山在剡縣東南八十里名山志曰山上有楓千餘丈蕭蕭然呉録云登者聞天姥歌謠之響一統志天姥峯在天台縣西北與天台山相對耳邊已似聞清猿宜都山川記峽中鳴猿至清諸山谷傳響泠泠不絶鮑照詩叫嘯夜猿清反思前夜風雨急乃是蒲城鬼神入詩風雨如晦雞鳴不已劉峻廣絶交論風雨急而不輟其音沈佺期巫山髙暗谷疑風雨隂崖若鬼神陸倕新漏刻銘倐往忽來鬼出神入元氣淋漓障猶濕漢書律歴志太極中央元氣故為黄鍾白虎通地者元氣所生萬物之祖廣韻淋漓秋雨集韻或作漓江淹麗色賦氣已濕兮曉未半真宰上訴天應泣老子有真宰足以制萬物王筠詩還迷依善道反心由真宰陸機表鉗口泣結舌不敢上訴所天唐書五行志無雲而雨是謂天野亭春還雜花逺晉書陶潛傳當往廬山刺史王𢎞齎酒於半道邀之潛既遇酒便引酌野亭欣然忘進夏侯湛春可樂賦掇雜花以為羞集葳㽔以飾裳丘遲與陳伯之書暮春三月江南草長雜花生樹羣鶯亂飛漁翁暝踏孤舟立傅休奕詩渭濵漁釣翁陶潛詩渺渺孤舟逝緜緜歸思紆馬周詩春水送孤舟滄浪水深青溟闊書嶓冢導漾東流為漢又東為滄浪之水陸機詩發藻玉臺下垂影滄浪泉阮籍東臯賦測虛舟以遑思兮聊逍遙乎青溟庾闡衡山詩未體江湖悠安識南溟闊敧崖側島秋毫末後漢書丁鴻傳壊崖破巖之水源自涓涓水經注夾岸崇深傾崖返捍揚雄解嘲江湖之涯渤澥之島趙冬曦詩孤島輕霧裏淮南子秋毫之末淪於不測莊子號物之數為萬而人處一焉不似毫未之在馬體乎不見湘妃鼓瑟時曹植洛神賦従南湘之二妃兮挾漢濵之遊女湘中記舜二妃為湘水神故曰湘妃詩並坐鼓瑟爾雅徒鼓瑟謂之步屈原逺遊使湘靈鼓瑟兮令海若舞馮夷至今斑竹臨江活博物志堯之二女舜之二妃以涕揮竹竹盡斑唐書地理志嶺南雷州土貢斑竹張載詩臨江釣春魚劉侯天機精莊子其嗜慾深者其天機淺傅休奕詩聰鑒盡下情明明綜天機愛畫入骨髓世説戴安道就范宣學視范所為范讀書亦讀書范抄書亦抄書惟獨好畫范以為無用不宜勞心於此戴乃畫南都賦圖范看畢咨嗟甚以為有益始重畫續晉陽秋桓靈寳好蓄法書名畫史記鄒陽傳徳淪於骨髓文中子神聴者學在骨髓今有兩兒郎徐陵烏栖曲風流荀令好兒郎偏能傅粉復含香揮灑亦莫比張衡歸田賦揮翰墨以奮藻廣博物志浮提國獻神通善書人出肘間墨汁灑地及石皆成篆隸科斗之字大兒聰明到後漢書禰衡惟善孔融楊脩常稱曰大兒孔文舉小兒楊徳祖蜀志諸葛瞻傳亮與兄瑾書曰瞻今已八嵗聰慧可愛莊子目徹為明耳徹為聰大戴禮髙辛生而神靈聰以知逺明以察微能添老樹巔崖裏雲笈七籖一切衆生意雖求生不持戒行假使長夀猶如老樹有何殊别張説詩零落荅故人將隨江樹老李顒雷賦起偉霆於霄際摧勁木於巖巔爾雅厓内為隩外為隈抱朴子非泣血之民不能識夜光於重崖之裏小兒心孔開孔融别傳四嵗與兄食梨輒引小者人問其故曰小兒法當取小者漢書王温舒傳居廷尉惽惽不辨為中尉則心開貌得山僧及童子名畫記韓幹善寫貌人物尤善鞍馬庾信詩野老時相訪山僧或見尋詩童子佩觿庾信詩青衣上少室童子向蓬萊若耶谿雲門寺越絶書若耶之溪涸而出銅水經注若耶溪水上承嶕峴麻溪溪之下孤潭周數畝麻潭下注若耶溪水至清照衆山倒影窺之如畫一統志若耶溪在㑹稽府城南二十五里與鏡湖合水經注山隂縣南有玉笥竹林雲門天柱精舍並疏山創基架林裁宇割潤延流盡泉石之好南史何子季以㑹稽多靈異往遊焉居若耶山雲門寺一統志雲門寺在雲門山晉王獻之居此堂有五色祥雲詔建雲門寺我獨何為在泥滓謝靈運燕歌行余獨何為志無成北史魏長賢傳士之立身其路不一皆奮身於泥滓自致青雲青鞋布襪従此始列仙傳胡母班為太山府君齎書河伯河伯貽青絲履甚精巧晉令士卒百工履色無過緑青白奴婢履色無過純青説文襪足衣也東觀漢記和帝召諸儒魯平與賈逵黄香等相難平善對事罷朝特頒賜履襪髙適賦得還山吟送沈四山人還山吟管子夫鳥之飛也必還山集谷不還山則困晉書阮籍傳阮裕字思曠徵侍中不就還剡山有肥遁之志鮑照詩還山路已逺天髙日暮寒山深楚辭泬寥兮天髙而氣清陶潛詩清氣澄餘滓杳然天界髙左傳日云暮矣南史栁元景傳少時貧苦嘗下都至大雷日暮寒甚頗有羈旅之苦沈約詩佇立日已暮戚戚苦人腸江淹詩日暮山河清謝靈運詩桂樹凌寒山庾信詩寒山無物香又澗險無平石山深足細泉送君還山識君心晉書郭荷傳張祚遺以安車蒲輪送還張掖東山江淹賦送君南浦人生老大須恣意史記魏豹傳人生一世間如白駒過隙耳樂府少壯不努力老大徒傷悲揚雄解嘲矯翼勵翮恣意所存仲長統詩六合之内恣心所欲人事可遺何為局促看君解作一生事晉書畢卓傳右手持酒杯左手持蟹螯拍浮酒船中便足了一生矣陶潛詩所以貴我身豈不在一生南史張緒傳一生不解作諾又趙倫之傳於人間世事多所不解山間偃仰無不至楚辭采三秀兮山間王羲之詩時來誰不懐寄散山林間詩或棲遲偃仰道徳指歸論傾側偃仰務合當世後漢書仲長統傳優遊偃仰可以自娯石泉淙淙若風雨楚辭飲石泉兮䕃松柏宋玉風賦泉涌湍於石間孫綽遊天台山賦石泉湧溜於隂渠説文淙淙水聲易潤之以風雨宋玉髙唐賦序湫兮如風淒兮如雨沈佺期詩暗谷疑風雨幽崖若鬼神桂花松子常滿地楚辭桂樹列兮紛敷吐紫華兮布葉嵇康詩微風動桂花梁昭明太子啟桂吐花於小山之上劉向列仙傳偓佺好食松實能飛行速如走馬以松子遺堯堯不能服初學記老松子色黄白味似粟可食嵩髙山記嵩嶽有大松採食其實得長生梁元帝與劉智蔵書松子為餐蒲根是服何遜七召春花滿野地無行者賣藥嚢中應有錢後漢書韓康傳常採藥名山賣於長安市口不二價又張霸傳霸中子楷家貧賣藥給食江淹詩韓公淪賣藥梅生隠市門神仙傳壺公入市賣藥口不二價其錢日收數萬便施與貧乏惟留三五十後漢書趙壺傳文籍雖滿腹不如一嚢錢還山服藥又長年論衡凡人禀性身本自輕氣本自長中於風濕百病傷之故身重氣劣服食良藥身氣復故非本氣少身重得藥而乃氣長身更輕也魏志王粲傳注嵇康性好服食常採御上藥嵇康詩採藥鍾山隅服食改姿容黄帝中經養性者五常俱全百行周備雖絶藥餌足以遐年樂府主人服此藥身體日康疆魏武帝樂府思得神藥萬嵗為期沈約詩若䝉西山藥頽齡尚能度郭璞詩採藥遊名山將以救年頽抱朴子師言欲求長生當勤服大藥管子導血氣以求長年雲笈七籖赤蔣子輿不食百穀㗖百花而長年白雲勸盡杯中物陶𢎞景詩山中何所有嶺上多白雲蕭子良與劉虬書素志與白雲同悠南史劉穆之傳今能見勸一杯酒不世説張翰曰使我有身後名何如一杯酒陶潛詩且進杯中物明月相隨何處眠謝莊月賦隔千里兮共明月朱超詩惟餘故樓月逺近必隨人徐陵文門前擾擾我且安眠樂府郎眠何處床眠時憶問醒時事沈約六憶詩憶眠時人眠彊未眠又夜聞長歎息知君心有憶夢䰟可以相周旋韓非子六國時張敏與髙恵為友毎相思不能得見敏於夢中往尋但至半途即迷不知路沈約詩夢中不識路何以慰相思莊子其夢也䰟交其覺也形開何遜夜夢故人詩客心驚夜䰟言與故人同南史張充傳通夢交䰟推襟送抱江淹别賦知離夢之躑躅憶别䰟之飛揚左傳左執鞭弭右屬櫜鞬以與君周旋世説我與我周旋久寧作我寄宿田家楊惲報孫㑹宗書田家作苦嵗時伏臘烹羊炮羔斗酒自勞應璩詩田家無所有酌醴焚枯魚何遜詩無為淹戚里見就還田家田家老翁住東陂魏文帝與呉質書行年已長大已成老翁張説詩誰念三千里江潭一老翁張衡南都賦於其陂澤則有鉗盧玉池赭陽東陂漢宫殿簿長安有東陂池西陂池説道平生隠在兹後漢書馬援傳援見公孫述以為當握手歡如平生嵇康絶交書時與親舊叙闊陳説平生莊子古之所謂隠士者非伏其身而不見也張華詩隠士託山林王康琚詩小隠隠陵藪大隠隠朝市阮瑀為曹公與孫權書良時在兹勗之而已王儉竟陵王山居賛濠梁在兹何事遐想蘇頲詩眷戀殊在兹鬢白未曽記日月後漢書岑彭傳每一發兵頭鬢為白晉書王獻之傳魏時凌雲殿榜未題而匠者誤釘之不可下乃使韋仲將懸橙書之比訖鬚髩盡白世説顧愷之與簡文同年而􅄠早白帝問其故荅曰松柏之姿經霜愈茂蒲柳之質望秋先零詩日居月諸左傳絳縣人曰臣小人也不知紀年臣生之嵗正月甲子朔四百有四十五甲子矣山青每到識春時何遜詩天暮逺山青潮去遙沙出陳子昂詩惟見逺山青盧照隣喬君集序桂白山青宜王孫之攀折漢文帝詔方春時和草木萌生之物皆有以自樂陳子昂詩碧華暎朱實攀折及春時門前種柳深成巷古西洲曲樹下即門前晉書陶潛傳潛少懐髙尚穎脱不羈嘗著五柳先生傳曰先生不知何許人不詳姓氏宅邊有五柳因以為號焉陶潛詩狗吠深巷中野谷流泉添入池説文泉出通川為谷詩相其隂陽觀其流泉班固西都賦原泉灌注陂池交屬魏收詩瀉溜髙齋嚮添池曲岸平牛壯日耕十畝地山海經稷之孫叔均始作牛耕詩十畝之間兮桑者閒閒兮人間常掃一茅茨陶潛傳刺史王𢎞造潛稱疾不見既而語人云我性不狎世因疾守閒豈敢以王公紆軫為榮耶謝靈運與廬陵王牋阮萬齡辭事就閒纂成先業南史馬樞傳鄱陽王為南徐州刺史欽其髙尚令使邀之築别室以處樞惡其崇麗乃於竹林間自營茅茨而居又何敬容傳築茅茨於鍾阜聊優游以卒嵗客來滿酌清尊酒易有不速之客三人來敬之終吉後漢書孔融傳舉北海相拜大中大夫性喜誘益後進賔客日盈其門嘗嘆曰坐上客常滿尊中酒不空吾無憂矣劉苞詩清尊久不荐淹留遂待君唐太宗詩清尊浮緑蟻雅曲韵朱弦王勃詩清尊湛不空蹔喜平生接感興頻吟才子詩蔡邕琴賦曲引興兮繁弦撫文心雕龍摛風裁興藻詞譎喻楚辭立江介而長吟兮王僧達詩翰墨久謠吟晉書袁宏傳宏有逸才曽為咏史詩是其風情所寄謝尚鎮牛渚秋夜乗月微服泛江㑹宏在舫中諷詠聲既清新辭又藻拔遂駐聴久之遣問馬答云是袁臨汝郎誦詩即其詠史之作也巖際穴中蔵鼹鼠何遜詩薄雲巖際宿孤月波中上史記趙奢傳秦伐韓軍於閼與趙奢曰道逺險狹猶兩鼠鬬於穴中將勇者勝莊子鼹鼠飲河不過滿腹鄧徳明南康記鼹鼠一名隠䑕形如鼠而無尾黒色長鼻潭邊竹裏隠鸕鷀謝朓詩塘邊草雜紅何遜詩竹裏見螢飛爾雅鷀鷧注即鸕鷀也觜頭曲如鈎食魚村墟日落行人少庾信詩寒園星散居搖落小村墟鮑照詩日落嶺雲歸謝恵連詩落日隠櫩檻謝朓詩徘徊東陌上月出行人稀醉後無心怯路岐陶潛歸去來辭雲無心而出岫淮南子楊朱見岐路而泣之謂其可以南可以北也曹攄詩臨樂何所嘆素絲與路岐今夜只應還寄宿呉均詩今夜杯酒别明朝江水邊戰國策蘇子謂李兊曰今日臣之來也暮後郭門籍席無所得寄宿人田中明朝拂曙與君辭庾信詩明朝雲雨散何處更相尋又蓮帳寒檠窻拂曙岑參漁父莊子孔子絃歌鼔琴奏未半有漁父者下船而來楚辭漁父屈原既放遊於江潭行吟澤畔顔色憔悴形容枯槁漁父見而問之史記范睢傳吕尚之遇文王也身為漁父而釣於渭濵耳扁舟滄浪叟史記貨殖傳范蠡乗扁舟浮於江湖庾信賦吹落葉之扁舟飄長風於上流書嶓冢導漾東流為漢又東為滄浪之水甯戚飯牛歌滄浪之水白石粲陸機塘上行發藻玉臺下垂影滄浪泉心與滄浪清孟子滄浪之水清兮可以濯我纓劉勰新論神恬心清則形無累矣不自道鄉里論語夫子自道也周禮地官黨正一命齒於鄉里後漢書馬援傳使鄉里稱善人足矣晉書華譚傳同郡劉項見之嘆曰不悟鄉里乃有如此才也無人知姓名呉越春秋子胥解百金之劒以贈漁父不受問其姓名不答南史漁父者不知姓名亦不知何許人朝従灘上飯左傳余姑剪滅此而後朝食史記韓信傳信従下鄉南昌亭長食亭長妻苦之乃晨炊蓐食食時信往不具食暮向蘆中宿呉越春秋伍員奔呉至江漁父渡之有飢色曰為子取餉子胥乃潛身深葦之中有頃父來歌而呼之曰蘆中人蘆中人豈非窮士乎郭璞江賦蘆人漁子擯落江山宋玉對楚王問暮宿於孟諸水經注朝發南鄭暮宿黒水劉琨詩朝發廣暮門暮宿丹水山歌竟還復歌陶潛詩歌竟長嘆息持此感人多隂鏗觀釣詩歌聲時㫁續手持一竿竹晉書畢卓傳右手持酒杯左手持蟹螯詩籊籊竹竿以釣于淇魏文帝詩釣竿何珊珊漁父荅孫緬歌竹竿籊籊河水浟浟竿頭釣絲長尺餘顔之推詩螳螂翳下偏難見翡翠竿頭絶易驚詩其釣維何維絲伊緡甯戚飯牛歌中有鯉魚長尺半沈約細言詩開館尺捶餘築榭微塵裏李嶠詩懸泉百尺餘鼓枻乗流無定居楚辭漁父莞爾而笑鼓枻而去注叩船舷也劉峻詩鼓枻浮大川賈誼鵩鳥賦乗流則逝兮得坻則止枚乗七發舊乗流而下降兮或不知其所止何遜詩單艫時向浦獨檝下乗流詩豈敢定居一月三捷魏書賀訥傳分土定居不聴遷徙世人那得識深意陸機賦世閱人而成世晉書王悦傳導嘗與悦奕棊爭道導笑曰相與有𤓰葛那得爾謝靈運山居賦廢張左之艷辭尋臺皓之深意此翁取適非取魚漢書髙鳳傳潛心篤行屢辟不應以漁釣自適爾雅注取魚搖動之視其鮮餒魏志帝東征呉留譙宫時表留宿衞欲遏水取魚南史王𢎞之性好釣魚嘗垂綸於上虞江或問得魚賣否𢎞之曰釣亦不得得亦不賣又孫緬為尋陽太守見一漁父垂綸長嘯緬問有魚賣乎漁父笑曰其釣非釣寧賣魚者耶西亭子送李司馬唐書百官志上州刺史一人従三品司馬一人従五品下髙髙亭子郡城西詩無曰髙髙在上陟降厥士日監在兹曹植詩髙髙上無極天路安可窮直上千尺與雲齊孔稚珪北山移文度白雪以方潔干青雲而直上洛陽伽藍記宗正寺有刹髙十丈合去地一千尺古詩西北有髙樓上與浮雲齊謝朓詩兹山亘百里合沓與雲齊梁元帝春别詩日暮徙倚渭橋西正見流月與雲齊磐崖縁壁試攀躋磐崖按品彚作盤崖説文崖山邊也縁循也遊名山志石簣山縁崖而上髙百許丈摯虞思道賦攀招搖而上躋兮忽蹈廊而凌虛羣山向下飛鳥低木華海賦羣山既畧百川潛渫鮑照舞鶴賦冰塞長河雪滿羣山易飛鳥遺之音不宜上宜下陶潛詩山氣日夕佳飛鳥相與還使君五馬天半嘶後漢書冦恂傳更始立使使者徇郡國恂曰使君建節銜命以臨四方古樂府使君従南來五馬立踟蹰詩素絲紕之良馬五之潘子真詩話天子六馬左右驂三公九卿駟馬左驂漢制九卿二千石亦右驂太守駟馬而已其有加秩中二千石乃右驂故以五馬為太守美稱遯齋閒覽云漢時朝臣出使為太守増一馬故曰五馬新序魏王將起中天臺許綰曰臣聞天與地相去萬五千里今王因而半之當起七千五百里之臺南史劉訏傳族祖孝標與書稱之曰超超越俗如天半朱霞王僧孺詩髙枝起天半説文嘶馬鳴也呉均詩日昬笳亂動天曙馬爭嘶絲繩玉壺為君提辛延年詩就我求清酒絲繩提玉壺沈君攸詩絲繩玉壺傳綺席劉伶酒徳頌動則撡巵執觚行則挈榼提壺陶潛遊斜川詩提壺接賔侣引滿更勸酬坐來一望無端倪陳後主詩春江聊一望莊子反覆終始不知端倪謝靈運詩溟漲無端倪注端倪猶言涯際也紅花緑柳鶯亂啼司馬相如上林賦揚翠葉扤紫莖發紅華垂朱榮案古花字皆作華古桃葉歌桃葉暎紅花江淹石榴頌縹葉翠萼紅花絳采謝靈運詩原隰荑緑柳虛囿散紅桃梁簡文帝詩鶯啼春欲駛無為空掩扉千家萬井連回溪説苑晏子方食君之使者至分食而食之使者反言之景公曰夫子之家若是其貧也令吏致千家之縣於晏子周禮方百里為一同積萬井其中漢書刑法志一同百里提封萬井枚乗七發依絶樞兮臨回溪謝靈運石門詩疏峯抗髙館對嶺臨回溪酒行未醉聞暮雞漢書髙五王傳朱虛侯章入侍燕飲髙后令為酒吏章自請曰臣將種也請以軍法行酒世説陳太丘詣荀朗陵荀使慈明行酒詩其未醉止威儀反反庾信春賦百丈山頭日欲斜三晡未醉莫還家詩曷至哉雞棲於塒日之夕矣牛羊下來列仙傳祝雞翁養雞千餘頭皆有名字暮宿樹上晝放散之㸃筆撡紙為君題江淹擬謝恵連詩㸃翰詠新賞開􅐆瑩所疑南史梁元帝紀雖戎畧殷凑機務繁多軍書羽檄文章詔誥㸃毫便就殆不虛手潘岳秋興賦序染翰撡紙慨然而賦為君題惜解攜陸機詩撫膺解攜手永歎結遺音草萋萋詩維葉萋萋劉安招隠士春草生兮萋萋注垂條吐葉紛榮華也沒馬蹄莊子馬蹄可以踐霜雪毛可以禦風寒曹植詩俯身散馬蹄呉均詩青莎沒馬蹄范公叢竹歌并序職方郎中六典隋開皇置職方侍郎大業去侍字唐加中字唐書職方郎中掌地圖城隍鎮戍烽堠坊人道路之逺近及四夷歸化之事兼侍御史六典周御史亦謂之柱下史秦改為侍御史漢因秦制置十五員又監察御史掌分察百寮巡按郡縣糾視刑獄通典唐侍御史四人號臺端他人稱曰端公范公乃於陜西使院内種竹説文竹冬生草也戴凱之竹譜植物之中有名曰竹又竹是一族之總名史記貨殖傳渭川千畝竹其人與千户侯等岳陽風土記五月十三日謂之龍生日可種竹即齊民要術所謂竹醉日也新製叢竹詩以見示美范公之清致雅操南史栁世隆傳長子悦字文殊少有清致圖繪寳鑑劉彦齊畫竹頗臻清致晉書山濤傳文帝與濤書曰足下在事清明雅操邁時又忠義傳論厲松筠之雅操遂為歌以和之世人見竹不解愛顔延之詩請従上世人歸來藝桑竹後漢書蔡邕傳註嘗經㑹稽髙遷亭見屋椽竹東間第十六可以為笛取用果有異聲晉書孫綽傳嘗曰山濤吾所不解詩心乎愛矣遐不謂矣宋之問緑竹引老在空山人詎識知君種竹府庭内杜審言贈蘇綰詩知君書記本翩翩三輔决録蔣詡舍種竹下開三徑晉書王徽之傳嘗寄居守空宅中便令種竹或問其故但嘯咏陸倕授潯陽太章不能使府庭生梓又參甘露詩甘露降府庭上天表無私此君托根幸得地王徽之傳指竹曰何可一日無此君耶山海經竹六十年一易根陶潛詩托根已得所漢書地理志秦地有鄠杜竹林王羲之蘭亭集序此地有崇山峻嶺茂林修竹種來㡬時聞已大齊民要術竹性愛向西南引故園東北角種之數嵗之後自當滿園子夜歌相憐能㡬時無名氏竹賦十圍寧申其大杜甫詩飽聞榿木三年大盛暑翛翛叢色寒王襃聖主得賢臣頌服絺綌之淨者不苦盛暑之鬱燠詩予尾翛翛註翛翛茂鬱貌謝朓詩颯颯滿池荷翛翛䕃窻竹張正見階前嫩竹詩翠竹梢雲自結叢緑竹引修竹嬋娟同一色杜甫詩我有江隂竹能令朱夏寒閒宵摵摵葉聲乾韋承慶詩禁宇庭除闊閒宵鐘箭移張九齡詩清秋發髙興凉月復閒宵潘岳秋興賦庭樹摵以灑落勁風戾而吹帷説文摵摵搖曳有聲也拾遺記蓬山有浮筠之幹風吹竹折其聲如鐘磬之音蔡琰胡笳十八拍塞上黄蒿兮枝枯葉乾又參詩甌香茶色嫩窻冷竹聲乾能清案牘簾下見老子孰能濁以止靜之徐清謝靈運詩宻竹含餘清北史陽昭傳學涉史傳尤嫻案牘謝朓詩案牘時閒暇偶坐觀卉木晉書顧愷之為山隂令晝日垂簾門階閒寂務簡而政理何遜七召隔珠簾而可見宜對琴書窻外看杜甫詩翠屏宜晚對江總詩户對忘憂草劉歆遂初賦翫琴書之條暢陶潛詩委懐在琴書謝朓思歸賦園桃春發窻竹夏凉秋竹曲㛹娟綺窓北隂鏗賦得夾池竹詩欲見葳㽔色當來兔苑看為君成隂將蔽日李頎雙筍歌為君當面拂雲日呉均詩多看笋成竹西京賦吐葩颺榮布葉垂隂孫楚登樓賦羨緑竹之茂隂慈竹賦影不透日後漢書丁鴻傳干雲蔽日之木起於蔥青魏明帝詩丹霞蔽日彩虹帶天迸笋穿堦踏還出爾雅笋竹萌慈竹賦叢篁劈開牙笋怒長李頎籬笋詩東園長新笋暎日復穿籬迸出依青嶂攅生伴緑池梁簡文帝詩横階入細笋蔽地濕輕苔又參詩踏地葉聲乾庾信文寒林笋出註孟宗冬入竹林而笋為之出為孝感也南史謝靈運傳星星行復出守節偏凌御史霜左傳季札曰聖達節次守節漢書王章傳賛剛直守節不量重輕呉都賦竹則包笋抽節往往縈結劉巖夫植竹記勁可以凌霜雪通典御史為風霜之使崔篆御史箴簡上霜凝虛心願比郎官筆老子聖人虛其心實其腹植竹記虛心而直無所隠蔽古詩輕筠抱虛心蜀志諸葛亮傳毎自比於管仲樂毅後漢書明帝紀郎官上應列宿漢官儀尚書令僕丞郎月給大管赤筆君莫愛南山松樹枝江淹别賦割慈忍愛詩節彼南山惟石巖巖扶風歌南山石嵬嵬松栢何崔崔上枝拂青雲中心十數圍西京雜記東都隆興觀有古松樹枝偃倒垂南史張譏為國子博士後主幸鍾山開善寺召従臣坐於寺西南松林下勅譏豎議索麈尾未至勅取松枝手以屬譏曰可代麈尾竹色四時也不移李白詩竹色溪下緑杜甫詩竹光團野色禮記其在人也如竹箭之有筠也如松栢之有心也二者居天下之大端矣故貫四時而不改柯易葉陶𢎞景荅謝中書書兩岸石壁五色交輝青林翠竹四時不移賀循竹詩逢秋葉不落經寒色詎移寒天草木黄落盡劉眘虛詩霽雲明孤嶺秋水澄寒天易百穀草木麗乎土禮記季秋之月草木黄落漢武帝秋風辭草木黄落兮雁南歸李白詩楊花落盡子規啼猶自青青君始知莊子有自也而可有自也而不可註天下之可不可皆本於我之自為也詩瞻彼淇隩緑竹青青陳子昂修竹篇嵗寒霜雪苦含彩獨青青虞世南賦竹應制詩欲識凌冬性惟有嵗寒知陶潛詩自古歎行役我今始知之送魏升卿擢第歸東都因懐魏校書陸渾喬潭李肇國史補得第謂之進士漢書公孫𢎞傳天子擢對為第一一統志河南府唐曰東都又陸渾山在嵩縣一名方山唐書百官志校書郎四人従九品上掌校典禮典籍又校書四人井上梧桐雨梁元帝詩樓前飄宻柳井上落疎桐詩梧桐生矣于彼髙岡魏明帝詩雙桐生枯井枝葉自相加梁簡文帝荅張纉書秋雨且晴檐梧初下灞亭卷秋風史記李廣傳嘗夜従一騎出従人田閒飲還至霸陵亭霸陵尉醉呵止廣按霸漢書作灞名勝志灞上有亭亭有尉主之西京送别者多至此折栁送别曹植詩秋風發微凉故人適戰勝史記范睢謂須賈曰戀戀有故人之意任昉詩猶我故人情禮記勇敢强有力者天下無事則用之於禮義天下有事則用之於戰勝謝靈運詩戰勝臞者肥匹馬歸山東南史吾侯景傳匹馬孤行自執羈紲庾肩詩眷然従此去車西馬復東問君今年三十㡬陶潛詩問君何能爾能使香名滿人耳李白文僕以弱植早飲香名漢書郊祀志聴其言洋洋滿耳君不見三峯直上五千仭一統志嵩山在登封縣北一十里五嶽之中嶽也其山三尖峯東曰太室西曰少室嵩其總名北山移文干青雲而直上司馬彪詩上凌青雲霓下臨千仞谷見君文章亦如此史記儒林傳文章爾雅訓辭深厚漢書公孫𢎞傳賛劉向王襃以文章顯如君兄弟天下稀蜀志馬良傳馬良兄弟五人並有才名古樂府為君艶歌世所稀雄詞健筆皆若飛孔融薦檷衡表飛辨騁辭徐陵讓表陳琳健筆未盡愚懐潘岳揚荆州誄翰動若飛紙落如雲將軍金印嚲紫綬漢書蕭何傳何進韓信漢王以為大將軍史記蔡澤傳懐黄金之印結紫綬於腰漢書百官公卿表相國丞相皆秦時官金印紫綬御史鐵冠重繡衣漢書百官公卿表侍御史有繡衣直指出討奸猾治大獄注衣以繡者尊寵之也庾信文既乗驄馬仍被繡衣六典御史大事則鐵冠朱衣以彈之喬生作尉别來久唐書百官志京縣令一人上主簿二人下尉六人世説曹公召司馬建公語之曰孤今日可復作尉否建公曰昔舉大王時適可作尉耳謝靈運詩戚戚新别心悽悽久念攅因君為問平安不禮記今日安不何如魏侯校理復何如漢書劉歆傳陳發秘蔵校理舊文陶潛詩校書亦已勤前日人來不得書古詩客従逺方來遺我一書札晉書劉𢎞傳得劉公一紙書賢於十部従事陸渾山水佳可賞沈約詩山中咸可悦賞逐四時移左思詩非必絲與竹山水有清音謝朓詩聊恣山泉賞蓬閣閒時日應往魏徵詩沈沈蓬萊閣日夕鄉思多自料青雲未有期史記伯夷傳砥行立名者非附青雲之士安能施於後世哉謝靈運詩托身青雲上曹植賦蹶青雲而奮羽蘇武别李陵詩相見未有期誰知白髮偏能長南史范縝傳縝年二十九􅄠白皓然乃作白􅄠咏論衡白􅄠復黒齒落更生壚頭青絲白玉瓶梁簡文帝當壚曲當爐設夜酒劉琨詩含笑酒壚前樂府陌上桑青絲為籠係支遁四月八日讃甘露凝玉瓶别時相顧酒如傾沈約詩征鳥時相顧陶潛詩一觴雖獨進杯盡壺自傾搖鞭舉袂忽不見戰國策舉袂成幕阮籍詩登髙眺所思舉袂當朝陽千樹萬樹空蟬鳴曹植詩寒蟬鳴我側潘岳詩鳴蟬屬寒音梁元帝詩樹宻隠鳴蟬古詩秋蟬鳴樹間李頎東川人家於潁陽擢進士第官新鄉尉送従弟遊江淮兼謁鄱陽劉太守史記十二諸侯表楚介江淮一統志饒州春秋時為楚地秦置鄱陽縣屬九江郡隋廢鄱陽改饒州隋大業初復為鄱陽唐初為饒州天寳初改為鄱陽郡本朝初改鄱陽府後改饒州都門柳色朝朝新張載詩藹藹東都門羣公祖二疏江淹詩太平多歡娯飛葢東都門何遜詩輕烟滲柳色薛道衡詩朝朝散霞彩暮暮澄秋色唐太宗詩未佩蘭猶小無絲柳尚新念爾今為江上人謝朓詩心事俱已矣江上徒離憂呉均詩露下寒葭中風起秋江上穆陵闗帶清風逺左傳南至於穆陵史記齊世家注今淮南有故穆陵闗是楚之境唐書地理志沂州沂水縣北有穆陵闗詩吉甫作誦穆如清風顔延之詩兩闈阻通軌對禁限清風彭蠡湖邊芳草春書東滙澤為彭蠡荆州記宫亭湖即彭蠡澤亦謂之彭蠡湖楚辭王孫遊兮不歸芳草兮萋萋班固西都賦竹林果園芳草甘木泊舟借問西林寺孟浩然詩泊舟潯陽郭始見香爐峯曹植白馬篇借問誰家子幽并遊俠兒崔顥長千行停船蹔借問或恐是同鄉法苑珠林釋慧逺上廬岳造西林寺重閣七間欒櫨重叠光耀鮮華一統志西林寺在九江府廬山與東林寺相對曉聴猿聲在山翠梁元帝詩寒夜猿聲徹遊子淚沾裳徐嶷詩白雲連鳥道青壁逓猿聲庾肩吾詩水光懸蕩壁山翠下添流蕭子鈞詩山翠餘烟積川平晚照收潯陽北望鴻鴈回漢書地理志廬江郡縣潯陽郭璞江賦源二分於崌崍流九派乎潯陽元和郡縣志潯陽本漢舊縣居潯水之陽故曰潯陽一統志九江府春秋為呉楚地晉為武昌鄱陽豫章三郡地梁移江州治湓城即今府治唐天寳初改潯陽本朝為九江府古詩攝衣起前庭仰觀鴻鴈翔陳後主詩况聴南歸鴈切思胡笳音湓水東流客心醉何遜詩湓水縈如帶一統志湓浦在九江府西源出瑞昌縣青湓山一名湓水莊子海不辭東流大之至也吕氏春秋水泉東流日夜不休劉楨詩汎汎東流水詩行邁靡靡中心如醉晉書阮咸傳太原郭奕髙爽有識量少所推先見咸心醉不覺嘆焉須知聖代舉賢良陸雲詩熙光聖代邁勲九區禮記命太尉賛傑俊遂賢良舉長大棗據詩開國建元士玉帛聘賢良不使遺才滯一方曹植七啟舉不遺才進各異方詩所謂伊人在水一方庾肩吾詩佳人逺千里乃在天一方應見鄱陽虎符守史記文帝紀二年九月初與郡守為銅虎符應劭注銅虎符第一至第五國家當發兵遣使至合符符合乃聴受之思歸共指白雲鄉陸雲嵗暮賦哀年嵗之攸往兮伊行人之思歸劉孝威思歸引乗鄣無期限思歸安可論莊子乗彼白雲歸於帝鄉夏宴張兵曹東堂後漢書百官志兵曹主兵事唐書百官志兵曹司兵參軍事掌武官選兵甲器仗門禁管鑰軍防風候傳驛畋獵儀禮大射小射正授弓拂弓皆以俟於東堂重林華屋堪避暑鮑照凌烟樓序重林窮天通原盡日張正見詩複澗蔵髙節重林隠勁枝戰國策蘇秦見趙王於華屋之下世説坐則華屋行則肥馬班固扇詩來風堪避暑靜夜致清凉典畧劉松與袁紹子弟常於三伏之際晝夜飲酒云避一時之暑故河朔有避暑飲梁簡文帝納凉詩避暑髙梧側輕風時入襟况乃烹鮮㑹嘉客老子治大國若烹小鮮注烹小鮮者攪之則碎傅毅七激酌㫖酒割芳鮮王粲詩髙㑹君子堂詩所謂伊人于焉嘉客又我有嘉客亦不夷懌劉楨詩采之荐宗廟可以羞嘉客何遜詩日暮留嘉客相看愛此時主人三十朝大夫禮記主人者接人以仁以徳厚者也長楊賦藉翰林以為主人子墨為客卿西都賦有西都賔問於東都主人世説摯瞻出作内史年二十九王敦曰卿年未三十已為萬石亦太蚤瞻曰比之甘羅已為太老周禮秋官朝大夫掌都家之國治古樂府陌上桑十五府小史十六朝大夫滿座森然見矛㦸後漢書孔融傳融雖家居而賔客日滿其門嘗嘆曰坐上客常滿尊中酒不空吾無憂矣鮑照詩絲竹徒滿座舊唐書禮儀志武徳之初碩學通儒森然在列詩王于興師修我矛㦸管子葛天廬之山發而出金蚩尤受而制之以為劒鎧矛㦸漢書吾丘夀王傳注五兵矛㦸弓劒戈晉書裴楷傳楷有知人之鑒嘗目鍾㑹如觀武庫森森但見矛㦸在前漢書輿服志公以下至二千石騎吏四人皆帶劒持棨㦸北窻卧簟蓮心花世説仁祖企脚北窓下彈琵琶故自有天際真人想南史陶潛傳嘗言五六月北窻下卧遇凉風蹔至自謂是羲皇上人梁簡文帝答餉卧簟書便可旅食南館髙卧北窓何遜詩北窓倒長簟庾信賦玉花簟上金蓮帳裏爾雅荷芙蕖也其花菡萏其實蓮其心菂菂中薏竹裏鳴蟬西日斜何遜詩竹裏見螢飛庾信詩竹動蟬爭散禮記仲夏之月蟬始鳴梁元帝詩花餘拂戲鳥樹宻隠鳴蟬沈君攸詩日暮野風生林蟬候節鳴顔延之曲水詩序情盤景遽歡洽日斜梁元帝詩西山晚日斜羽扇搖風却珠汗陸機羽扇賦昔楚襄王㑹於章臺之上大夫宋玉唐勒侍皆操白鶴之羽以為扇嵇含羽扇賦呉楚之士多執鶴翼以為扇班婕妤詩出入君懐袖動揺微風發傅咸羽扇賦序呉人截鳥翼而搖風勝於方圓二扇何遜扇詩搖風入素手招曲掩丹唇潘岳賦珠汗揮其如雨傳咸扇賦汗珠隕以外流氣鬱結而内沈傅休奕苦熱詩珠汗洽玉體梁簡文帝初秋詩羽翣晨猶動珠汗晝恒揮玉盆貯水割甘𤓰爾雅盎謂之缶疏可以盛水即今之盆也北史齊後主紀胡皇后夢於海上坐玉盆本草甜爪一名甘𤓰後漢書郡國志甘州生美𤓰張纉𤓰賦昔東陵之甘𤓰美顯名於中古嵇含𤓰賦乃剖甘𤓰既淳且馨庾信詩美酒含蘭氣甘𤓰開蜜筒魏文帝書浮甘𤓰於清泉沈朱李於寒水傅休奕𤓰賦披以呉刀承以朱盤中割而破雖分若完北史周趙王招傳招要隋文帝至第以佩刀割爪啖文帝雲峯峩峩白氷雪顧愷之詩夏雲多竒峯江淹賦炎雲峯起芳樹未移庾信詩雲晴即作峯列子伯牙鼓琴志在髙山鍾子期曰善哉峩峩若㤗山楚辭斵冰兮積雪注斵斫冰凍紛然如雪也坐對芳尊不知熱晉書阮籍等傳論嵇康竹林之㑹劉畢芳尊之友上官儀詩燕姝對明月荆艶促芳尊駱賔王詩芳尊徒自滿别恨轉難勝徐摛詩此時避炎熱清尊獨未空醉來但挂葛巾眠南史陶潛傳貴賤造之者有酒輒設潛若先醉便語客我醉欲眠卿可去又郡將候潛逢其酒熟取頭上葛巾漉酒畢還復著之北齊書祖鴻勲傳把臂入林挂巾垂枝攜酒登巘舒席平山語林諸葛武侯與宣王在渭濵將戰宣王戎服莅事使人觀武侯葛巾毛扇指揮三軍宣王聞而嘆曰可謂名士矣莫道明朝有離别呉均詩今夜盃酒别明朝江水邊庾信詩明朝雲水散何處更相尋古詩以膠投漆中誰能别離此李陵詩良時不再至離别在須臾愛敬寺古藤歌梁書武帝紀髙祖生知淳孝及居帝位即於鍾山造大愛敬寺古藤池水盤樹根梁昭明太子遊愛敬寺詩丹藤繞垂幹緑竹暎清池何遜詩瀲灔故池水蒼茫落日暉庾信詩定知歡未足横琴坐樹根左攫右挐龍虎蹲揚雄羽獵賦熊羆之挐攫虎豹之凌遽張衡西京賦熊虎升而挐攫援狖超而髙援王勃夫子廟碑珠衡玉斗徵象緯於天經贙據龍蹲集風雲於地紀横空直上相凌突虞世南詩横空一鳥渡孔稚圭北山移文干青雲而直上後漢書段穎傳賛紛紜騰突谷靜山空呉志諸葛恪傳丹陽地勢險阻俗好武習戰其升山赴險抵突叢棘若魚之走淵猿狖之騰木也傅毅舞賦良駿逸足蹌捍凌越注言馬駿逸奔突而走相陵越也丰茸離纚若無骨司馬相如賦羅丰茸之遊樹兮注丰茸衆飾貌嵇康琴賦紛文斐尾慊縿離纚注羽毛貌木華海賦鳬雛離褷鶴子淋澡衞夫人筆陣圖昔秦丞相見周穆王書七日興嘆患其無骨風雷霹靂連黒枝史記天官書天雷電霹厯夜明者陽氣之動也按歴同靂金陵梵刹志霹靂溝在鍾山南麓梁簡文帝詩江南荳蔻生連枝庾信詩細果上連枝人言其下蔵妖魑左傳流四凶族投之四裔以禦魑魅拾遺記方丈山池泥百煉成金鏡色青可照魑魅空庭葉落乍開合鮑照詩空庭聚山雀何遜詩空庭秋月華王勃詩小徑偏宜草空庭不厭花詩蘀兮蘀兮疏蘀落也落葉謂之蘀陶潛詩空庭多落葉慨然知已秋庾信小園賦落葉半床狂花滿屋木華海賦開合解圍瀼瀼濕濕十月苦寒常倒垂魏武帝苦寒行北上太行山艱哉何巍巍陸機苦寒行劇哉行役人慊慊恒苦寒庾信詩月懸惟返照落葉常倒垂憶昨花飛滿空殿張正見詩帆上錦花飛張協七命浮蟻星拂飛花萍接梁簡文帝箏賦玩飛花之度窓看春風之入栁蕭子良文金簡盈於寳殿玉軸煥於神宫江總幡賛光分紺殿采有香城宻葉吹香飯僧遍陸機詩宻葉承翠幄李嶠燭詩浮炷依羅幌吹香匝綺茵陳與義水仙花詩吹香洞庭煖弄影清晝遲維摩經遣化菩薩往衆香國禮彼佛足言願得世尊所食之餘欲於娑婆世界作佛事於是香積如來以衆香鉢盛滿香飯與化菩薩悉飽衆㑹謝靈運集有過瞿谿石室飯僧詩南階雙桐一百尺謝恵連詩簪玉出北房鳴金步南階魏明帝詩雙桐生枯井枝葉自相加枚乗七發龍門之桐髙百尺而無枝相與年年老霜霰劉緩樂府江南少許地年年情不窮淮南子北方之極有凍寒積氷雪雹霜霰陶潛詩常恐霜霰至宋之問經梧州詩南國無霜霰連年見物華王維桃源行陶潛桃花源記晉太元中武陵人捕魚為業縁溪行忘路之逺近忽逢桃花林夾岸數百步中無雜樹芳草鮮美落英繽紛漁人甚異之復前行欲窮其林林盡水源便得一山山有小口髣髴若有光便捨船従口入初極狹纔通人復行數十步豁然開朗土地平曠屋宇儼然有良田美地桑竹之屬阡陌交通雞犬相聞其間往來種作男女衣著悉如外人黄髮垂髫並怡然自樂見漁人乃大驚問所従來具答之便要還家設酒殺雞作食村中聞有此人咸來問訊自云先世避秦時亂率妻子邑人來此絶境不復出焉遂與外人間隔問今是何世乃不知有漢無論魏晉此人一一為具言所聞皆歎惋餘人各復延至其家皆出酒食停數日辭去此中人語云不足為外人道也既出得其船便扶向路處處誌之及郡下詣太守説如此太守即遣人隨其往尋向所誌遂迷不復得路漁舟逐水愛山春顔氏家訓伍員之託漁舟王勃滕王閣序漁舟唱晚響窮彭蠡之濵左思呉都賦結輕舟而競逐迎潮水而振緡前溪歌花落逐水去劉孝綽詩别待春山上相看採蘼蕪兩岸桃花夾去津荆州記兩岸連山畧無絶處庾信詩寒沙兩岸白獵火一山紅詩桃之夭夭灼灼其華禮月令仲春之月桃始華沈約詩分手桃林岸魏志公孫淵傳注浮舟百艘沈滯津岸水經注孟門即龍門上口也夾岸崇深傾崖返棹張正見詩栁影縁溝合槐花夾岸飛坐看紅樹不知逺謝朓詩紅樹巖舒青莎水被後漢書蔡邕傳潛舟江壑不知其逺行盡青溪不見人郭璞詩青溪數千仞中有一道士易行其庭不見其人山口潛行始隈隩戰國策張孟談潛行而出説文隩水隈崖也謝靈運詩逶迤傍隈隩迢逓陟徑峴山開曠望旋平陸江總詩橋平疑水落石迥見山開何遜七召延袤水陸曠望東西謝朓詩結構何迢逓曠望極髙深揚雄幽州牧箴伊昔唐虞實為平陸盧諶詩平陸引長流岡巒挺茂樹謝朓詩蒼翠望寒山崢嶸瞰平陸遙看一處攅雲樹徐陵太極殿銘函谷遙看美皇居之壯麗謝靈運詩雲中辨江樹劉孝威詩雲樹交為宻雨日共成虹近入千家散花竹説苑景公令吏致千家之縣於晏子庾信銘置劒千家梁簡文帝詩花留蛺蝶粉竹翳蜻蜓珠梁元帝詩竹宻無分影花疎有異香樵客初傳漢姓名王僧孺書或蹲林卧石藉卉班荆不過田畯野老漁父樵客庾信詩樵客值圍棋李嶠詩荒阡下樵客野猿驚山鳥孟子諱名不諱姓姓所同也名所獨也顔氏家訓童孺皆知姓名南史梁元帝紀元帝著古今同姓名録一巻居人未改秦衣服詩巷無居人又西人之子粲粲衣服禮記衣服有量必循其故宋玉神女賦整衣服斂容顔居人共住武陵源宋史地理志常徳府桃源縣乾徳中析武陵縣地置宗懔詩所言春不至未有桃花源庾信詩由來千種意併是桃花源張説詩桃花春徑滿誤識武陵源還従物外起田園齊竟陵王子良詩託性本魚鳥棲情閒物外梁元帝荅廣信侯書縦賞山中遊心物外漢書汲黯傳黯隠於田園者數年陶潛歸去來辭歸去來兮田園將蕪胡不歸月明松下房櫳靜古子夜歌秋夜凉風起天髙星月明陶潛詩班荆坐松下張説詩雲對石上塔風吹松下路班婕妤賦房櫳虛兮風泠泠傅亮感物賦鑒朗月於房櫳張華詩房櫳自來風日出雲中雞犬喧詩羔裘如膏日出有曜擊壤歌日出而作日入而息莊子日出於東方入於西極楚辭焱逺舉兮雲中王融樂府響梵髙雲中何遜詩去帆若不見試望白雲中神仙傳雞鳴天上犬吠雲中驚聞俗客爭來集庾信謝啟平陵月夜驚聞𢷬衣孔稚圭北山移文靖迴俗士駕為君謝逋客禮記四方來集逺鄉皆至競引還家問都邑庾信春賦百丈山頭日欲斜三晡未醉莫還家禮記仲秋之月可以築城郭建都邑張衡歸田賦遊都邑以永久嵇喜詩都邑可優游何必棲山林平明閭巷掃花開漢書叔孫通傳漢七年長樂宫成諸侯羣臣朝十月儀先平明謁者治禮引以次入殿門謝靈運詩平明登雲峯杳與廬霍絶史記伯夷傳閭巷之人欲砥行立名者非附青雲之士惡能施於後世哉劉希夷詩楊葉未能攀梅花待君掃薄暮漁樵乗水入廣雅日將入曰薄暮范雲詩田家采樵去薄暮方來歸何遜詩爾情深鞏洛予念返漁樵劉孝威詩神心重丘壑散步懐漁樵管子蛟龍乗水則神立初因避地去人間論語其次辟地後漢書承宫傳承宫經典既明乃歸家教授將諸生避地漢中中説自秦伯虞仲已來天下鮮避地者也史記留侯世家願棄人間事従赤松子遊耳髙士傳宗測少靜退不樂人間遂往廬山止祖舊宅嵇康絶交書寧可久處人間耶更聞成仙遂不還伏知道為衡山王與婦書人慚蕭史相偶成仙樂府水仙操翳洞渭兮流澌濩舟楫逝兮仙不還峽裏誰知有人事荆州記宜都西南峽中有黄牛山江湍紆迴途經信宿猶望見之國語人事不起勿為之始晉書王長文傳閉門自守不交人事陶潛詩野外罕人事窮巷寡輪鞅世中遙望空雲山庾信詠舞詩已曽天上學詎是世中生周禮春官男巫掌望祀疏望祀者遙望而祀之諸葛亮梁父吟步出城東門遙望蕩隂里陸機豫章行沈舟清川渚遙望髙山隂嵇康遊山詩遙望山上松隆谷鬱青蔥漢書五行志雲起於山而彌於天蔡琰胡笳十八拍雲山萬重兮歸路遐梁元帝詩雲歸山望濃不疑靈境難聞見梁簡文帝神山寺碑獨有鷲岳靈境淨土不燒論衡禹王治水益記異物以所聞見作山海經顔延之詩劉伶善閉闗懐情滅聞見塵心未盡思鄉縣毘尼蔵經色聲香味觸法怨忿汚人之淨心故云六塵謝靈運撰征賦忘陳錦而莫照思反鄉而有歎王僧孺詩我有一心人同鄉不異縣孫萬夀詩數載辭鄉縣宋之問詩萬里還鄉縣又豈意南中岐路多千山萬水分鄉縣出洞無論隔山水南史王𢎞之傳始寧沃州有佳山水𢎞之依巖築室又謝靈運傳出為永嘉太守郡有名山水靈運素所愛好肆意遨遊左思詩非必絲與竹山水有清音辭家終擬長游衍後漢書上成公傳成公宓縣人其初行久而不還後歸語其家云我已得仙因辭家而去鮑照詩我初辭家従軍僑榮志溢氣干雲霄詩昊天曰旦及爾游衍自謂經過舊不迷爾雅郵過也注道路之所經過南史陶潛傳顔延之在潯陽與潛情款後為始安郡經過潛必酣飲致醉謝混詩逍遙閱林肆願言屢經過詩天子是毘俾民不迷魏畧劉雄鳴毎出行霧中識道不迷班固通幽賦乘髙而遌神兮道遐邇而不迷安知峯壑今來變張華詩安知慕儔侣鮑照詩安知曠士懐張説詩雲峯曉靈變風木夜虛吟曹植詩始出嚴霜結今來白露晞當時只記入山深嵇康絶交書故有處朝廷而不出入山林而不返之論史記貨殖傳山深而獸往之青溪㡬曲到雲林梁簡文帝詩㡬曲文魚聚林暝鴉鳥飛沈約白雲詩將過丹丘野時至碧林垂呉均詠雲詩飄飄上碧虛藹藹隠青林宋之問詩雲林浩虧蔽春來遍是桃花水武平一詩東郊上苑望春來漢書溝洫志來春桃花水盛必羨溢韓詩章句三月桃花水下時鄭國之俗上已袚除不祥張正見詩櫂析桃花水颿横竹箭流不辨仙源何處尋雲笈七籖福地第四曰東仙源第五曰西仙源在台州庾信詩更尋終不見無異桃花源寒食城東即事風俗通冬至後百四日五日六日有疾風暴雨為寒食徐陵報尹義尚書鳴蜩抱樹亟見蔵冰歸鴈銜蘆多經寒食劉庭芝詩洛陽城東桃李花飛來飛去落誰家張九齡詩即事聊獨歡素懐豈兼適清溪一道穿桃李水經注查浦東行二百餘里甚有良田清溪王襃詩鳥道無蹊徑清溪有波瀾詩何彼穠矣華如桃李史記李廣傳桃李不言下自成蹊曹植詩南國有佳人容華若桃李演漾緑蒲含白芷説文演長流也蕩漾浮游貌廣韻蒲似藺可以為席古詩青蒲緑蔕生我池中名醫别録白芷生河東川谷下澤二月八月采根暴乾楚辭緑蘋齊葉兮白芷生溪上人家凡㡬家史記六國表詩書所以復見者多蔵人家落花半落東流水鍾嶸詩品丘遲㸃綴暎媚如落花依草梁元帝詩石闕題書字金燈飄落花庾信馬射賦落花與芝葢同飛楊栁共春旗一色孟子决諸東方則東流詩沔彼流水朝宗于海北史蕭大圜傳面修原而帶流水倚郊甸而枕平臯蹴踘屢過飛鳥上漢書枚臯傳臨山澤弋獵射御狗馬蹴鞠刻鏤上有所感輒使賦之傅休奕彈棋賦序漢武好蹴鞠劉向以為勞人體竭人力乃因其體而作彈棋以解之今觀其道蹵鞠道也按踘古作鞠詩有鳥髙飛亦傅于天漢書晁錯傳徳上及飛鳥下至水蟲草木諸産皆被其澤鞦韆競出垂楊裏古今藝術圖北方山戎寒食日用鞦韆為戲以習輕趫三輔黄圖長楊宫中有垂楊數畝因為宫名庾信詩落花灑行路垂楊拂砌塵少年分日作遨遊北史裴果傳果従軍征討常乗黄驄馬衣青袍先登陷陣時人號為黄驄少年庾信詩家住金陵縣前嫁得長安少年南史梁武帝紀始安王遙光尚書令徐孝嗣右僕射江祏右將軍蕭坦之侍中江祀衞尉劉暄更直内省分日帖敕詩微我無酒以敖以遊按遨古作敖莊子巧者勞而智者憂無能者無所求飽食而遨遊南史何㸃傳㸃好狎人物遨遊人間不用清明兼上已漢書律厯志大梁初胃七度穀雨今日清明中昴八度清明今曰穀雨於夏為三月商為四月周為五月淮南子距日冬至四十五日條風至條風至四十五日明庶風至明庶風至四十五日清明風至後漢書禮儀志上已官民皆潔於東流水洗濯祓除韓詩章句三月桃花水之時鄭國之俗三月上已之溱洧兩水之上秉蘭草袚除不祥顔延之曲水詩序獻洛陽之禮具上已之儀崔顥七夕詞風俗記織女七夕當渡河使鵲為橋續齊諧記桂陽城武丁有仙道謂其弟曰七月七日織女當渡河諸仙悉還宫弟問曰織女何事渡河曰織女蹔詣牽牛世人至今云織女嫁牽牛也玉燭寳典洛陽人家七夕乞巧使蜘蛛結萬字嵗時紀異七夕俗以蠟作嬰兒形浮水中以為戲為婦人宜子之祥庾肩吾詩九江逢七夕初弦值早秋長安城中月如練漢書髙帝紀張良勸上西都長安班固西都賦漢之西都實在雍州名曰長安三輔黄圖長安故城漢之舊都髙帝七年方修長安宫城自櫟陽徙居此城本秦離宫也初置長安城本狹小至恵帝更築之梁元帝詩昆明夜月光如練沈約詩望秋月秋月光如練家家此夜持針線曹植與楊徳祖書人人自謂握靈􅉬之珠家家自謂抱荆山之玉荆楚嵗時記七月七日人家婦女結綵樓穿七孔針或以金銀鍮石為針陳𤓰果於庭中以乞巧劉孝威七夕穿針詩故穿雙眼針持縫合歡扇西京雜記漢彩女嘗以七月七日穿針於開襟樓六帖七夕宫人以九孔針穿五色線仙裙玉佩空自知飛燕外傳成帝於太液池起瀛洲榭飛燕衣雲英紫裙歌舞歸風送逺之曲歌酣風大起揚袖曰仙乎仙乎去故而就新寧忘懐乎他日宫姝或擘裙為䋫號曰留仙裙詩瓊瑰玉佩曹植洛神賦願誠素之先達兮解玉珮以要之天上人間不相見髙昂詩天上人間無可比墨莊冗録郭翰乗月卧庭中有人冉冉而下乃一少女曰吾天之織女也後夕復來翰戲曰牛郎何在那敢獨行曰隂陽變化闗渠何事將至七夕遂不復來數夜方至翰問曰相見樂乎笑曰天上那比人間正以感遇當爾非有他故梁元帝詩花朝月夜動春心誰忍相思不相見長信深隂夜轉幽漢書外戚傳班倢伃求共養太后長信宫上許焉班婕妤賦託長信之末流應璩詩室廣致凝隂臺髙來積陽王融詩烟灌共深隂風篁兩蕭瑟世説張威伯嵗寒之茂松幽夜之未光王融詩幽夜有四知玉階金閣數螢流漢書外戚傳切皆銅沓冐黄金塗白玉階班固西都賦玉階彤庭江淹詩竊愁凉風至吹我玉階樹鮑照舞鶴賦唳清響於丹墀舞飛容於金閣禮記季夏之月腐草為螢沈約賦流螢暗明燭謝朓玉階怨夕殿下珠簾流螢飛復息劉孝威詩數螢流暗草庾信詩露滴連珠下螢飄碎火流班姬此夕愁無限漢書外戚傳太后曰古有樊姬今有班倢伃周𢎞正詩將申湘女悲宜並班姬怨徐悱妻劉氏班姬怨日落應門閉愁思百端生費昶長門怨向夕千愁起河漢三更看斗牛博物志舊説天河與海通近世有居海渚者年年八月有浮槎去來乃乗槎至一處有城郭状遙望宫中有織婦見一丈夫牽牛渚次飲之牽牛人驚問曰何由至此此人為説來意問此是何處答曰君訪嚴君平則知之因還問君平曰某年某月有客星犯牽牛宿計其年月正是此人到天河時也詩維天有漢監亦有光古詩迢迢牽牛星皎皎河漢女班固西都賦左牽牛而右織女似雲漢之無涯晉子夜變歌三更出門去始知子夜變古詩南箕北有斗牽牛不負軛庾信賦路已分於湘漢星猶看乎牛斗荆楚嵗時記天河之東有織女天帝之子也年年機杼勞役織成雲錦天衣天帝憐其獨處許嫁河西牽牛郎嫁後遂廢織絍天帝怒責令歸河東但使其一年一度相㑹孟浩然夜歸鹿門歌一統志鹿門山在襄陽府城東南三十里襄陽記鹿門山舊名蘇嶺山建武中襄陽侯習郁立神祠於山刻二石鹿夾神道口俗因謂之鹿門廟遂以廟名山也唐書文藝傳孟浩然襄州襄陽人隠鹿門山年四十乃遊京師山寺鳴鍾晝已昬庾信詩戍樓鳴夕鼓山寺響晨鐘西京賦升觴舉燧既釂鳴鐘謝朓詩鳴鐘霽幽抱漁梁渡頭爭渡喧水經注沔水中有魚梁洲龎徳公所居梁簡文帝詩採蓮渡頭擬黄河庾信春賦開上林而競入擁河橋而爭渡又詩河梁爭渡喧人隨沙岸向江村謝靈運詩野曠沙岸淨天髙秋月明王僧孺詩楓林曖似畫沙岸淨如埽謝朓詩曖曖江村見離離海樹出虞騫詩長林帶朝夕孤嶺枕江村余亦乗舟歸鹿門詩二子乗舟鹿門月照開烟樹詩月出照兮淮南子月照天下謝朓詩逺樹曖芊芊生烟紛漠漠忽到龎公栖隠處襄陽記龎公者南郡襄陽人也居峴山之南未嘗入城府荆州刺史劉表數延請不能屈遂攜其妻子登鹿門山因采藥不返襄陽耆舊傳龎徳公隠鹿門山孔明毎至其家獨拜床下徳公初不令止北史徐則傳棲隠靈岳五十餘年巖扉松逕長寂寥劉孝先詩洞户臨松逕老子寂兮寥兮獨立而不改江淹詩山中信寂寥惟有幽人自來去易幽人貞吉太公六韜武王問太公曰何以知敵壘之虛實自來自去丁仙芝曲阿人登開元進士為餘杭尉餘杭醉歌贈呉山人後漢書郡國志呉郡縣餘杭一統志餘杭縣在杭州府城西北七十里本秦舊縣屬㑹稽郡漢因之東漢屬呉郡三國呉屬呉興郡隋屬杭州唐宋元仍舊本朝因之曉幕紅襟燕清溪神女歌歌繁霜侵曉幕何意空相守坐待繁霜落𤣥中記胡燕斑胷聲小越燕紅襟聲大左傳呉季子札聘於上國宿於戚聞孫林父擊鐘曰夫子之在此猶燕之巢於幕也春城白項烏左傳城上有烏齊師其遁漢童謠城上烏尾畢逋小爾雅白項而羣飛者謂之燕烏世説支道林入東見王子猷兄弟曰見一羣白頸烏但聞喚啞啞聲只來梁上語徐彦伯詩暗梁聞語燕唐太宗詩舞接花梁燕李嶠歌詩梁上繞飛塵不向府中趨古詩盈盈公府步冉冉府中趨庾信鳥夜啼御史府中何處宿洛陽城頭那得棲城頭坎坎鼓聲曙蕭子顯詩洛陽城頭雞欲曙詩坎坎鼓我庾肩吾詩隴水哀笳曲漁陽掺鼓聲江總廬陵王徳政碑去謠曙鼓來留暮歌滿庭新種櫻桃樹梁元帝賦台司烜而照夜觀執圭之滿庭禮記羞以含桃注含桃今櫻桃上林賦櫻桃蒲陶羅乎後宫傅咸黏蟬賦序櫻桃為樹則多隂為果則先熟故種之於㕔事之前桃花昨夜撩亂開謝偃詩撩亂垂絲昬栁陌㕘差濃葉暗桑津當軒發色暎樓臺白帝子歌璇宫夜靜當軒織王績詩日照當軒影風吹滿路香班固西都賦蘭茝發色曄曄猗猗史記天官書海旁蜃氣象樓臺徐陵詩樓臺非一勢臨玩自多竒十千兊得餘杭酒曹植名都篇歸來宴平樂美酒斗十千梁簡文帝書黒水初旋未申十千之飲神仙傳王方平降蔡經家酒盡遣左右以千錢與餘杭姥乞酤酒須臾信還得酒五斗許庾信詩美酒餘杭醉二月春城長命杯庾信詩正旦辟惡酒新年長命杯酒後留君待明月北史崔瞻傳瞻性方重好讀書酒後清言聞者傾耳拾遺記呉椒華之房貫細珠為簾幌朝下以蔽景夕巻以待月還將明月送君回莊子送君者皆自厓而反君自此逺矣江淹詩送君如昨日庭前露已團御選唐詩巻八
