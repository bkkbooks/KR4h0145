body:
  text: 欽定四庫全書御選唐詩巻十五言律唐太宗皇帝過舊宅唐書太宗紀太宗平薛仁杲拜右武侯大將軍太尉使持節陜東道大行臺尚書令詔蒲陜河北總兵皆受節度二年正月鎮長春宫進拜左武侯大將軍凉州總管新豐停翠輦三輔舊事太上皇不樂闗中思慕鄉里髙祖徙豐沛屠兒沽酒煮餅商人立為新豐西京雜記既作新豐衢巷棟宇物色惟舊士女老㓜相擕路首各知其室放犬羊鷄鴨於通途亦競識其家匠人胡寛所營也一統志臨潼縣在西安府城東七十里秦為驪邑漢置新豐縣潘尼芙蓉賦或擢莖以髙立似雕輦之翠盖北史突厥傳帝幸啟民所居賦詩曰鹿塞鴻旗駐龍旗翠輦囘譙邑駐鳴笳魏武故事於譙東五十里築精舍欲秋夏讀書冬春射獵魏志武帝紀太祖武皇帝沛國譙人也舊唐書禮儀志貞觀九年詔曰太原之地肇基王業事均豐沛義等宛譙約禮而言須議立廟一統志亳州在鳯陽府城西北四百五十里本春秋譙邑秦屬碭郡漢置譙縣唐初為譙州漢文帝與呉質書從者鳴笳以啟路文學托乗於後車庾信詩鳴笳凌絶浪飛盖歴通衢南史王僧祐傳雅為從兄儉所重每鳴笳列騶到其門園荒一徑斷陶潛歸去來辭田園將蕪胡不歸又三徑就荒松菊猶存謝朓詩荒徑隱髙蓬謝靈運山居賦迷不知其所適苔古半階斜潘岳安石榴賦壁衣蒼苔瓦被駁蘚孫綽遊天台山賦踐莓苔之滑石梁簡文帝詩翠帶留餘結苔階沒故綦又落日斜階上前池消舊水張衡西京賦乾池滌藪謝靈運詩故池不更穿何遜詩㶑灧故池水昔樹發今花梁昭明太子詩意樹發空花庾肩吾詩㢠岸高花發丘遲與陳伯之書暮春三月江南草長雜花生樹羣鶯亂飛一朝辭此地詩鐘鼓既設一朝饗之劉伶酒徳頌有大人先生以天地為一朝萬期為須叟漢書溝洫志河决率常於平原東郡聞禹治河時本空此地以為水隈四海遂為家禮記聖人能以天下為一家中國為一身者非意之也漢書髙帝紀天子以四海為家非令壯麗無以重威張衡西京賦方今聖上同天號於帝王掩四海而為家富有之業莫我大也臨洛水山海經洛水出洛西山東北注河入成臯之西初學記洛水出京兆上洛縣冢領山郡經上洛𢎞農河南縣盧氏蠡城陽市宜陽洛陽合伊瀍穀澗之水至鞏縣而入河晉書禮志晉中朝公卿以下至於庻人皆稧洛水之側春蒐馳駿骨爾雅春獵為蒐郭璞注蒐為摉索取不任者左傳春蒐夏苗秋獮冬狩皆於農隙以講武事也庾信華林園馬射賦雖行祓褉之飲即同春蒐之儀任昉天監三年䇿秀才文朕傾心駿骨非懼真龍總轡俯長河離騷飲余馬於咸池總余轡乎扶桑徐陵為貞陽侯答王太尉書臨江總轡企望音郵晉書孝武帝紀論西踰劍岫而跨靈山北振長河而臨清洛霞處流縈錦海賦霞錦散文于沙汭之際張正見詩風前朱幌色霞處綺疏文風前瀁巻羅釋法宣詩舞袖風前異歌聲扇後嬌説文瀁同漾蕩漾浮遊貌梁武帝詩光風動紈羅水花翻照樹何遜詩林葉下仍飛水花披未落古今注荷花一名水花堤蘭倒插波梁元帝賦得蘭澤多芳草詩臨池影入浪豈必汾隂曲秋雲發棹歌漢武帝故事帝行幸河東祠后土顧視帝京欣然中流作秋風辭曰泛樓船兮濟汾河簫鼓鳴兮發棹歌注棹歌引棹而歌栁惲詩壠首秋雲飛望終南山詩終南何有有條有梅五經要義終南山長安南山也括地志南山即終南山一名太乙一名橘山一名周南一名地肺西都賦表以太華終南之山重巒俯渭水水經注重巒疊巘霞舉雲髙庾信詩重巒千仭塔危磴九霄臺薛道衡從駕詩重巒下飛騎絶浦度連旗詩涇以渭濁書導渭自鳥鼠同穴注渭水出隴西郡首陽縣鳥鼠山東至京兆入河山海經鳥鼠同穴之山渭水出焉而東流注於河碧嶂插遙天沈約遊鍾山詩鬱律構丹巘崚􅜤起青嶂湛茂之歴山草堂應教詩離離插天樹磊磊間雲石張正見詩雨師清逺路風伯静遙天出紅扶嶺日書寅賔出日又丕冐海隅出日罔不率俾詩其雨其雨杲杲出日王粲遊海賦吐星出日天與水際江淹别賦日出天而曜景何晏景福殿賦開建陽則朱炎艶日傅休奕詩青天敷翠彩朝日含丹暉隂鏗詩棟裏歸雲白窗外落暉紅歸藏蒼帝起青雲扶日入翠貯巖烟蕭子鈞詩山翠餘烟積川平晚照收鮑照詩夜聽横石波朝望宿巖烟疊松朝若夜名山記成都娑羅平有松狀如杉而葉圓細亦不能髙重重偃盖如浮圖沈約髙松賦朝吐輕烟薄霧夜宿迷鳥覊雌謝朓詩四面動清風朝夜起寒色複岫闕疑全説文岫山穴廣韻山有穴曰岫謝靈運山居賦羣峯參差出其間連岫複陸成其坂沈約詩江移林岸微巖深烟岫複對此恬千慮世説對此茫茫不覺百端交集淮南子心常無欲可謂恬矣游心于恬舍形于佚漢書韓信傳智者千慮必有一失愚者千慮必有一得雲笈七籖游心虛静息慮無為無勞訪九仙宋書天竺傳九仙賮寶百神聳聽列仙傳涓子者著天人經四十八萹隱宕山能致風雨受伯陽九仙法謝莊舞馬賦肅肅雝雝引八神而詔九仙沈約詩眷言採三秀徘徊望九仙范雲詩石户栖十秘金壇謁九仙首春梁元帝纂要孟春曰首春王微詩蘅若首春華梧楸當夏翳寒隨窮律變庾信郊祀歌次律將迴窮紀微陽欲動細泉王褒詩嵗晚悲窮律鶡冠子寒温之變非一精之所化後漢書律歴志夫十二律之變至于六十猶八卦之變至于六十四也春逐鳥聲來鮑照春日行春山茂春日明園中鳥多嘉聲庾信詩昨夜鳥聲春驚啼動四鄰初風開帶柳梁簡文帝詩栁枝無極軟春風隨意來江總山庭春詩峯緑開河栁本集臨池栁詩岸曲絲隂聚波移帶影疎晚雪間花梅易林晚雪早霜王獻之送梨帖今送梨三百顆晚雪殊不能佳江總詩驚花雪後梅碧林青舊竹謝萬蘭亭詩碧林輝翠萼庾信詩舊竹侵行徑緑沼翠新苔潘岳西征賦蓮花爛于緑沼江淹青苔賦蕪階翠地繞壁㸃牆恵標詩松門夾細草石磴染新苔芝田初雁去拾遺記崑崙山第九層山形漸小狹下有芝田蕙圃數百頃羣仙耕種焉曹植洛神賦爾迺税駕于蘅臯秣駟乎芝田孫楚鴈賦背青春而北息蕭子顯自序早鴈初鶯開花落葉梁昭明太子四月啟兹因去鴈聊寄芻蕘綺樹巧鶯來梁簡文帝詩八泉充綺樹四柱曖臨空江淹四時賦憶上國之綺樹想金陵之蕙枝丘遲與陳伯之書雜花生樹羣鶯亂飛本集春臺詩初鶯一一鳴紅樹儀鸞殿早秋唐太宗實録貞觀十八年十一月壬午宴父老儀鸞殿唐六典洛陽宫在皇城之北西北出曰洛城西門其内曰徳昌殿北曰儀鸞殿寒驚薊門葉寰宇記木葉山在薊州塞外曹植詩出自薊北門遙望胡地桑庾信燕歌行寒雁嗈嗈度遼水桑葉紛紛落薊門何遜詩㡬經秋葉飛驟見春流瀰秋發小山枝王逸招隱士序招隱士者淮南小山之所作也庾信尋周處士詩梨紅大谷晚桂白小山秋又趙國公集序大雅扶輪小山承盖松隂背日轉江淹詩翩翩紅鳥翼蕭蕭松柏隂隋焬帝古松樹詩獨留麈尾影猶横偃盖隂法苑珠林貝葉真文西流為始佛光背日東照為初竹影避風移庾信至仁山銘壁繞藤苗忩衘竹影又小園賦黄鶴戒露非有意于輪軒爰居避風本無情于鐘鼓提壺秋菊岸劉伶酒徳頌動則操巵執瓢行則挈榼提壺陶潜遊斜川詩提壺接賔侣引滿更獻酬離騷朝飲木蘭之墜露兮夕餐秋菊之落英髙興芙蓉池殷仲文詩獨有清秋日能使髙興盡案魏文帝有芙蓉池上詩謝靈運遊南亭詩澤蘭漸被逕芙蓉始發池庾信詩聊開鬱金屋暫對芙蓉池欲知凉氣早曹植詩初秋凉氣發庭樹微銷落巢空燕不窺蕭銓詠銜泥雙燕詩𤓰截還猶短巢成新尚空庾信詩空巢逐樹流梁簡文帝雙燕詩桂棟本曽宿虹梁早自窺詠風蕭條起關塞晉王凝之風賦經五嶺而蕭條江淹詩適見葉蕭條宋玉風賦夫風生於地起于青蘋之末漢書賈山傳秦破六國以為郡縣築長城以為闗塞又項籍傳闗中阻山河四塞注東函谷南武闗西散闗北蕭闗鮑照詩疾風衝塞起砂礫自飛楊搖颺下蓬瀛沈約詠風詩蝶逢飛搖颺燕值羽參差列子渤海之中有大壑其中有山四曰瀛洲五曰蓬䒹漢書建章宫太液池中有蓬萊瀛洲象海中仙山張衡西京賦列瀛洲與方丈夾蓬萊而駢羅萊梁簡文帝詠風詩飄颻散芳甸汎漾下蓬拂林花亂彩王臺卿詠風詩暫拂蘭池上禇爽禊賦風搖林而自清梁簡文帝詠風詩屢蕩新花開庾信詩風花直亂迴謝朓賦旦耀彩于春風響谷鳥分聲謝靈運文聆鳴禽于響谷梁簡文帝詩嚴飈時響谷庾信詩深谷鳥聲春披雲羅影散楊乂雲賦豁兮若披杳兮四㑹世説若披雲霧而覩青天釋名羅疎羅也孔範白雲詩羅成玉女微梁簡文帝詠雲詩玉葉散秋影泛水織紋生爾雅風行水成文曰漣水波如錦文曰漪賀文標詠風詩泛水披垂楊鮑照詩清潭圓翠合花薄縁綺文虞騫詩細雨織斜文勞歌大風曲史記髙祖還沛酒酣作大風歌威加四海清大風歌威加海内兮歸故鄉書永清四海時哉弗可失詠雨罩雲飄遠岫傅咸喜雨詩靈岳興慶雲之飄颻陶潛歸去來辭雲無心以出岫謝朓詩忩中列逺岫呉均詩輕雲紉逺岫細雨沐单衣噴雨泛長河西京雜記淮南方士有嘘吸為寒暑噴𠻳為雨霧鮑照河清頌長河巨濟異源同清低飛昬嶺腹謝朓觀雨詩朔風吹飛雨鮑照苦雨詩沈雲日夕昬驟雨淫朝旦庾信對雨詩繁雲猶暗嶺積雨未開庭廬山記白水在黄龍南即瀑布也水出山腹斜足灑巖阿劉逖對雨詩斜飛覺帶風張恊苦雨詩雨足灑四溟庾肩吾詩雨足飛春殿張纉秋雨賦乍斜檐而上階或從風而灑幕南史到洽傳築室巖阿沈約郊居賦眷巖阿而扺掌泫叢珠締葉張纉秋雨賦泫髙枝而疎落詩集于灌木傳灌木叢木也魏武帝樂府樹木叢生梁元帝詩葉巻珠難溜劉孝武晚雨詩葉珠垂滴水起溜鏡圖波梁簡文帝詩麥雨交新溜沈約亭雨詩出空寧可圖入庭倍難賦張纉秋雨賦渌池泛澹圓波儵爍朱巨仁鏡詩無波菱自動濛栁絲添宻詩零雨其濛應晹愁霖賦雨濛濛而霧零陶潜詩宻宻堂前栁梁簡文帝栁詩楊栁亂成絲張恊苦雨詩宻雨如散絲陳後主折楊栁長條黄復緑垂絲宻且繁含吹織空羅廣韻吹尺為切盧思道珠簾詩浮青帶逺吹含光動細塵古樂府大婦織綺羅虞騫擬雨詩落暉散長足細雨織斜文秋日翠微宫舊唐書太宗紀貞觀二十一年夏四月乙丑營太和宫於終南之上改為翠微宫五月戊子幸翠微宫雍録翠微宫武徳八年造名太和貞觀二十一年改翠微宫秋光凝翠嶺顔延之詩月樹凝秋光江淹詩秋日懸清光庾闡詩翔霄拂翠嶺緑澗瀨岩間謝恵連詩蜚雲興翠嶺芳飈起華薄凉吹肅離宫水經注文井祠南岸下有風穴雖三伏盛暑猶須襲裘寒吹凌人不可暫停陶潜詩今日天氣佳清吹與鳴蝉漢書枚乗傳脩治上林雜以離宫班固西都賦離宫别館三十六所張衡西京賦郡國宫館百四十五荷疎一盖缺鮑至山池詩荷疎不碍檝楚辭築室兮水中葺之以荷盖又乗水車兮荷盖駕兩龍兮驂螭拾遺記昭帝穿淋池廣千步中植分枝荷一莖四葉狀如駢盖宫人遊宴必皆含嚼或折以蔽日樹冷半帷空潘岳秋興賦庭樹摵以灑落勁風戾而吹帷蕭慤秋晚詩葉疎知樹落張華詩幽人守静夜迴身入空帷謝恵連詩寂寞雲幄空孔稚圭北山移文蕙帳空兮夜鶴怨側陣移鴻影物類相感志陽鳥飛作八字在天人若張其一則飛行中缺一位也大曰鴻小曰鴈庾信文語其百發弓捷於猿吟論其百中劍深于鴈陣北史王肅傳語及為國之道深㑹帝㫖促席移影不覺坐之疲也圓花釘菊叢鍾㑹菊賦圖花髙懸准天極也嵇含菊花銘璇蕤圓秀翠葉紫莖増韻釘以釘釘物續晉陽秋陶潜九日無酒坐宅邊菊叢中採摘