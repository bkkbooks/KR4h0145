對峙宛若蛾眉明皇帝經魯祭孔子而嘆之夫子何為者論語夫子何為史記項羽紀客何為者栖栖一代中論語微生畝謂孔子曰丘何為是栖栖者與陽固演賾賦孔栖栖而不息兮終見黜于庶邦周禮春官大司樂注分用一代之樂呉志韋曜傳漢氏承秦則有叔孫通定一代之儀曜之才學亦漢通之次也江淹賦拾一代而笑淺訪古人而求深地猶鄒氏邑論語孰謂鄹人之子知禮乎廣韻鄒縣名屬兖州鄹同漢書地理志濟南郡縣梁鄒水經濟渠又東北至梁鄒縣西分為二宅即魯王宫孔安國尚書序魯恭王壊孔子舊宅以廣其居升堂聞金石絲竹之音乃不壊宅漢書景帝十三王傳程姫生魯恭王餘又恭王徙魯好治宫室壊孔子舊居以廣其宫聞鐘磬琴瑟之聲不敢復壊于其壁中得古文經傳歎鳯嗟身否論語子曰鳯鳥不至河不出圖吾已矣夫李徳林天命論泣麟歎鳯栖栖汲汲雖聖達而莫許也盧照鄰山行詩狂歌欲歎鳯易先否後喜晉書凉王李嵩傳吾自立身不營世利經涉累朝通否任時傷麟怨道窮春秋西狩獲麟注麟者仁獸聖王之嘉瑞也仲尼傷嘉瑞之無應故因魯春秋而脩之絶筆于獲麟史記孔子世家西狩見麟曰吾道窮矣今㸔兩楹奠禮記孔子曰疇昔之夜夢坐奠于兩楹之間張恊詩折衝樽爼間制勝在兩楹曹植詩攬衣出中閨逍遙步兩楹當與夢時同後漢書邊韶傳寐與周公通夢静與孔子同意法苑珠林若晝縁青黄夢想還同此為想夢唯此溫泉是稱愈疾豈余獨受其福思與兆人共之乗暇尋遊乃言其志雍録温湯在臨潼縣南一百五十步一統志驪山在臨潼縣東南三里山之麓温泉所出博物志凡水源有石流黄其泉則温或云神人所暖主療疾辛氏三秦記驪山湯可以去疾消病白帖倍藥石之功蠲除六疾易井渫不食為我心惻可用汲王明並受其福書一人有慶兆民賴之參同契後序循遊寥廓書詩言志歌永言桂殿與山連庾肩吾詩桂殿月偏來十道志貞觀十八年詔閻立徳營建宫殿御湯名湯泉宫太宗臨幸製碑咸亨三年名温泉宫天寳六載改為華清宫於驪山上益治湯井為池臺殿環立山谷又明皇即山建宫大扺宫殿包褁驪山一山而繚墻周遍其外庾信賦節竪山連文横水蹙蘭湯湧自然楚辭浴蘭湯兮沐芳鄭義真奉和過溫泉詩湯泉恒獨湧庾信温湯碑山間湧水實表忠誠老子人法地地法天天法道道法自然莊子行之以五徳應之以自然淮南子因天地之自然隂崖含秀色説文隂闇也水之南山之北也西征賦眺華頂之隂厓鮑照詩隂厓積夏雪漢書禮樂志含秀垂穎續舊不廢張衡七辨秀色羙艶陸機日出東南隅行秀色若可餐傳休奕艷歌行秀色若珪璋劉孝綽詩林塘多秀色溫谷吐潺湲劉義恭温泉詩秦都壯溫谷漢京麗湯泉楊思元詩豐城觀漢迹溫谷幸秦餘鄭義真詩温谷豈知寒沈佺期詩水從金穴吐雲是玉衣來九歌觀流水兮潺湲七發瀄汨潺湲波揚流灑張衡賦亂弱水之潺湲兮逗華隂之湍渚績為觸邪著詩豐水東注維禹之績魏都賦溫泉毖涌而自浪華清盪邪而難老劉逖浴溫湯詩神井堪消癘温泉足盪邪南史向靖傳所在著績後漢書邳彤傳凡言成事者以功著易顯功因養正宣晉書陶侃傳賛任隆三事功宣一職匡宋書武帝紀行幸所經蒞民之功宣於聼即加甄賞易山下出泉䝉以養正聖功也願言將億兆詩寤言不寐願言則􅅉陸機詩慷慨誰為感願言懐所欽戰國䇿蘇秦説楚威王曰此兩䇿者相去有億兆之數後漢書傳賛俾建永昌同編億兆晉書周嵩傳下收億兆元元之命劉琨表億兆攸歸廣韻十萬曰億十億曰兆同此共昌延傅休奕詩普天同樂育庾信詩有慶兆民同論年天子萬宋書顔延之傳天下之務當與天下共之荘子天下有道與物皆昌博雅延延遲遲長也馬融廣成頌歴萬載而永延曹植文天禄永延過老子廟案此詩亦見李白集史記老子傳老子者楚苦縣厲鄉曲仁里人也姓李氏名耳字伯陽謚曰􅅨周守藏室之史也脩道德其學以自隱無名為務葛𤣥道徳經序周時託神李母剖左腋而生生即皓然號曰老子仙居懐聖徳案仙居蕭士贇補注本作先君云唐祖老子故稱為先君史記封禪書公孫卿曰仙人好樓居於是上令長安作蜚亷桂觀甘泉作益延夀觀使卿持節設具而候神人鄭愔詩地軸仙居逺史記五帝紀髙陽有聖德靈廟肅神心蔡邕王子喬碑咨訪其驗信而有徵乃造靈廟以休厥神梁簡文帝伍員廟詩洪濤猶鼓怒靈廟尚淒清應貞詩神心所授不言而喻草合人蹤斷謝朓詩草合亭臯逺霞生川路長江淹詩再逢緑草合重見翠雲生庾肩吾隴西行草合前迷路雲濃後暗城廣韻從跡也司馬相如難蜀父老舟車不通人跡罕到張恊詩溪壑無人跡荒楚鬱蕭森塵濃鳥跡深謝莊月賦緑苔生閣芳塵凝榭許慎説文序黄帝之史蒼頡見鳥獸􅕭迒之迹知分理之可相别異也初作書契阮籍樂論黄帝詠雲門之神少昊歌鳯鳥之跡李白詩遺我鳥跡書飄然落崕間流沙丹竈沒書導弱水至於合黎餘波入于流沙列仙傳老子西遊闗令尹喜知真人當過物色而得之與老子俱至流沙之西服巨勝實莫知所終地理通釋流沙在沙州八十里其沙隨風流行江淹别賦守丹竈而不顧鍊金鼎而方堅周𢎞正詩菊源流餘水丹竈起殘烟庾信詩自可尋丹竈何勞憶酒壚闗路紫烟沉史記老子傳正義抱朴子云老子西遊遇闗令尹於散闗或以為函谷闗沈約碑文北撫崤潼平塗不過七百西接嶢武闗路曽不盈千徐陵與齊尚書令書河橋馬渡曽非宋典之奸闗路雞鳴皆是田文之客闗令尹内傳闗令登樓四望見東極有紫氣西邁喜曰九十日之外法應有聖人經過京邑至期乃齋戒其日果見老子郭璞遊仙詩赤松臨上遊駕鶴乗紫烟鮑照詩揚芬紫烟上垂彩緑雲中獨傷千載後江淹别賦迴文詩兮影獨傷漢書王褒傳千載一㑹論説無疑何妥詩小臣屬千載時幸預簮纓魏文帝脩孔子廟詔千載之後莫不脩其文以述作空餘松栢林詩如松栢之茂無不爾或承禮記其在人也如竹箭之有筠也如松栢之有心也左思蜀都賦楩楠幽藹于谷底松栢蓊鬱於山峯江總詩采桑歸路河流深憶昔相期栢樹林途次陜州元和志陜州禹貢豫州之域周為二伯分陜之地又為古之虢國戰國時為魏地後屬韓秦屬三川郡漢為𢎞農郡之陜縣後魏太和十一年置陜州改恒農郡十八年罷義寜元年置𢎞農郡武徳元年改為陜州一統志陜州在河南府城西三百里境出三秦外三輔黄圖秦置内史以領闗中項籍分其地為三以章邯為雍王都廢丘司馬忻為塞王都櫟陽董翳為翟王都髙奴謂之三秦一統志興平縣在西安府城西一百里秦名廢丘又櫟陽城在臨潼縣北五十里又髙奴城在延安府鄜州城東五里途分二陜中潘岳西征賦眄山川以懐古悵攬轡於中途又周召之所分二南之所交郡國志陜縣有陜陌二伯所分括地志陜原在陜州陜縣西南二十五里分陜從原為界集古録陜州石柱相傳以為周召分陜所立山川入虞虢易地險山川丘陵也西征記陜縣周召分職處南倚山原北臨黄河左傳晉侯復假道於虞以伐虢元和志故虞城在平陸縣東北五十里虞山之上又州里城即古虢國城虢山在陜縣西二里臨黄河又虢有三北虢今陜州平陸縣東虢今滎陽縣西虢今鳯翔府扶風縣一統志平陸縣在山西解州城東南九十里春秋虞國地隋屬蒲州唐貞觀初屬陜州又虢州城在河南府靈寶縣治南陜州城西六十里風俗限西東漢書地理志凡民剛柔緩急音聲不同繫水土之風氣故謂之風好惡取舍隨君上之情欲故謂之俗公羊傳自陜以東周公主之陜以西召公主之鄭氏詩譜武王代紂定天下六之州得二公之德化尤純故獨録之屬之太師其得聖人化者謂之周南得賢人之化者謂之召南樹古棠隂在楊素詩樹寒偏易古爾雅杜甘棠也詩蔽芾甘棠勿翦勿伐召伯所茇史記燕世家召公巡行鄉邑有棠樹决獄其下民人思召公之政懐甘棠不敢伐歌詠之作甘棠之詩括地志邵伯廟在洛州夀安縣西北五里後人懐其德因立廟有棠在九曲城東阜上九域志召伯甘棠樹在陜州府署西南隅資治通鑑注陜州有甘棠驛以此得名耕餘讓畔空史記周紀西伯隂行善諸侯皆來决平於是虞芮有獄不能决乃如周入界耕者皆讓畔未見西伯皆慚潘岳西征賦耕讓畔以閒田霑姫化而生棘元和志平陸縣西六十五里即虞芮争田讓為閒田之所一統志平陸芮城二縣界有讓畔祠祀虞芮二君又平陸縣西五十里有閒田古蹟即二國相讓之地俗呼讓畔城鳴笳從此去唐書儀衞志大駕鹵簿鼓吹前部鐃鼓十二歌簫笳次之魏文帝與呉質書從者鳴笳以啟路文學托乗於後車行見洛陽宫唐書地理志東都隋置武徳四年廢貞觀六年號洛陽宫皇城曲折以象南宫垣名曰太微城宫城在皇城北象北辰武后號太初宫野次喜雪易旅即次廣韻三宿曰次晉書頋榮傳露營野次星言宿駕王勃詩征驂臨野次拂曙闢行宫庾信對燭賦蓮帳寒檠忩拂曙書闢四門蔡邕獨㫁天子自謂曰行在所巡狩天下所奏事處皆為宫左思呉都賦梁岷有行宫之基寒臯野望通離騷蘭臯注澤曲曰臯栁惲詩亭臯木葉下隴首秋雲飛曹植賦野蕭條而望極曠千里而無人繁雲低逺岫論衡初出為雲繁雲為翳謝恵連雪賦寒風積愁雲繁庾信詩隂雲歛向低呉均詩輕雲紉逺岫細雨沐单衣陳後主詩北宫瞻逺岫南服阻遙江飛雪舞長空楚辭増冰峨峨飛雪千里些謝朓詩飛雪天山來飄聚繩櫺外鮑照詩集君瑤臺上飛舞兩楹前世説謝太傅寒雪日内集與兒女講論文義俄而雪驟公欣然曰白雪紛紛何所似兄子胡兒曰撒䀋空中差可擬兄女道韞曰未若栁絮因風起呉均咏雪詩縈空如霧轉凝階似花積張正見詩同雲遙暎嶺瑞雪近浮空唐太宗詩夕霧結長空賦象恒依物謝恵連雪賦值物賦象任地班形又既因方而為珪亦遇圓而成壁縈迴屢逐風謝恵連雪賦末縈盈於帷席注縈盈迴委之貌曹植洛神賦飄颻兮若流風之迴雪王衡玩雪詩皎潔隨處滿流亂逐風迴為知勤恤意書上下勤恤左傳闔廬勤恤其民而與之勞逸國語先王非務武也勤恤民隱而除其害也先此示年豐左傳三時不害而民和年豐毛長詩傳豐年之冬必有積雪謝恵連雪賦盈尺則呈瑞於豐年又雪賛氣遍霜繁年豐積雪張正見詩九冬飄逺雪六出表豐年送賀知章舊唐書明皇紀天寶三載正月庚子遣左右相以下祖别賀知章於長樂坡上賦詩賜之又知章傳知章㑹稽永興人少以文詞知名舉進士累授工部侍郎兼秘書監充集賢院學士俄遷太子賔客銀青光禄大夫自號四明狂客又稱秘書外監天寶三載因病恍惚上疏請度為道士求還鄉里乃捨本鄉宅為觀上許之遺榮期入道張恊詠史詩達人知止足遺榮忽如無新書致道者以言入道者以忠積道者以信樹道者以人辭老竟抽簮左傳隨武子請老蔡邕陳太丘碑年已七十遂隱丘山懸車告老沈約侍宴樂遊苑詩將陪告成禮待此未抽簮庾信小園賦試偃息于茂林迺久羡於抽簮豈不惜賢達後漢書李固傳天地之心福謙忌盛是以賢達功遂身退全名養夀又黄憲傳太守王公在郡禮進賢達多所降致不能屈憲其如髙尚心易不事王侯髙尚其志謝靈運詩幽人常坦步髙尚邈難匹北齊書樊遜傳星干帝座不易髙尚之心月犯少微終存耿介之志寰中得秘要謝莊鸚鵡賦審國音於寰中李百藥詩聲教盡寰中後漢書方術傳任文公明曉天官風角秘要晉書韋謏傳雅要儒學善著述羣言秘要無不綜覽方外散幽襟莊子孔子曰彼游方之外者也而丘游方之内者也按彼謂孟子反子琴張晉書謝奕傳桓温辟為安西司馬曹植七啟雍容暇豫娯志方外鮑照舞鶴賦散幽襟以驗物偉胎化之僊禽唐太宗詩眺矚散靈襟獨有青門餞三輔黄圖長安城東出南頭第一門曰霸城門民見門色青名曰青城門或曰青門亦曰青綺門又霸橋在長安東漢人送客至此折栁贈别羣僚悵别深揚雄甘泉賦命羣僚歴吉日恊靈辰曹植樂府杯來一何遲羣僚以次行江淹别賦黯然銷魂者惟别而已矣軒遊宫十五夜軒遊宫不詳出處行邁離秦國詩行邁靡靡中心搖搖史記蘇秦列傳秦秦四塞之國被山帶渭又孔子世家孔子曰國雖小其志大巡方赴洛師易先王以省方觀民設教梁昇卿詩從來漢京盛未若此巡方書予惟乙夘朝至于洛師注洛師猶言京師也路逢三五夜潘尼詩道逢深識士舉手對吾揖梁元帝詩髙樓三五夜流影入丹墀劉孝綽詩明明三五月垂影當髙樹江總詩三五兔輝成浮雲冷復輕春色暗中期梁簡文帝詩春色映宫來庾信詩春色方盈野世説暗中摸索亦得闗外長河轉漢書武帝時楊僕征南越有功恥為闗外人元鼎三年冬徙函谷闗于新安以故闗為𢎞農庾信詩移住華隂下終為闗外人鮑照河清頌長河巨濟異源同清宫中淑氣遲出師表宫中府中梁元帝詩莫春多淑氣斜影落髙舂歌鐘對明月晉語鄭伯納女樂二八歌鐘二肆公賜魏綘女樂一八歌鐘一肆鮑照詩庭下列歌鐘陸機詩明月入我牗子夜四時歌明月照桂林不減舊遊時呉均詩不減汲長孺向秀思舊賦追思曩昔遊宴之好觀㧞河俗戯并序武平一景龍文館記中宗幸梨園命侍臣為抜河之戱以大麻絙兩頭繫十餘小索毎索數人執之以挽力弱為輸舊唐書薛存誠傳父勝能文嘗作㧞河賦詞致瀏亮為時所稱俗傳此戱必致年豐故命北軍以求嵗稔史記吕后紀太尉欲入北軍不得入襄平侯通持節矯内太尉北軍太尉遂將北軍唐六典南軍若今諸尉也北軍若今左右羽林也壯徒恒賈勇史記項羽紀壯士能復飲乎公羊傳秋八月壬午大閱大閱者何簡車徒也徐陵侯安都徳政碑率是驍徒仍開嶺嶠左傳欲勇者賈余餘勇隋書宇文慶傳從武帝攻河隂先登攀堞中石絶而復蘇帝勞之曰卿之餘勇可以賈人也㧞拒抵長河史記王翦傳問軍中戯乎對曰方投石超距注超一作㧞漢書甘延夀傳少善騎射為羽林投石㧞拒絶於等倫注㧞拒者有人連坐相把據地距以為堅而能㧞取之也今人猶有㧞𤓰之戱盖㧞拒之遺法呉都賦袒裼徒搏㧞距投石之部江淹尚書符索鐵㧞距孤視萬旅晉書孝武帝紀論西踰劍岫而跨靈山北振長河而臨清洛鮑照河清頌長河巨濟異源同清唐太宗詩春蒐馳駿骨總轡俯長河欲練英雄志禮記孟秋之月天子乃命將帥選士勵兵簡練傑俊魏志曹公法令既行士卒精練魏志武帝紀注劉備來奔或謂太祖曰備有英雄志人物志草之精秀者為英獸之㧞羣者為雄江淹為蕭太尉拜揚州牧章臣景能驗才無假外鏡撰已練志久惻内涯湏明勝負多孫子夫未戰而廟算勝者得算多也史記陳丞相世家有尾生孝己之行而無益於勝負之數晉書律歴志望敵知吉㓙聞聲效勝負百王不易之道也北史齊神武帝紀自東西魏搆兵鄴下毎先有黄黒螘陣闘占者以為黄者東魏戎衣色黒者西魏戎衣色人間以此候勝負譟齊山岌嶪周禮夏官大司馬中冬教大閲及所弊鼔皆駴車徒皆噪薛道衡詩笳聲喧隴水鼓曲噪漁陽孫子不動如山陳琳武帝賦八部方置山布星陳西京賦疏龍首以抗殿狀巍嵯以岌嶪説文岌嶪山髙貌或作嶫氣作水騰波左傳夫戰勇氣也一鼓作氣再而衰三而竭淮南子善用兵者勢如决積水于千仭之隄尉繚子勝兵似水張衡羽獵賦霧合雲集波流雨注木華海賦泱漭澹泞騰波赴勢鮑照書騰次觸天髙浪灌日預期年嵗稔易林膏我下土年嵗大茂又倉庫盈億年嵗有息啇人留連雖久有得後漢書明帝紀人無徭役嵗比登稔先此樂時和詩小序華黍時和嵗豐宜黍稷也禮記動已而天地應焉四時和焉爾雅四時和為通正謂之景風梁簡文帝南郊頌畫一之政萬代表于時和三章之律百姓沐于仁夀同劉晃喜雨節變寒初盡後漢書蔡邕傳邕姓至孝母常滯病三年邕自非寒暑節變未嘗觧襟帶江逌詩髙風催節變王胄樂府栁黄知節變草緑識春歸徐丘立春詩薄夜迎新節當鑪即晚寒張説詩嵗後寒初變春前芳未開唐太宗詩送寒餘雪盡太上隱者詩山中無歴日寒盡不知年時和嵗已春老子冲氣為和楚詞青春受謝白日昭春氣奮發萬物遽傅咸詩春敷和氣百鳥翔鳴梁元帝纂要孟春曰上春初春開春發春獻春首春繁雲先合寸庾信對雨詩繁雲猶暗嶺積雨未開庭謝恵連雪賦寒風積愁雲繁潘尼賦氣觸石而結蒸兮雲膚合而仰浮尚書太𫝊五岳觸石而出雲膚寸而合不崇朝而雨者惟㤗山雲乎注側手為膚按指為寸膏雨自依旬詩芃芃黍苗隂雨膏之左傳小國之仰大國也如百穀之仰膏雨廣韻十日曰旬鹽鐵論周公太平之時風不鳴條雨不破塊旬而一雨雨必以夜京房易候太平之時十日一雨尸子神農治天下欲雨則雨五日為行雨旬為榖雨旬五日為時雨颯颯飛平野楚辭風颯颯兮木蕭蕭鮑照喜雨詩族雲飛泉室劉孝標望雨詩飛雨入階廊梁簡文帝銘鬱鬱翠微遼遼平野霏霏静暗塵詩今我來思雨雪霏霏楚辭雲霏霏而承宇梁簡文帝賦得入階雨詩細雨階前入灑砌復沾帷何遜詩夜雨滴空階唐太宗冬狩詩騎歛原塵静九歌使凍雨兮灑塵懸知花葉意梁武陵王紀詩懸知意氣薄不著去時衣庾信詩懸知曲不悞無事畏周郎宋玉風賦邸華葉而振氣晉書嵇康等傳論一其原本體無為之用分其華葉開寓言之道史記好學深思心知其意朝夕望中新詩溫恭朝夕執事有恪又跂予望之隋煬帝望江南光景好輕彩望中斜梁元帝詩花新摘未舒陽縉詩青門小苑物華新千秋節賜羣臣鏡唐明皇帝實録帝以垂拱元年八月五日生於東都開元十七年八月癸亥宴百僚于花萼樓下左相乾曜右相説上表請以為千秋節著之甲令布之天下咸令宴樂羣臣以是日獻甘露醇酎上萬嵗夀酒王公戚里進金鏡綬帶士庶以結絲承露囊相遺問村社作夀酒宴樂増韻鏡鑑也鑄得千秋鏡軒轅内傳帝㑹王母鑄鏡十二隨日用之國史補揚州舊貢江心鏡五月五日揚子江心所鑄也光生百鍊金釋名鏡景也有光景也新語無膏澤而光潤生不刻畫而文章成晉書輿服志趙武靈王以金貂飾首以為金取剛强百鍊不耗貂内勁悍而外柔縟西京雜記戚姫以百鍊金為彄環照見指骨上以賜侍兒各四枚拾遺記方丈山有池泥色青百鍊成金分將賜羣后書分寶玉於伯叔之國時庸展親又乃日覲四岳羣牧班瑞于羣后傳后君也荀朂樂歌肆覲羣后爰及卿士後漢書儒林傳序坐明堂而朝羣后登靈臺以望雲物遇象見清心莊子至人之用心也若鏡不將不迎應而不藏庾信鏡賦鏡乃照膽照心難逢難值世説顧家婦清心玉暎自是閨房之秀臺上冰華澈鄴中記西臺高六十七丈上作銅鳯忩皆銅籠疏雲母幌庾信燈賦巻衣秦后之牀送枕荆臺之上傅休奕大寒賦百川明而不流兮冰凍合於四海劉勰新論火不吹則無外耀之光鏡不瑩必闕内影之照故吹成火之光瑩為鏡之華忩中月影臨鮑照詩忩中多佳人謝朓詩忩中列逺岫庭際俯喬林洞㝠記帝於望鵠䑓西起俯月臺臺下穿池登臺以眺月影入池中使宫人乗舟弄月影因名影娥池梁元帝望江中月影詩澄江涵皓月水影若浮天更銜長綬帶唐書車服志以雕銜綬帶謂其行列有序也漢武内傳西王母交帶靈飛綬漢官儀綬長一丈二尺法十二月廣三尺法天地人也留意感人深戰國䇿故敢獻書以聞唯君王之留意焉韓詩外傳子夏曰實之與實如膠如漆虚之與虚如冰見日君子可不留意哉漢書藝文志游文於六經之中留意於仁義之際禮記樂也者聖人之所樂也而可以善民心其感人深其移風易俗故先王著其教焉送趙法師還蜀因名山奠簡唐六典道士有三號其一曰法師唐詩紀事趙法師觀宇在今蜀州新津縣史記封禪書天子祭天下名山大川諸侯祭其疆内名山大川詩上下奠瘞疏奠謂置之于地瘞謂埋之于土蔡邕獨斷䇿者簡也其制長二尺短者半之釋名簡間也編之篇篇有間也劉義公詩金牒封梁父玉簡禅太山道家奠靈簡史記禮書孝文好道家之學山海經􅣊山實生良玉黄帝取􅣊山之䇿投之鐘山之隂雲笈七籖軒轅黄帝以所佩靈寶五符真文書金簡一通封於鍾山一通藏於宛委之山史記封禪書㤗山封廣丈二尺髙九尺其下則有玉牒書書秘桓譚新論修封㤗山瘞玉太宗注凡封山則埋玉自昔仰神仙詩自古在昔漢書郊祀志燕齊方士言有神仙祭祀致福之術者以萬數天隱子在人曰人仙在天曰天仙在地曰地仙在水曰水仙能變通曰神仙真子今將命漢書藝文志神仙者所以保性命之真而遊方於外者也真誥夫得為真人者事事皆盡得真也徐陵碑法王真子論語闕黨童子將命沈佺期詩古今貴將命蒼生福可傳書帝光天之下至於海隅蒼生通鑑開元十三年明皇帝封泰山帝問禮部侍即賀知章曰前代玉牒之文何故秘之對曰或宻求神仙故不欲人見帝曰吾為蒼生祈福耳乃出玉牒宣示羣臣唐樂章聆愾息僾周旋九韶遍百福傳江山尋故國蔡邕任巴郡太守謝表巴土長逺江山脩隔華陽國志蜀之為邦天文井絡輝其上地理岷嶓鎮其域五岳華山表其陽四凟汶江出其徼顔延之詩故國多喬木空城凝寒雲城郭信依然釋名城盛也盛受國都也郭廓也廓落在城外也搜神記有白鶴集於遼東華表言曰有鳥有鳥丁令威去家千嵗今來歸城郭如故人民非列仙傳蘇耽仙去後有白鶴十數隻集郡東門樓上一隻以口書字曰城郭是人民非三百甲子當復歸咸謂是耽南史沈文季傳依然猶有故情二室遙相望一統志逍遙山在成都府簡縣西三十里山北有層崖崖有東西二室西室後有丹竈又有石窟揚雄河東賦登六觀而遙望兮聊浮游以經營水經注山堂水殿煙寺相望雲囘洞裏天水經注方嶺雲囘竒峯霞舉張恊七命翕忽揮霍雲囘風行茅君内傳洞天三十六所乃真仙所居宋之問詩人隔壺丘地龍游洞裏天幸蜀西至劍門唐書明皇紀天寶十七載七月庚辰次蜀都又地理志劍南道劍州普安郡縣劍門寰宇記劍州劍門縣諸葛武侯相蜀於此立劍門以大劍山至此有隘束之路故曰劍門一統志大劍山在劍州北二十五里一名梁山山海經髙梁之山西接岷崌東引荆衡劉儀鳯劍閣記云梁山之險蜀所恃以為外户即此其山峭壁中斷兩崖相嶔如門之闢如劍之植故又名劍門山劍閣横雲峻水經注小劍戍北去大劍三十里連山絶險飛閣相通故謂之劍閣也左思蜀都賦縁以劍閣阻以石門注劍閣谷名自蜀通漢中道一由此背有閣道在梓潼郡東北郭璞賛華嶽雲峻削成四方沈約銘表峻蒼雲張載劍閣銘窮地之險極路之峻鑾輿出狩迴班固西都賦乗鑾輿備法駕書五載一巡守詩東有甫草駕言行狩顔延之詩虞風載帝狩夏諺頌王遊翠屏千仭合盧山後録清輝閣對廬阜如青天翠屏孫綽遊天台山賦踐莓苔之滑石摶壁立之翠屏列子周穆王築中天之臺其髙千仞枚乗七發上有千仭之峯劍閣銘壁立千仭丹嶂五丁開水經注石路崎嶇巖嶂峻嶮沈約鍾山詩鬱律構丹巘崚嶒起青嶂華陽國志蜀有五丁力士能移山秦恵王作石牛五頭朝㵼金其後曰牛便金蜀人悦之使使請石牛王許之乃遣五丁迎石牛秦從石牛道伐蜀灌木縈旗轉詩集于灌木左思詩何事待嘯歌灌木自悲吟謝靈運山居賦灌木森沉以䝉茂梁簡文帝七勵丹旌風轉碧幔雲移仙雲拂馬來蕭詮詩别有仙雲起時向楚王宫張融海賦通雲交拂連韻共風庾信詩雲低馬上人梁元帝詩拂馬似塵飛陳後主詩髻影雜雲來乗時方在徳呉越春秋湯武乗四時之利而制夏殷史記呉起傳魏武侯浮西河而下中流顧而謂呉起曰美哉乎山河之固此魏國之寶也起對曰在徳不在險劍閣銘興實在徳險亦難恃嗟爾勒銘才晉書張載傳載博學有文章太康初至蜀省父道經劍閣載以蜀人恃險好亂因著銘以作誡益州刺史張敏見而竒之表上其文武帝遣使鐫之於劍閣焉劍閣銘勒銘山阿敢告梁益同玉真公主過大哥山池唐書中宗八女傳玉真公主字持盈封崇昌縣主髙宗孫睿宗女弟張九齡勅賜寧王池宴詩序開元三年春上幸寧王第叙家人禮上曰大哥作好主人阿瞞但謹為上客舊唐書讓皇帝憲傳憲於勝業坊東南角賜宅明皇於興慶宫西南置樓題曰花萼相輝之樓時登樓聞音樂聲即召升樓同榻宴謔或便幸其第賜金分帛厚其歡賞地有招賢處史記燕世家燕昭王卑身厚幣以招賢者漢書梁孝王傳孝王築東苑方三百里招延四方豪傑劉潜詩尚識招賢閣猶懐愛士風人傳樂善名後漢書東平王蒼傳王朝京師月餘還國帝手詔國中傳曰日者問東平王處家何等最樂王言為善最樂其言甚大副是腰腹矣沈烱始興昭烈王碑東平之樂善陳思之麗藻禮記夫䕫達於樂而不達於禮是以傳於此名也鶩池尋九達王筠詩春生鴈鶩池爾雅一達謂之道路二達謂之岐旁三達謂之劇旁四逹為之衢五達謂之康六達謂之莊七達謂之劇驂八達謂之崇期九達謂之逵水經注通逵九達龍岫對層城西京雜記梁孝王好宫室苑囿之樂築兔園有落猿石棲龍岫淮南子崑崙山有層城九重世説遙望層城丹樓如綺桂月先秋冷虞喜安天論月中仙人桂樹今視其初生見仙人之足漸已成形江總七夕詩漢曲天榆冷河邊月桂秋庾信文桂月危懸風泉虗韻又黄帝見廣成子賛疎雲即雨落木先秋顔延之詩秋至恒早寒蘋風向晚清宋玉風賦夫風生於地起於青蘋之末梁昭明太子詩霏雲出翠嶺凉風起青蘋隂鏗詩向晚判勝朝宋文帝詩林下夕風清梁簡文帝詩帷風依夜清鳯樓遙可見晉宫閣名洛陽有鳯凰樓總章觀儀鳯樓在觀上觀之南别有翔鳯樓顧野王詩鳯樓臨廣陌江淹詩鳯樓簫管開庾信詩中天遙可望終䫫仰鵾絃彷彿玉簫聲司馬相如子虚賦𦕈𦕈忽忽若神仙之彷彿列仙傳蕭史秦穆公時人善吹簫公以女弄玉妻之乃教弄玉吹簫作鳯鳴有鳯凰來止其屋夫妻同鳯凰飛去秦人作鳯女祠於雍宫世有簫聲李百藥笙賦挫玉簫之清管庾信玉帳山銘長聞鳯笛永聽簫聲鮑照升天行鳯臺無還駕簫管有遺聲御選唐詩巻十
