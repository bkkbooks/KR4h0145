枝新詞九章由是盛於貞元元和之間禹錫曰竹枝巴歈也巴兒聫歌吹短笛擊鼓以赴節歌者揚袂睢舞其音協黄鐘羽連檣估客吹羌笛郭璞江賦舳艫相屬萬里連檣何遜詩連檣入迴浦世説袁虎少貧甞為人傭載運租謝鎮西經船行其夜清風朗月聞江渚間估客船上有詠詩聲甚有情致因此相要大相賞得梁元帝詩謾道江中無估客風俗通笛長二尺四寸七孔其後又有羌笛説文笛七孔角也羌笛三孔馬融長笛賦近世雙笛従羌起羌人伐笛未及已龍鳴水中不見已截竹吹之聲相似王昌齡從軍行更吹羌笛闗山月勢髙夜久陰力全杜甫詩千崖秋氣髙梁簡文帝詩夜久惟煩鋏李白詩天寒悲風生夜久衆星沒謝恵連詩夕陰結空幕劉鑠詩廣簷含夜隂金氣肅肅開星躔梁簡文帝倡婦怨情金氣落嚴霜李白詩蓐收肅金氣詩肅肅宵征王粲詩肅肅秋風梁武帝閶闔篇鳳跡輾星躔杜審言詩東壁挂星躔浮雲野馬歸四裔江淹詩日暮浮雲滋莊子野馬也塵埃也生物之以息相吹也庶物異名䟽野馬日光一曰浮絲水氣也龍樹大士曰日光著微塵風吹之野中轉名為陽燄愚夫見之謂之野馬丘遲詩野馬雜塵埃左傳投諸四裔潘尼火賦流光燭乎四裔遥望星斗當中天杜甫詩秀氣衝星斗七命窮地而遊中天而居曺植詩迎風髙中天天雞相呼曙霞出爾雅鶾天雞謝靈運詩天雞弄和風𤣥中記桃都山有大樹曰桃都枝相去三千里上有天雞日初出即照此木天雞即鳴天下雞皆隨之劉孝威詩氄毛不自暖張翼强相呼沈佺期詩北闕彤雲掩曙霞杜審言詩雲霞出海曙斂影含光讓朝日江淹表斂影無地潘岳賦月朣朧以含光兮霞淒清以凝冷王褒詩人傳陌上桑未曉已含光阮籍詩五色曜朝日嘉賔四面會日出喧喧人不閒莊子許由曰日月出矣而爝火不息其於光也不亦難乎徐陵長安道詩喧喧擁車騎非但執金吾九歌期不信兮告余以不閒曺植詩志士營世業小人亦不閒夜來清景非人間曺植詩明月澄清景列宿正參差杜甫詩彌年逐清景史記留侯世家願棄人間事従赤松子遊耳李白詩别有天地非人間西山蘭若試茶歌爾雅檟苦茶注樹小如梔子冬生葉可煮作羮飲今呼早採者為茶晚取者為茗一名荈山僧後檐茶數叢庾信詩野老時相訪山僧或見尋江淹麗色賦後檐丹葵前軒碧桐春來暎竹抽新茸杜甫詩冬至陽生春又來謝靈運山居賦淵轉渚而散芳岸靡沙而暎竹杜甫詩美花多暎竹李白詩庭草滋新茸宛然為客振衣起史記孟嘗君傳馮驩曰所以求息者為無以待客也左思詩振衣千仞岡韋應物詩永日獨無言忽覺振衣起自傍芳叢摘鷹觜謝朓詩芙蕖舞輕帶苞笋出芳叢茶譜蜀州晉原洞口有黄芽雀舌鳥觜麥顆葢取其嫩芽所造斯須炒成滿室香禮記禮樂不可斯須去身茶經茶有七難陰采夜焙非造也外熟内生非炙也論衡君子言堂滿堂言室滿室洞㝠記春蕪一根百條握一片滿室皆香庾信文玉生庭照蘭開室香便酌砌下金沙水南史陸慧曉傳劉璡曰吾聞張融與慧曉並宅其間有水此必有異味故命駕往酌而飲之江淹書鳥赴簷上水匝砌下宋之問詩寳葉交香雨金沙吐結泉名勝志湖州長興縣顧渚山有泉在沙中號金沙泉泉不常出惟将造茶太守具儀致祭水即清溢供御者畢水即微減供堂者畢即半減太守造畢即涸驟雨松聲入鼎來老子驟雨不終日杜審言詩江聲連驟雨高唐賦不見其底虚聞松聲杜甫詩入鼎資過熱加餐愁欲無白雲滿盌花徘徊詩英英白雲庾信詩同心竹葉盌雙去雙來滿茶經凡酌置諸盌令沫餑湯之華也華之薄者曰沫厚者曰餑細輕者曰華張說詞影弄日華相照曜噴含雲色且徘徊悠揚噴鼻宿酲散錢起詩世事悠揚春夢裏梁武帝净業賦香氣馞起觸鼻發識婉娩追隨氤氳無極急就篇侍酒行觴宿昔酲風賦清清泠泠愈病析酲清峭徹骨煩襟開江淹蓮花賦或憑天淵之清峭或殖疏圃之䝉宻陳琳賦通肌暢骨顔真卿啜茶詩流華浄肌骨疏㵸滌心源沈約詩開襟濯寒水解帶臨清風杜甫詩秀氣豁煩襟陽崖陰嶺各殊氣謝靈運詩朝旦發陽崖景落憩北峯茶經陽崖陰林紫者上緑者次祖詠詩終南陰嶺秀積雪浮雲端杜甫詩要求陽岡暖若陟陰嶺沍莊子四時殊氣天不私故嵗成未若竹下莓苔地宋書謝靈運傳採石上之地黄摘竹下之天門孟浩然詩相攜竹林下杜甫詩興移無洒掃隨意坐莓苔炎帝雖甞未解煎新語神農嘗百草實察酸苦味淮南子古者民茹草飲水神農始嘗百草滋味水泉之甘苦民知所避就唐書藝文志張又新煎茶水記二十卷桐君有籙那知味方輿勝覽桐君山在巖州有人採藥結廬桐木下指桐為姓故山得名名勝志桐君在黄帝時嘗與巫咸同處方餌有藥籙一巻庾肩吾答賚煎术啓山精見書華神在籙新芽連拳半未舒梁簡文帝詩照日吐新芽庾信春賦新芽竹笋細核楊梅張融瓦松賦葩條郁毓根柢連拳梁元帝詩牆髙舉不及花新摘未舒自摘至煎俄頃餘杜甫詩自鋤稀菜甲小摘為情親儲光羲詩俄頃變炎凉木蘭霑露香微似楚辭朝搴阰之木蘭兮夕攬洲之宿莽沈約詩因風結復解霑露柔且長述異記巴東有真香茗其花白色如薔薇煎服令人不眠能誦無忘瑤草臨波色不如東方朔與友人書脱去十洲三島相與拾瑤草呑日月光華共輕舉耳儲光羲詩門帶江山静房隨瑤草幽唐太宗詩臨波無定影僧言靈味宜幽寂韋應物詩此物信靈味本自出山原杜甫詩郊扉俗逺長幽寂采采翹英為嘉客詩采采巻耳郭璞詩碧樹疏英翹陳子昻詩崑崙有瑤樹安得采其英詩我有嘉客何遜詩日暮留嘉客不辭緘封寄郡齋漢書殿中廬有索數千枚滿一篋緘封李端詩論詩到郡齋韋應物詩今朝郡齋冷忽憶山中客甎井銅爐損標格風俗通甃聚甎修井也梁山記諸葛亮宅有井深四尺餘廣一尺五寸累甎如初開古詩請説銅爐器崔嵬象南山茶經風爐以銅鐵鑄如古鼎形杜甫詩早年見標格秀氣冲牛斗何況蒙山顧渚春茶譜蜀之雅州有䝉山山有五頂各有茶園其中頂曰上清峯茶最難得俟雷發聲採之服四兩即為地仙矣李肇國史補劒南有蒙頂石花湖州有顧渚赤筍一統志顧渚在湖州府長興縣西北三十里昔吴王夫㮣顧其渚次原隰平衍可為都邑即此名勝志旁有二山相對號明月峽絶壁峭立大澗中流亂石飛走産茶異品唐書陸龜䝉傳龜蒙嗜茶置園顧渚山下嵗取租茶自判品第白泥赤印走風塵大戴禮白沙在泥與之俱黒漢書武帝賛芝泥印上玉檢封來雲笈七籖佩朱宫之印乘赤龍之車班固荅賔戲彼皆躡風塵之㑹杜甫詩驊騮開道路鷹隼出風塵欲知花乳清泠味茶譜婺州有舉巖茶味極甘芳煎之如碧玊之乳王勃遊廟山賦俯泉石之清泠臨風飈之瑟䫻張載詩芳茶冠六清溢味播九區須是眠雲跂石人王季友詩聞我草堂有臥雲上官昭容詩跂石聊長嘯攀松乍短歌張籍賈客樂唐書西域傳貿遷有無商賈樂也又禮樂志隋亡清樂散缺存者纔六十三曲其後傳者賈客樂齊武帝作也金陵向西賈客多六朝事跡秦始皇東巡㑹稽秣陵因鑿鍾山㫁金陵以疏淮唐書地理志江南道昇州縣上元望本江寧武徳三年改江寧曰歸化八年更歸化曰金陵大唐新語𤣥裝法師西域取經手摩寺松曰吾西去汝可西向若歸即東向及去果向西一年忽向東弟子曰吾師歸矣王昌齡詩武岡前路看斜月片片舟中雲向西南史齊臨川王暎傳嘗致錢還都買物有獻計者於江陵買貨至都還換可以有増暎笑曰我是賈客耶乃復求利宋書孔顗傳弟道存従弟微請假東還輜重十餘船顗謂曰汝輩預士流何至作賈客耶命取火燒之漢書貨殖傳稼穡之民少商旅之民多船中生長樂風波左傳獲百里孟明視西乞術白乙丙以歸文嬴請三帥公許之先軫朝問秦囚公使陽處父追之及諸河則在舟中矣賈誼陳政事疏習與正人居之不能無不正猶生長於齊不能不齊言也後漢書梁竦傳竦生長京師不樂本土屈原九章順風波以従流兮焉洋洋而為客史記東越王傳東越王餘善上書靖以卒八千人擊吕嘉兵至掲陽以海風波為解欲發移船近江口杜甫詩負鹽出井此溪女打鼔發船何郡郎又移船先主廟洗藥浣花溪晉書陶回傳蘇峻之亂回與孔坦言於導請早出兵守江口船頭祭神各澆酒杜甫詩風急打船頭周語不禋於神而求福焉神必禍之論語祭如在祭神如神在周禮天官甸師共蕭茅注束茅立之祭前沃酒其上酒滲下去若神飲之也停杯共説逺行期魏文帝秋胡行嘉肴不嘗㫖酒停杯庾信詩停杯待菊花宋玉九辨憭慄兮若在逺行登山臨水兮送将歸杜甫詩九州道路無豺虎逺行不勞吉日出左傳楚子成章華之臺願與諸侯落之薳啟彊來石公曰君若舉玉趾辱見寡君寡君既受貺矣君若不來使臣請問行期入蜀經蠻誰别離後漢書公孫述傳岑延田戎為漢兵所敗皆已入蜀書惟克商遂通道於九夷八蠻禮記南方曰蠻雕題交趾有不火食者矣按誰别離一作逺别離屈原九歌悲莫悲兮生别離樂莫樂兮新相知杜甫詩愁來賦别離金多衆中為上客史記蘇秦傳嫂蛇行蒲伏以面掩地而謝曰見季子位髙金多也又陳丞相世家灌嬰等讒平曰臣聞平受諸将金金多者得善處金少者得惡處金剛經時長老須菩提在大衆中即従座起偏袒右肩右膝著地合掌恭敬而白佛言史記晏嬰傳越石父賢在縲紲中晏子解左驂贖之延入為上客又平原君傳毛先生以三寸之舌强於百萬之師勝不敢復相士遂以為上客夜夜筭緡眠獨遲梁元帝閨怨塵鏡朝朝掩寒衾夜夜空世説王戎手執牙籌日夜㑹計漢書武帝紀四年冬初算緡錢注有儲積錢者計其緡貫而税之十錢出税二十杜甫詩帝念深分閫軍需逺算緡裴説詩光寒鶴睡遲秋江初月猩猩語杜甫詩魚龍寂寞秋江冷故國平居有所思何遜七召暎景星於初月聆鳳音於将曉江總詩點黛方初月縫裙學石榴禮記猩猩能言不離禽獸疏猩猩人面豕身能言朝野僉載安南武平縣封溪中有猩猩如美人解人語知往事孤帆夜宿瀟湘渚梁簡文帝與劉孝綽詩夕鳥歸林懸孤帆而未息陳子昂詩古木生雲際孤帆出霧中岑參詩夜宿劒門月朝行巴水雲杜甫詩相逢成夜宿隴月向人圎謝朓詩洞庭張樂地瀟湘帝子遊王僧孺詩始出鳳凰樓言發瀟湘渚水工持楫防暗灘左思呉都賦篙工楫師選自閩隅列女傳趙簡子擊楚津吏醉卧不能渡簡子欲殺之津吏女子持楫而前曰妾願以鄙軀易父之命簡子将渡少一人乃備員持楫中流發激櫂之歌簡子説以為夫人岑參詩暎酒見山火隔簾聞夜灘直過山邊及前侣王羲之筆陣圖若急作意思淺薄筆即直過張正見詩菊汎金枝下峯斷玉山前江淹詩解纜候前侣何遜詩送别臨曲渚征人慕前侣年年逐利西復東劉庭芝詩年年嵗嵗花相似嵗嵗年年人不同漢書賈誼傳逐利不耳慮非顧行也楊惲報孫㑹宗書惲幸有餘祿方糴賤販貴逐什一之利詩自西徂東靡所定處庾肩吾詩眷然從此去車西馬復東姓名不在縣籍中史記項羽紀書足以記名姓而已不足學又留侯世家良乃變名姓亡匿下邳魏志崔琰傳太祖領冀州辟琰為别駕謂曰昨按户籍可得三十萬衆故為大州也農夫税多長辛苦詩采荼薪樗食我農夫禮記諸侯之下士視上農夫商子禄厚而税多食口衆者敗農者也史記呉太伯世家越王句踐棲於㑹稽因太宰嚭而行成王将許之伍子胥諫曰句踐為人能辛苦今不滅後必悔之蔡琰胡笳十八拍一生辛苦兮縁離别棄業長為販寳翁韋曜博奕論今世之人多不務經術好玩博奕廢事棄業忘寢與食按長為一作寧為易林日中為市交易資寳名利取有心悦以喜御選唐詩卷九補編
