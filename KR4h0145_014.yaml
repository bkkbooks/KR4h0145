body:
  text: 欽定四庫全書御選唐詩卷九補編賀知章望人家桃李花山源夜雨度仙家穆天子傳因山源之規矩覩河嶽之盤曲鹽鐵論太平之時旬而一雨雨必以夜顧野王樂府夕臺行雨度十洲記元洲有五芝𤣥澗上多仙家朝發東園桃李花謝莊懷園引夭桃晨暮發陶潛詩青松在東園詩何彼穠矣華如桃李桃花紅兮李花白謝靈運詩山桃發紅萼梁簡文帝詩桃花紅若點又桃紅李白若朝粧照灼城隅復南陌沈約詠桃詩紅英已照灼況復含日光詩静女其姝俟我于城隅張正見詩城隅上朝日沈君攸詩南陌落花移顧野王詩東隅麗春日南陌采桑時南陌青樓十二重陳後主詩春樓梳髻罷南陌競相隨曹植美女篇青樓臨大路高門結重闗劉孝綽詩紆餘出紫陌迤邐度青樓王融詩金城十二重春風桃李為誰容沈約詩容儀既昭灼春風復迴薄江總詩桃李佳人欲相照詩誰適為容蘇蕙迴文詩葩粉光為誰容棄置千金輕不顧魏文帝詩棄置勿復陳曹植文飢者不顧千金而美一餐庾信詩一顧重尺璧千金輕一言踟躇五馬謝相逢江淹詩銜思久踟躇古樂府使君従南來五馬立踟躇潘子真詩話天子六馬左右驂三公九卿駟馬左驂漢制九卿則二千石亦右驂太守駟馬而已其有加秩中二千石乃右驂故以五馬為太守美稱遯齋閒覽云漢時朝臣出使為太守増一馬故曰五馬古詩相逢狹路間費㫤詩相逢莫相難徒言南國容華晚鮑照蕪城賦東都妙姬南國麗人阮籍詩南國有佳人容華若桃李張華感㛰賦榮華外豐心神内正遂歎西家飄落逺淮南子東家謂之西家西家謂之東家宋之問詩來止妾西家謝靈運賦林乗風而飄落江淹序泣蕙草之飄落的皪長奉明光殿司馬相如上林賦明月珠子的皪江靡師古注的皪光也左思賦丹藕凌波而的皪晉書恵帝紀長奉先皇之制是以有永熙之號漢官儀漢尚書奏事於明光殿三輔黄圖桂宫在未央北中有明光殿氛氳半入披香苑沈約詩氛氳桃李花青跗含素萼沈君攸詩金户半入叢林影三輔黄圖武帝時後宫八區有昭陽披香等殿苑中珍木元自竒庾信春賦宜春苑中春已歸梁簡文帝梅花賦層城之宫靈苑之中竒木萬品庶草千叢劉楨公讌詩月出照園中珍木鬱蒼蒼洛陽伽藍記高陽寺芳草如積珍木連陰黄金作葉白銀枝西京雜記初修上林苑羣臣逺方各獻名果異樹有金葉梨白銀樹千年萬嵗不凋落徐陵碑海水揚塵㡬千年而可見天衣拂石㡬萬嵗而應平詩如松栢之茂疏如松栢之葉新故相承代常無凋落還将桃李更相宜梁簡文帝詩春風本自竒楊栁最相宜桃李従來露井傍古樂府桃生露井上李生桃樹傍梁簡文帝初桃詩飛花入露井江縂詠李詩當知露井傍復與夭桃鄰成蹊結影矜艷陽史記李廣傳桃李不言下自成蹊孔紹安夭桃詩結葉還臨影飛香欲舞空鮑照詩艷陽桃李節莫道春花不可遇蘇武詩努力愛春花阮籍詩灼灼春花綠葉含丹㑹持仙實薦君王漢武帝内傳七月七日王母至自設天厨人命侍女更索桃果須㬰以玉盤盛仙桃七顆以呈王母母以四顆與帝三顆自食母曰此桃三千年一生實中夏地薄種之不生王維送崔五太守長安廏吏來到門漢書地理志京兆尹縣長安又朱買臣傳長安廏吏乗駟馬車來迎買臣遂乘傳去後漢書桓榮傳帝幸其家問起居入街下車擁經而前自是諸侯将軍大夫問疾者不敢復乗車到門朱文露網動行軒後漢書晨門有抱闗之夫柱下無朱文之軫許敬宗詩玉露交珠網傅咸詩煌煌朱軒服驥驂騄黄花縣西九折坂舊唐書地理志黄花武徳四年分梁泉縣置以川為名南史王文殊立小屋於縣西端拱其中漢書王尊傳瑯琊王陽為益州刺史行部至卭倈九折坂歎曰奉先人遺體柰何數乗此險後以病去郭璞文卭徠峻嶮其坂九折玉樹宫南五丈原庾信啟甘泉宫裏玉樹一叢陳後主樂府玉樹流光照後庭蜀志諸葛亮傳亮悉大衆由斜谷出以流馬運據武功五丈原襃斜谷中不容幰史記河渠書張湯言抵蜀從故道故道多阪回逺今穿襃斜道少阪近四百里而襃水通沔斜水通渭皆可以行船漕天子以為然拜湯子卬為漢中守發數萬人作襃斜道五百餘里梁州記萬石城泝漢上七里有谷南口曰襃北口曰斜張說詩眇眇葭萌道蒼蒼襃斜谷庾肩吾詩長安有曲陌曲陌不容幰惟有白雲當露冕陶𢎞景詩隴上多白雲謝靈運詩巖髙白雲屯華陽國志郭賀為荆州刺史有殊政明帝賜三公服勅行部去襜露冕使百姓見之以彰有徳庾信文露冕觀風停車待雨子午山裏杜鵑啼蜀志魏延傳注直従襃中北出循秦嶺而東當子午而不過十日可到長安三秦記長安正南山名秦嶺谷名子午王康琚詩絶迹窮山裏成都記望帝化為鳥名曰杜鵑亦曰子規沈佺期詩清夜子規啼嘉陵水頭行客飯漢書地理志武都郡縣嘉陵通典嶓冢山西漢水所出經嘉陵曰嘉陵江卓文君白頭吟今日斗酒會明旦溝水頭鮑照詩居人掩閨臥行子夜中飯劒門忽斷蜀川開寰宇記劒州劒門縣諸葛武侯相蜀於此立劒門以大劒山至此有隘束之路故曰劒門張說詩山将闕門斷舊唐書畢構傳孤潔獨行有古人之風自臨蜀川弊化頓易萬井雙流滿眼來漢書刑法志提封萬井蜀都賦帶二江之雙流杭峩睂之重阻謝靈運賦四山周迴雙流逶迤南史顔延之傳鮑照曰君詩若鋪錦列繡雕繪滿眼霧中逺樹刀州出謝朓詩逺樹曖芊芊何遜詩天邊看逺樹晉書王濬傳濬夜夢懸三刀於臥屋梁上須臾又益一刀濬驚覺意甚惡之主簿李毅賀曰三刀為州又益一者明府其臨益州乎果遷益州刺史天際澄江巴字回揚雄交州牧箴交州荒翳水與天際隂鏗詩天際晚帆過謝朓詩澄江浄如練元和郡縣志渝州古巴國閬白二水曲折如巴字故謂之巴宋之問詩巴宇水形連使君年紀三十餘古樂府使君従南來五馬立踟蹰謝靈運山居賦爰暨山棲彌歴年紀禮記三十曰壯樂府陌上桑三十侍中郎黄庭經夀傳萬嵗年有餘少年白晳専城居漢書霍光傳光為人白晳疏眉美鬚髯左思詩皎皎頗白晳樂府陌上桑四十專城居梁簡文帝詩徒勞交甫佩自有専城居欲持畫省郎官筆楊修荅陳思王書又甞見執事握牘持筆有所造作若成誦在心借書於手漢官典職尚書省皆以粉壁畫古賢列士曰畫省南史王韶之傳晉自孝武以來以省官一人管詔誥位兩省謂之西省郎後漢書明帝紀郎官上應列宿漢官儀尚書郎日賜赤管大筆一雙回與臨卭父老書漢書司馬相如傳文君謂長卿曰苐俱如臨卭李嶠詩劒閣抵臨卭相如難蜀父老注相如使蜀多言西南夷不為國用大臣亦以為然相如乃假蜀父老為辭為己難杜甫古栢行孔明廟前有老柏書杶榦栝柏杜詩原注此䕫州諸葛廟柏即䕫州十絶句所云武侯祠堂不可忘中有松柏參天長也柯如青銅根如石鍾㑹賦青柯紅芒梁簡文帝賦銅芝抱帶復纒柯唐書員半千稱張鷟文猶青銅錢萬選萬中老子落落如石任昉述異記盧氏縣有盧君冢冢傍柏二株根勁如銅石霜皮溜雨四十圍世説松柏之質經霜彌茂庾肩吾詩圗雲仍溜雨新論十圍之木不可葢以茅茨劉琨扶風歌上枝拂青雲中心數十圍黛色參天二千尺何遜照水聨句臨橋看黛色江淹竹賦黛色參天曹植升天行蘭桂上參天詩徂徠之松新甫之柏是㫁是度是尋是尺君臣已與時際會禮記君臣也易與時偕行張衡同聲歌邂逅承際會何遜文昔逢際㑹忝申名質樹木猶為人愛惜四皓采芝歌樹木莫莫焦仲卿妻詩寒風摧樹木左傳思其人猶愛其樹況用其道而不恤其人乎四子講徳論龎眉耆耉之老咸愛惜朝夕願濟須臾雲來氣接巫峽長蕭懿詩雲來覺山近水經注帝使鼈令鑿巫峽通水蜀得陸處郭璞江賦衝巫峽以迅激宜都山川記巴東三峽巫峽長月出寒通雪山白詩月出皎兮鮑照詩蕭蕭霜月寒庾信銘風髙月寒後漢書班超傳注西域有白山通嵗有雪亦名雪山劉峻廣絶交論曽史蘭薰雪白憶昨路繞錦城東孫萬夀詩夢想猶如昨梁宣帝賦望途山而斜繞元和郡縣志錦城在成都縣南十里故錦官城也錦繡萬花谷成都府城亦呼為錦官城先主武侯同閟宫寰宇記先主廟在成都府西八里恵陵東七十步武侯祠在先主廟西成都記先主廟西院即武侯廟廟前有雙大柏古峭可愛人云諸葛手植詩閟宫有侐傳閟閉也崔嵬枝榦郊原古詩陟彼崔嵬四皓採芝􅋵髙山崔嵬世説孫綽曰條柯猗蔚枝榦扶疎魏徴栢樹賦枝榦扶疎不過數尺蕭子範詩郊原共超逺庾信賦池平樹古窈窕丹青户牖空詩正義所居之宫形状窈窕魯靈光殿賦旋室㛹娟以窈窕司馬相如傳其土則丹青赭堊揚子如玉如瑩爰變丹青鮑照詩開軒當户牖落落盤踞雖得地漢兩頭纎纎詩磊磊落落桃初結天台山賦蔭落落之長松西京雜記中山王文木賦或如龍盤虎踞沈約賦鬱彼髙松棲根得地㝠㝠孤髙多烈風漢書司馬遷傳迺合大道混混㝠㝠莊子昭昭生於冥㝠顔延之詩回颷卷髙樹書烈風雷雨弗迷陸機豪士賦序欲隕之葉無所借烈風扶持自是神明力天台山賦實神明之所扶持崔駰杖銘王母扶持永保百福陶潛詩神力既殊妙傾河焉足有正直原因造化功書平康正直詩正直是與莊子受命於功地惟松柏獨也正王羲之詩大矣造化大厦如傾要梁棟文中子大廈之傾非一木所支晉書袁粲見王儉而歎曰栝柏豫章雖小已有棟梁之器又和嶠傳庾顗見而歎之曰嶠森森如千丈松施之大廈有棟梁之用萬牛回首丘山重杜預水災疏所留好種萬頭按此萬牛所本司馬相如封禪丈回首面内唐太宗詩回首長安道淮南子止如丘山史記張儀傳積粟如丘山江淹文忝爵山重不露文章世已驚白虎通諫而不露文木賦既剥既刋見其文章楚辭青黄雜糅文章爛兮莊子適適然驚未辭剪伐誰能送詩蔽芾甘棠勿翦勿伐古詩誰能别離此南史齊武帝紀令僕以下並不輸送苦心豈免容螻蟻陸機詩志士多苦心莊子東郭子問莊子曰道何在曰在螻蟻郭璞賦屬莫賤於螻蟻香葉曽經宿鸞鳳史記武帝紀注柏梁臺髙二十丈用香柏為殿梁本草柏葉可服食元旦以之侵酒辟邪焦氏易林枝葉盛茂鸞鳳以庇阮籍詩鸞鷖時棲宿後漢書仇覽傳目為鷹鸇不若鸞鳳志士幽人莫怨嗟論語志士仁人傅休奕詩志士惜日短易履道坦坦幽人貞吉何遜詩臨川何怨嗟古來材大難為用後漢書仲長統傳古來繞繞委曲如瑣四子講徳論大厦之材非一丘之木江淹詩大厦須異材蜀志諸葛亮傳注宜可大用不可小使後漢書邊讓傳大器之於小用固有所不宜也元結説洄溪招退者名勝志洄溪在道州江華縣境四山之間乳竇松膏之所漬泉甘宜稻飲者多夀長松亭亭満四山戰國策荆有長松文梓孫綽賦蔭落落之長松庾信詩亭亭松直竪謝靈運山居賦四山周回雙流逶迤山間乳竇流清泉鮑照詩乳竇通海碧江淹詩乳竇既滴瀝丹井復寥泬水經注寒松上蔭清泉下注洄溪正在此山裏晉書羊祜傳造峴山甞謂鄒湛等曰自有宇宙便有此山乳水松膏常灌田述異記武陵源有石洞洞中有乳水漢武内傳藥有松柏之膏服之可延年北齊書斛律羡傳羨導髙梁水北合易京東會於潞因以灌田松膏乳水田肥良荀子民富則田肥以易北史楊侃傳茍有良田何憂晚嵗稻苗如蒲米粒長庾肩吾詩黒米生菰葉青花出稻苗詩彼澤之陂有蒲與荷書烝民乃粒傳米食曰粒風土記海南有長腰粳米糜色如珈玉液酒劉孝威啟乳糜香飯漢武内傳上藥有玉液金漿酒熟猶聞松節香陶潛詩酒熟吾自斟江總樂府玉酒新熟㡬千年南史顧歡傳夕則燃松節讀書庾信詩杯香酒絶濃溪邊老翁年㡬許范雲詩盈盈一水邉南史梁武帝紀帝於青溪邊造智度寺張説詩江湖一老翁長男頭白孫嫁女易林長男少女相向笑語史記鄒陽傳白頭如新傾葢如故周禮媒氏女二十而嫁後漢書向長傳男女嫁娶既畢遂肆志遊五岳名山問言只食松田米晉書宣帝紀亮使至帝問曰諸葛公起居何如食可㡬米無藥無方向人語傳燈録亦無病亦無藥正是真如靈性覺帝王世紀黄帝使岐伯甞味草木定本草經造醫方浯溪石下多泉源名勝志浯溪在零陵郡祁陽縣南五里流入湘江唐元結自道州歸愛其山水因家焉法言谷口鄭子真耕乎巖石之下班固西都賦源泉灌注陂池交屬盛暑大寒冬大温賈誼賦隆盛暑而無聊兮傅咸神泉賦惟兹神泉厥理若原在冬則温既夏而寒水經注首山下有石穴穴中有水夏冷冬温屠蘇宜在水中石博雅屠蘇庵也服䖍風俗文屋平曰屠蘇詩宛在水中央宋書隠逸傳論巖壑閒逺水石清華洄溪一曲自當門詩彼汾一曲世說萬里長江何能不千里一曲袁淑詩種蘭忌當門吾今欲作洄溪翁名勝志唐代宗時有隠者黄姓居於洄溪人呼為洄溪翁元結聞而訪之贈詩刻石溪上誰能住我舍西東世說蔡司徒在洛見陸機兄弟住參佐廨中三間瓦屋士龍住束頭士衡住西頭顔延之文伊好之洽接閻鄰舍勿憚山深與地僻史記貨殖傳淵深而魚生之山深而獸往之庾信隠士詩山深足細泉張說銘逺居僻地代為右族羅浮尚有葛仙翁羅浮山記羅羅山也浮浮山也二山合體謂之羅浮在増城博羅二縣之境晉書葛洪傳間交阯出丹求為勾漏令至廣州刺史鄧嶽留之不聴去洪乃止羅浮山煉丹韓翃送客還江東還家不落春風後庾信春賦百丈山頭日欲斜三晡未醉莫還家王維詩妙舞向春風薛道衡詩人歸落鴈後數日應沽越人酒詩無酒沽我莊子宋人資章甫而適諸越越人㫁髮文身無所用之池畔花深鬬鴨欄杜甫詩池畔臨風花間度月張正見詩芳杜雜花深吴志陸遜傳建昌侯慮於堂前作鬬鴨欄頗施小巧橋邊雨洗蔵鴉栁陳後主詩佳人在北燕相望渭橋邉張説詩雨洗亭臯千畝綠梁簡文帝詩槐香欲覆井楊栁正蔵鴉遙憐内舍著新衣杜甫詩遙憐小兒女未解憶長安後漢書鄧皇后紀宫禁至重而使外舍久在内省上下交損誠不願也世説桓冲不好新衣浴後婦故送新衣冲怒婦曰衣不經新何由而故冲笑著之復向隣家醉落暉杜甫詩處處隣家笛飄飄客子篷劉長卿詩回首長川共落暉把手閒歌香橘下夏侯湛從祖叔權序叔權年十六見奔虎一箭而倒太祖把其手喜曰我得汝矣劉言史詩閒歌欵乃深峽裏杜甫詩霜橙壓香橘空山一望鷓鴣飛張説詩空山寂歴道心生杜甫詩澗水空山道禽經鷓鴣飛必南翥李白山鷓鴣詞苦竹南枝鷓鴣飛權徳輿太原鄭尚書逺寄新詩走筆酬贈因代書賀韓愈滎陽鄭公神道碑公諱儋貞元十六年詔授司馬節節度河東軍除其官為工部尚書太原尹兼御史大夫北都留守曉開閶闔出絲言張說詩曉色御前開劉長卿詩繡閣金屏曉色開離騷吾令帝閽開闗兮倚閶闔而望予梁簡文帝詩閶闔早應開禮記王言如絲其出如綸庾信詩泉湧屬絲言李嶠詩漢帝撫戎臣絲言命錦輪共喜全才鎮北門詩周邦咸喜戎有良翰杜甫詩重鎮還須濟世才左傳杞子自鄭使告於秦曰鄭人使我掌其北門之管職重油幢推上畧隋書禮儀志諸王三公有勲徳者車上加青油幢唐職林自至徳後方鎮降拜必遣内使持幢節就第宣命陸雲盛徳序頌藴生民之上畧賈至郭子儀制上畧宏才惇信明誼榮兼革履見深恩漢書鄭崇傳崇為尚書僕射每曳革履上笑曰我識鄭尚書履聲何遜詩蘧車響北闕革履入南宫庾信啟陳留下粟有愧深恩昔嵗經過同二仲阮籍詩西遊咸陽中趙李相經過謝混詩逍遙越林肆願言屢經過三輔决録蒋詡舍中三徑惟羊仲求仲従之遊二仲皆剉廉逃名之士陶潛與子儼等疏但恨鄰靡二仲室無菜婦岑參歸草堂詩幸有數畝田得延二仲蹤登朝並命慚無用史記儒林傳延天下方正博聞之士咸登諸朝漢書叙傳賈生矯矯弱冠登朝顔延之詩序並命在位展詩發志莊子皆知有用之用而不知無用之用孫楚杕杜賦序無用獲全所以為貴曲臺分記奉齋祠漢書藝文志曲臺后蒼九篇注行禮射於曲臺后蒼為記故名曰曲臺記三輔黄圖未央東有曲臺殿司馬相如長門賦覽曲臺之央央漢書郊祀志宣帝脩武帝故事盛車服敬齋祀之禮韓愈滎陽鄭公神道碑為太常博士遷起居郎尚書司封吏部二郎中直筆繫年陪侍従晉書郭璞傳臣以人乏忝荷史任敢忘直筆惟義是規北史韓麒麟傳仰遭明時直筆無懼公羊傳春秋編年四時具然後為年漢書嚴助傳厭承明之廬勞侍従之事沈佺期詩自喜恩深陪侍従芬芳雞舌向南宫宋玉賦陳嘉辭而云對兮吐芬芳其若蘭漢官儀尚書郎舍雞舌香奏事夢溪筆談雞舌香治口氣所以郎官含之奏事對荅其氣芬芳漢書髙祖紀漢建尚書百官府曰南宫伏奏丹墀迹又同張鷟奏曳裾紫禁伏奏青規儲光羲詩夜聞持簡立朝看伏奏歸張衡西京賦青瑣丹墀杜預表若得珥筆丹墀推訪格言必有諤諤匪躬之節杜甫詩今朝出處同公望數承黄紙詔晉書虞􅔎傳王導謂􅔎曰孔愉有公才而無公望丁潭有公望而無公才兼之者其在卿乎南史謝舉傳人倫儀表久著公望楊炯梁公神道碑行承芝詔坐啟茅封李嘉祐詩自嘆未霑黄紙詔虚懐自號白雲翁杜甫詩一見能傾座虚懐只愛才韓愈滎陽鄭公神道碑别自號白雲翁戎装躞蹀紛出祖唐書百官志考功二十七最八曰兵士調習戎装克備為督領之最孫逖詩百壺開詔餞四牡戒戎装王勃九成宮頌長圍躞蹀得駿馬於秦坰張說詩連騫勢出魚龍變躞蹀驕生鳥獸行詩仲山甫出祖四牡業業金印煌煌寵司武史記蔡澤