body:
  text: 欽定四庫全書御選唐詩卷二十九七言絶句白居易晚秋閒居地僻門深少送迎杜甫詩地僻懶衣裳又百年地僻柴門逈常建詩却戀雲門深晉書皇甫謐傳謐曰吾送迎不出門食不過鹽菜不以酒肉為禮披衣閒坐養幽情謝朓詩披衣就清盥又披衣起淵玩庾闡孫登贊先生體之寂坐幽峯西都賦發思古之幽情蘭亭序足以暢叙幽情史記孰知夫禮義文理之所以養情也秋庭不掃攜藤杖庾信晚秋詩濕庭凝墜露盧照鄰詩窮巷秋風葉空庭寒露枝梁昭明太子詩落葉紛可掃王勃詩閒情兼默語攜杖出巖泉杜甫詩兼將老藤杖扶汝醉初醒閒踏梧桐黃葉行王績詩踏葉羅幽步羣芳譜梧桐一名青桐皮青如翠葉缺如花妍雅華淨賞心悅目人家齊閣多種之丘遲詩檐際落黃葉李白詩秋葉黃梧桐題窗竹不用裁為鳴鳳管吕溫詩不用思秉燭魏彥深詠桐詩未求裁作瑟吕氏春秋昔黃帝命伶倫作為律伶倫自大夏之西乃之崑崙之隂取竹之嶰谷生以空竅厚均者斷兩節間長三寸九分而吹之以為十二簫聽鳳鳴以别十二律不須截作釣魚竿鮑照詩短願不須多宋書樂志古釣竿行言聖皇德配堯舜又冇吕望之佐以濟大功致太平也詩云釣竿何冉冉甘餌芳且鮮杜甫詩釣竿欲拂珊瑚樹又白水魚竿客千花百草凋零後趙彥昭詩夾路穠花千樹發司馬彪詩百草咸萎落杜甫詩萬草千花動凝碧宋南平王詩朱華先零落緑草就藝黃中論凋零冬也新論悽然而秋凋零者不憾留向紛紛雪裏看宋玉諷賦臣復援琴為作秋竹積雪之曲世說白雪紛紛何所似王勃春思賦雪裏梅花犯雪妍庾信梅花詩不信今春晚俱來雪裏看苦熱題恆寂師禪室人人避暑走如狂陶潛詩人人惜其情梁簡文帝詩避暑高梧側王僧孺詩迥鑾避暑宫杜甫早秋苦熱詩束帶發狂欲大呌漢書蘇武傳陵始降時忽忽如狂獨有禪師不出房無為經沙門有三坐禪為上輩晉書鳩摩羅什不拘小檢專以大乘為化諸學者共師焉傳燈録無住禪師常務宴寂可是禪房無熱到水經注陽水東徑故七級寺禪房南洛陽加藍記景林寺中有禪房一所內置祗洹精舍徐摛詩此時避炎熱但能心靜即身凉莊子聖人之心靜乎天地之鑒也萬物之鏡也洛陽伽藍記房廡麗精竹柏成林實是淨行息心之所也嵇含答難養生論仲冬倮而體溫夏裘而身凉過鄭處士聞道移居村塢間岑參詩聞道仙郎歌白雪晉書左思傳欲賦三都㑹妹芬入宫移家京師潘尼賦將遷居於爽塏庾信詩依稀映村塢竹林多處獨開關漢書地理志秦地有鄠杜竹林北史楊愔傳愔宅內有茂竹遂於林邊别葺一室獨處其中離騷吾令帝閽開關兮故來不是求他事謝靈運詩序公子不及世事但美逰遨暫借南亭一望山王勃文白露下而南亭虛蒼烟生而北林晚劉楨京口記蒜山無峯嶺懸臨江中魏文帝南望而致歎謝朓詩望山白雲裏畫木蓮花圖寄元郎中羣芳譜木芙蓉一名木蓮花房膩似紅蓮朵王褒詩蓮房採半空本草木芙蓉艷如蓮花故有芙蓉木蓮之名謝朓詩紅蓮搖弱荇梁簡文帝詩紅蓮拂水衣艷色鮮如紫牡丹王維詩艷色天下重魏文帝芙蓉池詩上天垂光彩五色一何鮮壯丹譜牡丹自唐則天以後始盛然亦不進御自李迪為留守嵗遣牙校一員乘驛馬一日一夜至京師所進不過姚黃魏紫三數朵惟有詩人應解愛李嶠詩惟有年年秋雁飛文賦詩人之賦麗以則南史張緒傳此楊栁風流可愛丹青寫出與君看盧照鄰詩古壁有丹青李白詩淡掃明湖開玉鏡丹青畫出與君看暮江吟一道殘陽鋪水中詩宛在水中央庾信詩夕陽含水氣反景照河堤梁簡文帝詩水紋城上動城樓水中出半江瑟瑟半江紅杜甫詩焉得并州快剪刀剪取吳淞半江水博雅瑟瑟碧珠也杜甫石笋詩雨多往往得瑟瑟賈琮詩雲歸全嶺暗日落半江紅誰憐九月初三夜露似真珠月似弓續齊諧記𢎞農鄧紹八月旦入華山取藥見一童子執五綵囊承柏葉上露皆如珠曰赤松先生取以明目江淹别賦秋露如珠秋月如圭詩月上弦而就盈疏月體正半昏而中似弓之張而弦直謂上弦也高適詩城頭殘月勢如弓思婦眉春風搖蕩自東來沈約詩臨春風春風起春樹又容儀已照灼春風復回薄司馬相如上林賦隨風淡淡與波搖蕩杜甫詩晚年高興盡搖蕩菊花期陶潛詩微雨從東來好風與之俱坼盡櫻桃綻盡梅禮記羞以含桃注含桃櫻桃也李白詩别離幾春未還家玉窗五見櫻桃花杜甫詩紅綻雨肥梅惟餘思婦愁眉結陸機詩東南有思婦長歎充幽闥後漢書梁冀傳妻孫夀善為啼粧愁眉陸罩詩留步惜餘影含意結愁眉無限東風吹不開禮記東風解凍楚辭東風飄兮神靈雨詩籜兮籜兮風其吹女老子善閉無關鍵而不可開採蓮曲菱葉縈波荷颭風戴皓釣竿篇鈎利斷蓴絲帆舉牽菱葉杜甫詩菱葉荷花淨如拭梁元帝詩荷香風送逺蓮影向根生荷花深處小船通詩隰有荷華沈約詩艾葉彌南浦荷花繞北樓庾信詩小船行釣鯉新盤待摘荷杜甫詩秋水通溝洫城隅進小船逢郎欲語低頭笑李白詩荷花嬌欲語愁殺蕩舟人禮記注肅拜拜低頭也盧綸詩嚬眉乍欲語斂笑又低頭碧玉搔頭落水中漢武故事上起神屋前庭植玉樹以珊瑚為枝碧玉為葉西京雜記武帝過李夫人就取玉簪搔頭自此後宫人搔頭皆用玉玉價為貴繁欽詩何以結相投金薄畫搔頭杜甫瞻同心芙蓉詩灼灼荷花瑞亭亭出水中鄰女娉婷十五勝天仙杜甫詩喚人看騕裊不嫁惜娉婷韻㑹娉婷美好貌公羊傳女子十五而許字二十而嫁梁武帝樂府女兒年幾十五六窈窕無雙顔似玉漢武內傳王母乘紫雲之輦駕五色斑龍别有五十天仙側近鸞輿徐陵玉臺新詠序畫出天仙閼氏見而遙妬白日姮娥旱地蓮後漢書天文志注羿請無死之藥於西王母姮娥竊以奔月曹植辨道論素女姮娥不如椒房之麗也關尹內傳尹喜生時其家陸地自生蓮花光色鮮盛庾信迥文詩旱蓮生竭鑊嫩菊養秋鄰何處閒教鸚鵡語禮記鸚鵡能言不離飛鳥說文鸚鵡能言鳥也岑參詩隴山鸚鵡能言語為報佳人數寄書碧紗窗外繡簾前李嶠詩月宇臨丹地雲窗網碧紗李白詩機中織錦秦川女碧紗如烟隔窗語何遜詩誰能北窗下獨對後園花權德輿詩鵲語臨粧鏡花飛落繡牀竹樓宿小書樓下千竿竹唐書李磎傳磎好學家有書萬卷世號李氏盡樓隋樂府寄言秦樓下因書秋雁歸顧况詩若為種得千竿竹引取君家一眼泉深火爐前一盞燈道德指歸論隂之至也地裂而冰凝清風飂冽當此之時處溫室臨爐火猶不能御也李白詩爐火照天地紅星亂紫烟張正見詩願雜百和氣宛轉金爐前王維詩不須愁日暮自有一燈然劉長卿詩一燈長照恆河沙此處與誰相伴宿駱賓王詩空餘朝夕鳥相伴夜啼寒燒丹道士坐禪僧抱朴子金丹燒之愈久變化愈妙令人不老徐陵答周處士書燒丹辛苦垂老乃成郭璞遊仙詩青溪千餘仞中有一道士魏書釋老志沙門惠始家本清河聞羅什出新經遂詣長安見之觀習經典坐禪於白渠北晝則入城聽講夕則還處靜坐三輔有識多宗之禪宗記禪僧衣褐謙僧衣紅楊家南亭小亭門向月斜開張正見詩秋窗向月開孟浩然詩起視江月斜滿地凉風滿地苔李白詩碧草已滿地又桂花松子常滿地禮記孟秋之月凉風至劉孝威詩步徑逐凉風梁簡文帝詩蔽地濕輕苔此院好彈秋思處樂府詩集琴集曰五弄逰春渌水幽居坐愁秋思並宫調蔡雍所作也琴書曰雍入青溪訪鬼谷先生所居山有五曲一曲製一弄其西曲灌水吟秋故作秋思終須一夜抱琴來高適詩借問落梅凡幾曲風從一夜滿關山嵇康絶交書抱琴行吟弋釣草野李白詩我醉欲眠君且去明朝有意抱琴來舟中夜坐潭邊霽後多清景何遜詩寒潭見底清杜甫詩霽潭鱣發發儲光羲詩凉氣生霽後曹植公宴詩明月澄清景楊索詩巖壑澄清景景清巖壑深橋下凉來足好風謝惠連樂府凉來溫謝寒往暑却陶潛詩微兩徒束來好風與之俱司空曙板橋詩清風栁隂好秋鶴一雙船一隻王僧儒文水鳴秋鶴江淹騷體西北來兮乃雙鶴庾信詩白鶴一雙來方言舟自關而東謂之船夜深相伴月明中劉緩詩月光移數尺方知夜已深孟浩然詩離家復水宿相伴賴沙鷗子夜歌秋夜凉風起天高星月明王褒詩關山夜月明家園滄浪峽水子陵灘寧戚歌滄浪之水白石粲中有鯉魚長尺半儲光羲詩自有滄浪峽誰為無事人後漢書嚴光傳嚴光耕於富春山後人名其釣處為嚴陵瀨駱賓王文行至七里灘此地即新安江口有嚴子陵釣磯焉路逺江深欲去難張衡四愁詩路逺莫致倚躇蹰劉孝綽詩江深風復生王粲詩褰裳欲從之路險不得征徘徊不能去佇立望爾形何似家池通小院雲仙雜記白氏履道坊宅有池水可泛舟樂天每㑹賓客以百十油囊懸酒炙沈水中隨船而行一物盡則左右進之藏盤筵於水底也卧房階下插魚竿本集北院詩石壁卧房前江淹書鳥赴簷上水周階下杜甫詩白水魚竿客二籬下先生時得醉陶潛詩採菊東籬下悠然見南山續晉陽秋陶潛嘗九月九日無酒坐宅邊東籬下菊叢中採菊盈把望見白衣人至乃王𢎞遣送酒也即便就酌晉書陶潛傳嘗著五栁先生傳以自况曰先生不知何許人亦不詳其姓字宅中冇五栁因以自號性嗜酒或置酒招之造飲必盡期在必醉甕間吏部暫偷眠晉書畢卓傳比舍郎釀熟卓因醉夜至其甕間盜飲之為掌酒者所縳明旦視之乃畢吏部也何如家醖雙魚榼孟浩然詩家醖復新開杜甫詩繡衣屢許移家醖古詩客從逺方來遺我雙鯉魚劉伶酒德頌動則提壺挈榼雪夜花時長在前晉書王徽之傳夜雪初霽月色清朗蘇頲詩鶯語百花時三鴛鴦怕捉竟難親埤雅雄鳴曰鴛雌鳴曰鴦爾雅禽疏禽者擒也言鳥力小可擒捉也梁簡文帝鴛鴦賦見兹禽之棲宿想君意之相親鸚鵡雖籠不著人禰衡鸚鵡賦蔽以雕籠剪其翅羽何似家禽雙白鶴世說梁國楊氏子九嵗甚慧孔君平來詣其父為設果冇楊梅君平取以示兒曰此是君家果兒答曰未聞孔雀是夫子家禽古詩飛來雙白鶴閒行一步亦隨身孫綽蘭亭序閒步於林野則寥落之言興沈約詩聊可閒余步錢起詩一步一清心何遜詩蜀物豈隨身元稹晚春晝靜簾疏燕語頻王勃九成宫頌烟閨夜謐雲房晝靜魏收詩樹靜歸烟合簾疏返照中李白宫中行樂詞宫驚嬌欲醉簷燕語還飛杜甫詩江上燕子故來頻雙雙鬬雀動階塵公羊傳其諸為雙雙而俱至者與李白詩羽客何雙雙歷代名畫記畫鬬雀於壁間劉向别録歌動梁塵柴扉日暮隨風掩范雲詩還聞稚子說有客欵柴扉左傳日云暮矣王粲詩日暮遊西園列子心凝神釋隨風東西王維詩日暮掩柴扉落盡閒花不見人李白詩楊花落盡子規啼沈佺期詩閒花開石竹幽葉吐薔薇易行其庭不見其人竇庠字胄卿授國子主簿改殿中侍御史歷登澤信婺四州刺史金山寺惠凱金山志山在江中李錡鎮潤州表名金山以裴頭陀開山得金故名一統志金山寺在金山舊名澤心唐改今名一㸃青螺白浪中蕭子良答王僧䖍書仲將之墨一㸃如漆華嚴經佛髻肉如青螺李白司馬將軍歌江中白浪如銀屋杜甫詩狎鷗輕白浪全依水府與天通鮑照河清頌泉室凝澱水府清涓楊師道望海詩水府泛黿梁李白樂府三十六離宫樓臺與天通晴江萬里雲飛盡世說周顗曰吾若萬里長江何能不千里一曲郭璞江賦呼吸萬里吐納靈潮左思蜀都賦雲飛水宿李白宫中行樂詞化作彩雲飛鼇背參差日氣紅庾信謝趙王啓知恩之用鼇背負於雲山司馬相如賦臨曲江之隑洲兮望南山之參差陸雲賦長林參差論衡日者火也烏日氣也杜甫詩初看浴日紅