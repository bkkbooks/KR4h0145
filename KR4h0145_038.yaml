乃有萬斛愁李羣玉南莊春晚連雲草映一條陂庾肩吾詩棧閣自連雲杜甫詩映階碧草自春色李白詩一條藤徑緑阮卓詩春色映澄陂鸂鶒雙雙帶水飛臨海異物志鸂鶒水鳥毛有五色韓愈詩雙雙歸蟄燕杜甫詩城隂帶水昏梁簡文帝詠飛來鸂鶒詩飛從何處來南村小路桃花落陶潛詩昔欲居南村戎昱詩城南舊有山村路李賀詩桃花亂落如紅雨細雨斜風獨自歸梁簡文帝詩冷風雜細雨元稹詩三竿曉日罥斜風張志和詩斜風細雨不須歸引水行一條寒玉走秋泉李商隱詩一條雪浪吼巫峽唐太宗詩飛泉潄鳴玉白居易詩聲聲麗曲敲寒玉王褒詩秋泉帶雨餘引出深蘿洞口烟劉方平詩引出白雲根潺潺漲蘚痕儲光羲詩澗淨緑蘿深杜甫詩主家隂洞細烟霧十里暗流聲不斷吳筠天柱觀記泝溪十里登陸而南弄潺湲入崢嶸王勃詩虛巖轉暗流江總詩空勞流水聲水經注白璧灣清潭鏡徹上則風籟空傳下則泉響不斷行人頭上過潺湲何遜詩擾擾見行人陶潛詩空負頭上巾曹植九歌觀流水兮潺湲題王侍御宅門向滄江碧岫開杜甫詩柴門不正逐江開范雲詩滄江路窮此李白詩開窗碧嶂滿拂鏡滄江流王勃文丹梯碧洞杳冥林岫之間地多鷗鷺少塵埃王維詩冇地竹林多盧照鄰詩迸水驚秋鷺騰沙起狎鷗白居易詩風靜下鷗鷺禮記前冇塵埃則載鳴鳶楊炯詩瀟灑軼浮埃緑隂十里灘聲裏劉禹錫詩緑蘿隂下到山莊白居易詩眠松愛緑隂裴迪詩瀨聲喧極浦元稹詩江石夜灘聲閒去王家看竹來孟浩然詩惟冇幽人夜來去世說王子猷嘗暫寓人空宅住便令種竹曰何可一日無此君又王子猷嘗行過吳中見一士大夫家極有好竹肩輿徑造竹下諷嘯良久王維詩看竹何須問主人白居易詩看竹入楊家江南鱗鱗别浦起微波何遜詩鱗鱗逆去水瀰瀰急還舟陳羽詩逐溜影鱗鱗謝莊詩凌别浦兮值泉躍杜甫詩别浦落紅蕖曹植賦微波動而水蟲鳴晉書樂志渟瀾發微波泛泛輕舟桃葉歌詩二子乘舟泛泛其景屈原卜居將泛泛若水中之鳬乎陸機賦泛輕舟於西川陳子昻詩騖楫漾輕舟王獻之歌桃葉復桃葉渡江不用楫古今樂録桃葉歌王子敬所作也桃葉子敬妾名白居易詩小妓攜桃葉新歌踏栁枝斜雪北風何處宿朱慶餘詩斜雪微霑砌杜甫詩急雪舞回風詩北風其凉雨雪其滂劉刪詩離羣思北風庾信詩御史府中何處宿竇常詩村店閉門何處宿夜深遙喚渡江船江南一路酒旗多爾雅江南曰揚州杜甫詩正是江南好風景落花時節又逢君儲光羲詩梧桐開一路李賀詩試問酒旗歌板地今朝誰是拗花人庾信詩新豐酒徑多紫極宫齊後羣玉集有長沙紫極宫夜雨詩紫府空歌碧落寒庾信廣成子讃治身紫府問政青丘駱賓王詩振衣逰紫府盧照鄰贈道士詩寶貺幽難識空歌迥易分度人經昔於始青天中碧落空歌注東方第一天有碧霞遍滿是名碧落李白詩步綱繞碧落曉星寥亮月光殘謝朓詩曉星正寥落晨光復漾漭吳均詩曙星海中出曉月山頭下詩匪東方則明月出之光傅休奕詩皎皎明月光張諤詩旌門曉月殘一羣白鶴高飛散杜甫詩摩霄鶴數羣列仙傳王子喬七月七日於緱氏山頭乘白鶴而去梁簡文帝賦白鶴至而忘歸詩有鳥高飛惟有松風吹石壇南史陶𢎞景傳性愛松風庭院皆植松每聞其響欣然為樂張說詩簷松風送靜李白詩風入松下清孟浩然詩松風清晝吹盧綸詩放鶴登雲壁澆花繞石壇韓偓醉著萬里清江萬里天郭璞江賦呼吸萬里吐納靈潮杜牧詩彭蠡秋連萬里江楚辭隱岷山以清江杜甫詩清江下龍門絶壁無尺土劉長卿詩洞庭秋水逺連天一村桑柘一村烟杜甫詩村村自花栁潘嶽詩桑柘何奕奕謝朓詩桑柘起寒烟祖詠詩落日桑柘隂遙村烟火起杜甫詩村烟對浦沙漁翁醉著無人喚杜甫詩九秋驚鴈序萬里狎漁翁栁宗元詩漁翁夜傍西巖宿岑參詩酩酊醉時日正午晉子夜歌歎我當春年無人相要喚元結詩漫醉人不嗔漫眠人不喚過午醒來雪滿船岑參詩過午方始飯薛能詩漁舟釣客醒杜甫詩暫憶江東鱠兼懷雪下船野塘侵曉乘凉偶獨來北火崔暹傳自出身從官常日宴乃歸侵曉則與兄弟跪問母之起居杜甫詩逺夢歸侵曉李頻詩乘凉探暮程溫庭筠詩萬㸃荷珠曉氣凉孟浩然詩清曉因興來不因魚躍見萍開庾闡詩鼓枻觀魚躍許渾詩水暖魚頻躍朱超詩滴沼細萍開白居易詩萍開見游魚卷荷忽被微風觸江總詩池開半卷荷錢起詩卷荷藏露滴吳均詩皎皎日將上獵獵起微風杜甫詩微風燕子斜謝惠連詩風觸楹而轉響瀉下清香露一杯白居易詩荷側瀉清露李商隱詩殷勤莫使清香透庾信詩定取流霞氣時添承露杯李白詩興在一杯中寄鄰莊道侣聞說經旬不啓關李白詩一去巳十年今來後盈句杜甫詩追隨不覺晚欵曲動彌旬李白詩逺公愛康樂為我開禪關藥窗誰伴醉開顔李端詩搗藥夜窗深陸陲蠡杯銘獨居無伴杜甫詩走覔南鄰愛酒伴李白詩開顔酌美酒樂極忽成醉夜來雪壓前村竹樂府古詞夜來冒霜雪劉禹錫詩庭前雪壓松桂叢儲光羲詩前村酒可賒劉孝威詩棲禽動夜竹剩見溪南幾尺山白居易上𢎞和尚碑銘爐峯之西虎溪之南石塔巍巍陶潛詩悠然見南山御選唐詩卷二十九
