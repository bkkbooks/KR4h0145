  text: 御選唐詩序
  hash: sha256:b08e5fffc4210f7f24a638636b97bf7e92e2325cea22084c1a5a290231782971
  markers:
  - {type: page-break, offset: 0, content: '', id: KR4h0145_WYG_000-1a, image: WYG1446/WYG1446-0001a.png}
body:
  text: 古者六藝之事皆所以涵養性情而為道德之助也而從容諷詠感人最深者莫近於詩故虞廷典樂依永和聲帝親命焉成周時六義領在樂官而為教學之先務自三百篇降及漢魏六朝體製遞增至唐而大備故言詩者以唐為法其時選本如河嶽英靈中興間氣御覽才調諸集其所收擇各有意指而觀者每有不遍不該之歎朕萬幾餘暇留意篇什廣搜博採已刻全唐詩集而自曩昔披覽嘗取其尤者彚為一編古風近體各以類相從計三十二卷蓋討索貴於詳備而用以吟咏性情則當挹其精華而潄其芳潤每當臨朝聽政巡行獮狩之餘展卷留連未嘗不悠然而有得也因命儒臣依次編注朕親加考訂一字一句必溯其源流條分縷析其有徴引訛誤及脫漏者隨諭改定逾嵗告成因付開雕以示後學孔子曰溫柔敦厚詩教也是編所取雖風格不一而皆以溫柔敦厚為宗其憂思感憤倩麗纎巧之作雖工不録使覽者得宣志達情以範於和平蓋亦用古人以正聲感人之義記有之君子在車則聞鑾和之音行則鳴珮玉是以非辟之心無自而入也審此而朕之寄意於詩與刋布是編之指俱可得而見矣是為序康熙五十二年三月上旬題康熙五十二年六月二十二日奉㫖開載御選唐詩閲纂校寫監造官員職名總閲原任經筵講官文淵閣大學士兼吏部尚書加三級臣陳廷敬校勘官日講官起居注翰林院侍講學士加三級臣勵廷儀日講官起居注翰林院侍講加四級臣蔣廷錫日講官起居注司經局洗馬兼翰林院修撰加一級臣張廷玉日講官起居注翰林院修撰加一級臣趙熊詔校勘兼繕寫官左春坊左中允兼翰林院編修加一級臣陳邦彥翰林院庶吉士加一級臣王圖炳纂注官日講官起居注左春坊左諭德兼翰林院修撰教習進士加一級臣吳廷楨翰林院編修加一級臣周彛翰林院編修加二級臣廖賡謨翰林院編修加一級臣吳士玉翰林院編修加一級臣楊開沅翰林院編修加一級臣宫鴻厯原任翰林院編修臣汪灝翰林院檢討加一級臣盧軒翰林院庶吉士加一級臣楊士徽翰林院待詔臣髙不騫議叙候選知縣加一級臣郭元釪繕寫官議叙候選知縣臣顧祖雍議叙候選知縣臣王曽期校録官生進士候補內閣中書舍人臣吳玉專進士候補內閣中書舍人臣汪榯進士候補內閣中書舍人臣李登瀛進士候補內閣中書舍人臣徐啓統進士候補內閣中書舍人臣遲之金進士候補內閣中書舍人臣覺羅吳拜進士候補內閣中書舍人臣孫宗緒議叙選授湖廣荆州府監利縣知縣臣叢潤議叙選授順天府通州武清縣知縣臣裘嚴生議叙選授貴州平越府餘慶縣知縣臣蔣深議叙候選知縣臣潘秉鈞議叙候選知縣臣鄒元斗議叙候選知縣臣張果浚議叙候選知縣臣沈經議叙候選知縣臣周旋議叙候選知縣臣吳暄議叙候選知縣臣程瓉議叙候選知縣臣孫農祥議叙候選知縣臣王㑹議叙候選知縣臣徐球議叙候選知縣臣樓儼議叙候選知縣臣戴天瑞貢生官學教習臣孫天霖監生候選州同知臣吳廷元儒童臣鄒家龍儒童臣嚴文照監造官武英殿總監造管翻書房原內閣侍讀學士今佐領加二級臣和素武英殿總監造內務府㑹計司員外郎兼佐領加三級臣張常住武英殿總監造內務府㑹計司員外郎兼參領佐領加一級臣李國屏武英殿監造驍騎校加一級臣巴實
