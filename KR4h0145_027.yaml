body:
  text: 欽定四庫全書御選唐詩卷二十一七言律白居易送王十八歸山寄題仙遊寺宋敏求長安志仙逰宫在縣南三十五里舊圖經曰隋文皇帝避暑處盩厔縣志仙逰寺即仙逰宫在仙逰潭上曾於太白峯前住水經注太乙山亦曰太白山俗云武功太白去天三百録異記金星之精墜於終南圭峯之西因號太白山一統志太白山在鳳翔府郿縣東南四十里按舊唐書居易傳元和元年四月應才識兼茂明於體用科䇿入第四等授盩厔尉集賢校理新唐書本傳元和元年對䇿一等調盩厔尉為集賢校理新舊書地理志盩厔縣屬京兆府與武功終南相鄰近故有是句數到仙逰寺裏來法苑珠林有婆娑門佛數數到其家乞食說偈陶潛詩鄰曲時時來抗言談在昔黑水澄時潭底出長安志仙逰潭在縣南三十里濶二丈其水黑色相傳號五龍潭楊衡詩年去水空澄張九齡詩潭清能見底李端詩潭底龍游水沫開白雲破處洞門開何遜詩去帆若不見試望白雲中沈約詩置嶺白雲間左思蜀都賦華闕雙邈重門洞開又吳都賦高闈有閌洞門方軌杜甫詩洞門對雪長隂隂林間暖酒燒紅葉孫綽賦朱閣玲瓏於林間梁元帝詩林間花欲然開寶遺事內庫有一酒杯青色有紋如亂絲名自暖杯取酒注之溫溫然有氣頃次如沸湯庾信詩野爐然樹葉張正見詩秋葉奪紅粧錢起詩茅茨隱紅葉石上題詩掃緑苔南史蕭思話傳思話嘗從文帝登鍾山北嶺中道有盤石清泉上使於石上彈琴因賜以銀酒鍾曰相賞有松石間意杜甫詩請看石上藤蘿月又桐葉坐題詩郭璞賦緑苔鬖髿乎研上孟浩然詩碧網交紅樹清泉盡緑苔惆悵舊逰無復到楚辭惆悵兮而私自憐阮籍詩惆悵念所思李白詩長歌懷舊逰祖詠詩蘭若無人到菊花時節羡君回禮記季秋之月菊有黃華庾信詩停杯待菊花古詩白露霑野草時節忽復易錢塘湖春行唐書居易傳為杭州刺史始築隄捍錢塘湖鍾泄其水溉田千頃孤山寺北賈亭西名勝志寶雲山之支渡西泠橋以入孤山一統志孤山在府城外西湖上獨立一峯為湖山勝絶處賈亭無考水面初平雲腳低管子水平而不流庾信詩隂雲斂向低孟浩然詩山出晚雲低幾處早鶯爭暖樹李白詩尋花幾處行梁書蕭子顯傳早燕初鶯開花落葉有來斯應每不能已李益詩樹暖燃紅燭江清展碧油誰家新燕啄春泥曹植詩借問誰家子劉孝威詩誰家妖冶折花枝古樂府新燕弄初調杜䳌競晨鳴古詩思為雙飛燕銜泥巢君屋傅統妻辛氏燕頌銜泥啄草造作室房杜甫詩春泥百草生亂花漸欲迷人眼魏文帝詔前于闐所上孔雀尾萬枝以為金根車蓋遙望耀人眼王冏詩野花奪人眼淺草才能沒馬蹄曹丕典論自叙草淺獸肥弓燥手桑漢書鼂錯傳兩陳相近平地淺草可前可後此長㦸之地也莊子馬蹄可以踐霜雪曹植詩俯身散馬蹄吳均詩青莎沒馬蹄最愛湖東行不足江淹自序爰有碧水丹山珍草皆淹生平所至愛世說王子敬云從山隂道上行山川自相映發使人應接不暇詩維日不足緑楊隂裏白沙堤宋雍詩緑楊宜向雨中看李白詩緑楊三月時顧况詩緑嶼沒餘烟白沙連曉月杜甫詩江聲走白沙名勝志自斷橋至孤山為白公堤以郡守居易築也西湖晚歸回望孤山寺贈諸客名勝志西湖故明聖湖也周繞三十里三面環山溪谷縷注下有淵泉水道瀦而為湖漢時金牛見湖中以為明聖之瑞因稱明聖湖以其負郭而西故稱西湖西湖志孤山巋介湖中碧波環繞勝絶諸山樓閣參差彌布椒麓栁湖松島蓮花寺名勝志杭州府隋唐郡治在鳳皇山栁浦西按西湖有十景栁浪聞鶯其一也名勝志九里松在靈隱寺夾道植松凡九里有六朝植者通志蓮花峯在下天竺寺西峯頂有孤石可四十圍頂上四開狀似千葉蓮花晚動歸橈出道場梁武帝詩晨鳬移去舸飛燕動歸橈唐六典隋改佛寺為道場盧橘子低山雨重司馬相如賦盧橘夏熟注盧黑色也李尤七歎梁土青麗盧橘是生白華緑葉扶疏冬榮杜甫詩卑枝低結子張正見詩山雨濕苔碑張謂詩栁枝經雨重栟櫚葉戰水風凉博雅栟櫚棕也廣志栟櫚葉似車輪有皮纒之附地起二旬一采轉復上生庾肩吾詩窗含度水風劉孝威詩臨池愛水凉煙波淡蕩搖空碧江總詩霧開樓闕近日向烟波長李白詩春風正淡蕩江淹賦水湛湛而空碧樓殿參差倚夕陽邱遲詩綵殿廽風丹樓映日宋之問靈隱寺詩樓觀滄海日盧綸詩玉樓金殿影參差司馬相如賦岑崟參差日月蔽虧詩度其夕陽梁簡文帝碑夕陽斜映俱成拂鏡之暉到岸請君回首望吳志陸瑁傳沓渚之淵道里尚逺今到其岸兵勢三分唐太宗詩回首長安道方歡宴柏梁蓬萊宫在水中央山海經蓬萊山在海中注上有仙人宫室皆以金銀為之杜甫詩蓬萊宫闕對南山詩溯游從之宛在水中央班固賦濫瀛洲與方丈蓬萊起乎中央李紳憶春日太液池亭候對長慶三年宫鶯報曉瑞烟開杜甫詩宮鶯罷囀春王維詩絳幘雞人報曉籌劉孝綽詩朱旗曵曉烟杜審言詩中峯繞瑞烟梁簡文帝詩烟開四郊謐三島靈禽拂水回神仙傳海上有三神山曰蓬萊曰方丈曰瀛洲謂之三島徐陵碑來去三島賔逰二童梁簡文帝七勵異草雙條靈禽比翼劉孝綽詩驚鵜拂浪翔吳筠詩春從何處來拂水復驚梅橋轉綵虹當綺殿梁元帝賦虹橋左跨雁苑南通宋之問詩虹橋轉翠屏張協詩綵虹纓髙雲沈約詩標峯綵虹外江總樂府綺殿文雅遒艦浮花鷁近蓬萊釋名上下重版曰艦淮南子龍舟鷁首注鷁大鳥也畫其象著船首司馬相如賦浮文鷁揚旌栧張正見詩波中畫鷁湧帆上錦花飛漢書郊祀志自宣威燕昭使人入海求蓬萊方丈瀛洲此三神山者相傳在渤海中去人不逺嘗有至者魯范神仙篇控鶴下蓬萊草承香輦王孫長陶潛詩道狹草木長南史陳伯之傳暮春三月江南草長宋之問詩澗草自迎香輦合楚辭王孫逰兮不歸春草生兮萋萋杜甫詩短畦帶碧草悵望思王孫桃艷仙顔阿母栽漢武故事東郡獻短人呼東方朔至短人因指朔謂上曰西王母種桃三千嵗為子此兒已三過偷之矣郭璞賦靈娥御以艷顔陶潛詩王母怡妙顔杜甫詩栽桃爛熳紅簪筆此時方侍從晉書輿服志笏者有事則書之故常簪筆南史劉杳傳持槖簪筆事孝武皇帝數十年薛道衡詩簪筆上云亭漢書嚴助傳拜㑹稽太守賜書曰君厭承明之廬勞侍從之事出為郡吏班固賦言語侍從之臣朝夕論思日月獻納却思金馬笑鄒枚史記東方朔傳金馬門者宦署門也門傍有銅馬故謂之金馬門梁元帝賦判辟雍之樂語辨金馬之儒墨沈約詩東方金馬門史記司馬相如傳是時梁孝王來朝從逰說之士齊人鄒陽淮隂枚乘吳莊忌夫子之徒相如見而恱之謝莊賦召鄒生延枚叟梁元帝詩促宴引鄒枚憶夜直金鑾殿承㫖月當銀漢玉繩低鮑照詩夜來坐幾時銀漢傾露落河圖括地象河精上為天漢亦曰銀漢春秋元命苞玉衡北兩星為玉繩張衡賦上飛闥而仰眺正睹瑶光與玉繩張協七命望玉繩而結極謝朓詩玉繩低建章深聽簫韶碧落齊書簫韶九成李白詩新鶯飛繞上林苑願入簫韶雜鳳笙度人經昔于始青天中碧落空歌注東方第一天有碧霞遍滿是名碧落門壓紫垣髙綺樹晉書天文志紫宫垣十五星在北斗北一曰紫微大帝之坐也天子之常居也梁簡文帝詩八泉光綺樹江淹賦憶上國之綺樹閣連青瑣近丹梯潘嶽秋興賦序髙閣連雲漢舊儀黃門郎屬黃門令日暮入對青瑣闈拜名夕郎范雲詩攝官青瑣闥謝眺詩要欲追竒趣即此陵丹梯墨宣外渥催飛詔南史謝莊傳為侍中領前軍將軍時孝武出行夜還勑開門莊居守以棨信或虛須墨詔乃開李嶠表頒賞計功遂成紫泥之渥獨異志陶宏景隱居茅山梁武帝每有大事飛詔與之參决時人謂為山中宰相草布深恩促換題後漢書百官志侍郎三十六人本注曰一曹有六人主作文書起草蘇頲啓絲綸所屬嘗推起草之能庾信啓陳留下粟有愧深恩唐國史補崔敖知崔元翰懇主司先求題目為地都堂始開盛氣白侍郎曰若使試白雲起封中賦則敖請退侍郎遂換試題二雀俱捷明日獨歸花路逺李白詩今日結交明日改陶潛詩行行循歸路劉孝綽詩歸路復當歡庾信詩狹路花中行劉孝綽詩度君路應逺期寄新詩返可憐人世隔雲霓潘嶽賦放曠乎人間之世劉孝綽詩既異人世勞聊比化城樂宋玉對楚王問鳳皇上擊九千里絶雲霓負蒼天王屮頭陀寺碑層軒延袤上出雲霓司馬紹詩上陵青雲霓鄭谷字守愚袁州人光啓三年擢第右拾遺歷都官郎中幼即能詩名盛唐末鷓鴣谷以此詩得名時號為鄭鷓鴣禽經鷓鴣晉安曰淮南江左曰逐隱古今注南方有鳥曰鷓鴣其鳴自呼常向日而飛畏霜露早晚稀出有時夜飛則以樹葉覆其背上本草鷓鴣聲若云行不得哥哥暖戲烟蕪錦翼齊江總詩禽戲似忘懷權德輿詩烟無斂暝色李益鷓鴣詞錦翼鷓鴣飛品流應得近山雞東觀漢記李宗閔為相以品流程式為己任禽經首有彩毛曰山雞異苑山雞愛其毛映水則舞魏武時南方獻之南越志曾城縣多鵕䴊鵕䴊者山雞也光色鮮明五采炫耀雨昏青草湖邊過鮑照詩沉雲日夕昏驟雨淫朝旦水經注湘水又東北為青草湖一統志青草湖北連洞庭南接瀟湘東納汨羅之水每夏秋水泛與洞庭為一水涸則此湖先乾青草生焉杜甫詩不意青草湖扁舟落吾手花落黃陵廟裏啼謝朓詩鳥散餘花落庾信賦落花與芝蓋齊飛水經注湘水又北徑黃陵亭西又合黃陵水口其水上承太湖湖水西流徑二妃廟世謂之黃陵廟也一統志黃陵廟在湘隂縣北四十里嶺南録鷓鴣多對啼羅浮志鷓鴣遇暖則相對而啼謂之山嘏逰子乍聞征袖濕古詩浮雲蔽白日逰子不顧返曹植詩逰子久不歸韓愈詩夜宿驛亭愁不睡幸來相就蓋征衣劉孝綽詩不辭紅袖濕佳人才唱翠眉低歷代歌詞山鷓鴣羽調曲也李延年歌北方有佳人絶世而獨立王冏詩佳人且少留為君繞梁唱梁簡文帝詩長顰串翠眉白居易詩欲話離情翠黛低相呼相喚湘江濶南越志鷓鴣鳴自呼杜薄州本草鷓鴣自呼鈎輈格磔隋煬帝詩啼鶯逺相喚劉憲詩鶯藏嫩葉歌相喚水經湘水出零陵陽海山一統志湘江在長沙府西環城而下源出廣西興安縣陽海山西北流至分水嶺分為二𣲖曰漓水流而南曰湘水流而北由靈渠與灌水㑹至永州與瀟水合曰瀟湘至衡陽與蒸水合曰蒸湘至沅州與沅水合曰沅湘㑹衆流以逹洞庭李涉鷓鴣詞湘江烟水深劉孝威詩江濶少行舟苦竹叢深春日西世說張豸隱居頥志家有苦竹數十頃張于竹中為屋常居其中李白山鷓鴣詞苦竹嶺頭秋月輝苦竹南枝鷓鴣飛謝朓詩窗前一叢竹杜甫詩竹深留客處詩春日遲遲曹植箜篌引驚風飄白日光景馳西流李涉鷓鴣詞何處鷓鴣飛日斜斑竹隂劉得仁貴主之子長慶中即以詩名自開成至大中三朝昆弟皆歷貴仕而得仁出入舉場三十年卒無成奉和翰林丁侍郎禁署早春晴望御林聞有早鶯聲孔燾詩鶯林響初囀梁書蕭子顯傳早雁初鶯開花落葉開元遺事每于禁苑中見黃鶯呼為金衣公子蕭慤賦二月鶯聲才欲斷玉檻春香九陌晴述異記吳王于春宵宫中作海靈館館娃閣銅溝玉檻宫之楹檻珠玉􅎖之康孟詩玉檻漾晨曦三輔遺事長安八銜九陌駱賔王詩三條九陌麗城隈寒著霽雲歸紫閣陳後主詩輕寒條已翠沈佺期詩霽雲無處所臺館曉蒼蒼袁恕已詩綺閣雲霞滿陸雲喜霽賦改望舒之離畢兮曜六龍于紫閣沈約詩復塗希紫閣暖浮佳氣動皇城後漢書光武帝紀論望氣者蘇伯阿為王莽使至南陽遙望見㫪陵郭唶曰氣佳哉鬱鬱葱葱然張說詩佳氣翊興王唐書地理志上都注皇城長一