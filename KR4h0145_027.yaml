匕首劍漢書原涉傳郡國諸豪及長安五陵諸為氣節者皆歸慕之應劭注五陵謂長陵安陵陽陵茂陵昭陵也班固賦南望杜霸北望五陵盧思道詩越史長懷寶劍逰玉簫金管迎歸院三十國春秋凉州有赤玉簫白玉笛江淹表結象弭于前衡奏金管于後陳李白詩玉簫金管坐兩頭杜甫詩歸院栁邊迷錦袖紅粧擁上樓杜甫詩霜雪廽光避錦䄂粧臺記隋文宫中梳九真髻紅粧謂之桃花面張說詩十五紅粧侍綺樓王昌齡詩春日凝粧上翠樓更向苑西新買宅皇甫冉詩途從御苑西南史吕僧珍傳宋季雅市宅居僧珍宅側僧珍問價季雅曰一百萬買宅千萬買鄰月波春水入門流漢書郊祀志月穆穆以金波獨孤及文賦詩于月波江淹賦春水緑波樓頴詩伊水入門流竇鞏南陽道中作漢書地理志南陽郡秦置屬荆州唐書地理志山南道鄧州南陽郡縣南陽一統志南陽府戰國屬韓秦取韓地自江漢以北置南陽郡治宛以其在中國之南而居陽地故曰南陽東風雨洗順陽川禮記孟春之月東風解凍楚辭東風飄飄兮神靈雨傅休奕賦東風穆而扇路劉義恭賦雨濛濛而洗莖陶潛詩微雨洗髙林一統志南陽府內鄉縣在鄧州西一百三十里晉屬順陽郡蜀錦花開緑草田魏志文帝賜羣臣曰前後得蜀錦殊不相似山謙之丹陽記歷代尚未有錦而成都獨稱妙故三國時魏則市於蜀吳亦資西蜀至是始乃有之李爽詩春至花如錦庾信賦重重碎錦片片真花梁簡文帝賦乍開花而傍巘梁宣帝詩開花無異色梁昭明太子七啓碧樹初蕊緑草含滋彩雉鬬時頻駐馬傅休奕雉賦播五彩之繁縟列異傳穆公發徒大獵得雌雉化為石置汧渭之間石至文公祠之名陳寶雄飛南集今南陽雄縣即其地也南越志曾城縣多山雞利距善鬬世以家雞鬬之則可擒也魏文帝賦序駐馬書鞭作臨渦之賦庾信詩逢花駐馬看酒旗翻處亦留錢春秋元命苞酒旗主上尊酒所以侑神也韓子宋人有沽酒懸幟甚髙斗概甚平曹植賦仰酒旗之景曜謝朓詩川長别管思地逈翻旗迥晉書阮修傳嘗步行以百錢挂杖頭至酒店便獨酣暢列仙傳酒客梁市上酒家客也作酒常美日得萬錢典論孝靈帝末斗酒至千錢新晴日照山頭雪謝靈運賦望新晴於落日易日月得天而能久照淮南子月照其夜日照其晝王胄雨晴詩夕景照山莊紫騮馬歌辭髙髙山頭樹風吹落葉去謝莊賦積素未虧白日朝鮮燦兮若燭龍􅔷曜照崑山薄暮人爭渡口船廣韻日將落曰薄暮梁簡文帝賦巖薄暮而雲披謝朓賦歸來薄暮聊以永年左傳中軍下軍爭舟庾信賦擁河橋而爭渡杜甫詩渡口下絶岸岑參詩關雲迎渡船早晚到家春欲盡詩夜如何其箋夜如何其問早晚之辭許天正詩龍湖膏澤下早晚遍枯窮晉書劉驎之傳桓冲聞其名請為長史固辭冲嘗到其家驎之曰當先詣家君冲大愧王融詩春盡風颯颯庾信詩夏餘花欲盡今年寒食月初圓蕭子顯詩三六前年暮四五今年朝周禮司烜氏仲春以木鐸修火禁於國中荆楚嵗時紀去冬節一百五日即有疾風甚雨謂之寒食宋孝武帝詩曖曖月初明劉孝威詩今夜月輪圓戴叔倫寄萬德躬故居日暮山風吹女蘿左傳日云暮矣寡君須矣沈約詩佇立日已暮栁惲詩山風起寒木野雀亂秋榛梁昭明太子詩行使流風吹詩蔦與女蘿施于松柏傳女蘿兔絲松蘿也屈原九歌若有人兮山之阿衣薜荔兮帶女蘿故人舟楫定如何古詩悵然逺相望知是故人來陶潛詩故人賞我趣挈壺相與至梁武帝詩舟楫互容與范雲詩海西舟楫斷雲南烟霧通詩如何如何忘我實多梁元帝賦相思相望路逺如何吕仙祠下寒砧急沈既濟枕中記開元七年道士有吕翁者得神仙術行邯鄲道中息邸舍一統志邯鄲縣吕仙祠唐開元中道士吕翁遇少年盧生以枕授生生枕之夢娶崔氏女舉進士歷官至中書令年八十及寤顧翁在傍主人炊黃粱猶未熟後人為立吕仙祠李頎詩四鄰見疏木萬井度寒砧謝朓詩秋夜促織嗚南鄰搗衣急帝子閣前秋水多謝朓詩洞庭張樂地瀟湘帝子游江淹詩北渚有帝子蕩漾不可期一統志滕王閣在南昌府城西唐髙祖子元嬰都督洪州時建閣成命至封為滕王因名其閣莊子秋水時至百川灌河晉書阮籍傳贊秋水揚波春雲斂映閩海風塵鳴戍鼓漢書髙帝紀五年詔故粵王亡諸今以為閩越王又惠帝三年立閩越君搖為東海王注即今泉州是其地一統志福建古閩越地東南都㑹連山距海張正見詩忘懷靜躁間自覺風塵逺庾信詩地中鳴鼓角又戍樓鳴夕鼓劉孝綽詩隔山聞戍鼓傍浦喧棹謳江湖烟雨暗漁簑王筠碑形在江湖心起祇鷲梁昭明太子啓青山暝而江湖逺庾信詩連雲雖有閣終欲想江湖宜都記郡西北有丹山霧起如烟來朝必雨江淹詩復值烟雨散清隂帶山濃何遜詩行雨暗江流禮記季冬命漁師始漁廣韻蓑草名可為雨衣李白詩相憶江南裏船中睡蓋蓑何時醉把黃花酒庾信詩何時得雲雨復見翔寥廓杜甫詩醉把茱茰仔細看禮記季秋之月菊有黃華成公綏菊頌緑葉黃華菲菲彧彧張協賦黃華浮觴酣飲纍日荆楚記九月九日佩茱萸食蓬餌飲菊花酒令人長夀聽爾南征長短歌江總賦敏異季札之聽歌易南征吉志行也楚辭獻嵗發春兮汨吾南征唐書李泌傳泌年九嵗即賦長歌魏文帝燕歌行短歌微吟不能長梁簡文帝詩短歌雖可裁緣情非霧穀朱灣尋隱者韋九山人於東溪草堂尋得仙源訪隱淪雲笈七籖福地第四曰東仙源第五曰西仙源王維桃源行春來遍是桃花水不辨仙源何處尋新論天下神人五二曰隱淪郭璞賦納隱淪之列真挺異人乎精魄王維詩栁市南橋訪隱淪漸來深處漸無塵王昌齡詩跳波沸崢嶸深處不可挹陸雲賦函夏無塵海外有謐徐陵詩山寒微有雪石路本無塵初行竹裏唯通馬庾信詩步轉行初進劉孝綽詩村中望流水竹裏見攢枝張正見樂府路穿時容馬直到花間始見人蘇頲詩往往花間逢綵石易行其庭不見其人王維桃源行坐看紅樹不知逺行盡青溪忽見人四面雲山誰作主范雲詩寒沙四面平梁簡文帝詩意惑東西水心迷四面雲漢書五行志雲起於山而彌於天王維桃源行峽裏誰知有人事世中遙望空雲山數家烟火自為鄰劉長卿詩溪向數家通史記律書天下殷富粟至十餘錢鳴雞吠犬烟火萬里可謂和樂者乎後漢書吳漢傳多樹幡旗使烟火不絶楚辭與泰初而為鄰梁元帝賦常與鄰德而相隨恆與道而為路旁樵客何須問北史趙逸傳逸兄子琰過路旁主人設羊羮琰辭不食劉楨詩輦車飛素蓋從者盈路旁王僧孺文或蹲林卧石藉卉班荆不過野畯田老漁父樵客庾信詩山精逢照鏡樵客值圍棋王維桃源行樵客初傳漢姓名居人未改秦衣服又驚聞俗客爭來集競引還家問都邑朝市如今不姓秦隋書盧思道傳籠絆朝市且三十載劉峻詩我思江海逰曾無朝市玩任昉詩得姓千乘同山林無朝市桃花源記自云先世避秦時亂率妻子邑人來此絶境詩始者不如今云不我可徐陵詩雲霞一已絶寧辨漢將秦庾信詩駐馬來相問應知有姓秦王建贈王樞密唐書宦者列傳王守澄元和中監徐州軍召還十五年與梁守謙韋元素等冊立穆宗俄知樞密院事全唐詩話建初為渭南尉值王樞密者盡宗人之分然彼我不均復懷輕謗之色曰吾弟所作宫詞天下皆誦於口禁掖深邃何以知之建為詩以贈之乃脫其禍先朝行坐鎮相隨舊唐書音樂志先朝作樂韜而未伸曹植書揚子雲先朝執㦸之臣耳白居易詩十三行坐學調品禇亮詩莫言春稍晚自有鎮開花韻書鎮安之也曹植詩飛蓋相追隨今上春宫見長時史記孝武帝紀今上封禪其後十二嵗而還遍於五嶽四瀆竹書紀年周穆王居春宫劉孝威詩明離信養德能事畢春宫禮記年長以倍脫下御衣先賜著史記淮陰侯傳漢王遇我甚厚衣我以其衣魏志華歆傳歆為司徒素清貧帝詔特賜御衣詩載衣之裳疏衣著之以裳徐君蒨詩衣著一時新進來龍馬每教騎唐書百官志進馬五人漢書禮樂志天馬來龍之媒又百官公卿表太僕屬官有龍馬令丞漢鐃歌芝為車龍為馬梁武帝樂府龍馬紫金鞍翠眊白玉羈淮南子釣可以教騎騎可以教御長承密㫖歸家少史記秦始皇紀長承聖治初學記漢律吏五日得一下沐言休息以洗沐也書記所稱曰歸休漢書馮野王傳持虎符出界歸家獨奏邊機出殿遲漢書趙充國傳此全師保勝安邊之冊南史顔竣傳竣出入卧內斷决軍機說文主發謂之機又巧術也變也要也密也錢起詩醉客出花遲自是姓同親向說孟子姓所同也名所獨也江總雜曲曲中唯聞張女調定有同姓可憐人九重爭得外人知楚辭君之門以九重庾信詩自有南風曲還來吹九重晉書王羲之傳獻之工草𨽻謝安問曰君書何如君家尊答曰故當不同安曰外論不爾答曰人那得知荀子曾子曰無內人之疏而外人之親杜甫詩宫中行樂祕少有外人知贈崔禮駙馬鳳皇樓閣連宫樹晉宫閣名洛陽有鳳皇樓王僧孺詩嬴女鳳皇樓漢姬柏梁殿爾雅釋宫疏臺榭樓閣之異西京雜記樓閣臺榭轉相連注唐書百官志九成宫監掌檢校宫樹供進鍊餌之事韋應物詩宫樹野烟和天子崔郎自愛貧晉書王浚傳時童謡曰十囊五囊入棗郎棗嵩浚之子壻也又王凝之妻謝氏傳不意天壤之中乃有王郎詩心乎愛矣遐不謂矣左傳貴而能貧金埒减添栽藥地晉書王濟傳買地為馬埒編錢滿之時人謂為金溝又食貨志布金埒之泉庾肩吾詩塵飛金埒滿皇甫規對策割减廬第無益之飾楊衡詩密添宫栁翠唐書王績傳有奴婢數人養鳬雁蒔藥草自供玉鞭平與賣書人杜陽雜編上嘗幸溫慶宫于復壁間得寶匣中獲玉鞭吳均詩玉鞭蓮花劒金苣流星勒漢書吳王濞傳其居國以銅鹽故百姓無賦卒踐更輒與平價三輔黃圖太學槐市列槐數百行諸生朔望㑹且各持其郡所出貨物及經傳書記相與買賣後漢書王充傳家貧無書嘗逰洛陽市肆閲所賣書家中絃管聽嘗少古詩家中有阿誰漢書郊祀志絲曰絃竹曰管又張禹傳後堂理絲竹管絃傳咸賦側聰耳而有聽分外詩篇看即新梁書吕僧珍傳自有常分豈可妄求叨越杜甫詩賞妍又分外又登臨多物色陶冶賴詩篇梁昭明太子詩摛藻每清新一月一回陪內宴崔惠童詩一月主人笑幾回鮑照頌坐朝陪宴之臣懷揄揚于內李庾賦徵公族于內宴馬蹄猶厭踏香塵史記貨殖傳陸地牧馬二百蹄莊子馬蹄可以踐霜雪曹植詩俯身散馬蹄後漢書趙咨傳目厭所見拾遺記石季倫屑沉水之香如塵末布象床上使所愛者踐之無迹者賜以真珠酬于汝陽曉雪見寄欲明天色白漫漫王逸九思天庭明兮雲霓藏陶潛聯句逺眺同天色梁元帝詩水際合天色袁翻賦俯鏡兮白水水流兮漫漫離騷路漫漫其修逺兮左思賦廓廣庭之漫漫打葉穿簾雪未乾杜甫對雪詩隨風且間葉謝惠連雪賦終開簾而入隙吳均詩細雪下簾隙薄落階前人踏盡班媫妤怨歌行霰雪紛紛而薄水駱賔王詩聚花如薄雪劉廷琦瑞雪篇因風落地吹還起晉孝武帝詔素雪飄于庭前杜甫詩階前樹拂雲張九齡詩不辭山路逺踏雪也相迎差池樹裏鳥銜殘詩燕燕于飛差池其羽梁武帝詩飛鳥起離離驚散忽差池庾信銘樹裏聞歌枝中見舞易林白鳥銜餌鳴呼其子王維詩非關御苑鳥銜殘旋消迎暖沾墻少詩雨雪瀌瀌見睍曰消梁簡文帝詩入池消不積杜甫詩臘日常年暖尚遙今年臘日凍全消韓愈春雪詩落地暖初消斜舞遮春到地難徐陵詩輕雪帶風斜沈約詩舞春雪雜流鶯陳子良春雪詩枝落早春中杜甫詩南雪不到地青崖霑未消勞動更裁新樣綺棗據賦不辭勞而惡動江總詩飛文綺縠采崔日用詩剪綺裁紅妙