徑欲教鋤楚辭卜居寧誅鋤草茅以力耕乎南史孔淳之傳茅室蓬户庭草蕪徑曹植表可使耘鋤穢草嚴公仲夏枉駕草堂兼攜酒饌得寒字唐書嚴武字季鷹至德初遷東川節度使最厚杜甫本傳甫召補京兆司功參軍不至㑹嚴武節度劍南東西川往依焉竹裏行厨洗玉盤何遜詩竹裏見螢飛神仙傳麻姑降蔡經家坐定各進行厨皆金盤玉杯庾信詩行厨半路待漢武內傳西王母降帝宫命侍女索桃須臾以玉盤盛桃七枚形圓色青梁簡文帝詩已麗金叉瓜兼美玉盤橘花邊立馬簇金鞍盧照鄰詩雪處疑花落花邊似雪廽沈約詩寶劍隨玉具汗馬飾金鞍庾信賦金鞍始被柘弓新張非關使者徵求急梁簡文帝詩非關長信别莊子顔闔守陋閭魯君之使者至漢書宦者傳凡詔書所徵求素書愛人深者求賢急樂得賢者養人厚世說郭淮作闈中都督使者徵攝甚急自識將軍禮數寬漢書汲黯傳大將軍青既益尊然黯與抗禮或說黯不可以不拜黯曰夫以大將軍有揖客反不重耶任昉詩生平禮數絶廉頗傳不知將軍寬之至此也百年地僻柴門逈吳均賦古樹荒烟幾百千年陶潛詩心逺地自偏十六國春秋前凉録汜勝家財五十萬悉散之于宗族柴門灌園以琴書自娛陶潛文翳翳柴門事我宵晨謝朓詩地逈翻旗回庾信詩地逈角聲長五月江深草閣寒詩五月斯螽動股又五月鳴蜩韓詩外傳子貢曰臣之事仲尼譬猶渴操壺杓就江海而飲腹滿而去又安知江海之深乎王勃頌書帳翻螢閲蟲文于夏閣江淹賦琴柱急兮江上寒看弄漁舟移白日庾信詩漁舟釣欲滿蓮房採半空王勃序漁舟唱晚響窮彭蠡之濵梁簡文帝詩日移凉氣散西京賦白日未及移晷潘嶽詩朝想慶雲興夕遲白日移老農何有罄交歡論語吾不如老農南史程靈洗傳靈洗性好播植躬勤耕稼雖老農不能及也詩終南何有古詩田家何所有酌醴焚枯魚禮記君子不盡人之歡不竭人之忠以全交也家語曾子曰君子之狎足以交歡史記陸賈傳君何不交歡太尉袁淑詩交歡池陽下留意汾隂西即事暮春三月巫峽長梁元帝纂要三月季春亦曰暮春末春晚春邱遲與陳伯之書暮春三月江南草長荆州記漁者歌曰巴東三峽巫峽長一統志巫峽在巫山縣東三十里與西陵峽歸鄉峽並稱三峽皛皛行雲浮日光說文皛胡了切顯也陶潛詩皛皛川上平陸雲南征賦若溟海之引回流岱靈之吐行雲何遜詩水底見行雲天邊看逺樹劉楨遂志賦榮日華以舒光陰鏗詩映日動浮光唐太宗詩拂潮雲布色穿浪日舒光雷聲忽送千峯雨易天地解而雷雨作又雷雨之動滿盈禮記月令是月也日夜分雷乃發聲說文雷霆餘聲鈴鈴所以挺出萬物也史記龜策傳風雨送之流水行之梁簡文帝詩百嶺相迂蔽千峯共隱天盧照鄰詩驚濤亂水脉驟雨暗峯文花氣渾如百和香陳子良詩花氣近薰衣漢武內傳七月七日設座殿上以紫羅薦地燔百和之香古樂府博山爐中百和香鬱金蘇合及都梁黃鶯過水翻回去詩黃鳥于飛又有鶯其羽義疏黃鳥鸝鶹也或謂之黃栗留一名倉庚齊人謂之摶􅎟謝偃詩黃鶯始哢即嬌人謝朓詩地逈翻旗廽鄒陽賦龍盤鳥廽鳳去鸞歸謝靈運詩風來不可托鳥去豈為聽燕子銜泥濕不妨爾雅燕燕乙也陶隱居本草紫胸輕小者是越燕胸斑黑聲大是胡燕薛道衡詩空梁落燕泥古詩思為雙飛燕銜泥巢君屋夏侯湛賦銜泥搆巢營居傳桷飛閣卷簾圖畫裏崔駰七依丹柱雕楹飛閣層樓東京賦飛閣神行莫我能形劉孝綽詩虹霓拖飛閣古樂府卷簾天自髙海水搖空緑梁簡文帝詩正衣還向鏡迎春試卷簾庾信文玉門亭障無勞圖畫虛無只少對瀟湘後漢書乘飈忽兮馳虛無司馬相如賦乘虛無與神俱曹植詩朝逰江北岸夕宿瀟湘沚謝朓詩洞庭張樂地瀟湘帝子逰劉長卿漢陽獻李相公三國志魏初定荆州屯漢陽以為重鎮唐書地理志鄂州江夏郡漢陽縣名勝志漢水在漢陽府城北退身髙卧楚城幽老子功成名遂身退天之道晉書謝安傳髙卧東山又陶潛傳夏月虛間髙卧北窗之下左傳楚國方城以為城漢水以為池獨掩間門漢水頭張說詩忽聞有嘉客屣步出間門南史袁粲傳席門常掩三徑裁通陶𢎞景尋山志荆門晝掩蓬户夜開春草雨中行徑沒江淹賦春草碧色謝靈運詩萋萋春草繁莊子春雨日時草木怒生梁武帝詩翻往雨中然曹植詩側足無行徑荒疇不復田暮山江上卷簾愁梁簡文帝詩偃蓋暮山虹何遜詩天暮逺山青江淹賦臨江上之斷山何遜詩珠簾旦且卷幾人猶憶孫宏閣梁昭明太子詩故箏猶可惜應度幾人邊漢書公孫宏傳宏自起徒步數年至宰相封侯於是起客館開東閣以延賢人與參謀議注閣者小門也東向開之避當庭門而引賔客以别于掾史官屬也爾雅小閨謂之閣孫逖詩開閣寵平津百口同乘范蠡舟後漢書趙岐傳岐賣餅北海市中孫嵩見岐察非常人密問曰我北海孫賔石闔門百口勢能相濟詩二子乘舟泛泛其景史記越世家范蠡事越王勾踐報㑹稽之恥以為大名之下難以久居乃裝其輕實珠玉自與其私徒屬乘舟浮海以行早晚却還丞相印詩夜如何其箋此宣王以諸侯將朝夜起曰夜如何其問早晚之辭蔡君知詩車鳴丞相來史記蘇秦傳使我有洛陽負郭田二頃豈能佩六國相印乎十年空被白雲留木蘭詞壯士十年歸陶潛詩青松夾路生白雲宿簷端北山移文白雲誰侣陶𢎞景詩山中何所有嶺上多白雲梁簡文帝詩神通七星變貌逐五雲留錢起登劉賔客髙齊能以功成踈寵位老子功成而不居潛夫論寵位不足以尊我而卑賤不足以卑已不將心賞負雲霞謝靈運詩序天下良辰美景賞心樂事四者難并謝朓詩文奏方盈前懷人去心賞謝靈運詩林壑斂暝色雲霞收夕霏鮑照書西南望廬山峯與辰漢連接上常積雲霞雕錦縟林間客散孫宏閣孫綽賦朱閣玲瓏于林間玉堂隂映于髙隅梁元帝詩林間花欲然竹徑露初圓盧照鄰詩客散同秋葉城上山宜綺季家王筠詩棲烏城上返晚雀林中度庾信詩日晚荒城上蒼茫餘落暉史記留侯世家四人年皆八十有餘鬚眉皓白衣冠甚偉上怪之問曰彼何為者四人前對各言名姓曰東園公用里先生綺里季夏黃公班固賦榮期綺季此焉快心蝴蝶晴連池岸草列子烏足之根為蠐螬其葉為蝴蝶莊子昔者莊周夢為蝴蝶栩栩然蝴蝶也張協詩借問此何時蝴蝶飛南園謝靈運詩池塘生春草梁元帝詩裂紈依岸草黃鸝晚出栁園花髙隱傳戴顒春日攜雙柑斗酒人問何之曰往聽黃鸝聲耳謝靈運詩園栁變鳴禽王勃詩新芳花栁遍日陪鯉也趨文苑論語嘗獨立鯉趨而過庭沈佺期詩千春奉休歷分禁喜趨陪後漢書文苑傳上下二卷文心雕龍後漢才林可參西京晉世文苑足儷鄴都誰道門生隔絳紗晉書陶潛傳素有腳疾向乘籃輿乃令一門生二兒共輿之後漢書馬融傳融逹生任性不拘儒者之節常坐髙堂施絳紗帳前授生徒後列女樂邢邵文踟蹰緹衮絳帳韋編上中書李侍郎爽氣朝來萬里清晉書王徽之傳西山朝來致有爽氣鮑照詩寒律驚窮蹊爽氣起喬木張載詩十日出暘谷弭節馳萬里劉繪詩朝雲萬里色楚辭泬寥兮天髙而氣清陶潛詩清氣澄餘滓杳然天界髙慿髙一望九愁輕史記孔子世家有所怡然髙望而逺志焉蔡琰詩登髙逺眺望庾信詩離關一長望梁簡文帝詩逍遙臨四注兼持散九愁不知鳳詔霖初霽梁元帝文兩升鳳詔三侍龍樓書若大旱用汝作霖雨左傳凡雨自三日以往為霖蕭子雲詩泬寥晚霖霽重疊晴雲新何遜詩振衣喜初霽褰裳對晚晴但覺堯天日轉明論語巍巍乎唯天為大唯堯則之史記堯紀其仁如天其智如神楞嚴經彼太虛空日照則明雲屯則暗王融詩長為南山固永與朝日明四野山河通逺色阮籍詩登髙臨四野北望青山阿史記項羽紀關中阻山河四塞文中子子登雲中之城望龍門之關曰壯哉山河之固陶潛詩書誓山河啓土開封薛道衡詩髙天澄逺色秋氣入蟬聲千家砧杵動秋聲說苑景公令吏致千家之縣于晏子古子夜秋歌佳人理寒服萬結砧杵勞何遜詩砧杵鳴四鄰劉孝威詩妖姬含怨情織素起秋聲蕭慤詩山樹動秋聲遙想青雲丞相府孫綽天台山賦序何肯遙想而存之史記范睢傳須賈曰賈不意君能自致于青雲之上荀綽晉百官表注漢丞相府門無闌不設鈴不警鼓言其深大濶逺無節限也蕭子顯詩丞相府中烏未飛何時開閣引書生庾信詩何時得雲雨後漢書道逢三書生宴王補闕城東小池王孫興至幽尋好楚辭王孫逰兮不歸春草生兮萋萋馬融賦游閒公子暇豫王孫王維詩興來每獨往周𢎞正詩幽尋屬令弟依然歸舊館芳草春深景氣和離騷何所獨無芳草兮爾何懷乎故宇班固賦竹林果園芳草甘木楊炯賦日永春深殷仲文詩景氣多明逺風物自凄緊陶潛詩氣和天惟澄班坐依逺流藥院愛隨流水入北史李元忠傳元忠雖處要任初不以物務干懷園庭羅種果藥親朋尋詣必留連宴賞詩沔彼流水朝宗于海石崇序流水周于舍下蕭大圜書面修原而帶流水山齊喜與白雲過南史謝舉傳舉宅內山齊捨以為寺泉石之美殆若自然徐陵詩竹密山齊冷荷開水殿香庾信詩洞靈開靜室雲氣滿山齊詩英英白雲謝靈運詩春晚緑野秀巖髙白雲屯古辭華山畿曲願君如行雲時時見經過猶嫌巢鶴窺人逺王維詩行隨拾栗猿歸對巢松鶴祖詠詩簷前花覆地竹外鳥窺人世說支道林好鶴曰既有凌霄之姿何肯為人作耳目近玩不厭叢花對客多王勃詩小徑偏宜草空庭不厭花邱遲詩雜葉半藏蜻叢花半隱雀江總詩叢花霽後發一鳥霧中來王維詩野花愁對客泉水咽迎人醉來倚玉無餘事世說魏明帝使后弟毛曾與夏侯泰初並坐時人謂蒹葭倚玉樹戰國策陳軫謂犀首曰公何好飲也曰無事也王筠樂府小婦獨無事當軒理清曲目送歸鴻笑復歌嵇康詩目送歸鴻手揮五絃謝朓詩停琴佇凉月滅燭聽歸鴻易林終年卒嵗樂以笑歌何遜詩笑歌自侈靡幽居春暮書懷自笑鄙夫多野性杜甫詩自笑狂夫老更狂論語有鄙夫問於我空空如也謝靈運詩中為天地物今成鄙夫有張說詩野失巢由性貧居數畝半臨湍陸雲賦于是貧居之士喟爾相與而俱歎庾信賦余有數畝弊廬寂寞人外古樂府白石郎臨江居謝靈運賦逺隄兼陌近流開湍溪雲雜雨來茅屋梁元帝詩溪雲連陳合却月半山空孔範詩能感荆王夢陽臺雜雨歸左傳清廟茅屋大路越席晉書羅含傳含轉州别駕以廨舍喧擾于城西池小洲上立茅屋伐木為材織葦為席而居山雀將雛到藥欄鮑照詩荒徑馳野鼠空庭聚山雀應璩詩言是鳳將雛成公綏賦似鴻雁之將雛羣鳴號乎沙漢庾肩吾詩向嶺分花徑隨階轉藥欄仙籙滿牀間不厭徐陵書金繩玉版受謁帝之符龍駕霓裳處仙宫之籙瀨鄉記老子母碑云老子抱持仙籙玉簡金字編以白銀紀善綴惡庾信詩逰仙半壁畫隱士一床書禮記淡而不厭易林經棗整冠意盈不厭劉楨詩于心有不厭隂符在篋老羞看戰國策蘇秦說秦王書十上而說不行去秦而歸乃夜發書陳篋數十得太公隂符之謀伏而誦之左傳燭之武曰臣之壯也猶不如人今老矣無能為也已更憐童子宜春服論語暮春者春服既成冠者五六人童子六七人左思賦習步頓以升降御春服而逍遙庾信啓青襟宜襲書生無廢學之詩春服既成童子得雩沂之舞花裏尋師到杏壇王融詩絲中傳意緒花裏寄春情後漢書李固傳少好學嘗步行尋師不逺千里梁昭明太子七月啓懷經問道不遇披雲負笈尋師罕逢見日莊子孔子逰乎惱帷之林休坐乎杏壇之上弟子讀書孔子絃歌鼓琴和慕容法曹尋漁者寄城中故人孤烟一㸃緑溪湄范雲詩江干逺樹浮天末孤烟起庾信詩野戍孤烟起春山百鳥啼蕭子良書仲將之墨一㸃如漆王湄粲詩列車息衆駕相伴緑水漁父幽居即舊基屈原漁父漁父管爾而笑鼓枻而去禮記幽居而不淫謝靈運詩曩基即先築故池不更穿饑鷺不驚收釣處古樂府鷺何食食茄下晉書張駿傳姑臧謡曰鴻從南來雀不驚庾信賦蟬有翳兮不驚雉無羅兮何懼隂鏗詩林寒正下葉釣晚欲收綸間麛應乳負暄時爾雅鹿牡麚牝麀其子麛書鳥獸孳尾傳乳化曰孳交接曰尾庾信賦鳥毛徒覆獸乳空含列子宋田父自曝于日顧謂其妻曰負日之暄人莫知者以獻吾君將有重賞茅齊對雪開樽好南齊書劉善明傳質素不好聲色所居茅齊斧木而已張九齡詩忽對林亭雪瑶花處處開劉峻金華山棲志班荆林下陳尊置酌稚子焚枯飯客遲陶潛歸去來辭僮僕歡迎稚子候門庾信詩稚子還羞出驚妻倒閉門任昉表折芰燔枯此焉自足勝事宛然懷抱裏南史齊竟陵王子良傳子良少有清問禮才好士善立勝事司馬相如賦有女獨處宛然在床王羲之蘭亭序或取諸懷抱晤言一室之內謝靈運賦哲人不存質懷誰抱謝朓詩物色盈懷抱方駕娛耳目頃來新得謝公詩南齊書謝朓傳朓為齊隨王子隆鎮西功曹長五言詩沈約常云二百年來無此詩也李白詩朝吟謝公詩韓翃送王光輔歸青州兼寄儲侍御書海岱惟青州明一統志山東青州府唐初為青州後改北海郡乾元初復為青州幾回奏事建章宫周禮太僕掌諸侯之復逆注復奏事也逆謂受下奏史記汲黯傳汲黯前奏事上不冠望見黯避帳中使人可其奏漢書宣帝紀自丞相以下各奉職奏事以傳奏其言考試功能又武帝紀太初元年二月起建章宫又郊祀志武帝起建章宫千門萬户周三十里徐陵詩因來入建章聖主偏知漢將功後漢書第五倫傳每讀詔書常歎息曰此聖主也一見决矣王褒聖主得賢臣頌遇明君遭聖主何晏賦坐髙門之側堂彰聖主之威神鮑照詩擁旄為漢將汗馬出長城身著紫衣趨闕下左傳良夫乘裏甸兩牡紫衣狐裘管子桓公好服紫衣齊人尚之五素而易一紫史記封禪書新垣平使人持玉杯上書闕下獻之論衡麒麟須獻乃達闕下班固詩上書詣闕下思古歌雞鳴口銜丹詔出關東鄴中記有詔書銜木鳳口中放數百丈緋繩回轉飛下後漢書虞詡傳關東出相劉長卿詩鬬雞過渭北走馬向關東蟬聲驛路秋山裏杜甫詩蟬聲集古寺鳥影度寒塘孔稚圭文馳烟驛路勒移山庭草色河橋落照中江淹詩草色斂窮水木葉變吳川王僧孺文霜銷草色風搖樹影庾信詩歸鞍畏日晚爭路上河橋王褒詩初春麗景鶯欲嬌桃花流水沒河橋梁簡文帝詩密房寒日晚落照度空窗逺憶故人滄海别古詩相去萬餘里故人心尚爾世說王右軍既去官與東土人士營山水弋釣之娛逰東中諸郡名山泛滄海吳均詩執以代疏麻長貽故人别當年好躍五花驄宋書張緒傳蜀栁數株枝條甚長武帝常賞玩咨嗟曰此楊栁風流可愛似張緒當年時李白詩五花馬千金裘杜甫髙都護驄馬行五花散作雲滿身萬里方看汗流血名畫要録開元內廄有飛黃照夜浮雲五花之乘後漢書桓典為侍御史常乘驄馬京師語曰行行且止避驄馬御史題張逸人園林藏修不復見時人禮記君子之於學也藏焉修焉息焉遊焉後漢書逸民傳法真字髙卿友人郭正稱之曰法真名可得聞身難得而見世說顧歡字景怡晚節服食不與人通愛此雲山奉養真宋書謝靈運傳郡有名山水靈運素所愛好杜甫詩京洛雲山外陶潛詩養真衡茅下庶以善自名露色㸃衣孤嶼曉鮑照詩露色染春草泉源潔氷苔謝靈運詩孤嶼媚中川梁簡文帝賦月露澄曉風栁悲暮花枝妨帽小園春劉孝威詩隔墻花半隱猶見動花枝張正見詩暗開脂粉弄花枝庾信賦簷直倚而妨帽户平行而礙眉梁元帝詩欲道春園趣復道春時人王績詩琴伴前庭月酒勸後園春時携幼稚諸峯上禮記長者與之提携則兩手奉長者之手揚雄賦匪惟幼稚嬉戲土砂陶潛歸去來辭序幼稚盈室瓶無儲粟間濯眉鬚一水濵孟子滄浪之水清兮可以濯我纓後漢書趙一傳美須豪眉望之甚偉化源記田鸞服柏葉眉鬚紺緑後成仙稱柏葉仙人王羲之詩仰觀碧天際俯瞰緑水濵江淹詩若作商人客寄謝丹水濵興罷歸來還對酌晉書王徽之傳憶戴逵在剡夜乘小船詣之造門不前而反曰本乘興而來興盡而返陶潛歸去來辭歸去來兮田園將蕪胡不歸孟浩然詩開襟成歡趣對酌不能罷茅簷掛著紫荷巾陶潛詩襤䄛茅檐下未足為高棲案檐同簷庾信詩谷寒已吹律檐空更剪茅隂鏗詩茅簷下亂滴北齊書祖鴻勳傳與陽休之書曰把臂入林挂巾垂枝蕭子雲詩惆悵惜荷巾送康洗馬歸滑州元和郡縣志滑州本春秋時衛地戰國屬魏秦初置東郡天寶元年改名滑州腰佩雕弓漢射聲陳子昂詩腰佩騂角弓詩敦弓既堅注敦弓畫弓也敦與雕同辛德源詩雕弓韜六鈞漢書百官表射聲校尉掌待詔射聲士東歸銜命見雙旌詩我東曰歸陳子昂詩東歸在洛陽漢書孫寶傳臣幸得銜命奉使職在刺舉阮籍書銜命聘享則專對之才唐書百官志節度使觀察使辭日賜雙旌雙節青絲玉勒康侯馬古樂府青絲繫馬尾庾信賦控玉勒而搖星薛道衡詩卧驅飛玉勒易晉康侯用錫馬蕃庶晝日三接孟水金堤滑伯城水經河水又東注滑臺城酈道元注城下有延津一名孟水又名靈昌津元和志延津即靈昌津也左傳鄭太叔收二以為己邑至于廩延又魏武救劉延至延津皆此津也後趙石勒伐劉曜至河渚不得渡因風結氷而渡因改靈昌津漢書溝洫志金堤在東郡白馬界括地志金堤在滑城南二十三里一名千里堤又元和志古滑臺城滑氏之壘衛靈公增以為城城甚髙峻臘雪夜看宜縱飲史記秦惠文公十二年初臘始皇三十