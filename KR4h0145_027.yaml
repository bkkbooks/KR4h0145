扄焉得而寧之雖結佩皇廷焉得而榮之釋文扃關也一云門扇上環紐楊巨源贈史開封天低荒草誓師壇沈佺期詩地盡覺天低唐太宗詩葉鋪荒草蔓王昌齡賦長林之墟荒草無垠書禹乃㑹羣后誓于師曰濟濟有衆咸聽朕命庾肩吾詩誓師屠六郡登城望九嵕史記淮隂侯傳贊相國深薦榮拜登壇鄧艾心知戰地寬魏志鄧艾傳為稻田守叢草吏每見髙山大澤輒規度指畫軍營處所史記五帝紀贊非好學深思心知其意難為淺見寡聞道也詩牧野洋洋箋言其戰地寬廣不用權詐也孫子先處戰地而待敵者勝鼓角逈臨霜野曙唐書百官志節度使入境州築節樓迎以鼓角鄭義真詩山月逈臨鞍張說詩衆山皆圍繞長川復逈臨唐太宗詩霜野韜龍劍旌旗髙對雪峯寒潘嶽文旌旗電舒矛㦸林立謝朓詩旌旗散容與梁簡文帝詩山峯帶月寒杜甫詩玉山髙並兩峯寒五營向水紅塵起後漢書順帝紀調五營弩師令郡舉五人教習戰射注五營五校也謂長水步兵射聲胡騎車騎等五校尉也顔延之賦勒五營使按部庾信詩路塵猶向水征帆獨背關沈約樂府蹀躞飛塵起左右自生光起徐伯陽詩欲識東方千騎歸藹藹日暮紅塵一劍當風白日看吳均詩吾有一寶劍出自昆吾溪劉希夷詩將軍闢轅門耿介當風立魏志武帝紀君執大節精貫白日鮑照詩春吹回白日霜髙落塞鴻杜甫詩看劍引杯長曾從伏波征絶域漢書南粵傳衛尉路博德為伏波將軍出桂陽下湟水後漢書馬援傳贊伏波好功爰自冀隴南靜駱越西屠燒種戴皓詩騎指伏波營張正見詩關山度曉月劍客逺從征西京雜記傅介子嘗棄觚歎曰大丈夫當立功絶域何能坐事散儒李陵書先帝授陵步卒五千出征絶域磧西蕃部怯金鞍唐書沙陀傳沙陀西突厥别部處月種也居金娑山之陽蒲類之東有大磧名沙陀故號沙陀突厥云又地理志太宗平西北諸藩即其部落列置州縣水經注漢武元朔二年開朔方郡治又有西部都尉治梁元帝詩金鞍照日暉庾信賦按玉勒而搖星跨金鞍而動月張籍謝裴司空寄馬唐書裴度傳穆宗即位以度守司空平章事東都留守騄耳新駒駿得名史記秦紀造父以善御幸周繆王得驥溫驪驊駵騄耳之駟注紀年曰北唐之君來見以一驪馬是生緑耳八駿皆因其毛色以為名號說文馬二嵗曰駒華陽國志滇池縣有水澤周回二百里長老傳言池中有神馬與家馬交則生駿駒世稱滇池駒日行五百里庾信詩長風駿馬名司空逺自寄書生後漢書袁安傳初安訪求葬地道逢三書生陳子昂詩寧知班定逺猶是一書生乍離華廄移蹄澀後漢書順帝紀注時逺近獻馬衆多園廄充滿始置承華廄顔延之賦文駟列于華廄全唐詩話元相公賔府薛書記出幕作十離詩上獻府主三曰馬離廄初到貧家舉眼驚南史朱修之傳往姊家姊為設菜羮粗飯以激之修之曰此貧家好食進之致飽杜甫詩不覺羣心妬休牽衆眼驚每被閒人來借問詩桑者閒閒兮劉孝威詩人閒宇宙中曹植白馬篇借問誰家子幽并游俠兒多尋古寺獨騎行常建詩清晨入古寺初日照禪林詩獨行踽踽盧綸詩樹老野泉清幽人好獨行長思嵗旦沙堤上後漢書吳良傳初為郡吏嵗旦與掾吏入賀晉書禮樂志嵗旦常設葦菱桃梗磔雞于宫及宫寺之門唐故事宰相初拜京兆使人載沙填路自私第至于城東街名曰沙堤得從鳴珂傍火城徐陵詩飛蓋響鳴珂辛德源詩鳴珂蹀細栁國史補每元日冬至立仗大官皆備珂􅏛列燭有至五六百炬者謂之火城宰相火城將至衆皆滅燭避之題韋郎中新亭起得幽亭景復新唐太宗詩林亭自有幽真趣王勃文輒離驂以少留敞幽亭之多晦鮑泉詩新景自新還崔新日知詩聞君别業碧莎地上更無塵梁簡文帝詩廣路拂青栁廽塘繞碧莎桓法闓詩當知勝地逺於此絶囂塵盧綸詩岸莎青有露苔徑緑無塵琴書著盡猶嫌少楚辭且從容兮自慰恱琴書兮逰戲陶潛詩委懷在琴書盧綸詩見少情難盡松竹栽多亦稱貧梁元帝書山間芳杜自有松竹之娛徐陵書山澤暗靄松竹參差盧綸詩買山多為竹卜宅不緣貧藥酒欲開期好客漢詔酒者百藥之長嘉㑹之好漢武內傳仙家上藥有玉酒瓊瑶酒世語子髙少好隱淪之術嘗為美酒給道客一旦四仙人齎酒集其舍謂子髙曰卿藥陳久可服吾藥子髙服之因隨仙人飛去庾信詩浮蟻對春開朝衣暫脫見閒身北齊享廟樂歌禮申官次命改朝衣劉長卿詩知君喜初服秪愛此身閒成名同日官連署國史補進士俱捷謂之同年左傳同官為寮吾嘗同寮敢不盡心乎初學記秦初置郎中令其屬官有三署白帖諸曹郎曰粉署亦曰仙署廣韻署廨署部署也此處經過有幾人古辭華山畿曲願君如行雲時時見經過謝混詩逍遙越林津願言屢經過送韓侍御歸山聞君久卧在雲間謝靈運詩躋險築幽居披雲卧石門後漢書逸民傳矯慎隱遁山谷汝南吳蒼遺書曰足下審能騎龍弄鳳翔嬉雲間者亦非狐兔燕雀所敢謀也張華詩飄登青雲間論道神皇廬為佐嫖姚未得還廣韻佐助也何曾表進同謀略退為副佐梁書韋放傳纍為藩佐並著聲績漢書霍去病傳再從大將軍受詔豫壯士為票姚校尉服䖍注音飄搖漢書班超傳一得生還復見闕庭王昌齡詩萬里長征人未還新結茒廬招隱逸後漢書李恂免官步歸鄉里結草為廬織席自給晉書王嘉傳潛隱於終南山結菴廬而止張九齡詩亂雲堆裏結茅廬左思招隱詩杖策招隱士荒塗橫古今嵇康詩巖穴多隱逸輕舉求吾師楊師道詩眷言懷隱逸輟駕踐幽叢獨騎驄馬入深山後漢書桓典傳典為侍御史執政無所廽避常乘驄馬京師語曰行行且止避驄馬御史髙士傳善卷入深山莫知其處九靈洞口行應到王褒靈壇碑九靈之府神液所以降祥雲笈七籖八節日行入五嶽仙真所棲名山之處燒香乞願曰𤣥上九靈太真髙神使某長生所欲從心五粒松枝醉亦攀本草圖經五粒松讀為鬛言每五鬛同一葉又西嶺松如馬鬛又葉五枝者服之長生癸辛雜識凡松葉皆雙股故世以為松叉獨栝松每穗三鬚而髙麗所産每穗乃五鬛馬今所謂華山松也劉公幹詩松枝一何徑王績詩石苔應可踐叢枝幸易攀明日珂聲出城去沈約詩勿言一樽酒明日難重持張華詩乘馬鳴玉珂徐陵詩聞珂知馬蹀家僮不復掃柴關史記貨殖傳卓氏家僮八百人庾信詩家僮掃栗跗王維詩花落家僮未掃江淹賦閉關却掃塞門不仕郎士元詩仲宣何所賦秪欲滯柴關寄和州劉使君一統志秦置歷陽縣漢屬九江郡晉屬淮南郡北齊置和州天寶初為歷陽郡乾元初為和州唐書劉禹錫傳由和州刺史入為主客郎中按劉本集有張郎中籍逺寄長句因舉目前仰酬高韻詩别離已久猶為郡蘇武詩良友逺别離梁昭明太子詩前言節所愛後言别離久南史謝恂傳恂子孺子出為廬江郡孝武曰謝孺子不可屈為小郡間向春風倒酒瓶魏文帝詩向風長歎息沈約詩臨春風春風起春樹杜甫詩酒盡沙頭雙玉瓶送客將過沙口堰江淹賦帳飲東都送客金谷名勝志沙口堰即當利浦也在州城東十二里看花多上水心亭劉希夷詩看花若有情白居易詩前有水心亭動蕩架漣漪一統志水心亭在和州治曉來江氣連城白陳閏詩曉來但覺衣裳濕王維詩月落江湖白名勝志江水經和州城北五里與上元縣分中流為界雨後山光滿郭青虞世南詩雨歇連峯山翠王維詩空山新雨後沈約詩光浮水至謝朓詩不對芳春酒還望青山郭名勝志和州城北半里有八公山到此詩情應更逺陸機賦詩緣情而綺靡水經注秀宇層明通望周博游者登之以暢逺情郎士元詩新詩報逺情醉中髙咏有誰聽晉書王羲之傳興言高詠銜杯引滿江總詩髙詠七哀詩杜甫詩舊好何由展新詩更憶聽嚴維詩商歌奏罷復誰聽白居易香爐峯下新卜山居草堂初成偶題東壁後漢書注廬山有香爐峯其上氤氛若香烟白居易廬山草堂記匡廬竒秀甲天下山北峯曰香爐峯寺曰遺愛寺白樂天見而愛之面峯腋寺作為草堂長松樹下小溪頭孫綽賦䕃落落之長松薛道衡詩澗影落長松杜甫詩移床愛小溪斑鹿胎巾白布裘韋應物詩麑斑始力直南史何㸃傳梁武帝與㸃有舊手詔賜以鹿皮巾庾信啓垂賜鹿子巾一枚解角新胎戴藤初孕史記衛世家衛文公大布之衣大帛之冠藥圃茶園為産業周禮天官大冡宰園圃以育草木王維詩荷鋤修藥圃茶經茶之名一曰茶二曰檟三曰蔎四曰茗五曰荈郭璞云早取為茶晚取為荈韋應物喜園中茶生詩率爾植荒園左思詩陳平無産業歸來翳負郭野麋林鶴是交游禮記仲冬之月麋角解晉書陸機傳本謂雲龍騤騤乃是山鹿野麋杜甫詩鳴鶴不歸林孟子與鹿豕逰杜甫詩逺害朝看麋鹿遊雲生澗户衣裳潤郭璞詩雲生梁棟間庾信詩山深雲濕衣江總文崖巖峻絶澗户幽深盧照鄰詩澗户無人跡廣韻上曰衣下曰裳朱超詩雲雨留輕潤本集草堂記夏有石門澗雲嵐隱山厨火燭幽朱慶餘詩嵐暗樹無隂王維詩射雁與山厨李觀詩村店烟火動漁家燈獨幽最愛一泉新引得韋應物詩碧泉更幽絶賞愛未能去岑參詩引泉通竹竿栁宗元詩引泉開故竇本集草堂記堂西倚北崖右趾以剖竹架空引崖上泉清泠屈曲繞階流耿湋詩清泠飲萬家鮑照賦抱瑶塘之周流繞金渠之屈曲武三思詩巖崿縈紆上澄潭屈曲流顔延之詩閲水環階引池分席尋郭道士不遇按本集有同微之贈别郭虛舟鍊師五十韻詩云我為江司馬君為荆判司俱當愁悴日始識虛舟師元稹集有和樂天尋郭道士不遇詩注昔曾為僧於荆州相别郡中乞假來相訪舊唐書本傳憲宗元和十年授江州司馬唐書地理志江州潯陽郡本九江郡天寶元年更名謝承後漢書范丹為郡功曹每休假日單步策杖皇甫冉詩莫怪北門頻乞假陳子昂詩聞鶯忽相訪洞裏朝元去不逢劉長卿詩桃花洞裏居人滿雲笈七籖朝太素三元君夜用子時左右於寢靜北向六再拜跪王勃文楊意不逢撫凌雲而自惜看院秪留雙白鶴王勃詩初晴山院裏何處染囂塵庾信詩沙洲兩鶴逈石路一松孤永嘉記去青田九里有雙白鶴年年生子長大便去只餘一雙在精白可愛云神仙所養初學記衡山有三峯其一名紫蓋天景明徹有一雙白鶴徊翔其上入門惟見一青松荀昶詩入門無所見但見雙棲鶴晉書孫綽齊前種一株松枝髙勢逺隋焬帝詩古松惟一樹江淹詩青松挺秀萼藥爐有火丹應伏雲笈七籖藥二十四味合二十四神之氣和九晨九隂之精凝液結日月之明景也又大丹爐鼎亦須合其天地人三才五神而造之又用火之訣亦象乎隂陽二十四氣七十二候又入砂於鼎中用隂陽火候飛伏之飛伏法五日為一候三候為一氣用八氣二十四候一百二十日周而砂伏火畢參同契下有太陽氣伏蒸須臾間雲碓無人水自㫪本集自注廬山中雲母多故以水碓搗練俗呼為雲碓楚辭野寂漠其無人桓談新論役水而㫪其利百倍庾信詩穿渠移水碓李白詩水㫪雲母碓欲問參同契中事列仙傳後漢魏伯陽吳人入山作神丹丹成仙去乃作參同契三卷論金丹之事神仙傳魏伯陽作參同契二卷其說似解周易其實論作丹之事更期何日得從容詩五日為期杜甫詩後㑹且深期史記張良傳所與從容言天下事甚衆舟中晚起日髙猶掩水窗眠唐太宗詩心隨朗日高常建詩新花對水窗徐陵詩當窗應未眠枕簟清凉八月天杜甫詩枕簟入林僻楚辭風伯為余先驅兮氛埃辟而氣凉陶潛詩清凉素秋節宋之問詩八月凉風天氣晶杜甫詩蒲荒八月天泊處或依沽酒店陶潛詩前途當幾許未知止泊處史記司馬相如傳相如之臨卬買一酒舍酤酒令文君當壚身自濯器於市中徐陵烏棲曲胡姬沽酒誰論價庾信詩遙想山中店懸知春酒濃宿時多伴釣魚船鮑照詩追憶棲宿時莊子就藪澤處閒曠釣魚閒處無為而已矣庾信詩髙荷沒釣船杜甫詩吹花隨水去翻却釣魚船退身江海應無用老子功成名遂身退天之道莊子身在江海之上心居乎魏闕之下劉長卿詩江海無行跡莊子皆知有用之用而不知無用之用憂國朝廷自有賢漢書成帝紀修身遵禮同心憂國禮記朝廷之美濟濟翔翔漢書申屠嘉傳朝廷之禮不可不肅世說宣武與簡文太宰共載密令人在輿前後鳴鼓大呌太宰惶怖簡文穆然宣武語人曰朝廷間故復有此賢且向錢塘湖上去錢塘記大海在縣東一里郡議曹華信議立此塘以防海水募有能致一石土者即與錢一千旬月之間來者雲集塘以之成故名錢塘馬唐書居易傳穆宗時居易為杭州刺史始築隄捍錢塘湖鍾泄其水溉田千頃冷吟閒醉二三年常建詩冷冷花下琴君唱渡江吟陶潛飲酒序余閒居寡歡偶有名酒顧影獨盡忽焉復醉既醉之後輒題數句莊子自我聞子之言一年而野二年而從三年而通詩自我不見於今三年杭州春望唐書地理志杭州餘杭郡屬江南道西湖志餘杭州之名相傳神禹治水㑹諸侯於㑹稽至此舍杭登陸故名一統志杭州府禹貢揚州之域春秋時屬吳越戰國屬楚秦為㑹稽郡地漢屬吳郡隋置杭州大業初改為餘杭郡唐復為杭州望海樓明照曙霞一統志望海樓在鳳皇山下唐武德中建一名東樓沈佺期詩北闕彤雲掩曙霞護江隄白踏晴沙唐書地理志錢塘縣南五里有沙河塘杜甫詩護隄盤古木錢起詩寒花古岸旁鶴唳晴沙上濤聲夜入伍員廟岑參詩城裏濤聲震吳越春秋吳王賜子胥劒盛以鴟夷之器投之江海子胥因隨流揚波成濤激岸隨潮往來一統志伍子胥在吳山鴟夷浮江吳人憐之立祠江上名曰胥山栁色春藏蘇小家謝朓賦栁含色於逺岸何遜詩輕烟滲柳色王筠詩楊栁半藏鴉西湖志餘蘇小小者錢塘名妓也蓋南齊時人紅袖織綾誇柿蒂張華樂府羅袿徐轉紅䄂揚梁簡文帝賦素腕舉紅䄂長庾信詩新綾織鳳皇長慶集自注杭州綾柿蒂花者尤佳白帖蛇皮竹枝柿蒂皆今時綾名青旗沽酒趂梨花王融文祥正而青旗肅事孔融難魏武帝禁酒書天垂酒旗之曜地列酒泉之郡詩有酒湑我無酒酟我淮南子酤酒買肉不離屠酟之家長慶集自注杭州之俗釀酒趂梨花時熟號梨花香誰開湖寺西南路名勝志自斷橋至孤山寺為白公隄以郡守居易築也舊有寺在湖中又西湖周繞三十里三面環山溪谷縷注以其負郭而西故稱西湖草緑裙腰一道斜古詩秋草萋以緑王適詩春著裙腰自無力李嶠詩泉飛一道帶峯出半天雲元稹清都春霽寄胡三吳十一列子清都紫微鈞天廣樂上帝之所居蕊珠宫裏經微雨黃庭內景經太上大道玉宸君閒居蕊珠作七言祕要經仙宫中有寥陽之殿蕊珠之闕李白詩傳詩蕊珠宫潘嶽賦微雨新晴六合清朗王褒文香隨微雨自灑風塵草樹無塵耀眼光庾信賦草樹溷淆枝格相交梁武帝歌草樹非一香陸雲賦函夏無塵海外有謐徐陵詩石路本無塵魏文帝詔前于闐所上孔雀尾萬枝以為金根車蓋遙望耀人眼白日當空天氣暖班固答賔戲未仰天庭而覩白日也謝眺詩白日麗飛甍韓憑妻詩日出當心儲光羲詩山勢當空出禮記孟春之月天氣下降陶潛詩今日天氣佳江淹詩南中氣候暖好風飄樹栁隂涼陶潛詩微雨從東來好風與之俱文士傳嵇康性絶巧能煆家有一栁樹乃激水圜之夏天甚涼居其下遨逰及煆魏文帝詩栁垂重緑隂蜂憐宿露攢芳久方言蜂燕趙之間謂之蠓螉或謂之蚴蛻唐太宗詩宿露足朝烟埤雅蜂採取百芳釀蜜其房如脾謂之蜜脾韻㑹攢簇聚也燕得新泥拂户忙夏小正三月燕來降古詩思為雙飛燕􅔷泥巢君屋傅休奕賦燕􅔷泥於廣庭杜甫詩燕子􅔷泥兩度新皇甫冉檐燕詩拂水競何忙時節催年春不住孔融書嵗月不居時節如流古詩白露霑野草時節忽復易張九齡詩年催華髮新劉李威詩翩翩終不住武陵花謝憶諸郎陶潛桃花源記晉太康中武陵人捕魚為業緣溪行忘路之逺近忽逢桃花林夾岸數百步中無雜樹芳草鮮美落英繽紛漁人甚異之鄭愔詩别訪武陵花喬知之詩莖枯花謝枝憔悴早春尋李校書欵欵春風淡淡雲繁欽詩中情既欵欵王僧孺詩何因送欵欵湘東王詩春日春風過庾信詩春風滿路香宋玉賦水淡淡而盤紆魏文帝詩淡淡隨風輕杜甫詩淡雲疏雨過髙城栁枝低作翠櫳裙阮瑀樂府仰折楊栁枝梁簡文帝詩栁枝無極軟劉長卿詩君在江南相憶否門前五栁幾枝低說文櫳檻也唐太宗詩殘栁散雕櫳戴叔倫詩楊栁牽愁思和春上翠裙梅含雞舌兼紅氣梁元帝詩梅含今樹春漢官儀尚書郎含雞舌香奏事唐本草雞舌香樹葉及皮並似栗花如梅花又雞舌香與丁香同種花實叢生其中心最大者為雞舌擊破有順理而解為兩向故名江弄瓊花散緑紋郭璞江賦揮弄灑珠杜甫詩倒懸瑶池影屈注滄江流味如甘露漿揮弄滑且柔澠水燕談揚州后土廟有瓊花一株潔白可愛嵗久大而花繁俗目為瓊花不知實何木也齊東野語瓊花惟揚州后土祠一株絶類聚八仙但色微黃而香甚王僧孺詩緑水散圓紋帶霧山鶯啼尚小梁昭明太子七契鳴禽聒耳零霧蔽眸簡文帝詩遙禽逐霧征王冏詩山鶯紛可喜劉長卿詩移栁待山鶯隂鏗詩鶯啼歌扇後穿沙蘆筍葉才分杜甫詩映竹水穿沙爾雅葭蘆菼薍其萌虇注今江東呼蘆笋為虇王維詩蘆笋穿荷葉曹植賦黎庶徙倚棋布葉分楊炯曹君碑銘條分葉散源濬流長今朝何事偏相覔庾信詩今朝風日好謝朓詩問我勞何事杜甫詩得錢即相覔撩亂芳情最是君謝偃詩撩亂垂絲昏栁陌庾肩吾詩含芳如有情過襄陽樓呈上府主嚴司空樓在江陵節度使宅北隅舊唐書元稹傳拜監察御史奉使東蜀召還京執政以稹少年後輩務作威福貶為江陵府士曹參軍又地理志荆州江陵府天寶元年改為江陵郡乾元元年三月復為荆州大都督府至德後置荆南節度使上元元年九月置南都以荆州為江陵府長史為尹屬山南東道襄陽樓下樹隂成北史魏收傳收折節讀書夏日坐板床隨樹隂諷誦楊師道詩何須命輕蓋桃李自成隂荷葉如錢水面平王勃序荷葉濕而曉露繁竹院靜而炎氣息杜甫詩㸃溪荷葉疊青錢管子水平而不流平陸機演連珠澄風觀水則川流拂水栁花千萬㸃吳均詩春從何處來拂水復驚梅陳後主樂府栁花塵裏暗槐色露中光李白五雲歌瑶臺雪花數千㸃杜甫詩風飄萬㸃正愁人隔林鶯舌兩三聲武平一詩黃鶯未解林間囀梁簡文帝詩今旦聞春鳥何啻兩三聲司空曙殘鶯百囀歌禪齊深樹夏隂清零落空餘三兩聲有時水畔看雲立杜甫詩有時自發鐘磬響劉長卿詩閉門湖水畔自與白鷗親王維詩行到水窮處坐看雲起時每日樓前信馬行李白詩南風吹歸心飛墮酒樓前岑參詩薄暮垂鞭信馬蹄早晚暫教王粲上梁元帝職貢序氷無早晚與素石而俱貞魏志王粲傳粲字仲宣魏國既建拜侍中博物多識問無不對興造制度粲恆典之盛𢎞之荆州記當陽縣城樓王仲宣登之而作賦庾公應待月分明世說庾太尉在武昌秋夜氣佳景清佐吏殷浩王胡之之徒登南樓理詠音調始遒庾公率左右步來諸賢欲趨避之公徐云諸君少住老子於此處興復不淺因便據胡床與諸人詠謔杜甫詩月靜庾公樓李白詩待月月未出望江江自流杜甫詩常時任顯晦秋至最分明以州宅夸于樂天白居易有答元微之誇越州州宅詩州城迥繞拂雲堆庾信詩山城足逈樓綦毋潛詩華陽仙洞口半嶺拂雲看一統志拂雲樓在卧龍山上宋汪綱建取元稹州城迥繞拂雲堆之句以名鏡水稽山滿眼來㑹稽記漢順帝永和五年㑹稽太守馬臻創立鏡湖在㑹稽山隂兩縣界漢書地理志㑹稽郡縣山隂㑹稽山在南一統志鏡湖在紹興府城西南三十里㑹稽山在紹興府城東南一十二里南史顔延之傳鮑照曰君詩若鋪錦列繡雕繢滿眼徐陵詩密意眼中來四面常時對屏障江總詩山雲四面通庾信詩春窗四面開杜甫詩常時任顯晦名勝志稽山堂在紹興府治東羣山列秀宛如屏障一家終日在樓臺劉長卿詩千峯寄一家夏侯湛賦振輕箑以終日陰鏗詩雲裏望樓臺徐陵詩樓臺非一勢臨玩自多竒星河似向簷前落河圖括地象川德布精上為星河江淹詩檐前露已團徐陵詩簷前初月照又唯憎無賴汝南雞天河未落猶爭啼鼓角驚從地底回後漢書公孫瓚傳鼓角鳴于地中庾信詩地中鳴鼓角唐書百官志節度使入境州縣築節樓迎以鼓角揚雄賦漂龍淵而還九垠兮窺地底而上回我是玉皇香案吏初學記髙上玉皇上聖帝君九天王真皆德空洞以為字合二氣以為名唐書儀衛志朝日殿上設黼扆躡席熏爐香案謫居猶得住蓬萊史記賈生傳賈生謫居長沙漢書郊祀志威宣燕昭使人入海求蓬萊方丈瀛洲一統志蓬萊閣在卧龍山五代錢鏐建舊志蓬萊山屬㑹稽閣名蓬萊以此重夸州宅旦暮景色兼酬前篇末句白居易答微之詩末句云知君暗數江南郡除却餘杭盡不如仙都難畫亦難書十洲記滄海島中有九老仙都張正見詩試飲淮南藥翻上仙都樹墨莊漫録蕭條淡泊此難畫者蘇頲詩竹木蕭蕭畫不成暫合登臨不合居庾信詩逰客喜登臨張正見詩甘棠聽訟罷福宇試登臨漢書息夫躬傳歸國未有第宅寄居邱亭蕭子良詩卜居西山外繞郭烟嵐新雨後司空曙詩烟蕪滿洞青山繞李雍碑文周目環郭江淹山中楚辭烟色閉兮喬木撓嵐氣暗兮幽篁雜江總詩新雨百花朝滿山樓閣上燈初太真外傳方士絶大海跨蓬臺見最髙山上多樓閣梁元帝詩然燈疑夜火人聲曉動千門闢何遜七召冬霰積庭室靡人聲國語明而動晦而休無日以息史記封禪書作建章宫度為千門萬户班固賦張千門而立萬户陸雲詩髙門重闢湖色宵涵萬象虛儲光羲詩湖色映晨昏管子水之性環則中中則涵謝靈運詩皇心美陽澤萬象咸光昭孟浩然詩八月湖水平涵虗混太清為問西州羅剎岸古曲憶梅下西州折梅寄江北一統志杭州錢塘縣屬㑹稽郡漢為㑹稽西部都尉治所又秦望山在府城南一十里東南有羅剎石橫截江濤名勝志錢塘江一名羅剎江取風濤險惡之意濤頭衝突近何如曹毗觀濤賦發源溟池回衝天井水經注錢塘縣東諸山皆西臨浙江江川急濬兼濤水晝夜再來常以月晦及望尤大至二月八月最髙峨峨二丈有餘名勝志錢塘江潮水奔騰衝激郡人以八月十八日傾城觀潮為樂詩與爾臨衝疏衝者從旁衝突之稱古樂府書中竟何如和樂天早春見寄雨香雲淡覺微和王褒碑香隨微雨自灑風塵杜甫詩淡雲疏雨過髙城陶潛詩日暮天無雲春風扇微和誰送春聲入棹歌李白詩春風卷入碧雲去千門萬户皆春聲杜甫詩鷗泛已春聲漢武帝秋風辭簫鼓鳴兮發棹歌陸機棹歌行榜人縱棹歌萱近北堂穿土早詩焉得萱草言樹之背傳萱草令人忘憂背北堂也吳均詩何用贈分手自有北堂萱論衡穿土鑿井無為得人栁偏東面受風多說文栁小楊也梁簡文帝賦看東風之入栁杜甫詩東偏若面勢子夜歌招取四面風杜甫詩吹面受和風梁簡文帝賦畏風多而榜危湖添水色消殘雪梁簡文帝詩水色帶風移詩雨雪漉漉見睍曰消庾肩吾詩庭雪晚初消徐陵詩雪色故年殘一統志西湖有十景一曰斷橋殘雪江送潮頭湧漫波徐陵詩江風送上潮一統志錢塘江通海潮水每晝夜再至小則水漸漲不過數尺大則湧濤髙數丈同受新年不同賞後漢書百官志太史令一人掌天時星歷凡嵗將終奏新年歷庾信詩新年鳥聲千種囀沈約雪贊潔貌雖同賞英心共誰振一統志西湖山川秀發景物華麗自唐以來為東南逰賞勝地無由縮地欲如何吳均詩無由得共語空對相思杯神仙傳費長房有神術能縮地脉盧照鄰詩序願駐景於髙天想乘霓於縮地梁元帝賦相思相望路逺如何御選唐詩卷二十一
